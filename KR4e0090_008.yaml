body:
  text: 東里文集卷八明楊士竒撰序送郭公緒貴州僉憲序公緒永樂十年進士明年簡授陕西按察僉事嵗餘前之任僉事者坐纍宥還公緒改任浙江又嵗餘丁內艱去服闋改任廣西嵗中廣西之前僉事亦坐纍宥還公緒又改貴州雖其所至席未及暖而闓敏之材雅重之望廉潔之操籍籍有稱矣雖往復動以萬里囊無百緡之齎羸童瘦馬弊弊焉而怡然未嘗不自得也今將適貴州雖深山長谷蠻溪獠洞荒逺而僻陋無文物之觀無賔客之娛要不足以動其中矣而既偏於一隅且為郡縣未久也徴調稀少吏民相安繩檢之外簡牘不煩敲朴不施公庭靜虛懷抱澄爽固無滑其所自得也如以其餘暇用志於古君子之道力求以跂及焉將所造孰之能禦哉吾知公緒之進未可量也余友清江胡士璉歷仕四十年泊然不變韋布之素其靜貞有守寬厚和平卓然今之老成人吾嘗兄禮之今為其僚之長公緒旦暮相與周旋一堂之間吾又知其將有益矣蓋朋友之輔薰漸之資凡古君子不廢焉遂書以為公緒之官之贈送貝秉彛知縣還東阿詩序皇上臨御以來用科舉聚天下之賢才而選任之於今歷八科獨甲申所選最多蓋視洪武乙丑得四百七十人既分任之中外百職而賢與才之有聞者亦多以髙文碩學在侍近以通材雅操贊六卿以寬大廉正任方嶽以仁厚豈弟為郡縣濟濟乎有人焉而郡縣得人尤多貝君秉彛其表表者也秉彛為令於兖之東阿聲譽洋溢齊魯之間傳播於四方雖古卓魯何過也吾嘗道東阿之境而見其君子小人焉其君子道秉彛之德曰此吾之賢大夫也小人道秉彛之政曰此吾之仁父母也是豈聲音笑貌之所能為哉秉彛為令守之以廉行之以公且恕於愛民如其子於治公事如治其家而表裏始終一誠耳自其在東阿無不穫之嵗無不給之民民出力以共公賦未嘗有後者用九載考最當升朝廷從民之請增其秩而復其任夫長民而能得民之心上未有不知而不優遇之也蓋為天下而欲民之安其要在簡守令而令尤親民於守也守令而不能廉固民之蟊蠧茍廉而不能恕亦未必非民之厲今之守令如秉彛固鮮矣其歸也其同年而升者相率贈詩以道離别之情以求余序余雖始識秉彛而知之有素故不復辭蕭自誠先生慶夀詩序河南右布政使泰和蕭省身歷官三載吏部考其績最國朝之制方嶽之臣一考最者豫誥三考最封贈其親省身當得誥俯伏言臣父今年八十有一迫於衰暮伏惟陛下矜憐之願推今之所賜臣者以賜臣之父臣父雖老而獲生被光榮於聖明之世過於賜臣萬萬矣特詔吏部從之封自誠為通奉大夫河南布政司右布政使左右文武之臣觀者歡喜踴躍頌上之大德又歆豔省身之以孝遭遇也蓋是時十四布政使之得封其父者自省身始而大江之西十五郡之士以子貴而生膺二品之封者亦自自誠先生始盛哉蕭氏之榮也蕭世有文獻宋之亡其先以忠義僨家終元之世子若孫不見顯者而服仁秉義未嘗絶也先生生長元季兵戈冦奪之時東西奔走無寧曰而持其行顓顓焉惟恐羞其先人而流俗之人徒見其纍世之不伸也夫鄧林之木窮冬嚴凝氷雪摧剝之餘其生生之本固在一旦乘陽春勃然而興鬱然而復茂矣蓋識者嘗計蕭氏之必復興也雖先生已老而享祿養二十年又躬被爵命其夫人亦春秋七十有五今皆安健三子省身卓然為時賢臣仲與季及其孫亦皆溫溫端實不去儒業先生之福可謂厚且備矣省身既屬學士大夫形于聲詩彰上之賜以夀其父得十首謂余同邑且相知也屬為序云送劉給事中巡撫山東序永樂十九年四月二十有一日上御奉天門顧羣臣若曰朕祗奉天命君天下天下之人其尚有未安于業而凍餒愁歎者乎任牧守者其尚有苛刻黷貨而亂章以厲民者乎朕惟是孶孶夙夜之靡寧遂分命大臣巡撫天下而各副以近臣一人賜之璽書俾所至廉察民所利害而為之興革及牧守者舉其廉能而罷出其貪虐於是户部侍郎李昶兵科給事中劉煥當巡撫山東山東介河濟連海岱而古齊魯之域也雖其壤地多肥沃然其人習氣緩慢加以比嵗旱潦疾疫之相仍而淪于艱窘雖其故周公之國孔孟之邦然聖賢之德化逺矣仕於是者或失其良心誠有如聖諭者焉昔漢唐宋數遣使巡行天下曰巡省曰安撫曰採訪皆今巡撫之職所以廣視聽達民隱而其使之賢者多也今之奉命乘軺單厥心推明致公而無厭斁焉將使窮山深谷荒僻之人皆得以發舒幽鬱蒙被涵育而樂乎聖明之世者於上足以副君命下足以光使職豈不偉然有譽可以擬昔之賢使者歟惟君以愛民為事天之實惟臣以愛民為事君之實諸君子是行也太平之責係焉其可有一毫之不至也哉煥字士拯闓疏明敏於余有鄉邑之義故於其行也歌皇華之二章酌之酒而申之以辭龍潭十景序南京出朝陽門東兩舍許大江之濵有勝地曰龍潭環龍潭之側有石屋有旗山有華麓有栁灣有花洞又有七星之山三江之口皆勝地也山可以逰可以牧水可以梁可以舟又有驛舍可以憩過使麗譙可以騁眺望有三茅君兄弟及王荆公遺迹可以慨想古人又有道家禮斗之宫可以遊神於清淨而最勝者夜籟俱寂月上潮漲之際可以坐觀造化盈虛消息之機也太醫院判蔣君用文家於此樂於此析為十景既各為詩詠之及官于兩京兩京之縉紳君子亦皆為詠之誦其詩想其處蓋使人樂之慕之而不能忘也詩既有序矣蔣君又屬余序其後嗟夫天下佳山水何處不有則亦何處不可樂而常情得於此者必忘於彼矣龍潭金陵之區也吾居金陵二十年愛其民多秀俊惇尚文學而耻以力勝其俗男女不雜處蓋吾嘗道荆楚以觀于故漢東諸侯之域今之北來也又涉淮徐歷齊魯之郊矣而金陵之民俗吾固不能忘也然此其在下者耳我國家龍興削平僣亂以安天下而然後天下之人皆得休養生息以樂於泰和之世而實始定鼎乎是則於今瞻望橋陵于鍾山五雲之表而仰惟神功聖德如天地之盛大豈獨余與用文者之不忘凡天下之人孰能一日而忘也則余於序此詩安得不推其大而不能忘者言之哉謹書其卷後永樂壬寅十月朔序送楊太常歸省詩序𢎞濟自舉進士入翰林已籍籍有賢名縉紳間太宗皇帝臨御之又眀年建儲擇輔擢兼洗馬仁宗皇帝在位升翰林學士再升兼太常卿初開𢎞文閣於思善門之左簡文學之士五人日直其中職討論其第一人𢎞濟也𢎞濟時就中論事有裨益上嗣大統覽先朝羣臣所上奏嘉𢎞濟之能直也親擢祕閣預機要士竒得共事焉士竒竊自念初以布衣被召入西掖時天下文學之士召至者二十餘人同稽古纂述之事而翰林之臣三人參領之忽忽草五六年矣三人者今獨𢎞濟在二十餘人之尚在者士竒二三人耳以是恆相與親厚𢎞濟為人忠厚惻怛愛人以德凡所與處必輔之于道不肯苟且阿徇蓋非獨于余有切磨之益朋友資益之者蓋多也𢎞濟有孝行處憂患困縶十年念母老不得朝夕侍也辛苦自力節縮日給之費寓歸以助養蓋聞者皆動心焉幸復履亨洊膺委任未敢遽言其私而其中之惓惓者固未嘗巳也既受誥命以其官贈祖考又封其母為太淑人以奏歸省既得請將行同官卿士相率祖餞文明門外觴酌之次各賦詩道離别之意而謂余序之余曰士官至三品先九卿曰在上左右得以所學論天下事又得推恩其親而朱衣象笏承歡婉愈用慰恱親顔於違濶之久如𢎞濟今日者何其榮也固本于上之大德其亦𢎞濟之賢太淑人之福有以迓承之歟宜以為𢎞濟賀又曰人之所尊君親一也自𢎞濟官侍近先朝所以寵待之何如上所以親用之何如𢎞濟素所自任又何如其肯久昵於私而後于公乎請以為𢎞濟祝𢎞濟起謝曰微子言溥猶將自奮矧子之篤我于義敢忘率承遂次第其説書之簡端送陳賞序元有天下將百年吾邑之士登仕籍者十數姓而以科第顯者楊與陳也兩姓世以詩書行義相髙又為姻好不絶贑州路推官冢嗣潮州教授實先待制公子壻而余又陳之出也兩家中更亂離殘壞之餘髙門大第莽然瓦礫之墟其子孫猶有不墜詩書故習者誠先德之遺矣教授公之孫前監察御史仲述博學清修為名進士為御史十年聲譽表然其沒也無以為斂一子賞蚤喪母貧苦依養于其叔十數嵗能究知其父之為人刻志讀書勵行以求不辱十五挾册往教南村北疃以謀葬其父自幼至長事其叔父母如父母處其從兄弟恭愛不異同産雖微利不以苟取雖周親行有不義未嘗妄處里之賢者固以賞為難不賢而困辱賞者亦多矣賞皆不顧方孑孑走數百里求師而學焉弱冠遂選鄉貢於乎賞可謂難矣邑人之子弟不暇論若吾兩家之子弟有如賞者乎今年賞會試禮部不偶而歸察其意無有所不懌吾不患賞之歸不能安乎貧賤也吾懼賞去此而畫焉夫吾兩姓之子弟偶無賞之孤貧困苦故不自見如有之安知其不能自立如賞者乎邑人子弟多矣或吾偶未之見安知不有如賞者乎即使皆不如賞賞不宜自足也孟子曰友一鄉之善士為未足斯友天下之善士以友天下之善士為未足又尚論古之人故出一言必求不倍於古人行一行必求不倍於古人誠於其內而為之不巳焉未有不至者也揚子雲曰百川學海而不至于海丘陵學山而不至于山惡其畫也畫斯巳矣賞可不致其力哉賞歸見吾兩家之子弟以及邑人之子弟亦為我語之禾溪樂氏族譜序樂氏出子姓宋微子之後曰公子衎字樂父子孫因王父字為氏自望諸君而下代有聞者泰和樂氏五代時諱糾者始來居邑西之禾溪世業儒仕宦科目傳續不乏而積善纍仁源厚而流逺子孫至今不廢詩書之習蓋鄉之故家也夫所號故家者必其仁義之行詩書之業有肇於前有承於後愈逺而愈不替茍非是二者而徒恃其貴富貴富不足恃如子孫不能自修以善繼又或有忝焉者此得號故家乎樂氏其無忝者哉樂先世譜牒文字悉燬於元季之兵其孫集重尊祖敬宗之心據其所聞所知因舊譜而為圖凡世次昭穆逺不能詳者闕之既自為序又求竹亭王先生序之集字大成好學有文嘗從授經安成劉雲章先生洪武庚戌試有司不偶即退伏不出而益修其德義大成卒其配胡守節不嫁訓勵其三子嗣先人之業皆卓立為鄉善人樂氏其無忝故家者哉今大成之孫昶又以譜求余序昶今用薦授湖廣按察司經歷然余願有為鄉邑告者大成之子仲韞吾邑共推其仁人長者蓋數十年來邑前輩好善者多巳物故後生晚出知有利不知有義或身沾一命或家崇百畝輒侈然恣肆豺視其鄉人漁􅟃之風作而告訐之俗興矣然卒之能保其所得及其身家者寡矣惟樂氏之宗獨完誠以仲韞為之長也仲韞恂恂未嘗茍取一毫而恆損巳以益人間聞其子姪以過舉召怨即踵怨家門謝之曰此吾未嘗教訓之過也或聞有所侵利即損巳償之然終不以詰其子姪其子姪聞之亦慚懼自改嗚呼仲韞巳矣安得復有若人者乎鄉有善人斯一鄉賴之家有善人斯一家賴之今安得復有如樂仲韞哉吾故表而出之送劉子敏序鄉先生廣西僉憲王公子啓分教鄉校時識子敏于童丱言於邑大夫以為弟子員先生嚴毅方正諸弟子員鮮有當其意者而愛重子敏其有意乎造就之矣期月而先生沒時子敏在羣居中敦厚和易恂恂惟謹他之為弟子員者不及也余年與子敏相上下當是時與之交於今二十餘年回視曩時與子敏同門而不及其敦厚和易者皆巳物故子敏方駸駸乎榮達之域未已也謂人之夀夭貴賤窮達不本諸身之所行可乎子敏擢自太學生兩為御史為縣令而至山東按察副使今再調湖廣可謂榮矣生民之安否百司之賢不肖惟風憲之職得言之非如其他官守有出位之嫌也今朝廷急治如渴有能陳説生民利病若之何當建當革而便雖布衣疏賤之臣率加奬而超拔之言之誕妄無取猶曲垂奬借庶幾以來四方之盡言是得言之時未有如今日者也吾嘗道江漢之間其民雖徑悍然或盡室出力赴公未嘗歎咨其牧守之吏遇之或不以道未嘗自言而其病也久矣蓋仁人君子觸于目未有不隱于心者夫處當言之職際得言之時而觸于目隱于心猶曰姑徐徐云耳仁人君子豈若是其恝哉士不仕則巳仕而登顯用任重寄則當謹其表率明於大體公其視聽推其至誠惻怛之心善善而惡惡以求利乎民盡乎職不負國家所以簡用之盛心庶幾不忝其榮也子敏勉之子遇同官黃宗載吾故人也為我謝焉黎氏倡和詩序永樂壬辰余校文禮部得臨江黎潛輝所試經義論䇿溫厚而詳雅三復咏歎以為可以想見其人其後曹御史冀成手一編視余曰此黎充輝之詩潛輝兄也清新雅則有唐人韻致類好古絶俗之士者因共慨歎二惠競爽於今絶無而僅有他日從中允吳公得其所自焉蓋其先君子秉德樂善敦詩書務禮樂所居距石門梁先生甚邇相好也於是充輝從先生涵濡其教而薰炙其化久矣潛輝從而私淑之深矣孔子曰魯無君子斯焉取斯而州閭鄉黨所以重有道德老成者歟今又得其伯仲京華倡和之什讀之贍而實婉而切雍雍乎塤箎之相和也韡韡乎華蕚之光映也繾綣乎彭城夜雨之鍾情也而其歸則在於立身行道孝親忠君之大端何其友愛之篤歟夫詩以言志也即其所言知其所存即其所存知其所立於是可以知黎氏兄弟之立矣清江玉笥之間山川靈秀鍾於人挺然英傑兄弟並起馳聲當時而流問來世如二劉三孔者去今未逺也將無繼之而興者乎黎氏之兄弟未可量也其姪某盛年力學文采煥發不愧諸父黎氏其有不興者乎而吳中允李郎中錢檢討相繼和之金舂而玉應皆可貴也余故引諸其卷端送胡敬方序敬方世家吉水其篤實之行通博之學博贍之文十餘年來一鄉之學者多師之環其鄉數百里之學者多慕之自其遊鄉校登成均搢紳君子遇之多敬禮聞之者多願見之也非其有諸躬何以得於人如此哉而賔興之嵗羣試于有司數矣數不偶去嵗試京闈遂為春秋之冠既會試禮部又不偶而受敬方之教者纍纍擢髙科躋清要豈其學獨利於人哉抑其所存心不急於達乎夫學充於巳而後能成物道畜於身必將以用世理也亦君子之心也或曰千里之駿超逸之才彼求之驪黃牝牡斯戾矣抑固係其命耶或曰物貴者不速售利厚者必遲獲故連城之璧至于三進任氏之釣不取近效夫孰計敬方之獲不逺且大哉敬方之言曰古之君子志在乎內豈計乎其外也天下之道大而君臣父子夫婦之倫細而萬事萬物之故凡孔孟以來諸君子所務者吾不敢巳焉吾何暇計其外乎於是知敬方之志逺且大也今自太學歸省于鄉士有求余言贈之者是以書此使學於敬方者皆知其志送族孫朋逺訓導序族孫朋逺來京師得廬陵縣學訓導將歸求贈言嗟乎吾老矣何言而吾宗人也忍無一言夫簡百里之俊秀居之學而設官以教之將以待國家之用為致理之具也而非學之通德之備才之周何以為施教之資哉矧士生廬陵其俊秀巳異於常倫又漸習賢父兄長者之化導有素如施教者之學之德之才或有一之不足豈徒無以厭服其心而毁且辱所繇作也朋逺其務加進於巳哉嘗觀世之為教官者有善不善焉善者一志於公而無私旦暮坐講席與諸生道正道眀正學退則考古聖賢言行之懿用充於巳而應於人非公會未嘗涉迹守令之庭非義所當得不苟取一芥以是功業益著而祿位益進不善者率務私倍公日徒飽官廪不之東家之西家宴遊傲嬉間稍一坐講席諸生就質所疑有噤不能吐一語者甚者役志嗜欲日趍走守令庭下有所干乞卑卑效兒女軟媚語求矜念用苟利於巳於義不義不復計以是聲迹壞而僨敗及之其為賢不肖何啻霄壤懸絶也朋逺其務慎修於巳哉勉企夫善者而戒夫不善者子之善其孰之禦哉楊氏世以清白聞不必逺舉由元至今一二百年間內自朝著外至郡縣百司之職無不有焉而無一人以貪墨失官者朋逺必克繼之而後為楊氏賢子孫吾雖老尚冀日見楊氏子孫之皆賢也朋逺勉之中溪八景詩序安成彭氏世居邑東中溪之上據山水之勝山則直其居之東曰東陽峰上有巨石將雨則雲氣自石出土人常視為雨候其南有石巖如屋髙廣可數丈中祀唐安成今劉像志云像死為神祀以祈靈云南又有白馬峰以劉像嘗乘白馬駐此峰特髙諸山常先得旦日南稍西曰黃牛嶺昔有仙人乘黃牛於此得名山趾磅礴而髙峻絶出當日暮景暝獨受返照屹立類金璧可玩嶺之顛舊有臺相傳嘗有三仙人止此民築臺祀之臺久廢而至今或見有夜光如燈煜煜其上者水則直其居之北有潭在石榴峰之麓昔有沒而漁者見隂洞有石床老人卧其上蓋龍所居也東北有玉井泉甘冽而源深厚夏旱不竭南有密湖廣數百畝産菱藕魚蝦之利而深不可測有潛蛟其下好事者析為八景今彭氏之彥育敬舉進士在京師思之不能忘求翰林諸君子為之賦詠既又求余序之夫人於山水之勝非其資識清明襟宇灑落無利欲之纍者不足以樂之樂之而至於既去不忘又託於賢士大夫為之發揮蓋樂之深者也育敬其所存固有過人者哉天下嘉山勝水豈少也不聞於人則亦與棄物何異中溪之山水其自今焯焯於世哉吾聞安成山水之勝中溪其一也安成之民多俊爽魁傑尚氣節其俗之善家詩書户禮義而代有聞人所從來逺矣其亦山川靈秀之所鍾歟蘇文忠公記眉州逺景樓而稱道其俗則吾於序中溪八景之什安得舉彼而遺此哉送學士李君詩序正統三年六月翰林學士李君時勉奏令羣臣歷官三年願展桑梓者聽臣歷三十年屬有史事未敢言私今史巳上幸賜告上曰如令初李君未奏謀諸同官皆曰翰林者天子之親臣辭令所出也論思所職也李君方握院章為之長奈何去且上富於春秋萬幾稍暇御經筵孜孜聖學李君實兼經筵官奈何去曰諸君之謂我者公義也顧今迫於私情之不可巳孰有切于我乎二三年來長子死妻死季子死比者同産兄又死一門之內寡孤森森愁餒泣寒延頸北望六七千里之外冀一顧視撫存庶幾不遂失所而吾能忍而委置之乎且吾私計之矣聖明在上近進翰林正二十有餘人皆慎簡也前此未嘗有今日之盛而經筵官尚十數人其輕重豈係一人哉我往決矣蓋衆非不明李君之情特以李君之有裨於公也其文學老成操行修潔正直可以表俗剛毅可以任事量足以容物而志不為物所奪時雖欲尼之而不可也及奏而命下陛辭既衆相與餞之崇文門外有舉爵而祝之曰父子之相厚仁也君臣之相厚義也仁義修而君子之德立李君秋而往春而來公私其兩盡也李君曰愛我以義亦仁也敢不敬承於時學士十人皆賦詩送之謂余為序余亦賦四言一篇致申告之意其詞曰湛湛川流東合而下君子有行逖矣南土興言送之于川之滸或山而峻或淵而深言念君子如玉如金宿昔言笑良獲我心呦呦麋鹿羣處中野雍雍鴻鴈亦集洲渚云胡仳離當我與女歸哉優優我私既遂我職在公敢懷豫怠先哲有言夙夜匪懈惠風布和倉庚時鳴北望都畿我心怦怦來覲于庭我心載平東里文集卷八
