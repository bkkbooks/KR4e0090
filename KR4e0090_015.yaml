body:
  text: 東里文集卷十五明楊士竒撰墓表香山縣丞彭公墓表鳴呼古人所與共治天下者必擇士而任之凡內外大小百執事之職非士不與是以職修而治興後世雜刀筆吏與士並用至有謂士迂闊無益于世者夫為士而不知道知道而不適用誠無益于世然取士亦察于其內何如焉耳可以什一遂廢千百哉若今香山縣丞彭公出乎士也其所以修于身施于人者皆有以發明斯道士果無益于世哉公諱豫字與志一字叔介吉之泰和人其先徙自長沙宋寧宗時曰惟孝詣闕獻賦周丞相必大楊學士萬里謝諫議諤交薦其才得官不受而去公之七世祖也祖某父某公自幼已岐嶷異常兒稍長讀書知以明道為務初吳文正公以性命之學授虞文靖公文靖公以授鄉貢進士安成劉雲章先生公往從學雲章先生久而益有所得雲章先生殁益嚴奉先生之教動息語默必由于矩度澄心玩微手不釋卷茹素飲潔懙懙自足非其人不接也一時流俗亦皆目公倔強乖刺公既孤特寡偶而持之愈堅南雄守嘗辟公教官金州守奏公才行可用徴詣京師皆以疾辭後數年始就聘萬安訓導以上書言事擢香山丞香山在嶺南海島之間地逺而俗嚚前之為縣者率尚猛治公至一務寬施訓以善道久而民益化服緣海諸衛屯兵暴橫為民害往往擇民膏腴田誣以荒廢據占自利郡縣不能制公獨毅然曰此細民所資以共公賦給私家者且奪民欺上著在國典有不還所侵田必執不貸兵知公不可犯聞所言悉還之縣有大猾恆持長吏短長搖撼以騁前此縣長吏皆縮手不敢詰公悉捕置諸法姦宄斂迹海冦常劫掠民婦女資貨出沒倏忽不可蹤迹民苦之公為方略教民掩捕訖公去冦無入境者瀕海歲旱衆禱不應公自外來曰豈有為文具而能格天者乎即自齋沐致禱越二日大雨霑足明年復旱公復禱雨亦如之縣民舍火且延及官廨公叩頭嚮之反風火滅民習不樂學雖已久立學官生徒廪食十數年有不能通知語孟章句者公稍暇即詣學督視諸生為之啓諭誘掖不數年有與賔興而登仕者民始知學之貴在官六年年已七十以老疾乞致仕既得請未行某月某日卒于京師永樂六年也明年某月某日葬某里某原娶某氏繼室某氏皆先卒子男一某孫男若干某某公居家事親孝執喪三年不御酒肉人未嘗見其啓齒待族人有恩嘗嫁孤女振貧乏皆曰此在我當然性簡淡無他嗜好惟寶愛其宗譜與先世手澤文字踰于拱璧嘗語其子若孫曰知愛此則能愛身矣聞有存其先世及劉雲章先生片文隻字雖百里外不以寒暑奔走求録遇鄉人子弟必教之禮義忠信嘗以歲更長繇賦里中教里民復其所生之姓者數家民貧不能輸賦竭已力代之輸不責償焉蓋公之所為厚于民者初不待香山而後見已如使公之見用不止于香山又使士之用世治民皆如公之香山士之效豈不暴著于天下彼不為公者不足言而公僅止于香山而已嗚呼惜哉余故論次公平生大槩表諸墓道以告其後之人而亦豈獨其後之人之當知哉工部屯田主事郭君墓表君姓郭氏諱原琳字貢仲郭氏萬安下驛里名家其先居泰和城西後徙龍泉之金田至繼之徙下驛又至如村晴川昭明貢仲之曾大父大父父也昭明敦厚有行洪武中禮部侍郎張衡薦其材於朝徴至援例得歸娶泰和陳氏生二子貢仲其仲也體貌魁偉而淳厚坦亮外和內莊喜愠不見辭色未嘗舉口及人過失蓋望而知為厚重君子也孝友行于家忠信徴於鄉從永豐唐斐先生受詩經為太學生居無幾告歸養親後十餘年終親喪復還太學遂擢工部屯田清吏司主事居官不嚴而肅蒞事以勤待下以恕凡所董治事必先集冬官卿及其二咸禮重之下之人皆樂為之用不肯欺之三載考最奉命徴薪炭山東時山東嵗屢歉貢仲一意綏撫未嘗督責之民更感激趍事是時奉命徴物山東不下百餘人而以清謹寬厚稱裁三四人貢仲其一也永樂壬寅六月草三日以疾卒于長山縣官為斂殯之而發視其裝無所有唯所齎公牘及遺訓其子之書而已享年五十有六娶張氏子男三楫矩淵女一嫁羅仲鈞孫男女各四楫淵以其卒之明年走長山啓殯歸葬於鄉而楫來北京以翰林修撰曽鶴齡所述事狀求余文表墓嗚呼貢仲吾姑夫陳白石先生女兄之子總角讀書依舅氏往還與余好也既長暌隔不相見殆三十年始再會于南京貢仲為人簡淡未嘗一涉迹達官之門雖同鄉郡識之者無幾人而間暇輒過余或留止宿談論以樂不厭也來北京僅一見而有山東之别夫孰計其遂永訣耶貢仲之賢且材無所施不宜又孰計其竟止于此耶抑造物者之意與民之所欲惡異耶不然何奪吾貢仲之遽也吾因之又有感焉萬安之賢而材如張衡之清峻彭與明之亷慎郭士道之剛介其達也皆有以及人雖衡仕至少宗伯與明至大理丞士道至京尹皆達矣而皆不久而遂卒吾與貢仲語蓋未嘗不共嗟咨悼惜之而致疑于造物者夫孰計貢仲又奄然遽已耶則余於貢仲之沒不能忘情此三人者亦貢仲之意也歐陽允賢墓表允賢諱賢歐陽氏也仕至南京國子助教永樂壬寅十一月初三日卒于官其世家吉安泰和邑西蜀江里其先與文忠公同出吉州刺史琮其曾大父孚先大父以定父觀瀾允賢洪武庚午以書經中江西鄉試明年會試中教官選授嚴州府學教授居無幾丁內囏服闋改興化府學教授永樂元年升國子助教其為教授嚴條約以勵諸生一時學校之為師弟子者率棄本無實而記録舊文以資進取徼幸得之而既懵于學術往往不見重于世允賢恆旦暮衣冠坐講堂中取四書經傳為諸生解析反覆使逹于本原然後以其所得發為文辭而為定其可否在太學亦然允賢兼通詩春秋論説之際諸生非其講下者皆樂就而聼焉有疑未通者皆往質問允賢亦樂為之傾寫蓋自祭酒司業以下咸禮重之而祭酒胡公遣子從之學太學生之始至者素已聞歐陽先生亦多願從之助教九年考最考最復職者皆援例自陳得升衆謂允賢盍自陳曰吾嘗戒學者宜安命乃今自蹈耶卒不自陳于家有孝弟之行為人坦夷直諒遇事是是非非亦喜為人解紛排難文章取逹意而止嘗曰刻深藻繪非吾所長亦非吾所願也邂逅朋儕知已相適竟日忘返而講論道德之餘其志未嘗不在生民憂深思逺之意每溢出言表蓋聞者鮮不迂闊視之嗚呼豈其然哉允賢德足以惠民量足以客物明足以燭幾公足以為政蓋無施而不可惜乎其一教官而止也雖承允賢之教者于為邑為郡為藩不少矣考夫足以發其道而愜其志者固少也嗚呼允賢可以易得哉允賢卒時其父春秋九十有二康健無恙也而允賢僅五十有五而止其命也夫其配贑州府學訓導劉一清先生之女子男六泳永貢哲莆澗洧淳莆先卒女二長嫁蕭九德次嫁康頮哲頮皆永樂十九年進士孫男三允賢之葬也翰林侍讀王君直銘之矣其弟監察御史和在京師求余表其墓余交允賢尤久知之尤深其沒也尤悲之故最其行與志之大者使歸刻焉故國子博士王君墓表北京國子監博士王復原字子復洪熙元年九月某日卒于官既歸葬其鄉吉泰和灉江里其子韶勤復走北京詣余拜且泣曰先子之藏也侍讀學士王先生為銘掩諸幽矣不肖孤竊念世蓋有生不霑一命行不加庸衆人率得名望貴人表揚于不朽者先生不肯尋常苟有論述而先子亦嘗以經術用于時列於朝矣表墓之文非先生其奚屬敢布其哀懇余曰嗟乎子復吾友也其沒也吾哭之慟宜其子之于我乎屬也王氏家泰和之西鄙世業書詩為儒師自其祖父以上皆不仕父志德積善蚤喪子復雖少不以孤窘而怠于學晨夕寒暑自䇿勵稍長聞同郡謝子方先生深于易裹糧從之謝講下生率常百數十輩而馳騖文辭進取之習得其支葉者為多若用志沈潛必探求本根者僅十數輩子復其一也子復是時已日有負挾出圭角謝先生亦竒視之洪武丙子選江西鄉試第七後四年會試禮部選教官第一授廣東化州學正時嶺以南郡縣學比比乏師子復盡心其職化州之學者始有所興起而浸漬及其旁近縣學亦多九載用績最超升北京國子監博士更鏟削鋒鋭為和易又九載以最升七品祿仍博士職預修五經性理大全諸書書成受厚賜及修太宗文皇帝實録詔簡有才識通史學者館閣擬子復未奏而子復得風疾遽不起子復為人儉約真率無崖岸嗜為文章在監學十餘年求文者日接踵戶外未嘗有厭倦意所著文集若干卷藏于家享年若干二子即韶勤皆有志于學嗚呼王氏于余還往之厚者子復及其弟敬先敬先為人率直闓爽惇義薄利前三年敬先沒于蜀余每與子復追憶之而悲豈謂于今又悲子復也則余之為此文也友道之感何獨子復哉何獨子復哉贈徴仕郎户科給事中夏君墓表錢唐有處士曰夏仲實沒十年矣宣德三年以子時貴贈徴仕郎户科給事中時奉前詹事府少詹事鄒濟所為仲實葬銘因中書舍人許鳴鶴求表其墓仲實諱忠本王氏子所生父士祖母夏氏生三男子其仲仲實也外祖某舅某皆無後父母命仲實為舅後承外家之祀遂氏夏云有孝友之行少時所生父母病聞人言刲股食之可愈每刲股煮液進之父母沒皆哀毁治喪祭盡誠斥去一切浮靡無益之費處兄弟恭愛待族人有恩或導之復王氏者慨然歎曰豈非篤我乎禮哉顧先考妣治命敢背棄乎王氏宗子在而先妣之父母與兄莫為主祀者矣我夏出也彼其有靈庶幾尚于我乎感通而忍委去之乎乃已仲實淳厚簡靜樂儉素治家能肅恆勤事以率下交朋友信處鄉䣊謙遜怡然犯而不校力施濟以守善自名晚喜老聃氏書終日玩誦不厭蓋年五十有五而卒其卒以永樂十七年十一月三十日娶陳氏封太孺人子男四長即時舉進士為户科給事中溫厚端慎為縉紳所重次敏次遜次觀女三孫男三女四嗚呼世之騁智巧角聲利奔走馳騖惟日不足欲為無窮不朽之圖卒之一旦與草木同泯滅不能有毫髮可以飭躬而裕後者多矣若仲實非有踔絶之志能邁倫之材勇謹謹焉蹈善務義以終其身生有令稱沒有餘慶其相去遼逺不待明者可知然所趨率在彼而不在此何耶如所趨率仲實亦奚必明法律張吏治而後可以興理耶故為表之以勸樵雪居士墓表江隂縣學教諭陳孟旦來北京以其姻家子王熊所狀乃祖樵雪居士世出事行求表其墓余覽之而歎曰嗚呼此吾故人也其平生風流文采雋爽闊逹楚楚出輩行今可復得哉王氏家泰和邑東一舍外梅岡之麓其先長沙人南唐時有為法曹于吉州者留居廬陵甲村數世徙梅岡至諱某號約齋者兄弟皆有科名于宋約齋與文丞相家有萬丈樓蓋庋丞相之書云又四世至道濟博學工詩賦不慕聞逹日與賢士大夫遊翛然出塵之韻也娶曾氏生四男子其季樵雪也諱環字伯彰幼勤問學既壯有志用世已而歎曰奈何違吾親之養而騖乎外哉其事親孝處兄弟敬愛從兄子朋清尚絶俗至老恭愛尤篤一味之甘必共于宗族育孤葬貧靡不盡心于鄉䣊周急濟乏雖數不厭嘗歲旱里人羣禱久弗應慨然曰文具能感通耶更三日不雨禾盡死民則何望即自齋潔致誠露禱翊日大雨霑足晚益恬于隱而嫉流俗之汙也自號樵雪居士縉紳儒生有過邑東鄙而不之樵雪者率自意欿然而樵雪所交遊皆時聞人樵雪卒于永樂癸卯二月草四日享年六十有九娶羅氏清湖名族有賢行子男二長三綱先卒次三紀孫男七熊其長也曽孫男女各二樵雪之葬以卒之歲某月日樵雪雖老書册不釋手尤喜為詩歌自娛嘗一至南京莫夜過余時梁用之陳孟潔聞之皆來會四人者相見不復作寒溫間闊語輒論詩相傾寫酒酣放為嘲謔夜漏盡二十刻未已終不片語及世事天未明樵雪不辭啓戶徑去嗚呼孰謂遂此為永别耶樵雪不可復得而孟潔用之皆已去世顧獨余在雖未死亦何有裨當世耶孟潔用之墓皆余銘之樵雪之墓余能已于言耶陳廷傑墓表莆田陳廷傑儒君子也唐會稽王揆其所自出也宋吏部尚書仁璧其五世祖也龍門居士諱某蓮塘居士諱某其曾祖祖也元以書經舉鄉貢號梅岩諱某其考也林氏有淑行其妣也賢其諱廷傑其字安順翁其晚年别字也色莊而氣和內仁而外方居心不欺致鄉有古道之號者其為人也年十三聞其父艱危徒步裹糧走數百里從之僃歷險阻卒奉父以歸父母殁時家甚貧能排衆人茍且之議而極力致喪葬之具于堅久至老死孝思不少衰者其誠于子職也為學官率五鼓興衣冠坐師席講授竟日不倦夕乃息廟學圮壞必倡率繕完兩考鄉試必致其公召修永樂大典考閲讐校必究心暨老且病必致恭朝謁不廢者其誠于臣職也慟兄觀持亷謹為陜西參政卒而官責其家償帑錢數萬緡遂罄其室奩具代償以免兄之妻子于窮厄恤宗姻孤者為之育訓貧者為之嫁娶為之喪葬者其德之施于內也守令有所咨政必輔諸厚鄉有顧掾者客于京師雅相慕而未始相識顧一旦疾急屬左右必請見至則顧己不能言惟數目床間囊意若有屬者為探囊得白金五十兩語顧曰為悉致若子顧即暝目後召其子歸之子拜奉三之一為謝不受南康邂逅嶺外人自京師還以病為同舟者所棄舁歸舍豫飲食醫藥戒家人謹視之且移文其家不報竟死又為治斂葬者其德之施于外也早從鄉先生治春秋明聖人筆削之旨歷究聖賢之書而力拒老佛者其學也于論著尚古賦詠尚選而家有困學針抱拙稿聨芳集者其文也諭學者必務孝弟忠信真知實踐而講析必暢理者其所施教也結廬西山岩瀑之間以耕以學而時乘黃犢讀書消搖岡原之上者其初所栖隱也由莆田邑學訓導為清河湖口南康三邑教諭者其後所歷官也洪熙乙巳季春之朔北京文明門之旅次其卒之歲月日及處也七十有三其享年也方氏其配淮其子也淮所營某鄉某原其藏也士行修諸身施諸人無怍于先民可質于鬼神者其藏宜有表也循淮之請而述行以求表者其門生前章貢守張珂也東阿縣儒學訓導黃先生墓表東阿縣儒學訓導黃先生諱珏字某别字憺翁其先自江夏徙南康之都昌宋隆興進士諱灝從朱文公受道學國史有傳者其七世祖也元盛時與虞文靖范文白遊諱石者其曾祖也祖諱慥錢唐縣學教諭父諱某南安道源書院山長母葉氏白鹿書院山長青叟之孫先生生于元季兵亂之際稍長而端重喜學時舉家竄匿巖谷中山長公愛之取瓦石書孝經論語授之手捧瓦石誦不輟口十餘歲益有志而家貧然松明以繼晝盛寒衣薄則擁衾危坐率過夜分乃寐金華朱恱道通濓洛性命之學而德行淳篤為星子知縣先生從之遊甚見許與傾底裏以授之朱官滿而遷裹糧往從卒業洪武乙丑縣令承聘為學訓導躬勤以率諸生而優柔化𨗳諸生翕然起而從之後多成名以去益廣學舍加于舊規丁內囏服闋改上海縣學訓𨗳尋丁外囏服闋升南陵縣學教諭無幾調安東縣學徴修永樂大典被旨試文章先生第一蓋將用之而以老疾辭大典成受賜賚復還安東其纂修居京師六年而安東之學者科舉不及數考滿循例降訓𨗳吏部侍郎師公審察一時教官學行無踰先生者遂奏授東阿東阿師公鄉邑也明年陜西布政司聘考鄉試又二年卒于東阿永樂壬寅八月二十五日也春秋六十有六娶髙氏子男二森磊女一浙江布政司參政熊本誠其壻也孫男二女一先生天資淳篤既傳其家學又得良師躬勤而弗懈于經史百氏皆究極旨歸尤用志理學而務實踐其事親孝親喪三年不飲酒食肉服除而哀不衰友愛諸弟與人交久而敬犯而不校其儀貌儼雅而溫厚坦然端靜有容望而知為有德者也恆語其學者曰昔文公先生謂我先人此心要日與義理相親吾未嘗斯須敢忘也泊于嗜欲布衣蔬食終身不渝惟好學之志自幼壯至老死如一日所著有鍾陵稿廬南集江海遺編在公志素行日紀其歸葬也祭酒胡公為之銘曰不愧郭有道者吾友余正安尤知先生間以所述事狀及其子森來拜請表于墓而刑部侍郎張公亦告士竒曰吾東阿黃訓導文行于今誠不多見宜必得子之文士竒與先生往還十餘年其始識之翰林是時天下老師碩儒皆以纂修召至而先生表然衆人之中前年從南京入朝行道所經數千里所得府州縣學其師道之可稱者先生一人焉耳恆竊自嘆師道立則善人多安得天下之為師者人人皆黃先生也則于表之誠宜而不復以辭贈奉直大夫禮部祠祭員外郎易君墓表易之先宜春人至宋禮部尚書祓徙潭州尚書孫遜卿為筠州録事又徙上髙録事孫興國司户仁則又徙萬載君之髙祖也曾祖理祖俊父谷珍母彭氏三子長泰亨次震亨君其季也諱復亨字子謙自幼明爽頴悟未齓已知趍學日記誦過人長而益勤博涉羣書喜為詩駸駸有造詣矣遭元季兵亂闔門竄匿深僻兄弟時出負米歸養倉猝道遇冦冦共目子謙儀貌而聆其論議知非常人衆強擁之去拜之曰吾儕迫于世難不得已圖自全而為此也願屈公為主謀䇿吾將惟公言是聽公毋為辱焉子謙力謝不能不聽既不可脫則曉之曰丈夫舉事當力用仁義救民水火庶幾可以得人心如不務此而一志厲民禍敗隨之矣非自善之道也衆皆唯唯遂為所脅由茶陵至安福子謙睹其所為無非剽敓雖有言百不一聽一夕脫身獨走從間道去國朝平定宇內其父已歿乃與二兄奉母歸鄉里而家業盡廢毁兄弟辛勤拮據治田廬漸復于舊伯兄舉茂才仲兄辟江西行省掾後皆坐纍謫死子謙獨留奉母而教育兄之遺孤男女七人皆成立為畢婚嫁家日益裕築别業邑東塢溪之上有園林之勝名其奉親之堂曰夀萱而躬勤孝養作書舍其側市書數千卷其中為教子之資而自號塢溪樵者蓋將終身焉洪武中有司舉子謙孝亷以親老固辭母春秋九十餘尚康健無恙忽得疾子謙晝夜侍湯藥不去側夜屢焚香籲天祈母安母卒哀毁而居喪秉禮子謙為人恭愼重厚能輟有餘賑不給凡于濟民利物事亦皆盡心邑歲舉鄉飲必賔禮之歿于永樂乙酉五月十三日享年六十有四葬徐山之原娶小圃龍氏益清之子性行慈淑族姻儀之後十有二年四月初十日卒享年如其夫祔葬夫墓之右子男三鑑鐔節女二長嫁辛軾次嫁陰陽訓術龍和孫男四女六節永樂乙未進士授行人升禮部祠祭員外郎宣德七年蒙恩贈其父奉直大夫禮部祠祭清吏司員外郎其母宜人于是節奉事狀求文表墓節自登第于余往還其為人溫溫淳實交久而敬不衰蓋觀節可知其父况其父之存諸心見諸言行彰著若此者乎是宜表也蕭坦行甫墓表靖江府右長史蕭用道坦行甫既得痺疾奏乞歸鄉里便醫藥忤旨降宣府鷂兒嶺巡檢至宣府疾日益明年七月十四日卒于官永樂壬辰歲也先在靖江時自度疾不可起預為墓志逮易簀之前二日取酒觴同官訣别又預作祭文自道其平生而寓夫全歸無遺憾之意其可為逹也矣既歸葬于鄉後草有三年其子烜來求表墓蕭楊世婚姻家士竒與坦行甫兄弟在鄉里相交好在京師同館舍今之知坦行甫者獨士竒深比五六年士竒兩扈從巡邉至宣府經鷂兒嶺下馬入巡檢司顧視其山川景物黯然蕭條莾蒼而追思坦行甫平昔志意未嘗不低佪感惻而繼之以涕淚也則表墓士竒何辭蕭氏出南齊西昌侯叔誄之裔世家西昌邑西栁溪之上其七世祖森宋衡山縣丞髙祖古山曾祖靜安祖方平皆通儒隱居終身父尚仁學者稱正固先生尊為經師嘗徴至京太祖髙皇帝與語重之特授潭府長史固辭除平涼府學訓導徙居邑北之栗園里元配楊氏士竒從姑也繼羅氏生坦行甫初諱遵字用道後以字行遂别字坦行云自少英特不凡負竒氣讀書日數千言治尚書而諸經子史皆博通下筆為文滔滔咸有根據一時同輩莫或過之正固先生沒其學者皆就坦行甫卒業後多舉進士去建文初詔郡縣舉懷才抱德者吉安知府朱仲智舉坦行送詣京師試文章翰林擢靖江府直史授承直郎時靖江悼僖王好學得坦行雅敬重之所言多見聽用召入翰林修類要太宗文皇帝靖內難之師已渡淮在廷公卿倉惶失措坦行甫與衡府紀善周是修上書論大計指斥用事者誤國書下廷臣及兩人議用事者怒盛氣以詬兩人兩人屹不為動左副都御史練安言國事至此尚不容言者乎顧所論吾過有即改無則加勉詬者愧而止文皇帝既嗣天位命翰林及王府儒臣考閲洪武實録坦行甫與焉事竟賜鈔時詔百司復舊制罷直史司為咨議所改坦行咨議無幾升咨議所為長史司遂升右長史授奉議大夫永樂元年從王之國桂林初至凡國中祭祀所需下有司備其後凡祭祀之需府寮屬皆勸王下有司備坦行曰初至倉猝不能自備可一行之不可以再且祀神在致吾誠使人代偹物非誠况未請于朝而擅使民非制乃止後坦行進表詣京師王府竟下有司偹祭物事聞長史以下皆得罪王始悔不用坦行言坦行數言于王宜務善納言以厚德奉法愛人以保福又啓陳八事曰愼起居寡嗜欲勤學問養德性簡鞭朴之刑無侵下人之利常接府僚以通羣情簡擇謹厚之人以備差遣又作端禮體仁遵義廣智四門針以進王問四門之名遺信何也對曰五常之信猶五行之土實有仁義禮智之德即信在其中王又問古今人多好名何也其意以譏坦行之屢有言對曰君子必不好名名與實譬諸影與形有形斯有影有實斯名隨之矣河間東平皆有實德故其令名在世與日月同一悠久惟殿下勉夫在已之實耳凡于進講之際必反覆敷暢其旨坦行負直氣侃侃能面折人過失未嘗稍屈已求合一語不合掉臂去不顧而嫉脂韋軟媚人耻與同列事親孝以祿不逮養在公遇盛宴饌未嘗醉飽于族姻有恩于朋友有信義性淡素一繡衣入朝則服公退布袍蔬食不改處士時為政逹于大體所著詩文數十卷藏于家春秋五十有五娶康氏繼彭氏子男六望朏旰烜晦昊烜宣德二年進士吏部文選主事女四其壻嚴頎龍粲楊鵷羅溶粲禮部祠祭主事孫男若干世之仕者巽愞不振久矣蓋士以氣為主而以理充之則無往不直考坦行甫躬之所蹈位之所施其正直剛毅之氣可為仁且勇哉可為仁且勇哉東里文集卷十五
