body:
  text: 東里文集卷七明楊士竒撰序送李永懷歸東平序永樂十九年冬士竒侍儲君自南京入朝道出彭城以北屬嵗飢民男女老弱纍纍道傍拾草實以食而滕與鄒尤甚儲君憫焉不忍民之及於此也遽命山東布政使暨郡縣長吏計口而賑貸之侍從之臣亦皆動念矜惻且竊憾其長吏不以豫聞也既度濟寧入東平之境視其民皆充然意氣和恱如無所不足者而老者數百人鬚髮如雪冠方巾褒衣而長裾濟濟焉夾道東西聚立候展祗謁之禮從臣見者皆驚喜駐馬就而問之此邦嵗庶幾有收乎曰然州其有賢守乎曰然輒舉手加額言曰皆上之賜也又問州守氏名及其鄉郡曰前守楊公今之守李公皆出廬陵而併舉其宜民之政聞者既皆為東平喜又喜其民之言達於禮也尚書夏公顧謂士竒曰廬陵固多賢此兩人者亦識之否乎士竒曰前守名瑒字季琛家吉水於士竒同宗蓋宋忠臣建康通判諡忠襄之後為州縣二十年率有善政今守名湘字永懷士竒同里人其父子兄弟慈孝友愛而力于生業未嘗以非義取皆鄉人所重者衆嘖嘖稱歎曰古之官人者必推本其行其有以夫抵暮余獨過訪永懷唯一童子守舍家具蕭然是夜宿州學其博士弟子亦皆娓娓道二守之賢時驛路所經東平屬邑其南汶上有史知州其北東阿有貝知縣皆以廉潔寬厚得其民心故盡東平之境不見有不遂之民者而自是所過郡邑所見其民則未嘗不歎東平之僅有也明年永懷以例代去其後朝廷遣使巡撫天下問民所疾苦東平之民羣訴於使者乞還李知州使者以聞命還之蓋東平自永懷去至是更三嵗歷兩知州矣民心之好惡豈有他哉撫之不當其道不愜其意則欲去之如古謝詢之為吳縣者蓋人情所同也如撫之當其道愜其意其去也欲留之而不能如鄧攸之為吳郡者亦人情所同也其賢不肖相去豈直倍蓰什伯哉永懷之賢亦攸之徒歟其所施諸東平者余及親見之故其復任也序以為贈亦以勵其終云沙溪劉氏重修族譜序澄江南望兩舍外崇山疊嶂綿延峻拔出沙溪稍衍迤平曠溪源逺而厚四時不竭故緣溪皆沃壤無旱潦之虞而耕稼常豐環溪而居非一姓劉氏其望也余總角嘗一造焉時百川先生尚無恙癯然蒼顔而華顛意氣軒豁一見與余論詩喜動眉睫是日微雪初霽釃酒炙魚偕余循溪上左右指顧諸峯盤迥起伏揖讓之勢巉巖突兀峭厲之竒語余曰吾劉氏居此十有五世矣吾先人雖未有躋膴仕而行義之卓出與兹山相雄者代有之矣又顧溪上田千餘畝曰皆吾故所有也自歷變故來吾鄉之巧而力者悉取之今吾幸且老死于此無憾矣已而與余酣吟倡和談噱不輟余曰先生所謂超然物表者非耶笑而不答暮歸過視其故居雖斷垣壞礎黯乎荒榛瓦礫之墟尤可以想見昔時之盛夜宿其舍家具蕭然牀前酒一甕案上斷簡數編及鄉先生陳海桑王竹亭劉槎翁寄書數緘而已明旦其族父明道翁肅余登靜安堂觴余翁貌老而容溫禮恭而意厚傾寫樂客也余留詩堂中而去既去而質百川于海桑先生先生曰汝不及其少壯雋爽時矣間一二事舉之未嘗不使人動心也蓋於今四十餘年矣明道從孫郁武於余有連袂之好前十數年嘗以族譜求序未暇也今百川從弟伯塤仕為刑部員外郎在京師求序譜益數按譜自九承事唐季繇金陵徙西昌始家沙溪八世至稽道生四子七孫其後始盛又五世至明道六世至百川族益盛譜載總十有八世其間雖有仕者而逮今伯塤在秋官十餘年能聲焯著所至未可量也此可以徴劉氏先德矣而獨百川之後今不祀此其可徴善仁者之應乎抑亦果係其數乎明道嘗續譜此譜又郁武伯塤所重續者余素景仰百川故于序不能無慨焉者也蔣氏族譜序太醫院判儀真蔣君用文作蔣氏族譜既自序之又以求余序按蔣出姬姓周公第三子伯齡封於蔣蓋今汝寧之光州子孫以國為氏漢末琬事昭烈至尚書令琬之後曰啓者仕隋為萊州司户因家于萊司户五世孫欽緒仕唐歷汴魏二州刺史又家魏州其仲子清為東京留守判官死安祿山之亂贈禮部侍郎賜諡忠八世至惟雅宋仁宗朝舉進士纍官房州通判又四世至守訓而宋南渡遂晦迹不出其孫逺仕金為尚書兵部郎中逺之孫安中舉卓行入官楊雲翼薦其材再遷國子助教上書諌用兵不聽棄官去後從太學諸生請復其位卒稱疾不起其孫應茂元初避兵淮南遂家儀真儀真蔣氏昉於此應茂子用雷為揚州醫學教授教授子宫舉進士官崇明州判國朝洪武初部使者吳琳以史材薦授翰林修撰引疾辭不許改蘭陽縣丞用文之考也而譜斷自守訓至用文之子凡十有一世吾於是有以觀其世德焉自漢至唐又至於金於立朝蒞官秉政守義焯焯有聞矣及叔季之世或仕或處未嘗不以愛民澤物為心也蓋其先皆業儒自助教以下兼治醫而世相襲蓋以謂不得施諸此則施諸彼何其用心之厚也仁人君子之心欲推古聖人之教以為及人之功上焉者儒次焉者醫得乎命而達也用儒之道於國家天下而功之及人博也命不可必得不得而用之醫其及人之功亦孰之能禦哉然安得世皆仁人君子之心也彯纓垂組髙爵而重祿號養民為職而于民休戚漠然如秦人視越人之肥瘠者彼其心何其厚薄之懸絶也蓋譬諸泉焉源厚者流必逺蔣氏之先其相承厚矣今用文以儒承家以醫歷官以仁存心其所施加厚也然則蔣氏之後其自今何可量乎王氏家乘序元史傳良吏十有八人先待制其一也之十八人者余少嘗反覆熟其治行信皆足以匹休前聞貽範來代而王宣慰止善史稱其務明理以致用者蓋已心識其良吏之明規後讀先公同年友黃文獻作宣慰墓文亦重明理致用之説而他德善尤詳以是益慕宣慰之為人永樂壬辰考會試禮部得宣慰曾孫鈺之文次在第二以奏上臨軒策試親擢鈺第一甲三人鈺字孟堅既授官同在翰林十有餘年其學識操行皆儒者愈久而愈可親蓋又敬歎宣慰之有後也間得見其所作王氏家乘首譜牒其次當時名公所作碑記哀祭之文及往復贈寄之詩而其先世所著文章終焉蓋歷世變故能掇拾一二於千百亦難矣譜斷自某至某若干世著其所知而闕其所不可知其所書皆慎而不茍凡出於當時名公所作者皆足昭逺信後而其先世之作亦皆有以追配古人可寶也已蓋王氏宦達莫盛于宣慰宣慰之先後有為太學師為郡幕為縣佐亦有隱處不仕者其文學行義皆可考見譬諸藍田之産為瑚璉為圭璧珩璜雖用之不同與夫璞之未用者莫非溫潤縝密之可貴也王氏文獻足徴於是乎在嗚呼人生富貴如煙雲之過目飛鳥之遺音豈可恃以不泯君子所恃者道德功業文章世蓋不能以泯之故有一國之書有一家之書皆所以不泯之器也而家之所書與國異者獨備夫言行之善蓋尊所自出且示法其後俾圖不辱仁人孝子之用心也詩曰維桑與梓必恭敬止矧言行之善之所存乎孟堅間求余序家乘故書以告其後之人北征集序北征集者今太子少保禮部尚書兼武英殿大學士臨江金公之作也公侍太宗皇帝凡四出師征幕北此蓋永樂八年第一出師也是嵗布尼雅錫哩拒逆朝命拘殺詔使侵犯邊境邊民苦之故不得已有弔伐之師蓋虞之征有苗商宗之伐鬼方文王之伐崇密皆仁義之舉也士竒雖不獲侍從今奉詔修兩朝實録獲睹永樂從臣記當時車駕所至聖謨神武如神明之不測如雷霆之下震而宥過綏降如天地之兼容威德之盛蓋前代帝王所未有也公以清材博學介胄櫜鞬從屬車司命令而間暇形諸詠歌長篇短章渢渢乎鋪寫鴻猷宣揚偉績凡山川氣候之殊道途涉歷之逺所以充拓見聞發舒志意者靡不備之士遭遇之盛如公求諸往古無幾人焉漢班孟堅負良史才嘗從車騎將軍出金微擊北邊典文章猶至今傳諸史册豈若公親侍龍御於數萬里之外哉唐太宗征髙麗文學之臣多從亦有歌詠之富如聖明之朝乎有無未可知而公所遭遇固其文學克當上心有以致之歟士竒與公皆太宗皇帝臨御之初簡置翰林典密命永樂己丑車駕巡幸北京士竒受命輔仁宗皇帝監國始與公分職嗚呼鼎湖龍駕逺矣誦金公從征之什追惟先朝大德而效報無能其感愴於中有能自己乎遂書以為北征集序送黃敷仲之官浙江序三山黃敷仲拜浙江左布政使之命將行其同鄉之友宗人府經歷張珂屬贈以言敷仲學博而才廣德立而譽彰余奚言雖然有斯文之好焉能無言乎浙水東西十一郡六十五邑其民生之秀慧物産之精好為十四布政司之最然大抵浙東西其俗異也浙東趍文雅浙西騖浮華文雅有務尚之意浮華流於薄矣其薄之習亦沉溺膠固非一朝之謂也周公親監殷民於下都至君陳繼之其䇿命猶以未變故習為言蓋習俗溺人之深譬諸痼疾療之者非砭焫藥餌攻補並施有積纍之功豈遽能愈也我國家道德涵養六十餘年皇上承列聖之大統丕顯治教而敷仲任方嶽於此則正人心厚風俗於理道豈細故哉承流宣化雖守令于民最親而所以表守令者方嶽也召伯嘗布文王之化於南國其民愈久而思慕歌詠之不忘甘棠之詩是已敷仲往以古人之心奉宣聖明之德化先近以及逺使兩浙之民勃勃焉皆興起禮義操存醇厚優遊泰和之世將異時無思慕歌詠不忘吾敷仲者乎敷仲歷河南湖廣兩布政司參政持躬愛民有素矣吾故獨舉人心風俗以為之官之贈敷仲其不視為迂闊否乎浙之藩憲兩司多吾同朝之舊其亦有槩於斯言否乎因敷仲行併以致訊送郭庭瓉詩序君子之仕也皆欲施其愛民之心然職有所拘分有所限勢有所格雖都髙爵享厚祿或不能越而自專受百里之地為之令與民相親比如父子民有所弗平得躬造膝前開口自陳令推其情酌於理不必悉在法制從容片語是非豫奪自已出民皆賴焉故令雖七品官得施其愛民之心髙爵厚祿者或不能及而令得民之深者有生而父母之沒而蒸嘗之久且不忘也余仕京師將三十年職在言語文字之間無所及於人而遇能及人為人所慕者未嘗不歆羡而內自慚然亦鮮矣番禺郭瑛庭瓉初識之於進士中觀其儀知其有立後相往還聆其論議知其有為及其知金華嵗餘縣之縉紳大夫皆譽之田里細民皆樂之寖有聞于京師要其所存者以愛民為本今滿三嵗上其績於郡於藩憲於天官卿皆書其考最浙水東西六十五縣令吾聞諸往來求如庭瓉蓋無幾人賢哉乎庭瓉安得今四方皆若人者之為令也庭瓉將復任金華太子少傅楊公及學士祭酒諸名人相與分題賦詩送之光祿李少卿灝禮部陳郎中景茂求余為序余雖未有及人而喜談及人之善故為之言尚俟九載之績焉送少保黃公歸永嘉詩序少保户部尚書兼武英殿大學士永嘉黃公以病蒙恩賜歸于鄉同官卿大夫相與賦詩贈之而謂余序始公以病在告上命醫往治歷五閲月弗瘳於是作其去歸之志其交遊有歎其際亨會而遽違榮私為公惜者亦有髙其當盛滿而戒止足以為公喜者士竒曰皆非也夫役志于貴富賤丈夫之事固不足以知公脫屣乎世纍獨善者所為亦非所以喻公公起自諸生不三十年致位三孤階一品在崇重清切之地名聞海內方將勉副重寄慰人望乃引恬山林以自髙豈大臣君子之事哉公聞之曰子之勵余是已而豈余之所得已哉聖天子聰明睿智英文神武過古帝王矣股肱羣臣方濟濟都俞相得於泰和熙洽之朝淮雖非才何幸參陪千載之遇顧獨寡祐而纒綿疾病嵗月之久尚可久孤榮祿而不知退哉遂入疏白其情上憫而從之且命疾已復來公明日入謝賜鈔萬緡勑兵部給驛舟又明日陛辭加賜萬緡夫不強其難不舍于舊陛下仁與義兼盡矣於是在庭文武之臣皆喜以為儒者之榮而士竒獨不能無感焉者太宗皇帝初臨御擢文學之臣七人侍從左右任遇甚厚公及士竒皆與焉仁宗皇帝嗣位七人者五人在無幾太子賔客豫章胡公引疾去其四人任遇益厚皇上嗣位一循祖宗之舊以任遇四人公今又引疾去四人士竒犬馬齒最先又最病既不能分寸裨益當時徒塵縉紳之間觀公之去其能無愧乎公今年始六十上有九十之親既歸無所纍其心而日奉天倫之樂神怡氣平將復於康和必然之理也然則上之寵命公能終忘之也哉贈行詩九篇詞不一旨其同於余者三之一云贈陕西二憲詩序皇上以至仁君天下蓋欲天下之人咸得所欲或聞一州一邑有水旱疾疫為民厲者汲汲焉圗拯恤安利之道而飭勵其長吏俾悉心焉去嵗以關陕飢特命文武大臣往撫綏之而下令已逋責罷徭役又出內帑馳往賑之天地之德也夫上之所以得悉夫下之情者有邑有郡有方嶽為之聞也三者或不能有憲臺舉以聞也憲臺如猶或顧憚遲迥將下之情卒不得聞乎三山林懋𢎞比長浙憲一志厚民有中以危語者衆駭愕謂且不測既逮至上親詰之天鑒孔昭片辭未竟遽釋還職且諭之曰繼今第盡意言民隱勿有疑畏不言且抵罪日月之明也則今之為臣者當務仰體聖意如恐不及豈得復有顧憚遲迥之意哉陕西憲副鄺野憲僉王恪俱考績來京間以故舊過余道及陕民皆惻惻欲有言既受命復任不及言以去兩人皆起家進士為御史有立志有廉稱蓋士君子所期望而細民所可以為恃者於是翰林侍讀李時勉錢習禮合諸能賦者為詩贈其行而屬余序余不自揆敬述上德以道之二君其務有以自振哉陕之藩憲聞斯言亦皆有以自振哉西澗集序吾友熊敬方先生其為人濶達和厚而志於及物為行孝友忠信而勇於行義為學博通諸經尤長於春秋而諸史百家皆通貫為文章魁偉辨博如行雲流水而根於理始居鄉校其旁郡邑數百里有志於學者負篋從之其名聲已聞京師及入太學太學諸生皆趍其下風時司業吳先生溥主監事嚴肅方正寡所推許獨禮重敬方稱先生敬方嘗中應天府鄉試為春秋之冠會試禮部雖不中從敬方學者試輒髙中其子槩已登第為監察御史敬方猶列名太學生仁宗皇帝在春宫聞之嘉歎由是日奬任槩而敬方文名益重於時然卒未霑一命以行其道人皆為敬方惜而槩歷事三朝屢拜顯官今為都察院右都御史其見諸愛民之實方焯焯未已槩之道即其父之道也朝廷推恩大臣褒其所自贈敬方以其子之官人又以為敬方榮嗟乎昔何蕃居太學太學諸生推頌之不敢與齒上至祭酒司業皆推之然終不及於祿敬方其今之何蕃歟蘇明允父子一時皆有文名而明允老成巋然時號老蘇其官位竟不顯暨子貴乃進身後之命敬方亦今之明允乎蕃因韓退之明允因歐陽永叔皆遂不泯念余言不足致敬方之不泯也然今之知敬方深者莫如余故為序其所著西澗集使世之覽者知其人之大略云梅花圖詩序禮部尚書泗州金公舊得梅花圖一卷甚愛之既屬大夫士能賦者為之題詠又以屬余序將於公暇覽適焉夫梅植物之至清者也恆産於山溪林谷之間而逸人韻士栖迹乎荒寒曠漠之濵者資以適其幽獨間靜之趣也今公為國大臣職務之重且殷夙夜孶孶圖惟之不暇而暇適其意於此乎然古之名賢君子居髙位任重寄者雖曰單智畢慮于天下國家之務而其心未嘗不存夫幽間淡泊之適蓋不以其身之貴富而或移也矧夫物之出於氷霜沍寒萬卉摧敗之後皎然孤芳一塵之不滓殆比德於貞潔獨行之士拔出乎流俗者此其契於君子之心宜乎玩適不能已焉而余意公之所為愛之者又未必止此天地之生物始於春而物承春之氣以生者莫先於斯植蓋造化發育肇見於斯也故知道君子恆於此以究觀夫天地之仁而况公為春官大宗伯上贊聖明以對時育物者乎體仁長人此公之心而大夫士亦以此望於公也遂書以為序溧陽史氏族譜序溧陽史仲和甫嘗命其子常續史氏族譜又命常以求余序史世傳周太史佚之後以官為氏然鄭漁仲通志略云周又有史興晉有史蘇史黯史趙楚有史禆衛有史鰌皆以史為氏又有太史氏內史氏左右史氏亦皆主於史蓋非獨佚也溧陽之後其必有所據乎溧陽出漢史恭其始繇魯之濟北徙京兆杜陵恭三子髙曾玄皆以外戚為侯髙之子丹纍封武陽侯玄之子任任子習習子崇皆襲平臺侯崇建武中纍遷右將軍青冀二州刺史以軍功封溧陽侯遂即所封以居此溧陽史氏之始也嗟乎史氏之功德逺矣漢之時恭及其母貞君保育宣帝於危微之際卒以安漢至丹秉誠輔國慷慨激烈於伏蒲涕泣之言其扶顛濟傾偉然仁義之功而豈尋常外戚之賢之倫哉夫盛德必百世祀其自居溧陽以來千四百年子孫曰盛若賢而貴忠存于國家德被於生民代未嘗無人溧陽之人亦至於今廟祀崇祠宇巋然而環祠之傍皆史氏此豈偶然者哉其族故有譜及慶傳録今譜因而續之前為譜圖以著代序後為譜録以詳仕宦葬娶據其所知而闕其所不可知可謂敬慎不茍者也推仲和甫尊祖敬宗之心如此固史氏賢子孫而常舉進士為行人九年升建寧知府方顯用於時是又將亢其宗者歟史氏之澤其未艾哉其未艾哉送蕭省身詩序河南布政使吾友蕭省身以事留京師數月將歸素所交遊者重别離之意相與擬古樂府為歌詩贈之而余尤重省身之别者也夫古之君子其量與其學俱進也故所存靜而虛所持端而恭所發公而恕靜則有養虛則無我端則由乎道恭則蹈夫禮公無間於人已恕克盡於物情而渾厚閎博之度雍容謙遜之風望之而不可測效之而不能及孰不歆慕而願親之哉孔門惟顔子有之其友曽子稱之曰有若無實若虛犯而不校曽子動求諸已此豈徒慕恱稱道之而已哉後世如黃叔度庶幾乎顔者也當時所與逰者稱其汪汪如千頃陂又曰數日不見黃生鄙吝之心復萌非嘗得於薰炙之益而能為此言哉省身識明才裕懷端潔之操恂恂溫溫渾涵有容人莫得窺其際蓋庶幾今之叔度也與余交二十餘年如一日貴賤夷險不見其有毫髮異致吾與之處常因之而自省則其於别也豈能已於情乎士非量無以任重而致逺夫受百川之輸者江海也故自古名臣皆負偉量𢎞度然後有以光大功業而峙譽望而非淺中易動者所能與也吾於省身又有以豫卜之矣遂書以為贈行詩序贈蔣主孝序太醫院判儀真蔣公儒者也博學而有文清修而雅尚於余往還二十年數過其靜學齋未嘗不置酒樂客客與公東西坐則其四子以序立侍色甚溫儀甚恭也客喜求其所以名曰主善主敬主孝主忠蓋有以知公所以愛其子者有道也前三年之冬余與公同侍儲君自南京入朝公春秋已七十率中夜以起擁裘上馬衝北風馳騁氷雪之途時主敬侍行每下馬即次主敬必先至展位布席列酒殽紅爐之上公必挽其同行者與俱主敬左手持盤右手捧觴而跪進之而下至於傔從無不屬厭者蓋不使公有幾微道路辛苦之意及至北京居一室廣不踰尋而靚幽明爽纎塵不侵書册琴瑟圖畫尊爼公無曰不與賔客樂而所以致其樂者主敬也踰年而主孝至凡所以致養親之樂一如其兄而見諸動作詞氣之表尤使人愛而親之公之子何若是之皆良哉然學者之于道無窮也學之愈力則其行愈進事親行之所先也由此而推之其事衆其道逺為公之子其可以遂己乎博而求諸聖賢之方册以充吾之知達吾之材可也矧蔣氏之先德深矣而公繼之亦宜後之復有繼也主孝今以父命還南京父之執胡敏德屬余贈以言余亦其父執也故推其所本者而逺大望之劉氏倡和詩序吾友劉仲良甫其子咸為河南按察僉事屬授衣之月思父母在故鄉不得躬視寒燠而市綿以寄仲良甫得之喜作七言近體詩一章示咸其寫情體物和平微婉蓋有得於詩人止乎禮義之意太子少保金公及翰林諸學士倚而和者數人咸稡以示余求序嗚呼流俗之為父兄者其子弟幸霑一命方憑藉聲勢騁其貪得之心無厭足也而豈暇計有禮義仲良甫卓然不滓於流俗非知道而能然哉昔歐陽文忠公從子通理官廣西欲買朱砂奉公公以書報云吾不闕此物汝于官下宜守廉何得買官下物蘇文忠公見書歎曰人惟考諸其私乃見真偽此歐陽公家書也仲良甫此詩非私示其子者乎世率謂古今人相逺豈名言也哉而諸公和者之意亦豈異蘇公之歎哉惟咸勉圖所以稱賢父之志推類而廣之可也贈太醫院判蔣用文序永樂二十年春駙馬都尉廣平侯袁公得疾日劇禮致太醫院判蔣用文治之數月以瘳公德之既厚其報又以為非文無以達意也遂屬筆於士竒蓋嘗觀於世之髙爵重祿者其有資于人不權事之輕重率自大而指使之而士之懷負藝能者於人之求之也不度事之緩急恆自重而固閟之以是不相下而不相濟二者蓋均失之矣如求之者忘其勢而將之以禮應人之求者樂其誠而志於行道則必相得而克相成也公之為人溫溫謙恭以禮下士凡於德必報而有始終之義蓋未嘗一毫挾貴富自大也此有以見盛時公卿之厚德矣用文其業精於理其志急於濟物不以貴富賤貧而或異不以艱難倉卒而茍怠惟其施之效而人德之與否不計也又有以見仁人君子之所存矣則其所以相得而克相成者夫豈偶然之故哉然公為國大臣獲致安其身上以為國家重下以係衆人所瞻者此其功豈可以尋常槩論哉則公之所報用文之所受皆當夫義余安得不為喜談而樂道之也東里文集卷七
