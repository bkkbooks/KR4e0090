body:
  text: 東里續集巻五十九明楊士竒撰詩七言律靜安亭詩沙溪劉伯川先生席上作時年十二處士年將六十齊作亭偏愛屋之西連床圖史孫勤讀四壁碁琴客倦嬉鵞鼻峯髙松鶴唳雞潭波靜水禽啼向來翠竹江村路弄月吟風醉不知和伯陽池上梅花揚州宅裏舊㸔花南楚頻年不到家歳暮豈愁千里隔雪殘還對數枝斜閒臨渌沼宜相映畧洗幽篁不謾遮綵筆清詩自堪賞銀缾香酒詎須賖奉和陸伴讀元日雪中早朝韻髙閣餘鍾己罷喧繞廊明燭洞無昏墀中戒曉初排仗殿上迎春正啟門雲氣宻含香縹緲天花低舞雪翩翻當時授簡推能賦未數相如在兎園和蕭伴讀秋夜有懷雷道夫時雷從朝京北極迢遥直帝京故人離闊渺脩程望隨流月秋俱滿思觸凉颸夜轉生一𣲖笳簫川上合九重宫殿日邉明從知謝眺懷西府對景題詩並有情次韻吳孟勤先生中秋有懷府中諸公并自和之作桂花香滿鵠山頭山下開軒稱及秋月色紛當清斚落凉風輕拂畫簷流㣲㣲玉漏明河上隱隱金門湛露浮爲憶鄒枚裁雅曲連篇能倡復能酬雷道夫隨侍朝京還見示途中諸詩輙用奉柬帝子趨朝歸上國儒臣隨侍厯脩程渌波不動聽鼉鼓白鴈紛回避羽旌邐迤關河千嶂出參差宫闕五雲明非因此去游觀樂誰識當時賦頌聲舟泊匡廬次韻荅胡生泊舟遥望匡廬寺惟聽㣲鐘響曙撞日射紫烟霏灔灔風飄髙瀑洒淙淙常因來往懷香閣未得登臨躡石矼時遇鄉園文翰侣又椉湖艇下雙雙寄題貽厥堂二首南平郭裏東西住曾見名家六世來前輩風流皆壽俊後人文采發英才春深欄檻雲生竹歲晚階除雪映梅貽厥堂中最瀟洒四時清景隔浮埃堂前蘭桂豔春榮堂上衣冠老更清自倚詩書傳世業每持義利振鄉評故家宦譜行當續前代文章疊有聲同學少年俱白首㡬時相聚慰平生送鍾啓晦南雄訓導試藝晨趨祕閤前看君文采冠諸賢葩經早得尚書學藻泮重登愽士筵五月承恩辭北闕一程衝暑向南天過家想見寧親處喜說梅關近贑壖送康孔高雲南南望不須憂千里零陵赴舊游復職親承當宁命過鄉先慰倚門愁數家漁舍連江郭盡日山光滿郡樓愽士到家多雅趣弦歌聲裏度春秋送李思益沐陽教諭長樂踈鐘應曉晴千門楊柳動春鶯重來拜命瞻龍闕又促携書出鳳城驛路看山經㡬處縣庠端笏見諸生十年一㑹還分手未盡鄉園間濶情送永嘉秀才赴福寧教諭愽士承恩出九重小車晨發鳳臺東遥知海道連鄉郡喜說山城有學宫雨過千家榕葉緑秋清滿縣木犀紅何幸明經逢聖代須看揚鐸振儒風送王所存㑹昌訓導一棹之官路已賖連天新漲更無涯遥看贑嶺知何處蹔過文江喜是家縣郭晴飛青嶂雨講堂秋對白鷗沙到家應際重陽節清洒華筵粲菊花送董海州述職三回謁帝京喜縁葭玉見深情退朝屢枉髙軒過儤直常孤倒屣迎淮浦落潮隨去棹海天凉露拂歸旌傷心一掬鴒原泪洒翰煩君寄楚城挽李處士不受遺金世共知至今鄉里繫遐思賢郎已擢科名貴太史新題孝友碑碧水園林違翫賞青松丘壟閟容儀朝來晚翠堂前過惟有家人哭素帷和胡祭酒對雪韻清旦同雲閟彩霞帝城又見雪飛花青林綴玉真看畫銀沼分氷好試茶欲放剡舟乗逸興競傳郢曲到西家豐年有兆占三白總覺新來喜氣嘉挽李孔目詞苑清華近禁闈幕賔如子眼中稀庭無私謁惟看竹官有閒時盡掩扉每喜楓宸同曉覲忽驚薤露已朝晞凄凉南浦來時路秋雨銘旌逐鴈歸挽蘇檢討伯厚輀車晨發大江東歸塟閩山馬鬛封千載交游悲墜露百年心跡逐飄風空餘海内詩名在無復朝端禁直同藉是詞林知己舊銘文光映九原中送劉廸哲吉水訓導鄉郡知名逾十載初承薦剡謁彤闈李邕識面仍難遇劉向傳經喜得歸臘雪渾飄征袂濕江鴻遥逐去㠶飛青春想見沾時雨桃李花開映講帷送陳公餘赴髙安訓導兼柬本之兩家姻好託斯文楊氏賢甥復有孫經學已能傅世業儒官何幸拜君恩從知備養依㣲禄且喜移家近故園還共郡庠梁愽士朝朝來徃事清論送許子謨愽士歸北京邂逅京華歲欲䦨尊前論舊雜悲歡十年離别空相憶萬里驅馳只獨難已喜驊騮歸御廐逺隨鴛鷺拜金鑾明朝又過長淮去玉雪紛紛撲馬鞍挽括蒼樊處士二首早辭薦剡樂山居荷芰紉衣草結廬歡奉慈顔登壽考恩沾同氣到遺孤秋雲繞屋常看竹夜月臨軒或據梧惆悵佳城今鬱鬱只應來徃奠生芻黄金散盡爲憐貧芳譽流傳滿縉紳倒槖屢分行路客買舟遥送望鄉人少㣲雲際冥冥色棠棣原頭寂寂春世澤不忘天道直銀臺今睹鳳毛新送周茂才盛世科名推小宋故家孝弟重元方一春聽雨同覊舘千里看雲憶舊鄉淮水路邉芳草合桑園徑裏落花香到門五彩承歡處遥想從容話玉堂送晁司直景範致仕歸濟寧春坊輔導集羣英清德多聞最老成天上歸來投散逸道傍祖送歎光榮聖朝雨露涵濡厚晚節功名去住輕共羨行年今伏勝遺經還待教諸生題菊贈鵷姪有序舊得閩人蘇季雅寫菊鵷姪走二千里來京師省余病其歸也以此贈之且書述懷一詩于上并示弼艮云耳南望家山無盡情衰年一病死兼生春風逺道憐賢姪夜雨他鄉夢老兄千載詩書存世業㡬家忠信重鄉評從來明逹安時命珍重諸郎在矯輕送尹自道新安二守辭朝日積雨初收暑頓輕秋盡平蕪凉露滿月明長浦夕潮生片㠶浩蕩催行色斗酒殷勤寄别情還有梅花可持贈歲寒氷雪照同清送胡孔時省親豐縣遥瞻淮岫隔親闈初下鍾陵過帝畿豈憚驅馳前路逺不禁消息近時稀渡江飛絮迎行棹到縣鮮桃艶舞衣慈父喜來慈母望肯縁聞禮乆忘歸袁中書陞尚寳少卿其父同日受誥命桂脩譔索詩早從潜邸識龍顔白日青雲翥翠鸞乆典絲綸唐近職又陞符璽漢郎官全家父子光榮重千載君臣際遇難帝德如天深化育報恩須倚寸心丹題梅寄劉仲兼老姪故家遺澤根株盛素蕋含香吐正齊雪後曾尋珠浦側春來先映白橋西十年去邑心相念千里披圖手自題珍重歲寒貞操在水南清鶴待重携次韻荅耐軒學士病中見寄龍河初暖動春波乆病文園近若何知有官曹頻問訊自慚隣舍少經過茶香永夜分能數詩句新年寫漸多雪繭烏絲煩屢寄閒燒紅燭和清哦得第二子四月五日得家書報二月十四夜生第二子翼日昭告祖考以後仲殷素蟾未滿一分圓正照垂弧竹下門因報添丁徴近夢翻悲生我重慈恩箕裘倘解傳弓冶水木端期繼本源百世奉甞今日始敢伸䖍告薦蘋蘩二月十四夜余宿試院夢侍辰齋府君既覺已三鼓葢此兒初生之時也遂取夢中語名之曰科云樊通政守一齋有序樊通政守一以其字扁齋居屬予賦詩夫一之義若老𣆀莊周管仲韓非之言或虛而無實或雜而非正惟出於大舜伊尹孔子之訓者吾輩之所當務輙賦五十六字於齋扁之下云衆萬之源純不雜還因表字掲齋名已知要道無岐路所貴專心事篤行大學工夫由主敬古人勲業自存誠始終表裏恒無失此是齋中座右銘送熊昱御史豐城熊昱元天慵先生曾孫太古先生之孫舉進士爲監察御史持身守官篤實不衒今滿三年其尊府先生春秋九十餘矣即謁告歸省余重名賢有後賦詩贈之且慶其尊府先生之壽云故家文獻驅前代金榜科名起聖朝憲府飛霜持白簡繡衣炫日近丹霄歸程萬里秋隨鴈挂席三山曉帶潮春酒還家酌茰菊髙堂眉壽等松喬次韻袁止安太常南歸留别文雅人推賀監賢承宣數近九重天優閒有幸沾榮命寵禄無心及暮年自斸紫芝充服食閒騎白鹿傍雲泉挂冠神武誰無意遲我洪厓玉笥邉送兖州郡學教授兖府諸生乆待師廣文新去擁皋比閟宫舊有周公祀泮水今傳魯國詩清泗流源千古在尼丘佳氣五雲㣲講餘時出城東郭瞻仰從知重所思送尹御史乆住南京共接隣北京爲别已經春每懷鄉邑踈歡聚又向都門送故人萬里雲霄鵰翮徤九苞文采鳯毛新一身上有君親望珍重芳名在縉紳挽彭處士溪園脩竹映桃花負郭幽居逸趣賖自惜世家存禮樂時過隣曲看桑麻堂餘素簡人何在墓繞青山世共嗟因讀銘文思徃事感懷况是舊通家送陳素行去年相别蕭藤縣此日重看愽士行桂嶺迢遥懷二儁榕隂瀟洒對諸生雨肥丹荔漿堪挹霜下黄茆瘴已清知有少游文字在倘摹遺刻寄都城黄友文教授解官歸建寧京華十載託隣居朝夕相從意不踈屢接賔筵同唱咏静聞師舘授詩書青雲倦翮能辭寵白首閒情樂遂初一片烟霞人境外幅巾蕭散有誰如追送江仲隆紀善兼寄羅思程愽士二首來朝京國遂懸車老去王門罷曵裾白髪蒼顔歸舊里青山紅樹託幽居閒穿竹逕行携鶴更傍荷塘坐看魚道在未應全㪚逸諸生湏授伏生書京華相憶㡬經春頗恨重來不問人行舘空尋深巷曲歸舟先發大河濵到家閭里争迎勞避俗林泉近隱淪想共湖西羅慱士小車來徃似荀陳送陳文璧赴石首知縣金榜青春有令名玉堂髙歩接羣英愛民自倚平生志作縣新承寵命榮薊北霜清寒木落岳陽烟浄晚山横六年相聚還相别不盡秋風送客情送陳彛訓赴湖廣參議洪武中吳文鄭賜同爲參議至今民思之三十年前過鄂城藩垣吳鄭最知名人懷遺愛至今日子繼賢聲在此行夢渚茫茫連漢沔岳陽渺𣺌望荆衡九重夙夜思民瘼應展忠勤荅聖明㑹稽章友讓半村居半山亭子江南畔又說幽居擅半村十里松隂隔城郭㡬家茅屋接田園朝聞鴻鴈琴中落秋對芙蓉鏡裏繁投老他年定相覔欲尋禹穴訪雲門送劉公潜鬱林知州萬里邉南望鬱林故人五馬去駸駸傳家自昔春秋學用世平生氷檗心岐路寒風驚歲晏衰年短鬢各霜侵朝來相送都門外矯首雲鴻思不禁挽周孟簡長史翰苑飛騰二十春同鄉同署更情親燈前對酒觥籌數竹裏聨詩興韻新梁苑延枚心不展湘江吊屈歎何頻俄聞瘞玉桑園上老泪潸潸爲故人送袁尚寳把酒臨分慘不驕嗟君此别漸難招交㳺託好踰三紀近侍聨班及四朝賜服曉霑天闕露歸㠶秋帶浙江潮白雲滄海東鄞道矯首㝠鴻悵望遥送劉丕武紀善致事白首王門懶曵裾青山歸去愛吾廬天恩已賜雙龍勑家計猶存萬巻書林下棲遲芝可茹泉頭來徃鹿隨車蹇予苦被浮名繫矯首看君愧未如寄袁止安十年不見袁髙士知在雲山若箇邉已識道心塵外净少將仙篆世間傳秋清白鶴下珠樹春暖華芝長玉田早晚歸來訪真舘晴牕共閱紫霞編送本之赴魯府紀善泗水尼山天下名衣冠何幸此中行雲浮海岱蒼茫合樹接靑徐縹緲清聖主惇親過文帝賢王爲善繼東平碧堂賜醴多恩遇全勝長沙著賈生寄胡祭酒二首豫章先生厭軒冕歸來物外託閒身青山江上迢迢郭碧樹泉頭淡淡春歲暮丹砂和玉屑日長羽扇映綸巾城中冠葢多如雨解識堯夫有㡬人𣺌𣺌南州屬望勞玉堂金馬舊同袍篇章富擬杜工部才思清於何水曹京國㡬年嗟間濶江村何日共遊遨古來同舍多秦越最憶先生獨處髙存仁堂肘後名方直百金越人帶下業精深功多爲有江湖跡世逺皆存天地心橘葉香浮蘇氏井杏花春藹董家林鳳樓東畔新堂構大扁光華衆所欽題竹送顧都御史還太康二首腰佩犀鞶首廌冠肅將風采振臺端心如明月涵秋水操比清氷凛夏寒鳳勑五文盤玉璽龍光千載出金鑾從來嵩洛多耆壽坐繞琅玕共歲寒潞渚初晴漲未消衣冠祖餞出河橋登名科第踰三紀奉職京華已四朝肯以暮齡孤寵禄永懷幽興在漁樵豈知衰疾淹留者悵望冥鴻不可招送陳正倫太守考績復任乆别南陽陳太守十年猶是舊青袍路人共說循良政荒歲深知撫字勞白髪交㳺吾最老青雲勲業子能髙明時有志應湏奮九萬扶揺看羽毛題熊尚初經厯茂恩堂五花金誥出金門白髪庭闈拜帝恩當宁褒詞明日月全家慶澤戴乾坤椿陰諼彩晴逾好桂馥蘭馨暖更繁烏府幕中何以報只應忠孝道彌敦寄王格非玉堂分手七年餘蕭散林泉樂遂初鄉里共高王烈行家庭常授伏生書穿雲採藥常携鹿傍水持竿亦釣魚南北相望六千里一緘聊用慰離居送清河尹家住澄江北渚濵清朝兄弟起彬彬同時作宰輝雙璧異縣能官見㡬人采采黄花滋夕露蕭蕭白鴈度秋旻相逢未乆還相别珍重聲華在縉紳送吕大理致仕兼寄王孟堅得謝青雲向白雲緋袍象簡拜天恩從來榮宦心如水况是名家學有源日對沃州兼禹宂時尋蘭渚及雲門徃還知共王脩譔几杖從容足細論潘賜主事陞鴻臚少卿赴南京紫泥詔下九重天曾向榑桑海外宣使者旌旗輕萬里郎官詞賦欲千篇歸朝已荷君王寵進職今推近侍賢應到南京公事簡朝朝清趣在韋編沈處士夫婦挽詩臨安處士休文後蕭散春秋七十餘荒歲恤人頻發廪平生愛子只收書眼㸔蘭茁森如玉身着荷衣樂飯蔬同德相輝更同穴後來慿軾有高車題竹酬正安友正安老友自廬山寄惠仙洞松因便以冩竹酬之幷題詩其上寓思憶之意云别去京華今十載仰髙堂上趣如何曾孫近有含飴樂使客頻聞艤棹過坐對匡廬延爽氣門臨彭蠡挹清波陶公祠裏春秋社醉看傳芭舞且歌送袁旭知府復任三年奏最謁彤闈五馬翩翩又賦歸風撼長河氷欲合霜凋連樹葉分飛從知辛苦蘇民瘼富有聲名出帝畿坐對敬亭公事簡吟詩還似謝𤣥暉題周孟德淳齋巻性情澹澹葛天民齋舎清幽逈絶塵𤣥酒大羮忘世味閒雲流水任天真農談暇日同鄰叟經訓當年對古人豈有機心到機事青松翠竹四時春送况伯律太守還捧天書辭玉陛東風五馬去悠悠十年不愧趙清獻七縣重迎張益州楊柳翠迷湖上寺杏花紅映水濵樓到官正及勸農日郊郭歌謡擁道周題竹寄陳有戒都憲關塞秋風霜葉飛又聞跨馬出邉陲多卿爲國忘勞瘁老我懷賢惜别離萬里屢勤鴻鴈信一緘遥荅鳳凰枝保民有志堅如石想見西人載路碑送廣西僉事黄孟清有序皇上嗣大寳之初以興學育才爲第一事茂簡文學之賢授之憲職加賜璽書俾分督各道學校之教期厥成功於時如江西王孟堅湖廣劉公濳廣東彭毓敬四川康仲正及之山東西陜洛諸君子皆能祗德意明教條焯有成績孟清雖後至廣西其所設施功效一與前之諸君子等由是其學者咸趣於實漸革徃昔浮虛之弊此皆聖明之賜也而比來言者猶有乞罷督學校之官雖或其因一人失當而發夫因噎止餐豈理也哉亦可謂不明大體而易其言者矣君子敬其職惟知盡吾誠人言無足恤哉孟清考績來北京將歸索詩故并及此以致勉勵之意云昭代光華起一經手提文印廣西行三年宦績看書最八桂人才屬有成白簡重辭金闕去黄花紛映繡衣明相逢乍語還相别勉盡忠誠答聖情呉廷用侍郎挽詩十載南京住接隣北京相與更情親朝端恩寵陞官數江上賢勞奉使頻聖主親垂君子譽近臣誰復古人真分携未乆遄聞訃感悼題詩涙滿巾仁廟監國時嘗諭廷臣曰呉廷用是君子盖知之最深云送吕從周平江教諭荆岳東西路不賖數程來徃洞庭沙承恩典教重辭闕得禄娯親喜近家江上夜虹書棹逺津頭春樹酒旗斜從知子佩趨迎日𤣥燕將雛柳正花送張敏赴四川都司經歴同是青原郡裏人京華邂逅最情親賢闗出拜君前命帥閫行充幕下賔萬里橋邉連逺徼九江城外泝通津臨期無奈匆匆别矯首飛蓬各愴神寄金文鼎錦袍新照鬢毛斑歸住吳淞三泖間天上已頒金誥重林中不遣緑尊閒畫圖世儗王摩詰詞賦人髙庾子山無限離情寫相寄明年春鴈待書還送干子楫中書謝恩還新淦萬里趨朝上九關紫宸前殿謁龍顔天章已賜封官勑雪鬢榮看衣錦還淮上春波連碧草湖邉晴黛擁青山他時歸老湏相覔知在金川玉笥間送進士赴南京刑部主事一經登第拜金鑾六品升朝授好官自昔有家依帝闕即今得禄奉親歡英年郎署丹霄近聖代秋官白晝寒立志長同氷雪厲扶揺萬里恣鵬摶送郭鼎貞致仕還臨江郎官爲政清如水舊有清名逺近聞天上拜辭丹鳳闕江南還覔白鷗羣夫容楊柳零秋露彭蠡匡廬𣺌暮雲無數歸㠶背人去不禁鄉思日紛紛送吕仲賢赴南京戸部主事柳色含金春正融御溝氷泮玉波通讀書有志逢千載承命之官拜九重河上好山連濟北淮南佳氣望江東朝廷邦賦存恒典能秉㢘勤亦是忠題竹贈王澄淵歸握手臨分思不禁都門十日雨涔涔荒州逺邑存遺愛蜀嶺黔江見越吟萬里客途堪白首三朝臣節只丹心清風瀟洒安成郭未許投閒坐竹林送王邦彦大理歸蜀春坊二十餘年舊此日同朝見㡬人老我論思愧臣職多君讞議副皇仁西風岐路明紅樹秋渚離情對白蘋萬里天恩榮晝錦到家應及歲華新題何太守畫宜陽太守彈琴處瀟洒蒼筠白石妍半夜波濤亂春雨一拳苔蘚出晴烟郡中舊有房韓政林下那無白阮賢直節看渠清似玉姓名琬琰後宜鐫送清河知縣當宁仁民秉至誠瀕淮今歲少豐登憂勤屢下明廷詔撫字深資令尹能共愛温如𤣥圃玉直須清比鑑池氷清河未必長淹驥雲路他年看爾升胡祭酒宅秋菊盛開僕携酒就賞胡有詩因次其韻二首庭菊芬芳五色并每因來看得怡情共憐覉旅增多病太息交游减舊盟萬事不如閒處樂一樽聊就故人傾愛花欲種嗟無地慿有清詩爲借賡秋風客裏百愁并春雨江南萬里情時序未忘黄菊興江湖猶夢白鷗盟况於衰病淹留際豈有襟懷浩蕩傾何怪相過舊同舍一觴易醉句難賡壽蹇少卿二首先皇親製忠貞號甲第新開寵更深周倚仲山能補衮商需傅說解爲霖春筵的皪梅舒玉壽斚芬芳醴泛金聖代文臣公第一承恩堂上盍華簮天上星光照錦袍滿堂春色醉仙桃燮調四序勲庸盛輔翼三朝德望髙咸使華夷慕丰采屢膺綸綍重華褒不才謬沗䕫龍後惟祝南山酌翠濤壽建安少傅二首兩扶紅日上青天盛有髙名海外傳黼黻鴻猷才勝錦發揮龍誥筆如椽三朝並倚忠勤德二氣還需燮理賢九曲武夷塵境外功成歸作地行仙每挹天瓢潤九區蓬山髙處領文儒梅花獻壽作香雪竹葉迎春開翠壺闕下引囘鴛鷺侣堂中看舞鳳凰雛同官同姓同清徤應數耆英笑老迂連景賢脩譔南歸書此識别萬里閩關邉嶺海送歸曉發道傍車蹔辭金馬玉堂直乆憶丹山碧水居鴈影將秋先驛騎桂香含露襲衣裾到家想及寒梅節觴酒花前㑹里閭從游西苑三首宫城西畔接蓬萊金飾飛樓玉飾臺輦路前瞻雙鳳引鑾輿中駕六龍來時康道泰韶音奏雪净天清瑞景開何幸羣臣皆侍從山呼捧獻萬年杯太液丹霞漾緑波榮光五采貫銀河牙檣錦纜移黄繖鳳羽龍旓拂翠荷武士威隨嚴鹵簿儒臣謌頌續巻阿天王萬歲天同壽歲歲升平樂事多壺洲閬苑五雲迷紫殿彤樓衆岫低日射飛甍金署榜虹連閤道玉爲梯流觴宛轉清波送賜扇煇煌御墨題欲報寵恩何以祝皇圖帝壽與天齊寄宗豫翰苑同袍三十載憂懽何事不相聮論思無補慚予甚經濟多能憶子賢竹簟茅檐宜晚歲白雲滄海别經年閒居未用渾忘世尚想題詩到日邉送羅知州之廣德金殿傳臚起一經青春爲郡引雙旌晴瞻岱岳連齊甸晚帶淮潮過楚城千里桑麻相映緑諸生絃誦有餘清州侯舊說孫莘老想見懷賢係逺情和胡祭酒見寄韻二首自昔襟懷淡蕩春老來幽趣更清新竹門松巷閒臨水書几琴牀夐絶塵歸隱已無青𤨏夢交㳺時念白頭人黄庭一巻消長日座有雲山未當貧分携又是十經春喜見文章刻布新不待黄金論髙價共憐白璧净纎塵賡歌每憶同中禁名姓頻看慨故人國有賢王重耆彦從知道在不憂貧次韻行儉移居四首移住城西半畆寛接隣俱是舊交懽中朝文采推王粲别墅風流儗謝安應似詩人歌伐木㑹筵嘉客醉焚蘭新居更爲長年祝玉屑雲英好試餐移住城西半畆寛喜於幽處託盤桓九苞威鳳人争識五色華芝世共看流水清絃閒屢奏秋風長鋏未須彈也應晏歲勞相慰却愧陽春和獨難移住城西半畆寛閒居蕭散欲忘官隣園樹色青連屋露井苔痕碧映闌東觀有書秋後校西山如畫雨餘看同鄉同客兼同調日日過從得共懽移住城西半畆寛相過隣曲盡衣冠南州文物終存古北地風霜屢渉寒萬里能無鄉井意數家相倚客居安匏壺載酒閒常㑹竹笥藏書也易干隣居皆江右人送王籌汝玉之子不見青城十五年春宫曾共侍經筵早乗鶴去歸三島應從龍㳺近九天海内朋儔悲益减客中歲月苦頻遷秋風又與王郎别爲話髙堂重惘然寄題旴江鄭氏隆壽堂與君俱住西江上徃徃清名聽客傳六十生年同甲子尋常行樂似神仙厨供吏部曹中禄酒釀麻源谷裏泉盛世天恩錫隆壽龍光長照綺筵前奉勑㳟謁皇太子謝恩詩有序欽䝉皇上聖恩賜臣等拜謁東宫殿下敬惟殿下天章日表鳳彩龍姿氣宇雍容有廣大寛仁之度威儀恭肅有純和中正之資睿知聰明出乎天性所以係萬年之邦本所以正萬國之元良誠由祖宗皇太后之洪慶皇上中宫之大德有以膺天眷之隆而生將來太平之令主也臣等深切懽抃之至恭各賦詩一章以上爲國家宗社下爲海宇生民之賀謹録上進伏惟聖覽焉華夷一統戴洪恩慶衍皇家萬萬春縂為太平隆景運正生仁聖福斯民德如文武成康繼世沐乾坤雨露新龍鳳之姿天日表大明髙祖聖𤣥孫送王秉遜侍郎歸益都愛子儒林氷玉清大廷文選佐持衡昔聞天語曽稱孝乆侍經帷只用誠恩命已霑鸞誥重鄉人今看錦衣榮况逢青社烟氛净共感皇仁說治平午醒閒述邉方喜迓翠華來風掃飛烟雨浥埃日暖營門喧鼓吹秋清廬帳引尊罍諸公並有平戎䇿賤子慚無奏賦才忽聽六軍傳好語龍輿今已辦東囘懷柔旅次一生能執經請益古樹蕭條䕃縣門縣前民舍似山村何如荒歉頻年後猶有承平舊俗存愛客别延林外舘多情還倒炕頭尊不徒行役能相慰兼復詩書可共論歸至清河時彦諸公約載酒土城見候二月隨鑾三月歸近瞻城闕五雲飛桃蹊深淺紅相間麥壟髙低緑漸肥出郭故人期載酒迎門稚子候牽衣登山臨水多髙興未抵抽毫侍禁闈寄壽胡祭酒七十八年不見頥菴面楚樹燕雲思獨懸寳氣常騰山浦上文光髙燭斗牛邉緑尊酒共幽人酌錦字詩從過客傳七十韶華還七十重新甲子記流年元宵侍宴萬歲山五首綵映鰲山近紫霄王正嘉節屬元宵九衢星斗珠燈燦一統乾坤玉燭調處處陽和融動植家家歡樂合笙簫臣民仰戴君恩澤萬壽齊天祝帝堯寳炬華缸㶑灔紅參差廻合粲夫容九重殿上春先到萬歲山前月正中天意總看新歲好聖情樂與兆民同頻年邉壤氛埃净况是田疇稼穡豐帝德承天景運新三陽開泰布和春典章禮樂隆昭代玉帛梯航聚逺人致樂天倫承聖母均恩海宇霈皇仁太平元夕仙韶奏率舞蹌蹌總鳳麟大地山川明景象連城燈火照笙歌月當華葢杠前好春在蓬萊頂上多鳳闕光輝含瑞靄龍河浩蕩溢恩波時平幸遇唐虞主聖德無爲保泰和詔書已下息黎元逺邇歡忻戴頌言節序適逢端正月陽春偏感聖明恩三山瑞彩明黄道五緯華星繞紫垣敬效嵩呼祝當宁太平天子萬年尊送曹都御史赴丼州繡衣驄馬引雙旌手捧綸章出帝城滿路桃花飛乳燕夾堤楊柳帶流鶯關西舊識霜威肅塞上今傳氛祲清昭代有才當顯用會看竹簡記勲名寄楊壽夫七十年華兩鬚霜九重恩㫖賜還鄉脩成國史登金匱歸去官銜帶玉堂碧水丹山從散䇿春蘭秋菊對浮觴别來繾綣懷君子故寫琅玕逺寄將歐陽貟外歸省以山水畫索題去春我過蜀江曲今春爾望蜀江歸六一宗家有餘慶椿庭萱砌交晴輝㫖丼猶是秋官禄繡錦新裁萊子衣一幅蕭閒鄉閭趣白頭相送念相違送柴尚書歸浙江萬里胡氛汎掃清中臺新拜夏官卿平生節比秋霜勁此日光添晝錦榮鄉國㡬人乗傳入江亭八月看潮生錢塘蠏熟鱸堪膾誰共芳醪白玉觥喜雨詩有序今夏自五月五日不雨至六月十八日上念田穀將實而生意枯瘁命有司致禱越三日大雨霑足聖情欣恱賜侍臣酒饌臣士竒預被榮恩喜而賦詩好雨連朝蘇乆旱無邉喜意動宸𠂻皇天洞鑒聖仁德臣子深慚燮理功每念升平均九土已知舞蹈出三農駢繁寵鍚身難報何幸衰年際屢豐送王日初撫州太守温如玉自昔論交在兩都壯歲文章看擢桂明時勲業遂分符臨川野外春風滿華葢峰前皓月孤邂逅相歡又相别天寒氷雪柰長途送趙侍郎廵撫江西聖主龍飛矜下土天官鵠立侍彤庭九重北面承親命一道西江仰福星吏治還應察涇渭農田湏用去蝗螟使車所過從容駐留取丼棠乆遠青送陳教授歸臨江臘雪都門三雨花廣文辭闕理歸車從來宦逹心如水此去優閒鬂始華瑟瑟蒹葭寒景暮蕭蕭鴻鴈朔風斜碧桃開滿金川縣無限春光屬到家送萬太守還嚴州聖皇臨御求賢日太守趨朝奏最時興學已聞千里化愛民今荷九重知離亭雨霽花薫勺驛路風清柳拂旗繾綣同鄉又分袂好音頻慰别來思送恂如侍郎循拊蘇淞秋來為别思難禁况復平生契誼深循拊獨先祗帝命賢勞深見愛民心也知瑞玉須荆産信是長才出鄧林何幸遭逢明盛代春風行處散棠陰送任敬讓主事省親潞河二月春氷泮河上仙郎載畫船金勑已頒褒命下繡羅新製舞衣鮮曉經鍾阜龍承日夕望豐城劍燭天白髪髙堂榮具慶華觴拜跽祝長年寄李昌祺故人乆别李方伯不盡交情憶洛中氷檗心堅真比石松筠節老不隨風共嗟禄秩縻三紀漸喜雲泉屬兩翁已辦這頭青若笠鷗江鷺渚徃來同送黄叔志布政致事歸呉興拜賜歸閒出九重都門祖送雪寒中考功郎署三朝逺敷政藩垣二品崇金盖雲山足怡悦鷗波亭沼更從容扁舟還約𤣥真子來徃苕西與霅東挽余正安詞垣分手十年餘霜鬂蕭蕭未漸踈朱紱早辭金殿直草堂還傍碧山居一壺常共隣翁席四馬頻囬過客車聞道翛然奄乘化硯松空對涕漣如送樂善郎中梅萬木凋殘春欲回年年開擅百花魁連松傍竹堪論契綴玉聮珠不染埃寒暑芳華清莫敵幽人風致數能來還應一段氷霜意宜向秋官署裏栽遵化行營夜夣金少保有作時奉使慶府故人迢遞夣分明星轉周廬夜二更金馬玉堂三月别白雲紅樹兩鄉情闗山道路瞻持節藩府衣冠迓擁旌奉使西行足髙興錦囊歸日為君評書張御史和唐詩後有序詩自三百篇後歴漢晉而下有近體蓋以盛唐為至楊伯謙所選唐音粹矣比年用力於此者尠御史張楷取唐音中七言律悉和其韻可謂有志間出示余因取其首篇和以答之前四句以髣髴盛唐諸公之趣後四句特以勵楷詩雖學者餘事然昔人有曰若不能升其堂者非可易言也發乎情止乎禮義優柔以求之諷詠以得之造之之方也朂哉乎楷他日聞浙水東以唐詩名者其子也歟楷朂乎哉驪珠光彩玩堪憐白玉藍田生煖烟粲粲芙蓉出秋水蹌蹌金石奏宫懸從容柏府霜臺暇吟咏開元大歴前壯志盛年期努力方將洗耳伯牙絃送原之參政歸山西余以舊得夏中書墨竹贈别并題詩云鳯沼春生翰墨香一枝晴翠寫瀟湘清姿早濯薇垣露勁節曽凌柏府霜共愛鸞翔拂霄漢還思金奏恊琳琅匆匆相見難為别贈置徽之君子堂送杜御史山東參議有序孟清御史㢘潔端厚持大體余雖素未識然聞之士君子熟矣今陞山東布政司參議始遂一見故作詩送其行云御史班中第一流由來清譽重琳璆儲無甔石門如水胷貯陽和面帶秋海岱藩垣騰寵命氷霜道路戒行輈十載同朝始相見篇詩持贈當吳鈎送杜寧侍講玉署十年登近侍白雲滄海望天台歸寧榮捧天㤙下行道争㸔晝錦回濟北九河衝暑過浙江八月㸔潮來升堂正及高秋節丹桂吹香溢壽盃姚克脩御史挽詩荆湖才行登烏府念子于今第一人節操從來烱氷雪撫循隨處播陽春陵夷古道傷心後太息清風洒淚頻最是蜀人懷厚德不知誰復繼音塵題胡御史家四老圖四人行共三百嵗兄弟儼若商顔翁皎皎鬢華晴雪白怡怡容色曙霞紅松間歩引仙巖鹿花外㸔回憲府驄南極分明當几席星光長映酒杯中張鳴玉郎中父輓詩蘭禕荷帶不言貧䞉貯詩書遺後人禄養曾榮二千石壽筭高登七十春青山墓樹秋雲冷紫誥龍章寵命新尚有耆人説遺行至今清儉表鄉民送徐良玉侍郎復職還南京兵部昭代多才少司馬中臺六載住南都楩楠自昔升梁柱瑚璉于今用瑾瑜天闕九重㸔奏最秋風八月戒歸途交情又屬匆匆别強對離歌寫翠壺鄺侍郎父挽詩人傳能孝似參騫儒行公才兩克全三邑曽承愽士教庶民長誦大夫賢青山墓道松楸冷錦誥褒詞日月懸况有顯揚千嵗託中臺五采鳯毛鮮題雲山送蕭德葵南歸一别桃源四十春高齋回首思紛紛清溪兩道通仙谷翠壁千尋護白雲少暇焚香時鼓瑟半酣停酒更論文何日承㤙謝簮紱寅賔樓上再尋君挽張逢吉平生瀟洒湖海意晚嵗寵召升朝行小兒皆愛秦扁鵲俠士亦讓龎安常可憐厭世忽已逺何限懷人今未忘鳯毛池上悲陟岵我為賦詩増慨慷送魏侍郎奉使江西西江冦盗本王民命切艱危有弗馴初拜殿廷承玉㫖肅將斧鉞下天津道途陰曀湏清滌溝壑呻吟頼撫循盛世長才當大用勉宣皇武布皇仁送袁忠徹少卿歸四明早從雲海識真龍冠紱三朝侍九重綵筆曾書丹鳯詔玉章親視紫泥封九河花落春波暖千里鶯啼樹色濃遥想到家明晝錦越山晴繞翠芙蓉送何孟煥檢討歸㑹稽詞垣榮被寵恩新朱紱朝來拜紫宸抗手暫違丹禁侣馳心長戀白頭親闗山鴻鴈隨秋色江岸芙蓉映曉雲想見升堂嘉慶日銀缾滿貯洞庭春送崔彦俊太守歸徽州瀟洒宗之清似玉專城五馬翼䨇旗政如召父南陽日教擬文翁蜀郡時京國三年重邂逅闗山萬里又分離同鄉同道相期逺千載新安去後思送何太守歸宜陽豫章南上二王城宜水宜山繞郭清太守逺憑熊軾下老夫猶記鳯臺生三年北闕重趨覲正月東風遽戒行氷泮龍河春浩蕩臨分無那故交情送彭參議致事歸崇明榴花時節出都門語燕啼鶯緑樹繁近侍十年趨殿陛旬宣兩浙佐藩垣青雲高歩承昭代白首閒居感聖恩冠帶光華動閭里清㳺多在海邉村贈呉布政歸福建昔歳京華聫近侍柴門相對日相過憲臺藩府升遷數西陜南閩越歴多氷雪滿懷知節操陽春行處想謳謌重來未盡歡娯意又送驪駒白玉珂奉柬宗載尚書同鄉同歳還同道玉笋聮班歴四朝近曉天星俄落落經霜庭柏故蕭蕭廟廊特逹升元愷海宇光華荷帝堯已辦從公舵樓底西江歸去狎漁樵題南浦上人竹石南浦上人氷雪意平坡古刹幽棲深琅玕翠拂曼陁石瑪瑙森立旃檀林虎丘説法曾㸃首玉版叅師今在心何時坐我清風側試聼海潮揚梵音寄汴中廣哲僉事手提文印中州去洛水嵩山歳屢經庠序育才元不易道途攬轡未曾停豈無賈誼閒懷䇿恐有堯夫隱在坰聖代咨詢憑使者封章㑹見逹明庭題呉郎中展墓巻天官當代公衡鍳翼賛人推選部郎白晝鄉閭瞻衣錦青松丘壟豔焚黄天朝恩重何由報風樹情深獨自傷畫史能傳心曲事從知忠孝兩難忘呈澹齋少保并諸學士有序二月四日澹齋置酒閣中㑹諸學士主賔七人而僕以最老預席顧桑榆之已廹念丘園之乆違輙成五十六字以寫鄙懷用呈同席諸公云無能有幸接英僚翰苑經帷共四朝時泰獨嗟年歳暮力衰轉覺道途遥風含御桞春猶淺波溢龍河凍盡消陽德方亨仁澤霈㑹容白髪返漁樵挽曽翬主事父釣水耕原計不踈娟娟脩竹蔭庭除家隣清節先生里案有蒙荘傲吏書閒對青山成逸趣遽傳丹旐引靈車明時有子光朝署寵贈終當賁墓廬閒題翠柏參差蔭滿庭雪晴青草傍階生門無車馬晝方永座有圖書心自清絳縣老人方並嵗青州從事未忘情故園尚有漁竿在惟歎歸舟計未成館閤真率㑹詩曾聞東洛集耆英想慕髙人物外情白玉堂中千載㑹紫薇垣畔七星明朝廷有道公多暇尊爼相娯老益清衰朽自知難並列擬循緑野㸔春耕送裵脩譔歸侍親早嵗超宗有鳯毛天門金榜映宫袍官聫朝苑三遷後慶衍慈闈八袠高晝錦新榮當宁賜秋㠶遥泝大江濤升堂拜獻長生爵更捧氷盤五色桃送周員外致事兼簡巽溪長史司成館下職頻遷一擢中臺遂十年官燭晨昏勞簡牘使車南北歴山川朝廷有道成高致冠帶無營勝散仙應共鄰荘楊長史碧松陰裏酌丹泉送夏仲昭歸省天恩初拜出皇州紅樹青山驛路秋鶴髪幾年違定省鳯池長日歎淹留榖亭水滿平通牐𤓰歩潮囘穏放舟遥想升堂嘉慶日綺筵春酒玉為甌題孫公器醫士梅竹娟娟庾梅氷雪蕋翛翛嶰竹青琅玕梅熟兼䀋調鼎鼐竹老垂實來鳯鸞畫史高情真絶俗丹房閒對可忘餐董家豈乏廬山杏此植清貞經歳寒吳叅政挽詩初持彩筆趨龍陛遂入霜臺著廌冠西蜀幾年分使節南閩萬里佐藩翰歴官中外賢勞乆歸老林泉樂趣寛聞訃忽嗟成永别接隣空憶舊交歡送陳遜用員外致事聖主需賢贊萬幾㸔君未老决然歸十年朝署氷霜操五色文林錦繡衣巖逕松蘿餘舊隱海天鴻鵠遂髙飛白頭别有相知者潦倒不歸傷逺違送太守劉永之荆州丹桂飄香滿玉除秋高雲净鴈來初朱衣拜别雙龍闕皂盖行乘五馬車天子勤民需召杜郡侯為政用詩書荆州况是頻荒歉急待陽春惠化舒送尹自道太平同知霜華初滿碧梧枝貳守之官彩鷁移宦績十年勞撫恤客途千里厭驅馳江清采石長宜釀雪净青山足賦詩此去殷勤宣上德太平民物縂春熈送周參政赴福建有序工部郎中鄱陽周君㢘慎君子也奉國愛人明於大體獨恒不得於其長官盖所存所由之不相契也皇上親擢為閩藩叅政賜之壐書勵其職業朝士大夫皆為之喜余與之同出江右故作詩送之五色天書照紫泥曉承玉㫖下彤墀薫蕕自昔嗟同器鵰鶚于今喜及時邐迤桂香迎驛路飄翩雲彩動旌旗太平勲業資才俊莫負清朝聖主知時彦行儉習禮入山觀玉泉想見佳致故作詩奉寄萬頃西湖一鑑澄玉泉淠沸㵼泠泠昔年兩度㳺曽徧此日三賢興共乗石畔潄流仍命酒山中瀹茗定逢僧從知登歴多高詠還對蒼崖第幾層宴楊氏南園并和二首楊家别墅南園好水色山光畫障開花連杜曲東頭發人自蓬山頂上來共傍林塘分綺席頻教絲竹送瓊盃盡日香風清不斷披襟何處得纎埃南亭比似東亭逺三月好花無數開一水繞園如練浄羣峰當座送青來清歌屢引蹁躚舞高興頻流㶑灔杯歸路斜陽擁車騎淡雲將雨浥輕埃夏日館閤假寐夣澹菴寫竹筆勢翩翩以求余題覺而有作日長假寐圖書府夣見揮毫寫竹枝三月都無鴻鴈信九霄如睹鳯凰儀空憐意惬闗飛動亦擬詩成寄别離淇水湘川𣺌南北清風翹首已多時夏日館閤賦柬馬學士曹侍講九重盛夏净炎氛停講經帷已二旬館閤退朝無一事衣冠坐論只三人大官致饌循常典中使傳宣錫異珍視草堂前新雨過錦葵承日不勝春題畫寄逺法師乆别山中逺法師春風洒落鳯凰枝八忩花雨譚經處一榻松雲入定時出世人髙了元法名家我識惠休詩幾時同坐曼陀石瀹茗焚香慰所思聞逺法師新作山居從知城市厭塵凢近傍西山草結菴心静故思幽境住道高不遣俗人叅玉泉洗鉢時分磵石匱藏經别在巖簷匐繞林花似雪飛香常滿佛前龕次韻答逺法師詩成粲粲素霞開比似花光月映梅色相已清猶是幻性根元好不湏培堂中明鏡常澄澈天上浮雲任去來盛世樷林數耆俊逺公端合斗間魁送何文淵二首有序吾友刑部侍郎何君文淵於愛君恤民志如金石且其髙才逺識無所施而不宜而遽引疾得歸於别也予尤不能無情故賦詩二章送之曉承恩詔出皇京行李蕭蕭一葉輕梁柱楩楠希世有雲霄鴻鵠使人驚從來政挾陽和布况復心涵秋水清共憶江鄉今獨徃都門分手若為情我重何鄉過瑾瑜清風素節有誰如同鄉同志㝡知己直道直言多啓予聖主方今圖致治長才安得遂閒居到家漸及陽和候春鴈來時應寄書追和周侍郎大雪賜宴詩有序宣德己酉正月大雪皇心恱懌賜廷臣宴時周侍郎有詩後五年出示索和追念天恩不勝感愴勉次韻塞責云先朝瑞雪兆豐年一體君臣喜可言已勑大臣頒玉饌更宣中使出金尊傷心何處攀仙駕洒泪清詩憶舊思滿目當時肱股在共攄忠懇答乾坤題竹寄曽士𢎞郎中朝紳歸里絶塵事愛爾㢘聲逹兩京萱堂日慶慈闈壽棘院秋榮令弟名俗轍掃除無一跡芳醪閒暇盡干觥聊寄一竿淇上緑更看氷雪歳寒清寄李學士别來無日不思君𣺌𣺌燕山望楚雲到縣幾多知識在入門強半死生分鄉閭叙齒應皆讓子舎添丁或未聞氷泮龍河候蘭楫須知同館重離羣送宗載尚書復任南京吏部又拜明恩下九霄騑騑四牡出河橋從知素志懷鄉邑且盡丹誠答聖朝氷雪曉行嗟老大闗山南望向迢遥金陵已熟春前釀應有梅花候翠鞗夣覺作翰苑詞林雨露邉不才何幸接時賢故鄉迢遞六千里歸計蹉跎四十年寳勑恭承明主賜白頭深荷寵恩憐行來夜夜蓬忩夣只在龍墀玉陛前過沛縣悼顔伯瑋有序廬陵值夏顔伯瑋其先出唐魯公之後伯瑋為沛令太宗皇帝舉師北平所過郡縣皆歸附伯瑋度不支不出時惟一子在側預送之出走遂入衣冠南望拜自經其子不忍去父復還父已死亦死之事具國史僕於伯瑋有故過沛悼之平生金石見臨危就義從容子亦隨千載河山遺蹟在一門忠孝史官知故鄉住近文丞相先德傳從魯太師欲酹丘墳何處是離離芳草泪空垂過匡南重悼正安侍講玉署聨官二十春超然歸去樂閒身醉吟麗句渾忘老坐對青山不厭貧經年江海魚書斷落日郊原馬鬛新惆悵仰高堂寂寂尋君不見泪盈巾題梅贈顯仁劉脩譔五年不見劉脩譔長在薊門勞逺思此日歸來重晤對清風瀟洒舊襟期香和鼎爼春調膳影上簾屏夕詠詩别後㸔梅相憶處陽和獨擅最南枝題竹酬顔仲平有序二首僕與顔仲平别五十有二年今年春歸自北京仲平見訪澄江之上僕適以事先出阻風雨於外夕歸尋仲平之舟已行矣悵怏不已辱仲平留詩披誦感愧舊得黄中書寫竹用以奉寄并歩仲平韻二章其一賦竹其一述鄙意云移植成陰歴歳時虛心勁節幾人知臨風毎聽龍吟好待月常㸔鳯翥遲嘉客頻逰蔣詡逕髙情閒詠武公詩何時君子堂中坐共㸔扶踈霽景熈五十年前握手時清懷雅度兩相知衡茅昨枉過臨重風雨深慚出迓遲剡曲子猷俄反棹市南摩詰更留詩髙山素仰陳夫子氷玉于今見緝熈與鵷稷别落日蕭蕭江上寒臨江對酒不成懽君臣義重慚違久父子情深欲别難春水白鷗閒泛泛烟皋芳草緑漫漫客程漸與鄉闗逺回首天南何處㸔挽歐陽洙父家住烟霞蜀洲曲蒼蒼喬木百年餘讀書行義承先世流水青山䕶隠居榮養已沾烏府禄褒恩曾錫錦綾書浮生何必登耆耋誰有銘文載令譽羅侍郎挽詩金魚洲北相過日前年春余還鄉汝敬自文江來訪留一宿而去玉峽樓前執别時四月余北上汝敬先期於玉峽見候㑹食頃而别匆促共嗟情不盡幽㝠遽恨見無期别數月而汝敬捐館尚存簡冊書成績不斷軺車賦載馳汝敬自陞侍郎奉詔赦兩浙民賦理甘肅寧夏邉餉最是邉西來徃數至今遺愛後人思汝敬遺績在峽西者最著迨今循用其法送劉不息有序劉誠不息草意先生之孫也吾十五六時識草意於海桑槎翁之賔席計其時不息始生盖今六十餘年矣不息純質可重舉進士下第入胄監今得臨淮簿專理邑之馬政將行索詩孔子不為乘田乎曰牛羊茁壯長而已矣仕無崇庳一惟盡誠焉耳不息勉之兩京相見屢經年束髪為儒到白顛恩命曉頒䨇闕下帝鄉南望五雲邉夾河楊桞含清霧新水鳬鷖發畫船好及明時展材用臨岐為誦魯駉篇送曽振新除潜江簿兩家白下東西郭爾叔童年日徃還進士憐渠繼鄉榜除官復此出賢闗淮南曉棹沙邉月江上晴㸔雨後山榮捧恩書行素志莫将離思動愁顔送道亨王侍郎致政還鄉二首平生操節比瓊瑶身荷天恩到五朝為國一心常耿耿歴官䨇鬢已蕭蕭西人毎見談仁政故吏頻聞誦教條獨恨相逢各遲暮白駒那復永今朝蕭散髙情早息機衣冠祖送出都畿六官守道如公少七袠辭榮自古稀沃野秋風黄黍熟長河春水白魚肥不才苦被樊籠繫翹首𡨕鴻嘆願違東郭草堂宴集帝城南畔尋韋曲浩蕩風光三月中衢路塵埃過雨净林園花樹競春紅主人置酒興非淺衆客題詩歡不窮一杯一曲日西下莫待銀蟾生海東挽竹軒劉嘉㑹先生閒占雲霞隱鹿門一朝厭世隔囂喧儒林共惜斯文喪鄉邑誰知古道惇鵰鶚登庸誇令子文章為縣見賢孫何時歸到螺川上為瀉椒漿奠一尊送廖教諭自謙之任沅江平生孝友江鄉重一别蹉跎二十年紫誥新求盤谷里烏紗逺上洞庭船秋風秔稲家家熟楚水鯿魚處處鮮想見齋居倚脩竹絃歌長滿緑雲邉送周崇式貳尹赴東莞河梁秋葉墮蕭蕭送客之官道路遥淮上月明潮正滿嶺南霜下瘴全消從知苦學持先志㑹有忠謨逹聖朝邑宰于今望賢佐過家少駐木蘭橈贈本深還吉安宴罷瓊林酒一盃鞭催五馬出蓬萊金章紫綬恩重拜皂盖朱幡喜復來帶得一天新雨露掃除九邑舊塵埃螺川城外人千億争㸔神明太守回七言長律公安王氏慈夀堂堂中壽母八十餘慈顔和悦身安徤俯㸔蘭桂春繞膝坐聽詩書喜生面慈竹隂濃雲密垂諼草花齊錦相炫地近菊潭泉可釀門倚荆江魚足饌甘味時邀隣媪同輕軒晴渉家園徧玉堂禄養共所榮錦誥恩封㑹當㸔耆耋争㸔人瑞好康寧本自皇極建中天南極一星明嵗嵗長年照華宴挽趙尚書五朝遺老今無幾卓犖髙才不可覊欽恤晚承虞帝命旬宣早出縉雲司中臺優秩升圻父三禮清心慕伯夷屢挟地仙窮眺覧更携田畯㸔耘耔甘從白首辭官去曽以丹𠂻結主知竹簟茅簷真散逸藥畦花逕足栖遲過從毎憶頻開醖朝退兼懷共論詩一别三年遂終古無由持紼送靈輀聮句夜夣與故冕菴胡公泛舟自鷗江至鷺洲對酒聨詩公起首句余續第二第三句公續第四第五句余復續第六第七句公結末句既覺而忘第五至第七三句愴然懷舊因補之如左金螺瀟洒對芙蓉鷺渚魚洲窈窕通逺樹白雲秋色净故人清興酒船同河山夣冷謳吟後生死交深感慨中猶想勝縁如夙昔並騎黄鵠過江東東里續集巻五十九
