body:
  text: 東里續集卷十九明楊士竒撰跋古樂府古樂府元南昌鐵柱觀道士左克明德昭編起唐虞訖陳隋按曲分類為十卷其緣起具見題下虞文靖公為之序刻板今在南昌余家二册得於太常寺丞謝靖貞凡吾家文籍得於故人朋友之遺者必謹著所自不敢忽其出於貨致者不著也歷代樂府詩辭歷代樂府詩辭廬陵周巽亨編起擊壤訖李唐總詩一千二百餘首論其世次而以朱子所答鞏仲至之説為主兼取前輩論議亦間雜以己意廬陵舊有刻板然余未之得也此册余客武昌時録於府學訓導晏彥文風雅翼三集三首風雅翼者元會稽劉履坦之因昭明文選所録古詩重加訂選其注釋一本朱子釋詩楚辭之例而自康衢擊壤之歌下自唐宋之作凡有風雅之遺者皆附焉前此選古詩莫之能過也余所藏録本友人張從善手筆從善名登大同人從其父戍武昌操行堅確篤學不懈手録書至富余客武昌時相與往還甚厚丙子冬余歸廬陵以余重此編贈以識别余家又有從善手録楊孟載詩百餘篇字畫端整吉水劉日升借去卒於不歸夫非其人而輒假之以書視日升可以為戒右風雅翼一部四册余初客武昌得風雅翼録本後來京師始知有刻板在上虞是時士大夫求之寖多余亦凡得十數本而皆為親友持去最後得此本於前禮部侍郎劉翼南翼南坦之從子始余得刻本字畫完好如新裁十餘年巳漸昏缺如此固由乎求之者之多歟右風雅翼一部四册永樂丁酉郭公緒自浙江來京以見贈者雖頗有脫板然比近得者文字差明白録陶詩前三十年書肆所售陶集皆止於詩余家一册洪武己巳冬初至武昌録於吾郡李明達詩之後有文并附録及具載先儒評論於各篇之下蓋舊本也甚愛重之無幾友人朱正民從余借讀未及歸朱出為松江巡檢李亦往宣城以卒朱後坐事謫戍遼東嘗因使便寓書正民期以完璧歸我然私竊自計人淪於憂患狼狽有不能自保其身而暇保此哉而猶云云者徒以其心不能忘耳更數嵗書坊板行此本余既市而得之永樂丙戌余在京師正民以能醫徵至相見勞苦外即出此詩歸我曰故人不相負也完整如新余方歎正民信義於今不可多得正民戲余曰即使淵明身在人猶不知貴之矧其言乎余無以應也退朝之暇時展誦數篇或正其差誤明年正民隨詔使度海諭西南諸番國道卒不返每一啓閲不勝故人之情范益謙云凡借人物不可損壞不還况於書籍如正民真不愧古人哉故備志之以示來者謝玄暉詩右謝玄暉詩五十一首余家舊有謝集相姪持去失之往往求借於士大夫間不可得一日家居無事徐記憶而筆之僅得此耳蓋衰老廢忘舊學大率類是可歎也録隂何詩余數録隂何詩皆為學者持去在京師得此本於道官袁止安雖少陵愛何太白似隂然學者寧求之李杜可也古詩雜鈔右古詩雜鈔者梁隋初唐諸家之詩文苑英華所載而余館武昌時學子之所録也余蚤嵗既艱於得書故有所遇輒録之如此是巳讀杜詩愚得二集二首讀杜詩愚得紹興單復元陽著凡十八卷余家所録總七册昔之注杜詩者多矣而簡直明白得古詩人之意者惟此為優虞道園嘗注杜律詩百餘篇最為簡明此豈本諸道園者乎元陽清修好古洪武初為漢陽湖官其注此詩未嘗示人武昌丁鶴年好論詩與之厚僅得一再見之單卒其子不振鶴年從求其稿巳不存後數年始物色得之漢川民家已失其後二卷又十餘年求得於景陵士人遂為全書余客武昌與鶴年往還出此書示余及張從善使録之右杜詩六册外目録一册初余與張從善得丁鶴年先生所藏單元陽讀杜詩愚得本鈔録而慮其索之急也則取書坊刻本就其空紙録焉兾工省易完耳皆從善親録之從善後既重録遂以此本授余録余亦巳重録然此故人手筆不敢棄也謹識而藏之李詩右唐李翰林詩一部五册元蕭士贇因楊齊賢所注而損益之者也學詩者必求諸李杜譬觀山必於嵩華觀水必於河海者焉此編辨偽詩而列於各卷之末甚善然亦有過者蓋世之選李杜者范德機為精云李長吉詩洪武戊寅冬余自淘金歸邑中過深湖值雨憩道傍田舍有學館教者延余坐童子從傍誦長吉夢天詩其句及字音多誤余私告教者正之應曰吾受之吾師如此意若不懌然者頃之入告其主人主人出不復問余所從來揖余曰子奈何非吾師余笑而不應童子益朗誦不休余厭聞欲起避之而雨不止既久余告主人曰讀此汝無所用曷如讀雜字書得用也曰然曰吾以雜字與汝易此何如曰可遂以鈔一貫納主人曰此可得雜字十數部主人喜即命童子以此本納余始問余所從來呼婦取豉湯蕎麥餅為禮雨止送余出門甚恭獨教者於余言終不能平夫於巳不明妄自尊重為師以誤人及聞善言拒之不從而又有憾焉與欲教其子不知擇師徒費而無益如余所遇者皆不可也因記始得此詩又以寓戒云唐音余讀唐音間取須溪所評王孟韋諸家之説附之此編所選可謂精矣近聞仲熙行儉在北京録唐詩甚富用之讀之快意而頗致憾此編以為太略其所録余未及見然余意茍有志學唐者能專意於此足以資益又何必多也唐三百家絶句右唐三百家絶句刻板在北京國子監此編永樂十四年仲熙扈從還以見贈者唐詩如楊伯謙所選可矣如此集所謂雖多亦奚以為唐詩雜録右唐詩昔余在武昌蔣立恭携文苑英華殘編一册見過遂令童子録之題曰雜録謂其不純也擊壤集擊壤集二十卷宋邵康節先生著吾家二册得之給事中四明吳福朱子曰康節之學骨髓在皇極經世書其花草是詩蓋學者能涵泳於此不厭亦可以明淨胸次以為受道之地也文信公詩文信公詩一册新刻板在南昌永樂戊戌夏余得之歐陽允和公之詩傳於世者多矣此編所存甚少而附載申齋之傳於後使讀者知公之平生不為無助其併刻後人贊公之文者豈以其有重於公乎而又刻王鼎翁生祭公文豈亦以為公之死國不無激於鼎翁乎吾少時及見鄉人長老説公被執後防監甚嚴至南安入舟拘縶不復得登岸此文終不及見然則公之大忠炳炳烈烈震耀天地者果與於人乎故取揭文安公所題鼎翁吾汶稿附於生祭文之顚以袪無識者之蔽黃殷士詩右黃殷士詩臨川有刻板王時彥學士省親還見惠此編殷士元翰林待制國亡死節史有傳傳稱善屬文尤長於詩蓋詩尢長於樂府云傅與礪詩一集二首右傅與礪詩二册得於翰林庶吉士習侃傅文白先生范公之徒而虞揭皆重之其官位不顯史亦無名獨賴此詩以傳耳傅詩工緻而古體出選近體往往出盛唐故可傅也唐律詩右唐詩十卷皆近體七言越人宋洵所編余得之章尚文郎中近體固盛於唐然洵識下非知詩者此編可見巳録楊伯謙樂府楊伯謙名士𢎞其先襄城人後官臨江遂家焉父兄皆武職伯謙始讀書為儒工於詩又工樂府嘗選唐音前此選唐者皆不及也虞道園為之序而所與交遊講論詩學者傅若金辛敬萬石曠達練髙周禎劉永之之徒皆有詩名伯謙嘗為漣水教官有詩集刻焉余昔得之以遺本之此樂府四十九首吾友吳中楊仲舉手録而近得之曹兾成也杜詩類編永樂庚子冬士竒侍從來北京獨馳一騎行李書册不得將及至北京日益暇苦無書可閲雖素交厚如頥菴祭酒素菴庶子有書不得借武昌鄧存誠時寓京師數見過輟其所藏分余者凡十數種此其一也且大字便老眼可愛王子啓詩右鄉先生王子啓詩先生平生詩甚富皆不存此特其長江萬里稿耳先生名佑洪武初舉教官時偕天下士試吏部中選者十有八人先生與同郡胡子祺劉原實丁子堅皆與焉皆除監察御史是日就臺中賜宴先生操執剛正風裁整肅數論事及糾劾百寮無所顧避太祖皇帝嘉之時初平廣西擢廣西按察僉事後改四川崇慶知州既罷歸縣大夫請為學訓導嵗餘卒其持身之嚴自少至老如一日治國事如家事必誠必盡性疾惡嘗曰育嘉穀者必拔稂莠故在官持法不少貸所至去淫祠為人修潔凝重小人望見之率畏縮引避喜接引後學雖臨之以莊而詞氣溫裕無不樂親之每戒學者必務正學為正人海桑陳先生嘗曰今世士大夫有壁立千仞如王子啓者少矣又曰子啓真不負所學然無子莫為主祀故著述多散落雖賴蕭氏刻此集以傳而其得意者亦無幾其學者今獨用之在知其平生為悉常云欲為作傳未就也余少以姻家子往來親炙之見愛甚厚故因得此詩輒述其槩以附于卷末録余青陽詩右余青陽先生詩而蒙亭詩附其後余先生名闕字廷心元末守安慶死節諡忠宣少讀書青陽山中故學者稱之蒙亭者安慶吳去疾之别號吳學於青陽嘗為吾泰和州守其詩未有刻板青陽集有刻板在南昌及安慶而南昌板巳久廢余此册得之鄒侍講仲熙視刻板頗多數詩楊廉夫樂府楊廉夫樂府一册余録於江夏雷貫道夫廉夫吳人名維禎號鐵崕道人元李黼榜進士博學髙才然不矜細行故仕不顯其文學行義具見其門人國子助教貝瓊所著鐵崖先生傳望雲集望雲集者淮南郭奎子章之詩也子章與汪朝宗吳去疾同師余忠宣公闕皆有詩名此集得之巢縣丞周仲舉蓋巢有刻板髙季迪缶鳴集二集二首右髙季迪缶鳴集建寧知府芮麟刻之郡齋惜其謬誤頗多未嘗校正金華胡仲子嘗為作序又不知以冠篇首蓋出一時率爾之為芮來京時以此册見遺芮聞余言甚喜將歸成之未行而遽卒亦可惜也右髙季迪近體詩余舊録於陸伯陽季迪近體五言律勝其古體則樂府及擬古勝為文長於敘事洪武初預修元史除户部侍郎遂罷歸後坐事卒於京師姑蘇雜詠右姑蘇雜詠一册前史官髙啓季迪撰刻板在毗陵王達善學士以見贈者其詩備諸體每一披誦恍然如親遊闔閭故墟歷覽陳迹興懷古人可感可慕不自知其慨歎之至矣楊孟載詩楊孟載名基吳人工詩與髙季迪王止仲徐幼文為文字交孟載洪武初嘗為山西按察僉事此詩其手筆廬陵劉彥信遊浙得之以見惠云胡延平詩延平永樂十年以子廣貴贈翰林學士其平生行義政事見余所著傳詳矣延平自可以不死况有子乎文山行述集杜文山舊有集杜絶句二百首敘述甚詳此集為一詩蓋亦本於公所自述云古賦辨體右古賦辨體一册元進士廣信祝堯所輯余得之兵部金尚書學賦者必考於此而後體製不􅍝王竹亭竹亭先生於詩古體用志魏晉以上近體不肯出中唐下此集蓋先生沒後惟據舊稿未嘗選擇而草草編刻者舊稿頗聞多遺失凡先生平生所自謂得意者余少時嘗鈔録數十篇其後失之今見於此集者亦無幾甚可惜也常建詩唐常建長安人玄宗時進士授盱眙尉世傳其詩集一卷今巳罕見余客武昌時一日同陸伯陽造吳孟勤先生時先生初得此詩以示余兩人伯陽戲曰老師無所用此宜以惠教後生先生可之余曰以教後生則僕當得蓋余少伯陽七嵗先生笑指門外汲井者曰二賢請賦此先就者持去余詩先就曰皎潔如明鏡銅瓶下愈深妝成不照影應恐墜金簮遂揖而取之三人相視大笑伯陽遂不復賦謂余曰宜録一本納我以謝不悌既歸即録送伯陽伯陽取謝玄暉詩見報謝詩亦今所罕見者後相姪持去失之此詩余得之二十餘年伯陽去世十有三年吳先生捐館亦十年矣每一披閲追思當時遊從之樂未嘗不歎息而怊悵也宛陵集右宋都官員外郎宣城梅堯臣聖俞宛陵集六十卷今宣城太守袁旭所重刻也何為刻之表先賢以儀後進者太守職也始宣城郡政久弛袁君至單志竭慮剃姦滌穢期嵗之間橫民以戢良民以妥修舉學政爰興教化表章先賢風勵多士於是修都官之墳率學諸生行展謁之禮而詢求其文蓋郡人莫或知者及訪都官之後始得此編遂刻以傳聖俞當仁宗朝與韓范富歐諸公遊聖俞詩名特盛於時最初王文康公曙覽之歎曰二百年無此作矣而見知歐公尤深相與尤密時蓋有擬歐梅於韓孟者非宣城山川靈秀之所鍾歟今天下學士君子皆知聖俞為宣乏傑出顧宣之人有不能知此袁君之心所不容己也聖俞平生所著又有唐載草六卷詩小傳草卷注孫子十三篇又嘗編修唐書此亦後來宣之人所當知者因并及之五倫詩右五倫詩一册松江沈翼之所編翼之二子度為翰林侍講學士粲為侍讀刻此以傳其用意甚厚惜其遺逸尚多而擇之未精耳楊和吉詩集附蕭德輿故宫遺録余生十餘嵗讀劉雲章先生和楊和吉灤京百詠詩思見和吉之作不可得今年在北京康甥孟嘉館授文明門得此詩於其徒又有和吉西雲小草野人雜録悟非小稿通為一集而附蕭德輿故宫遺録在後皆勝國遺事可以資覽閲備鑒戒和吉名允孚吾家湴塘之族嘗以布衣客燕都往來兩京德輿名詢亦吉水人洪武初為工部主事嘗隨中山武寧王治元故宫為親王府故皆能悉之張日昭族譜序後吾邑張日昭來京師持乃父宗震翁所為張氏族譜示余求余識一言宗震翁端雅和厚孝友行於家庭忠信重於鄉閭以書詩率子姓以醫之術濟利于邑人蓋邑之人無有不德宗震翁者余知之素矣余又數見先生學士作為文章載張氏上世之事謂在宋之時巳有用進士顯者其後子孫相沿襲為儒醫皆有隱德蓋又知其世矣嘗竊以為今世之人族姓蕃衍遂不昧其尊卑親疏相視敦睦敬愛猶有古人宗法之意者繇其譜牒之立也然觀於譜牒者又必求其子若孫之能稱乎先人與否以為榮辱焉此非謂其貴富祿位謂其孝友忠信廉潔之道可以繼之耳故譜牒雖以考本源辨親疏為義而昭先德警後裔之意亦具矣宗震翁為此譜其意固將以警後之人哉夫積之於先必徵之於後宗震翁之不墜其世若此斯其積於先者之徵矣而宗震翁又繼繼積之則徵於後者豈少哉宗震翁固將以警之也然則由日昭兄弟而下尚益思所以善繼之道書郭彥常墓志銘後彥常沒之十有三年其配蕭氏亦卒又二年其子公緒得吉卜於大𣲖嶺之原改葬其父遂奉其母祔初同里蕭仲謙甫之子諱繼柔靜貞惠始彥常孑孑孤立簡求賢配遂聘焉年十九歸郭氏力佐夫植其家而處族姻和上下辨內外皆當其宜夫亡持其家一如夫之未亡也公緒自陜西僉憲改浙江迎母就養公緒操行廉潔雖貴而貧母甚安之常市一幣為母製衣既成而疏薄不稱公緒意將圖改製焉母聞之歎曰為子乃不知母乎吾為女從政不忝君命不辱父教足矣衣食豈吾志乎且為國家任風紀之重而顧以衣食樂其親乎言未畢流涕泫然公緒跪謝不敢圖改製乃巳於乎賢哉母也其卒以永樂戊戌六月九日距其生蓋六十年葬巳公緒既刻余所銘其父之文于墓今年起復來京師改僉憲廣西將行拜余泣曰惟先母之德實配先父惟執事哀憫而光昭之俾並傳焉庶幾先母為不沒也余與彥常皆微時深友知其外內之德為詳故不敢辭而為載其大槩於其父之銘之左方以示其後人題贈馮寅賔詩卷後馮寅賔先生吉之永新人馮世儒者以春秋名家元初魯山先生二子長奬翁次翼翁皆擅經學稱三馮二翁皆舉進士翼翁官至撫州知州寅賔先生撫州之子少侍父宦遊於外博學負髙才俠氣嘗有志武事視時無足當其意者故卒齟齬不合元季冦亂起凶渠竊據者初欲屈致之先生義不汙賊將生繫之遂逺引去至姻戚遭其毒害終不顧國朝混一宇內遂放情山水間與廬陵劉仙客泰和楊自立羅子理鄧崇志為文字交寅賔先生文章竒古峭厲不作尋常語書宗鍾王清徑無一點俗氣洪武七年卒於泰和遂葬焉先叔祖武山公夫人寅賔先生女兄余幼時以姻家子屢親炙焉故頗知先生大槩今其子紹宗寄此卷屬志一言瞻睹遺像豈勝思念又念世之知寅賔先生者加少故書余所知者復之俾以示其後人云艾氏譜後家之有譜猶國有史貴紀實也史而不實則誣故良史不知者必闕孔子曰吾猶及史之闕文以見古人慎重之意譜者記吾宗本原之所自支𣲖之所分尤當慎重者也儒先君子之為譜莫善於歐陽文忠公歐譜闕其七世蓋紀實也今觀永豐艾氏譜一出紀實永豐歐鄉也非有得於文忠而然哉譜有方春惟慶方直自序述其先為詳嘗見鄉先生劉申齋為文贈方直且極道方春之學之德固艾氏之先多賢也吾仕兩京於晉府長史少嶽給事中廣有往還之雅二君皆有才行而廣起家進士艾氏之賢尚有繼也因覽斯譜遂題其端云至善齋説後錢唐朱子澄以至善名齋而郡人李煜為之説善者人得於天以生之理也惟聖人能全之衆人蔽焉而不能全故經傳所載聖賢所訓皆勉人明之復之其造乎至善者蓋能復而全之能復而全者可以事天不能復者不可以為君子故君子之學必求造乎是焉子澄其志於君子之學者歟子澄不作數十年其子暉寶藏曄之文間出以求余題至善之旨具諸方册至明且備即而求之足矣而又奚待後來者之置喙也竹林清隱記後先師海桑先生以易書詩教授學者從之者甚衆而求文者亦衆然文未嘗茍豫豫者未嘗茍許可而啓道誘掖之意恆若不及春秋八十餘施教不倦是時邑中老師宿儒多在而先生齒德文學皆尊仲敬於先生同里授徒之暇蓋未嘗一日不造詣侍教蓋先生為此文時年七十有七後五年仲敬舉孝廉得荔波縣丞先生作詩送之蓋明年先生捐館其改賀縣丞先生不及見巳仲敬字一敬平生與先生之孫孟省及余最交厚今獨余在覽此文不勝感愴先生沒今五十年仲敬沒二十有七年其子常州府學訓導永寶藏先人手澤皆完好如新而先生平生著述滿家諸孫不能什襲今無一筆存者人賢否不齊念之益重感愴也用敬識于下以歸永王氏族譜序後前翰林學士解公序吉水王氏族譜王氏之孫文子以示豫屬識一言解王世婚姻家故述其先世特詳王之先自金陵徙吉水宋元皆著科目蓋詩書行義代不乏續表表故家也大抵富有不足以擅名家擅名家者必其詩書行義有肇於前有紹於後足以重州閭光簡册而後名故家為無忝故王之先世雖常積纍千金然所以名故家初不係此世之汲汲於千倉萬箱之儲以圖大其家而所行或畔於德義卒之淪陷僇辱身將弗保况家乎詩曰誠不以富亦祗以異王氏所從來者異矣文子比嵗發廪以助邑大夫濟民於飢嵗事聞朝廷遣使齎璽書勞之旌為義民王氏有後亦他之為故家者所鮮儷也解序所載克開者蓋與吾家時英府君同中開禧三年鄉舉楊王亦通家也故為識于序後以歸之胡剛簡考功厯後士大夫以道事君責難陳善身不暇恤其暇恤名哉剛簡公以忠遭竄斥至追毁其出身以來文字陋哉小人之為也公身歿而名譽彰天下公義不可掩後之襲為小人者可以鑒矣髙氏白雲山舍詩文後右髙氏白雲山舍詩文自虞道園至蘇伯修十又一人雖有崇庳隱顯之殊然皆當時重望偉人蓋髙氏家寶也亦可以考見髙之賢後歷兵變髙之子孫不能守而淪落異姓近歸番陽儒者戴某重裝為卷雖勝代故物而完整如新不遂見棄於庸夫俗子泯滅於煨燼不幸中有至幸存焉戴之寶此豈獨重其文要在其人重其人而考其行之善者以圖跂及焉君子之事也承出見示故識于後以歸之題董以中傳後沈志行著董以中傳述以中深於醫且德其愈母之疾而又悉其素行先儒謂病卧於床委之庸醫比之不慈不孝然今之業醫非庸者蓋千百之十一志行得以中非求之審而擇之精歟可謂孝己語云無恆者不可以作巫醫恆者貞而不己之謂以中素行如此宜其術之精而效之著也俞叔銘吳純伯皆於以中有始終之道亦足以見其取友之端矣志行於此傳又屬學士君子題識以傳吾聞以中嘗言不求知乎今然則志行之為安知不見哂於以中乎贈醫士蔣天祥卷後右武昌諸士友所為長史掾陳希逺贈醫士蔣天祥詩文一卷余來是邦主蔣氏久而知之深其業藉數世之舊久而益精其心恆急人之急唯恐有未至庶幾古所稱醫師之良者而今之世有求乎人也始則敬愛如子弟之於父兄既得之漠然同於行道之人者比比皆然希逺德天祥起其妻之疾能不忘而力於報其報又非徒尋常俗薄之為必求斯文經久之託其亦異乎人人者哉於乎困而不恤非仁者之心受而不報非義者之行天祥既用其仁希逺又篤其義斯文真不忝哉跋扈從詩與鵷姪右數詩去嵗十月扈從車駕􅛍邊出居庸關至宣府往還道中所作時天氣甚暖常嵗所無緣邊禾黍皆熟收穫已竟所遇咸有真趣獨經坦行兄謫所追惟感愴情不能已爾坦行子壻故録示觀之重録送鵷詩跋尾永樂壬辰之冬十一月為此詩與鵷别今草有九年矣鵷近輯余所與之詩為卷寄北京乞題於後而此三詩不在蓋初歸時其父讀之哭慟不己或者恐傷其父之心也故藏之而自是不復見也其父沒今七年余年亦七十有六願其兄弟叔姪相親相輔之意雖老猶切也故重書此三詩於後以歸之旅艮可以共觀也正統五年六月十八日燈下草草寫逺齋記後右元程文憲公巨夫自作逺齋記嵗寒亭詩序及四雪詩吳文正公澄為文憲作晉錫堂記今文憲之孫南雲重書之屬志嵗月于後將刻石以傳蓋至元二十三年文憲自行御史臺奉詔求遺逸江南明年以趙文敏公孟俯二十餘人入見皆見奬用時文正雖至不仕而去文憲猶力言其所著書可以教國子傅天下詔遣官繕録以進文憲時拜集賢直學士逺齋記蓋作於是嵗大德四年拜江南湖北道肅政廉訪使居武昌時冬作嵗寒亭七年湖北代歸居旴明年築室於麻源第三谷又明年作晉錫堂文正所為作記者也文正蚤與公同遊徽菴程先生之門公嘗題文正所居曰草廬蓋相知最深云元有天下將百年東南士君子以聖賢之學渾厚正大之文登清要踐通顯者自文憲公始其事業具載國史而所薦引如文正文敏而下知名尤多君子事上莫大薦賢文憲之功盛矣哉南雲公之五世孫歷事三朝今為吏部稽勛郎中兼翰林侍書日在天子左右退而惓惓於先世如此又有以觀君子之澤矣夢存詩序後讀翰林修撰梁公所作劉選舉善夢存詩序蓋知選必能勉於善也夫夢之所行即心之所存心不忘乎親必能敬其身身者親之遺也吾與選同里與其父文復往還文復孝友樂善親賢重義勉其子學問尤力選為邑庠生以能書舉在京師數年誨飭之牘未嘗旬浹不至也愛選如此選安得不勉哉雖選蚤喪母繼母姚愛育選踰於所生選亦克善事惟謹此皆文復躬之刑於家者乎蘇文忠公有言稱人之善必本其父兄吾故於選云然書王修撰送行序後吾邑尹子源涉獵書史知理道以才舉今得福清河泊官翰林王修撰行儉在北京贈此序重同邑之義也之兩人者皆與余久别余為之鍾情雖子源今得暫見而又將有數千里之别再見未知何日於情益當如何哉雖然離别常事士之仕也在慎所操以忠所事此子源今日之當務子是行必勉之也子之才詎止乎是然行逺必自邇登髙必自卑惟力乎巳者以待之耳庸書此於行儉之文之次為贈蓋亦友人之義也書東郭草亭宴集詩後北京山川之嘉麗園池亭榭遊玩之勝甲於四方城內外貴家富室髙甍大棟相聨屬華筵盛集觴豆之珍嬌艷歌舞之娛惟日不足然所相與同樂莫非志騖乎外者茍志適乎內有所弗屑矣鴻臚卿大興楊君思敬每嵗季春之望必置酒會文儒於東郭之草亭自正統改元之嵗至今已未凡會者三與於斯者皆文學之名流極觴咏之雅致賔主洽歡適乎內而遺乎外京師若斯會者殆千百之十一見也非由鴻臚之難遇乎三四年間盍簮諸君子已有存沒離合之不齊蓋亦嘉賔之難同也嗟乎蘭亭己矣後世所慕之者以文字存焉此東郭之集諸君子不容於無作也己未之集余以南歸不及與鴻臚間出其詩若文屬余題因附氏於末云是嵗六月三日周氏世直堂後國家之所恃與士君子之所以自立者正義直道耳不可一日忽忘者也凡世所謂故家者亦以其有作之於先又數有繼之於後而豈富貴之謂哉周氏之先偉矣尚在其後之人引之勿替東里續集卷十九
