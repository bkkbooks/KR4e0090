body:
  text: 東里續集卷三十五明楊士竒撰墓志銘兵科給事中胡端禎墓志銘數年來吾郡吉水舉進士升者胡端禎王欽正皆溫厚謹靜言動循禮余心重之皆期逺且大也上屢勑廷臣舉賢才余未嘗不意在兩人屬例不應而止未幾兩人者皆以病卒余皆悲悼久之蓋悲夫賢者之難得而易喪也欽正卒於北京其喪之歸也豫為之志墓端禎以病歸卒於途故未及也今年其學者餘杭丞貴溪丘熙嶽具禮幣以英山教諭徐鼎所具事狀求余著葬銘按狀胡邑東故家蓋宋剛簡公夢昱之後曽祖抃祖義賢父希亮始徙邑仁夀鄉之南華母金塘里王氏端禎諱祥以字行天資淳實自少喜學問從明師治經術以易經舉登宣德五年進士第既第而歸從學者日衆有千數百里負篋至者八年被召至偕至者六十餘人上親命題合試之文淵閣下拔其尤得七人端禎與焉改翰林庶吉士明年擢户科給事中無幾得疾歷數醫弗效已而小瘥請於朝乞歸治從之歸過南京疾復作竟卒和州西梁山下其妻之弟羅昭問以其櫬歸其家葬之黃桐坑之原端禎為人學廣識明言簡志正舉錯當義不茍止隨內篤孝弟之行外崇友朋之信和厚平直博愛有容蓋以施無往不可惜乎其遂止於斯也享年三十有八平生所為詩文藏於家娶羅氏惟女子二人長許嫁王某次尚幼身後之祀尤可歎也若熙嶽之惓惓圖不泯其師亦足以敦薄夫而表端禎之明於取友也銘曰德之茂而施弗究存之厚而遏厥後嗚呼端禎吾奚歸咎故翰林庶吉士曽君墓志銘吾友曽君與賢自吾布衣時與之好後同在翰林五年往還意益厚其沒三十年矣墓未有銘余未嘗忘與賢屢欲銘之輒牽於事或病不果今年蒙上恩歸展先墓其子詡踵門拜曰先子之銘文企佇久矣乃按詡所述世家序而銘之序曰曽之先居金陵唐末稱朴者生三子其季延構當五代之亂來徙泰和其後子孫之盛纍纍有科名十四世至如驥登宋淳祐十年第纍官寶慶府通判兵亂死節贈敷文閣待制諡忠愍生昌端昌端生以立以立生子述皆儒業教授里中子述娶劉二子長與耕次與賢也與賢自幼淳厚端謹從學蕭尚仁先生父子之門治書經邑大夫簡充學弟子員登永樂甲申進士第為翰林庶吉士預修永樂大典寅出酉歸恭勤職務時四方博聞宿學多在咸重與賢而期其逺且大也書未進以疾卒於官戊子嵗三月十五日云享年四十有一京師薦紳大夫咸悼惜之與賢儀貌豐偉面潔白如玉氣宇溫裕坦夷家居篤孝友之行初雖出為贅壻飲食衣服所以佐其兄奉養皆備已而還侍下朝夕益盡愛敬及仕得祿一味之甘必先寓奉親然後及已兄弟相親愛不間如一體處朋友以誠有急必赴同學湯如川既仕同年同官且居同舍有無共之無彼此之異如川病極力扶持調護及卒與其弟協力經營歸其喪及其孥而悲傷憂鬱久不衰鄰有數犯之不校與賢有愷悌慈惠之德使之為政必有以及人惜乎未見諸用也其配蕭側室劉相親愛如同産姊妹至于今益篤世蓋絶無而僅有又可以觀與賢德之刑於家者矣子男二詡京女四皆有歸其仲之壻龍粲今為禮部祠祭主事孫男五鑑翰海鉉鑰其葬在龍池之原銘曰允矣君子其德令嘉未究于施匪命則那粵昔德人善應多有有不于躬必于厥後龍池之漘勒銘其藏振振子孫來將有徴伊允德墓志銘翰林庶吉士伊侃既奉命觀政禮部聞其父喪將歸縗絰齎翰林編修徐珵所具事狀謁余求葬銘其父諱宗肇字允德伊之先家海州沐陽宋南渡始徙蘇之吳縣自始徙至允德九世矣曽祖諱元裕祖諱嗣賢考諱服皆隱居不仕妣朱氏父母二子長宗啓次允德也允德自少喜讀書多識典故有咨之能悉舉本末前輩文章之雋永者亦多所推讓蚤喪父事母與兄以孝友稱弱冠兄坐纍闔家徙鳯陽之定逺久乃獨奉母還母沒葬祭如禮兄尚留定逺嵗時厚資給之一味之甘必致兄乃食平素所接率端士不肯茍近富貴人居鄉敬老尊賢恤貧窘急患難所交李克明者夫婦老且貧館穀之終其身比卒皆為斂葬遇為不義者其可與語必婉辭導之改不然輒引避之所居鄰府治未嘗一涉迹嘗寓南京夜雪有騎士葉英醉馳馬過其門墜仆卧雪上馬已逸允德掖徙葉卧門下葉醒失馬虓叫急索門外人語葉允德徙若葉遂持允德索馬且欲訴官允德不得解勉酬之直既解葉歸馬已歸其家櫪上葉大感悔走詣允德拜內直謝曰公仁人活我我則負公願自今父事公終身幸公不我絶允德慰遣之但戒其繼此節飲允德素不喜浮圖人有及門者一切卻之曰吾不能有益汝臨卒猶戒家人毋信用流俗言以異端汙我可謂不惑也已卒於正統己未八月二十五日享年七十元配毛繼袁及蔡皆先卒子男四訓亦先卒次任次侃正統丙辰進士次俊女二長亦先卒次嫁王澤孫男二女一諸子以卒之明年某月某日葬其邑查山先塋之次銘曰善篤于家孚于鄉夀而全歸此其藏後有續承世其昌陳德遜墓志銘陳之先見余所敘其譜牒德遜之曽大父碧潭大父觀定父彥和贈翰林侍講學士母曽氏繼母胡氏鍾氏曽及胡皆贈宜人德遜其名既冠遂以為字自童丱端重溫粹從余外兄陳孟省學在諸生中獨靜而専為老長所愛蚤喪母幾冠喪父能自卓立有孝友之行兩事繼母皆盡愛敬弟德遵喪父時始齔長育教訓之用意周悉凡於事不肯茍且惇義薄利而有恆心閭巷愚劣徂詐之徒旦起而夕仆者比比德遜獨謹守先人田廬終其身不銖寸虧益而坦然如履康莊蓋無所騖乎外也間居手不釋卷作室數楹積書其中題曰靜修非其人不處雖縣長二或其行弗臧而欲邀致德遜必以事辭所居近市而嘗入南山中講授自適德遵第一人進士及第纍官至學士衆皆為德遜榮德遜泊然而愈執謙下且數寓書勵其弟敬慎聞弟疾甚匍匐走北京視之留數月疾已即歸德遵固留之歎曰吾老矣人世幾何寧不懷兄弟同處哉所中心不忘者去鄉久諸兒或一背訓教將不可追改蓋其於教子尤切云既歸再嵗而卒正統丙辰閏六月七日也享年六十娶羅氏子男四瓛􅟛璧瓄女四皆有歸孫男若干德遜之卒也朝之傅保尚書學士以下聞德遵之賢兄歿皆致賻祭亦有為文章哀挽之者余昔與德遜同里閈其從父一敬於余交莫逆家居時屢從一敬過德遜愛德遜和厚願慤言必在義今十數年來里故舊亡歿已盡每念幸獲歸休可相與談論者惟德遜而德遜北京臨别亦為余言當豫作草亭於鷗江之上以待先生嗚呼今則已矣德遵求余銘德遜之墓遂述余所望於德遜者為辭銘之曰蕭散兮容與懷思兮偕處子期余兮鷗之渚余行未旋兮子逝何所嗟余旋兮其誰與張則善墓志銘秀水丞張僉謁選京師主吾家近喪其父處士君僉聞訃號慟劈踊不能勝豫弔之既成服將歸自述事狀求豫志墓張故西昌巨室田廬資産鄉甲乙數元季之亂銷落奄盡里老長率能道其家盛時後生少年聞者皆歆動嗟歎不及目見于時張之子孫皆逢掖治詩書鄉稱善人如處士是已處士諱則善字嗣騫自少志不務外學通尚書嗜毛詩手録口誦不倦成童父母皆喪辛勤涉囏苦卓立闢孰館教子及里中子弟廣田園以殖家姻戚鄰比能急其急氣和色溫於物無忤無間愚良少長皆樂親之正統五年正月某日卒春秋七十有四元配彭里名家繼羅皆先卒子男二長坦選鄉貢入胄監甘貧力學其卒也大司成以下惜之次僉永樂辛丑進士擢四川道監察御史能持身勤職三載坐微纍左遷秀水女三廖祥仲劉暉陳叔慶其壻也孫男六朴巽彖渙蒙觀曽孫男四處士及其二配皆葬里命華山之原某仕兩京不至鄉四十年與處士相聞未相識也去年奉命歸親過處士之廬時處士寢疾已久不遂一晤語以出頗用悵惘而竟以是病不起惜哉銘曰恬淡幽貞避榮與名既夀全歸來嗣有興贈文林郎四川道監察御史歐陽君改厝志銘監察御史歐陽洙既升四川按察副使瀕行請於余曰先考之沒而葬也嘗有銘矣洙忝官於朝得賜勑推恩贈考文林郎四川道監察御史封母孺人洙又得吉卜改厝先考於某原改厝之銘願徼惠於執事歐陽氏蜀江里名家其先與宋文忠公同所自出入國朝階儒學登仕籍纍纍不乏歐陽氏於吾家相望半舍許吾少交允堅允清而尤密者允賢於允俊允和廣哲廣湯廣洙皆相厚余嘗銘三峯先生及允賢之葬矣於洙之請宜無辭洙考諱正字允端幼孤卓然有立志不與羣童狎嬉辛勤植門户敬事其母孝於奉先處宗戚鄉黨咸當其分而持身謹飭家距縣城甚邇非公事不輒至平居淡然日與族父兄弟宴聚相娛樂於禮接賢士大夫無厭倦意出言人率信服於教子最為要務宣德五年十一月十八日卒享年五十有五其曽祖覺先祖以吾父子廉母某氏其娶某氏子男四長即洙永樂某年進士發身入風憲次淘次洛次汴孫男八璲琢琦珉珂其改厝以某年月日銘曰維歐陽氏之宗育慶垂祉學古入仕連續興起維允端甫德善有紀弗騫弗揚丘園樂只身沒名榮歸寧在此李子懷墓志銘廬陵李子懷之子子潭幼喪母戴氏鞠於其舅遂冒戴姓既長明經為國子生中鄉貢選請于朝願復李姓以求養其父命下而喪父之訃至矣子潭銜哀茹苦將奔喪而歸自為狀來乞文銘墓且曰不肖不孝生不能供吾親一日之養吾親沒又無以慰之於地下不孝益大矣幸必賜之銘辭弗獲按狀豫懷諱衷其先出唐西平忠武王晟曽祖雲隱祖慶可父景琳母歐陽氏景琳三子豫懷其季也自幼失怙事母兄能盡愛處族姻有義叔祖明叔天麟天瑞皆官於貴播在夷獠之間鬱鬱乎羈旅無聊也君走數千里往省慰之既歸叔祖叔相繼死皆有遺孤子不能歸且貧無以自活君又槖資走數千里往給之又撫之皆有立然後歸嘗贅同里戴庭芳氏庭芳早世撫其孤稚子如同産昆季卒大起其家然終不私一錢鄉鄰有急奔走赴助之未嘗以私廢平居尤以教子為務嵗時闢孰館延明師禮意曲盡嘗語其子曰吾生長兵戈之際不得從事於學今且老矣若等幸生遭明時毋徒視我自棄也嵗永樂乙酉二月某日以疾卒享年若干子二人長子泉次即子潭女二某某其壻也孫男若干嗚呼若豫懷可謂善人也已銘曰慤乎內不飾乎外樂乎義弗徇乎利弗融於世而止於是以昌其嗣羅處士墓志銘廬陵羅處富既登進士第歷事秋官秋官卿上其能擢知隨州且行持鍾子溫所狀乃祖處士之行示余且言元大父沒幾二十年惟窀穸弗獲永固也家父將卜改葬焉而幽堂之銘未有所屬敬命不肖以請於執事余交處富久而銘其祖之墓又出其父之命也則按狀敘而銘之處士諱思成字存中號天存世家廬陵業儒其先嘗以科第顯於宋曽祖某祖某父獨清福建儒學提舉與劉申齋劉桂隱齊名母尹氏處士質直溫厚尚端潔敦孝弟之行家四世同居爨愈愈然和也處士博學強記尤深於詩書少時屢聚試郡學皆出諸生上嘗挾所業謁歐陽楚文公虞文靖公皆愛重之一時名人如進士劉聞薩都刺皆與之交而尤與豫章辛敬襄城楊士宏暨劉尚書嵩厚善嘗一就試于有司不偶遂隱居不出務以善導人鄉閭悍暴化其德者多矣遇有急難趨赴之惟恐後皇明混一海宇數下詔求賢時年巳六十餘不果上蒼顔鶴髮逍遙青林白石之間日引子若孫與其鄉人少俊講説聖賢道德之懿暇則登髙臨清觴詠以為樂年八十一一日具酒殽召親友告曰吾明日且與諸君别及期正襟危坐索紙筆賦詩翛然而沒時洪武戊辰四月十二也娶蕭氏先十九年卒子男三人長于邦亦先卒次于京來求銘者次于同女一人適左子聲孫男女皆六人始葬于所居之後今將以某月日改葬吉水縣麻坑之原夫士挾一才一藝無不欲見用於世至其用之未必皆能有所自見也處士雖未用然平居所及若此孔子曰奚其為為政處士之謂乎銘曰其畜也富而不顯其遇其處也庳而弗遏其施躋于耄期昌其本支天之報之其不在兹乎鄉貢進士羅仲辨墓志銘吾邑羅孟昭之冢子曰􅋒以易經中永樂九年江西鄉試明年會試下第為國學生又明年冬得疾又明年其父走千里視之既見疾小間數月更劇遂不起其父哭之慟其所相知在京師者皆往弔之於是其父將以其喪歸葬西昌屬前溧陽縣學教諭梁本之述其世次行誼以屬余為銘余受而讀之曰嗚呼孟昭之愛其子與􅋒之克敬承其父之愛皆余所知而今已矣其可悲哉方􅋒髫齔已俊爽異常兒是時蕭尚仁謝子方兩先生皆鄉郡之通儒孟昭延致蕭先生家孰以教􅋒蕭先生沒又延致其子靖江府長史用道用道出仕謝先生方分教郡庠則厚幣遣􅋒往從之嵗時備事師之禮謝先生沒又禮致今廣西按察僉事陳公延教之而遇縉紳儒者之往來其家孟昭皆極意隆奉庶􅋒之益得師也愛􅋒如此􅋒亦勉勉敬承其父之愛夙夜飭勵自力於學不懈邑大夫舉充博士弟子員未幾選中鄉試其會試京師也余時奉命主文衡蓋竊意􅋒褎然遂升也既拆名而􅋒不與余方內愧失士而􅋒數過余怡然益恭下無幾微不得之意余又竊歎􅋒之中有過人者其所就未可量也既入太學太學生時數千人祭酒胡公課試之得􅋒所作文大喜置第一明日告余曰西昌後來之俊不乏也其所可望成立如此嗚呼豈謂一旦而遂已也是豈不可悲乎􅋒字仲辨一字崇辨事父母甚孝惟一弟篤愛之惓惓焉引之於道所得一錢以上皆歸父母恣弟妹所取未嘗以入私室於族姻長者盡敬愛幼者皆有恩意凡所交遊有急盡力赴之慮事精密雖微細必審而後動間居手未嘗釋卷率嘗至夜分始罷在太學有暇輒來余家嘗謂余曰蘧伯玉至老不忘省已以此為君子又曰人卑卑不出閭巷以日親乎賢士君子惡能知其行之非哉嗚呼使􅋒而假之年所至可量乎惜哉母胡氏配陳氏皆名族子男一某始五嵗􅋒卒以永樂十二年五月四日得年二十有七將以某年某月日葬某鄉某原銘曰梅溪之涯羅世所家遷邑城西源流之支既續而蕃益阜以殷􅋒也不羣縝栗秀文績粲翹英衆望其騫孰其遏之弗舉而捐命也奈何其藏在此史氏銘之庶其不死蕭吾幼墓志銘洪武癸酉冬十二月泰和蕭吾幼卒權厝其居之西偏又七年之十月十五日子建平改葬于千秋鄉髙富里田北之原既葬屬余為銘按吾幼諱某祖明叔考志可皆有隱德母劉氏吾幼為人悃愊不譁事親誠至處族人兄弟周恩義與朋友恂恂人未嘗見其有艴容厲氣所資度可寒暑朝夕而足不求有餘有餘遇所識窮乏輟分之凡所為一出乎天資庶幾古所謂善人者矣享年七十有一初娶劉氏繼彭氏子二人長某兵亂被俘不知所鄉次建平也溫厚謙謹類其父豈天所以報施善人者耶銘曰一世之人為善幾何為之自我有弗至耶彼弗為者自淪泥汙嗚呼吾幼善則既多百嵗之後髙墳峩峩鄉人銘之永終不磨吳處士墓志銘永樂丁酉某月某日南昌處士吳孔昭卒其孤頴領預頻卜明年某月某日葬其邑南山之原先事遣預之子某奉刑部主事劉全節所述事狀走京師介翰林庶吉士黃瓛求余為銘按狀處士諱嗣麟孔昭其字也其先有諱誦義者始自番昜來徙而後益盛誦義六世至茂翁茂翁子存拙為新建縣學教諭處士之祖也父本立母張氏處士自幼喪父母教養於其祖其天資端重聰敏讀書日強記數千言稍長而記覽益富為祖所愛恆慟不及事父母事其祖尤篤孝敬有盜入室縶其祖索貨財不得將加害之處士哀叩乞以身代寇怒刃之流血滂然而容色不變寇驚異併舍其祖而去祖卒哀毁不勝而葬祭一以禮嘗同從父本謙長繇役里中屬有令下長里者驗民無常産者遣出戍既遣而有不樂戍者後誣本謙為已親告牒取代戍本謙時已卒其子當往初未嘗誣及處士也而處士忿曰當遣民戍時我實同之奈何獨誣叔而貽禍其子乎毅然白其事於官竟直之待弟孔哲盡友愛孔哲死撫其遺孤尤厚從弟孔性闔家病疫莫或過問者獨處士日數過饋藥餌病已乃罷於族姻有匱乏及喪不能舉者皆賙之治家教子一本於倫誼間居手不釋卷與人交始終一致所居有竹數百挺名竹亭日與賢士君子宴遊其間鄉先生傅拱辰熊伯機皆與往還熊先生嘗以正德題所居之室又為文記之蓋年七十有五而卒娶陳氏子男五頴領預碩熲預永樂乙未進士某官碩先處士卒女一嫁李伯希孫男十有一人銘曰孝友好義身之章兮茹淡履潔含幽光兮服蘭與茝遊相羊兮鬱乎崇丘返兹藏兮述行琢銘後之彰兮宋東齋墓志銘嗚呼前二十年西昌老師宿儒凋喪盡矣獨邑之西城有宋東齋袁顔樂梁畦樂三先生者皆教授里中其年相若其居相邇其出入相偕其鄉衣冠之會必皆正賔位其邑大夫政有所疑必皆見咨決居數嵗袁梁兩先生相繼沒矣獨宋先生巋然在也其鄉衣冠之所敬禮其邑大夫之所咨疑猶繫於宋先生而宋先生尤好賢重士如安城劉雲章東昌謝子方兩先生皆經師之巨擘來學之宗範其過西昌也皆嘗主宋氏孔子曰觀近臣以其所為主宋先生豈易得哉而今又沒矣斯豈獨鄉之衣冠及其邑之大夫所戚將他處先生賢者之過是邦皆思宋先生豈易得也宋先生之沒且葬其子刑部檢校琮以海康文學廖潛仲所述事狀屬士竒銘謹敘而銘之敘曰先生諱禮字學聞一字伯循宋之先居常州江隂後徙臨江之新喻至邦傑又徙廬陵熂下世業儒術邦傑四世至敬仲又徙居泰和之登科里子應徴宋大理司正司正生敘平先生曽祖也祖仁逺考日新皆蓄厚德先生自幼聰敏母曽氏始教以孝經小學輒能成誦稍長好讀書有志卓立成童喪其考妣葬祭能不違於禮撫育二稚弟盡友愛時丁元季之亂挈家避兵禍趨山谷中季弟文濟失足墜崖下碎首血雱然流幾絶先生冒險赴救裂衣裹負而走久乃蘇國朝既平定天下先生亦壯日勵志問學受詩於雲章先生會有詔下郡縣立社學縣令丞請為社學師篤於訓導作東齋於秀漢之上講授之暇藏修其中是時鄉先生海桑陳公竹亭王公及其弟崇慶太守愚寄廖公國録蕭公尚皆無恙先生數延致觴詠齋中于于然樂也先生天資剛果是是非非不為容恱不揚已以掩人有匱乏者輒賙之娶劉氏生女一人無子以文濟子為嗣即琮也甚鍾愛嘗曰愛子不教之學不可謂愛教而不授之經不可謂學然經必得明師遂遣從學海桑陳先生海桑先生卒又遣從謝先生琮竟以易經領薦會試禮部第一賜進士出身歷官監察御史給事中皆以能稱得以祿就家養親為先生榮然其初授御史先生為詩五十韻勉之清忠勤慎既而纍纍詩勉之臨沒又為長詩誠之可為篤乎愛子者也女適曽子沂孫男三蒙謙旅女一曽孫女一先生贍詞章嗜草書間暇吟詠以自適自號歪吟翁所著有東齋集艮安别墅集藏于家其卒以永樂丙申五月丙午夀八十有五以卒之嵗某月某日葬邑某鄉某原銘曰以學植身爰暨嗣人蓄焉弗施其嗣發之既夀考終以復於是無替引之永昌來裔故武略將軍吉安守禦副千户王君墓志銘吉安守禦千户王業以工部侍郎周公所狀其考君事行求著墓銘余家吉之泰和業祖母實泰和人其考之甫齓也延余舅氏陳孔立先生教之家孰余嘗造孰中愛其考岐嶷不凡知其必將有立蓋舅氏亦然余之鑒也及余出仕往往聞郡人道其行事為之喜及聞其卒又為之悼歎故於銘不辭按狀其考君諱成字仁美王氏世居髙郵之興化初諱國安者生諱祥元季祥從軍浙西國朝兵初下臨安祥率先歸附授仁和衛千户屬中山武寧王麾下從定中原還調守禦衢州洪武丙辰調守禦吉安子斌襲職嘗假守廣東之長樂討東莞山寇力戰敗之其配泰和義山蕭氏宦族賢而敦禮實生君自幼秀朗闓敏九嵗喪父其母教之於內能専意以聽外則從陳先生授讀講説日擴其聰明陳先生去復從謝子方先生於郡學蓋見聞益廣趣向益端矣時雖久襲職年十五始理公務而端重謹恪發言處事屹然類老成人僚屬不敢忽也公暇披閲載籍涉知其大旨慕爼豆之事郡行鄉飲請於太守願得躬效執事守為設觀禮一位於側以處之嵗壬午吉山谷窮民素為富家所困者有司不能戢無所訴告則相率火富民之廬以快忿焉有司遂以作亂上聞三司即建議發兵討之和者森立君力言此不過愚民復私怨有司遣人持牒召至庭下明其枉直懲之而已發兵即各圖功利而濫及無辜矣議未決朝命下三司止發兵惟執其首謀者罪之餘悉不問蓋如君之意永樂初朝廷嚴屯田之令計所入多寡行賞罰君奉都司檄専督之廉公而勤教率有方軍士咸奮連嵗以贏受賚後建北京率軍士採宫殿材於衡湘善撫綏均勞逸而事蚤集平居事親孝處族姻有恩能矜恤無告蓋寒餒死喪賴其濟者亦多喜從賢士大夫遊以聞善道精武事方志於逺大未巳也而春秋三十有四遽卒衆咸惜之生於洪武丙寅正月十日卒於永樂己亥十一月十九日葬廬陵城北大塘之原元配胡繼李咸克內助子男二長曰業次曰通女四臧安百户麻斌蕭本茂羅勉暹其壻也孫男四昭曜某某女三業既襲職正統初以討安樂鄉寇功升武德將軍吉安守禦正千户可為有子亦繇其考君所存之厚之所及歟銘曰世有乘一障守一陴懵厥德善肆逞毒威僨覆隨之曽不幾時嗟嗟王氏作善有源肇祖歷考暨其子孫咸奮于庸式大其門式用作銘俾刻于墳俾其後昆益勵于仁張宗武合葬墓志銘永樂草一年元氏縣主簿華亭張君以疾致其事歸歸之又四年為宣德二年三月初十日終於家春秋六十有九合葬余山其元配章氏之墓其孤某奉右春坊庶子沈君所狀事行介庶子君求文刻墓石張之先世見前江西儒學提舉楊維禎先生所著通波阡表蓋出宋商英之後始來居杭君之八世祖某遊淞江樂其風土遂擇勝于干山之櫻珠灣買田築室居焉六世祖千一居士又徙居鳯凰山之祥澤匯千一曽孫諱俊君曽祖也祖諱瑤號後山居士務善好施鄉人有佛子之號考諱麒字國祥號靜鑑居士善行行如其父而靜鑑以上數世咸享髙年母某氏君諱桓字宗武資稟敦厚自少不尚華靡服用儉約治家事有條緒秩然孝友有誠母嘗病劇醫不能措手焚香籲天潛刲股煮粥以進母食之愈事兄宗文盡恭愛公私之務皆身任之不以煩兄敦睦宗族敬父之執始終一致延禮師儒相與講學不倦志存濟物有司嘗驗産推長萬石區嵗董輸賦民貧不能輸者率代之輸而不責償飢嵗恆出穀貸匱乏久不能償者率歸其劵平素濟人之急如不及葺鄉校及祀典祠又作義井石梁渡舟用便行路求醫方製善藥用濟疾疢率以為當然兼志釋典施經延納方外之流靡有虛日於為善若渴飢於飲食洪武中以稅户徴至當除官援例辭永樂壬辰復徴至除元氏縣主簿授將仕郎公直廉勤得其民心一日進賀箋京師行次沙河水暴漲覆舟舟中人皆溺君漂流四十餘里恍若有人舉之者及其僕馬皆獲濟人以為好善之應既謝官歸益廣濟利之施他無所營疾且革顧其子若孫曰仁義忠信人道之本亦不及他事配章氏繼趙氏子男二暐娶陸氏暕娶顧氏女一歸沈懋孫男六疇畦畯疄畹災曽孫男一鏐女二銘曰遡張纍葉履仁厚繇髙暨元咸耄夀逮宗武君隆孝友振窮賑匱恐或後厥施孔博譽孔茂暫佐邑理恪慎守翩然辭榮返林藪猗嗟善仁時鮮偶勒銘其藏昭永久東里續集卷三十五
