body:
  text: 東里續集巻五十明楊士竒撰録展墓録士竒今年七十有五仕於朝三十有九年遂奏乞致事上不允然念其自入仕来未嘗一請告至鄉里特賜璽書俾歸展墓而丁寧戒之早還共職毋久戀鄉土祗奉恩命以二月十八日陛辭閏二月廿八日暮舟至縣東華石潭子姪迎候者皆至時積雨連旬廿九日早晴登岸鵷稷隨行首過四十三都白竹拜勅封譚羅兩孺人合塟墓舊有石表守墳者蕭亥遂詣四十四都下螺湖荷山謁曽祖妣𢎞農郡君嚴夫人墓次謁繼曽祖妣髙夫人墓二墓相比郡君居左守墳者張康受前行一里所詣金盤原謁曽祖考待制府君墓即其左稍後謁思貽兄墓守墓者曽佑前詣四十七都蝦蟇湖謁先妣陳夫人墓蟠龍形种子墓在左之下詣金鷄湖謁曽伯祖會可府君墓次謁伯祖公辰府君伯祖妣嚴孺人墓二墓相並孺人居右詣盤古山大洲謁先祖金洲府君祖妣胡夫人合塟墓詣上洲謁先考府君墓亡姪之宜墓在先考之左二百步自曽祖考妣祖考妣考妣皆新建石表自金雞湖盤古山上洲大洲蝦蟇湖守墓皆李受生晟暠二孫来迓俱詣四十六都梘岡後三里許官路之東石人庵前謁始祖允素府君墓金盆形凡三墓葢兩夫人祔左右庵者始祖之香火院門有石人故名然經兵燹皆燬惟名存耳守墳謝舜吾宗守吾嘗袝塟其先在始祖墓域外之左午後入縣至家謁祠堂眀日三月朔復雨初三日晴詣故西昌站前謁存心府君墓譜稱十一郎守墳劉隆生胡朝陽兄弟携酒迎於路詣金洞唐家寨謁五世祖妣顧孺人墓獅子嘯天形新建石表山下謁子文伯墓守墳者劉從政近有盗塟祖妣墓前後者三十餘穴及有作室於上者皆廬陵泰和兩縣民即日遣人詣官訴理過蕭長史兄家留飲詣龍門道邉坳背謁致卿府君墓詣企中謁髙祖妣𢎞農郡君黄氏墓謁南卿府君墓在郡君之右逺數十步守墳者羅記名詣東山下謁曽伯祖聖可府君墓守墳李大眼經老鴉塘謁孔碩舅母羅孺人墓經楮原謁亡妻嚴夫人墓守墳毛勝生晚歸復雨十一日晴詣佑坑謁敬之祖妣曽孺人墓五龍戱珠形又名蜘蛛墜網形守墳梁𤣥謁外祖母曽孺人墓金尺形謁子文伯母蕭孺人墓歸過髙盈巷謁陳氏姑合塟墓姑夫維石歸復雨十三日晴祭先祠分胙宗姻十四日復雨十五日晴詣四十四都李家塘下謁安吾伯祖母羅孺人墓謁伯祖望之主簿墓彦初伯墓詣山東鄱官頭謁伯祖安吾教諭墓詣馬尾山謁彦中伯益民司倉伯墓二墓相並司倉居右詣蒋家山謁叔祖公與府君墓守墳者劉邦愛孫從茶山寺後入下總坑謁聖可曽伯祖妣墓虎形前行三里循陳孔髙屋西謁徳寛府君合塟墓守墳者蕭安䕶歸復雨十七日晴度梁家潭詣十都寜村鵓鳩岡之左謁伯祖觀山府君墓将軍抱戰鼓形守墳姪壻丁傅巖過蕭氏表姊時年八十二病方瘥詣三十八都荷山口鐵斧腦下謁叔球府君墓交椅形次謁叔祖平洲府君合塟墓墓與相並而居右葢府君無嗣廖氏姑愛其親而不眀尊卑之序故塟於此余既拜諭子姪将来必改厝使沒者有靈庶㡬獲安也守墳者羅元受周黒遂過余侍講過𤣥姪庸安姪庸安是日早卒盖病數月為一慟而出過仲詢弟過劉仲兼留晩食大雨遂歸廿二日詣五十五都野貍坑謁先師陳海桑先生墓冲天鳳形胡如麒邀於路龍叔昭携酒見迓皆不留徑歸廿三日詣西郭大廟前謁陳主一先生外祖静得先生母舅孔奐先生三墓廿四日詣六十四都梅塘楊家山謁十世祖强仲府君墓故石表尚存切墓之左右皆有侵塟其左族姪之望右蕭鵬舉先生之望仲子褒聞余来先二日遷去其遺骨為水蟻蝕三之二棺蝕殆盡盖不孝之應也遂命從者實褒所遷空穴實既登先墓之上十餘步又見侵塟一墓盖之望合塟其母與妻亦責褒改塟時鵬舉乃姪季廣季哲来候託之囑孟㢘遷厝鵬舉長子改建新石表守墳羅眀宗過安平寺晩食寺故强仲府君香火院也歸途雨作到家二鼓矣廿五日遣人齎書孟㢘請遷厝廿六日託周侯車面咨孟㢘及齎書季廣廿八日詣四十七都鐵磯戴家步謁三世祖妣合塟墓五馬渡江形其左右兩墓皆先世所祔者守墳者孔祖子謁畢㣲雨遂詣吉水謁始祖虞部府君墓既登舟雨大作廿九日舟次白沙晴稷就舟中具祭物余乘肩輿白沙李孟箎導先行十二三里過楊家荘荘中尚多楊氏子孫頗貧薄寡學術聞余至多来㑹從行又二里許至上徑問族人子孫尚有居此者否衆云無之又云四延之後惟泰和一𣲖有人餘𣪚徙無聞遂指示余允素府君居室田園遺址皆存又曰里人知泰和有後故至今無敢侵據者余聞之俛黙太息而已遂趨南嶺訪巽溪長史盖相别十五年今八十有四病不能出初聞余歸即遣孫来問當何日展墓得遂一見且有欲言余故徑詣也既至入見卧内兩孫扶掖坐語首舉始祖之墓為族人所侵事言之再四强留午飯余以未謁墓即辭出族人多相隨謁墓下稷已具祭物先至謁祭畢前詣曠家塘謁延安府君墓虎形泝源以為𢎞嗣吉水譜以為延安時族人亦曰𢎞嗣𢎞嗣當是與虞部墓隔田段相對忠襄夫人墓在其前左畔始祖墓不甚大不若𢎞嗣府君墓甃石甚整規模頗壮忠襄夫人墓亦整是日族人偕謁墓者巽溪子民獻及三孫衍攸恭攸習攸益恭允平仲體静貞憲其昱并同行李仲箎及墳之隣胡拱極雷彦勗李巫正夫正脩守墳者劉友温皆分之胙又遣胙分送湴塘思恵紹慶順慶竒成竒永汝茂叔謹丕成但以東行廹不及詣湴塘遂詢求侵塟者盖族人摶霄之子尚脩盜塟其父母於始祖之左切近而相並族人交口忿怨告余曰巽溪楊氏之尊老屢責令遷厝如罔聞知我輩誠無力也今幸公来奈何一視而委去乎余謝曰不敢然竊思之族尊及衆口忿怨彼皆不顧必非可以言語化者且吾行期廹寧能從容俟之耶時姪孫翽從行遂命翽訴之白沙廵檢司余是日登舟歸至東昌過歐陽子白淘金過表姪劉諌廵檢既受翽訴眀日躬往墓所召族人及尚脩及墳隣畢至訊之具對如翽詞尚脩俛伏不敢吐片語廵宰笞辱之即日遷厝且脩築始祖墓四月朔日也初二日余至家聞子珮䆃言孟㢘先三日遷厝其父矣亦聞水蟻之患不减之望褒亦遷其祖母及母合塟之墓盖水蟻亦作矣初四日白沙廵檢司遣報尚脩已遷厝時金洞盜葬者皆唘遷所作室亦撤毁㑹赦悉免罪初五日余謁祖墓於五十二都金牛嶺初六日詣四十八都新山謁母舅孔碩先生墓於是楊氏先墓所知者及先夫人至親之墓皆已徧謁先墓所不能知者盖不幸更世變故老長無傳莫究所在亦百數十年矣非獨今也今之所幸知者實多思貽兄究㝷之功子孫豈可忽忘哉士竒仕於朝不獲展謁者四十年今幸䝉恩展省又不獲循序造詣盖先塋散處逺邇長山深谷非一所也士竒居家僅四旬而阻雨不可山行之日過半歸朝之期益廹故但取便道易於畢事若龍泉萬安兩邑逺祖之塟不能赴者則命子姪代焉初九日詣始祖三代祖考妣墓辭初十日登告先祠十一日唘行遂次第為展墓録先墓碑石璞録此北京城之西五華山中崐珸石也用九千緡市之雖南方石材易於攻刻而不若北方之堅確縝宻也嘗聞瀧岡阡表碑亦出北方云南歸紀行録下四月初九日詣始祖考妣曽祖考妣祖考妣考妣墓辭初十日祭告先祠畢與親故縣官學官别十一日早雨縣官學官親故耆老壮少僧道皆相送江滸縣官舟送十里子姪送前午晴過淘金驛晩至螺川驛張琦僉憲来迓舟已出驛數里相遇遂同赴驛中府縣官所官兩學師生皆出相見王孟堅僉憲将暝乃至盖是日考試兩學生嚴也與孟堅坐語良久欲延余入城同宿予以親戚送者皆候别不果是夜㣲雨陳太守置酒驛中餞阮及余酒半予辭登舟與親戚及諸姪别太守惠予選詩及蘇書遂宿螺川驛前十二日早雨将發趙新侍郎自南昌來欲見過適此邂逅舟中坐語少頃恵與麻姑城中諸公復出見送遂别舟發至大洲冒雨過晃庵家觀新作祠堂及居髙眀㵾深且所得居地甚宏敞近居園田作業亦茂良快予意盖晃庵仲子永肅之能也永肅先日他出迎送客者永肅之子及陳濟也濟冒雨送余登舟途中再三勉之務學立身予午至白沙驛舟中寫戒諸姪帖子午後新市再登吾家先代犀牛下海之地因諭稷等曰吾幼聞之宗老前輩言吾宗允素府君自吉水徙西昌厯五世至七世承事府君皆單傳承事府君慮西昌後嗣之㣲故不忘吉水而遂預營此地為歸蔵之所其後子孫蕃盛自宋元至洪武中展省不絶近四五十年來前輩凋謝殆盡後輩究知者少致有此弊大抵逺塟當切戒也因諭稷經理吾遂行晚至玉峡驛汝敬侍郎於此見候六日矣相見懽甚娓娓言近事皆當理欵坐頗乆廹暝遂别遣鵷稷歸渠皆欲送至南昌吾以諸孫在不許既别父子皆不懌吾舟亦行夜二鼓至金川驛是日雨十三日早四鼓至臨江清江驛逓運夫久不得延至已刻府官學官來見朱得太守訴兩司官不禮待之盖兩司銜其妄言尹鏜憲副皂𨽻事亦朱所自取也余得逓運夫即行朱太守復來别時雨止江汎甚午過劎江驛未刻過市汊驛申至南浦驛三司官皆出相見附詩託焦公寄汝敬十四日早入城朝王欵接良厚坐語頗久云近見時勉知其正人又云近見會試録王直文髙非後篇所及賜酒饌扇墨予辭出阮内使已先行三司留予甚堅力辭乃免若思約候之乆乃至恵果酒𤓰仁及附書二楊匆匆舟中立語遂别已亭午矣焦公仍遣李懲䕶送午至樵舎驛㑹阮遂同行晚至吳城驛中夜至匡廬驛是日㣲雨頗得南風十五日早四鼓遣李懲歸予發舟天眀至彭蠡驛午過龍城驛過小姑晚至雷港見驛丞知吳吉二太監南行夜一更至安慶官民讙呶懔懔迓太監盖所遣一指揮先至需責百出王子玉太守良有憂色具言安慶去嵗災傷朝廷已免租税民窶甚兩日有聞多逃逸矣予慰勉子玉不足多慮此二監吾知之皆慈善有供給不備處可以誠告無過憂也再以嚴士正書託寄桐城而行夜雨不止十六日早食後至李陽河驛聞吳太監五更已行矣予行五里望江中白蠟山入烏沙夾将至池口時吉太監船乘北風中流徑上風駛不得相見午至池口驛知府葉恩来見浙東人盖送二監行因蹔息驛中未歸聞余至遂入舟相見極訴吳從人有阮姓者貪惡盖葉亦遭杖矣然吳實不知吳後吉至首詢百姓安否見有司怡然不一語及他事又言吳從有郭姓者循良一無所索大非阮比又言吉甚好號令嚴眀秋毫無犯恩因言民情數事皆有理頗不直時廵按者恩留所作詩文數首請教大畧觀之要是有志之士也既别予過青溪口阻北風遂宿是日雨十七日早雨北風未止食後稍緩發青溪口亭午至大通驛午後過銅陵縣暮過繁昌縣得南風夜至魯港驛過蕪湖十八日昧爽轉北風舟行已刻至采石聞恂如侍郎已過建陽衛指揮来見極言尹自道張嵓皆良有司所備供給車馬人夫糧芻悉有餘而從行指揮千戸不得所欲尹張皆遭其辱言既忿切不已予為温詞慰遣之亭午過大勝驛午至江東驛南風大作入中新河避之予時疾作遣人入城何頥䖏需藥及兵部易舟召之䕫仰善未刻都尉總兵六部五府太常大理太學京府堂上皆出相見江東門與言携酒饌最後至郷郡親故皆至皆即别惟仰善之䕫留宿舟中阮内史午後入城約眀日出予舟移泊石城門是日晴十九日昧爽予徙小馬船守備四太監出相見就别劉見恵酒米府部諸司皆復至惟都尉以聞黔國兄訃不出猶遣人見報予以病不及趨弔總兵惠予箋何頥送藥至城中出見者益衆遂别諸公亭午移舟逓運所候阮叚纉陳仲旦劉寛追至送秫書予留書託仰善寄鵷稷午後阮不至予移舟出龍江驛送予至驛者良玉及其屬四司及仰善之䕫徳敷就予舟小酌良玉置酒驛中周軏御史送康甥昇秫信及新刻玉機㣲義至韓暘御史来見惠詩皆同飲驛中仰善三人晩飯後先歸将暝與良玉周韓别暝阮始至遂發舟是夜小南風廿日早四鼓至儀真􅄵下時吳敏徳賜致事歸至􅄵上邂逅露坐􅄵上清論至眀未盡所懐公差御史運官衛官邑官學師生皆来既見即别予邀敏徳早飯贈之雙絺送􅄵下入舟皆有依依不舍之意遂别見主善乃姪屬報平安其伯予将發舟士宏偕其同舟數人来見皆未度􅄵予遂先行午至揚之廣陵驛嚴運使来見言塩商事頗不當衛府縣官及學師生皆来見即行晚至召伯驛夜半過髙郵盂城驛是日晴南風廿一日早食後過界首驛午至寶應安平驛得南風晩未至淮安五里王瑜都督彭守兩衛官見迓彭守言習嘉言丁憂已過羅文振乃姪偕施珇來見珇之子槃新選殿元珇極言此文振教愛之力時文振有疾數日故未出予託其姪市茶及綿布既别王彭諸公予舟至淮隂驛文振力疾出見所市茶布皆至且恵予酒瑜恵鮮蔬魚酒遂與諸公别王遣田千戸䕶送時淮安自郡貳以下皆出捕蝗予舟既發遇彭勗御史同舟談論頗久别後遂前行是日晴南風廿二日五鼓度淮過清口驛至清河天未眀予往訪信圭将至縣邂逅其父子来迓其丞簿皆為廵按御史以迎候不及責罰致病予入信圭舍即出信圭及子同入予舟見送食後過三汊淺舟中對信圭父子始知鄉事之詳盖予在家未久賓客日冗應接無暇不及與人細論也所喜者自淮至此夏麥甚盛信圭云淮安所屬州縣皆然庶㡬十分雖今頗缺雨然将刈麥甚不宜雨也午至桃源驛令佐来見皆云捕蝗初歸大槩聞淮安境内蝗初生未盛官督捕早已盡矣遂與信圭父子别縣益助夫令云自此迤北河水澁難行也既行一里凡數閣淺夜二鼓始至古城驛宿是日北風作書托信圭轉寄泰和廿三日早四鼓發古城前過陸家墩河水甚淺十步九滯者連延四十餘里窮一日之力舟人疲極暝至宿遷鍾吾驛添撥一逓運船博淺王士華主事廣東歸見過坐談少頃極言賀敬難得遂託先寄書昇秫夜孟辨乃姪来見同宿鍾吾驛前是日㣲雨廿四日早四鼓寫書付孟辨乃姪寄稷吾遂行雨作葢淮北久不雨田榖未下種宿遷方禱也予行廿餘里又連滯淺但不若陸墩之甚聞吳政侍郎過不及見夜至邳州下邳驛宿是日宿邳雨皆足廿五日晴早發下邳已刻至新安逓運所都指揮湯節見迓言徐州至此昨日雨皆足濟寧雖有蝗然初生官督捕畧盡盖余所厯淮安至此皆然别湯後午後過新安驛遇江西馮鎮都指揮行十五里過雙溝馮遣人助送舟抵暮至徐州彭城驛夜過小洪宿管洪郎中孫昇浙江督運都指揮蕭華来見蕭南京舊識是日北風廿六日昧爽過洪孫蕭復來蕭助人力及恵茶管倉兩内使來訪恵鵞酒舟人損柁停泊修理食後行午至耿山午後至夹溝驛驛丞言黄家淺無水盖吾歸時嘗困於此田千戸遂往前閘放水吾舟移至淺處候之暝水始至二鼓過皮溝閘宿盖聞自此迤北河道淺澁皆可畏也是日晴廿七日天眀發舟亭午過謝溝閘大同王御史公差在此來見就予舟同行十數里别過謝溝遇程富少卿歸展省畧談北京近事聞夏以平丁内艱歸已過不及見至晚過沽頭上下二閘夜過金溝一更至沛縣宿是日晴廿八日光禄署官王文新除徐撫民州判在沛来見言捕蝗已盡但缺雨又言此向北一路皆缺雨時沛河亦淺難行索逓運夫僅得數穉小盖官不得人也吾遂行十餘里過張家淺午過板閘午後過沙河驛遇徳賛徳玉兄弟見梁氏三子恩憲懋吉安張千戸助人度淺過孟陽泊閘徳賛恵鼈過八里閘暝過谷亭閘停候上閘水葢久不雨河淺甚每度一閘必得上閘水至乃可行而閘一泄即涸矣是日晴南風自度閘雖連日便風苦閣淺不得力廿九日四鼓南陽閘水至發舟天眀度南陽閘前屢膠淺盖自過沛雖河道視金溝迤南稍舒然毎閘猶十數阻淺食後過棗林閘亭午至魯橋驛過閘見稽驛丞言黄汝申近况葢到任未久親出捕蝗在司與鍾副使一心為喜之過師家荘閘㑹金華劉實通判言柯唘暉新政惬衆望三司不復如舊日之混濁矣又言郡縣多洗濯持亷操惟方岳尚有不滿人意者聞武㕘議亦好又聞陳景茂盡出其家所蓄糴穀千廿石賑濟自是家益罄矣盖去年金華旱甚故也郡亦嘗以旱奏户部謂無廵撫侍郎奏不與蠲租盖子清㢘行甚端惟無所及民耳午過仲家淺閘午後過新閘又過新店閘晚過石佛閘㑹廵按陳御史韓袁兩憲副皆以捕蝗在濟寧托易輕便舟前行盖聞前途水甚澁也将暝過趙村閘宣州衛指揮李忠運饟歸助人力過淺忠極言寜國袁守才徳非他人可及有訕之者皆小人也忠又自誦其投贈袁守詩汝申見過舟中語頗久既别過城下閘至南城驛宿㑹王駙馬往荆州公幹王士華復見過盖亦滯淺不能先行也重附書昇秫楊方中来見知二楊先生近况濟寜衛州官皆来見是日晴三十日早得濟寧衛王禮指揮閑舟趙指揮陳亮知州皆遣人為畧整頓汎掃遂遷南京撥来馬船前難行遂留濟寧将其半船夫前行暝過長溝是日晴五月初一日早至開河驛過閘午遇鄭文實喪舟至予過柩前致禮且弔其家子垕出拜予之雙絺勉之歸學其弟燦囑為致謝六部諸公黄振宗致事歸與鄭並舟相見遂别午後過安山驛東平傅知州見候河滸恵䕷菇言今嵗州境麥倍収無蝗極言山東僉憲楊閏有操執眀大體不可犯别後過金線閘逓運所蕭䖏柔之徒来求附舟過沙灣淺抵暮至荆門驛遇李貞太守匆匆遂别過二閘夜過阿城二閘七級二閘是日晴初二日四鼓過周家店閘過李海務閘天眀至東昌崇武驛府衛官學師生来見遂過閘遇郭瑾即行亭午至青陽驛土人言旱甚麥百石種者無一石収盖東昌猶可此迤北則益甚矣遇晝錦坊温計生之子寄詩與諸孫午過梁家鄉板閘晚至臨清縣清源驛問其縣人三月不雨矣麥不収與清陽同過二閘時各官皆禱雨齋宿扵外市禁屠宰聞将四旬矣麥無顆粒之獲秋田乾坼不可耕農民塊坐於家無所為聞之惻然将暝縣及衛官聞予至来見皆送予三里盖河淺舟聚不得前進也袁偉之子来見問之云在縣學中讀書遂令縣及學官遣之歸盖其有母在家無侍養者是日晴初三日天眀過渡口驛旱同臨清亭午㣲雨遽止午後過甲馬營驛夜二鼓至梁家荘驛初四日早食過徳州安徳驛問驛夫新麥云多者収三分之二少者半収然自三月不雨秋種皆槁矣亭午過梁店驛驛丞舊翰林院辦事吏極言久旱顆麥無収且知徳州驛夫所言半収者在言者之一鄉他鄉不皆然也過梁店數里問麥亦有云収三之一者但苦旱則皆然也晚過連窩驛甚旱無麥是日晴初五日五鼓過新橋驛行三四里南風甚駛不可行食後始發舟風便午過磚河驛驛丞言旱甚無麥此月初一日頗得雨穀田亦未得濟然南去三十里外皆無涓滴午後過滄州州官來見言初三日畧得雨不能蘇旱麥収逺近不齊或二分或三分無及四分者穀苗皆焦稿不見生意晩過興濟縣乾寧驛縣官来見極言旱麥無顆粒之収穀苗皆風飄去矣又聞之道路云陕西亦旱然未得的説方一更過流河驛是日南風其晚日上有半圓暈色黄初六日早北風未至静海五里雨驟作船忩中如注衣通體皆淋漓不勝舟中人行李皆濕坐立悉無避䖏然皆無戚容者盖久旱望雨人同情也岳給事攜二子見訪言數月不雨矣今日始得津津有喜色且言麥全不収穀亦不及濟但蕎麥薥秫及豆之類可望耳又言邢端為令於此能愛民有權度已而邢及驛丞至所言喜雨與岳同予問民事曰追馬一事初甚苦䝉赦静海一邑所免將及二千匹朝廷大恩也岳又竊語予百姓至今有包納逃民逋稅者予問盍不奏曰有司初因令廹皆預申作起觧之數後無所徵恐虛申得罪遂不敢言也予曰虛申罪亦在赦前盍不以實情自陳衆無語皆退予問縣及驛索蘆蓆盖濟寧所易舟雖輕甚敝是日早為雨所困也亭午過獨流此䖏出蘆蓆遇張御史南上得康甥書遂託張附書稷及劉仲兼過新口遇劉良中書丁父憂歸過余舟數語即别過楊青驛不得逓運夫留甚久晚始行夜宿直沽是日雨北風初七日早遣定住譚皂先歸報家衛官来見助人力挽舟盖聞北河水漲頗急也土人亦云久旱麥及榖苗皆無至昨日始得雨也亭午過楊村驛見余丞所云雨同直沽但麥差可耳舟行遇吾家西華陳皂畧語家事自此途中復屢膠淺不敢夜行暝宿䝉村是日晴南風初八日早發䝉村㣲雨食候止亭午過河西驛驛丞廵檢逓運官来見云雖久少雨近數日屢得麥頗収四五六分七八分不等耳秋種亦不妨予復登通濟河祠祠中方建禳火醮遂出曹守淵追至舟中拜乞詩走筆書一絶句亦酬昔者牲酒之貺問民事所言皆同晚至和合驛問民事同楊村麥下田半収髙田旱無収張珏郭智來候夜宿和合驛是日午隂晩晴南風初九日天眀發和合驛張珏郭智先歸午後至張家灣上馬頭河水澁不能進遂止遣人齎闗文詣通州官司索車及夫昇攜家人來接二楊先生遣人攜酒殽見候是日晴初十日劉斌都指揮及衛官來訪衛及州送脚力車遂遣昇䆃以家人行李先歸土人云此地雖旱地下濕麥有収秋穀亦好余困濕熱不敢登陸遂停舟俟早發秫以諸鄰来接蕭仲南之婿沈宻以其子宗来見宗時授徒河上晩宗惠魚酌别田千户仍宿上馬頭是日晴十一日早同阮内史舍舟登陸天眀過通州阮先歸余至大王荘建安公遣子錫携酒来迓二王錢曽四學士見候東岳廟諸老鄰皆至鳳岐曰恭求樂見迓朝陽門外予入城遂詣鴻臚報名晚宿朝房雨凉十二日入見奉天門上召至榻前天顔恱霽慰諭再三咨及民事悉以所見聞對命光禄賜酒食復命中官賜羊酒既南京進鰣魚適至復命中官賜鰣魚五尾加賜酒予退至家東里續集巻五十
