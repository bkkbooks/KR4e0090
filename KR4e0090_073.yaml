body:
  text: 東里續集巻四十五明楊士竒撰像贊銘贊彭士揚像贊其立也囏而卓其學也劬而博其執行有常其謹度有恪不亢不屈匪襲匪襮贊王師於九伐而才用未竟友朝紳於兩京而文譽以灼晚霑一命辟雍之學人蓋仰其冠紱之榮而已不改簟瓢之樂此所以表君子之能約而多士之先覺者歟胡子貞先生遺像贊是吾廬陵胡忠簡公七世孫也神粹而色正氣和而志醇夙秉執於亷㓗允蹈履夫義仁濟南遺經啟廸乎來學太丘行義表率其鄉人頥天和於林壑偉儀度於縉紳嗟年歲兮遽逺懷道德而莫親瞻遺像之儼然起予心之㡦㡦陳處士像贊有序漳州陳處士念其子彧逺仕欲歸養而未能㑹工繪其像畀之且為書諭彧曰對此即對父矣子事父豈必養乎能承父志足矣吾之志在汝致恭君命無他也處士其賢父哉彧為秋官主事以像求贊一辭余嘗聞處士行義於彧矣遂述為贊蓋将使其子若孫皆圗無忝云其儀之恭其存之忠其脩也禮以為防其行也孝以為宗既承其先又啟其子眉壽而康茂膺蕃祉楊學士像贊濯濯其容色肅肅其儀度闓爽而縝密剛直而公恕縕潔靜精微之學發瑰瑋竒贍之文奮騫翥於賢科振芳華於詞垣當泰和亨嘉之運崇論思宥密之地隆九重之眷寵極千載之遭際玉堂金馬人瞻其榮忠君愛人我識其誠國之貴重清廟瑚璉士之光華斯文冠冕鍾子勤像贊和易而方通敏而直昉鄉序以育材升賢科而肇跡際明盛之時典綸綍之職式光以榮益慎以廸斯其禁近歴二十年而所履坦如一朝夕故貌其外者既得乎彷彿而與之㳺者聊寫其平昔黄少保致事像贊少潛心於經術壮發身於科第兼内外之制嚴清密之地履公為道秉直為義居貞也出處惟一持介也夷險不二篤至敬於四聖之朝進崇爵於三孤之位任調均夫玉燭存筆削乎金匱才宏識逺帝方資賢臣之輔名遂功建人咸髙君子之退八袠伊邇諸福斯備鴈蕩天台超遙地上之仙鶴氅綸巾希特人間之瑞也謝庭循像贊雍容而夷坦恬憺而靜貞弗伉弗嫵靡雕靡矜抗浮雲兮素尚含清風兮雅詠寄妙翰於林巒亦自怡其情性躬承當宁之知日侍㡬務之餘隆寵禄之屢進執敬畏而若虗所履之確所存之厚蓋舉世髙其藝而君子重其守也顧仲華像贊為子克孝為父克訓於急能周於乏能賑卓犖其氣蕭散其韻晚歲京華壺公仙隱厥嗣之良陽煦玉潤式崇孝養壽禄彌進蕭德頴像贊桃華源上凈纎塵雲白山青隱者倫南宋賢科遺澤在詩書瀟灑樂天真醫士何彦澄像贊究農軒之精體生育之仁其志所存與物皆春不芾不纓蕭散初服壺居廓焉奎光下燭孫處士像贊儼乎其儀坦乎其存本於家者孝友之誠重於鄉者信義之惇於愛人也衆號曰長者於操已也郡禮為嘉賓有詩有書以淑子孫有行有文在賢嗣人享禄養於髙年蓋壽福其方臻也蕭徳玉像贊此老南宋進士之孫秋官郎曹之父敦履於素祗懼于度桃花溪水蕭散乎其居雲白山青浩蕩乎其趣傲松栢之氷霜怡桑榆之遲暮想其樂之優㳺寫余懷之嚮慕王彦鼒像贊其起家以進士其入官自御史儼巍峩於廌冠肅對越於龍陛明乎憲紀之重體夫欽恤之意嚴而不厲寛而不肆挾清冰於夏寒挺喬栢於晚翠方兹升佐於外臺又将盛行其志者歟况伯律太守像贊剛正之氣卓特之才其潔清之操一塵不滓其執守之固千夫莫回既明且果亦敏以勤官朝署也事三聖惟其敬典侯邦也庇千里惟其仁靡暴弗馴靡悴弗煦令行秋霜恵流時雨歲久當遷民攀留者萬計天從所欲詔特俾之重臨昔張益州前後其異施若况吳郡必古今而同心者歟楊彦素像贊此宋西昌三登仕之雲孫承清白之世出詩書之門弗名之營弗利之騫脱畧埃氛栖遲丘樊采林芳以容與濯澗清而盤桓優哉悠哉白鬂蒼顔蓋閲蘭苕於屢謝而挺松栢於歲寒者也自題朝服像贊爾簪爾纓爾琚爾珩煌煌在躬肅肅在庭爾直爾清爾忠爾貞夙夜惟欽無忝所生胡隆成像贊擢芝山之秀涵番湖之清敦朴而直諒寛厚而和平遭逢明聖之朝發軔逢掖之士廌冠烏府嘗馳譽於冰蘗伊洛嵩髙亦肅清夫憲紀頳顔皓首象笏朱衣優哉悠哉式繁壽祺陳徳遜像贊資醇而龢履善而夷忠信自固恬憺自怡有詩有書克承于家有冠有紱于家之華蘭褘蕙帶江山在庭歲寒松栢天錫長齡熊用學太守像贊外和内貞履義縕仁持躬以亷守職以勤才敏於庶務恵浹於庶民蚤珥廷陛之筆久典郎官之署鳳陽陽羡視漢三輔人之允懷次公叔度其豐城之寳氣将賢譽而並著乎蔣隱溪遺像贊有佳人兮溪之陽酌清泠兮壽而康溪繚曲兮誰入其居黙存吾道兮靜閲吾書溪之雲兮朝飛紛婀娜兮飄素衣溪之風兮増夕波又逍遥兮獨行以歌溪之路兮幽且長忽而逰兮無何鄉悵予望之兮溪水茫茫蕭孟亷像贊承忠厚之世涵詩書之澤冠纓肇續前後赫奕以直諒之資通敏之識惇用孝友雅持謹飭獨嘉遯於雲林而樂志於泉石恬焉泰焉以㳺以息詠考槃於古詩誦履坦於大易其超然享福祉於無斁也歟蕭編脩孟勤像贊貌清而氣和志端而履荘孝弟其行之本忠信其存之良潄六籍兮芳潤吐三秀兮文章奉大對於彤陛參髙歩於玉堂承明延閣之從容詞林藝苑之翺翔縉紳所臧譽聞式彰承昭代而日濟其所至蓋未可量哉蔣吾望像贊世積善仁躬蹈禮義居靜葆和守約持毖有溪有山蕭散畵圗娛適燕閒有琴有書鄉靡競争賴平與公捐廪以施式恵瘝痌好徳有恒厥應斯厚既富康寜茂介於壽長史霽菴遺像贊其志之篤其行之肅其學之充其文之彧粹乎其中之韞闇乎無外之暴持憲紀也嘗振乎風裁輔親藩也式勤於啟沃詩書之宗焯焯其克承忠節之世偉偉其不辱己乎民服其人如玉周士暘遺像贊鄞士周熷士暘往年在南京余識之於其冢子春坊司諫冕所今年其季子鑄印局副使濂出此像求題蓋謝世久矣冕濓皆有文於余往還故不辭而為之贊曰惇孝與悌持義與禮其縕之醇其服之玭遺情物外樂志塵表有朋有徒有續有紹日湖澄明梅牕幽馥懷哉若人逖矣貞獨曾克復遺像贊含和茹醇履素蹈貞佩春蘭之鮮㓗飡秋鞠之清芬超乎塵紛轇轕之表熈乎無懷葛天之民備諸福於厥躬垂慶澤於後昆噫吾猶及炙其光儀而今何可以復親也梁叔荘像贊孝友行仁之本而有稱於宗族鄉閭經術傳道之正而有施於黨庠國學既温且良亦毖而恪顒顒儒林允矣無怍賔畿弟像贊奕奕厥宗旌孝有坊䢵邦之政德音孔彰其本之端其植之囏秉肅與恭晚逾桓桓被古人服求古人心優㳺桑榆其樂且湛袁叔景遺像贊逢掖之宗世科之裔夙有文藝有才與志大廷之對䇿名髙第命不及試睹像興喟湖廣按察使羅文衡遺像贊孝友温恭亷直荘毅發軔賢科歴階膴仕廌冠中臺有紀有綱熈如春暘肅如秋霜茫茫湘漢奠國南服仁綏義門民遂所欲嗟乎已矣遺像儼存悠悠之思係其後昆御史楊君像贊其為人也剛正而用恕亷清而蹈矩有志有才遭逢明主鐵簡豸冠栢臺烏府振厥紀綱何有强禦蓋以之持憲則夏日秋霜以之臨民則召父杜母者也羅文振像贊為子也誠於事親為兄也篤於友弟質直而謙恭和厚而坦易忠信重於鄉閭謹敕存於交際家雖貴初未嘗以恃積非厚克屢散以濟此璽書所以旌褒義民非古人所號稱善士者乎贈禮部主事龍君遺像贊科第之宗德禮之門毖厥行言貴若璵璠吟詠詩書逍遥丘園栖迹白雲謝志華軒積善之遺有子有孫身後之榮偉兹慶源蕭知縣像贊其襟宇坦而和其操執謹而恪居貞以靜安澹以泊理人有愷悌之徳處物有雍容之度吏之典則民之父母譽聞之興昉兹洋洋祿位之進其曷可量哉故友工部侍郎趙公孟𢎞遺像贊性情夷曠襟宇濶畧智識超卓行義磊落處貴富而能約履憂患而不怍惟其無累乎外故亦無往弗樂我懷伊人九原不作睹遺像之儼然能無嘅於今昨也歟李君時勉像贊氣充而志端外和而内剛其學也本源純深其文也篤實輝光史館謹嚴經筵禆益有矩有䂓惟正惟直玉署金馬四朝於兹國有老成儒有表儀胄監成賢允屬耆老需佐隆平天子有詔郭興文像贊其稟恂恂其儀温温有慤其存有斐其文懿詩書之華冑雖衆處而不群夫既承熈明之運歴觀南海道三韓渉齊魯游中原充充乎其見聞其将整六翮而追鵷鸞登青雲而奮髙鶱也像贊失其名儼恪之容和厚之氣居仁山文水之間際雍熈治平之世康寜之福終歸於全善慶之澤垂裕綿綿像贊失其名所志仁義所蹈貞潔逍遥畎畝之間雍容恭讓之節未見其人嘗聞其風聊以識之於其徳容錢參政像贊蔚乎其世忠孝興家温乎其人肅恭靖嘉力學奮庸有行有文填于大邦恵政在民奕奕藩垣祗國顯命以閎厥施以鴻厥慶楊節仲像贊貌古而清識端而明蘭石表其㧞俗之韻霜月同其履潔之貞其處鄉也人仰之為王彦方其長民也世儗之於龔少卿言行有誠進退以禮眉壽而康德人之祉袁太常像贊挺乎東鄮之英儼乎頌臺之賢温乎所存之厚確乎所持之堅究至理之窅㣲謹言行其顓顓夫論其超叔服而邁唐舉者蓋睹乎一端而未睹乎其存也蹇尚書像贊有序此吏部尚書兼詹事府詹事重慶蹇公像也四方之人欲瞻望公之徳容而不能得當賴畵像而傳然欲知公之存諸心施諸事者有非畵史所能彷彿士竒與公同朝久知公為悉故述其所存所施為贊書諸巻端使觀者并得之詞曰端厚和裕坦亮淳質本其自然表裏洞逹掌綸紼於鳳池司衡鑒於天官秉忠輔於儲闈贊訏謨於朝端膺付託之重係老成之望其守法也雖微而必慎其執徳也蓋老而彌壮國家為心遑計其身物我為公寜厚乎人道不任已惟是之從度存包荒惟廓有容持素履於儉朴敦恒性於隱惻蹈逺道於康荘表雪霜之松栢斯福禄之長自天申錫而天下之人仰望為賢科之星鳳聖朝之柱石也袁院判像贊資偉而厚氣和而充寛平而直亮豁逹而雍容遡和扁而軒岐蓋精探而研攻當聖人之景運奮雲興而從龍可謂千載之遭逢矣而濟物以慈蒞事以公奉上以誠脩職以恭所以承眷遇之益隆而致保和之全功也蔣院判像贊粲乎其文温乎其氣肅乎其所履泊乎其所嗜究孔孟之要竅農軒之秘志惇乎矜恤徳施乎恵濟被慎簡於近職切保和之隆寄極知遇於儲君蓋多歴夫年歲寵彌盛而彌恭績愈茂而愈勵斯豈非靜學之所得而緝熈之造詣者乎思貽兄像贊此清溪思貽楊先生像也貌癯而清氣剛而直色正而温詞毅而則不矯矯以傲物不庳庳以狥役涵泳詩書之囿散誕林泉之側紉芳蘭以為衣采瓊芝而為食安義命於澹泊恒優游以自適惟其嫉邪憫俗之心懇懇而弗忘承先啟後之志孳孳之為亟蓋不知者或訝其違衆而知之者皆重其惇德斯所以繫多士之表儀而為吾宗之柱石者也刑部侍郎何文淵像贊學古入官明經致用體仁為要蹈義能勇金石其堅氷玉其清秉尊主庇民之誠懷憂深思逺之情出任牧守也政有紀綱民有父母令行弊息風移俗厚入持憲辟也殺不辜寜失不經用輔益聖徳扶君子而抑小人式取法大易正直其存祗肅其度國之藎臣永篤其祜陳祭酒像贊有德有儀有學有文翺翔乎承明著作之庭肅穆乎大學賢士之闗一字衮鉞參三朝之史錄五經道義儼六館之師尊若夫灑落之度愷悌之存望之而山立即之而春溫其士林之鳳麟也歟惟效像贊忠節啟家詩書續世發身賢科歴官憲紀有繡衣白簡之華有虎視鷹揚之毅鐡石其存氷霜其厲回南省之使軺持東郡之讞議蓋君子知重其仁而小人咸懾其義年未耄而勇退超然乎林泉之髙致也劉孟恂像贊履素居貞懷仁秉義力學而本乎經潔身以求其志飲必澄源逰必廣術道循軌於古人行邁倫於當世所謂聖代之逸民南州之髙士若榮命之自天非天爵脩而人爵至者歟康紀善像贊是為梁府紀善康先生之像其為人也坦直而不肆謹確而能暢不卑卑以屈不矯矯以亢其學明於二帝三王之書其仕隆學者之師資表藩輔之譽望蓋非畵史之所能状也桃源蕭安恒像贊有孝有仁有紀有倫心若執盈氣若回春既昌其家亦安其鄉行則多宜福亦斯徴百尋之栢不為宫室過者必瞻行者必息古之善人今之吉士遺像如生誰不敬止蕭安竟像贊雍容乎其貌清洒乎其儀孝友承乎世美忠厚出其天資雖不用時厥材則備雖弗永年人懷曷替爰有賢嗣復有衆孫匪德之敦孰開源源蕭徳髙像贊其先嘗進士乎宋之南渡矣其家嘗世積忠厚之德於其素矣其生際乎潤屋之富矣其身嘗自奮出代其父赴萬里之戎伍矣其歸荷君命之嘉予矣其居復有子孫以承懽於朝暮矣是則儼衣冠擁童竪盼紅蓮依綠樹而行樂者固其所也蕭徳顥像贊秀發之資英特之氣實愷以和亦卓而毅志尚乎詩書行敦乎孝弟其才之美雖不用世其隱之樂實加於膴仕是蓋為聖朝喬木之家而南宋進士之裔也蕭徳資像贊温然其容坦然其中有瀟灑髙尚之意氣有磊落濶逹之心胸家承富有之業能服禮以飭躬山林泉石散誕冲融蓋超乎物外之蹤而㡬於和而不同者歟彭百錬像贊敬行以承先勤學以致身脩職以事君持斯三者揚芳振芬睇雲霄於萬里方鵬鶚之髙鶱惟勵翼其有恒用光續於前聞劉伯塤像贊其處也樂翠竹白沙之清其逹也躋卿曹郎署之榮於燭隱而㡬若鑑之照於持憲而務乎衡之平斯以揚特逹之譽行寛恤之志将祿位之益隆吾曷究其所至陳思孝像贊其中之夷夷其外之怡怡其學無所不窺其辯浩乎若馳贊百里之治民懷其豈弟躋侍從之班衆羨其委蛇蓋優游翺翔石渠天祿而探𤣥抉秘商鼎周彛是以海内之人趨陽氷之篆古而縉紳大夫推子雲之識竒也陳仲完像贊三山之秀長樂之英其學問之得必本於經其文章之逹不鶩乎名氣宇藹陽春之和襟抱含氷雪之清不競不絿寛厚坦平蓋吾識之為玉堂之君子而春坊之老成也劉郁武像贊其存平厚其資敦篤有徳有行靡榮靡辱茅堂蓽戸藜杖葛巾不識不知堯舜之民清泉在溪白雲在山優哉游哉碩人考槃周時立像贊學優而才茂德充而行方從容乎仁義之域馳騁乎詞翰之塲父作也有長洲之文學子述也有天台之賢良噫可謂超然無憂而樂善於鄉邦也耶楊武侯薛公祿像熊虎之姿金石之志感㑹風雲桓桓義氣恭命敵愾烈風迅震功著社稷心存朝廷維武維忠維臣薛氏皇有褒恩河山帶礪曾景彰先生遺像贊此吾澄江之南之處士也務學以植身隱居以求志推所藴以淑人明乎義而遺利雲林泉石于于洩洩年踰八而望九福已備而厭世聊書其平素之槩而勵其後之人之於善繼也耶自題待漏像生乎清白之宗承乎詩書之世有尊主庇民之志而學不足以發有憂深思逺之心而才不足以濟儼冠紱之華在論思之地耿耿乎夙夜肅肅乎寅畏期無忝於君親蓋不知老之将至焉蒋吾與像贊履坦蹈和茹清服素肫肫其存顓顓其務有行有言有儀有度超乎埃氛轇轕之表陶然雲林泉石之趣州閭欽其髙致賢逹仰其良矩從容期頥駢蕃福祚蓋吉人有相之道而巋然如靈光之在魯也自題侍教像贊此老之生今七十有三年其仕凡三十有七歲歴事四朝恒持一志顓顓乎毖慎肅肅乎嚴畏不敢内非類之交不敢徼非義之利祿愈增而意愈澹秩愈進而心愈惴治官務如家務視海内如室内雖不能萬一之有濟而不敢須臾之或怠誠懼上孤明聖之恩有忝清白之世閲春華之屢謝撫寒栢而猶翠聊自寫其素存示同宗以祗礪族孫挺來北京旦夕在左右里蕭生為寫侍教圗挺以求贊因謾書此然士當師古挺尚從事乎逺且大者可也石彦誠母像贊古人之賢成於母多矣石母之賢亦成其子矧孝敬於下堂而儉勤於中饋是宜膺福祥於壽考益昌盛其後嗣也蒋配蕭孺人像贊名閥所生君子之嫓徳言容功四者夙備奉尊之孝善下之教于宗于姻是儀是效閫内肅雍有章有倫壽康維祺子孫振振楊武侯夫人房氏像贊朝有重臣桓桓熊虎奉國忘家有賢内助其賢伊何含𢎞恵慈長㓜尊卑一家愉怡閫内之政不嚴以肅厥德允厚源源嘉福翟冠雲帔恩命自天蘭玉滿堂夀康百年僧録左覺義住持慶夀逺禪師贊此老發跡慈源於道夙契受説圓菴於法精詣主四方之名刹闡諸佛之𤣥祕蓋空寂六宗廓六如之大觀竟究心印澈七徴之奥義湛乎淵澄瑩乎玉粹斯以簡在神聖之心再承校閲之制承上國之樷林贊𢎞剛於善世祝皇祚於萬年溥仁福於一切也上清正一萬壽宫提㸃鶴巢黄公遺像贊縕金川之清叅𤣥都之真其中也抱一而含淳其外也和光而同塵蓋嘗簉仙班於彤陛奉清問於紫宸於靖海若也化潮為陸於殄旱魃也叱霆駕雲驅斥不祥顯厥威用具體自然凝寂不動八袠髙年巢鶴飛騫遺像儼然湛兮若存息庵禪師像贊師既示寂其徒奉遺像求贊余素與師游為之贊曰此吾廬陵忠簡胡公之裔而得法於青原七祖禪師之地究儒之宗攬釋之袐悟空之奥得佛之髓烱乎清鑑之明純乎良璞之粹歴十方之鉅刹演七徴之妙義蓋親藩嘗為之命駕而從化者隨所住而雲至晚駐錫於都城遽遺履而西逝蓋嗣法者永慕乎其内而畵史僅彷彿乎其外也雪巖陳處士壽星贊承文範先生之宗家廬陵大櫟之里和厚而嚴重端直而劼毖崇禮尚信好仁秉義蓋鄉閭髙其行而寒窶徳其恵春秋踰七而望八福禧岡崇而川至斯以祥開南極光昭丙位錫慶流祉而綿綿之弗已也銘日本硯銘員而澤靜而貞效土貢來東溟廉謹堂銘有序金華朱侯為吉郡五月既治九縣就法度又惟出治之本揭亷謹二字于退食之堂自勵也西昌楊某申為之銘銘曰大邦之政非亷弗任為亷有方自寡欲澄心魚噬于緍爰困于鬴誕先哲人持一介不取吉有朱侯㓗清為防維罔替厥常民之攸望行言雖庸昧謹斯危矧是邦政非謹曷宜車馳于反丨或仆于坪肆昔明訓如臨淵履氷吉有朱侯敬事若厲維弗渝于易民之攸賴楊氏祠堂鍾銘肅肅祠庭祖考是崇祗奉有嚴左右鼓鍾發音鏗鈜祖考在上孝子暨孫苾芬祀享至慤者誠至著者神誠神孚合錫祚千年清慎齋銘有序江西布政司左參政㑹稽張居傑取賜誥中語名其燕處之居曰清慎清慎者君子自脩之道也居傑發身儒術歴官中外皆清要其亷㓗之操劼毖之行著聞二十餘年而猶惓惓名其居以自儆者蓋君子不恃其所已能者自足且以祗帝命也将其逹諸事功可量乎哉吾友賓客胡先生為之記余繼為之銘曰凡事所務皆本諸身仕者之務承君理民事君猶天視民猶子惟義與仁發之自己心為身主惟能克明惟謹有恒厥績乃成心之弗清利欲所蔽若厥弗謹動底顛躓鑑蔽于氛濯氛斯皎心滌利蔽毫絲洞照車行于阪或仆于夷兢兢以持履豈蹈危矧儋崇爵方岳于佐矧時江右地廣民夥民之戚欣自我之貽吏之良愚循我之為致吾湛明洗滌汙濁廓然大公以求民莫臨事顓顓勵吾敬恭戒怠與忽審求厥中祗帝之訓恪臣之職保民于康導屬于徳退食之居大書燁如出入眎瞻用永終譽竹泉銘有序江陰朱善慶於所居疏泉藝竹適其幽澹之趣學士大夫為之文若詩富矣又求予言予聞朱故詩禮家而善慶慕德好文清尚士也為著竹泉銘云植物之生竹異且特匪剛匪柔清虚正直水出於山厥源為泉其㓗湜湜其行涓涓伊竹之脩清者好之伊泉之行智者樂之有逸者居既寛且幽有竹樷生有泉縈流可蔭可休可鑒可湘可詠可謌逍遥徜徉凡古君子維徳之勵有觀於外必飾於内淇澳之詩衞武之彰聖著䝉象育徳之方咨善慶甫古訓是師維徳之資非維宴嬉士竒作銘揭座之隅昕夕念哉式永終譽贊魯王書舊學贊有序魯府紀善王貞侍學魯王殿下将三十年貞以禮事王有言必正王以師待貞有言必聽嘗大書舊學二字賜貞又係以詞其徳之望之委曲周備貞間出見示夫為親藩而得文學方正之士輔之固難為陪臣而得仁賢恭儉之王事之尤難今觀此巻蓋交得之矣敬為贊曰奕奕魯山奠國東藩顯顯宗王維親惟賢其賢伊何如漢東平樂善與仁惟德之行臣王貞氏博學好古秉道與義為王毗輔王曰老成汝予師資汝言允臧予祗循之臣貞鞠躬㡬三十載敬終如初靡敢渝怠王曰噫噫汝良先覺汝予啟廸汝予舊學念之敬之王恒弗忘大書貺之申言孔彰貞拜稽首臣何與力臣既耄矣敢忘厚徳師友之益魚水之契維賢於賢希濶遭際臣貞來嗣世謹寳藏珍玉所存常騰夜光漢使牧羝贊有序河南布政使旴江饒君示余李伯時漢使牧羝圗嗟乎蘇公之大節偉矣敬為贊曰有漢之英烈烈子卿奉使北庭挺其忠貞幽窖阨窮飢齧旃毛摧屈愈厲氣振愈豪川嶽可移志不可奪陵律何人甘語乖刺羝也不乳鴈有帛書漢節來歸神明翼扶壮齡而出皓首言返上謁茂陵淚血兼澘人臣之義表表子卿終古弗磨日星其明奕奕麟閣有像儼如千歲之下亦有畫圗圗傳者貌史著者心永作臣軌來世攸欽節壽堂贊有序節壽堂者番昜士胡秉常奉母之堂也合母之徳與福而名之也母之徳非一節特其大端耳蓋母孀居四十餘年謹禮如一日今年七十有九學士大夫為之傳與記備矣秉常以名醫徴在北京於余往還厚故為作節壽堂贊其詞曰番有令母厥氏惟段柔懿夙成展也淑媛既嫓于胡實簪纓家父母之孝移於舅姑姑有遺息乳之育之訓之篤之長焉有歸舅沒㡬時夫也遽繼辛苦鞠躬號泣襄事抱癠在堂上有嗣姑無怙在襁下有一孤仰事俯畜致誠單瘁事亡猶存禋祀靡怠稱未亡人越四十年氷澄玉㓗式光所天禮度雍雍閨闈肅肅天佑徳人錫之遐福有子有孫有詩有書康寜怡愉百歲豈多髙堂奕奕有來蕃祉太史作詩表其族里東里續集巻四十五
