body:
  text: 東里詩集卷一明楊士奇撰四言賜遊東苑詩有序宣德三年夏上新作齋宫於太廟之東制度簡朴無華麗五采之施而髙廣端正淨深闓爽器什之供悉用髹漆所以萃誠敬致感孚之所也宫垣外為東苑先有圓亭茅茨土階楹柱不斫亭南疏渠甃池引泉注之湛焉澄明纎悉畢鑒中峙巨石駢若峰岫泉源􅀢沸於其巔潛鱗遊泳於其址其側隙地雜植名卉嘉木和氣所鍾特出瑞匏乃七月十有一日上視朝之暇燕坐齋宫召臣等至與言理道天顔悅霽奬諭再三遂命中官導遊東苑是日天氣朗清臣等歷睹既周仰惟皇上聖德恭儉尚質至於玩山水以適仁智之性即植物以驗造化之迹因潛泳以觀天機之流動皆道心之所寓也於是謹即所睹賦古詩九章云齋宫嚴嚴齋居清廟之側髙明澄肅靡雕靡飾帝時恭默對越秉誠有赫鑒觀錫祚萬齡圓亭翼翼圓亭法象上玄至朴不斫適于自然帝時端居遊思太極茅茨土階允配堯德方沼鑿方甃池制儀坤輿淨乎湛淵渾涵太虛有叢其植有羣其潛文王靈沼聖人同心翠渠湜湜澄渠天漢其宗凝如碧玉衍如翠虹發循宸居流潤下土惟帝德施周于天下黛峯蒼乎凌波如戴神鰲節乎峻嚴如瞻嵩髙上出氿泉亦時出雲惟帝樂之允契聖仁靈泉天一所生而出異源或噴于龍或躍在山智巧之妙渾然天成周流暢達允怡聖情御苑羣植斯蕃盎乎凝春中和之推時育之仁惟帝之仁始內及外保合太和爰暨四海嘉魚喁喁洋洋以遊以泳洪纎異羣咸適厥性爰適得所莫敢以罟矧帝之氓而敢以侮瑞匏清雲布陰翠虬縈條宛宛雙綬交繫于匏至和融闕育竒斯植表瑞靈苑式昭帝德芳桂堂詩為楊御史作連綣桂樹羅生堂前自我植之鬱其欒欒百卉具腓高秋始華湛露瀼瀼芳馨滿家有生必榮豈必在早不與衆競如彼有道堅貞之節四時不渝宜爾君子歲晏同娛題雪窗蘭粲粲幽蘭在彼巖阿春陽流輝惠風布和粲粲幽蘭在巖之下懿彼白石靜言偕處蘭生幽深孰知其芳自我貞素不知奚傷豫懷芳馨逺莫致之援琴彈絲薄寫我私題勉仁學士草蟲圖種瓜于田既勤且劬棄瓜于道遽厭其餘羣趨於腐為蟻斯足蟲睨于傍其亦有欲物各付物天道流行動植之微可玩生成辭雲山幽居圖翠嶺兮岧岧白雲兮洋洋渺澄波兮滉漾交春木兮芬芳息有廬兮濟有梁田可穡兮原可以桑蹇駑足兮周行時不處兮歲將晏遵東皋兮聊倣徉顔谷辭有序子初入小學聞先生長者説顔谷先生有道之士也又五年始能讀先生所為文章發揚道德之意時先生已殁矣今其子子明與余俱被召來京師得過從相講説因示先生所自作顔谷記伏讀數過蓋有以窺知先生之所存竊憾生晚不得撰杖履從後也作顔谷辭以志豫意辭曰山青青兮鬱盤又英英兮白雲藹嘉樹兮顔谷流瀘水兮澄源源左右兮上有原田魚潛泳遊兮禾麻秀蕃谷中之人兮連居接門一姓盛大兮伯叔弟昆不斫為飾兮朴之惇夕還誦絃兮畫行耨耘嗟嗟夫子兮超哉拔倫金玉為質兮組繡文握亷秉節兮服義仁褘椒茝兮有馥其身逍搖徜徉兮以秋以春胡不永世兮溘飄塵嗟嗟夫子兮身去名存懷不可見兮空可聞世紛紛兮華薄羣安得碩人兮永親空望顔谷兮涕泗沾巾培山書屋辭為金學士作崔嵬兮培山窈窕兮幽居前峩峩兮芳林俯溜溜兮澄渠鳥交交兮和鳴雲英英兮斂舒山中人兮採芝聊棲遲兮恬以愈集夫容兮為衣雜蘭椒兮佩褘列左右兮圖書以旦以夕兮不知渴飢爰稽古兮唐虞惟孔顔兮吾之師世逺兮心同遊志千載兮樂且無期靜與動兮有時承景運兮翺翔登金門兮玉堂煥雲漢兮發天章奉聖君兮九五𢎞化理兮道彌光眷山中兮故居渺豫懷兮能忘退軒辭芝橑兮桂户山阿兮水澨雲鱗鱗兮石磊磊交松蘿兮延薜荔華紛紛兮襲豫春之蘭兮秋之蕙羌何為兮獨往舒蕭散兮泄泄念盛衰兮有時盍滿盈兮豫戒撫年歲兮將晏日斯征兮月斯邁紛駸駸兮忘歸余何為兮靡止攬吾轡兮旋軫返吾車兮舊里恬淡兮以休全之兮終始懷夫子兮髙風邈遊心兮千載題畫延白雲兮山中蔭喬木兮水澨之君子兮空谷憺逍遙兮終歲五言古詩送尤文度歸吳中我友整遐裝誓將起旋歸平明發城邑率彼東路馳爰與二三子祖餞臨郊岐中觴趣分袂恨恨使我悲嚶鳴求其友竊慕伐木詩平生攜手好何為中仳離行當阻川岫安得睹光儀情敦思苦深久要諒不遺各言崇令德庶保黃髮期宿蔡胄秀才館中肅肅髙館靜寥寥夜何其天漢當西樓流月正徘徊仰觀列宿懸俯視平湖漪良時奉嘉會執手敘所懷清言以適意留連忽忘疲且當娛兹夕明晨與子辭夏夜用謝宣城韻答陸伯陽連柝起髙城微鐘飄廣陌徘徊夏夜長懷人未眠客林風有餘清庭月流虛白結思渺城南如何違促席題蔡騏練林先塜圖猶誦過庭教俄成陟岵悲塵生五色服空憶上堂時新塜楸梧緑深春雨露滋含情己無限更詠蓼莪詩雜詩三首贈陸伯陽中夜不能寐攬衣步前楹員靈肅清穆涼風颯以興秋蟲亦何悲流響於階庭徘徊感節變綿綿憂思生四時擲人去忽如流電驚立身庶及時僶勉苦無成竊愁盛年邁將與秋草并念之不得言俯默傷我情翩翩孤鴻鴈遙遙鳴且飛寒陰翳洲渚日暮將安歸棲棲客遊子獨往臨路岐薇食聊自甘卒嵗仍無衣達士守固窮遑恤寒與飢先民有遺言樂命復奚疑南國有佳人皎皎懷芬芳被服紈與綺五色何煌煌容儀希世有音響流四方我懷往從晨征越河梁喜遇誠獨難歡愛兩相當願得常攜手終嵗不相忘漢江夜泛泛舟入玄夜奄忽越江干員景頺西林列宿粲以繁凝霜飛水裔回颷蕩微瀾孤鴻從北來哀鳴出雲間時遷物屢變遊子殊未還短褐不掩脛歲暮多苦寒悠悠念行邁慊慊懷所歡豈不固時命苦辛誠獨難感彼式微詩喟然興長歎將歸廬陵送朱智南上朔風日云厲凜凜天雨霜征夫念行役遊子思故鄉宿昔纍歡宴一旦異飛翔晨興戒徒旅各已儼成裝齊驅上河橋祖送盈路傍駕言從此辭俯仰情內傷流波逝東渚浮雲越西岡去去踰萬里各在天一方嘉遇詎可期乖闕諒難忘惟當保貞素隨時以自臧歸程阻風凄風起西北日夕滿川坻寒雲結重隂曜靈隱髙暉驚濤浩縱橫零雨何霏霏行人念往路怫鬱多悲懷延領望故鄉誓將赴東歸臨津不能濟佇立以徘徊安得凌風翰奮絶起髙飛同蔡騏尚逺尤安禮文度朱智仲禮楊翥仲舉蔡胄用嚴遊東山得剪字步出城東門逍遙望雲巘纍月懷佳遊兹晨遂登踐梵宇繞層阿飛樓凌絶峴方塘涵湛碧喬林茂敷衍繁翳幽莫通丰茸紛不剪攀磴窮髙躋緣徑屢回轉是時微雨收輕霞淡舒卷睇遙素橫川俯夷緑盈畎陟降體自便顧睇心巳緬况接曠士言復偶釋子辨析空理弗昧違喧抱逾展何因此間棲永令浮慮遣雪中飲陸伴讀斗室新齋坐間敞瑞雪晃清姸寒消碧窗外光動玉琴前淹留酌甘醴朗詠瑤華篇自然紛慮靜即此對羣仙送蔡胄秀才歸四明僕夫起嚴裝白露晨未晞之子思舊廬星言赴旋歸路指東海陬翩翩忽如飛羈鳥懷並棲須臾失相依仰首望鸞鷟何時接光輝山川信緬邈宿昔分不違無為金玉音使我長歔欷送宗上人歸君山初維鄂渚楫又上嶽陽舟行住皆無繫身輕波上漚寺連龍井近山壓洞庭流回望王城裏還來持鉢遊送性上人歸巴陵獨松菴老襌心湛寂身被七條衣端坐無言説誰知精道機初來鸚渚見又問嶽陽歸應憶松菴下諸僧候錫飛題郭氏溪南齋幽人諧靜適結宇臨溪園溪流清且深逶迤帶平村榆桞植我楥逺岫列我門碧篠播春隂芙蓉麗秋暾逺絶往還迹遂忘㕓市喧坐玩孔氏書覃思古人言玄理日有得可以祛塵昏素琴雖無絃旨酒常在尊意至時有適登髙睇澄源謳吟發舒散一寫中鬱煩棲遲固夙尚貴賤命攸存知分吾所安誰謂輕華軒斗湖道人詩家臨斗湖濱門對斗湖上明鏡影香臺文波繡仙氅誦經無輟口談道若指掌為霖從潛虬飛符驅魍魎止水涵湛然可以喻心想一謝湖邊人終年罷來往樵雲詩悠悠南山雲素心淡相似偶託樵采迹遂隱山雲際雲中有灌木四散枝葉繁薄剪去雲翳詎令傷本根昨朝買斧來暫入廬陵縣五馬出輝煌低頭愧相見芙蓉蕩暗靄環洲亦氛氲一返伐木處丁丁誰得聞題施員外畫久曠山水遊披圖適心目逺岫雲外青清潭千丈緑芳尊集幽舫春鳥鳴髙木茅屋是誰家門無往來躅送胡子澄遂安知縣初日麗金閨香風含玉殿之子承湛恩銅章宰花縣匆匆下長浦靡靡經芳甸馳情在民瘼銘心答天眷嗟豫重朋侣三春不相見偶聚還暌違臨岐空戀戀送曽仲修訓導赴新淦玉笥抗雲漢金川泛晴虹山水互明麗照耀城邑中連延開綺構崔嵬表黌宫爼豆謹常祀絃歌曰渢渢君子抱德藝出教屬時雍髙齋振木鐸濟濟來遊從峩冠講周孔表率誠在躬兹晨餞發軔飄拂乘長風因結故園想悵望南飛鴻永豐曽氏龍潭書屋開軒面澄潭潭水緑於染其下蟠蛟虬四時興有淹嘉樹羅蔥舊煙霞互舒斂晴漪漾春牖涼颸含暑簟俗轍謝經過書卷恆不掩探微心有得行素道無歉消搖視天宇油雲馳冉冉庶跂沂上樂誰當歎與點送石彥誠徐聞知縣朔風起嚴冬凜凜亘晨暮我友整行裝迢遙戒長路祖餞集朋儔暌離黯情緒念子敦德義雍容古人度飲水必澄源涉蹊無枉步伊昔丞小邑婺樂仁恕朅承公車徴同遊玉堂署遂荷遷秩榮還嬰理民務揚舲泝江湖停艫展丘墓行行睇嶺海稍稍侵煙霧恭惟承宣重豈復驅馳慮會興中牟治終流單父譽嗟豫託久要慙乏贐者具惟期保貞素永副心所慕竹間詩為李伯葵賦夙志在間適結宇城東隅修竹何漪漪叢生羅庭除雖無灌木蔭清雲鬱紛敷四時自蒼翠寒暑常不渝天風起旦夕繞屋含笙竽何必來羊求靜閲古人書至理會有得陶然傾一壺油油天壤內安知憂與虞晚過揚州朝辭儀真壩暮過廣陵城前汀交瞑色逺渡聞鐘聲微微初月輝湛湛天宇澄仰首望北辰衆星粲然明商颷從西來忽忽涼思生掩篷坐終夕慨然念修程邳州岧岧下邳城浩浩河流騖佇立思徘徊古人今何處船頭見青山山下連煙樹白鳥自幽間雙飛背人去歌風臺漢皇靖宇內六合承統御萬乘還沛中龍旗翼鑾輅興情側微曰張筵會親故酒酣歌大風氣勢排雲霧往績示殊偉丕圖懷永固衆起稱萬壽𢎞哉帝王度寬仁運乾剛四百隆鴻祚至今千載餘光華垂竹素崇臺面河曲穹碑倚煙樹我來屬秋杪維舟久瞻顧矯首芒碭雲淡淡青空曙同金公素自棗林閘步至魯橋望鄒嶧山舍舟步平皋名山望鄒嶧元氣下磅礴黛色凌空碧千里瞻神秀羣峰避孤特常時濟物功有淹𢎞靈澤偉兹造化竒無應辱秦刻經旬坐局蹐一覽豁胸臆何當躋絶頂曠然見溟渤胡學士山居六景芳洲春草窈窕河上洲芊綿芳草碧常與幽趣會消搖散輕䇿一往白玉堂經年無履迹望望楚江西煙波渺春色墨潭秋月峩峩墨潭山純浸潭水碧髙秋明月懸照見蜿蜒黑憶昔乘桂舟沿洄弄晴夕同時釣遊侣惆悵千里隔滄江煙雨憶昔滄江上煙雨時冥冥遙隱江波白復含江樹青鳬鷖近屢見漁歌清可聽何必撫圖畫然後怡性靈天玉泉石岧嶤天玉峰髙出南斗上自昔采靈芝託身此蕭爽掃石青雲生鳴琴答泉響巳趨金門直猶結丹霞想石屋晴瀾石岡俯川澨嵌巗下成屋天際薰風來輕波蕩文縠上有相知人蕭散出塵俗永念故年時扁舟往來熟螺岡晚照西望金螺峰臨夕宜返照川明天光淨瀟灑若員嶠振衣援紫蘿凌髙發清嘯解組如有期吾儕亦同調題富春柴桑二圖聖人撫昌運四海洽時雍間對桐江水湛然心迹同懷仁以輔義百世仰髙風瑣瑣厭形役飄颻賦歸休開軒面南山黃花亦映秋酒熟自可漉白社吾何求送進士彭琉赴政和知縣霜露凋卉木朔風激郊原之子戒行邁相送城南門馳車指甌越靡靡無停奔山川間道路氣序異涼溫仳離方自兹曷舒中鬱煩念子同鄉彥令質挺璵璠徑節夙所尚古道矢弗諼賓興屬昌期出宰膺明恩善政崇教育化理由身惇行矣懋樹立以副平生言送康孔髙紀善還鄉澤暄氷始泮林霽雪猶積肅肅征輛馳翩翩城南陌以我同旅人看君獨歸客青春别鄉縣白首滯京國念此增懷思何由盡離席題王性存畫輝輝山水麗雲樹藹青蒼髣佛永嘉郡環臨西射堂朝回書閣靜對此故難忘題蘆鴈北風吹葭菼輕雲覆洲渚萬里鴈門來優哉此棲處南州少霜霰中田剩禾黍大夫不用贄虞人焉慕汝雨中寄蔣用文院判北風吹行雲凌虛俄澶漫城上朝雨懸渠裏寒潮斷退朝出天闕懷賢坐林館趨謁當何時聯珂待清旦送王彥鼒還南京得離字旭日照圻甸北風寒路岐蕭蕭驄馬鳴矯矯將南馳停轡仍踟蹰還顧與我辭念子我同里且有中和資不見巳三載乖違復在兹山川緬迢遞何以贈仳離白圭易為瑕素服易為緇勉哉慎厥終以副平生期送陳正言知府歸雲南得銀字日照東南隅門有車馬賓飛蓋映華轂高鞍鏤素銀别我將有適念我夙所親山川萬里途逺行多苦辛何以贈暌違承流貴及民謙謙君子德恂恂長者仁惡旨好善言昔有大聖人稽古以力行敬哉願書紳題勉仁學士歲寒圖歲晏朔風徑雨雪何霏霏原陸莽蕭條百卉具巳萎鬱鬱凌雲松猗猗修竹枝皎皎林間梅鮮葩亦巳披並秀以相依况與瑤華宜瀟灑清白居足怡君子懷艷陽耀丹蕚頳霞映紫㽔當春豈不時不及商飊摧諒非沍寒節曷表貞素姿永託金石契遲暮以為期吕主事泰山春雲圖東岱五嶽宗雄誇齊魯疆磅礴據深廣峻極凌穹蒼春雲起膚寸乘風歘飄揚彌谷乍藹藹浮空忽洋洋日觀不可辨環道杳茫茫若人尚父裔家居岱之陽詩書際明世冠紱趨朝行引領日東眺含思在高堂不聞泰山雲作霖雨八荒僶勉勵所志以副君親望送廖主事還南京薊門宿雨霽西山翠如掃送子出城闉看山還懆懆念子匡廬秀秋官致身早皎潔瑚璉質嵗久聲逾好昔晤愧匆匆兹别仍草草百年幾離合不覺壯巳老斗酒慰羈顔商歌寫幽抱貴賤各有分貧富安足道何以贈暌違清名逝為寶題伯牙子房子猷太白四圖八音絲為尊由來識者難邂逅兩相契何辭為君歡妙絶山水操殷勤一再彈相知茍不盡徒貽後時歎興王必有佐授道自有師長者幸賜教鞠躬敢辭卑向來一編書帷幄坐見施從容成功退去謁榖城祠都城二三月名花豔芳春車馬填九衢歌鐘動四鄰焉知竹林下瀟灑絶纎塵興至時獨造清風含八垠夫容九疊屛上有瀑布懸浩浩不可極銀河㵼青天覽之登髙詠超然錦袍仙觀物當求源我欲升其巔題髑髏圖漆園傲世者放言出糟粕大觀天地間玩化以嘲謔晝夜自恆理生死等酬酢存順而殁寧焉往非吾樂齋宿聽周編修彈琴羣處諒有適單居恆鮮歡樂只衆君子齋沐此盤桓華缸照綺席香氣藹焚蘭爰理嶧陽桐為我三四彈遲遲寫啇意宛宛含幽歎怡我中和抱滌我沉鬱端所懷在古操焉知清夜闌李孟昭挽詩月落城烏啼風凄寒露繁轜車戒明發祖送城南門挽者皆喪歌增我中鬱煩向來相知人古道子克敦荆玉抱貞潔楚蘭含幽芬周行慎素履雅義播清文表俗賴耆俊啓迪資多聞德業之所造詵詵各髙騫如何乘化遷奄忽在兹晨渺渺東去波翩翩南飛雲銘旌望巳遙涕淚空沾巾遊白雲觀二首得白丹二字仲春氣清和招攜適所適揚䇿指靈阿聯鑣度修陌山開畫障明川含浮練白真境歷逶迤玄關敞虛寂既歆道氣澄緬望塵氛隔金鼎窺神丹玉壼潄雲液瀟灑兩仙童妙歌出金石石髓會當逢瓊芝庶可食雲臺逺人境升髙適奇觀西瞻五華秀東顧緑漫漫坐玩金夫渠流詠翠琅玕祥飈含桂樹仙禽唳石壇聞昔有至士於此養神丹飛蓋一朝舉翺翔紫霞端道髙用自超志一功匪難脫屣當何時相從命青鸞朱中書為余寫溪山幽趣彥鼒南還遂以贈之并題詩云山翠拂雲清溪光湛虛碧林亭攬澄爽超然適所適為有江南趣持贈江南客公暇或披圖還應憶江北西城宴集得醉字置酒清軒下衣冠聿來萃皆我同朝士各有祿與位昧爽趨在公日夕還未至屬兹嵗除暇一觴聊共醉匪徒展間闊亦復解劬瘁平生所相好豈不在名義中和誠可則貪鄙誠可戒僶勉以自強前修庶足跂送曽侍讀歸省都城春如暄淡蕩風光好雪罷氷亦泮長空曀如掃文瀾漾太液晴霞湧瓊島顧我同署良行邁何草草髙堂念親癠夙夜心如搗豈無一觴酒為子餞逺道去鄉三十年昔壯今巳老同邑不同歸臨岐增懆懆題王孟楊檢討鶺鴒圖平生急難意悵咏鶺鴒詩緑水夫渠後清秋獨立時王家好兄弟對爾自怡怡早發桃源凌晨牽灘瀨將暮泊沙渚沙頭賣酒家好者釅於乳舟子沽大盎相共解勞苦飲酣意氣豁放歌雜嘲語中夜風水聲倏如颯飛雨雞鳴棹謳發挂席逐前侣題劉逸人樂耕卷理生雖異業居世皆有務治本既在兹食力余所慕九扈春始鳴興言向田墅初來正溝塍爰方藝禾黍雖有耘耨勞三時足甘雨嵗功聿已成屢豐報田祖儲貯何必多取具充寒暑有酒可同歡時時會鄰父既醉去悠然登髙睇平楚一為擊壤謡遊心緬千古雪夜胡學士載酒見過劇飲四鼓乃罷明日辱詩次韻奉畣開嵗巳旬浹消搖休暇中良宵雪初霽玉色明房櫳君子枉青盼眷言寫歡悰豁達髙世情脫略塵慮空從者陳豆籩中筵粲鮮醲雖云朋侣稀屢促觴酌崇旋艫誚王子投轄嗤孟公氣合自淹留清言益渢渢芬馨逼蘭茝和洽諧絲桐雲巾耀朱氅初疑降青童聽歌以成醉復如對南翁倏忽踰夜分起視月朧朧參差仰象緯沖融散條風雞鳴戒朝謁又促明發同題陳叔起畫青山帶長林虛亭敻蕭爽溪水流玉虹天光涵滉漾俯潔淹淡遊塞芳愜幽賞邈爾髙世懷脫略浮雲上惟有同心人扁舟日來往舟次安山驛尚書蹇公奉敕南歸僕與公素北行臨岐執别情見乎辭同來不同歸臨分俱慘戚昨日别家情何如此時劇悠悠北逝川杳杳南飛翼天寒道路遙相望恆相憶題孫給事畫山水諧素心幽居託林樾日暮淡無營超然孤興發時攜緑綺琴坐待青天月道傍杏花一樹盛開碧草初出地杏花紅滿枝粲粲耀晨旭盈盈嬌路岐稱我庭階賞植逺不可移玩之未忍别念當長育時蓮葉舟圖若人有道者脫迹凡塵中身輕御一葉消搖若乘空仰接三光近前望十洲通超然遊汗漫不與世人同正月六日偕鄒汝舟庶子金用誠司直張伯原司諫過姚友直洗馬飲得麗字緒風回微和青陽肇新嵗官曹屬休暇朝簮盍交契虛館坐幽深南窗敞明麗清言暢素抱至理有超詣醇醪寫芳冽嘉肴列甘脆觴行屢循環歡洽忘次第既醉各巳歸獨淹余豈泥磬折辭主人斜月皎庭際雨中寄鄒仲熙侍講炎月苦淫雨抱疾坐幽居淖泥橫隘巷流潦溢深渠巳絶還往迹遂將人事疏時聞黃鳥鳴交交屋東隅豈無斗酒酌間玩古人書興懷在君子夙昔同歡娛契誼託金蘭清德重璠璵跬步不可即而况千里餘仰瞻白日暉屏翳何由舒念離余未弭單居子何如送王胡兩生歸西昌卞和得荆璞獻之以為珍當時不見信棄置同凡珉任公釣東海終嵗無寸鱗一朝乃大獲厭足浙河濵丈夫遇有時屈伸理相因黃金築高臺青雲登要津古來公卿貴皆出畎畝民兩生吾鄉彥讀書非隱淪白日辭都門歸卧煙蘿春努力崇進修人生豈長貧送劉憲副之四川二首寒飈激原野鴻鴈紛南征念我同心侣嵗暮萬里行蕭蕭驄馬鳴惻惻臨别情子懷亷潔操炯若氷壼清偕處誠所樂離居非所寧矯首西黃鵠何時重合並聖皇御四海華夷同一仁命吏乖撫綏乃有狂弗馴西羌近搆患邊人以憂勤王師振天討旦暮捷奏聞丈夫效時用所重在安民肅清固職分僶勉敷陽春贈傅仲禮二首猗蘭生澗阿邈與塵氛違清泉帶叢薄白石相因依淡無艷麗質皎潔何菲菲惠風日披拂湛露晨未晞我樂往從之芳馨襲滿衣愛重不忍折徘徊暮忘歸籊籊林間竹上拂青雲涯清虛挺直操特達含貞姿四時來天風鏘鏘韻笙箎常與松柏茂豈為氷霜萎我樂往從之瀟灑同襟懷願言篤永好載歌有斐詩七言長短句送朱智南行白日皎皎忽南馳流金爍石赫炎威念君行役當此時山髙水深路逶遲豈不慊慊思東歸涉歷險阻赴邊陲翩翩飛蓬風揚之君今一去來何時我但煢煢恆苦思黃鵠日暮獨逺飛徘徊感激淚霑衣詠水鏡同陸伯陽作秋江無雲風色靜怗怗涼波徹虛映佳人曉汲照新粧不知俯首濕羅裳陳烈婦詩結髮為夫妻調琴弄瑟兩相宜生諧同室居死願終不離北風涼冽激庭樹中夜折我連理枝死者無復榮存者空何為一雙南湖錦翼鳥雄先決起雌隨之嗟嗟陳烈婦金石真自持題寶義堂晨雞喔喔東方明家家營利出門行東馳西走紛相逐百千取萬終不足髙堂靜居無所為團團緑樹臨清漪斑衣酌酒奉慈父賢兄令弟皆怡怡人生雖貧重有道黃金如山未為寶寄題聶訓導清碧書舍卷有陸員外畫吳中書詩沙羡初來識君面旨酒髙堂促歡宴鸚沙鵠嶺遽分攜五載相思不相見片帆來往蕭灘下見爾灘前舊精舍碧嶂清江淨俗氛古木流雲起炎夏往昔聞君此隱淪讀書學道擬終身山頭麋鹿下窺戶沙上鳬鷖不避人光風華月共徘徊秋桂春蘭迤邐開灑翰尋常舒逸興賦詩往往發竒才時來未得安肥遁泮水橋門逐髦俊一官典教荷朝恩千里思家隔鄉信畫圖誰寫故園春題品兼看藻詠新南宫初傳米員外西掖皆知賈舍人我家林亭鷗浦側一住京華歸未得展卷因君激素懷更與裁詩寄相憶送中書徐舍人歸省兼問訊乃父茂良長安門上飛雪花長安門外客還家挂席龍河欲分手寒氣飄飄墮杯酒憶昔君自桂林歸手持彩筆趨彤闈詔書五色出揮灑鸞翔鳯翥生光輝鄉里青雲多故人愛君於我更情親鑾坡鳯沼地清切曵紱鳴琚皆近臣君住文江近楓嶺數年出門違定省九重昨日許歸寧千里長風去俄頃家人歲晚俟君來小洲寒梅花正開庭闈欣顧舞綵樂鄰里爭看著繡回嚴君髙年重清逸我曽黃鶴樓前識過庭想見問京華好為殷勤道相憶賦得彭郎磯送王澄淵知縣彭郎磯連峯秀如馬蜿蜒崒嵂凌煙霄萬里江流走其下彭郎何處所大姑渺相望小姑雲鬟亦誰見對門一柱空青蒼晴雲寒雨朝還夕飛鳥回翔樹如簀楚舵吳檣日往來江上行人幾今昔西連彭澤縣髙栁當縣門過者紛紛憶陶令小姑彭郎誰暇言去歲東來謁丹闕磯下徘徊清興發今年作令蜀西行重過磯邊還有情情思彭澤千載士豈為彭郎山水清送鄧指揮鄧將軍家住文水濆十五襲父爵桓桓氣凌雲二十年前尚年少鎮撫西湖到南詔紛紛蠻部未知名手提一劎身橫行去年蠢爾猶紛爭片言折之無不平萬里歸來報天子奏對邊情若流水御前官賞賜勳勞象笏朱衣拜丹扆曙光曈曈射雙闕又奉天書戒明發青驄玉勒飛騰驤楚水黔山去超忽雲南到時花未飛還以天恩諭逺夷只今四海遵文教獨恃短兵何所為送劉孝章南歸北風吹洲渚十月蘆花飛經年别鄉郡寒冬方始歸朝發通濟橋暮瞻九華岑乘潮蕩蘭槳煙波愁我心家住廬陵近文水青春為客都城裏常時車馬來故人自擁皋比課童子知君力學富詩書心似間雲隨卷舒夜夢髙堂見親面曉起歸情疾於箭嗟豫握手未斯須臨岐無那增煩紆明年春鴈聯翩過莫向山中斷寄書湘潭王知縣城南親舍詩永嘉城南親舍幽永嘉城上雲悠悠三年作官慕祿養每日思親增别愁愁心常逐湘流水直到城南海東涘人生樂親貴及時未報君恩未得歸他年官頒五花誥一門慈孝有光輝吕梁洪吕梁洪截流巉巖立巨石森若虎豹蹲欹側洪波中射勢怒激鳴聲喧豗萬鼓擊自昔疏鑿出神力側身望之皆辟易蜀江瞿塘險莫敵百丈牽船載牛軛棹夫操篙捷貫的君不見北來南去皆安流未若人心不可測涿州行四郊茫茫沙草白青山迢遙亘西北涿州百里近都門北來南去無晨昏道邊郵亭連古堠時平不置官軍守土牆茆屋盡耕屯半插青簾賣新酒牛車轔轔衝早寒爭先稿秸輸縣官少年家家便騎射雉兔如林不論價由來意氣傾山岡邂逅相逢肯相借伐石為碑記古人凄涼遺刻百年存摩挲三歎憶盛德路人為指樓桑村題山水畫圖贈胡存淵南歸胡先生家住鷗江上半生宦遊走湖海林泉不歸勞夢想誰為點染三尺綃流水磯頭疊青嶂氣勢崢嶸五千丈春雲如波浮滉漾蒼松森立蛟虬蟠白日天風動蕭爽幽尋適意玩飛淙散誕何人獨長往先生撫圖心懩懩三顧之山憶仙掌岫幌巖扉久寂寥芝草琅玕為誰長童子松陰抱琴路想像當時舊行處清節書臺望杳微倣佛龍湫起煙霧胡先生明日歸帆暫南去玉笥匡廬莫淹駐仙人盧度待公來立把瓊簫倚春樹蕭子敬之官嶺表以無為真人寫竹求題上清真人紫府仙手揮玉管開雲煙翩然騎鳯遡寥廓空有遺迹人間傳相隨萬里南溟路對座朝朝瀉青露春雷起蟄正及時變化須防解飛去題劉伯塤所藏雲山圖一片青山是何處復嶺層巒清可數春來縹眇生白雲雲際連延見芳樹雨聲半夜漲溪流隱者虛亭近水幽尋常書帙有真樂况復同志來扁舟展圖倣佛沙溪路四十年餘記曽去鵝鼻峰高捲翠嵐雞潭波靜澄寒霧百川先生富天趣一笑相逢豁襟度攜酒持魚踏白沙共我酣吟不知暮先生乘雲竟不歸令弟郎曹榮錦衣每同感慨論疇昔還憶舊遊心不違我愧非才侍丹闕壯歲叨榮巳華髮投簮他日或蒙恩更訪沙溪棹月明奉教圍獵擒虎歌山頭圍獵日將午猛士如林盡貔虎凌雲銅角一聲落馳馬爭前捷飛羽草間咆哮誰敢攖赤手縛之如縛鼠柙中耽耽目如炬猶激陰風動平楚生擒一虎直百獸况乃殺獲連四五睿情所重揚威武奏凱歸營疊笳鼓山村羔豚散不收掃除民患民無憂歡呼仰荷儲皇賜道傍拜舞歌千秋友松軒蒼楠翠柏連山丘楊家繞屋青松稠百年雨露涵深澤六月涼爽如清秋勢凌千尺浮雲外黛色團團拱車蓋陰森晝晦起蛟虬蕭瑟天風振竽籟若人好學懷竒姿瓊林秀出珊瑚枝由來孤髙秉異尚愛此挺特同心期結廬松下棲遲久坐卧看松與松友徑操何殊處士梅間情未説先生桞才髙何必老深林清廟明堂會見尋惟應晚歲氷霜節永矢平生金石心題曽學士竹石田篔簹不百箇滿池羃羃春雲陰神仙疑來旌節降風雨欲動蛟龍吟江南種竹家家好北來見竹如見寶何人胸中富淇澳醉墨淋漓為公掃六月蕭蕭不知夏白日長空翠如瀉九龍山人不可作對此陰森亦蕭灑馬頭紅塵千丈深朝馳暮走積滿襟興來拂衣何所適夢憶山陰修竹林愛君城西卷雨軒蕭爽可以舒鬱煩朝回借坐共永日不須砍鱠傾金尊送田郎中還南京武庫故人昨日南京來兹晨還向南京去過門握手一相見遽别能無黯情緒十載勤勞地官屬富有聲華照郎署太平武備五兵戢升擢還應屬祈父功名淹速各有時所重持身在清素玉堂學士子同鄉索我題詩贈行路是時雨霽都門道沉霧飛埃淨於掃日射西山如錦屏紫翠夫渠湧瓊島長風吹帆發潞河齊魯山川坐看好江南嵗晚還相思努力榮名以為寶題嚴氏光逺堂朴山先生天下士明經著書遺來世宰相持書獻天子寵召除官列中祕結纓彯組青瑣闈蕭散終懷荷芰衣明日上書乞身去萬里碧霄鴻鵠飛窈窕煙霞護丘壑共羡知幾返真樂園田舊繞柴桑居山水清於富春郭又百餘歲傳曽孫束帛徴起官橋門峩冠正席講周孔詵詵俊彥羅璵璠兩賢出處各有道前後聲華相映好光逺堂中春不窮喬木風煙拂晴昊插架牙籖萬卷存焚香掃徑無塵喧階前暖翠看慈竹嵗嵗年年蕃子孫為行儉題五杏圖贈院判蔣主善昔時廬山仙杏花千樹萬樹如丹砂照巖炫谷總春色功成仙駕登紫霞淮南蔣氏今董奉父子聲名萬金重聖朝國醫非一手蔣氏竒能比星鳯鳯池舍人寫此圖賢貴固與凡民殊玉堂學士經濟具何啻報功論五株送彭御史歸養得忠字銀鞍金勒赤汗驄鐡冠霜簡衣繡紅祗事明主趨九重豈不夙夜懷匪躬北堂違逺心沖沖日斯征兮薄髙舂天鑒孔邇昭微衷鳴珮朝下篷萊宫惠風條暢淑景融我出祖餞城之東念子夙昔言笑同含思凝睇冥飛鴻雖有羽翼不能從人之大節孝與忠永矢弗諼在敬恭何以贈子嵗寒松期子譽名揚永終為鍾舍人題孟端竹近年畫竹擅名譽九龍山人誰比肩歘忽乘雲去無迹但有遺墨人間傳中書彩箋盈尺許寫贈平生鳯池侣倣佛瀟湘月下船掀篷卧看青鸞舞翠簾不捲珊瑚鈎虛亭六月風颼颼山人或者念疇昔雲端應下蒼精虬郭端僉憲之交趾家故有葵菊堂宫錦繡為衣青驄白玉蹄官遷五嶺外路出大江西草堂舊在雩陽郭便道還家意偏樂水色山光瀉向人紫葵黃菊嗟非昨手持憲節重肅肅念王程聲馳白簡飛霜厲氣壓黃茅瘴霧清只今瘡痍極邊土宵旰憂勤荷明主未須搏擊䇿殊勳好盡懷綏副當寧賦得薊門行送胡元節廣東憲使晨起出薊門念卿萬里客驄馬錦連錢嚼嚙黃金勒卿行銜命有光輝朝下初辭青瑣闈西山曉翠凝瓊珮北闕睛霞艷繡衣紛紛相送薊門路絲繩玉壺瀉春露今朝攜手當薊門明朝相憶知何處登車攬轡志澄清知卿慷慨自平生他時廣海成功日還憶薊門臨别情臨川吳氏慈節堂結髮被襟帨來為君子嬪行年始三八空遺未亡身玉臺寂寞掩明鏡羅帷慘淡棲暗塵膝下兩男兒提攜心獨苦寒窗雪夜課詩書虛牖霜晨把機杼臨階雙桂同本根春風並秀凌青雲煌煌珠翟明鶴髮壽酒日進慈顔醺嫁時白玉鏡團團光皎潔百年髙堂樂未央長看清輝似明月送楊參政致仕歸永嘉兼簡宗豫楊大夫起自章逢儒清涵炯炯氷玉壺平生胸中書萬卷上泝鄒魯窺唐虞年未四十遊帝都朝朝冠珮明庭趨退陪天官品量天下士區别髙下賢與愚縉紳可望不可近大夫自視淡若無出佐方嶽薇垣居施政不亟亦不徐春風披拂枯稿蘇時雨霑灑惠化敷閩南八郡五十邑詠歌鼓舞連道途列聖相承三十載大夫夷險一節終不渝白髮如絲未全老成功而退合天道山林鐘鼎固有命得退還應健時好五月燕南雨晴早清鶯啼滿緑楊煙舞蝶翩翩弄芳草大夫拂袂出都門我往餞之心懆懆逸翮爭騫銀漢雲蹇駑尚戀天間皂雁蕩秀拔東海堧夫容作花浦嶼妍謝公舊遊清境在解紱可以長周旋何須吳歌越舞酣高筵何須丹砂玉屑圖永年但令俯仰無愧天任情隨意合自然武英學士清無恙鶴氅雲巾曰來往太史行將望聚星定在斗城華蓋上題朱給事所藏馬牛二圖矯矯皆雄姿來從渥窪涘金羈未絡頭散誕春風裏試令剪拂效驅馳君看一日輕千里宛宛栁絲柔綿綿芳草緑三月耕犂間春田雨新足紛紛陌上驟青驄獨占溪南坐黃犢賦得滕王閣送别章江西來繞洪州滕王高閣臨江流滕王去後無千嵗髙閣人間幾興廢昔聞貞觀全盛時大廷金册封宗支時平還出領旌節富貴非常驕逸滋正對西山俯南浦雕欄朱檻參差起玳筵鳯管雜龍笙白晝歡聲彩雲裏留連晚日下簾鈎别有漁歌聞上頭回眸共眄滄洲際杏彩蘭嬌影娥翠只言歡樂殊未央城頭一夜飛秋霜三春榮盛逐流水佩玉鳴鑾俱渺茫年深代易無此閣好事何人為重作絶世流傳蛺蝶圖東風粉色皆消落只今閣空臺亦平瀕江但有滕王亭松門薄暮掩修竹數葉蕭蕭寒雨青當時棄德耽遊宴身後荒涼竟誰歎一種南昌孺子亭行人下馬思東漢君行幾日過江津弔覽應知作賦新文章自昔三王盛還見今人繼昔人題勤司務畫峩峩青山英英白雲緣岡繞岸合蒼翠澄波浩蕩龍鱗文蕭散彼何人樓居託幽谷心與雲山清坐看雲山熟釣魚艇子一絲風門外還來張子同沃洲禹穴定何處夢想江南越中路白頭無補負明時亦欲投簮采芝去古樂府同陸伯陽作巫山髙巫山髙髙十二峯連崖疊巘重復重昔時陽臺下神女翠斂紅銷空處所朝朝峽裏望氛氲可憐猶似作行雲相思巳下霑裳淚况復猿啼不可聞蜀道難蜀山峩峩連劔閣百丈飛崖俯奔壑逶迤鳥道出雲中江橫石棧凌虛空行人未行先膽落馬足凌競度還却由來此路險莫當王遵䇿馭如康莊未若人心有﨑曲眼前十步能摧轂秋夜長月明星稀河漢涼髙秋蟋蟀鳴洞房愁人不寐獨倣徨披衣徐步出東廂白露如玉蘭委芳感激涕淚紛縱橫為君含思思斷腸念君迢遙異他鄉欲往從之河無梁夜長悠悠夜未央援琴彈絲寫哀傷山川萬里永相望我獨與爾為參商楊白花楊白花逐風起含霜弄雪太輕盈蕩日搖春無定止樓中佳人雙翠顰坐見紛紛渡江水天長水闊花渺茫一曲悲歌思千里將進酒將進酒酒滿甌華饌肆陳炮羔炙牛將進酒酒滿觴髙懷雅度衆賓在堂將進酒勿蹉跎奉君壽為君歌白日西逝黃河東馳人生幾時將進酒青天翳雲滄海揚波人生奈何將進酒晴光搖蕩二月時紫花葳㽔黃栁垂花前百鳥春亂啼玉顔雪皎揚素眉清歌宛轉舞逶迤將進酒君莫辭君馬黃君馬黃我馬白並出青樓東俱馳緑楊陌陌頭春日遊人多復恐紅塵暗玉珂長安大道淨如洗回轡聯翩若流水一雙意氣逼青春共指天門五雲裏男兒髙步會成名何須一日千里行紫騮馬紫騮馬黃金韉五花錯落錦連錢三鬃剪出鳴向天紅絲飾鞚珊瑚鞭揚鞭攬轡殊慨然願得出身事明主馳馬揮刀奮威武一為除凶報千古行路難行路難路多岐青天白日光洞地出門相背東西馳憶昔貧賤時兩情如膠漆共言生死不相違握手披肝誓天日君今得意成大勳金章封侯蒙主恩六曹貴臣却避馬兩府官僚趨過門一朝富貴誰能及翻笑傍人百憂集平生金石安足論對面雲泥不相揖世事悠悠安可期芳春花木秋易衰氷霜歲寒不改色却羡南山松柏枝陌上桑陌上桑柔條未全徑碧葉紛低昻秦家女兒年十五朝日成粧把筐筥把筐筥盈盈南陌前明珠結寶帶翡翠貼花鈿一身皎皎盡成妍使君從南來顧盼久徘徊遙見東方騎惆悵空乘五馬回關山月關山月皎潔如清霜連營接幕夕流光流光猶得照故園征人見月徒傷魂四時弦望如流去可惜韶華暗中度深閨少年兩别離還如嬋娟缺半規缺半規三五來復圓一身逺戍何時旋結客少年場行置酒髙堂上嘉殽列肥鮮結交並豪俠四座皆少年意氣不復殊肝膽相披宣仰視白日輝一言誓青天貽我紫綺裘報君珊瑚鈎暮從邯鄲飲朝入洛城遊橫行無七貴傲睨凌五侯腰間雙青龍精光含九秋投軀報知巳慷慨當仇讐性命如鴻毛夕死無怨尤從軍行六章少小從六軍英聲振三邊拓疆有勳業貂蟬二十年遭遇亨嘉辰萬里淨烽煙顧視雙寶刀精光猶徹天寶刀白晝鳴旄頭出西陲平明有詔書遴選行率師甲士百萬餘桓桓各如貔慷慨出門去妻子安足辭出門意氣都上馬跨雕鞍旌旗亘千里戈矛霜雪寒來蘇望苦深遄驅敢辭難經過令嚴肅雞狗亦得安令嚴豈不惜軍動良苦辛氷行屢及暮露坐恆達晨所倚主將明撫養義且仁恩威兩無遺誰不思奮身奮身一何勇壓敵三重圍師行倚大義奇謀定足希所向勢莫當降者日以歸殺之昧天道縱之表皇威皇威既清肅奏凱發回軍明旦謁金門飲至勞殊勳賞賚過百千麾下歘見分拜稽謝萬乘歸釣清江濆雨雪曲邊城九月盡雨雪正霏霏兼霰侵氊幕如氷晃鐡衣塞垣深莫辨邊雲冷不飛鬢毛分可擬征戍幾時歸上之回傳警甘泉外揚鑾載道周回中戒巡省雲動赴遐陬春色承雕輦山光影翠旒吾皇億萬嵗嵗嵗總來遊芳樹曲陽和二月時列樹發葳㽔凝輝映綺閣飄香度錦帷蝶戲栖浮蕊鶯響隱髙枝芳華今若此千春亦不移折楊栁雙堤夾道傍垂栁復垂楊攀條知色改綴絮訝絲長思婦悲遲暮征夫望故鄉一聞清角起誰不淚霑裳江南行二首家住橫塘口船開去漸遙歸時不愁暮出浦正乘潮偶來長浦裏相伴採蓮歸並船打兩槳濺水濕羅衣自君之出矣二首自君之出矣聞道戍涼州思君如明月夜夜向西流自君之出矣鏡臺塵網生思君如海水浩蕩何時平東里詩集卷一
