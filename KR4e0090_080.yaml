body:
  text: 東里續集卷五十二明楊士竒撰家書示稷子書十九首去嵗以汝母子城外非久居之計令於東門祖地上作居移回亦作書奉吾兄達知此事近吾兄復書云東門屋地是彥中房下之業非吾曽祖待制公房下之業彥中是吾兄所承繼之父若如此説則是我妄爭此土矣妄爭者閭閻小人所不忍為而謂我為此乎我平生未嘗於他人有一毫之妄爭乃肯施之於兄乎汝不能知吾今略言之待制公同父母兄弟三人分三大房皆在東門一處住長房是今容安之髙祖會可第二房是彥中之祖聖可第三是待制公彥中之父公安最富後來擴充屋地却多於兩房吾待制公致仕回子孫衆盛遂買官濠下土作居移住獨留第五子公武仍於東門祖居住公武兄弟五人田産各已分惟屋業實未分也公武後無子子言叔承繼之洪武年中子言叔子超叔仲殷兄以貧窘乏用急欲賣官濠下之空屋地我時雖幼獨不肯出筆一人不出筆則買者不敢承交二叔見逼不已遂以東門所共分屋地并塘皆貼還我然後我與契上畫字故當時劉永夀買契上價錢皆二叔一兄得之我獨不得者蓋以其東門所共分屋土并塘與我相換易也然我隨母在外未曽回東門住仲基兄在盤古山住與蕭壯父子致閙問我借子超叔分與我之屋居住子超叔文約一紙是親筆今見收在仲基兄處蓋因當甲首而吾適不在家先母用此約於仲基兄抵當鈔五百文買鐵索納官吾兄弟相友愛無間後來亦不曽取贖此約賓畿具知此事從前來厯如此雖後來官中抄劄亦只是空地一間見有文册可考也吾之此言一語一字皆實天地祖宗鑒臨在上不可誣也而吾兄輒為此言豈以吾為全無知耶豈真以吾為妄爭耶吾今所以説與汝者以眀吾之受分於祖父者來厯眀白如此實非妄爭也然吾兄既如此言汝便讓之更不可思想去東門居住城外固非可久住可從容别為謀也鄉邑近年故家子孫皆以分爭産業交惡此吾所甚薄者汝宜戒之汝宜戒之兄弟相讓自是士君子當為之事汝不可便取疏外間暇常常去伯伯處聽教訓也匆匆只此自汝兄弟起程後吾惓惓在念昨日得過濟寧之書知一行皆安可喜然須到家後有書來始得放心也此間自汝去後闔家皆感冒風熱證汝母及紃秫特重今皆嚮安惟紃未甚解耳吾亦昨日始出視事家中所急者南京未有人為糶俸米闕來早晚缺用也汝經年在外到家便須親去各處展省先墓當培土處便培土不可忽略過凡家中一切事務與榮兄從長計較行須聽他説必然不差俸米必須于官倉下交決不可於人家對過恐被人作侮後悔無及去關米時尤須與人恭謹謙和居家最緊要者愛惜家人務令衣食充足若有不曉事處緩緩教之切不可輕易辱慢此是朝廷所賜者二童更須愛惜此意亦須説與新婦令共愛惜也汝丈人處近有一歐陽生來能言此老在彼家業稍厚恐未便得起身當是八九月可到家然亦未知的實如何也今附梁太婆祭文歸可請人寫過靈前焚之須備豬羊庶品之儀去祭餘不一一也近有兩書附劉本靜及公差辦事官回兹因子通行再附此吾此中長幼皆安亦聞汝輩平安抵家又聞鄉里今嵗頗收米榖價平小民不至艱苦甚喜甚喜但聞䆃子保母歸病遂已安否切須照管之䆃貪趨讀書可愛秫稟受北方之氣擺掉不馴然有時發志向前記書認字亦自可人吾以是公務之暇閉門却掃雖老病而對此亦足自遣苐恨汝母去世早平生劬勞而不見其可玩時也汝理家之外宜閉門讀書寫字久而有得厥有真樂凡疑義未通處求教叔車叔莊及常親近郭彥鉉先生聽教益一切流俗輕薄人可逺絶也十分用意照管一應文籍書畫吾愛之甚篤致之甚艱汝輩肯學將來大得其用也俸米分送親戚已了未買屋地所貸物皆償否劉皮匠所占先業曽經理否急欲知之可報來孟嘉何時啓行便中亦報來看覷菊英所帶回人口老少並須溫存撫恤常令飽暖有不是處但容忍好好教之切不可打罵原家中婢僕待之亦然向所寫陶淵眀遺子之書常貼置靜坐之所遇心中不平時舉目一觀忿戾之氣自消矣吾兒卓立務為好人君子將來二弟皆視汝為法則也勉之勉之公門中絶迹不可行公門中人絶影不可交皆吾所甚惡者須猛覺悟毋為人甘言譎計所誘也但絶此一念便有向上之路矣汝勉之勉之近得伯伯及康甥及汝寄來書知平安到家并家下人口皆安慰喜慰喜吾此間長幼亦頗安傳聞鄉里夏間不雨甚為小民憂之今果如何若鄉間果天旱處則田租量宜取之不可刻畫求盡得也吾兒凡事寬厚存心為好帶回家人加意愛惜毋縱容他人欺壓之也出入慎重勿與憸人為侣則自然一日一日長進矣鍾孝先在此所借者已如數見還矣更不可問取也俸米關支如何曽送親戚否劉人處屋地已取得否移居如何若移居後東城外是誰看守所帶回物還人皆發落否康甥行期如何可一一報來告知下落也一應書籍文字及諸妹衣服都好生照管今日得升姪清河縣書度後月初旬汝母及弟妹皆到家一切事須悉依吾所寫與汝者行之勿違吾與綸䆃皆安但申子犯酒昻子皆病而昻子尤重今早晚衣服飲食全無得力人升姪若能來則附搭一的當人來若不能來則不可強也賔畿與劉子望在此皆安但其事未果決未有歸期爾其家事可為照管也近日有折俸鈔五萬貫於鄉里商稅課程內支文書恐六月方到必在府中關汝去關時必謙和盡禮得支後須好生收貯一貫一百不可妄用吾此間有用也吾病體入夏來略安但聰眀益衰行步拜俯甚費力此亦年紀當然不足怪也而早晚得賔畿在此相慰藉差可自遣但汝母弟數口歸逮今無信不知何時到家以此挂心耳又聞交婦及康住皆逃胸中甚增磊塊吾平日教汝待臧獲恕處鄉里和不與小人相接汝早從吾言不致此失未審比來有蹤迹消息否有無宜寄書報來吾在此每遇一鄉里人來輒問索家書蓋出于愛子之心近張時薦王善學來汝皆無信是汝不能體父心也甚孤吾望汝母回時所分付諸事悉遵依行之或吾所言有未審處可質之紀善親家為斟酌裁處也龍人及曽胡記田土等物一毫不可干預悉須還之陳氷土亦須還之今後切戒此等事不可為也居家無事時閉戶讀書寫字出城外督耕一切下賤小人與之逺絶聞叔車在鄰近館可頻去親近教益自然漸習為本分人矣切要所望于吾兒者立心忠厚戒刻薄重義輕利多積隂德庶幾增長已福以及兒女耳吾之官祿不可恃也人之可恃者惟積善必有報吾兒勉之目前紛紛可鑒已栗年二姪永齡可喜皆考過然自今已後須猛力進學方得不然此未可憑恃也年居鄉無外事甚好但勉其莭飲勤學將駸駸向上誰能禦之考本分嗜學更難得先師之後所望二姪宜語之使卓立也江隂父子放肆不顧身家可為之憂然又不喜人言近常州來者言之極詳使人聳然然吾無如之何也可嘆可嘆嚴士正在彼甚得士君子之譽憲姪亦可喜孟京之後亦不寂寞矣秫須遣之讀書不可荒廢有病頻請鄒孟義看視也賔畿公餘皆極口稱譽吾兒勤力起家然非老父所喜蓋人生衣食之計只可隨時况汝隻力無助尤切吾心自今凡百放緩以休息已身惟有修德務善不可緩也勉之勉之組娘安好如何梁壻館何處康甥館否有便人皆附報來升姪行止何似亦望報此間近擕數小歸分付闔家大小須愛惜擡舉不可作踐要皆如自兒女待之近日始得汝五月末書知闔家安獨福住病不起人死生雖有命但此僮不能無遺憾者平時無人照管食冷卧濕風雨寒暑縱恣自便至於有病略不顧問及其病劇方始求醫雖有扁鵲豈能效力今後當切以為戒家人男子婦人皆須加意照管但有疾病便早與醫療不可因循病深則難治要知人力難得不可輕易看也此事亦須內外皆用心方得更有切語爾者不可輒聽小輩讒言加怒于人蓋小人多借汝以報其私讐不可不察凡事須是親見的實方可出言偏聽甚是害事不可不慮每事聽教丈人決不誤汝大抵為人省事是安樂第一法守己須是清廉處人須是謙和結友須求輔德臨財須思合義吾兒勉之房屋未完想今木植難得更緩一二年作數間土塹居於前儘好汝隻身無助無苦役心力也今後更不須買田隨時過遣也非獨省目前爭競亦省後來之纍也更汝目下二三年皆星運不齊加意防慎吾三二日間有逺行匆匆附此近聞江西大水未審吉安如何甚用憂之四方水旱之事常切吾思慮何况鄉里而吾兒書來凡鄉中雨暘豐儉如何未嘗一字及之深不滿人意自今作書必須及之伯伯生榖只取三分之利此最可為法人蒙實惠必不忍負之既可濟人亦可長己之福汝當效之也本之書來切怒叔濟為無禮於其嫂與姪吾意必無此事然已附書劉雷啓問之矣若果無之則當以實情自白以杜讒譛之口以全叔姪之恩吾兒可以此書示之吾兒家居凡百處善循理不可用意於義分之外鄉鄰有過一切容之勿與計較凡災傷之處田租當體恤寬免慎毋過刻也聞已有梨板甚好後尋能書者謄録寄回也在家間暇勤習黃庭經或樂毅論專學一帖久則自然精熟熟之後又學一帖可也前書所囑付者皆遵依行之此不復出公差人行數數附書回必皆到前書所囑者今不復贅但遵依行之却一一報來叔車來切切言二事其一謂叔濟欲就教職吾今亦不復阻抑之但吉安廬陵皆不可慮惹是非龍泉僻靜可為新淦亦或可聽自主張吾不能助力也其一謂蔣重欲來可聽其來但要其家父母情願吾家不可強之來亦不可沮其不來蓋吾老矣亦欲了此一事也但來時其家得一老成能事伴當送來途中好生照管足矣搭船亦須得誠確可付託之人方可蓋路逺年小恐性情未善也禮物不須將一毫來慮途中惹事况吾分毫無受也其家亦不必親屬有名分者送來吾此間儒素凡事隨時不能一一如鄉俗具禮也來時只七八月可行九月啓行即不免途中守凍守凍甚艱難也此事可與叔莊孟勤言之今寄治心痛膏藥四箇回如疾發時先以生薑擦痛處却貼上膏藥即用雙手炙熱於膏藥上尉七八十下以得汗為度外有六箇分與三女遣人送去也蕭親家來求墓表後有便寄去劉鈞能改過否西安無謀與人撑船去年八月在臨清已被人打死吾孟省兄竟絶祀矣可傷可傷人之不學無謀者可以鑒也家中一切事依前書行曾蒙啓帶書來後再不曾得書想家中長幼皆安此間闔家亦平善無事所寄宜春謾稿復見心詩録本胡學士書簡田糧册子皆到今後有的確便人還望寄宜春謾稿親筆本及胡學士親筆詩盡數封識將來要裝表卷册專望專望弼姪及叔車叔景在此皆安但三人皆中會試副榜當除教官不免俱抑鬱耳然此皆有命渠固不達也今殿試曹典史作狀元所謂平步上青霄吾鄉素有名譽者皆立其下風矣今年會試吾邑中者二人曾翬第二蕭聰第四十六尤出意外之料殊可笑也中副榜者任衡梁楘楊繼蕭穰劉尚錫王粲楊弼孫裕蕭儀袁和曽良龍文王鏞蕭纘蕭雋歐陽凱曽衡總十七人皆將除教職又取副榜再試中二十四人皆冠帶於國子監讀書吾邑預者三人龍文梁楘袁和已送入監矣羅崇本除刑部主事蒙啓除行人皆在北京德遵病未愈德遜必已啓行矣近伯塤回有家書及附三兩與陳中令往興國啓外祖母殯歸葬此是吾平生所未了一大事吾兒宜用力贊助陳中了之以成吾之志再不可延緩祠堂汝自相度斟酌若月日得利早完為好前書令助叔莊處喪事不可因循寺下不免冬年時行祭禮劉鈞如未作生貟則已之若渠能教鄉館自求師授經足以勉進成材作生貟非不可但是近年學校之風頺壞後生習成蕩性十有七人無成效也吾兒家居督耕之外閉門讀書討究義理考古人嘉言善行遵而行之無限清樂切須交處好人各處祖墳嵗時須躬親遍歷展省不可遣人代去東門伯伯年老早晚間暇常常去聽教訓以知往事蓋吾宗惟此老能知前事也看管孫子父母須自用心不可全付之下人且未可議婚待十嵗後未遲議婚須稟命老父不可專擅一應家中書籍文字並須常常較過毋致損壞此間五六月家中大小多病喪一老使喚婦人升姪所生子甚可人周嵗後一病歷數醫不效而死甚可惜也所索文字附的當人來為望升在南京至今未回蓋柴遲鈍發賣未得也曽永齡至今未到可笑報其家知之吾近得泄疾四晝夜五十行危甚幸不死然亦頓衰憊不復可支持矣所望吾兒者只有一事但痛絶小人之交吾兒即可為君子矣吾平生所不足汝者亦只此事常磊塊于吾心胸間汝體吾愛子之心勉之勉之即吾旦夕死不相見亦只有此事奉囑也勉之勉之近日戶部公差進士行曽有書必到因康啓常行再附此前書所索文字作急附的當人來非其人不可妄寄有便多寄豆豉來戶部俸鈔勘合關支後附的當人來寄汝母畫像來汝母墳前享堂又纍鄉里雖有朝命吾甚愧之自今切戒切戒曽永齡至今未至聞其同載之人緣途淹延皆不欲來也紃病如何好生照管之父母甚念之也此中長幼皆安家中看管孫子為父母者當留意不可全委以下人恐將來壞其德性也一應書籍文字法帖畫卷好生收貯時常晒晾纎毫不可損壞此是老父平生費盡心力所致以為傳家之寶者汝須用心寶愛稍有損壞即不得為孝子勉之勉之昨蒙聖恩賜御製詩一軸後有的確便亦寄回伯伯書來索沉香烏附後即寄回但恐太熱老人須斟酌用也近日王典仗乃子行便曽附書宜春謾稿原本所遺落者望搜尋盡數寄來欲裝背成卷以傳後切望切望更望檢尋漁灌詩集二册及録五雲方尺一册謹固包封寄來此是知事伯親茟又有鄭公送知事伯序一篇却是司倉伯親茟亦要寄來裝表為家傳之寶勿悮其餘書籍圖畫法帖及一應文字雖片紙皆須寶愛不可損壞遺失吾得之甚重汝守之不可輕也不可輕易借人借非其人未有不損壞失落也陳孟潔不能保守先世文字君子責其不孝深可戒也䆃秫懶學吾去年猶時督切之今嵗老疾益增精神益減戴星而出戴星而歸歸則困臥不復能舉口一問之蓋亦付之無可奈何而已大抵老身非能久于人世者吾兒宜處善發遣蔣重來悉依前書所云也昨日有一書附刑部辦事官回蓋龍叔粲到此方三日家中事頗悉所重者分付一家長幼用心照管長孫此宗祀所託也慎之慎之詳細悉具前書汝夫婦凡百聼受丈人丈母訓誨不可自是也康仲述田不用之甚是但不必怪人凡事須習度量也契字待有的確人寄回屋後之井果然如何須討究分曉寫書報來吾兒須謙和處鄉里凡事忍耐不可使氣性但憑道理為上䇿也愛惜家人加意待小髙之母阮麻及福住有疾請醫治之造居隨宜可也不可學鄉里人作事大過也近蒙聖恩賜御製詩文數軸今以御製招隱詩一軸謹密包封用匣裝盛寄回可糊飾中廳張懸於正中懸處須髙以防觀者之不謹張懸之時須用寄回紅紗籠蓋以避蚊繩之點汚於下須安一香桌置香爐花瓶以示不敢褻慢遇天氣清明無風不寒不熱之日即張挂若遇隂晦風雨大寒大熱或梅月天氣則謹密包收于乾燥處當中收貯更不可於正廳中間設坐席縱是老長亦只于兩邉設坐席示所尊也所必當張示者蓋欲使逺方下邑之人皆知聖明之心惓惓于訪求實德真才與共圖治道也所索祖父守玄宜春謾稿墨迹一册族譜胡學士詩文書簡盡數將來勿遺落片紙袁克俊處取復見心詩並要寄的確人來俸鈔關子寄勘合來鄉人年小誠實者求覓一二人寄來林仔有病遣來此醫治家中用心照管孫子從容善教道之不可縱其習薄劣此第一事用心愛護書籍文字及一應法帖圖畫此是老父傳家之寶不可輕易借人也待家人及佃戶須寬而有恩不可自損隂德切要切要寄汝母畫像來近時得御製詩文未寄回者皆録副本示汝觀之可珍襲也曽永齡至今未到羅升亦未回聞薪價甚賤無人問及也二孫皆幼不許輒與人議婚此鄉里薄惡之俗吾家更緩數年無妨我與伯伯六十九年兄弟伯伯長我十六嵗我幼時是他捧抱我稍長是他教認字讀書後來多般得他氣力最後廢盡氣力為我婚娶我在南京中風病時他念我左右無親人中心懸懸淚眼不乾此情此德吾夢寐間不忘吾兄弟數年來皆老皆耄切欲一相見連床數夕相與言所欲言以快暮年之願但我身受國恩不敢言私今伯伯已矣哀慟奈何痛苦奈何想吾兄思我不見死未必暝目矣吾雖茍生亦復何心故聞訃以來痛心如割涕泪為枯情自不能己也想伯伯平日於汝之情亦厚每聞汝行事有過當處便肯直言教戒此皆是愛汝為善人君子也繼今誰肯言汝過失子路大賢喜聞自己過失所以令名無窮今人有過失不喜聞規戒之言所以終陷為小人而災害及之矣吾兒自今宜勉力為善有人進善言者便虛心聼從切不可拒善言不納也伯伯處喪葬之事一力向前贊助非比他親戚也吾此間近亦艱難無物寄回助之可以俸米十擔助之今寄祭文回汝可備祭物代行禮送葬及嵗莫汝自具禮致祭以盡子姪之道仰髙回已有家書數日前附書與汝及伯伯祭文墓志書信與諸姪皆在禮部朱貟外帶去後又附書與汝在曽狀元庸安帶來前書所發落者今不再寫今所望者便發落蔣重來不必將禮物來亦不必其家親屬送來只令其家一老僕老成重厚者送來須是八月便起程九月來則北河有氷凍之患守凍十分艱難此事只與孟勤言之匆匆只此昨日有書及新刻曽祖墓碑祠堂記各數幅在樂善郎中處回今寄碑石三片凡四刻詞記可尋石之粗而稍厚者作方趺安頓祠堂中偏側向隅處望石則如先母陳夫人墓上之制用長石四條而嵌置之然須論方向擇穩利月日乃可為勿輕率也有恩賜玻璃絛環一副併絛就寄與汝用此是上賜宜敬重珍襲之也吾兒憫念叔萬而經紀其妻喪又存恤其遺孤甚好甚好老父聞之喜而不寐亦須常囑新婦用心教飬若新婦能盡心照管則下之人不敢輕忽欺侮之矣勉之勉之其子亦聞性資勝清亦旦暮善誘之向學為好海桑先生大儒君子必將有後有後必將在此孫吾兒勉之然亦須常飭勵清戒酒向學為好人亦須與仲兼説宜夾輔之向道理庶無辱婦翁也賔畿惠椒已領感厚感厚吾兒可面謝之亦須叔姪常相親相助為善也吾與抑庵德遵欲祭孟昭備祭之資及祭文皆已附在崇本處至期物具則希積與汝及陳之姪三人者代去行禮碑石到家汝須備禮親往謝之蓋逺道寄託甚難也其餘墓前望石待用紙寫寄回汝自刻也拜意伯母説與東門諸兄篤孝養惇友恭也示稷秫二子書叔粲親家叔車回皆有家書及附物慶住余侍講回雖無書有分付言語近日錦衣衛舍人操勉行亦曽寄書所分付汝已詳悉可一一遵行不可違悮吾家自蕭薦之來後絶無書朱仲和乃子來到臨清遭劫盜各家所寄書信盡失之矣吾遣慶住回專搬取汝母及秫汝若祠堂之地已復則可親自送母與弟來如未便復則令逺夀送來須尋一居宅與楊奐令其母子得所不可以失宗親之義此非他人之比也使之得安穩歡喜去即汝之賢矣一切之事皆要依吾前信行不可違悮不可違悮汝母來帶吾青紵絲繡雲鶴圎領來帶方壺畫來若祠堂已復未得蓋造則汝且來此面發落汝庶得穩當今有一書寄伯伯專説祠堂事汝可親送去汝若來時家中一應事務請賔畿叔提督整理示䆃子書五首任能讓及武都督家人至得汝信自後更未得吾病更無減退七月末因檢尋賜印及米二勑不見詢知又為不孝子盜歸以致倚勢在鄉生事造禍因此情懷懊惱氣病大作苦痛數日一痛之甚即與死為鄰此皆汝與升從臾不孝子所為汝三人之罪惟均可誅可誅來時即尋出此二勑帶來或先寄孟嘉來勿悮勿悮更將來時須謹固包護密封不許纎毫損壞但略有損壞汝皆當死在家須逐一看過一應誥勑及凡有御寶文字並要點對仔細寫數報來切要切要其餘書册文字法帖圖書及御賜物件俱要具數報來如違父言俱是不孝吾鬱氣忍痛書此數字汝審之孟嘉九月一日在廣已去世可即令幹同䆃來此取回家小勿悮勿悮去後廣中取喪今别有信二封在劉良手回與爾叔姪可知之所發落回家事一一著緊為之不可遲緩不可遲緩但是互爭不明田土等業盡數還人逺鄉田土及近鄉磽瘠無收之田盡數出戶還人皆要告官明白彼此皆有下帖執照庶免後來吾家之纍在戶只可收三四十石糧不可過多我死後門戶差役汝叔姪大難應當不可不慮羅崇本族內田土山塘盡數還以原物切不可聽人説誘對換聞梘原坑用其地土起莊屋亦拆下屋料退土還之必須從我之言乃免後患他人家有互爭不明來説者必須皆如此行勿違勿違只要稅糧出戶明白至囑至囑青林寺前紅門作急便拆作急與父母造合葬之地此事尤不可緩急望報來説與昱母子各處莊下有榖不問多少盡數裝回遲恐不可得矣遣人去時須和氣相與切不可爭閙又惹事也餘事並依行時發落不許違悮致意賔畿叔之貞之夔之序之所凡事皆望用心佐輔必要停當至囑至囑病中不能一一作書萬望留意也龍士熙及王貟外士華行皆曽寄書歸自袁宗範來得汝書後再未得不知到家今已幾日所已幹辦幾事完備有便望一一報來切不可依稀落落虛度日月切囑羅大庸一族之中升田斗地皆須還其原主此間已批契字盡還之矣昨聞崇本有書與其家令他勿受此語切不可信想他前者招五六十人同來告狀此其惡意豈是甘心不受田者如今不管他家受與不受只是盡數退還之縱其不受我亦退還之聽為間田庶免後來之患切不可聽無知之人謬説别撥田土與之易換以惹後患梘原坑莊屋亦拆棄還之切囑切囑其他逺鄉但係賤價買得及受人投送互爭不明之田盡數召原主還之父母所買者皆用實價不在此例却須告縣推割分明不可茍且依阿貽患于後務要兩月之間盡皆了落不可延緩老身自聞不孝子竊璽書回後病益加重氣體疼痛晝夜不停而夜更重決非久于人世者前分付作墳不審的用何處切望早定作意為之亦凂告諸兄從臾如法堅固不可草草也餘事俱拜意賓畿叔之貞之夔之序之所四兄從臾早成為望前月二十四汝室中生二孫一男一女并示汝知之將去蘭亭是最髙者傳家至寶也切不可汚損慎重慎重吾病雖晝夜服藥但中懷懊惱證候日有增無減今即死已不夭矣但憾稷不肖不受教訓多攬不毛之地在戶將來為吾子孫之纍故專遣汝叔姪歸務要減退十去七八庶免後纍切不可惑于他人好利之言而不從吾言以自取不靖也蕭氏既有子説與大新婦用心好生看飬更須好待其母更不可家中不和稷急乏盤費若非父母在此已窘迫無措可遇的確便速寄來接應䆃在家每日要著實幹事見功效切不可依稀茍且虛度前後所附書回皆要帶來看過不可一字遺失凡前書所發落者老病之人更不再寫但盡心作力為之晝夜不可怠忽平日所輔稷為非者一迹不許登吾門切記切記示姪孫挺書八首屢得汝書知在官平安甚慰老懷吾在此衰老日加蓋今年七十有四理當然也春夏間必乞身歸蓋目前實録未完不敢言私也汝在官有暇不可棄書册一切公私事務皆須依道理行分毫非義之利不可茍取務學慎行一日長進一日方好不可與輕薄不著實人相交常常點檢自己但有過失即改之有暇與之夔往來叔姪互相規益更好鄉里動靜有所聞數寫書寄來吳朱皆當今賢人君子汝幸在侍下朝夕觀其所行聽其所言倣而行之自有長益勉之勉之致意張御史往年見所和唐律曽有一詩託楊皓將去不知皓不曾達近日於他處得之今寄去汝可為達也外有清溪家譜寄之夔書一封在內汝可自送去汝父墓志二月凍解寄便舟持來不誤汝也正月初三日近有一書託祭酒先生帶來與汝今因秦御史行便再附此楮所望汝者卓立為君子為仁人勿墮於流俗庶幾不忝門戶大抵持身為本身正則所行正擇交為要交善則所處善間暇即讀書進學以古人為師無負老人所望之夔會間亦道老人此意也此間半年多不得鄉問每用懸心南京必常有聞不惜頻附報來三月一日夜燈下寫平日教爾修已處人以免罪戾今聞來往人之言汝為同僚所欺侮此必是汝之誠意未至蓋未有至誠而不能感人者也宋張橫渠先生教學者不幸與匪人同處但常自家點檢不令己身有過大抵士君子豈可致自己有過汝切戒之切戒之吾亦聞此人平日所為只是汝與之同僚當曲意包容一毫不可與校他山之石可以攻玉汝積習之久自可成德亦與之夔道吾此意吾今所寄之夔書可令附歸與其兄弟觀之使改行也汝亦頻頻寄書汝兄弟令循禮法善處鄉里也正月六日平日教汝分毫皆須守禮法庶免罪戾汝在衙門內豈可問人索官紙寫私信雖是半張亦係官物但舉發即有罪今後切戒毋蹈前非吾詩汝可照依今改去者自録一本整齊小楷仔細對過寄來發回與稷汝不可於南京刋刻切不可不可昨晚偶有所聞故再附此致惓切之囑蒙啓來得汝書知在教學甚喜此是大人長者與進汝汝須加意不可怠忽大抵教學之法須小心導誘不可急躁切記切記雖在教學然不可荒廢職事更不接納鄉邑小人以壞名節稷之不肖具之夔書中汝可索觀自警也汝父墓銘後寄來必不悮也吳都相公書來言汝誠實朱都相公書來亦言汝能謹用慰老懷然汝尤須加謹以不負大人君子之許與以副吾望吾在此凡物不乏用汝數寄物來甚乖吾意欲悉遣還則道逺纍人不便故強存之然終未嘗用也和鼎將來布今發回汝自今宜戒也更與學録具道此意宜共戒也汝父墓表就附和鼎歸汝可録一本寄二伯及諸兄弟觀也吾家子孫惟當謹守清白之傳不可以辱先世吾為稷纍日夜懊惱奈何奈何學録處匆匆不曾寫書汝以此示之共知吾意也此間長幼皆平安如常五月望夜燈下書汝録去謬詩初意只得汝間暇自寫何以煩勞他人且達堂上之聽皆由汝多事不靜也且汝一檢校末職亦敢私用監生是汝僣分憲臺是綱紀之司末職尤須戒謹庶免譏怒自今戒之所録來者今略改正再寄去不當在衙門為之亦不可令達官知之惹譏謗也為此切須隱約不可彰露也一應紙筆等費用可於兵部徐大人支俸已有書達徐公矣付挺孫此書汝可自觀不可示人東里老人書示姪之夔姪孫挺吾近日為不肖子姪作過見纍憂惱不已而疾病日增此况汝曹可想知也所望汝叔姪持身謹行動師古人而毋貽人譏誚吾家子弟皆不淑也勉之勉之心緒不好亦無暇及餘事但南京有聞鄉里事不惜頻頻詳悉報來寄升姪秫子吾此月初九日至淮安今日午必到儀真途中一行長幼貴賤皆安家中俱不必慮到南京必換舟從安慶南康而歸長江大湖雖多南風幸今春水未漲也吾所過未嘗登岸入城雖有聞知來見者未嘗有所受之以此自家胸次泰然汝兄弟各須謹慎事事依我所發落行不可遺墮不可改昜母親有病請蔣先生看療不可捱過吾過東昌因食片梨泄瀉六七日服藥始解大抵有病之人不可不絶生冷之物慎之慎之時常點檢大門中門之內不許諸皂傍留生人更約西邉家人不許引惹人來往恐為不利餘事悉依前命而行匆匆只此秫昱長夀勤用心讀書不可墮虛度日月也又批閏二月十一日四更過揚州揚子橋燈下寫途中並不遇鄉里來者故不知吾家消息併示汝知之東里續集卷五十二
