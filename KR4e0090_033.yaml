body:
  text: 東里續集卷五明楊士竒撰記思親堂記吾仕北京二十餘年賜第東華門之外環所居兵民雜處而業賈者十七八皆奉法循理不聞競爭聲吾嘗寅出而酉歸間遇休假則牽於賓客未嘗一濡迹鄰比之居也鄰之叟一二輩間以休日過余欵語因及比屋之行則指吾居之北曰有郁氏者兄弟兩人伯名良仲名讓皆有孝行嵗時必哀慕薦祭必誠敬語及父母必涕下潸兩人相恭愛彌篤出入閭巷又皆敬老慈幼未嘗有干紀事吾聞而識之他日西鄰蔣叟者以良來謁良再拜出一卷題曰思親之堂蔣叟代之言良父母皆蘇之長洲人父友諒樂善好義以藝事居京師母顧氏賢淑相夫以孝養聞良兄弟皆幼而喪母稍長而父喪今家雖裕而不逮養此其終身之戚而堂所繇名且為之乞言余歎曰良兄弟見稱於鄉閭老長固有自哉昔孔門學者問士之次聖人告以宗族稱孝鄉黨稱弟蓋孝弟百行之先而立身之本也良兄弟克惇用之固儒者有取矣恆情之孝或存亡異致惟誠者不以存亡有間良兄弟庶乎其誠哉夫孝心人所同有也惟蔽於欲而後存焉者寡然本然之善具於心豈能終蔽哉故聖賢之教必務去其蔽而復於本然良兄弟其本然者固未嘗蔽誠能因是而充之則何善之不可至哉吾故碩以進之也誠由是而進焉將鄰比里閭之間不有觀於子而興起者乎不然將無慚於子而斂避者乎使衆咸稱曰郁氏二子皆京師之氓之良而不忝其父母顧不韙歟是蓋孝之大者遂為之書使置之堂中旦夕勉焉懷德堂記桃源蕭德資新作堂若干楹其孰賔前興寧主簿陳士瞻取聖人論君子之義名之曰懷德所以愛碩之者深矣德資來京師求余記余亦其故孰賔宜有復也夫人之生天賦豫之者極其清明而畢具天下之理極其純一而泛應天下之事皆無一毫昏昧虧欠也然其稟有清濁焉有粹駁焉故所以受於天者有存有不存焉繇是智見各殊趍向益逺或善或惡駸駸乎至於霄壤懸絶而終其身所得吉凶亦各有不同焉聖人者知天所以生人之意固在使其為善而吉也不幸人之有不存焉者是以推本立教使究知天之所以畀我者謹持篤行不敢怠棄以不失乎為善而吉也而又發其修為之要必使誠之於思惟念慮之間不息不二則凡見諸語默作止無非奉行天之所畀我者矣聖人所以嘉惠斯民之心何其厚哉德資闓爽溫厚樂善不倦誠因陳先生之言從事聖人之教務君子之歸蓋未有不至焉者德資大父思賢甫魁偉闊達負氣義有善行其父安常甫篤厚溫靖皆執德有聞乎前矣固宜德資所永念而圖繼焉詩不云乎無念爾祖聿修厥德言當承乎其先也永言配命自求多福言不可違天也德資其勉之哉是為記本心堂記友人曽與賢既登第為庶吉士受詔進學于翰林朝夕與余相即也數告余曰從祖本立公今年九十有六矣嘗語與賢欲得君記其本心之堂君於曾氏為姻家矧有斯文之好君宜無辭余惟公耆年厚德於今鄉邑不可以第二是宜有記以示來者公為宋忠臣寶慶府通判諡忠愍從孫自少讀書謹行不肯違道以求所欲所居之堂顔曰本心余嘗登斯堂聞公之言曰聖賢設教之要不過欲人正其心而已夫能正其心則事物之來或善或不善皆有以辨之可為不可為皆有以決之不牽乎物誘不逐乎情動有以主於中矣由是而應於外無往非德焉正心非德之本乎此本心之説也公嘗以自勵至舉以告人亦必曰必欲吾本心之正則善矣鄉之人聞公之言者亦皆曰此公所行者公言豈欺我哉故或有所私爭不平得公一言無不止者蓋公之天性忠厚懇欵凡事有求諸心而不得即止不為自少至老其務為善皆出乎中誠不雜以偽是以一出言而人信之此則公之所謂本心者不獨見諸言語而已世之人有見諸言語者當道矣往往考其行事如秦越之不相似者豈非不能內修其本而徒事乎外也司馬子長曰能言之未必能行如公者可謂能行之矣自余入小學時公已皓然白顛邑大夫重其行誼禮為耆老以資問政挺乎邑人之望矣今余既壯而仕公愈老愈強顔如頳玉日宴坐堂上賔客在列諸子孫曽奉觴上壽無時不藹然於春風和氣之中豈非人生盛福哉夫所以致福者必有已之善也善修於已斯天錫之福矣此又公所謂本心者之應也故併記之庶幾來者有所興起雪屋記世之所貴乎士者謂其能立志也志立而後道行孟子曰富貴不能淫貧賤不能移威武不能屈此之謂大丈夫皆其志之素定者也使志不素定則窮閭蔀屋羮黎飯藿者一旦遭際貴富鮮不意滿氣溢有自矜之色平居貴富豐衣盛食之人卒然而遇貧賤則憂愁抑鬱無聊亦必有不能自堪者矣故士志素定則於貴富賤貧窮達皆處之一致而終無以移易其心懷慶王侯某其未仕也布衣蔬食獨處一室之內無肥甘輕暖之御也無髙堂廣厦之屋也無浮人豪士之往來也晝出耕夜歸讀古人書以求古人之道懷慕廉潔皓皓乎無一塵汚濁之纍超然自適名所居曰雪屋蓋以自况也其立志如此既領鄉薦登仕籍揚歷中外為金華郡守郡守視古諸侯也有千里民社之寄侯剗弊建利煦枯濡稿興教育之方日孳孳焉如有所不足由是金華之民皆樂侯之政然侯所自處淡然不異乎家居之時退食之所仍揭雪屋二字朝夕省覽以益固其廉潔之志夫為吏廉則公公則明明則善善惡惡罔不得乎其正如此民豈有不遂者乎侯得祿十餘年歷數官以致其貴視古諸侯矣而恆不變其志其庶幾古之清白吏者歟余雖未始識侯友人石彥誠道侯之事且為求文記雪屋彥誠耿介尚志不易許與此其必可信故為書之使凡今之為吏者觀之知侯之志而有所興起龍溪書屋記吾友周復則致其家君至善甫之命求作龍溪書屋記吾雖未嘗造龍溪識至善甫然吾家距其地近又交復則久聞而知之矣龍溪在廬陵城北一舍許峯巒駢立環拱如帷如屏溪水出山趾澄徹縈廽道東南入章江其人居室森立有土田林沼之産為厚生之資其俗尚氣義不薄周氏自炯村徙此若干世矣益久益大又多端厚秀敏之才至善甫尤卓犖其務善屹然為鄉人倚重有七丈夫子甚愛之作屋若干楹購書數千卷自圖書以來至于周公孔孟又至于周程朱張群聖賢之所著以及諸子百家之所纂記者悉藏其中日延該通洽聞之士講論道德仁義之懿與上下數千年既往之迹孰之可蹈孰之可去以道其諸子使之漸濡陶薰為善士為君子不至於流于下此書屋之所以作也夫父子之愛天性也世之人愛其子願之以貴富壽康者多矣求能愛之願其為善士為君子不至於流下如至善甫者蓋寡見也夫能為善士為君子貴富壽康之來不外此矣至善甫之卓識度越常情逺哉復則溫雅樂易好學而敦禮今自太學生選歷事大理寺有能名即授官矣而汲汲辭歸以定省為重其父子交相盡如此此書屋之所為可記也於是乎書賜印章記仁宗皇帝賜印章二其一範白金廣方寸文曰繩愆糾謬蓋臨御之初召少傅臣蹇義少保臣楊士竒至思善門諭之曰卿二人自吾監國時相輔益甚厚今不可以薄但吾有過舉如未得即見可具述其故以此封識進來賜義與臣各一章且各賜小素揭帖百俾述所言蓋求益於下之切也又召義與臣各賜象牙圖書一臣得楊貞一印皆有璽書蓋念其嘗效分寸之勞也宣宗皇帝賜方寸銀章二其一文曰貞一居士蓋取先帝所賜貞一章而舉二字賜臣為號也其一文曰清方貞靖時覽貞一章既顧謂臣曰此先帝之灼知汝也然吾知汝亦非淺指清方貞靖謂臣曰此汝之所有而吾所素知也遂以賜臣又諭之曰士竒必以所輔先帝者輔我臣叩首對曰不敢不竭盡愚誠既拜受賜時皆以為千載之遭際希闊之大恩也蓋仁宗初賜臣二人繩愆糾繆章後數日亦賜夏原吉臣冒昧進曰臣與楊榮金幼孜實同職任今賜不及二人幸天恩均之言且再三遂賜榮幼孜同一章至宣廟賜清方貞靖章是時蹇義楊榮胡濙皆有賜其文則各因其人而不同於乎仁廟求益之誠切微勞之不忘與宣廟之不改父臣而褒寵之加厚皆自古寡見今二聖逺矣臣之孱弱愚劣終不能效裨益萬一徒捧遺賜而永慟謹志之以示子孫俾珍襲云一樂堂記吉水羅從敏及其弟從淵從升名其事親之堂曰一樂從升來京師介其妻之兄翰林編修周孟簡求余記之孟簡曰從敏父敬簡甫母楊氏皆惇德樂善春秋且八十皆康寧和豫從敏兄弟又皆溫厚秀雅相且與和樂一志奉養此堂之所以名也余為之嗟咨歆羡曰羅氏之得於天何其厚也夫父子兄弟至親莫加焉世之人蓋有不幸生而不知其父母者矣有幸而得事之則鮮能以俱存或得於偏侍或得於賤貧之日而不得於貴富之際故孔孟之蚤孤伯竒子騫之失母曽子悲於千鍾之祿子路極其負米之思其不幸皆天也至於兄弟興終鮮之慨懷獨無之憂者古今何可勝計蓋亦天也今羅氏具慶在上具翕在下奉春酒以介壽藹塤箎之和洽一家之間雍容愛敬天倫怡怡即天下之樂復有加此者乎其所得於天何其厚也雖然必有所力諸己以承藉夫天之所以畀我者乎必求之於道端之於心慎之於行以達夫不愧不怍之地使父母兄弟皆得以樂吾之樂而後為無忝焉吾聞羅氏為吉水山原之望宋景祐中吉州推官曰拯者其初祖也建炎中舉進士後至武岡太守贈朝散大夫曰棐恭見於楊文節公所狀行胡忠簡公所銘墓者其七世祖也楊氏又出忠襄文節之家其原之正如此而從敏兄弟數遊江湖治奉養之資以遂接夫名士大夫其得於見聞益廣矣詩不云乎題彼脊令載飛載鳴又曰夙興夜寐無忝爾所生羅氏兄弟其必勉於此矣以是為記宣城縣廟學重修記古昔王者之建國君民也教學為首事其學之制二十五家有孰五百家有庠萬二千五百家有序王都及諸侯之國有學今郡邑之學蓋古之序也古之序其下為庠者二十五為孰者五百蓋里皆有學民皆有教其教之法自灑掃應對至窮理正心與凡修已治人之道莫非堯舜禹湯文武之所傳者非此不以教不以學是以其俗化之隆而人才之盛也後世不明先王之道而老佛二氏之説繼出昧者惑於所誘而沈溺焉率倍此而趍彼逾久逾甚是以正道榛塞而風俗人才不逮於古蓋積習非一朝夕矣我國家列聖在上惓惓焉興學飭教璽書靡歲不下學宫之布遍于海隅矣其或猶有未備則吏于斯者之弗職也宣城南京畿內之邑山秀厚民淳質名人君子忠義之紀代未嘗乏然余在禁林嘗閲四方所上郡邑之志宣城為邑民戶三萬有竒而今為老佛之宫者六十餘儒之宫一焉而已夫正學異端不兩盛在此者既寡則吏于斯者宜力致夫飭勵誘掖之功以仁其民以稱上之德意庶幾其可凡前之吏宣城者多矣其學則自洪武三年知縣王文質建於泰和門之內九年知縣邢知逺以其庳隘改作于縣治之西廟與學咸備永樂六年知縣熊義存及教諭方濬源以歲久而敝協力新之歲久復敝宣德二年教諭張嵓至謀於知縣蕭吉改作廟之外門中門廣隙地為學外門明年作明倫堂及師生會饌之舍又廣地作射圃而蕭去官嵓及訓導陸霖楊輝勸率邑之好義者作大成殿及東西廡像位咸新郡推官尹崇髙至用嵓等議作尊經閣于明倫堂之後未半而尹去官工部侍郎周君忱巡撫過之功賴以完而凡廟學之未備者郡守袁旭至悉備焉是役也雖有衆力然始終嵓功居多於是輝來請書其成於戲凡今老釋之宫圮者興廢者復不必其有勢位率無過期月耳若儒學之宫隳弛欲葺即有勢位者為之綱維主張猶必更十數歲而後成何其難易之懸絶也非由習俗之移人而人心不知有古道歟為政者以正風俗淑人心為要務而風俗人心之所由善必在於興學校學校者明先王之法以為教也為學不明先王之法不能善其道為政不明先王之法不能善其治學校之關係於世大矣其成宜有書若學於斯吏於斯者亦皆致力行之功乎重榮堂記皇帝臨御之初璽書數下以恤民為首務念旱潦之弗時而飢窘之可憫命所司存問給濟又分命廷臣四出修備荒之政於是四方之民祗體上心競出榖於公庾以為荒歲賑給之助無間逺邇風動雲集傳所謂堯舜率天下以仁而民從之者也旌褒之命靡日不下輝映日月光華古今何其盛哉新淦界江里李孟都宣德十年嘗出榖五百石縣如制建碑表之鄉人榮之正統五年今刑部侍郎薛君修荒政於江右重宣上德以風勵其民孟都躍然感激復出榖千五百石事聞賜璽書旌為義民勞以羊酒孟都祗詣闕謝命光祿賜酒饌孟都荷天恩之隆厚歸而命其庋璽書之堂曰重榮介武選員外郎毛谷英來謁記以侈上賜以永示其後之人余嘆曰此治世盛事也蓋自吾童丱時嘗聞老長言昔我國家未一區宇也民困於元季兵戈冦盜鳥散而鼠竄流離顛蹶父子夫婦相視不能相保所在皆然夫豈計復見今日而為太平之幸民哉言已且戚且欣既復曰何以報上之賜哉吾謹識之弗忘而自吾之幼而壯而老至于今八十年朝廷清明禮教修舉四境晏然民逺近咸安其業無強凌衆暴之虞而有仰事俯畜之樂朝恬夕嬉終嵗泰然而恆適者皇上天地之賜豈可一日以昧報乎民知體上心而思效義此天理之良心有在矣夫能一為之可書如一再為之又其所出者加倍於前如孟都然者尤以見好義之有誠重榮之堂其信可書哉谷英歷官多明於知人且屢道及孟都之先人有為通判為長史為縣尹者皆以忠厚為政夫譬之木一本所出其性無異則李氏之及人豈直孟都而已乎因併及之李氏之後世尚世承之勿隳孝義堂記江隂朱維吉出榖四千石於有司備賑飢其善心之發蓋以祈其父善慶之康且壽也有司上其事賜璽書旌其父為義民而并嘉其父子且勞以羊酒免雜役七年蓋特恩也鄉人士采玉音名其所居之堂曰孝義維吉來求豫記因得所録璽書拜而觀之蓋所旌善慶之義者謂子之能孝必本於父大哉皇言乎其重所本乎且勉其父子允蹈孝義謹憲度表鄉俗所以光寵朱氏父子何其至也朱氏父子所宜拳拳服膺奉行而豈可斯須怠忽哉吾嘗聞維吉有至性母范氏兩遘危疾皆致誠叩神刲股煮液以進而愈搢紳大夫多為文章褒嘉之此其誠孝非一日之著也其必能服膺大訓而不愆者歟夫義者心之制而事之宜也必始於事親故孝為百行之先事克孝矣推之其餘所謂本立道生而未有不至焉者也朱氏以是名堂而益求進進不已焉將其幾於道也豈逺乎哉維吉勉之是為記繼芳樓記灌溪之羅氏泰和名族也羅氏之繼芳樓作自子贊始子贊與其兄子宣俱讀書好禮孝友而文傑然出其一鄉其所以名樓之意蓋欲趾美前聞人而不遏佚其聲光此非善繼善述者不能子贊昆弟其賢矣哉余外弟陳叔度來京師為余道其事且徵言為記余與子宣徵士有連其幾世祖某敦德尚義闔門數百指聚處無間言至五世不分先曾祖待制公嘗名其所居之室曰和樂之堂蓋所以彰其善而著無窮也有水環居而流曰木蘭之溪溪之上為花蕚亭一時光景文物之美為吾邑之望至今使人歎慕以為不可及此子贊之樓所以作而繼芳之所以名樓也豫何幸得以文辭托名於待制公之後乎夫有作以開其先者固難有述以紹其世者尤不易故古之名公碩士流芳垂榮於百世之下者常患無賢子孫之繼其後而勃興暴貴崛起閭閻之間者又恨無髙明祖父之肇其始有能前後無愧而兩得之如羅氏者何其寡見耶嗟夫子贊之作斯樓也名山勝水喬林修竹依然昔時之盛至於亭榭陂池之勝竒花異卉之植琴書圖史之富賓客遊宴之樂亦不減前人之舊觀矣則其登髙以望逺臨清而賦詩有不慨想先世之流風餘韻而興起者乎况羅氏昆弟子孫之盛如此和樂之堂又當相繼而作矣雖然子贊嘗見夫巷列之樹木者乎乃祖父得其地及時而種植之矣後之人深厚以培其本灌溉以息其生髙援峻墉以防其侵綿綿延延而不至畫焉則其􅐻骩百圍干雲蔽日可計日而俟也詩曰無念爾祖聿修厥德羅氏世萬子孫尚引而弗替哉豫他日獲謝事來歸登斯樓尚能挹湖山之白雲濯長江之清流一為子贊賦之未晚也樂志堂記吾宗自吉水徙西昌蓋四百年世以資甲閭右然所恃者詩書行義相傳襲未嘗恃資也更世多故其連甍飛棟池苑亭榭之盛無復存者其田跨數縣皆膏腴亦皆為勢而巧者所奪獨詩書行義之傳猶有存而未泯者此非先世之遺澤者歟余少所親炙宗人老者或出一言或至終日言未嘗不汲汲於後生之德善而自余去鄉二十有餘年吾宗之老長亦且盡矣人之少者日壯壯者日老而於余有識有未識壯焉每私竊咨求其所修諸躬施諸家與鄉而不忝乎先世者蓋無戚疏智愚而一以彥實為説彥實吾族兄子有甫長子童丱已知自重惇孝弟不肯非義取利而往往損己以濟人里社中有所私爭不平咸走彥實彥實為一言即平彥實平居祗憲度凡百先公府而後私室於為義如壯士畏事類處女而為人所畏服蓋能以柔為強所居去邑南五十里有田園以資有山水以娛間暇或循歷壠畝或濯清蔭茂樂稼穡之得時玩魚鳥以自適入則課子孫於文學洽賔朋於觴詠有以得乎心無所纍乎外謂非吾宗之良者歟嗟夫今吾鄉之人吾不得而盡聞也而聞吾宗有人焉如此吾安得不傾意以嚮之哉前六七年彥實以運賦來南京告余曰信竊有志乎善誠以謂為善有以自樂不自量而名所居曰樂志之堂庶求至乎是也幸為記之余諾之未暇今其子振又以運賦來北京惓惓其父之為善也求記益切故述彥實之志之所得且本乎其先之所恃者為之記亦將以示其子若孫云敬本堂記萬安東溪之上有世家曰郭氏元之盛際有孔祥者博雅好古軒偉豁達鄉人號之曰孔堂而薦紳大夫多喜與之遊翰林滕玉霄嘗為大書孔堂二字又為文記之至今里人老長矜道其盛歷歷如昨日事而孔祥之曽孫仲玉今徙居寧塘之側去東溪之里而近仲玉恆不忘其祖若父故所居也名其新居之堂曰敬本以係其孝思亦因以圖無忝焉介翰林修撰曽鶴齡來謁文為記萬安於泰和接壤而東溪尤密邇其民俗好尚同也其故家世族雖富盛皆赫奕而必務詩書談禮樂以為髙不以智力為長雄也郭氏先德之善其有徵矣逮至于今二百年其曾玄之世繼續其盛而未衰者亦必本諸其先也仲玉雖不得已而去其故居而慕仰先世引望桑梓于咫尺之地惓惓不能已於情者可謂能敬其本也人惟不知敬其本故不知敬其身不知敬其身則陷其身於僇辱而亦不自有遺矣仲玉之存心其度越衆人逺哉仲玉惇實恭慎崇尚文雅嘗以田賦長萬石區得舉於公私間鄉人號之曰玉田蓋郭氏之秀而無忝其先者也仲玉四子亦皆肖其父而余識其叔子曰利砥者溫溫焉方志於學郭氏益盛而未衰吾於堂中卜之矣故為之記若其作堂之歲月及衡縮深廣之度不係事體之重者可略焉大原清適記瀕澄江之南曰大原其地平夷曠衍皆沃壤可稼可桑又有崇山茂林之盛徐應𢎞之居在焉其居清幽而爽闓其伏臘朝夕祭祀賓客之資常裕然也以此自幸題其宴息之所曰大原清適屬吾姪子旅來請文為記吾家距其處雖限一水舉棹而濟朝而往日中而返日中而往莫而返吾自童而壯而冠率一歲十數過其處信知其可適也然人之所以適在乎心而不在乎外蓋嘗觀於古之人焉其富且貴矣有居室輿馬妻妾聲色之奉至足矣然其心猶有所不適焉者何也豈非時之不可以適乎今幸遇聖人在上惓惓夙夜以安民為切務綱紀清肅德化覃敷年榖豐登烽警不作使天下之人垂髫戴白林林總總之衆皆得相與恬嬉於春風和氣之中而不置一毫憂戚於其心者其可忘所自哉其必思有以報上之賜也夫上至仁以厚下下必至敬以報上所謂至敬者體至仁之心而修於已孜孜乎孝弟忠信恭儉廉耻之行以克承藉上賜於無窮而所以適諸中者亦無窮矣夫記者所以記其所自而不忘應𢎞尚克永念之哉是為記羅氏旌義堂記洪惟皇上以至仁大聖君臨天下夙夜孜孜育民為心天下之人祗承德意興仁效義如恐不及蓋洪範保極之庶民天保為德之羣黎也歲郡縣間奏水旱勑使馳驛發廪賑濟閭右之家亦爭出榖用助縣官有司以聞者並見旌賚于時淮安民羅振出榖千二百石上遣官某齎璽書勞之旌為義民郡守表其所居堂曰旌義振恭詣伏闕謝恩既退以其父同郡之舊謁豫求堂記其父景泰吾郡吉水人少遊淮隂遂家焉嘗於豫往還為人篤厚直諒喜施濟見重賢縉紳大夫其弟銓與豫同朝十數年卓然有立於豫往還尤厚蓋豫素悉振事振字文振平素耿介自執不肯茍且而寬惠樂施酷肖其父凡於出資奉公率以當為然必於衆恆自謂吾民之職也君子之論人必推其本凡文振所由昭受旌褒固非一日之誠亦其本諸家之訓者有自哉且於今南北之民以出榖蒙旌褒往往有之非一所也若斯舉而權輿實吾吉水胡有初氏而後感發於四方况吉水文振先人之鄉也而謂不同所自乎然道無窮已君子之志於義亦豈可以已乎譬之水焉出乎山道乎澗溪入乎大川行而不已必達乎海君子於義積而不已焉為善之應抑豈啻於旌褒者乎吾望文振之進乎是也為記之而加勵之退省齋記萬安於吉為小邑其人敦實不為夸毗而重儒者雖農商工技之人老釋之徒皆知儒者之尊也豈非其風俗之懿有以薰漸之乎道士李如愚好儒者之學遇儒者輒禮下之求益焉其邑丞林公異儒者也嘗以退省名其軒既示其要矣間因中書舍人鄒尚友求記夫如愚不欲聞儒者之學乎韓退之有言當就其師問之何故謁吾徒而來請也儒者之學明善誠身而已明善者即一事一物無大小精粗皆當究其極中至正之理而非虗無之謂也誠身者即於其身不間作息幽顯皆當謹其真實無妄之發而非清淨之謂也然以一心欲致明於萬善或不能無他岐之謬以一身欲致誠於萬事或不能無作輟之患此人之恆情儒者則致夫自省之功以求其至當而勉其所不逮焉耳儒者之道孔子其致也孔子教學者未嘗去內省為説傳孔子之道者曽子也曽子得聖人親為之師猶曰孜孜焉凡忠信傳習可能可為之事且不敢自足恆自省察兾增益所未至今之儒者學為曾子者也故一事一物無時無處而不致其自省之功自省者為已之要也如愚誠欲聞吾儒者之學如是而已孔子曰與其進也公異其善進人者乎太史公曰學老子者則絀儒學吾非能必如愚不有合乎其言然信其鄉之人皆可與為善也故因尚友之請為之記以終公異之意東里續集卷五
