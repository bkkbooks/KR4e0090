body:
  text: 東里續集卷九明楊士竒撰序送郭子瀘赴廣西僉憲序皇帝正大統之明年改元永樂將挈天下之民咸內之久安長治之域深惟措施之術乃詔都御史移檄諸道按察司察所部守令能子民與不能者而升黜之又詔吏部檄百司舉抱道伏匿之士與負才具沈淹下位者將顯用之繇是吾友郭君子瀘以知萬縣考治最又用薦者升廣西按察僉事將行知子瀘者皆為欣喜榮豔謂可以行所志也而余竊有祝願焉昔子瀘起鄉校上太學擢進士第既仕於朝為行人又出膺百里民社之寄博於學達於理周於務矣而又好善惡惡之志加切也以此往司大藩耳目之寄造父御騏驥馳康莊惡足以喻其易哉人安得不欣喜榮豔者乎夫人處一邑之上其視聽詢察易周也處一郡之上而欲其視聽詢察之周也已難矣况進而處於數郡之上哉位愈尊勢愈絶民愈逺則其下雖有困苦愁恨寒餓疾痛與郡守縣令廉貞仁厚貪懦殘暴惡能一一及於吾之耳目也此非能忘其尊剗其勢樂易而慈祥安有所得乎夫郡守縣令得一人而善焉奬勵誘掖之不失夫孰不勸於善遇一人而不善焉驅斥屏遏之不遺孰不懲於不善若是民固不淪於病也此又在致公於已之視聽茍不出乎公則必移是非之正反激揚之用而民不勝乎病矣此余所為祝願子瀘者也且廣西為西南大藩踰五嶺而瀕乎夷獠之區民勞且病久矣朝廷方夙夜在念前既命重臣往鎮撫之今又選擇如吾子瀘者往職風紀之司則廣西之民其安且治可待矣子瀘宜有以稱國家選擇之意也送彭先生序世所謂君子者身在是即道在是而人之是非毁譽君子不計也君子之道凡君臣父子夫婦長幼朋友之倫天地萬物精粗巨細之故日用作止語默之則仁義中正恭儉廉耻之用詩書禮樂修身齊家治國平天下之務無不力探博考研核深體求充於其身利於其行時而處也茹清飲潔休休焉不屈於富貴不汚於卑賤時而達也不問位之大小崇卑其才所施無往不適功建於當時譽流於後世者由其道之足乎已也然其處也道閟而弗衒行獨而弗偶世之人蓋有不之知者豈惟不知有從而病之焉及其達也得行道之時有及人之澤而後人知之豈惟知之固從而樂之焉然人知之與否病之樂之君子奚與哉吾邑彭叔介先生承纍世詩書之業盡心於仲尼以來至周程朱張之書凡性命道德之微治已及人之術敬身而潔行屹然自持也方其間居杜門刮去一切還往請謁之事獨時與二三同志相講説唱詠為樂而世之病先生者蓋有之矣先生持之益堅既而出教萬安縣庠又擢丞香山縣政教之施化行而惠流上下咸宜於是人知而樂之者多也嶧山之桐挺乎深谷之間未登於用孰名其嘉植哉逮夫斫琴瑟奏清廟而然後人重之理之固然者也余素知先生今以事來京師將還香山靖江府長史蕭用道屬余贈之言先生過故鄉有達於君子之道而知先生又深者必有同余言者哉送王瓊州詩後序西昌王氏以詩書德義為鄉邑之望者四百年於今矣宋戶部侍郎贄顯融仁宗朝其子億為吉州通判今邑中有具慶坊猶當時以為鄉榮者戶部之後文學簮纓繩繩不絶而與余家世交且有連也余童丱時猶及侍教竹亭先生與其弟崇慶太守兩先生既沒世則挾所業請益竹亭先生之子伯貞先生伯貞先生博雅精粹俯接後進如春陽及物皆使之融鬯敷達遂其生長之意時以工部主事丁外艱居家余或旦而往日中而返或晡而往夜而返無不得所意欲蓋非獨余為然邑人俊秀之務於學問日挾所業請益如余者衆也其得所意欲加深也伯貞先生今為瓊州太守一時從遊者皆已出而躋華陟要雖余之不肖亦叨祿于朝每引望南海而思邑人學者於今無所資賴然念先生統治三州十三縣環數千里之地專於宣上德究民隱位足以行道惠足以被下使海邦霑文明之化島夷樂衣冠之治則先生之功在彼猶在此也先生在瓊六年今考績來京師又别而歸鄉人後進有不能釋然者作為文若詩送之故書余説於卷尾以解之送夏驛丞詩序泝文江而上不百里有山曰石屋前臨大江江之外竒峯秀䫈駢立上下余嘗扁舟往來其處徘徊顧瞻甚樂之意者必有幽間靜貞之士居於其間乎前數年見鄉先生吳孟勤羅德崇言有所與遊者夏彥琛及其弟惟琛居石屋之西皆簡靜樂善謹謹自持無所事於聞達好與儒生學士遊間居多畜經籍以自娛此豈吾所謂幽間靜貞之士哉今年在京師識惟琛於胡侍讀光大所是時已用為桂林蘇橋驛丞滿一考而來且將復還蘇橋光大屬朝之大夫士為詩送之又屬余序其首君子之於仕也無論卑髙小大惟已有以稱其任而不辱彼其慕髙而耻卑樂大而厭小者要皆不足與有為也驛丞之職卑且小又在遐方絶徼炎風瘴雨之地惟琛終三年之淹觀其容色無不得之意而自其府至于藩臬之司至於天官皆考其績曰能夫善處卑幼於尊可知善處難者於易可見使惟琛之仕不止乎此將見無往而不稱矣余安得不樂為一言送陳司業詩序宣德二年秋七月吏部言南京國子監官闕上命翰林侍講陳敬宗往任司業於是京師士大夫皆為太學得人喜敬宗字光世初舉進士為庶吉士時太宗皇帝臨御之三年命禮部翰林簡新進士端厚博達者草八人俾進學禁中光世與焉盡出中祕書以增益之養之厚而望之重且以風厲四方學者而與於斯者皆能奮力自致後起而職論思掌帝制內佐六卿之政外贊方嶽之治皆焯焯有樹立不負任使而四方學者感發淬礪踴躍以起日益衆矣蓋文運至盛之際也今上臨御之三年簡用光世於首善之地此其所望之尤重也光世往焉盡心其所當為將使四方服辟雍之化人材致譽髦之興文運之復盛其又始於此哉此士大夫之所為喜歟光世廉正簡靜在翰林二十年同僚皆樂與之親今之去也多欲乞留之有正色言曰聖天子用志興學育賢為臣乃昵乎其私不能有所助耶有為光世私計者從傍歎曰使光世道行於太學於吾徒何敢有愛然近之為司成亦難矣同則好異則惡有如其寮或所存之不同而齟齬於下雖光世賢且才其能有所自遂以稱塞德意乎余曰不然古大司樂有道德者使教今之教者豈非明夫道德者歟以善人惡善人必無之理也又奚慮之之過乎於是館閣諸賢於光世厚者分題賦詩贈其行而謂余為之序送陳嗣初詩序仁宗皇帝初御天下顧問少保臣士竒曰東南文獻邦尚有老於文學而潛未用者乎士竒頓首言臣愚不足以知蓋聞蘇有陳繼焉即日遣使者馳驛徴之初至授國子博士以為四方學者之資既而上欲自資改翰林五經博士時初建𢎞文閣召置閣中得恆侍燕間效裨益加親密焉今上嗣大寶詔修兩朝實録簡為史官嗣初操存正識見明所敘述直而約婉而嚴得書春秋之法信良史也書成進官檢討踰年以目眚求致其事歸詔從之士竒與嗣初同在館閣同史事嗣初博古知要尤長於禮豫資之多矣於别也不能已於情故賦詩送之且致訊張宗海尤文度云詩曰在山有雲在澤有魚眷言偕處優哉于于雲升于霄魚遊于川今子逝我我心悁悁石以璞輝淵涵珠麗君子歸止于邦之賁翽翽五彩羣飛攸從邦有君子多士其宗煜煜德星睇彼東南我懷伊人寧不嗣音送張員外序太祖皇帝御天下用賢致治其取士非一途而必本諸其材與行也有裕於資而達乎政理者皆得舉用蓋裕於家必能守身達於理足以濟務聖明惓惓致治之意也於是階此而升華要列中外著譽名者往往有焉方是時華亭張賔暘被擢為鴻臚屬賔暘溫恭有儀闓疏能慎持之以廉行之以勤蓋士大夫多愛重之皇上臨御之初升為戶部主事越數嵗又升員外郎官益進而務益通矣夫官進者或驕務通者或怠賔暘在户部幾二十年未嘗有滯牘有廢事而所守益篤非其有恆心而能然乎士惟有恆心而庶幾乎保終吉也今以考績復還南京特一言張之縉紳大夫士相繼為詩贈之云送羅敬序士習輕實履而重茍得非一日矣而吾鄉其俗敦詩書其父兄躬率子弟以德義其學者務乎內不役志乎外蓋今尚有可稱焉吾去鄉而仕于朝二十餘年後余而學者多不及識近數聞羅敬篤踐履貴重其言行不同乎流俗今年會試天下貢士余為考官正副榜五百人而吾邑與選者十六人不與者敬及劉鼎四人焉耳既出院敬鼎偕十六人來謁敬雍容端雅鼎爽朗疏達恭然在群輩之中怡然無得失之意余時未暇為十六人者之喜而喜敬之四人者其所存有過人焉蓋非獨余之喜縉紳君子見四人所存如此亦皆喜吾邑之士有過於人也禮部既援例遣鼎三人者歸敬入太學太學生日益衆學舍無以容又奏遣敬等歸羅故廬陵清湖宦族世有科第分居泰和之梅溪數世矣懷忠信修禮義相襲不絶至敬之父宗智甫以學行為學者師敬涵濡家教而一志乎內蓋所謂吾鄉之俗之有可稱者也勉哉敬也士貴務本而將以行之古之君子明善誠身之學益進而有成焉推而施於家又推而事君治民以為國家之華豈徒自足其身哉勉哉敬也吾所為望於子者逺矣子歸拜家君過庭之訓有不同於余言者哉送段參政詩序毗陵段民時舉以明經登永樂二年進士第為翰林庶吉士與今侍讀學士曾公二十八人者同受詔進學文淵閣遂預纂修永樂大典既授刑部主事升郎中又受詔同翰林諸臣纂修五經四書大全及性理大全之書今年冬上以山東飢命吏部慎簡牧守之臣往撫其民首擢時舉為布政司左參政自古聖人之御天下旱潦飢饉未嘗無之惟聖人以民之心為心而施之盡其方其為之臣者亦以君之心為心而為之盡其力是以其民皆得所欲而無所惡故雖有凶災而不至乎甚病也今皇上仁民之心拳拳夙夜惟恐有一人不得其所同於古聖人之心矣而為臣者尚有漠然上不知敬君命下不知恤民窮者亦獨何心哉時舉行端氣和忠厚坦亮於為政有恭慎匪懈之節有哀矜惻怛之意詩所謂豈弟君子民之父母時舉無忝焉是行也其必有以宣上德而慰民望哉於是士大夫相與有交遊之好者賦詩贈之而余為引其卷端云送郭興文序松柏柟檜之材恆出而柱明堂棟清廟者其本既良又生於深林大谷無牛羊斧斤之侵而風日雨露氷雪之所養者歷百數十寒暑愈久而愈厚故其成之巨而用之重也蓋士亦然生乎詩書禮義之門少而親乎父兄師友之良不染於浮薄下俚之習而有問學講論以博其智端其行又或加之飢寒困窮以礪其志操其素所養如此故出而見諸用其所就必宏也使素無所養徒以一朝之譽而用之其本已淺其效諸用可見也興文其世所出良也少所親又良也其智其行其操之所養皆無不至也而舉於鄉貢於朝將命四方且十年將必躋顯用也夫用在命士所重在道君子惟修道以俟命也豫與興文最故且姻今其南行也書以贈别送吳參政詩序國家置布政司品秩亞六卿以分治外服統制廣而體勢重其委任不輕也而古君子之從政也其要曰事君曰愛民達乎事君之體者必能愛民書曰民非后罔克胥匡以生后非民罔以辟四方故苛責以恱君非所以事君怠命以恱民非所以愛民蓋愛民所以事君也而後世從政者有不為苛責怠命鮮矣夫郡者邑之表也郡能惇斯道邑從而化之布政司又郡之表也布政司惇斯道郡從而化之故布政司之任非才德兼有而達於大體者不足以稱二十年來為布政司余之所識者如四明吳好德蓋不多見好德端厚簡靜舉進士為給事中十年恭慎如一日升江西按察僉事獨持風裁不嚴而肅再入為儀曹郎履正而行不卑不亢而所至盡力國事存心民隱不以中外有間也升陜西布政司參政位益進道益行未嘗有所苛責怠命而事君愛民之務皆稱其才德之所施好德其可謂達於大體者歟今之布政司陜西所治最廣使其為郡為邑者皆惟好德之表是率陜西之治其何可及哉余嘗與好德鄰居八年知之有素今以參政滿三載考最而歸其姻家中書舍人劉孟功屬縉紳君子為詩送之又屬余為序故以是書諸卷首送劉參議歸雲南序江陵劉子偉自給事中拜雲南布政司參議歷三載考最將復之官雲南雖去京師萬里瀕夷獠之域而歸職方四十餘年建官府明吏治與內服等民皆樂其業安其分循習既久學校之貢士科舉之薦材歲未嘗乏人固本於國家德澤之涵濡教化之孚洽亦其長民者承流宣化克殫厥職歟蓋得賢令足以治一邑得賢守足以治一郡而布政司又郡之表也為布政司及其佐誠皆賢焉則一方數千里之民無不治者矣子偉固旬宣賢佐也其伯仲余皆嘗與之同朝伯氏尚書公識精材敏典邦政二十餘年恭慎小心偉然名卿也子偉闓通和易既薰漸於家又官侍近者將十年其練達政體可謂競爽則於今名賢佐於外服書最績於天官固子偉所宜有矣然君子之道誠焉耳誠則表裏始終無或間也詩不云乎靡不有初鮮克有終故古人有宦成之戒子偉之賢其必免於此乎矧聖天子惓惓愛民之仁同武王之不忘逺則求以盡臣職而副君命者豈可一日而忽也縉紳君子有分題賦詩贈子偉之行者翰林編修裴綸來求余序余故述其所自而以君子之道終焉送鄧嘉懋序鄧氏自磁溪主簿始家吾西昌至宋神童有興又至于今其詩書簮紱燁煜振動閭里間不乏也吾猶能誦子方子靜兩先生文章渾然商卣周彛古意獨存及彥髙先生詩歌渢渢魏晉之盛猶嘗側聞崇雅先生論詩極唐人之趣也猶及知彥髙先生經歷四川鹽運司清白皎然為當時所重及大椿先生知日照彭水皆有惠政民為立祠至于今思之不忘也猶見兾州知州子寬山西按察僉事文質平陽倉大使崇雅米脂縣丞仲簡泰和醫學訓科性善清才博學繼繼而起于後也而又交訓科君之子嘉懋非一日也鄧氏可謂盛矣嘉懋自少學于邑庠其後登成均已而告歸養其親又八年部符援例起嘉懋於家庶幾將舉之於用也既至有廢疾不任奏罷遣歸且行余往送之視其意欿然如有所不足如欲一展其素蓄見諸當時上以報國家十數年教育之德以繼其先纍世芳華之盛而不獲者則解之曰士之希有益於時者固尚於得位然而名一德擅一藝雖不得位而處於家則善其一家處於鄉則善其一鄉亦未嘗無益於時也方今國家致隆孝理君歸盡事親之道將使一家或一鄉之間皆由之而善焉若是而有補於風化可以為報也矧古之人固有志立事違以待諸其後之人者矣今君有子森森而君且善教也是歸也義方益嚴勉之於明體適用之學將不有益於時國家者乎亦可以為報也夫上有以報國家斯可以繼前人聲華不墜矣其何以欿然為哉於是嘉懋躍躍喜曰豫雖不敏其敢不戮力以庶幾自勉遂書以贈别送鄉貢進士蕭鏜詩序余姑夫陳白石先生與其兄金華主簿皆博學能文持論議衮衮余幼時常嬉戲其家其子壻數人皆俊爽英特蕭子琛獨謹謹敦本崇實無務外之志余雖幼知敬重之於今三十餘年矣回視一時俊爽英特憂患變故存者無幾子琛獨巋然無恙固敦本務實者其道可逺哉其子鏜溫然謙恭而恂恂殆亦本之於父乎試于鄉闈年裁十七今來京師挾所試文字過余讀之詞義粲然余於是有感矣余初去家上京師鏜方入小學習句讀今所進駸駸至此余豈有銖寸之加乎前也豈惟無加而退亦甚矣徒然濫玷時榮不尚有愧於鏜乎使鏜亦進進不止其誰可及也茍惟若是而止焉將不有愧於後來之人如余者乎勉旃鏜也其愈力進而無自足可也今鏜以例歸待再貢其內兄翰林庶吉士陳孟潔求朝士作詩送之又求余為序故書此使勉焉送姪子之夔赴吳江訓導詩序之夔家兄思貽先生之子謹靜和厚今年會試禮部中教官選得蘇之吳江縣學訓導辭行為告之曰吾楊氏居吉今四百年世服逢掖為邦碩宗處者力詩書崇行義仕者持大節履正道見諸國史郡志家乘者焜焜相望夫有興於前必有承於後此吾兄弟所為夙夜不遑寧居者也繼今而勉者不在於汝乎吾兄今年八十有五吾今年六十有九何幸見汝以經術發身居師範之任用慰其衰老然師道至重也非端其所存謹其所發道聖賢之道以道之其克有濟乎况蘇承泰伯仲雍子遊及近代范希文諸賢之化未泯也而山川清淑之氣鍾於人皆明秀端厚皆將出為君子為濟世之材而所以表率成就之係於我我欲其言聽而令從心恱而誠服也而不勉諸己可乎孔子曰溫故而知新可以為師此言必有諸已而後能及諸人揚子雲曰百川學海而至于海丘陵學山而不至于山為其畫也汝往無畫庶幾以稱朝廷之任使以不遏佚我前人之光也翰林編修朱孔暘嘗為余寫竹於是賦近體詩一章其上贈之以寓臨别之意送汪推官詩序吉安府推官蘄春汪君彥良以永樂壬寅到官郡即檄君董是嵗秋賦輸北京汪君敬事而愛民是時郡尚有積嵗逋賦未輸者汪君所董數月皆具舟首尾相屬數百艘道江湖踰險阻凡七千里又數月畢達既悉內地官其運輸之民無有勞苦愁歎之意蓋得汪君為之長也於是吉之士君子仕於朝者數十人相與嗟咨愛重汪君之獨賢勞於其鄉也皆賦詩贈其歸而余當序首簡夫吉江右鄒魯之邦也談詩書者不間乎貧冨賤貴服逢掖者傳習數十世不變負氣節於樂善急義赴功而趍事固習俗素然矣况又有長之者之賢如汪君者哉然其比嵗之賦不得若壬寅者豈必皆細民之罪細民於供縣官雖單力未嘗不勉也使祗命者皆如汪君率民者皆如汪君吉之賦焉有積嵗之逋哉此非吾徒之所當言也然自國家統御以來吉之賦未嘗有一嵗之不足吉之守未嘗有一人之不賢不必以逺舉前二十年金華朱侯山西藺侯至于今郡之人思慕如父母數年之前三山林君為推官其威愛之施民畏而恱之以為恃也吉之人曷嘗不有公論哉林君去再代得汪君志不撓而才有為雖在郡未久而毅然摧惡植善間一二懲其甚者則罔不懾伏斂避蓋卓然宜於其職者也雖賦運非其所領職而能盡心於為國與民如此豈非足以繼林君者哉此吾徒所以樂夫為鄉郡者之屢得賢也嗟乎使汪君歸而歷政之久及民之深將不有詠歌之於閭閻畎畝之間而豈止諸君子今之所賦也請書以俟焉送周時立詩序吉之文江泥田里周氏世襲詩禮聮簮纓凡仕者必以明經發身蓋嶷然為鄉碩宗余家居時廬陵邑大夫嘗聘佐教事時周氏仲方先生佐教郡學其從子公明佐教邑學余與公明鄰屋而處者浹旬公明冡子時立年弱冠列諸生之次粹乎其資之良也溫乎其儀之恭也顓顓乎其謹於言行也勉勉乎其勤於問學也余私心恱之及余官翰林仲方先生被召治水浙江數往還京師其時仲容先生及公明皆召纂修禁中而岐鳳方分教國學仲方仲容泥田之望也公明岐鳳泥田之英也余時得聚處相樂及余來北京岐鳳仲子功敘公明仲子時簡相繼官翰林今皆為修撰泥田之俊也於余聚處益密相樂益久近數年公明季子時勉孫源皆擢教縣學時勉得襄陽源得德清其初至及去以祖父故皆一再過豫恂恂端厚稱其家世何周氏詩書世澤愈逺而愈有繼也源近年預考南京鄉試士論愜服時立之子也余不見時立三十餘年未嘗忘之蓋時立靜貞恬淡處鄉里恆自進其學不厭後生晚進率皆師之而無所務乎外也此其志非有大過人者乎譬之於玉為瑚璉為圭為璧用之宗廟朝廷人皆知貴之若夫璞而韞焉山川因之光采草木以之明潤非有識者不能知也焉得重彼而忽此哉時立今年夏思其弟來北京間過余其溫潤縝栗蓋視昔之時益深矣不幾日將往德清見其子即歸終不一語及他事士大夫有為詩贈之者以余素知時立故屬為之序云南園宴遊詩序鴻臚卿楊思敬有别墅在都城之南備山水園林之勝公暇約客往遊賔主相與觴詠之樂可為至矣夫人之生上壽甚少中壽亦不多見下壽而或有寒餒疾病勞困憂鬱驚畏之嬰於中則其可樂之日亦無幾也况或利欲之膠於中營營擾擾須臾食飲之不暇雖有可樂其能樂乎今吾數人者幸耆艾康和亦皆達夫理欲之幾無所纍乎外而際治平無事春和景明之時二難契合又有文字之娛豈非至樂然吾聞之古之君子其樂也豈徒然哉衛武公既老飲酒作詩惓惓於自警賔之初筵是已蓋樂而不忘敬德也德者樂所自古者今所法此君子之為而吾徒所不可忘也思敬輯諸公倡和之作屬余引於首敬用書此東里續集卷九
