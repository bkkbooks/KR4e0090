body:
  text: 東里别集巻一明楊士竒撰代言録視學之碑朕惟帝王之興必首舉學校之政以崇道德𢎞教化正人心成天下之材致天下之治唐虞三代之盛率由於兹後世之君其學政或脩或否是以政不古若也我皇考聖神文武欽眀啓運俊德成功統天大孝髙皇帝龍飛淮甸渡江首建學校親祀孔子日引儒臣講論經義求古聖人之道身體力行既統有萬方即詔府州縣皆立學天下士子雲集京師復新作廟學於鷄鳴山之陽親製教條頒布中外又命天下增廣生員復其家府州縣皆用春秋有事孔子賜以樂舞德教廣被海外諸國及蠻夷酋長並遣子入學教化之隆視古為盛朕纘承大統仰遵成憲乃永樂四年三月朔日躬詣廟庭謁先師孔子前期三日雨將事之夕霠雲澄霽星緯昭眀暨旦天宇穆清旭日鮮麗舎菜于廟退即彛倫堂文武羣臣咸侍左右師儒在席諸生序列堂下命祭酒胡儼等以次講經成禮乃還夫學以眀道也道之體廣大光眀配乎天地日月而其實不離乎彛倫日用之間孔子眀之上以承堯舜禹湯文武之傳下以為後世植綱常開太平於無窮而世之極其尊崇禮之者非於孔子有所增益特以著眀其道之至大天下不可一日而無也惟我皇考繼統帝王尊師孔子舉天下皆約之使由於斯道是以治化之盛淪浹周徧薄海内外罔不嚮風慕義朕景仰𢎞謨夙夜祗敬思惟繼承之道不敢怠遑爰因視學謹叙述皇考所以致隆治化之本勒碑于廟俾我子孫臣庶尚克欽承於千萬年永樂四年三月初一日交阯再平定赦罪詔奉天承運皇帝詔曰天地大生成之德普萬物而無私帝王廣協和為心統六合而無外朕祗膺天命纘紹鴻基體覆載以子民𢎞道德而立政乂安惟切夙夜不忘永懐一視之仁敷洽八紘之内咸底綏輯庶答天心况安南介兩廣之邊陲在國朝先諸蕃而欵附乆罹荼毒詎忍遐遺其賊臣黎季犛父子累殺國王屠夷其宗族横虐民庶蹂躪於鄰封遂上侮於朝廷屢内侵於邊境諭其悔罪始猶務於包荒稔而弗悛終難稽於援溺肆行弔伐遄舉偏師天威震臨蟻聚奔潰履鷄翎於平地曾無寸草之横蹈富良如坦途何有一抔之險搗列柵以蹙于醎子窮三穴以極于竒羅殆烈火之燎毛甚疾風之振槁未踰累月盡縶兇渠既解縱其脇從咸撫存其疲瘵祥飈蕩除於癘氣清霜普肅於妖氛溟海為之清寧山川發其光彩特立交阯都司布政司按察司列為郡縣俾同中夏之氓化其髦倪悉去南蠻之俗渙號初下輿情翕從獨其孽黨之心不變狂亂之志不從教令不復生業迯匿藪澤聚嘯山林刼殺良民賊害命吏恩德不念悖惡逾深若謂牧守匪人撫字失當陳述所苦敷訴求伸何敢拒違復作兇逆困甚鴻毛之命猶張螳臂以當車遂来虎旅之雄莫救泰山之壓卵憐其怙惡秪自取亡除前倡祻首謀之人罪逆深重俱已伏誅外尚念餘衆本因愚昧或迫饑窮或為强暴所驅或為姦利所誘事非得巳情有可矜槩而罪之朕實不忍詔書到曰咸赦除之軍還為軍民還為民各復其業以圖自新如巳經恩宥仍復㝠頑不行悛改必殺無赦其交阯所屬軍民衙門官吏體朕至仁務隆寛恤毋為嚴急毋肆侵漁導之趨吉而避凶為之建利而去害使長㓜咸遂小大獲安官府一切不急之務俱且停罷於戱帝德好生肆覃霈湔除之澤天心助順宜永堅欽戴之誠改過而善福有必臻非分之恩理不常得咸樂和平之治勉承嘉靖之仁故兹詔諭咸使聞知永樂六年五月初一日巡幸北京詔奉天承運皇帝詔曰成周營洛肇啓二都有虞親民尤重廵省朕君臨天下祗率典彛統御之初己陞順天府為北京今四海清寧萬民安業國家無事省方維時將以明年二月巡幸北京命皇太子監國朕所經過去處親王止離王城一程迎接軍民衙門官吏人等於境内朝見非經過去處毋得出境道路一切飲食供給之費皆己有備不煩於民諸司毋得有所進獻科擾勞衆布告中外咸使聞知永樂六年八月十一日冊貴妃文維永樂七年嵗次巳丑二月甲戌朔初六日已夘皇帝制曰朕祗承大統仰率聖謨永惟王化之基實係彛倫之重致明禋於宗廟必有相奠之人正内治於宫闈必有協宣之職眷言賢淑禮用褒隆爾某氏懿哲徽明端莊誠一和恵本乎天性靜順合於坤柔率履多儀益謹珮環之節含章有羙不忘圖史之規惟乃令猷宜膺顯冊特封爾為貴妃於戱貴貳軒龍既超承於恩命光昭褕翟佇益懋於德華惟孝敬為福之源惟勤儉為化之本惟肅雍以自牧惟儆戒以相成徃服訓詞永膺福禄欽哉昭容誥文制曰帝王之治必本於家彛典所書尤詳内職眷言淑善宜用叙升爾某氏洵羙端莊恵和柔順本其天性夙表著於德儀祗事宫闈益謹循於圖史動必由禮勞而能謙肆顯示於褒嘉俾榮遷於名品今特命爾為昭容徃服隆恩益勤祗慎寛恤交阯詔奉天承運皇帝詔曰朕祗膺天命統馭萬方永惟覆載之中咸屬照臨之下心存博愛宵旰惓惓矧交阯既屬於職方而連嵗未臻於休息憫兹困弊之後特敷寛恤之恩庶俾兆人咸沾沛澤所有合行事宜條示于後故兹詔諭悉使聞知永樂九年二月二十五日蠲陜西山西河南逋税詔奉天承運皇帝詔曰朕祗膺天命統御萬方即位以来軫念黎庶夙夜惓切眷惟陕西山西河南接境邊塞供給轉運民惟勞勤矧自今年夏秋以来疾癘相仍民滋困悴未臻蘇息朕甚憫焉其陕西所屬府州縣永樂八年以前拖欠税糧並與蠲免故兹昭示咸使聞知永樂九年十一月初一日即位詔奉天承運皇帝詔曰朕惟上天生民爰立君主仁育兆庶咸底於泰和統御華夷同躋於熙皥我先皇帝奉天撫運治化髙於百王文德武功聲教被於四海比縁邊警廑龍御以親征逮及凱還竟鼎湖之升逝遺命神器付予眇躬顧哀疚之方深豈遵承之遽忍宗親公侯駙馬伯文武臣僚軍民耆老及四夷朝貢之使俯伏闕下奉表勸進以為天位不可以久虚生民不可以無主長嫡承統國家常經陳詞再三瀝懇勤切用是仰遵遺命俯狥輿情巳於八月十五日祗告天地祖宗社稷即皇帝位奉祖考之洪祐仰聖神之永圖屬兹蒞阼之初宣布維新之命其以眀年為洪熙元年所有合行事宜條示于後一自永樂二十二年八月十五日昧爽以前官吏軍民人等有犯除謀反大逆子孫謀殺祖父母父母妻妾殺夫奴婢殺主不赦外其餘巳發覺未發覺已結正未結正罪無大小咸赦除之敢有以赦前事相告言者以其罪罪之一官軍幷旗軍將軍力士校尉舎人餘丁人等為事犯罪發遣各處立功哨嘹等項盡行宥免復還職役一軍官有為事被刑及罷閒者除謀逆外其餘見在者復其原職巳故者子孫依例承襲總小旗革役充軍者各還其原役一文武官吏軍民匠作人等有為事做工及運磚拖石砌城運糧等項者悉宥其罪官吏復還職役軍還原伍匠仍當匠民放寧家其風憲官有犯贓罪者不復其職放囬原籍為民當差一文武官員幷總小旗有為事巳復職役住支俸糧及支半俸者俱照舊支一永樂十九年十二月終巳前拖欠虧兑未完税糧料豆户口鹽糧及有報數在官未曾送納者盡行蠲免永樂二十二年户口鹽糧一年其各處拖欠草束及柴炭俱自永樂二十年十二月終以前蠲免一自永樂二十二年八月十五日以前逓年虧欠農桑諸色課程倉糧鹽課魚課等項幷倒死馬駝騾驢牛羊虧欠孳牲等畜及拖欠蘆柴各處納欠銅錢顔料席麻竹木等項幷追賠珍珠等物未納各項贓罰賠追未完段匹等件盡行蠲免一軍官為事犯罪發遣各處充軍養馬種田等項者盡行宥免復職一各處軍民有為事追賠孳生馬匹受官府逼迫不得巳將男女妻妾典賣與人以致流離困苦莫能自存者詔書到日官司即為贖還毋得托故延緩如女子年長巳成婚者不在此例今後倒死孳生馬匹只照洪武年間例追賠一天下一應税課照依永樂二十年以前舊額徴收不許指以鈔法為由妄自增添擾害商民違者罪之一各處逃移人户悉宥其罪許於所在官司首告發囬原籍復業免其差徭二年其户下虧欠税糧盡行蠲免一下西洋諸番等國寳船悉皆停止如巳在福建太倉等處安泊者俱囬南京將帶去貨物仍於内府該庫交收諸畨國有進貢使臣當囬去者只量撥人船護送其去但係所差内外官員即便回京民稍人等各放寧家一徃迤西賽瑪爾堪實喇蘇等處買馬等項及哈密取馬者悉皆停止將去給賜段匹磁器等件就於所在官司明白照數入庫馬駝騾疋若係官給者仍交還官軍民買辦者仍給還原買之人所有差去内外官員俱限十日以裏起程赴京不許托故稽留一徃雲南木邦緬甸麓川車里等處採取寳石等項及收買馬疋等件者悉皆停罷其給賜之物發與差来進貢使人順帶回去但係朝廷差去内外官員限十日以裏即便起程赴京官軍各回原衛着役不許稽留一各處脩造往諸畨船隻悉皆停止其各處採辦鐵梨木只照依洪武年間例採辦餘悉停罷一但是買辦下畨一應物件幷鑄造銅錢買辦麝香生銅荒絲等物除見買在官者即於所在官司庫交收若未起運者悉皆停止一各處買辦諸色紵絲紗羅段疋寳石等項及一應物料顔料幷蘇杭等處續造段疋抄造紙劄燒造磁器採辦梨木板及造諸品海味果子等項悉皆停罷其差去人員即便回京敢有指此為由科歛害民者罪之一各處閘辦金銀課除巳煎銷見收在官外自今幷前停止敢有不遵法䖍私自煎銷者罪之所差去閘辦人員限十日以内即便赴京不許托故稽留但係舊額嵗辦課銀幷差發金銀不在此例一交阯採金採珠及採辦香貨之類悉皆停止凢交阯一應買辦採取物件其詔書内該載未盡者亦皆停止所差去内外監督官員限十日以裏起程赴京並不許托故稽留虐害軍民一各處自為營造採辦木植如已起運者随到所在堆垜其未採辦者悉皆停止軍民各放寧家所差去採辦官員人等限十日以裏即便起程赴京毋得托故稽留違者罪之一浙江福建官臺山烏峰洞等處有等人民因被府縣及閘辦官吏逼迫不得已逃命山林出沒為盗詔書至日悉宥其罪各還原籍安生樂業永為良民一陕西四川儧運茶課有己起運者即赴所指茶馬司交收未起運者悉皆停止一各處造作除軍需外其餘不急之務盡皆停罷今後有司非奉朝廷眀文敢有一毫擅自科擾軍民者罪之一逃軍逃囚逃匠人等詔書到日為始許一月内赴官自首免其本罪軍還原伍民還原籍匠復本業一逓年為事發去買馬當站及充軍逓運驛夫皂𨽻膳夫軍伴之類法司即便撥替放回為民不許延緩違者罪之一有被水旱缺食貧民有司即便取勘賑濟一民間應有事故人户抛荒田土有司即為從實取勘開報以憑覈實除豁另行召人承佃中間如係官田即照民田例起科一軍中有鰥寡孤獨者所司依例存恤毋令失所民年七十以上及篤廢殘疾者許令一丁侍養不能自存者官為賑給凢軍民年八十以上者所司給與絹二疋綿二斤肉十斤米一斗時加存恤一孝子順孫義夫節婦許所司保勘眀白開具實跡奏聞以憑旌表一軍民之中有懐材抱德堪為任用或屈下僚或隱山林所司薦舉以禮遣送赴京量材擢用一凢有軍民利病諸人直言無隱一凢有貪官汚吏蠧政壊法作弊害民詔書到後不即改悔仍前貪虐者許巡按監察御史按察司即便拿問解京一自後官吏敢有指以催辦為由輙自下鄉科歛擾害平民者許諸人首告所司即便拿問解京一諸司官員敢有容隱吏卒弓兵皂𨽻牢子久占衙門逓年不替專浸潤官長起滅詞訟説事過錢及稱主文等項名色各衙門結覽弄法把持官府虐害良善諸人首告其有在按察司及廵按監察御史即便擒拿問罪解京一法司所問囚犯今後一依大眀律科斷不許深文違者罪之於戯軍民一體愛人必務於寛𢎞賞罰有經為國必彰於明信尚賴文武賢卿中外良臣攄乃忠貞匡輔不逮用承鴻業隆國家永逺之基嘉惠羣黎廣海宇治平之福敷告天下咸使聞知永樂二十二年八月十五日尊文皇帝文皇后諡號詔奉天承運皇帝詔曰朕惟自古聖君哲后有大功大德者必有顯號徽稱以表揚鴻羙垂萬萬年欽惟皇考大行皇帝躬膺天命統御兆民制治保邦隆繼述之大孝篤近舉逺同覆載之至仁神武𢎞廓清之功聖文廣緝熙之化天地宗社享於上華夏蠻貊戴於下輿圖充拓曠古所無泰和融液嘉徴畢至海宇乂寧臻于熙皥欽惟皇妣仁孝皇后天禀元聖上配宸嚴至順以承天厚德以載物含𢎞光大端一誠荘隆化理之原篤宗祧之敬宣昭懿範母儀天下神遊益逺哀慕無窮屬兹繼叙之初式舉尊崇之典謹命文武羣臣稽古禮文議薦諡號大公之義輿論僉同秪告天地宗廟社稷恭上皇考大行皇帝尊諡體天𢎞道髙眀廣運聖武神功純仁至孝文皇帝廟號太宗皇妣仁孝皇后尊諡仁孝慈懿誠眀荘獻配天齊聖文皇后於戱惟神聖配乾坤蓋名言之莫罄惟光華同日月著尊仰於不忘敷告臣民咸使聞知永樂二十二年九月初一日文皇帝尊諡冊文維永樂二十二年嵗次甲辰九月癸酉朔初十日壬午孝子嗣皇帝某謹再拜稽首言臣聞惟聖神之德如天地之化至妙莫測至大難名然皇有羲軒之稱帝有堯舜之號皆本謨烈表于萬年恭惟皇考大行皇帝體天之心𢎞天之道具大而能化之聖存妙不可知之神統理萬邦仁育庶類同乾坤之發育同日月之照臨廣大而髙眀剛健而不息揚神武以靖亂宣文教以興治篤繼志述事之孝兼創業守成之勲典章集百王之大成朝貢極八紘而必至道泰時康于茲二紀隆功盛德宜薦尊諡謹奉冊寳上尊諡曰體天𢎞道髙眀廣運聖武神功純仁至孝文皇帝廟號太宗伏惟聖靈在天昭眀有赫垂裕後嗣咸被家國于萬萬年與天無極謹告文皇后尊諡冊文維永樂二十二年嵗次甲辰九月癸酉朔初十日壬午孝子嗣皇帝某謹再拜稽首言臣聞聖君御極必有聖后如天地日月共成化功虞夏至周逮我皇祖咸得聖助光啓國家懿號徽稱萬世尊仰欽惟皇妣仁孝皇后上配聖考允孝允仁允欽允誠嚴奉宗廟協隆化理含𢎞光大配地承天表母儀於天下垂教範於無窮萬方欽戴愈乆不忘塗山太任古今一揆謹奉冊寳上尊諡曰仁孝慈懿誠眀荘獻配天齊聖文皇后伏惟聖靈眀昭在天𢎞祚後嗣億萬萬年謹告冊立皇后皇太子封宗室諸王詔奉天承運皇帝詔曰朕惟致理必先正内所以崇王化之基承統必重建儲所以厚國家之本乃若衆建宗室式以永壮藩維帝王大經典章斯在朕祗承天叙君主萬邦顧兹臨御之初方切維新之治念德澤之未究耿夙夜其靡寧而親王勲臣文武百辟志存愛國咸懐永圖屢表攄誠請立皇后建皇太子稽率舊章勉狥衆志巳於十月初八日冊立妃張氏為皇后十一日冊立嫡長子睿名為皇太子封次子為鄭王為越王為襄王為荆王為淮王為滕王為梁王為衛王於戱惇叙彛倫自家邦以達于天下鞏固社稷隆本支以傳于萬年用𢎞仁厚之風永協雍熙之化布告天下咸使聞知永樂二十二年十月十一日勅五府六部等衙門求直言朕以菲德嗣承大統君臨億兆顧天下之廣庶務之繁豈一人所克獨理亦賴文武賢臣相與協力共圖康濟矧屬亮隂之際尤切倚毘之心是以嗣位之初首詔中外旁求直言此皆實意而渉月累旬言者無幾夫京師首善之地四方之所視法或有人困於下而不得聞弊膠於習而不知革為國以得賢為重事君以進賢為忠今居官者或廉貪襍處賢否無别其何以望治效典兵者或部伍不實紀律不肅其何以嚴防禦仕者之禄不足而冗食之員甚衆法吏所尚未平恕而罪人或困於深文推之百司之務夫豈皆適於中近者如斯何以法逺豈非憲紀不振言路猶壅夫有功必賞有罪必罰賢者必進不肖者必退至公之典朕不敢私卿等皆受朕股肱心膂之寄無以直言而慮後譴君臣同體相與貴誠必嘉謀嘉猷輔朕不逮庶副倚重賢人君子之意故勑永樂二十二年十月十一日勑諭天下文武羣臣脩政事朕惟天地以生物為德人君以養民為任設官分職簡賢任能所以相成其功朕祗紹鴻圖仰惟祖宗創業守成之艱難夙夜惓惓體天為治嗣位之初蠲逋負赦有罪不急之務一切停罷慎選賢良共圖維新之治期與天下安於太平今天下庶事未盡理生民未盡安斯朕之責亦爾文武羣臣之責尚勉思之咨爾文臣六卿掌國之庶務布政司受任方隅守令典郡邑大小庶官各有攸司其竭忠殫慮以安黎庶銓選必擇人賦税必有常禮教必脩眀兵政必振舉刑罰必平恕營繕必撙節凢百政令必勤審度以存恤為心内外相承興利除害休息以蕃其生勸課以厚其本興學勸士以正其俗以成其才必使吾民衣食充足禮讓成風匹夫匹婦咸得其所斯為稱職咨爾武臣都府掌國之軍政都司控制一方衛所邊圉各有信地其悉心戮力以衛國家簡閲訓練必公必勤紀律部伍必嚴必肅器械必堅利城堡必脩繕糧茭儲峙必足於用廵邏瞭望必謹以備使姦宄屛迹吾民安於無事其要以撫養軍士為本䘏其饑寒念其疾苦用之於萬全斯為稱職至於風憲為朕耳目朝政闕典吏治得失軍民利病百官有司孰賢與否悉宜㢘察必使官得其人政無不舉人咸樂生斯為稱職夫君臣一體上下相須朕勉於脩德爾尚勵於忠貞弼成治化以躋斯民於雍熙泰和之盛不其偉歟朕代天子民恪存戒飭不以小人備任使不以浮費傷財力不以刑法先教化不以貪黷勞士卒爾尚體予至意以副職任惟忠足以事君惟仁足以䘏人惟勤則庶事集惟㢘則公道存乃若驕淫縱恣朋比用事貪暴掊克漁獵吾民阿諛從事務為容悦庸壬保位無補於時黜陟之眀賞罰之公典章具在爾其欽哉故勑洪熙元年正月初三日郊祀覃恩詔奉天承運皇帝詔曰朕惟君國之道事天為大事天之實恤民為本我國家聖聖相承太祖髙皇帝肇基垂統𢎞靖萬邦太宗文皇帝繼志守成德威廣被天下無事生民乂安六十年於今矣是皆天地祐祚之隆祖宗功德之盛肆及眇躬獲承鴻緒嗣位以来夙夜祗慎上惟天地之重下念生民之艱式嚴昭事庶臻康濟謹於今年正月十五日恭祀天地于南郊股肱助相群工駿奔三靈交悦百順介祥嘉與臣民均膺慶澤一應合行事宜條示于後一農桑衣食之本學校風化之原有司宜加勸課在内從廵按御史在外從按察司廵督毋為虚文務臻實效一祀典神祗皆為保庇生民有司奉祭務在誠敬不許䙝慢一天下嶽鎮海瀆及各處山川社稷等壇帝王陵寢先聖先賢忠臣義士旗纛城隍祠廟常須潔淨遇有損壊隨即脩理仍禁約不許樵採牧放一軍民之家有孝子順孫義夫節婦合該上司審覆眀白具其實跡奏聞以憑旌表一軍民有鰥寡孤獨及篤廢殘疾無依之人所司常加存恤依例廪養毋令失所一有㢘潔公正賢能幹濟之人未曾出仕或屈在下僚許所在官司薦舉務得真才實行以憑擢用不許徇私濫舉若考驗不中或後犯贓罪原舉之人連坐一文職官員自永樂二十二年八月十五日以前有犯罪作辦事官及發充吏役承差者並送吏部隨才受職但有贓罪者不在此例一武職官員子孫除應襲外其餘子弟果有德行可取才識優長者聽所在官司薦舉以憑取用一文武官有因公幹在途病故者所在官司即以禮棺歛逓送還家若在任病故家小不能還鄉官為依律應付脚力送回勿令失所一廣東珠池及各處官封金銀場幷江西饒州燒造磁器官窑仍前禁止外其各處山塲園林湖池坑冶及菓樹蜂蜜等件原係民業曾經官府採取見今有人㸔守及禁約者詔書到日聽民採取不許禁約如有原㸔守之人各還職役一官員父母有年七十之上家無丁力去任遥逺不能就養者許其眀白具奏放回侍飬待親終起復就用若不得離職願分禄於原籍支給奉養者聽從其便一内外文職官員離家年久者許其眀白具奏挨次給假回還原籍省親祭祖一文職官員年七十之上不能治事者許眀白具奏放回致仕若無子嗣孤獨不能自存者其有司月給米二石養其終身一自洪武至永樂年間有充軍擺站等項後因保舉起復為官或見任或病故或以禮去官皆免其户下子孫補役見任年七十之上筋力衰憊者亦許引年致仕開其軍伍一天下諸司文武官吏俸給每石折支鈔二貫五百文近来米價騰湧日用不給除原支本色米外其餘俸米每石折支鈔二十五貫候年豐糧積再行定奪一朝廷建置文武官員所以統治軍民其間或有官非其人不得軍民之心而軍民動輙綁縳凌辱有傷大體今後凢有害軍害民官吏許被害之人赴合該上司陳告上司不為准理許訴於朝不許擅自綁縳違者治罪若受贓及造反謀逆及逃叛者聽綁縳前来不拘此例一城池之設所以禦暴衛民遇有坍塌損壊隨即脩理合用材料支給官鈔買辦不許因而生事擾人若有坐視不行脩理者聽風憲官糾舉一工部成造軍器逓年坐𣲖各處買辦一應物料多有未納自永樂十九年以前坐𣲖者悉皆罷免其二十年二十一年二十二年坐𣲖者免其一半以紓民力一各處嵗辦蘆柴除前蠲免外自今常額以十分為率减其三分每嵗正納七分實納本色二分其餘五分俱照原行折收鈔貫每束收鈔五貫就送所在官庫收貯支用一各處逃移人户詔書到日即回復業其户下逓年拖欠税糧悉與蠲免仍自復業之後再免税糧差役二年如乏牛犢種子者所司勸諭糧長里長幷有力之家互相給助耕種不許生事擾害其有比先私家債負未還者限三年後一本一利交還不許逼抑索取一各處全户充軍幷全家死絶抄劄人户遺下空閑荒蕪田土無人佃種者所司務要設法召人開耕待三年後方徴税糧不問官民田俱照本處民田例起科不許重加科擾違者罪之一各處衛所官軍俸糧近年有因水旱等項民間輸納未足倉無儲積以致官軍積乆不得給用詔書至日各府州縣將永樂二十年分拖欠税糧各照當地時價聽民折納鈔貫布絹頭畜等件就於本處官司收貯仍查勘各衛所官軍逓年未關俸糧眀白見數挨次將前項折納物件依原折米數給付官軍收用其支給餘剰之物儲貯别用一各都司衛所屯田官軍今後務依原定分數下屯不許一槩差占失悞農業年終從監察御史按察司比較其間多有艱難辦納子粒不敷今後除自用十二石之外餘糧免其一半止納六石一各處拘補軍役已有定制其有委係丁倒户絶者取具所在官吏執結回報衛所即為轉逹該府兵部以憑開豁毋得展轉勾擾剥削無辜亦不許指此為由一槩將有丁之家徇私賣放空歇軍伍違者各治以罪一各處孳生馬疋舊例每年納駒一匹中間多有駒不及數者令其賠補積畜年乆貧無賠償者多至失所今聽兩年納駒一匹永為定例若兩年納駒兩匹量為賞鈔以旌其勤一四川寳寧等府所屬茶課其原額官茶自洪熙元年以後皆照洪武年間例辦納價買民茶盡行罷免若官倉見積茶數堪中換馬者仍留支用芽茶依當地時價作官吏俸錢支銷其不堪換馬芽茶眀白具奏覆驗燒毁免致堆積累民一各處遇有水旱災傷所司即便從實奏報以憑寛恤毋得欺隱坐視民患一旌善申眀亭所以勸善懲惡有司常加整㸃遇有善惡眀白書之庶以激勵風俗毋徒視為虛文於戱郊禋致誠所以仰答靈貺陽春布徳所以順體乾元迎導至和發育庶品尚資有位咸𢡟乃官推其仁愛之誠輔我太平之治詔告中外咸使聞知洪熙元年正月十五日勅兵部罷朝覲官牧馬今都察院言陜西等按察司官謂今領孳牧馬疋太僕寺都司布政司帶管提督風憲不無受制等事初羣臣所議本欲便民今思其言誠有未惬朕懐蓋國家以禄待仕者使之牧民今以馬責其孳牧非惟有失禮待臣下之體且使㢘者艱於保其操行貪者得以假此擾民况巳有詔寛恤民間牧馬二嵗納一駒豈復於官猶責孳牧縱使各府州縣大小官員一一養馬總納不及數千其於朝廷補益幾何勑至各布政司按察司及府州縣官但有巳領過馬匹者就依洪武中欽給官員馬匹例給與騎坐不問其孳息未領者悉皆停止都察院題本就付爾觀之如勅奉行洪熙元年正月十八日勑諭文武羣臣求言幷復弋謙朝叅朕以眇躬處億兆之上御天下之大幾務之繁殆難獨理是以數詔求言冀匡不逮此朕之實心也自即位以来臣民上章以數百計朕未嘗不欣然聽納言之而當即與施行茍有不當未嘗加譴此皆羣臣所共知者間因大理少卿弋謙所言過於矯激多非實事朕一時不能無概於心而羣臣有迎合朕意者交章奏其賣直沽名欲寘諸法朕特優容令在職視事不得朝叅而自是以来言者蓋少豈以為無事可言歟抑懐自全之計而退為黙黙歟自今冬不雪春亦少雨隂陽愆和必有其咎豈無可言而為人臣者惟念保身亦何以為忠朕之一時不能含容蓋未嘗不自省爾文武羣臣亦各思以君子之道自勉攄其嘉謀嘉猷凢於國家軍民利有未興弊有未革及政令有未當者咸直言之勿以前事為戒而有所諱庶幾君臣相與之義弋謙自眀日以後仍舊朝叅故諭洪熙元年三月初七日戒法司慎刑詔奉天承運皇帝詔曰朕恭承大統為天下生民之主惟我皇祖皇考愛民之仁祗率不怠旦夕思念人命甚重哀矜庶獄惓惓在懐夫刑以禁暴止邪導民於善豈專務誅殺哉故律令之制善善長而惡惡短罰之輕重咸適厥中顧執法之吏不能皆平有虛飾其情傅致死罪而比附謬妄尤甚枉人朕深憫之夫五刑之條莫甚大辟大辟之施身首異處斯己極矣自今有犯死罪律該凌遲者依律科决其餘死罪止於斬絞法司並不許牽合傅㑹昧情失實以致寃濫若朕一時過於嫉惡律外用籍没及凌遲之刑法司再三執奏三奏不允至於五奏五奏不允同三公及大臣執奏必允乃巳永為定制文武諸司自今亦不許恣肆暴酷於法外用鞭背等刑以傷人命尤不許用宫刑絶人嗣續有自宫者以不孝論且人之為非固有父子不相為謀者肆虞舜為君罰弗及嗣文王之世罪人不孥自今惟犯謀反大逆者依律連坐其餘有犯止坐本身毋得一槩處以連坐之法古之盛時恒采民言用資戒警今兇險之徒往往摭拾誣為誹謗法吏刻深鍜鍊成獄刑之失中民則無措今後但有告誹謗者一切勿治爾中外文武羣臣宜端乃志悉乃心畏天愛人務崇寛恕庶有以佐朕父母斯民之治有或違者必罰不貸敷告天下咸使聞知洪熙元年三月十五日减免山東徐淮税糧物料詔奉天承運皇帝詔曰朕承大統主宰天下上惟天命之重下念生民之艱夙夜憂勞惟恐一夫不得其所屢詔求言冀逹民隱而山東諸郡及淮安徐州之境頻嵗旱潦年穀無收民有乏於衣食父母妻子不得相濟凍餒呻吟流於道路郡縣之官漠不留意而又有科買之擾豈稱為民父母之道哉可全免今年夏税其秋糧减半徴收自今年四月以前各衙門一應收買及科𣲖料件除桑穰仍納外其餘未到官者盡行停罷巳到官者從實起解不許欺隱若實無見物而先已虛報在官者亦不許再科於民以足其數虚報之罪俱宥不問其郡縣之官務盡撫輯安養之宜毋縱貪刻以重困之庶幾副朕憫恤黎元之意故兹詔示咸使聞知洪熙元年四月初三日勑諭禮部翰林院纂脩文皇帝實録皇帝勅諭禮部翰林院恭惟皇考太宗文皇帝以元聖大德順天應人君臨萬邦為神武之主者二十有三年駿揚武功則載奠宗社一清寰宇丕顯文教則興脩禮樂崇極治化至仁侔覆載至眀配日月上比隆於列聖下儀範於萬年甫畢山陵永懐繼述仰惟實録未有成書卿等咸逮事先朝職典斯事往集賢俊博稽簡書協恭纂脩務盡精懇用宣昭我皇考盛德大業光華覆被於無窮其以太師英國公張輔少師吏部尚書蹇義少保兼太子少傅户部尚書夏原吉為監脩少傅兵部尚書兼華蓋殿大學士楊士竒少保户部尚書兼武英殿大學士黄淮太子少傅工部尚書兼謹身殿大學士楊榮太子少保禮部尚書兼武英殿大學士金㓜孜太常寺卿兼翰林院學士楊溥為總裁所有合行事宜條列以聞欽哉故諭洪熙元年五月初四日遺詔奉天承運皇帝詔曰朕以菲德嗣承祖宗洪業君臨天下甫近踰年上惟皇考太宗皇帝山陵未逺廹切哀誠下惟海内黔黎彫瘵未復憂勞夙夜時用遘疾奄至大漸夫死生者晝夜常理徃聖同轍奚足悲念惟宗社生民必有君主長子皇太子睿名天禀仁厚孝友英眀先帝夙期其大器臣民咸欽其令望宜即皇帝位以奉神靈之統撫億兆之衆朕既臨御日淺恩澤未浹於民不忍復有重勞山陵制度務從儉約䘮制用日易月中外皆以二十七日釋服無禁嫁娶音樂在外親王藩屛為重不可輙離本國各處總兵鎮守備禦重臣及文武大小官員亦毋擅離職守聞哀之日止於本處朝夕哭臨三日悉免赴闕行禮皇考太宗皇帝服制仍遵去年八月之令嗚呼南北供億之勞軍民俱困四方嚮仰咸屬南京斯亦吾之素心君國子民宜從衆志凡中外文武羣臣咸盡忠秉節佐輔嗣君用永寧我國家生民朕無憾矣詔告中外悉使聞知洪熙元年五月十二日即位詔奉天承運皇帝詔曰洪惟天眷國家茂隆景運肇自太祖髙皇帝聖神文武提一旅之衆建萬世之業太宗文皇帝神功聖德載安宗社𢎞靖萬邦皇考大行皇帝紹承大統奉天子民體祖宗之至仁用輯寧於庶類自臨寳位夙夜勞勤甫及踰年德澤覃霈不幸違豫奄臻大漸顧命神器付予眇躬哀慟方殷罔知攸措親王文武羣臣下至耆老軍民蕃夷朝使萬衆一誠累表勸進辭拒不獲仰惟列聖創守之難俯狥輿情已於六月十二日祗告天地宗廟社稷即皇帝位為政所重以德及人其改眀年為宣德元年大赦天下咸與維新所有合行事宜條示于後一自洪熙元年六月十二日昧爽以前至去年八月十五日以後官吏軍民人等有犯除謀反大逆謀叛子孫謀殺及毆罵祖父母父母妻妾殺夫奴婢殺主謀故殺人蠱毒魘魅毒藥殺人强盗不赦外其餘巳發覺未發覺巳結正未結正罪無大小咸赦除之敢有以赦前事相告言者以其罪罪之一自去年八月十五日以後軍官及旗軍將軍力士校尉舎人餘丁除犯謀叛黨惡不赦外其餘有犯發各處立功贖罪及降黜充軍等項者並送兵部查理復其職役一自去年八月十五日以後文官除犯貪贓及枉害人命巳發落者不宥外其餘有犯發充吏役及承差者悉送吏部量能授官一自去年八月十五日以後見任文職官員有停罷俸禄者詔書到日仍舊關支一言路所以廣視聽達民隱自今朝廷政務或有不便及軍民利病或當興除者許諸人陳言勿有所諱一農桑王政之本衣食之源有司宜身為之勸務求實效勿事虛文一安民之道必在守令得人今軍民中有行已廉正才堪撫字者許見任官具實薦舉朕將親擇而用之不許狥私濫舉一學校賢才之所自出必在師範得人今軍民中有經眀行脩可充教職者許見任官保舉而試用之有司宜常加勸勉其生員之家遵依洪武年間恩例仍優免兩丁差徭俾得盡心務學以臻成效一各衞所及守邊去處務要城堡堅固兵備嚴整如法操練一天下軍士累年勞役衣食不足艱難可矜即今一切不急之務悉皆停罷其管軍官員宜加意撫恤毋令失所並不許假公營私妄有科歛及私役其力違者罪之一有被水旱災傷去處缺食貧民有司即便取勘賑濟毋得坐視民患一官民田地舊佃種人户或全家死亡或丁力消耗以致抛荒有司即與召人耕種官田准民田例起科如果無人耕種者各該納税糧從實取勘開除毋得灑𣲖抛荒重為民患一各處閘辦金銀抄造紙劄坐辦靛青除已閘辦造完見收在官者差人送部外其餘悉皆停罷以甦民力原差官員人等速即回還如有托故稽延者以違制論一逓年海運漂失及征進抛棄軍器等件幷永樂二十一年以前各處拖欠嵗辦皮翎嵗進野味追補胖襖等項悉皆免追其追賠脩理永樂二十一年以前試驗不堪弓箭弦條如巳完者就於所在官司入庫如未完者悉皆停罷一各處孳生馬騾牛羊等畜及北京所屬衛所見養永樂二十年征進所獲牛羊自洪熙元年六月十二日以前倒死者悉免追賠其征進所獲牛羊今後只令軍衛有司自行提督牧養原差去管養官員人等即便回京毋致重擾軍民一忠臣烈士義夫節婦孝子順孫事跡顯著者有司具實奏聞以憑旌表一鰥寡孤獨及篤廢殘疾者有司依例存恤毋令失所及有為事編發為民種田年七十之上孤寡無人養贍者放回原籍依親一軍户有重役者不分三處五處遇有事故如果户内人丁消耗只倂一處勾丁補役其餘悉皆開豁其有丁倒户絶幷同名同姓被人妄報連年勾擾有司從實體勘分理不許狥私作弊害及無辜一見起在京做工人匠有二丁三丁者放回一丁四丁五丁者放囬二丁六丁以上放囬三丁其單丁應役二年之上者放囬休息内有犯罪被刑剜刺巳成殘疾者即與開豁本身差徭全其餘生其有無知小人挟讐妄指平民為匠者今後有司宜嚴加禁止違者罪之一逓年失班及在逃人匠與免本罪即来赴工依舊輪班如有仍前恃頑不即赴工者所在官司拿解前来治之以罪一永樂年間為事發各處擺站及充逓運所水夫有年限巳滿應替當過三年以上未替者即便放免其餘役滿未及三年者法司即於囚人内撥替若逓年在逃及未赴役者俱免本罪即赴原發處所應役照例撥替如有仍前恃頑不即赴役者許所在官司拿解治之以罪一逃軍逃囚逃匠等項詔書到日為始許一月内赴官自首與免本罪軍還原伍民還原籍匠作人等復還本役一軍民官有貪虐害民者許被害之人赴告于上司及按察司廵按監察御史處陳告不許軍民人等擅自綁縳違者罪之一今後一應罪犯悉依大眀律内科斷法司不許深刻妄引榜文及諸條例比擬一凢寛恤恩典及合行政務其有開列未盡者悉遵去年八月十五日以後詔旨施行務惇眀信祗守不渝於戱三聖在天制治保邦大經大法明昭日月垂憲萬年惟篤欽承必誠必信尚賴宗室親王叔祖叔父協心藩屛鞏固國家暨中外文武賢臣同徳匡輔用臻至理𢎞建宗社生民悠乆之福詔告天下咸使聞知洪熙元六月十二日尊昭皇帝諡號詔奉天承運皇帝詔曰朕惟聖神之道不可以名言功德之隆必形諸贊述是以皇有羲農之號帝有堯舜之稱國之典常古今一揆恭惟皇考大行皇帝禀睿聖之資備眀誠之德正位儲宫二十餘年至孝通于神眀令聞孚于逺邇嗣登大寳寅奉鴻圖體天之心𢎞敷惠澤溥昭蘇於萬彚煥宇宙之一新致治興化敦尚文雅慎脩武事四境無虞天下歸仁安於熙皥不幸踰嵗奄届賔天四海兆民如䘮厥考嗟予罔極之慟屬兹繼統之初諒惟敬承之心敢後追崇之典謹命在廷文武羣臣稽古禮文議薦諡號至公之道衆論攸同乃於七月初二日祗告天地宗廟社稷奉冊寳恭上皇考大行皇帝尊諡敬天體道純誠至德𢎞文欽武章聖逹孝昭皇帝廟號仁宗於戱配天惟德尊親惟孝光華宣著於萬年繼述尚存於永世布告中外咸使聞知洪熙元年七月初三日上皇太后尊號冊立皇后詔奉天承運皇帝詔曰仁政之務親親為先禮典所崇尊尊為大朕纘承鴻業君臨兆庶肆用敦于孝理爰肇正於化原恭惟聖母輔翼先朝昭眀内政𢎞六宫之壼範表四海之母儀深仁厚德施及眇躬隆鞠育之恩廣訓廸之道劬勞備至以底成立兹方奉天下之至養則必極天下之尊稱謹上尊號曰皇太后乃若宗廟之祀禮重相成德化之行始於夫婦用稽國典冊妃胡氏為皇后夫國之本在家允屬彛倫之重上以厚率下庶臻至理之隆布告中外咸使聞知洪熙元年七月十五日勑諭吏部申眀薦舉勅諭吏部至理之務必先安民安民之方必擇守令自昔聖帝眀君咸循兹道朕孜孜夙夜以恤民為心而詢諸四方民不得所多縁守令非人即位之初首詔求賢今既數月矣薦者無幾賢才之生何地無之惟賢知賢各以其類寧有不知者乎薦賢為國事君之義其令在京五品以上及監察御史給事中在外布政司按察司正佐官及府州縣正官各舉所知除見任府州縣正佐官及犯贓罪者不許薦舉其餘見任及屈在下僚官員幷軍民中有廉潔公正才堪撫字者悉以名聞務合至公以資實用不許狥私濫舉如所舉之人受贓有犯贓罪者倂舉者連坐蔽賢不舉國有眀憲夫天下生民之安否係於守令之得失爾尚慎重簡畀以副朕惓惓斯民之心欽哉故諭洪熙元年八月初六日勑文武羣臣各脩職事朕惟君國莫大於奉天守成莫重於法祖為臣之道莫切於忠君而愛人朕嗣鴻業惟天惟祖宗付畀夙夜祗敬勵精思理不敢怠寧今肇嵗改元與天下一新爾文武羣臣皆祖宗所簡任以遺朕者其必有以副朕之望攄誠秉義茂乃嘉猷以輔予德殫厥智慮勤力不懈以共乃職爾惟懋哉治民者悉心愛民治軍者悉心愛軍俾咸享樂利用副朕子恵羣生之意爾惟懋哉端乃心慎乃行務忠厚而戒刻薄務正直而戒邪枉毋附下而罔上毋肆已以虐民毋作聰眀亂舊章毋黷貨利壊名節用光汝績保禄位於悠乆爾惟懋哉君臣相與同德協恭康濟宇内用致太平不惟于我國家有賴爾亦有顯聞於無窮弗是之率而倍德慢禮縱欲狥私祖宗賞罰之典具在朕不敢私欽哉毋怠故諭宣德元年正月初三日寛宥交阯詔奉天承運皇帝詔曰朕惟統理之道所重愛民矜恤之仁宜存宥過交阯自入職方今二十載數搆叛逆以勤王師惡死樂生人情無異趨淵赴火豈其本心䆒詢所由皆縁有司撫綏失當漁奪無厭情不上通澤不下䆒致其困苦遂生危疑逃避山林嘯聚為亂推情蓋非得已論罪誠有可矜用霈洪恩悉與湔滌凢交阯官吏軍民人等所犯反逆等罪已發覺未發覺已結證未結證詔書到日罪無大小咸赦除之其黎利藩僚路文律等本皆歸心朝廷曽經任用偶乖一念失誤至此今特開其自新之路誠能悔過從善復守臣節悉宥其罪仍授以官及有被黎利等迫脅從逆幷鄭公証等黨逃避未出者今能挺身来歸或赴所在官司自首一體赦宥官復原職軍復原伍民復原業詔書到日如黎利等及脅從逃避之徒執迷不悛仍前拒命天討必加後悔無及今後交阯軍民人等除合納糧外其該徴及采辦金銀鹽鐡香課魚課等項悉且停止金銀銅鐵鹽及魚皆聽於境内交易官府勿禁用稱朕恤民之意故兹詔諭咸使聞知宣德元年五月初三日皇子生詔奉天承運皇帝詔曰朕以菲德祗膺鴻圖惟祖宗創業之艱難惟今守成之匪易致勤夙夜罔敢怠遑億兆之繁殫心於和輯宗社之重永念於繼承善慶有源祥應兹協陽德初復長子肇生家邦之本攸隆中外之心咸屬宜施霈澤覃被多方今大赦天下所有合行事宜條示于後一自宣德二年十一月十五日昩爽以前官吏軍民人等有犯除謀反大逆謀叛子孫謀殺及毆罵祖父母父母妻妾殺夫奴婢殺主謀故殺人强盗人命不赦外其餘已發覺未發覺已結證未結證罪無大小咸赦除之敢有以赦前事相告言者以其罪罪之一各犯人名下自宣德二年十一月十五日以前見追未完侵盗糧草及一應贓物詔書到日悉皆免追一逃軍逃囚逃匠人等自詔書到日為始限兩箇月以裏赴官首告與免本罪軍還原伍民還原籍匠復本業一各處人户自宣德二年十一月十五日以前在逃者詔書到日為始限三箇月之内赴所在官司首告與免本罪各回復業户下逓年所欠錢糧等項盡行蠲免仍免差役一年有司官吏糧里人等撫恤不許取索錢債為由因而生事擾害違者罪之一軍民中有鰥寡孤獨者所司依例存恤毋令失所一各處税糧鹽糧除宣德二年以前未完者照例徴收其宣德三年税糧以十分為率蠲免三分一自宣德二年十一月十五日以前逓年拖欠諸色課程鹽課茶課各處孳牧虧欠倒死馬騾驢牛羊等畜官軍騎操領養馬騾驢牛羊隻倒死者及逓年拖欠蘆柴納欠銅鐵顔料膠漆竹木等物追賠未完段匹等項盡行蠲免一自洪熙元年六月十二日以後宣德二年十一月十五日以前官軍及旗軍將軍力士校尉舎人餘丁除犯反叛黨惡不宥外其餘有犯發各處立功哨嘹及充軍等項者並送兵部查理復其職役官調衛所一自洪熙元年六月十二日以後宣德二年十一月十五日以前文官有犯發充吏役承差者悉送吏部量才授職但犯贓罪者不在此例一自宣德二年十一月十五日以前見任文武官員總小旗有因事停罷俸糧者詔書到日如舊關支一軍民中有男婦年八十以上者詔書到日所司仍給絹一匹布一匹綿一斤酒一斗肉十斤米一石一文武官有虐害軍民者許被害之人一依大眀律自下而上陳告如有所司不理許赴按察司廵按御史處告理如有寃抑方許指實赴京伸訴不許擅自綁縳違者罪之於戯承序以長用昭萬世之傳推徳及人𢎞敷四海之福故兹詔諭咸使聞知宣徳二年十一月十五日恤旱災詔奉天承運皇帝詔曰朕以菲德恭嗣天位統御兆民夙夜惓惓圖惟安利今畿内及河南山東山西並奏自春及夏雨澤不降人民饑窘朕甚惻焉夫上天降災厥有攸自其政事之有闕與刑罰之失中與徴歛之頻繁與撫字之不得人與永念其咎内疚于心思惟感通之道必廣寛恤之仁庶天鑒之旋災為福所有合行事宜逐一條列故兹詔示咸使聞知一南北直𨽻府州縣幷河南山東山西三布政司凢災傷去處人户自宣德七年十二月以前拖欠夏秋税糧户口鹽糧及官軍屯種子粒悉皆停徴其拖欠各色課程鹽糧幷各衙門見坐𣲖買辦採辦諸色物料等項及虧欠孳牧馬驢牛羊牲口悉皆蠲免仍免其今年夏税軍民乏食者所在官司驗口給糧賑濟如官無見糧勸率有糧大户借貸接濟待豐熟抵斗酬還一被災之家優免一應差役一年官吏里老用心撫恤毋令失所一户部禮部工部等衙門逓年坐𣲖各處買辦採辦諸色物料顔料藥味香料金銀箔油漆等項及茶蠟桑穰糖蜜牲口乾魚一應厨料幷造辦菓品等項但係宣德六年十二月以前拖欠未完者悉皆蠲免一各處追納加倍商税課鈔除納完外但係宣德五年十二月以前拖欠者悉皆蠲免宣德六年至宣德七年終拖欠者减半一各處都司衛所幷各太僕寺苑馬寺該追倒死虧欠騎操孳牧馬騾牛羊驢疋但係宣德七年十二月以前者悉皆蠲免一後軍都督府及工部坐𣲖軍衛有司採運柴炭蘆蓆但係宣德六年十二月以前拖欠未完者悉皆蠲免一户部逓年坐𣲖軍衛有司採打秋青草束但係宣德六年十二月以前拖欠幷照例折鈔者悉皆蠲免一工部坐𣲖各處採運木植其見在山塲堆垜者令所在官司如法苫蓋毋致損壊見在水次者陸續起運前来一法司及各處見追犯人金銀段匹米鈔草束竹木等項除正贓不宥外其賠罰及追者俱减一半徴納草束浥爛及失火延燒者悉皆蠲免一各處抄造及買辦一應紙劄但係宣德四年十二月以前悉皆停徴一各處逓年拖欠税糧但係宣德六年十二月以前拖欠未完者悉皆蠲免一宣德六年十二月以前各處拖欠課程鹽課者悉皆蠲免一在京在外都指揮指揮千百户鎮撫旗軍有住支俸糧者詔書到日悉皆如舊關支一直𨽻令廵按監察御史在外令按察司審察軍民衙門刑獄有寃抑者即與伸理不許因而縱放有罪其見監罪囚除謀叛謀殺祖父母父母妻妾殺夫奴婢殺主人命蠱毒魘魅毒藥殺人强盗殺人及偷盗官糧外其餘罪犯並與寛免一等科斷一逃軍逃匠詔書到日限兩箇月内許令赴所在官司首告與免本罪軍還原伍匠仍當匠一失班人匠俱免罰工令其仍舊輪班後不為例一各布政司按察司府州縣等衙門官各要連名舉保賢良方正一人起送吏部量才擢用一諸司官吏有貪酷害人及闒茸者直𨽻令巡按監察御史在外令按察司審察奏来以憑罷黜其按察司官貪酷害人及闒茸者從廵按御史審察奏聞一中外比年冗官過甚虚費廪禄無所禆益在内令吏部都察院在外令布政司按察司廵按御史及府州正官公同於添設官員數内斟酌其職務繁簡量留在任餘悉送回吏部不許托故在任仍前冗濫一各處近設撫民官本為安民自其赴任並無上言民情利病者且聞於民無益有損詔書至日悉令回還吏部如其中有清廉幹濟舊官所不及者許其親臨上司保留在任起送舊官回吏部仍具奏聞一朝廷差去内外官員人等務要體朕愛民之心謹守禮法不許在外生事需索百端擾害軍民今後敢有違者從廵按御史按察司具實奏聞處以重罪坐視不言者罪同宣德八年四月十五日即位詔奉天承運皇帝詔曰我國家膺天眀命統理華夷奄甸萬姓于兹七十餘年仰惟祖宗肇造之功守成之道䂓模𢎞逺光昭萬世惟我皇考皇帝以至仁大德統承之率循憲章恢𢎞政化方期家國永底雍熙不幸奄兹遐棄肆予眇躬祗奉遺命於宣德十年正月初十日即皇帝位付畀攸重兢惕惟深允惟神天之典惟敬斯承生民之衆惟仁斯保阜成之績惟勤惟儉乃克有成顧予凉薄勉懐永圖尚賴親王宗室益脩藩屛中外文武羣臣宣力効忱以副委任以惠我蒼生用臻富庶躋于泰和其以眀年為正統元年與天下更新一應寛恤事宜條示于後一自宣德十年正月初十日昧爽以前官吏軍民人等有犯除謀反大逆子孫謀殺祖父母父母妻妾殺夫奴婢殺主謀故殺人蠱毒魘魅毒藥殺人强盗人命不赦外其餘已發覺未發覺已結正未結正罪無大小咸赦除之敢有以赦前事相告言者以其罪罪之一自洪熙元年六月十二日以後官軍幷旗軍將軍力士校尉舎人餘丁人等除犯反叛黨惡土豪人命不宥外其餘有犯發遣各處充軍立功及哨瞭等項者盡行宥免復還職役一署都督僉事事都指揮署都指揮僉事事指揮悉與實授凢在京優給故官兒男仍於本衛所關支俸給一文武官吏旗校軍民匠作人等有為事問完見做工運磚運糧等項及鎻鐐工匠不關糧賞常川做工者悉宥其罪官吏復還職役犯枉法贓罪者罷歸為民軍還原伍匠仍當匠民放寧家一文武官員幷總小旗有為事已復職役住支俸糧及支半俸者俱照舊關支一自宣德十年正月初十日以前逓年虧欠農桑諸色課程户口鹽糧鹽鈔及嵗造拖欠幷追賠段匹紗羅紬絹等項倒死馬駝驢騾牛羊虧欠孳牧等畜及未納各項贓罰冐支官鈔偷盗官糧及中鹽罰納鈔貫追賠未完段匹等件盡行蠲免一内府各監局逓年𣲖辦物料工部等衙門脩造軍器樂器船隻等件幷一應採辦買辦生漆銀硃皮張竹木柴炭等項逓年拖欠屯田子粒及魚油翎毛青碌銅鐵顔料桑穰席麻竹木蘆柴嵗進野味及買辦追賠胖襖袴鞋試驗不中弓箭及弦幷漕運漂失糧米軍器等件悉皆蠲免如已辦在官者野味解京其餘就於所在官司倉庫收貯一天下一應課程及門攤等項俱照洪武年間舊額徴收不許指以鈔法為由妄自增添違者罪之其有湖泊坍塌淤塞等項及人户消耗虧欠課程者從實查勘即與開豁一各處諸色課程舊折收金銀者今後俱照例收鈔一各處買辦諸色紵絲紗羅段匹及一應物件幷織造段匹抄造紙劄鑄造銅錢燒造窑器煽煉銅鐵採辦梨木板及各處燒造器皿買辦物料顔料等件悉皆停罷其差去内外官員人等即便回京違者罪之一各處閘辦金銀硃砂銅鐵等課悉皆停罷將坑冶封閉其已辦完見收在官者金銀硃砂就令差去人員管領来京銅鐵於所在官司寄庫差去閘辦内外官員人等即便回京不許托故稽留若係洪武年間舊額嵗辦課銀及差發金銀不在此例一各處造作除軍需外其餘盡皆停罷今後非奉朝廷眀文一毫不許擅自科擾軍民違者罪之一各處打鷹及打捕鳥獸採取蟲魚花草果木山石之類詔書到日悉皆停罷差去内外官員人等即便回京所占用官軍各回原衛所管事着役民囬原籍當差不得稽留違者罪之一各處孳牧馬騾驢牛羊等畜及北京河間保定等處軍民見養征進所獲牛羊詔書到日即令軍衛有司提督牧養原差去管養内外官員人等即便回京毋得托故在彼生事重擾軍民一惜薪司光禄寺等衙門原差𣲖柴炭蘆葦荆條等項自宣德八年十二月以前拖欠未完者悉皆蠲免宣德九年正月以後悉减半送納内官等監局坐𣲖土茜草暖樺皮及樺木等件悉皆停罷一各處宣德九年被水旱去處取勘的實將税糧及屯種子粒盡行蠲免缺食貧民有司量給米糧賑濟一民間因有事故人户抛荒田土即從實取勘開報除豁税糧另行召人承佃如係官田即照民田例起科一各處抄没官房及沒官牛隻年逺倒塌及倒死者所納房鈔及牛租取勘眀白即與除豁一各都司衛所下屯軍士正糧子粒一十二石給軍食用不必盤量止徴餘糧六石附近軍衛有司官倉交納一各處逃移人户悉宥其罪許所在官司首告回還原籍復業免其差徭一年其本户虧欠税糧等項盡行蠲免一逃軍逃囚逃匠人等詔書到日為始許兩箇月内赴官自首與免本罪軍還原伍民還原籍匠復本業其人匠有因在逃問發充軍當匠者一户止存一名當匠其餘放免一各處原編輪班人匠内有一年一班者今後江北人匠照舊輪班江南人匠俱以二年輪一班其各監局在逃諸色人匠為無正身有勾户丁二三名當匠者止令一丁當匠其餘放免但是該發充軍行提未到者悉皆宥之一在京做工軍夫照例更替候營造山陵畢日悉皆放回一見起在京做工人匠除選帶家小幷把總髙手與應用營造山陵人匠及該輪班上工者存留外其餘盡數放遣仍照舊輪班不許指以朋合編班為由一槩拘留若髙手人匠及各色人匠果有年髙者亦即令放遣其見在做工失班罰工者免其罰工止當正班滿日放回違者罪之一自宣德九年以前各處凢承勑旨及勘合起取軍民人匠悉皆停止如已行在途亦令回去軍還原衛所民還原籍一軍官為事去年冬曾隨大駕出關巡邊例應調者免調悉令放回原衛所一各都司衛所自洪武年間至今差去勾軍不回官旗人等限兩箇月以裏赴所在官司首告悉免本罪令各回原衛所管事着役一逓年有犯罪發去擺站及充逓運所夫膳夫軍伴等項役滿者即便放回違者罪之一差出買辦造辦採辦内外官員人等有在各處私占官民田地及起蓋房屋隱占軍民諸色人等作打捕户養户名色使用者詔書到日官民田地各復其舊房屋入官隱占之人俱復本役違者治以重罪一宣德十年正月初十日以後官吏人等犯罪充軍者止終本身一農桑學校有司宜加勸勉務求實效勿事虚文一軍民有鰥寡孤獨者所司依例存恤毋令失所民年七十以上及篤廢殘疾者許令一丁侍養不能自存者官為賑濟凢軍民八十以上者所司給與絹二匹綿二斤酒一斗肉十斤時加存問其有為事編發為民種田年七十之上孤寡無人養贍者放回原籍一各處有孝子順孫義夫節婦開具實跡奏聞以憑旌表一官員軍民之中有懐材抱德或屈於下僚或隱於山林所司以禮薦舉赴京量才擢用一凢軍民利病許諸人直言無隱一各處軍民有為追賠孳畜税糧等項被官司逼迫不得已将男女妻妾典賣與人者詔書到日官司即為贖還如男女已成婚配者不在此例一法司問擬罪囚今後一依大眀律科斷不許深文違者罪之一各處軍民匠役人等有因饑窘及受官司逼迫不得已逃竄山林或嘯聚為非者詔書到日悉宥其罪令各復業着役免其差役二年所司善加優恤不許生事擾害違者罪之一各處邊将及軍衛頭目務要撫恤軍士嚴飭武備謹守地方其有功及怠事者具申朝廷以憑賞罰一有司官吏務要公勤廉慎愛恤百姓不許阿附勢要輙有科擾親臨考察官員務求實跡以辨賢否如有狥私枉法顛倒是非者必治以罪嗚呼自古生民獲福咸由君臣同心同徳圖厥成功亦罔不在初尚協嘉猷以隆邦本詔告天下咸使聞知宣徳十年正月初十日上兩宫尊號封諸王詔奉天承運皇帝詔曰朕以眇躬嗣登大寳稽古帝王致理之要亦惟尊尊親親表正大倫封建宗藩鞏固王室厥有彛典萬世攸同仰惟聖祖母皇太后大德格天錫之全福以濟我國家保佑朕躬聖母皇后協相先朝用植邦本徽音嗣著大典攸崇謹上冊寳尊聖祖母皇太后為太皇太后聖母皇后為皇太后復念本支實資藩屛今冊封弟為郕王平陽王嗣封晉王保寧王嗣封蜀王其餘郡王應封襲者次第頒封於戱崇孝敬以隆天叙之尊敦宗室以重維城之寄爰推仁澤咸及庶邦所有合行事宜條示于後詔告中外悉使聞知一各處宣德七年十二月以前拖欠税糧及一應錢糧草束除起運實數幷見送在官者就於所在及起運所至倉分收納其未徴及未納者悉皆蠲免一各都司衛所官軍今後除哨嘹備禦及屯種操練幷有勑旨及眀文差調外其餘一軍不許私役一毫不許擅科若有指以差調脩理為由私役種田及採打木石燒造甎瓦等項擅自科差者令廵按御史及所在按察司官廵察具實奏聞悉治以罪一公侯伯亡殁其子孫例應襲爵者吏部兵部取勘奏聞即與承襲不許稽延一各處總兵鎮守備禦都督都指揮及都司掌印都指揮自宣德元年以来不曾陞用者各具實跡以聞量才擢用一凢軍職子孫弟姪除應襲外其餘果有精於兵畧武藝者許所在官司舉送兵部試驗擢用一自洪熙元年至宣德十年正月初十日止軍職有為事發做為事官及降除幷降充總小旗者悉復原職其犯反叛者不在此例一文職官員年未及七十老疾不能任事者皆令冠帶致仕免其雜泛差役一各處衛所軍士事故該勾補者若丁盡户絶幷山後等處人民挨無名籍等項已經三次保勘無憑勾解者軍衛有司即與開豁不許假此為由故意展轉擾害良善違者罪之一比先有為事文武官吏軍民旗校人等發交阯充軍在逃及散漫不曾首告着役者許赴所在官司首告就於附近衛所收操一各處有缺食軍民人等不得已相聚為盗强奪人財物及揑造妖言誘惑平人騙要財物者詔書至日悉宥其罪軍還原伍民還原籍今後若不改悔仍復聚集為非俱照原犯罪之其已拿解在官者不在赦例一大同見養羊隻該部取勘見數交付所在官司暫且收養仍開報光禄寺陸續取用原管牧放内外官員軍民人等各回原職役一水旱災傷之處並聽府州縣及廵撫官從實奏聞朝廷遣官覆勘處置並不許巧立名色以折糧為由擅自科歛小民金銀段匹等物那移作弊侵欺入已違者罪之一各處山塲園林湖池坑冶及花果樹木等件原係民業曾經官府採取見有人㸔守及禁約者自今聽民採取不許禁約其㸔守内外官員軍民人等各回原職役一北京及山西宣府所屬地方産木山塲除山陵禁約外其餘去處聽人採取仍依舊例抽分不許妄自增添違者罪之一各處總兵鎮守官等處自宣德十年正月初十日以前有勑旨採取及造辦買辦一應進用物件悉皆停罷一今後鷹犬及珍禽異獸等物不許進獻一自今各處總兵鎮守備禦等官並不許指以進奉為名擅自打圍飛放蹂踐禾稼擾害軍民違者罪之一民匠比先為因在逃編發武功三衛充當軍匠者待營造山陵畢日仍充民匠就於在京居住依例輪班一各處平民有被人挾讐妄報為匠及醫士厨役等項名色幷妄指同名同姓為軍者雖見有該部文書坐取有司即與審勘開豁不許一槩朦朧妄報違者罪之一府州縣官有廉謹公正能恤民者親臨上司宜以禮待仍具其政績来聞以憑陞擢一凢詔書内寛恤恩典及合行政務有司當一一遵行不可作疑生事刁蹬失信於下違者必罪不宥宣德十年二月初十日太皇太后諭二兄書太皇太后致書長兄彭城伯張㫤三兄都督張昇吾起於寒㣲叨䝉國恩榮及祖宗顯受褒寵諸兄嗣膺重爵厚禄合門富貴與功臣等此皆列聖天地之賜也顧豈常有汗馬之勞哉夫受非分之福宜存非分之虞古之人有言知足不辱知止不殆可不思保全永逺之道哉吾不幸仁宗皇帝早逝長子宣宗皇帝又繼逝矣今長孫皇帝以㓜冲嗣大寳内間保持輔翼實係於吾夙夜兢兢如執玉如捧盈不遑寧處懼弗堪負荷上負宗廟聖靈及辱我先人因念外家欲令皆善二兄同氣至親可不體吾之此心哉尚其循禮度脩恭儉以率子孫家人俾咸慎蹈毋作愆過庶以光國家之榮命而吾先人之祀亦永有依賴矣勉之哉勉之哉二兄自今惟朝朔望公朝有攻議悉勿預聞惟二兄其亮之宣德十年二月十五日勑諭吏部都察院因災考察官員朕自嗣位以来夙夜惓惓上體皇天仁民之德廣施寛恤之政而今萬物長育之時天乆不雨又間有水潦蝗蝻深軫朕心䆒厥所由咸謂牧守之官未盡得人貪虐暴刻所在有之及命官考察又或狥私㨗於科徴巧於諂事者率以為熊勤於撫守廉介自守者以為不稱公道不眀人怨弗恤所為如此何望和氣之應爾典銓選之官任風紀之職獨不思為國家生民慮乎今直𨽻府州縣官從吏部遣官及廵按御史考察務在廣詢細民不許徧狥糧里長老人扶同之言以昩至公若考察得實賢才者悉留在職具名奏聞不才者就起送吏部照例發遣其布政司按察司堂上官從吏部都察院考察屬官從廵按御史按察司考察今後方面及郡守有闕仍遵皇考宣宗皇帝勑㫖舉保不許故違有犯贓罪倂坐舉者爾等其欽承之用副朕恤民求治之意故諭宣德十年四月二十六日勅諭行在吏部選舉御史縣令勅諭行在吏部風憲者朝廷耳目之所寄綱紀之所由振也在外按察司缺官已有推舉之令在内監察御史尚多缺人今後令在京三品以上官各舉一員除見任縣令不舉外其餘爾吏部精加體訪必得廉潔公正眀達事體詳慎平恕具名奏授如授官之後但犯貪淫暴刻及庸懦闒茸併罪舉者凢親民之官縣令最切必得其人庶民乃安自今各處知縣有缺令在京各衙門四品官及國子監翰林院堂上官各部郎中員外郎六科掌科給事中各道掌道御史各舉一員爾吏部亦精加體訪必得廉潔公平寛厚愛民者具奏除授如授官之後但犯貪淫暴刻及罷軟不勝任併罪舉者蓋薦舉雖命庶官而選任專委吏部必公必明必審必慎毋茍徇私情縱容濫舉以取罪愆庶幾副朕求賢圖治之心欽哉故諭正統元年十一月二十六日勅諭文武羣臣脩政事守祖法朕祗承天命統御天下亦惟文武羣臣相與協恭用臻至理夫所治天民所相天工其大經大法皆祖宗建置永篤欽承罔敢踰越惟爾羣臣執德以廉為要㢘者發之公而政得其平治人以仁為本仁者施之厚而下得其所忠以奉國敬以勤事古之良臣率由斯道其朂之哉爾克由斯道尚慎乃終有或違者務改厥行庶熙汝績用永嘉譽其朂之哉爾不恭命而熊者或惰違者益肆眀有國法幽有鬼神可不戒歟欽哉毋怠故諭正統二年正月初四日勅諭公侯伯五府六部都察院等衙門正官因災脩政朕恭嗣大統夙夜祗勤惟天惟祖宗付托之重不敢怠逸比年以来停罷一切徴歛除逋負薄刑罰所冀四方咸遂生息今嵗以来災沴數見京畿尤甚自三月至五月亢陽不雨甚傷農麥五月中至六月連雨不止河决隄防渰没田稼城中傾塌官民廬舎亦有壓溺死者深用兢惕洪範咎徴皆由人事蓋朕不德之所致也其聽納之弗審歟讒佞之弗識歟政事之臣有頗僻歟輔弼之臣失其職歟何災異特甚乎近也循省厥由用圖善政爾等皆與國同體豈當黙黙坐視而弗思弗勉乎自今其體朕心以敬天愛人為心毋懈夙夜夫持㢘戒貪者善身之本致公絶私者善政之要勿謂可欺神鑒孔昭勿謂無害天應可畏欽哉朂哉往務善政庶幾以回天意以固宗社生民之福爾亦尚有利哉所有合行事宜條示于後該載未盡者悉具奏聞故諭一吏部擢用官員宜精選賢才者任之或罷輭無能或老疾不堪平昔行止不端謹者悉皆罷去承差知印吏典人等亦宜精詳考察賢否但是貪汚及庸懦無能并不諳行移者悉皆罷去不許循私濫用糜廩費禄一各衙門文職官員洪武年間量事繁簡設官理辦俱有定額永樂年間為因營建北京事務繁多所以額外增注自朕即位以来一切不急之務悉皆停之而冗官或以微事占身坐食俸禄况北京運糧艱難亦宜撙節自今悉照洪武年間諸司職掌官額選其㢘能者存留其餘悉送吏部改除如無缺員照依永樂年間事例放回寧家有缺員挨次取用一朝廷簡任賢良共造民福方面官及府州縣正官已令大臣及五品以上官保舉從吏部審察然後用之保舉者必須考其實行審察者必須處以至公敢有狥人投托以公廢私以不肖為賢舉主及吏部官皆治以罪自今在京在外官員未及兩考者不許舉保違者罪之一凢實徴一應錢糧雖有定額然各處水旱災傷不一當體念民情差人踏㸔眀白具奏開豁不許固執及畏干係展轉行移因循不决貽患於民一正統二年十二月終以前拖欠一應錢糧等物已有詔書悉皆蠲免今聞各處官司指以起解報數在官為由一槩追徴甚至有以宣德年間拖欠者亦行追䆒致使小民窮窘逃移失所户部即為申眀不許重徴如有糧里實於小民徴過未起運者即令如數給還違者罪之一永樂年間因鈔法不通令民照口數納鈔支與官鹽近年鈔法通行民納鹽鈔如舊鹽課司十年五年無鹽支給民人納鈔艱難宜减半收鈔以甦民力及宣德年間亦因鈔法令收闒房及車輛鈔貫今鈔法已通悉减半徵收一各衙門買辦造辦及追徵一應物件應優免而未優免深為民害者一一追䆒具奏定奪一各處有解納紵絲布絹顔料等項者隨即辨驗收納不許刁蹬留難仍查逓年追納物件未完及係急用者一一條奏定奪一各處管軍頭目㢘幹者少貪虐者多以致軍政不脩徃徃軍受其害逃竄數多是致城堡乏人守備其見在管軍頭目務令廵按御史及所在按察司官遴選堪任者用之其餘不堪用者令其就於本衛守城帶操以聽調用勿令管事庶幾軍不逃亡城守有備一軍職官員洪武年間各衛所皆有定員今為軍職官多額外添注如沿海沿邊少糧衛分百姓運糧艱難今後多餘軍職止許於有糧去處添注庶幾供給利便無糧去處不許添注一在外衛所操練軍士頭目多不用心並無實效都察院其行各處廵按御史按察司官嚴加操練務要征調得用若仍前怠慢無實效者并風憲官一體論罪各處城池頽塌者亦督令於農閒時月軍民相兼脩築不許違悞一管軍頭目及在外各衛指揮千百户多不用心撫恤軍士或尅减月糧或占據私役或縱容在外辦納月錢或横加虐害騙要財物以致軍士逃竄隊伍空缺甚非朝廷撫養軍士之意今後再不悛改聽監察御史給事中體訪的實具奏拿問一三法司錦衣衛見監重囚中間或有鍜鍊成獄或以文案為據而其情有可矜法有可疑者具奏定奪今後問囚犯人及在外問成解来犯人伸訴寃枉或調送别衙門或多官㑹審須要從公推問實情不許狥私拷打逼勒招認符合前問官吏自已推托利害以致寃枉人違者必罪不赦一今後一切祥瑞有應稱賀者止行在京衙門不必行移各王府在外文武官及土官衙門即今見有來進禎祥表文者禮部即行文沿途止之庶免勞人一做工人匠務要撫恤得人𣲖役公當勿令失所一各衙門一應公文當依程限完結凢解軍解囚一應差使人員到来所司即為查理眀白發遣回還不許遷延刁蹬今後敢有仍前作弊刁蹬留難者御史給事中體訪具奏其司務幷首領官吏並治以罪不恕一五軍都督府堂上官多不用心整理軍政亦不行用心打㸃文書一應行移縱容首領官吏通同作弊遇有襲職替職及公幹等項人員到来刁蹬留難百般需索以致人難自今不改前非聽監察御史廵察具奏拿問一都察院為朝廷耳目風紀之司必能考察百僚扶植善良糾正奸邪伸理寃枉然後為稱若不能持正秉公而任情恣意阿附以致賢否混淆貪㢘不辨寃枉不伸者祖宗之法具在朕不爾私一朝廷置給事中出納命令封駁章奏舉正欺弊職任最清要自今宜體朝廷選用之心必公必正必㢘必勤知無不言言則必當務存大體以扶善抑惡使百官有司知所敬畏然後必能盡職而依阿從事茍且度日廢棄職掌或狥私交通肆為欺弊負國家之任使者事發必罪不宥一在京在外官員皆受國家職任凢公正廉勤者陞遷貪虐怠慢者黜罷朝廷自有公論自今各宜勉力以仁義存心以公勤從事若不能自勉專務背公營私阿附投托賄賂交通朋比為非者國典具在悔将難追一凢軍民一切利病及今可以濟時恤患除奸革弊之事諸人直言無隱正統四年六月二十二日兖國復聖公新廟之碑朕惟聖賢之生皆天以為世道生民計非偶然也雖天處之有不同而聖賢求所以仰副天之意者則一心也孔子之道原於天而承於堯舜禹湯文武周公孔子不得位則惓惓於推眀斯道立教垂世以副天之意蓋周公而後必有孔子而後帝王之道眀君臣父子之位正尊卑内外貴賤之辨著雖斯理在人心皆固有之然非得孔子之教則不能以皆眀眀之有淺深世道所以有盛衰之不齊也向微孔子之教斯世斯人幾何其不淪於夷狄禽獸此孔子之道所以為天下國家者不可以一日無也三千之徒孔子獨稱顔子好學獨告以帝王為治之大法使孔子居堯舜之位則顔子稷契之倫也聖賢之不得位與年皆天也而使之得以為天地立心為生民立命為萬世開太平有以仰副天之意亦天也君子曰聖人之藴㣲顔子殆不可見發聖人之藴教萬世無窮者顔子也嗟乎孔子其太和元氣顔子其四時之春乎非春其何以見太和之發育也曲阜故有孔顔廟祀我皇曾祖太宗文皇帝既新孔廟而親製文書石朕嗣統之七年爰新顔廟有司請文書石并系以詩曰巍巍宣聖道配乾坤化流天下光闡人文􅌖矣兖國剛眀純粹蕩蕩聖域深造精詣爰勤四勿以復天理以居廣居進進無止大經大本一出于天惟聖誠眀顔得其全禮樂之授王佐之期鳯鳥不至聖賢側㣲作範立教永淑来世報德暨功代謹秩祀東瞻魯邦生之所都神靈在天亦時来居既作新廟爰祗祀事弼佑皇眀千萬億嵗正統六年十一月初四日觀天之器銘粤自大聖體天施政敬天以心觀天以器厥器伊何璇璣玉衡璣象天體衡審天行歷世更代垂四千䙫沿襲有作其制寝備即器而觀六合外儀陽經隂緯方位可稽中儀三辰黄赤二道日月暨星運行可考内儀四遊横簫中貫南北東西低昂旋轉簡儀之作爰代璣衡制約用密疏朗而精外有渾儀反而觀諸上䂓下矩度數方隅别有直表其崇八尺分至氣序考景咸得懸象在天器具厥體測驗推歩術含至理昔作今述為制彌𢎞既眀且悉用将無窮惟君勤民事天首務民不失寧天其予顧政純于仁天道以正勒銘斯器以勵予敬新建廟學之碑皇天仁愛下民必簡命聖人君之師之聖人得位則兼君師之事如伏羲神農黄帝堯舜禹湯文武是已不得乎位則專師之事以立教垂範孔子是已兼君師者道施於當時專師事者教被於後世然非得孔子立教則雖前有伏羲神農黄帝堯舜禹湯文武世莫之知矣故曰自生民以来未有盛於孔子孔子之功萬世之功也孔子所為教其道仁義道德其事父子君臣尊卑内外其器易詩書春秋禮樂皆本於天也凡為天下國家者誠能純用孔子之道則天地以位萬物以育彼其名為用孔子之道而效不至焉者信用之弗篤加有異術邪説間之也我國家自太祖髙皇帝太宗文皇帝暨我皇祖皇考聖聖相承恭天成命顓顓焉一惟孔子之道是尊於凢施政敷教取人理民一惟孔子之道是用不雜他術自國都至於四方郡邑海隅邊徼靡不建學設教崇祀先師海外蕃國及蠻夷酋長皆仰慕德化遣子入學蓋歷世以来尊上孔子未有如我祖宗之世之盛者也朕以凉德祗承天序欽惟古昔之大典祖宗垂統之盛心夙夜孜孜圖惟善繼北京故有學在宫城之艮隅庳隘弗稱乃正統八年秋命有司撤而新之左廟右學高廣靚深所以奉眀靈居来學凢百所需靡不悉備材出素具役不及民眀年春成朕躬釋奠于先師循古典也退即學之彛倫堂命儒臣講經公卿大夫及百執事之臣逢掖之士兵衛之師拱侍而聽殆以萬計而有司請如故事紀其成於碑嗟夫孔子之道為天下國家者不可一日以闕學校之教於化民育材者不可一日以怠矧京師首善之地所係之重且大乎敬書諸貞石昭示我後人俾咸務欽承用丕顯皇眀治化之盛與天地日月相為悠乆云正統九年三月初一日東里别集巻一
