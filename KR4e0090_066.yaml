body:
  text: 東里續集巻三十八明楊士竒撰墓誌銘禮部左侍郎李公墓誌銘宣徳七年十月十五日禮部左侍郎致仕李公卒於家訃聞上遣官賜祭師傅六卿而下皆徃弔祭卜明年某月某日葬某縣某鄉某原其孤栗以治命奉翰林侍讀苗君衷所述事狀来拜請銘禮部尚書毗陵胡公申為之言予與李公同事三聖凡三十年乃按狀序而銘之李之先居平陽之臨汾大父諱仲智父諱師魯元季隨兄希賢宦㳺燕都遂占籍宛平縣而公生焉公諱嘉字允堅天資凝重不妄言笑自幼卓卓有立志事親孝稍長縣大夫選邑學弟子員前大學士董公倫時為學教諭公從受業旦暮自䇿勵所授書率誦讀數百過四書注釋雖老不忘已而念家貧親老丐罷歸侍養為師者初惜其去遂獻詩達意其辭懇切師憫而從之後選奉祠所禮生事太宗文皇帝於藩邸敬恭祀事恒致其誠無幾丁父憂哀毁動人終喪不飲酒食肉覽父手澤未甞不流涕而養母愛敬兼盡初世父希賢死於兵無子倉猝藁塟公念及輒悲竟卜吉壤備禮而塟焉文皇帝起北平預效守城勞時南兵逼城城外民有負母入城無所依者公避舎以處之且食之粟民母子得全於急義率類此内難平録守城功召至南京有司奏授鴻臚寺序班數月上親擢為通政司㕘議且面諭之曰以爾誠實故擢寘要地必勤必慎母忝朕命公益盡心乃職一日奏事畢自陳臣有老母在鄉里無他兄弟侍側願躬迎母就禄養從之既至時初建北京奉命董運木之役於河南殫其智慮夙夜不懈後喪母哀毁如喪父詔賜棺及驛舟歸其喪服闋仍前職遂扈從北狩自是巡狩皆預扈從後坐累左遷鴻臚寺丞仁廟御極陞左通政遂陞通政使又坐累左遷未行上嗣大統復通政使改北京行部侍郎念其老不堪繁務又改禮部侍郎公雖精力日衰猶勉强事事未甞少間再嵗以疾聞特賜勑褒諭命致仕又數日不起享年七十公持身端謹一芥不茍取予剛方嚴毅人不得干以私其任職細務必親故所歴寡合終不為變治家整肅教子孫必務學而閒暇道說國初以来北京名賢故老流風餘韻娓娓不窮聴者忘倦盖自是能知而言者亦鮮矣其歴任散官自將仕佐郎積至通議大夫以公貴再追封二代大父父皆金通議大夫禮部左侍郎大母吳母榮皆淑人追封故妻蔡封繼室趙皆淑人子男四栗直剛簡女二孫男四震謙泰巽銘曰嗚呼李公有孝有守遭逢龍興陟帝左右剛毅之資自信弗疑顓顓以持莫之或移納言之司宗伯之貳歴年三十始終一致白髪蒼顔鞠躬竭誠三聖在上天鑒孔明奎章龍文奉勑歸第象笏朱衣里閭迓拜從容優㳺以夀考終綸音及門寵光隆隆嗚呼李公生死榮哀勒銘其藏永示後来翰林庶吉士湯如川墓誌銘永樂四年三月庚戌翰林庶吉士湯流如川歿于京師其友曽與賢為治喪歛已楊士竒將述其平生為墓中之銘以授其弟如塤使歸葬焉屬隣舎夜災延燬如川舎及棺如塤拾其遺骨而歸嗚呼如川何以得此哉其平生所為宜夀宜備諸福乃四十以卒而又遭遇身後之災造物者於如川何如也世之不為如川者或至於期頤即不至亦不見其身後如此者造物者之意何如哉如川世家泰和之甘溪曽祖某祖某父均義母李氏如川温雅易直事父母及撫諸弟皆能恱其意處朋友必引之於道臨事務當大體永樂癸未以詩經領鄉薦明年登第賜進士出身闕聞其材行請於闕為給事中會闕新儒術將有闕風勵天下乃擇進士英敏者得二十八人盡出衆秘書俾進學於文淵閣期之於古人如川在焉如川懼無以稱上意蚤夜勉勉不息而學益進明年季弟如箎来省得疾卒如川哭之數日亦得疾以卒朝之士君子聞其卒皆相與悼歎以為不可復得嗚呼如川者真不可復得哉其仁厚可以長民明公可以持法執守可以勵俗通練可以集事可謂才徳兼有者矣將用某月日葬某山某原時二親皆垂白無恙而連哭二子此宜何如其情也娶某氏子男三某某某女二余生先如川一年交之最厚而最深也来京師相聚甫在嵗方資之為輔豈謂一旦遽失吾益友哉乃忍哀而銘之銘曰為器之咸宜而動也時弗達于施而止於斯而止於斯又孰為之災孰之攸司曷其測知我銘于兹以紓我思以慰其父母之悲陳孟京墓誌銘孟京諱昌姓陳氏以字行登永樂四年進士第授翰林庶吉士七年五月二十三日卒於官陳故泰和簮纓家五代有諱暉者始由金陵来徙至孟京凡若干世自宋建炎中有諱千齡者始登進士第至孟京凡十有四人其他選鄉貢舉明經才行不可勝數載郡縣志與其家乘甚悉孟京少孤貧苦嗜學旦暮自任負以養其祖與其母手一巻未甞釋也遇明儒碩師輒挾所業徃請益弱冠稍出教授愈自刻勵口誦手録窮晝夜不廢一時朋儕强記多識者不能及也永樂元年中江西鄉試四年會試禮部中前列廷試在第二甲初族兄士啟永樂二年試中第二甲賜進士出身授翰林庶吉士至是孟京與從兄孟潔皆賜進士出身皆授此官陳氏兄弟之盛人以為榮時朝廷廣召文學之士纂脩永樂大典孟京與編校晨入晚出未甞以私廢其博達明審老師宿儒多讓之性孝友家素貧幸仕得禄而薄甘㫖未甞充其母甚樂也愛其弟恒約已以裕之卒之時家徒四壁顧其妻曰死生常道勿戚戚身後事其在諸兄汝惟善視兩兒不可令斷絶讀書種子耳不一言及他事嗚呼此亦可以觀其志矣卒時年三十有六曽祖主一妣倪氏祖以静妣曽氏考孔武母蕭氏娶劉子男二中九嵗元斗七嵗女一既卒士啟孟潔為治棺殮買舟還其喪與其妻子先宜人以靜先生之子余其外兄故為述平生大槩為墓銘使歸葬焉銘曰力學植身屢空弗知始達而暢曽不幾時嗟乎孟京遽止於斯行邁﨑嶇而難平夷嗟乎孟京匪命之罹趙進誠墓誌銘華巖有豁達賢智之士曰趙進誠自少慷慨抱氣節明經博學通當世之務甞欲有所施見於時屬元季政亂不可有為遂括囊不出日以養親為樂方國珍竊據温台諸郡是時蟻附之徒率皆氣焰灼灼猝起旦夕間進誠獨曰是何異趨膏火以自得者吾行見其斃其又可效乎即奉親走匿山澤不與世接也聞太祖皇帝定鼎金陵發兵弔伐于四方忻然舉手加額曰聖人出天下自此大定矣國家既平定方氏浙水東之地悉歸職方浩然有願仕之志冀一得發施其所負畜然遂疾作不及行而卒洪武辛亥某月日也年四十有九進誠諱友諒其先宋南渡時迪功郎諱某始自汴徙黄巖後至諱某者其曽祖也祖諱某考諱居敬妣某氏進誠頴悟過人少喜為文章平居事親睦族姻賑貧乏皆以為分内事不肯茍且遷就徇人終其身不能一日如志以見諸用非其命也夫娶黄氏子男五季寧季享季達皆蚤卒季鼎今自福寧縣學教諭陞國子監典籍方嚮用於時季桓女一適盧仲茂孫男七人進誠卒後二十一年諸子始克奉葬於縣嚴山之陽又十有九年為永樂九年季鼎奉狀来求文銘墓余考其志行及其時命有可悲者為之銘曰士懐璧兮靡玷缺庶薦于時兮命遽閼銘以昭之兮永弗滅羅仲深墓誌銘余友曽與賢登永樂甲申進士第為翰林庶吉士又二年其女弟之夫羅仲深繼登第與與賢同官同舎踰年與賢卒又明年仲深女兄之子曽用常亦舉進士来京師居止依舅氏未幾用常又卒仲深連經紀兩喪於客外傷其中情鬱抑無聊日益病猶强出事事後用常卒之數日亦不起矣悲夫與賢惇厚易直仲深温潤簡靜用常儁爽端確皆吾邑之秀也幸以經術遭逢聖明之世既出矣而皆不及下夀少試其所藴盖士君子無不悼惜之國家設科以来得士之盛江以西稱吾邑而甲申至丙戌兩科盖又盛焉甲申升者九人陳士啟湯流獨孤樂善曽與賢余學䕫蕭省身王直歐陽俊暨余姪相丙戌升者五人曽春齡陳孟潔及其弟孟京羅仲深胡雅雅既第而歸兩科十三人者皆為庶吉士在翰林與纂脩之事吾邑斯文之盛盖四方士之所慕艶而未幾流卒與賢又卒丙戌之四人者又連卒雅家居則又卒後丙戌而升者用常及王鉉梁輈陳賞王嗣先五人未廷對用常又卒於是四方士為吾邑斯文悼歎不獨三子者而已也闕人之先後卒者或余之親或久要而仲深又與余同里巷至是其兄浦城典史仲固来京師告余曰將歸葬吾弟必得子銘出示翰林脩譔王直所為事狀余不能辭也羅故西昌望族祖某考尚文洪武壬子鄉貢進士歴主臨臯仙逰兩縣簿二子仲固仲深也仲深自幼為主簿公所愛甞曰此兒必興吾宗未弱冠喪父家貧出教里中童䝉取束脩以佐其兄養母而益刻苦學問當其時鄉老碩師皆已歿無在者學者疑不能通無所質問仲深獨守傳註古說熟讀深味日益有得久而沛然而號仲深前輩者多自以為不如徃徃即仲深求正是否永樂乙酉以邑學弟子員中江西鄉試明年會試禮部中髙等廷對賜進士出身授翰林庶吉士脩永樂大典仲深沉潛明敏寅出酉入不肯斯須廢公同列者皆推讓之其卒以永樂某年某月某日某年某月某日葬某原從先兆也子男某某銘曰荆山之璞兮出孔多無幾屢毁兮嗟乎奈何嗚呼仲深兮温且良宜服用佩兮鏘珩璜亡者何遽兮存者徒傷梁監丞墓誌銘永樂十一年六月一日國子監丞梁里許以仁卒仲子澤將奉其柩歸葬欽州以國子博士鄒㓜享所狀世次歴官行事介監察御史胡槩来乞銘以仁甞典教吾郡又聞澤致孝於親惓惓也不忍固辭按梁欽著姓祖某考某以仁自幼聰頴好學稍長選為州學生洪武庚午舉鄉貢明年會試下第充太學生有詔選太學生教郡縣學以仁在選中授吉安府教授後丁外艱起服改國子學正秩滿陞監丞會祭酒被召在翰林司業闕以仁受命署監事永樂十年也以仁自為校官旦暮出所藴為諸生講說暇即自學不懈在吉安訓導謝子方先生以仁鄉試時座主也雖同宦然執弟子禮甚恭私會必侍坐請益必避席子夏曰仕而優則學後世學者不在於為已沾一命志滿氣盈豈復有意自進而求能致禮於所當下者加尠也於是以仁有不同於流俗者焉性質直夷曠與物無競不察察為明然嗜酒坐是致疾卒時年四十有五娶潘先卒繼段子男三津澤浩女一將以某年某月某日葬州之某原銘曰寧越之區合浦之濵孔雀明珠異産之殷嗚呼以仁和厚秀文繇郡愽士爰登成均亨衢翺翔榮澤津津如何中道奄仆其輪氣升魄歸永妥於此我銘昭之亦慰其子蕭處士墓誌銘吉水蕭岐繇新化知縣陞寳慶知府迎致其父處士公就禄養閱四年矣一日公坐庭中睹過鴈闕曰吾將死乎疇昔之夜夢人緇衣而長身四闕指雲中飛鴻而顧余言曰鴻乎鴻乎殆其俱旋歸乎今吾所睹類是矣其將死乎明日得疾旬有六日卒永樂癸巳二月乙亥也將以明年某月某日歸葬其鄉槎溪之原岐求余為銘按蕭故永暘名族自文仲徙吉水四世至徳永徳永生雲峯公考也公諱思柔字徳剛别字槎菴自幼魁偉秀明務學强識老長竒之既冠力進不懈屬元季寇盜四起所在恣刼殺富家巨室各務出計捍蔽自固所知有以是勉公者公曰彼其所加暴焉者或以利或以憾吾世襲忠厚事文墨何憾且何所利不聴奉其親率其妻孥徃畊槎溪之濵十餘年寇禍卒不及天下既定惟事教子弟子弟有力學惇行者厚奨以勸處宗戚有恩意甞有夜偷入室家人覺將追之公止之曰彼窮故至此奈何困人於窮也其人聞之愧悔卒改行焉平居謹言行老益自重雖不試然岐於為邑為郡皆得其民心要本於公之教矣享年七十有九娶毛氏子男五崇岐昇武智崇昇武皆先卒女三適士族孫男九曽孫男二銘曰仁山崔崔文水瀰瀰代生文人蔚乎有煒嗟惟槎菴括囊韜光棲迹丘園逍遙相羊公才有為公闕俾民宜之自公啟之既夀考終閟于斯原慶澤綿綿被其後昆郭彦思墓誌銘彦思諱睿姓郭氏其家世見余所譔登州府學教授墓誌登州與其弟湖州府經歴慶宜皆以經學治行知名當世彦思登州之從子而湖州冢子也母車氏彦思居家事親孝愛諸弟如愛已之身恒情所苦者惟恐一毫及之如恒情所喜則惟恐不之及也維持引翼靡或不至然皆出乎其性非有所勉强矯拂至于今其諸弟相愛及愛其兄弟之子皆如彦思之心彦思淳實坦夷與人交表裏洞達治家不求有餘為文章取達意而止永樂某年某月某日以疾卒享年若干娶賴氏繼歐陽氏張氏子男一公獻女二張孟賢張橦其壻也士竒先祖考皆與登州湖州兩先生厚善士竒少壯時又交彦思及其弟彦鉉彦遷從弟彦常相距巷南北有暇輒相就相講學未甞倦也即倦稍縱為談謔或弈以嬉有一日累覿有終夕坐對氣合而情得也其後彦鉉彦遷及余皆出仕惟彦思彦常家食懙懙自足也無幾彦常卒又無幾彦思亦卒余皆哭之慟彦常之葬也余銘之彦思既歿時彦鉉彦遷皆守官在外故葬緩今彦遷自瓊州府推官考績来京師與余言吾兄久未復土遷之不悌言未既哽塞涕下不已余不忍聞踰月彦鉉典教在吳興聞其弟来京師寓書首說緩葬罪在我辭益悲苦郭氏之兄弟何其篤相愛如此哉世之人其孰無兄弟乎於是彦遷得復職赴瓊將便道償所願也謂余曰卜以某年某月某日葬吾兄某鄉某原子宜為銘余掇其一端可為世勸者銘之他可類見也銘曰嗚呼彦思孰不為兄子謂吾弟同氣之生嗚呼彦思孰無弟者有惟愛兄歿不遺墮君子之行如榖異器舉一以甞百器一味鬱鬱新阡我作銘詞嗚呼彦思逝其逺而徐𢎞道墓誌銘永樂甲申詔近臣舉士之能書者就翰林給廪禄職繕寫且給楮筆俾暇益自進其能時永嘉徐𢎞道以舉徴至𢎞道工𨽻楷其為人恂恂温慎寡言未甞揚已抑人亦不肯苟且徇物與人交澹然而久益見親可謂端厚君子者矣𢎞道自幼力學明書經洪武庚午以太學生中應天府鄉試遂擢親王府紀善未幾改廣西道監察御史嵗餘罷罷今二十餘年縉紳間猶稱其清慎云永樂甲午河南布政司聘考鄉試以疾不赴明年八月九日卒於京師享年五十有九𢎞道諱定其世家永嘉曽祖源晉陵縣丞祖益恵安縣典史考士良妣陳氏娶金氏子男一人㕘女一人歸金寧於是㕘寧將歸其喪葬某鄉某原介黄卓陳闕茂来請銘余與𢎞道處久矣為之銘曰資慤兮行脩泊而安兮不競與絿嗟乎已矣兮閟斯丘故桂東縣儒學訓導廖潛仲墓誌銘永樂十六年七月二十四日桂東縣儒學訓導泰和廖潛仲卒廖出周文王子伯廖之後五季之際繇金陵徙泰和世襲儒業洪武初為泰和縣學教諭曰子謙稱愚寄先生者潛仲祖也父叔章母王氏生二子龍鸞龍潛仲也潛仲幼喪父教育於其祖祖卒潛仲未弱冠也卓然有立志出就學縣博士日自䇿勵讀書為文不襲成說躡故跡著四書經義論䇿多至千篇同輩莫及也儀觀偉然面白晳如玉疏髯秀眉雍容凝重人不得窺其際善談論閒暇於鄉人朋友飲酒縱弈嬉間出片語相調謔輒傾一座以是無少長賤貴皆樂親之然其中素所操執者未甞假借也永樂元年充貢為太學生召試文淵閣除鳯陽蒙城縣教諭後丁内艱服闋改雷州海康縣學教諭兩縣學教皆久弛潛仲力作新之初至䝉城五年来海康四年則通三考滿矣雖其學者多有成中科選者皆選於潛仲去職之日例不得書績遂降郴州桂東縣學訓導在桂東期年盡力職務雖疾不廢易簀之旦猶闕升堂見諸生盖年五十而卒潛仲不以利廢義繼祖母袁一女鍾愛祖有遺貲産袁率簡畀其女然後斥其餘畀潛仲族姻不能平潛仲獨無一言孝事袁終其身袁卒或教質於官以復其産者終不聴而敬其姑如袁之存也終身不衰潛仲自少壯負理才使受一郡一邑而為之可以得民惜乎其未見試也娶譚氏有婦道子男二丌謨謨永樂癸未進士翰林庶吉士女二長嫁鄧時亮次嫁鄉貢進士劉組孫男三丌謨將卜卒之嵗某月某日葬于某山某原以余其父友也奉事狀請為銘銘曰士重者義而世以利才庶有濟而蓄未試命之不猶行則無愧前浙江布政司左㕘政林公墓誌銘前浙江布政使司左㕘政林公諱瑜字子潤漳之龍嵓人其先出晉拒逺將軍晉安郡王禄之後而居泉之龍潯世業儒宋慶元中有諱起東者始徙龍嵓再世至鳯公之髙祖也曽祖詔承直郎龍嵓縣丞祖宜慶元以明經為南靖縣學教諭自出貲作先聖廟不以勤衆考得元季寇亂有保禦功分省承制授長泰縣簿復授百夫長皆以母老辭娶黄氏生五子其五公也自少有志於學洪武中為太學生居太學五年擢五軍斷事中司稽禮又六年陞右斷事公居官以忠愛為本於議獄多所平反數月陞江西按察司僉事授奉議大夫陞奉政大夫行部過贑有姪殺其伯母者獄已具公聴其辭而加察焉實豪民索逋不得擊殺之而以賄移於其姪竟坐豪民而釋其姪安福有强盜數十人郡縣連嵗捕不獲給事中及三司奉詔發兵捕之而不急捕盜更聴姦民悉取民之富者誣以匿盜非法考掠備極楚毒富民不能勝傾重賂乃得釋既又及平民盜以是遂逸去而平民不間貧富悉困矣奉詔者既以罪去而公代盜悉得而民若不知者公和厚樂易待物以誠用法持平恕臨政務寛簡所至禮賢下士考閱諸生而奨勸之歴三考以最陞本司副使授中順大夫流民聚長沙為寇與袁接境朝廷命豐城侯總湖廣江西兵擊捕之總兵檄公招撫脅從者多歸焉渠魁既得餘黨復叛公復徃撫之遂以無事甞督造戰衣一百萬期三月完如期而集又從工部尚書宋公採宫殿材于蜀而公分徃馬湖極險逺之地事集而民不病盖公於使人必酌其力體其勞而善撫之初自蜀歸有重獄二十餘人疑未決公立直之又三考當去於是居江西二十餘年矣前所未有民耆耄三百餘人遮馬首羅拜曰公厚徳被我民久矣民何以能忘公今決去不留其何以慰民之思也相挽公足出一履競取之公乃得闕馬馳去以最陞浙江布政使司左參政浙江素繁劇時布政使以下員皆闕公至獨任早夜躬勤不少懈踰年吏舎夜火延毁公署及文書事聞并逮公詣秋官公輒引服不自辨未奏以疾卒永樂二十一年正月朔也公在官三十年禄入益厚而自處泊然不加布素時平居教子甞舉汪信民菜根之言曰此立身之要也諸子日務於學則訓之曰學以明善誠身而達於用文辭非所急也公間為詩文未甞存藁喜書法晚亦斥去家居有後山之勝而仕於外未甞忘也輒以自號云娶曽氏有懿行子男五人嵩髙嵩暘森髙京暘華髙嵩暘先公卒女一人適蘇實孫男八人冠冕弁旒纓圭璧組孫女六人於是嵩髙京暘治殮畢將奉柩歸葬以進士王源所述世出事行請銘將以納諸竁嗚呼明辯之才機巧之智剛厲之氣非不適於世用而平實之行寛簡之度安靜之政使人稱為忠厚長者如林公其可多得哉士竒江西之人也知公之所施間甞與公徃還又知其所存故不辭而為之銘曰漳有後山孕靈毓清是生林公温裕靜貞躋華朝著職時讞議允直且平靡或愆盭大江之西肅肅風紀表其儀威亦篤愷悌奕奕浙藩禄位益崇丕賛承宣夙夜惟恭居無幾何鬱攸為咎公曰予責敢疵司寇其徳孔厚其隠誰白逝者不復知者徒惻故丘有藏既堅且深載行勒銘式視来今故中順大夫詹事府少詹事鄒公墓誌銘永樂二十二年三月初六日詹事府少詹事鄒公卒於官公之先自欈李徙錢塘世畜徳不仕考夀之博學有志遭元季亦晦迹不出公諱濟字汝舟蚤喪父事母以孝稱天資頴敏好學强記稍長㳺縣庠材識為同輩所服先生君子多重之餘杭令聘佐教縣學遂奉母徙家焉而毅然師道自任振起諸生皆趨於學一新學舎自令丞以下皆嚴敬之秩滿陞中都國子學録又陞國子助教一時國學之為師者皆樂與交為弟子者多樂就其講下無幾坐事自陳左遷西安府學教授未赴改河間府學用薦者陞平度知州階奉訓大夫廉簡寛厚吏民安之丁母憂服闋用翰林脩譔李貫舉脩實録官事摭要井井有章書成賜紗衣一襲幣表裏各四白金五十兩陞禮部儀制郎中階奉議大夫進奉政大夫時朝廷祭祀冊拜慶賚及儀物制度徴舊章㕘古典盖部一資於公詔脩永樂大典以五人總裁而公預焉安南拒命詔大將軍帥師征之擇朝臣有文學者徃司奏記公承命以行軍事多所助益安南平踰年餘黨復貳王師再出公亦繼徃還陞廣東布政司右㕘政務持大體而簡重寛平以率郡邑嶺海之區政化行焉坐累左遷吏部郎中數月擢左春坊左庶子在輔導之職言無不從寵遇特厚奉令㫖授皇孫經明於啟迪滿秩陞詹事府少詹事階中順大夫公為人和易坦夷不見崖岸於物無所迕自公卿下至武人庸𨽻皆樂親之其學長於春秋為文章不煩思索舉筆率就所居號頤菴客至必具酒相與傾洽遇朋徒之會山水之㳺輒欣然從之不以事廢兼嗜老釋之學旁通深造雖其徒尊宿者鮮或過之盖春秋六十有八而卒娶袁氏繼薛氏子男二本幹二女長適大理寺丞永嘉湯宗次未行孫男一炳公雖歴事三十餘年數更顯任而沒之日家無餘貲惟藏書數千巻而已余與公同為史官時徃還後春坊同寮又十餘年相與益厚於是本幹將奉公之䘮歸葬餘杭以左司直郎金寔所為事狀請銘義不可辭為叙而銘之銘曰繄公之興自儒師詵詵執業趨臯比表植模範懸蓍龜陟于上庠閎厥施紬書石室登金閨討論五禮宗伯資㕘賛戎幕文翰馳旬宣出佐南海涯宫坊入恃騰寵輝猗公歴試罔不宜剷觚削畦和以夷有不為公矩入規盍視公履誰疾疵天目之趾公全歸後欲考徳徴銘詩葉處士墓誌銘仁和葉處士卒其子中書舎人蓁將奔訃歸縗絰奉兵部郎中柴車所狀處士之行泣拜請銘其葬按狀葉故汴人從宋髙宗南渡家杭之仁和遂世為仁和人處士諱茂字茂實三嵗喪其父某七嵗喪母而鞠於叔母九嵗遭元季之亂寇陷杭州家人皆散失處士被俘即脫其耳金環畀寇寇舎之去既歸而孤惸孑然日夜悲摧感憤能奮弱為壯圖所以自立十四治生事日益見端緒既冠遂殖其家國家平定四方挾其貲逰中原走闗中轉歴山東西又南泝大江浮彭蠡踰五嶺縱觀乎南海而循八閩以歸遂裹足不出日親其鄉之君子以適於恬憺幽閒之濵而志於義施常推所有以振窮恤匱假貸不能償者還其券教其子力學而勉之曰吾適生非時而不遑於此也汝必成吾志長子擢官近侍喜動顔色諭之曰吾及見汝榮達幸矣然必無辱君父乃汝之賢年八十而卒其卒以永樂癸夘十月九日而葬以卒之明年某月某日墓在錢塘西山之趾其配岳氏其子男二長即蓁次蕙女一歸周某孫男三魯夀祖某銘曰弱之艱奮而克彊壯之通歛而弗揚其行之臧而夀與康而俾来也昌王處士墓誌銘龍溪王處士卒將葬其子大理評事昇奉韓府長史楊曜宗所述世出事行介翰林侍讀李時勉以求余銘余識昇於南京素已重之不忍以辭按王氏之先居光州固始自唐徙閩而家漳之龍溪世逺族盛至義甫娶李氏生四男子其三處士也諱舉逸字宗禮少甫知學而父兄相繼沒即奮自立躬畊以奉母事母生養死葬克致其誠嵗時祠祀祖考遵用儒者禮不惑於流俗冠禮廢於鄉久矣酌古今而行之於家洪武中郡甞推舉孝廉輒自忖念國家所為表徳勵俗甚盛舉也顧余之鄙陋敢忝竊哉卒辭而勉其子於學曰吾蚤孤多艱而不遑於此也若等必務焉又曰學必審夫義利之幾庶幾切已用也廣購書籍禮致明師以資之昆弟族姻之子亦必勵以學雖有畎畆之務旦暮躬率不廢而名其宴處之居曰息耕為人温厚端謹而樂施濟親戚鄉䣊急難者恤之貧乏者賙之嵗歉榖貴倒廪以貸其償與否不計也里津渡舟梁壊輒治之甞颶風望一舟漂里大溪中失楫幾覆遽命家人徤勇數輩以舟徃援之一舟之人免於覆溺所及人槩類此其卒以永樂癸夘十二月二十日距所生至正甲申歴嵗八十初娶林氏有婦徳躬儉勤相夫以殖家先若干年卒葬其鄉之某原繼郭氏子男二長即昇次㝢女二長嫁胡永誠次嫁林昱孫男一彛女八卜以卒之明年某月日合葬闕人之竁之左昇永樂二年進士歴安福羅田知縣平凉府推官大理寺左評事能敬慎自持其初為安福於吾同郡在官數月召還民攀轅送之有至於流涕者今殆二十年民猶思慕之不忘非誠心愛人何以致此此吾所為不忍辭銘者也銘曰民之類四士農其先農以本重士以道賢越古有士匪力弗食凡古之農孰匪士徳允篤宗禮殆古之民恱義與仁勤穡以身亦既夀考而全其歸垂祉續聞嗣世有煇故翰林庶吉士宋子魁墓誌銘永樂十九年四月二十八日翰林庶吉士宋子魁卒於北京年三十有六其素所交㳺皆嗟傷悼惜之不已其始病也余與錢檢討習禮徃問之醫者從傍製藥語余曰即三日或五日瘥矣豈謂更數日竟以不起子魁為人温然與人交能輔之善猝有緩急可望而所為悼惜之者明於世務達於理道有慈厚愛物之意盖可用而未用而今已矣於是其從兄吏部主事子環既殯之文明門之外遂出翰林編脩尹鳯岐所狀事行泣謂余曰吾弟不幸不得少見於時其可使無聞於後乎願得一言他日歸葬于鄉也刻之墓中按狀宋之先自廣平徙新淦後徙吉水至榮甫又徙廬陵榮甫生長卿長卿生彬之其曽祖也祖成章復居吉水父若宗母張氏子魁諱魁生而秀禀異常兒稍長頴敏好學讀書或忘寢食日益有造詣選補縣學生下筆為經義論䇿群輩多讓之永樂九年中江西鄉試十三年陳循榜登第為行在翰林庶吉士文學益進預脩性理大全等書書成受賜賚明年扈從還南京十九年春奉詔送祕閣書籍至北京無幾得病未病往謁祭酒胡公座中有察人氣色以決休咎者特戚焉於子魁盖旬浹而卒卒數日凡為庶吉士者悉送吏部將授官而子魁不及見矣子魁娶鄧氏子男二忭恪女一卒時父母皆老子幼暨其妻皆不在側病而扶持之歛而殯葬之皆子環也銘曰材也必度諸匠石駿也遽仆于皂櫪存豈不厚胡薄其夀皤皤父母婺負其幼曷其歸依曷所歸咎東里續集巻三十八
