body:
  text: 東里文集卷一明楊士竒撰記遊東山記洪武乙亥余客武昌武昌蔣隱溪先生始吾廬陵人年巳八十餘好道家書其子立恭兼治儒術能詩皆意度濶略然深自晦匿不妄交遊獨與余相得也是嵗三月朔余三人者攜童子四五人載酒殽出遊隱溪乘小肩輿余與立恭徒步天未明東行過洪山寺二里許折北穿小徑可十里度松林涉澗澗水澄徹深處可浮小舟旁有盤石容坐十數人松柏竹樹之隂森布蒙密時風日和暢草木之葩爛然香氣拂拂襲衣禽鳥之聲不一類遂掃石而坐坐久聞雞犬聲余招立恭起東行數十步過小岡田疇平衍彌望有茅屋十數家遂造焉一叟可七十餘嵗素髮如雪被兩肩容色腴澤類飲酒者手一卷坐庭中蓋齊丘化書延余兩人坐一媪捧茗碗飲客牖下有書數帙立恭探得列子余得白虎通皆欲取而難於言叟識其意曰老夫無用也各懷之而出還坐石上指顧童子摘芋葉為盤載肉立恭舉匏壺注酒傳觴數行立恭賦七言近體詩一章余和之酒半有騎而過者余故人武昌左護衛李千户也駭而笑不下馬徑馳去須臾具盛饌及一道士偕來道士嶽州人劉氏遂共酌道士出太乙真人圗求詩余賦五言古體一章書之立恭不作但酌酒飲道士不己道士不能勝降跽謝過衆皆大笑李出琵琶彈數曲立恭折竹竅而吹之作洞簫聲隱溪歌費無隱蘇武慢道士起舞蹁躚兩童子拍手跳躍隨其後己而道士復揖立恭曰奈何不與道士詩立恭援筆書數絶句語益竒遂復酌余與立恭飲少皆醉起緣澗觀魚大者三四寸小者如指余糝餅餌投之翕然聚己而往來相忘也立恭戲以小石擲之輒盡散不復因共慨嘆海鷗之事各賦七言絶詩一首道士出茶一餅衆析而嚼之餘半餅遣童子遺余兩人己而夕陽距西峰僅丈許隱溪呼余還曰樂其無己乎遂與李及道士别李以卒從二騎送立恭及余時恐晚不能入城度澗折北而西取捷徑望草埠門以歸中道隱溪指道旁岡麓顧余曰是吾所營樂丘處也又指道旁桃花語余曰明年看花時索我於此既歸立恭曰是遊宜有記屬未暇也是冬隱溪卒余哭之明年寒食與立恭豫約詣墓下及期余病不果行未幾余歸廬陵過立恭宿别始命筆追記之未畢立恭取讀慟哭余亦泣下遂罷然念蔣氏父子交好之厚且在武昌山水之遊屢矣而樂無加乎此故勉而終記之手録一通遺立恭嗚呼人生聚散靡常異時或相望千里之外一展讀此文存沒離合之感其能己於中耶既遊之明年八月戊子記金華縣重修廟學記孔子之道出於天而有以助天之所不及蓋裁成輔相品節防範之功天必有待於聖人書曰惟其克相上帝寵綏四方封人曰天將以夫子為木鐸天之生聖人也其必有以任之伏羲神農黃帝堯舜禹湯文武任之以行道孔子任之以明道其所謂道大而天敘之典小而動靜云為之則皆非有待乎外者既明於孔子將後有聖賢者作得因之以贊夫天佑斯民之功於無窮故自周而後二千年為君知尚於仁為臣知尚於敬父知尚於慈子知尚於孝夫婦長幼朋友各知所當尚及夫知好善而惡惡知貴王而賤霸知尊中國而外夷狄者皆孔子之功也微孔子斯道不幾於熄乎道熄斯民不幾於夷狄禽獸也哉自漢以來世主皆知尊孔子厚其禮而尊用其教我國家君師宇內一惟孔子之道內而京師外而府州縣逺而邊裔皆廟祀孔子冕服南面一視王者春秋有事與社稷等可為盛矣而守令承流宣化有恭有慢則其治亦隨之張弛焉金華縣附郡城之下蓋吕成公何文定王魯齋諸君子之鄉永樂壬寅進士番禺郭瑛來為令祗循德意惇務教育爰及再期士信其行民德其惠縣治東北二里所為學甲辰之夏巷民弗戒于火延燬學舍迫及禮殿風怒火烈人罔攸措瑛拜俯叩首瀝誠籲神靈應響答反風熄火殿及兩廡弗燬特完周視殿材嵗久滋弊宜撤以新方諏于衆會詔有司修飭祀典祠廟邑人趨義咸願有助遂卜曰就事因故益新作大成殿暨東西廡飾聖賢像前建重門講堂齋廬庖廪周垣咸新作之加于舊規於是令率學之諸生行釋菜禮而教諭李和圗不泯其令與邑人好義者之績具事本末加書介中書舍人陳景茂請記其成夫祗先聖以飭教事理民首務也何幸有賢令克篤用之又何幸成公諸君子德化沾溉其人心之深而致夫興起相助之易也嗚呼邦人俊秀來遊其間必也升而之廟湛焉肅焉秉其對越之誠而非僻之心不作退而之學誦焉思焉持其仰鑽之志而進修之功不己積習久而德曰新業曰廣處也有以續前修君子之光出也有以任國家治平之責庶用不忝於賢令與賢父兄之盛意哉是役也令主之助之資者邑士朱士真某某助之計者耆民劉某經始於洪熙元年閏七月某日成於是年某月某日其初建及改遷之故前自有記不復著丹桂樓記五雲洲之東距泰和萬安兩邑皆一舍有半曰學堂里里巨族為蕭氏其先徙自吉水之虎溪代有詩書行義為鄉人所敬雖未有甚顯者而所與交遊婚媾率顯者也家有丹桂一株莫究所自植里老長相傳約百數十年其盤骫偃蹇凌霄漢蔽虧日月就下而望之蒼然如垂天之雲秋髙風露清潔花盛發香馥馥聞十數里蕭氏之耆耋以其暇率族人聚樂其下長少具在布席列尊俎少者以次奉觴為壽畢則拱侍聽長者之教訓歡洽之至禮度不踰嵗率一再舉焉及元季兵亂海內鼎沸蕭氏之老者皆沒壯而少者皆散徙崇甍飛棟蕩然無存而桂亦斃於燬矣雖枯根尚隱隱頺垣荒址之間而生意泯然於是厯嵗逺矣蕭氏之彥曰孟常獨切興念吾先人之所居吾可以去之而不復乎辛勤歸即故址剃蕪畚礫營室以居讀書學道其中而敬修其先人之德焉既又作樓若干楹與桂相直無幾桂之荄者復萌蘖數嵗而奮拔鬱然識者蓋知為蕭氏復興之徴或曰蕭氏科第之祥也遂號其樓曰丹桂又數嵗孟常舉進士擢監察御史奕奕起聲譽九載用績最升浙江布政司參議而蕭氏之顯者遂盛於孟常桂亦靈異矣哉夫家之盛衰係乎氣運亦必有由於人者蓋善德可以致和氣凡物之近者必先得其氣故隨之而盛衰焉田氏之荆兄弟析而悴合而復榮此其證也田氏以友蕭氏以孝孝友行於家而家之所由盛也孟常將赴浙江屬余記丹桂樓楊於蕭故婚姻家而余與孟常仕宦往還又十餘年故為之記又推其盛之所由者以示其族人子弟俾皆勉焉務勤堂記江夏鄧真存誠舉進士為監察御史厯八年升山東按察使而名其退休之堂曰務勤以余交遊之舊也屬為書其所以名之故而自警焉其言曰真學不足以究道才不足以濟務聖天子不以其不可而授之一方耳目之寄綱紀之任夫山東古齊魯邦也凡其守令所治環數千里之地土廣而民衆其人之休戚治之得失皆吾所當究心也吾將何以稱任使而免譏纍哉惟是夙夜兢兢弗勝之為懼也又竊念之良驥一日千里如下乘而弗息十駕可至也真之劣也使果能持之以不息之誠亦庶幾其可哉嗟乎存誠可謂克篤其志者也蓋嘗察於天之運乎一日行九十餘萬里而一周明日又一周而無曰不然者以其健也乾之象曰君子以自強不息蓋法天之健以為勤也學非勤無以致夫道治非勤無以底厥功故自古大臣君子於愛君也必進無逸之説於事君也必躬匪懈之行而孔子於學者之問政亦有無倦之教也凡天下之事在於強志而力行其本則在先立乎誠而巳傳曰誠無息不息則久久則徵未有誠不立而能致夫久且徵也存誠可謂克篤其志者與追念前三十年與存誠者三四輩邂逅沙羡相與讀書討論之餘恣其意於所適或登大别而眺江漢或扁舟浮遊南浦赤壁之間弔古人之陳迹或憑髙騁望洞庭雲夢於落霞飛鳥之外倚長鋏而清嘯舒胸臆之浩然顧其所自得蓋富貴貧賤憂患無一之纍乎其心其放且逸如此而奚暇有所用志於勤哉今幸遇聖明在位吾與存誠皆見用於太平之世固宜棄浮趍實以就功業而存誠官益進任益重且益勉於君子之道未已也將所樹立必有重當時聞後世者而未必不自務勤始也遂為之書凝秀樓記芝之為瑞也果與於人乎異時深山密林巖谷之幽澗壑之隂人迹所未嘗至者芝叢生其間多或纍萬本其少猶動以千百計是孰之所致哉無與於人乎孝弟慈厚亷貞潔清之士其所居亭榭階戺園囿垣壁之側往往而芝生焉謂不係於人哉蓋天下平寧王道得化澤充洽泰和融液於兩間瑞物之蕃固有不擇地而出者矣若一德一行積誠而不己足以通神明致和氣斯瑞物亦必有著夫一人之感召者焉人之德莫先於孝古之能孝者若韋𢎞宗楊思貞許利川之徒皆有芝産其廬墓之次感應自然之理也前江西按察使金華邵玘以先永樂甲辰喪其母居喪執禮哀慕夙夜乃是年八月所居重屋之下産芝五莖或三秀或五秀華采煥爛明年五月復産一莖五秀輪囷郁然鄉里驚異嗟嘆以為孝感相與名其重屋曰凝秀之樓鄉人之仕於朝者光祿李少卿皓中書陳舍人景茂求余記之以先永樂四年進士為監察御史明法意而清操凛然仁宗皇帝監國南京時深所器重厯署大理寺都察院刑部皆有能聲其升憲長江西也治行尤多而自得祿迎母就養愛敬兼盡母甚樂之以先於余往還蓋余知其能孝其所為感召非獨居喪時矣斯樓殆將有聞於逺哉樓若干楹前臨縠水後枕椒峰據蘭溪之勝於顔孝子羣烏助葬處蓋相望云翠筠樓記吉水之東桐江之上其地多竹其里名竹溪里之望為羅氏羅氏之秀有曰同倫於竹尤篤好作樓若干楹而環植竹數千挺嵗久蕃盛名其樓曰翠筠表所樂也因其族父翰林侍講汝敬求為之記汝敬之言曰屬春景融霽秋氣澄徹八窗洞闢天氣徐來鬱乎如青雲泛乎若蒼雪俯而觀之浩浩如翠濤搖蕩於履舄之下坐而聽之雍雍如金石和鳴於几席之外至若涼月之夕揚鳳羽之蹁躚氷雪之晨挺琅玕而獨秀皆樓中佳趣也間暇而登焉蓋使人襟抱清曠萬慮不侵超然如出人境而立乎埃氛之表者余曰信可樂也而非有瀟灑離俗之資亦惡足以語此樂同倫其有離俗之資者哉夫髙臺廣榭嘉木森布葩花之爛然香氣之芬馥管絃歌舞曰相聚而歡宴淋漓此豪侈者所尚而世俗之所趍也其固自恃以樂矣然往往朝榮而夕悴不能少待於斯須之頃其視斯樓雖四時寒暑涼燠之不齊而皆有以樂焉者又豈獨清濁之相逺哉同倫殆有異乎衆人之所尚者歟抑君子之尚於物也有不在耳目之娛意趣之適而在於其德者夫竹中虛外直剛而自遂柔而不撓有蕭散靜幽之意無華麗竒詭之觀凌夏日以猶寒傲嚴冬而愈徑此其德為君子之所尚而同倫之志亦必在於此歟羅氏邑故家始自印岡徙桃林又自桃林徙竹溪吾聞宋有號竹谷老人者髙尚絶俗之士也子大經及其弟應雷皆理宗朝進士大經著書有鶴林玉露傳於世文獻代有足徴要之羅氏之尚乎竹者逺矣同倫竹谷之九世孫於鶴林為八世其所尚殆有所自耶故推本而為之記退思齋記少師吏部尚書蜀郡蹇公名其燕處之齋曰退思或曰公厯佐纍朝陟榮一品祿厚而位崇天下之士奔走下風瞻望餘光者邈乎不可及矣尚奚退思之為哉嗟乎此君子之所為有思也君子思盡其在巳者何與乎外哉公以進士事太祖皇帝朝夕近侍十餘年而始終事太宗皇帝仁宗皇帝為六卿之首進三孤之重三聖在上知之深信之厚任之專今遭遇明聖所以信任之如三聖而天下之人亦皆有望於公也凡今士大夫賢不肖之鑑别百執事能否之進退皆公司之國家有大政大議係宗社生民之重者皆公與之欲悉底于善也不思而能之乎古大臣君子如禹稷臯陶伊尹周公所思上之為君下之為民皆公職也公能獨無思乎退而思其道進而施諸事必使衮職無闕庶官無曠五典修百度貞隂陽和時序順四海熙熙無一物之弗遂庶幾盡吾職而有以副明主之德意與天下之人之望不然或有一之弗至即吾職有所未盡故雖燕居獨處汲汲焉求諸心而不遑暇焉者大臣君子以身任天下之所為也宋魯簡肅為執政題其私室曰退思巖此其志蓋與公同當時稱魯直又稱其忠實可大用亦公之所同若遭逢列聖寵祿之久且盛則公所有而簡肅不及焉宜公之惓惓不能巳於心歟公自始仕至今四十年殫智畢慮於厥職恆恐不及而秉謙持約恂恂不改其布衣時位愈進德愈厚名愈重巋然今之老成人夫何幸國有老成以係百僚卿大夫之承式也哉士竒仕於朝從公之後知公之心間承公命為此記既復于公又書以自勵云朴齋記永嘉郭文通精繪事事太宗文皇帝嘗賜其名曰純純既拜命退而名所居曰朴齋蓋朴幾於純純以德言朴以質言繇朴以達純也繪事自唐虞見於經蓋備五采之施而藝之至文者也一色不雜為純在人為至誠之德聖明之意其欲約之使復於太古之無事乎三五以前絶智離巧逮夏與殷猶尚忠質至於成周而文盛焉蓋勢則然矣聖人豈不欲長用古之道哉孔子曰如用之則吾從先進其意可見矣其亦如民之初生赤子之心純而無偽既長而欲動則私欲曰滋向之純而無偽者曰喪故孔子之教亦使復其初耳純之所以名同繪事後素之旨文皇帝之心孔子之心也固欲天下皆純質之俗斯民皆誠篤之行而况左右供奉之臣哉純能欽承聖訓以名齋居其亦欲朝夕起處體諸心誠諸行不使有一息之或間一事之或戾以仰副文皇帝之心而不忝乎純其有志乎哉夫朴之為齋也必忠信以為址靜貞以為宇淡泊以為扄簡約以為牖斥浮靡之玩謝矯飾之遊黜智巧之務執其誠守其一以任乎自然如是而可矣勉旃純也純為人和厚明敏自永樂初召至後擢營繕所丞上嗣大寶之初升閣門使云洪熙元年三月記永思堂記永樂甲午冬余偕王邦彥司直張伯原劉允恭兩司諌還自北京晚出文明門道通州登舟時北風沍寒數人者聫轡徐行伯原從子時貴馳一騎挾四五僮奴崇殽載酒追及即道傍民舍以餞皆引滿痛酌時貴侍其從父及賔客怡然甚恭惟恐不極其歡也旦出河上氷巳合則謀陸行時貴留侍數日為治裝具余三人前皆未識時貴一旦相遇相愛敬者蓋自愛敬從父而推及之也及與從父别其戀戀不忍之意感動左右蓋吾輩皆竊嘆其事從父如此於事父母可見矣後聞其家有永思堂伯原言時貴年始十三其父當戍遼東老且病不能行即奮身請代方行時道傍觀者矜念歎息謂此孱然弱稚冒辛苦從役萬里海外夫安知其有立否也既及戍四顧無所可恃勉自樹立然闓疏磊落不肯局蹐在人後既壯其上下皆愛重之獨其心未嘗一曰不在父母側也既內徙淮陽日望得一歸省無幾復徙常山護衛今父母皆沒矣徒抱無涯之戚此堂之所以名也願為之書夫父子天性生而致愛沒而致思常情所同也春秋常事不書然後世有不能事其父母又有肆巳悖道以危父母者矣於時貴之事可書也嗟乎時貴養不可及矣顧今所得為者持身謹行以圗無忝此孝之大節也時貴勉哉遂為之書張氏世家蘄之廣濟時貴今寓北京云是嵗十有二月既望記宣德二年進士題名記宣德二年三月朔廷試進士得馬愈等百有一人國朝廷試天子御正朝親出制䇿既第其髙下明日陳鹵簿傳臚天子服皮辨絳紗袍御正朝文武羣臣朝服東西序立傳臚既羣臣上賀其詞曰天開文運賢俊登庸士之與於斯者其榮矣哉自設科兼取南北士而前十有五科南士往往數倍於北皇上嗣統之初詔禮部科舉嵗取百人南士什六北士什四著為令蓋簡用人材南北並進公天下之道也至是合前科未廷試者一人而其第一人出山東前此南北士合試未有北士占首選者有之實自今始禮部尚書臣濙言故事有題名刻石太學矧今龍飛第一科宜有示後制可命臣士竒述文臣士竒既拜受命仰惟國家取士非一途而士必以科第為榮者天子親擢之也今朝廷寵科第廷試有録以示中外題名有碑以垂永逺夫豈徒顯其名哉固望為當世之用太平之具也士平居勤苦學問亦豈徒藉為名哉固將推所學見諸功業及諸天下也名之所在使後人睹之而思其所立歆豔愛慕之無巳榮莫大焉不然碌碌無稱或所行非所學後將有指其名而疵議之者矣此係其立志與否嗚呼可不勉歟於是朝之令典宜有紀士之立志宜有勸敬拜手稽首具書于題名之首時奉命讀卷及執事之臣列諸其隂賔壺堂記翰林檢討莆田黃行中為余言其鄉有徐氏者故詩書家居壺山之麓東隴之里纍世矣至士德甫始徙居黃石蓋去壺山之麓十里所士德甫沒其三子長曰孟博不忘厥祖之所居也偕其二弟即其父所築之前而面壺山作堂名之曰賔壺求為之記余未嘗識孟博兄弟而行中端重謹信不妄交際孟博兄弟之為人可知矣賔者敬以接之也父者吾身之所從出也祖者又吾父之所從出溯而上之皆吾祖也皆吾之所從出也先儒論禮以立冬祭始祖立春祭先祖蓋曰始祖厥初生之祖也先祖初祖以下髙祖以上者也冬至一陽之始立春生物之始皆象其類而祭之也象其類有致愛敬之禮則即所居而致愛敬焉者天理在人心自有所不能巳也夫巋然而峙乎吾前則吾起居出入無不接乎目接乎目則動乎中怵焉而興感肅焉而起敬者自無一朝一夕之間豈必象其類而後然也哉吾於徐氏斯堂蓋有以知孟博兄弟重本敬始之惓惓也嗚呼恆人知愛敬於其父也於其祖蓋有間矣况溯而上之者哉夫知重其祖其必知重其身又可以推見孟博兄弟之為善者歟吾又聞壺山莆中之最勝處也隱者之所樂而神人仙子往往出沒於其間夫徐氏之祖有靈焉其必不去此而精神相感氣類相通其必有致愛敬而受福者歟堂凡若干楹作於某年月孟博之弟仲曰某季曰某皆可為徐氏孝孫云思政堂記治事之後堂名思政者求善其政也為政有道也未得夫道先求諸心方清淨無事不與物接之際靈臺湛虛道無不存一念之興則道隨著焉故凡官府皆有退處燕休之居豈徒息勞而佚倦哉亦以專一其志而將致夫無窮之道也廣德州及所𨽻建平縣凡民之戶幾萬幾千有竒田之稅嵗幾萬幾千有竒且在邦畿之內也於為之守而善其政殆難矣哉廬陵羅坤泰之為知州也勤其政而愛民如子蚤暮察其所欲惡盡心而為之州治之後有堂久圮矣因其舊葺之而加閎焉闓爽靚深喧囂之聲塵雜之迹皆不及可以疏暢煩鬱澄心頥神而啓發靈智公暇則於此用其心於所未至名曰思政之堂間求余為記君子居官本之為持身上之為事君下之為治民三者其要也必端其在巳而勉於臣職不使有所不盡厚於民生不使有所不足夫欲其然也其道有不思而得者乎庶事叢脞乎前而人異情時異宜也欲隨事酌其情權其宜而不由乎思可乎猝有過舉焉不逺而復亦未必不由乎思也入而思之出而行之政有不善焉者寡矣坤泰可謂得為政之道歟坤泰永樂戊戌進士由庶吉士擢今官和厚明敏而有志焉為廣德未踰年吏部尚書蹇公奉詔巡撫過之民耆老千餘人詣公言知州之賢能仁愛已也其得民如此非得為政之道而然歟如其求道而不已焉將民之戴之豈有窮乎且後之繼坤泰而居者無窮也如皆求其道而不巳將民之戴之又有窮乎以是復坤泰為記而併以告夫來者東耕記客有過余談東耕子之事者曰所居吳淞江之上九峰三泖之墟其為人質實無聲色之娛惟勤穡事嵗東作既興每旦率子弟載耒耜畚鍤往治播種暮乃息或日中躬任餉饁有餘暇而天日融霽曵杖行塍間察視所不及逮夏耘其勤如之秋穫勤亦如之計其嵗中三時之日率什六七在田嵗以為常有愛之曰盍少自逸耶曰吾民耳顧無他材能可以禆於時又不自力以食乃欲仰食乎人耶而其積有餘遇公府徭賦令下必先趨事曰凡吾民得安乎田里足乎衣食無強凌衆暴之虞而有仰事俯肓之樂者上之賜也吾既無以報大德又不盡力於此何以為人乎余聞客之言嘆曰嗚呼世之人蓋有非其力不食者矣如惓惓於君上之大德不敢忽忘非知本者能之乎誠使世之為民者其所存皆然俗化可厚而刑罰可以無用也客聞余言曰願書之遂為之書東耕子潘氏字大本東耕其號余未嘗識東耕子皆得之於客客為中書舍人潘謙蓋其兄云梅溪書室記梅溪羅宗智甫惇德博學藏書甚富蓋自伏羲至於文武自周公孔子至於周程朱張自經史諸子至於稗官小説其書多具既以為自修之資又推以教其子孫及其鄉人之俊秀而名其藏書施教之居曰梅溪書室間命其子敬來京師求為之記夫道原於天命之性而行於彛倫曰用之間其所以然者則具載聖賢之書而古教法必先致知深造而不己則有以明夫性德體用之全而成已成物亦將馴至夫至善之域矣故學必本乎讀書書固不易得也而况處乎山林僻逺幽敻之地哉使得書而讀而又得師若梅溪書室然者非學者之幸歟推其本非由於宗智甫之仁歟梅溪在泰和東南兩舍許其山水環抱明秀其原田廣衍彌望皆沃壤處乎是者皆有以厚其生而適其意無慕外之纍而其人又多秀敏惇厚之資則其於為學宜易成也前二百年溪之東曽秀峰先生以清文粹德教授於鄉文丞相實出其門雖丞相非一師而曽氏在其里孰要其所浸溉深矣今羅氏積書以教將無繼昔人而起者乎羅族出清湖故廬陵世家有科第於宋元其徙梅溪至宗智甫蓋七世云東里文集卷一
