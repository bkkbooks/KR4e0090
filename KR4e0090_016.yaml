body:
  text: 東里文集卷十六明楊士竒撰墓表彭士揚墓表士揚諱詡彭氏其先見余所作其父墓志父原復母劉氏士揚蚤孤劉賢教育之士揚亦自童丱克卓立不肯在人後其父之同産兄橫侵寡孤業而僕𨽻使士揚母子無可奈何乃走依外氏夙夜刻苦自奮數年學日見端緒乃歸其從女兄之夫蕭用道授以尚書經鄉人之欲成其子弟者爭延士揚為孰師士揚事母孝事伯父母如父母而于伯父母之子盡友愛吉安郡學舉士揚訓導赴吏部送翰林考經義時胡文穆公為學士曰吉學之師非深于經者不稱加嚴命題士揚熟于經傳而條析明暢翰林諸公皆稱歎其難能尚書蹇公覽其文喜曰今之教官能是者千百之十一時英國公奏求儒師太宗皇帝命吏部擇行端而有文學者畀之遂以士揚對從之英國好賢禮士得士揚甚喜朝退之暇相與討論載籍辨析至理厚見禮遇從英國赴交址凡在軍中奏疏檄諭悉出其手皆事理詳明文辭得體英國于事關切要者必與定議而士大夫謫居交址者賴其存濟甚多宣德初英國言其賢于上遂授國子監典籍監故有文籍板歲久缺壞狼籍士揚悉彚次而整齊之見故元諸儒所輯解小學書闕逸三之一慨然曰此朱子切切為學者端本澄源而作何可廢乎遍求善本出已資録補刋完雖職不預教事而諸生執經請業者無虗日司成有大著作必經士揚閲一時翰苑諸學士皆于士揚往還有斯文之契士揚為文理明辭逹為人篤于義雅淡疏暢緩急可恃負直氣能輔人于道從叔為御史過家行有不當力諌之曰千尋之繘絶于寸朽豈得不慎不聽卒坐是僨或以不直加之容而不校余家于彭氏世姻士揚在兩京于余尤厚於見愛也獨不以姑息余深德之一日于吾家飲酒談笑歡甚就座得風疾明旦舁歸治數月少瘥白其情于朝命致事還鄉踰年卒京師士大夫聞訃皆悼惜之英國為位祭之其卒以宣德五年九月某日春秋五十有六配劉子二男二女於戲世之庸衆人其生無一之可稱及歿往往得名公貴人為之稱道誇譽以垂綿逺蓋有子克致之也如士揚非世所謂賢人君子歟茍其素相知而有公世道之心者可使無聞于後哉故為述平生大槩表諸墓道使其家刻焉沈學士墓表嗚呼此吾友翰林學士沈公之墓沈世家松江華亭大考諱德輝嘗為郡史平反寃獄百數十人鄉稱長者妣宋氏考諱易仕為咨議參軍無幾棄官養親而授徒里中惇行倫誼集五倫詩以教學者而甘貧樂義人號苦節先生妣顧氏有善德二子長即公諱度字民則次粲字民望公天資溫雅敦實自幼嗜學博涉經史洪武中郡邑交舉文學弗就坐纍謫雲南跋涉萬里處患難其中裕然時同謫者多名人率于公交逹官重帥爭欲迎致公館下岷王具禮幣聘之既至屢進直言居無幾辭去都督瞿能知賢下士延于家孰為弟子師旦暮躬請益焉其入京師也以公偕行時太宗皇帝初臨御命翰林舉賢才今禮部尚書江陵楊公為編修以公名上擢翰林典籍方時制勑填委既視草學士以下率分書之上獨覽公書稱善一時翰林善書如解大紳之真行草胡光大之行草滕用亨之篆八分王汝玉梁用行之真楊文遇之行皆知名當世而胡解及公之書獨為上所愛凡玉册金簡用之宗廟朝廷藏祕府施四裔刻之貞石傳于後世一切大制作必命公書公之書婉麗飄逸雍容矩度兼篆八分八分尤髙古渾然漢意而日侍清密無間嘗賜二品金織衣新製象笏鏤公氏名塗金以賜以其弟與子皆善書皆官之近侍父子兄弟並榮于朝古今以書遭承寵遇莫或加公書蓋公一藝耳為文章尚興致平淡雅則不為浮靡事上必盡誠被顧問必以正對由典籍升檢討復升修撰遂升侍講學士奉直大夫仁宗皇帝賜誥命進協正庶尹贈其考奉直大夫協正庶尹翰林侍講學士其妣宜人豫告歸焚黃賜鈔給驛傳宣宗皇帝臨御進翰林學士奉政大夫年踰七十再上章乞致仕歸不聽公事親孝與弟粲友愛相篤終身與人交久益敬為人貞靜不茍附初入翰林鄉人有為大宗伯者得君有氣勢赫赫朝士希進者日奔走其門公以故舊獨自守未嘗輕造間或邀公輒以禮辭士論髙之間暇閉户焚香鳴琴賦詩以自樂人號自樂先生襟宇澄淡風韻蕭散所好惟載籍法書名畫古器自題其齋居曰樂琴書處雜列花卉竒石髙人韻士至必具觴酌或吟或奕意度翛然所作詩文有滇南稿隨筆録西清餘暇自樂稿藏于家年七十有八一日微病猶作和王行儉詹事小洞天詞明日捐館宣德甲寅十月草二日也訃聞上遣禮部郎中陳謨賜祭給驛舟歸喪命有司營葬元配顧贈宜人繼陳子二芹先十五年卒藻中書舍人升大理右寺副孫男二潮秀敏好學先十年卒次源女三長歸俞珙餘在室曾孫男一士竒與公同入翰林相交三十有三年最相得其沒也蓋哭之慟於是粲及藻求余表墓余忍以衰朽而忘情老友哉敬為之表劉仲良墓表嗚呼習俗之下為士不能以義自重以得于內自適如其身或子霑一命在當路率慿藉聲勢輘轢鄉間挾制郡邑惟所欲是恣若後來或事敗勢失為世僇笑蓋不暇慮雖有敗者相繼踵在目前亦不少自斂戢若此比比也觀於今吾邑之士有子在當路而躬布衣居鄉能以義自重以得于內自適者有劉仲良焉仲良之子咸佐憲外藩十六七年任重祿厚郡縣吏日趨走庭下然屢迎仲良就養皆不赴仲良所居故在泰和邑市中乃之邑南澄江之陰十數里買田築室率少子往就耕所耕足歲計外有餘間釀酒獨酌賦詩為樂泊然無他營或時與田夫野老分席相嬉娛蓋鄉之人如不知其家有仕宦也此豈流俗人所可同日語哉劉之先五代時栁州判官曰况者始家泰和其後至瑩中生慶源慶源生存善存善娶羅生三男子仲良其仲也諱彛自童丱已雋爽頴敏書一過目能記誦時從海桑先生學初習為詩已藻思溢彂同輩皆不及為先生所重然不自矜衒雖父兄不深知之仲良有才具既壯未試詿誤謫戍遼東戍長之賢者以竒士禮之有所疑就質焉仲良處患難十餘年不改其度如一日及老代歸則昔之朋儕物故且盡獨處自怡所居有小樓名醉吟坐其中書册恆不釋手仲良平居孝友自作先祠率弟姪置祀田嵗時奉祖禰遼東歸其故田廬什器為宗人奄有者悉不問處物能恕咸在官數寓書或詩飭勵之縉紳大夫覽之咸見奬歎亦有和其詩者其平生故人在要路者未嘗一通書問而聞其所為善事輒喜津津見眉宇如已出非幽貞樂善者歟仲良詩晚益蒼然有壯逰集醉吟稿及所著劉氏譜藏于家仲良卒于宣德四年四月十四日享年六十有八葬以卒之歲某月日配廖氏子男九長震次坤次咸永樂十年進士歷四川河南按察僉事升河南按察副使未行改廣東次逋次遽次逈次遐次邈次逾一女嫁羅務習孫男十女八曾孫男一仲良與余同里少同學陳先生之門相知有素其卒也咸在京師聞訃遂求余文表墓嗟乎鄉人老長讀余文其必于流俗乎有感陳處士墓表處士姓陳諱果字孔碩父海桑先生國初以碩德正學望重大江之西三子皆文學傑出士林處士其季也材髙識精負有用之具無施不可而未嘗一見于用年四十有五而卒嗚呼惜哉其先五季時自金陵徙泰和世為詩書家宋元階科第入仕者六十人而處士之曾祖祖父皆不仕處士自幼雋爽亷重六七歲讀書一過目輒了大義賦詩作字超躐諸兄先生長者皆矜其不凡長而篤孝友父母沒哀慕終身喪祭一用朱子禮不為浮屠老子之教所親有強之者曰吾敢茍徇世俗隳家法以陷于不孝乎兄子凱不肖矯父命奪其資直數十萬緡悉置不較曰吾豈以是傷同氣哉為人豁逹務大體而持行謹謹若處女雖賤視汙濁士若將凂已然未嘗見詞色自少負四方之志嘗踰五嶺睇南海反而登衡山絶江以逹中原歷齊魯燕趙踰大行縱覽咸陽涉淮至浙弔古人之遺迹而交其名人君子充益所未至嘗愛華山之勝自號太華生前史官蘇伯衡為著傳以洪武庚午十月二十三日卒娶羅氏有賢德子男二孟潔永樂丙戌進士翰林庶吉士孟旦泰和縣儒學訓導女二長適監利縣典史蕭蕡次適曾永齡孫男六年考練紑純紘女三曾孫男女各二嗚呼士誠德足以容衆材足以濟務必用于世以著及人之功然士自重者必不枉已求用固係乎用之者之求之也如處士之賢雖有知之而皆不在當路則固莫之求也處士沒今三十有餘年當時知之者亦且盡矣士竒處士甥也少孤貧處士實提奬之務學使不墜蓋至今不忘謹最其平生大槩表諸墓以示來者黃氏畫埠阡表工部尚書兼詹事府詹事黃公告士竒曰福之先家泗州元延祐中始徙青州昌邑擇勝得畫埠居之畫埠者謂其地水木清麗若圖畫云暨吾祖又徙居邑西之新郭里而自始徙之祖至吾之曾祖皆葬畫埠自余幼時先府君歲春秋展先墓必侍行至則從先府君後循次拜跪奠獻畢先府君未嘗不戚焉悽愴也間携余周行墓下而訓之曰此皆吾之祖皆吾所自出也然吾蚤孤不及究知孰為某祖孰距今為幾世僅知者吾祖吾祖諱佑志祖妣倪氏繼唐氏二子長者伯父琬次者吾父二女李士賢張士金則吾姑之夫也小子識之福謹識不敢忘福又竊聞之鄉閭老長自黃氏來昌邑世以善德稱而未之有顯者今福幸叨榮二品列官六卿顧不能有所樹立用顯揚萬一日且老矣又懼先府君所遺訓者後之人或忽焉而忘之也子嘗為我志祖考之墓石惟髙曽以上墓石盍為我并志之將表之以貽我後人亦俾鄉之人不昧其黃氏之初也士竒曰嗟乎蓄深者發必閎公以惇德碩材遭逢列聖禮遇之隆付託之重秉恭持正夷險一心偉然時之名臣此豈一再世為善施義之所能有哉所本之深而逺固當自其髙曾之上雖髙曾以上體魄所藏莫能究知而皆吾之所自出也一氣所關精神所聚有感通之理禮始祖必祭况始祖之下又其近者乎此公之所為欲告其後之人歟仁哉孝子慈孫之心也遂為志之又表之于衆曰黃氏之先其藏斯在尊卑厥序左右厥位歷世云逺載德既豐何以觀之于今司空勿踐其域勿剪其植雲仍繩繩後有代興蕭德聚墓表朝廷理租賦區各置長正一人副二人使董其事而簡産之殷者充焉歷二十餘年長皆歲更宣德初户部言長歲更頑民慢之故多負租請復不更之制簡産之尤殷者充從之然近歲長賦者怙不更率肆意厲民而細民病之矣吾泰和十有二區長正副三十有六人而不為民厲者裁什之一蕭德贊及弟德聚其特然者也蕭氏兄弟先充歲更長細民已愛之至是而愛之深嗟乎使長賦皆若是其安有負上而厲下者哉惜乎德聚今不起也德聚諱應德聚其字其别字聚學蕭氏故邑東南桃源里巨家其大父斯和父安正洪武初相繼長區賦安正風流文雅傑出時輩見余所為墓文其男子七人第五德聚也篤孝友性剛介持義斷斷不為勢屈不為利變恆竭力趨公事又能捐已以蓋細民以是所趨事恆先集平居厚撫孤姪嘗佐兄德贊作宗譜以貽後有暇短衣長笠將書册畚鍤消搖畎畝間薅除荒蕪稍倦坐塍傍諷誦謳吟暮而歸取耕讀名所居樂從儒君子遊恆賦詩自娛亦以自負其為人槩如此卒于宣德二年十二月二十二日春秋四十有九初配及繼皆劉氏子男五穩秫􅀈穳穥女二其冢兄德修清淡淳厚尤為安正甫所重無子安正甫擇于諸孫命秫為之嗣德聚兄弟皆與余交而德聚尤厚余仕兩京德聚以督賦屢至竣事必過留一再宿出所作詩介余評評己未嘗不共抵掌絶倒噫今已矣何可復多得其葬也前蜀府紀善梁君本之銘之余書其大者為之表蓋非獨以示其後人亦欲使世之長區賦者觀焉贈文林郎監察御史羅君墓表監察御史羅銓升湖廣按察使瀕行求余表其父之墓其父字景泰初余識之前翰林學士胡文穆公所公亟稱其為人且知其出吾族兄仲素先生之門以是嘗往來永樂十九年余奉命考禮部會試得銓喜景泰有子及銓為御史亷正恭慎聲譽日起亦知其本之於父故于表墓不辭按羅氏其先撫之宜黃人元初諱某為吉水州學録遂家吉水之南坊學録孫載可載可生佑軒佑軒生繼道景泰之考也景泰諱世亨洪武初尚少出遊江淮時仲素先生謫居山陽清重有古道景泰從之學甚見愛重時未有室先生之深友四明范啓元為人如先生有女擇所歸以先生之重景泰也遂歸之自是山陽士大夫率重景泰景泰于書通其大義為人溫靜坦夷而志恬退尚賢好禮賙貧恤匱疾病死喪賴之者衆有祝願之者曰吾不能報公天必報公又曰顯不在公必在公嗣景泰聞而謝之曰凡吾所為皆出心之所不能自己豈望報乎其與人交有誠間居篤于教子恆舉古人所為可傳者勵之曰彼亦人也其可不自奮二子咸克卓立如父之志景泰卒于某年某月某日春秋若干宣德某年以銓貴贈文林郎福建道監察御史其配范謹於內德贈孺人其子長釭次即銓孫男若干翰林編修楊夀夫嘗為余言歲庚子偕贊善陳仲完考應天府鄉試燭下閲卷過夜分一卷去取未決困就寐髣佛睹人衣冠立燭影下遽寤因憶歐陽公朱衣事取卷再閲之歎曰幾失之矣拆名蓋銓也言諸同列仲完曰果非偶然必其家有厚德哉蓋為善者必有應古今竒應若此者非一吾故表之為世勸故奉訓大夫右春坊右諭德兼翰林侍讀林君墓表君姓林氏林殷三仁之後晉黃門侍郎頴之子散騎常侍祿山為晉安太守卒于官子孫留居侯官遂世為侯官人而官譜不絶至宋理宗朝諱古松者為御醫院使再世至諱清通儒術生諱顓明象數之學生諱興以孝行稱于鄉而自清至興皆不仕興娶遊氏宋名賢之後涉知書生君諱志四五歲其母口授書一過輒能記誦不忘十歲日記千數百言十四五下筆為文章不倍義理從學王孟揚孟揚竒之為盡底裏時數數出論辨見鋒鋩以折其老長孟揚曰此非所以求益也為字之曰尚默即痛自克治羣居一語一笑不敢妄終其身不變而沈潛于學涵浸渟蓄久而益富永樂辛卯福建鄉試壬辰禮部會試皆第一廷試第一甲第二人賜進士及第授翰林編修承事郎癸巳車駕幸北京甲午召赴行在預編性理及四書五經大全書書成受賜賚升文林郎丙申扈從南還預編歷代名臣奏議辛丑召赴北京升修撰授承務郎甲辰升侍讀授承直郎考順天府鄉試未幾簡東宫官擢右春坊右諭德授奉訓大夫仍兼侍讀洪熙元年賜誥贈其父奉訓大夫右春坊右諭德兼翰林侍讀其母宜人封其妻宜人宣德元年主應天府鄉試預修兩朝實録未成尚默得熱疾更數醫弗效數月卒尚默善事父母父母病湯藥非親嘗不進既卒喪葬皆謹禮于宗族篤恩意其學博究經史百氏及星歷醫卜之説咸得其要領為古文務去陳言而刻厲深切得樊紹述歐陽行周之趣其學出孟揚與孟揚前後官翰林文名伯仲間然孟揚不若尚默之謹靜守約也從尚默學者亦有出躋顯仕為聞人如湖廣參政黃澤浙江按察使林碩其表表者尚默嘗自號見一居士又號所居曰蔀齋其卒以宣德丁未五月二十四日享年五十其子男二雲瀚雲瀣女三黃叔敏程稔其壻也一尚幼嗚呼以尚默文學行義所遭際祿位可為無憾雖不逮下夀然君子于考論賢否不以此也獨念士習日下學者率騖僥幸一得其有能自力求實得于已如尚默者寡矣尚默非今士流之卓然者哉余其會試時考官又同官翰林十餘年蓋悼惜之不已于是王修撰孟堅陳御史叔剛以雲瀚及孟堅所述事狀來請墓文遂為之表禮部儀制郎中史君墓表宣德二年春交址之復叛也守帥奏請益兵朝廷命安逺侯柳升等將七萬人往益之命兵部尚書李慶參贊軍事且勑慶凡六卿之屬才且賢者舉以自助慶所舉十數人其最才且賢禮部儀制郎中史安祠祭主事陳鏞師行慶與同卧起九月入交址賊于官軍所經之處悉列柵以守升既連破之直抵鎮夷關升有矜色升雖勇然不好謀安鏞言于慶曰總戎之意驕矣公宜力言之且夷賊譎詐不可以其屢敗忽之安知其不示弱以誘我况璽書數數戒飭謂賊專以設伏取勝不宜輕率待之公宜速入言之時慶已病強起與升力言升唯唯而已中實無戒慎意明日前進以數百騎獨先其副及慶等皆在後升前度橋既度橋遽壞後軍阻不得前賊伏兵四起升被創死明日慶病不起又明日副將崔聚整兵以進聚固宿將然倉猝賊驅象赴鬬衆亂聚被執冦大呼官軍降即不殺安鏞皆曰吾輩見危授命耳皆死之十月十八日也先是賊陷昌江等城城中如都指揮李任指揮顧福知府劉子輔知州何忠等皆守節死交址守帥知任等死事以聞皆得褒贈從升等死者守帥隔逺不明知不及聞時與安鏞同行親見其事後得脫歸者雖言之詳而有司以無官府上狀不可質故安等之節不得暴白于朝此世之所共深惜而痛悼者也一時同死者如吏部主事李宗昉等蓋多而安與鏞之事有聞者在慶左右也兩人皆進士發身最相得安字志靜元宰相鎮陽王天澤之後今家江西豐城為人謹重亷正雖職務填委好學不倦而疏逹勤敏六卿爭欲為其屬尤見知於仁廟屢垂嘉奬死時年四十二鏞字叔振錢塘人重厚清介所履端確未嘗一比匪人而勤于學問三十年來余所識錢塘士人仕京師其所言所行表裏一由于正者其惟叔振然知之者寡矣死年三十四志靜之子取其父衣冠葬之請余為表余數聞其死時事為表之曰禮部郎中史君以忠死葬于此其曾祖憲中元河南行省都事其祖文質洪武初富州吏目其父伯允贈禮部郎中其母甘氏封太宜人配熊氏封宜人其子男四人而附見主事陳君者史君之同寮友生同志而死同節者也贈奉議大夫太醫院使諡恭靖蔣公墓表永樂二十二年七月十一日太醫院判蔣用文卒于北京初疾且革手自為啓附進上時在文華殿得啓駭愕親御寶翰遣中官問復有欲言用文強起拜命言臣所愧恨者不能報盛德耳又為書與其素所厚左春坊大學士楊士竒訣明日卒命兵部給驛舟還其喪遣中官督治祠墳後六日太宗皇帝賔天踰月上嗣大位明年改元洪熙之三月詔贈用文奉議大夫太醫院使特諡恭靖遣官賜祭而官其長子主善為太醫院判主善以治命求墓文士竒與用文同事上于春宫相知實深用文官太醫其所以受知于上者能隨事獻規益有問必正對以是甚見親厚而非専以醫也用文明當世之務其哀矜惻怛之意恆存于中間與之言未嘗不忠愛惓惓也上嘗論保和之要對曰在養正氣耳正氣完邪氣無自入焉又問卿于醫效率緩何也對曰善治者必固本急之恐傷其本聖人所以戒欲速也言關于理道槩類此用文初入太醫院為御醫永樂八年升院判自是専侍文華殿其于醫主李明之朱彥修不執古方而究病所本自為方故所治恆十全王公貴人下逮賤𨽻細氓有疾衆所難愈者謁用文多良愈如用文謂不可愈即無能愈者凡所愈報不報不計為人恂恂醇厚恭謹有行義其自幼以孝聞鄉里十餘歲能自樹立襲祖父業而用儒醫起家在京師所居近市闢一齋深邃明爽題曰靜學又治一齋公署左偏題曰緝熙圖籍充牣稍暇即齋中研玩讐校未嘗釋卷喜為詩文遇名賢所製率自抄録蓋雖老學問不倦文人韻士過從者無虛日賔至必置酒或五行或七行吟咏為樂與人交表裏始終一致沒之日無貴賤戚疏咸嗟咨悼惜曰善人已矣享年七十有四蔣氏之先家魏州金國子助教曰安中以直諌顯泰和間其孫應茂徙揚州之儀真生夢雷元揚州路醫學教授生伯雍舉進士崇明州判洪武初用薦召為史官以疾辭遂出為蘭陽縣丞居官有惠政其配魏氏用文考妣也用文諱武生以字行娶王氏先卒子男四主善主敬主孝主忠皆醇謹克肖女一顧璣其壻也孫男女各二用文所著有靜學齋稿若干卷治效方論若干卷嗚呼三代盛時王朝自公卿下暨百執事皆賢且材而各以其技能朝夕獻忠于王之左右惟王樂聞之而莫之違也故見諸其治為盛後世非徒其臣之不能皆賢且材亦樂聞善于下者鮮矣其何怪夫治之不古若哉故用文志希古人亦必聖明在上有大舜樂善之誠有以來之矣至其身既沒德意不衰而愈隆益以見聖誠之至嗚呼雖不獨為蔣氏榮如蔣氏之後有能知其先所以致此而圖敬承之不隳者亦賢也矣故表諸墓而告之彭先生墓表泰和西郭月池里有兩彭先生曰叔介曰與和皆篤行君子也叔介先生嘗出而仕矣與和先生其從弟雖未仕而修諸躬施諸其家其鄉者皆足以表物勵俗無愧乎古人叔介先生沒士竒既表其墓與和先生沒今十有六年未有表之者君子之善其可終泯乎月池彭氏故邑之望元濓溪書院教諭諱某生月溪處士諱某月溪生諱某先生之曾祖祖父也先生諱羣與和其字自幼在祖父側熟其先世事即有志于學以圖不墜稍長而孤遭元季連歲兵禍孑孑一身走四方以避亂定始歸而親戚死徙先廬焚蕩幾無以自容䘖悲茹苦謀所以植身承家者從鄉先生王子與學專志畢力不少懈退則就叔介相切磨遂貫通諸經及子史百家安成劉雲章一覽所業甚見奬重篤倫誼世父沒久未葬舉其匶葬瀘源山中時山中多虎為民患迫暮假息道傍神祠祠故無扃鎖虎夜環祠聲虓然先生不為動虎竟去人以為至誠之應聞同産姊兵掠在衡州即日徒步走衡贖歸又走安成求得其孤姪以歸姪中道病死躬負尸行哭買地葬已乃行族弟死妻子貧不給恆分所有以濟居無餘資而凡振窮周急雖數無厭倦意處朋友務相益與子弟及鄉人之子弟言必在于孝友忠信接鄉里恂恂溫溫常掩過揚善故無少長賤貴皆愛敬之為文章清婉典則有司嘗奉詔舉賢又舉懷材抱德皆以疾辭袁州龍泉學皆聘訓導將行復慨然自念吾奈何違先人丘墓而忘吾子弟之教乎亦不果行蓋先生之學本諸聖人之經達夫性道之原而一言一行惟恐或盩古人至其教學者亦以此蓋所自任者在此也嗚呼一鄉有君子斯一鄉有善俗文溪武山之域安得復有惇用古道如彭先生者以振起之哉先生卒于永樂丁亥五月某日享年六十有五初娶楊氏士竒從父彥中先生之女無子繼胡氏永陽名族生男子二人長百鍊永樂十三年進士為監察御史次百鈞業進士未試而卒孫男若干女若干今之知先生如士竒亦無幾人故表于墓又系之以詩云粵昔四民士以道貴德全于躬化被于世士習既遷世日以下沿流益逺鮮之反顧有其顧之倡而寡和士疇念茲曰豫時過嗟若先生克篤念之褒衣博帶動由矩規鑽仰先哲以有于我亦時出之以遺來者嗚呼先生于古是逑弗奮以騫弗閎以流我行於鄉波蕩草靡不見先生永歎何已東里文集卷十六
