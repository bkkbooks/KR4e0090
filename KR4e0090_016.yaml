body:
  text: 東里文集巻十六明楊士竒撰墓表彭士揚墓表士揚諱詡彭氏其先見余所作其父墓志父原復母劉氏士揚蚤孤劉賢教育之士揚亦自童丱克卓立不肯在人後其父之同産兄横侵寡孤業而僕𨽻使士揚母子無可柰何乃走依外氏夙夜刻苦自奮數年學日見端緒乃歸其從女兄之夫蕭用道授以尚書經鄉人之欲成其子弟者爭延士揚爲塾師士揚事母孝事伯父母如父母而扵伯父母之子盡友愛吉安郡學舉士揚訓導赴吏部送翰林考經義時胡文穆公為學士曰吉學之師非深扵經者不稱加嚴命題士揚熟扵經傳而條析明暢翰林諸公皆稱歎其難能尚書蹇公覽其文喜曰今之教官能是者千百之十一時英國公奏求儒師太宗皇帝命吏部擇行端而有文學者畀之遂以士揚對從之英國好賢禮士得士揚甚喜朝退之暇相與討論載籍辨析至理厚見禮遇從英國赴交阯凡在軍中奏䟽檄諭悉出其手皆事理詳明文辭得體英國扵事關切要者必與定議而士大夫謫居交阯者賴其存濟甚多宣徳初英國言其賢扵上遂授國子監典籍監故有文籍板歲久缺壞狼籍士揚悉彚次而整齊之見故元諸儒所輯觧小學書闕逸三之一嘅然曰此朱子切切爲學者端本澄源而作何可廢乎徧求善本出已資録補刋完雖職不預教事而諸生執經請業者無虗日司成有大著作必經士揚閲一時翰苑諸學士皆扵士揚徃還有斯文之契士揚爲文理明辭逹爲人篤扵義雅澹䟽暢緩急可恃負直氣能輔人扵道從叔爲御史過家行有不當力諌之曰千尋之繘絶扵寸朽豈得不慎不聽卒坐是僨或以不直加之容而不校余家扵彭氏世姻士揚在兩京扵余尤厚於見愛也獨不以姑息余深德之一日扵吾家飲酒談笑懽甚就座得風疾明旦舁歸治數月少瘥白其情扵朝命致事還鄉踰年卒京師士大夫聞訃皆悼惜之英國爲位祭之其卒以宣徳五年九月某日春秋五十有六配劉子二男二女於戱世之庸衆人其生無一之可稱及歿徃徃得名公貴人爲之稱道誇譽以垂緜逺蓋有子克致之也如士揚非世所謂賢人君子歟茍其素相知而有公世道之心者可使無聞扵後哉故爲述平生大槩表諸墓道使其家刻焉沈學士墓表嗚呼此吾友翰林學士沈公之墓沈世家松江華亭大考諱徳輝嘗爲郡史平反寃獄百數十人鄉稱長者妣宋氏考諱易仕爲諮議叅軍無幾棄官養親而授徒里中惇行倫誼集五倫詩以教學者而甘貧樂義人號苦節先生妣顧氏有善德二子長即公諱度字民則次粲字民望公天資温雅敦寔自㓜嗜學愽渉經史洪武中郡邑交舉文學弗就坐累謫雲南䟦渉萬里處患難其中裕然時同謫者多名人率扵公交逹官重帥争欲迎致公舘下岷王具禮幣聘之既至屢進直言居無幾辭去都督瞿能知賢下士延扵家塾爲弟子師旦暮躬請益焉其入京師也以公偕行時太宗皇帝初臨御命翰林舉賢才今禮部尚書江陵楊公爲編脩以公名上擢翰林典籍方時制勑填委既視草學士以下率分書之上獨覧公書稱善一時翰林善書如觧大紳之真行草胡光大之行草滕用亨之篆八分王汝玉梁用行之真楊文遇之行皆知名當世而胡觧及公之書獨爲上所愛凡玉冊金簡用之宗廟朝廷藏秘府施四裔刻之貞石傳于後世一切大制作必命公書公之書婉麗飄逸雍容矩度兼篆八分八分尤髙古渾然漢意而日侍清宻無間嘗賜二品金織衣新製象笏鏤公氏名塗金以賜以其弟與子皆善書皆官之近侍父子兄弟並榮扵朝古今以書遭承寵遇莫或加公書盖公一藝耳爲文章尚興致平澹雅則不爲浮靡事上必盡誠被顧問必以正對由典籍陞檢討復陞脩撰遂陞侍講學士奉直大夫仁宗皇帝賜誥命進協正庶尹贈其考奉直大夫協正庶尹翰林侍講學士其妣宜人予告歸焚黄賜鈔給驛傳宣宗皇帝臨御進翰林學士奉政大夫年踰七十再上章乞致仕歸不聽公事親孝與弟粲友愛相篤終身與人交久益敬爲人貞静不茍附初入翰林鄉人有爲大宗伯者得君有氣勢赫赫朝士希進者日奔走其門公以故舊獨自守未嘗輕造間或邀公輙以禮辭士論髙之閒暇閉户焚香鳴琴賦詩以自樂人號自樂先生襟宇澄澹風韻蕭散所好惟載籍法書名畫古器自題其齋居曰樂琴書䖏襍列花卉竒石髙人韻士至必具觴酌或吟或奕意度翛然所作詩文有滇南槀隨筆録西清餘暇自樂槀藏于家年七十有八一日㣲病猶作和王行儉詹事小洞天詞明日捐舘宣徳甲寅十月廿二日也訃聞上遣禮部郎中陳謨賜祭給驛舟歸喪命有司營塟元配顧贈宜人繼陳子二芹先十五年卒藻中書舍人陞大理右寺副孫男二潮秀敏好學先十年卒次源女三長歸俞珙餘在室曾孫男一士竒與公同入翰林相交三十有三年最相得其沒也盖哭之慟於是粲及藻求余表墓余忍以衰朽而忘情老友哉敬為之表劉仲良墓表嗚呼習俗之下爲士不能以義自重以得扵内自適如其身或子霑一命在當路率慿藉聲勢輘轢鄉間挾制郡邑惟所欲是恣若後來或事敗勢失爲世僇笑盖不暇慮雖有敗者相繼踵在目前亦不少自歛戢若此比比也觀於今吾邑之士有子在當路而躬布衣居鄉能以義自重以得扵内自適者有劉仲良焉仲良之子咸佐憲外藩十六七年任重禄厚郡縣吏日趨走庭下然屢迎仲良就養皆不赴仲良所居故在泰和邑市中乃之邑南澄江之陰十數里買田築室率少子徃就耕所耕足歲計外有餘閒釀酒獨酌賦詩爲樂泊然無他營或時與田夫野老分席相嬉娛盖鄉之人如不知其家有仕宦也此豈流俗人所可同日語哉劉之先五代時栁州判官曰况者始家泰和其後至瑩中生慶源慶源生存善存善娶羅生三男子仲良其仲也諱彛自童丱已雋爽頴敏書一過目能記誦時從海桑先生學初習爲詩已藻思溢彂同軰皆不及爲先生所重然不自矜衒雖父兄不深知之仲良有才具既壯未試詿誤謫戍遼東戍長之賢者以竒士禮之有所疑就質焉仲良處患難十餘年不改其度如一日及老代歸則昔之朋儕物故且盡獨處自怡所居有小樓名醉吟坐其中書冊恒不釋手仲良平居孝友自作先祠率弟姪置祀田嵗時奉祖禰遼東歸其故田廬什器爲宗人奄有者悉不問䖏物能恕咸在官數寓書或詩飭勵之縉紳大夫覽之咸見奬歎亦有和其詩者其平生故人在要路者未嘗一通書問而聞其所爲善事輙喜津津見眉宇如已出非幽貞樂善者歟仲良詩晚益蒼然有壯逰集醉吟槀及所著劉氏譜藏于家仲良卒扵宣徳四年四月十四日享年六十有八塟以卒之歲某月日配廖氏子男九長震次坤次咸永樂十年進士歴四川河南按察僉事陞河南按察副使未行改廣東次逋次遽次逈次遐次邈次逾一女嫁羅務習孫男十女八曾孫男一仲良與余同里少同學陳先生之門相知有素其卒也咸在京師聞訃遂求余文表墓嗟乎鄉人老長讀余文其必扵流俗乎有感陳䖏士墓表䖏士姓陳諱果字孔碩父海桑先生國初以碩徳正學望重大江之西三子皆文學傑出士林䖏士其季也材髙識精負有用之具無施不可而未嘗一見扵用年四十有五而卒嗚呼惜哉其先五季時自金陵徙泰和世為詩書家宋元階科第入仕者六十人而䖏士之曾祖祖父皆不仕䖏士自㓜雋爽亷重六七歲讀書一過目輙了大義賦詩作字超躐諸兄先生長者皆矜其不凡長而篤孝友父母沒哀慕終身喪祭一用朱子禮不爲浮屠老子之教所親有强之者曰吾敢茍徇世俗隳家法以䧟扵不孝乎兄子凱不肖矯父命奪其貲直數十萬緡悉寘不較曰吾豈以是傷同氣哉爲人豁逹務大體而持行謹謹若䖏女雖賤視汙濁士若將凂已然未嘗見詞色自少負四方之志嘗踰五嶺睇南海反而登衡山絶江以逹中原歴齊魯燕趙踰大行縱覽咸陽渉淮至浙弔古人之遺跡而交其名人君子充益所未至嘗愛華山之勝自號太華生前史官蘇伯衡為著傳以洪武庚午十月二十三日卒娶羅氏有賢徳子男二孟潔永樂丙戌進士翰林庶吉士孟旦泰和縣儒學訓導女二長適監利縣典史蕭蕡次適曾永齡孫男六年考練紑純紘女三曾孫男女各二嗚呼士誠徳足以容衆材足以濟務必用扵世以著及人之功然士自重者必不枉已求用固係乎用之者之求之也如䖏士之賢雖有知之而皆不在當路則固莫之求也䖏士沒今三十有餘年當時知之者亦且盡矣士竒䖏士甥也少孤貧䖏士實提奬之務學使不墜盖至今不忘謹最其平生大槩表諸墓以示來者黄氏畫埠阡表工部尚書兼詹事府詹事黄公告士竒曰福之先家泗州元延祐中始徙青州昌邑擇勝得畫埠居之畫埠者謂其地水木清麗若圖畫云暨吾祖又徙居邑西之新郭里而自始徙之祖至吾之曾祖皆塟畫埠自余㓜時先府君歲春秋展先墓必侍行至則從先府君後循次拜跪奠獻畢先府君未嘗不戚焉悽愴也間携余周行墓下而訓之曰此皆吾之祖皆吾所自出也然吾蚤孤不及究知孰爲某祖孰距今爲幾世僅知者吾祖吾祖諱佑志祖妣倪氏繼唐氏二子長者伯父琬次者吾父二女李士賢張士金則吾姑之夫也小子識之福謹識不敢忘福又竊聞之鄉閭老長自黄氏来昌邑世以善徳稱而未之有顕者今福幸叨榮二品列官六卿顧不能有所樹立用顕揚萬一日且老矣又懼先府君所遺訓者後之人或忽焉而忘之也子嘗為我志祖考之墓石惟髙曽以上墓石盍為我并志之將表之以貽我後人亦俾鄉之人不昩其黄氏之初也士竒曰嗟乎蓄深者發必閎公以惇徳碩材遭逢列聖禮遇之隆付託之重秉恭持正夷險一心偉然時之名臣此豈一再世為善施義之所能有哉所本之深而逺固當自其髙曾之上雖髙曾以上體魄所藏莫能究知而皆吾之所自出也一氣所闗精神所聚有感通之理禮始祖必祭况始祖之下又其近者乎此公之所為欲告其後之人歟仁哉孝子慈孫之心也遂為志之又表之于衆曰黄氏之先其藏斯在尊卑厥序左右厥位歴世云逺載徳既豐何以觀之于今司空勿踐其域勿剪其植雲仍繩繩後有代興蕭徳聚墓表朝廷理租賦區各置長正一人副二人使董其事而簡産之殷者充焉歴二十餘年長皆歲更宣德初户部言長歳更頑民慢之故多負租請復不更之制簡産之尤殷者充從之然近歳長賦者怙不更率肆意厲民而細民病之矣吾泰和十有二區長正副三十有六人而不為民厲者裁什之一蕭徳賛及弟德聚其特然者也蕭氏兄弟先充歳更長細民已愛之至是而愛之深嗟乎使長賦皆若是其安有負上而厲下者哉惜乎德聚今不起也德聚諱應德聚其字其别字聚學蕭氏故邑東南桃源里鉅家其大父斯和父安正洪武初相繼長區賦安正風流文雅傑出時軰見余所爲墓文其男子七人第五德聚也篤孝友性剛介持義斷斷不爲勢屈不爲利變恒竭力趨公事又能捐已以盖細民以是所趨事恒先集平居厚撫孤姪甞佐兄徳賛作宗譜以貽後有暇短衣長笠將書冊畚鍤消摇畎畝間薅除荒蕪稍倦坐塍傍諷誦謳吟暮而歸取耕讀名所居樂從儒君子㳺恒賦詩自娛亦以自負其爲人槩如此卒扵宣德二年十二月二十二日春秋四十有九初配及繼皆劉氏子男五稳秫􅀈穳穥女二其冢兄徳脩清澹淳厚尤爲安正甫所重無子安正甫擇扵諸孫命秫為之嗣徳聚兄弟皆與余交而德聚尤厚余仕兩京徳聚以督賦屢至竣事必過留一再宿出所作詩介余評評己未甞不共抵掌絶倒噫今已矣何可復多得其葬也前蜀府紀善梁君本之銘之余書其大者爲之表盖非獨以示其後人亦欲使世之長區賦者觀焉贈文林郎監察御史羅君墓表監察御史羅銓陞湖廣按察使瀕行求余表其父之墓其父字景泰初余識之前翰林學士胡文穆公所公亟稱其爲人且知其出吾族兄仲素先生之門以是嘗徃來永樂十九年余奉命考禮部㑹試得銓喜景泰有子及銓爲御史亷正恭慎聲譽日起亦知其本之於父故扵表墓不辭按羅氏其先撫之宜黄人元初諱某為吉水州學録遂家吉水之南坊學録孫載可載可生佑軒佑軒生繼道景泰之考也景泰諱世亨洪武初尚少出㳺江淮時仲素先生謫居山陽清重有古道景泰從之學甚見愛重時未有室先生之深友四明范啟元爲人如先生有女擇所歸以先生之重景泰也遂歸之自是山陽士大夫率重景泰景泰扵書通其大義爲人温静坦夷而志恬退尚賢好禮賙貧䘏匱疾病死喪賴之者衆有祝願之者曰吾不能報公天必報公又曰顯不在公必在公嗣景泰聞而謝之曰凡吾所爲皆出心之所不能自己豈望報乎其與人交有誠閒居篤扵教子恒舉古人所爲可傳者勵之曰彼亦人也其可不自奮二子咸克卓立如父之志景泰卒扵某年某月某日春秋若干宣徳某年以銓貴贈文林郎福建道監察御史其配范謹於内徳贈孺人其子長釭次即銓孫男若干翰林編脩楊夀夫嘗為余言歲庚子偕賛善陳仲完考應天府鄉試燭下閱巻過夜分一巻去取未决困就寐髣髴睹人衣冠立燭影下遽寤因憶歐陽公朱衣事取巻再閲之歎曰幾失之矣拆名盖銓也言諸同列仲完曰果非偶然必其家有厚徳哉盖爲善者必有應古今竒應若此者非一吾故表之爲世勸故奉訓大夫右春坊右諭德兼翰林侍讀林君墓表君姓林氏林殷三仁之後晋黄門侍郎頴之子散騎常侍禄山為晋安太守卒于官子孫留居侯官遂世為侯官人而官譜不絶至宋理宗朝諱古松者為御醫院使再世至諱清通儒術生諱顓明象數之學生諱興以孝行稱于鄉而自清至興皆不仕興娶游氏宋名賢之後渉知書生君諱誌四五歳其母口授書一過輒能記誦不忘十歲日記千數百言十四五下筆爲文章不倍義理從學王孟揚孟揚竒之為盡底裏時數數出論辨見鋒鋩以折其老長孟揚曰此非所以求益也為字之曰尚黙即痛自克治羣居一語一笑不敢妄終其身不變而沈潜扵學涵浸渟蓄久而益富永樂辛夘福建鄉試壬辰禮部㑹試皆第一廷試第一甲第二人賜進士及第授翰林編脩承事郎癸巳車駕幸北京甲午召赴行在預編性理及四書五經大全書書成受賜賚陞文林郎丙申扈從南還預編歴代名臣奏議辛丑召赴北京陞脩撰授承務郎甲辰陞侍讀授承直郎考順天府鄉試未幾簡東宫官擢右春坊右諭徳授奉訓大夫仍兼侍讀洪熙元年賜誥贈其父奉訓大夫右春坊右諭徳兼翰林侍讀其母宜人封其妻宜人宣徳元年主應天府鄉試預脩兩朝實録未成尚黙得熱疾更數醫弗效數月卒尚黙善事父母父母病湯藥非親嘗不進既卒喪塟皆謹禮扵宗族篤恩意其學博究經史百氏及星歴醫卜之說咸得其要領爲古文務去陳言而刻厲深切得樊紹述歐陽行周之趣其學出孟揚與孟揚前後官翰林文名伯仲間然孟揚不若尚黙之謹静守約也從尚黙學者亦有出躋顕仕爲聞人如湖廣叅政黄澤浙江按察使林碩其表表者尚黙嘗自號見一居士又號所居曰蔀齋其卒以宣徳丁未五月二十四日享年五十其子男二雲瀚雲瀣女三黄叔敏程稔其壻也一尚㓜嗚呼以尚黙文學行義所遭際禄位可爲無憾雖不逮下夀然君子扵考論賢否不以此也獨念士習日下學者率騖僥倖一得其有能自力求實得扵已如尚黙者寡矣尚黙非今士流之卓然者哉余其㑹試時考官又同官翰林十餘年蓋悼惜之不已扵是王脩譔孟堅陳御史叔剛以雲瀚及孟堅所述事狀來請墓文遂為之表禮部儀制郎中史君墓表宣德二年春交阯之復叛也守帥奏請益兵朝廷命安逺侯柳升等將七萬人徃益之命兵部尚書李慶叅賛軍事且勑慶凡六卿之屬才且賢者舉以自助慶所舉十數人其最才且賢禮部儀制郎中史安祠祭主事陳鏞師行慶與同卧起九月入交阯賊扵官軍所經之處悉列柵以守升既連破之直抵鎮夷關升有矜色升雖勇然不好謀安鏞言扵慶曰總戎之意驕矣公宜力言之且夷賊譎詐不可以其屢敗忽之安知其不示弱以誘我况璽書數數戒飭謂賊專以設伏取勝不宜輕率待之公宜速入言之時慶已病强起與升力言升唯唯而已中實無戒慎意明日前進以數百騎獨先其副及慶等皆在後升前度橋既度橋遽壞後軍阻不得前賊伏兵四起升被創死明日慶病不起又明日副將崔聚整兵以進聚固宿將然倉猝賊驅象赴鬬衆亂聚被執冦大呼官軍降即不殺安鏞皆曰吾軰見危授命耳皆死之十月十八日也先是賊䧟昌江等城城中如都指揮李任指揮顧福知府劉子輔知州何忠等皆守節死交阯守帥知任等死事以聞皆得褒贈從升等死者守帥隔逺不明知不及聞時與安鏞同行親見其事後得脱歸者雖言之詳而有司以無官府上狀不可質故安等之節不得暴白扵朝此世之所共深惜而痛悼者也一時同死者如吏部主事李宗昉等盖多而安與鏞之事有聞者在慶左右也兩人皆進士發身最相得安字志静元宰相鎮陽王天澤之後今家江西豐城爲人謹重亷正雖職務填委好學不倦而䟽逹勤敏六卿争欲爲其屬尤見知於仁廟屢垂嘉奬死時年四十二鏞字叔振錢塘人重厚清介所履端確未甞一比匪人而勤扵學問三十年來余所識錢塘士人仕京師其所言所行表裏一由扵正者其惟叔振然知之者寡矣死年三十四志静之子取其父衣冠塟之請余爲表余數聞其死時事爲表之曰禮部郎中史君以忠死塟扵此其曾祖憲中元河南行省都事其祖文質洪武初富州吏目其父伯允贈禮部郎中其母甘氏封太宜人配熊氏封宜人其子男四人而附見主事陳君者史君之同寮友生同志而死同節者也贈奉議大夫太醫院使諡恭靖蔣公墓表永樂二十二年七月十一日太醫院判蔣用文卒扵北京初疾且革手自為啟附進上時在文華殿得啟駭愕親御寳翰遣中官問復有欲言用文強起拜命言臣所愧恨者不能報盛徳耳又爲書與其素所厚左春坊大學士楊士竒訣明日卒命兵部給驛舟還其喪遣中官督治祠墳後六日太宗皇帝賔天踰月上嗣大位明年改元洪熈之三月詔贈用文奉議大夫太醫院使特諡恭靖遣官賜祭而官其長子主善爲太醫院判主善以治命求墓文士竒與用文同事上扵春宫相知實深用文官太醫其所以受知于上者能隨事獻規益有問必正對以是甚見親厚而非専以醫也用文明當世之務其哀矜惻怛之意恒存扵中間與之言未甞不忠愛惓惓也上甞論保和之要對曰在養正氣耳正氣完邪氣無自入焉又問卿扵醫效率緩何也對曰善治者必固本急之恐傷其本聖人所以戒欲速也言關扵理道槩類此用文初入太醫院爲御醫永樂八年陞院判自是専侍文華殿其扵醫主李明之朱彦脩不執古方而究病所本自爲方故所治恒十全王公貴人下逮賤𨽻細氓有疾衆所難愈者謁用文多良愈如用文謂不可愈即無能愈者凡所愈報不報不計爲人恂恂醇厚恭謹有行義其自㓜以孝聞鄉里十餘歳能自樹立襲祖父業而用儒醫起家在京師所居近市闢一齋深䆳明爽題曰静學又治一齋公署左偏題曰緝熈圖籍充牣稍暇即齋中研玩讐校未嘗釋巻喜爲詩文遇名賢所製率自抄録蓋雖老學問不倦文人韻士過從者無虚日賔至必置酒或五行或七行吟咏為樂與人交表裏始終一致没之日無貴賤戚䟽咸嗟咨悼惜曰善人已矣享年七十有四蔣氏之先家魏州金國子助教曰安中以直諌顕泰和間其孫應茂徙揚州之儀真生夣雷元揚州路醫學教授生伯雝舉進士崇明州判洪武初用薦召爲史官以疾辭遂出爲蘭陽縣丞居官有惠政其配魏氏用文考妣也用文諱武生以字行娶王氏先卒子男四主善主敬主孝主忠皆醇謹克肖女一顧璣其壻也孫男女各二用文所著有静學齋稿若干巻治效方論若干巻嗚呼三代盛時王朝自公卿下暨百執事皆賢且材而各以其技能朝夕獻忠于王之左右惟王樂聞之而莫之違也故見諸其治爲盛後世非徒其臣之不能皆賢且材亦樂聞善于下者鮮矣其何怪夫治之不古若哉故用文志希古人亦必聖明在上有大舜樂善之誠有以來之矣至其身既沒德意不衰而愈隆益以見聖誠之至嗚呼雖不獨為蔣氏榮如蔣氏之後有能知其先所以致此而圖敬承之不隳者亦賢也矣故表諸墓而告之彭先生墓表泰和西郭月池里有兩彭先生曰叔介曰與和皆篤行君子也叔介先生嘗出而仕矣與和先生其從弟雖未仕而脩諸躬施諸其家其鄉者皆足以表物勵俗無愧乎古人叔介先生没士竒既表其墓與和先生没今十有六年未有表之者君子之善其可終泯乎月池彭氏故邑之望元濓溪書院教諭諱某生月溪䖏士諱某月溪生諱某先生之曾祖祖父也先生諱羣與和其字自㓜在祖父側熟其先世事即有志扵學以圖不墜稍長而孤遭元季連歲兵禍孑孑一身走四方以避亂定始歸而親戚死徙先廬焚蕩幾無以自容䘖悲茹苦謀所以植身承家者從鄉先生王子與學專志畢力不少懈退則就叔介相切䃺遂貫通諸經及子史百家安成劉雲章一覽所業甚見奬重篤倫誼世父沒久未塟舉其匶塟瀘源山中時山中多虎為民患廹暮假息道傍神祠祠故無扃鎻虎夜環祠聲虓然先生不爲動虎竟去人以為至誠之應聞同産姊兵掠在衡州即日徒歩走衡贖歸又走安成求得其孤姪以歸姪中道病死躬負屍行哭買地塟已乃行族弟死妻子貧不給恒分所有以濟居無餘貲而凡振窮周急雖數無厭倦意䖏朋友務相益與子弟及鄉人之子弟言必在扵孝友忠信接鄉里恂恂温温常掩過揚善故無少長賤貴皆愛敬之爲文章清婉典則有司甞奉詔舉賢又舉懷材抱徳皆以疾辭袁州龍泉學皆聘訓導將行復嘅然自念吾柰何違先人丘墓而忘吾子弟之教乎亦不果行蓋先生之學本諸聖人之經達夫性道之原而一言一行惟恐或盭古人至其教學者亦以此盖所自任者在此也嗚呼一郷有君子斯一郷有善俗文溪武山之域安得復有惇用古道如彭先生者以振起之哉先生卒于永樂丁亥五月某日享年六十有五初娶楊氏士竒從父彦中先生之女無子繼胡氏永陽名族生男子二人長百鍊永樂十三年進士為監察御史次百鈞業進士未試而卒孫男若干女若干今之知先生如士竒亦無幾人故表于墓又系之以詩云粤昔四民士以道貴徳全扵躬化被于世士習既遷世日以下沿流益逺鮮之反顧有其顧之倡而寡和士疇念茲曰予時過嗟若先生克篤念之褒衣博帶動由矩規鑽仰先哲以有于我亦時出之以遺来者嗚呼先生扵古是逑弗奮以騫弗閎以流我行於郷波蕩草靡不見先生永歎何已東里文集巻十六
