body:
  text: 東里續集巻十六明楊士竒撰跋恭題三朝賜誥命刻石後太宗文皇帝御天下二十有三年文臣皆未有得賜誥勅者惟永樂十年文臣得賜誥及封贈祖父母妻者尚書八人太子少師一人翰林則内閣之臣五人臣士竒亦與數焉盖時甚重之也仁宗昭皇帝初臨御循洪武之制文臣考最者悉賜誥勅封贈而首及輔臣時制草已定上親御宸翰於輔臣誥内増二語勿慮崇髙而難入勿以有所從違而或怠嗚呼明聖之心二帝三王之心也臣祗事三聖賜誥凡十有五通永樂四通洪熈十通宣徳一通臣士竒心恒愧悚駑鈍無庸不能效報萬分之一上有忝於榮命然不敢忽也謹繕寫刻石以永示子孫恭題仁廟賜勅及詩刻石後臣士竒始以翰林春坊兼職恭事仁宗皇帝於東宫至嗣寳位凡二十有二年以愚直特承恩遇愈久而愈加始終無間也嗚呼宫車逺矣每捧誦向所賜勅及詩感慟不已謹録侍從来北京後所被賜者刻石以傳前被賜者尚多先悉歸泰和寳藏當別刻之恭題宣廟賜勅刻石後宣宗皇帝在位十年以臣士竒先朝舊人而燭其愚誠信任禮遇不衰益盛所被宸翰之賜多矣悉識玉璽右二勅寵恩尤重嗚呼今鼎湖之駕不復時一啟玩無任追惟感慟之至謹繕寫先刻貞石遂恭識于下方恭題天恩巻後右臣士竒永樂八年五月十八日於文華殿陳情題本録副時太宗皇帝親征北邊仁宗皇帝監國南京中外政務悉聴令㫖裁處臣士竒以左春坊左諭徳兼翰林院侍講留輔導同母之弟羅京聞北京種田之令寓書告別士竒將行盖不得已具此啟陳情仁廟一再覽之以示吏部尚書兼詹事府詹事蹇義兵部尚書兼詹事府詹事金忠右春坊大學士兼翰林院侍讀黄淮曰士竒素無片語及私此當從之顧忠曰併永昌軍役亦免之即親灑寳翰題十九字於題本之後付給事中施行十九字即所得令㫖也又命忠速行永昌衞且令官給憲口糧脚力歸天地大徳士竒之不肖何以能報也既拜恩命遂辭口糧脚力之賜及部牒至永昌憲先數月卒衛即日發遣憲妻子男女五口歸泰和從京同居依先人之墳墓聚親戚于里閈優游恬嬉於無事之域盖未嘗一日忘朝廷保全之恩也京今嵗來省士竒於北京兄弟相對皆蒼顔白顚每論往事感激之至零涕無已京請録當時陳情題本以垂示羅氏子孫遂併志其槩嗚呼羅氏後世尚勉思力學務善持身保家以不忝朝廷之大徳於永逺哉恭題朱孔昜所受勅命後右宣徳二年翰林院編修臣朱孔昜所受勅命四道孔昜一道其父母妻各一道孔昜謹通録副以藏間屬臣士竒識於後臣記憶永樂初詔求四方善書士寫外制又詔簡其尢善者於翰林寫内制且出秘府古名人法書俾有暇益進所能於時孔昜兼工署書駸駸詹希元矩度風韻偉然傑出也一日上御右順門召孔昜書大善殿扁舉筆立就深荷嘉奬即日授中書舍人明日有㫖凡寫内制者皆授中書舍人盖善書授官自孔昜始後北京宫殿成禁扁皆孔昜書遂陞編修又五年始授此勅編修史官也勅文首末則當時通命史官之詞孔昜歴事四朝皆以法書被知遇受勅後無㡬陞春坊中允今雖老筆力愈勁蒼然嵗寒松柏也位之所進殆未可量綸章之褒亦殆未止於此乎謹拜手識于後云恭題謝庭循所授御製詩巻後昔我宣宗皇帝萬㡬之暇講論道徳之餘閒游藝書畫時非厚重端雅之士不得給事左右永嘉謝庭循獨見愛重恒侍燕閒盖庭循清謹有文毎承顧問必以正對尤精繪事每有所進必荷褒錫此巻其一也上素重官職不輕授未㡬進庭循五品為錦衣衞千户盖亦兼重其為人也今宫車逺矣庭循珍襲此巻甚謹以臣士竒宣徳舊臣間出示之臣拜稽瞻誦感慟歆艷并發於中有不能己焉嗟夫是賜也非庭循不能得亦非庭循不足以當猗歟盛矣若龍光寳氣上燭雲漢必有神物䕶持於永逺謝氏之榮豈有窮乎恭書御試策題後永樂十年三月上親策禮部會試所選士第其髙下而臣劉咸中第二甲四名賜進士出身臣咸欽拜恩榮欣艷遭遇既以所被賜策題裝潢為巻并附録所對文于後而屬臣士竒識之是嵗二月臣士竒等奉詔考㑹試既鎻院五日特命禮部尚書臣吕震諭之曰其務精擇必取實學庶㡬將来所用得人臣士竒欽承惟謹時天下士聚試者三千人得百人以進盖擇之精者也士獲預兹選固難矣至奉大對娓娓三千言皆中理道而預十人之選盖又難也咸可謂能言其所學矣然聞之非言之難行之惟難咸今有禄位為國家賛憲綱外藩必善推所學以事上莅下而仰副所用得人之盛意庶㡬上無負恩命下無忝科目臣士竒與聞聖諭謹拜手録載如前咸其顧念而懋敬之哉恭題蹇尚書所藏髙廟御書後右吏部尚書兼詹事府詹事臣蹇義為中書舍人時太祖髙皇帝為更今名親灑宸翰賜之者也又三十有二年臣士竒得拜觀焉天章昭回日華煥發散為慶雲龍騰鳯翥臣士竒忘其僭踰敢竊紬繹其說先儒朱熹釋義之言曰心之制事之宜此以謂隨所處而皆得乎其宜之道也盖在君為仁在父為慈在子為孝在臣為忠在朋友為信而與二帝三王之曰中曰仁曰敬曰誠實相表裏義之為用大矣哉臣義初繇進士擢中書舍人其可以任重而致逺者盖簡在上心久矣是時列官侍近者率一考再考輙陞遷以去獨臣義更三考歴十餘嵗不遷而眷顧之恩益盛豈非欲其朝夕左右以練達夫謨謀之精微政治之本末以為他日聖子神孫之所資乎自古帝王凡一命一令必為天下後世慮而欲付以重任者必授以要道臣義之所以名明聖之心其在於此乎其後臣義陞吏部侍郎皇上臨御之初簡任六卿即以為吏部尚書暨冊立皇太子慎選輔臣又命兼詹事府詹事車駕屢幸北京皆留以輔監國所以付託之至重矣而臣義明達政務秉恭攄誠知無不言言必適宜雍容簡肅於時倚重焉此誠出於皇上之明信而任之而必本於髙皇帝之明蚤識而預成之矣近世人主如宋太祖能蚤識張齊賢可為相既以遺太宗然必黜之於外俟太宗自用豈以誠待人之道觀髙皇帝於臣義之事嗚呼聖謨逺矣惟臣義欽承天寵所以圖惟克終光逺有耀者繼自今宜何如其至哉臣士竒與臣義同朝久且相知厚故願有所祝規焉恭題吕少卿欽和御製嘉禾詩韻後永樂初太宗皇帝閱中秘書得太祖皇帝所製嘉禾詩命刻石摹拓裝潢為軸賜諸王及京師三品以上文臣翰林近臣六人國子祭酒司業而止士竒時叨職内制亦預被賜凡當時被賜者皆獻歌頌賛揚太祖皇帝神功聖徳始終敬天之誠與太宗皇帝表章先志惓惓繼述之孝雖天地造化之妙有非繪畫所能彷彿其萬一然臣子至情固有不能自己者矣今獲睹大理左少卿吕升前為山西按察僉事時所擬恭和之作誦之再三盖同乎臣子至情之不能自己者也升文學篤實踐履端潔有忠君愛民之意盖士林所重云恭題馮敏所藏賜名御書後洪熈元年四月五日禮部進事狀上覽其後有主事馮智安名親御宸翰題其外易其名曰敏敏拜賜退以御書裝潢為巻間示士竒士竒謹拜手稽首觀畢為之言曰甚矣皇上之仁愛其臣也勵之所以成之成之盖有所望之也敏者勉焉力進如恐不及之意敏則事無往而弗成是以孔子教學者嘗曰敏於事又曰敏於行又曰敏則有功門弟子服膺師教而不敢忽也皆記之簡冊孔子之言本諸傅說盖為學問徳行事功而不能敏將有厭倦作輟之患或墮於無成聖人之所為深慮也皇上之訓又本諸孔子敏敬之哉天下之事有志則成無志則隳敏者所以遂其志也探驪珠於不測之淵一其志斯得之况立身行道者乎敏敬之哉今朝廷孜孜簡賢任能與圖化理敏亦日進顯用未已其何可弗加之敬以仰副聖天子之望敏竦然起曰不肖敢不蚤夜惕厲以求無忝於寵命惟是一時儕軰有尊君所賜名而不以呼者惟父之執其圖之士竒素往還馮氏父子之間又愛敏之能謹其操行而欲相成之於逺且大也忘其僣踰輙字之曰欽訓云恭題勅諭致仕官羅崇後右永樂二年正月十七日勅江都縣典史致仕臣羅崇一通臣崇既裝潢成巻又五年上廵幸北京詔吏部驛召天下致仕官暫任以政崇至得署麻城縣且行出此勅示臣士竒屬識一言臣士竒俯伏端誦仰惟皇上達孝推恩優禮耆舊聖徳隆盛而崇老退遭逢榮幸欣躍感激懐報當何如哉孔子曰君使臣以禮臣事君以忠忠者臣道之當然今皇上宵旰圖治孜孜焉安民之為急崇是行誠能精白一心以宣揚徳意恵撫其民使咸獲生遂庶㡬盡為臣以忠之義以不忝負此勅而寳藏之傳於子孫光輝烜赫其有窮乎崇尚懋敬之哉恭題賜本歐陽文忠公集後歐陽文忠公集在宋有數本惟周益公家所編刻者最精備此本近年新刻於春坊時東宫殿下監國之暇究心經史而凡歴代名臣奏疏悉取覽閱尤愛文忠議論切直文章淳雅遂命刻之板成詹事臣義臣忠諭徳臣士竒皆獲賜一本此臣士竒所得者也視益公本又精備矣總目年譜一冊居士集十冊外集七冊易童子問一冊外制一冊内制二冊四六三冊奏議五冊雜著述六冊集古録䟦尾四冊書簡三冊附録二冊總四十五冊恭題勅建太學碑後洪武十四年改建宣聖廟國子監雞鳴山之陽明年成翰林學士臣宋訥奉勅譔碑文鑄印局副使臣詹希元奉勅書并篆刻石在監中永樂十三年臣士竒始得此本惟我太祖髙皇帝惓惓敬禮先師興學育材舊時朝臣今在者歴歴能道其事此碑所載僅什之一二豈出於當時聖心謙抑而然乎故事惟翰林之臣散官署於其職之後訥此文獨署於職前殆不可曉恭題御製修孔子廟碑後此永樂十五年詔修曲阜孔子廟成上親製碑文賜之者也臣聞詔下之初數命所司必精潔必堅固毋或凟慢由是臣工欽承益謹久乃告成盖我國家聖聖相承於尊禮先師無所不用其極也此碑中書舍人臣朱孔昜奉勅書刻石此本衍聖公臣孔彦縉以贈臣士竒者謹識而珍藏之恭題蔣院判用文所得令諭後仁宗昭皇帝監國時賜太醫院判蔣用文宸翰用文之子主善裝潢成巻以士竒當時舊臣屬志一言盖聞之周詩曰於戲前王不忘此言先王盛徳在人而人思慕之愈久而不能忘也惟昭皇帝徳澤沾被天下天下之人傾心仰戴升遐之日萬方興哀如喪慈父而至于今追思感慕之不能已何也聖人之心夙夜孜孜唯奉天恤民而㡬務之餘禮賢延士從容顧問無非咨求治道詢察民隱而咨詢之博盖不止於輔弼之臣而左右侍從能正言以效禆益禮遇之厚始終不間此道德所以益崇恩澤所以益廣感人之心所以深且固也于時用文以儒醫事上敬慎小心燕閒奏對屢效忠益未嘗不嘉納焉而徳意久不衰此巻其臨終所被賜也用文既沒贈太醫院使賜諡恭靖又親為文祭之曰亦有嘉言以禆予治忠愛之懇簡在朕心遂詔有司治祠墳又命主善世其父之官非用文素效忠益其何以得此聖仁之心至矣哉於戲為君得賢臣易為臣得明主難如後之為臣知蔣氏當時之所䝉被而欽仰天徳思慕無已盖未有不興夫生晚後時之嘆於戲至矣謹拜手稽首志于後云恭題仁廟御書後永樂七年太宗皇帝初廵北京翰林修譔王直留侍仁宗皇帝監國與聞密務甚見奬重仁廟屢顧大臣論近侍賢而文者曰王直何可多得十一年直當扈從北京其後監國侍臣有不能了事者睿意未嘗不思直直父瓊州知府伯貞入見以直故恩意曲盡臣士竒時為春坊諭徳皆所目覩惟聖明知人而至仁如天有非言語所能彷彿於戲龍馭逺矣右宸翰四紙直所寳藏今裝潢為巻永示子孫以臣當時舊人屬志之其第二紙實臣奉命齎賜者追思往昔何勝愴然敬為之志恭題某給事中所藏勅書後皇上嗣統改元之第一勅所以誡諭中外文武之臣者諄切而著明矣皇上此心即天與祖宗之心也勅下至今六年中外之臣有能欽體上心致敬於奉法愛民而進其禄位者盖比比焉其或不能又縱私以厲民未有不遭罹斥黜然亦鮮矣以此見有道之世君子衆而小人寡且賞善罰惡之行至公也給事中臣某寳重兹勅裝潢為巻以朝夕覽閱而自勵其仰體聖心加切也某通才而敏識㢘慎而恭確其所進誠未可量臣士竒獲拜觀焉謹拜手稽首識于後以俟恭題被賜誥勅刻本與姪子弼臣士竒既刻石姪子弼適至遂拓本畀之使圖不忝云易㑹通易㑹通十四巻元番昜董貞卿季真輯五經先儒所論著者易最多而精義悉具此書至於經傳古今之辨先儒傳授之詳披巻瞭然可為易書集大成者也吾家所有者釐為六冊自吾授徒以来市書此最初得云易學啓䝉朱子易學啟䝉惟胡方平本最善洪武乙卯司倉伯罷官歸見余初讀易出一編以示曰孺子勉之易精藴具在此書即熟程朱傳義後宜熟此吾藏以待汝即胡氏啟䝉也無㡬為人竊取伯父不樂累日至形於詬詈余後出教童䝉始得此本追惟伯父所以拳拳於不肖恩徳為何如哉朱子易說右晦菴先生易說廿三巻分為三冊先生於易自本義啟䝉之外凡雜著及門人所記口授之言其精義皆在此書盖先生之孫鑑所㑹稡而學易之士所不可無者書傳纂疏右書傳纂疏六巻分三冊元新安陳櫟輯櫟字壽翁號定宇今讀書傳者率資此書及董鼎纂註吾外氏有書傳㑹通尤詳備而今學者多未及見余雖見之亦未及録也詩傳通釋詩傳通釋元安城劉瑾輯凡二十巻余家四冊其采録各經傳及諸儒所發要義又考求世次源流至明且備盖㑹通之書也吾家五經皆授徒以來所置盖余少時獨有易傳義及四書集註耳書詩禮經春秋左氏傳皆從人借録以讀既不易得書又日有衣食之累於心雖學不能得如意也後出授徒以至於今仕得禄衣食有餘輙以置書積久巻帙頗富而甫四十困於疾病氣日益衰目日益昏雖其志尚在而精力强勉不前不勝自憾也故學者必在勉之於少壯之時苟逸居温飽而不自力或有蚤衰如余者徒抱無及之嘆奚益哉春秋胡傳纂疏春秋胡傳纂疏三十巻元新安汪克寛輯余家十冊盖左氏公穀之外漢以下儒者說春秋甚多唯伊川程子為得聖人之㫖惟胡文定公實傳程子之學朱子曰文定春秋明天理正人心體用該貫有剛大正直之氣故近世治春秋者兼主左氏公穀文定四家三傳舊有註疏此書專主胡傳云春秋㑹通春秋㑹通廿四巻余家所藏者分為四冊吾郡安福李㢘先生所輯先生字行簡元至正壬午以是經舉擢陳祖仁榜第三甲進士官至贑州路信豐縣尹後遇冦亂戰敗守節死江西行省上其事屬南北道梗不能達故當時旌褒之澤不及國朝修元史時先生相知者無在當路有司又不知采録以聞故不得列諸史傳於是世之知先生益少矣夫士君子所為求安於其心而已豈計其在外者然先賢後學所取正也曷可泯而弗著哉今世所傳先生死事惟見於元江西廉訪使韓凖求贈諡咨文余近得於翰林庶吉士周忱家謹録置此書之後使後之學者知先生於春秋不徒能明之盖煒然於科目有光也春秋左傳二集二首吾友鄧存誠初舉進士時許恵此書未得也盖進士皆觀政諸司無暇相即而自是益契濶既為御史秩滿陞山東按察使又陞布政使歴十五年始以見納朋友不愆於信類此不可以忘故識之春秋左氏傳六十巻杜預註孔頴達䟽吾家此書十六冊盖福州府學板得於劉伯塤員外云春秋本末春秋仲尼因魯史之舊筆削之以著法戒春秋本末我太祖髙皇帝命儒臣因仲尼之舊彚稡之以便覽觀首天王以尊正統先中國而後夷狄義例甚精皆聖制也刻板在太學余家所藏廿冊得於廬陵晏彦文左傳博議東萊先生左傳博議考年譜乾道戊子成此書吾家一冊十五巻題曰精選則知其所著非止乎此也儀禮逸經此書刻板在北京國學彭士揚為典籍蒐閱崇文閣不完書板而此獨完即日印恵親友盖已廢棄六十餘年其顯晦固有時哉儀禮圖右儀禮二冊圖六冊陳嗣初博士所贈塾賔羅儀範為之㸃對録補云禮記集說二集二首禮記集說十六巻陳澔著吾家所藏者釐為三冊此書出於孔氏之徒而雜以吕不韋及戰國處士漢博士之言其㫖不能皆粹而錯簡亦多近世吳文正公澄著禮記纂言多所更定其篇次亦各以類從如曲禮内則少儀玉藻深衣月令王制文王世子明堂位九篇為通禮喪大記雜記喪服小記服問檀弓曽子問大傳間傳問喪三年問喪服四制十一篇為喪禮祭法郊特牲祭義祭統四篇為祭禮其通論凡十二篇析為五類禮運禮器經解為一類哀公問仲尼燕居孔子閒居為一類坊記表記緇衣為一類儒行為一類學記樂記為一類大學中庸剔出合語孟為四書投壺奔喪二篇歸之儀禮正經不雜於記冠禮昏義鄉飲酒義射義燕義聘義六篇皆所以釋儀禮者別輯為傳以附經後於是一書之中類分章別條理粲然誠不刋之典也臨川故有刻板兵後不存近聞吳司業徳潤家有此書方謀借録未及而厄於火遂不復得惜哉姑記所考定篇次於此以見大槩云此詹事府張録事教子舊書於初来北京無書始從借閱張君二部遂以此見遺凡三冊云永樂壬寅八月識是日上丁釋奠先師陪禮初退書禹貢傳註詳節書禹貢傳註詳節先友湖州府經歴郭慶宜先生刪節傳註為之以便記誦者也先生治書經嘗從元進士戴邁養髙講習其授受有自云五經旁注易書詩論孟旁注廬陵李省中先生作簡明切當便於初學先生名恕與龍麟洲劉水窓同軰行余識其從曽孫思益為沭陽縣教諭其家已不傳此書余所畜總六冊書坊板頗有闕誤古文孝經說右古文孝經說宋元祐中秘書省著作郎兼侍講范祖禹淳夫經筵所進書也今刻板在成都吾家一冊得之吉水黎教諭徳讓吳文正公考定孝經吳文正公考定孝經刻於新淦劉氏巻首有吾郡劉雲章先生敘此書盖因朱子刋誤而以古文今文校定之訓釋明切賢於舊註逺甚孝經經傳直解元延祐中錢天祐著孝經經傳直解盖以朱子刋誤為主其黜閨門章及合五刑章與上章為一則從草廬吳氏考定本此書當時已板行有翰林承㫖程文海敘洪武庚午冬余自武昌歸守風盤塘借録於隣舟上虞張肅急遽其直解不及録惟録其經傳如右云易主意易主意一冊元臨川鄉貢進士涂溍生著專為科舉設近年獨廬陵謝子方有之以教學者於是吾郡學易者皆資於此余少嘗録之後失之此本萬安訓導郭公承為余重録易義二集二首右易義一冊建寧趙友士以教其徒者趙故建寧經師余為審理時趙為伴讀往還相好也是編吳司業徳潤得之以見遺者右易義三冊初學所集者雖淺近無所發明而不倍理偶得之姑存之解季通易義元盛時吉水解氏治易有名江鄉間而觀我求我最著季通其兄弟也此編平正典實惜多闕文書卓躍書卓躍二冊元永豐陳雅言著專為科舉設今南昌有刻板余得之雅言之孫彞訓今為中書舍人詩解頥詩解頥四巻國朝文淵閣大學士朱善著南昌有刻板吾得之兵部侍郎盧淵凡二冊盧朱之同郡人東里續集巻十六
