body:
  text: 東里續集卷十八明楊士竒撰跋宋名臣言行録右宋名臣言行録七册今書坊本得之黃學士宗豫誦嘉言仰賢範樂余之得師也其間微有錯簡蓋傳刻之誤文公家禮右朱子家禮一册今士大夫家多遵用之間亦有置疑其間者余偶於朱季寧家得張南軒三家禮範後有武林應本中所識及家禮辨數條其論皆有理因録置于後云圖繪寶鑑此吳淞人所輯可謂博矣而世次殽亂可笑淞近年又有輯古今能書者為一編殽亂尤可笑後人作事多忽略莫甚於此又可慨也吳文正公外集目録有雜詩一卷而卷中無之蓋未刻云爾雅爾雅三卷古小學書初無深義世謂周公作非也朱子曰爾雅取傳注以作後人乃以雅正傳注吾家一册郭璞注經史動靜字音經史動靜字音蓋以便教幼學者然今南方學者多忽略不究余在武昌遇之張從善所故特録以歸時洪武甲戌嵗也又二十有五年月日識埤雅右埤雅二册總二十卷宋陸佃農師著其子宰為之序名埤雅者謂為爾雅之輔也贑舊有刻板既廢於兵今江西憲副林瑜行部過贑訪得之命工重刻於郡學此書於博物之學蓋有助焉小學集成古人小學之教不行於後世晦菴先生搜輯傳記以為此書有功於學者甚大建安何士信纂集諸家之説以為集成又有功於此書甚切蓋義理度數隨在著明不待以考求也讀小學者必不可無吾家所有共三册吉州進士録吉州進士録村民先生陳宗舜甫輯使邦人後進得以考見鄉郡前世文獻之盛而有所興起者此編不為無助蓋吾求之久未得近有傳至北京者永樂乙未曽本清赴會試遇之録此見遺惜其間姓名頗有錯誤蓋轉相傳寫所致也宋名臣言行類編舉要右宋名臣言行類編舉要一册余遊武昌時得之郭儼彥莊甫此書吾廬陵鍾堯俞編前後集總十六卷鍾自序云前集舉言行之體後集發言行之用始終皆有微意蓋取朱子所編及會要長編諸書所紀有益於世教者而類編之以為此書有足觀者堯俞咸淳四年以史館編校得旨赴殿進士出身崔豹古今注崔豹古今注一册三卷輿服都邑音樂鳥獸蟲魚草木雜注凡七篇豹晉人字正熊官至太傅丞此書蓋博物志之類有足觀者余得之曹冀成羣書考索羣書考索前後續别四集宋章如愚編此書後出纂録先儒論説精義特多故便益學者吾所畜十七册得之友人武昌鄧貞存誠册府元龜册府元龜宋真宗時楊億王欽若等奉詔類輯分五十部總一千卷此特詞臣部四卷耳余昔遊武昌得之蔣隱溪云吉水楊氏族譜後右吉水楊氏譜一册伯父吏部公手筆初公罷官家居篤志修宗譜時吉水族人有携至此譜者公録之將以備參考未幾竟謝世不及修嗚呼惜哉此譜亡弟仲陸所藏嵗久頗缺落因取綴葺之而志其後世説新語錢塘王羽儀之為禮官與余往還喜收書或嵗餘或數月不見相見輒有一書見贈蓋相知故也此集近代祀嵩嶽還所贈者羣書備數右羣書備數一册前翰林編修張美和輯臨江有刻板余得之庶吉士曽泉美和又嘗輯理學類編二書蓋皆資益小學者也木鍾集木鍾集一册朱子門人永嘉陳埴器之著余初得於江夏樊思齊子賢子賢遺余他書尚多後率為親友持去今獨存此集及韓文耳余弱冠至武昌逆旅與子賢居相接一見相好如平生時年已七十其少與郡人聶炳南昌包希魯交厚嘗親見虞揭歐陽原功許可用諸公其為學有要領治詩經評論古今人物及忖度事後當成敗皆有理而浮湛市㕓以賣書為業雖鄉人莫或知之者獨吳啓公佑時來就之然不知其意也頗喜作中州樂府以為馮海粟之豪俊張小山之精麗當兼而有之時有所作輒為余誦焉余一日效其體和數篇見之愀然不懌曰老夫豈以是望賢者又曰老夫過矣余甚愧焉自是不復與余言樂府矣可謂愛人以德者也未幾而別別未幾遂卒惜哉不肖駑劣既無副前輩之望獨其拳拳厚意至于今未始一日忽忘之也故因此書識余之情太平廣記右太平廣記一册自二百第七卷至第十卷所記書畫事蓋斷簡也此書得之武昌王玠道原道原本南昌修江人從軍在武昌為人落魄喜作詩頗與余往來余家尚有其詩數篇然極意道家之學亦有著述蓋其學不過言語文字之間非真有所修有所得也後以羸病卒卒至今未數年其徒張大之以為得道稱祖師畫像崇奉近有傳至京師者余不知其何以得此也事文類聚事文類聚六集總二百二十一卷前後續別四集宋祝穆和父編祝晦菴姻家子嘗及門矣新外二集富大用時可編皆載官制富不知何時人而元之官制皆具固知必後出此書以類聚名然其事及文世所共知者往往闕而不載何也吾家三十册得之山東李吉李嘗為吾邑大夫自警編右自警編刻板在蜀中分為五册余得之重慶教授彭孔修此書有益於人然余欲刪其重復而精擇之又欲博采諸史所載嘉言善行依此例而通類之皆未暇也仕學規範仕學規範四十卷宋張鎡時可編其目有六曰為學行已蒞官隂德作文作詩所録皆宋名賢時可與晦菴先生同時先生編宋名臣言行録此書嘗引用之蓋二書皆有益學者士大夫家不可闕吾家規範五册刻板在蜀得之黎教授德讓者也策場備要右策場備要元吉水解觀我先生輯先生名觀一字伯中邃於易諸子百氏無不該貫一日謁吳文正公適公與學者論厯法先生備舉先儒之説纎悉不遺而一斷以已意公駭曰伯中非今之學者因共講論三日而後巳然屢舉不第至正中修遼金宋三史歐陽楚文公揭文安公交薦之徵至論議不合竟去然其所嘗私録宋遼金事甚富朝廷得其書悉采用之惜乎其人國史無聞焉考古圖右考古圖二册并埤雅二册皆得之贑守王遂蓋其刻板皆在贑也五雲方尺右五雲方尺一册先伯父漁灌府君親録仲殷兄所藏仲殷兄歿余得之仲基兄冠婚喪祭前輩所重至於書簡必循守法度如此不如今人之草草也謹藏以示後人橘亭幽興集右橘亭幽興集一册集古棋法也友人鄧存誠數與余棋余不能勝存誠授余此集自是余頗勝存誠然僅勝存誠而巳耳未有以勝餘人也始余未習棋授官翰林晚退之暇或與光大相聚以此為嬉光大機悟頴敏駸駸有造詣余不能及也是時同官能棋者頗衆以所造深淺髙下各相為耦日彰仲益一耦也光大宗豫一耦也用行民則一耦也崇璧與果之用之與余又各自為耦希範不及果之而差勝余然喜持論議不屈日彰嘗戲余曰吾棋如坐十一層塔頂公之棋殆在百尺井底乎余曰公尚未及李憨子吾豈不勝林和靖哉仲熙曰既不能及李憨子亦何用勝和靖然仲熙棋猶下而篤好特過余數人者遇暇輒造用之及余或邀余兩人者就其家閉户以奕促婦具酒饌欵客余以疾戒飲則為粔籹代酒率常至暮或夜二鼓始散然仲熙未嘗一勝不勝未嘗不樂蓋好之而不留意得失者仲熙一人而已余嘗有詩嘲之云年中欲數輸棊日直自新正到嵗除時又有好之而不能者若思幼孜能之而不為者伯厚也夫叨職侍近荷國榮寵間暇不能及時進修以自見乃甘自棄若此且使後生小子視而效之廢學而敗德皆非小過然當國家太平之時吾徒職務之暇得以從容間肆適其情者皆上之所賜其安可忘乎故既自訟吾過又以志幸遇云革象新書考篇內此書蓋作於至元辛巳以後類林類林雜説十五卷類書中之瑣屑者頗有可觀蓋今人所輯刻板在北京國子監古文矜式古文矜式余年十六七館淘金袁氏孰中時借録於薌城張子震子震酷嗜積書語余云初未有此書以其家古錦琴囊易得之蓋世以為祕傳希有之書也然士竒既得之往往用示人有欲借録者輒畀之未嘗祕也其後所録本失之而嘗從余借録者又録此見遺是亦不閟之效也蓋書籍惟非其人則不可以借如其遇端人確士槩閟之而不借豈非過乎文章正宗三集三首文章正宗二十四卷吾家八册宋西山先生真文忠公輯其目有四曰辭命議論敘事詩賦文起左氏公穀止於韓栁詩起康衢擊壤止於李杜如文章雖闕而非明理切用源流之正者不與蓋前後集録文章未有謹嚴若此者學者用志於此斯識趣正而言不倍矣右文章正宗二十四卷凡七册今存五册欠卷一至卷八不完余客武昌時假館授徒有秦叟者以二子從叟耿介豁達賈書為業所畜有十餘年不售者以是坐貧數月束修無所入叟曰先生用書惟意所取也為取大學衍義及陶淵明詩叟以為廉指所從學十嵗子笑曰是兒初生時千錢所得耳余曰畜十年不當得萬錢乎叟曰先生自處厚奈何以薄處我余為再取文章正宗叟益以王維孟浩然韋應物詩孟韋詩皆舊刻特完叟復顧余笑曰此書亦靜極當動也余既以書去是夜秦鄰家火延秦書肆盡焚之明旦余往弔焉叟曰物成敗有定數先日而歸先生以獲全者亦數也余後携書在京師姪子相登第賜居崇禮坊一日就吾家取衍義一册正宗二册又取陶王孟韋詩及他書歸讀是夜鄰舍火延相家所畜書盡焚之於是余所得於秦叟者惟存此五册及衍義三册如相後一日持去不及於燬然思叟定數之言固非偶然哉劉士拯給事巡按交址留此見惠時余初至北京客窗書册甚少有惠書者即以為珍寶此集凡五册文選昭明文選六十卷唐六臣注於今學者得見漢魏以來文章獨賴此編之存刻板在太學吾家三十册初闕頗多蓋借録踰纍年歷十數家猶未能悉補也凡今書板多闕不獨此書而欲得一書有印裝補録之勞非朝夕所能成者置書之難如此如後之人有之而不知愛重亦獨何心韓文史漢之後文章大家必首稱韓栁余在武昌初得栁文於吳公佑而韓文未有也樊子賢先輩以此本遺余凡四册且為余誦先儒之言曰退之因攻文而見道周程既明道而發於文君子亦泝流求源耶抑自源徂流耶余甚感其意蓋三十年於今矣忽忽如昨日云者孔子曰四十五十而無聞不勝愧嘆也栁文栁文四册余至武昌與吳啓公佑往還時其家賈書籍以助日給因取此本見贈洪武巳巳嵗也又二十有五年三月朔識韓栁文韓栁文各三册得之建昌秀才黃卓韓文闕外集十卷栁文闕外集二卷附録一卷今書坊所行多如此其間用朱點抹者依謝疊山本墨點抹者羅通齋本通齋名泰廬陵人范德機嘗師之續文章正宗續文章正宗二十卷真文忠公輯其目有二曰論理曰敘事敘事之下各以類分之皆宋文也歐蘇曽王之作為多間有范希文李泰伯劉貢父曽肇及秦黃張朝數篇可謂精矣吾友尹彥璟每不滿其不載司馬溫公諫院題名記此論固當然太極圖説西銘易春秋傳序皆論理之大者而皆不録何耶豈尊之而不以混於文章家耶此書末卷有目而無文豈亦未成之書哉今刻板在太學吾家凡六册歐文書簡六一公五世孫伋知饒州日取周益公家歐文本重刻之余近見饒本比益公本增書簡五十餘篇豈伋所自得而增之歟因取録置各卷之後歐文外集歐文外集二十五卷二册録於翰林庶吉士楊勉前有年譜而行狀墓志祭文附録在後吾家此文及東坡文録者非一手又皆寡諳文理故多錯謬未得校正也不完韓文右不完韓文一册士竒年十二三侍家叔子言先生過水南段福可得之先生指其中批點語士竒曰此先主簿公手筆也而缺壞多矣遂取歸補完重裝蓋於今又四十年最為吾家舊書也蘇老泉文右老泉詩文三十餘首與用之同讀全集而擇之者也世之論文章家曰一代不數人一人不數篇觀於此可知其難矣二范文集友人監察御史王守真初為蘇州推官奏事京師胥晤因問郡之先賢其後今何如首云范氏子孫尚衆皆敦實非公事不入城府保藏先世文集刻板完具如新既共慨歎天道於仁人有後如此世之人鑒之而不為仁者其獨何心又從求得此集文正公文二册奏議一册年譜一册忠宣公文二册褒賢碑記等文一册總七册云蘇東坡文右蘇東坡六册録於胡祭酒若思蓋所録者東坡集起二十四卷至四十卷後集起八卷至十卷外集起二十五卷至九十卷奏疏內外制及詩皆未得録也曽南豐文南豐先生文録本四册起第九卷至五十卷録於金諭德幼孜闕前八卷詩未録先生之文所為可貴非獨文之工言於濂洛之學未著之先而往往相合亦由學之正也古之君子為文皆本於學學博矣又必貴乎正故先生之文與蘇氏雖皆傳於世而學則不可以槩論也黃山谷刀筆山谷先生刀筆一册余得之蘇州秀才蕭湘凡二十卷不獨書詞之工其論為學作文寫字皆有至理惜此夲鈔本缺折處多錯謬未得善本正之朱文公文集晦菴先生文集一百卷先生平昔於四書諸經史傳發先哲之精藴啓來學之聰明者其書多矣乃其餘力見諸文章其多又如此而皆至理之所寓也學士君子所不可無者吾家二十二册得諸楊庶子勉仁云吕東萊文東萊先生文集十五卷别集十六卷集録十卷外集五卷又有附録在後吾家八册得於中書舍人陳彞訓總題曰文集刻板在北京國子監所闕蓋四之一云栟櫚集栟櫚集者閩沙縣鄧肅志宏所著肅有傳在宋史初為大學生進花石詩諷徽宗被斥髙宗即位擢左正言數言國家大計又被斥觀其詩文可以想見其人吾家二册得諸肅邑人今吏科給事中陳山云録崇古文訣右録崇古文訣一册起韓退之毛頴傳訖錢君倚義田記不完書也前德安二守羅先生手筆先生為人整潔雖細微事及造次之頃必不苟嘗曰小事不敢茍則於大事亦不苟矣此編蓋避兵亂山谷中所録也録吳草廬文右録草廬先生文一册余得之晏彥文甫總敘録問答書説記序一百六十一首皆理致精粹後學所宜盡心者支言集右支言集元吳文正公草廬先生所著也刻板在衢州常山縣余得之金司直用誠自一卷至三十六卷凡三册元之盛際北有許文正公南有先生皆道學大儒其功在朝廷在學者表然重當時而垂後世文雖先生餘事然使後學得以窺見先生萬一而私淑焉者獨有賴於斯先生諸經皆有著述及支言集皆巳板行兵後散失其家所存惟支言集公五世孫瓘為常山丞能持身愛民欲重刻支言集而貧無資乃歸賣其家園田為之刻未畢坐事去官其巳刻者余所得是巳未刻尚多蓋碑志之類支言後集右草廬先生支言集自三十七卷至一百卷凡二册余續得之先生五世孫子常先生元大儒又先待制延祐甲寅鄊闈座主有通家之舊故余所至聞其後世輒願見之所遇如常山丞子宣如子常皆敦雅有行義不愧其世家而此集實子宣子常所協力而成之者也録虞學士文録虞學士文六册傳於周編修崇述家即韓克莊所刻本也世又有大字刻本歐陽圭齋為序者與此微異二刻皆不存今書坊本視余家所録缺三之一公以道學自重而今所傳者文耳讀者可以即此而窺彼也録揭文安公文四集四首揭文安公篤學清操為文章義正辭潔矩矱森嚴一代之望也嘗見公文集刻本有二考之皆為授經郎以前所作余家所録文二册傳於蔣立恭家比聞僧録司官溥洽有公文集十册詢之巳失其一所存九册其徒持歸四明不及得觀也右揭學士詩及頌表亦舊録於蔣立恭者今書坊所刻揭詩多此録所無宜補之未暇也元史揭公傳見公上太平政要四十九册而無其文凡余見公文集數本亦無之獨此本舊録於蔣立恭家者有固當為善本也右揭文安公曼碩文集十二册永樂丁酉録於朱中書李寧蓋得禮部郎中王儀之家藏刻本也凡五十卷而巳缺十三卷八卷至十四卷十八卷至二十一卷皆詩二十二卷賦四十卷題跋此十三卷所缺者余舊録本蓋間有之然此集詩文亦有目録雖有而卷內無者不知如何也黃文獻公文二集二首黃文獻公溍字晉卿金華人與先待制同登元延祐乙卯進士第此科得士最盛左右榜通五十六人其文行政治國史有傳者歐陽玄原功馬永古特祖常伯庸許有任可用張起巗夢臣于文傳壽道楊載仲𢎞公與先待制十數人也而兵後文集之存者惟公一人蓋亦門人之力余家六册得諸王杰文英公之鄊人云進士嶺南郭瑛為金華令能守身愛民民歸之如父母有古良吏之風焉其來京師也惠余文獻集及胡仲子文文獻先曽祖同年進士余所宜重矧郭令所惠乎栁待制文栁待制文集四册二十卷金華栁貫道傳所著道傳初受學金仁山而為文古雅辨博金華故文獻郡元之盛際道傳及黃晉卿先後而出與虞揭歐陽諸君子齊名可謂盛矣其文皆有刻板在郡學余皆得之文英初得晉卿文尚完道傳缺三之一耳至今未數年然聞晉卿文無復全書而道傳所存僅五之二惜哉此其邦之文獻固可知乎而亦豈獨金華為然劉申齋文劉申齋先生名嶽申字髙仲吾廬陵人元史有傳與先待制友善考家集先祖兄弟皆出其門此集一册余録於胡學士光大聞今吉水一士人家藏先生親筆文稿甚富欲求一見無由得造也蓋非獨其文髙古於吾郡故家文獻多可考也濂洛諸儒像濂洛二程紫陽四先生皆道統之正宗萬物之元氣孔孟以來至矣哉不可尚巳諸先生明聖人之精為之輔翼皆盛有功斯道者也紫陽先生贊辭備矣學者瞻仰德容涵泳贊辭蓋庶乎如及禮義之門而望見道德之堂也然所為不可尚與夫盛有功者具在成書學者不可即此以求至乎易曰知至至之余與克已雖老亦可以巳哉因拜觀此卷敬書于後余青陽文右余青陽文集一册得之鄉貢進士柯暹蓋近年安慶所刻附以事迹及傳誠當然何用以祭文挽詩贅其後也挽詩有惡謬者此編刻者之陋蓋又甚於南昌刻文山集也李雲陽文雲陽李祈别號祈字一初茶陵人元至順癸酉進士第二人官至儒學提舉元亡遂不仕此刻板在永新余近得之永嘉秀才徐𢎞道續潛溪文粹右續潛溪文粹二册多缺板本曹兾成家書借余而未歸者也對之每興山陽聞笛之歎覆瓿集覆瓿集誠意伯括蒼劉基著其家有刻板余所蓄三册得之黃學士宗豫劉之文不減宋潛溪而世獨稱宋者劉掩於功業耳郁離子郁離子一册括蒼劉基伯溫撰郁離以言其文也刻板在其家余得之前浙江布政司照磨王仲志胡仲子文胡仲子文刻板在金華吾家二册周紀善是修所惠者仲子名翰一字仲申與宋學士同門洪武初嘗預修元史其文粹深宋甚推重云貝清江集清江集者檇李貝瓊廷臣著瓊嘗師楊廉夫洪武初預修元史仕為國子助教以卒余家三册洪武乙亥得之其子楚府紀善季翔云蘇編修文蘇編修伯衡字平仲宋文定公之裔洪武初文名與宋潛溪伯仲間潛溪為學士嘗舉以自代此集刻於處州余家四册得之王景彰學士吳魯客文閩人吳魯客名海近時閩中之文以魯客為巨擘其徒王孟楊編刻以傳此册孟楊為翰林檢討時見贈者也鄭氏文集右浦江義門鄭氏文集總十二册翰林檢討叔美所惠其麟溪集二册載時賢詩文及譜圖規範藥房集五册隨菴集一册半軒集二册遂初齋集二册皆鄭氏先世之文義門鄭氏聞於四方久矣其纍世德行文章皆具於此可以考徵而規範之井然則治家者皆可以為法矣師山文集師山集者元歙人鄭玉著同郡程以文為之序朝廷嘗徵玉為待制以疾辭家居惟日著書為事國朝兵入徽州守將將要致之曰吾豈事二姓者明日具衣冠北面再拜自經死見元史忠義傳此集吾得之歐陽允和劉文霆集右劉文霆集文霆名聞安城人元天厯庚午進士官至沔陽知府文名重當時後以沔陽之節不完故不見稱於世今其家巳無嗣此集近年其外孫楊嗣慶所編刻余得之安城尹道沖山隂集山隂集者清江劉永之仲修著仲修治春秋學其詩文清麗古雅尤為當時所重工書法篆楷行草皆有師承嘗聞之長者始仲修既冠未知學因過婦翁同郡練伯升翁長子壻也蚤有文譽翁家特異視之而庸衆人視仲修即發憤歸就學窮日夜不懈親良師友講論切磋三年學業大進時譽更出伯叔右是以士貴乎立志也又聞仲修家富資賖貸施數郡仲修獨泊然布素日靜處一室書籍翰墨自娛客至不為盛饌酒數行論文賦詩焚香鳴琴而巳家事未嘗一留意非逢掖士未嘗一接言笑也可謂幽貞絶俗者矣此集吾得之右春坊中允吳君仲平甫云靜修文集大賢君子其身係國家之元氣斯文之命脈實天生之為世道計初非有出處之異也元之盛際許魯齋劉靜修其人焉魯齋勛業在朝廷在學者靜修不出而髙風清節與之齊駕蓋百世之師也靜修之書傳於今者惟此集學者豈可忽哉交州稿右元天台陳孚剛中交州稿一册蓋至元壬辰奉使安南所作有玉堂稿附在後士以氣為主有其志無其氣不能有為志與氣俱而不得乎命亦不能以有為也若剛中其亦不得於命者歟此集刻板在浙江余舊得之廬陵王仲志云朱文公年譜二集二首朱文公年譜一册刻板在徽州余得之翰林典籍陳壽朱子年譜永樂初元得之前江西僉憲吕升視新得者差明白元城先生語録右元城劉忠定公語録一册亦黎教授所贈者公之學得於司馬文正公橫浦先生序之的矣學者不可忽也穀軒稿後平生懶作詩文往往為親朋鄉人所強不得己應之前年王䆅鍾晢及康榮甥在京師各為取稿草録出數十篇遂綴作一帙而題其首曰穀軒稿既不復次第其作之嵗月其間多錯誤亦不及盡改也寄遺仲子使姑藏之耳崇古文訣樓迂齋選古文訣雖其去取自有意要之不若真西山文章正宗之精而粹也吾家四册市之於張侗中書之子金石例金石例十卷元侍講學士潘文僖公著纂輯古式及例至詳備文僖名昂霄字景梁號蒼崕先待制延祐乙卯廷試讀卷官其書固吾所當重惜此册得之湖廣僉憲王霖而出於吏人所録不整未有暇力更録也永樂丁酉九月一日識南北史李延壽撰南北史南起宋盡陳凡八十卷北起魏盡隋凡一百卷延壽唐史官為此書先儒多善之所少者於妖異謡讖頗繁猥然過舊史逺矣今刻板在福州府學吾家南史十五册北史十三册總二十八册得之歐陽允和者也吳彥直詩後此合浦令吳彥直謫居任丘臨終所作二詩一以寄朋友一念其子之在逺外皆天理民彛之正也余嘗聞翰林王侍講時彥道其為學與政蓋一時士大夫之賢者而屬纊之際其所言切而婉整而不亂如此尤足以見平生之所養彥直臨川文正公之曽孫也可為不辱者矣清類經星分野大略抄本右所録郡縣詳略不同者蓋以分野書與今刋行郡縣參對如全郡所轄州縣星域皆同則但書其目而欲知其詳則於刋行郡縣中考之如所轄州縣星域不同則明著其州某縣庶幾不紊蓋偶遇此書倉卒抄録不能詳整而為此簡便有暇當録過然聞南京太學有全書刻板必求史志靜印寄也永樂甲辰四月朔志東里續集卷十八
