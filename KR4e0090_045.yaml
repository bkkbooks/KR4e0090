body:
  text: 東里續集卷十七明楊士竒撰跋四書集注二集二首右四書集注其句讀旁抹之法兼取勉齋黃氏北山何氏魯齋王氏導江張氏諸本之長宣城張師曽為之參校加以音考蓋今最善本也刻板在常州府學此集六册永樂十年二月余奉命考會試常州府學教授金原祺時預同考余從求而得之者也其刋刻亦間有錯誤右四書集注三册刻板在鄞句讀一用黃勉齋法又有熊勿齋標題便於學者蓋善本也勉齋名幹字直卿朱門髙第勿齋名禾字去非受學進齋徐幾子與子與學於節齋蔡淵伯靜淵源之正如此此書吾得之春坊司諫周冕汝服蓋鄞人云四書輯釋四書輯釋倪士毅編朱子集注四書之後儒先君子著述推廣發明之者無慮十數家而今讀集注者獨資集成及此書為多他蓋不能悉得也集成博而雜不若此書多醇少疵也憶余少貧得書甚難十二三從里人劉文璧乞得論語輯釋半部蓋斷簡也寶之如拱璧後授徒武昌始得此本凡九册夫知吾少時得書之難其必知所愛重也大學中庸日録右大學中庸日録元吳文正公門人袁明善述其師授之旨而為之者也有文正公補大學第五章傳文此册吳司業德潤以見遺者孟子節文右孟子節文一册考翰林學士劉三吾題辭蓋三吾等奏請而為之者也總一百七十餘條此外惟課試不以命題科舉不以取士而已刻板在太學大學衍義三集三首宋儒真文忠公著此書所以備有天下國家者之法戒也為人主及其輔臣皆不可離此董子論春秋謂有國者及為臣者皆不可不知余此書亦云右大學衍義凡四册余授徒武昌時而得其末一册相姪以歸讀而厄於火今存三册藏之以俟補完宋真文忠公大學衍義四十三卷著述之意見公所上劄子及敘蓋其為書廣大精密綱目畢備有天下國家之任及為臣欲致其君於唐虞三代者必考之於斯焉四書管窺三集三首閩黃澤敷仲永樂壬辰余校文禮部時所選奏進士也而未嘗識之其佐外藩也嘗見其封事惓惓愛民之意卓然今之賢方嶽也今從吾友朱與言寄惠此本因併志其人云四書管窺四册永嘉史伯璿文璣著蓋出饒氏輯講何氏集成胡氏陳氏發明金氏考證許氏叢説倪氏輯釋之後其論諸家之失皆平正的確刻板在永嘉郡學吾得之黃宗豫學士聞黃州郡學近嘗刻此書不知何如也四書管窺舊刻板在永嘉葉琮洪武乙丑進士知黃州府又刋置府學吾友吉水周君公明為黃岡縣教諭從求而得之總五册二本余皆有之於是補闕正誤得互相資也理學類編二集二首此書及策要宋史略元史略皆刋板在清江退菴學士之壻袁鵬所惠清江三十年前老師宿儒多在獨梁張二先生有著述而其鄊又有好事者為刋刻以傳文物遺風故未泯也此編出於臨江張九韶先生而吳文正公之孫伯尚為之序蓋臨江有刻板使學者一覽而得夫天道性命之旨不為無助吾得此於恂如云十一經問對此書為小學設所謂十一經者書詩春秋儀禮周禮禮記論語孝經大學中庸孟子不及於易者非小學所及也孝經吳文正公校定此編及私録一册皆文正公之孫徐州判官子尚所寄惠者公之後以先世通家故皆與余往還所刻先世文字皆數見遺而子尚寄此未久遽聞其沒甚可惜也四書待問四書待問一册八卷元臨江蕭鎰南金編為科舉之學設也元場屋有四書疑問國初三科猶然洪武甲子始改為四書義此書余初習舉業時受之司倉伯今吾所畜書獨此最久也元程文四集四首右詩禮記春秋三經義雖斷簡然元前七科之文又選其精者也右元前八科程文不完獨有四書疑及易義一卷耳然具載當時程式可備稽考右元至正二年江浙江西湖廣三省鄉試及會試廷試選中之文而擇其佳者蓋元順帝嘗罷科舉至是始復云右延祐乙卯會試程文一册不完是編總十卷今存三卷首卷蒙古色目人答四書疑及策二卷三卷皆漢人南人答四書疑考之蓋當時選刻者先待制所答四書疑吾家兵後録本止存一篇此篇二篇皆在永樂乙未春吾得之天台張廷璧元延祐初科會試程文內左榜闕四名闕文更多錯誤尤甚蓋匆匆不及對過也策要此集退菴之壻所惠朱子語略余少則聞先生長者言學者日誦五經四書諸史外間暇宜玩朱子語類一日過水南假福可福可先待制侍史其家有語類二卷福可謂此楊氏故物即以歸我雖不完然始識此書喜持歸先宜人見之泣指所題簽帖語不肖曰小子敬之此汝父手筆也無幾先叔子超携入灌塘尹氏館中失焉自是所至求語類全書不可得此集二册特語略耳朱子門人楊與立編刻板在北京國子監永樂庚寅楊庶子扈從還以見遺所闕什一得鄒侍講本補録遂為完書總二十卷二千四百八十條凡學者明善誠身之方大要具是誠能身體力行之可以馴致乎古人然語類固學者不可少哉白虎通録白虎通一册洪武乙亥春余客武昌偕蔣隱溪父子遊東山得諸野人忠經忠經一册漢南郡太守馬融撰其篇義篇數皆依倣孝經鄭玄為之注蜀中有刻板余得之德讓云武經武經七書孫子吳子司馬法唐太宗李衛公問對尉繚子黃石公三略六韜是已吾家七書總一册獨孫子有魏武注得之江夏宋惟憲云説苑二集二首説苑二册余得之今大理寺丞鄒師顔聞刻板在四川視袁州本其優多矣説苑草卷漢劉向采傳記百家所載言行可為法戒者類録之為此書余家二册刻板在袁州訛闕蓋多得之友人宜春令蔡胄用嚴蔡操行潔清其在官市此書幾於李及之白集吾從而得之宜在所愛重也列子列子八篇古列禦冦書唐號沖虛真經宋加至德真旨道家其見寵於後世益久益重其為書栁子朱子論之至矣余家録本一册洪武庚午冬自武昌舟還阻風雪盤塘纍日無所為鄰舟人上虞張肅有此書遂借録之出一時草率後欲録過未暇也五子老莊荀揚文中世所謂五子然老莊道家荀揚文中皆儒家而未醇者吾家五子總七册道德經草廬先生注道德經一册余得之先生曽孫子常後世注是經者非一家要之此注為得老子本意雖老子之言儒者不取若所謂治國如烹小鮮佳兵不祥之類聖人復起不易其言也戰國䇿古戰國䇿婺人吳師道以鮑彪校注多謬誤而重為校正者也後世文章家以其先秦之言皆愛重之然有志於聖賢誠意正心之學者無取乎此也蘇州有刻板吾家四册得之吉水周敘小四書二集二首小學之教其廢久矣歙人朱升輯方逢辰名物蒙求程若庸性理字訓陳櫟歷代蒙求黃繼善史學提要為一編謂之小四書以教初學庶幾古人遺意其上及旁皆有注釋尤便於教者刻板今在婺源余得此册於婺源秀才汪樵此編永樂丁酉秋九月得之陳克永典籍敘古千文右胡致堂敘古千文嘗聞長老言先諭德五嵗侍先待制教讀此書已曉知大義洪武庚申余始求得此書於蕭尚魯所蓋生十有五年矣不肖頑鈍廢墜家學類如此後之人可以為戒也既得又三十五年為永樂甲午八月六日識太極解南軒張宣公太極解余録於廬陵清湖羅德崇先生先生名獻先待制同年寧都州判求師之從子少從遊先祖兄弟與先諭德相好為人狷介不茍合嘗為武昌府學訓導時余客武昌無日不辱見過所畜雖片簡尺牘無不辱惠教一日酌余江濵小樓醉留宿覺夜已二鼓起燒筍瀹茗論太極先生誦此解甚熟余時未有本也遂請録之明日就他處求本參對無一字誤因竊歎前輩讀書用功切實如此非後學所當師乎自余録此本至今二十有四年矣用志之以示後人朱子語録昔陳忠肅公每得明道先生文必冠帶而後讀然則讀此書者其可以不加敬哉楚辭二集二首楚辭出於忠臣愛君憂國惻怛之誠故先正以為三百篇之續此編余得之劉伯塤云余少貧無書間從人假借甚難得既壯頗置書而來借者輒不靳而楚辭借而不歸者凡五矣余前後所遇如此甚可嘆故志以戒史漢異同史漢異同廬陵劉會孟先生作欲知西漢文章之妙者必考於此蓋先生用功遷固最深前所未有此册不完德安二守羅先生手筆也資治通鑑釋文右資治通鑑釋文一册宋右宣義郎眉山史照見可著而天台胡三省通鑑音注有辨正其誤六百六十餘條此書余昔得之亡友陳一敬云史略釋文右史略釋文一册余在京師并史略二册皆得於鄰舍之罷官去者憶年十四五坐貧不得已出為村落童子師以謀奉養之計而急欲此編及十書直音是時二書市直百錢然不能得也家獨畜一牝雞數嵗矣先宜人命以易之今致書頗多而先宜人棄背已二十年不及見也嗚呼慟哉諸儒史評諸儒史評五册所選擇皆精確前大理寺丞山東耿通家書耿死其子盡賣家物為路費以歸此書其鄰之𨽻以五百文市之後余聞之益以五貫從𨽻得焉時書肆非十貫不可得夫有子不教之學問使賤書如此孰之過歟噫隋書右隋書詳節一册自一卷至十卷紀及十志耳後闕傳十卷洪武庚申余館山東蕭尚魯先生孰中得之者也通鑑續編右通鑑續編六册得之國子司業張智玄略余識張時已老矣洪武中嘗為禮部侍郎其少居江右最久猶及親炙亡宋老儒知當時事間與余言此書有謬妄處如載文天祥請為黃冠之類大不可信其説甚詳不及備載然此事本於宋史天祥傳史略二集二首宋進士吾郡曽先之編史略以便初學而大字刻本尤便於老者之目此板在國監吾家四册惜其間多錯誤耳史略二册書坊舊本永樂丁酉余在京師鄰家有罷官去者留以見遺蓋書坊新刻本多錯誤余家有國學大字本亦然皆不若此本錯誤差少也通鑑總類通鑑總類者宋沈樞編分一百七十一門總二十卷刻板在蘇州郡學余初得十二册於晏彥文而闕其八册吉水周功敘自蘇州為余印補遂為完書此書蕪雜不足觀而周伯溫以擬袁氏紀事本末過矣通鑑綱目書法通鑑綱目書法五十九卷六册吾得之國子司業張智玄略頗有缺折未補録此書吾郡永新劉水窗先生著先生諱友益字益友與龍麟洲李省中蕭芳洲同輩行其平生精力萃於此書揭文安公敘之曰其辭公羊穀梁其義春秋其志朱子蓋甚推重云通鑑綱目凡例通鑑綱目凡例十九類朱子所定讀綱目者必得此而後灼見古人精意之所寓今太學有刻板余家一册鄒仲熙侍講所惠又有鈔録汪克寬凡例考異在後元史節要元史節要者續曽先之史略以便初學耳又有元史略其體不同二書皆出臨江全史刻板今在太學通鑑綱目朱文公因司馬溫公資治通鑑別為義例作綱目五十九卷至矣哉其春秋之意也其條貫皆出文公而綴緝於諸門人之手間有異同或者亦鈔録傳刻之失乎吾居京師與給事中林從為鄰其出為陜州判官賣家具給行費余從市得此書凡十六册通鑑紀事本末通鑑紀事本末四十二册此書宋袁樞機仲編吾家文節公為之序凡四十二卷二百三十九事皆關涉大端始末畢具觀者便之吾居京師時市於晏彥文蓋吾授徒草餘年積其勤力僅得五經四書及唐人詩文數家而已子史皆從人借讀皇上龍飛之初擢官翰林俸賜有餘不敢妄費一以置書自是簡帙始富矣夫吾之後世知吾所畜書皆出上恩之所致其必能敬重而寶藏之也元史略元史略及節要皆出臨江體製不同如不得全史得二書兼看亦可知其大槩矣續宋編年資治通鑑續宋編年資治通鑑起太祖至欽宗十八卷禮部員外郎兼國史院編修官李燾著續宋中興編年資治通鑑起髙宗至寧宗十五卷户部架閣國史院檢討兼編修官劉時舉著宋季三朝政要起理宗至少帝五卷無編著人氏名二王本末一卷則取諸陳仲微所録總三十九卷吾家治為四册總題曰宋鑑此本節略已甚又多差誤蓋近年書坊翻刋文籍簡省率略多如此不獨此書亦可為人心風俗之一慨也晉書晉書百三十卷唐太宗命房玄齡等因舊史再加撰次紀傳論太宗御製之外其餘皆出顔師古孔頴達之徒志出于志寧之徒而天文律厯一出李淳風朱子極善其天文志吾家晉書草六册永樂乙未族人忠襄公九世孫東平知州之子民服舉進士在京師泊然無他嗜好惟志學問聞國監有書板悉資以求印余助之工力以此見贈云三國志三國志晉陳壽撰宋文帝以其過略命裴松之博采為之注後世以裴注過繁而合壽所書裁定之為一家者凡數人而皆未就葉水心曰壽蓋盡取為書矣注之所載皆壽所棄者且謂裁定者為輕議害事又曰壽髙處逼司馬遷而勝班固其重壽如此夫紀魏而傳蜀者葉固不能獨右壽也近世廬陵貢士蕭常正其名為續漢書起昭烈至少帝為紀魏吳皆為載紀而擇裴注之善者併書之蓋至當矣周益公為之序然其書今世學者少見也吾家三國志三十册刻板在太學前漢書班固撰前漢書十二帝紀八表十志七十列傳其八表及天文志固妹曹世叔妻昭之所成也世稱良史必曰遷固固才不及遷也若鄭夾漈譏固無學術專事剽竊斯論過甚矣哉余家二十五册國學印本後漢書范曄後漢書蓋刪取劉珍謝承薛瑩劉義慶等漢史為之然曄所成紀傳耳志未成伏誅後人取司馬彪所撰補之非曄撰也余家所藏四十七册國學印本史記史記百三十卷司馬子長才識髙邁文章疏蕩竒偉至於狀寫之妙超然獨出也朱子謂其粗率且疑史記當時未刪改脫稿吾郡劉申齋云史記初看甚有羡字羡句再看但覺好三看元無一字一句羡減一字一句即不佳豈求之篤者獨得之深耶吾家八册刻板在太學吾初印此書及文獻通考皆有闕板嵗餘弗克補録永樂二年友人湯如川曽與賢余學夔蕭省身獨孤樂善歐陽允俊登第後為庶吉士在翰林數就吾家借讀一日節假欣然來過取二書闕者共為補録及暮而畢其簽帖悉如川書也今如川與賢允俊不可作矣每覽手筆慨然興懷兩朝實録纂修始末右恭修兩朝實録始末一卷臣士竒所録敕下之初臣通率師往征交址叛冦不及預事事未半臣淮引疾去既就緒户部尚書臣陳山禮部尚書臣張瑛皆以兼學士職奉命預事凡歷六年始克成書表詞臣士竒所撰書奏恩旨甚厚命吏部敘勞進秩禮部宴賚於是論勞賜白金寶楮文綺鞍馬有差然自纂修以下至雜執事均進一官蓋吏部不復差別勞績也臣士竒謹志宣廟實録纂修始末右恭修宣宗皇帝實録本末蓋歷四年始克成書表詞臣直所撰既奏恩命加厚臣輔加號與祿臣士竒臣榮遷少師臣溥升少保臣直臣瑛升禮部左侍郎兼官悉如舊纂修皆升官一級凡主事御史評事皆入翰林餘參對催纂謄録等官皆升祿一級布衣士謄録者皆授試中書舍人賜白金寶楮文綺鞍馬有差皆上所親命不出有司秩乎有倫而不紊蓋軼於前矣用謹志之臣士竒謹志兩漢詔令二集二首右兩漢詔令三册刻板在太學張守初真人來京師以上清紙貺余曰少助書簡之用余素寡交雖有至親交者亦懶於作書而計其紙可印漢詔令一部遂託歐陽助教允賢成之此書是也每退朝閉户謝客坐南軒翠竹之下清風徐來獨取此書因其優柔深厚之詞以考夫寬大忠愛之意反復涵泳亦一快哉右兩漢詔令西漢十二卷宋吳郡林虙輯東漢十一卷四明劉昉輯元蘇天爵合為一書又取洪咨夔兩漢詔令總論冠諸卷首洪亦嘗輯此書而今不傳余家三册頗有脫誤誤者多就考正脫者雖補録未完也楊鐵崖三史正統辨前年病中有遺豫此編者不記其人其間多闕誤頗為正之蓋吾舊有貝廷臣著鐵崖傳載此文差詳辨末云私著其説以俟千載之君子而傳云欲獻不果此編又有表表謬誤尤多不知果何如也歷代大統易見右歷代大統易見一册舊録於王詢謨不知何人編王云在臨江邂逅録之比年於內府見有進此書者亦不記為誰作也宋史略永樂甲辰十月甲子淦人袁鵬惠此書朴學齋志文獻通考文獻通考三百四十八卷宋相馬廷鸞之子端臨所輯間有復出刪治未盡然立體正大載事詳核有益實用非其他類書之比蓋類書如册府元龜太平御覽猶或傷於泛濫不切或雜於怪異不經况其下者通考刻板在太學吾家所有凡四十册郊社考一册嘗為行儉借去而厄於火欲印補更數嵗未暇一日過沈民則修撰見有斷簡數册則此書也郊社考在焉紙板視吾家所有無二遂乞補之亦竒遇哉玉海玉海二百四卷分為六十七册又有六經天文編一册周易鄭注周書王會詩考共一册詩地理考一册踐阼篇漢制考共一册漢藝文志考證一册通鑑答問二册通鑑地理通釋三册急就篇二册姓氏急就篇一册小學紺珠四册總八十四册此書皆宋王應麟輯刻板在太學玉海本為應博學宏辭者設而其孫云未脫稿豈亦未成之書耶頗聞松江府學亦有刻板稽古定制右稽古定制一册我太祖髙皇帝命儒臣考唐宋制度酌其中示法於民者也孔子曰安上治民莫善於禮又曰君子以辨上下定民志惟禮制行而後民志定故聖人之為天下國家者必重焉永樂癸未臣士竒在京師始遇此書謹録而識之賜諡録余客武昌時遇宋賜諡編於湖廣參議吳文家既借録之余又嘗集録唐及元所賜諡遂合為一編總曰賜諡録然有私諡者亦頗附載焉通典通典唐宰相杜佑著蓋因劉秩政典三十五篇之舊而廣之又參以新禮凡二百篇分食貨選舉職官禮樂刑法州郡邊防八門今少見全書士大夫家所有者皆節本余家四册近年書坊新刋蓋又節矣官制沿革右録官制沿革一册先師海桑陳先生家書也其中有先生手筆士竒少孤貧先生以先考妣故召而教之年十二三習舉子業而於古官制不能知也遂豫此書蓋於此書今四十年矣手澤宛然於乎痛哉謹識方輿勝覽方輿勝覽三卷不著編次者氏名蓋元之人作也時又有輿地要覽二書皆出一統志互有詳略而要覽尤簡又不載沿革今書坊皆有之吾家獨有勝覽三册其末卷尾題曰大明者後之人改之也西昌志右西昌志宋淳熙三年知縣事陳秀實命貢士嚴萬全倪求已會稡為之者也淳熙至今二百四十三年未有繼作豈非鄊邑欠事此集劉仲兼梁叔莊共録以寄余者蓋以余嘗有志乎此姑識而藏之桂林郡志右桂林郡志四册凡三十卷歐陽允和以見遺者而闕二卷桂林舊有志洪武中教授陳璉因而續之其間論夷獠則必載昔人制馭之説論瘴癘則詳列昔人治療之方仁者之用心也璉字廷器今守滁州有惠政民甚戴之聞亦修滁陽志然余未及見也茆山志右茆山志二册太子少師姚公所惠其編刻皆不苟西域記右西域記一册吏部郎中吾郡陳誠子魯著子魯永樂十一年奉使西域所歷哈密和卓巴實伯里哈里賽瑪爾堪諸畨之地凡往復踰二嵗而留哈里最久故特記之詳焉子魯又為余言諸畨風俗大抵與哈里相似云契丹志右契丹志一册不完忘所自得但記洪武辛酉假館淘金袁氏同薌城張子震觀此書作詩寓慨歎之意於今三十有七年雖斷簡不失也蓋余平生於古書遺文雖殘缺不完未嘗不保愛之吉安府志右吉安府志一册蓋余與錢檢討習禮在京師同有志斯事遂以所有鄊郡舊志及於前輩文集中采録近事而附益之未幾習禮被召赴北京而余亦以公務無暇此所録者如城郭官府之類於郡中頗詳未及諸邑餘諸類亦皆未就也獨科目一類後得陳村民先生吉州進士録補之諸邑皆備云東里續集卷十七
