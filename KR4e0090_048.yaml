body:
  text: 東里續集卷二十明揚士竒撰跋衛生寶鑑東垣李氏之徒羅謙甫輯衛生寶鑑草四卷內藥誤三卷名方十七卷藥象一卷醫驗三卷末附補遺一卷論傷寒中暑則後人所述此書精粹明備家不可以闕者吳中陳有戒寄惠此本故識而藏之用藥真珠囊詩淡菴楊公志仁君子也其事上以周孔之道而愛民為心嘗坐纍訟繫間暇無所用意則著此書蓋甚有益學者昔文王演易羑里陸宣公謫居著方書聖賢處憂患未嘗忘及人皆同此心吾觀此書益重居位食祿之愧拔萃方右拔萃方十九卷自針經節要至雜方通十九類元杜思敬集潔古東垣一𣲖傳授以成此編君子論潔古醫家之王道謂扶護元氣為要也此編固在所重哉吾家市於書肆析為四册云小兒醫方一集二首此書專為小兒醫設凡四卷首卷陳氏痘疹方論後三卷皆錢氏藥證吾所得者蓋斷簡錢氏之説具存陳氏所述但存目録耳遂求諸醫家録補于後然嘗見朱丹溪格致餘論極言二家得失蓋謂錢氏之書備源流經絡明表裏虛實陳其活法使人觸類長之可為無窮之用陳氏多用燥熱間有偶中之效不思一偏之失故著論以為世戒吾既得此書遂附載朱説以告慈幼者錢陳皆治小兒錢氏不持議論而用藥至當陳氏論議雖好而用藥多誤人此編閻氏論治傷寒醫家所不取用藥者皆當知之湯液本草二集二首此本比後録於盛御醫者脫誤多矣宜對過增入亦有此本有之而盛本無之者皆當參對此本録於盛御醫勝於舊所録者多矣然二本互有詳略皆當參對增入舊録本有丹溪本草衍義補遺宜録於此此本雖無丹溪補遺然各條下間引丹溪之論又補遺中所未載者東垣內外傷辨右東垣內外傷辨蘇州有刻板王守真得之以見惠者韓明善序云其説本內經而補仲景之缺蓋為醫者於究素問難經及越人長沙諸家之書之餘宜必考於此東垣用藥真珠囊古之良醫師審病之源明藥之用故臨病制方百發百中後世淺陋之醫二者皆不能通如之何其有濟也此書嘉惠後人其功博矣刻板在蘇州余亦得之守真御史東垣試效方余患後疾歷數年更五六醫皆不效而愈劇最後求治於蔣院判用文遂豫秦芁白术圓未竟一劑頓愈既而併授此方曰此東垣試效方中所出也又從俞嘉言求得此書用之頗通醫理見余此書甚喜以試無不效者蓋得其論議之精故也世之庸醫不能究病之源不知醫之理守古方而不通愈差而愈逺夫豈無所自哉朱氏三書右格致餘論局方發揮丹溪醫按三書皆金華朱震亨彥修著彥修儒者同郡許益之髙弟有窮理之功於醫得傳授之正故所論極精所治多竒效其書近惟兩浙為醫者多用之然率祕之永樂乙未東宫殿下命刋印以賜中外廣仁恩也余時侍經幄最初得賜云醫書右醫書二册有外科濟隂勞損胎産驚風瘡疹急救諸科胎産方屢試之屢效急救尤為切用逺鄉僻地猝然有急患不得醫藥誠得此亦可少濟也刻板在朝天宫袖珍方袖珍方四册余初至京師時得之鄧尚忠長史分門别類古方無所不有茍不明隂陽表裏虛實不諳脈證而惟執此則非徒無益固將有失焉覽者不可以易也三元延壽書右三元延壽書朝天宫有刻板其間論清心寡欲飲食避忌之類皆民生日用不可無者吾得之劉淵然云外科雜方右外科雜方録於宗豫學士云皆經驗者後有從余録之以試亦往往有驗外科精要吾家舊有江陵十書內外科精義及此書於論外科之理及揭示治法至精且備不可忽也祕傳證治類方此册及證治要訣皆得之御史陳嶷陳云戴原禮所輯雖未有考然論證集方秩秩具有條理五運時行證治録番昜胡秉常間暇過余相與論五運時行受病脈證治法厥有造詣他日特書見遺故志而藏之眼科源流一集一首吾少時目覩孟堅兄以醫眼往來龍泉萬安二邑皆神其術迎致無虛月嘗問其所從授蓋此書也且語余云亦在熟之而巳近得之因識其説近時醫家書刻板多廢往往出於庸人孺子之所抄録其謬誤不可勝言殊可慨也衛生易簡方此方禮部尚書胡源潔所輯於醫家所用靡或不備仁民之心可謂溥矣夫醫必究素難長沙諸書為本而參之近代潔古東垣丹溪之論雖不中不遠此編極多良方如不識病源不明藥性未可輕用海底眼右王鼒易卦海底眼附以何侁四言獨步專用五行盛衰生尅制化論事之吉凶休咎頗為有理視世俗雜以神煞論者遠矣書法正宗右書法正宗一册士竒少時舅氏白水縣丞陳孔立先生出以見教者也先生教人學書必謹法度曰不精真楷不可以趨行草然先生為人卓犖不羈翛然繩檢之外平生未嘗作楷書而行書特佳士竒嘗以質焉先生笑曰汝但為魯男子不用説栁下惠也雖一時戲言要之至理不外是也謾志於此書法三昧書法三昧余初録於陸伴讀既以與諸姪此本重録於朱舍人家余少未嘗學書及與陸往還得盡窺其家所蓄書法甚富陸與余厚又為余言其意頗悉也余雖知之嘗習之而訖於無成東坡云內外不一心手不相應不學之過非余之病乎曾南豐論羲之書亦精力所致非天成也蓋凡藝雖有法非熟之則不精獨書學哉陸名闓字伯陽高郵人朱名古字季寧昆山人皆有能書名宋劉次莊法帖釋文右宋劉次莊法帖釋文附以陳與義刋誤余初録於武昌尹千户蓋童子所寫草草來京師重録之尹名升余客武昌時已七十餘致仕間居與余厚其為人慷慨豁逹有俠氣好草書明四聲等字之學自著書已板行喜賔客尤喜接儒者所居直黃鶴樓之北靣大别山江漢會其前鸚鵡洲帶其左治隙地數十畝為園池作小亭其中雜植四時花卉爛然不絶而山川隂晴朝莫之景出於亭下者一望可數百里實據武昌勝處亭中嘉客無虛日余亦數日輒一往醉其間然自余去武昌尹亦往雷州以卒其地遂廢因謾識此併及其人云法書考元盛熙明作法書考八卷首卷評品古書二卷述創字源流亦間及作字之法三卷至七卷皆論書法末卷附印章虞揭歐陽皆為之序學書者資於此亦庶幾可以有得余録於中書舍人南昌陳古訓書史會要書史會要松江陶九成編蓋鈔録史傳及百家雜記所藏善書之人而為之者也其書無足取至纂述近事尤謬獨書法一卷稍便初學耳此編廬陵王守真松江還以見遺者碑目中書舍人陳登思孝好聚古今石刻遍求博訪志其所出之處以成此編余與用之皆録一本按此而索之亦屢有得惜乎其未能悉也玉篇玉篇一册考其圖書云周陽侯世家蓋吾族兄孟堅之書余得之賔畿弟賔畿得之蕭子英子英孟堅內弟也孟堅多蓄書既死無子故遺書無為保藏悉散落不存嘗誦劉長卿生子詩且免琴書與别人之句竊以為無後者之慨然今世儒之家子孫不肖往往取先人書籍及所為文章博易所好甚者用易酒食視棄之如棄土苴以陷於不孝而為人所僇笑者吾見之多矣如此亦何貴乎其有後哉廣韻廣韻一册洪武庚午余市之其直五百文既為友人持去後十年復市之其直亦然凡今生民日用之物歷十年之久率增直十數倍獨書無所增豈售書者其操心獨亷哉抑好而求之者寡雖欲增而不能耶北溪字義此書陳北溪先生著先生名淳字安卿朱文公高弟也近劉伯塤貟外自閩歸惠余二本遂以一寄稷子蓋聖賢教人必先明理理明而後在我者有所持循而行之不差此編皆理之大而要者初學誠能熟復深究則本源端正無復有疑於其所行矣韻會歐陽永和在閩中寄惠此書凡五册於讀書為文其助益多矣王介甫云人間暇不若看韻書其有以哉洪武正韻洪武正韻我太祖皇帝命儒臣刊定之書一洗江左以來千載拘僻之陋而復諸古盛哉刻板在太學吾家所有總四册五音集韻右五音集韻三册禮部侍郎髙密儀公所惠此書出北方學者不獨於音韻易正亦可以多識字漢雋漢雋十卷天台林鉞著雋以喻其味也刻本在象山縣學余得之左司直郎王子沂翰林要訣真書非古鍾王以後上下率用之然亦有法昧者不能造其至陳繹曾述此所謂法也得其法茍非積功之熟亦徒然已曾子固言羲之所能亦精力自致非天成也一藝之學猶必知行兩盡况從事古聖賢之學者哉吾得此編不欲閟故識此語以示來學文選雙字宋蘇易簡為此編易簡一代名人而用志於此荆公選唐百家詩已而嘆曰費日力於此蓋愧辭云况此編哉史志靜得此以見示其之南京也恐纍行李遂留於余家蘭亭樂毅二體二首此蘭亭石刻在蜀或云義門鄭楷所刻余得之姑蘇劉紹蓋趙松雪所臨者古人行書惟羲之此帖第一然學書者必工楷而後可以及行而松雪所臨羲之楷書又樂毅第一故附此於後右蘭亭刻板在蜀或云蜀府伴讀浦江鄭楷家所刻余得之行人劉紹蓋趙松雪所臨者視北京臨本筆氣微勝又得北京樂毅帖於錢習禮檢討亦松雪臨者頗佳遂附於後云絳帖此帖得之定國徐公宜珍襲之不完絳帖右不完絳帖數紙洪武庚午在武昌旅邸得於鄰舍弊篋中紙墨已甚昏爛不忍棄也表為一卷視泉汝蓋遠過之隂符經隂符此刻在蜀府余得於本之書法清婉遒麗本之云相傳為虞永興書余以為宋人書豈蔡忠惠之筆乎當求識者而質之元瑞鶴記右瑞鶴記元吳文正公撰虞文靖公書秦定二年所刻今在北京余得之謝靖真寺丞吳公此文甚佳而虞公之書溫麗典則亦足以師表後進也漢廬江太守范君碑此碑得之大理寺丞孫時未有碑額其前後及下皆缺姓氏名字紀年皆不見陳思孝云漢廬江太守范式碑也然碑云為侍御史冀州刺史亦皆不見於史傳或者史之略也碑在今濟寧州學斷裂多矣夾漈鄭漁仲定為蔡雍書漢碑至今雖斷裂訛缺其僅有者無不佳如此碑尤為難得也漢修孔子廟器碑隂右漢韓勑修孔子廟器碑隂具載修廟人出錢之數不盡者又載於碑之兩側出錢或二百三百或五百有至於三千者而不以所出多寡為先後亦見古人所重不在乎是也漢郎中鄭固碑右漢郎中鄭君碑君諱固字伯堅此碑今在濟寧學中余得之給事中趙惟恭此碑前後無年月其中云延熹元年拜某官又云年四十二則知為桓靈時所建也但文字磨滅特甚歐陽公集古録跋尾猶載其中數語今多漫滅不見也漢司隸校尉忠惠魯君碑右漢司𨽻校尉忠惠魯君碑君諱峻字仲嚴忠惠其諡也碑在今濟寧州學鄭夾漈定為蔡雍書碑已斷為二文字磨滅不可讀者殆四之一此本得之大理孫寺丞漢封龍山碑右封龍山碑在元氏縣漢延熹七年至今千二百餘年石刻雖頗剝蝕而文字尚可尋究碑首云封龍山者北嶽之英也此本得之劉智安主事道因法師碑唐道因法師碑中臺司藩大夫李儼撰蘭臺郎騎都尉歐陽通書通率更令詢之子書法出家學矩矱森嚴意度飄逸但少含蓄之趣耳玄祕塔銘右唐大達法師玄祕塔銘裴休文栁公權書石刻在西安府學會昌元年所建唐法書家前有歐虞褚薛後有顔栁而栁所論心正則筆正雖一時格君之言要為書法第一義也多寶塔碑銘顔魯公書多寶佛塔碑亦在西安府學視他碑特完好雖書法至顔栁晉人之風幾盡然公書端方剛徑凛然忠義之氣故為世所貴而學書者必合公真行觀之乃得其妙趣八關齋碑右八關齋碑顔魯公書唐河南節度使田神功寢疾宋州刺史徐向等為禳祈報恩者也唐書神功傳亦概見其事碑在今歸德州城外僧寺中永樂丁酉秋進士尹崇髙奉使河南為余致此本而每行下缺四字蓋打碑時為夏潦所淹也元文敏公墓志右元翰林學士元文敏公墓志中丞馬文貞公文學士虞文靖公書并篆文敏先待制延祐乙卯座主文貞為同年而文靖相交處尤深此帖余得之陳中書彝訓宜珍襲也永樂中視學碑後視學之明日國子監官上表謝各賜衣一襲遂賜羣臣宴又明日羣臣請刻碑太學晉平西將軍周府君碑右晉平西將軍孝侯周府君碑陸士衡文王逸少書刻石在今常州宜興縣府君諱處義興人義興今宜興也碑後題云唐元和六年義興縣令陳從諌重樹琅琊承仕榮鐫蓋此碑至唐再翻刻也嶽麓寺碑二帖二首右嶽麓寺碑得諸禮部侍郎胡濙余晚喜北海書最後得此而凡前之所得者皆不及也近於中書舍人劉素家見北海秦望山法華寺碑溫潤清麗蓋又特出也法華故在紹興府寺及碑皆久燬甚可惜也嶽麓寺碑李雍書石刻在長沙余前後所得十數本皆紙墨糊塗甚至不可辨識蓋打碑必得善工而湖湘善工尤難遇長沙同知李吉特為余致此本故視前所得差勝也雲麾將軍碑李北海雲麾將軍碑永樂丙申用之在北京以寄余者此碑出良鄉縣北海所書有兩雲麾將軍碑其一在陜西陜西者李思訓良鄉李秀也陜西者書法差勝然余畜北海書獨此及嶽麓寺碑耳其紙墨又此碑差勝也羅池廟迎享送神詩右東坡書羅池廟迎享送神詩筆意甚佳然較沈傳師所書碑不同者十數字當以栁碑為正亦得之長吾云陶隱君茅山帖右華陽陶隱君茅山帖後有廬山曹士冕跋顔魯公大駕帖米南宫露筋碑文字皆完皆行書之佳者又有南唐李後主行書望故園賦略米南宫題十字在後疑皆士冕家所刻者余客武昌時得之湖廣參議吳文家四體千文右周伯溫四體千文刻板在鄱陽中書舍人朱季寧仲子為樂平教官以見貺者也蘇州舊亦有刻板視此頗勝元之工篆書者多矣伯溫最用功其作字結體蓋出泰山李斯舊碑其著書發明斯義有説文字原六書正訛云九成宫醴泉銘右唐歐陽率更書九成宫醴泉銘石刻在西安府麟遊縣缺蝕多矣凡余平生所得數十餘本此本得於給事中毗陵胡源潔紙墨特勝故獨存也哀册文褚河南書太宗哀册文舊得之先友登州教授郭敬守先生書家論古名賢遺迹河南傳世之佳者三龕碑兒寬贊及此帖耳三龕碑未得見嘗見會稽鄧宗經有兒贊墨迹真妙絶此帖亦今世所罕見者余家諸帖此當為冠手植檜贊右孔聖手植檜贊宋米芾撰并書碑在孔林余得之衍聖公彥縉陸伯易常為余言宋人書米為優而余家米書獨此與露筋碑為優云同知崑山州事楊公墓碑後右元同知崑山州事楊公墓碑歐陽原功文楊友直書虞伯生篆崑山諱學文字節文吏部侍郎贑州路總管諱孖之子廬陵及安成之楊同出靖恭坊此云皆祭酒膳之後蓋與揭曼碩忠節祠記同一誤耳詳見余忠節祠記跋尾此碑及祠記皆東平州守季琛先生所惠先生忠襄之世也漢泰山都尉孔君碑右漢泰山都尉孔君碑孔君名宙宣聖十九世孫此碑延熹七年其故吏門人所建視漢他碑稍完宙融之父也見漢書融傳泰山李斯篆四帖四首右泰山石刻李斯篆今可見者惟此四十六字字畫渾厚而結體差長余得之山東僉憲洪遵道嘗見應天府學有石刻宋劉跂泰山秦篆譜跂自序其略曰初宋莒公歐陽文忠公得泰山斯刻皆止於五十許字高不過四五尺形制似方非方四靣廣狹不等所謂五十許字者在南靣稍平故嘗為人所撫拓其三靣皆殘缺蔽暗跂始刮摩垢蝕而撫拓之凡篆字二百二十有二可讀者百四十有六其文起西靣而北而東而南西靣六行北三行東六行南七行行各十二字其末行制曰可三字復轉在西南稜上總二十二行跂河間人此譜政和中所為然今人所得泰山斯刻惟止此四十餘字豈其餘今皆已磨滅歟抑復為垢蝕所蔽而士大夫未嘗親造其處撫拓之工又皆茍且塞責不肯盡力歟故余志跂所説以見大概云右秦二世東行詔書李斯篆其篆甚佳余在兩京草餘年求之不能得比連得於洪遵道而楮墨亦佳京師四方之所趨也而好古博雅之士皆在其所收畜周秦以來金石刻皆富然余獨見鄒仲熙髙庭禮陳思孝有此刻固其難得如此也余既得泰山秦篆又求得劉跂此譜遂附於後以見秦刻在泰山者其未磨滅蓋不止於今之所傳墨本也應天府學有此譜石刻余得之張士謙云考史記所載始皇東遊頌視劉跂小字譜不同者十字史記臨位跂作臨立二十跂作草遠方黎民跂作遠黎休明跂作著明後世跂作後嗣躬聖跂作躬聽禮順跂作體順後嗣跂作昆嗣餘皆同鄭文寶及各處嶧山頌皆出徐鼎臣史記不載其書二世詔史記有之松雪書與稷文甚佳惜不見其全集此篇亦因松雪書而傳寶晉齋帖二帖二首右寶晉齋不完法帖余客武昌時得於醫士吾郡曾尚文者一日陸伯暘過余欣賞再三遂借臨寫伯暘卒其家不復見歸其弟伯瞻官南京出以示余余語之故而索焉即閟不復出伯瞻卒於山東此帖竟莫究所在然時往來余懷也侍講髙穀為余言渠嘗借臨未久歸其子後亦不知存否也伯瞻仲子瑄近膺薦來北京余間詢之亦語之故瑄對曰自幼家笥中未嘗見有也幸得還鄉里當究索以奉納不敢背德瑄既得官於浙便道歸從鄉人物色得之因顧謙主事使還寓至一展閲間恍若隔世蓋不見四十有五年矣損壞糢糊不復往昔之明整蓋淪落於俗人久矣欣喜復還繼之感嘆遂重表而識之若瑄之存心不同乃父尤可識也無為州舊有寶晉齋帖石刻余索之久未得蓋數遇州士子及官于彼者皆云無復存矣今年周恂如員外奉命督賦無為因託往問周還以此見遺蓋石刻在州學今所存唯此草帖耳皆右軍書又得米方尺𨽻書數字良快余意今書學雖廢然安有董治教於斯遊學於斯而了不知者世間寶物往往蔽於庸人俗子如此甚可嘆也李北海書麓山寺碑北海書矩度森嚴筋骨雄徑沉著飛動引筆有千鈞之力故可寶也玄靜先生碑右唐玄靜先生碑栁識撰張從申書李陽氷篆從申書法出二王而與李北海倣佛昔人評其書獨步江外此碑在茅山蓋唐行書之得名者余得之道録司官袁止安遺教經右遺教經及蘭亭序石刻在歸德州遺教止二十三行本六朝人書或以為唐經生書此云王會稽非也余得之劉士皆因其有汝州之印故附於汝帖之後漢穀城長張君碑右漢穀城長張君碑未有碑額蓋中平二年其故吏所立文辭字畫皆古雅碑在今東平州學余得之宗丈東平州守季琛先生之子民服云虞恭公碑題與翺孫此碑最宜初學者師法然嵗久碑石已缺其下三之一而字畫甚好今附於此與翺孫習書不可懶惰也漢溧陽校官碑右碑建於靈帝光和四年蓋長平人潘乾為溧陽長興學修教其丞趙勳等為建此碑今在溧水縣學余得於進士彭琉而字多漫滅不可辨識白石神君碑右白石神君碑得之子啓學士未有碑額蓋漢靈帝光和六年所建文多剝落尚可讀而字畫甚佳夢英千文右梁周興嗣次韻千文宋釋夢英以篆體書之乾德三年刻石在今西安府學前此釋之徒以書名者多矣而以篆古名始見於英也扈從西巡詩羅員外學古得余此詩刻置宣府學舍教授劉凖寄余此本蓋越三月宫車晏駕覽此豈勝永慟因題以授和姪先曾祖碑銘重刻石後自元季兵燹楊氏先世文字悉無存者歐陽公此文洪武乙丑余得之贑錫坑蕭氏蓋屢瀕于燬殆有神物護持之洪熙乙已蒙恩贈曾祖祖考皆榮祿大夫少傅華蓋殿大學士曾祖妣祖妣妣皆夫人時復作祠堂遂就北京買石求吏部郎中兼翰林侍書程君南雲重書此文刻之還置祠中用貽我後人而祠堂記附刻諸隂鮮于伯幾真草千文後鮮于伯幾書當時與趙文敏公齊名兩人相與甚厚而鮮于蚤沒故其遺迹之傳者甚少此真草千文刻板今在南京太學所謂真草書蓋兼行也家刊千字文右翰林侍書程南雲寫昔人有云字壞於晉謂壞六書之體也此本主六書如障􅥞鶤享愯妙之類率正千載之誤初學所當知也勞略帖唐太宗勞略帖余得之郭教授敬守蓋曹士冕家所刻山谷評為佳物殆不虛矣東里續集卷二十
