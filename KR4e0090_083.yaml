body:
  text: 東里續集巻五十五明楊士竒撰詩五言古退思軒為淮陽劉千户賦結髪在軍中幸際熈明時聲教洽四海不聞羽檄馳家承厚禄貴身有好爵縻雖懐鉛刀用一割不及施自顧草木㣲芳澤振華滋感激天地恩胡能分寸禆惟應篤忠貞庶不忝恩私庶事如蝟毛何以適攸宜發已一失經臣職隳自兹豈但羞榮寵安危誠係之歉歉内自懐兢兢恒自持髙軒敞𢎞麗退食時在斯先哲有明訓掲以為箴規題范仲倫紀善攀桂軒團團青桂樹髙髙凌紫虛根本積深厚柯條鬱紛敷風雲蕩杳靄雨露涵浸濡當春競妍華不與桃李俱秋氣悴萬卉孤芳乃芬如金彩耀朝暉天香含滿裾軒居延爽霽静對古人書觀道可適懐何必傾一壺居止得嘉䕃悠然塵慮袪緬惟種植勤今來百嵗餘先人義方訓遺我以良圖幽貞嫓令徳安敢廢斯須光華際昌辰歘起應時需攀援聊淹留非為樂其初念兹保明誡嵗晏以終譽送王孝子歸成都其初巴陵人省其姊來金陵蜀嶺春雪消秦淮新水衍萬里蜀中人見水思鄉縣去年在親側今年在帝畿非縁同産故誰肯離親闈一朝復一朝思親心若燬問君刲股時痛迫何如此初發白鷺洲忽過黄鶴樓巴陵尋舊里荆門泝上游家林行漸邇筭程應預喜猿嘯豈闗情鵑啼空在耳倚門望萊衣踉蹡五色歸供饌黄魚美登盤丹荔肥親年方夀考歸來誓相保長承膝下懽不出門前道送陳景著編脩以母老乞近地得福州敎授振佩謝彤陛驅車出重城堂中有夀母奉以趨脩程秉志存事君母也迫衰齡仰荷聖主仁俯諧烏鳥情維時六月中流金赫炎蒸行路豈不難適願心孔寧濟濟玉堂侣祖餞羅冠纓眷言夙昔好何以贈子行易得四海譽難致鄉里名矧乃來學衆逝將於我承黽勉慎所操庶用閎休聲送聶敎諭赴貴州聶屢見過不遇留巻求贈言賦此見意徃與子别者乃在江漢湄江漢日夜流嵗月忽如馳相思隔川岳於今已十期子家清江曲夙有温厚資少小入鄉校育徳窮書詩中嵗登成均鴻鵠摩天涯金石恊其音佩玉昭其儀拜為愽士官小試百里師詵詵遊學徒左右侍臯比成徳與達才造就咸適宜九載績用成入奏趨彤墀陞遷荷榮寵欣欣遂其私職不踰文敎出不越皇畿明晨整行装王程詎能違嗟子契濶懐慰悦宜在兹終焉乖所願坐以職務縻過門弗及迓出祖弗及追引望池陽峯曷慰中渇飢幸逢熈明運㑹合諒有時惟應保貞素遲暮以為期題訪戴圖寒宵雪初霽明月照庭前獨酌山隂酒含詠招隱篇良朋忽興念懐徃方浩然泝洄剡中行玉色晃山川道長興易窮回艫遽言旋性情自不羈動止故無牽放曠非可則猶為畫者傳題文丞相字文丞相為吉水解氏大書生香翰墨之隙六字解之孫文夫求題其後惠風布和氣流雲度春隂時卉播芳潤嚶鳴懐好音邑中理琴罷逍遥翰墨林圖帙左右陳永謝浮慮侵静觀悟𤣥化油然適我心奄忽百嵗餘名徳揚至今燁燁文山書尚照文水潯惟應嗣世者持用寳南金謝賜嘉禾詩有序永樂三年九月朔旦上閱中秘書得太祖聖神文武欽明啟運俊徳成功統天大孝髙皇帝御製嘉禾詩聖孝深至將垂示於萬萬年乃命摹刻以賜諸王廷臣龍章玉刻雲漢昭回臣忝職侍從均拜鴻恩齋沐莊誦有以窺見帝王功徳之隆矣盖嘗竊論古者帝王之盛未有過乎唐虞三代之君其始無不本於得天其行無不急於除暴安民是以民心和於下天心和於上豐年屢應百祥萃臻而為泰和之世元之季世上失其政宼攘四興民墜塗炭我太祖皇帝誕膺天命提一旅之衆恭行天討東征西怨南征北怨掃刮兇暴挈天下無告之人舉納之康寧之域母養而父訓之由是仁浹義洽黎民豐足政化脩明禎祥恊應與唐虞三代泰和之世同功而共效矣斯皆臣之所躬被目睹固不應聖製而後知之若夫致祥之由一歸天錫不謂已功而歉然不自滿假之心與堯舜禹湯文武同一聖徳者實由聖製而知之也皇帝陛下統承大寳君主萬方繼志述事孝治益隆天下林林總總之生遭遇何幸盖堯舜禹湯文武之道傳至於太祖皇帝今又傳至於陛下矣陛下敬承善繼永篤不忘故雖手澤一篇一詠皆以為聖道所存必欲著明永示無極臣獲睹天章巳極榮幸而況於親受寵賜者乎隆恩至寳豈如其他世世貴重之賜之比懽愉之情倍萬常品用作五言詩一首以著瞻仰欣悦之意謹寫上進詩曰𤣥天肇昌運皇明啟隆祚有赫清泗濵篤生我皇祖於維皇祖聖桓桓秉神武于時草昩際隂氛蔽寰宇受命提天戈弔民麾虎旅呉楚掃欃槍幽并驅羆虎函夏復清寧窮櫩息咻噢迤邐五敎敷從容九功叙絃歌亘逺域鋤耰隘荒墅浸淫俗化淳汪洋徳施普昊天監昭事駢蕃荅純嘏五緯無留逆四時皆順序休祉萬斯臻豐年豈惟屢大田毓禎穀芃芃映黍稌聖世躋泰和聖情聊暇豫雍雍發歌詠輝輝粲毫素文如虬龍躍又如鸞鳳翥音如咸韶會氣如春陽煦上樂帝眷顧下樂民康富丕顯並周文不矜同姒禹於維我皇祖功徳侔三五俯睨漢與唐陋哉疇比數宸章隠中秘至寳終明著陛下握乾符垂衣纉鴻緒琬琰昭大刻臣工拜嘉予旦旦睹奎光淵淵仰皇度誠由陛下聖心存有虞慕益勤繼述志遂隆顯揚務睿製超百王至孝踰千古敬擷輿人言陳詩獻當宁望雲詩有序太常王侯勉自皇上龍飛之初超拜少卿而卿乆闕侯總太常事敦厚易直國家有事于天地宗廟百神侯練習典禮相事秉䖍膺受恩眷榮且重矣侯陜西蒲城人蚤喪其父率其弟勵朂事母夫人能孝既舉鄉貢出仕而其心未嘗不在母側嘗一迎就養京師居數嵗母夫人不忘其鄉之樂也勵朂思有以寧其母之心相與奉歸而侯重去其親忡忡焉如不可一朝居也侯之子謙自請歸養大夫人冀以寧其父之心夫父子兄弟相篤於孝行如此豈非以侯為之表率哉克孝於親者必忠於君今侯仰荷國恩榮且重誠明乎義而力乎所當務將其行之可稱於時者不尚多乎故為賦古詩一首述其事且致望於他日云少小失所怙鞠我仰母氏我今已成立母氏隔千里朝亦思母慈暮亦思母慈愁腸日九廻朝暮千萬思官列九卿貳迎養失所願母來止嵗餘母樂歸鄉縣雖有兩賢弟致敬奉母居我獨不在側何以紓鬱紆荷君恩寵深憶母道途逺仰首望飛雲秦山長在眼小兒解父意願父勿憂歎我歸養大母父但忠王官一門隆孝行父子及兄弟所以白髪親怡怡膺夀祉敦行用表率豈不自一身觀感動鄉里詠歌揚縉紳君親同所尊忠孝匪二道努力慎克終來世焯有耀明明處士輓詩有序余童丱數從海桑陳先生游郡城必主劉復初時先生族孫仲述敎授其家復初之尊甫明明處士春秋七十餘皓然白顛頎身玉立雍容言論而延禮先生愈乆愈敬復初為人温然端厚以學問為務執所業請益無須㬰懈怠先生器重之異於衆也孟子言觀近臣以其所為主孔子稱子賤必本於魯之君子處士其賢乎哉後數嵗先生捐館復初自郡庠陞太學為給事中仲述亦取進士去相繼以沒惟處士康寧無恙余雖未獲再造劉氏追惟曩昔遊從之樂老成典刑風流文采未嘗忘余懐也洪武壬午處士沒於家余聞而嘅嘆焉今年見處士少子彦信於京師示余易闇謝先生所為處士墓誌及翰林學士解公所為墓表讀之益不能釋懐因作輓詩一章以著余之思而處士之所為可傳者亦庶幾可想見也岧嶤金螺山螺山水逶迤螺水逝不還螺山空雲飛我懐賢達人寂寞今安之在世無所繫去去忽如遺鬱鬱喬松樹舟車諒所宜何為南山中空負髙潔姿寒暑若循環四時屢遷移傲兀冰與霜欣榮遲暮時中有丹鳳雛五章備羽儀髙舉戾阿閣嗈嗈鳴朝曦鳳雛忽已去喬松復傾摧瞻望杳不及行者皆歔欷俯仰念疇昔我獨有餘悲矯首睇螺山閣淚書此辭輓永嘉胡處士流波逝不息時序無停遷嗟彼泉下人一徃不復還追惟在世時卓犖稱英賢芳馨佩蘭茝被服夫容鮮幽居玩𤣥化歴探羲皇前歩履率周行飲濯必清泉一朝逐征風飄然若雲烟反終自常道懐徳諒難捐幸睹五色雛及時厲髙鶱黽勉務顯揚夙夜志惓惓煌煌金石詞足為永代傳送謝憲使還廣西謝公青雲器發身自科名初命屬司寇特達蜚賢聲十年典大郡政化龔少卿遂陞董外憲八桂歌澄清展矣冰雪操諒哉矜恤情聖人御寰宇簡賢寄嫠􅑱安得皆若人四海臻咸寧春蘭花始開述職趨明廷我昔嘗同朝相見慰平生握手甫一再驅車復南征故寫嚮徃意聊贈萬里行送黄知府還瓊州三首蕭蕭朔風勁慄慄年嵗徂積雪横山岡凝冰塞川途念子萬里行相送城南隅寒樹𣺌蒼茫誰能忍離居離居昔不淺晤語今還促郡府分南溟烝黎望賢牧寒暉動飛斾浮埃暗馳轂逺舉凌㝠㝠臨岐羨鴻鵠鴻鵠翔翩翩倐忽天之涯丈夫抱竒才致用貴及時山川歴緬邈何以贈仳離永矢冰雪操遲暮以為期輓凌孝子閩有凌孝子十六丁喪亂辛苦奉雙親巖谷日奔竄晨汲寒澗飲暮拾枯薪爨跬歩皆畏途觸目増愁嘆百死幸脱歸雙親遄棄違囏難殯淺土慟哭血淚揮孤身惟影伴㷀㷀竟何依經年寇盜息來返鄉園扉拮据葺屋廬黽勉遂家室處宗仁有施處鄉義無失寧辭薦辟榮甘就原丘逸云胡未下夀盖棺事奄畢昔有江巨孝漢史髙其人誰言千載下令徳無與倫天道逺弗爽為善福必臻凌氏身後榮煌煌垂不泯陶氏榮節堂人生伉儷情所願偕白首二九歸陶家三八為孀婦抱持襁中兒辛苦難具論矢心只如一兒大今有孫紫鳳啣天書光華見旌表孫長登科名更覺門庭好皇天佑節義降福無窮期永歌榮節堂聊繼栢舟詩輓詩歐鄉有貞士蕭散離塵俗家庭崇孝徳宗婣重惇睦交友執信義恂恂在鄉曲雅度廓有容好善如不足浮雲抗志尚蘭茝充佩服愛子以力學詩書貯連屋飛騰自庭下玉立見鸞鷟髙堂致滫瀡十載京華禄八十餘三齡長徃遽不復懐貞寫哀些聊為蒿里續題古木幽禽圖古木含春澤紛敷枝葉清羣飛各有類動息相和鳴藹藹天地間品物遂生成無輕畫史意可怡仁者情送彭學修之興寧知縣平生慕為縣可以恤嫠􅑱不得真由命傍觀却愴情吾鄉有彭子發軔宰興寧送爾慎樹立行㸔起令名追賦袁氏瞻衮堂中嵗謁金闕恭承明聖恩千載之所遭錫命乆益蕃重爵與厚禄頌臺燁髙鶱泰壇切紫霄清廟凌絳雲天子奉明禋周旋嚴駿奔祀事國所重為榮安可言朅來遂懸車言歸東海濆何以報盛徳惓惓中心存興居兼食息一惟我聖君祗若聸龍衣肅若仰臨軒仰祝萬萬夀悠乆齊乾坤大書掲中堂庶庸示無諼嗟哉逝已逺敬率惟後昆題梅桃李盛芳妍春風一朝歇窮冬嵗華盡見此枝上雪天寒𣺌空闊清香表髙潔餘姚陳處士輓詩桂樹生堂堦秋霜悴其英秋霜自恒化能不懐芳馨人無金石資安得獨長生形質雖化盡惟善逺益稱緬彼林居士素履篤幽貞恂恂孝友徳坦坦君子行推己務惠濟潔身謝浮雲一朝盡天年奄兹三紀盈松栢繞丘墓凌雲鬱青青終令懐徳者慿軾愴中情題山水圖結纓二十載素髪忽盈簮才薄識且踈驅馳百不任憂虞積懐抱流塵暗衣襟瀟散此誰與結廬在幽深危峰疊蒼翠灌木鬱成隂奔泉瀉石磵浮嵐掩遥岑駘蕩時物榮交交響春禽趣與清景㑹而無塵俗侵忩中南華篇流玩以澄心相知一二軰嚢琴亦來尋更迭為我彈泠泠皆雅音怡然樂吾天撫巻心為歆俛首發長嘆悵然興越吟脩敬齋士學之所本乃在方寸間出入慎省察奉持常拳拳執虛如執玉處獨如臨尊主一不二適存養静以專益乆虛且明萬理自森然所以徳之聚古人有名言羅生豫章裔家學探淵源脩敬掲齋扁瞻對如孔顔肅中戒外馳宴坐必衣冠雲谷有明訓昕夕勤鑚研勉哉在惇行勿云知者難桃源縣泊舟桃源縣滿目生秋草不見桃花林但見牛羊道臨江盡茅舍繞屋惟桑棗尚有淳朴風何由恣幽討九日發桃源遇便風出門已六日嘉節逢重九旭日明秋空川原浄氛垢寥寥數家村茅簷䕃榆栁緑醑堪旋沽黄花何處有張颿乗便風舟行疾於走前岸𣺌彌望瞬息屬回首桃源下百里不待晨炊後北京緬迢逓王程畏遲乆舉觴問河神明晨還送否新安驛奉簡蹇公及公素解纜未十里峥嶸亂雲黒北風吹波立進咫退已尺努力度前灣依林聊蹔息船忩雨穿溜狼藉沾衣席跼蹐擁氊毳愁坐終日夕僕夫勞敝餘飢寒皆失魄對此傷人心奈何逺行客中宵豁隂翳青天流月色同舟各解顔安卧免欹側人事有倉卒天道叵測識向來行路難未有新安驛送周布政還廣西周子湘中彦桂芳昔同官清姿玉瓉貴雅量湖海寛所發必歸厚所履必由端霜臺既展驥秋曹亦翔鸞中嘗擢近職所樹皆桓桓遂授方岳寄八桂開大藩勉勉敷上徳孜孜救民難温若春陽煦潤若時雨􅟎勞勤十載餘坐鎮邊隅安考績進禄秩蒙恩復南轅嗟予乆間闊蹔晤仍鮮歡相送即脩途相期惟嵗寒何以表中愫聊贈青琅玕送芮長史致政還鄉芮君毗陵彦發軔賢能科十年鳳凰池近侍增光華簡陞春宫臣司經侍講席朝紳五品貴旦暮儲皇側鞠躬勤小心言行恪有常出入謹儀度玉佩鳴瑲瑲再陞親藩輔所寄誠獨重正道與直言肯慚賈與董春秋登七十從容告歸休拜稽辭賢王歸朝謝宸旒我昔官桂芳於君實聨署況復紫垣南廨宇相隣住相親日相好嵗乆交誼深明月映澄潭兩照知巳心暮齡乃乖分闗山隔南北時誦停雲詩相望但相憶今來語未竟遽復倒離尊重晤知何時黽勉頻加餐題枯木竹石喬木風霜古貞石金銕如所以尚志人樂偕木石俱況有淇澳姿清風當座隅力田有餘暇足用適詩書送徐提㸃被召赴北京得向字聖人嗣天位郊廟親玉鬯明堂一𢎞新禋祀徵助相之子奉綸音詰朝戒征兩岧嶤萬嵗山雙闕五雲上鵷行余將簉鶴馭子先倡紛若明漢星皆維北辰向送史常有序溧陽史常讀書持身不肯茍且混流俗舉進士為行人滿九載考最陞建寧知府以㢘厚自持月餘吏畏民懐稱為賢守時朝廷遣官考察外有司清濁材否將陞黜之考察者既不滿常之簡於其禮而同官素以不檢為常所制者遂從而毁之然求其過不得得其嘗罰老引商民米以贍獄囚之無家者雖具案檢不閲而坐入已考黜當為民送詣京師京師故舊率謂常白其實於朝當得復職常言幸有父母雖老無恙得歸侍足矣竟不自明來告别將歸余於常徃還乆相知有素其去也不能無情故作詩送之君子達義命不為外物騖孶孶脩其身貴賤安所遇青蠅汙白璧自古有不慮曾參不殺人讒言令母懼直生見誣金賞之亦不忤曖昩須㬰間光明懸竹素之子抱夙尚雍容偉儀度讀書膺薦達操節致時譽遂拜二千石分符牧黎庶所務㢘與仁果得􅑱嫠慕磷緇出媒蘖不辨亦不怒怡然返初服脱灑謝羈馬拜辭出都門春華未遲暮白雲動髙興清鶯滿長路家在溧水陽行行見鄉樹上堂悦父母下堂洽親故人生有至樂豈必貴與富念子相知舊此别何時晤浩浩繾綣懐因詩一披露贈蕭大慶敎諭詩有䟦西昌邑東南桃源擅瀟灑蕭氏所世居彬彬見文雅我識斯賢翁魁厚稱長者昔在元季時寇敓充四野翁奮捐帑藏保障厥隣社其季安敬甫清襟浩傾瀉惜哉不永年鄉閭共嗟咤徳隣自幼孤好學出陶冶於義必踴躍於利豈茍且穰也有鳳毛幼學勤不捨黄巻三萬軸一目數行下詵詵羣倫中指謂千里馬昨領鄉書升㑹試登榜亞除授金鄉邑餞别持杯斚索我贈行言顧我今衰也惟斆學之半黽勉無自假徳義士所珍富貴直土苴朂哉務進脩勿言知者寡誨人在善誘不在楚與夏愚直茍不遺可用膺純嘏余客蕭氏塾時大慶始數嵗大慶穰字也今年及仕矣方以明經授官則余之老也固無足恠然余周旋其曾祖祖父間五十餘年故於贈言有惓惓致勉之意云送羅崇本進士歸省北闕雨新霽上林鶯正飛朝侍豈不榮闗山逺庭闈經年定省曠累月音書稀揺揺一寸心遑知渇與飢恭承聖主賜寧親蹔南歸髙堂夀且康承懽足光輝家慶誠所樂王程顧無違贈子淇澳詠自脩慎其㣲中和飭徳性昔賢有佩韋忠孝堂詩有序宿遷春秋之鍾吾也居淮之陽今南北兩京舟航徃來所必經也余屢過之其土厚水清俗質而醇其人端而確毅而有守吾意必有才且良者生乎其間惜未之遇也比年吾郡幕長雲衢幕佐孫郁皆出宿遷郡人士至京師者皆譽道兩人之清勁有執明達有為無異辭焉今年余奉㫖還鄉展省鄉人士道兩人之才且良尤多盖謂一時江西諸郡之為幕者鮮逮也屬時郡有賢太守四明陳侯尤江西諸郡為守者之所鮮逮又何幸得二良幕為之助也衢比丁家艱去惟郁在郁字文盛今考績詣天官奏最將歸過余求其家忠孝堂詩余可靳於一言哉為之詩曰少小天所生㷀㷀罔怙恃永懐鞠育勞食息靡蹔置黽勉務顯揚卓卓挺立志初命屬鴻臚敬恭事廷序西江吉名郡再命升幕貳顓顓秉誠節孳孳究職事豈直簡牘間期禆賢守治忠孝表厥居夙夜圖罔愧古來勲徳人皆起自奮勵蒙泉達于海寸萌干雲際維持不息功無逺弗可至資孝以為忠人道第一義朂哉在方寸何古不可跂送曾蒙訓分敎弋陽明珠産合浦竒璞出藍田士生禮義門由來端且賢曾氏吾同里詩書奕世傳科名起特達赫赫光後先之子稟賦異秀質何娟娟少小服家訓一志勤簡編挿架皆手澤旦夕侍鑚研致恭閭曲間出入恒顓顓名達部使者薦上吏部銓天子試文辭揮毫玉陛前擢佐百里敎徃分愽士筵維時七月中芙蓉秋滿川驅車出潞濵問買江南船弋陽幾日至定及黄花鮮訓廸敦表率薦祀致精䖍勁翮在逺霄寧當乆翾翾功行貴及時無為孤盛年流光逝不處佇聆清譽宣題畫送陳景茂歸金華孟冬寒氣肅霜葉墜紛紛把酒别故人含情睇征輪憶子初陞時永樂第二春簡入絲綸閣一見心相親于時幾務殷旦夕翰墨勤開口見肺肝躬勞邁羣倫兩京三十載恭事四聖君方來未壯齡鬢毛忽成銀幡然辭寵禄歸偶擊壤民失足遇一跌觀過知其仁平生惻怛心傾家振饑貧九重嘉行義自天榮命新萬里謝彤庭興逐南飛雲峩峩金華山流泉下潾潾梧竹䕃我屋白石為我隣於兹坐閒逸超超絶塵氛重晤當何時安常以自珍送楊禮郎中還南京季夏當炎熇時雨集行潦宛宛晴鶯鳴空埃浄於掃子來未幾日告歸一何早愛子閩山秀襟宇清皓皓詩書出橋門瑞玉出文繅峩峩天官屬最績屢書考子家賢伯兄勲庸四朝老所重同氣良相見心傾倒連床夜聽雨方兹豁離抱晨起復暌違中懐增懆懆我亦惇同宗交情乆逾好聚合焉可常仳别未足道敬身譽所興崇飲匪自保相期南山栢蒼翠拂穹昊慈節堂詩有序浙江都指揮僉事蕭華世亨七嵗其父沒於王事母夫人年纔三十辛勤敎育華成立而守節貞白不二朝廷追録華父之忠累進華官母夫人髙年壽康華恭致孝養恪勤臣職惟恐貽羞父母而名譽日起間名奉母之堂曰慈節求為之詩余念其一家之間臣忠於君妻貞於夫母慈於子子孝於親可謂盛矣其亦本於父之賢乎為作五言古詩以貽之桓桓蕭將軍秉義奮英武提劒雄萬夫委身報明主于時羽林孤未齓慟何怙鞠育兼訓敎劬勞仰慈母母抱金石志矢天與天語惓惓未亡人肯愧黄泉下詔下録功勲遺忠上天府寡穉沐寵恩棨㦸光門户鶴髪夀且康珠翟明翠羽兒大八尺軀卓卓挺禦侮操亷賛雄藩言言浙江滸入門祗奉養出門飭師旅一心君與親夙夜懐靡盬惟患忝所生詎辭躬勤苦令徳萃一堂肇光自賢父聞之謾成詠用示觀風者送王希積訓導歸西昌子家縣城西我家縣城東兩家世婚媾況復文獻風我生甫十年時節詣王氏所重先代交肯恥遺孽子王氏兩尊翁顒昻衆具瞻長翁春陽煦次翁秋霜嚴矜我故人孫每見垂接誘或頫摩其顛或引執其手随事賜誨敎不間精與粗亦或厲顔色繩過及砭愚我稍辨路蹊兩翁厭塵世老成一凋亡如矇迷所逝後來瓊臺公亦得承切磋終焉聚時少不如别日多中嵗仕京華而翁亦繼起同在玉堂署還同職文史同心奉四聖兩京三十春出入常相比居止常相隣有酒相勸酬有詩相賡詠襟懐同一清冰雪炯相映衆星不逮旦松栢見嚴冬向來親好人存者兩衰翁王氏森佳兒玉樹照庭廡顧我獨何為憂煎迫心苦子出自昆岡佩服書與詩他鄉屢邂逅無幾輒乖離朝家有大事匍匐萬里至因遂躋髙堂覲省慰親意十月薊北寒朔風斷河流豈不戀侍下公程迫難留我具斗酒酌送子即逺道追惟子先祖中懐惄如擣峩峩邑黌宫詵詵於子師問學資其求言動表其儀才器之所成必出良模範子家崇慶守前矩猶可鑑為敎在立本致道而篤行逝川茍不息沛然達滄溟坦坦白龍洲湜湜金魚浦庶聞百里間士習追鄒魯題陳憲山水喬林逺人境山水滿幽庭薫風晝南來嚶鳴清可聽居貞守恬寂聊自頥性靈杳杳清㝠上誰見少㣲星題青山白雲圖贈賔畿老弟南歸白雲三萬頃水木共清華衡廬不可辨依約見仙家贈爾江南去秋髙八月槎離情方浩浩矯首鴈行斜題賔畿弟竹石圖園林春雨後新竹翠凌雲還䕃雲根潤虨虨緑蘚文清風來白日瀟灑净塵氛題賔畿弟木石圖少躭木石趣家與木石隣清滌磵泉冷潤含山霧春應無射虎者時有斸苓人贈楊晟叅政還福建楊子河南俊詩書夙所務蚤膺大廷選從事玉堂署歩履循周行居心在忠素抽毫立螭陛鞠躬謹常度濟濟近侍班娟娟水玉柱一朝起髙擢萬里南閩路大藩開海隅卓卓挺䟽附寒操凛清嚴春陽播温煦八郡五十邑謳謌出黎庶丈夫千載志功業及時樹肯墮塵俗流甘同草木腐念子予故交仳别嵗已屢耳熟道路言良慰心所慕𤣥冬十一月風凄氣寒沍朅來一晤對告歸復何遽因詩寄深衷勉植後來譽紀夢晝眠夢故里扶竹過西家隣翁愛敬客延賞辛夷花一觴歌一曲不覺紅日斜覺來空悵惘飄泊尚天涯送夷行伴讀赴西川陳宗吾外家俊彦森玉立永别崑山丞夢寐恒在目令子敦厚資詩書克嗣續温温秉謙恭超超出塵俗暌違十七年驅馳憐僕僕逺邑分敎席親藩陪講讀所樂事賢王何嘗厭㣲禄兹來忻慰藉言别復匆促對酒念離合後期安可卜于時積雨霽倉庚鳴灌木西瞻萬里橋戚戚衝炎燠善保千金軀用副意所屬送陳祭酒邂逅不盡意仳離難成懽況子我素交俱屬衰暮年夙遊玉堂署文彩金琅玕瀟灑絶埃氛磊落出肺肝託好三紀餘貞松見嵗寒升遷既遐處懐思常漫漫北覲初盍簮南顧遽回轅迢迢東海陬鄞山青鬱盤惻惻念桑梓去去承明恩良㑹後靡期晩節道攸惇黽勉各自珍用副平生言小瀛洲晨下蓬萊宫言訪瀛洲君瀛洲咫尺地東與東華隣結宇非崇髙瀟灑浄埃氛雖無弱水限門絶塵俗人金葩間瑶草階戺揚清芬瓊簡兼赤書充列太古文常時白玉堂飄拂來清真相與共𤣥譚造詣精入神盤出棗如瓜森侍皆鳳麟意超紫霞表道匪玉局掄曠視六合内逍遥任大鈞送張萬中十年祗奉命四牡馳騑騑考最榮陞擢新恩出彤闈肅肅秋官署迢迢赴南畿梅花嵗寒姿皎皎揚清輝君子比素節欽哉念無違題陳憲章廵檢山水山翠悦人心清流堪洗耳浩浩名利途擾擾何窮已畫史有髙懐披圖思千里題梅寄蔣子䕫别卿四十年思鄉邈萬里朝陪玉堂講暮醉金壺醴我有一株雪持用贈君子置之三徑中清白宛相似歩過田家有述聮歩營南門偶尋野人廬廬舍類南土繚垣樹扶疎初柳揚青條杏萼亦已舒皤皤舍下叟迎客近門樞客問何鄉人理生今焉如跽答家徐州始來十五餘生男皆壯夫有孫亦蹌趨大男荷戈殳衆男務菑畬公私昔少事温飽常晏居老身就衰頽官長日侵漁去年旱復潦所穫缾盎儲何以備家食指顧屋南隅園畦五六畆果木百十株折李接桃根為力勤亦劬三嵗結李實纍纍蕃且腴盈筐易斗粟足給朝夕需言已意自得聞之亦慚余機巧予所厭所憫為利驅愽樹起後世要非仁者徒兩戕合一體纒糾封皮膚雖能奪天造本末固已殊物性循自然古人豈其愚興懐淳樸風俛黙増嘆吁題郭仲舉雪景山水乾坤播清氣岡原同一色啟户得竒觀放舟浩有適從知山澤農豐嵗占三白何況牧守者對此忘忻懌早出安定門結束出門行雞鳴夜過半長衢驟車馬明星爛河漢霜壓紫貂輕風掠㣲醺散自無匡直才敢發驅馳嘆謁宣府廟學譚都督作制頗𢎞壯下馬趨黌宫敬謁先聖師聖顔儼温穆從祀森威儀簠簋備法制堂廡何巋巍齋居豁明敞富列書與詩童冠數十輩濟濟咸肅祗俯仰動忻懌亦復興歎咨上谷秦所郡逢掖時所譏寥寥千載後振舉昉自兹聖代崇文敎涵濡浹邊陲偉哉譚公勞煥耀無窮期楊學士乃弟仲宜歸建安以道中五景求詩贈之淮隂秋色揺揺河上舟迢迢逺歸客昨發潞水湄今度清淮側霜落秋樹紅雲連夕疇白矯首鴻鴈羣聮翩接飛翼念我玉堂人親愛𣺌南北廣陵夜雨泊舟淮南渚向昔聞清鐘颯颯飛雨來瀟瀟洒孤篷沿洄距幾日氣序變寒冬望鄉行有期懐别坐無悰何時連枝㑹將復彭城同金山曉鐘揚舲越京口中流睇金山昩旦聞禪鐘聲出島雲間急應潮生渚飄隨月墮灣靈境富竒觀寧不懐躋攀邐迤瞻鄉邑浩蕩棹歌還鵝湖晴雲投䇿憇鵝湖山水含清妍流雲映華旭粲粲五彩鮮雲邊有精舍能不懐當年哲人崇麗澤至道以昭宣歸哉懋鑚仰覃思在遺編閩嶺停驂辭家上京國念我同氣良㑹難别何易歸途阻且長行行及閩山停驂見故鄉故鄉欣已即北望仍徬徨伯也獨逺居我懐焉能忘送劉叅政赴四川詩有序士之淹速詘信各係其命故君子惟修夫在已者凡在外者一聽諸命無所用心焉世固有卑汙淟涊哀號丐憐於人而得夫信與速者亦必由於其命可得而後得之使非出於其命雖一日百十哀號丐憐終不可得而小人之所為自屈豈惟可賤誠可悲巳君子者知守命而已其肯卑諂猥賤干於人以求信乎如吾友劉孟鐸盖其人也孟鐸永樂甲申進士由翰林庶吉士歴吏部工部主事禮部郎中㢘潔而忠厚恭慎而勤勵明達大體嚴於持已而恕於待物所至上官重之下人歸之後甲申而升者其所存所行亦有不逮孟鐸者盖多揚揚髙舉矣孟鐸跼蹐郎署三十年澹然如罔聞知盖孟鐸知守其身盡其職不肯自衒以求知未嘗一效流俗齷齪屈已以干於權貴之門故世之知之者亦寡知之者惟余與禮部尚書毗陵胡公最深朝廷數命廷臣舉方面余意欲舉孟鐸以議者不合不果上已而胡公舉之既報罷有知而詘之者孟鐸弗自詘也今年夏胡公又舉之上知其可用擢為四川布政司叅政盖孟鐸昔之詘命也今之信亦命也而君子之節著矣余與孟鐸同郡相交四十年於别也賦詩贈之璞玉不自衒良工知求之君子安義命知者寧自遺劉子敦樸資敬恭勵操守蚤暮勤職業一志忠厚施郎署三十年何嘗較崇庳上荷聖主明下承上官知一朝奮髙翔佐藩戒西馳平生所負挾展效庶及時當宁念遐僻宵旰恒孜孜旬宣天子徳惠澤洽􅑱嫠郡邑仗表率貪漁待薅治用以光國命亦副知已期霖雨夏初霽髙樹鳴黄鸝繾綣杯酒間念子當逺離竊效仁者贈殷勤歌此詞東里續集巻五十五
