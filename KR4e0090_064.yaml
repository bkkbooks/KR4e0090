body:
  text: 東里續集巻三十六明楊士竒撰墓誌銘故奉議大夫衛府左長史金君墓誌銘太宗文皇帝臨御之初三衢諸生金寔首上書陳王道其綱有二曰君徳曰民政君徳之目五躬行仁義虛已納諫明察善斷審於用人恭儉節用民政之目五厚風化尚廉恥省刑法薄賦稅愛民力皆嘉納之復試䇿二道條對稱㫖命於文淵閣光禄日給食與修太祖皇帝實録書奏除翰林院典簿授迪功佐郎賜白金文綺修永樂大典陞修職佐郎仁宗皇帝在春宫初開經筵選翰林春坊之明經術者更番入講金君與焉本諸實理敷說詳明禆益盖多陞左春坊司直郎授承務郎每進論治道必援引經傳多見采納屢承手札之褒兼任稽古纂述之事陞儒林郎奉命授衛王經洪熈中陞衛府左長史是時上篤意諸子學問簡宫臣十數人為之輔其文學之媺操存之正金君其首也金君既感恩遇又重衛王純厚喜學於解析經史開諭義理孳孳盡誠至於王之服食起處率進善言王皆欣然從之而敬禮愈厚凡王府政務不問大小一總於長史金君從容裁處條理井井而率歸於厚自僚屬下至軍校咸服其徳王有疾醫藥久不效金君憂形於色王薨金君傷其賢弗夀也哭之過慟以是鬱抑致疾王既葬將引老疾奏乞致事會有㫖命同考禮部會試竣事學士故相知者議欲奏留之翰林而君先得請休致矣未行疾益加竟卒正統四年五月廿日也金氏世衢之開化儒家曽祖振之祖伯圓考徳厚洪熙中贈王府長史妣蘇氏贈宜人金君字用誠其諱寔也自幼頴敏强記問為從父博士王鉉所期望從學鄉先生何原銘張一民兩先生覽所習業尤重之奬勵彌至數年縣令夏景髙敦勸上京師既入翰林聲譽日出而公退閉户書帙自娛非公事不見達官未甞以私干人内方直而外恭遜雖心嫉憸佞未甞出口小人有不恱之極力擠之者受而不校隆孝友之行處宗戚鄉䣊懽然遇其有過亦必規之凡所交處有急必周之有死於客外或殯或歸其櫬咸致力焉尚澹素非朝謁不采服為文章豐腴雅則有文集若干巻雖老其進學日有程不間博究經史旁通隂陽星厯醫藥之書至佛老之說亦辨其所背於吾儒者指示来學晚號其齋居曰覺非以自儆不妄與人徃還知已者過之觴詠娛樂竟日忘倦将屬纊卿大夫有問之者曰死生晝夜常理實無所遺恨惟諸公勉自愛為生民福耳盖春秋六十有九配汪氏封宜人子男三孟纕仲紞鄉貢士季紘女二孫男十二紞侍父北京十數年父卒將奉櫬歸葬于鄉謁余為銘余與金君甞同寮翰林春坊相知也義不可辭銘曰粤漢西京臣誼仲舒陳䇿佐藩長沙江都天之生賢何世則無猗歟金君其今通儒始登承明終輔藩國賈才董正用烜厥績更歴四朝請老休逸帝命旣俞遽殞於疾君子之亡凡世所嗟儒苑損輝文林虧華姑蔑之墟丘墳峩峩發潛垂永非斯文耶故少師工部尚書兼謹身殿大學士贈特進光禄大夫左柱國太師諡文敏楊公墓誌銘正統五年二月十八日少師工部尚書兼謹身殿大學士建安楊公奉勑歸展先墓既畢事卜日啓行病作衆曰曷俟少間公曰君命不敢稽也挟醫以行至臨安武林驛疾加遂不起是年七月二十也守臣治棺歛既馳奏皇上嗟悼輟視朝一日贈特進光禄大夫左柱國太師諡文敏遣禮部尚書胡濙􅊩祭遣中使䕶䘮還葬其鄉命有司治墳公先世見余譔其大父墓碑曽大父伯遜大父達鄉父伯成皆贈榮禄大夫少傅工部尚書兼謹身殿大學士曽大母黃大母謝繼阮母劉皆贈夫人公初名子榮字勉仁自學諸生鄉試選第一會試第三廷對擢第二甲賜進士出身入翰林為編修太宗皇帝入正大統更其名榮初建内閣簡翰林之臣七人其中専典宻務七人者解縉胡廣王淮胡儼金幼孜公及士竒也公齒最少最警敏一日晚上出右順門召内閣諸臣獨公一人在出江西三司奏章示之言吉安鄉民之嘯聚者已悉復業盖朝廷初有聞即遣行人許子謨齎勑撫諭子謨行將一月又遣都督韓觀率兵繼之如撫諭不下即加兵及是奏至上諭公曰觀不至不下其降勑褒觀公讀奏訖對曰計發奏之日觀尚在中道未足褒從之自是益重公時四方之事方殷七人者旦夕侍左右承顧問受㫖退治職務且兼稽古纂述之事不虚寸晷上時步至閣中親閱其勞且視其所治咸稱㫖時公尤勤勵遂皆進官公進修譔數月復進侍講明年改元永樂秋公請告歸省又明年春七人皆賜二品金織衣且勞之曰天下事咸朕與若等同計非若六卿之分理也無幾簡翰林之臣十數人兼春坊官任輔導公兼右春坊諭徳授奉訓大夫日分直進講經史四年春公得寒疾命中官以御醫来視賜藥物五年奉命徃甘肅同總兵議邊務察視守備還奏稱㫖六年夏喪父給傳歸既葬遂命起復是年冬喪母公奏歸守制時已下詔巡守北京不許七年春内閣胡公及公金公奉命扈從北京甘肅總兵何福奏降人托克托布合等率部来歸命公徃同福處置還奏上恱遂奉命持節徃額齊納之地封福為寧逺侯八年春車駕北征布尼雅錫哩公三人仍扈從至驢駒河命公先齎勑還報皇太子復還北京冬扈從還南京九年春奏奔母喪遣中使䕶送既還皇太子命公侍諸皇孫學且命公曰嚴則有成公盡心不怠重脩髙皇帝實録命胡廣胡儼黄淮及公為總裁十年二月賜誥命并追贈父母妻冬甘肅守帥西寧侯宋琥奏叛寇婁達衮逃居齊勤䝉古衛將為邊患時豐城侯李彬鎮陕西遂勑彬率師勦之且命公徃與彬計度十二月還奏餉道險阻今沍寒人疲馬瘠不可行且小醜不足以煩王師遂勑彬旋師無幾叛者復歸十一年春從守北京十二年三月從征衛拉特時皇長孫侍行上命胡金及公三人凡行營有暇即與講析理義開其聰明尚寳司官闕命公兼之既還勑翰林脩性理五經四書大全公三人皆為總裁十四年陞翰林學士仍兼庻子扈從南歸十五年春復扈從巡北京十六年夏進髙廟實録賜宴賚胡公沒公掌翰林院事益見親宻一時廷臣狎恩多縱忌公抗直發其私適太學闕祭酒衆共舉公實欲疎之上不聽公遂宻言十弊指斥五府六部都察院章留中不下十七年進文淵閣大學士仍兼翰林學士授奉政大夫十八年扈從北征秋還京冬将西征親藩奏建文中江西所垜集民兵可徴用出奏示公公對云陛下命復民業二十年矣今復徴非信上曰朕意固如此遂寢三殿災公偕金公陳便宜十數事皆見施行重賢愛民或陷非辜必援之尚書夏原吉以兵饟不給坐繫吕震言其柔姦侍讀李時勉嘗論事亦有言其賣直者皆激上怒公悉委曲為之辨解二十一年秋復扈從西征駐蹕萬全一切軍務悉付公掌寧陽侯陳懋奏番王也先士千来歸命公徃議定降歸奏稱㫖廿二年復從北征中道軍餉不繼上聞之命公與金公總計其數遂如二公言遣使招諭釋其弗臣之罪下令班師浙江三司奏處州之麗水福建之政和山寇刼掠請勑兩都司合兵討之公言愚民為有司所苦出不得已兵出則良民先被害願遣一勑使撫諭之不足煩兵上從之卒如公言無事一日上從容坐帳殿諭公二人曰東宫監國久熟政務此歸悉付以天下事吾惟優㳺莫年二公共對曰皇太子孝友仁厚天下屬心允稱陛下付託上恱師次榆林川上不豫既上賔凡沐浴襲奠飯含棺歛一切之禮悉出二公衆遂推公先馳歸報既至同尚書蹇公等議喪禮遂議即位禮仁宗皇帝嗣位進公太常寺卿授嘉議大夫仍兼兩職學士逾月進太子少傅授資善大夫兼謹身殿大學士山陵事殷太監孟繼極言公盡心喪事上嘉歎即陞公工部尚書仍兼前二職賜勑褒諭三俸俱支尚書一俸全給米洪熙元年賜誥贈二代考妣無幾上命範白金為方寸印四枚其文曰繩愆糾繆以賜師傅公與金公同受其一皆期之直言匡輔脩文皇帝實録公預總裁仁廟上賔時皇太子監國南京遺詔召嗣位公徃迎於徳州既還命公同有司相陵地宣宗皇帝嗣位脩仁廟實録仍預總裁髙煦反在廷多懐二心惟文臣三四人勸上親征公其首也遂扈從討平之師還特授駢蕃之賜馬騏激變交阯黎利聚衆抗王師總帥孱弱不支輒與利和且為利請立陳氏後遂以師還奏至上以示文武大臣皆勸發兵擊利上不聽竟偃兵息民公預力焉是年八月車駕巡邊至遵化聞敵逼塞下以道陿師難並進上率鐵騎數千先馳擊之文臣獨公從既還陞少傅進榮禄大夫仍兼尚書大學士三俸俱支辭大學士俸進兩朝實録賜宴賚又範白金為圖書刻方直剛正四字以賜公數月上念先朝老臣蹇義等四人皆春秋髙並賜勑褒諭命輟職務朝夕左右侍論議公預焉賜玉帶加有御製詩畫之賜公滿三載吏部以聞賜勑有忠言讜論禆益為多之褒賜宴禮部遂賜少傅誥進封三代後兩扈從巡邊皆至洗馬林而還宣廟上賔公復偕有司相陵地皇上嗣位公與同官三人協志合力以効禆益賜賚特厚脩宣廟實録皆為總裁書成進公光䘵大夫柱國少師兼尚書大學士如故賜玉帶時上日勤聖學命公同知經筵事五年謁告省墓賜勑褒諭加厚賚給傳遣中官護送既還京道薨春秋七十公仕於朝四十年皆居清宻考鄉試者一讀廷試巻九為人闓疏果毅遇事當為奮前不疑於論古人必欲出新見不肯茍同議辟率歸寛恕勤職事盛寒暑及小疾未甞少怠於四裔及邊徼事及邊将勇怯智愚靡不通知故忖量事勢率豫中内篤孝友睦婣之行家故豐裕且有厚䘵能濟窮恤患無間疎戚喜賔客善交際雖貴盛無厓岸貴賤小大皆歸心焉故聞其沒也咸有嗟咨悼惜之意所著文章有黙菴集雲山小藁靜軒藁退思集北征記訓子編藏于家元配劉贈夫人繼劉封夫人皆里處士仲穆之女子男六恭讓錫賜貴芳貴通女七兵部主事雷潛詹鑌陳順徳蘇潤其壻也餘在室孫男十二奏儼倫俊儉佶儆佐倧偉伸儀女七曽孫女二皆在室士竒與公同寮三十有九年同事四聖今内閣舊臣惟吾兩人未能退公又溘先余逝公之葬其子屬少保楊公書墓上之石余銘諸幽嗚呼凡今能文士大夫感公之徳述公之行雖有之矣若交之久知之深言之信者余兩人其庶幾可無愧也銘曰桓桓文敏通才博識遭際聖明光奮于績承明延閣著作之庭以翺以翔舒華振英北裔西陲從狩萬里職典者文亦兼知武羌人胸臆帥垣弱彊重瞳屢顧敷奏惟明晚陟三孤貳公𢎞化恪恭朝夕敢或遑暇帝懐敷仁鞠躬承之民懐被福黽勉成之志存寛恵行在果斷嘉謀讜議褒書有煥予告南旋曽幾何時上下延竚而訃奄来越昔内閣七人同事荏苒三紀我銘其四公夀考終哀榮寵光於乎文敏歿也不忘從子之宜墓誌銘之宜名相余從兄思貽甫冢子也母康氏相幼聰慧六嵗其父口授小學能成誦不忘九嵗日讀四書五經萬餘言旦出從外傅莫歸其父親教督之端靜不好弄群兒百方戱于前未甞動意也十三部使者行縣聞其名召試之深見賞異舉充郡學弟子員十五郡太守舉應江西鄉試中前列明年會試禮部中副榜當授教官思貽奏言臣之子年與學皆未可以為人師幸俾臣以歸教之曽益其未至庶他日不辱陛下任使太祖皇帝可其奏既歸益勤於學後充太學生太學生常數千人季試相屢占第一永樂二年會試天下貢士以相為首廷對第二甲一名盖元延祐乙夘初行科舉思貽甫之曽祖賢可先生即登進士第有傳在國史我國家混一天下洪武辛亥初行科舉思貽甫之從父子淵先生即擢進士第二甲一名逮今皇上龍飛初榜相所擢中名數同子淵先生人皆以為相庶幾不辱其先也相釋褐為翰林庶吉士上篤意儒術作興斯文簡曽棨及相廿八人者日就文淵閣大官給膳使盡讀禁中書賜居崇禮坊月給禄米又給膏火之費使以夜繼晝充其學期追迹於古人相素知自重又祗體徳意夙夜刻厲盖駸駸有進矣永樂十年授刑部浙江清吏司主事是年九月廿五日卒年三十有四娶曽氏繼廖氏子男二奕奐女一許嫁陳考嗚呼相孝於父母友於弟妹與人交必輔之善道族婣閭巷有急輒赴之篤好畜書在太學三年購積千餘巻既登第一夕盡於火哭之慟後悉貲重購之浸加於舊矣手一巻雖疾病寒暑不暫釋其志可見其才與其所學以試之宜有可稱而其不得年也固相之命乎嗚呼始思貽甫幼孤遭喪亂貧苦孑孑自力獨念先世詩書之業荒墜弗振懔懔焉圖維繼之務諸其身以待其後人壯而生相殆可望矣相壯又遽卒此亦獨相之命哉相卒時父母皆老奕始三嵗奐一嵗女甫齓也踰月其弟鵷自京師歸其喪及其妻子明年月日其父葬之邑千秋鄉盤古山之原余其從諸父也尤哀之為之誌云蕭榮忠墓誌銘榮忠諱原夀姓蕭氏祖某父某世居泰和城西榮忠和厚事親克供子職治家能謹尊卑外内之分負材具元季四方兵擾諸郡邑各團結為保固時泰和州監擢榮忠為義士授民兵若干俾捍廬陵東固之寇寇迄榮忠去不踰境猶不忍貧窮凍餒之民遇輒賑之饑嵗人賴以全活不可勝算皇明既定天下慨然曰吾得復為太平幸民豈當常碌碌不已耶即謝去㕓市尋山水之樂行尋邑東南一舎許泝仙槎江上桃源至于紫江之側徘徊樂之相土建宅環山帶水而竒葩茂樹旁輝上䕃又買園田廣樹畜以資祭祀賔客伏臈之費作塾館嵗禮致明師以誨其子若孫及其鄉人之子弟聞前國子學録蕭執先生教鄉校遣子本從之㳺先生卒又遣從游鄉先生蕭尚仁之門且戒之曰豈望汝讀書取青紫耶不學則無以明善植身而凡一切公私之務悉委冢子保晚節頺然惟日會賔聚朋飲酒譚謔酒酣起舞蹁躚作嗚嗚歌漠如不知有人間富貴憂患事者嵗庚辰九月某日寢疾而卒享年六十有八娶羅氏子男三長保次楚先卒次本今為邑學弟子員女三孫男九保等將以是年十二月十二葬其里里烏先之原先事本具書来請銘余與本交十餘嵗知慕榮忠亦十餘嵗矣去嵗始獲見於其家時已病聞余来大喜遽起降階肅余升坐余賔位觴余曰吾慕子久矣幾不及識子豈不為恨耶後余再徃見之竟病革不及言嗚呼惜哉乃敘次其事為銘銘曰孰存弗陂獨夷夷兮孰為弗勩獨嬉嬉兮蹈善施義以為基兮庸以昌大其本支兮又百斯世孰之與葵兮故登州府學教授郭先生墓誌銘登州府儒學教授泰和郭先生年七十有七援例得解去將去諸生閉學舎拜乞留留三月寢疾而卒某年月日也明年春正月從子彰始克走五千里啟殯奉柩歸其年十有二月二十四日葬千秋鄉楓樹湖筲箕阡先生諱約字敬守其先岳之臨湘人五世祖匯宋季舉進士授袁州司户後棄官来泰和遂為泰和人祖善升父文輝母蕭氏先生自幼端重不肯逐群兒狎嬉嗜讀書不懈晨夜稍長從鄉先生王方剛學尚書經又從前進士寧國尹戴邁先生學益大進當元科盛時三就試有司皆不偶先生曰第學未至耳學至能免我哉未幾兵興科廢先生齒益壯知益明遂撒去科舉業更從鄉名儒康匡山及余伯祖主簿公兄弟肆力古文辭聲譽益起國家混一區宇求賢興治洪武四年舉明經授應天府都稅司副使居再嵗有能聲賜勑命及朝服羅衣髙麗進布明年陞武岡稅課司大使時進士毗陵徐伯凝守武岡遇先生禮甚恭日請教授郡諸生後選髙科而升者多先生之徒二年遷𤓰州批驗茶引大使三年詔中外舉流外官文行兼優者教府縣學揚州府判胡乾祐以先生應詔既至試文淵閣中上等除漢陽縣學教諭漢陽學舊無明經師諸生不知所業先生至開道誘厲三年有選進士去者繇是漢陽科不乏人滿三考書最陞教授登州府學施教一如漢陽時故登州作興一旦出並海諸郡右在登州七年卒郡長貳以下以素服臨哭武將及市里之人皆嗟咨悼慟咸来會葬盖先生接人無賤貴少長必誠必盡故人皆敬愛樂就之在官三十年無纎芥過舉雖錢榖樷脞或甚寒暑一巻不蹔去手急人之窮常如不及遇人有不善極口詆不少貸所著文有淮南集二十巻湖南集若干巻東原集若干巻鄉先生陳心吾稱其雅馴而不陳發舒而不激為典刑老成廖先生子謙稱為有徳者之言娶吳氏繼李氏何氏子男一人獻生二十年卒常命從兄慶宗次子彰為嗣後慶宗失長子又命彰歸承其父而取彰次子純後獻至是純以彰之命齎先生從子泰和縣學訓導鼎所狀行屬余為辭銘墓先生甞逮事余曽大父待制公又從游先大父兄弟而交先父最厚余甞三年侍教先生漢陽先生教愛之如子今不復可親矣嗚呼尚忍為辭銘先生哉然義不敢不銘是以掩涕叙次為銘銘曰徳之厚禄以久禄雖庳尊以師雖尊弗顯其傳則逺楓湖之岡玉歸于藏有燁其光千載弗忘衛府右長史楊君墓誌銘衛府右長史楊君民服卒士君子相知者聞之始駭而疑既審而悲咸臨而慟曰不見幾日而遽為千古耶民服豈當止此耶天之理為善者夀子之命不係常理耶茍命皆然孰其勉於善耶是時民服父母妻子皆在故鄉六七千里外惟一養子在側及其僚與素徃還者之助治棺歛備既歸葬於鄉其父季琛先生哀之不忍泯之也屬余為銘民服諱黻自幼端厚寡言笑喜學問十數嵗已能力探黙識其後稍出為文鄉先生周仲方覽之喜曰楊氏千里駒也尤為學士解公所奨重永樂甲申侍父官東平舉中山東鄉試明年中禮部會試廷試賜進士出身踰年擢四川道監察御史授承事郎練達如素習臨事揆理務當於公聴訟折兩造之辭人無寃者而扶正抑邪其志行焉陞文林郎仁廟臨御下詔求言即上疏論敬天勤民崇儉戒奢等十餘事多見采納遂擢衛王府右長史階奉議大夫日以詩書進諭於王而隨事開益皆由於正甚見禮遇於裁處庶務粲然條理盖自寮屬以下咸服其徳能屬陪祀南郊民服素羸弱且病初起沐浴宿於公將祭又沐浴夙興就位冒寒甚祭畢退疾作遽卒宣徳元年正月某日也民服孝友誠至母甞久病憂形於色不解帶晝夜侍左右者四十餘日友愛弟妹惟其所欲不忍一毫傷其意待人以恕居家處鄉里及在官理政一不見疾言厲色而嚴於自守未甞以空匱茍於義外取一芥至賑貧賙急恒恐後已有無不計也與人處恂恂如不能言若商論徃事是非人賢否得失經傳疑義語娓娓不窮而皆精實有據其學於經熟書詩春秋旁究子史百氏為文章才識兼茂性淡泊無他嗜好獨好載籍購積日富不可購致者必借録進學之志始終不懈卒年四十有九楊氏吉水忠節家其曽大父伯允先生一時偉人見余所作墓誌大父廷章隠居教授季琛先生用文行舉歴仕州縣四十年所至有古循吏風今以衛府長史致仕母宋氏淦洪洞里名家封宜人民服卒宜人晝夜哭曰老乃失孝子嵗餘亦卒民服娶李氏封宜人子男三讃詠談女三長先卒次嫁徳清縣學教諭周仁本次未行民服於余同宗在京師徃還相好素愛余文閒暇晤語未甞不及文事嗚呼已矣而余所論述民服可以無愧色矣銘曰為仁與義惟日不足温其如玉嗚呼民服吳教諭墓誌銘永樂十三年梓潼縣學教諭泰和吳寧存淵丁母憂歸明年二月三日以疾卒於家其二子將以是年某月某日葬其邑某鄉某原先事以鄉貢進士曽鶴齡所狀世次行誼請銘吳之先居廬陵郡中宋紹聖間諱公萬者以營兵守泰和西平塞遂家焉至太學生李平始以儒顯五世至叔啟叔啟孫仲珪與安成劉雲章先生相好存淵之父也存淵為人淳質和易髫丱時聞其父與雲章先生講論倡和已知好學十嵗父沒隨其母辟兵亂走山谷書冊不暫去手亂定益篤志自勵聞永豐唐棐先生以詩書典教萬安縣學從受業焉泰和典教者遂舉充弟子員洪武癸酉中江西鄉試第六名明年會試下第為太學生為祭酒吳啟所重尋奉命督治陂塘湖廣之黄陂縣還賜襲衣楮幣丁丑除保寧府梓潼縣學教諭梓潼前此未有學官縣常遣郵長署學事諸生不知自勵廪食罷脫巾絛短服挟弓矢從里少年馳騁弋獵日以為常存淵至始立教條課諸生諸生始去舊習知務於學又奉府檄攝廣源縣學教諸生如梓潼永樂丙戌召脩永樂大典書成賜楮幣還職盖卒時年五十有九存淵居家有孝悌之行與人交必誠必盡急義如饑渇人有負之者未甞較也娶陳氏處士守道之女二子舉善止善皆有立矣銘曰澄江之南五十里曰三顧山蕭清節書臺在焉存淵居處講學其下其所興起於善有由矣而既拜梓潼之命過家省母適有芝駢産於其廬非其誠於中施於外何以致斯吳氏之後世永篤念之庶幾不隳故通議大夫湖廣按察使羅君墓誌銘正統四年九月十四日湖廣按察使羅銓文衡卒於官其兄文振銜哀茹苦自淮安走武昌歸其喪及其孤訃至北京翰林修撰邵宏譽述其事行索余為銘邵其御史時同寮余其會試時考官皆素厚也既諾之至是文振將以其卒之明年某月某日葬之山陽清江浦其考妣之墓之側遣人来趣銘羅之先家撫之宜黄元初有仕為吉水州學録者遂家州之東坊學録孫再可再可孫繼道繼道子景泰少㳺江淮遂居山陽娶范氏生二子文振文衡也文衡自幼敦茂不好狎嗜書冊不去手稍長充邑學生旦夕克勤所造詣日出同輩右永樂辛丑登進士第宣徳丙午擢廣西道監察御史無幾丁内艱歸杜門謹禮謝絶賔客服闋改廣東道時風紀頺弛朝廷陞通政使太康顧公為都御史奉勑選留賢俊罷黜不肖臺憲一新顧獨數數稱文衡之才且良曰御史不足久淹之也文衡襟宇闓爽而靜専厚重明於理勤於事慎於法審於情雖末務必求至當同輩有窒未通者咸就質之都御史有疑未決者咸召咨之凡各道擬奏刑獄率經文衡閱牘乃進一為盡心而未甞有矜色廣東民墾兵後荒田厚穫境内屯卒欲敓之不得而忿結衆夜竊所獲民覺起逐之卒棄走其三人失道溺死按察司論民三人抵死獄上文衡言於顧公律竊盜棄財走主追殺者免罪矧溺乎公從之民皆不死常州姦民告富家謀作亂所連甚衆奉命徃按之皆妄遂抵告者罪其明治獄多類此於事干禮法者不肯黙黙刑部郎有私忿相詬聲徹堂上堂上官不能制文衡曰是可長乎遂劾奏忿詬者皆降黜堂上官以宥免會湖廣闕按察使有㫖令廷臣舉端重廉能達於大體者遂以命文衡公議翕然稱允既至獄有繫囚二千五百久未決數日發遣殆盡人皆服剗弊剔蠧不怒而威時民間徴調繁夥有司徃徃舉錯踰制文衡憫其非得已也率從輕典惟受賕無所寛假毎語其同官曰内執法獄議或失中有大理為之平外莫為之平何可以不盡心景陵令楊季安廉正不阿見嫉於州州誣其罪於鎮撫使已下楊獄文衡為白之復楊官而正州官之造誣者罷之都指揮陳震縱私不法奪造御物廨宇為私居糾正其罪其武臣率挟威厲民前之持憲者巽耎莫能戢文衡一裁以法若武臣者咸誚其嚴卒不為動嵗饑近邑流民紛集城下躬出撫輯捐俸倡寮屬出米食之濟活彌衆倡家乘機買貧民幼女習歌舞稔嵗父母倍直求贖不得文衡聞之惻焉下令不予贖者罪之凡歸五百餘人奏減各郡驛馬千二百匹逓運所夫七百餘人以舒民力未卒前數日猶力疾草奏言都司官係一道武臣儀表不可濫授今都司官犯贓率循例罰役復職武人徼幸不知戒儆反為得計作過愈甚乞自今如係軍功陞者但犯贓罰役後復其職發守邊總兵帶管操備聴調如非軍功係保舉陞者犯贓罰役後降復原職庶幾有以警肅下人從之所至處同官如兄弟未甞有間言氷檗之操始終一致春秋四十有七而卒卒之日湖湘之人如喪所親中外縉紳君子皆有喪良憲臣之歎元娶楊氏贈孺人繼室李氏封孺人子男一雲翺女二銘曰羅氏之初繇撫来吉宦于黌序詩書代述學録五葉迨景泰甫載自吉陽来止淮土植善累仁所被既多二子續奮舒英振華起家賢科桓桓者仲履貞執義廉莊簡重廌其冠衣肇跡烏臺正色北面直道不回明法慎罰夙夜惟敬欽恤之仁敢怠帝命鞠躬小心厥績彌彰升董外憲厥施式宏民有蟊蠧以獮以薙民淪彫瘁以衣以食抑隂扶陽爰建紀綱芒芒荆湘恵流洋洋天之生才凡以濟世曷畀之才而年弗畀嗚呼文衡未半百齡其不忘者不在兹銘封翰林編修杜君墓誌銘翰林侍講杜寧縗絰奉宗人經歴童孟韜所述其父編修君事狀求銘其葬按杜世居黄巖之澄江其先與宋丞相清獻公同宗編修六世祖存矩祕書少監清獻從弟也五世祖澥軍器庫使髙祖諱茂實元象山書院山長曽祖諱叔埜慶元路學録徙天台祖諱順翁考諱舜道皆隠居不仕妣周氏編修諱仲威字希恭幼頴敏讀書一二過成誦不忘性孝友未成童父坐累當詣京師牽父衣悲號願侍行父母不許跽泣曰萬有一大人不免兒能獨安遂行父竟得白奉以歸父歿哀毁事母愈篤備甘㫖之養先意承奉得母懽心家甞遭誣官逮其兄歎曰母老恃兄以安奈何可去耶代兄行誣竟直女兄適士人而家窶以田七十畝貸之畊用賴以裕永樂初令郡縣覈實荒田蠲其稅縣以屬之躬勤周歴悉究其實姦欺不容細民賴焉通制户百置長里舊籍二長嵗久户耗已半而嵗役仍舊民不勝力言於上官并一長而更其籍民乃不困嵗旱令丞徧禱弗應遂躬率耆老禱龍湫雨隨注三日嵗用豐穫大夫士為詩若文詠之紀之縣令康彦文屢欲具薦懇辭乃已為人和厚坦夷重義輕利不務儲蓄而急人之急恒如弗及公直不私鄉里恃以為平閒暇讀書不倦尤熟於史而篤於教子家居用禮悉準朱氏不肯循流俗從事浮圖老子用子貴封翰林編修文林郎正統六年三月十二日卒春秋七十配施氏封安人克相于家子男三長寧登進士甲科入翰林累進侍讀才識為士論所重次泰次妥女二孫男六女三編修君之葬以是年十二月某日墓在巴之西山之原銘曰徳稱於宗行施於鄉其才允良而潛弗揚翽翽嗣興聿来寵章命秩斯煌奄歸于藏有發幽光逝也不忘太醫院御醫沈君墓誌銘仁宗皇帝在東宫二十年太醫惟院判蔣用文最見親厚藥非用文製不進一日用文病且殆上親御寳翰遣中使即其家問之且問脫不起醫士誰可任者用文書沈以潛氏名附中使以進用文卒踰月上即大位擢以潛太醫院御醫後數月士竒親聞聖語用文真知人以潛真不負用文舉士竒自是始識以潛而與之徃還沈之先世皆以醫仕宋南渡由汴徙蘇之長洲恩陵甞書良恵二字賜其家謂其醫之良有以恵民也至今鄉稱良恵沈氏元為醫學提領諱瑛者以潛髙祖也曽祖諱彦才平江路醫學録祖諱徳輝江浙行省醫學提舉考諱絅妣李氏以潛諱𤣥蚤喪父能自刻勵於學幾冠盡究其先世之傳進而明於素難仲景之書及潔古東垣諸家之㫖不執古方毎審求病源隨證用藥用之必効有為庸醫所誤而殆者徃徃求以潛而安而能報與否一不計也一時鄉之老於醫者多服之而求者日接踵户外矣郡太守舉醫學正科以母老辭禮部以名醫徴至𨽻太醫院即見重於上官有所疑恒就講論暨擢御醫為上所信用屢奉命徃視總兵官疾而京師士大夫尤多徳之宣徳壬子秋以潛得疾久未瘥自歎曰命其止此又聞其長子死疾益加是年十一月三日卒於北京春秋六十有四以潛為人平易質重不為矯激辯巧以譁世媚俗工詩好琴閒暇焚香一再鼓自適未甞求知於人故知者亦寡娶滕氏有婦徳先十三年卒子男四寅賔宇宙寅先兩月卒女五長未行次歸王森三尚幼孫男五禧祐禎餘未名女二曽孫男女三人賔將奉櫬歸其鄉竺山先塋之次卜明年十二月庚申合葬滕孺人之墓以治命齎翰林修撰金君問所述事行来求銘為之銘曰醫之克明審覈病源隨宜處方功臻十全彼其昧者執方俟病治十斃五哀哉人命嗟以潛甫允醫之明理究業精厥効孔徴以仁存心以義處物曷不百年恒濟夭折東南其鄉歸藏有墳来世有聞不在斯文東里續集巻三十六
