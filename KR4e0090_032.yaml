body:
  text: 東里續集卷四明楊士竒撰記雙溪清趣軒記雙溪清趣軒者廬陵劉子政甫之所居也雙溪在廬陵城北一舍許溪兩源夾出清冷澄徹可鑒可湘可漱可濯淺可揭而涉深可舟而遊也溪之上山逺近環繞連青疉翠雲霞煙靄朝霽夕隂舒斂變化不可殫狀又有平原沃壤可稼可蔬而林木森邃葩卉映照禽鳥之聲四時不一蓋軒中畢得之劉氏始自安成來徙於此世業儒術逮子政甫少孤能自樹立持身飭行至壯至老如一日導其子弟皆勉於善躬勤耕稼寒暑旦暮之需皆有所出公賦力役之征各有所任平居間暇少長咸集軒中講論經史辨析義利或與故人賓客尊爼吟咏消搖懙懙若將終其身焉豈非天民至樂者哉世之人其所樂不同蓋各因其志也窮者志乎通賤者志乎貴志而得焉乃樂也惟處乎山林泉石之間茹淡飲清安貧忘賤自足而樂者非幽貞絶俗志之素定者不能子政甫其志之素定者乎士誠足乎內不纍乎外則雖窮閭蔀屋簞食豆羮無不可樂茍無諸內徒汲汲乎外雖有玄佩朱組千駟萬鍾將其終日膠膠擾擾之不暇而暇於樂乎子思曰無入而不自得孟子曰反身而誠樂莫大焉子政甫必志於此乎子政甫春秋益髙而樂善之志愈篤其弟太常博士履節其子翰林庶吉士孟鐸皆發身進士與余遊是以子政甫屬余為文記其軒遂為之書曾氏耕讀軒記曾氏泰和著姓余家與之有連異時鷗江先生文學行義名重一邑傳道先生以易經為學者所宗所著書有易變通四書類辨庸學標注官至紹興路照磨後遇亂死王事余猶及侍原友先生先生先宜人舅氏也秀眉廣顙面潔白如玉雪儀觀偉然至今鄉人學子傳其文章翰墨景仰前修於乎其可復得哉能濟鷗江先生四世孫傳道原友兩先生從孫也不見幾二十年今年過京師訪豫晤言勞苦之外追思丱角時久成堂相聚狎嬉不覺惘然無幾將復别去求余記其家耕讀軒告余曰能濟不幸蚤失怙不克自振以紹前人聲光又貧不獲已歲僕僕江湖逐什一之利以為仰事俯畜之資非其志也數年徙家邑西金灘之上有少園田可以致力耕稼取足寒暑朝夕之需無意外之虞構數椽之室以居無喧雜聲間暇可以潛心載籍稽考古人之事而躬行之以此求償其素志願得一言記之且以自朂夫人之所為可貴者謂能以道善身也而道非學不明焉為學而有以自養無衣食之慮泊乎其內得以一其志焉學庶幾乎易成也自養者一皆出乎已之力尤古人所重觀能濟之志與其所務其庶幾乎雖然古之人不云乎顧力行者何如夫耕而不力雖有豐歲無所獲也學而不力雖有令質無所成也若是非徒志之謂哉孔子曰欲及時也此自力之謂矣以是為記願朂焉承訓齋記承訓齋者吏部尚書兼詹事府詹事重慶蹇公長子英藏修之居也英朝夕侍公聞公之訓退而恐或忘焉此齋之所以名也間請余為文記之夫公所以愛英而教之凡於明善誠身之方宜至備矣余何言世之人愛其子諄諄而訓之固望其能敬承佩服不愆不遺然藐焉聽之忽焉亡之如授簡無幾而遂失者蓋有之矣英惓惓書而揭之以著警於間居獨處之際其能知所重而顓顓於心矣乎既知之必將行之知而不行猶未知也譬夫將有適而問道於人也既告之以山川之所表途路之所出熟之於耳而識之於心矣然未嘗舟而趍車而赴也亦徒知而已故學者之於道必務力行以求至焉朂哉英也安意以受之致力以行之庶乎不負公之訓矣抑吾聞身之為訓有切乎言之訓者子亦觀於公之躬行者乎其敦厚周慎表裏一致歷仕三十年謹謹守法未嘗縱越蓋其忠實不欺得之魯簡肅不為傷人害物得之李文正至於張忠定之不飭玩好傅獻簡之遇人以誠范忠文之不設城府則公兼而有之也公之躬行如此凡欲安利其身不隳其名者猶將視效况於其子者乎詩不云乎執柯伐柯其則不逺英承公之訓法公之行由是進而求之於古聖賢勉勉不巳子所至其可量乎朂哉英也不然徒名焉以號於衆而已非公愛其子之意亦非子自愛其身之道也英朂之哉是為記具慶堂記左春坊左贊善陳君仲完致其同郡林汝澄之意求記其家之具慶堂贊善君之言曰林世家閩邑方山之下其父昌朝甫今春秋若干母陳氏春秋若干皆康寧豫適汝澄篤於事親得以致其愛敬之誠此堂之所以名也余聞而歎曰此人生之盛福至樂而何其見於世者少也世蓋有得事其父或不得事其母得事其母或不得事其父又不幸則皆不得事焉又有得事於貧窶之時而不得事於豐豫之日重不幸者則皆未嘗得事於一日焉凡天下可欲之事無不可以智力得惟此非人之所能必得也有其得焉者不謂之盛福矣乎然養親有其資而事親非得其道雖可以為福而未可以為樂也吾又聞諸贊善君林氏邑望族世篤於行而裕於資汝澄涵濡承藉於家宜其事親得致夫愛敬而樂也况今遭逢盛世汝澄以材舉歷事京師三年當授官矣而以需次歸其弟方弱冠篤志學問兄弟所以樂其親者不又有出乎服勞奉養之外者歟君子之樂親其道固大矣敬其身而行之內敦於宗族外厚於鄉黨上忠於君下仁於民皆本於事親之道而推之以是而樂其親樂豈有涯哉吾羡林氏之福而嘉汝澄能樂其親又重贊善君為之請也故既為記之而又有以進之云芝軒記上天仁愛下民爰簡明聖為之君師而必生賢智為之輔俾助益其教養斯民之事其誠有以當天之意則福之佑之又見諸禎祥以昭夫天人感通之實焉而禎祥之出有為上焉者有為下焉者陶唐景星之紀有虞慶雲之歌成周嘉禾之書皆堯舜成王之德之應也若下之人孝友仁厚慈儉之德發於身著於家而見諸動植之祥者代皆有之矧為輔臣其所任者國家天下之務而為之克盡乎誠弗違乎天有不見諸感通者乎故位與德雖有崇庳小大之異而感應之理一也皇上以天德居天位一惟天之道以覆育斯民仁恩所被淪浹海宇如景星慶雲嘉禾諸福之祥駢臻而疉應蓋同符堯舜成王之格天者也國家養民付諸戶部教民付諸禮部上臨御之初首擢胡公濙為禮部尚書公夙夜顓顓於所典三禮明五教修制度懷夷裔靡不盡其心而得其理繼奉命兼戶部又夙夜顓顓咨民生之休戚商國用之出入亦皆為之盡其心得其理矣蓋公忠厚惻怛小心悃欵孜孜仡仡惟宗社生民為心知之必言言之必盡而沈潛慎密未嘗一見聲色其才量與其存心溫然賢臣君子也上既特為公新作禮部公於後寢之左别作室四楹明爽靚幽旦夕治事畢燕居獨處順精神思政理必在於此一日室之中直公坐榻之前甃甓隱起翼旦起益崇發之得芝其從近尺衡半之厚寸之半瑩白如雪如脂肪文理密緻聞者咸往觀焉曰此玉芝也最後少師蹇公偕僕往觀少師公名其室曰芝軒顧僕曰子宜為記因稽瑞牒有赤芝紫芝金芝玉芝五色芝而玉芝五色芝世不恆有信瑞物也凡植物皆根抵也而瑞物根於和氣之凝惟仁德可以凝和蓋造化者為德而産也公致誠於事上愛民所係重且大非一身一家之比也則夫不恆有之瑞而出於公獨處思政之居此豈偶然之故哉故不可以無記雖然公今精神強固􅋵志愈篤好德愈茂其及於人非止此也則造化者之嘉應亦豈止此僕雖老且衰庶幾猶及見之公字源潔世家毗陵宋文恭公宿之後孝友忠信由進士纍官都給事中禮部左侍郎兼國子祭酒進尚書歷事三聖三十有餘年敬慎如一日上嘗親製文曰清和恭靖命範白金為圖書賜之蓋知其德善尤深云芝生於宣德八年九月記作於明年四月記者榮祿大夫少傅兵部尚書兼華蓋殿大學士廬陵楊士竒也綵繡堂記吉水胡元節年未壯舉進士擢官監察御史時二親具慶其寮之友榮之取杜少陵入奏行之語名其奉親之堂曰綵繡後四年超升廣西按察使是時其父敬方先生已捐館獨奉母淑人就祿以養而寮之友復榮之以綵繡名其堂於是元節求為之記夫養而得祿仕而得行其志皆人之所欲也祿養者以其官共子職也仕者率局於位不得輒出位有所問有所言惟任風紀者無所不得問不得言而其志行焉斯二者人固欲之而豈可以必得得之而以謂榮也固宜如又兼得之雖以謂至榮可也余交遊胡氏父子之間而相知有素凡敬方先生所為愛其子及元節所為愛其身者具有在也豈曰徒榮而已先生於其子蓋碩之以古人之道修諸身而達諸用事君也必致乎忠蒞民也必致乎愛以至凡所施無不一由於道也元節之存諸心行諸躬者蓋亦惟君子之道不敢茍有怠忽而懼辱其親也故其為御史也持已以嚴用法以平而有清謹忠厚之譽焉既受命署都察院其譽益流以閎而在廣西今三年明乎為治之大體綱紀肅焉畏愛行焉人鮮有不服之者非其由於君子之道本於先生之愛而致然歟蓋惟道之行足以榮其身及其親且聞於逺也如元節繼今恆由斯道政益行功益懋而使人謂胡先生有子其賢如此朝廷有風紀之臣其賢如此相與譽道之於無已者豈獨親之榮固國家之光也豈曰徒榮而已哉遂書以為記而俟其成焉望雲樓記山西臨縣髙惟明既喪其父母作樓面所葬處旦夕登望以泄其永慕之情而名其樓曰望雲介國子監丞張緝熙求為之書余雅未識惟明監丞為人廉其所與宜有徵矣夫父母吾身之所自出也至愛孰加焉聖人知其然也故事親之禮晨省而昏定出告而反面朝夕出入不違其親固本於人情矣夫生事之如此其既沒也至愛之情有能遂已乎昔之人於其配其子之沒而至愛之不能巳猶有作臺觀以望焉者矧於父母乎哉惟明之為斯樓固天理在人心不容巳矣惟明自太學生授衢州府通判改太僕寺丞今為濟南知府吾聞其所至能愛民亦其愛親之心之所推乎然吾所遇仁人孝子之不忘其親而以望雲名所居者不可數計非天理民彛之正人心之所同者乎望雲本狄梁公事公有唐忠臣其忠本孝之所推其孝則因忠而愈著也夫君與親其德同其尊同欲盡心於親而不及則求盡於君初非二途也後世誠欲希梁公之事曷亦究公之所立哉惟明荷國厚恩致位如古諸侯蓋夙夜圖惟效報之時也故余因書斯樓又進之於忠君之道忠君為孝之大端也將有徵其成而大書者矣惟明勉之康氏重慶堂記去泰和城西五里所曰文溪文溪之上原田曠衍四時禾黍麥菽之藝不絶而三顧天柱武姥玉華諸山如屏如戟環列四向龍河之紆徐贑江之閎壯駢帶于前蓋近郭佳勝也康氏世居其上族繁夥接屋而居其人皆俊爽通辨負邁往之氣仲升其一也仲升始生數日喪其母氏父思中以事謫戍萬里外置仲升而去祖母劉宋進士簡子之裔也躬勤保育之稍長矣俾後季父思誠無幾思誠復以事謫戍萬里外又置之而去仲升終賴劉教育底于成立以有妻子興家於饒裕今年餘三十矣一時宗戚長老凋落無遺而劉氏春秋八十餘巋然獨無恙仲升恆自幸喜以為私家之慶然念二父在逺徼朝夕縻於祖母之養不能往省奉斯須之樂而向之同謫戍者淪落不作不知當幾人矣心恆耿耿也一旦二父皆以不任罷歸齊民一家之中於是行者復幼者壯老者康祖孫父子歡聚怡怡仲升重以為家之慶也乃作新堂奉祖母及其二父顔之曰重慶志幸也以書來京師請文為記余惟天下可欲之事凡出乎人者無不可以力取惟出於天者不可必得天蓋不容以偽為也天人感應之際明矣有人於此忠厚和平恭慎慈儉而行之以至誠久而不巳未有不蒙福者蓋天之所應也仲升之重慶亦天乎哉抑豈纍世所積哉夫庭列之樹彌茂非一日之積也而日夜所息雨露所潤一旦截焉弗繼或牛羊斧斤又從而侵之則其所謂彌茂者亦已矣仲升繼今因其積而益加厚焉將慶之所集吾見愈衍而未艾也故為記之使勉焉永樂壬午二月記敬樂堂記敬樂堂者桃源蕭安正甫之子事親之堂也君子謂事親者居致乎敬養致乎樂此堂之所以名也桃源在泰和東南四十里蕭氏自宋貢士漢卿始居於此至于今安正甫若干世矣安正甫好學博古論議魁偉而修飭整潔翛然塵表也其所交皆當時名卿大夫道德文藝之士論者謂其有凌雲之韻名所居曰凌雲軒名卿大夫道德文藝之士作為文章稱述之甚富也而於今七十餘矣頳顔華髮髙風逸致回視一時儕輩不幾於魯靈光巋然獨存而合族而居數千指惟安正甫年德俱髙有子五人皆恂恂雅飭率履於善平居謹事親之禮至於行已接人無所不慎恐貽憂其親愆為子之道以是安正甫愜乎心無違乎志樂乎內無虞乎外超然與天遊有以自得也自教道不明人知事親者豐於養或簡於敬敬於親或不能敬其身能敬其身斯其言行無倍於道而有以植乎福慶之本矣此親之所以樂也蕭氏之名堂庶幾其可徴乎余自髫丱時從先生長者之側識安正甫前十年館于蕭氏孰又交其諸子其子今存者德贊德剛德聚德雍而德聚來京師求記亦以余相知之久也故推本為之書云溧陽縣儒學重修大成殿記髙皇帝正大統之三年詔嶽鎮海瀆封號如古制以山水稱忠臣烈士稱當時初封出於歷代所加者一切罷去孔子明先王之要道為天下師以教後世非有功一方一時者比封爵宜如歷代所尊崇著于令典垂之千萬年而定鼎之初即建學立廟京師親臨釋奠又詔通祀於郡縣又詔罷從祀之戾於孔氏者所以揆前聖之大中而垂永代之鴻範也皇上繼承大統益崇孔子之道以治教天下親幸太學行釋奠禮又詔有司治曲阜廟蓋自漢以來崇禮先師極盛於今日矣孔子之道天之道也國家生民不可一日以無者伏羲神農黃帝堯舜禹湯文武行斯道於上孔子明斯道於下皆聖人也而使後之繼伏羲神農黃帝堯舜禹湯文武之位得以行斯道者孔子之功也論其功而隆其禮聖人之心也由是天下至於海隅郡縣皆有廟學其人皆知孔子之道尊且大而况乎首善之地百里之外其民心嚮慕興起為何如哉溧陽縣故為州有廟學元季燬於兵國初林公慶知州事乃新作之垂五十年矣禮殿敝壞教諭梁本之始至謁先師顧瞻惕然懼無以妥明靈副德意於是積俸廪節百費以謀更新而訓導陳余適來議益克協乃白之縣令丞皆曰此吾職也敢不竭力以相縣民耆老聞之又皆曰此非以圖善吾民乎奈何吾坐視自逸即皆自言碩有助也本之以其情言於朝從之於是自某以下各隨力出私帑作大成殿若干楹易故以新工良材堅髙敞𢎞麗加于舊規又新作夫子四配十哲像踰年以成由是嵗春秋邑長二學官諸生奉詔行禮對越有嚴秉虔將事罔或踰越退而斂焉敬修所學以求無怍於古聖賢將上以光國家之用下以厚邦邑之俗所係豈細故哉諸生來請書其成夫受命有政教之寄而能究知本源之意相與殫力一心不費於公不勞於衆以底成功可謂不忝而為民父兄於斯舉奮起趨事皆如當然又以見人性之善而王化之被矣皆可書也是役也肇於永樂庚寅某月明年六月竣事經始者本之垂成以家艱去代本之者陳余及訓導某皆與相力故具書之其耆民之與力者若干人書之碑隂嗚呼後之受政教之寄於斯為民父兄於斯者可以觀矣忠孝堂記忠孝人道大端而百行之首也人之倫五莫大於君與親古之人有言事君如事天事親如事天君親之尊與天等也忠者所以事乎君孝者所以事乎親忠孝修而後人道立世道平故聖人所以為教學者所以為學必在於此夫上天生人賦之五性而忠孝具矣非有待於外也故君子者必求諸巳而惇行之太師英國張公有見乎是而名其燕居之堂曰忠孝用朝夕自勵卓哉乎其志也公事太宗皇帝於潛邸翼龍興之運南征北伐勳庸赫奕歷事四聖爵崇上公位躋元佐祿秩日進恭謹日嚴四十餘年靡間毫髮確乎大臣君子之心也公之先王秉志端恪識慮髙逺奮忠勇死國難配享廟廷垂光簡册而公繼述之志顓顓有在太夫人惇德樂善明於慈訓方今春秋踰八望九壽祿康寧諸福咸備而公奉養婉愈惓惓愛日慤乎仁人孝子之心也然猶欿焉不以自足必見諸名堂自警非卓乎其志者歟古謂孝者所以事君又謂事君不忠非孝蓋忠孝一道也凡人非父弗生非君弗食忠孝在人譬若車之兩輪不可闕一矧身受國家重寄而冠冕百僚者乎雖然君子之所以立德立功亦惟其誠而已誠者貫表裏始終而一之者也惟誠斯德建功立愈逺而道愈光此君子誠之為貴也士竒與公同朝久前後陪公在史館七八年蓋悉公所存之厚問承屬記忠孝堂故請以是復焉翰墨林記永嘉謝環庭循清雅絶俗之士也敬言行如處女務義而有識不慕榮不干譽家無餘資而常充焉有自足之意知學問喜賦詩時吟咏自適有邀之為山水之遊者欣然赴之或數日忘返所與交皆賢士君子庭循善畫初師陳叔起叔起元張師夔髙第洪武初有盛名兩浙清介凛然不茍接人識庭循於總角特愛重之一經指授輒得其妙處叔起亦傾寫底裏庭循遂馳名於時永樂中召在禁近宣宗皇帝妙繪事天機神發不假於學供奉之臣特奬重庭循萬幾之暇恆侍左右間承顧問率以直對上嘉其誠屢書御製詩賜之及有金幣衣服之賜再進官錦衣衛千户蓋授近職使食其祿也庭循益執謙虗不倚為榮退恆杜門謹守雖其中確然而外未嘗一毫忤物所居深邃闓爽森列唐宋以來法書名畫造之者如衆寶在目應接不暇有欲得者聽持去無所靳惜所謂寓意於物而不留意者庭循有焉庭循素善余嘗間壁而處者纍年所居故號米家船余以翰墨林易之庭循達者也凡世間竒絶珍祕之玩豈其長存雖王逸少顧長康之迹皆神品也歷數百年後即磨滅且盡况其次者乎獨其行事因文字以傳者雖千歲之逺猶一日也昔蘇文忠公記石氏畫苑特著其為人故吾於翰墨林取以為法焉萬玉潭草亭記客有至自三山者余諏之曰海邦丘園巖谷之間豈無髙尚逺蹈而未出者可得聞乎曰有之然亦寡矣出福州城百里外有溪曰義溪溪之上有文筆石鼓岱頂諸山皆竒秀又有泉石林木之勝幽人淡士之所樂也有君子曰陳周仲昌嗜學問通魯史明隱公以來二百四十二年之事與夫聖人尊王抑霸之旨然不數與人言好為詩時有所作吟咏自怡耳非其人弗友非其義弗取飲清茹淡翛翛乎埃壒之外也所居石潭之上有竹數萬挺作草亭其中題曰萬玉潭草亭水光澄明林影森邃情與景會四時雖殊雅趣不絶仲昌嘗倚竹而歌曰修竹兮青青中虗兮外直素節兮貞姿寒暑兮一色冷冷風兮朝夕余舍之兮焉適又嘗臨水歌曰湛淵兮渟渟淡靜兮泓澄渺微波兮不興涵天光兮容與恆皎潔兮鏡平聊適我兮性靈國風所詠考槃碩人仲昌殆近之哉比年仲昌用子貴封文林郎監察御史然自是益斂迹不出深居草亭之下若將終身焉者余聞客言歎曰仲昌可為清貞之士哉蓋昔人以竹比玉君子之德亦比於玉止水湛然則明德之喻也仲昌之適乎此其固專務諸內歟豈外物者所能動之哉客去以余言告仲昌之子叔剛明日叔剛詣余曰他人有心豫忖度之荷先生知家君幸書所與客言者畀歸為草亭榮叔剛永樂十九年余考禮部會試時所奏進士由監察御史再升翰林侍讀同在館閣十餘年為人溫恭端靖蓋仲昌德之成於家者也姚氏祠堂記工科給事中姚銑間詣余請曰先世自光州至固始徙閩族益蕃更五季之亂譜亡無傳今所知者宋紹興中國子祭酒子材始家侯官遂世為侯官人子孫歲時展祭酒墓至於今不廢然莫詳祭酒於今為幾世蓋更宋元之亂譜又亡矣銑七嵗初入小學先考君訓之曰吾蚤孤艱窶孑孑獨立以共養老母暨汝母來歸吾賴賢內助而家稍殖惟汝母之能孝也於薦祭奉養咸秉誠相余不幸吾母棄背汝母今復去世所以成家奉先者在吾汝不圖惟務學植身以效助乎言已泣下霑襟銑記憶先君之訓不敢失墜也時先君方作譜牒既成以授銑又訓之曰宗無譜斯昧本矣吾宗先譜蓋不復可尋究此特據吾所知者録之尊祖睦族人道之大端汝勉之哉然吾有大闕焉先世故有祠堂及祀田歷兵革皆廢矣非祠何以妥先靈而致追逺之誠此吾寢食所不遑寧處者也汝勉效助焉時地狹隘不足為先君病且革顧銑言必成吾志嗚呼先君奄棄孤矣惟所遺命孤者賴先君之靈今祠幸茍完蓋拓先廬之側得亢爽地從三十步衡如之有贏三倍焉為堂二十八楹為後寢及庋遺書祭器之室於寢左右凡二十楹繚以周垣嵗時行事儀物約用朱文公所制碩執事矜之特書其成庶幾先君之志不泯於後世而姚氏永有賴焉余聞而歎曰此王化所關士行所始也祠堂本於文公念人子皆有追逺報本之心而行禮亦必有其所故約古而為之制其視古蓋簡矣然世士大夫家雖有祿者能遵用之已鮮豈其智與力有弗逮歟孝哉乎姚君布衣食貧而惓惓此心將沒猶顧命其子不已銑心父之心卒成厥志於既沒之後孔子曰孝者善繼人之志銑可為能繼矣禮先祖有善而不知弗明知而弗傳不仁銑克知克傳矣大雅云孝子不匱吾於姚氏見之故敬為之書其考諱忠字用恕其孝如此他行可知沒於宣德五年祠作於七年銑由進士擢官近侍溫雅清慎蓋復振其宗者也金溪精舍記泰和縣之東四十里章江之濱曰金溪溪之上有大姓曰劉氏前二百年劉氏資産之充文獻之盛為邑東之望元初有號金溪先生者清德博學為縉紳君子所重於先曽祖待制公莫逆交遂相與為婚姻家金溪之孫思敬先生之配先考少傅公同産姊士竒少孤思敬先生與姑氏嘗誨之使知其先世以圖無忝士竒謹識之既而獲聞金溪先生之德之概先生藏修之居名金溪精舍其子若孫旦暮侍左右恆語之曰吾之先纍纍以德義傳續為積善之宗為鄉之表不徒以資也若等必務學以明善誠身立于寡過之地庶幾以承吾宗間聞時之人有一善行必喜而語其子孫曰若等不勉可乎聞一不善之行輒曰若等其深戒哉故其子若孫皆秉德蹈義金溪先生逺矣精舍亦燬於元季之兵我國家混一宇內劉氏之田廬聚蓄蕩無存者思敬先生慨然欲復精舍而廢於肓不克惟恆誦先祖之訓以勵其子弟族人誦已蓋未嘗不悵焉以思戚然以自傷也思敬先生靜修碩學擅文詞自其少年涵濡家教又親炙吾家諸老而沾被其膏馥後來學者仰之蓋嶷然老成典刑焉其子持志恂恂篤於善行而教授養親終其身蓋亦有志復精舍而未克也持志之子諫既喪其大父父乃克建數椽以為精舍而馳書北京請記諌可以為難矣余家居時諌甫齓也聞今與其子皆教授里中而養母能孝無義外之慕劉氏之善慶有自哉詩曰無念爾祖聿修厥德余喜諫之克繼先志故述其先之訓告之將并使其後之人皆圖無忝蓋亦思敬先生昔者所以告士竒之意也是為記東里續集卷四
