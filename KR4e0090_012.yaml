body:
  text: 東里文集卷十二明楊士竒撰神道碑故推誠輔運宣忠效力武臣柱國後軍都督府左都督西寧侯宋公神道碑銘永樂五年七月某日推誠輔運宣忠效力武臣柱國後軍都督府左都督西寧侯宋公終于肅州訃聞天子悼歎遣官賜祭勑有司給傳還其喪明年夏至京師葬聚寶門外其考之塋之次公諱晟洪武中所賜名其字景暘宋世家鳳陽之定逺元季我太祖皇帝龍興嵗壬辰公隨父朝用兄國興來歸明年從克濠州又從戰敗賈魯父兄並以功授萬户甲午從張天祐克五河泗州旴𣅿又並進總管乙未從上克和州渡江下采石太平總管邵榮等潛有異謀國興察知以聞榮等伏誅從克溧陽進攻南臺國興戰沒命公襲兄職丙申從攻陳額森水寨克之遂從克南臺公父升廣德元帥丁酉隨廣德公克宣州還改廣德公天寧翼元帥以老留建康公從鄧愈克徽州受功賞戊戍召入侍衛己亥襲天寧翼元帥庚子調征饒州及江西諸郡以次平賜襲衣文綺命充統兵官平諸山寨洪武元年克建寧遂留守禦新定官制實授武德將軍建寧衛正千户四年升懷逺將軍建寧都指揮使司都指揮同知冬召還升江西都指揮使九年調大同授龍虎將軍十一年調陜西所至治兵撫民不嚴而肅十二年掌涼州衛十三年逐北敵至白城獲其人馬甚衆十五年父病詔公還侍又三年父沒既襄事復鎮涼州寇時數為邉患公率兵討之追至額齊訥之地斬其凶渠伊蘇爾沁等及其衆無算餘悉生縶送京師又招降敵偽國公吳巴圖等萬八千人而送其酋長衮布達喇等百五十人詣京師簡其壯者傅卒伍餘悉處之善地俾耕牧自便驛召公還京奬諭再四賜賚甚厚復鎮涼州十九年召還升驃騎將軍右軍都督府都督僉事賜鈔文綺以其官贈其三代仍鎮涼州草三年夏遣中使就賜白金及鈔至秋復三遣賜鈔文綺授制諭充總兵官征哈密勒破之哈密者去肅州千餘里敵所城也誅其偽王子伯勒齊爾等三十餘人獲敵衆千三百人及金印一銀印二悉送京師所獲馬牛羊咸給將士二十五年復充總兵官征罕都西畨叛冦誅禽七千五百餘人獲馬二千五百牛羊十萬遂還京師二十七年調中軍都督府是嵗敵冦遼東命充副總兵率兵討之遇戰於嫩江獲敵衆千餘馬倍之明年廣西帡幪諸寨連結為亂命充右副總兵往征之誅禽七千餘人賊平還京又明年總羽林八衛兵往平五開龍里十三洞之冦三十一年率師城萬全諸衛歸二年出鎮甘肅太宗皇帝初臨御公朝京師升後軍都督府左都督永樂元年授平羌將軍充總兵官仍鎮甘肅三年寇曰益聚近邉公遣人諭以朝廷德意其酋長巴圖特穆爾婁圗爾罕率部衆五千馬駝萬六千來歸邉境底寧事聞賜勑奬諭命都督徐膺緒尚書趙羾持節即軍中封西寧侯賜推誠輔運宣忠效力武臣柱國仍後軍都督府左都督食祿千一百石加賜田若干頃又二年以疾終享年若干公曾祖某贈某官妣某氏贈某官夫人祖一公及考皆再贈某官祖妣朱氏妣陳氏皆再贈某官夫人公之配丁氏許氏皆封西寧侯夫人子男幾某某瑄府軍右衛指揮使先公卒琥駙馬都尉尚安成公主瑛駙馬都尉尚咸寧公主永樂中琥襲西寧侯仁宗皇帝嗣位琥坐事改命瑛襲西寧侯孫男幾某某傑金吾左衛指揮使偉羽林左衛指揮同知俊天䇿衛指揮僉事儼旗手衛正千户佐龍驤衛正千户嗚呼公勳著國家貴聨戚里慶澤被于後嗣名聲施于無窮固本于際遇聖明千載之幸會亦必其忠義之行閎逺之材克勤始終有以迓承之矣故既述其事於碑又系之銘曰天建皇明龍興淮土魁智傑能如雲從附定逺密此猶漢沛豐父兄偕來有偉宋公義旗所嚮仗劒先驅神武不殺迎降歡呼長江飛渡金陵定鼎分命股肱出綏四境于宣于歙于番于閩公從總戎聲威曰振甌寧既靖公留奠之進奠藩垣大江之西雲中在左分陜在右公來填撫煌煌旌棨敵窺西陲公往遏之斬縶其渠招懷其餘繫寇遼陽剃孽嶺表如燎滅枯如鐡摧朽馬迹所歷幾周四遐桓桓之志無康于家文皇臨御親任舊老自西來朝蒼顔白首天子曰嘻卿宜在廷紓豫西顧孰乎愈卿公曰臣職及臣未衰西人欣欣迓公復來鞠躬盡瘁遑敢怠寧邉人恃公屹然長城宣上德恩洽于遐外耄倪畢歸如川赴海天子曰嘻維時茂勳崇爵豐祿豫慰乃勤維公遭際實多父兄偉績賢稱晚而益閎存沒榮哀歸從先兆來世莫京繇公所肇墓道有石其崇九尺太史述銘永耀無極故懷逺將軍成都右衛指揮同知贈平江伯陳公神道碑銘公諱聞字伯益姓陳氏其先潁川人公之祖諱三省徙廬州合淝遂為合淝人考諱重一考以上三世皆不仕當元之季四方冦亂蜂起公素有志操強膂力善騎射遂倡義募勇保障其鄉太祖皇帝龍興歲乙未渡江公知天命有在率衆來歸從王師下東郡縣授帳前右元帥府總管進取宣歙衢婺𨽻大將軍麾下征陳友諒大戰鄱陽友諒死從定漢沔荆襄諸郡從征張士誠及方國珍浙東西次第平公臨陳對敵神間意定矢石交下而敢勇益奮間被傷裹創復戰故所嚮有功實授管軍百户進副千户守荆州主帥以公勇毅有謀與兵五百人令守歸州時蜀未附而歸與夔重慶接壤曰見侵敓公至歸視其城墮阤且非可以用武乃擇地距城二十里楚臺故址建千户所治髙城深隍繕兵甲練士卒實倉廪悉足用蜀人以舟師來攻公預清野待之而以老弱嬰城固守授之方略躬率精鋭伏緣江要害處敵薄城下守備堅不可攻又野掠無所得斂而還舟伏兵突起斬馘不可勝計敵大敗引去自是無一足犯境進武德將軍正千户在歸州八年民用晏然洪武九年調德安千户所治兵保民一如歸州十一年進武節將軍遂升明威將軍成都前衛指揮僉事討龍馬橧梁諸寨之未附者悉下之王師征雲南公率兵以從所嚮克捷繼討西番及烏撒散毛諸洞之冦斬俘招徠威懷並施升懷逺將軍成都右衛指揮同知賜誥命功賞二十四年以老疾致事子瑄襲職公享祿養二十有餘年永樂甲午九月疾作時瑄奉朝命在外公疾革顧其孫儼等曰吾少遭兵亂幸際龍興之運致有祿位以延被嗣人今老且死無所憾但念未有以報國恩為我語汝父勉敬事朝廷務忠為孝即吾死瞑目矣言既而卒是月己丑日也享年八十有三以瑄貴制贈公之祖若考及公皆為平江伯祖妣孫妣朱及公之配皆為夫人公配初太原王氏繼同安王氏望安縣尹思齊之女淑慎有儀克配君子前公二十年卒子男二長瑄自指揮同知纍官都督僉事太宗皇帝靖內難有翼戴功封奉天翊運宣力武臣特進榮祿大夫柱國平江伯竭謀致慮一心國事嶷然於今老成人其有以成公之志矣次瑢女一歸甘州後衛指揮同知李未孫男八佐儼儀倫侃信俊傑女三長歸李方次歸江隂衛指揮同知張英次未行曾孫男若干瑄以公卒之嵗十一月庚申奉葬合淝神龍鄉蜀山之原先塋之次銘曰有元失馭海內鼎沸天命真人龍飛淮涘龍興雲從矧時邦鄰公趍來歸弗謀弗詢西征東討以弔以伐公挺材武從罔弗獲從守南郡遂守秭歸密邇勍敵凛乎阽危殫厥智慮靡朝靡夕相土徙宅崇垣固壁練弱為強實虗以盈敵至就斃猶湯沃冰坐填八年境肅民富進秩褒功改命鄖土奕奕梁藩簡陟衛僉剪梗懷服夷類乃懕南詔西羌暨于洞獠斬俘招徠籌功多有龍章斯下寵賚洊頒止足之志未老歸間恬淡怡愈既躋耆夀易簀有言允淑厥後顯顯後人偉績與名公訓所成公沒其寧麗牲有石矗焉墓道述行琢銘來裔是告故文淵閣大學士兼左春坊大學士贈榮祿大夫少師禮部尚書諡文穆胡公神道碑銘太宗皇帝御天下二十有三年文武之臣各展其才能達諸事功若竭誠效力始終不渝者其身雖沒所以寵眷之率有進而不衰其文臣遭遇之盛者文淵閣大學士兼左春坊大學士胡公尤著者也公初以進士第一為翰林修撰階承直郎又明年太宗皇帝入正大統升侍講踰月改侍讀進承德郎永樂二年升右春坊右庶子階奉議大夫仍兼侍讀四年進翰林學士兼左春坊大學士階奉政大夫進文淵閣大學士仍兼左春坊大學士又三年得疾且劇上數命太醫集衆醫之良者往視曰遣中使問疾既卒上悼嘆不已命工部具棺禮部賜祭者再贈資善大夫禮部尚書諡文穆國朝文臣有諡自太子少師姚公廣孝與公始也又命官給舟還其喪命有司治祠墳時仁宗皇帝監國南京公之喪過焉遣官臨祭賜賻甚厚葬畢其子入謝官其長子穜為翰林檢討仁宗既嗣位追念公舊人加贈榮祿大夫少師禮部尚書遣官諭祭且厚賜其家公遭逢二聖恩備始終何其愈久而愈盛也公居官敬愼在上前承顧問應對必盡誠必據理而忠厚為本未嘗及人過失事於奉旨制勑視草即有所見必具可否以聞多見采納所撰進文字上知出公筆輒稱善所奏對語及所治幾務退未嘗出口雖親厚不敢私涉有問蓋自守之嚴有素事太宗皇帝十有七年凡巡幸北京親征北邊翰林率公與楊公勉仁金公幼孜在扈從信任甚篤禮部郎中周訥建請封禪羣臣亦多言此太平盛事上皆不聽時獨公之言與上意合既退作却封禪頌奏之丁母憂召還上問百姓安否對曰安但郡縣窮治姦惡外親為民厲遽詔罷之其兼春坊也小心盡誠多所裨益故尤為儲君所厚而沉靜謙約以滿為戒未嘗干人以私人亦無敢以私干之兩考京畿鄉試四為廷試讀卷鑒别公明奉勑修髙皇帝實録及五經四書性理大全書皆為總裁志于扶植名教奬掖善類果於義事於利不茍取與未嘗一比匪人所與交必輔之於善不善去之不復顧小人有不滿公者屢造言毁之賴上深知之不聽遽黜毁者而公自執愈堅意度蕭散雖身處榮祿未嘗一日忘山林幽淡間逺之趣公退閉户讀書賦詩而已初名廣廷試傳臚更名靖永樂初復舊名其字光大其齋居名晃庵因以為號公十數歲喪父已有志問學內浸漬其母訓外則曰受從祖子貞先生之教故德器不凡居家篤倫誼處鄉曲恂恂執恭讓既冠薄逰閩中閩之前輩君子率忘年與交歸而從黃伯器先生講論得所歸宿之地而曰進焉其學博究經史百氏下逮醫卜老釋之説亦皆旁通而用志性命道德之旨晚益有造詣為文援筆立就頃刻千百言沛然行雲流水之勢賦詩取適其性情近體得盛唐之趣工書法行草之妙獨步當世四方重其文翰求者日接踵户外雖無厭倦意然非其人不苟豫其卒以永樂戊戍五月八日春秋四十有九其先自金陵徙廬陵宋忠簡公銓其十二世祖也曾祖鼎亨祖彌髙父子祺纍官延平知府母吳元進士永豐縣丞師尹之子永樂中贈公父翰林學士封母太宜人公娶夏初封宜人洪熙初進封夫人子男三長即穜次穆次穗女三長嫁陳年次嫁解禎亮次嫁宋懷孫男六女七所著文章有晃庵集扈從集若干卷公與士竒同郡同官知契最深未卒前二年有後死則銘之約既卒其孤又奉臨終之命索文刻墓石嗚呼士竒先公生五年豈謂竟銘公墓哉蓋今九年乃克成之銘曰經國所資文武並施維武以靖維文以治巍巍太宗統御九有任武暨文如左右手公職詞垣十有九祀秉恭執勤司帝之制玉册金簡天章龍文光華曰星敷宣帝仁萬幾燕間清問前席公所入告惟帝時懌公所蓄志寬惠被下沕穆泯焉密贊鴻化春宫輔德平直之行二聖惟明燭鑒公誠好文之朝儒林之首人聳其瞻公視無有泊虗之存簡肅之度彼其何心有好有惡仲尼有言善者好之善有好公沒思不衰寵章駢蕃賁終猶始始終之全曠代其幾金螺在左文川在右埋璧有光上貫牛斗墓道之碣為尋有多最行琢辭來者是儀少保户部尚書贈特進光祿大夫太師諡忠靖夏公神道碑銘公姓夏氏諱原吉字維哲其先家于饒州曾祖復祖希政元末為湖廣行省都事兵亂死之考時敏為湘隂縣儒學教諭遂家湘隂公自幼端厚好學年十三教諭公沒益知自勵母夫人廖守莭教子公終父喪即出教里孰取束修以資養而率其二弟恭侍婉愈得母夫人歡心出入鄉閭其老長皆忘年賔禮之時已負巨人度喜怒不形里少年嘗被酒侮慢公里人共擊之詈之曰汝小人不知鄉有君子耶有鬼物白晝附人言禍福驚動里中或強公往觀卒無所言他日復有言或問之故曰夏公端人吾不可以近公一無所動心洪武庚午嵗以詩經選鄉貢入太學遂擢户部前四川部主事授承直郎進承德郎曹務叢脞凡倉庾府帑之出入簡牘之著悉有條理同官後至于事有未通者咸以質公曰環左右公雖紛冗必為之盡心蓋人人德公如師升户部右侍郎授嘉議大夫巡撫福建所過郡邑考察吏治咨訪民隱公明寬大人咸恱服太宗皇帝入正大統轉左侍郎逾月升户部尚書授資善大夫永樂初蘇松諸郡大水命公往治發浙西兵民十數萬疏決壅滯自松江黃浦東北以逹于海水患乃息而撫恤曲當人不言勞又撫綏其飢民奏發廪三十餘萬石賑之散給有方民賴以濟進資政大夫初建北京採宫殿材於東南命公自南京扺北京督視運送給以錦衣衛官校且命有不率命便宜行事公于號令中備矜恤之意人人效用太宗巡狩北京公預扈從命兼行在禮部都察院事嵗餘車駕親征漠北今上以皇嫡長孫留守北京命公輔導庶事修舉京師肅然太宗還良喜賜公鈔千緡綵幣四表裏羊酒鞍馬自是屢奉命侍今上有司奏公與吏部尚書蹇公歷官九載皆賜勑嘉奬有淳良篤實如古名臣之諭太宗親宴之别殿無幾賜誥命追封祖考皆為資政大夫户部尚書祖妣為夫人封母為太夫人重修太祖皇帝實録命公監修書成賜鈔織金文綺衣文綺表裏北京宫殿成奉勑召仁宗皇帝及今上於南京二聖喜公至賜宴勞及鈔白金鞍馬北敵復犯邉太宗皇帝將親征公言今邉儲不足請遣將無煩六師忤旨罷官仁宗皇帝嗣位即日復公户部尚書公以母喪未終辭仁宗曰國家不幸有大事正朕與卿等協心比力之時如卿以親喪辭則朕亦未當在此公乃不敢復言遂加少保仍兼户部尚書賜玉帶今上正位東宫加公兼太子少傅少保尚書二職如故賜誥命追封曾祖祖考皆為榮祿大夫少保兼太子少傅户部尚書曾祖妣祖妣妣皆一品夫人賜銀章一其文曰繩愆紏繆且諭公曰朕有過舉卿但具奏來以此識之朕不難于從善賜鈔萬緡御用米二十石胡椒二百斤公感知遇之厚鞠躬小心靡或不盡修太宗皇帝實録命公監修仁宗皇帝崩時今上監國南京至則喪禮及即位之儀皆具皆公一二人所預定上既嗣大位公以舊輔尤重倚注公亦孜孜惟謹寵賚曰盛修仁宗皇帝實録仍為監修庶人髙煦反上親率六師擒之公預扈從還賜白金文綺等物甚厚賜銀圖書一其文曰含𢎞貞靜蓋褒公之德云明年扈從巡邉既還上念少師蹇公及公等四人者皆春秋髙欲優逸之賜勑嘉勞命輟職務而仍其祿朝夕侍上備顧問謀議而恩遇益厚兩朝實録成賜白金織金羅衣文綺表裏鞍馬賜宴明旦入謝暮歸第得疾遂薨宣德五年正月草七日也夀六十有五歲上聞訃震悼遣禮部尚書胡濙賜祭贈特進光祿大夫太師賜諡忠靖賻鈔萬緡勑有司營喪葬官其子瑄為尚寶司丞仍復其家朝臣自公侯貴戚下至郎曹將校咸往弔祭衛卒巷氓亦有嘆息至流涕者公天性至孝友其弟原啓原禮皆厚原啓沒愛其子如子讀書鄉校時教諭史九韶雖非授業師遇之必拜雖貴不變既貴九韶升教國子月恆分之祿九韶將老朝廷從公請命致事公與人交久而敬平生故人在患難率賑給之遇士之貧者振之有顛躓失所者援之德雖微必報而未嘗存怨惡心接人溫然處事善善長而惡惡短襟宇瀞深閎廓不見涯涘嘗有從𨽻汚公金織賜衣懼欲逃者公曰汚可浣何懼為有吏壞公所寶硯石匿不敢見公召吏諭之曰物皆有壞吾未嘗惜此慰遣之於時卿大夫雅量推公第一知者蓋比公於王子明韓稚圭之度其在上前所言必歸仁厚臨政必酌大體其預宥密雖泯然無迹蓋有隂受其德者矣故不間貴賤疏戚識不識皆知其為善人長者喜為詩四方士重公名得其一篇一咏藏以為榮公配鄭氏有賢德再封皆夫人子男三珫瑄瑾女一嫁虞㻞珫與虞氏女皆先卒公卒之三月歸葬湘隂其家以墓碑屬余余與公同朝三十年晚益親厚相知又嘗為余道其平生余豈意遂志公之墓耶銘曰泝夏厥初以國為氏衍于會稽綿綿厥系太末之邑後來徙居暨唐中和復徙于番懿夏之世逢掖其服詩書有承德善有續轉鄂而潭自公祖考積厚必發公奮起紹燕歌鹿鳴來與計偕官任其賢政用其才繇司徒屬暨掌邦教寅恭小心寬仁允蹈參決大議洊任重負不亟不徐雍容雅度如彼喬嶽嶻焉弗移其氣默運澤潤良多祗事列聖既四十載夷險一道其舄几几國有老成堂有柱石胡不憗遺當寧興惻既榮且哀隆隆寵光於乎忠靖沒世不忘奉天靖難推誠宣力武臣特進光祿大夫柱國太保陽武侯追封鄞國公諡忠武薛公神道碑銘宣德五年五月太保陽武侯薛公奉命城隆慶永寧赤城獨石竣事將歸以疾聞上遣中官以御醫往視且賜勑諭勞至京猶力疾入見上慰諭再三既歸第日賜御藥遣中官臨問無幾竟不起七月草三日也訃聞上震悼親為文祭之追封鄞國公賜諡忠武詔有司治喪葬凡喪葬之儀皆優等蓋特恩云公諱祿姓薛氏世家山東膠州之新興社曾祖考諱安妣劉祖考諱大妣金考諱遇林妣張公兄弟六人而公第六自少傑特有大志未冠籍戎伍上官皆竒之從北征金山及喀爾喀之地又從征伊都山鼐爾布哈等處自是屢出西北二邉涉萬里而還太宗皇帝舉兵北平公首從義旗攻九門克薊州遵化援密雲攻雄縣追敵漠州咸奮勇先驅以一當百戰真定公生擒敵左副將軍駙馬都尉李堅超升燕山右護衛指揮僉事賜白金文綺從援永平攻下大寧冨峪會州寬河時南兵已圍北平城公還先遇其哨騎薄戰敗之車駕繼至從戰鄭村埧敵大敗升指揮同知從克廣昌蔚州攻大同率兵前哨獲敵人馬遂從南征大戰白溝河追奔至濟南升指揮使從克滄州大戰東昌公以五十騎前哨遇敵兵數百與戰敗之獲馬三十餘匹敵悉衆來追公復奮戰大敗之獲馬二百餘匹敵于威縣及深州伏兵以要旋師皆擊走之從戰夾河大捷戰滹沱河右軍力屈公率衆馳赴之出入敵陳數十合戰敵敗走公追至夾河斬馘無算獲馬五百餘匹明日戰單家橋公馬蹶為敵兵所得拔刀斬敵兵復上馬督戰遂敗敵將平安軍以次攻下順德大名彰德及攻西水寨公生擒敵都指揮一人斬獲尤多從攻東阿東平汶上皆下之繼戰淝河大店小河汴隄靈璧率勇先諸軍遂渡淮渡河從車駕入京師太宗皇帝為臣民推戴既正大位論功行賞升驃騎將軍後軍都督府都督僉事以其官秩贈三代永樂六年升都督同知八年從車駕北征至玄溟河以功進榮祿大夫右軍都督府右都督兼左軍都督府事以其官秩加贈三代時四方選至幼軍數萬悉命𨽻公操習十二年從車駕北征十五年初建北京宫殿命公董營繕十八年成加奉天靖難推誠宣力武臣特進榮祿大夫柱國封陽武侯食祿千五百石追封其三代皆侯爵賜誥劵二十一年從車駕北征還奉命討捕湖州叛冦二十二年復從車駕北征是年八月仁宗皇帝嗣大位加公太子太保子孫世襲侯爵奉命巡北邉適敵冦雲州公率兵追至大松嶺斬獲甚衆事聞賜勑嘉奬遣中官及鴻臚卿即軍中勞之既還賜白金鈔幣加嵗祿五百石洪熙元年佩鎮朔大將軍印率師巡北邉宣德元年庶人髙煦反車駕親征命公為前鋒先二日圍其城罪人既得留公撫綏城中軍民還賜銀幣甚厚明年秋從車駕巡邉出會州解后敵冦塞下與戰敗之生擒其酋斬獲其餘衆遂鎮薊州永平冬還賜銀幣加厚四年率師護兵餉開平者再五年春佩鎮朔大將軍印巡邉至竒黃嶺遇冦拒敵悉斬之盡收其家口孳畜升太保賜鈔幣居三月董築城之役蓋從公之言以便戍守公平居無事未嘗忘危每計邉務言之亹亹或誚其瑣屑者終不為變蓋其志奉國惟恐不盡為將勇智兼備常先事籌畫用心之至以夜繼日故所嚮成功未嘗敗北間一二臨陳中矢石裹創赴鬪有進無退其率師所過紀律嚴明秋毫無犯而撫恤士卒人人歸心若董繕作規置有方力不煩費功率堅久人亦罕及蓋一代之興必有一代之臣公祗事三聖涉歷多用志篤鞠躬盡瘁以效臣職故能建功國家流光簡册致身貴冨垂慶後昆其非古名將之流而今之不可多見者歟公夀七十有三年其配李纍封至侯夫人子男三長勳先卒次某次某孫男三長誠先卒次某次某以是年十月三日葬公于某鄉某原銘曰明聖之興有命自天必有輔翼名世之賢氣機翕會雲龍風虎有勳有烈左文右武桓桓薛公始奮從義大呼迅馳金戈鐡騎智明幾先勇蓋萬夫疇其膺之折朽摧枯宗社載安功書册府在帝左右股肱心膂公于事上一誠不二知竭臣職死且無怠公于馭衆有紀有綱撫如春和令如秋霜歷事三聖麟衣蟬冠廷有老成國有屏翰丹書鐡劵傳襲來裔公如長城曷不百歲英靈升逰九原在此太史作銘式昭無已東里文集卷十二
