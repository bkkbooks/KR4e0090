body:
  text: 東里續集卷四十三明楊士竒撰傳止齋先生傳止齋先生名泰字仲亨姓陳氏陳五季之亂由金陵徙泰和至今四百餘年之間貴顯相望而以科第進者不可勝數先生獨持行義謹謹在鄉里以止齋自名方其幼孤遭亂貧窶無親戚之助獨與兄仲述盡力養母而究知上世皆業詩書惕然曰是可以不繼乎兄弟治家事少間輒挾册往從鄉先生劉尚書嵩弱冠出教童蒙資日給而益力於學兄弟自為師友當是時兵亂初定里故家少年失業無聊皆詘身趨他道朝往而夕富淟涊睢盱自得也先生之兄弟獨曰貧吾之分也會有詔興學校縣大夫舉仲述充博士弟子員先生留供養綜理其家凡外內長幼寒暑旦暮之需未嘗乏也仲述巳舉進士為御史十餘年有賢名人敬慕之當是時有得一官於朝者其父兄子弟藉聲勢偃蹇跅跎於鄉黨無尊卑之義或干謁長吏纍纍不厭甚者張氣焰恣睢持訐上下長短莫敢誰何者先生出入閭巷恂恂謙恭進退以禮非公事足迹未嘗及縣門下縣令丞如不知有陳御史家者劉尚書卒一子又卒獨有遺腹孫先生曰吾可以忽忘劉先生乎許妻以女今年幾七十矣日益衰疾有四男子長者仕為教官次者亦為里孰師家日益饒裕可以自佚然猶朝暮坐函丈授徒不倦或以為言者則應之曰是豈為利哉顧吾先人之所業且吾少壯時所資奈何老而遂棄之也平居事母盡敬愛母樂之母沒卜日將葬矣霖雨旬浹弗止葬之日遂霽既葬雨如故人以為誠孝之應嘗省仲述京師適仲述坐纍下獄先生上疏白仲述無罪竟得釋或曰先生儒世家也固所由者儒行也曰彼不為先生者固儒世家固逢掖其衣仁義其言也而夷考其行市行焉然市將無儒之行乎何與其世哉贊曰先生余祖姑之孫而弟視豫少相好也其從子賞今得官廣西按察僉事告余曰賞幸便道過家省季父然貧無以為季父壽曷如畀之文使歸為壽也又曰賞幼喪父母非季父無今日賞奈何不念所自乎余曰此賞之志也然先生之行可以敦薄而亷貪者賞蓋生晚不能具知也述其槩將使先生之後世敬承之皆為儒之行而不為市以是為先生壽不亦可乎不亦宜乎陳仲完傳陳仲完名完以字行陳故福州長樂儒家其先嘗顯於宋其髙曽皆仕祖宗舉父均大始隱居教授仲完自少勤問學攻經術其孝友敦於家信義行於鄉黨朋友洪武甲子應進士舉時科舉罷十餘年始復仲完及其從子湜洵皆中鄉試鄉人榮之會仲完父喪不果上服闋延平府學聘訓導即以興學自任從容誨誘盡心而弗懈經其教者率有成改寧國府學永樂初詔百司舉賢材翰林修撰王褒舉仲完學行徵至以為翰林編修明年詔簡東宫官擢左春坊左贊善仍兼編修奉命修永樂大典書成奉儲君命受皇孫經啓迪尤多仲完儀表魁偉溫厚簡重恂恂淡然不見圭角而持身恭慎確乎不可奪羣居言論如不出口至討論古今折𠂻是非據理直發語簡而當聞者皆服其贊輔儲君必以正言嘗問其所長對曰臣無所長惟自少粗聞孔孟所以為訓者不敢違也其於職任惟所當為未嘗茍有畏避意儲君甚重之嘗曰春坊淳實端靜如陳仲完蓋鮮矣為文章逹而不浮所著有迂稿若干卷藏於家永樂二十年卒於官年六十四一子泠嗚呼世之重士也論賢而任官命之祿而授之事固有望乎其禆益也士亦難遇也矣其或趨得者他道以求悅畏事者巧避以自賢夫枉道不足言而猥焉惟一巳之私計者世亦何取乎士也仲完居官必由其道不私其身可謂正直特立者也國家用唐虞考績之法以勸士凡仕歷九載有善稱者得進其官仲完一官二十年遂終其身士固考其所存所施者如何也王九成傳王韶字九成吉安泰和人世儒家韶自幼孝於親年十三隨父出遇盜盜執其父將殺之韶冒刃抱父號泣曰寧殺我丐免我父聲哀切盜不忍舍其父去韶父有讎家欲殺之久不克遇韶於野將殺之以快意或曰是嘗脫父於盜者奈何惡其父輒殺孝子讎家舍韶去父嘗坐纍繫獄而病韶在左右侍藥食旬餘不懈韶年益壯後值母陳病再歲不瘳韶屢焚香禱北辰丐以身代冬夜母思魚羮韶解衣赴沼取魚具羮以進母食之良愈歲餘母復病更三歲弗瘳韶躬侍未嘗去側煮藥必親任之嘗火焚韶鬚母曰顧豈無餘人耶韶曰煮藥有方餘人不解也益勤不變或言天嶽山神禱輒應時氷雪寒沍韶徒跣走百里禱焉既歸得疾遽急母強起執韶手韶曰兒孤大人生育大恩至今于此命也願割愛善自保言訖而卒縉紳大夫聞韶死皆曰此孝子也為詩文哀之韶好學能文尤工五言詩縣嘗舉韶孝亷以親老辭韶死時年四十三贊曰仲尼有云父子之道天性也故慈與孝非有假於外也自先王之教不明世之人汨失其性於是平居修奉養之事謹恭順之節者則以為卓行觀韶當﨑嶇困厄危急之際知有親不知有其身斯其平居之行可見巳謂之曰孝不亦宜乎周子旭傳周子旭名升吉水桑園里人桑園周氏世業儒以忠厚聞於鄉子旭為人軒偉豁逹孝友出於天性生七八歲親有疾日夜侍藥食左右不去親沒哀毁不能勝與弟子益相友愛甚厚其家嘗坐事兄弟爭就獄子旭曰我主家事此我之責子益曰兄先人冢嫡且家之長即萬一有不幸宗祀孰主周氏之外內老稚曷所恃賴弟有無不係家重輕弟當往子旭曰汝未有子息雖今毅然自任以義即或有不幸奈身後何此自我責我往矣我往即汝主家事毋多言毋多言子益知兄竟不可回即默不言徑詣獄服辜謫戍遼東卒於路子旭聞之哭之慟曰使弟至於此實我也遂以仲子孟簡為之後後五年子旭亦卒孟簡永樂二年舉明經賜進士及第授翰林院編修人以為善德之應云贊曰世稱吉忠節之鄉其人為臣而忠於君為子而孝於親以至夫婦兄弟外內尊卑之間克盡其道列諸國史載諸郡志見於名賢之所紀録不可勝計此其所由來者逺矣然孝友忠義行於平居無事之時者難見可見者往往出於倉卒顛沛之際故周子旭兄弟之義人稱之無間言焉夫子旭兄弟如此視漢之孔褒唐之陸南金豈有優劣哉董子莊稱子旭他行尚多余以為孝弟人道大端也是以特録之雪崖先生傳雪崖先生臨江新淦人姓金氏諱固字守正雪崖其號也家世業儒四歲母口授五言詩輒能成誦稍長出就外傅日誦數百言緣文求義通其大要習聲律課詩援筆立就未嘗經意而語皆不凡時巳屹然有巨志刻厲學問母憂其過勤夜讀輒止之則常潛置火密室夜深閉户默誦日親良師友講説既冠兼通書詩春秋及司馬子長班孟堅之書遂究心於易是時安成劉雲章吉水夏道存兩先生皆以治易為學者所宗先生往質所業兩先生皆忘年與之交蓋其為學自四書五經及子史諸家無不博通精究有所疑必先求諸心然後歷考古説而折𠂻焉由是所自得多矣至於天文地志律歷器物數度之詳亦無不用心焉雖祈寒盛暑及兵亂竄避山谷艱危困厄之際手未嘗釋卷名其藏修之居曰正心蓋自少至老未嘗一日而忘學也其學以孔氏為宗漢以下則曰周程張朱吾師也洪武中郡太守聘為學訓導先生嘗慨師道不振學者日趨於簡陋至是毅然自任嚴約束諸生而身率先之於道德性命之旨正心誠意之方為之開諭反覆詳明而常戒以敦本務實學正學為正人無徒茍事文藝為利祿計至評論古今人才賢否亦必以此諸生翕然嚮服退而相率遵承先生之教不可以違有過更相責善惟恐先生之聞之也先生孝友恭儉出乎天性一言一行皆以誠為主動循禮法布素泊然家無餘畜非賓客不兼味非其義一介不取而輟巳以賙族姻振匱乏者常如不及介然特立同郡名德宿儒惟梁孟敬劉仲修胡行簡張美和聶器之相與為莫逆交洪武巳巳五月留郡庠顧次子行曰明日之夕吾其死乎得微疾諸生進醫藥先生止之曰命矣時長子幼孜從學二百里外獨行侍側先生手書四十字詩一章示幼孜書遺命數事示行又書四十字詩一章謝素所往來翊日自題其神主付諸生使授幼孜晚沐浴更衣端坐至夜二鼓卒春秋五十有七所著詩文有湄湘稿若干卷藏於家幼孜舉進士纍官至翰林學士兼右春坊右諭德永樂十年先生用子貴詔贈奉直大夫右春坊右諭德云贊曰余與幼孜同官嘗讀先生之遺文淳厚古雅藹然有德者之言又讀張美和敘列先生行事一本道德仁義之意余未嘗不徘徊向慕有髙山仰止之心焉至其門人學者余往往遇之能道其師之教而考其持身蒞政皆足以發所謂師道立則善人多惜乎先生之教僅施於一郡而巳也乃若其屬纊之際明於幾先從容綽然非篤學所至哉士茍用志於內以致夫誠明靜一之功則自然必至之理矣其待以他求乎南耕先生傳南耕先生者姓許氏諱洪字彥章吉水人世業儒伯父中孚通伏氏書南耕傳其家學有孝行兵亂父母逃避山谷中採拾以備養未嘗乏也母病躬侍湯藥不解帶者二旬病劇籲北辰請以身代親沒居喪盡禮事其兄彥良極友愛平居飲食衣服必先兄兄老出入起居必躬扶持之洪武三年舉明經授橫海衛知事調英武衛兩衛皆在京師號繁劇凡簿書調發出納勾檢會計之務皆知事所治南耕從容未嘗動聲色而集事嘗為諸衛先安慶侯仇成時為橫海指揮特敬禮之升浙江行省檢校省務益繁而官不備滯牒山積南耕兼署六司居數日裁決悉盡朝廷遣使督事省中省中寮屬悉趨謁南耕以事後至使者怒臨以威南耕不為動徐為片言復之使者愧服降階執手謝曰吾過矣吾過矣紹興倉姦弊久滋甚省檄南耕曰此非公不治衆亦謂南耕非根究而深誅之不足懲也南耕究弊所由悉蠲之更以良法刑不施而姦弊頓革先是有被誣殺人者獄具巳久南耕至亷得其寃出之後竟獲殺人者置于法嘗督事至鄞適大旱郡守率其屬禱久不應南耕曰獨非我責乎即齋沐為文親禱焉雨即日降霑足是歲竟賴以熟至台州公館故有妖常莫夜擲瓦石驚動人人無敢止宿者南耕入居之妖不作自是頓絶其誠於中而徴於外多類此所至必下車趨學宫勸勵諸生親為講解經義然後去其守身亷慎為政敏於吏治而必務忠厚存大體惜歷官未久見諸設施者僅止此其功效不大著年三十八以親老乞歸養後草年卒於家其仲子鳴鶴今為中書舍人贊曰仲尼贊易稱雲從龍風從虎聖人作而萬物覩此言大德之君在上天下之賢者爭起而從之也我國家肇興太祖皇帝以上聖之資躬受天命一清四海建太平萬世之業當時文武之臣自公卿至於內外大小百執事率皆英偉傑特修正顒昂之才布列在位式稱任使盛矣哉南耕固其一也南耕方嚮用未老朝廷遂其孝養之志退而油油然與山人處士涵泳德澤於泰和之世以終其身斯固上之所賜亦士君子之所存有以迓承之乎然於風化亦可以有少助也敦篤老人傳國家自洪武中制詔天下凡百里之邑推擇鄉社耆老敦篤有行誼者俾化道里中而平其爭訟蓋以助益令丞綏靜黎庶也而奉承有恭有慢推擇有當有否於是閭巷畎畝之間蒙其直者常寡而承其厲者多焉四方之通患也若吾太和雲亭鄉沙村里劉郁武氏之膺推擇也邑自大夫以下皆稱曰此敦篤老人凡百里之智愚老壯皆稱曰此敦篤老人行副其稱靡間言焉郁武抱淳質明逹之資發言必公蒞事必平遇騁忿為暴者必裁之以理恣欲為橫者必折之以義其辭氣從容和平蓋聞者靡不內愧而信服焉或有誣誹之者未嘗自辨而事卒白蓋其孚於人者有素也居無幾即引退曰吾奚有不足而奈何日儕庸衆人俯首斂氣受事縣庭下如服轅之駒哉終其去里中無訟爭事及縣門者郁武涉書史志淡泊旦莫短衣長笠行壠畝視稼穡逍遙怡然耕穫足歲計贏儲而千駟萬鍾不一毫入其靈臺丹府間古大司徒教民六行郁武有焉其妻子亦皆和平淳厚有自足之意易曰履道坦坦幽人貞吉詩曰考槃在澗碩人之寬郁武之謂歟嗟乎世俗之溺其志於利者勞躬苦思弊弊無寸晷之暇蹈不測之險而弗顧卒之小而窘辱大而至於僨滅比比是也於視郁武何其相去遼逺哉郁武其有亷貪之風也歟吾於郁武有彌路之好故著敦篤老人傳云釣瀨子傳釣瀨子姓嚴氏志恬曠不嬰於世務嘗乘小舟往來沿鷗江下金魚浦至於白鷺之洲又泝洄涉浩溪緣夫容峰下歷十八灘以逹於贑望見城觀臺榭若蜂房若鱗次而連車駢騎紛驅騁乎其間輒回艫道中流流行坎止任其所適舟中不具罾罟惟一竿日不去手鯋鱨鰋鯉以及蝦蟹之微亦時有所獲即連日弗獲其意充充乎無所不足或有知釣瀨子者勸之仕則應之曰凡仕者其所負蓄皆足以濟世澤民吾何所負蓄乎或曰若其有慕漢嚴光先生所以為瀨者乎先生視一世之富貴有不逮其瀨之清是以去之終其身不顧若何所見且視富貴能去之終其身不顧乎又應之曰吾鄙人也何所見吾之釣爰樂吾之性吾何慕彼哉又輒自號釣瀨子人亦從而稱之為釣瀨子云釣瀨子蚤喪其父事母能盡孝養得一鮮必以供膳羞不自甘也釣瀨子雖不涉書史遇經生學士必恭下之不與為抗禮故經生學士見釣瀨子無不愛好俯就之者釣瀨子字宗旦去古白下縣之南澄江之陰五里所是其居處吾得之陳公延云贊曰世稱漢嚴先生釣隱有亷貪起懦之功釣瀨子其餘裔其有聞乎先世之遺風與否蓋不得而知也釣瀨子曰吾以樂吾性而又依此以共養斯其樂豈専在於隱歟以釣瀨子之資使涉書史以遡為經生學士釣瀨子之樂惡可量哉惡可量哉蔗境翁傳蔗境翁者吉之泰和人姓尹名務厚字子厚為人博學淳質未冠屬元季兵亂辛苦百出及皇明大定天下則既壯矣生産悉廢一時所交遊往來皆出仕有祿位翁獨棲遲田里以教授為業或勸之仕翁曰吾豈不樂進顧吾進宜有漸也洪武戊辰膺邑大夫之辟為鄉校師或曰以公之學行今乃獨就此乎翁曰顧宜有漸也曰此非顧愷之啖蔗意乎翁曰然人從稱之為蔗境翁翁曰善因亦以自號翁居家有孝弟之行同産兄二人務本早卒養其子教之為之娶妻既生子又教之業進士卒成其名務尚無子以巳子為之子翁敬事之雖老彌篤遇親戚故人子弟或淪汙習者皆教之讀書以植身其力不能自存者皆周之或又為之娶妻盡力無難色蓋出其性如此有子有孫授之以經然負氣剛直不肯曲意下人遇人行有不當道切責之無少假能改即奬拂稱譽之如不及故鄉校十年其學者多出取髙科登顯仕翁裁以勞績升教諭上海縣學在上海九年其成就學者如在泰和時永樂元年嘗校文江浙今年被召入修書禁苑居數月以老疾辭詔豫道里費復還教諭蓋優禮云論曰世之人挾一才一藝皆沾沾然覬慕利逹欲一蹴而造乎盛極不惟不至而其不終也亦多矣蔗境翁其備於其身者如此而望於外者如彼則其以七十之年享有諸福也宜哉饒節婦傳節婦饒氏名懿貞饒故臨川名家世有仕宦節婦年十九歸同郡吳文正公曾孫彥紀生男二人長爟二歲次焮裁八閲月而彥紀卒節婦時年二十有四即誓守節不更嫁以供養老姑長育孤子養其姑旦暮寒暑飲食衣服節適之宜必盡其誠姑病晝夜侍側不去湯藥必嘗而後進姑沒喪祭之禮一遵家範無違二子既長皆教之學曰毋隳先公之世也後爟舉明經為衢之常山丞焮以材舉為徐州判官節婦今年七十矣贊曰為子之孝臣之忠婦之節皆人道之當然自先王之教不明於後世為士者或不能之若女婦有能之如饒者豈不卓然可重世教哉二百年間文正公以道學重當代非君子之教於家者至于今未泯歟吾又聞節婦涉知書尤熟刻女傳此其所由明於大義者乎則學之功於人不可少哉王孺人傳王孺人諱善字懿貞廬陵廖敬先妻敬先舉明經自河內縣丞三遷為翰林檢討娶孺人生男子四人皆力學業儒仲子器由德化學官歷蜀慶二府紀善孺人初歸敬先敬先祖母李繼母周皆在皆嚴不可近孺人恭慎小心曲盡婦道皆得其歡心稱之曰賢其相繼沒也哭之皆盡哀至毁不能勝周沒遺幼男女二人篤意撫育之常加於巳所生者敬先被薦舉詣京師且别孺人曰丈夫事君當致身國事不得復介意私家事私家事我職也敬先出孺人治家嚴率下勤節儉有度而閨門肅睦焉教諸子必事詩書曰而棄此即隳而宗矣教諸女諸婦必曰此吾祖姑吾姑所教我以底我于成者爾不卒于是即我不能教汝將壞汝矣其後諸子諸婦皆能敬承其教為族姻鄉黨所推重云後敬先十年卒年七十二贊曰女德之紀曰婦道也妻道也母道也古之人有一焉往往見之傳記播之後來夫王孺人者於孝其姑佐其夫成其子若此而不使有聞於後可乎余嘗與敬先同官又交器及其弟成兄弟孝友之行載於縉紳君子稱述多矣孔子不云乎魯無君子斯焉取斯余故列孺人之事以傳於世胡母傳胡母吉之永新人姓吳氏吳故宦族父師尹元至正戊子進士永豐縣丞有賢名尤深於詩書至今學者宗之稱莘樂先生母少習詩禮兼通孝經四書列女傳女教諸書而筆札女紅皆善父母愛之相攸以嫁吉水胡子祺子祺宋忠簡公銓十世孫洪武初舉明經歷官延平知府治行焯焯于時母歸胡氏謹婦道執儉素內助其夫於喪亂艱窶之際不及事舅姑於春秋薦祭尤謹夫有從弟妹孤無依悉長育之後又為之嫁娶待其族之人盡恩義子祺素闊略不屑意生産事且其出仕時兵亂初定母獨留躬勤起其家既有餘矣無幾子祺沒恆書哭喪祭皆如禮是時長子直甫弱冠次子廣才數歲親授廣論語諸書曉以大義又迎其女兄之孀無子者同處日共講論書史令廣從旁習聞漸漬以涵養其本源廣巳出就外傅莫歸必叩其所業而益加勵之間其子以先生朋友從外來輒坐屏後聆所論説即其所説當道輒喜親治酒饌供客雖日屢屢不厭也間暇語其子以父之善行曰必勉繼之毋忘廣後舉進士及第纍官今為翰林學士兼左春坊大學士永樂十年特恩封母太宜人後二年年八十三卒贊曰昔歐陽修蚤孤母鄭守節自誓苦志教修學問卒以有立顯名於天下君子蓋多鄭之能母道也推此較彼其賢智卓然胡母非其儔匹者歟然余嘗考永豐延平之為人胡母之行其有所自哉其有所自哉時母傳時母者括蒼時昌之母也姓張氏元朝列大夫江浙行樞密院判官光弼之女為人靜端涉知書多識古賢女婦事既笄歸時伯庸時括蒼巨家歸而生四男一女伯庸卒年才三十即誓守節以教子為務遣其長者就博士為弟子長子死聘明師以誨其衆子而躬勵於內曰人非學不知道不可怠也歲時薦祭必躬治豐潔先祠及墳墓有壞輒修治之因諭其諸子曰此人道之本不可慢也嘗以徭賦不給諸子請粥其産曰此先人所以遺後者奈何不守而棄之出其奩具俾粥以給焉處家儉約而躬勤以率諸婦家之內外長幼服食必均給家法嚴肅凡其言與行必率禮度嘗曰吾身家之表也仲子昌縣推擇典案牘蚤莫飭其亷勤曰無忝父母也及上北京治案牘於秋官則慨然念其羈旅逺外數寓厚資給之曰無俾兒或隳其守也昌亦惟逺去母寢食不自寧母聞而嘆曰吾往慰之哉既至母子甚歡則又從容諭曰為子豈徒以供養為孝哉必務不辱也秋官主事陳彧喜道人善其居與昌鄰數為余言昌溫雅務義又言其母之賢曰固昌之所本也給事中俞得濟昌姻家其稱時母之德尤備蓋母今年六十有六矣贊曰張氏吾廬陵儒家光弼嘗遊學奎章學士虞文靖公之門慨慷有志節江浙行省楊左丞一見器重之舉為左司員外郎後至行樞密院判楊左丞死不復仕洪武中嘗召見太祖皇帝加勞之已而念其老曰可間矣賜歸遂自號可間老人貧居執守介然為文章長於詩歌軒偉疏蕩古意蒼然每一篇出士爭傳誦余昔得其所述樂丘志讀之蓋未嘗不感嘆而想慕其人也其子若孫寂寥無聞矣顧乃有女子能賢如此昔蔡中郎死無子琰徒能記憶其父書猶為後來賢士大夫所稱琰節行無取焉如時母其有可稱者矣故為列其事使傳焉説緩齋説四明孫公與為泰和縣令期年剗政蠧植民利拔義舉仁崇善興教弱者扶之強者鋤之蓋君子歸其德而小人沐其澤矣乃猶未足深為發已之道戒剛暴急厲以緩名其燕處之齋以朝夕自警而聞者疑焉以咨於縣人楊某曰是何取乎緩也緩將弗可乎哉夫令有君之委任焉有民之繫望焉勞來勸課之後時征賦出納之慢期簿書勾檢之稽程獄訟聽斷之久弗決有一于是上何以承君之命下何以副民之望且僇辱逮于其躬矣緩可乎哉某應之曰非然也令所為緩發乎已之道也非若之所謂緩也若所謂緩乃僇辱逮於其躬者也緩而致僇辱逮於其躬惡乎可也夫穆清生人志與氣具矣知者逹乎道故正以持志志以命氣而氣恆聽命焉斯其行必于中正之歸弗知者惟氣之任不知聽命乎志不識中正之由斯其行與道倍焉故知者如是而修之將進為大賢又益進而聖人可跂弗知者不是之修故降為庸衆人又益降而庸衆人弗之與齒令蓋知之者也弗知者如古王思之徒是也如古西門豹其知之者也夫既知之而行之必自緩始緩斯審審斯察察斯識微識微斯足以燭逺緩斯靜靜斯安安斯有容有容斯足以任重任重故務無不成燭逺故理無不核以是承君之命以是而繫民之望焉有弗克哉不然率焉而發肆焉而動惟氣之任而志不知命之由是理蔽而務隳由是僇辱逮于躬矣緩惡乎可少哉疑者釋然明日令聞之曰是得我之心矣請書於齋壁康榮字孟嘉説康甥榮既冠余字之曰孟嘉遂告之曰冠則責以成人之道矣夫道有本也物之生長而嘉榮其孰使之然哉造化一元之氣流行不息有以致之矣道德積乎中而著乎外人之嘉榮也何以致其然哉造化之元於人為仁仁者心之全德而酬酢萬變之主也熟乎仁斯有以致之而求仁本於學焉傳曰博學而篤志切問而近思仁在其中蓋仁具吾性分之內非有待乎外博其義理約其旨歸明之而不惑循之而不違養之而不息仁所由熟也子因吾言泝而考諸古聖賢之書心體力行而不已焉夫孰之能禦也孟子曰仁則榮子勉之矣積庵説泰和郭公緒自少有志於學既舉進士歷事都察院遂擢僉憲陜西又改浙江焯焯有聲譽而不自足也名其退食之居曰積庵蓋其志勤於學進於德益篤而未能也吾友王行儉為之記曾子啓為之銘又欲得余一言則為之言曰凡物理之至乎極者未有不始於微積而充之斯造乎極矣觀諸二氣之生陽始於子為復之微積而不巳至於午極矣隂始於午為姤之微積而不巳至於子極矣又觀諸植物之生始於區萌之微積而充之至乎百圍可以棟明堂柱清廟極矣君子之崇德廣業亦必積而後至焉古之君子莫聖於孔子孔子猶言其學自十五至七十有積纍之漸聖人未必然而學聖人者宜莫不然也聖門諸子純粹莫如顔誠篤莫如曾而四勿之警三省之功皆行之力積之久而卒以傳聖人之道則後之學者欲有所視法其必在顔與曾乎孔子贊易曰君子多識前言往行以畜其德此取諸外而積之也又曰庸言之信庸行之謹間邪存其誠此本諸內而積之也古之君子無不然也本之以誠行之以謹進而及於古之人夫孰之能禦哉公緒明逹果毅吾嘗期其逺且大夫仕優而學固有以知其志而自強不息於表裏始終不可有一息之間者公緒勉之説玉贈王希誠玉必出於崑山然崑山之藴未必皆玉也夫玉者含天地之精稟陰陽之和具仁義禮智忠信之德是以其鮮有也詩書行義之家士君子之崑山也然求一家之産皆純且良也亦鮮矣蓋純且良稟之尤清者也吾邑故詩書行義之家於吾家有世好者不下十數姓吾出仕四十年今年始一歸昔之同輩者淪謝幾盡間求後輩之良於衆衆舉三人焉其一吾抑庵之子希誠也謂希誠介而裕和而栗恭而厚逹而果時希誠侍親北京於余熟蓋余信衆言之不謬也暨還京以為抑庵賀曰此君家崑玉也至是希誠奉父命將歸西昌鄉人士在京者求余贈言嗟乎希誠是行得於尊甫者至矣余何言然余素有重於希誠也禮不云乎玉不琢不成器蓋言人之必在於學也自修身行巳至事親事君以及乎處人澤物靡不有道必學而後道明道明而後見之於行無往弗得故君子立德立功皆由於學學而至焉譬諸玉不為圭瓚為瑚璉哉勉旃希誠吾之望子也逺矣子歸而使所親所與者皆將薰德而善良則亦玉之山輝而木潤也易艮姪字説今易艮字為之所蓋艮即止也不若所字義長所者即大學中仁敬慈孝信是也名曾姪孫説新生曾孫請名之曰璐璐良玉也玉傍字稍寬綽後來可以多取也海春字説去吾邑南一舍許曰逢原尹氏居其上若干世矣子海春尹氏之秀者清拔尚志吾聞其人亦非一朝夕其孰賓今瑞州府學訓導鍾本之字之近因吾外兄陳仲亨先生來求為之説吾於是知本之所以期愛海春者矣夫海之為澤至為有容凡江河淮漢濟瀆與澗溪沼沚之流不知幾千萬𣲖其湯湯渾渾之趨而歸者無一息之停咸受而納之不見盈溢者又若龍蛟鯨鼇鼉黿與沙鱨蝦蟹亦不知其幾千萬類咸生養安於是而皆為所容人之極其量者恆比德焉夫春首於四時陽氣之亨天地和同勾者皆拆萌者皆逹百谷草木飛潛走獸之類莫不各正性命以生以育以利以遂而人有仁德者類之夫人心之量皆具萬理皆備萬物皆包天地之大而涵江海之深矣然其體也有用焉極其體者必充其用夫心之量至大非仁則無以充之仁心德也吾修吾之仁而至焉則所施無不愛無不愛則無不公無不公則天地萬物皆周遍融洽於吾一心之內如海之涵如春之育矣用豈有不大者乎不然或蔽於其心則一理不足存一物不足具量斯窒矣天理之流動充滿亦從而泯矣何足乎海涵何取乎春育哉此海春字之説也此非本之期愛於海春者能舉其義乎海春能極夫心之用如本之所期愛者矣陳先生試以豫言告之蹇氏四子字説少師吏部尚書蹇公四子英芳藝荃長者壯少者冠皆有字矣伯曰榮仲曰實叔曰華季曰成公屬余為之説其名而字也蓋即造化發育者言余將推其理俾四子者皆身體之以為德也則告之曰天以一元之氣流行四時化生萬物元亨利貞四德闕元為闕而包四德闕元者善之長又曰闕仁蓋元於人為仁包四端即天地生物之心也體天地生物之心為心闕即天地之心萬理皆具萬行皆自闕不待於外求闕而行之將近而言動之微闕之大皆有以合乎天理之正矣四子者必勉於仁乎仁主於愛而行之自父母兄弟始父母家之最闕尊闕之仁以事之闕是出以事夫闕國家天下之闕兄弟家之至親而闕也致吾之仁以事之闕夫族闕朋友之倫焉蓋仁以天地萬物闕之之必始於父母兄弟於父母兄弟或不能闕也蓋未闕能盡者矣四子其必勉於孝弟乎闕此其闕也四子所同也人才質不齊就闕是而進闕其非而正之君子之道也夫榮者茂之以闕之於誠慤華者振之以文義成者闕惇其本且致力於斯將為仁人君子闕之哉其孰禦之哉作蹇四子字説東里續集卷四十三
