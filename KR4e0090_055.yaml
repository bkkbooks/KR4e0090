body:
  text: 東里續集卷二十七明楊士竒撰神道碑墓碑銘工部尚書李公神道碑銘太宗皇帝初奉藩北京建文中廷臣有因齊藩不法遂建議凡藩國所在更置守臣於是擢張昺為北平布政使昺至日求王府細事將為不利其史李友直密聞於太宗義師既舉遂擢用友直友直質朴直諒知無不言甚見嘉奬日益信任出理餉運入嚴城守率以命之殫力竭慮事率蚤集而咸稱上旨初授北平布政司右參議既建北京改布政司為行部升左侍郎時初作宫殿營繕務殷專經度提督躬任勞勤蚤莫弗懈改行在工部侍郎仁宗皇帝臨御嘉念舊勞升行部尚書奉命代祀周文武成康陵及秦愍王既還言關中民瘼深見嘉納賜誥命并追贈祖考妣請告焚黃遂立碑于墓以侈上恩昭先德宣宗皇帝嗣位改行在工部尚書嘗奉命董採殿材於蜀設施有方綏撫有誠勞者不怨自是朝廷凡有興作重役悉以委之其臨事有條理而體恤下情所行悉公是以人從事集訕誹不興而屢承勞錫焉友直字居正為人坦夷闓敏雖不與物競而持已正直亦不屈於物有恤人之心施濟弗吝與人言必歸於忠厚有之官往辭公者必勉以愛民之政與人交悃欵緩急率得其力度量有容屬司之貪詭者以公長者數欺慢之公雖知弗校清議以是益重公春秋七十而卒正統三年某月日也訃聞上賜祭命工部營葬禮部賜祭公卿以下皆往祭之李氏之先隴西人元季其曽祖山徙保定清苑自是以來皆隱處不仕而篤於善行祖彥名考人義皆贈資善大夫北京行部尚書祖妣臧妣杜皆贈夫人其元配臧贈夫人先十七年卒繼劉及王皆勤內助子男三昉暉暘女二長歸府軍前衛指揮使徐震次歸保定右衛指揮同知王原孫男四女二曾孫男四諸子將捧匶歸厝清苑先事昉奉吏部尚書郭公所述事狀詣豫請文於神道之碑余嘗銘其先塋矣然與公同事四朝雅相好相知故不辭為敘而銘之銘曰遙遙隴西李所自來徙清苑屬元季豐穰之鄉栁莊里土剛水清育和粹繇曾大考暨祖禰積仁纍厚襲休祉式生居正用奮起攄厥純誠奉藩邸義旅之興殫勞瘁髙城浚池固根底聨車連艦給餉餽左馳右驅效謀智乾坤既正廓氛翳煌煌天寵峻祿位藩垣超陟冬卿二冬卿申陟極所至持身蒞務嚴劼毖肅肅在公靡怠易執信秉仁處當義恤窮矜鰥急施濟量度恢豁內昭晰有詭罔之弗校計恭事四聖誠一致七十全歸行靡愧必有紀述垂後世故鄉之墳歸率制疇其銘者太史氏光祿大夫少保户部尚書黃公神道碑銘自古仁人君子之明夫道者恆以天下國家為心而不為其私計范希文言士當先天下之憂而憂後天下之樂而樂夫天下之大懷抱斯志者未嘗無人顧其志得行與否則係於其所遇以希文之志猶不得盡行於當時非所遇之難乎惟士之卓然有志者則不以是而或怠然亦鮮矣三四十年間士竒所接名卿大臣若東萊黃公其可謂有志於希文而無愧者也公稟剛毅之資持正直之節懷忠厚之志負逺大之器風采凝重氣量宏偉而表裏洞達博學好古篤信不疑不茍為同不矯為異不為勢屈不為禍懾惟義之循惟道之行豈非士之卓然者歟公東萊昌邑人其先世見余所作墓碑公諱福字如錫自少不凡以書經選洪武甲子鄉貢入太學初授項城縣簿改清源縣皆有及民之政升金吾前衛知事改龍江左衛蚤莫勤職而才識明敏剗剔宿弊數出意見輔翼上官升本衛經歷上書論國大計太祖皇帝覽而竒之超升工部右侍郎特見信用太宗皇帝初臨御治齊黃離間之罪李景隆於上前并指公為姦臣公厲聲言臣罪應死但目為姦則非上知其正直不問遷左侍郎遂升工部尚書授資善大夫凡所陳奏悉見嘉納嵗餘天下工匠集京師者多疫死都御史陳瑛以為公罪劾奏之又不問初建北京置行部時北方用兵纍年民弊甚首改公為行部尚書任之撫綏公攄誠盡瘁植仆濡焦而民以蘇交址逆命遣大將軍率師討罪命公先詣兩廣治軍實調度有方用足而民不困交址平郡縣其地建都指揮司布政司按察司總之設官如制命公以尚書兼掌布政按察二司印章而董其治公視民如子徇其所欲革其所惡勞之輯之訓之飭之躬勤不倦且戒郡邑吏咸修撫字之政吏承公仁無敢違戾公以新造之邦新附之民政令條畫靡間纎巨悉盡心焉於是交人益戴公如父時中朝士大夫以遷謫至者咸見溫恤或有疾病躬造視之拔其賢者與之共事及以教𨗳其民而悉加禮焉中官馬騏怙恩肆虐自三司以下皆縮首斂避惟公數裁抑之騏誣奏公有異志上深照其妄曰此君子不容於小人寢其奏公居交址幾二十年仁宗皇帝登極上言六事悉見采用時初建儲驛召公還璽書有元老久勞于外篤念不忘亟欲見之之語瀕行交人扶老擕幼送公皆號泣不忍别既至深被奬勞賜白金文綺遂命兼詹事蓋付託之重云賜誥命追贈三代無幾仁廟上賔公董山陵之役宣宗皇帝嗣位馬騏激變交址時兵部尚書陳治代公掌藩臬二司纍奏乞還公蓋以交人思公之深公先已持節親藩册封即日召還奉命復詣交址時交冦黎利據列城叛朝廷命將率師討之及公偕行將及境交冦拒師總師者失律為冦所得并得公冦皆下馬拜公曰公不北歸我曹不至此言已皆泣共置公於館父事之公度冦無悔罪意即不食冀死冦謹防護不去側竟禮送北歸既歸奉命偕平江伯陳瑄董江南餉運公與平江協心合謀績用有成公上言足食足兵省役三事切於時務並見嘉納宣廟念公春秋髙久勞在外改南京户部尚書上龍飛之初以南京根本重地公先朝老成進榮祿大夫少保仍兼尚書參贊襄城伯李隆南京守備公時雖老事無巨細必周于慮而裁處適當襄城惟公言之聽文武諸司凡有疑務咸就正焉於時南京政肅民安蓋倚公為重朝廷下璽書事關幾密者公必預焉賜誥命授光祿大夫加贈三代又上言學校田賦鈔法鹽法官俸數事多見施行正統四年冬得疾日加猶時強起議公務明年正月五日薨公卿以下奔走哭弔訃聞賜祭命有司治葬賢士大夫皆傷正人之沒以為世道惜公自小官至一品始終以國家生民為心嘗取希文語名其退食之堂曰後樂臨大事決大議衆或媕婀公獨奮斷衆或辟易公獨邁往人有善告樂從如流斥姦闢諛無所顧忌下人有過多見優容所與交遊必輔於道憂國忘家老而彌篤所得俸賜率分族姻屬纊之日室無百緡平生立心行事一以不昧天理為主享年七十有八葬昌邑西新郭之原曽祖佑志祖谷保考士中皆賜光祿大夫少保兼户部尚書曽祖妣倪祖妣李妣王皆贈夫人配王封夫人子男五􅚻琮琇㺭玗女二長嫁逢玘次嫁葉清清侍公交址先卒清妻孀居十八年亦先公卒孫男二愷􅠬士竒與公同朝四十年晚辱公知甚厚未薨之先嵗余蒙豫告歸江右道過南京公時有疾首造焉躍然起執余手論國事娓娓不片語及他嗚呼言猶在耳安得復見正直憂國如黃公也哉􅚻求書公墓上之石敬敘而銘之銘曰維天之仁生賢與才上以輔德下以康時士之髙明識道在我我祗行之其敢佚惰萊有黃公桓桓其資于道克明行之弗疑遭逢列聖既五十載崇爵重秩踐揚中外靡遑夙夜靡間寢興單智畢慮顓顓用誠益下以惠益上以德敷厥謀猷亶時正直凡民被疾猶痛在我民既有瘳我食斯下南交初附詔公拊循育之訓之昫其春溫交人戴公曰我父母有詔歸公如去恃怙肅肅其度內直外方不茹不吐推賢薦能先哲所存後天下樂公實承之秉執有確國之有公柱石在堂士之仰之如霍與衡爵圭林林疇並公志遽不憖遺匪時之慨孫先生墓碑銘正統五年五月二日豐城孫先生沒先生諱貞字宗正號竹軒孫氏唐興元中曰瑫者自江左來豐城卒葬邑之同造里敷山子孫始家豐城至南唐曰行琰者嘗移書節度使馬希蕚去兵弊民賴之子孫益盛代不乏聞行琰六世孫發宋元祐進士為永豐縣令又九世至實則生祐卿幼孤鞠于李氏姨遂冒李姓生仲明先生之曽大父大父父也先生資稟不凡幼嗜學邑大夫簡充博士弟子時泰和經師劉子彥為學諭器重之授以毛氏詩後卒業於文淵閣大學士朱備萬進士黃德潤之門升太學生中京畿鄉試明年會試中教官選除紹興府學教授正已以率生徒而致勤教事有御史挾勢欲壞法以濟私者先生固執不聽諸生日益見成效有明許負術者謂先生憂色見即心動白于上官歸省將至家聞父喪哀毁踰制服闋改漢陽府學凡所設施如紹興而諸生有成倍之九載績最升國子助教盡心教事不改教授時遂奏復孫姓祭酒胡公司業吳公皆遣子從之學改博士升七品祿間祭酒司業闕推先生署監事洪熙中賜誥命母年八十先生亦六十餘奏歸省遂懷退休上疏乞解官侍養時子曰恭官翰林即援棄職就封之典授翰林編修文林郎致事既歸蚤莫不去親側自守益嚴非公事足迹未嘗及縣庭嵗大比諸藩聘主文衡咸辭不赴母沒築室敷山之下居焉鄉俊秀願授業者不拒皆傾底裏授之而貧者不責其禮善教子各授一經其三發身科目一守重慶一教祁門先生之退居敷山也皆迎就養喜曰吾將往觀其所治教而進益之既至又皆喜曰庶幾無忝哉皆為留或再嵗或數嵗而後歸先生兼通諸經尤長於詩春秋文章和平暢達有竹軒集若干卷慎交處明知人所舉薦士如按察僉事張某輩皆執守介特有聞於時先生負治才臨事條理井井惜其止於教職未大展布也平居事親孝處族姻朋友厚在太學遇故人子憂患艱難周恤之雖久不厭有出獄而病困欲來依者排衆議而庇之不茍附勢初與夏原吉盧淵李慶最故及夏李為尚書盧為侍郎先生時官太學未嘗一及其門家積書甚富市肆所闕者率手自抄録雖老不廢學居心端謹自用儉約諸子仕者每遇所得祿賜歸為奉養之資悉不啓封而還之且書戒之曰汝留養廉吾不乏此諸子仕外者未嘗需及一物蓋慮隳其守也凡所慮深逺故歷官三十餘年坦坦一致晚而退休講道之餘日與二三故老宴遊談笑無毫分外物入其思慮一日杖䇿出觀江漲道過故人清論如平時莫歸無疾而卒享年七十有五配揭氏元文安公族孫封孺人子男五長曰溫次曰良舉進士自監察御史升交址重慶兩郡守再升廣西右布政使曰恭進士及第自翰林編修升修撰再升侍讀曰儉先卒曰讓舉鄉貢會試選中教官自祁門縣學教諭升應天府學教授仕者皆卓卓有賢名女二范迪熊仕恭其壻也孫男十五女十曾孫男二女五諸子遵治命奉葬于敷山先塋之次曰恭走北京以其同官劉某所具事狀屬豫書墓上之石豫與先生同朝三十年去年南歸先生擕酒迓豫於江滸相得歡甚酒數行遽别時先生體力康強神采清明豫喜先生之福未艾也豈謂踰年而遂永訣耶敬敘而銘之銘曰豐水之漘代有聞人道德與文炳乎振振皇明龍興續武則有繄孫先生顯顯授受鑽研羣經職任教事繇頖而國畢效勞勩有確厥守有卓厥志有宏厥才未達于施其秉之義其存之仁以付厥嗣以被于民嗟孫先生道既行矣生而夀康沒亦寧矣敷山之原峩峩者墳士竒銘之以續前聞贈資善大夫户部尚書兼謹身殿大學士陳公墓碑銘戶部尚書兼謹身殿大學士陳山蒙恩追贈其大父父皆資善大夫兼謹身殿大學士大母母皆夫人山祗奉命書薦告已狀其考之行屬士竒文諸墓石按狀陳始自長葛徙南劍之沙縣族既盛遂析為三而上世皆有顯仕其居廊口白泥里者在宋曰世卿事太宗真宗終祕書少監知廣州有傳在國史子中儼駕部郎中郎中五世至諱智智生天麟天麟生諱祿其考之曽大父父也母范氏其考諱某字某生晬父喪而家落母躬勤教育之時資助於舅氏十餘嵗智識日長駸駸能卓立治生産有條理為鄉黨所稱既冠家益饒裕擇勝徙居邑之西為人重義喜濟施急人之急通醫術凡有求者趨赴之不間風雨蚤莫多所濟活道圮梁壞率發帑廩修治以便行涉性剛直遇私競爭不平公其是非未嘗毫髮茍徇言出靡不服者里中有陳公道之號諸子皆長恆勵其學業有祕書故第在屢諭諸子曰此吾先世力學所致汝曹不務圖繼可乎晚作别業於邑之北有園池之勝日偕朋從宴聚歌詠其中一切富貴憂虞舉不足以干其念慮洪武戊辰十二月二十一日卒春秋六十有六葬從門西山之原娶朱繼黃子三男三女皆黃出男長石次山次虎莊汝爵蘇必昌盧均賢其女之壻孫男四璟炯圭夢琴山明經舉鄉貢歷郡縣學官擢吏科給事中遂以文學侍今上於春宫進左春坊左庶子戶部左侍郎遂進尚書兼大學士寵遇益隆其為庶子侍郎皆蒙恩贈父母以已之官秩至是而追榮之命三加矣非公濟施之應乎若公所舉先世以勵厥子者亦既成其志矣士竒與山館閣同寮又交久誼不可辭銘且聞陳同忠肅公族也謹敘而銘之曰陳徙劍沙昔有顯聞堂堂忠肅正氣凌雲同本殊幹為材匪異族出既同道固一類或仕而著或隱而微相望輝映厥位與期侃侃陳公所秉剛直是非以公作其挺特惟志在民利安是圖人有弗寧不步而趨亦既不處弗閎厥施忠肅所存公存有似恬淡怡愈韋布終老仁厚所鍾有子光紹遭逢十嵗升列六卿駢蕃寵秩嘉榮所生麗牲有石巋焉墓道史氏作銘來裔是告故資政大夫兵部尚書兼詹事府詹事金公墓碑銘永樂十三年四月十五日兵部尚書兼詹事府詹事金公得疾明日強入朝退疾劇又明日卒公世鄞人自少慷慨濶達負氣義壯遊京師遂遊齊魯趙魏以達於北京居北京二十年上初舉兵於北平布衣入見署紀善遂從征伐明年署長史又明年升工部侍郎永樂二年升兵部尚書兼詹事府詹事公事上敬慎小心每被顧問知無不言退未嘗泄以是益見禮遇而委任益篤焉輔𨗳儲君以正直自持言無不盡尤見優待遇同列論事徑情直發不肯持兩端依阿而虛已服善沛然如決江河注之海也兵部機務繁劇公嘗推讓同官之賢能或一事失當則必自引咎人有片善必稱之雖有素與公異意者其人有他善未嘗不稱也里人有數窘辱公公為尚書時其人補吏來京師懼不為容公薦用之或曰彼不於公有憾乎曰顧其才可用奈何以私故掩人之長尤好奬掖善類士有得一官而往見公者必戒之曰國家待士厚所望為民造福耳所至一以濟物為務聞人出片語涉暴刻輒艴然色變可謂公直慈厚者矣襟懷坦夷神情灑落政務之暇朋徒往來酒一壷棊一局詠歌談謔相得也事兄世華盡恭愛撫兄子如子篤交誼朋友卒其子無依公為長育之亦有長育之而為之娶婦者其他賙貧乏恤喪葬所濟尤多博於史學每論當時成敗治亂之故娓娓千數百言不竭其源委曲折歷歷如身親覩之者享年六十有三初病且革尚書蹇公侍郎盧公往候之問所欲言公曰命至此何言獨念忠始以一夫見上歷數年位列六卿寵極貴盛而未嘗效分寸之報忠即死能瞑目哉已而顧其襁中兒謂二公曰忠不能報上恩矣士竒必志上所以寵我者銘我庶幾兒長而或有知也訃聞上為文祭之有曰殫竭心膂克勤夙夜小心慎密始終無間皇太子為文祭之有曰能盡乃心知無不言助益多矣又曰老成忠厚方資之為輔而遽沒焉嗚呼觀公君臣之際始終一德生榮死哀何其盛也公諱忠字世忠祖漢考文英以公貴皆贈資政大夫兵部尚書祖妣樓氏妣馬氏皆贈夫人娶余封夫人子男一達公沒時逹生始六月明年二月兄子復初奉公喪歸葬鄞之某鄉某原士竒素辱公知義不可辭銘故敘而銘之銘曰神龍御天雲翕從之千載之會時維昌期金氏之先宅於東浙世篤善仁蓄涵未發如種必穫逮公奮興明良相逢昉自北京奉天靖難公侍帷幄寅恭慎密畀以心腹邦國載寧榮秩顯命爰二冬官遂掌邦政遂輔儲君宫臣之首公德多有公存孔厚古之君臣有終不常偉公之終隆隆寵光難名如天維帝之恩公沒惓惓庶其後人鄞原之墳湖山鬱盤歸焉斯藏永永其安故中奉大夫山東布政使司右參政陳君墓碑銘陳之先五代時大理評事諱暉自金陵徙泰和始為泰和人自宋以來子孫蕃盛皆業儒為詩禮巨族代有仕者由科目進者六十有一人而至士啓士啓諱雷既以字行遂别字震之其曾祖文瑞元瑞金縣儒學訓導祖存道安逺縣儒學訓導父煥章號萍翁母蕭氏萍翁四子伯士瞻洪武壬子鄉貢進士興寧主簿仲士恱叔即士啓季士朂士啓髫齓時已挺特克自樹立甫十嵗從學興寧君習詩律己文采英發十二習舉子業治易經與朋友論議能自立説不蹈襲未冠鄉大姓延教家孰前輩與之辨析史傳寡所推讓父坐纍謫遼東中道喪其從者士啓聞之徒步走萬里省侍嵗餘置居室及共養百需咸備奉命歸侍母及佐士悅理家事時公府徭役悉論産之殷者陳氏産在里中甲乙數士啓雖少年兄弟協力一心必不肯墮人後時興寧亦坐纍謫五開治裝遣人東西寧父兄者常接迹而奉母盡孝養既父兄皆代歸無幾父卒終喪永樂元年興賢詔下邑大夫舉士啓遂選中江西鄉試明年中禮部會試廷試賜進士出身凡進士未授官分𨽻諸司觀政士啓在左軍都督府時成國公掌府事得士啓歡甚間暇輒就講論古大臣賢將所以事君使人之道士啓亦樂為盡誠禮遇加厚召入翰林為庶吉士修永樂大典辨博明敏同列推其老成翰林編修周述言於朝陳士啓才行有為有守超擢禮部祠祭郎中授奉議大夫究習典章謹於職事時吕震為尚書屬官諂附者率得近尹昌隆不為諂附以罪去之卒擠之死同列以是惴惴士啓獨任直道不茍徇或舉尹戒之答曰人各有命吾恭勤於職以聽命耳枉己媚人以求容不能也吕雖惡之卒不能害丁內艱去服闋還舊職無幾升山東布政司右參政士啓寬厚愛民於事必盡心而襟宇濶達不察察以為明不苛急以責效待下常采其所能而舍其小過妖婦唐賽兒惑衆為亂坐失覺逮繫數月釋復職數行所部督徭賦不嚴期約民得自便故事集而不擾青州嵗歉郡具飢民之數上聞朝廷遣使偕士啓如數賑之粟比至而飢民之數倍增使者議再奏俟報士啓曰民命在旦夕若再奏俟報旬浹間餒死多矣請發奏後即出粟脫有罪請自任不敢以纍遂獨具奏朝廷從之所至民有爭訟郡邑未決而伏馬首以訴者從容數語理喻之皆帖服三載考最賜誥命授中大夫髙煦潛謀不軌稍覺士啓適至青州聞之暮夜馳歸語三司同具密奏罪人既得士啓從陽武侯兵部尚書録其餘黨撫安人民遂同御史給事中清理山東諸郡軍籍之弊姦者無所容枉者賴以直蓋為人果確為政廉平循理而行無所矯拂未嘗務名而所至其民愛之平居友于兄弟睦于親族處人和易愈久而不變宣德六年八月四日卒於官春秋六十有六娶康氏子男一祚女二長嫁曾貫次嫁梁貺祚本士悅子以姪為嗣孫男二敬放祚奉柩歸葬于鄉先事請書墓道之碑士啓先妣夫人族姪後余生兩月余兩人自丱角以學問相親益又仕同朝相好至老如一日相知深莫如余故勉為之書而係以銘曰陳出有虞以國為氏轉徙金陵西昌再徙源厚本深𣲖衍支分繩繩振振有德有文林峙詩書星羅簮笏科名六十震之嗣發石渠天祿纂述校讐人或不足在已則優儀曹郎署執勤與敬人或自屈在已用正維東大藩齊魯之邦參贊旬宣直道以行翼翼小心雍容大體吏服其清民受其祉歷事三聖以臻全歸於戲震之于宗有輝凡宗之榮震之始大世德尚隆來續未艾故翰林侍講學士奉訓大夫曽君墓碑銘正統辛酉三月二十有一日翰林侍講學士曽鶴齡卒於官訃聞命禮部左侍郎王直賜祭朝之公卿大夫咸致吊祭館閣諸賢加賻贈焉曽君吉安泰和人鶴齡其諱延年其字一字延之以書經中江西永樂乙酉鄉試辛丑會試禮部第二廷試第一賜進士及第此其發身也初除翰林修撰授承務郎宣德庚戌升侍讀授承直郎正統戊午升翰林侍講學士授奉訓大夫此其歷官也初偕同官修天下郡志未竟遂預修永樂洪熙實録又修宣德實録悉心纂述事必究實無虛譽無曲貶嘗同考禮部會試又考京畿鄉試咸致公選始鄉試初場畢執事者不戒火焚試卷三之一有司茍且惜費欲遂試後二場而竣事焚卷者罷不復試延年不可曰焚卷豈皆其下者罷之何以壓士心且朝廷以得士為重豈惜一日之費必更試有司具二説請旨卒從延年遂别命題試士論大服奉命代祀神農虞舜之陵及南嶽咸嚴誠敬此其所治職也平居惇孝友初與兄椿齡同中鄉試獨留養親椿齡赴會試遂登第為翰林庶吉士無幾卒延年歸葬之而教誨其遺孤男女有成長皆為之婚嫁於待寡姊孤甥皆厚此其行之著於家也為人和厚易直交際以誠表裏不二發言處事公而不私能以義正人亦樂受善言雖嫉邪惡而辭氣雍容小人不怨此其發諸已而施諸人也幼嗜讀書長益勤勵默識講析經史通貫其學也形諸著作和平簡潔明理為務不事工巧有詩賦序記傳銘贊若干卷藏於家其文也誨人必先德行而文藝次之若誨人於文必導之經術使尋究旨歸後多成名其施教也曽始居金陵自唐光州團練使慶之孫延搆避五季之亂徙西昌五世至孝子肅四子俱起科第自是而子孫益蕃其先所自也又十世至元瑞金教諭約其曽祖也洪武中沔陽黃蓬湖官九韶生贈翰林修撰伯髙其祖及考也封太安人胡氏其妣也陳氏興寧縣簿士瞻之女封安人其配也五男長序舉進士授行人司行人次廉選鄉貢次應次庶次庾二女長嫁胡仲璇次嫁嚴時其子也八男四女其孫也旦入侍朝退即館閣偕其僚談論誾誾莫歸得痰疾遽不起其屬纊日也自癸亥至辛酉五十有九年其夀也西昌某鄉某原其葬也重交遊之誼序其事行世次之槩使刻置墓道其寮之長士竒也序行於墓必有銘古之制也銘曰西昌文獻有鄫氏唐之季葉繇升至後有孝子宋盛際四男彬彬五擢桂厥嗣振振顯不匱司教瑞金沿十世逮其曽孫奮勵志明經射䇿起魁第峩冠褒衣陟近侍承明延閣聨俊乂石室金匱述有繼恪單乃心釐乃事庶明于道正于義敘勞稽績進祿位奄其歸全靡怍愧巋乎斯丘太史志式祗承續在來裔東里續集卷二十七
