body:
  text: 東里續集卷二十八明楊士竒撰墓碑銘懷慶知府李君墓碑銘河南懷慶府知府李君正統四年七月初七日卒於官既歸葬泰和千秋鄉羅團之原又明年其子誠奉翰林侍講余君學夔所述事狀走北京求書墓上之石余今年七十有七衰倦甚顧尚縻公務日勉強不前乞退而未得而何能應人之求故有求者率力辭郤雖忿且怨不恤而誠懇懇求不已則又念李君持身愛民吾邑之卓卓者且素厚不忍固辭李氏家泰和西郭文溪之上其曽大父宗明大父雲龍父又新有孝友之行母蕭氏李君諱湘字永懷自少端重謹飭嗜學入鄉校從師授春秋經業成上北京大學永樂中選歷刑部都察院以才能稱擢東平知州斷斷以持已愛民為務常祿外非其義一無所茍取而勤於公旦莫治事不少休視民如子訓之勵之諄諄無厭倦意非甚悖不輒施笞罰徭役必驗力厚薄民皆恱服州城之東有大村壩源出泰山雨溢數為民患奏發民丁築防捍之患乃已州及所轄五邑地曠多蕪廢課民墾闢倉廩充牣嵗歉賑貸咸有備祀典祠壇公府廨宇整飭一新增修學舍明教化有稱齊魯之間前之為守者得罪去後以宥復李君用召還民懷之不置羣訴於朝請復之車駕征北邊詔山東西民隨軍給餉運道逺多死亡李君率東平民行撫綏有道訖完民以歸在東平十餘年始終一致正統初詔廷臣舉郡守禮部尚書毗陵胡公舉李公遂升懷慶知府命下東平之民爭挽留不可扶老擕幼涕泣送數十里外既至懷慶一用所以治東平者治其民民欣欣戴君如父母懷慶有兵衛素挾勢厲民李君隨事裁制不動聲氣而兵帖然不敢以肆在懷慶三年郡人以安上下交譽之無間言李公惇厚溫裕孝友如其父處人以誠能赴其急不以貴賤貧富而移所守嗚呼今其巳矣其享年五十有七其配朱氏其子男四誠譛譓諄女三蕭鸞劉載言朱箎其壻也孫男三珽玘珍銘曰為士所本曰持其身為政所重蒞民有仁溫溫李君執德靜嘉履謙蹈恭悃愊無華學成而仕遭時奮庸一州五邑董治鄆邦顓顓夙夜求民之莫導民之勤莫息蚤作尊卑長幼教民以禮務善去惡俾民承祉躬廉舉正表率于下休聲洋洋洽于齊魯聖明急治察最升秩懷孟名邦古二千石治教所被三載有成民之戴之懷鄆一情不逮下夀噫其己矣循良之規靡愧前史江山盤回故鄉有墳後欲求之視此刻文禮部左侍郎章公墓碑銘正統二年十二月初四日行在禮部左侍郎章公卒于位訃聞賜祭命有司具舟還其喪且營葬事自公卿以下皆致祭將以明年某月日葬先事其孤瑾奉翰林侍讀學士李君時勉所述事狀求書墓上之碑按章氏世家會稽髙祖斌宋景定中舉鄉試第一人曽祖某祖某妣某氏考某妣某氏公諱敞字尚文質庵其號自幼頴敏嗜學稍長駸駸有立志父母及鄉閭長老皆逺大期之文學日有進永樂癸未群試於鄉擢詩經魁明年登進士第選為翰林庶吉士與曽棨等二十八人同奉詔進學文淵閣恩寵隆洽為四方學者所歆豔文學愈益進與修永樂大典壬辰擢刑部江西清吏司主事授承直郎究心獄事夙夜式勤雖時繫囚繁理決無滯推情處律必協于中復召至北京入翰林修四書五經性理大全書遂留行在刑部西山有劫盜詔捕之急捕者掩執行路數百人以聞上命刑部尚書覆訊如實悉斬以徇尚書以付公訊公悉辨其枉惟一人實盜以聞遂誅盜而盡釋枉者都城外迫莫商人數輩投止道傍何千戶舍夜有盜劫商人商人疑有所為將聞於官何不能明即自經死事聞詔五城兵馬捕盜如三日不獲盜兵馬坐縱盜罪既三日不獲兵馬懼遂摉索何鄰比草餘家得鈔數萬緡即執鄰為盜送詣刑部公驗鈔悉非逺來者且無他物以詰兵馬兵馬具實對草餘家悉得釋升本司貟外郎授奉訓大夫遂升郎中授奉議大夫無幾丁外艱服闋改吏部考功郎中考核公明小人不便造謗衊之屹不變洪熙中賜誥命追贈其考為考功郎中封其母太宜人無幾丁內艱嵗餘起復改驗封郎中遂升禮部右侍郎授嘉議大夫安南耆老奉請命黎利權署國事上從之特命公及通政徐琦齎詔命利且撫綏其國人兩人皆諳大體熟故事雍容有度既至宣揚德意舉國欣戴而敬禮有加將行且厚致饋金珠香繒纍百計悉郤之利等跪請再三曰小人事大之常禮也非假此無以將下誠願不為黷曰吾輩奉天子命來用輯寧若等惟事上如事天保下如保赤子永終不渝可也貨賄將誠末矣竟卻之一毫無所取利遣使人奉表及方物隨公等詣闕謝且密附所饋物令奏以納公等而不令公等知也行將出竟其從有泄之者公兩人索其裝得之歎曰若聽其所為即吾輩外卻而內欲也遂取封識授其邊吏俾歸利還賜誥命贈其祖若考皆嘉議大夫禮部右侍郎祖妣妣皆淑人黎利死朝廷以公奉使不忝再命齎詔命利之子麟署國事及境其邊吏識公者舞抃拜曰天朝子育下邦不受金大人齎詔復至矣奔走豫告麟凡所以迎奉禮益恭其歸而秋毫無受如初至既還前之嗣封晉王者以罪廢已革其護衛衛之廬舍土田護衛軍先以徙戍邊惟存一千嗣王得旨索有司悉歸廬舍土田有司奏言豫民已久若悉歸之當敓三萬餘家之居佃且今惟一千軍無用悉歸上命公往審度處置公至言於嗣王曰今陛下臨御惟恐或有一人失所殿下以至親受藩屏之託必同此心若徇千軍之欲而失三萬餘民之心臣知殿下必不為王意解語公曰吾惟侍郎之從公遂計畫而分之於是一千軍咸獲足給三萬餘民家不覺有損皆恱歸轉左侍郎公在禮部尚書胡公政尚寬大公以嚴肅佐之同德協志相與共濟公於吏欺雖小不恕遇弊事必言於胡公商計革之程督庶務恆盡心焉曰吾為佐其道應爾也為人明敏疏達遇事能果不肯媕婀依隨敬老禮賢交友以義其友有過能面直之或困於憂患極力援之雖數無厭所居好植花卉間暇焚香閲簡册臨古法書而已一日夙興朝參道中風疾驟作輿歸是夕卒享年六十有二元配葉氏先卒再贈至淑人繼室趙氏封淑人子男五璨瑾正統元年進士璠璵瑛女一嫁錢康孫男一恩女四公為庶吉士時於士竒往還久而益親嗚呼於今已矣銘曰章世儒家有聞自宋大比賔興褒然魁貢逮公嗣奮在今聖朝振其聲光式閎以髙延閣承明益廣其學爰屬司冦贊理于辟致明與慎夙夜靡遑念彼古人死獄求生聽詞審情以核枉直無枉弗直平反多績轉遷考功卓特持公不以譽毁而易其中升二春官祗佐三禮秉乃直清亦嚴治紀再使南交將命允宜行槖之旋不增毫絲有猶有為秩秩條理歷官四朝毖終如始既全以歸無沗斯文史銘其墓用諗來昆故奉直大夫右春坊右諭德黎君墓碑銘右春坊右諭德黎君以正統二年十一月謁告歸清江得疾卒于家其孤統以翰林侍讀習嘉言所狀事行求書墓碑余聞而哀之曰嗚呼黎君之擢第也為良進士入風憲為良御史於長民為良郡守於近侍為良輔臣奈何遽止於斯乎黎之先見余所作其考墓表其曽大考允誠大考惟琇考宗瑞妣鄒氏以君貴考贈右春坊右諭德妣贈宜人君兄弟三人其季即君諱恬字潛輝天資清淑生六七嵗知慕學問纍從明師得其旨歸而自進其功永樂壬辰擢馬鐸榜第二甲進士無幾丁內艱去服闋除陜西道監察御史以正直揚風裁嵗辛丑朝廷以災異求言群御史同上奏實君具草歷詆大臣之任事者無憂國恤民之心剴切激厲無顧避上曰御史言是任事者不能堪後薦御史之才可用於上皆升知州而處之逺方君得交址南靈州尤僻逺君怡然曰聖人不鄙九夷我何人哉既至教愛其民如子民皆父師事之政化既行會黎利反其衆日盛總帥王通孱弱不能制為吏所脅遂矯制勒三司郡縣官吏悉解職守隨通北歸君時在行既歸通及協謀者皆坐法朝廷以事不出於衆悉置不問宣德七年士竒率同官言黎恬文學操行可任近侍遂命為右春坊右諭德授奉直大夫時春坊事簡奉旨入翰林與纂述考最賜誥追贈其考妣預修宣廟實録簡充經筵官奉命考禮部會試者二用心公正時多得人遂謁告歸展先墓賜道里費給驛舟既展墓樹碑墓側退而洽其親戚鄉里歡甚將行得疾醫藥久弗效以正統三年正月草二日卒享年五十有一君篤孝友之行而磊落有大志恥屑屑流俗事學博而正論議沛然為文章波瀾藻麗而根於理存心公平於論人之邪正事之枉直靡不服之盡心公務未嘗茍且非其人弗與處容色潔白如玉儀度恭肅人不可犯而雅度灑落良朋勝友卒然邂逅詩酒倡和酬酢率極歡而罷其藏修之齋名熙熙所著有詩文集若干卷其娶先敖氏贈宜人繼王氏封宜人子男四統縉頌生皓生女二傅徴賢羅某其壻也孫男二升生冕生其葬以卒之嵗某月日葬在某原與敖宜人合葬焉黎君余考禮部會試時所取士又以同鄉故相知深而相與久其仲兄慎兄子經皆有文學於余往還余嘗謂清江自劉氏公是公非而後有一家三人聨璧輝映者今再見於黎氏居無何慎卒經又卒黎君每向余道其兄與姪未嘗不泣下余亦為之感歎豈意又於今哀悼黎君哉銘曰清江之黎代襲詩禮繇淦三洲徙版城里自其髙曽潛德弗揚逮其大考武辨奮庸卓卓潛輝篤志問學升自賢科秋空雕鶚鐵冠白筆北面在廷用振憲紀用張國經觸邪指佞動植有知昔之所學今惟行之既斥遐僻俾治夷類不賤鄙之躬勤撫字夷亦有心曰我仁侯父之母之而肯以尤既升桂芳所職輔導詞苑經帷在帝左右方將顯庸曷遽殞亡松柏中仆不至柱梁嗚呼潛輝其藏我銘後有考徴庶其猶生故通議大夫資治尹吏部右侍郎鄭君墓碑銘國家罷中書升六部吏部所職簡用賢才考察政績而進退之為治平之資故士大夫非明且公不足以稱吏部之任蓋吏部得人而後百司可望得人百司得人而後民生可望不失其所吏部所係豈細故哉旴江鄭誠文實為吏部侍郎十餘年殆其稱吏部之任者歟宣廟臨御於用人尤甚重廷臣三品以上有闕必命衆僉舉又敕吏部凡方面郡守闕令廷臣三品以上各舉所知吏部審其當否始奏授官蓋堯舜用人之道也文實前後所舉數十人悉副輿議其於中外諸司政之得失才之髙下行之邪正博知悉識尤熟典故上前間有顧問敷奏詳明無所遺失雖由久在銓司亦其存心之正用意之専也於調官必度務之繁簡才之稱否而處之治公事必循舊章於贊黜陟率公冢宰所倚任焉馭下吏不威而嚴下亦莫敢欺之或有乘間為欺者輒覺之召諭使改不輒加罪大官中貴有所干凡不可者必從容以理對不肯茍徇親故有干弗得者造誣騰誹以衊之知之弗校蓋其為人明敏敬慎和厚果毅恕而有容也鄭氏旴儒醫家宋季其先號仁齋者嘗為撫州儒學教授髙祖禎仕元為撫州醫學録曽祖銘洪武初歷彭澤南陵二縣典史祖瀚逺父守中皆隱處母王氏繼母傅氏文實自幼秀頴嗜學甫十嵗監察御史行縣察試嘉之舉為邑學生從明師授春秋弱冠選中江西鄉試遂入太學充監生為祭酒胡公所愛恆侍左右年草四擢吏部司務精勤職事已起聲譽升考功貟外郎授奉訓大夫丁內艱服闋改文選貟外郎兩司郎中雖老成自居然皆服其能而德其助升文選郎中授奉議大夫洪熙中賜誥推恩封贈其父母五品宣德初升吏部右侍郎授嘉議大夫居官恆四鼓興朝退即坐公堂底莫治職務雖事叢脞而條理井井且益自淬礪其譽益重贈封其祖父皆嘉議大夫吏部右侍郎祖母母皆淑人遂進通議大夫資治尹文實事親孝親癠必色憂母沒哀毁友諸弟待臧獲有恩事師如父師沒厚禮其家交處以誠有淪落憂患極力拯之遇名賢子孫率異視之宋髙宗賜吕頥浩御札流落民間文實識為前江西僉憲吕升故物歎曰此世之寶也購以歸吕所行槩類此春秋四十有九而卒訃聞上悼歎命禮部賜祭有司營葬朝自公侯師保尚書暨御史近侍六卿之屬率往吊祭其輿皂及所居閭巷細民皆嗟咨惜之亦有流涕者初得疾遽革醫罔效家人憂驚蒼黃將叩道家者祈禳文實厲色曰生死命也吾素行可無怍何事於禳遂止獨以親老不得終飬自慟語不他及是夕卒正統三年十一月一日也前五年有推人始生年月日辰以決夀者言文實嵗行及午應止噫信其命矣夫其配黃氏封淑人子男一垕女一皆幼卒之明年春將歸喪葬其鄉黃氏使垕奉刑部侍郎何君文淵所述事狀來拜請墓碑余與文實同大江之西又同朝久故敘而銘之銘曰鄭出姬姓以國氏代有文獻昔聞世天建皇明啓隆治選賢任能布列位天官實重鑑衡寄厥卿暨佐必簡畀文實起旴秀出萃明經入官卓尚志三奮崇陟冢宰二致勵夙夜敦劼毖庶士濟濟升以彚審厥臧否稽所事致公與明平不陂曰進曰退中以制厥所推轂必既試溫溫處物色不厲弗嫵弗忤一循義曷遽奪之弗𢎞施嗟其全歸靡怍愧佳城鬱鬱旴之涘後欲考之此其概贈嘉議大夫刑部右侍郎楊君墓碑銘杭有君子曰楊孟潛沒三十年其子刑部右侍郎寧以前翰林侍講匡南余鼎所志墓文告余曰先君受追贈恩至三品法得立碑於墓敢請刻辭余聞孟潛之行於士君子矣又與寧同朝厚善為之序曰楊本沈氏世家杭之錢塘業儒元杭州路學教授某既卒其子夀之始生母楊以鞠于舅氏遂蒙舅姓生德文配傅孟潛之大考妣考妣也孟潛諱升自幼凝重不凡天性孝友髫齡已立志學問而旦暮侍養不去親側得親之歡一弟篤愛之終身洪武丙子以春秋選鄉試明年會試中副榜授教諭星子縣年甫二十餘惇持師道端威儀明講説自旦達夕躬勤弗懈言動雖微不茍屹然類老成人學者翕然服從前庶子廬陵鄒緝方正不茍許可時佐教星子獨加禮孟潛道譽之不置口星子學賢科纍嵗不薦士郡邑及學官惑於堪輿家言學地不利謀徙置孟潛適至毅然曰學業至未有不薦者竟不徙其於學者誘掖奬勸忠愛懇到久而彌篤三年學薦二人又四年薦四人皆登第自是科不乏升九載考績升邵武府學教授無幾調徽州府學施教一如星子所至諸生皆從授春秋大比而升者比比善教之效有聞於時其為人純實和易服用儉素非道之言未嘗出口與人交悃欵言出而信其去也皆思之久不忘平生以事親為切要得祿必迎就養有欲以理民薦之者力謝卻曰今幸在散地旦夕獲侍親側而奈何欲奪之乃止永樂甲午留北京以疾卒卒時老親及妻子皆在徽甚貧惟以不獲終養為憾徽人聞之為築室學舍之側以處其家非積行之誠有以致之乎卒於是年十一月晦享年四十有三葬錢塘之花家原以寧貴纍贈至嘉議大夫刑部右侍郎嗜為文章詩雅淡近古所述有拙齋藁春秋正義藏於家配袁氏封太淑人子男二長即寧舉進士擢官刑部主事升郎中用佐武功升刑部右侍郎次宜女二長嫁監察御史劉安定次嫁某孫男若干銘曰行莫先孝顓顓厥誠道貴善教羣才以成忠厚之存平直之行天有報施身後洊榮有赫嗣興峩冠在廷振華履亨既崇以閎錢塘之原歸展先塋貽後樹碑太史之銘贈嘉議大夫工部右侍郎周君墓碑銘宣德五年上命越府長史周忱為工部右侍郎賜璽書俾巡撫南直𨽻蘇常諸郡兼董其餉事忱單心畢力靡間夙夜上有資於國用下有及於民生三年賜誥嘉奬而褒贈其考為嘉議大夫工部右侍郎於是忱以禮部侍郎章敞所述其考府君事狀求余為銘將勒石于墓余與府君生同嵗居同郡又與忱有同朝斯文之雅不得辭府君諱森字秉昻周之先會稽人唐御史中丞勍率兵討黃巢留鎮九江子孫因家焉七世孫太子詹事世修徙南昌之武寧又四世至宋敷文閣學士友賢五世不分詔旌其門其子兩浙宣撫汝翼汝翼子瑞州知府應合應合子天驥元吉州路總管贈江西行省參知政事追封廬陵郡公又因家焉郡公五子長橫州路治中諱志道府君髙祖也曽祖忠州判官諱圭祖南康路知事諱鑑父諱潤世稱遺安先生時重其學行元季避兵亂於吉水之月岡又因家焉母李氏知學有德善遺安年四十未有子脫服飾為取側室黃氏生府君幼讀書警敏有立志成童綜理其家事井井間出長里徭賦邑大夫重之壯而襟宇闓豁才器充偉有司屢欲薦用之輒以親老辭而奉養克孝親疾躬治藥食不去側者纍日親沒哀毁嵗時恆謹祀事嘗改厝所生母舉柩過門將奉置堂中行祀禮姻戚中泥隂陽家忌者交尼之府君曰人子事死如事生安有親過門而不入家者脫有禍森不悔女兄沒諸甥皆客逺外喪葬悉自已出妻之母卒未有葬地即出地葬之或言此地大利後人奈何推畀異姓府君曰茍可利後在彼猶在此也與人交惇信義喜賔客觴酌談論雖終日不倦負直氣有過者面折之然能為人解紛排難而庇其鄉里有造偽鈔者事覺而枉逮其里人力為白之於官近鄉嘗有盜劫掠富家里中無賴亦動心潛結將發府君察知遍詣諭之禍福曰彼劫敓者即朝莫為魚肉若等寧可效之耶又召其首謀者閉於家得不發不旬日官盡捕近鄉冦戮之而沒入其家里無賴者皆詣府君叩頭謝曰微公我等悉以冦死矣蓋里人賴其惠者非一嘗舟行舟中人失物疑同載者竊將執送於官府君曰此疑事即為代償數日得真竊者失者大慚府君平居樂積書教子忱初習舉子業手録前輩名人程文成帙授之為式忱舉進士奉詔進學翰林日有長益暨擢刑部主事進貟外郎有廉能名府君喜屢至京視之而加勵焉府君於學通其大旨旁通醫卜尤嗜郭景純葬法有困於窶者從府君求吉地改葬其親蓋冀免於窶府君曰吉地非可求茍有善行將自遇之其操術如此洪熙中以忱貴封奉議大夫越府右長史忱奏分其祿之半於鄉以養宣德六年九月草二日卒禮部以聞命進士甘瑛賜祭春秋六十有七配龍氏元義兵參軍復皋之女有賢行先草七年卒繼胡初贈封皆宜人龍後進贈淑人胡太淑人子皆龍出男四忱恫恪怡恫先卒二女長適陳行恭次適蕭肇成孫男八女八曽孫男五女四府君之葬以卒之明年四月草九日合於里仙獅石之南龍淑人之墓銘曰繄周之先顯有閥閲昉越徙洪又轉徙吉吉守桓桓斯文攸尊吉人德公永言耐軒公之桐鄉青原白鷺公之子孫逢掖章甫始來月岡公四葉孫晚際承平于于丘樊月岡再傳曰秉昻甫才足剸繁知足達務韜卷弗用逍遙徜徉厥有譽聞施家暨鄉有偉嗣興揚于明庭秉志攄誠式二冬卿上裨朝家下惠黔首帝曰俞哉疏恩父母峩峩丘墳有石麗牲述行載榮爰勒斯銘太史吳先生墓碑銘先生諱勤字孟勤姓吳氏其先自大梁徙荆州至箎官南康遂家匡廬之陽至晢為永新簿又家永新其曽祖諱原道祖諱文振考諱師尹元名進士為永豐丞母龍氏一夕夢紫衣大士寤而先生生幼頴異五嵗知慕學七嵗日讀數千言成童四書五經皆成誦未冠為文章下筆濡然而必根於理未嘗茍作永豐君經學擅名大江之西先生與弟仲謹皆負才氣英邁傑出人稱吳氏二鳳先生有志科第鄉前輩咸期必中永豐君曰吾老矣乃不果行永豐君捐館元政日隳所在冦盜充斥先生歎曰世若此吾可坐視耶乃列弭盜數䇿往告吉安守臣納蘇羅丹納蘇羅丹知禮先生而不能用去之而州里冦盜益甚往避于洪居無幾偽漢兵圍洪有欲薦先生于行省平章多通者先生聞而止之曰此人已無固志明旦多通果遁城陷先生趨間道歸鄉里國朝兵下吉安紀律嚴肅先生曰此真吊伐師也往謁其總帥時淮南郭子章參謀幕府相得歡甚署先生官太和不就洪武初詔下興學徴儒師郡舉先生中書考經義第一奏除武昌府學教授嚴師道正學規訓勵諸生多成才者如中書參政方鼐國子祭酒吳啓皆出其門居數年先生援例去官楚昭王聘為諸子師而賔敬之先生非周孔之道不陳故禮遇久益厚永樂初召修太祖髙皇帝實録先生明故實謹書法時推直筆書奏賜白金文綺改教授開封府學施教如武昌周定王亦厚禮之至開封之又明年以疾不起永樂三年二月二日也春秋七十有六定王遣官致祭藩憲大臣及郡太守以下皆躬祭諸生哀慕不已明年歸葬于鄉先生孝事父母恭愛兄弟教育孤姪如子其胸次明淨矩度雍容不嚴而肅其學無所不究喜道誘後進恆盡底裏士子咸樂親之非聖之書不以教嘗見學者玩揚子太玄文正色曰曷不究心孔孟哉取豫以義在楚府日蜀獻王湘獻王皆遣使奉書幣致願見之意廣西藩憲亦請主鄉試文衡先生歎曰楚國待我厚古賢王禮士不是過也我豈當外交一切謝卻湖廣行省參政吳雲於先生故相好雲卒於官二子貧不能歸先生扶持之使立又教其仲子學凡於親故及名賢之後汲汲奬借於利雖微不茍取初罷教授歸諸生奉贐一芥無所受曰諸賢惟勉進不懈即勤受惠矣處物和厚人片善揚譽之不置未嘗啓口及人過失至論事公是非不肯媕婀依隨憂人之憂急人之急常如不及喜賔客至者未嘗以空匱廢禮間暇時誦佛經學者疑而質之先生泫然曰先夫人遺命也非敢徼福楚府紀善貝翺聞之歎曰朱夫子所記尹和靖之孝也先生不忘其先自號匡山樵者晚更號凷翁文章渾厚雅則所著有匡山樵者集六義齋集鶴山集若干卷藏于家配孺人蕭氏淑慎慈惠式勤內助先十年卒子男一善存女一歸胡光大孫男三耘耔耕曽孫男六士竒甫冠拜先生於武昌往還七年深辱教愛後同在史館旦暮益親密將赴開封所以命之者甚厚未捐館先十日書來示訣别之意而訃踵至矣嗚呼儒師老成世豈復有吳先生哉時先生之甥胡君光大述為行狀而約解君大紳銘墓余書墓上之石獨余久未及為今年善存走六千里外趨余皋緩之罪尚可聞乎敬敘而為銘銘曰凡士求道於先覺師惟先覺明為龜為蓍猗嗟先生研深函博秉義蹈仁表厥儀則遭時孔屯心急拯焚匍匐有言彼聵罔聞大明麗天光被四表嘉重有道升泮以教濟濟兟兟來遊來歌相廷賢關蜚英振華奕奕親藩河間行治秩秩賔筵仲舒正誼乃趨召命乃職史書春秋之志式嚴褒誅陽煦霜肅表裏不間有德有言斯文冠辨璞玉在山草木承輝嗟乎先生曷不憖遺先生之藏其封六尺永懷先覺過者必式故奉議大夫鄭府右長史賴君墓碑銘正統六年八月十五日鄭府右長史賴君沒於家其子翰林編修世隆縗絰奉監察御史薛希璉所述長史君事狀求余書墓上之石賴之先自江右徙汀之清流世有科第襲厚德髙祖諱寧曽祖諱霖祖諱李宗考諱福興皆持行不仕長史君諱添貴字景望晚號淡菴生晬而孤母陳育之訓之長而悟解頴敏從學縣博士兼通書春秋禮經工為文章永樂乙酉選鄉貢明年會試禮部中教官選授浙江麗水縣儒學教諭九載以績最升教授需闕言於朝願仍就教諭從之除仁和縣學九載績又最當升諸生列狀乞留會簡升鄭王府伴讀侍王之國鳳翔每長史缺即命君署其職事鳳翔學者率從之受經其仲子世隆官翰林恩典得封父母君既援棄職就封之例王重其去即舉奏為右長史從之授奉議大夫無幾丁內艱去既服闋以疾終於家享年六十有二君為人坦直存心忠厚孝於親友於兄弟睦於宗戚誠於交友以恭遜居鄉黨以詩書行義成其子以致知力行勵學者而施教孜孜不倦恆躬率先之學者後多由科目升擢要官有名于時其待諸生如子有為怨家誣搆郡守惡其抗直將黜為吏者君力為直之有負官租不能償者倒囊代之償前官所收廪米嵗久腐壞有司責民之守廪者償民窶不能償將自經君捐已俸代償蓋於排難解紛周急濟乏率謂當然其在藩府也從容正道隨事獻替甚為王所重平生利一芥不茍取處事必當理朋友死無所歸盡禮葬之𨽻人啓土築垣得白金一器有告君請分之者不聽惇義遺利槩類此其學有本源未嘗惑於老佛邪説所著有經義若干篇古文若干篇詩若干首存於家其配曽氏子男五長世昌次世隆宣德庚戌進士擢官翰林次世安次世和次某女二長嫁王瓘次尚幼孫男十其葬以正統七年墓在其邑某原銘曰緼仁積厚逢掖世振振繩繩續續繼蚤孤克奮卓特志上探虞周究洙泗抉隱闡奧發經義黌宫坐正皋比位詵詵童冠左右萃講道授業開蒙蔽昕旰亹亹殫勞勩聲實茂起光昭晢親藩毗輔式簡畀懷忠瀝誠秉正議匡直視古靡怍愧內篤孝友推施濟凡諸士行殆乎備既沒而寧此其竁銘以表之太史氏東里續集卷二十八
