body:
  text: 東里文集卷十四明楊士竒撰墓碑銘嘉議大夫都察院左副都御史邵公墓碑銘公諱玘字以先姓邵氏其先居睦至仁仲始徙金華蘭溪之椒峯孫吉甫宋國子助教公髙祖也曽祖伯玉祖巨川父子祥曾祖以下皆不仕母盛氏公幼已負志挺特不與凡兒狎就學外傅勤勵不懈以詩經中永樂乙酉浙江鄉試明年中禮部會試廷試賜同進士出身賜勑歸進學又明年召至授湖廣道監察御史慨然以功業自期號貞白生以見志明憲紀究律意而用法平恕至遇渠姦巨猾為民厲者亦不少寬假聲譽遂起嘗巡按江西廣東福建克振風裁時仁宗皇帝監國尤所簡知間刑部都察院大理寺闕堂上官率命公署有重獄數以付公公感上知遇夙夜盡心每事親理有所顧問應對詳明一時老成多推讓之升江西按察使先是南昌新建二縣苦上官和買長里役者供一曰費家為之空公視事之日立罷之歡聲溢路而私不便者皆側目焉然視公自用簡儉終亦莫敢一語積嵗訟牒填委悉取省閲擇其尤甚者自聽斷餘悉歸郡縣滯獄一清在江西五年政用肅然丁內艱去服闋改福建按察使治職如江西而有司之務倍繁稍濟以寬宣德三年召為南京都察院左副都御史時南京諸司緩弛御史尤縱公奉勑簡擇奏黜其不肖及庸懦者殆半繼奉勑偕六部長二簡黜諸司之不肖庸懦者綱紀復振為人外肅內寬仕二十餘年所歷中外皆風憲于條制故實與夫施措之宜默識明習所至紏劾官邪舉大體而略瑣細家居有孝行既仕得祿時惟母在迎奉就養極其愛敬母喪哀毁所居産瑞芝者再鄉里以為孝感處朋友寮屬必約之于義有所薦舉必清介士其亷潔之操蓋終始一轍宣德五年正月十二日夙興衣冠坐得風眩疾遽卒訃聞上為悼嘆遣行人賜祭其文有持身清亷用法敬慎及振舉綱紀屏黜憸邪之褒又命有司營葬事兩京大臣君子皆致弔祭公享年五十有六配方氏繼張氏子男二鏷銓皆早卒今以姪鏹為嗣女四童應方瑑郭昱其壻也一未行孫男四珵珂圭玉公之葬也國子司業陳敬宗銘之鏹以太常卿孫時所為事狀介監察御史包德懷來請文書墓碑公于余往還最故故不辭而為之書銘曰肅肅蘭臺邦之司直耳目所寄綱紀攸植彰善疸惡激濁揚清惟平惟公惟亷與明君子在位表範正軌任或匪人波頺草靡卓卓邵公秉潔懷貞不矯不隨特立獨行明習博識外方內恕爰舉大要簡略細故歷試三司成績有聞于江于閩提憲大藩善類鬯舒不善斂避氷蘗之存去猶始至進秩南都百度復貞用賢任能惟天子明曷不期頥長輔聖理發潛有詞庶其不死甄氏先塋之碑甄虞舜之後因陶甄以為氏在東漢曰宇講授春秋有行義在江左曰彬曰恬在唐曰濟皆以行義稱在宋甄氏數舉進士有聞曰秀始居欣州定襄其後科名宦譜代不乏至曰海官于蜀宋亡歸隱過鳳翔岐山樂其山川風俗遂家焉五子其諱世安者又徙麟遊所居在唐九成宫之西世安娶劉氏二子樲允中允中元季為禮部主事既內附為遼陽都衛經歷改戶部軍儲倉監納樲娶王氏一子仲得娶馬氏四子儀簡評詞儀洪武中舉鄉貢為户部主事升長沙府同知永樂初調嘉興府復調順天府秩滿順天之民奏乞留從之升順天尹洪熙改元追贈其祖考考皆正議大夫資治尹順天府尹祖妣妣皆淑人遂進儀兵部左侍郎儀惟纍世緼德務善用克膺兹光寵不敢泯沒將樹碑墓道昭示後子孫于無窮而屬文于余余于儀聨官不得辭則求其先之德善儀言世逺者弗能詳所知者髙曾以來家世相承男務詩書外治農圃及其時壯與少畢出力女勤蠶績各有警飭不待督勸嵗所入擇善者獻于公乃自用尊卑外內無相踰養老慈幼祭祀賔客皆盡其分之當然平居未嘗忘憂勤艱難之意無侈習無外慕蓋至于今不敢渝余聞儀言敬嘆曰嗚呼此其猶有豳岐古昔之遺風也歟家之德善孰有加此乎今人率重儀溫厚謹實所至得民非其有所本歟則著其本以範其後于余宜也甄氏自儀髙祖以上葬岐山義豐里曾祖以下皆合葬麟遊西山之原其中之墓曾祖考妣祔于左祖考妣祔于右者考妣也儀有子四人鼎鼐鼒錡銘曰繄甄之先聖啓其源後有續承行義與文其在定襄代有仕者暨宋鼎遷來徙岐下有田有廬義豐之里五桂駢芳麟遊再徙積厚纍仁韜輝含章沿于孫曽燁燁厥揚踐歷中外有操有施陟佐祁父厥施逾大帝嘉所自霈之德恩華褒崇秩敷賁九原峩峩之丘序左與右矗矗之石式表綿久春秋霜露來者雲仍永念爾祖視茲刻文詹事府少詹事兼翰林侍讀學士贈嘉議大夫禮部左侍郎曾公墓碑銘天之生才甚難也然髙明強毅宏博竒偉智能勇略之士世未嘗乏用惟文章者不易得夫探造化之閟徴帝王之法通古今之賾渟滀融會而後出之上焉者發揮性道修正人紀此聖賢之事不可幾及次焉者推明義理紀述功德作為風雅以鳴國家之盛司馬遷相如揚雄班固韓栁歐蘇作者之事然亦代不數人焉信乎其難也國家自洪武以來有文之士其可以嗣遷固者蓋有之矣太宗皇帝御天下慨然欲作新人才興起斯文而龍飛第一科進士中簡明秀通敏者二十八人就文淵閣盡出中祕書俾進所業朝暮大官供膳月給內帑鈔為膏火費蓋期之于古人曾君子啓其首也君名棨時以第一甲第一人授翰林修撰授承務郎遂晝夜淬礪文與學俱進上時召試子啓迅筆千百言立就不費思索而理致文采皆到其苦心思索者有不能及上屢舉羣書隱僻事以驗所學靡不悉對以是深見奬重遂名聞天下明年修永樂大典為副總裁五年升侍講授承直郎七年扈從巡北京數侍燕間應制賦詩並荷褒嘉後有薦文士于上者必問得如曽棨否卒之考其能未有庶幾跂及者升承德郎預修太祖皇帝實録十一年復扈從巡北京十二年考北京鄉試十三年廷試充讀卷官實録成賜鈔襲衣文綺十六年考禮部會試升侍讀學士授奉訓大夫修天下郡志為副總裁二十二年考禮部會試仁宗皇帝嗣位升左春坊大學士仍兼翰林侍讀學士日以經史進講文華殿從皇上之南京還預修太宗皇帝仁宗皇帝實録宣德二年考禮部會試五年充廷試讀卷官兩朝實録成賜金織襲衣銀幣升詹事府少詹事仍兼侍讀學士賜寶帶子啓為文章如源泉混混沛然奔放一㵼千里又如園林得春羣芳奮發組繡爛然可玩可恱賦詠之體必律唐人興之所至筆不停揮狀寫之工極其天趣他人不足已嘗有餘四方求者無間貴賤日集庭下靡不酬應一時文人所作碑碣記序表贊傳銘詩賦流布逺邇蓋未有如子啓之富者工書法草書雄放有晉人風致自解大紳胡光大後獨步當世儀貌魁偉襟度坦夷而神情灑落善談論簡而有味良辰清景擇勝而逰未嘗以事廢其天性孝友慈厚喜奬拔士類交際有始終之義急人之急無論識與不識平生以及物為心使之臨民必有所濟惜其仕三十年恆以文學在侍近所及者未廣也素有痰疾一日侍朝疾作遽引退上遙見之勑免常朝宣德六年冬疾大作命太醫視療明年正月草一日卒訃聞上為悼惜贈嘉議大夫禮部左侍郎遣侍郎章敞賜祭命有司營葬給舟還其喪朝臣自公侯尚書以下皆臨奠春秋六十有一嗚呼人才之難成也一代之文人如子啓何可多得而今已矣蓋悼惜之無間言云曾氏世家吉之永豐其髙祖晞顔宋兵部侍郎江西湖南安撫使元贈武城伯妣蕭氏曾祖巽申元應奉翰林文字同知制誥兼國史院編修官與其兄翰林直學士德裕皆有盛名于時妣胡氏祖如瑤集賢院司直妣周氏考叔本洪熙初以子啓貴贈奉議大夫左春坊大學士兼翰林侍讀學士而贈其妣張氏宜人其配鍾氏封宜人子男三秬務學力文有志繼述甫冠而卒薦紳惜之次積次种女五鍾公鉉劉敦會周秀夫胡顓勉髙欽夫其壻也公之易簀也以身後事屬建安楊公及余楊公既為著葬銘余為書其墓石而係以詩曰鄫出有夏少康裔曲列啓封國為氏去邑為曾適魯仕郕國聖學述傳義親承素王道統系後十餘葉新莽際爰以闔宗徙南避宅旴與吉心洙泗章逢蟬聨如櫛比歐陽之鄉吉之委宋元連綿起祿位天啓文運赫昭晢公奮而興屬隆世天經煌煌表人瑞彯纓垂組侍廷陛操觚含毫應帝制岷江茫洋萬里勢春空澄明雲錦麗重瞳回矚天容霽紀功述德封金匱操執權衡品文藝宏章大什耀海內朝陽和鳴鳳翽翽儒林翹翹拔其萃矜惻焚溺懷惠濟惟仁攸存未𢎞施沒奚憾兮此賫志故亞中大夫寧國府知府陳公之碑公諱灌字同故廬陵城北吟溪里儒家祖以章父大經皆以學行重鄉里公生數嵗而孤事母孝時已卓卓有巨人志讀書一目數行而頴悟絶人族長老器之為延師教之師不能應所求往往引去然益自砥礪嚮進既冠睹元綱日壞私憂世且亂去習兵法環所居皆良田築為場圃而樹木焉人初莫測其意數年木鬱然行列而四方冦盜蜂起遂慕義勇以保障一鄉日屯聚士馬而號令指麾于其間隱然一良將其教練有方撫綏有道人人為用時江西諸郡多陷于冦環其鄉數十里獨賴以安者七年然志在保境而非有所圖利也陳友諒既據江西其將熊天瑞者強禮致公與俱至九江公睹陳氏不足有為也去之甲辰春太祖髙皇帝克武昌公因𢎞文館學士羅復仁詣軍門上謁髙皇帝與語奇之留帳下數日公力陳救亂安民之説悉見聽納遂擢湖廣行中書省左右司員外郎是冬入朝改中書省左司都事遂升郎中明年升大都督府經歷大將軍徐逹北征以公贊軍事既克泰州留公督築城之役不旬日竣事朝廷遣使勞之命總制真州軍事丙午春除寧國府知府階亞中大夫下車首詢民隱為興利除害增修先聖廟建學禮致師儒以教俊秀士習一新建祀典祀壇及驛館有廢皆舉為條格革兼并之俗核欺隱之籍朝廷取其户帖一事行之天下宣城民田瀕江化城等十六墟故堤峻薄遇衝決則水傷木稼壞道路歲以為患公親為規畫築堤廣厚加舊數倍又伐巨石作水門以時蓄泄民至于今賴之宣歙二水暴溢平地猝數丈民危懼計無出走致巫覡禱神水勢益甚公曰巫覡焉知事神躬禱于敬亭山神水患遂息所轄宣城諸邑踵元季之弊嵗民租無入官廪率書虗籍公至有彂其事者于是典司者皆忷忷懼得罪公私念此特循故弊弗革耳非始造姦也揚言于衆曰吾以某月某日行視邑廪蓋俾得為計及期邑廪皆實而弊亦革有強盜四十八人以劫舟麥當死獄已具公聽其辭曰此愚民因舟漂抵岸而挻引取之非素有合謀安得四十八人悉同法府佐幕初皆難之後卒如公議坐先取者一人餘從減論公風采凝峻訟者至庭片語之下情偽莫遁故人咸畏服而其為治務寬厚崇禮教鮮失所之民三年政化行焉既得代當去百姓耆老壯少皆有戀戀不忍之意代者山東鞠騰霄素負才不讓觀公所設施嘆曰吾徒當守而勿失也是年夏奉命督軍餉詣北平民胥恱趍事又明年還京師省臺逹官相知者爭欲薦于朝公皆力辭遂謁告歸省先墓割田三頃建祠堂作義孰以訓宗戚子弟居無何被召至京師未命卒于旅次洪武四年某月日也享年四十有七公秉清介之行重義輕利族姻鄉䣊匱乏有急並赴濟助間遇朋舊憂患狼狽倒囊周之雖屢不厭非才行兼有者歟子男三廓卓坦孫男三誠謹謙皆稱公之後坦尤忠信務義公沒將六十年坦介越府長史周君忱求書公平生于石余於公同郡知慕公久遂考長史所為公傳及以聞諸鄉之君子者敘次之而係以詩曰猗嗟陳侯瑰瑋踔絶才邁羣倫識亦閎達越在童冠巨志嶷嶷有書有劍萬衆奚敵罹時孔棘衆懷兢兢奮庇其鄉屹如堅城孱弱盜名掉臂去之天之所興稽顙來歸軍門之言敷臣之忠惟聖聰明日照海容簡其才猷以贊政府匪直禆文亦既輔武宣城名邦實帝之畿嘉其愷悌以寄􅑱嫠植之黍稷薅其稂莠民曰陳侯汝豫父母仁以為育義以為教民曰陳侯汝時杜召遺惠在民永思無斁遺澤在嗣世率于德猗嗟陳侯惟吉之英吉世有人視此刻銘故嘉議大夫大理寺卿虞公墓碑銘公諱謙字伯益姓虞氏虞之先家河南陳留代有仕籍宋諱南者從髙宗南渡遂家金壇世業詩書南六世至文生仲仁公祖也祖母徐父德華母周以公貴祖父皆贈嘉議大夫大理寺卿祖母母皆贈淑人公自幼秀朗端重異常兒聰敏好學洪武乙亥由太學生擢刑部山東司郎中授奉議大夫升杭州知府授中順大夫太宗皇帝入正大統召為大理寺左少卿授中憲大夫永樂己丑車駕巡北京時仁宗皇帝監國奏升都察院左副都御史授嘉議大夫甲辰轉大理寺卿公自少壯有志世用既仕恪勤夙夜務盡職分持大體恆曰為臣之道愛君愛民二者愛君崇其德愛民厚其生初為郎中已駸駸起時譽在杭州嘗建議僧道民之蠧今江南寺院田多者或數百頃而官府徭役未嘗及之貧民無田往往為徭役所困請為定制僧道每人田無過五畝餘田以均貧民初是之已而謂非舊制遂寢為大理少卿都察院論誆騙罪凖洪武榜例梟首示警公奏言比奉詔書自今準律斷罪誆騙在律當杖而流梟首非詔書意上曰虞謙言是竟從律天津衛倉災焚糧數十萬事聞遣御史亷視還言主典者盜用多故縱火以自蓋追逮幾八百人不勝考掠皆誣服應死者百餘人餘坐徒流公察其寃卒白于上得減論于兩法司具獄及四方所上獄議必親閲之必當必平于大辟罪尤加意曰彼無憾斯我無憾矣為都御史嘗奉命巡視揚州淮安徐州旱災至則疏民所苦請發廪賑貸又請官贖還所賣男女為奴婢者皆從之又奉命督兩浙蘇松諸郡運賦輸南北京及徐州淮安先是冨民賄有司率得近地而貧民多運北京公建議為四等丁多而糧最少運北京丁多糧少次者運徐州丁糧俱中運南京淮安丁少而糧多存留本郡縣倉又言兩京往來官員軍民商旅舟聚徐州吕梁二洪動一二月不能進者請每洪增夫二百人協力挽送如例給月糧仍官撥牛每洪一百分畜近洪民家間暇聽民以耕大舟行則用挽之亦皆從之又督運木道潁州陽武陸行下衛河以逹北京所督軍萬餘公莭其力而厚撫之人不言勞會夏暑疫役者多病公曰此聚之過密宜疏暢之遽命散處之病者悉起奉命巡撫浙江察亷紏貪因建議便民十數事多見施行仁宗皇帝嗣位于刑獄尤隆欽恤而嚴大理之選曰是天下之平也于是大理寺卿闕遂改公為卿時有詔求言公上言七事其一用人曰用得其人則治道興非其人則治道隳人主之職惟在擇人而已二興學校曰教育之道本于師範今內而祭酒司業外而郡縣學官不在于備而在得人庶有成效三曰都察院耳目綱紀之職用以激濁揚清雪理寃抑今専俾治獄非朝廷設風憲本意四曰廣儲蓄今國用空乏宜預為備五曰北京八府之民困于養馬極矣宜分給無馬郡縣牧養以蘇畿內六曰鈔法不通其弊原于出多而入少今但多方收之而不輕出民艱得鈔則自流通七曰京師盜賊之繁由軍民雜處官司不便管束鄰里不相通知今固不能遽釐正之宜勑五城兵馬司于各坊街巷不分軍民工匠每十家編為一甲使互相覺察出入一家有犯十家連坐有能捕首免其連坐之罪庶輦轂之下可以肅清皆切中時務蓋公于為臣必思盡其所當然者一日朝退得風疾上命醫往視賜藥歷半嵗竟不起宣德二年三月草四日也訃聞賜祭給舟還其喪命有司治墳其生以丙午歲正月二日享年六十有二其居家善事父母父母歿喪祭咸盡禮于其弟友愛與人處溫恭怡怡其儀觀偉然風采凝潔瀟灑絶俗也其文章以詩名于時所著有玉雪齋稿若干卷喜寫山水木石幽淡簡逺有倪雲林韻致嗜蓄法書名畫邂逅心之所好輟贈不靳其配江氏封淑人其子男三禎祥禋女五皆適士族孫男二士竒于公素相知嘗為序其詩以傳其未易簀也語其寮王邦彥楊遂初及其長子我死必楊君銘我不憾矣然及我未死而言也二君馳以告余愕然驚曰何遽及此乎而不敢辭敬諾焉又明日公卒匍匐往哭之於是禎奉遂初所狀事行來乃敘而為銘使刻于墓石銘曰虞氏所始啓封自姚亦有自姫啓于東吳泝厥本源匪王斯帝沿漢及唐屢顯于代朝歌之武永興之文奕奕振振嗣休續聞金壇之宗繇陳留徙緼義積勤垂三百祀奮挺以騫始伯益甫升藝登材肇迹郎署往撫臨安古二千石帝謂爾良可付以辟棘寺蘭臺歷年孔多惟中弗倚惟平弗頗使車載馳顧視在道有隱于心敢稽入告惟天聰明曰汝豫諧汝克豫遜豫奚汝違祗于列聖篤終猶始有懷惓惓未究厥施莫致而至夫豈在人嗚呼伯益君子之存故翰林檢討陳君墓碑銘仁宗皇帝初臨御奬用儒術茂興文治首命在廷舉賢薦能于是少保臣士竒言蘇州陳繼其文學冝在侍近即日詔驛召之既至授國子博士明旦入謝改翰林五經博士時初建𢎞文閣于思善門之右以儲經籍備訪問而命翰林學士楊溥董之擢侍講王進及繼等三人副之今上嗣大統詔修兩朝實録簡用纂修官而繼預焉無幾賜勑命實録成賜白金及織金文綺衣遂進檢討宣德七年五月自陳老疾奉命致事歸又明年疾加遂不起五月某日也于是其子完走北京求文書墓碑嗚呼斯文老成凋謝殆盡士竒忍以衰病而忘情老友哉按其學者大理評事張益狀陳氏其先家蜀與宋文忠公堯叟同祖堯叟從父諱鄴始徙南康之都昌七世至諱篆登宣和六年進士乙科纍官左朝散大夫明州通判再徙星子又五世至諱洽咸淳貢士貢士生元翰林待制諱同待制生諱徴受學臨川吳文正公為通儒至正間廷臣交章起之將授之官以介特不偶自引去又徙蘇州之吳縣娶宋相江文忠公萬里之孫生諱汝言博學有才具洪武初仕為濟南府經歷所設施秩然條理一郡倚重大將軍出師道其境深見奬重娶吳氏初生三女經歷公方以嗣子為念在濟南一夕夢白衣大夫已而生男即檢討也初名釋童更名繼字嗣初晚號怡庵嗣初生十月經歷公沒母抱之歸蘇家具蕭然惟存書二萬卷及蔬地二十畝其母知學問謹禮法守節不嫁以教育遺孤嗣初稍長克自奮勵其天資明果內奉母訓外從良師日益見端緒又進而從明經師遂深于易詩又求邃于古文者而師之其為學自經史百氏皆博考深究久而淹貫沛然為文章根義理辨體製嚴矩矱力去陳言不肯茍率由是聲譽蔚然見重于三吳求文者接踵户外而從學曰輻輳講下其施教有本末主敬為要明理為務後在館閣于商確古今講論述作之旨娓娓皆有所自衆推服之居家篤孝行雖貧而講授之暇躬治蔬圃以資養甘旨恆充有司上其母貞節詔旌表之自是逺近交聘嗣初學官一以親老辭親沒葬祭盡禮與人交以誠善者奬掖之不善者面警飭之不肯媕婀茍容窮乏者賑給之沒無歸者斂葬之雖官于朝其志泊如蓋未嘗一日忘幽間之適既得請歸吳中之學者皆欣欣喜得所依而從遊者益衆既疾革門人請所欲言舉西銘存順沒寧語答之遂卒春秋六十有五其卒也族姻門生故舊皆臨哭郡自守二以下咸走吊祭逺近大夫士聞之皆嗟嘆悼惜其所著詩文有怡庵集四十卷藏于家其配故蘇守金絅之子儉勤克孝先十二年卒子男五宗寬宏宣完皆志于學女二長適謝璜次在室孫男七傳儀仁偉佃佶俌女四其葬在縣之太平鄉薦福山之原銘曰有碩其先自陳宗室派衍於蜀英傑森出沿江而東來徙南康再徙闔閭代有奮揚卓乎怡菴克奮于孤幼志桓桓壯夫莫踰有書充棟有畦繞宅書鉏夕誦孝養是力浩乎其學邃乎其文求道請業從遊詵詵辟書駢來親養弗舍晚而幡然玉堂金馬抽思發才效勤紀述長簡巨册金匱石室沖淡之存食息靡忘引疾謝榮遄復于鄉邦有耆俊如璞如石山林草木光輝潤澤奄其永逝士林興悲紛彼媚學倀倀奚歸刻詞墓前式示來者尚有懷德車過斯下君山廟碑君山廟者祀常州府同知張侯之廟也為政而能愛民生則父母之沒則蒸嘗之皆由其誠有以致之也張侯之同知常州也奉部符専督農事既至視民如子喜為之興利常行視水教之蓄泄躬履壟畝察種植而為之勸或時坐塍間相爾汝語如家人未嘗笞詈辱人遇老病鰥孤率有恩意所過飭勵學教正士習民甚戴之上官知其得民也有所賦輒檄之督民恐以緩纍侯則爭起趍事然侯終不以慮譴而急民是時天下軍伍滋弊軍之姦黠者率用賂規匿而詭傅平民于籍民被枉比比朝廷以璽書分命御史清理其要在核姦直枉御史當詣蘇常者言于兵部常州必得張同知共事乃有濟部遂以檄侯御史時鋭意得軍為功不復矜念民枉侯固執民實非軍敢違璽書不從御史不可奈何數出無禮語詬詈之侯忿鬱不能平數日疽發背卒然常之人賴侯以免于枉者猶十七八時蘇之佐郡者極力助御史得軍而枉民動以千計愁苦嗟怨于道路纍年不解常之人以是益思慕侯不已侯素淡泊亷介不苟取一毫自入仕未嘗以家纍隨公退坐一室蕭然讀書焚香而已易簀之先夕侍藥者入其舍索燈燭悉無趍出取膏油一盂以入侯遙見竟謝郤之其操類此侯先自翰林庶吉士為刑部主事春坊中允大理寺丞皆有政績嘗奉命督事廣東福建皆有惠及民此特載其在常者耳侯卒之日民老壯奔走哭於庭皆哀具儀奠祭纍日匶行白衣冠送者數千人非積誠而能致此乎後數年江隂士民朱善繼善慶周孟德孟敬因衆民之志協謀作廟于邑之北君山以祀侯來請書于石併作迎享送神之詩使歌以將事侯名宗璉字重器江右吉水人永樂第一科進士朱氏周氏皆尚德崇義之家詩曰肅穆兮侯堂酌山泉兮薦林芳泠泠風兮髣佛侯戾止兮佩玉瑲懷仁侯兮撫我動與息兮有教稼芃芃兮連疇侯顧我兮樂以笑侯乘兮蘭棹倐東臯兮忽南畝溪有鱷兮陸有虺侯赫視兮敢余民侮侯來遲兮逝何疾侯之逝兮我民以戚山之明兮水之麗侯捨兹兮安適侯懷故鄉兮旦往夕來祚我祐我兮無遐遺調二氣兮平四序下無泛濫兮髙無暵災沼有魚兮苙有畜公無負逋兮私庾足我民兮子孫孫子承侯福兮千百世祀東里文集卷十四
