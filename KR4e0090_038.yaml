body:
  text: 東里續集卷十明楊士奇撰序送金典籍序天下之事有本末惟眀達知務者有以識其輕重緩急而致力焉天地萬物之理往古成敗之故凡聖賢之所以為訓具在經史百氏之書上而國家資之以出治成化下而士君子資之以成德廣材皆不可以一日闕焉者也我太祖髙皇帝建太學以育賢才詔經史百氏之書咸聚焉時四方書板上京師者悉藏太學置典籍司之司之有官而求之無禁蓋京師天下之會太學賢士之會經籍賢士之所資而賢士者治平之資也聖眀之意深逺矣余居京師二十年往還太學其典籍蓋獨見錢塘金礪汝用之敬於其職也旦暮謹視孜孜修壞補缺愈久而愈勤夫官無崇庳盡職為賢汝用其賢乎士膺一命典一職則必盡其所當為乘田委吏聖人猶盡心焉况經籍所係之重哉汝用發身科目纍任教官於持身及人皆有賢譽庶其眀達知務者矣今滿三考書最以去中書舍人張侗左春坊司諫王榮翰林庶吉士陳鏞重同鄉之誼求贈以言余言蓋非其鄉之私也贈監察御史彭百鍊歸養詩序監察御史泰和彭百鍊既蒙恩贈其父以己之官而封其母太孺人而専奉養之事於家者有子已冠矣居再嵗子卒百鍊慟曰如吾親何即為歸養計時已滿九載都院長天官卿僉考其績最當奏升秩私愛百鍊者或尼之曰曷如就升祿為養哉不應遂白其情於朝從之學士大夫為其親榮者取李太白北堂千嵗夀侍奉有光輝之句為韻賦詩贈百鍊泰和百數十年仕於朝而有親得請歸養者前有國子學録蕭執先生今再見於百鍊而百鍊之親加有褒封之命誠榮矣哉旁有太息者曰方今聖天子新庶政貞百度而始於風憲比親擢方正亷清之臣為兩京都察院皆賜璽書俾簡僚屬存其賢者而黜其不肖者論今御史之賢百鍊蓋卓然能持好惡之正有守而有為乃遂其私以去夫新進晚出之士求如百鍊殆未遽能顧當令在散地乎又有言者曰居位者欲得君子幾有禆於時君子亦何往無禆於時哉玉之在石也山有光輝今僻州逺邑風俗不淳於古人輕義務利惡者虓攫善者却避蓋有識莫或敢一語誰何者如使百鍊入其鄉能皎然不滓乎流俗發諸已者有以亷貪敦薄化暴而馴之亦足禆時奚必有位哉此在百鍊勉之誠若是也足以樂其親豈直榮親也哉君子事親莫切乎致樂百鍊可不勉乎衆皆曰然遂以書之贈行之詩之首送蔚尚書致事序禮部尚書合淝蔚公春秋七十有三上引年之章特勑致事賜鈔萬緡及官舟歸公自洪武乙丑仕為户部主事升員外郎又升山西布政司參政入為户部侍郎改禮部遂升尚書歷事列聖四十有六年寅恭小心始終不渝清白之操老而益厲其同時官京師而今在通顯者及公裁三四人皆於仕最久而公年又最髙嶷乎今之老成人乃一旦決引去皇上體恤下情俯從所欲而加之寵恩於是卿大夫皆歆艷公之遂間而頌美皇上待賢優老之厚也士竒蓋以為聖君賢臣之心皆有不得已者士束髮學道志在當世况都髙爵享重祿此其志雖終身豈能忘世哉惟自顧年已邁智力有不逮則不敢以其所不逮者妨賢路廢職事故乞身以去者止足之分亦愛國之心豈誠安於間逸者哉聖天子孜孜圖治豈不欲久任老成顧尋常於一夫不忍久勞之况士自壯至老未嘗一日之暇而當終勞弊之以異先王之制哉故老臣之去聖仁亦有所不得已焉然使都門外夾道瞻望車馬祖餞之盛如歎二疏之去又使鄉人故舊幅巾藜杖駢首雲林泉石之間如迓樂天之歸者皆縉紳之榮也而非盛福克有之乎榮哉乎蔚公一世其何幾人公之歸也尚書毗陵胡公重同官之好屬贈以言士竒於蔚公相知有素故不辭而為之言贈胡克寧歸常州序禮部尚書胡公源潔有賢弟曰克寧祗守丘壟不省兄者十年切切其同氣契濶之情也蓋公愛弟之情亦無以異去嵗之冬克寧自常州走數千里詣北京兄弟相得歡甚居數月克寧又惓惓桑梓之在念也告其兄將歸過余别且求贈言曰願有教也尚書公留之而不可也亦為之言余與尚書同朝交四十年居相鄰者十年時克寧尚少溫恭執禮日以求益為事今踰壯而強而志於進未已也尚書公凡行己居家立朝皆賢人君子之道克寧薰濡於家足以自振尚奚假於余夫人道之所務在義而不在利在以濟物為要詩不云乎伐柯伐柯其則不逺胡氏其世所自宋文恭公蓋髙眀先祖也史傳所紀文恭初為揚子尉縣大水民被溺令不能救文恭率公私舟活數千人公少與一僧善僧有祕術能化瓦石為黃金其臨終也以授文恭求葬之文恭曰葬應盡力術非所願此文恭居下倉卒之為也自文恭以來凡再世執政而至侍從九卿者猶數十人史蓋以為脫人于溺而隂德之應也余嘗觀胡氏譜其先之顯且盛自劉宋以來纍纍矣而常州之盛實始於文恭若文恭之篤行自勵凡天下後世有志之士猶將視法矧身為之後者乎夫所以為文恭者究古人之書心古人之心行古人之行惟恐其戾夫古之人也克寧率是而由之積勤不己文恭有不可幾及者乎位不必計也力於其行為賢耳請書以為克寧之贈尚書公其亦以余言為然哉送曽吏目還海州序曽源仲濬為海州吏目之四年考績來京師遂謁告歸省居兩月將復還海州其同門友蕭德蕡求豫贈以言余與仲濬亦同門也仲濬學通識眀疏達以果嘗從事吏部三年佐青州幕二年來海州尤久知益博行益熟矣雖言何補乎仲濬然知之而不言之非忠也言之而不以其大者非知也請書其大者國家所以置州縣樹官守者非以育民乎得一州一縣而官之亦必有以育乎民而後有以承君之官永終不失也夫民者君之本也今之世皆務急民供上為勞以望其官嵗中三四遷而民之飢窮凍餒一不之察夫民之飢窮凍餒不之察是既倍乎上之所以官我之意如此求不罪乎我不可得况望其官嵗中三四遷又永終不失哉蓋民之心非不知奉上之為其職顧力有所不及則賴長之者優容以待之可也君之心非不知取於民為厲惟事有所不得已則資長之者寬恕以來之可也不然人孰不可使何為精選舉眀考察而使士哉故急民供上以求其官之顯且久幸上之人未察耳察之其有能免者乎此非求成而更敗希榮而反辱乎吾所見江右尤甚海州寧有是乎以仲濬之良贊政幕下又有古襄劉侯為之守吾聞劉侯溫然忠厚有愛民之心則海州之人無其急而得其育也必矣然余尤不忘斯言者朋友之至情仲濬其試擇焉送蕭知事考滿序國家設衛建官其制自指揮使以下皆以處軍功之臣而擇文臣有學術識治體者一人以為知事事必先白知事乃循次上至指揮使而後行指揮使雖尊事不由知事則尼不行知事亦不卑矣而况有軍政之設施儲廪之出入案牘之叢脞其上也或又臨之以親藩之尊都閫之重風紀之嚴又當往來要衝之地日趍走乎應對知事亦難為矣哉洪武二十五年秋大同蕭秉文以太學生為武昌左衛知事所謂不卑與難為者皆有之秉文勤慎闓疏不敢毫髮自恕故衛自指揮使以下皆賴其能以無廢事下屬之吏皆服於威眀不敢騁其私與怠蓋惟見其所不卑而不見其所難為者今瓜期且及矣將上天官書最考而去即是行寧不又有過於今之所不卑而益無今之所難為者乎雖然位髙者易驕事簡者易忽與勤於始而惰於終皆常人之情而君子所戒慎焉者秉文勉哉必毋負國家所以用文臣知學術識治體者之意因某等重其去而望其逺且大也謁文為贈於是乎書贈醫士蔣添祥序太史公書曰能言之未必能行能行之未必能言凡以為不能言之非吾病病不能行之耳行之而利即不言人猶知愛且慕也而今之人之智異也尊其所能言不夷考其所能行者皆是焉鄂城蕭良用疽發背甚恆所親昵樂良用之生者沓來薦醫曰某醫之良者吾嘗聆其道岐黃氏之言矣請致之良用曰吾有所善蔣添祥藉數世業醫恂恂焉雖未嘗言其道而視其所治無弗愈者吾既致之矣聞者戚焉動容曰子無暗於智而易其生哉不能言之其曷以行之良用曰吾良弗智吾豈易吾生者哉而益信用添祥不變越月以瘳良用來謁余語之故且求文謝焉夫言中之宣也言果足徴乎宰豫之賢猶不蓋於其行不言果無取乎李將軍如鄙人口不能道辭史贊桃李成蹊今有服縫掖之衣修仁義之術而口不能言即類以為無有况醫之業乎孔子曰不以言舉人醫人之司命死生維之而惟言之徴耶故醫之極稱神聖工巧神之功曰望聖之功曰聞工巧之功曰問與切亦非以能言也必能言為醫之良則為臾為和為扁皆非知隂陽榮衛虛實之故徒以説辭給捷之利有是哉故醫者意也手其脈目其色耳其音心謀其治如斯而已言無與焉此固存於求之者之智也余客蔣氏孰有年知添祥達於理誠於術不浮不伐務慎以謙蓋有慕古者耻其躬不逮之義兹因良用之請著其藴且以警夫尚言者云贈楊掾序江夏宋惟憲請曰先父試吏陕西都司時與閩中楊復隆同事相好莫逆不幸先父即世遺小弱弟無所於依惟憲不孝時逺在故鄉賴復隆辛勤治喪葬如禮撫孤弟教育親愛之如所生復隆德被存歿惟憲雖殞身不足報願一言以張之嗚呼朋友之道大倫而主乎義焉義者非有盛衰存亡之異此三代所以直道而行者今之人當冨貴顯達氣焰赫赫時託交投分傾肝膽相與出入相扶携意氣相合如金石膠漆謂患難真若可倚謂死生真若不相負一旦勢力衰拂衣袂去不顧過門不一入相見不俯首揖不異行道之人者古今相去蓋逺矣復隆其猶有古人之遺者乎於死生之際以義自重不肯負其友如此其食國家之祿任案牘之事况肯負朝廷乎誠使食國家之祿任案牘之事人人皆能以義自重如復隆吾見天下之才皆可用也故又張之以為為吏者之勸送張知事詩序襄陽漢江重鎮凡今列鎮之帥皆武功之茂者任焉而簿書期會出納之務一治於幕官帥恆視成而已故幕官之任又必擇士之暢於理道者洪武二十八年太原張景先由太學生授襄陽衛知事知事於幕為二幕常虛正員而二董之景先果毅敦實不怠不忽期月之內聲譽灼然今一考當上天官方國家用唐虞考績幽眀之法而重軍政之務期得一士幕下久任之以輔其帥之所不及若景先者庶幾其得士哉則又豈遽然奪之乎是行吾知旦而往夕而來矣其僚有恐其遂書最而登也咸贈詩以道意請余為之序云送胡希閔歸四明詩序武昌左護衛知事四眀胡鉉先生既卒之又眀年子希閔奉其母夫人去歸其鄉瀕行其師楚府吳教授令凡所還往者皆為歌詩餞之遣豫序首簡余雖未獲識先生嘗聞大夫士言先生敦厚溫雅不雕不衒蒞官用忠愛為本聞一暴刻言塞耳蹙額不對遇讞訊必平必恕先生殆仁者歟嵗七十始沾一命又不滿其秩不盡其報以歿意者尚在後之人乎乃今見希閔挺然修且厚吾固意其在是也雖然亦見樹稼者乎夫樹之固將穫之而或身不逮焉歸于其後之人後之人克勤有之不然莠而不薅稿而弗溉斯亦已矣秋其可幾耶故德亦在善繼而已善繼未有不穫者茍為不繼豈徒無穫將遂窮其身而辱其先不亦可懼乎希閔其去此而務善繼哉且吾聞希閔乃祖竹隱先生積德纍仁致紫芝之應亦未食其報此其樹之非一矣朂哉希閔其無自畫焉吾與希閔接屋而處者兩月是以贈此言希閔歸故鄉入里門見父之執焉吾知其復有説也送蕭教授歸金華詩序皇眀治定時海桑先生陳公以易詩書教授澄江之上諸生皆溫雅端厚篤學厲行或仕或處皆有聞於時伯齡亦嶄然群居之中先生歿伯齡以詩經舉於鄉升於太學除教授金華府學金華浙束文獻邦士固知所趨向伯齡加躬勤率先之更六嵗承伯齡之教者往往取髙科而升伯齡教日益行名日益著人皆稱伯齡不辱其所受教先生不辱其所教今謁告省親歸故鄉旬日當還官知伯齡者皆為詩餞之屬余序一言余何庸言哉雖然亦見樹木者乎既冝其地而樹之矣又必培之以深其本溉之以充其養援之以防其侵故盤骫翹特干青雲蔽虧日月矣其或有先之樹而不加崇於後之樹者豈其木弗若歟亦培之溉之援之之不力也故君子之仕既冝於職矣益務深其本充其養防其侵以求干雲蔽日而不敢畫焉不然枿乎吾後者幾何不軼而過哉往年伯齡舉於鄉選于朝顒然而起矣今伯齡之徒復有舉於鄉選於朝顒然而起者伯齡將惟資益於人乎抑將益崇其身也子年盛志鋭二親具慶有賢弟承堂上之歡而無內顧之憂於是勉勉焉德已修而益勵學己富而益勤名已重而益下吾知子去此而益崇其身易易也則俾陳先生之教益逺有耀者非子其誰望余與伯齡嘗同事先生不見將十年不知此别復在何日故竊取回路相請贈處之義而敘之詩凡若干首送嚴士正赴江隂訓導詩序嚴故泰和世家其富盛視古封君其文獻焜焜見胡忠簡周文忠吳文正揭文安諸公之文其科第仕宦自常州推官而下代有繼續邑世家之盛如嚴氏蓋無幾矣而於吾家世姻先大考先考皆嚴出士竒又辱嚴倩童丱及侍國正先生先生先祖妣之弟以姻家子孫見教愛甚嚴至今追憶侍側時心肅然不敢忘兩家相厚蓋非一日之故也今年先生之孫士正選鄉舉來京中會試副榜得江隂縣學訓導士正眀爽端重謹義利之辨介然可為世德之有後也夫道無窮君子之學亦無窮其學非専言語文字之間所以古之人皆務乎本也後之學者不務乎本斯畔乎古矣學而畔古君子不豫也朂哉士正果成於已將於成物也何有吾老幸見姻家有後又期望其逺且大也故首舉其先世之盛次舉君子之學以為士正之官之贈而翰林同鄉諸公相與分韻賦詩送之者繼書於後云送徐崇威僉憲致仕還鄉序仁宗皇帝臨御制詔吏部居官年七十聽致仕去有疾而年未及亦聽去申著令典蓋于今四年仕者老病不任咸得所欲而士君子進退從容無所羈係有以見太平盛致矣四方出仕者之衆莫盛江西江西為縣六十有九莫盛吉水今致其事去者始見於徐君崇威崇威雖病其年未七十蓋自洪武中起家為巡徼為征商永樂初入掌外制又出司讞陕西廣西二大藩知宿州僉山西憲事其為人持已愛民而平心易氣歷仕三十年未嘗有一日顛蹶之憂然弊弊焉所以汨乎中應乎外者亦劬且倦矣今之決去固人情也崇威吉水故家吾亡友胡君光大女兄之夫也其在京師恆主胡氏故於余還往甚厚光大嘗約余他日幸遂乞身相與具扁舟載壺觴書册泝沿贑江蕭峽之間潄芙蓉之丹泉酣澄江之眀月歌詠聖澤逍遙以終餘年足矣時崇威聞之亦津津出喜色光大竟卒于官己十年余猶縻寵祿不能去也兩人夙昔所歆慕者今屬之崇威獨未知崇威入故鄉臨清蔭茂萬慮不興翛然自適之際北望京華數千里外尚有停雲之思者乎故於别也歌白駒之四章以為贈送鄭郎中歸省詩序吏部文選郎中鄭誠文實既蒙恩封其父母士大夫采誥辭名其奉養之堂曰隆夀皆為之賦詩今蒙恩歸省於旴士大夫又采杜少陵入奏行二語為韻賦詩送之盛矣哉鄭氏之榮也詩可以興可以觀三復其詩蓋上有以見朝廷之厚其臣下有以感發為父母者之成其子豈直榮鄭氏而已也夫賢者之仕也未嘗一日其心不在國家文實為天官屬十餘年於品量中外百職之賢不肖才否而抑揚進退之皆與聞矣今道途所經齊魯以南踰淮泝江以達乎匡廬彭蠡之奧上下六七千里耳目所遇凡前日之進用者亦皆奉法循理守官愛民不忝任使矣乎旴江右文獻郡三四百年名公顯人其文學功行如李泰伯曽子固程巨夫諸君子其所表見於世煒煒不可泯沒顧視今州閭鄉䣊將復有起而續之者乎要之賢才本於學校今為吏於旴者亦有克致夫作興之道者乎此皆文實之職所當知者旦夕還朝必有所得以禆冡宰黜陟之公哉大學士曾公邀序送行之詩因以及余所望於文實者云送陳祭酒復職還南京序吾友陳君光世文學卓然而靖恭端直灑落疏暢處人有誠也官翰林踰二十年升教南京國子又十年矣自其改官而南凡翰林素交或相聚討論觴詠未嘗不思光世蓋光世亦同此心也今年春以考績來朝退而見其翰林故人相握手慰藉喜色津津溢眉目遂即建安楊公聚奎之堂出所載江南嘉釀會者九人獻酬交錯傾寫極歡既而光世奏最復任戒行有日九人者復即堂中宴餞之酒半建安公舉古詩君子有酒八言為韻偕江陵楊公共八人各賦詩贈之而退僕序之夫朋友志同義合者也久别而聚尊爼以相娛歌詠以相發情之正也况贈言仁之事哉國家法古為治典教育賢治之首務而任之於太學其所以命光世者蓋舜之所以命夔也任甚重矣以光世之賢有不夙夜圖惟以副君上之命塞朋友之望用永終嘉譽也哉賢者任其事必盡其道善夫始必謹夫終古詩人於贈歸之作蓋有戒夫修職業者僕故竊取斯義既述其情而終以規送楊長史致事序吉水楊季琛先生自壯嵗鄉里舉學行升於朝歷仕州縣幾四十年所至訓治其民勵撫字之勞惇豈弟之化行能著而名譽流今春秋且七十有倦勤之歎時其子黻為衛府長史乃循去官就封之制乞歸休焉朝廷知其賢封以黻之官仍就祿養蓋資其賢以助黻為輔也二年黻卒三年先生益衰又乞歸休朝廷憫其情從之夫士君子懷抱德藝且遇乎時矣豈不欲究於用以及人顧在己者有所不能強則勢之所冝已也國家用賢致理既得其人矣豈不欲久任之與共成其功顧在人者有所不可強則禮之所冝已也然君子有不勞而及於人者古大夫七十致事老其鄉里大夫為父師士為少師教道之及也先生之歸也必有及乎其鄉歟家者鄉之始楊氏自忠節顯聞數百年而於今辨其昭穆尊卑聫其愛敬申其教誨者老長之仁也先生又必有及其宗歟士竒幸歸鄉過宗家拜耆夀參譜牒之異同考文獻之傳續以觀諸老振起之功而快其平生行有日矣請書識别送吳先生還鄉詩序余仕兩京三十年往還太學祭酒司業皆故人而所識監學諸生過從者益衆故其博士以下問學淺深德行邪正率得之若持亷潔之行一芥不以茍取吾廬陵羅師程清江吳節性表然者也清江廬陵接壤其人相與率親厚清江士大夫仕於朝於余好且故而以亷潔名者節性與吏部郎中張玉瑩表然者也亷本於義士君子發諸己施諸事誠由夫義外物不足以動之矣師程節性玉瑩三人者雖皆有祿而其家皆蕭然不改寒素充充有自得之意故余於此三人恆私心敬慕之也前數年師程以老乞致事去節性玉瑩年皆六十上下未當得致事今春玉瑩以病乞解職去節性之子為刑部主事得封父母節性又棄職而就其子之封以去此豈有富貴之纍於其中者哉節性於師道嚴重不可犯蓋學者望而泯其非僻之心作其恭肅之意尤世之所難得者嗟乎江鄉百里之間天清嵗晏二三君子小車往還蓋必有占德星之聚者而余也以固陋之資加之衰病方縻於寵祿未知何時而遂相從於清虛間逺之濵共歌詠太平以為遲暮之快也朝之學士大夫相率為詩贈節性謂余序之因以及余所嚮往者云送劉叔毖辰州府同知序為天下以安民為切務安民之方在得賢守令而已聖天子臨御以來宵衣昃食孜孜焉惟恐天下之民未得其所也眀詔數下簡賢舉能畀之守令之任又屢勑以撫字安利之道守令之能奉法循理布德宣化有安民之效者必眀考課而超升之或從民之志仍其任而增加其祿秩所以待守令之道厚矣然而民猶有未盡得其所者何也豈非由守令不能體聖天子德意而茍焉自怠甚者或縱其私以厲之而然歟如使今之為守令者皆如吾叔毖民焉有不安者哉叔毖始自萍鄉學官升沅陵令其愛民如子誘掖化誨而庇護百至惟恐其或傷之也三年考其績最又用薦者升北京行部員外郎沅陵之民羣告于藩憲冀請于朝以還叔毖弗得又親詣伏奏于闕下至于今六年沅陵令不知更幾人而叔毖自員外郎入纂修于翰林又四年矣沅陵之民猶群趨伏闕下乞還叔毖不置由是朝廷益賢之以為同知辰州府沅陵辰屬邑以二辰州則不獨沅陵之民之沐其利澤也叔毖初何以得此於沅陵之民哉吾與叔毖交草年其為人端厚易直闓疏亷介而表裏一致其為政簡靜不擾有至誠惻怛之意而不為名古稱平易近民民必歸之叔毖其幾之矣使天下之為守令者皆如叔毖民有不安者乎其行也吏部主事陳子魯謂余冝贈以文豈徒贈叔毖固將以感發乎今之為郡邑者東里續集卷十
