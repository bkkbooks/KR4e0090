body:
  text: 東里續集卷二十二明楊士竒撰跋陳文東書陳此書有大令有永有虞歐而虞歐為多初學可以觀也翔鸞寺記雞林人為此文簡潔髙古信知何地無才宜太尉之求而文敏之書也間駙馬都尉趙公出以見示遂題於後行書千文千文取字不重出以便學者昔人用篆𨽻真草書之多矣獨未見作行作行昉見於趙承旨蓋有石刻傳世而精妙未有如此卷者亦嘗見公書五體千文墨迹皆不及此辟諸精金粹玉不可選也可寶可寶偶得暏於日省齋敬題于後宋髙宗御札後右宋思陵阜陵所賜楊和王及王子樞密公御札凡三十有九王之孫文皞稡次刻石於今二百五年矣王八世諸孫翰間以示余觀其眷注任託誠要義激何其至哉當是時徽欽北遷宋社幾覆皆以為非有張韓劉嶽及王諸公協忠比力不足濟事今觀此固君人者有以得之乎夫士遭其時蓄其志而不得於其君故卒無以遂成功名若王得君之厚斯以其功名赫然者乎於戲六月之詩玁狁孔熾我是用急南渡其甚矣共武之服以定王國其無忝哉夫惟大雅無忝爾祖王子孫尚敬之哉趙文敏公墨迹後元之盛際趙文敏公法書冠絶天下上自朝庭下至山顛海隅大書深刻輝映日月至于今翰墨真迹流傳於世靡不珍襲如拱璧焉余於祕府人間見之多矣大率所書漢唐以來名人文章及老釋之言而及於吾儒聖經賢傳甚少見也蓋必有之或祕不以出或愚民俗子不知所寶而廢棄之矣今於吉安守四明陳侯本深所拜觀太學三綱領以下五十八字渾厚而飛動溫潤而典則存莊敬於揮灑之中允哉重寶也余童丱聞之先生長者臨川吳文正公嘗以知止而後有定至則近道矣四十二字即傳第五章所闕之文遂摘出以置於此謂知之至也之上為傳之第五章以在止於至善下接古之欲明明德於天下者先治其國余反覆誦究經傳文理皆貫通明白而先儒所未嘗言者蓋文正作禮記纂言正錯簡如此類甚多為世所重因本深屬豫識于後遂附見其闕云鄭孟宣書同氣詩後此詩雖二十八言而抑揚開闔明白切直其忠愛惻怛之心殆與鄂不韡韡之詩相表裏吾邑劉文復恆誦之以示勸戒家兄又為求名筆書之用廣其志其於風化有助矣子昻書晝錦堂記後此卷尚書夏公家珍祕公厯憂患久而特存以忠獻王功烈文忠公文章文敏公翰墨光華相望數百年之間卓然三絶譬諸至寶蓋必有神物護持之者矣鴒原别意卷後鴒原别意者亡友胡公光大在北京時别其兄方大先生之詩也方大過南京嘗屬識于後余未有復之而光大沒世每欲握筆輒動悲念不果朝庭嘉念光大不已再贈官至一品又官其子而厚賚其家於是其子以伯父命趣識其詩嗚呼光大沒今八年方大與豫亦皆老矣其能無慨焉者乎自余識方大於今三十有五年與光大同官翰林十有七年蓋相知莫如余深也其兄弟相篤孝友方大清素謹確自食其力與鄉人處恂恂執信義而動循矩度雖其弟貴盛一時而其家門庭蕭然不改於舊也光大簡靜慎重嚴交際非其人輒不一顧人亦不得以非道干之在官恭勤周密未嘗居家言公亦未嘗以其私干於公也雖榮名為四方士所仰望而泊然儉約之風故在其協德如此世之貴人宦逹者有兄弟如胡氏固已少矣彼貴不知守道而仕者肆於外處者肆於內殃咎之來被於躬及於家族夫豈偶然之故也胡氏既有以保其終又有身後之澤豈不可以為世鑒乎吾又有望胡氏諸子皆將繼二父之行也故書以告之黃汝申摹宋陳草書卷後此宋仲溫昌裔陳文東草書皆黃汝申所摹可為精矣非積熟未易臻此二宋初皆得書法於饒介之仲溫篤志魏晉諸體皆善而章草當在妙品昌裔書謫辰州後乃大有造詣飛動縱意而不越矩度文東亦善諸體蓋得仲溫之助聞漢𨽻尢髙然余未及見蓋洪武間吳中三絶近歲能書多出於吳而亦多自宋陳出夫法上得中泝宋陳以上非無用力之地而行逺自邇固有取於此因汝申示此遂為之識山谷與雲岩禪師書墨迹後山谷先生元祐八年初改編修官而平素於雲岩甚厚集中數簡勤勤嚮往之意儒釋所本不同而先生樂佛往往借此喻彼然先生孝友節義有功名教重其人以及其遺迹則覽此卷者固宜起敬周紀善所藏鮮于墨迹後鮮于公書當元盛時與趙文敏公齊名前輩評其書在能品觀此拱璧何足多哉惜乎其早沒而世之所傳者鮮也岐鳳尚寶藏之蘇文忠公父子及秦黃張朝諸賢帖後右蘇文忠公父子兄弟及秦黃張朝諸君子墨迹秦黃張朝所謂蘇門四學士者也總八紙各臻其妙戴𢎞演御史所藏展玩欣懌想見髙風雅韻於眉山一堂之間矣宋賢帖後右宋范文正公韓魏公及李忠定張忠獻諸賢墨迹總十二幅皆當時巨公名人今監察御史戴𢎞演所藏出以相示爛爛乎景星慶雲之輝映也其去歲帖出王定國或以為寇萊公或以為曽文定非也因識而歸之宋克遺墨後南宫生書自魏晉出用筆精妙毫髮不茍洪武中兩浙擅名法書者三宋為首南宫尢傑出於今良不易得此數詩蓋得意之迹宜珍襲之宋賢墨迹宋賢墨迹三紙富鄭公司馬溫公蘇文忠公各一紙而裝失次序當表過內有清容圖書疑是伯長故物褚河南兒寬贊後評者論河南書字裏金生行間玉潤法則溫雅美麗多方觀此贊真不虛也吾求數歲始得之謹珍襲之吾先世蓄河南書廉頗藺相如而下數十傳節文終以優孟遭世兵亂家隳於寇此書散落人間雖或見之力不能復後亦莫知存否舉家為憾平洲府君及劉子髙先生之文具著其事故覽此益重先世之感歐陽率更夢奠墨迹後韋續墨藪歐陽正行書在中上品歐教作書有八訣最利初學學者觀古人書必觀墨迹乃見妙處此夢奠七十八字真人間絶無僅有希世之寶也蓋嘗入宋御府矣趙文敏公所題考碑志是三十七八歲筆故與後來特異吾家蓄古墨迹此為最久丘氏所藏宋告身後宋告身循唐制而潦率不逮逺矣况嘉熙當季葉乎丘氏子孫能寶此於二百年再革命之後其故家文獻猶可徵也詹舍人書晝錦堂記後韓公之功烈歐公之文章皆世所甚重此記自出入將相至社稷之臣數語古今言韓公者未有能逼真若此也當時書石是蔡君謨至今傳世為寶詹君此書不減君謨亦可寶也宋賢像後右宋賢像自陳希夷至真文忠公凡草四人出宋人筆甚精蓋畢文簡公子孫故物凡三百年道學文章名公皆具但道學無濂溪文章無六一當必有之而流傳既逺遂亡逸歟吳虞二先生像後元道學大儒之出吾江右者吳文正公虞文靖公皆在臨川先曾祖吟窗先生延祐鄉試實文正門生而於文靖交遊今二公文集具可考見而家集載先祖金洲先生兄弟問學皆登二公之門士竒聞諸長者先世嘗藏二公畫像皆有親筆自贊兵亂失之士竒獨見往來簡牘數幅耳比得此二像於程南雲敬表為一卷遂於文集中考贊辭書之併録行狀神道碑於後以藏於家將使後之人瞻其像知其道而致力於學也程文憲公遺像後為大臣者格君心進賢斥不肖興學育才其要務也元之有天下信用南士自程文憲公始公雖不為執政而遭時得君於是數者其功績炳炳然施當時而垂簡册况以明白正大之學發為間深雅則之文章乎不可泯者哉噫不有君子其何能國夫世所稱國家之元氣斯文之命脈者非文憲之徒之謂歟因拜觀遺像於其孫南雲所不勝景仰之意像之後有題贊李韓公先待制公延祐乙卯座主歐陽楚公許文忠張文穆黃文獻皆先公同年友又有先代通家之敬焉南雲屬余題故併識之程提舉行吟像後元之興南士顯用者莫先於程文憲公其後吳文正公揭文安公繼起皆文憲所延譽推薦亦皆出於江之西也元之亡黼冔裸將之士往往而在文正之孫江西行省參政當文安之子刑部侍郎汯文憲之孫福建儒學提舉世變皆全身以去不忝其先諒哉君子之有後也今獲拜觀提舉公行吟像及覩李伯韶所著傳稱其有傍花隨栁之趣嗟乎其亦栗里斜川之適者歟起敬起慕題于後李公麟鬼章效馬圖後行人司正黃宗載持其友蔣伯輝所藏宋李公麟畫鬼章效馬圖求余識一言圖之右有蘇文忠公敘贊今世士大夫相繼為詩稱道之余不能復有加矣然圖之妙亦不必後之人數數稱道獨反覆文忠公敘言不能無慨焉者元祐初文潞公吕正愍范忠宣諸賢共執政柄時朝庭清明推仁布澤嘉惠天下汲汲惟恐不及不事遊畋不寶逺物而蠻夷四方之貢卻絶復至充溢于庭視如無有天下之人歡喜慶告有太平之望未幾潞公諸賢盡斥而章蔡之徒復用蔽塞耳目讒逐忠良隔絶上下濁亂政經天下之人困其荼毒馴至徽欽之世禍遂不救向使潞公諸君子終其身在朝庭之上不去豈至乎此也小人之能敗人國家也如是果孰執其咎哉凡為天下國家得人則治否則亂元祐之世雖蕞爾邊陲備禦之寄所用如遊師雄之徒尚有可稱曾不數年雖輔相天子理天下亦不暇問可否而一畀之匪人則國之安危理亂又豈待他日而後見哉於乎有國家可以鑒矣自古以來其人光榮貴富其身既死遂湮沒無迹一也茍其行不臧後世聞其名猶賤惡之若文忠公輩其身雖死後之人聞其名起敬起愛或得其一紙一墨於數百年之後珍襲貴重以為家寶如此圖之類者蓋好善惡惡之心古今無異也於乎人之為賢不肖者又可以鑒矣伯輝之竒七世孫能保藏此圖雖重其有先人之名在亦好善之心有諸中乎郭鼎貞藏張戡歇騎圖良馬世不易得良畫者尢不易得人恆稱曹霸韓幹絶藝觀此戡固未相逺也此翰林侍講金君家舊物殆歐陽氏七賢畫也既以豫鼎貞固侍講之心不纍於物耶鼎貞寶之不下拱璧夫一藝之精見重於人若此古之君子其精義妙道在人不可一日無者其宜寶重何如哉鼎貞方明經飭行潛心古人因金君求題此圖故書其後題竹示䆃子學此蒼筤竹其生意方益升而未已有積小以髙大之勢書以示䆃使勉於學聖賢像後此圖或疑卷軸紙筆非當時所有然前輩有論書學者謂紙墨筆研皆自古有之但後人異其制耳則觀者於此不足疑也趙大年小景後右趙大年寫小景故蘇人章仲華所寶藏者大年名令穰宋太祖五世孫官至崇信軍觀察使多畜隋唐以來法書名畫大年悟解頴敏書畫一入覽輒得古人用意妙處近代畫家所紀稱大年山水多設色又稱其喜寫江南小景寒汀煙渚之趣甚為當時所重宣和御府祕藏亦多今此圖園廬坡樹淡雲水鳥僅尺餘而澄明瀟灑幽淡簡逺之趣臻極其妙信如畫家所推可為希世至寶也圖後有袁文清公楊鐵崖諸君子題詠金舂而玉應又有元璞諸老釋之作亦皆不在靈徹皎然下所可寶又不獨於畫也金珠玉璧世之人爭寶之仲華獨此為重非清尚絶俗之士哉仲華久謝世今其孫孟升念其祖之重乎是也重之亦如其祖之心孟升殆孝者歟重祖父所愛物者重祖父之推也吾身祖父之遺也吾重其所遺不敢斯須行之盩乎道又孝之至也吾未嘗識孟升左贊善陳公間視此圖且語其故求題輒為書此君臣百像後右古君臣像凡百人漢以下賢臣多闕蓋當時但據所有者刻之然其中未必皆得真荀况曰伊尹無須麋今畫有之又有可笑者畫伊尹必負鼎子房必懷一編固哉陋也至於標題或名或字或號或諡何其不一也此卷得之建陽縣丞南康何景春九歌圖後楚三閭大夫屈原愛君憂國惓惓之忠遭罹讒邪放逐以卒古今所悲也厯世逾逺賴先正朱文公因其辭而明其心吳文正公又即其題而徵諸禮於是屈大夫之心皎皎乎與日月相輝於無窮余嘗於祕府見李伯時畫九歌今又見趙文敏公之畫於李祭酒時勉所大同而小異亦各極其趣也遂屬東陽士吳希純臨寫趙圖殆亦唐臨晉帖者矣吳并用篆古書九歌分置各圖之右時一展圖誦辭如親見千載之上於目前若文正所題趙圖并附于後云張子俊臨聖哲像後右宣聖及諸弟子像弟子十有一人豈四科之外益以曽子歟蓋宋李公麟筆會稽張子俊為余臨宣德癸丑九月朔後學楊士竒謹識而藏之蕭翼􅀈蘭亭後右蕭翼􅀈蘭亭畫妙絶真立本筆當時君臣凡遊玩適意處閻必有作况此一段竒事哉然翼之事後人然疑者非一觀此當必有因但無如後來所云許多曲折耳吾家唐畫獨有此卷登瀛卷後唐武德四年以秦王世民為天策上將遂開館置屬以延文學之士杜如晦房玄齡虞世南褚亮姚思廉李玄道蔡允恭薛元敬顔相時蘇朂于志寧蘇世長薛收李守素陸德明孔頴逹蓋文逹許敬宗為文學館學士分為三畨更日直宿王暇日輒至館中討論文籍使閻立本圖像褚亮為贊號十八學士時人謂之登瀛洲云後來如晦玄齡世南又皆畫像凌煙閣十八人蔡允恭蘇朂外餘皆唐書有傳而許敬宗在姦臣傳第一甚矣知人之難也此畫蓋臨摹李伯時者計百餘年於今矣其後題者馮海粟李祁皆元之長沙人海粟字子振官至集賢待制史稱其為人豪俊博學擅文頗乖於法律祁字一初癸酉科進士第二人官至江浙儒學提舉入國朝不仕而終偶得此卷謾識于後馮寅賔遺像後馮寅賔先生元進士翼翁字子羽之子先叔祖妣武山夫人之弟也博學負竒才志於有為卒無所遇而文章翰墨清徑絶俗為當時所重不妄交處所與莫逆者楊子淵羅子理鄧崇志劉文原數人而已士竒五六歲時猶及拜之以姻家故辱垂教愛今六十有餘年矣拜先生之遺像誦伯父之遺文景仰前修以敬以慨歸田趣卷後士竒作此詞之數月不幸先皇帝棄羣臣方悲苦在疚今上皇帝嗣大寶一惟先朝舊人是咨是任士竒辱在不擯斥之列而義不敢言其私間覽此詞蓋有不勝愧且戚者豈優間散誕之適造物者不以輕畀人耶抑固畀之而各有其時與噫士竒今年七十有二日月遷逝前途幾何誦老氏之言思殆辱之幾愧戚逾深噫子昻七賢圖後右趙松雪七賢圖先舅氏陳孔碩先生所藏先生藏書畫甚富謝世裁五十年善和里故宅已隳所藏無存近獨得此卷於其子孟旦所敬裝潢歸旦之子考考當永寶手澤哉龍眠山莊圖後右宋李伯時寫龍眠山莊圖山在舒城縣西南如卧龍故名伯時名公麟舒城人元祐中進士史稱博學工詩多識古文竒字辨秦璽為當朝所推官至御史檢法老歸龍眠山中其畫顧愷之張僧繇之亞山莊尤用意之筆吾凡三見之兒子稷近得此卷特精妙又聞伯時與弟公庚元中極友愛時號龍眠三李畫中隨處兄弟具在亦可想見其人宋好古竹石後宋好古魏郡人元天厯中為藝文監照磨揭文安公稱其疏通而知學好交而不茍合居官必盡其守臨事必斷以義真用世之才而尤工竹石獨臻其妙嘗有進于明宗者明宗語左右曰此真士大夫之筆京師之人遂取楊補之村梅故事名其竹為敕賜士大夫竹余偶得宋筆遂識揭語題羲之寫經換鵝圖右王羲之寫道經圖筆意精妙非近代畫者所能髣佛慨想當時神清天趣宛然神仙人也按晉史羲之好鵝山隂道士養好鵝往觀焉意甚悅固求市之道士云為寫道德經當舉羣相贈欣然寫畢籠鵝而歸甚以為樂蓋任率如此非玩物也後世所傳羲之書道德經不復見所見惟黃庭樂毅東方像贊蘭亭然亦皆翻刻多失真矣書固羲之精藝然其平生可重者不止於此後之人更求諸法書之外可也題孫從吉梅花孫隆從吉赴新安知府作梅花四十小幅每幅有詩裝潢為二十合留為余别孫得會稽王冕筆法甚清此四十詩亦王之舊作也大抵王作一畫必賦一詩孫積王所作亦甚富云余故識之以遺晟孫云題梁壻楫竹君子之學以節謹度以虛受益養心以清行道以直耐霜雪於歲寒諧律吕於金石凡有取於竹者非將以務德歟題雪夜清興倡和後右永樂七年正月胡文穆公雪夜見過倡和之詩是年二月公扈從太宗皇帝巡狩北京豫侍仁宗皇帝監國時善畫者皆詣北京公言至北京必作一圖附録二詩以示後人公既至北京屬時職務繁不果作及南還又皆縻職務既久遂不復在念憶公嘗語豫術者言同官中吾兩人將老得退果若其言即各具小舟可二僮操者舟中貯書册楮筆壺觴棋局如廣訪君艤舟君門外一里所遣童子招君君徑入舟同泝流至五雲驛望夫容峯則返棹及君入舟處君獨歸廣不過君竟去君訪廣亦然但沿流至玉峽而返歲必五六過訪用此共適餘年他日又語豫曰吾兩人情義實兄弟後死則銘豫諾之顧時亦謾言耳豈謂公溘先豫沒也公沒後半歲餘夜夢偕公泛舟自快閣至郡城下同載甚樂共聮詩公起首句僕續第二第三公續第四第五僕又續第六第七八終結句既覺而忘第五至第七三句余悲愴不勝遂補之詩曰金螺瀟灑對夫容鷺渚魚洲窈窕通逺樹白雲秋色淨故人清興酒船同河山夢冷謳吟後生死交深感慨中猶想勝緣如夙昔並騎黃鵠過江東則又思具舟過訪之約皆夢中語也空餘後死亦何樂哉蓋公沒九年始克撰述公墓碑又十一年理舊書得公雪夜過訪之詩遺墨如新永嘉謝君庭循觀之為作雪夜清興圖遂録豫所和詩附公詩之後冠以謝圖而識其末遂因以及吾交友存沒之情云正統二年秋九月七日某識題楊氏族譜後永樂戊子余作此譜明年又作譜圖而欲廣其傳也嘗刻圖譜矣今復以此譜刻之余初得與芳伯舊譜圖重為審訂參校蓋六年乃克成編是時仲素兄在楚州丞以書諏之則録示其本𣲖且復書曰此吾先君所記以有事於歲時者也所録與舊譜合從晉子修來京師出此編求正之二兄皆已春秋髙能厯厯道五六十年間如昨日然者遂為補其闕略數事又凡再附歸以質於與芳伯特為正誤一事而以書報云皆當已始為定本蓋吾於為譜慎重不敢率易如此也又嘗聞諸仲素兄其先君為延真譜時族人子弟有降辱其身以玷先德者率黜不録仁人君子振起宗族之盛心又如此也併附識譜末以示後來東里續集卷二十二
