body:
  text: 東里續集巻三十二明楊士竒撰墓表封從仕郎中書舎人金君墓表近十數年士大夫有自三吳來者數為予言得茹清蹈潔君子兩人而侍郎周君言之加悉其一江隂嚴志道其一華亭金文鼎皆吾故人志道嘗仕于朝矣文鼎受勅封官矣志道凛然氷蘗之操文鼎恭然和夷之度皆未老而歸於鄉歸則皆逸於曠閒幽逺之濵未嘗一渉意塵事一濡迹守令之庭吾素高此兩人嘗寄詩寓嚮往之意聞得詩皆喜而皆不見答以是益高之思得一握手慰契闊而今文鼎之訃遽至為之怊悵累日其子鈍遂來請文表墓予忍以辭按大理少卿沈君狀金之先汴人宋之南遷也從渡江而居淞之華亭遂世為華亭人文鼎諱鉉文鼎其字尚素其别字也其考仲能博學守道絶意聲利母馬氏有賢行文鼎天資聰敏自幼嗜學不效於外慕成童䘮父哀毁動人而致孝其母洪武中徵居京師奉母以行母時年六十餘侍養甚適母安之而忘去鄉之思也母病晝夜侍藥食不去側越數月不懈母病瘥而䘮明文鼎益痛切奔走求良醫藥竭其心力母目竟不復自是飲食之奉皆嘗而後進雖迫公務不廢有欲薦其才者懇以母辭母年八十餘終哀毁如䘮父歳時薦祭未嘗不泣下霑襟與人交盡誠勇於義事率以為分内當然鄉人陸士原疾革托其子若姪於文鼎曰我死此曹必緣利牴牾幸先生善道之我死不敢忘也已而果牴牾文鼎召至面喻之曰不見爾父兄弟素相恭愛耶柰何遽背之反覆曉譬之陸子姪皆悟改行相親睦友人丘德潤死而親老子幼為周給其家而教其子其行槩類此為人瀟洒絶俗不茍交際喜吟咏有古詩人之趣餘趣作書畫皆極造詣居南京數十年作小樓中書舎人王孟端寫竹數十挺其中扁曰清風高人韻士過之必延登樓焚香鳴琴酌酒賦詩翛然山林泉石之適也家居篤於教子至形諸詩咏以垂于後宣德三年以子貴封從仕郎中書舎人既受勅命即束書册入上海僻處不與俗流接鈍嘗請於朝歸省及辭還京躬送至丹陽臨别語鈍惟致敬臣職以光父母脫不復再見汝永念斯言後三年文鼎卒正綂元年閏六月廿四日也享年七十有六以卒之明年三月十三日葬邑之蒲溪之原所著有鳯城藁尚素齋集藏于家配倪氏子男二長即鈍工法書累官中書舎人次銳女二鍾真劉愷其壻也孫女三嗟夫九峯三泖其清㳤之氣鍾於人而為通敏博辯智巧之才馳六藝之華擅幹濟之譽者多矣而求居貞履坦志澹而樂素若文鼎盖亦無幾人吾安得不為之表哉安得不為之表哉故寧晉知縣郭子昭墓表公諱晉字子昭一字士昭姓郭氏其先出中書令子儀之子曖之後有曰源宋仁宗時歐陽公脩薦其愽學有材辭不就徵事載郡志及其家乘公之始遷泰和祖也鄉貢進士宋傑太學生蠡又公之六世七世祖也曾祖道傳泰和州學録祖建中累官江華縣尹考宗大為邑碩儒學者稱峻極先生公生而身長玉立風采凝重鄉先生陳心吾嘗稱之曰其質温温其言恂恂其動撝謙其文雅馴郡太守湯槃亦稱之曰目其貌丰神峻整耳其言詞氣温粹叩其學沿流泝源通暢融液洪武五年中江西鄉試第五人明年㑹試中教官選授永豐縣學教諭在學六年其弟子貟率皆成就歌鹿鳴而升者倍於前科洪武十二年太守湯槃以述職入覲太祖皇帝御華蓋殿賜百官食勅守臣各舉明經士為用遂以公應命公既被召擢任中書省掌記時中書胡汪二丞相蒞事公盡賛畫之玅克稱意故每遇政暇輒與談論經史商確政事由是深嘉之屢言於上上乃召見錫以宴仍賜衣一襲將畀以重任適二丞相鍾竒禍而相繼族滅中書省亦罷設公得降知寧晉縣朝之士大夫咸惜之謂其材方見知而弗克大用公聞之怡然曰命也何用惜為即日就道士竒從伯父貟外公自立公之姻兄不忍其别率諸同列賦詩以贈翰林承㫖宋公濓為之序寧晉為真定之屬邑舊地雖曠而居甚少耕治不徧而多未闢公至之日悉召他處之民勸之樹藝約三年而牧其租不數歳桑麻蔽野黍稷連阡地無尺寸之棄賦税増倍歳大旱民禱久不應公即日齋沐至誠禱焉越二日大雨霑足後二年復旱公復自致禱雨亦如之縣之民失火將延及官廨公叩頭向之火尋滅學舍頽敗公為新之人不樂學生徒廪食十數年有不通知語孟章句者公稍暇輒詣學督諸生為之啟諭誘掖由是材皆有成而科不乏人經四歳丁内艱服闋適縣學訓導缺諸生請於縣令徐遜曰郭先生博學篤行誠宜為經師乞留以署其職侯請於公公遂留焉裁數月朝廷有㫖民間有弊病悉許自詣京面奏鄉不逞翕然成風竟誣公以罪卒公通詩經深得六義之㫖當時從游者甚衆若進士姚與誠蕭放皆其徒也其經義之著雅正典贍今沒雖數十年尚有傳而緑之以取法焉尤善詩惜其藁失不存年四十有七配蕭氏有令德子二人興讓興文皆不失儒行興文舉明經使於四方將有錄矣孫男五植脩勉俊遜公初歿時屬以倉卒藁葬故址傍既葬二十年乃命興文屬余表其墓余生晩不足究知公之萬一公兄子益先生士竒從姑夫國初被徵授之官以疾辭歸時邑先正老成應召者卒皆就仕居家者凋䘮殆盡如先生存者僅一二人逺近之趨以求教者紛集余幼孤亦嘗受業於其門荷公之誨尤為多興讓興文又皆同學而最莫逆故不敢謝不敏而不表也謹述其所知大槩而為之表庶俾其後人知永乆而不忘焉楊彦威墓表吾楊氏宋盛際自吉水楊莊徙泰和又六世至尚真府君二子皆承事郎伯德明仲德寛始析二派子孫日繁豐腴甲一邑而詩書禮義之傳襲不衰益盛奕然為邑之望德明子英才梅卿皆舉鄉貢梅卿曾孫率齋岫雲益齋皆舉漕貢授登仕郎子孫益繁鄉稱三登仕家率齋子容齋容齋子逺峰逺峰子師魯師魯三子子尚子脩子友子尚二子彦威其仲也諱德同蚤䘮父事母嚴氏孝事二叔及兄彦素從兄彦實咸致愛敬與二兄同處彦威一舉動必禀二兄乃行二兄亦親愛彦威如彦威之於兄也彦威以恭儉持已以忠信待物邑嘗推擇為耆老俾持平於鄉人服其公閒居手不釋巻凡洪武至宣德所下詔勅令諭率謹輯錄為書用時披閱服膺嘗曰此君上所以福下人者敢忽忘乎篤於教子恒勵之曰不可墜爾先世宣德丁未五月廿日以疾卒年五十有四娶郭氏子男三挺拱撝挺今為都察院檢校女五髙寧蕭禎曾崇胡永嚴書其壻也孫男二儉傚女一彦威吾族子也吾官南京時以運賦至過宿譚論數夕娓娓皆中理蓋吾甚重之語云宗族稱孝鄉黨稱弟彦威殆其人歟别數歳聞其卒為悼歎不已至是挺求文表墓故書其先所自及其行之槩以示其後使圖無忝云贈太醫院使袁君墓表余仕於朝三十年同朝自六卿及近侍諸司凡其正貳操行賢否才藝髙下槩知之至同寮同志相資相悅如一家兄弟若太醫院判袁士珍蔣用文者寡矣士珍家蘄春用文家儀真中歳相值為同官輒相親愛士珍明爽果毅用文温恭詳雅兩人於職事能各遜所長而虛心相從始終未嘗一毫異意而距數月兩人皆卒初仁宗皇帝在春宫余為諭德與士珍用文同侍監國者最久有往還之好用文殁既表其墓士珍墓嘗許為表屬久未暇忽今八年然心未嘗忘也士珍袁氏諱寶士珍字也其父仲和母戴氏士珍事父母孝洪武中父名傅兵籍當行士珍甫成童請代行所司以其孱弱不聽士珍彊激厲為精悍作氣揚揚乃聽之既至京師選充樂舞生從太宗文皇帝之國于燕時金華戴原禮以名醫召至士珍奉㫖從授醫業後從入金華山中往來十餘年遂得丹溪朱彦脩之傳文皇帝靖内難躬親兵革者數年士珍皆侍行有保和功内難平授承直郎太醫院判進承德郎士珍事上小心敬慎一時勲臣貴戚之家有疾率走迎之無不效者或貧與賤者以急告亦趨赴未嘗責報而雅厚文學士士多德之士珎處人以誠人有過不為茍容能改輒懽然相親無宿怨意蒞事人服其公於利取予必度義永樂廿二年十月十二日卒春秋六十有二訃聞仁宗皇帝悼惜不已賜賻及棺命有司給舟車遣中官護䘮葬南京安德門外明年五月贈太醫院使遣官賜祭備始終之恩云士珎娶馬氏賢而能家後六年卒合葬于夫之墓子男三瑛瑾理女三孫男若干先是四方士以醫召至𨽻太醫者累千人皆能道袁蔣之徳暨卒皆追慕之至于今未已或有窘恙輒嗟咨相謂袁蔣在吾屬不及此此豈音聲笑貎之所能為哉蓋士珎之所可重非獨其醫之良也雖當時士大夫多知之而不若余知之深也遂為之表孫處士墓表國子愽士孫子敏於余有斯文之好一日求表厥考處士君之墓蓋余嘗聞處士之行於太常楊公處士之墓公銘之表余何辭處士諱真字文俊世家吾郡之安福父春庭隠居教授母周氏父母皆有善行處士自幼不凡事父母孝既長惇行古道見重於先生君子元季之亂挈妻子避兵荆襄間遂家石首雖時冦盜不寧而勤學弗輟簡册未嘗去手所至人愛重之洪武初縣令丞舉明經力辭乃請教社學力以成就後進為務束脩一無所問或曰在孔子所不廢也處士曰聖人斯道之重宜然我幸人之從吾言以入於善敢他計哉其教學者必在脩已及物由義安命或譏其不仕者處士曰人窮達有命且吾寧不自知所不足哉為人平易恭遜簡而有容喜愠不色見自居石首未嘗一日不念桑梓語及輒流涕然不得如志嘗一歸展省留止不忍去者久之復至石首無幾卒洪武乙亥三月庚辰日也享年七十有四配安福劉氏柔婉恭肅孝行篤至躬勤約為内助如處士之心後四年之四月庚申卒享年七十有二合葬石首縣南馬鞍山之原子男三長子和次子敏和厚端謹由巫山縣學教諭嚴州府學教授陞愽士觀愽士亦可以知處士之成於家者矣次子敬女二皆有歸孫男八曾孫男六嗚呼士習益下平居不務自脩稍有尺寸之長沾沾意慊而望其推一毫以及人彊固閉匿不肯出有不為此則責報汲汲不啻饑渴之於食飲於眎孫處士之行蓋氷炭薫蕕之不可同矣孫處士其古之人歟其古之人歟劉仲髙墓表仲髙諱昂姓劉氏吉安泰和人其先世見余所序宗譜父存善樸静自足號愚村母羅氏三子仲賢仲良季仲髙也自幼警敏有智能動其老長倫輩莫及也讀書通大義而篤於孝弟之行家故饒裕稍壯慕閒居之適嗜琴時閉户焚香操數引自娛前翰林學士解公嘗過之為記其琴室仲髙平生足跡未嘗越百里外惟一入郡城輒引去不復出喜賔客名卿貴人過泰和者率延禮之里之志同氣合者數人往還觴奕譚笑無虛日善論議亦善微言嘲謔襟宇夷曠有犯不校出入鄉黨不見怨惡晩於邑東南五里所珠林江之上作别墅躬漁稼之樂時其子已貴而退焉自佚其殆翛然物表者歟春秋五十有八而卒其兄弟余少時皆與同學海桑陳先生之門仲髙少余六歳至今或追憶少時而道其嬉戲事聞者無不絶倒自余出仕三十有餘年念昔同學惟仲髙在恒私計幸得謝事歸則相與閭巷旦暮晤聚為樂乃遽聞其長逝悵怏久之於是其子渙求文表墓仲髙生於洪武壬子正月廿三日歿於宣德己酉某月日其配蕭氏子男五長渙永樂乙未進士兵科給事中揚州府經厯次鼎選江西鄉貢未上次升次謙次解女三蕭季亷曾公升陳正彜其壻也孫男女皆八仲髙之葬也詳具梁紀善之銘表特著余所重者云贈中憲大夫都察院右僉都御史羅君墓表西北二蕃世為邊患善為治者亦備禦之有其道耳皇上臨御以來德懷威服薄海内外罔不攄誠歸化然朝廷不忘武備慎簡廷臣分飭邊防都察院僉都御史羅亨信往蒞甘肅時北邊亦已格心嚮服朝貢之使靡歳不至惟迤西殘冦迫近塞下服叛靡常亨信言此無他蓋由比年邊備廢弛將帥玩愒所致必正之以法庶幾有所振起遂劾奏陜西行都司都指揮使一人擅沮兵行之罪上是之命兵部尚書馳往覈實如亨信言遂即軍中斬之以狥將士股慄兵勢遂振奮勇窮追斬馘無筭渠魁既死餘黨散走西鄙以寧斬一人而千萬人悚懼以奮蓋啟於亨信之言也既報將士功亨信亦被榮賚朝野稱快時亨信之父中憲公訃至亨信奏請歸執喪特命給驛歸治葬畢起復於是亨信還過京師奉所撰事狀求文表墓余覽之嘆曰亨信之克單慮盡言於國事有裨益矣非其本之於父乎遂按狀為之書曰羅之先居南雄宋季徙東莞之英溪至中憲公七世矣族甚夥襲詩禮皆隠處弗仕中憲曾祖諱德秀祖諱應辰考諱善中憲諱昌字祖昌以亨信貴初封文林郎山西道監察御史其歿也贈中憲大夫行在都察院右僉都御史中憲自少聰敏嗜學躬孝友之行元季兵亂奉父母徙避循惠而奉養如宜洪武初始復故業父母遽相繼卒屬時艱甚葬弗克盡禮銜痛茹苦寢食弗寧及改厝乃已教育兄孤子均已子彊記問善於譚論於舉故實娓娓不窮性耿介不妄交處慷慨有志邑大夫屢欲薦之輒辭晩得足疾遂不出家居督僮奴力耕稼給公賦自號英溪耕隠卒於正綂二年六月十九日享年八十有四配黃氏贈恭人先卒今合葬麻地嶺先塋之側子男二長亨信次勝珤蚤卒女一歸梁彦義孫男三女六皆適士族亨信永樂二年進士初擢給事中進監察御史又進行在都察院右僉都御史有守有為三十餘年敬慎不懈吾聞中憲公之教亨信也其初學則曰學必期於用世忠君乃所以孝親也及其仕則數寄書勵之持已勤職事勿以親老置念慮能事君則親安矣此非亨信所本歟孔子曰魯無君子斯焉取斯吾於亨信安得不本諸中憲公哉故特書之以告夫世之為人父者曾春齡墓表嗚呼此吾友曾君春齡之墓春齡永樂四年進士為翰林庶吉士五閲月而卒壽不稱其行學未竟於用豈其命也夫春齡世簮纓家宋之時安强為御史有名公卿間至元傳道先生以易經為學者所宗所著書有易變通四書類辯庸學標著為紹興路照磨後家居遇亂鄉郡推舉率義兵禦冦兵敗守節死弟耕道先生為瑞金縣學教諭生九韶國朝洪武初為沔陽黃蓬湖泊官生伯髙俱有學行伯髙二子春齡其長也次鶴齡兄弟之學皆得於家訓春齡幼時已端重如成人稍長奮勵學問日益見端緒邑大夫選充博士弟子員嶄然羣居中先生長者多忘年與之交鄉人愛其子弟多遣從春齡游聲譽日起而學日加進永樂乙酉兄弟皆中江西鄉試春齡幼然前列於是鄉人無兄弟同選者久矣有之不出於同産出於同産即不出於同科遂以為曾氏之祥明年鶴齡留侍養春齡獨赴㑹試禮部選前列廷試賜進士出身授翰林庶吉士時方修永樂大典春齡與所徵四方耆儒碩學任編纂之事衆皆譽春齡學識為優是年八月以疾卒明年鶴齡始奉襯歸葬春秋年裁三十有三其居家有孝弟之行居鄉有忠信之節温厚而樂易有愛人之心惜乎未見於用也豈非其命也歟然君子不以其命之所遇而輕重焉余故撮其世及行表於其墓中憲大夫肇慶府知府王公墓表永樂十四年瓊州府知府泰和王公丁内艱服闋授肇慶府知府未行七月九日以疾卒於北京其仲子翰林脩撰直之官舎是時冢子信從行三子奉襯居葬其邑西北新山之原葬已其素所從游楊某作而嘆曰嗚呼吾泰和文獻數百年來六七故家儒師君子為之綱維國朝前三十年王竹亭先生與其弟崇慶太守褎然清德正學為邦之望兩先生沒諸老鉅公次第復盡則是邦之望不在於公乎今又已矣將士之晩出有志乎是其何所取正乎則表先進以儀來今其可無述乎王氏出晉司徒導之後自金陵徙泰和宋仁宗朝户部侍郎贄及其子億皆以科第進有顯稱其後累累以科第進至天隠臣則公之曾祖祖也考子與即竹亭先生母陳氏繼母李氏公諱泰字伯貞一字之幹天資絶出五六歳對客誦所記書動千餘言不輟口仲父崇慶公尤器重之與竹亭先生蚤莫訓切成童五經四書子史皆通其大義下筆為文章霈然遂進講易於安成劉雲章之門時同門生頗衆劉先生獨推公為穎悟久而嘆曰從游之士其逺到孰如王某哉既冠益有志於四方從仲父踰五嶺上蒼梧至桂林已而下湘水浮洞庭泝金門道三峽之險厯覽巴蜀遂東遊至京師而還其學益充文益肆洪武壬戌詔求賢才與論治道縣令丞舉公應詔既至授廣東按察使僉事分巡雷州府到官甫七日有詔罷分巡召還改工部水部主事未幾丁外艱去後坐起復緩謫安慶又起為瓊州府知府其初徵至髙皇帝親見延問公以易進對稱㫖時天下士同徵至者五百餘人上親試以經義及時務䇿擢公第一仍命公考第其餘高下以聞後在工部上語尚書趙某曰江西秀才王某汝暇宜從之學問公素有負挾又感上知遇益思自效其在雷州咨問民所欲惡即奏雪寃滯恤孤寡防海冦又海北鹽法等弊五事又奏請浚宋冦凖所鑿渠引逹吕塘之水灌東洋田萬頃以便民後為瓊州瓊州人聞其來喜曰是有遺愛於雷州民者吾輩無患矣公至一務寛大近民先是崖州黎相讎殺衛府皆以反聞且盛言冦結連百餘砦勢張甚請發兵𠞰戮朝廷如所言命發兵適公始至衛逼府遣吏為兵嚮導公曰讎殺蠻人常事然未有反狀果如向所奏言即今冦當陷數城矣鄰境尚得無事耶今兵一出即玉石俱碎請覆驗其實發兵未晩衛曰朝命可稽乎公曰某請以身任之衛無與也公察之寧逺縣丞黄童亷平可屬事即令往覆驗童還報如公言且以黎數人首事者偕來遂聞于朝詔止兵不出崖人舉手加額曰微太守吾屬糜爛矣蠻人亦皆感泣曰太守吾父母也不然吾以叛冦死矣尚有遺類乎瓊俗嚚訟民競利害尺寸以上輒訴於府縣率連百數十人貪吏執為已利視賂予奪反覆剥取無厭民至不勝則棄業亡入生黎洞公得訟者列之庭下頃刻數語誨遣之中其情而不拘之法皆帖帖以去久而皆化訟遂息其亡而歸者萬三千餘人瓊之田歳三藝而少穫其糧給衛軍軍常以一時急征於民不得米則廹以他物利厚數倍民困之公令民歳三穫三輸之無敢違者弊頓革而常歳軍衛干撓府縣之政皆斂迹矣獨其豪橫者猶不便公嘗竊伺其短將把持以騁久之無所得乃更心服曰其律身嚴如此吾可犯耶嘗歳大旱民禱久不應公嘆曰我之責也齋戒為壇露禱翌日大雨霑足獨城南十五里江外雨不及夜復露禱明旦公出閱畨舶渡江雨隨公至如注暮乃止是歳瓊大熟公在瓊將三考其政清静簡易而民樂之趨其令惟恐後雖黎峒之氓素獷悍不馴亦皆信從蓋瓊自公至富者循理貧者足給相安於無事而作新學校親詣學舎誨飭諸生由是嶺南諸郡學生以科舉升者瓊常為最監察御史周敏巡按廣東還颺言於衆曰王瓊州真所謂安静之吏日計不足歳計有餘者廣東布政使徐竒亦曰嶺南郡守政治有長者風王瓊州一人而已公去瓊民率其老弱送至十里海上拜且泣曰公往矣如吾民何蓋公盡心保民一出於至誠故久而人益親之公居家事親孝母病晝夜侍側湯藥必躬治而後進仲父罷官歸且老無子敬事如父治䘮以古禮治家以儉自足不為有餘計處富貴憂患一致謫安慶十年泊然自適為人清淳坦亮表裏洞然而恭儉簡黙外物不足以動其中或問公可以行之終身之要曰循天理而已與人言必依於孝弟忠信所至無貴賤少長皆樂親之為文章出入司馬子長班孟堅韓退之柳子厚諸名家鄉先生陳心吾嘗讀之顧其學者曰後來文柄在此矣其學深於易而於書詩春秋皆博極其趣子史以下至毉卜隂陽方外之說靡所不通而時岀其毉術以治人輒竒效書法宗二王旁通智永歐虞皆臻其玅篆𨽻亦工蓋年七十有五而卒娶歐陽氏臨淄知縣日新先生之子繼室蕭氏子男二信與直也女一嫁楊子珩孫男八孫女若干昔龔少卿召信臣皆以明經為漢循吏易之道微矣觀公治瓊何以異乎南陽渤海之效為天下者所以重乎經術之士也故表諸其墓如雲居士墓表文淵閣大學士吉水胡公既銘其邑如雲居士之葬又告士竒表諸其墓士竒與居士生同郡未嘗承顔接詞也嘗聞諸舅氏陳孔碩先生曰居士貴信義賤利者也吾始未識也嘗倉猝過之寓重貨焉後復過之則其居悉燬其貲悉䘮矣吾既不復言所寓則入唁之居士出肅客取酒觴客盡懽然後悉出所寓歸之吾心知其義不敢言報但請舉半助為居室耳居士啞然咲曰公獨不知夏璉耶吾不敢復言夫今之人亦見有如居士者乎士竒識之後遇清湖羅伯崇匡山吳孟勤兩先生益聞居士之為人曰渉獵書史通其大義性剛介遇事是是非非嚴於君子小人之辨雖屢以是召怨不變善談論每稠人廣坐娓娓出新意嘗游四方交其名人賢士與之下上論議歸而日尋山水之樂携朋徒囊琴載酒登髙臨清更唱迭和逍遥徜徉姿意所適其資貎魁偉儀度閒雅蓋望而知為瀟洒絶俗之士也學士公亦言居士有孝友之行親歿寢苫枕塊宿於外祥而後已䘮祭用朱氏禮家富於貲而泊然無他嗜好雅好蓄書籍名畫尤好法書購積古帖頗多日臨寫有程度未嘗以事廢此亦可觀其志矣蓋陳先生始識居士故得其一事羅吳兩先生其塾賔故知之詳而學士公其肺腑之親又知之深也夫所得賢士大夫稱道之不一而足如此非實有諸已行之久而不倦曷以致之哉居士可謂竒偉亷直超然物表者歟居士姓夏氏諱璉字彦琛如雲其號也祖致和父仲賢母韋氏娶蕭氏子男四人鼎卣車冔女一孫男二居士春秋六十有四所著書有如雲集石屋漁唱集蔵於家嗚呼世所重乎士者豈必儋爵析圭有建立於時而後為可重乎茍德脩於身行於家直乎内不詘乎外見孚於當時不怍於古人蓋君子重焉若居士者世固不多見也故為之表康仲矩墓表深溪康仲矩既卒二十有二年其配楊氏使季子民獻齎事狀來京師授兄子士竒屬表其墓士竒先公女兄弟十人今惟康氏姑在有命其敢辭深溪距泰和東南兩舎許山水明秀康氏世居之康本匡氏宋避諱為康因襲焉宋南渡後有諱景明者官至同知桂林府事元有諱震者受學吳文正公博通五經尤用志於三禮以古文名當時嘗為慶洲書院山長學者稱匡山先生仲矩桂林之五世孫慶洲之從子也父宗器二子仲矩其長也諱規幼頴敏有立志成童渉獵經史是時安成冦掠泰和倉猝其父遇害母弟被俘仲矩孑孑袒跣葬父畢即盡貲負之匍匐走安成求得母弟以歸及兵亂稍定家徒四壁而養母能致其樂辛勤闢蕪除荒治生計後益饒裕恒痛其父歿於非命未嘗得奉一日之懽也名其堂曰思親以見志撫弟季望極友愛治家秩然與人交久而益親鄉人有忿爭者得仲矩一言輒帖服喜賔客樂施濟嘗捐厚貲作石梁以便行者久而圯重作之不厭蓋年五十有一而卒將卒諸子請所欲言曰若等能力事詩書紹門户吾所欲也不及其他其配元翰林待制吟窓先生之孫武山先生之子婦道母儀表于族姻其子男六民凱民勇皆先卒民㑹民阜民獻民則民㑹出後從兄伯頴民則為季望後皆業儒女一人嫁羅季脩孫男十有一人今季望已六十垂白猶謹謹奉寡嫂如母家事必咨禀民阜兄弟皆敬事叔父母如父母不敢毫末自專一庭之間怡然肅然固本於仲矩之行之刑於家者歟仲矩卒於洪武丁丑正月一日葬團箕山之原士竒少孤父之執前登州府學教授郭敬守先生嘗告之先祖兄弟及慶洲君有金蘭之契既又曰二家前輩盡矣吾懼其世好不繼也仲矩之婚吾實成之蓋仲矩嘗受學郭先生其固有所取歟卒之夷考其行事為康氏賢子孫楊氏賢子壻郭先生賢弟子也是宜表也戴處士墓表仙居戴處士歿張廷璧既狀其行及葬翰林編脩鄭好義又銘其墓處士之子宏演間來請曰銘蔵諸幽矣惟先人之行宜表諸外者敢徼惠於執事宏演為人恂恂惇實即子可知其父而張鄭皆吾友其為文不肯茍有稱説而皆處士同鄉也所論述矧又有徵哉遂表諸其墓曰戴氏世家仙居之戴里業儒術高祖某仕宋為郡學錄曾祖立之祖實甫父道顯皆隠居不仕處士諱䝉字養正少好學從鄉先生顧景南治尚書長而用力於濓洛諸儒之奥為人忠厚端確有行義毎讀書至孝友忠義事懇懇以訓子弟慎交處有智畧元季兵亂所在草竊剽敓為民患獨處士奉母先幾逺去不罹於旤家故富貲歳饑民聚謀發其廪處士聞之召至語之曰若饑而吾閉廪不仁吾廪而汝擅發不義曷如吾發廪汝均食之之為兩得哉衆皆喜且拜曰公仁人志存生我我等獨匪人而敢為不義乎悉計口給之天下既平郡縣以部符覈民田税有欲虛増額以要利者處士實長徭賦里中爭之曰欺隠民之罪也如增額不實將厲民於無窮豈長民者之仁乎卒籍其實屬有造舟之役而董役者苛刻不可近處士之季父在行衆難其不任處士躬往代之訖事歸季父曰微汝代行吾不生還矣推其田廬畀之不受季父母無子奉養之如父母季父母卒散其貲産均族人之貧者不私一毫治家馭下皆當其道鄉閭服其公平有事率往取直焉宏演舉進士為翰林庶吉士預脩永樂大典聞之喜曰兒克成吾志矣手書二百餘言備持身為臣之道以寓戒所居有園池之勝雜植花卉蔬品作亭其中名渉趣而自號園翁日與名人韻士觴詠亭上相樂也以永樂三年某月某日卒春秋七十娶徐氏有賢行先卒子男三長和次寶次宏演嘗為監察御史孫男七女三惟處士學明於道行備於躬才猷足以逹於用而僅施諸其家其鄉弗𢎞以彰固將有待於來世然吾聞其諸子卜日葬處士先後隂雨沍寒彌旬浹不已獨葬之日晴朗和暢衆蓋謂處士之行之應也非誠於為善其克致此乎過其墓者式之哉贈中順大夫鴻臚寺卿楊公合葬墓表洪熈元年正月制詔吏部為臣能恭謹勤事必推恩其親褒荅其所自亦因以勸天下之為父母者於是施自近始凡在廷之臣其父母逮養者咸得生膺褒封不幸而不逮亦與光被于幽壤焉由是逺近之為父母者瞻望歆羨以為有子者之慶亦有反而自怍不能盡夫愛子之道焉者是時鴻臚寺卿楊善之考妣皆已謝世贈其考中順大夫鴻臚寺卿其妣恭人是年十月善改卜魏村社之原啟其考妣之故蔵遷而合葬焉遂以吏部考功郎中張徹所為墓銘謁拜言曰法得植七尺有加之石于墓然非文無以昭天寵發潜幽惟惠畀之楊氏之不泯也予曰嗟乎國家覃德澤于臣而泝及所生固重本之意其亦有勵忠之道焉為臣幸獲光寵其所生而必欲託諸不泯者固孝子之志誠推是心以事君亦將不隳乃忠哉則予於為之文又奚以辭按楊氏其先家太原之樂平元盛際有文舉者隠居不仕其子成字仲禮善之考也弱冠薄遊京都屬元季兵亂道梗不能歸既内附洪武初占籍大興遂家焉仲禮為人沈毅闊逹勇於善畏避不善若將毒已者平居泊然無所外慕一言一行之微必謹必信敬老字幼處閭巷接賔客咸能得其意而周急䘏匱倒囊無吝色古所稱一鄉之善士若仲禮其幾之矣卒於永樂丁亥五月二十五日春秋六十有四其妣定興和氏淑慎之行克配君子先夫八年卒而日月同其夫春秋四十有二子男三善得祥孫男七宗宏容賔寛寧定孫女四善由引禮舎人三轉為鴻臚寺丞陞鴻臚寺卿以才能起名譽於今二十餘年豈非本於賢父母哉為表其墓曰楊之令考妣有蔵于此自古恒言是父是子曰子賢否係厥父母不係世類厥亦多有有既啟之有嗣起之煒若楊氏邦人攸希行道過者髙車式哉東里續集巻三十二
