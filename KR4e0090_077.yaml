body:
  text: 東里續集卷四十九眀楊士竒撰録南歸紀行録上正統四年二月初九日進奏本陳乞致事初十日經筵講讀畢講官皆退上召臣士竒還諭曰何不勉盡輔導而求致事士竒叩首言非敢求間但老疾不能任事上曰雖老未可言致事朕知卿久不到鄉里今命卿歸省墳墓事畢速來朕日望卿士竒叩首謝上命司禮監官選一誠實內使送歸士竒復叩首謝是日范太監傳聖旨命兵部緣途給行廪水路給驛船遞運船陸路給驛馬運載車從者皆給行糧腳力往復並給十一日早謝恩十五日范太監以欽差送行內使阮淡來相見約十八日會通州同院諸公宴餞十六日經筵侍講讀畢上召士竒賜璽書白金綵幣表裏米酒厨料牲臘咸備上諭士竒曰省墓畢即來毋久戀鄉土士竒敬唯叩首退十七日早具本謝恩公侯六部豫約祖餞朝陽門外懇辭再三乃止十八日早奉天門陛辭上復諭速來士竒敬唯叩首退光䘵寺奉旨賜酒飰經筵諸公不得餞送遂别延年學士偕同院諸公及鄉邑親交送出朝陽門建安公遣乃子錫攜酒送至東嶽廟送至通州者梁叔車叔莊龍士郁孟嘉甥德敷姪升姪秫子及鄰比數人時北風甚盛送者不堪余亦困未至通州五里都指揮劉斌來迓南京故人午至通津驛兩衛州官學師生皆來見遂登舟叔車五人小酌舟中皆辭歸升秫及家人鄰比留舟中送前子謨以其子穎附舟歸午阮內使來會小酌後家人及行李皆登馬船余與阮各乘驛船先行既至金菱灣迫暮馬船不至余兩人駐候之蓋馬船閣淺通津驛前也是日晴北風十九日余與阮仍駐金菱灣候馬船不至蓋氷凍初解流沙橫潰舟行未有常道也是日晴家人及鄰比送者皆歸其早日有左右抱珥相對草日早隂馬船始至金菱灣既出灣又頻閣淺午遣辦事吏歸作寄二楊先生别寄詩諸學士晚始至張家灣蓋自通州至此沿河閣淺人力所濟皆劉都指揮及兩衛指揮趙玉楊青遞運所官張聰之助聰吾舊辦事吏撥二遞運船分載行李晚微雪遂霽趙指揮率人送往和合驛是夜宿李二寺草一日早隂行十餘里遇廬陵劉英寺丞略談鄉郡事見惠鵝二翼食後遇李安御史微雪遂霽過漷縣過和合驛會曽蒙啓見惠長詩共小酌遂别驛丞南昌象牙潭人送炭夜至河西驛宿是日晴雖十餘膠淺亦未若通州迤下之難澀也草二日劉斌都指揮遣公差回南京一空馬船助載行李蓋慮吾前途水淺難行也余遂却遞運船緣途但於遞運所索夫以助操舟然吾家行李甚少阮內使遂徙居之以省驛舟倒換之煩既發食後過通濟河維舟登望新渠隄岸堅厚河得其性舟楫之便施於久遠勞省而功固徘徊嘉嘆阮太監之績而傷往年有司茍且徒勞之弊也傍有祠祀河神主祠道士曹守淵出廬陵水東真常觀延余入坐庭中有兩巨軸孟勤定之贈曹主祠之文又自笑吾此行不及曹也適風便不待茶遽起曹固挽留不得強惠牲酒以鄉郡故受之午後至楊村驛驛丞余存中江西餘千人惠魚二尾答之蜜煎福餅遂留升秫及四從者其家俾眀旦歸北京又作書寄二楊先生及蔣院判遂行晚過桃花口引兒灣及丁字沽夜宿直沽是日晴草三日早發直沽食後過楊青驛索遞運夫過午不得蓋驛官惛懦不識字悉為下人所蔽申刻始得十數老稚即發過獨流遇一驛舟列仗甚嚴類都司官狀密訪之乃一行人私竊薄之夜二鼓至靜海縣奉新驛知縣邢端來見頗儒雅欲訪嶽給事以夜不果是日晴南風草四日早食後便風過流河驛廖穎感冒風寒發熱用薑豉湯不解晚用十味香蘇散已刻轉南風甚駛不可行暫停驛前午發過青縣過青口真定諸郡水從此出會貴州道馬御史淮安歸作書寄抑庵叔粲及升秫子又作書謝延年求樂惠詩抵暮至興濟縣乾寧驛既行縣令丞及學師生追及求見停舟見之略詢民事令答云民間甚靜帖無科擾嵗復大熟皆戴朝廷之賜嘉其言有禮遂别中夜至滄州阮內使往遞運所索夫已有預備蓋官得人也是日晴南風暮始息草五日早至磚河驛午後過新橋驛遇四川潘行人潘嘗本院讀書見惠川椒遂寄書升秫前遇鄭文實乃弟來迎兄喪詳語之故見惠柑荔麻姑夜半過連窩驛是日南風廖頴病愈草六日早過連窩驛五里康幹劉鉉追至相見早食後過良店驛行十里大風敗柁停舟修柁午後始行晚至德州安德驛兩衛州官學師生皆候見驛前石城劉通百户及故泰和丞陳輪姪為衛經厯皆求見草七日早過故城縣梁家莊驛遇南京施尚書見惠酒同步語一里許知南京諸公動定遂寄書康甥晚過甲馬營驛是日南風草八日早四鼓過武城驛天明過渡口驛午至臨清縣清源驛縣驛閘官皆來見運糧鳳陽曲指揮東昌周指揮來見學師生來見謝訓導者安城人育敬所舉問汪檢討云已歸鄞矣厲思溫縣丞自刑部郎中左遷于此監收鈔御史馬湖府人辛丑進士及戶部郎中皆來見山東髙都指揮來見惠羊酒卻之縣送薪炭晚過二閘甚安穩聞此中多鄉邑人皆未見又聞有假吾家名目於此欺人者知吾將至前數日遁矣留書張驛丞寄叔濟張祥符人也中夜過魏家灣青楊驛是日南風甚駛草九日早四鼓過李家淺閘早食至東昌崇武驛過閘兩衛及聊城縣官縣學師生來見劉知府來見劉已得代未行縣送薪炭縣學訓導安成吳庸惠鵝及梨卻鵝遂行前驛丞丘誠父子追二里所來見丘吾同邑故人惠羊酒卻羊留詩别誠誠送前五里乃别南風益甚不可行停至晚行草里過李海務閘又十餘里過周家店閘又十餘里過七級二閘又十餘里過阿城二閘夜已深矣是日南風不息閠二月初一日早四鼓過荆門二閘行十餘里過章秋又三十里過金線閘遞運所又草五里天明至安山驛州官學官來見知州傅霖吾故人惠雙雞雙魚卻雞留詩别之吾家新舊皂𨽻六人皆州民馳走五里追及送魚及帽刷遇南京胡信御史寄家書及時薦詩晚至開河驛驛丞惠小蠟燭二對過閘是日南風初二日早四鼓至濟寧南城驛過閘袁文華憲副及衛州官皆來余以病皆不見諸公送下程皆卻之禮部顧主事自廣東回來見亦以病卻遂行早食後遇劉汝弼布政楊闕昭憲使僅一見以舟聚多行速不及交語約前途再會余先行午過仲家淺閘自濟寧至此凡度十閘午過師家莊閘又五里至魯橋河岸崩塌處見古人所葬石棺甚多為水所齧暴露傾壞其初固欲為堅久計豈知凡天地間有形之物無不壞之理顧有遠久之殊耳用志以著警云抵暮至谷亭驛就宿是日南風初三日早過谷亭閘遇山東清軍鄭御史台州人冀成之友亦儒雅遇汝弼見過早飯清話時楊仲昭在後相失既别汝弼遇陳士希太守本深太守余判府士希見惠海臘笋葅三君見過果酌而别遂同過沙河閘晚至沛縣攜導升歌風臺讀新舊二碑余作詩悼顔伯瑋夜至沽頭宿是日南風甚盛汝弼士希皆言賀敬廉正公勤平恕明法律有大體謾志之初四日昧爽度沽頭上閘早食後度下閘阻雨午後始行過謝溝閘暮過皮溝閘與余判府同過不及聚談余舟至夾溝驛北三里許阻淺名黃家淺遂宿是日雨午特甚蓋過閘始于臨清止於皮溝云先夕食士希所惠海臘至晚泄十餘行服枳术丸數貼稍緩服香砂和中湯二貼乃止志以戒饞初五日早仍阻淺不能行阮內使復詣皮溝放閘水午得水發黃家淺過夾溝驛驛丞石嵩武定州人頗疏通黃家淺難澀不減金菱灣甚得此驛人力之助行三十里至耿山又阻淺夜分至徐州是日微雨北風蓋自通州至此始得北風云初六日早孫升郎中來見遣人助過洪孫奉命提督徐州洪事廉能得民心上下交譽之孫惠雞及蔬薪卻雞前行遇張鳴玉參政相望舉手一笑風駛不及交談遂别已刻吕梁過洪提督洪事徐少卿來見遇張嘉會度洪至房村驛候阮內使略駐午後行晚至新安驛又行十五里至新安遞運所宿是日晴北風初七日四鼓啓行五鼓至邳州下邳驛衛及州官來見知州郭珏河南新安縣人由監生除將一考甚有賢譽衛皆遣人前督淺鋪夫至直河州又遣夫百人送船甚得其助蓋自此迤南淺澀處多矣亭午過直河驛遇河南道廣昌陳御史自鳳陽還寄口音報康甥平安晚至宿遷鍾吾驛縣官學師生來見縣惠蔬羊酒悉卻之吉安孫知事此縣人自朝覲回初至家來迓惠羊酒却之縣遣一吏督淺鋪夫送赴桃源行草里暮遂宿是日晴南風初八日早行草里郭誠貟外過舟見訪郭提督河道自儀真至吕梁初未相見河上官民皆譽之謂其廉公剛正處事有條理但頗性急是日坐談頗久所論皆當北京通州人也過古城驛王瑜都督遣人來迓將至崔鎮吉安榮衢經歷此鎮人丁毋憂家居聞余至出五里見候遂艤舟造其毋靈筵致禮蓋榮在吉能持廉正非衆所及也既别榮遣子弟棹舟送禮至桃源卻之午後過桃源驛信圭攜楊俊來迓遂同舟行頗聞鄉邑事至三汊淺信圭先歸余舟滯淺難進是日晴南風初九日五鼓至清河遂過青口驛信圭追送余赴山陽同舟度淮羅文振出清江浦見迓亦同舟行過五閘至西湖兩人指示余常盈倉及湖中十里長隄為公私往來之便二人又言比年淮溢郡城內外官府軍民廬舍俱淹獨倉址髙水不及余歎平江之功因訪及其素所行李羅皆言老成有謀慮誠難得如衆皆欲開白塔河平江初堅執不從衆遂造謗衊之飛語逹北京平江不敢止既開卒無利有害其他之功尚多但不應兼守淮安而為小人所罔行事往往不純耳二人又言巡按來此者惟彭百錬不動聲色能以禮制之不敢肆後之繼百錬者率軟愞無為反為所欺及李敘至初以大臣禮待之彼用左右邪言不禮敘及敘振起風紀肅然人皆畏服平江始斂而不肆遂隂設計紿李德太監誣奏敘罪去之德後頗知亦悔之蓋平江於漕運功甚有但所存心不皆端也余復問淮安自彭守外有司之賢者曰楊陳二同知袁推官耿運同皆難得楊出自御史才更優所言悉符前日郭貟外之論蓋一路管河道者孫郎中郭貟外上下稱之無間言云王瑜復遣子見迓於清江浦遣之先歸瑜時以病家居也彭守以僚屬及學師生來見見畢皆令先歸王孟安乃子麟為訓導於此甚為彭守所重蓋能持已修職也余見加奬勵之午停舟西湖觜託文振市布席回泰和用草兩文振見惠食物王都督力疾出相見淮隂驛時疾已瘳尚欠將息亦惠食物謝作其考碑文為受其半始聞馬湯二公被召之詳彭守復來送余遂别王彭李羅發舟是日晴無風初十日雞鳴至寶應縣安平驛驛例不支廪米口糧縣官來見以怯風卻之已刻過界首驛無驛丞不及倒關亦例不支廪米口糧午過髙郵湖午後至州盂城驛未至驛五里董璘修撰拏舟載酒殽來迓余病泄初愈辭酒殽坐語移時因詢州官曰韓守石首人廉清愛民謝州判亦好徐侍郎嘗考謝平常州五百人保留特命復職而停徐祿半嵗董又言衛指揮使張海得軍民之心已而衛州官學師生皆來見識張與韓張可三十餘亦爽愷韓惇實儒者望而知其有愷悌之風學正臨江人亦好吏科車給事致事居家來見坐語頗久始知其為人平實蓋雖同朝平日不數相接也揚州李太守遣人見迓即戒之歸余舟亦發二鼓至邵伯驛亦例不支廪米遂過閘是日晴便風十一日早四鼓過揚州廣陵驛聞李守率屬昨日見候驛中抵暮始歸驛丞乞少留俟入報守余不可遂行風便天明至儀真驛鄉人郭永韶為遞運所官之夔姪聞余歸來迓先夕至此至是同郭來見夔言與恂如同來恂如聞戶部辦事官言叔重船來日晚始至此鎮江有一公事甚急今早疾馳往彼了落約明早五鼓復至此相候也謝運同來見衛與縣官及學師生來見遇廣西參政鄒鋭考滿赴北京余南京故人見惠茶廣西副使陳輝湖廣參政吳存衡守鄒良朝覲歸皆來會午揚州宗人友文通判追至相見惠酒及雙鶴受酒却鶴友文欲遣人馳報恂如余止之延之小酌遂别候潮至晚始度􅄵永韶極力周旋既度遇葉汝梅劉大本徒步送余舟數里知其升石城知縣既别風便夔乘余驛船先發赴龍潭驛余乘馬船徑赴龍江驛是日晴十二日早四鼓度江過觀音山夔驛船亦至旋復相失天明至通江橋夔已先在食後同上龍江驛入金川門詣謁孝陵至太學前遇叔縉光世來迓遂同行又遇敏德與言又遇都尉總兵及宗載良玉府部諸公皆至皆欲同出朝陽門皆謝却之總兵遣一指揮先路時顯亦至余與叔縉光世時顯四人同行至孝陵衛步至陵門外五拜叩頭畢已午四人同至翰林院都尉總兵五府六部太常大理通政堂上監學府縣諸官皆已先集守備劉羅唐三太監亦至鄉郡仕南京者偕至都尉總兵具酒殽院後堂酌三杯皆出宗載延知已數人共作午飯聞黃少保疾稍差未出遂往問之與光世良玉同行黃公聞余來甚喜強衣冠出迓執余手以義見責曰今豈公治私時耶已而見其二子裁三四嵗余戲之曰公亦曷嘗不治私黃及陳徐皆大笑黃又握余手曰不見谷永論宗室事乎余應曰某不學無術人也然未嘗不內愧遂出酒強余飲一杯時已晚遂出便道過謝都尉及守備太監羅唐強余酒皆兩杯最後過總兵復強數杯時已暝陳徐皆挽余歸宿余以未謁先師遂就陳宿陳復出酒卻之命其子焚香取琴彈數引余時已困夔姪在侍光世亦連榻皆就枕既覺余語光世朋友有責善之義請聞余過光世曰先生是非太明白小人可盡絶之耶且一人之言未可輒信須審察之余謝曰老兄吾師也敬知過矣請改之是日晴十三日早謁先師退就彛倫堂與學官寒暄後即出過夔姪見諸孫宗載敏德與言叔縉良玉皆來見送余就光世早飯後同出東江門道遇趙都尉下馬數語即别便道過蔣主敬不遇見其弟道中託龍司務買人事扇問何頥索藥既出江東門守備劉羅唐袁四大監皆出見送既别至江東驛都尉總兵府部諸司堂上皆先至見送鄉郡仕南京者亦集何頥送藥龍夔市扇皆二遂别諸公良玉侍郎暫留為撥換馬船且携酒酌阮及余晚始發舟仰善之夔送余前行夜過大勝驛是日晴初聞麓川之師十四日早大東風過和尚港午至采石驛候濟川衛馬船夫口糧文書未至蓋先晚行急約至此候之是晚風不止同仰善之夔宿采石買魚夜酌余作詩贈之十五日風雨建陽衛指揮來見惠魚酒卻之刷卷御史涪州人亦來會方緘詩寄自道自道偕其僚及當塗令張嵓來見府縣惠魚酒皆却之已而留自道就余舟同善仰之夔酌别馬船夫口糧文書竟不至遂作二楊先生書論麓川事及家書託仰善求良玉轉寄北京余乘西北風遂行四十里至東梁山宿是日雨夜晴十六日早晴發東梁山過七磯過月子河亭午過蕪湖過焦磯至魯港驛午後過螃蟹磯三山磯微雨北風望荻港諸山連延秀拔胸次豁然晚過繁昌縣望靈山雄秀蒼然接荻港諸山可愛抵暮過板子磯過荻港驛行三十里至金沙洲夜深風駛遂宿是日北風微雨十七日早微雨發金沙洲便風過老鼠夾食後過銅陵縣亭午晴過大通驛舟中望九華山午過梅根晚過池口驛暝過烏沙夾宿是日便風十八日早四鼓發烏沙夾昧爽至李楊河驛天明過長風沙夾食後至安慶同安驛余往拜青陽先生墓荒山沙石之墟凡五墓中為先生前之左右各二墓問土人云皆先生一家所葬也墓外建表蓋李果御史新作王璜太守以僚屬來見遂託王寄書桐城與士正衛指揮朱禮等亦來朱前府軍衛帶刀官余與府衛言忠宣公墓係國家祀典守臣宜以時修葺不可怠忽衆唯唯遂問太朴先生之後得其曽孫名山者時為學諸生召與之見詢其祖考及家蓋惟毋在其曽祖詩文亦有存者約録見遺余遂行夜至雷港遇李果御史談論皆有理既别行四十里至望江縣急水溝宿是日晴無風十九日早南風發急水溝天明過楊灣午過小孤山過彭澤縣龍城驛過徑港暮至炭市灣南風甚駛雷雨遂宿草日天明發炭市灣亭午至湖口縣彭蠡驛晚過鞋山女兒港大雷雨遂停泊是日南風草一日早微雨南風甚盛午稍息始發舟午後過澄靈湖晚至南康府匡廬驛往弔正安送賻重作挽詩知府翟溥福見迓其資篤實郡人甚譽之託寄詩盧邦臣遂行夜二鼓抵株磯宿草二日天明發株磯便風食後至吳城驛午過昌驛山晚至樵舍驛二鼓至南浦驛宿是日便風草三日早四鼓都指揮湯節自袁州召還亦至遂同入城朝王王先召余入俯接甚厚賜坐與語久之賜酒饌命兩儀賔見待就叩首辭出闕趙侍郎御史三司堂上知府皆出南浦驛見候余遂趨各司謝之索片紙書名而出蕭仲敬來見遂同往訪若思中道邂逅蓋聞余至來訪遂同詣南浦驛若思出贈詩及酒饌就驛中酌余與侍郎御史三司諸公别若思送余前行時已亭午北風甚駛趙侍郎焦布政湯都指揮張琦僉憲皆棹小舟送余行十餘里風勢益甚不可行遂止余與若思父子同馬船行四十里始别以余驛舟送之歸未刻過市汊驛晚未至豐城草里風愈駛江絶行舟遂引避小汊是日焦遣承差李懲護送草四日天明風息發舟食後至豐城縣劎江驛孫貞先生攜酒見迓胡軫憲副任禮郎中偕至共酌孫酒而别晚過清江鎮暝至臨江清江驛徐敬太守來訪徐甚安健色腴澤勝往昔數倍索梅花軒記余諾之惠新茗府縣官及學師生皆來見是日雨夜宿清江驛草五日早遣李懲歸遂發舟午後過新淦金川驛行三十里縣官遣吏追送羊酒卻之舟至仁和上市已暝遂宿是日南風草六日早行亭午至玉峽驛十里至暮膳停舟登金少保墓微雨泥淖緣峻躡險數人側足牽掖而上至墓余困憊不支坐久稍定山髙壁立如削大江逼齧山趾墓前僅容尋尺陡隘可畏謁訖余升墓而望左絶無山但見江流滔滔東下時傍近有兩人從余升一姓郭墓地主也一進士蔣慶之弟貌甚肖兄余問何以葬此兩人云鄉人皆知此不可葬其子弟信俗巫之言謂此地嘯天獅子形子孫當大貴雖衆言不可其家不見信也余問巫今安在曰葬此地後知逹官皆怒之已挈家逺竄矣遂下山過所建享堂堂之前惟建安公所作碑文刻石頗整然門無扄鑰蘚壁塵戶樵豎牧子雜處其中無所顧忌又問有守者否曰素無蓋其子弟皆置此於度外但金夫人或半月或十日一遣人邏視邏者雖至亦無可奈何也余聞之低徊黯塞遂與兩人别入舟備書其語將寄示金之子使圖改卜焉漸晚余舟行十餘里望黃金江口亂流泝釣魚臺泝新市夜至新店阻淺遂宿是日南風微雨草七日天明發新店食後過富口過玄壇觀前渡江泝槎灘至白沙驛余乘驛舟先行晚至吉水過解學士家時鳴鶴禎期禎亮鄒循先渡江來候縣官學師生皆來於江滸既至解氏雨見禎亮二子皆可人李德言致事家居亦來會遂出道過鳴鶴新居頗清雅其子作生員亦秀余登舟擬前過晃庵縣學生歐陽寧以恭之子胡登有初之子送余時馬船已得風便先行余與二生及二從登驛舟夜二鼓始至䣊灘追及馬船而宿是日晴暮雨北風草八日早雨北風舟人以數日困南風促行且雨不止又聞晃庵之子遷新居去江尚逺不果詣遂託胡登寄書其子約東行之日詣也早食後至吉安城下府所諸公兩學師生皆見迓江滸余入郡學謁先師次謁忠節祠赴螺川驛登舟遂行便風午過東昌暮至泰和華石潭巡檢司稷偕諸姪及賓畿父子候者皆至蓋余先有書戒其無出縣境也遂宿是日雨北風草九日早晴令導及家人及來迓者皆就舟歸余登岸鵷稷從余詣螺湖蝦蟇湖金雞湖盤古山石人庵前謁始祖考妣曽祖考妣祖考妣考妣墓家人負晟皓出十里來迓下梘岡縣人老壯填溢郊郭衢巷見迓至不得行晚始抵家謁先祠東里續集卷四十九
