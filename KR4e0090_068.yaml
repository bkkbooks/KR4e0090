body:
  text: 東里續集卷四十明楊士竒撰墓志銘蕭孺人陳氏墓志銘吾舅氏有賢女嫁同邑桃源蕭氏為前監利縣典史德蕡之配年四十有一而卒既卒踰月其兄翰林庶吉士孟潔其弟泰和縣儒學訓導孟旦皆在京師聞訃慟哭失聲孟旦走告余余亦感悼泣下孟旦曰惟姊孺人未有子嗣可哀惟姊孺人貞德淑行可重不可泯沒其葬也宜得文銘墓兄宜執筆焉余既屬姻戚且少學於舅氏後德蕡又請余教授家孰余知孺人之賢也孺人諱斗字叔魁姓陳氏陳故泰和著姓祖心吾先生為時大儒父孔碩母羅氏皆有賢德重家教孺人自幼端一柔婉在父母之側謹謹奉訓戒秉禮法佐母治衣服飲食之事皆如父母之意父母愛之年二十歸蕭氏蕭亦泰和東南著姓以資雄一郡合族而居常數百人孺人歸其家為冢婦孝敬儉勤於事上相夫睦親皆得其宜自舅姑至於族姻之內皆稱曰賢德蕡起邑學弟子貟厯事秋官數年洊涉﨑嶇蓋資孺人左右之力居多至於孝養繼母婚嫁孤弟妹鄉里皆稱德蕡為難而亦皆稱有孺人為之內助也生子男一人卒於殤女二人德蕡方未有後孺人悉力為之買妾平生賢行槩類此永樂七年九月某日以疾卒是年某月日葬於桃源東五里所松塘之原銘曰有婉淑人有儒其宗其德靜貞其行肅雍孰不為婦其道何伊婉此淑人婦式儀之松塘之原歸焉永藏生乎止此存也其長周母朱孺人墓志銘同僚友周孟簡致其從兄崇述之言曰述不孝不天先君子蚤棄背賴母孺人以克臻今日甫有成立母孺人遽不起嗚呼慟哉惟母孺人之德之行宜得文銘墓敢以纍子余前旬浹間見崇述容色蹙然如有隱憂與之言如罔聞者余私怪之訪孟簡其故而知孺人病崇述絶酒肉晨夜致禱北辰以兾其親之安也而未幾而訃音至矣孝子之慟宜何如銘固不可辭乃問狀於孟簡孺人姓朱氏諱某朱故吉水側阜里望族祖父皆以善稱孺人生而秀慧女工之事一見輒能之稍長知謹於內外之辨父母愛之笄擇所歸以適同里周子正周亦巨族自宋以來為望邑中孺人歸為冢婦凡事舅姑佐君子處族姻皆得其道舅姑安之而其家無長少戚疏以至於臧獲皆譽道之綜理家事井井有章子正不勞焉於祭祀賔客之具必豐於賑窮乏恤患難必厚而其所自用衣服飲食甚儉教其子若婦以勤而必身先率之子正蚤卒居孀有禮撫育諸子皆勉之問學而悉力以資之永樂二年仲子述與其從弟孟簡同賜進士及第授翰林編修鄉人榮之而皆曰非此母安有此子述既奉孺人就祿養京師甚適已而衆少子迎還養不已孺人重違衆少子意強還猶顧謂述吾且復來述亦數請而其衆少子若婦咸曰江湖二千里老人奈何數乘危嶮卒厄不行其皆可謂能子哉固天以是報令人者乎永樂八年二月十七日以疾卒享年六十有六將以某年某月某日葬於某鄉某原子男五長崇訓蚤卒次即述又次崇斆崇縉崇厚女二李民厚羅從廣其壻也孫男二某某女五銘曰禮謹辨內詩著宜家展也賢婦肅雍孔嘉展也令母報施有子錫休垂祉來來曷已倪母薛孺人墓志銘永樂十六年前兵科給事中倪峻奉詔諭占城王還道聞其母孺人卒未葬哀毁不自勝匍匐趨復命北京遂奏乞歸葬遂求余銘按孺人姓薛氏世家常州之無錫父均序母吳氏孺人生元後至元丁丑四月二十三日既長父母賢之擇配以歸同里倪文斯惇行婦道生三男二女而文斯卒男峻誠端後皆有立女皆有歸峻明經厯官郾城教諭沙縣知縣兵科都給事中文行政治有稱於時已而奉命出使萬里外國持其身皎然衆蓋謂有孺人之為母也孺人壽八十有三年而享祿養幾三十年所得稱其所行宜哉其卒以二月二十一日葬以卒之嵗十有一月某日墓在其邑凱原鄉春申里之原銘曰坤道至柔靜以方有婉令人率厥行繡帔珠翟居髙堂堂中鸞鷟五采章乘時翽翽當朝陽慈顔愈樂樂且康既夀考終卜斯藏山盤水回土燥剛後百世祀益蕃昌張母蕭安人墓志銘永樂十六年刑部主事吉水張宗璉扈從在北京聞其母安人之訃匍匐奔歸過南京奉事狀求余銘墓宗璉自登第入翰林與余遊至於今十餘年凡其持身從政皆君子也蓋亦由成之於母故余不獲辭銘焉按狀安人姓蕭氏蕭故邑中儒家從學歐陽巽齋先生為髙第曰定夫其曽祖也曰從大曰自敏其祖其父也登元至正辛卯進士第授湘隂州同知曰飛鳯其世父也母顔氏父母無他子惟安人故甚愛之而自幼端重不肯縱肆惟日務女紅凡為之輒精緻湘隂家居教授安人自內習聞其教而益謹於禮度湘隂愛之擇配以歸同里張彥忱張世家於儒既歸嵗中喪其舅即出資裝助襄事以孝事其姑以勤儉佐夫殖其家於處妯娌族姻下至臧獲各得其宜客至未嘗以空匱廢禮年三十有七彥忱疾既革顧安人訣且屬之養親教子應曰諾彥忱卒居喪盡禮於凡所以養姑訓子益嚴於彥忱之存也得一味之甘必奉姑姑飲食衣服必躬治以進早暮必在姑所而委曲承奉焉故其姑雖老失壯子無有所不足姑雖沒嵗時薦祭必盡其誠敬教子必以詩書為業必以不辱其先為務於論學問恆舉所聞於湘隂者為説平居督切之如嚴師故其子雖蚤孤皆力學有成其長子雖已仕於事君臨政必戒之忠與恕也初彥忱沒已終喪所親或諷之他適者毅然應曰若等不欲吾他日復見良人地下耶守節自誓益勵嗚呼若安人者於婦道妻道母道可謂兼之矣蓋享年七十有一以五月初二日卒是年某月日葬里之月岡子男三宗璉宗珩宗瓉宗璉永樂二年進士翰林院庶吉士刑部浙江清吏司主事女二錢嘉謨朱肅儀其壻也孫男七頴熲顒頌頊領順女孫六銘曰其生其歸奕奕儒家有煒中閨其德之華維孝節慈鮮是蹈之嗟祿與夀匪是召之顒顒周行亦既有子後來繩繩代百其祀故太宜人宋母孫氏墓志銘梁府長史宋子環之母孫氏以子貴封太宜人之明年二月二日卒孫世家廬陵金壁里有厚德大父文璧父世良母劉太宜人自幼莊重於食飲絲枲之事治之輒精父母愛之時吉水宋氏鄉名家而若璟英爽傑特方喪其配張氏遂以歸焉孝養舅姑事大小悉躬任之姑病踰年侍養憂勞不懈晨夜姑沒哀毁喪祭咸備於禮樂淡素持儉勤以相夫裕家而撫張氏子子琳篤於慈愛事諸母姑姊及待弟妹以下疏而宗族賤而臧獲靡不適宜孫氏父母俱喪遺二弟一妹皆幼取而養育之長皆為之婚嫁可為周於恩義者矣夫喪又二十年為洪熙元年賜誥封太宜人拜命之日子孫族姻序列一堂以次上夀太宜人嘆曰天恩過涯分矣顧我何行堪之惟我子我孫勉圗不忝可也又嘆曰誠愧我何行乃蒙被恩澤踰越吾父母宗黨也然亦過自喜而親戚鄉里亦皆謂在太宜人宜當得此也宣德元年春秋六十有八卒將以是年某月某日葬郡西鄧山之原距其夫之墓若干步子男七子琳子璉子環子瑶子瑜子珥子璲子環永樂甲申進士翰林庶吉士吏部驗封主事考功郎中梁府長史能持身謹行女一張紹悅其壻也孫男十五女十王顯劉善其壻也餘未行曾孫男五女三子環奔訃歸且行奉左春坊左諭德兼翰林侍讀周述所述太宜人事行求為墓銘前二十七年余因大學士解公過宋氏識若璟若璟之沒也嘗為序其哀挽之詩子環仕京師又於豫還往素厚而賢士君子之過廬陵數為余言子琳兄弟能孝且有禮而皆太宜人之教也則夫銘太宜人之墓也余不得辭銘曰修諸躬惠以肅施諸家孝與睦行有徵昭受福冠珠翟稱厥服內懷謙欿弗足裕來昆百世續康母楊孺人墓志銘西昌之深溪里康母楊孺人永樂十六年十一月初四日卒其子民阜具書使其弟民則走京師屬士竒銘墓楊氏故西昌文獻家曾大父諱敬元贈富州尹騎都尉𢎞農郡伯大父諱景行翰林待制朝列大夫致仕有傳在國史父諱毅世稱武山先生明春秋兼擅兵略元季之亂州守辟長義兵有禦賊功母馮氏元進士翼翁之女孺人諱榮溫惠貞靜不嚴而肅蚤喪其父母年二十歸仲矩康亦文獻故家吳文正公髙第弟子為慶洲書院山長諱震稱匡山先生者仲矩世父也父諱開孺人不逮事舅而事姑至孝姑沒佐其夫治喪祭如禮夫有稚弟季望盡心撫育教訓之底于成立季望亦母事孺人終身不衰凡其家公私百需皆孺人綜理井井不紊五世同居㸑六百餘指其尊卑貴賤歡然相親而截然無相越者蓋本孺人主治乎內也仲矩沒孀居二十年凡康氏事之是非可否皆唯孺人之聽蓋春秋六十有八而卒子男六民凱民勇民會民阜民獻民則民凱民勇民獻皆先卒民會為從父伯頴後民則為季望後女一人嫁羅季修孫男十有一人女五人其葬祔團箕山其夫之墓孺人先諭德之妹士竒之姑也士竒仕於朝數寓書致教愛之意嗚呼尚可復得哉故忍涕淚敘而為銘銘曰易著家人禮謹內治詩首關雎化本攸系教有弗行道鮮舉之于舉于隳興衰是基孺人之行正家于中五世一堂以肅以雍孺人之教慈孝友悌永世克承垂祚無替故孺人歐陽氏墓志銘宣德壬子勑封監察御史王讓父敬簡為文林郎廣西道監察御史母歐陽氏為孺人又明年歐陽孺人卒時讓奉命巡按雲南數月始克聞訃還奏將歸以父命奉翰林修撰劉麟應所述孺人事行求葬銘歐陽氏世家安福其先與文忠公同所自出至孺人祖靜安父齊忠皆隱居不仕孺人自幼備女德父母重之長為擇所歸邑王氏其先與瀘溪先世同宗而世蓄厚德里稱王長者家有子曰敬以好學見重鄉閭孺人歸焉即敬簡云歐陽氏素富而孺人志淡素屏斥華麗事舅姑盡婦道相夫盡妻道躬勤治家舅姑喜施豫畢力承志夫之從伯母寡居無子共養如姑三十餘年如一日夫寡姊無子守節不嫁白於夫迎歸養之如己姊有孤甥無依教育之如子夫喜賔客雖倉卒治具如禮愛其子延師教之奉師衣服飲食必躬自治而命其子進之他日讓奉賜敕歸致恩命敬簡及孺人拜受訖孺人顧讓曰父母何以能得此也汝始終不忝此官斯父母不忝此恩汝懋敬之平居訓其子男必於學女及子婦恆以身喻之馭侍婢隨事訓教未嘗稍厲聲色閨門之內肅如也宣德甲寅五月初五日以疾卒享年六十有八子男六諏諶讓詒諄諲讓由進士授行在廣西道監察御史亷重有賢名女二歐陽文華彭丕續其壻也孫男十三倬倫儋俅僖仁佳像俶儕佶億侃女七曾孫男一恂孺人之葬以卒之明年某月某日墓在邑之某鄉某原銘曰生名宗歸名家孝與慈振德華養有祿褒有制慶綿延裕來裔右軍都督府左都督馬公夫人王氏墓志銘右軍都督府左都督馬公之配王夫人卒將葬矣都督公以其子驎等來拜請銘都督公簡靜和易謹於言行余與之同朝久且居相比兩家事皆相聞夫人之德允配君子遂按錦衣衛指揮僉事孫福所具事狀為敘而銘之敘曰王氏世家順義處士福慎夫人父也夫人諱惠友蚤有淑德父竒之相攸以歸同邑馬氏配都督公公名亮字某夫人年十四為婦事太夫人孝曲盡愛敬都督公已貴顯太夫人尚無恙夫人奉事益謹服食必躬視乃進太夫人曰左右無侍婢耶何乃過自勤夫人曰豈為無人婦職應爾也太夫人數言願他日諸孫有婦事姑皆如新婦耳太夫人沒於送終尤盡心其內佐都督公凡家事皆自綜理而白其成而無一不當都督公意奉天靖難之師出都督公在行夫人知其惓惓以老母為心寓書告曰君自專意王事奉姑婦職也君無慮焉於待宗姻馭臧獲咸當其分教其子恆曰吾家起汗馬有今日汝輩須謹法度戒驕侈諸子亦克遵教令正統七年七月七日夫人以疾卒其生以洪武十五年閏二月二十二日享年六十有一子男四驎娶房駿娶馮驥馭皆娶王女二長嫁保定右衛指揮僉事薛玉次未行孫男女皆二夫人之葬以卒之嵗八月某日墓在懷柔縣東郭家務之原銘曰婦也篤孝用相其夫母也篤教用淑厥家猗嗟令人備于羣德既沒而寧返兹玄宅故太安人竇氏墓志銘翰林侍講天台王一寧縗絰踵余門泣拜言不肖孤不幸祿不逮養父猶幸獲養母然母年益髙不可奉涉逺道今重不幸又見棄矣痛當奈何方母未病時孤凡再伏奏乞歸省侍屬時有職務未賜允今而後不復可見母痛當奈何惟先母之德之善不可以泯幸徼惠執事銘諸其幽堂且以示其後子孫存沒有賴焉言已又泣拜不勝哀余昔與一寧先君子監丞君峻用同朝有斯文之舊今又與一寧同在史館經筵誼不得辭按一寧狀其母竇氏以子貴封太安人竇故家靈壁其先在元有官至萬户者辟元季兵亂徙許之長葛遂為長葛人父某母某氏太安人諱某自少有貞淑之行父母擇所歸時監丞君為新鄭儒學教諭方求配遂歸焉躬勤婦道逮事姑克致其孝內治其家條理秩秩監丞君嚴厲或發之過恆和色以匡之有怨家竊燬學卷牘嫁禍監丞君久不得白太安人擊登聞鼓訴卒白之監丞進國子丞又進光祿丞賔客日益盛太安人率躬治具不厭平居有樛木逮下之德愛庶子如已出督諸子學功倍於父靜慎寡言言不及外事未嘗道人過失家人有過不見諸聲色比鄰女子竊家之藏豫所私者其父弗察意王氏臧獲欲執訴官或教王氏發其實者太安人不可無幾事白鄰家父慙謝監丞君沒益躬勤儉力蠶績督僮奴耕家更裕於祿食時族姻閭巷率視法焉子入仕以守身守官不忝其先為訓宣德甲寅受封正統己未閏二月十二日卒於家享年七十有三子男四長一寧舉進士為吏部稽勳主事入翰林為修撰升侍講次鍾先卒次震次薊女二長適張次適周孫男若干葬以卒之嵗十二月某日墓在仙居縣慶雲鄉陽墺之原銘曰坤體至靜其德方猗竇安人此其藏後有嗣之世今芳太孺人王氏墓志銘贈中書舍人金華陳誠信中之妻太孺人今禮部精膳郎中景茂之母也以宣德四年五月十二日卒時景茂在京師奉國子祭酒貝君泰所狀太孺人世出事行乞銘歸葬景茂初舉善書至有旨令進其業於翰林後再授官至於今皆就內閣書制敕與余同處蓋二十四五年且其母出名儒君子之家故余不辭為銘按狀太孺人姓王氏宋魯齋先生諡文憲曾孫與權之子性行端淑善事父母時王陳居同里太孺人之父察信中有孝行遂以妻焉年十七歸陳事舅姑如夫之孝事夫以禮處族姻待臧獲咸當教子能嚴恆勵之於學聞景茂選中應天府鄉試喜曰庶幾不忝父母治家躬儉勤以率下至老不變洪熙改元景茂時為中書舍人蒙恩贈其父以己之官而封母太孺人景茂今為郎中將考績如考最當進其父母五品之貴不逺矣而太孺人不逮蓋夀七十有五年其享祿養者十餘年其子孫曾男女森森列侍下可為福也矣子男五長景茂次子安金華府隂陽學正術次可次文次蓂先卒女一嫁王淵孫男七有序有學有時有延有禮有濟有達女四曾孫男女各一諸子將以其卒之嵗合葬中書君之墓銘曰其生儒家其行靜嘉受福既多從其君子永妥於此何母周孺人墓志銘吾友萬安何敬自牧登永樂九年進士第留京師是年冬十有二月其母周孺人之訃至數日豫往弔之哀慟纍然不能起又數日請於朝將歸縗絰謁豫奉其外兄進士朱與言所為孺人行狀嗚呼泣拜且言曰願乞文銘墓而益悲慟哽塞言不能出口豫不忍聞受而答拜亦不忍辭也按狀周氏為萬安著姓宋著作佐郎愚叔數世至實實子均德皆為鄉碩儒孺人曾祖祖也父國才蚤世孺人生而淑慧幼從姆師通小學孝經論語列女傳諸書及笄歸同邑何玉彰何亦著姓孺人事舅姑以孝稱時元季兵亂﨑嶇奔走山谷間生計日迫而甘旨之供未嘗乏也姑疾扶持未嘗去左右煮粥湯藥掃除之事皆躬親任之疾劇籲北辰願以身代姑疾竟瘳舅沒于時甚艱窶盡力佐其夫理喪事不敢以簡時雨雪沍寒積隂不解葬之日豁然朗霽人以謂誠意所感嵗時奉享必豐潔處昆弟娣姒怡怡然孤姪無依者皆為之婚嫁家燬於兵後玉彰舉墜興廢悉復其舊孺人內助之力居多性儉素綺繡華麗之物視之如不見年五十喪玉彰孜孜以教子為要務親督其學不倦常語敬曰諸兄承家事汝宜力學以成先志敬亦勉勉奉教唯謹竟以科第發身諸子若孫森侍膝下皆恂恂無違故孺人晚節益康豫年七十五卒永樂辛卯六月草六日也子男五朂蚤卒遵欽恭敬女一亦蚤卒孫男四亷直簡節將以某年月日葬于某原銘曰婦道之良誠以為孝也母儀之方詩書以為教也既夀樂康報施有耀也子孫繩繩於此乎視效也康氏妹墓志亡妹諱靜端姓羅氏前進士德安府同知子理先生之子母夫人陳氏而余之同母妹也先生居官亷潔家甚貧吾妹甫晬先生坐纍謫陜右母夫人育訓之夫人嚴正於持家長兒女善秉法度吾妹天性純明孝弟又自幼涵浸家教用克備女德年十八歸康仲璧之子彥英為冡婦逮事其姑姑鄭賢治家秩然凡吾妹事長撫幼處族姻及所為衣服飲食咸當姑意姑有所欲為必屬之蓋終身愛重之不衰於內助彥英尤多訓飭其男女務實去浮長子榮丱角從吾京師戒之曰必往務學但視法舅氏毋忝比歸視其寖有志卓立喜曰庶幾吾子也其婦道母道可以無愧矣若其安儉約率仁厚皆非由學而能榮已被薦召命下而母卒其卒以宣德丁未九月十一日距所生洪武甲寅五十有九年子男三榮修幹女二孫男女若干將以卒之嵗某月日葬某原於乎先夫人遺所生男女四人吾妹最小乃今最先沒故余聞訃甚哀而述其平生之槩使榮納之於墓太夫人郭氏墓志銘都察院右都御史熊槩蒙恩贈其祖考某考直皆資善大夫都察院右都御史祖妣某夫人封其母郭太夫人制下之明年太夫人謝世槩具事狀請銘士竒於熊氏父子有同郡斯文之好又與槩同朝其父之葬也嘗銘之母之葬不得辭按狀郭氏故吉水邑西名族唐汾陽王之後有官於吉者遂家吉水代有仕者元國子學録諱子沖太夫人之父也母陳氏洪武中浙江分水知縣今封户科給事中名伯夔者其兄也太夫人幼慧而端長儉而勤年二十二歸同邑熊敬方敬方直字也敬方幼孤從母適胡因冒胡氏太夫人之歸也遭家益落而敬方致力學問且素志不在生業一切家事太夫人理之而佐敬方於胡氏養父母克致其樂父母沒葬祭一致其誠族姻閭里皆稱孝焉太夫人治家有禮內外尊卑秩然不踰篤於教子恆指詩書諭之曰此汝家世業曷可以墜敬方家居而從學者日益衆太夫人躬率子婦旦暮其飲食愈久不厭槩既仕戒以守身愛人槩請於朝得復熊氏喜曰兒能成父志矣槩厯中外皆顯官迎太夫人就祿養者將二十年太夫人雖貴且老而康和淡靜猶躬女事以率下見者靡不敬歎僚屬家亦有化之者初褒封命下拜受已顧槩曰天恩深厚若不勉務報效可乎既又戚焉語槩曰若父積善勤教致汝有今日而不及親見我何德乃生被榮恩言已澘焉蓋敬方捐館至是十有六年矣又數月語槩曰吾蒙福已厚今老矣豈當尚滯逺鄉而不念桑梓哉汝惟務忠為孝庶用光所生遂從少子歸吉水明年二月十七日以疾卒宣德辛亥嵗也春秋七十有五子男四槩棐槃􅙺槩永樂辛卯進士擢監察御史厯廣西廣東按察使召為大理寺卿升南京都察院右都御史有操有施為時重臣女一嫁徐彥襄先卒孫男十女七曾孫男女各一太夫人之卒也訃聞上遣行人朱惟貞賜祭且敕有司營葬朝臣自三孤六卿以下咸致祭可為生榮死哀而非太夫人善德何以致此哉銘曰維古女教有子道焉有妻道焉有母道焉維賢熊母三者克全既夀康寧光命自天熊母維賢沒且不泯劉孺人墓志銘澄江之南沙溪里劉君玉武之配孺人嚴氏卒其子鈞以父命馳書北京求余著葬銘嚴氏故西昌大家宋元時資産之豐腴第宅之𢎞壯奕奕特出若詩書科第之盛具見譜牒及名公卿文集孺人之父文明先生宋祕閣校勘朴山先生肅五世孫孺人天資純粹和厚自為子為婦為母家人未嘗見其一疾言一厲色初歸劉氏家良裕後數年坐稽徭役沒其産遂落孺人處之裕如辛勤佐夫植家服素食淡恬然自適於事長敬處族姻睦待臧獲如子凡所為表裏一誠蓋平生善德不間尊卑內外稱道不異卒於正統三年七月二十六日享年七十子男二鏞鈞女二長嫁楊炯次嫁蕭子理孫男二孺人之葬在其里興富之原士竒故妻嚴夫人孺人之同産弟也相友愛甚厚故以子妻鈞銘曰夫也失賢婦子也失賢母靜貞有常厥德允茂尚有餘慶式昌厥後楊母錢氏墓志銘永樂十七年十一月八日楊母錢氏卒錢蘇之長洲名家父國寶其笄也相攸以嫁同郡楊子允子允宋和王存中七世孫篤倫誼有文學懷用世之志未遂而卒錢氏婉而莊事舅姑極愛敬盡出資奩佐奉養躬儉勤以相夫裕家夫亡盡哭如禮而治家訓子益謹於夫之存也嵗時薦祭必嚴潔與夫之寡姊居相得如同産子翰𨽻兵籍遷武昌奉母偕行始至家屢空母泰然未嘗動意也春秋益髙益康強和豫而自少至老秉禮度如一日所謂恆其德貞者歟卒年八十有七子男二翰翥俱溫雅有行義女二長適貴州宣慰司都事顧禮次適金素孫男二女一翰翥以卒之明年某月日葬江夏長樂村練林之原先事馳書京師求銘余前二十年遊武昌與翥交間暇過翥必升堂拜母母喜其子以文事會友也待客久益敬自余去武昌所遇如楊氏一家慈厚孝友蓋鮮矣非本之於母哉銘曰是為楊令母之藏後百千年無或壞傷吳母葉孺人墓志銘中書舍人吳餘慶之嫡母葉氏永樂二十年正月二十五日卒於家餘慶時在北京奔訃將歸縗絰奉事狀請余拜乞葬銘葉氏家撫之宜黃系出宋侍郎某孺人父諱某母某氏孺人在室其恆德之名聞族姻間同里吳氏亦名家於葉有連為子擇配遂歸為吳某妻以孝事舅姑以敬奉君子以睦處宗族於治家勤儉於衣服饋食精潔而與餘慶生母余氏相親愛如同産夫嘗捐居側隙地畀從弟有竊言諸孺人曰奈何捐居地畀人也孺人曰畀弟宜也義不重於地乎言者為慚夫沒餘慶始四嵗旦莫切切保孤子為務數顧余氏言吳宗數百年之傳在此可不重且慎哉子年七八親教之孝經論語稍長出就外傅則躬督於內及壯出仕猶數寓書誨飭之可謂篤於母道者矣享年七十子男一即餘慶女二皆有歸孫男四渙濬江瀚將以是年某月日葬某原銘曰孰不為婦識義者希孰不為母教有弗知懿葉孺人行則兼有勒銘其藏表範其後胡母黃孺人墓志銘中書舍人胡寓繼母孺人黃氏卒寓介其同官鍾子勤余孜善來求墓銘按刑部主事陳彧所述事狀黃世家于漳之龍溪自五季迄元代有顯人父某藴德弗試孺人諱某自幼性行端淑慎禮度而饋食衣服之事皆精時郡學訓導同邑胡宗華以德義自重而喪其室詹氏簡求賢配遂聘為繼室既歸胡氏婦德母道日益有聞於宗姻間詹氏男女皆四人而三男二女尚幼愛撫之甚於已出有言其過愛者曰吾過愛然後人無敢不愛宗華嵗時薦祭用古禮孺人相事必誠必敬有歎其克孝者曰吾不幸不及養又敢怠於是乎宗華卒居喪盡禮而自是以禮祀祖考以學勵子孫益嚴於宗華之存也家僅百口寒暑朝夕衣服之給必均賔客之奉必豐公私之需帑廪之出入井井皆有條理春秋已八十猶躬勤率下蚤作夜息以治女紅子婦屢請少休逸曰人道當爾也卑賤者或有過從容導使改行未嘗作於辭色家庭之中尊卑內外藹然肅然蓋年八十有三而卒男女皆詹出男伯曰賔先卒仲曰宇中書舍人叔曰春栁州府學教授季曰遂孫男八敘偉璜粲冏矞敦某女十曾孫男二女一諸子諸婦日致婉愈之養寖加而益隆天倫慈孝自然之應夫何必已出哉其卒以永樂十九年五月十四日其葬以卒之明年某月日祔葬訓導之墓在南靖縣由義里鴻莊之原銘曰維孝維慈女德之綱維雍維肅為家之方治家于殷士或其難懿此儒人躬率之先亦既夀考而歸于全載覿君子中心孔安蕭孺人墓志銘吾友王嗣先既登第從事秋官四閲月聞其母蕭孺人之訃哭盡哀即日訴狀以聞俟命既三日成服詣余哭拜求為銘將歸納諸墓余與孺人長子敬先總角有同門之好今又與嗣先遊於孺人婦道母儀槩有聞矣不可以辭蕭故廬陵儒家父恕翁孺人年十八其父擇所歸以嫁西昌王古平王家世亦業儒孺人既歸為介婦長事舅姑盡孝敬未幾遭兵亂囏難謹奉養之禮一如平時不懈舅姑雅重之異諸婦恆曰願新婦子孫孝敬新婦皆如新婦之盡心於我也古平志恬曠不屑意治生事其兄弟有相結數困辱之而取其資産者古平悉推讓與之終不以利疏兄弟之親蓋出於孺人贊助之力居多其後家日益貧處之裕如而篤於教子嘗語之曰盡力畎畝者匹夫之業耳盡力問學君子之事也汝曹勉旃聞有陳心吾謝易暗前國子學録蕭執三先生者皆郡之通儒悉力遣其子從遊焉其子間以先生儒者從外來孺人喜動顔色傾竭所有治具延之即扺莫無復粒粟以炊不計也邑大夫聞敬先重厚有文舉為吏里胥持牒數下求之愈迫孺人歎曰兒曹治經術奈何從事刀筆發身哉言訖涕下如雨敬先懼走白其情邑大夫邑大夫賢之更以為博士弟子員孺人喜曰此吾志也數嵗敬先以明經舉為郴州宜章縣學訓導考鄉試於廣西被召預纂修翰林嗣先登永樂十年馬鐸榜進士克成孺人之志孺人皆及見之庶幾可無遺憾者矣孺人他行可書不止此此特書其大者其沒以今嵗某月某日享年八十其葬在某鄉某里隴頭山之原子男二即敬先嗣先女二長適胡次適周孫男四固􅍡輅辨女四銘曰孝敬之至夷險弗二宜于舅姑也式惇友悌舍利取義以相其夫也明識篤志成厥胤嗣奮乎詩書也嗚呼王氏綿綿來裔仰止範模也葛孺人墓志銘翰林庶吉士沈升聞其母葛孺人之訃請於朝將奔喪焉持所狀孺人之行來求銘墓余與升同官禁林五年不得辭按狀孺人之先宋南渡時有諱源者由相徙杭之海寧世為海寧望族父某母某氏孺人生有令質自幼謹女則年十七歸同邑沈某以孝敬事舅姑以勤儉相夫而起家元季兵亂沈君適喪其資孺人蚤夜孜孜治織絍協助於內衣食其一家臨利必顧於義沈君有異母弟嘗分財欲厚孺人曰兄者弟所依庇財奚以校也沈君喜厚讓之人皆多沈君之義君素負氣剛直遇不可意侃侃論辨見顔色孺人從容進曰德性貴有容且非逺咎之道君感悟頓和易不與物競尤急於教子遣從明經師學戒其必交勝已者嘗曰汝世家積善而未食其報天道殆不爽乎汝等宜力去浮薄敦德崇義以無辱世德其平生所行槩類此可謂賢也矣永樂七年正月十八日以疾卒享年六十有二沈君與孺人同生元至正己丑嵗方老而失賢內助何以為情哉子男三長謙次益次即升永樂二年賜進士出身授庶吉士時朝廷興隆儒術簡拔俊茂將成之於古人之地升與二十八人者同受詔進學於翰林庶幾所云食報者乎將以是年某月日葬孺人於邑某鄉某原銘曰士老而失賢婦子貴而失賢母嗟乎德之浮於夀也固將昌其後者耶顔孺人墓志銘太醫院御醫盛起東之配孺人顔氏既卒將葬其子儼以其父所述事行介翰林編修周功敘來求為銘按顔故蘇之巨族元季有諱天澤為義兵萬户能庇其鄉里免於兵禍其子諱濟孺人之大父父也母韓氏孺人諱妙定字懿貞生有令姿讀書涉大義自少以孝得愛於父母長為相攸是時郡名家宋盛文肅公裔孫稱寓庵名篤學有家範其子景華尤以好義樂善聞於鄉遂以孺人歸景華之子即起東也既歸不逮事其姑佐其夫孝養祖與父皆得其歡心而處妯娌和以謙待下有恩躬儉勤以裕家事大小必咨稟於家之尊長蓋自其家之尊長至於族姻皆稱其賢無間言起東繇郡醫學官擢御醫留京師即遣子儼往省且寓告曰士出仕即鞠躬一志奉君上不宜以家事雜思慮養親教子孫我皆任之儼至京甫一月孺人之訃至矣蓋其卒以永樂辛丑某月某日其壽四十有七年其子男五儼侃佖僎維夀女三長嫁莫霙次未行其孫男二夀安福安女一其墓在吳縣胥臺鄉黃山之原葬以卒之明年某月日銘曰溫恭靜貞其躬之華惇孝與睦式昭於家忠信相成君子之嘉於世幾何遽沒興嗟鬱鬱丘墳黃山之阿勒銘諸幽永終不磨劉母王安人墓志銘大理寺丞劉英聞其母安人之喪將奔歸自述事行請著葬銘余與英同郡素還往不得辭按安人姓王氏吉之廬陵人父本逹深於醫母某氏安人諱菊英自少清姿淑行父母相攸以歸同里劉仲倫時仲倫祖父母父母皆無恙安人共養致孝皆得其歡心惇睦宗姻內外無間言治家事有條理仲倫嘗舉孝亷任知縣安人留家居養親益篤飭勵其子於學曰非是將來何以立身撫孤姪男女如已出咸以時婚嫁闔門老稚戚疏下至臧獲五伯餘指衣服飲食之給各當其分舅姑沒相夫盡誠葬祭而居喪有禮英官於朝賜敕封父儒林郎大理寺右寺副母安人鄉里榮之安人後儒林卒之四年亦以疾卒正統己未三月十四日也享年七十有六子男二長即英舉進士今為大理寺丞有才行娶胡繼王次俊娶蕭女四王志端蕭禮獨景其壻也季蚤卒孫男七元亨利貞仁義春亨先卒女六曾孫男女各一英等卜卒之嵗某月日奉安人合葬於里西原山儒林君之墓銘曰孝敬以處下堂柔淑以嫓君子也服勤以裕家推羡以濟匱也騰聲蜚華嗣克振起也夀富考終顯顯蕃祉也康孺人墓志銘從兄思貽先生沒之九年配康孺人亦沒春秋皆八十有五豫時在北京聞訃驚慟蓋豫與先生皆少孤無他兄弟兩人最相親厚自豫仕宦不至家者四十年三年之前始蒙恩來歸時思貽先生沒已六年初至郊拜其墓豈勝悲慟然及家拜康孺人猶幸如見兄之存也豫留家月餘即行又三年孺人沒矣哀哉康氏家邑西郭文溪之上父天得母劉氏宋進士簡子之後有賢行孺人諱壽慈惠溫淑年十九歸楊氏為思貽先生之配先生諱肇字仲基家初甚貧而卓特有立志孺人安其貧且力助於內家日用裕於處宗姻長幼咸盡其分先生嚴於教子孺人承意而善誘於內恩義兼盡長子仕京師迎父母就養先生與孺人偕至同列榮之年七十有六先生捐館孺人益謹禮度而訓飭子孫不倦雖老康寧和豫正統七年四月十九日沒子男五長相舉進士翰林庶吉士刑部浙江司主事先三十年卒娶廖孀居守節事姑能孝孺人甚安之有司上其行詔旌其門命下而孺人不及見矣次旅娶蕭先卒次弼國子監學録次鵷次艮弼鵷艮皆娶蕭女一嫁蕭頌亦蚤寡守莭孫男十四奕奐畬翽經軾䎘畿縉翺畯畇紳􅀈曾孫男二孺人之葬以卒之嵗某月某日銘曰先望之明顧言思貽其年與䘵當過吾儕嗟嗟思貽允若所期嗟康孺人福與之偕猗歟休哉兵部主事劉君妻安人陸氏墓志銘兵部主事劉鉉宗器奉命修實録從余在館閣一日以疾瘳過余其色戚甚問之曰鉉妻陸氏死矣其賢有可哀者幸先生賜之葬銘猶不死也遂弔之且問陸氏之賢之實曰陸蘇之望族纍葉皆業儒於鉉之先世有姻好鉉妻之父用儀教授於鄉鄉才俊多出其門母許氏鉉妻自幼淑慎於治女事衣服飲食皆如法父訓之小學女誡即知佩服稍長屏去華侈奩具悉推讓女弟歸鉉不逮事舅姑而事鉉兄嫂加敬慎處族姻良厚自歸鉉其心未嘗一日不在父母之側居北京將二十年雖時寓土物上奉而每嗟嘆何繇得一日在侍下也輒泣下不已及其將卒也無他言惟以孤父母恩為不能瞑目地下平素存恤窮濟急之心鄰有衛卒入直惟婦守舍闕盜竊其皮裘者婦懼責欲死豫之直俾市焉有闕而産者窶甚頻豫薪粟又作繦褓遺闕有闕痼莫容舍者鉉哀而舍之會鉉及子病俱困闕人言於鉉妻曰此舍吏之過宜亟遣之答曰始哀其窮而舍之今遣之何歸人不各有命乎不聼已而鉉父子俱瘳鉉妻之行槩類此朝廷以鉉之久於職也賜之誥命并封妻為安人嗚呼鉉之妻可無遺恨獨恨鉉中道失賢內助且三男二女蚤夜栖栖號啼無恃鉉不忍聞此其所以為必請銘以庶幾慰生者而不泯死者也士竒聞而憫之宗器又曰鉉妻年才三十有九其卒以正統二年二月三日其葬以卒之嵗某月某日其墓在長洲縣武丘鄉袁巷村先塋之側其子男澄瀚滸女安清安正遂為之銘曰貞孝之履惻隱之施吉壤斯藏永綏來裔鍾母郭氏墓志銘中書舍人鍾子勤聞其母孺人之訃亟請於朝以歸將歸求余文銘墓余與鍾氏居同里且與子勤遊其弟子勉又余舅氏之壻也故孺人就養京師時獨數與余家往還時孺人年幾七十而康健和豫類五十許人洪範以康寧為五福之一孺人其幾之矣孺人姓郭氏世泰和人父某年十八歸同邑鍾原英生三男一女三十有四年原英卒居孀守莭治其家一如原英之不亡也教其子以善植身受學於里明師所以事其師之禮甚厚倉卒賔至質叉釧具酒饌惟恐不及子勤由鄉校升太學永樂元年擢為中書舍人人咸謂孺人之所成也明年子勤迎就養孺人居京師嵗餘遽歸歸嵗餘以疾卒永樂丙戌六月某日也生元後至元己卯某月日享年若干孺人稟慈善之性事上待下罔不謂宜尤急貧困樂施豫觀其終身所得要不止康寧而已男子猷次子勤又次子勉女適郭某孫男某某將以某月日葬於某鄉某原銘曰陶士行之貴也稱其母氏鍾母其於湛也庶幾是似將其後之昌也固有所自耶劉母曾孺人墓志銘孺人諱德柔姓曾氏故吉水望族父太永孺人自幼秀慧貞靜諸女兄弟皆不及父母愛之曰此不可以配凡子及笄嫁永豐劉季道劉故詩書家元貢士撫州路儒學教授諱竒相季道父也季道諱宜正博學守正孺人既嫁有婦道理家政井井有法季道以明經舉為起居注升浙江按察僉事坐纍至京師病卒而旅殯焉孺人挈諸幼自浙江抵金陵廬所殯之側期年乃克啓殯負骨歸葬故鄉自是以教其子不墜其世為務嘗取季道所遺書示諸子曰是爾父所用起家者奈何不勉諸子就外傅歸輒察其所誦習稍不習即怒曰是將墜其先人者矣諸子懼不敢怠既長皆明經為鄉孰師子欽選永樂元年江西鄉試第一二年廷試賜進士出身授翰林庶吉士得七品祿迎孺人就養四年七月庚寅以疾卒享年七十又八子男三人長曰忠次曰朂季即子欽女二皆嫁士族孫男十一人曾孫男一人子欽將奉喪歸擇是年某月日葬某鄉某原先期以狀請銘曰少為賢婦老為賢母而卒于夀曷以銘之永利厥後王母張氏墓志銘永樂九年夏豫兄仲基來京師語鄉邑親戚故人近况曰王存性恂恂守儒業無外慕之意愈益恭慎可重存性吾姑夫羅孟𢎞先生子壻不見之十餘年聞家兄言竊甚喜家兄又出存性所狀其母之行曰其志必欲託汝文銘墓汝其銘之以子之行如此固宜為其母銘矧母自有宜銘者乎按母姓張氏其八世祖湖南觀察使汝明顯於宋自是世為簮纓家至其祖某父仲晦皆隱德弗耀而其同産兄弟三人所性嘗為龍南縣學教諭所志為亳縣主簿所從道州知州其家世如此既笄歸同邑王以誠能以孝奉舅姑以恭巽事君子以勤儉殖家祭祀賔客之奉必誠必腆元季以誠嘗為千户所吏目被省檄捕盜每為好言勸以誠毋妄殺庶幾福善之應教子以讀書立身為要收育遺孤子皆至長有室家推有餘以濟貧乏久不怠其為行又如此既老屢受朝廷飬老之賜後以誠卒之若干年以疾終蓋永樂三年三月某日也享年若干子男一人存性也其葬在某鄉某原銘曰其出之良其行之臧銘于其藏庶幾不亡蕭母張氏墓志銘吉水蕭士柔狀其母之行走京師介翰林檢討解榮求文銘墓余辭焉解君曰孝子之志也乃為按狀敘次銘之蕭氏系出南唐御史大夫儼世家邑倚富為大族儼十五世至某生師文士柔之父也士柔母諱某同邑張某之女張故簮纓家母少聰慧端靜稍知書習禮教年十七歸師文為繼室事舅姑謹婦道舅姑甚宜之姑疾悉力奉侍久弗懈治家辨內外序長幼睦族姻粲然可紀尤勤儉善規置佐其夫祭祀賔客伏臘之費恆有餘裕元季所在冦盜充斥師文團結壯勇保障其鄉而冦猝至師文率子弟族人出禦之弗敵多戰死冦將及門母倉卒脫簮珥買舟携其娣姒姑婦出避曰婦人不可以辱也年四十師文卒居孀循禮以教子為務自舉列女傳以教諸婦買田八十畝遺子孫供祭祀曰無使後世不知重本也常戒諸子曰若祖及父積善纍仁若等宜紹先志毋茍循俗好以羞前人諸子亦皆謹謹服膺母旦暮坐堂上諸子若孫森森序列具甘脆奉觴上夀愈愈然樂也翰林學士同邑解公嘗過而榮之題其堂曰春暉朝之縉紳大夫皆為之文永樂六年九月二十四日卒年七十有一子男四人士益師文前室子先卒士秀士郁士柔女一人適周寶孫男九人以卒之明年某月某日葬於其里株木塘之原銘曰德修于身施于閨門已乎九原史氏有文詒其後昆東里續集卷四十
