body:
  text: 東里文集巻四明楊士竒撰序胡延平詩序洪惟我太祖髙皇帝神聖文武膺受天命有天下當時魁偉豪傑賢智才望之士雲附景從各効其用以建混一之功暨天下大定茂興文治廣徳敎徴用儒術以復隆古帝王之世天下之懐抱道徳藴蓄器能方聞愽雅之士欣幸遭遇林林而至者蓋比於書之野無遺賢大雅棫樸之詠也于時廬陵胡子祺先生以經學行義徴至京師偕入見者十八人是曰太史奏文明之祥上大恱皆除監察御史先生後陞廣西按察僉事又擢知彭州秩滿陞延平知府嵗餘没於官先生之任風紀也秉正直之節務持大體為郡守也敦豈弟之行而脩實惠藹然忠君愛國之誠憫然憂勤恤民之心彭州延平之人至今思慕之而不忘非漢宣所謂與我共此良二千石者歟先生有詩若干巻其子今翰林學士廣屬余為之序詩雖先生餘事而明白正大之言寛裕和平之氣忠厚惻怛之心蹈乎仁義而輔乎世敎皆其所存所由者之發也昔朱子論詩必本於性情言行以極乎脩齊治平之道詩道其大矣哉蓋自漢以下言詩莫深於朱子而胡忠簡公嘗以是薦之故知朱子之詩又莫深於忠簡先生忠簡之十世孫為詩固得扵家學者歟今學士遭逢聖明膺斯文之任而家學益著詩不云乎凡周之士不顯亦世扵此又以見國家得賢之衆士大夫涵濡聖澤傳世之顯有以同乎周之盛時也送胡永齊詩序胡穜永齊以其父命將自京師還廬陵侍養其祖母求余贈一言永齊生乎詩書禮義之門為延平太守之孫今翰林學士之子其得扵家訓有素余何言然與學士同郡同官久要且厚永齊又嘗從余㳺余敢愛一言而不為子傾倒哉子見夫木之為材乎其始依長山大谷深厚之地以託其本又有雨露風日涵濡昫育而無牛羊斧斤之戕害而然後挺特堅大可以棟宫室為舟楫成什器鉅細隨宜皆適扵用也不然牛羊斧斤為之戕害者曰肆焉而莫禦雖託本乎長山大谷深厚之地雖有雨露風日涵濡昫育要其生遂之意斬矣惡睹其成材者乎人之生幸遇太平無事之時且家居薫陶造就之有資而無饑寒勤苦之累惡可以自棄乎盖人之貴乎學也有仁義忠信以養其心剛健𢎞毅以立其志齊莊中正以恒其徳恭讓節儉以制其行前言徃行以充其智禮樂文物以飾其躬講焉習焉不廢扵造次顛沛之頃其久而益熟也無所往而不達無所用而不宜故君子者必務乎此彼有違道適情凡可以迷溺心志者皆吾身之牛羊斧斤君子者必務決去之不使一毫作扵其心害扵其身市㕓之子受十金之産扵其父謹謹愛䕶不敢失惡辱親也吾身吾親之枝也豈十金之謂哉故愛身必在務學務學必在力行不徒其言之為尚也勉旃永齊子英年秀質智足以明善學足以成徳由此而孜孜慎脩不已所謂沛然孰之能禦也永齊勉旃他日聞仁山文水之間有能以學植身必子也夫若是而使鄉人父老愛子者皆稱延平有賢孫學士有賢子扵吾交㳺不與有光哉故書此為贈朝之君子與學士交㳺而愛永齊者相繼為詩列于左方送尹能敬詩序去西昌東南五十里曰灌溪並溪南北居皆尹氏其世為鄉之望其人雋爽傑特多有用之器其老成愿謹吾心所熟者能敬甫表然者也能敬甫平居接人恂恂至遇事氣義磊落嘗歴渉憂患無一毫之戚於中至乎晚節仲子昌隆掇髙科揚歴清華人皆以為能敬甫榮乃獨不然方歉歉持恭遜以善𨗳其子孫曰勤不懈此其見之明志之素定者乎世之人遇小得失其中變遷盈歉無復故態者視能敬甫為何如今年春就養来此日與縉紳賢士周旋乎京師聲明文物之下甫兩月輙慨然自念吾奈何違吾親丘壟棄吾子孫之訓教而忘返乎即日戒行李就道其子挽留之不得竟去扵是朝士歎能敬甫之志尚逺也或曰古有所謂逸民能敬甫其近之歟而厚扵倫理孶孶焉要為合扵中行者故相率為詩送之以余同邑且熟也屬為序云送林教諭致仕詩序永嘉林士賢先生今年八十有九矣以分教邑學考績来京師書冣朝廷優異之陞教諭俾致事行且有日大夫士為詩送之右春坊大學士黄公屬余引其端古之君子學而成也其心未嘗一曰而忘斯世故或施之政事以利天下或推之講學以淑諸人人持必為之志恒久而不息不以强壯衰弱而或有作輟也盖曰天之所以畀我豈使自足其身而已存心之厚如此然人之所禀其聰明精力既老則衰矣雖其志篤勤弗懈而身不足以勝其事故先王有七十致事八十拜命一坐再至九十使人受之制夫人之生有不能七十八十者多矣况乎九十又足以勝事哉漢伏生年九十孝文欲召之而老不能行使掌故徃受經生不能正言至使其女傳言今林先生幾扵伏生之年而懐惓惓之誠以勤敎為盡臣職以育材為報君上耄勤不倦非存心之厚歟然清明康健馳渉川陸二千餘里述職京師趍進拜俯威儀翼如光膺寵命歸樂其餘年非盛福哉觀其身論其心詩而送之不亦宜乎送徐理問詩序吾友徐崇威自征商陞中書舍人踰年改陕西布政司副理問數月復改廣西崇威有䟽達之才端厚之行又嘗出吴楚道梁宋秦雍縱觀山川崇大之勢博覧古人興敗之迹充乎其氣廓乎其智將見諸行事也譬如駕長舟乗春流浩蕩而東而翼以厚風雖一日千里易易矣然崇威自拜理問之命其心常兢兢焉如有所弗任盖司理之職難矣人之生皆有惻隠之心士之從政也皆以生人為務然其有罪焉憫而宥之天子之所得為也司理之臣雖欲為之而非所得專也司理知有法而已知求當乎中而已其罪重也重刑之罪輕也輕刑之情出乎過也過罰之出乎故也故罰之刑罰不自輕也輕則由我縱惡亦不自重也重則由我濫誅此在天子猶慎焉况扵司理之臣乎司理者輕重不爽扵錙銖是非必適扵至公而非察之至明鮮有不失一失則為不勝任司理非誠難乎然能至誠以求之虚已以聽之權度精明敬慎不懈而哀矜惻怛之意不離乎中則司理之任亦未有不可勝者崇威行大夫士為詩送之余故推其說為叙以廣其意沙羡槀引沙羡楚壤也春秋之夏汭漢之鄂縣孫吴之武昌在焉晉以後因革不一而皆為江漢重鎮國朝置布政司臨之以總十七府州之治余弱冠而㳺也盖嘗踰大别泝岳陽觀洞庭浮湘水望衡山而還而憩此最久其賢人君子多與之交文事之討論篇什之倡和多與也今足跡不至者十五年舊交零落過半間發故箧得往年所為詩文百餘篇雖詞㫖淺陋無可采而懐故人之不見想山川之在目情之所存不忍棄也因稡為一巻題曰沙羡槀云永樂辛卯夏五月朔士竒書石䑓槀引嵗屠維單閼石䑓蕭徳蕡延余教塾舘石䑓在吾邑東南一舍所桃源里中里有溪溪有石䑓如砥容坐十數人故桃源又名石䑓里云環吾邑數百里其山水閎博秀麗其壤地肥沃宜耕稼嵗無水旱之虞者莫出扵石䑓而崇儒隆師又有耉老成人及多聞之士相與上下譚論之樂者莫出扵蕭氏余是時方幸来此從容優逸將用其志意以増益所未至嵗餘廹扵召命不遂所欲然至扵今其心未嘗一曰不在石䑓也當時所為詩文率出一時應酬或録或棄所録者此巻是已間一展讀撫嵗月之如流念舊學之不進不能無嘅焉扵中也因題之曰石䑓槀云永樂辛卯冬十月朔榖軒識長林書屋圖詩序長林書屋者文淵閣大學士兼左春坊大學士胡公之故居也在廬陵吉水之間前有金螺白鷺之勝後有青原石豅之竒夫容天玉墨潭諸峯嶻然相望扵左右而文江之横帶滄洲之演迤層阿複壠青林白石之廻抱扵旁近者實江南勝處也公世家扵此自其擢髙科陟清華其身之不至焉者殆二十年而其心未嘗一曰去此也間命善繪者為圖以旦夕接于目適于心而與公相知者又賦詩其端以道公之意夫古之仁人君子其處也未嘗忘斯民及出而仕矣亦未嘗忘乎其平昔丘園棲遁之適盖其所學必在乎兼濟而所自得扵内者不以窮達而有所變易也苟一朝得乎彼忽忘乎此沉酣溺焉變易其所素此其人可與有為者乎公少居扵此樂扵此久而不忘於此盖人之情也顧今遭逢聖明居斯文之首任寵待之隆千載一時也公於是時方圖盡其所當為者以仰答盛遇之不暇其暇乎望山林處士之適哉然則公之斯圖殆所謂寄意者乎嗚呼觀公之所存將公之所有成可見矣余知公有素三復此詩安得不以為士大夫道哉遂為之序蔡氏族譜序蔡氏西昌之望也中更變故其子孫㣲矣余少獨識月窓甫蒼顔白髮長身玉立翛然塵表時時從人道其先代盛時風流儒雅可敬可慕而今為可悲嘅也月窓没蔡之後獨有震亨兄弟在而震亨之考文玉嘗出後胡氏蔡之祀幾為若敖氏之餒矣震亨凛乎斯懼將復其初也而求其世譜已湮没不傳獨月窓先墓記自十六宣義得常而下有可稽者盖得常而下為十朋十朋而下為賢卿賢卿四子申甫清甫澄甫濟甫八孫志學志𢎞志道志逺志武聖傳夀傳性傳然自月窓没八孫已莫辨為孰之子今獨知聖傳夀傳性傳皆濟甫之子盖出劉尚書崧題愛山圖所云月窓則夀傳之孫文玉則某之孫也震亨據此録為譜將示来者其存心厚矣以其先嘗於吾家有連也求序之吾聞蔡之世詩書行義累累相望而特顯於濟甫濟甫諱源愛山其號也登宋寳祐丙辰文天祥榜進士歴官司農少卿湖廣安撫使政治卓卓搢紳間尤為潭州守李芾所知嘗薦之扵朝其所居地不知幾易主至今鄉人父老過者徘徊嗟咨曰此安撫宅也嗚呼盛極而衰衰極而復天之道也蔡之後將不有復振者乎君子之澤譬諸大木立乎髙山曠野疾風炎日氷雪之侵凌益久益深其柯葉條幹隕折幾盡幸其本之存也一旦乘太和之氣有不奮發而復榮者乎傳曰公侯子孫必復其始蔡氏之後其必務學敦徳以待之哉是為序送蔡孟愷永州教授序廬陵蔡孟愷清修苦行恒轗軻落落不偶扵世然其心未嘗不自得也負氣義夷險不貳與余外兄陳仲述為同門之交仲述博學守道非其友不友顧與孟愷相好也仲述家故貧為監察御史十年没時惟一布被猶讀書郡齋所製一子賞未齓也䘮其母依養於叔孟愷過之愴然有動乎中指賞告其叔曰子善撫之吾有女以妻焉所親難之曰孤寒之孽其終有立乎孟愷曰吾誠不忍此故人之子且安有仁如仲述而其後不立者乎卒以女妻之於乎今之人以貴富勢利相交處失其貴富勢利則東西散去為楚越者恬不為恠或有一人焉不為此慨然欲脩古人之道則相與聚笑而愚視之扵是其習愈倍而去古愈逺求如孟愷者何其少見也孟愷今奉命往敎永州郡學其兄子吏部主事學淵求諸能賦者作詩送之又求余為序今之所謂敎官者能從事扵文藝則善矣有尚論其躬行者乎是以輕彼重此違本逐末靡然而從風久矣夫能修其身必能推以淑人能厚其友必能推以事君孟愷徃焉盡為臣之節明敎學之本所謂舉此而措之者耳故畧述其行以示永人使舉此可以知其餘他日永之學者有文行可稱本末兼舉必出吾孟愷之門乎送蕭善本序自余来京師十有五年扵文溪武山之域父兄之鄉吾少壯出入嬉逰之處未嘗不在余懐也而遭逢聖明叨軄近侍恩眷隆厚然材薄識陋不能効纎芥報稱日懐愧惕之不暇顧敢言其私哉而比年鄉人親交有至京師而過余者昔之壮者皆已蒼顔而華顛矣昔之童丱者皆已翹然楚楚矣而敬問吾父之執焉盖淪謝既盡不能不嘅焉怊悵也前三十年余所往還講學今存者不三四人幸皆仕京師時得聚處討論相益以寛鄉邑之思善本亦當時所與還徃者近嵗始来為太學生無㡬輙以使命出再嵗而還還數日又以展省歸未嘗一得從容盡意也臨别能無情乎雖然子歸而過縣門之南徘徊龍洲歎嘉應之不爽而觀扵其人復有繼今而起者乎又過髙漚而試聽焉將有鏗然噌吰而出者哉又南望三顧之山而物色焉復有繼蕭清節髙風逺躅者乎有之而賢者將出其門乎其必有以慰余之思贈蕭照磨序余總角就學與子敬同師入同講習出同嬉逰相得也子敬資性嚴厲尋常不妄言笑朋儕一語不合不能容輙靣斥斥已雖無宿怒意然人未嘗不私怪其過剛也子敬年十四五出㳺京師後二十年余至京時子敬洊歴艱險道萬里而歸授鴻臚序班余竊意其所謂剛者必已摧折無有而變為和柔巽懦矣與之處察其所發固未嘗變也凡所還徃莫或敢規之者獨扵余冣故余時規之雖少止無㡬復然矣豈其中所養者直故不屈於外耶抑根於所賦者一定而不遷耶夫君子之剛以直乎内盖本扵道義之正所謂浩然之氣是也而發扵外者固雍容不廹無所乖戾而適乎大中所謂性情之正也士不務出此而徒肆意以行之傳不云乎心有忿􅓰賤惡則不得其正夫以是感之亦必有以是應之者矣古之人所以為佩韋之戒也子敬今除髙州照磨相去數千里臨别無以為贈輙舉其所切諸已者告之山城務簡時求前言徃行以致涵養之功焉萬木圖序萬木圖者右春坊右庶子兼翰林侍講建安楊榮勉仁昭其大父達卿先生之徳示其後之人也先生有孝行扵為善施義汲汲焉然不喜以施名以為受人之施者恒有愧恥為辱之心而不自慊也夫施扵人而使其心愧恥為辱而不自慊猶不施也必使受吾之施者如其所當得如無與扵我而即乎其心之安庶㡬可也元之季世兵戈饑饉民困窮凍餒無食至相食以苟活雖父子夫婦相視不能相保䘏所在皆然時先生藏榖甚富將發廩振之指某山號扵衆曰有能相吾力樹木者乎樹一木予榖若干願相吾力者先予榖扵是争願出力来請榖既悉飯之乃如所言願樹木多寡予之榖不籍識其姓名卒亦不視其功而所活不可勝計矣先生之樂施何其忠厚委曲而周備歟居數嵗木鬱然崇茂悉中扵材先生指以戒其子若孫曰不自意今之盛如此也其母苟自為利將有為學宫為釋老之宫為橋梁及津渡之舟而需材者給之有貧欲為居室没欲為棺而不得材者給之母茍自利也扵是所施利益多矣時福建行省左丞阮徳柔聞而髙之命工作萬木圖表之搢紳君子多為文若詩紀之詠之既皆失扵兵而其子若孫佩服訓戒至于今不違然欲其後世皆佩服不違此圖所以繼作也嗚呼始先生知施榖而已知求受施者即乎其心之安而已豈計樹之木後當何如哉而受施者必盡力焉不可以茍盖天理之在人心有不能已也先生所存如此惜乎其僅施扵衰亂艱虞之際畎畆之間而徒布衣以終其身也不然使遇治平之時得一命為所欲為所施利不其博哉如其後之人能世承其訓推廣是心而行之不已焉其扵施利固又博也是用告諸其来者南窓吟槀後序臨川吴景南先生南窓吟槀四巻吴故臨川儒家先生當元治平無事之時既髙蹈不出用其精力扵詩以自適夫幽逺静貞之趣其授受有自又有吴文正公序之是以其詩之傳也久矣而刻板既廢扵元季之兵洪武初其孫思明得刻本扵金溪以歸于兄思清思清傳之其子今國子司業溥司業君之徒鄉貢進士吴克彰為重刻以傳余嘗過司業君獲拜先生之遺像嶷乎其山之立也粹乎其玉之純也温乎其春之和也翛翛乎其出扵塵埃之表也夫其見諸外如此扵其中之所存者可量哉盖又聞諸司業君先生履善蹈義其介凛然必擇而後交而見諸言與行者藹然一由扵忠厚至扵所以植其家裕其後者惟詩書徳義焉耳嗚呼所以為先生獨在扵詩乎而至扵今司業君四世矣篤實剛介之操持之愈久而愈固盖考其源流之正而君子之澤深且逺矣孟子曰誦其詩讀其書不知其人可乎故為引諸巻末使讀詩者併得之康氏族譜序西昌東南五十里曰深溪溪之上有世家曰康氏其文獻繇宋至今承續不絶其初本匡氏仕南唐為蘄州刺史曰稠者歸宋避諱遂易為康稠之孫抃英宗朝舉進士為南昌尉抃之孫訓為國子助教以直言為秦檜所惡遂棄官歸訓曽孫景材仕理宗朝為鄢陵令弟景明度宗朝為桂林府同知景材孫時可元皇慶初為廣東儒學提舉景明之孫宗武從學吴文正公明三禮為天臨路慶洲書院山長其從弟宗正國朝洪武第一科進士官至丹陽知縣宗濓舉明經由教官改常州魯橋廵檢而族之人脩儒術持行義者猶多盛哉康氏之宗乎泝其先唐貞觀中有諱胄者為吉州判官過西昌之祁洲樂之遂留家焉胄二子琬珏琬之後徙安成珏之孫曰常五子垻坊坎垍圻始徙深溪則稠之曽祖也祁洲在今淘金驛東五里有匡家坊余前四十年嘗過之匡氏合族而居尚百數十人皆珏之後也亦皆謹愿敦樸務農桑而詩書禮樂之風視深溪邈乎懸絶矣豈其漸習之異歟抑如木之有本其生意發達獨厚扵一支耶凡物莫不有本人之所以貴扵物者能敬其本也匡氏出魯匡宰句湏以邑為氏康出衛康叔以諡為氏不可以殽也夫屈扵勢而去之茍可伸亦可復也今祁洲無氏康者矣深溪世多聞人君子扵致敬其本之心吾知其惓惓也而至今未有宣言復之者豈其猶有所屈乎先大父兄弟皆與慶洲君相交莫逆伯父吏部公扵丹陽君有同年之契宗濓又嘗與余徃還仲矩則余姑之夫也故巽初之續為此譜也以世好求序披閱再四余安得不景仰其先而重致望扵其後哉送歐陽允宣序吾邑故家亡慮數十姓若今合族而居有數千指之聚旦暮堂上下㑹集有數世尊卑之列有漁稼之樂有園林山水之趣有祭祀賔客伏臘之資詩書禮義之有襲賔興仕進之有繼者數十年来盖曰歐陽氏歐陽氏與宋文忠公同出唐率更令詢初由廬陵徙萬安又由萬安徙泰和之蜀江扵今二百餘年矣余弱冠交允堅允清繼與允賢往還相求麗澤之益今又與允俊好也允堅初領鄉薦為學官又嘗佐邑有民社之任允清亦舉明經為學官允賢領鄉薦兩為郡敎授今助教國子允俊登第為庶吉士于翰林歐陽氏之兄弟盛矣他姓兄弟有盛者不皆出扵合族而居不皆以經術發身也盛哉歐陽氏兄弟乎今年春允宣以運賦来京師間從允俊過余觀其色知其厚也聽其言知其通也問其所治則養親慈幼以及公私之百務皆其事也夫歐陽氏之家處者固有所恃而不慮乎外而使仕者有所恃不慮乎内非為有允宣乎允宣雖不仕譬諸材木之用行之為舟輿居之為室屋較其功要皆曰用不可無者豈得以彼而加此哉允宣將歸允俊求余贈之言故為書此送禮部侍郎儀公致事序禮部侍郎髙密儀公以清徳正學洪武中自敎官為寳慶知府永樂二年詔選東宫官遂陞通政兼右春坊中允無㡬又陞湖廣布政使三年入為禮部侍郎又奉詔侍皇太孫講讀公之為郡為藩也惓惓宣上徳咨民隠寛平忠厚有仁人長者之風其佐春官也詳扵典故達扵政體雍容直諒有大臣之度其為輔𨗳也端莊嚴重非聖賢之道不陳懇懇老成忠愛之意今年八十奉勑致仕天語褒嘉龍章輝煥希闊之賜也我國家用賢使能而凡任大軄膺重寄者必付諸惇實端重之賢如其材徳既足以勝事而稱任則禮遇之加逾久而逾盛考公平生本之為徳行施之為事君治民之實一皆君子之事則所以迓承天寵者豈無所自哉今歸榮扵鄉曰與故人賔客懽聚談詠以樂太平之世𨗳其子孫及鄉人後學讀書明道以成徳器皆將為國家之用閒暇臨清流䕃茂樹睇春榮扵緑野招青山之白雲公之樂何其超然物表哉扵是尚書夏公暨諸搢紳大夫皆賦詩贈之余謹述國家所以優老敬賢之實與公之厚徳盛福不徒以為其鄉之榮而可為天下後世道者引諸巻端陳氏族譜序西昌陳氏有二族其一五代時諱暉者自金陵徙其一宋季諱雲仲者自廬陵之武岡徙自金陵来者子孫為盛盖於今二十世其居已久積而發之也多自武岡来者裁八世其居未久積而發之也遲遡武岡之先出漢文範先生六世孫逵仕晉為長城令因家吴興吴興之後有諱洽者仕唐為秘書郎徙閩之劍浦劍浦之後諱貞者稱栖衡處士又徙温州之平陽處士十二世至廸功郎崇忠生渙齡宋郴州桂陽主簿入元改吉州路儒學敎授其子浚源家廬陵武岡之陽遂為廬陵人浚源子四人仲子雲仲贅西昌羅氏遂為西昌人雲仲生文勝文勝五子仲子原夀號碧潭碧潭生民燾觀定民燾生一敬洪武中舉孝㢘為荔波及賀縣丞觀定生彦和彦和生徳遜徳遵徳遵名循永樂乙未進士第一人及第為翰林修譔西昌科第自宋至國朝彬彬乎盛矣而第一人及第實始扵循發遲而𢎞者理之固然也武岡而上其譜見扵文勝之孫觀瑞所傳一敬始斷自雲仲以下著西昌之譜至是徳遜俾徳遵以西昌譜求序余與陳氏宗族同里閈一敬忠厚樂義其卓識逺畧度越羣輩佐治兩縣皆得民心徳遜温雅惇行徳遵履操端㓗皆余所敬愛者也苐念一敬平生故人少之時相輔以學有莫逆之契其罷官家居也約余買田築室東臯之上將耦耕以終老既先後皆以徴起不得如志而在京師相聚處半嵗公務之暇相與譚詠酣嬉而㤀其身之在客外也一夕就余家奕棋飲酒翛然而没扵今又十年矣睹物興懐其能自已乎故因序此譜併致余情云耳送曽存善序同邑曽存善篤實和易謹持其身遇為干紀倍道之事輙掩耳避去鄉稱善人今年五十矣未嘗有一日憂患之干其所得稱其所存非善之報施者歟有以其材舉者徴至京援例得歸来告余别嗚呼吾常不忘吾鄉之俗惇務詩書父兄必𨗳其子弟以徳子弟必率其父兄之敎而富有力者皆惇扵禮貧賤者皆能不失所守而勤扵其業有老死足跡未嘗及縣門下者其俗如此所從来久矣自吾出而道數千里之地目之所及其為俗不逮吾鄉者多也然吾少扵鄉壮扵鄉既壮而去之今且老矣吾鄉昔之老者亦且盡矣安知夫今之俗其不渝於昔否乎盖一鄉有善俗則一鄉之福子歸因吾所陳而試觀其何如焉東里文集巻四
