body:
  text: 東里續集巻七明楊士竒撰序送鄧訓科序永樂十年泰和醫學闕官邑大夫舉鄧遷請命于朝太醫院試之曰能遂以為泰和醫學訓科將歸其所與姻好鴻臚序班蕭子敬求余贈以文盖以余與之同邑也鄧邑中故家其先宋之時有興舉神童者詩書簮纓世不乏人元之時有子方子静兩先生惇徳碩學雖不仕隠然名動江鄉之間所以冠冕儒林儀範後進至今灼灼著人耳目皇明統御天下文運丕顯四方俊乂争先奮躍願效用於時吾邑之士翕然雲興而杭州府通判楊自立先生徳安府同知羅子理先生四川鹽運經歴鄧崇志先生尤以清脩苦節著聞時稱為楊羅鄧鄧氏又有大椿先生崇雅先生相繼而出雖其位崇庳不同而清潔之操炯然相映者盖未嘗不同焉於今獨崇雅先生巋然而在雖以疾廢然老成典刑尚有以為鄉閭斯文之重可謂鄧氏盛澤者矣况又有如遷者繼踵而出乎今遷雖以醫見用於時夫醫聖人之教而人之生死繫焉此其術不可以不慎也子為詩書簮紱之裔又有温厚秀敏之資吾知子之必能慎也夫能慎乎此亦足以紹家聲而不忝乎國命矣子必勉之子歸而見崇雅先生其為我道嚮仰之意送李昌明詩序風俗之能移人尚矣自中人以下為善為不善未有不由風俗之化故鄒魯之儒風江漢之好游皆其俗漸陶薰習而然非鄒魯江漢之人其性獨好儒與游而天下之人不能也吾廬陵古揚州之域杜佑稱藝文儒術斯之為盛盖廬陵人表然者矣其家說詩書人服周孔益乆而益盛此豈他邦之人其性有所不能哉惟其俗漸陶薰習非一日之積為士者皆知所自勉是以他郡之人不及焉然則士生於廬陵幸矣其可不自勉於其身哉吾家去郡城不百里聞李伯葵先生兄弟乆矣而未識也來京師見學士解君侍讀胡君道其行義學問為多今年先生之子昌祺舉進士為庶吉士進學文淵閣挺特不群勵操行能文章予固重其有所由矣居數月先生中子昌明道二千里來省其兄温然其資恭然其儀予數過之見手一巻未嘗釋也亦愛重之未幾昌明以曠定省告予别而歸且出諸君子所為贈行詩巻求序則告之曰夫生于文獻之邦書禮之家入有賢父出有善俗薰炙濡染宜子之兄弟英英卓出也然不宜自足而不勉諸其身是行也子孝弟之心可見矣孝弟者行之本也語曰本立而道生勉哉昌明使他日稱昌明之賢曰此廬陵之産也豈不偉哉送陳碩望先生序吾邑陳碩望先生持端潔之操藴通博之學擅竒偉之文弱冠舉進士出佐百里之治於興寧善政施焉善教行焉既去之二十年民猶至今思先生不忘後謫南徼雖武將悍卒皆知先生可貴重不可䙝慢聲望益著逺近慕其徳義而求其文章者日繼踵于門既還其鄉鄉先生耆徳宿學者多已物故或宦遊在外惟有郭子益先生與陳先生兩人在矣郭先生洪武初嘗徵詣闕下以目疾罷歸杜門守道非其人不接也陳先生方以啟𨗳後學為重從學者有不逺數百里而至三年階髙科而登者愈多矣今上咸和萬方篤志稽古禮文之事永樂四年春悉徵天下名儒以事纂脩先生與焉至則老矣例得賜環行且有日矣方先生徵詣公車也吾鄉之學者咨嗟悵怏如失所憑恃如遂倀倀無有所啟發則今聞先生之南轅也吾意其歡忻鼓舞拜上之賜踰越恒情可量哉盖人之學必有師師得然後道明道明然後由之則可以善其一身推之則可以善及乎人人事君也可以致君治民也可以澤民師道之所成夫豈細故也使陳先生歸而盡發所藴以為學人志士之資將來有出於吾鄉徳脩而材達功建而澤流者人皆曰此陳先生所成也是先生雖退不尚有裨於時甚博乎翰林庶吉士歐陽俊嘗學於先生樂先生之歸告朝之大夫士作詩送之余先生之外弟也故具述所由以引諸巻端送郭推官序先王之制刑非所得已也人之生有氣禀清濁厚薄之不齊又有習俗之異也故制為教化之法以一道徳而同風俗然天下至大也生民至衆也有從焉有違焉則又制為刑法以警懼之使之去彼而即此盖出乎不得已也先王何其愛民之深而制法之備哉我皇上臨御以來惓惓宵旰念生民之命至重也罪之罹于大辟者覆奏必至四至五察辭閱實瞭然無疑而於天理人心必不可容者憫焉哀矜而與衆共棄之如其有纎芥之疑則曰寧失之不經而每嵗數降徳音戒飭司理之臣以欽恤之意尤深切也如此而職司理者猶有不體徳意致訟弗得其平民之弗當乎罪此獨何心哉吾友郭彦遷為瓊州推官勤於職覈於事達於理敏於斷於是滿兩考矣三州十三邑之民皆愛服之廣東之藩臬二司泝而至天官皆書其績曰能彦遷所為非能上體徳意下當人心者乎不然何以致交譽之如此也吾與彦遷游自髫齓以至于今知之有素為人温厚謙慎又出乎詩書簮纓之家薰陶之熟也如使天下司理者皆彦遷上之澤焉有不下究下之情焉有不知所警懼趍向哉今彦遷復還其職將以滿其三考也然吾聞之行百里者半九十盖謂恒情率怠於垂成而終事之難不可不致其力也則夫謹宦成之戒持終如始以永休譽者固彦遷所當務哉詩曰靡不有初鮮克有終君子盖慎之矣余與彦遷别七年今相見未幾且復别故重朋友責善之義既樂頌之又祝規之送梁教諭序梁氏吾世婣家本之自幼至今篤於事親自父母至於閭巷皆稱之曰孝愛兄弟之子如子推所有以周婣戚之貧者益乆不倦擅經學有淵源負剛直之氣勇於有為嘗訓導瑞州府學教諭溧陽縣學兩學教乆弛諸生不自振本之至力作新之自是選科第進者皆接跡矣在溧陽五年積俸廪倡邑人脩廟學之圮者煥然増其舊觀豈非才徳兼有者歟今以丁外艱起復改瀘州納溪縣教諭繇泰和至納溪五千里川路之險絶天下本之上有七十之母其長子官侍近今扈從在北京獨幸本之得禄近地便娱養又違之而逺去行道觀者猶有不忍之色而况孝子之心哉故本之遑遑乎斯行者迫事親愛日之誠天理之公也余從而解之曰凡人出䖏得失其各有命孟子曰行止非人所能君子以義安命所不可必於已者盖無容心也易曰官有渝貞吉出門交有功夫渝得其正何徃不吉誠不係於其私何徃無功吾且為本之賀雖本之志在其親而不在乎已夫敬其身謹其言行勉焉效諸功業以光承國家之命以榮樂其親者孝之大節也孳孳乎旦莫起䖏飲食之奉末矣君子亦務其逺大者哉况有子能敦詩書之習承賢父之志旦莫起䖏飲食之奉有賴也本之之心可以自慰矣然本之誠孝人也士百行莫加於孝世之任教職者茍治於文藝衆則以為可矣求文行本末並舉如吾本之盖寡見也納溪逺方之學者一旦得賢師獨非幸歟夫得賢師而不力於進脩以臻有成其果於自棄而何以仰副朝廷教育大徳哉吾既以解本之又欲以勉納溪之學者故引於諸賢贈言之首送周添彰序國家興學用儒之盛古所未有内自都畿外至遐陬絶域萬里之徼凡郡縣莫不有學每嵗郡縣之學貢其成材者上於太學率二千人太學之六堂肄業者率數千人學舍至無所容太學生嵗以次歴事諸司而官之又有進士之科以簡用太學及郡縣學之生而比年繇太學生繇進士發身者多上所親擢内之為給事中御史六卿之屬外之為縣令郡守有為布政使按察使者所以隆奬儒術何其盛也士生斯世茍有尺寸之具孰不慶幸願效用於時况躬被秀民之選承教育之恩者哉郡周添彰自廬陵邑庠生充貢入太學歴事禮部當授官矣拳拳念去其親亟請歸覲焉人之行有大於此哉添彰升堂拜慶奉觴介壽足以為親榮退而與昔羣居之士道聖朝之盛事士有篤學而尚志者其不躍然興起哉詩曰鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈於添彰之歸吾三復此詩以致望於廬陵多士焉送康遇𠂻赴栁州衛經歴詩序經歴幕寮之長而衛之幕尤難於他司盖指揮使至僉事皆起身軍功於凡政務設施緫其綱視其成而一理之於幕栁古百粤地去今京師數千里與蠻谿獠峒接壤軍務之繁尤難於他衛又其四時地氣不常特異於中州遇𠂻拜命而去視其色怡然無不堪之意豈遇𠂻之心獨異乎常人哉遇𠂻自少讀書鄉校已能持守不逐流俗睢盱淟涊以茍利雖窮蹙不少變及來太學歴事都察院夙夜敬慎勉勉不懈持潔清愈勵衆迂視之遇𠂻獨以為當然盖其心異乎常人乆矣孔子曰得見有恒者斯可矣如遇𠂻非有恒者乎夫充是心無所徃而弗濟斯行也吾見其易不見其難也雖其地氣不常然持其志積誠而不已有自勝之理亦在我焉耳余雅知遇𠂻故其戚監察御史王鉉求余文贈之又求能賦者繼于下方送監察御史曽本清詩序風憲之臣國家耳目所寄綱紀之所由肅百度之所由貞也古之任此職者必得㢘重明公守道不回者而後授之是以風憲之臣所至善者有所恃而安不善者有所憚而格後世風憲或雜匪人而其所至善者無所恃而益危不善者無所憚而益肆盖由其非㢘重明公守道不回而冐焉䖏之者也夫有正人之責者必先正已正已之道必自無欲無欲則所存者明存者明則所施者公而然後有以畏服人也㢘耻道隳乆矣士之仕能以無欲行道什盖得三四不能者率六七為風憲亦槩然也凡仕者之不能風憲得舉正之風憲有不能於所罰之典加等示懲國家於用人圖治惓惓激勵之如此而士猶不知所自重是果何心也哉入國朝吾西昌之士為御史者九人始王子啟而陳仲述繼之子啟沒四十餘年仲述亦三十餘年至今其所過之䖏人誦道其善嘖嘖吾鄉老長亦恒舉其行事為子弟法四方士君子亦共推此兩人為吾鄉之望不賢而能得此歟曽泉本清舉進士為庶吉士於翰林有年今授福建道監察御史當之南京本清果毅明敏志於有為鄉薦紳先生皆期望之曰是必能不沗風憲不沗科第翰林所出者歟必能不忝王陳二先進及西昌者歟於是侍講學士王行儉相率分題賦詩贈之余其所為主者也故引諸群玉之首送余通判歸泰和詩序國家仁民之政擇郡邑之吏為要邑視郡尤親於民然舉世所病剛毅者或失之急巽愞者或失之不振有矜物之心者或局於無施有馭衆之才者或堕於無守民未必被澤也長民者誠本乎仁確乎志明乎理人之道通乎古今之故悉乎事物之情斯必有及民矣吾泰和素號忠義邦禮讓之俗厚文獻之傳逺近自宋元至國朝之初所得賢長吏歴歴可數三四十年吏之人品不齊俗化不能不因之移易皇上臨御之三年興化余君叔炫以進賢政滿用績最陞吉安府通判掌泰和縣事君和夷質直氷檗之操堅若金石而一志保民恪勤夙夜胥吏毫末之奸無所容上官勢要一不得干以私素阿䛕險詭把持揺撼之徒咸歛迹以避閭巷畎畝帖帖焉安於無事為縣如余君盖於今絶無而僅有者郡太守四明陳侯治行為江西十三郡之最其於屬邑獨加禮余君之賢比以考績來京告士竒曰余君浩然有歸休之志余君去即邑之百弊皆復後邑人之至京者亦皆言余君浩然有歸志余君去即百里之民皆失所矣言已皆若有戚色無幾余君以覲來士竒勉之曰皇上選擇賢良付君泰和奈何欲去郡侯與邑民願君之乆於位也如出一口奈何欲去余君黙不應已而引疾白天官卿求退甚固天官卿亦固尼之盖尤知其得民之心也非余君誠於中積於行何以得上下之重其去如此哉若前史所稱循吏視余君何有間也余君今復歸泰和吾故次第其事作詩送之并致有終之祝云送王教諭之象山序王效先嘗從學海桑先生陳公於予為同門始余事小學效先已冠下筆為文章滔滔也效先學成余亦漸長各東西散去不相見二十年今余竊禄近侍效先以佐教分宜縣學滿三考上京師得握手相勞苦申間闊雖效先論議志意不改於昔時而斑白照映容色枯槁於是其年五十餘矣則思余之年亦非壯也而學無一進徒然濫士名玷時寵上不能有裨於時下不能措其身於寡過之地念先生之不作撫去日之如流其何能不有動於中哉效先雖栖遲下位是來也有司上其功天官最其能陞象山教諭夫施於事而有稱受於上而無怍余豈能無愧歟然古者學校之教文藝末矣而今論學校之士徃徃視其文藝而髙下之而其最下者有廪養十餘年不能吐一辭此豈其資不及哉盖師道之不立師道之不立則講學不明講學不明則士不審於趍向欲振起而作新之必自師道始師道立則講學明講學明則士之趍向定雖欲追蹤古之人為無難而况文藝之末乎徃哉效先尚本諸其身乎本立於已而謂有不行於人者否矣效先行求余贈言余重同門之義故書今之所急務者以告效先亦有以䖏我乎送王知縣致仕詩序永嘉王時中事太祖髙皇帝為廣陵華亭丞事上為光化令時中自為國子生已能額額樹立起才譽至臨民為政清慎愷悌有及民之恵其民安之後坐累謫交阯民老者數十人出三千里匐伏請於朝乞還時中時中之甥右春坊大學士黄淮時在上左右亦以為言有詔召還既還朝廷雖知其宜於民然視其貌老氣衰不宜重勞命以前職致仕所以禮待之厚矣儒者有言事君不患無禮患其忠不足耳皇上宵旰勞勤以安民為務然而典一鄉一邑者求能盡心致力庇利其民以不負任使如時中者鮮矣則所以承被厚恩非由盡已之所致乎今歸故鄉依止桑梓日與家人父子兄弟頌祝聖明以伸感荷之意與鄉人長老觴詠酬酢以樂太平之世與後生俊秀講論孝弟忠信以厚俗化靈臺熈熈萬慮皆静即天民至樂復有過此者乎其行也翰林檢討潘畿以同邑之好求大夫士為詩送之而以首簡屬余故次第所由來以為先生慶且以告今之為郡邑者宜務盡其在已者云送李孟謙訓導序廬陵李草堂先生之季子孟謙訓導分宜縣學官滿調安慶府學且行大夫士作詩送之吾友胡存淵屬為之序余雖初識孟謙然童丱時侍海桑陳先生入郡城獲拜草堂先生清偉凝重博學篤行近年先生冢子石埭教諭孟昭被召纂脩永樂大典與余同在翰林孟昭端厚温雅文行表然孟謙為李氏令子弟又嘗從游海桑先生經明而行脩其在分宜也盖學者恱而歸之夫導之而後善警之而後從自中人以下皆然故建學必重於立師安慶畿内名郡其山川秀厚又余忠宣公過化之地其人宜雋爽識所趨向今又得孟謙為之師表率而啟廸之安慶之學夫安得無所成乎孟謙之道行固父兄之榮也孟謙勉之送陳雍序聖天子龍飛之明年詔翰林之臣脩永樂大典盡出中祕書又廣求天下載籍而統稡之包羅天地囊括古今浩浩穰穰盖自有書契以來篇帙紀載之富未有若此之盛者矣又明年悉徵天下博聞之士入預纂脩又簡太學郡縣學生及秀民之工於書者以職繕寫於是天下文藝之英濟濟乎咸集於京師而出入禁闥日食大官又有駢蕃之賜夫士遭明時預稽古制作之事而翺翔乎聲明文物之㑹豈非千載盛遇乎而吾西昌之學以能書與於斯者陳雍曽貫劉選三子者可為遇矣而其居鄉校也皆嘗有志乎學雍來京師主吾家雍之心未嘗一日忘其親䖏人必信臨事必慎亦學之力歟夫學之方在致其知識知之不豫則昩厥趣向而無以明乎善知所趣向矣在勉於脩為為之不力則無所持循而不能誠其身雍庶其知之矣乎茍知之而不為之猶未嘗知也吾所為重雍而願之如此雍必勉哉子之遇豈止於是乎今竣事皆歸進士鄧貞王鉉善雍屬余贈以文故告之以此豈獨告雍亦將以告夫二子者送宗人思恵序廬陵以忠節名天下楊氏以忠節名廬陵君子曰楊氏廬陵之元氣也忠襄文節皆家吉水其後世至今服詩書秉徳義未嘗乏也此豈獨於楊氏先徳不辱盖於廬陵無辱焉吾家宋之時繇吉水徙泰和皆虞部府君之後水木本源之心吾未嘗一日不存也徃徃遇吉水之族不忘敬愛况其脩諸身見諸事自有可敬愛者前數年識今東平太守季琛先生博學謹行有政譽於時今年識惟效舉進士從事憲臺有能名超拜河南憲副繼又識思恵則季琛從孫惟效從弟也温厚秀朗闓䟽能慎來京師假舘授徒以務學問盖於見聞益廣氣韻益暢矣夫有髙明祖父肇之於前又得賢子孫承之於後家未有不興者然豈可必得古之聖賢有一再世遂荒落無聞㦯至於毁敗汙辱者矣如其本既立後之人又能加夫培養灌溉之功則枝條敷衍益茂而不替思恵之先世固如此使繼今培養灌溉愈益不已將駸駸乎其盛亦不已也此固思恵盡力學問足以致之思恵將歸來告别余無以益之故書此為贈思恵勉哉送張日孜還泰和序吾友張日孜以詩書故閥之裔忠厚數世之積明敏和易之資又出於鉅儒先生之門得經學之傳今歳邑令丞舉之以副教其學弟子員而敦遣上京師請命焉既得命歸且有其知日孜者皆為詩歌送之而屬予為序夫有國者其興學育賢用心之勤篤三代以還未有若我朝之盛者也其教育有法其責效有程職教有成績者率超陟厥位怠廢者必底黜罰由是效用於時者出於學校常八九焉而士亦以出於學校者為重然天下之大士之出于學校者莫盛於江西兩浙吉安又江西之盛者而吉安之盛者泰和其一也賔興之歳顒然而起者未嘗不夥於諸邑盖由其風俗之美其人皆能尚志洗濯淬勵以求不負上徳意故受典教之職者以得其䖏為幸然而不出其鄉而有天子之命享官禄之奉其居與俊人秀士講道而論徳其出與邑大夫相賓主論議與宗族朋友里巷之人朝夕相欵接好也豈不尤幸者乎於是日孜之歸其所得多矣然吾因之有感焉國家初下建學之詔其時副教泰和縣學者予伯父吏部公及繼父徳安貳守羅公四川幕鄧公當時翕然稱曰楊羅鄧盖其表然所自樹務求合於古人者不獨文藝之工而已予嘗憶伯父初領鄉薦時戲語二公吾三人者即皆獲一命可不失為㢘吏二公同聲應之曰此士之素分耳其後皆出為顯官而其家皆愈益貧薄則他行可知己繼三公副教者得仙遊縣簿羅公國子學正嚴公楊子初先生又後得御史王公公操行方正峻潔屹然人不可干者又後得臨晉令郭公國學錄蕭公之數君子其文學之正其徳義之端雖時有小異要皆的然可以垂範於後進者而今皆不復作矣詩曰髙山仰止景行行止予與日孜何可以忘也又曰伐柯伐柯其則不逺則今日所以副教吾邑之學者何待以他求哉盖師者表也表端而影隨必然之理也日孜其尚有取於予言送鄧主事南歸序庾嶺之南大海之濱山川靈淑之氣鍾於物木有千嵗之香禽有五采之珎及象犀珠貝之屬填溢海陸歳貢獻而北來者連屬於道何其富也其鍾於人為瑰瑋傑特之才脩潔㢘正之資如張子壽余安道者徃徃出為世用然亦鮮矣夫靈氣所鍾人與物均得之非獨厚於彼薄於此也豈由於世求之則出歟抑人固靈於物而不為世之所取乎自余仕於朝所得粤産之良兩人前十餘年校藝禮部與陳璉廷器同事比年校藝禮部又邂逅鄧林士齊皆博學擅文負用世之具余間問粤之人才所以鮮遇之故皆莫得而知也廷噐自良郡守擢陞憲使四川為國家正風紀於一方士齊自郡博士擢陞天官屬日在冢宰左右商論天下賢才俾各宜厥職皆要任也功能日著而譽望日起矣今士齊䝉荷國恩追贈其親方捧命書歸故鄉舉焚黄之禮奎光龍文煥乎臨照嶺海之人有不仰而快睹頫而歆羡者哉其或才且賢而匿于下者有不幡然易慮者哉幸際明聖在上求賢若不及之時尚巻而自私區區窮老於一隅必非智者所為也試因士齊之行卜之士齊來告别遂書以贈東里續集巻七
