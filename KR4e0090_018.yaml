body:
  text: 東里文集卷十八明楊士竒撰墓志銘王竹亭先生墓志銘國朝混一之初天下耆儒碩師往往多在徴詔數下或進而階顯融佐化理或退而信亷節成後進皆卓然有益于世也是時泰和王竹亭及其弟子啓兩先生正學篤行髙風直節表表乎大江之西洪武二年子啓先生首舉明經為監察御史明年竹亭先生以説書徴既至上書論事更授福建鹽運副使以老得辭子啓先生後升廣西按察僉事又擢知崇慶州政治赫赫已而罷歸時竹亭先生春秋六十餘子啓先生亦幾六十伯仲恭愛隆然居必一堂出必鴈行長身玉立儼乎端恪巍冠褒衣襜襜甚偉蓋望之如神人無不肅然起敬畏者至其接人色莊氣溫雍容怡如語簡理盡無不樂就之焉竹亭先生諱沂字子與竹亭其别號幼讀孟子即知辨于義利稍長刻厲學問嘗從元進士楊升雲彭復初治周易造其突奧自六經至于周程朱張之書靡不深究及子史百氏咸旁通博考蓋于天人之微聖賢之藴往古治亂成敗之故蓄之富察之審言之的而履之確也嘗一試有司不合即不復出教授于其鄉而所交遊往還皆當世名人元季江西參政沁布阿咱爾守贑州禮遇先生辟為行省照磨又承制授吉安路治中俱不受逮皇明龍興洪武三年廣東行省聘考貢士試是年侍御史吳去疾言泰和王沂經學操行宜在侍近遂徴為説書至未幾而歸益以成就後進為務從學者愈衆傾竭底裏隨其材而篤之而皆有成先生資識髙明內貞外和器度𢎞偉規範自然安成進士劉雲章嘗贊之曰淵乎玄酒之在尊凛乎太阿之未出匣皭乎其清而挹之弗竭薰乎其和而即之弗可狎又曰使及門孔氏則風雩之詠歸端章甫之禮樂固將進退綽然而特視其所合蓋確論也先生孝友篤志歲時葬祭循古禮燕處必嚴未嘗啓口及人過失有文集若干卷承旨宋公濓為之序詩若干卷襄城楊伯謙序之洪武十六年某月某日卒年六十有七王氏世有德義其先出晉司徒導之後由金陵來徙至宋户部侍郎贄顯于仁宗朝事載郡志又若干世至圭為榮王府賔客與周文忠楊文節皆善學者稱虹溪先生虹溪若干世至性夫性夫子以道元季韓公復嘗薦之以親老辭二子先生兄弟也先生娶陳氏繼李氏皆有賢德子男一伯貞舉明經纍官瓊州知府女一嫁嚴玄齡孫男二信直直舉進士為翰林修撰曾孫男八女三先生初葬千秋鄉大徑之原至是瓊州公丁李夫人憂改葬先生新山之原使直屬士竒銘墓士竒蓋生晚不足究知萬一然念鄉人老長識先生者盡矣當時門人親受教者亦多不在將使後之學者有志乎先進其何所考法也且士竒于王氏重世好又少嘗侍教先生兄弟及瓊州公矣故不敢辭不敏不銘謹述其所知大槩而為銘曰奕奕王山澄江洋洋猗歟先生邦人之望江山出雲雨于下土君子之道有蓄不施道之傳矣孰不為材佐理于隆濟濟偕來世其逺矣後來何師猗歟先生曷究豫思歐陽三峰墓志銘永樂癸巳七月甲申西昌歐陽三峰卒歐陽氏之宗及其戚姻皆哭失所庇賴鄉之士君子皆嗟悼出涕曰善人已矣邑大夫亦嘆息言繼自今處士之廬奚所致禮乎三峰諱某字以忠三峰其號也歐陽氏出唐吉州刺史琮與宋少師文忠公同祖琮之後居廬陵十四世徙萬安之常溪又七世徙泰和又六世至元國子學録德髙生覺先三峰之考也妣韋氏三峰自幼淳厚器宇凝重知力於學家族故饒裕少壯者競侈靡為豪三峰獨執儉約淡然布素自得也既壯踰淮涉汴以逰乎齊魯趙魏之間縱覽山川交其豪俊而見聞廣矣歸而益從鄉先生講説以求歸宿之地會元季盜起所在充斥三峯彂帑廪聚義勇保障其鄉族鄉族有窮乏者皆賑給之國朝既平僣亂定天下三峰老不堪事則聚其子孫暨族之人告之曰吾不幸丁世變﨑嶇兵亂數十年幸脫一生于萬死得復見太平然吾老矣汝曹于今得逸居優逰嬉適不知有強凌衆暴之患者非上所賜耶不盡學問以冀效用一官報大德且增輝于前人乃齪齪與草木同朽腐哉遂禮致明經師教授孰中旦暮則三峯程督于內數年歐陽氏之文學日益盛歌鹿鳴而升者前後相望佐政典教者皆有聞于時焉三峯持身治家悉以禮喪祭不用浮屠老子法遺戒子孫世世勿變修宗譜以示族人曰毋忘本也嘗有盜劫里中舉族倉卒出避三峯獨入取家乘及先世告身懷之然後去曰他可復致也雖耄期春秋必親率子弟謁先墓其孝敬蓋出天性外氏有先墓里豪以計奪之外氏子孱弱不敢言三峯毅然白其事于官卒還之又為刻石表諸墓道所為義舉多類此與人交表裏一致遇族人及鄉人之子弟必勉以孝弟忠信歲邑大夫舉鄉飲禮賔必於三峯朝廷行養老之典使者屢即其家賜酒肉帛享年百有二嵗可謂福酬于德者矣娶韋氏有淑德先一年卒子男二子瞻子宗皆先卒女一嫁劉敬先孫男三允宣先卒允成俊永樂二年進士由翰林庶吉士擢禮部儀制清吏司主事女五張叔倫劉俊秀宋平原蕭可嗣蕭礎紳其壻也曾孫男七澄沛淵瀚渤潘女若干俊聞訃請于朝將歸以翰林庶吉士余學夔所述世系行實來求銘嗚呼三峯士竒祖父行也表先進以儀後人其可以辭謹按狀敘而銘之銘曰溫其如玉兮德孔良來祉福兮夀而康後有敬承兮百世其昌元龍興路儒學正楊公墓志銘宋忠臣建康通判贈徽猷閣待制諡忠襄吉水楊公之七世孫曰伯恭倜儻魁偉有才略敦大義元季為龍興路儒學正時陳友諒兵掠江西諸郡皆無守備伯恭首上書藩憲大臣陳用兵理財數事其言闓切又言宜宿重兵江州扼漢沔之咽喉固江右之藩屏衆迂視之既而朝命劉鶚守江州中道聞警止龍興未進伯恭為畫計募蘄黃丁民之奔來者給兵仗使隨行既行又數貽書促鶚曰及今尚可為不可緩也又數數以䇿干藩憲獨憲使韓凖與伯恭意合而典兵者不見聼用友諒既連陷諸郡伯恭以義勸率諸大姓之奔竄在外者出壯勇捐金帛為尅復計事集輒為典兵者所沮遂罷歸不出未幾而龍興亦陷矣友諒既敗死江西內附詔舉故官有材幹者用之伯恭以疾辭伯恭諱謙風采凝重孝友出于天性少受經于鄉先生劉粹衷其學務實踐後補國子生用前代忠賢之後特賜出身得學正首上言建忠節祠于鄉郡以勵風俗朝廷從之在官創學規及課試法以勉學子先聖殿學舍書籍禮器有敝者皆完葺如新廣學田以膳士居家不問有無傾資復忠襄賜田于異姓曰棄此則棄先德矣以詩振起族人平生與人言忠義事尤懇切云祖某考某妣某氏娶某氏子男二旭昶昶嘗舉賢良以親老辭女三皆適宦族孫男若干其卒以洪武某年某月某日享年若干其葬某原既葬草有幾年孫尚節以余同宗譜奉事狀屬為銘夫忠節人道之大端也士食國家之祿不幸而丁艱難危急之際懷負器能有所格不得展其分寸鬱鬱焉抱忠蓄憤而不能自已者非其命也夫若伯恭可謂無忝其家者矣銘曰渥窪之出卓犖超逸不疾而速千里一息胡羈弗乘而驂駑駘卒蹶以仆嗚呼昌追奕奕楊氏忠節興家厥後繩繩襲芳趾華偉歟先生一命在下君臣之義允執惟固材與志偕孰抳其行吾殫吾心卒遏其成亦既全歸從我先祖先德世承式觀來者蕭伯玉墓志銘夫孝百行之先也孝可以通天地格鬼神而所願必遂者誠之至也有天下國家必重乎此有卓然躬履斯行于下必紀諸史氏傳諸後來者世教之所繫也然考歷代所紀率皆不過十數人豈以其道雖易實難而由之者鮮歟抑有之或處乎幽敻寂寞之濵世莫得聞之故隱而弗見歟若今撫之樂安蕭巗伯玉其行有誠其既處乎幽敻寂寞之濵矣宜世之知者寡也方伯玉喪父時生四閲月其母育之稍長能服母之教以有立十餘嵗即躬任繇役詣京師不以公事憂其母甫冠坐纍謫戍萬里東海外且行辭其母跽曰男子出門行四方無不可如意非有所患苦惟大人善自怡勿以兒故戚戚自損顧其妻董負二嵗子儀在傍戒之曰離别常事耳惟盡力恭事老母長育幼兒使不失儒業足矣妻應曰諾伯玉雖外為好言壯色以寬母意實中心悲念逺去母不自堪也即日素食仰天而誓冀復生還見母有如不生還見母終身不復飲酒食肉幸復生還見母即死不恨既及戍所久益顛沛艱難而持行愈厲恆曰吾不孝不獲侍吾母又可倍其教而貽其憂乎戍之長官察其賢皆禮重之遣子弟從之學問有過愛之具醴饌強進之者曰非飲食莫養身體愛身即愛母矣不聼而泣下澘然酸楚不已左右皆為感動蓋其心旦暮動息無斯須不在母側後二十有七年竟以公命得過家省母時其母已七十餘尚康寧無恙母子相見歡如更生焉書有之民之所欲天必從之夫惟欲之出乎不善者不可以望得于天茍善矣無弗得者伯玉是已無幾伯玉以疾卒于家永樂乙未十一月也享年四十有九伯玉自幼嗜學博涉書史喜為歌詩而性耿介不肯枉已徇人急人之急雖處窮厄屢斥所有濟人匱乏未嘗有顧惜意祖自新考體仁母張氏其配董氏先卒繼王氏子一人即儀永樂乙未進士孫男若干儀卜其卒之明年某月葬于樂安之某鄉某原先事奉狀請余銘余既得其行又考知其世所由來為之銘曰有儒其宗世澤孔厚遷自吉陽自其鄂守𣲖于蕭坊益衍益蕃春秋經師山彎復遷歷其曾玄逮伯玉甫繇孤奮興卒鬱於下嗟伯玉甫允篤孝思孰其遂之匪天矜之故鄉之園孝子有墳孝有錫類來來無替御醫趙彥如墓志銘太醫院御醫趙友同字彥如大臣嘗言其文學于上時方修永樂大典即用為副總裁後修五經四書及性理大全書又用為纂修書成皆被寵賜于是知彥如者皆為之喜且意其將有詞林翰苑之遷也而彥如亦兾得一職於此為其親榮未幾以母喪去又未幾以病不起嗚呼惜哉彥如沉實溫雅有行義自其少篤志學問手一卷祁寒盛暑不釋嘗授經前翰林承旨金華宋先生為文章貫穿經史優柔縝栗或豐或約必歸宿于理今祭酒胡公教諭華亭時首舉為訓導既而浙江布政司聘考鄉試華亭滿九載天官考最當升太子少師姚公言其邃醫詔升太醫院御醫會浙西水有言彥如知水事者又奉詔從今户部尚書夏公往治之士恆患有所負挾無所遇而不見試也若彥如所長數數見用于世彰明如此其可謂榮遇而無憾也矣彥如系出宋南陽侯仲礦仲礦生士翮為武節大夫處州兵馬軡轄因家處州士翮生武義郎不玷官浦江子孫又徙家焉曾祖崇傒祖必俊父良仁又徙蘇之長洲故彥如今為長洲人母鄭氏彥如卒于永樂十六年四月一日春秋五十有五所著有存齋集若干卷藏于家娶邵氏子男三季珣季諒季成女二華信張瑜其壻也孫男一人同文其子卜以卒之嵗十二月某日葬某鄉某原先事以治命賫監察御史張循理所具事狀來求銘蓋余知彥如者銘曰士之所貴實有諸內有蘊而竒貴弗時遺崑岡之産用則為寶為瓉為圭彼此奚較嗚呼彥如既試有聞肆余作銘慰其九原王處士墓志銘禮部儀制郎中安成王芳蓀既迎其父處士君就養京師永樂十三年三月芳蓀扈從北京其弟瀘汀奉處士歸故鄉四月六日泝小孤山中流暴風覆舟舟中人皆溺死獨瀘汀附片木漂泛數十里得濟而求其父尸及舟數日不復有蹤迹矣七月芳蓀始克聞訃奔歸道出南京過余哭且拜曰不肖孤不孝不幸罪逆深重不自殞禍延先父至于大故重不幸不得奉遺體復土世之為人子其重不幸豈有如不肖孤者號天叩地無所逮及惟昔之人有取冠衣而葬之者孤不自揆輒循斯義庶以繫吾後之人無窮之思惟葬必有銘幸哀而畀之余惟聖人制葬以藏體魄者也既泯沒無所事乎藏矣而必有事於藏者孝子之心也禮有以義起者冠衣吾親之所遺也其氣澤存焉其沒也神將依之故祭禮有設裳衣之制則墓而藏之從而識之曰此吾親之藏也其于義可也于是得監察御史胡啓先所狀處士世次行誼為序而銘之敘曰王氏世居廬陵郡北棟頭里後遷安成連嶺數世至宋敷文閣學士瀘溪先生庭圭又數世遷蒙岡而族益盛後至希旦及其子所安家富于于資而皆有善行處士之大父父也處士諱緝字思學自幼敦厚頴敏有志學問稍長益通經史百氏之説喜賦詩興之所至援筆立就往往為人傳誦善談論每據事推理娓娓聽者傾服恬于利惟以畜書教子為務或勸廣生産以貽後者曰非遺安之術也享年六十娶劉氏子男六瀘源起家鄉貢進士杭州府儒學教授禮部儀制司郎中即芳蓀也瀘湍瀘沄瀘潨瀘汀瀘濟女四劉守經姚明哲戴躍淵姚某其壻也孫男若干女若干銘曰化機之運始必有終終底乎盡衆萬斯同孰後孰先孰毁孰全孰知森焉不為平原斯以逹觀任之自然鬱鬱髙墳必有封之惟義之推孝子之思周仲舉墓志銘永樂十五年十月十八日巢縣丞周仲舉卒又明年翰林編修周孟簡以其兄侍讀崇述所為仲舉事狀致其孤之意請為墓銘屬余久未暇崇述扈從北京又以書來趣銘崇述孟簡皆仲舉從弟仲舉吾郡之彥也其出也人皆謂其必將有立及其卒也人皆以為世道惜之蓋仲舉學足以為政才足以濟務行足以仁民而厚俗且素于余往還此其余之所宜銘也仲舉諱綱以字行少孤其家故饒資産旦出理繇賦暮歸讀書為學有志世用永樂初偕崇述孟簡中江西鄉試部使者表其所居坊曰三桂明年仲舉病未上四年中會試廷試賜進士出身賜勑奬勵加道里費俾歸益進其學六年召至命觀政都察院都御史言其能擢廣西道監察御史持大體推明致公辦理被誣者百數十人歲餘坐失覺察降昌平縣丞到官悉心訪民所欲惡建罷十數事令與簿皆敬服自是事可否皆惟丞之聽仲舉臨事恕而處已嚴吏民恱服稍暇進諸生與論學業諸生人人喜得師益務自進邑人長老亦皆私竊稱丞之賢曰前此未嘗有也已而丁內艱去會詔有司舉賢才昌平鄆城兩縣令交章舉仲舉服闋至猶以御史時事止改巢縣丞凡所持身治民一如昌平郡檄督運諸邑竹木詣北京且行而病作或曰曷俟少間乎仲舉曰臣子之事君父可顧已利害耶遂行至邳州而卒其友李兼善官邳學具棺斂殯之明年其孤至邳啓殯以歸易棺容色如生仲舉為人溫厚簡重出處一致不以窮達有所加損與人交必誠不為表襮而其所有諸中宜諸用者自不可掩惜乎遽止于是也蓋年四十有五其先自吳太尉瑜之子都鄉侯胤廢徙廬陵始家焉後又徙吉水今居吉水桑園里髙祖希賢宋咸淳進士曾祖方大祖仁逺元太子説書考子敬妣劉氏永豐名族娶傅氏子男七頴顒頎皓頔頊頥頊蚤卒女三李鼎新黃修爵其壻也季未行孫男若干其葬在某鄉某原銘曰茅蕭之莛以為桴乎纂組之華以飾襦乎紛其集荂獨於枯乎嗟若君子恆于于乎翰林庶吉士陳孟潔墓志銘余幼失怙寡兄弟依學外家孟潔少余一嵗余兩人自五六歲狎居相得如同産至于今四十年出入相輔講學相資憂患相恤如一日余豈謂遽銘孟潔之葬耶始余入翰林之四年孟潔與其從弟孟京同登第為翰林庶吉士余三人者同官相聚處甚樂也又四年余與孟潔哭孟京而余銘其葬夫孰計踰年又哭孟潔而銘之哉孟潔陳氏諱亷以字行其先避五代之亂繇金陵徙泰和詩書科第連續之盛甲他族曾祖主一祖心吾為江以西大儒學者稱海桑先生父孔碩皆有厚德母羅氏邑處士晉用之子處士節義凛然孟潔幼時親承海桑先生與處士之教又頴敏過人讀書日千餘言通其大義十二治詩經下筆為文章粲然有聲譽于先生長者其事親能適其心未嘗得一錢以入私室孔碩公從子孟省有怨家欲報孟省孟省已卒則搆誣詞嫁禍孔碩公孟潔憤曰無父焉用我為伏訴闕下孔碩公得白不陷于誣孔碩公沒撫育弟妹甚厚長悉力為畢嫁娶皆備于禮宗戚故舊有急趨赴之恆恐不及平生為人排難解紛不可數計而不為榮磊落豁逹喜交際四方賢士大夫過泰和者必造其廬傾倒而後去永樂乙酉以國子生中應天府鄉試明年中會試禮部遂擢林環榜第二甲進士授翰林庶吉士與修永樂大典為校正官性嗜酒雖紛冗不廢嘗曰王猷愛竹豈比我哉竟坐是致疾疾革壺觴猶在床榻間卒于永樂八年十一月十三日享年四十有五娶蕭氏子一人年將歸其喪葬故鄉時羅孺人方就養來京師孟潔遽不起恆晝夜哭已而呼余曰甥宜銘亷其毋使遂泯無聞嗚呼余雖不忍銘而義宜銘矧孺人命之為之銘曰其為人也急義其發身以進士庶光紹乎先世其弗階于顯融也殆將以遺于來裔乎故翰林侍講承直郎王君墓志銘宣德元年三月二日翰林侍講王進汝嘉卒館閣自大學士而下咸走會哭已而共嗟咨歎曰當國家用儒之際奈何其喪賢者且兩朝史事方嚴奈何喪文學老成人相與悼惜不已汝嘉為人惇實內貞外和行修識明學該博尤熟書春秋為文章和平寬厚一傅於理勤職務雖老不倦雖風雨寒暑不自逸而折衷羣議辭氣雍容簡而適當故所為悼惜之者非徒以寮寀之故交遊之私也既卒之兩月其子箎奉櫬歸葬其鄉以翰林修撰張洪所述事狀求葬銘余于汝嘉有斯文之契草又六年義宜銘故序而銘之序曰王氏其先京兆人唐大理卿藻從僖宗幸蜀家蜀之遂寧九世至拯事宋理宗為吏部侍郎遂家蘇之長洲生矩之元溫州路總管總管生光祖常熟縣尉縣尉生平孫黃巖鹽場司令司令生立中松江府知府知府三子璉洪武中吏部主事汝玉右春坊右贊善兼翰林編修季汝嘉也自幼喜學問穎敏異羣兒十歲從師受經下筆敷繹義理已津津動其長者侍松江君宦逰浙東西所親炙日廣造詣曰深矣平居孝親敬兄一本于至性嘗坐纍謫戍五開後舉明經為武昌府學訓導歷九年升大庾縣學教諭所至盡心啓迪學者率見成效初被召修永樂大典為副總裁又召修四書五經性理大全書成皆受重賜遂升翰林五經博士授迪功郎秩滿升侍講授承直郎永樂中考鄉試應天府廣西廣東各一考會試禮部三無敢干以私者洪熙初建𢎞文閣時翰林學士楊君溥偕汝嘉四人者受命曰直其中禮遇甚厚汝嘉與人交久而敬淡而可親于義當然未嘗有所不盡一時王氏之盛汝玉汝嘉先後入翰林汝玉文名聞天下而士君子論行已有道蓋于汝嘉無間言云汝嘉蒙恩贈其父為翰林侍講承直郎母任生母黃皆為安人封其妻葛安人二男子節箎皆好學有立箎選永樂二十一年鄉貢二女子皆有歸一孫欽汝嘉沒時春秋七十有二庶幾可無遺憾者歟銘曰介如石溫如玉嗟君子兮不可復兮沈生墓志銘生名潮翰林侍講學士華亭沈公之冢孫永樂十九年十一月二十九日卒年十八內之為祖及母以下皆哭之慟外之為沈氏戚姻朋友而知生者皆走弔為之悼惜流涕嗚呼生果不可多得哉生天稟端粹悟解穎敏初入小學喪其父時學士公扈從在北京其叔教之授讀數過輒能成誦學書輒有可觀而教之事遵而行之未嘗違居家孝友如成人雖家人不見其率易一言既出就外傅日務自進盛暑雨雪不廢數年學士公奉詔歸方慟不復見冢子而見生如此更大慰喜遂以至北京益自䇿勵從明經師晝夜自力母憂其過勤數止之則退而潛為之病猶不輟蓋病數月而卒既卒家人探其篋得所為五七言古體近體詩千餘首四書尚書義纍帙手録近代名人詩文及臨寫古法書尤多而其讀書為文作字率有日程初皆未有知之者嗚呼生于勤學慎行固天性歟一時士大夫子弟亦有如生者乎且生學士公所望承家而亢宗又生之父母其子男惟生一人今死矣豈獨為生之不幸哉生父孟芹母髙氏吉安府學教授士謙之孫學士公將歸葬生於其鄉求余銘余與學士公鄰居十年實知生為之銘曰玉毁于璞蘭折于萌不及其成于嗟乎沈生故左春坊左贊善徐公墓志銘永樂甲申春詔簡東宫官屬時詹事春坊司經其長二以廷臣兼之次簡六科中書及太學郡縣學官升而用之自太學升者兩人博士天台徐善述好古升左司直郎助教鄆城朝鑄景範升右司直郎其學問之正操履之篤溫厚而簡靜皆為縉紳君子所重以為輔臣之良也後十年景範年八十奉命致事歸好古升左贊善永樂己亥九月景範卒於家十月己亥好古亦卒于官蓋縉紳君子又皆嗟咨悼傷老成之喪也好古一志儒者之學尤邃書經其講説及作為經義皆精確非衆所及少為郡學生已有聲譽洪武中初行嵗貢法首充貢入太學六館之士皆推之祭酒宋納嚴不可近獨禮接好古歲餘詔選太學生為州縣教官好古為首授桂陽州學正賜勑符後丁父憂服闋改和州學正用薦升國子博士經其教者率有成嘗預纂修翰林者纍年考鄉試者一考會試者二士服其公其在春坊一用所學進對之際簡明質直必據正理故尤見禮遇而卒之日皇太子親為文祭之極褒惜之意好古平居寡言其中所執確然未嘗枉已徇人性淡泊寡交處家貧于于自足手一卷雖老不釋可謂貞而絶俗者矣年六十有七而卒徐世家天台宋之亡其幼主趍慶元南奔元兵追之徐氏有為進義副尉者率鄉兵扼關嶺之險元兵不能度宋主得浮海去元兵既入天台徐氏無少長皆被害獨乳媪負所乳兒脫走得全好古髙祖也自髙祖至其父皆業儒好古娶朱氏邑名家有婦德先卒子男二行衍女四長適翰林庶吉士永嘉王道次適同邑朱夔二未行孫男三光孝光竒光茂女一既卒之明年行衍奉柩歸卜某月某日啓其妣之竁而合葬焉先事以庶吉士葉頴所述行狀請銘士竒初被徴與好古同事翰林及其擢春坊又同寮相與二十年知之深矣為之銘曰忠信以為車兮廉潔以為旟兮道乎平直之衢兮確乎不可以渝兮展乎君子之儒兮龍仁安墓志銘龍氏故吾邑名族其先在宋有諱納者自永新煙岡徙居邑西甘溪之上世畜巨資而服詩書至登舉淳祐四年進士為亷州推官及弟際為臨江教授而聲望益著教授仁安之幾世祖也而自仁安之曽大父以下皆退伏不仕曾大父某大父某父某母彭氏仁安諱居自少務學問年十八出授徒里社為養親計縣大夫起前國子學録蕭執先生授諸生經又選仁安補諸生其學日益進矣卒白歸養其親于事親友諸弟皆盡其心于宗姻鄉䣊緩急必赴輟有餘濟匱乏靡間于疏戚間暇放意山水之間臨清蔭茂竟日忘返或稍出為逺逰務自斂閉喜為詩有永言集未嘗輒示人永樂癸卯十二月十三日以疾卒春秋五十有九娶湯氏子男五粲璣暄珌旦孫男九某某粲舉鄉貢今為國子生聞訃縗絰奉翰林修撰陳循所述事狀詣余哭拜請葬銘將歸而納諸墓仁安于余所居東西相距僅半舍然生平鄉里裁一再相見前二十六七年邂逅武昌挽余入舟釃酒膾魚仁安性不飲而舉大爵飲余不已夜半忘醉相與抵掌劇談余戲之曰以子之材少自見綰銀黃垂三組顧不易耶乃俯俯默默如此乎仁安亦囅然笑謂余曰子自恃其終于此乎居不足以睎子將子欲晞居亦易得耶忽忽如昨日語而仁安已矣嗟乎仁安豈有睎于余哉而余之欲睎仁安者仁安亦惡足以知之乎銘曰孰不于馗而遊于艽孰不于昭而恬于幽莫之匹休亦孰與仇終之優優歸妥乎斯丘東里文集卷十八
