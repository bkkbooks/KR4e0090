body:
  text: 東里文集卷五明楊士竒撰序鄭氏族譜序泰和澄江之南有鄭氏其先出滎陽再徙金陵宋端明殿學士瑴之子新通判吉州遂家泰和邑中又四世至叔文徙江南之五塘莊其譜紀自端明之父西京節度副使自強蓋節度至今十有五世子孫久而愈盛蔚乎邑之巨族也端明當南渡孔棘之時毅然以國事為己任鞠躬盡瘁無所不致其誠殆天佑忠義而以昌其後世耶雖自徙泰和未嘗有顯者然抱仁秉義世篤善行所見孚于人人可質之鬼神者蓋或顯者有未能也吾家距所居半舍吾少及見其鄉大疫不間貧富老壯困憊狼狽相連屬彌望十數里旦暮不見炊煙獨鄭氏一姓食飲起處泰焉如平時三四十年來江鄉譁訐之風姦民倚法嫁禍其所怨惡富家巨室為所困辱者十八九獨鄭氏無一毫之干此豈聲音笑貌之所能為哉入國朝鄭氏之仕者昉宗顯再見于庭賔今庭重居太學十餘年繼而大之未可量也而宗顯于余最善其嘗歷三縣一為幕再為簿所至民戴其寬惠如父母仕三十年無纎芥過舉家甚貧持操如鐡石比侍臣之賢者屢薦之不報恬然安其命觀於今鄭氏如此可為逺不忝端明者矣宗顯今復改連江簿將行出此譜求序於是翰林諸君子序之詳矣余特著鄭氏之行之可稱者以示其後云玉雪齋詩集序詩以理性情而約諸正而推之可以考見王政之得失治道之盛衰三百十一篇自公卿大夫下至匹夫匹婦皆有作小而兔罝羔羊之詠大而行葦既醉之賦皆足以見王道之極盛至于葛藟碩鼠之興則有可為世道慨者矣漢以來代各有詩嗟嘆詠歌之間而安樂哀思之音各因其時蓋古今無異焉若天下無事生民乂安以其和平易直之心發而為治世之音則未有加于唐貞觀開元之際也杜少陵渾涵博厚追蹤風雅卓乎不可尚矣一時髙材逸韻如李太白之天縱與杜齊驅王孟髙岑韋應物諸君子清粹典則天趣自然讀其詩者有以見唐之治盛于此而後之言詩道者亦曰莫盛于此也余竊有志斯事而材質凡近徒勞而無成間或一遇能者未嘗不歆豔嚮往之居兩京二十餘年所得公卿大夫之作今大理卿京口虞公伯益蓋其傑然者也近得觀其玉雪齋集古近體總若干首皆思致清逺而典麗婉約一塵不滓如玉井芙蕖天然竒質神采髙潔又如行吳越間名山秀水而天光雲影使人應接不暇者而皆得夫性情之正虞公蓋將上追盛唐諸君子之作而論今公卿大夫之作足以鳴國家之盛者亦鮮有過于虞公者焉公學優才裕生當治平熙洽之運洪武中以儒發身歷事四聖出入中外者三紀所治皆要職更事多而精斯其詩之所繇昌歟今公以明刑為上所信任下則四方視以為平蓋古皋陶之職也夫明良喜起之賡歌皋陶所以弼成有虞之治者吾何幸尚于公晚嵗見之乎輒書諸簡首而歸之貧樂詩序廬陵胡有初家文江之上泊然布素而謹於義利之辨非其所當得不茍取遇人富貴不本于仁義者率草芥視之其為人慷慨豁達不務榮名所居逺城市車馬之塵喧囂之聲不相及有薄田躬耕足以自給又有雲林泉石之勝日與幽人素士相羊山水之間飲清茹淡翛然自得也自號貧樂其從子中書舍人淨求搢紳君子為之賦詩又稡以求余序人恆情所處率易于富貴而難于貧賤處貧而能樂此其志豈茍然哉然古之君子其樂乎貧也非恃貧以樂樂而忘其貧耳蓋天理具于吾心吾奉而行之無所違以至于仰不愧俯不怍其中泰然將無往不樂矣富貴貧賤自外至者惡足以動其中也故孔子之飯蔬飲水顔子之簞瓢陋巷豈樂乎是哉樂乎在已者之無違於天也茍在已者梏亡之矣雖有趙孟之貴晉楚之富將其中汨焉膠膠擾擾憂虞之不暇况有于樂哉又况于貧賤而能樂哉有初之貧樂必樂而忘其貧可也樂而忘其貧古之人所以為至也吾以是進有初故書諸卷首卷中自鄒侍講至陳修撰凡詩六篇皆出翰林亦皆出于廬陵云送張鳴玉序贑為郡居江右上流所治十邑皆僻逺民少而散處山溪間或數十里不見民居里胥持公牒徴召或行數日不底其舍而巖壑深邃瘴煙毒霧不習而冒之輒病而死者常什七八江水險急灘石如虎牙森立或隱或顯奔湍之聲洶洶聞數里舟楫往來非資其土人跬步不敢越以是會府優視之于賦役百需常半減他郡而當江廣之衝將命之臣及海南諸畨朝貢之使往來供億無虛曰加之數年旱潦飢饉民之不遂豈少也哉而為郡于此茍非德任綏撫才堪繁劇不得為良建安張珂鳴玉由行人擢知府于贑期年矣自會府下至十邑之民皆稱曰良江右所治十三郡時稱良守不三四人而鳴玉與焉固其所施有及人者歟前之為守於兹非一人至于今人喜談而樂道者曰趙清獻世謂清獻誠心愛人以惠利為主又稱其學道清心遇物而應有過人者非本諸其德歟則後之為良守于兹不務諸德其可哉鳴玉發身進士其官京師時與余鄰居今自贑述職將歸翰林檢討連智其同門也求朝士為詩送之又求余序于是乎言送李永定經歷序永定吉水李明達先生冢子也余往年客武昌永定從先生在焉先生長余四十年忘年與余交厚時余兩人皆假館授徒永定治奉養之資無日不相見也先生長身修髯飄拂可數面潔白如玉雪氣韻磊落有行義讀書不泥章句興有所適竟曰忘返嘗愛余作樂府古辭遇有作取酒觴余向余歌相樂也後先生入竟陵永定以才舉授宣州衛經歷明年永定遣迎先生先生還過武昌訪余時仲秋之夕明月東出余數人者共浮小舟具酒殽出夏口亂流至禹王廟下飲酒既醉舍舟登大别山四顧下憩秋興亭至郎官湖而還復酌酒大歡各賦詩弔古且寓離别之意先生三復其詩愴然既而曰人生聚散風絮相值耳何足道也明日别去又三年先生沒矣嗚呼惜哉余至今未嘗忘先生而不可見矣見永定猶見先生也永定初在宣州有能名後詿誤黜上既正大統凡用人制法一遵髙皇帝舊章永定復還宣州求言為贈夫經歷之任子為之有素亦在致其明而已公無不明廉無不公修諸在巳可也在已修無所往而不宜况于衛之經歷者乎遂書以贈别而今昔存沒之感有不知余中之浩然者矣送林正行序刑者先王不得已以輔治焉耳非恃此以為治也後世民俗滋弊則所以防範之嚴者亦長民者之不得已也子産曰火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉嚴固仁之所發也君子之為政豈輕德而重威哉故慘刻不可以為政而姑息亦不可以為政仁人君子之心在使民務善戒不善而已閩林君正行嘗官天台縣幕寬厚愷悌之政民戴之如父母去久而思之不忘也既升司讞于吾郡廉公有威于用法蓋得乎善善惡惡之中焉而直道而行無所顧避行縣所過其細民及其良民皆欣欣延頸而願見之其橫民往往縮首斂迹不敢肆焉以遂免於刑辟者亦不少矣而猶或以謂其嚴也夫治之於已著曷若防之乎未著嚴乎外而仁主乎中嚴亦奚病哉故十數年吾郡之細民及其良民恃之以安者林君焉耳前之司讞者嘗坐事去而今以宥還林君當歸俟闕林君不至其鄉二十年往焉展敬桑梓與故人親戚聚嵗寒之堂飲酒洽比于契濶之餘何其樂也今朝廷方遣大臣四出詢民所利害而建革之及牧民者之廉貪材否而去留之則吾郡之民所嘗恃之以安者其能已于言耶林君是行亦果能久于鄉哉推林君仁民之心必不溺乎其私之樂而忘返也余知林君故道其所素以為還鄉之贈送樊參政序國家建牧守之官實兼治教之任而教居先焉未嘗教之而一任法以治此仁人君子所不忍為也牧守者民之父母父母愛其子必教之不率而後法治之蓋法治之非父母之心也不得已而輔教焉耳江西古揚州之域班孟堅稱藝文儒術斯之為盛然其為人負氣不屈自漢以來髙風清節忠臣烈士光氣炳炳前後相望而道德性命之微文章問學之奧相繼而出者非一朝一夕矣雖其間萬有一焉頑傲不率以干冒憲度此在三代之時不能無之惡得以此而掩彼以一人而纍一鄉哉比年為牧守江西而有父母之心明治教之道為民所歸戴者多也而亦有未嘗留意于學教而一任法治甚者遇頑傲不率干冒憲度者輒虓然以忿曰此邦之人槩為是也嗚呼豈理也哉夫教而不率聖人所必治槩而不别明者所不為仁人君子盍易其心以觀之徴其實以發之且反求諸巳之所施者如何也括蒼樊公慎歷教郡縣學被召入翰林預修永樂大典遂擢工科給事中與余同朝十餘年其為人有學有行達乎治體和厚而寬裕今滿九載升江西右參政于是士大夫翕然曰是素明于治教之道足以佐方牧之大政端列郡之表率而係十三府六十九縣之歸戴矣于是各賦詩贈其行而屬余序因併及余之所欲言斯言也有非出於一人之私也楊氏家乘序楊氏宋盛時自吉水徙泰和世以資雄邑中而業詩書服逢掖者相襲不絶舊譜載貢士三人考陳宗舜吉州科舉録在淳熙甲午開禧丁卯紹定戊子譜載兄弟三人皆授登仕郎蓋出漕貢又有自上舍生為主簿載于譜而須溪劉氏文集稱太學名士者其他為宣教縣尉司計等官載于譜者非一至元延祐初先曾祖以科第入仕其後復有繼之蓋宋以來楊氏文獻之傳至是盛矣元季之亂楊氏衰落逮于國朝其子孫幸不失世業擢科第舉明經纍纍有焉而其先之文章行事可法於人可傳於後其家之所紀者歷世變故片簡不存洪武中司倉通判兩府君罷官家居方謀采録未及而相繼即世于是從兄思貽先生與士竒遍訪博求雖片楮皆録之不敢遺積十餘年頗有所得而髙祖以上者寖逺無存曽祖以下文之僅存者多憫世悼亂悲嘆憤惋率然之作其平時融精極意和平大雅之製所以發明道德者蓋不能得什一于千百嗚呼惜哉而諸父比嵗之文其子孫不知保愛而亡逸者亦多其僅存者皆輯而録之若名賢贈答哀挽之作及其他詩文有及吾先世者亦皆録之冠以譜諜事實總名曰楊氏家乘其首族譜尊本始也次家譜重所親也次事實行之紀也善行在人既沒不忘則形諸詠歎故哀挽繼事實焉次遺文志之寓也同志相求則因文以達意故贈答繼遺文焉名賢之文非以為楊氏作而有及焉者亦可以旁考行事與其交遊故列諸附録終焉凡二十卷不填卷尾者俟續得而録之得有先後故録不能以序也嗚呼是編所載文行始于先曾祖蓋楊氏自兹以降百有餘年內而朝署外而民社錢榖之任皆有之而清白之操皆皎然不滓其隱居而家食者皆清修篤行貴義而賤利義利君子小人之判也君子行義未嘗不以望其後人庸衆人之後猶有力學奮義以光其先者而况清德之世乎楊氏之後其必篤念而敬承之哉謹書以為家乘序許幼道挽詩序廬陵許君幼道既卒于京師士識與不識而知許君之賢者皆作詩哀悼之其子清稡以告余求序焉余與君交幾二十年其沒也余尤不能巳于情尚忍敘其哀悼之詩哉獨念君已矣世之士求如君者何其少也士之能言者非不多也言問學者非不博也言德行者非不髙也而所言非其所行所行非其所言士以此往往不見重於人使為士者皆如許君其誰不重之哉許君非名能言者也而言則必行行則必從其言其孝弟敦于家其信義重于鄉其行必出于誠必適于厚必依于禮不以艱難顛沛而喪其所素至于重交際周困急人比于漢之范巨卿云尤負理才嘗隨從兄學文宰漢川凡學文邑政設施必豫歸咨君君悉為畫可否既而行之人無不恱服者一時江漢翕然稱學文為賢令凡漢川之人亦至今思學文不置不知其出于君也蓋君之所存一以愛民為務使之沾一命得一郡一邑而理之民之獲被其惠利豈少也哉然世之理郡邑者豈必皆有才德如君可以惠利其民而君將老始得分教武學教不久遂卒嗚呼是果繫于其命也耶孔子曰君子疾沒世而名不稱彼得于命者其身既死忽然若飄風已過而人不復留意者多矣其不若是者亦皆有人思之至作詩哀之如許君者乎許君之得于人如此讀詩者可以考矣送史志靜郎中詩序豐城史安志靜舉進士為禮部儀制主事在京師于余還往有斯文之好余間暇喜讐校古書辨正舛誤志靜明敏詳博得其助益為多且其為人廉潔恭慎京師賢士大夫皆樂交之而于余未嘗三日不見見未嘗意不在文事以是尤樂史氏世家真定元盛時其先有勳德灼灼在國史洪武初志靜大父官豐城始家吾江西至是三世矣吾于志靜固同鄉也吾來北京四年解翰林兼職專任春坊曰益多暇未嘗不思同志靜之樂今以滿秩來方握手聚語相慰藉天官卿知志靜好學勤事而熟典故奏其績最升儀制郎中國家一切禮樂法制咸儀制所治非達朝廷之體識古今之務明制作之意者不足以任于是薦紳皆喜儀制得賢長官也當復之南京來告别蓋余向所同樂者又不可得因述余情為序而屬詞林諸君子為詩贈之詩各賦一物以道意自侍讀學士曽君以下凡八人亦皆吾江西之士云五清詩序永樂辛丑春余自翰林學士改左春坊大學士公務甚簡每朝退歸坐小軒中杜門却掃時理書册自適于故篋得小畫五幅不忍棄之裝為一卷其第一幅故人毗陵王孟端作也第二幅閩人陳叔起作第三第四兩幅忘其作者亦忘所自得第五幅永嘉孫隆作併叔起作者皆得之黃宗豫余既各賦一詩書之金曽諸公又續為之賦沈民則題曰五清夫一味足以適口一音足以娛耳集是五者足以娛目而適意况益以諸公之佳詠哉明窗永晝午困之際閲而誦之則不必引茗碗聆絃奏而胸次可以灑然也慶楊伯升七十詩序吳中楊伯升宋和王存中八世孫偕其弟仲舉僑居武昌余往來武昌十數年與其兄弟交莫逆其清而粹也和而醇也介而有容也兄弟一也連璧之相輝雙桂之並榮不可以掩蓋吾所遇兄弟之並貴者有之並富者有之其善德之並如楊氏者鮮矣自吾去武昌今三十年思憶往時交遊之樂與楊氏兄弟之賢未嘗忘也比三四年仲舉來官翰林得慰久别每晤語必及伯升亦仲舉之篤于其兄也今年伯升春秋七十仲舉在史館喜其兄之安而念不得親奉觴為夀也求館中諸君子作詩寓歸為慶以屬余序余讀其詩蓋所祝願于伯升者皆同然未必皆知伯升之賢伯升靜厚有守所存所由咸當于義蓋有契孔子論仁者靜夀之道且不見南山之木乎處曠逺幽間之地匠石所不見知其傲氷霜凌霄漢閲歷嵗年固其理也伯升之夀固無俟于祝願而必見諸祝願者仁者愛其兄之心也幸余他日重過武昌尋舊侣招黃鶴酌江漢之清歌白雲之曲為伯升夀伯升必將撫清絃以和我蜀江歐陽氏族譜序吏部考功主事歐陽哲重修族譜一卷哲世居泰和之蜀江里其先出唐吉州刺史琮因有家于吉琮七世孫曰彪曰彤彪宋文忠公修所自出也彤會昌中舉進士官至工部尚書子澤居吉之永和鎮澤四世孫曰忠曰恿忠徙萬安之常溪恿將作監丞珣所自出也常溪七世至德祖徙蜀江逮哲八世哲所修譜蓋因監丞之舊也哲又參較文忠監丞二譜有不同者其大者琮率州人捍黃巢事據史傳蓋文忠一時傳聞之誤然余考文忠集其石本所載如此而集本無之豈非集本後出已審其誤而去之歟不然公于南豐曽氏譜尤詳辨其世次而自作譜乃容不審耶惟歐陽氏自亭侯以來世有聞人而莫盛于文忠後五十年監丞繼出二公文學忠烈炳然于天下後世君子論其人蓋國家之元氣也而同出于一鄉一族豈非盛哉嘗見二公譜序文忠言其祖考所傳于家者以忠事君以孝事親以廉為吏以學立身蓋以是願其族之人監丞亦云吾祖宗邁種德而望其後之子孫以修人事君子之仁于家同一心同一道也蓋君子施仁于國于天下必自其家始未有不能仁於家而能及國與天下者也仁者之言人所共師而况其族之子孫者乎今蜀江之子孫從事詩書科第仕宦彬彬有由哲字廣哲永樂辛丑進士尤負清操方嚮用于時續休前聞吾于歐陽氏有望焉故書以為蜀江譜序西昌梁氏續譜序人之先嘗有貴富則不復計其功行世率謂之故家此自流俗之見耳夫所謂故家者必其先文行有諸躬功利及于人聲譽有聞於時子孫克嗣于後而豈徒冨貴之云哉自流俗異見于是閭閻畎畝猝起旦暮間或貴或冨而叨詖忮害為豪者沿襲一再世蚩蚩之氓遂相與目為故家而君子不與焉果若其故家而後人有不能心其先之心蹈其先之行徒呺然自矜吾所從出異也君子猶不與也君子所尚者前有道以肇之後有道以紹之而非徒以其貴且富也西昌梁氏其先自長沙徙江陵至南唐徴仕郎勝用又徙西昌世襲儒行至宋贈知吉州逢吉二子君崇纍官起居舍人兵部員外郎直史館知鳯翔池州安慶三郡君傑纍官黃州同知翰林編修君崇子子華太原府通判又四世至蕃舉進士自太常博士歷知宣撫二郡皆官不過郡守家不至甚富而文學治行有聞于時者未嘗乏也其肇于先如此蕃四世至不移二子用之永樂中纍官至翰林侍讀兼春坊贊善本之纍官至魯府紀善皆以文學行義致聲譽當世其紹于後又如此君子所尚故家如梁氏者非耶蕃嘗作梁氏譜用之欲續譜未及而卒本之續之將授其諸子以屬余序梁楊世姻家義不可默蓋嘗自敘家譜以告吾後之人曰義利君子小人之判也為人後者必務明義以不忝乎先請於梁氏續譜亦云贈大理寺丞張宗璉詩序上嗣大寶之三月特詔吏部令京官五品以上與御史給事中及外之布政司按察司與郡縣之長吏各舉才德堪守令者命下少傅楊士竒與翰林侍讀學士王直合議舉左春坊左中允張宗璉應詔將卜曰以奏時中外皆未有奏者而禮部郎中黃鍾最先奏宗璉會上擢用舊宫臣以宗璉為大理寺右寺丞當之南京出上親命固非用鍾言而鍾遂以知賢聞搢紳間上臨御以來惓惓焉哀敬庶獄雖笞罰不自用必付諸廷諭每憲臣奏讞議必懇懇諭之欽恤之意矧大理天下之平宜夫親擇而後授也宗璉秉介潔之操蒞事周慎而寬厚長者之志素孚于人其不忝斯職也審矣而與之遊久者必取仁者贈言之義賦詩致交修之意蓋君子之心也詩以張茂先進德修業輝光日新之句為韻賦者曽棨王英王直周述人兩韻總詩八篇而引其端者楊士竒皆其鄉人云送宗老季琛詩序廬陵江右諸郡之表也楊氏廬陵諸大姓之表也忠襄公楊氏諸先德之表也季琛為公九世孫秉忠信廉潔之操懷明敏疏達之才襲詩書禮義之實豈非崑山之玉哉今嵗京尹薦其名尚書試其能天子命之官以為南海知縣知縣雖古百里宰而南海者漢南粵趙陀之所治在大海之瀕數嵗以來旱潦飢饉民臻于凋弊方有撫字之責又臨之以藩憲之重日奔走受事庭下至勞也又其地總制嶺南數十郡邑凡朝命之使有事于嶺南與海外諸蕃國及諸蕃國之人朝覲貢獻于闕下者皆于此取給行費至繁也季琛承命而去乃無幾微不任之意見乎言色豈非其自信可以勝其事而不難哉蓋一有不勝則人將議之曰此某郡之産某公之裔也不獨羞其一已而已大夫士知季琛者皆為詩送之余其族人故序諸簡首西城宴集詩序京城之中直長安門之西五六里地幽而曠居民鮮少園池水木離落蕭散之趣往往遇之如逰乎城之外者比數年士大夫稍有居于其間然其地既僻于一隅非大官貴人氣勢赫奕者之所處而凡日用所需雖米酒蔬果猝求之有不易得此豈志于榮利者之所樂居哉居之而樂者非其人淡泊簡逺足乎中而無所纍乎外者歟余之居于此也凡翰林素所交遊多在焉然各有職務而欲尊爼談詠以合羣情于一日之樂者蓋未暇也永樂壬寅閏十二月詔京官並給前一嵗之俸而嵗終公務亦簡於是相與為醵會而治具于陳光世是月二十有六曰晨雪初霽天氣融朗光世折簡以迓晝而畢集居城西者余及曽子啓王時彥余學夔桂宗儒章尚文陳光世錢習禮張宗璉周恂如陳德遵彭顯仁周功敘胡永齊劉朝宗凡十五人余正安近東徙其志所樂恆在西也蕭省身自外至而僑于西皆賔致之皆翰林交遊之舊也列序以齒籩豆潔豐觴酌循環酬酢並舉歡洽之至清言不窮間以善謔禮度無愆文采相發於是舉賔之初筵四章之末四句為韻賦詩韻少則疊其一而以道夫相樂之意可謂盛哉禮有之一張一弛文武之道且先王之屬民也嵗終休之而飲酒于序以正齒位况吾徒皆仕有職任旦暮在公惟惰慢之是戒則以其間暇相合為一日之樂者其於義固宜也衆之相合使其道與志有一之不相契而欲為樂亦不可得今之十有七人者十四出江右而三出于浙皆去其鄉五六千里而相與披豁傾寫表裏洞然忘其身之在客外此其相契而樂也夫豈茍乎詩成稡為一卷余序其所由來于簡首各録一本藏於家後之人不有觀之而興慕者乎對雨詩序永樂癸卯正月乙未天子大祀于南郊前期五日百官齋沐出宿將受誓戒是日微風東興及午而雨霏霏冥冥逮夕弗止春陽初暢寒沍不作而齋廬同宿者豫與余學夔錢習禮陳光世周恂如曽鶴齡陳德遵彭顯仁胡永齊周功敘劉朝宗咸心恱神融若堪適者而焚香瀹茗或論文談道或琴奕以嬉余詠杜少陵喜雨之詩顧謂衆曰曷有賦乎遂析隨風潛入夜潤物細無聲之句為韻各賦五言六韻一首士君子之適夫豈以為已哉憂樂以民仁者之所存也自去嵗春夏少雨冬屢大雪皆數尺蓋比嵗之所未有民喜以為來牟之望也今嵗正月之初輒屢雨常嵗三月乃雨亦未有若今之豫者而澤凍解泮土膏潤發區萌茁露蓋時物之滋肇於此生民嵗計之所仰者可冀也夫造化一元之氣發于春而契乎仁者之心則形諸聲詩固有所不能已矣而即其詩以考其志若有淹之詠霡霂之賦由今論昔豈相逺乎哉凡十有一人而賦者十人蓋退余為序云東里文集卷五
