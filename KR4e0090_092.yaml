body:
  text: 東里别集巻二明楊士竒撰聖諭録三朝聖諭録序太宗皇帝初正大統故翰林之臣不及十數人詔吏部及翰林舉文學行誼才識之士授職其中士竒首膺簡擢賜五品服肇建内閣簡七人專典宻務皆進官士竒與焉屬時幾務孔殷常旦及午百官奏事退内閣之臣造扆前進呈文字商幾宻承顧問率漏下十數刻始退既建儲簡翰林之臣兼輔導士竒與焉旦上前奏事退必造東朝叅侍經幄車駕北廵簡内閣二人輔監國士竒與焉仁宗皇帝宣宗皇帝嗣位所以寵任士竒者始終皆如永樂士竒祗事三聖三十有三年寵愈厚而官愈進負乘之愧夙夜靡寜嗚呼三聖逺矣當時共事之臣或亡或退獨士竒今年七十有八衰病昏耄猶濫玷朝行未已也誠孝昭皇后上仙梓宫歸葬士竒奉命祗送旬乃竣事其每旦展敬三陵之下追念舊恩五内摧痛因記憶榻前所得玉㫖之詳者輯而録之釐為三巻永樂居首洪熈次之宣徳又次之葢計平生所得此殆有之一二而潦倒荒迷非惟不能悉述亦不能悉記也有疑之者曰廷陛之宻可存於私乎輒應之曰吾惟懔乎慮泯吾君之盛美是懼而遑他䘏哉不觀於古乎歐陽文忠公著奏事録及濮議司馬文正公著手録具記當時君臣問對之辭委曲而詳盡所以著一代明良契合之盛事葢昔之大臣君子往往皆然義之所不能已也況臣之所録有聖徳焉有聖訓焉有特恩焉臣惟懼録之不能詳也而奚暇他䘏哉疑者既釋敬號曰聖諭録云正統壬戌冬十二月乙卯臣楊士竒謹序聖諭録上十三條永樂二年六月一日進呈文華殿大學士講義上覽畢稱善因曰先儒謂堯典克明峻徳一章一部大學皆具臣對曰誠如聖諭堯舜禹湯文武數聖人凡脩諸躬施於家國天下者皆大學之理上曰孟子道性善必舉堯舜爾等於講説道理處必舉前古為證庶幾明白易入又曰帝王之學貴切已實用講説之際一切浮汎無益之語勿用永樂二年饒州府士人朱季支獻所著書專斥濓洛闗閩之説肆其醜詆上覽之怒甚曰此儒之賊也時禮部尚書李至剛翰林學士解縉侍讀胡廣侍講楊士竒侍側上以其書示之觀畢縉對曰惑世誣民莫甚於此至剛曰不罪之無以示儆宜杖之擯之遐裔士竒曰當燬其所著書庶幾不誤後人廣曰聞其人已七十燬書示儆足矣上曰謗先賢毁正道非常之罪治之可拘常例耶即勅行人押季支還饒州㑹布政司府縣官及鄉之士人明諭其罪笞以示罰而搜檢其家所著書㑹衆焚之乂諭諸臣曰除惡不可不盡悉燬所著書最是永樂二年一日進呈勅邊將藁上曰武臣邊將不諳文理只用直言俗説使之通曉庶不悞事他日編入實録却用文永樂五年冬廣東布政徐竒進香至京師載嶺南土物將遺諸大臣及侍臣之任事者有得竒所列單目以進者上閲之既明日早御西角門翰林諸臣奏事退特召臣士竒還令赴西角樓遣中官賫竒單目示之已而復召至榻前問曰何獨無爾名對曰竒前為都給事中與翰林六科官皆隣居相往來於臣亦然今單目無臣名者葢竒初赴廣東衆皆作詩文贈之而臣以病未作土物之饋葢答詩文耳上曰爾時不病亦賦詩否對曰必賦則今單目亦必有名上曰其以遺諸大臣何意對曰臣在下未嘗聞大臣有受外臣饋贈者此亦竒不能卓立任已意而為之然終未知受否且臣觀單目内土物不過藤枕藤簟蘇合香丸之類皆微物非重貨必無他意上曰汝言是即取單目付中官令燬之一無所問上復諭臣曰為臣當戒私交為士當務清謹臣叩首曰謹遵聖訓永樂五年冬一日胡廣獨於武英門進呈文字上覽之稱善再三既從容問曰楊士竒文學於今難得而黄淮數不容之何也對曰淮有政事才士竒文學勝且簡静無勢利心葢因解縉重士竒及臣而輕淮故淮有憾上曰朕知汝亦不容於淮惟朕不為所惑廣叩首既退與臣言上恩如此當子孫世世不敢忘葢自是吾二人待淮愈謹矣永樂六年六月禮部尚書鄭賜卒先是禮部職務繁夥賜為侍郎趙羾所間憂鬱且有疾奏對屢失措上厭之是日早遽以訃聞召翰林諸臣問曰未嘗聞賜病豈其自盡乎衆未對臣進曰臣觀賜有病數日但惶懼不敢退即便安求醫藥昨日晚臣與賜同立右順門外賜體力不支仆地旁人怪其鼻口之氣有嘘無吸臣遽令其屬官扶出午門外上不俟臣語竟即諭翰林諸臣曰賜本君子顧才不足耳其撰祭文遣官祭之又命工部予棺其晚臣與黄淮奏事退上召臣還諭曰早來微汝言幾誤疑賜自今有事但直言勿隠永樂六年冬廵狩北京詔書命臣士竒視草上覽之再三喜曰簡當更勿改易其擇日書之頒下又曰試與諸尚書觀之諸尚書皆稱善獨兵部劉雋私於士竒曰請以有字易自字如何士竒曰善即以告於衆衆曰義無相逺不足易且上既善之矣士竒獨以聞請易之黄淮於上前執不足易臣曰於國家大體當用雋言上顧士竒曰從汝從汝明日諭胡廣曰楊士竒能服善難得永樂九年三月一日翰林諸臣奏事右順門退特召臣士竒還上問曰汝輔監國久東宫所行果如何對曰孝敬上曰試言其事對曰於事宗廟甚䖍凡籩豆之類皆親閲視一日當時享偶頭風作醫言當汗殿下曰汗即不敢蒞祭左右有言可遣人代者殿下曰上以命我我又遣人乎及期遂親蒞祭祭畢還未至宫遍體汗不藥而愈每尚膳進御用物詣行在皆一一閲過然後緘識遣行不輒信任下人自車駕北征恒切懐憂不遑寜居日中昃始食及勅使至始釋然寛慰上曰此亦子道之當然對曰古聖賢亦皆盡其當然者上曰聞輔臣中獨爾能持直道不見忤否對曰臣性愚戅殿下恒見容納然殿下天資甚高非衆人所能及或有過未嘗不知知之未嘗不悔而速改之且殿下最用心處在以愛人為本將來宗廟社稷之寄允不負陛下付託上甚喜命尚饍賜酒饌永樂十一年十二月二十八日鴻臚寺奏習正旦賀儀上召禮部翰林院官問曰正旦日食百官賀禮可行乎尚書吕震對曰日食與朝賀之時先後不相妨侍郎儀智曰縱然同日免賀為當上顧問翰林諸臣古有日食行賀禮否黄淮楊榮金幼孜皆未有對臣士竒對曰日食天變之大者前代元正日食多不受朝宋仁宗時元正日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有自契丹回者具言是日罷宴仁宗深悔今免賀誠當上曰君子愛人以徳不以姑息其免賀及宴仍賜百官節鈔上於敬天致誠必求當理未嘗茍狥人言大率類此永樂十一年十二月一日獨於武英門進呈勅藁畢上從容問曰汝今兼東宫何官對曰左諭徳上曰吾嘗察之獨胡廣與汝所行不忝東宫官胡廣今兼何職對曰左春坊大學士上曰好又曰吾聞諸留守官内汝與黄淮遇事肯言然聞東宫有從有不從對曰殿下推誠待下遇臣等有言必自斟酌如言當理無不聽納如未當亦不曲從上曰如此甚好永樂十四年十一月周王橚楚王楨相繼來朝例次日謁孝陵周王先至適遇節上命東宫皇太孫及小皇孫陪謁已出東華門上遽召翰林臣時楊榮金幼孜及士竒皆至上問曰二王東宫太孫及小皇孫謁陵展敬之位如何朕意雖略定爾三人試言之楊金未有對上顧問臣對曰周楚二王屬尊當列稍前兩傍東宫殿下列稍後居中皇太孫殿下亦居中列於東宫殿下之後諸皇孫與皇太孫同班而分列兩傍上曰爾所言有據乎對曰宋儒朱熹家禮大約如此上曰吾未嘗熟家禮但據已見書其位次遂出片楮宸翰所書位次正與臣所言合然下有六字未書授筆命臣足之遂遣鴻臚丞周昇馳齎赴陵俾率行之少頃昇復命以宸翰進上以授臣葢上天資甚高所意見暗合古人多類此一日東宫殿下傳上命召吏部翰林院官令舉老成正大儒者侍皇太孫講讀明日東宫殿下特召尚書蹇義及臣士竒問已得人否義對曰臣兩人共舉禮部侍郎儀智然衆鮮知之議尚未決殿下曰往者吾舉李繼鼎大誤後悔無及智甚端正但覺老矣臣對曰雖頗老然起家學官道理明執守正精神不衰目前廷臣中老成正大未見其比是日午朝上顧問東宫曰太孫處侍講讀已得人否對曰已舉禮部侍郎儀智然議尚未決上喜曰此得人矣雖老識朝廷大體能直言不阿向之元正日食吕震等皆欲行賀禮惟此老與楊士竒言宜免賀朕從之儀智可用遂召禮部翰林諸臣諭曰儀智甚好朕知之令侍太孫講讀葢上於臣下有片言之善皆記憶不忘永樂十四年上在北京頗聞高煦有異志驛召隆平侯張信詢之上猶未信車駕遂還南京以問皇太子對曰人言未可輒信且父皇在上當未敢有此心一日翰林諸臣奏事退上召士竒還問曰汝與蹇義在此漢府事皆當悉知昨日詢義固辭不知不肯言汝當為朕言之乂曰如朕未有知汝輩慮有離間之罪朕即知矣汝何慮對曰臣與義同事東宫殿下外人固無敢與臣等言雖間有言者亦百之一二乂多出臆度非見實跡此固不敢輒對陛下言然漢王始受冊封國雲南不肯行復改過青州乂堅不行今知朝廷將徙都北京惟欲留守南京此天下之人疑其心亦豈待事有實跡哉惟陛下早善處置使有定所用全父子之恩以貽永世之利上黙然起還宫後數日上得高煦私造兵器及皮船教習水戰及僣乘輿服物挾私擊死無罪官民縱護衛官軍京城内外刼掠悉有實蹟大怒褫其冠帶縶之西華門内東宫殿下叩頭懇為救解乃免上命翰林條示其罪且曰若此所為將來必不静朕今削兩護衛處之山東樂安州葢去北京甚邇即其作禍可朝發而夕擒也聖諭録中二十四條永樂二年七月翰林侍讀學士王達講乾之四舉儲貳為説講畢殿下召問臣士竒經指於此必無儲貳之説達不含譏否臣士竒對曰講臣非正道不陳豈敢含譏此出宋儒胡瑗之説殿下云對我言此常人得此爻亦舉此説乎對曰殿下此問最好因舉程子云凡卦中六爻人人有用聖賢有聖賢用衆人有衆人用君有君用臣有臣用無所不通又舉王昭素對宋太祖之言以對殿下悦又對曰今翰林春坊諸臣分撰諸經講義有上㫖命内閣之臣閲過有未當處悉與改正然後呈御覽允當然後以講内閣解縉專閲書胡廣閲詩金幼孜閲春秋臣士竒閲易昨日進呈此條上問儲貳説有據否臣士竒對以胡瑗之説上甚喜葢講臣非有據不敢妄出意見殿下喜自是講義有疑處必召解胡等四人相與辨析暢而後已遂作數鉅冊命春坊司經局臣分録講章以備常閲殿下監國視朝之暇專意文事因覽文章正宗一日諭臣士竒曰真徳秀學識甚正選輯此書有益學者臣對曰徳秀是道學之儒所以志識端正其所著大學衍義一書大有益學者及朝廷為君不可不知為臣不可不知君臣不觀大學衍義則其為治皆茍而已殿下即召翰林典籍取閲既大喜曰此為治之條例監戒不可無因留一部朝夕自閲又取一部命翻刋以賜諸子且諭臣士竒曰果然為臣亦所當知遂賜臣一部葢殿下汲汲於善道如此上在東宫稍暇即留意文事間與臣士竒言歐陽文忠文雍容醇厚氣象近三代有生不同時之歎且愛其諫疏明白切直數舉以勵羣臣遂命臣及賛善陳濟校讐歐文正其誤補其闕釐為一百五十三巻遂刻以傳廷臣之知文者各賜一部時不過三四人而上恒諭臣曰為文而不本正道斯無用之文為臣而不能正言斯不忠之臣歐陽眞無忝廬陵有君子士竒勉之臣叩首受教永樂七年賛善王汝玉每日於文華後殿道説賦詩之法一日殿下顧臣士竒曰古人主為詩者其高下優劣何如對曰詩以言志明良喜起之歌南薰之詩是唐虞之君之志最為尚矣後來如漢高大風歌唐太宗雪耻酧百王除兇報千古之作則所尚者霸力皆非王道漢武帝秋風辭氣志已衰如隋煬帝陳後主所為則萬世之鑑戒也如殿下於明道玩經之餘欲娯意於文事則兩漢詔令亦可觀非獨文詞高簡近古其間亦有可禆益治道如詩人無益之詞不足為也殿下曰太祖高皇帝有詩集甚多何謂詩不足為對曰帝王之學所重者不在作詩太祖皇帝聖學之大者在尚書註諸書作詩特其餘事於今殿下之學當致力於重且大者其餘事可姑緩殿下又曰世之儒者亦作詩否對曰儒者鮮不作詩然儒之品有高下高者道徳之儒若記誦詞章前輩君子謂之俗儒為人主尤當致辨於此太宗皇帝在北京有白鵲之瑞行在禮部行南京慶賀監國下及五府六部例各進表時士竒以病在告監國表命庶子賛善撰呈稿殿下不懌命尚書蹇義特以示臣士竒曰甚寂寥且不着題以賀白龜白鹿皆可命臣士竒改益臣士竒改一對云望金門而送喜馴彤陛以有儀後增一對云與鳳同類蹌蹌於帝舜之廷如玉其輝翯翯在文王之囿義以進殿下喜曰此方是帝王家白鵲適内厨進膳遂命内使陳昻徹以賜臣且傳㫖諭臣曰其勉進藥食早出非但倚卿文學久不聞直諒之言慮有過不知急得相見也永樂十五年上在東宫卜筮專用揲蓍而斷以周易凡後世俗占法皆不用嘗命臣士竒纂六十四卦三百八十四爻朱氏本義要㫖為一編既進上悦名曰周易直指臣進曰周易固為卜筮作然文王周孔彖象十翼之辭凡脩齊治平為君為臣之道悉具請編輯以進用備覽閲從之踰年輯成以進上覽之大喜名曰周易大義賜臣士竒繡衣銀帶先是徐好古作尚書直指金幼孜作春秋直指皆已進上諭臣曰凡此皆書數本於齋閣書殿寢室各置一本得備觀覽葢上素好學如此永樂中臣同尚書蹇義侍仁宗皇帝監國義重厚老成更歴多而疑慮深臨事寡斷每同承顧問一事之間義常持兩端猶豫久未決臣進曰有事湏行無終不決之理上曰然受事皆應復命豈得不決義曰事當熟慮慮不熟有後患故必應詳審上曰義言亦是臣對曰凡事豈得不思但思多則惑既思而有疑則擇一端近於理而可對上言者行之上笑曰此湏兼知仁勇自今議事只如士竒言擇當理者從之不須多思致惑永樂二十二年八月學士楊榮自行在還報大行晏駕東宫殿下即遣皇太孫出居庸赴開平迎梓宫時京師諸衛軍皆隨征聚行在惟趙府三護衛軍留京師一時浮議籍籍慮護衛為變遂秘未發䘮皇太孫瀕行啟東宫殿下曰出外有封章白事非印識無以防偽東宫殿下顧臣曰渠言良是但行急新製則不及臣對曰殿下未踐阼今居䘮無所事有事自應行常用之寳東宫小圖書亦閒太孫出外無行事惟有上禀朝廷之事可假之行此出一時之權歸即納上東宫殿下即取付太孫曰有啓事以此封識來此亦久當歸汝汝就留之既行殿下顧臣曰汝此説是雖出從權亦事機之㑹昔大行臨御儲位久未定浮議喧騰吾今就以付之浮議何由興又曰自今朝廷事仗蹇與汝但蹇亦有遲疑汝湏盡心汝二人吾當重用不輕也對曰殿下嗣位朝廷大小事皆當盡公以厭服天下之心湏溥恩及下然必先扈從征行之臣若漢文即位首進宋昌史書之以為貶此當深戒臣兩人日在侍近殿下必不遺惟不應先及此殿下初政收人心之機也永樂二十二年八月十七日臣士竒新改華葢殿大學士謝恩畢聞析薪司奏准循嵗例賦北京山東棗八十萬宫禁香炭之用士竒入將奏之時蹇義夏原吉奏事未退上望見士竒笑謂蹇夏曰新華葢學士來奏事必有理試共聽之臣言詔下裁兩日今聞析薪司傳㫖賦棗八十萬得無過多雖是嵗例然詔書所減除者皆嵗例上喜曰吾固知學士言有理吾數日來宫中事叢脞此是急遽中答之不暇致審即命減除四十萬又顧蹇夏及士竒曰汝三人吾所倚非輕但有事湏盡言庶幾以輔吾不逮永樂甲辰九月癸未禮部尚書吕震言於上曰今喪服已踰二十七請如太祖倣漢制釋縗易吉服震奏已遂退徧語羣臣明旦易服士竒謂震曰今喪服未可比此例葢洪武有遺詔且仁孝皇后崩太宗皇帝在上縗服後仍數月白衣冠絰帶今上於皇考乃遽即吉乎時黄淮同余意然不敢明言忤震震厲聲忿余曰朝廷每事被爾抝衆尚書蹇義從旁解之曰渠言當理國家事公豈應偏執已見請兼取二説明旦君臣皆素衣冠黒角帶遂偕六部都察院具奏報可明旦上素冠麻衣麻絰出視朝文臣惟學士武臣惟英國公如上所服餘文武羣臣之服皆從義等所定朝退上召蹇義夏原吉及臣士竒等諭曰吕震昨奏易服云皆與汝等議定然後奏時吾已疑其非但聽臣下易之梓宫在殯吾豈忍易後聞士竒有言始知震妄士竒所執是因嘆曰張輔知禮六卿乃有不及又顧義曰汝所折𠂻亦未當然不必再以語人羣臣聽其便上御思善門選用東宫官命户部尚書郭資為太子太師仍兼尚書蹇義夏原吉力言資偏執妨事且多病請令致事上意未可召臣士竒語以二人之意且曰先帝初舉義一切軍需糧餉皆出資調度吾時居守竭誠佐輔甚得資力今出危履安吾嗣大位乃遂棄之吾誠不忍臣對曰故舊無大故不棄此皇上聖仁上問臣資為人果如何對曰資强毅人不得干以私但性偏執甚至沮格恩澤不流於下上問其故對曰詔勅數下蠲免災傷租税資不聽開除必責有司依嵗額徴納此其過之大者然耿介能守廉非衆所及上曰吾在此又有原吉與之同事當不復偏執矣乃不從二人言無幾蹇夏又數數言資偏執妨事不去資仁政必為所格上强從之命資以太子太師户部尚書致事璽書褒諭賜銀鈔綵幣甚厚資歸踰月上念之不置間諭臣曰無使大臣怨乎不以資其謂我何吾欲遣人視之且少加賜齎對曰賜齎有時而盡洪武中有尚書致事給全俸者今北方倉廪少儲得减半給之可常足用上喜即命户部給資半俸上之篤於故舊槩類此十一月十二日復大理卿虞謙官先是虞謙奏事侍臣有言此當榻前密請㫖不當於朝班對衆敷奏為賣恩者又有言其屬官楊時習先導之宻陳而謙不從者遂降謙為大理少卿而陞時習為卿其後臣士竒獨進奏事畢未退上問臣汝有欲言者否對曰有非虞謙乎對曰然上曰吾亦頗悔之汝試言之對曰外間皆云時習實無先導之言時習是臣江西人亦親語臣本無此言今冐居卿位慙懼不安臣又言謙歴事三朝皆居通顯頗為得大臣體者且今所犯小過上曰吾之悔亦念此因問時習其人若何對曰雖起於吏然明習法律公正廉潔上喜曰吾有以處之㑹吏部言交阯闋按察使上諭尚書蹇義曰左遷虞謙吾過矣復其大理卿改楊時習交阯憲使上之敏於改過率類此十二月翰林院進呈三孤誥草上閲既取筆親增二語曰勿謂崇高而難入勿以有所從違而或怠顧臣士竒等曰此朕實心卿等勉之又諭臣士竒曰近日覺羣臣之意甚好事或未當輒有封章進來臣士竒對曰此由陛下聖徳容納昔富弼有言願不以同異為喜怒不以喜怒為用舍上曰朕志正如此朕每聞羣臣言退未嘗不反覆思之或朕言有過退亦未嘗不悔士竒對曰成湯改過不吝所以為聖人願陛下常以古人為法永樂二十二年十二月兵部尚書李慶言於上曰今嵗北方之民畜馬頗蕃皆送至京已散軍伍操用尚餘數千欲散民間畜則民甚敝不可重困之今逺近方面郡縣朝覲官皆集請每員給一馬俾畜可散二千餘匹正官給牡佐貳以下給牝太僕苑馬寺嵗課其息有虧罰與民同上令與蹇義夏原吉商略可否以聞二人奏如慶議命已下臣士竒聞之與慶言必不可行慶忿甚不納臣士竒遂詣扆前力陳不可曰朝廷以禮徴賢上者授方面郡守次者授百執事今皆役之畜馬以蘇民是貴民而賤官矣時蹇夏皆在侍上曰士竒論當慶固無識汝兩人亦言其便何也兩人對曰初慶與臣等言此出陛下意必欲行之非謂出於慶也上曰幾誤朕矣顧臣士竒曰少頃即批出罷此令明旦復奏陛下許臣罷散馬之令豈遂中止如必欲行此令天下懐抱才徳者自此誰肯出仕葢虧損一馬必責陪償破家廢産累及子孫且所散不及三千而朝廷負此名於天下後世誠非佳事上曰吾偶因事稽緩耳今日必批出又明旦復奏内批兩日不出兵部已督責朝覲官多領馬矣且今所領多生駒初受羈絡南方之人軟怯不能控制立視其奔逸有號泣衢路者矣臣恐將來逺慮者非但不願仕亦無志學問此令之失非小上曰吾即批出不爽也午刻上御思善門召士竒諭曰内批豈眞忘之初聞汝言即宻遣人觀李慶吕震等意渠輩交口忿爾朕念爾孤立慮為衆所傷故不欲因汝言而罷此令今有名矣出示一章乃陜西按察使陳智言畜馬風憲受制上曰爾就據此草勅止散馬臣士竒叩首對曰古人有言陛下知臣臣不孤矣但馬已有領去者望如何處之上曰已領者准洪武中官員乘馬例給之不責生息虧欠亦不責償未領者悉止未散之馬給邊軍操用上復顧臣曰繼今令有未便惟宻與朕言此輩多不識大體但皆先朝舊臣未可遽退之永樂二十二年十二月庚午百官習新正儀於海印寺用樂明日臣士竒等進言近禮部與臣等已議定新正朝儀不用樂昨日習儀所仍用樂不改今四方朝覲官皆集於此觀禮乞勅禮部設樂不作不報葢尚書吕震復言臣等所議不當榮幼孜皆欲已榮即趍出臣士竒與淮不可三人遂復進言夜漏下十刻未得㫖午門官入奏臣等尚未退遂有㫖命禮部設樂不作正月初二日特召臣士竒四人至奉天門諭之曰吕震每事悞朕卿等所執停樂是為君以受直言為賢不受直言則過益深為臣以能直言為賢不能直言則忠不盡如昨日朝㑹從吕震言今悔何及賴汝等盡心遂免此悔自今遇朕行有未當但盡意言之毋以不從為慮各賜鈔千緡文幣一表裏洪熈元年正月吏部傳㫖命臣士竒兼兵部尚書三俸俱支士竒明日見上叩頭辭尚書之職曰少傅殿學士二職臣已過分尚書一職更不敢當上厲色曰黄淮楊榮金幼孜皆受三職汝獨二職外間將謂朕何汝必勿辭士竒叩首言請辭尚書之俸上曰汝於朕勞勤二十年一志不懈故以此禄相酬何用固卻對曰請必辭俸尚書月俸六十石國家可養六十卒臣受二俸猶懼過分敢望復加上曰不受俸米可受折支俸鈔對曰鈔亦俸也與米但異名耳時尚書蹇義在傍言於上曰聽其辭學士一俸亦可臣士竒曰辭俸當辭厚者何用取虛名上曰朕成汝志遂聽臣辭復顧義曰廉貪之風士竒有焉於是黄淮亦辭户部尚書一俸永樂中御史李祥舒仲成嘗奉勑理木植税課之弊王汝玉預焉汝玉上監國時所愛者令㫖命祥等削其名勿奏二人力言不可萬一上有聞得罪反重既忤意遂已犯者後皆茍免及上嗣位尚書蹇義因奏仲成他事上曰是嘗為御史查理南京木植税課乎對曰然曰李祥安在對曰丁母憂去矣時仲成已陞湖廣憲副即命都察院捕治仲成臣士竒聞之進疏曰向來小人得罪者多陛下即位以來皆已宥之今又追理前事即詔書不信漢景帝為太子時召衛綰稱病不赴即位進用綰前史韙之上覽之喜即有㫖罷治仲成而降勑奬諭臣且賜米及鈔幣又面諭之曰有卿盡心如此朕復何憂洪熈元年二月朔旦臣士竒武英門獨對上問近日外間事對曰覺告訐之風復萌且動輒加人誹謗禍及身家請諭法司禁止上曰不特此如自宫一事朕所甚惡尤湏嚴禁對曰此當用璽書行之上曰爾更思三二事通行葢聖心惓惓於仁政無時忘也趙王既之國鄭村壩䕶衛畊地棄上命太監左角擇二頃膏腴者賜臣士竒葢前已賜蹇義二頃矣至是臣聞命懇辭上曰汝於朕表裏一誠未嘗媕娿首䑕吾資益良多此所以心恒不忘汝前辭禄今又辭田何執之固也對曰臣起自寒微遭逢聖明今踰越涯分萬萬豈當尚不知止足幸陛下大恩不使之滿溢庶幾少延殘喘服事陛下三二年獲歸全山林皆陛下之賜上曰汝勿憂終身吾送汝入土身後事皆勿憂對曰聖仁在上臣復何憂遂允臣辭田明日上諭蹇義曰士竒眞能廉使仕者皆如此世豈有贓吏乎四月初有進言太平之政者上召蹇義夏原吉楊榮及臣士竒以其章示之已而曰今朝無闕政生民皆安蹇三人意皆云然惟士竒以為尚未義等對曰臣等觀上即位以來詔書勅㫖無非仁政百姓無科斂之擾徭役之繁可謂治世臣士竒對曰臣觀陛下之恩澤已覃被天下但流徙尚有未歸瘡痍尚有未復逺近猶有艱食之人湏更得二三年休息庶幾人皆得所上笑曰吾意非為此也朕與諸卿相與出自誠心去年各與繩愆糾謬圖書切望匡輔惟士竒曾封五章已皆從所言末一章言周王求藥事不曾從後亦悔之蹇三人皆無一言豈朝政果皆無闕生民果皆安乎三人皆叩首有慙色既退復召蹇義還諭曰爾與士竒吾監國舊輔原吉賢良皆吾所倚任各與圖書自吾本心士竒懇言待人宜均亦望與榮幼孜既與之後往往聞榮有怨誹語義對曰榮之不足於義者為官品在臣等之次其他誹語臣實未聞左右之讒惟陛下慎察縱其或有亦望容之久當自定上曰吾亦不信此語但偶然及之以明吾所任者爾三人耳事有未當皆湏直言勿有疑諱葢上之求言懇切如此上自臨御以來大理少卿戈謙數言事上頗厭其繁瑣尚書吕震呉中都御史劉觀侍郎呉廷用等交奏其賣直沽名遂召臣士竒等至榻前語以謙之逾分臣士竒對曰謙不諳大體有之然其心感陛下超擢之恩欲圖報効古人有言主聖則臣直惟陛下容之不然進言者將懼矣上雖不罪謙然臨朝之際數形於詞氣又數日上御奉天門臣士竒獨奏事因進曰陛下頒詔求言言不當者不罪戈謙不曉事激聖怒數日朝臣皆悚仄相與以言為戒今逺近朝覲之臣皆集闕下目見而口傳將謙之名愈彰而朝廷受不容直言之謗上惕然曰此事固是朕不能容如吕震等迎合以益吾過自今吾不復言謙遂免謙朝叅令專坐司眎事自是一月餘朝臣言事者少上特召臣士竒諭曰爾料事不虚自免戈謙朝言者不至豈果無事可言對曰臣下孰不欲進言納忠惟在上寛容以來之上曰朕非怒謙言事但其言亦有矯激過實者爾可諭衆人以朕之實心對曰此非臣言所能使之信必得璽書親諭之乃見聖徳之實遂令臣就榻前書勅引過命戈謙如舊朝叅令百官言事毋以謙為戒因諭臣士竒曰朕有過不難於改雖一時不能容然終知悔爾知朕心毋吝於言也未幾有言中官謝安四川伐木虐民者於是召戈謙諭曰爾本清鯁之臣朕今取清鯁用爾遂陞謙副都御史賜鈔千緡馳驛詣四川罷伐木之役遂糾察安等洪熈元年四月有㫖鄒濟徐善述王汝玉皆贈官賜諡官建祠於墓四時賜祭臣士竒言於上曰禮貴得中朝廷惟宗廟以四時享社稷孔子皆春秋二祀濟等雖有舊勞不得過社稷孔子而與宗廟等上曰吾過矣過矣誠念其舊勞不能忘故率爾下令而不覺其過今賴爾正此失對曰先儒有言周公之功固大皆臣子之分所當為何況濟等上曰然遽召禮部改春秋祭葢上未嘗有固必心徙義遷善速於轉圜云上自少侍太祖皇帝明於星象臣士竒侍監國時間以教臣曰宋元儒者多曉習不可忽也元年四月中尚書蹇義夏原吉楊榮及臣士竒奏事奉天門畢上問夜來星變曾見否皆對曰未見上曰蹇三人雖見不能知士竒當知之臣對曰臣愚亦不能知上曰天之命矣嘆息而起又明日早朝罷召蹇義臣士竒至奉天門諭曰監國二十年為讒慝所搆心之艱危吾三人共之賴皇考仁明得遂保全言已泫然義士竒亦流涕臣士竒對曰今已脱險即夷皆先帝之賜陛下至誠之效更不煩聖明多慮上曰即吾去世後誰復知吾三人同心一誠遂出二勑二印賜兩人臣士竒得楊貞一印勅曰云云皆拜受而退葢踰月宫車宴駕矣嗚呼痛哉元年五月禮部引郡縣嵗貢生入奏請如例翰林出題考試上召士竒至奉天門諭之曰監生之不可用皆由翰林不嚴試所致此弊已數十年非一朝夕之故今不可復循舊弊必嚴試之即其中皆下惟得一人亦可即皆無可取亦不妨但須得實才上又言科舉弊亦須革臣士竒對曰科舉須兼取南北士上曰北人學問逺不逮南人對曰自古國家兼用南北士長才大器多出北方南人有文多浮上曰然將如何試之對曰試巻例緘其姓名請今後於外書南北二字如一科取百人南取六十北取四十則南北人才皆入用矣上曰北士得進則北方學士亦感發興起往年只縁北士無進用者故怠惰成風汝言良是往與蹇義夏原吉及禮部計議各處額數以聞議定未上㑹宫車晏駕宣宗皇帝嗣位遂奏准行之聖諭録下宣徳元年高煦反車駕親征罪人既得師還六部遣尚書陳山迎駕山見上言宜乘勝移師向彰徳襲執趙王則朝廷永安矣上召楊榮以山言諭之榮對曰山言國之大計遂召蹇義夏原吉諭之兩人不敢異議榮言請先遣勑趙王詰其與高煦連謀之罪而六師掩至可擒也從之榮遂傳上㫖令士竒草勅士竒曰事須有實天地鬼神豈可欺哉且勅㫖以何為辭榮厲色曰汝可沮國之大事乎令錦衣衛責所係漢府人狀云與趙連謀即事之因何患無辭士竒曰錦衣衛責狀何以服人心榮曰汝不然吾言可往與蹇夏言之士竒往見二人言之蹇曰上意已定衆意亦定公可中沮耶夏曰萬一上從公言今不行趙後或有變如永樂中孟指揮之舉誰任其咎士竒曰今事勢與永樂中異永樂中趙擁三護衛今已去其二且昔孟指揮所為王實不預聞不然趙王豈至今日乎蹇曰即如公言今若何處置士竒曰為今之計朝廷重尊屬厚待之有疑則嚴防之亦必無虞而於國體亦正矣二人曰公言固當然上特信楊榮言不係吾二人可否也士竒退與榮曰太宗皇帝惟三子今上親叔二人一人有罪者不可恕其無罪者當加厚之庶幾仰慰皇祖在天之靈榮曰汝既不草勑則我當以聞時惟楊溥與士竒意合溥曰吾二人請入見上明其大義兵必不可移榮聞溥言即趍入見溥士竒亦踵其後而門者止吾二人不得入已而有㫖召蹇夏入蹇夏以士竒言曰上意不懌然亦不復言移兵遂還京自是道中有顧問惟召榮及蹇夏不復召士竒及溥至良鄉臣二人始得見上意猶若未平忽厲聲曰好機㑹不得乘到家皇太后必見尼矣上至京大悔不復及彰徳事然言者猶喋喋請盡削趙護衛且請召趙王拘之京師上皆不聽一日特召士竒諭曰言者論趙王日益多如何對曰今日宗室惟趙王於陛下最親當思保全之毋惑羣言上曰吾亦思之皇考於趙王最友愛且吾今惟一叔奈何不愛然當思所以保之之道吾今將封羣言俾都御史劉觀及公侯中選一人齎以示之使自處對曰必不得已則於皇親中擇一人與趙心相孚者偕觀行庶幾有所開導上曰然則誰可對曰廣平侯袁容至親且善開諭更得璽書親諭之尤好上從之遂遣容觀行趙王得璽書及言者所上章大喜曰吾生矣即獻護衛且上表謝恩而言者頓息上待趙王日益親厚而薄陳山竟踈斥之葢上初雖為山所惑而後灼知其非踰數月召士竒至南齋宫諭之曰吾待趙叔不失親親之禮爾有力焉自今毋以見忤為嫌遂賜白金寶楮文綺宣徳二年十月黎利遣人進前安南陳王三世嫡孫暠表乞立為陳氏後其辭懇惻上覽之宻示英國公張輔輔對曰此不可從將士勞苦數年然後得之此表出黎利之譎當益發兵誅此賊耳輔退乃召尚書蹇義夏原吉示之且諭二人曰何以處之二人對曰舉以與之無名徒示弱於天下二人退遂召楊榮及臣士竒出表示之且諭以三人所對曰今日與爾兩人決之榮對曰永樂中費數萬人命得此至今勞者未息困者未蘇發兵之説必不可從不若因其請而與之可旋禍為福上顧問臣云何對曰榮言當從求立陳氏後者太宗皇帝之初心求之不得乃郡縣其地十數年來兵民困於交阯之役極矣此皆祖宗之赤子行祖宗之初心以保祖宗之赤子此正陛下之盛徳何謂無名且漢棄珠厓前史為榮何謂示弱臣侍仁宗皇帝久聖心數數追憾此事臣願陛下今日明决上曰汝兩人言正合吾意皇考言吾亦聞之屢矣今吾三人可謂同心同徳遂命尚膳賜酒饌明旦朝罷出暠表示文武羣臣且諭之曰太祖皇帝初平天下安南最先朝貢及黎氏簒弑毒虐國人太宗皇帝發兵誅之本求陳氏之後立之求之不得始郡縣其地至我皇考每追念往事形諸嘅嘆此數年來一方不靖不得已屢勤王師豈朕所樂今陳氏既有後爾等試觀表中所言其從之便抑不從之便羣臣對曰陛下之心即祖宗之心且偃兵息民上合天心從之便上曰論者不達止戈之意必謂從之不武但得民安朕何恤人言其從之宣徳二年十月二十七日上將赦交阯命羣臣舉奉使者僉舉上聞已定明旦尚書蹇義欲易以伏伯安衆莫敢異之士竒私與夏原吉曰此無籍小人用之必辱朝廷公當榻前力主張葢時上多主夏言既而有㫖召衆皆入蹇遂奏用伏上顧問夏對曰不可用蹇曰伏善言語非衆所及臣士竒曰伏有穢行而無學識遣之必辱國遂不用又數日臣士竒獨對上曰朕旁詢伏伯安之行乃貪淫無耻人蹇何為欲用之對曰蹇不過取其能言然言不當理雖蠻夷之邦不能行且恣其所行必為蠻夷所鄙上曰蹇舉固非衆何以皆黙不言對曰非比蹇也葢亦重其能言上曰蹇不尤夏與爾否對曰蹇平日和厚無人已心况於國事孰敢偏任已見上喜曰君子和而不同是已向因爾言伏之力故决不用之朕已知爾心繼今但一志為國毋憚違衆士竒叩首言謹遵聖諭宣徳三年十月劉觀有罪下獄先是六月中一日早朝罷召楊榮及臣士竒至文華門命光禄賜食既上曰吾三人商量一事京師端本澄源之地祖宗時朝臣無貪者年來貪濁之風滿朝何也臣對曰貪風永樂之末巳作但至今甚耳上問永樂何如對曰十五六年以後太宗有疾多不出扈從之臣放肆無顧藉請託賄賂公行無忌此事已徹九重但未舉發仁宗嘗為臣言初到北京上問南京臣僚有能守亷者否對曰無敢不守上曰扈從來此者贓賂競行其能守亷惟吏部侍郎師逵一人汝當知之榮曰是時贓貪方賔最甚上問今日之貪誰最甚者榮對曰莫甚劉觀臣曰風憲所以警肅百僚憲長如此則不肖御史皆效之不肖御史差出四方則不肖有司皆效之上撫掌歎曰除惡務本又問廷臣中今誰可使掌憲兩人久未對上曰未必都無一人臣士竒對曰通政使顧佐廉公有威曾任御史及按察司皆有風采榮曰佐亦嘗為京尹能防禁下吏政清弊革上喜曰顧佐乃能如此命賜茶而退數日有㫖令劉觀廵閲河道觀行十數日陞顧佐右都御史賜璽書令考黜不肖洗滌積弊佐奏黜其屬不肖者二十餘人罪甚者發遼東於是御史連章劾奏觀貪贓狼藉并奏其子輻脅制諸道騁私滅公皆明著實跡上大怒追觀父子皆至出御史章示之既承伏法司坐觀重法以輻同犯免科具奏次年四月上召榮及臣以奏示之且曰觀負朝廷處重非過臣對曰觀誠有罪但經事四朝數受顯任願姑屈法全其生榮亦乞貸之上曰為汝二人曲貸其死發為邊吏榮曰辱之過甚與死等爾上曰欲父子皆貸乎榮曰子發戍邊而令觀隨居恩與法兩盡矣遂命法司發遼東宣徳四年十月一日朝罷侍上於左順門遥望見大學士陳山上曰汝試言山為人對曰君父有問不敢不盡誠以對山雖侍從陛下久然其人寡學多欲而昧於大體非君子也上曰然趙王事幾為所誤朕已甚薄之近聞渠於諸司日有干求不厭當不令溷内閣也葢上初臨御以山及張瑛東宫舊臣俱陞内閣眎事二人行相類至是浸聞於上數日後有㫖調瑛南京禮部山專教内豎俱罷内閣之任朝士皆頌上明决山遂見疎不復得近扆前矣宣徳四年顧佐自陞都御史憲度嚴明宿弊清革下至吏卒悚仄懔然吏有遭笞者捃佐之過謂受皂𨽻賂放歸悉具姓名訴通政司以聞上宻以示臣士竒且曰爾不舉佐廉乎對曰所訴之事誠有非誣葢今朝臣月俸止給米一石薪炭馬芻咸資於皂不得不遣半歸使備所用皂亦皆樂得歸耕實官皂兩便此京師大小臣僚皆然臣亦然自永樂以來如此仁宗皇帝固知之所以增朝臣之俸上歎曰朝臣之艱如此因怒訴者曰朝廷用一好人輒為小人所排欲下法司治之臣對曰此末事不足上干聖怒但付佐自治恩與法並行矣臣退上召佐以吏訴狀授之諭之曰放皂歸耕使給薪芻京官皆然不足為過小人不樂檢束誣陷正人汝自治之佐叩首退召吏示之狀吏恐甚佐曰上命我治汝我姑容汝但改行為善竟不治之上聞之喜曰佐得大體矣數月有囚告佐累累枉人重罪不聽訴理者上大怒召楊榮及臣諭曰此必有重囚教之排佐小人陷正人不可不究治遂命三法司鞫之實千户臧清殺一家無罪三人當死代冩狀教之誣告上曰不誅之佐何以行事立命磔清於市葢上去惡佑善明決率類此宣徳五年二月十九日上御南齋宫召臣士竒諭曰吾欲下一寛恤之令今獨與爾商之然吾未能悉知爾當效助益遂命内侍具楮筆上曰免災傷税糧當是首事聞民間虧欠畜馬驢騾所司追償甚廹民計無出亦甚艱難部官坐視而不言對曰陛下聖念及此生民之幸各部惟知督責下民以供公家而不顧民心之離故一切民瘼蔽不以聞今所當寛恤者殆非此兩事上曰汝所知者具言之對曰百姓積年負欠薪芻及採辦買辦之物所司責償甚急皆當寛貸各處官田起科不一而租額皆重細民困之郡縣不以聞蘇州尤甚户部固執悉不與除豁細民多有委棄逃徙者此當量與減除部符下郡縣採辦買辦諸物但一概𣲖徴更無分别出産與否非出産處百姓數十倍價買納此請戒約該部今後凡物只派産有之處不許一概均派苦民年來刑獄寃濫者多感召旱澇恐由於此請戒飭法司敦用平恕務求情實今工匠之弊尤多四方逺近每户不問幾丁悉徴在京役於公者什不一二餘皆為所管之人私役不得營生嗟怨溢路此請命官廵察究治及分豁户丁之半放回單丁者免老病無餘丁者除籍又有平民本非業匠為怨家誣引者當審實除豁南方運糧至此人力甚艱而倉廪無闗防姦人盜竊動輒數萬前者就執後者復繼恬無警畏此請命風憲闗防廵察上歎曰朝廷任六卿但知苛責下民而不能察姦清弊有愧厚禄矣爾所陳有益於朕有益於民此皆應行命即草勅明旦頒下遂令尚膳賜饌勅諭既下上聞衆心悦戴召臣賜鈔三千緡文綺二端及羊酒臣叩首受賜上笑曰薄用潤筆耳宣徳五年三月清明節上奉皇太后謁陵謁畢上侍皇太后於行殿賜英國公張輔尚書蹇義及臣士竒楊榮金幼孜楊溥四人見太后曰爾等皆先朝舊臣勉輔嗣君云云遂賜酒饌及白金綵幣皆叩首退既還京臣間因獨對上曰前日陵上汝等謁太后退太后為朕言皇考往年在京中談汝等姓名及行事甚熟太后悉能記憶其間才學孰優孰劣孰肯任事不任事皆有譏評言輔雖武臣而達大義蹇重厚小心但多思而少斷汝等持正言不避忤意議事之際先帝數不樂汝然終從汝以不敗事嘗有一二事之失先帝甚悔不從汝言太后又謂朕曰凡正直之言爾不可以為忤而不從謹之謹之士竒對曰太后之盛徳仁宗皇帝之盛徳也願陛下常奉聖訓宣徳五年六月一日上於文華門御道屏左右獨召臣士竒諭曰楊榮家畜馬甚富初聞之張瑛未信今察之皆得之邊將榮交通邊將甚宻豈可任於親宻之地對曰榮與諸將交葢因永樂中扈從北征太宗皇帝命掌兵馬之數以此於諸將稔熟今内閣諸臣知邊將之强弱才否邊將之逺近險易四裔之順逆委曲惟榮一人知之詳臣等皆所不及方今用人之際榮未可輒他用且其在宻地凡制勅中予奪高下皆禀上㫖又有臣等同議而行豈榮所得獨專且臣與之同官及亦嘗觀其廐馬三五匹有之多亦不能畜葢芻菽未易辦上曰爾未知其家馬多即鬻於市朕知之審矣渠數請復永樂以來調衛軍官朕詢兵部言有罪調衛洪武舊制無可復之理朕固已疑之對曰此事亦未明但其人尚有他長可用幸姑容之上曰朕初嗣位若惟信榮言而不聽蹇夏則士竒不得在此久矣今士竒乃力佑榮乎對曰陛下曲容臣天地之恩也臣今日亦願陛下推天地之量容榮使之改過自效此道在陛下今日所當行上意乃解然自是不專任之矣宣徳六年七月時上頗好微行一夕漏下二十刻以四騎出過臣前報者言范太監來臣倉惶出迎上已入門立月中臣俯伏悚懼言陛下奈何以宗廟社稷之身而自輕擾擾塵埃昏暗中誰識至尊萬一或有識者變起倉卒何以備之上笑曰思見卿一言故來耳遂屏左右語竟顧謂臣曰此居且弊當為爾葺理臣叩頭懇辭曰陛下宫殿未建臣必不敢當且車駕今夕俯臨外間明日必有知者萬萬自此愼出事變不測當慮也駕還宫明旦遣太監范𢎞宻問臣車駕幸臨曷不謝對曰至尊夜出愚臣迨今中心惴慄未巳豈敢言謝又數日遣𢎞問臣曰今天下平静上時一微行何足過慮堯不微行乎臣對曰陛下尊居九重恩澤豈能遍洽幽隠萬一有寃夫怨卒窺伺竊發誠不可無慮後旬餘錦衣衛獲至二盗葢盗嘗殺人官捕之急遂私結約候車駕之玉泉寺挾弓矢伏道邊林莽中作亂時有捕盗校尉亦變服如盗入盗羣不疑以其謀告之遂為所獲上既誅二盗歎曰士竒言不虚即日遣范太監賜白金文綺士竒明旦入謝上諭以盗謀且曰愛朕莫如汝自今如汝言不復微行士竒叩首葢大臣中先有導上以天下平寜可微行而生日得賜鈔及馬者故至是有愛朕莫如臣之説云宣徳七年二月二十八日上召臣士竒至文華殿諭曰憶五年二月共爾南齋宫論寛恤事今兩閲嵗矣民事不又有可恤者乎對曰誠有之只五年官田減租額一事聖恩已下璽書已明民間已知户部格而不行至今仍舊額追徴小民含寃不已上怒曰户部可罪也對曰此循習之弊永樂末年多如此往年高煦反以夏原吉為姦臣之首正指此事為説上怒稍解曰今欲再下勅寛恤必舉此為第一事却於其末增云中外該管官司不許故違上又曰如再格不行朕必罪之不恕汝試言今日之事當寛恤者對曰事有當變通者不宜執一如逃民一事其初本因賦役繁苛不得已為偷生之計歴嵗已久朝廷雖已赦宥復業而家業盡喪非但歸無所資又有公私債負之擾勢不能歸所在官司又不能容則往往逃聚山林相結為非積微至著葢有可慮願得恩㫖下有司凡逃民願歸鄉者令郡縣用心撫恤優免差徭不願歸者聽於所在附籍為民官給空閒田廬處之免差役二年庶以安其危亦弭患於未萌上曰此事湏行葢在彼在此皆朝廷之民何湏定逼之歸但得人安足矣臣又言各處課程先因鈔法不通加倍其額徴納葢一時之權今鈔頗流通宜量減倍徴之額又言天下課程皆納鈔惟湖廣廣西淛江商税魚課舊例皆納銀民不勝弊請裁為一例上笑曰此兩事皆湏變通其課程納銀者悉改納鈔銀一兩折鈔百貫臣又言田里小民之不安皆原有司之貪汚暴虐請令風憲考察奏罷上曰然向使不罷劉觀風憲亦未得清爾此言是但有司中有廉幹能興利除害者亦令具名來聞用憑奬擢臣又言方面郡守皆是要職吏部往往循資陞授不免愚良混進請令吏部自今方面郡守有闕令京官三品以上及布政按察薦舉務取廉公端厚識大體能為國為民者仍屬吏部審其所保果可用然後奏聞量授以官後犯贓罪併坐舉者又請令法司凡保舉授官有人指告其罪者必先取問干證明白然後奏聞請㫖提對庶幾不為小人誣陷上曰然若所舉得人須保全之庶不墮小人之計上又曰更責吏部湏愼選縣令臣又言年來吏員太冗其間多有昏昧愚劣不通文理今後請令六部都察院翰林院㑹同考試選用臣又言今軍民中豈無文學才行卓然出衆及有智謀材勇精於武略者請令羣臣詢察舉保選用上曰進賢之路宜廣此皆應行若有拘於例者宜當開廣臣言唐虞之世罰弗及嗣今極刑之家有賢子弟例不許進用上曰舜殛鯀用禹聖人至公之心也又曰劉翀亦極刑家今不在侍近乎汝於勅諭中明書極刑除犯謀反大逆外其餘犯者其子弟有文學才行並聽舉用上曰此數事皆可書勅頒下矣臣進曰愚臣一人見聞不廣願更得一人同論此事庶幾可以推廣聖澤上曰若多令人知即勅諭未下事已徧播於外矣臣對曰大臣中固有謹厚者上曰胡濙謹厚汝與之宻議就録稿進來於是臣退同濙議增十數事通録明旦進呈上悦三月朔璽書遂下宣徳七年八月上在宫中覽尚書黄福賛漕運時言便民數事出其章示臣士竒且諭臣曰福所言皆智慮深逺可行今六卿中其誰之倫對曰福受知太宗皇帝最先大用其為人正直明果一志於國家生民今六卿中鮮及之永樂初建北京行部命之綏輯凋瘵及得交趾命總藩憲之政安新附之衆躬勤夙夜具有成績其才徳兼備有大臣體諸卿誠不及之福今年七十矣諸後進少年高坐公堂理政事享安佚出入輿馬騶從揚揚福四朝舊人乃朝暮奔走道路勞瘁不已殆非國家所以優老敬賢之道上曰非汝不聞此言吾嘗欲得一老成忠直之人處之南京根本之地緩急可倚今以命福豈不誠當士竒對曰福必不負陛下任使明旦上命吏部改福南京户部尚書中外聞者皆悦葢上之納直言明於用人槩類此東里别集巻二
