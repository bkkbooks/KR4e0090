body:
  text: 東里續集巻六十二明楊士竒撰詩七言絶句題竹送輝姪歸宣城三首家住珠林楚水濵林端歳歳鳯毛新草堂數世今無恙但保詩書啟後人故家同是竹林人萬里重來意獨親垂老還堅歳寒操要㸔高節拂青旻敬亭山水産賢英在昔文章屬有聲天上銓曹待成蹟幾年承禄教宣城題輝姪梅魚浦龍洲五百年幾家文獻故依然歳寒人共梅花好始是吾宗清白傳題竹與鏞孫我家賢弟珠林下逝者寧知生者悲四十七年長在夢眼前慰意見孫枝題孝友堂有序君子之德本諸身舉而措之始於家孝友者教之惇於家者也克惇於家則於事君於臨民無徃弗得矣故孝友百行之所始也知州宋安出曾學士所造其家孝友傳覽之不勝敬重之意爲題近體一章于後云一門孝友同天性爲愛宋家三鳯凰不見河東祥與覽千春簡冊有輝光題趙松雪畫馬天閑第一渥洼姿卓犖騰驤肯受羈何不翻然絶牽控躡雲追電㸔神竒具慶堂二首白玉娟娟粉署郎明時具慶築高堂天恩寵賜天曹禄五彩衣裳獻夀觴紫誥鸞翔下九天龍章輝映綺堂前人生何幸親長健榮捧天㤙過百年題行吟澤畔圖尚有𦍕狂箕子奴憂心何獨楚三閭扁舟皷枻長歌者不是從前荷蕢徒題梅花贈宋洵南京戸部檢校妙年冠帶仕京華橋梓光榮共一家但遣襟懷如玉雪簿書閒暇對梅花蕭母蔣氏輓詩三首結悦來嬪君子室琴聲容易變孤鸞來時皎皎鳴璫玉直到泉臺似昔㸔清闕白雪照孀居閉戸常勤教子書八十全歸闕無憾即㸔華表樹門閭孝子南歸望白雲麻衣血淚濕紛紛升堂闕㸔况復啼烏不忍聞題蔣壻重畫溪鳥溪花似越中山林清出水西東誰知白髮紅塵客釣艇常懷張子同題竹寄張從善二首江漢交情四十春别來衣袂滿緇塵平生高義憐張仲鶴嶺鸚洲入夢頻大東門外脩筠畔幾度行吟共日斜衰鬂于今各成雪相思相望尚天涯題竹寄楊伯升夏口驛前風物清幽居蕭散澹無營一枝歳暮清於玉爲託篔簹寄逺情題竹贈蕭思敬致事三年丞邑民皆愛未老辭官興浩然流水清山竹林下清風日日聽鳴弦題吉安府訓導胡縉梅二首書臺東畔泮池濵臘月開花㶑灔春常有清香來講席莫因俗轍惹流塵吉州黌舎擁皋比濟濟英才望得師須似梅花氷玉白郡人翹首㸔操持題道㑹劉處常畫五首新拜天恩除道㑹南平邑裏領黄冠神仙官府無塵到喬木脩篁繞石壇故家本自尚書族元住江南珠浦濵歸掩𤣥闗力精進古仙多是姓劉人聞説延真戴道士年來塵事不闗渠松根千歳苓堪食只辦焚香禮玉虛白鶴觀中存古堂曾聽仙曲奏琳琅抗塵走俗頭成雪回首碧霞歸思長樓閣參差照紫霞黄茅岡上羽仙家幾時攜酒樓中坐醉㸔金華與玉華送楊昱歸省六首澹齋先生氷雪撡舘閣論交三紀餘時節相過見諸子愛渠清潤比瓊琚兩家比屋東西住静夜篝燈聞讀書南郡義方真有道毎慚衰倦百無如同官同事復同宗我與而翁道亦同翁有佳兒信麟種回㸔豚犬但心恫前年南上省慈親旋侍嚴親近此辰富貴光榮皆外物人生真樂是天倫塞垣白鴈逐秋回野岸黄花浥露開萬里江陵赴慈侍扁舟珍重去還來鮮桃艶杏春前盡翠栢青松雪後妍七十衰翁無可贈贈渠貞操閲長年題戴文進湘江雨意巻二首十年放浪湘江客題遍江頭綠玉枝今日披圖㸔煙雨秋風霜鬂已成絲紛馳名利不知勞馬首紅塵十丈高誰似錢塘戴文進小齋無事玩湘皋題戴文進竹雪書房二首分栽脩竹已成林毎到嚴冬雪積深齋館相㸔不曾厭只縁俱有歳寒心此君高節净娟娟况復瑤華相映妍王子齋居足清興定知不棹剡中船題士器竹峥嶸氷雪歳寒時誰寫琅玕贈别離多爲此君貞操在歳寒氷雪有深期題凝翠樓二首住近東華五雲下車塵不斷撲簾屏别開樓舘㸔塵外萬疊西山過雨清妙墨淋漓濕未乾山光林影翠成團渠家高館偏多趣北苑南宫繞座㸔題周汝清梅三首本是陽春第一花皎如氷雪净無瑕自縁不與東風競故向寒冬作歳華瀟洒江南清渚曲乗春多植傍瑤京舊家只説蓮堪愛不説梅花更自清誰樂明時作冷官羨渠蕭散意能安小齋一榻清於水坐與梅花傲雪寒題曾翬主事竹石圖石上翛翛翠兩竿含風泛雪拂雲端時平訟簡文書静最好秋官署裏㸔題竹送王時俊左遷雲南二首鐡石爲心玉雪顔逺行巴峽上黔山明時謫去休嗟歎早晩天恩定賜環冬官郎署過秋官節操真成六月寒萬里黔南作遷客清風持贈翠琅玕失題𣺌𣺌吳江逺别離慰情持贈鳯凰枝歳寒但保氷霜節栢府松㕔處處宜送馬檢討歸閬中并寄聲李全太守三首幾多鶴髮京華客榮利闗心未肯閒誰似翰林馬檢討黒頭苦意戀家山二十餘年住兩京蓬萊閣下預恩榮衣冠歸里何多幸老傍林泉閲治平爾鄉太守吾鄉彦爲政心同閬水清料爾到家春亦到劭農正值出郊行題竹寄一夔有序一夔侍講自余布衣至仕宦四五十年之交其高潔之操挺然儒林之表也乆别在念人行不及奉書舊得夏仲昭中書寫竹書此二十八字識嚮徃之意夔翁又是三年别白髮論交重比金萬里停雲頻在望一枝聊寄歳寒心出京畱别翰苑諸公二首身著宫袍拜玉旒東風二月别皇州玉堂學士于今盛一顆明珠不暗投東嶽祠前動别驂歸心先已到江南同官敢怨無言贈玉㫖丁寧已再三書驛舟三首二十六年曾過此蕭蕭蘆葦帶荒村如今重過頭成雪𣺌𣺌桑麻雨露繁風激黄河白浪生畫船南下日西明怡人一片蕭閒趣兩兩水禽相對鳴新橋驛二首九河氷泮綠差差洲渚鳬鷖近不飛夾道如雲楊柳樹盡舒春色送人歸官船撾皷夜過半起視星河盡轉西津吏臨流迎下纜人家兩岸曙鳴鷄興濟縣二首夢到江南水竹居計程猶是五千餘行舟過處人驚訝爲有龍光動璽書道路相傳晝錦歸人家競出㸔光輝豈知白水青山客不改從來舊布衣過東昌驛遇邱誠驛丞二首天恩特許蹔還鄉憶别鄉闗四十霜喜見南來好春色柳條將綠到東昌舊同魚浦龍洲住嶺表移家歳月多今日聊城喜相見匆匆無那别情何過安山驛有懷蹇尚書重過安山曉繫船東風楊柳藹人煙同來悵别人何處寒景凄凉記昔年滯風雨采石有懷尹自道同知二首聖主深恩賜暫歸龍河氷泮别京師重來不待榴花節爲報當塗貳守知謫僊祠下杏花殘孤客維舟倚暮寒相好相思不相見滿江風雨夜漫漫荻港春雨凝寒著杏花春風吹綠上蘆芽行人數日江東道次第㸔山到九華望湖亭好風十日迎歸棹已歴長江及大湖曉上高亭更回首五雲直此是天都題梅與李仲貴二首四十餘年歸舊里不勝衰薄歎民風一心恬憺無塵累閭巷相㸔有此翁歸里匆匆欲别難畫船春水發江干一枝畱贈羅浮玉他日歸來共歳寒題梅贈王澄淵貳守三首分手都門歳月賖思君夜夜夢梅花貞姿一段清於雪不讓西湖處士家銕作根株玉作神耻隨桃李混芳塵一從移植青山側野水疎籬自在春四十年來金石交枉煩青眼顧衡茅臨岐不盡歳寒意持贈羅浮月一梢題竹與李懲上泝蕭灘下彭蠡官舡十日安如山爲感薇垣李從事聊書淇綠送南還題梅寄鍾天錫憲副二首早屬秋官起盛名又隨司宼飭邊城平生一片氷霜操移向東藩表潔清故家共住西江上爲託梅花寄逺思無限鄉園清白意與卿同結歳寒期贈金華劉實通判三首劉吾郡進士邂逅河上坐談乆之書此爲贈云姓名早見書金榜佐政黄堂又四年自有郡人歌豈弟相知何必上官賢金華自昔多文獻繼者何人乆未聞勝地良才終不乏及時培養在諸君府倅官清面帶霜庭前種得翠篔簹春來不愛閒桃李只愛清風五月凉題梅贈楊文昭廣東憲使二首白簡緋袍寵命新南行一路見陽春明時憲府清於水只許梅花對玉人華髮蕭蕭鐡作冠梅闗此去路漫漫憑將使者氷霜操散作炎州九夏寒贈夏仲昭歸省二首科名早列黄金榜書學還趨白玉堂揮洒常㸔五色筆絲綸閣下染龍香吳山浙水名天下筆有王維與鄭䖍歸到江南寫眞趣一緘時寄五雲邊題竹送周䝉南歸二首爲愛周園好竹枝莫因風雨恨低垂歳寒但保氷霜操㑹有凌霄拂漢時志人厚積而遲發春花不待秋風吹龍駒一蹶豈足歎鸑鷟重鳴應可期吳希淳寫神多勤健筆寫衰容解使人人識騃翁惆悵無因置林壑秋風霜鬂尚飄蓬送劉朝宗隨州學正二首懇辭玉署投閒散一住潯陽遂十年小郡近連䢵子國還將文學教英賢文皇永樂臨軒日玉陛傳臚升甲科寄語隨人莫輕㸔先生敭歴自鑾坡題鴈渚田秋啄尚可飽江葦夜栖殊未安數聲還逐海雲去怕有虞人持燭㸔題養都指揮思親巻二首椿隂慘澹荆花拆莫歎陽和雨露偏行道由來自家始人生有志在芳年西江分閫升賢佐功憶先人百戰餘移孝爲忠有勛業他年光暎史臣書晴雨二竹爲江西都揮僉湯節題二首瀟洒渭川風日佳展圖清氣滿清懷彩雲庭院不相稱最稱湯家蘭雪齋鳯池舎人精八法新來寫得雨瀟湘數竿清潤如蒼玉宜寘東皋舊草堂題竹贈蕭令復任歸安二首我憶同鄉蕭縣尹人来頻問水精宫萬里趨朝書上考相逢還恨别匆匆雪墮闗河楓葉丹扁舟南去路漫漫一竿不是尋常贈要看青青傲嵗寒題竹送彭僉事旒赴廣東雨收雲淨氣澄明千尺長空動羽旌持向嶺南隨使節高風猶是玉堂清題劉城之梅花二首衣上緇塵四十霜玉華東畔憶家鄉年年開到梅花日吟咏疎籬野水傍窈窕文溪近武山年年春早玉葩繁南平進士北京客常對新圖憶故園題竹送楊仰謨同知二首萬里為官可憚賒従来山水説三巴巴西二守清貞操肯愧廬陵忠節家九河正月未消氷匹馬衝寒發帝京不盡同宗臨别意題詩相送蜀西行題竹贈康宜望永嘉戎幕需賢佐臨别殷勤贈竹枝白日青雲看高舉嵗寒氷雪在操持題蕭彥常竹雨苔緑遍珊瑚石雲彩晴開翡翠林好作蕭齋傍幽處一編時究古人心題楊允嘉近畫二首碧梧翠竹論清修介石由来君子徳盛年學業在操持寫向書齋作三益嶧陽嶰谷總奇材别有奇材泗水隈聖治無為用韶樂選材須獻大廷来觀獵四面虞羅三面解凌空羽翮任髙翔遂令竹簡書仁澤萬古殷湯是聖王寄曽于皋三首暮筵芳酒溢華巵記得臨分共論詩流水韶光二十載相思秋鬢各成絲去年艤棹淘金驛滿目蒼筠與絳桃惆悵交游總泉下獨思江浦有于皋誤下漁舟四十春清波夜夜夢垂綸大綱促罟今無限未信深潭有逸麟寄逺法師兼柬南浦三首經年不到西蘭若清論常懷逺法師昨日過門闕迎送一編髙絶見風期松雲深處敞禪闗草坐麻衣多在山應笑東華塵土客白頭如雪未能閒文江江上龍華老一住平坡少出城又是經年不相見蒲菴新刻幾篇成題菜有序吳隠之為刺史食不過菜盧懷慎為吏部尚書待所重嘉賓設菜數葅山谷先生嘗題菜云天下蒼生不可一日有此色士大夫不可一日無此味曾時升主事出示此圖為題二十八字解嘲落酥蘆菔嘉肥嫩野老常將擬八珍此日卿家看圖畫秋官一味詫清貧題脊令圖三首湯一源分教蘇學將行出此求題幷致贈别之意白雲原上經行日傍墓曽看草結廬今日都門復相送緑袍分教赴姑蘓故人死别逾三紀喜見傳家有鳳毛清代閒官得名郡心存忠孝道能髙清泉白石秋風裏下上和鳴相共怡比似湯家好兄弟臨岐為賦在原詩題畫竹鄒司務赴南京秋官出此索題為賦二絶冠紱承恩下赤墀鳳池人贈鳳凰枝南都晝永文書簡展玩時吟衞武詩太平隄畔是秋官門倚澄湖緑玉灣更出篔簹望天上五雲長䕶紫金山題竹送任敬讓㕘議二首萬里之官欲别難朔風吹送潞河干近河榆栁凋零盡惟有琅玕見嵗寒十載低眉厭郎署清風高起鳳凰枝浣花溪畔多鄉故為託平安寄逺思題陳知府竹有序吉郡太守陳侯九載之績奏最上従郡民再留之請増禄復任士奇郡人也且舊與侯同朝相知葢深今侯瀕行出此竹索題輒為書三絶句十年為郡種篔簹富有清風九夏涼太守従來多惠政後人將比召公棠翩翩五馬導雙旌金闕朝回合郡迎帶得自天新雨露緑筠加倍舊時清好竹何妨種萬竿豈徒惟日報平安此君元有清貞操傲閲氷霜過嵗寒題竹贈楊友文運副三首十年坐判維揚郡令譽芳聲特達開惠政及人還未已升官重向廣陵来嵗久鹺臺吏螙深朝廷選士比南金富饒有道期裨國秪在清貞一寸心清比篔簹貞比石由來志士有深期殷勤一片同宗意贈向淮南慰别離石憲使慈夀堂有序江西憲使臨漳石公仲玉早孤賴母之訓勤學有立自監察御史再陞憲使亷潔寛厚獄無寃滯十三郡之人皆歸心焉其母年將八十公名其奉養之堂曰慈夀葢念非母之慈不有今日而願母之夀則孝子之心雖千百嵗不已也士竒江西人又嘗與公同朝熟公之事為賦二詩書諸堂中云憲府従來氷玉操為承慈訓嵗年深平反日奉諼堂樂全勝西京雋母心珠翟雲冠兩鬢霜南州使者侍高堂堂中但祝百千夀日進流霞紫玉觴題庭循所藏孟端竹王黻作畫天機精健筆所至秋風生偶然貌得丹山鳳長擅謝家庭館清寄楊少保二首分手東華一月来畫船春水奉恩回計程定過金陵去新笋鰣魚對酒杯三十登朝雪滿簮長風萬里稱歸心白雲翠岫江鄉趣一路題詩入繡林題竹送歐陽瀚敎閩縣二首故人有子早能官萬里曽經蜀道難此去三山近南海講帷依舊一氊寒寫得淇園脩竹枝臨行聊贈慰相思清風直節嵗寒意别有雲霄逺大期題竹送劉順常教揚州二首揚州繁盛接金陵北賈南商滿市坰惟有泮宫清似洗衣冠長日坐談經博士之官向竹西一竿聊慰逺分攜緑陰齋館無塵雜講罷新詩取次題題竹送張鳳應縣丞華亭貳令朝回日凛凛氷霜嵗暮寒為有一枝清似玉同鄉持贈異鄉看荆州太守劉永母輓詩二首喜聞春意回南郡遽報凄風起北堂臥轍攀轅空滿路麻衣血淚使人傷詩書何幸際明時得禄承懽母遽違升堂最是傷心處挂壁猶存舊斷機送佘通判三首燒燈節後發京師春色初回楊栁枝耆老如雲待漚渚到官莫過牡丹時分明一道澄江月照見氷霜銕石心誰謂今人未如古古来循吏只如今吏胥無復到鄉邨諠雜何曽及縣門嵗嵗年年比今日邑人常戴府公恩題王氏水竹居有序七首王氏之居百年之前名勝所集王楊世好也某童子時及聞先生老長緒論今年七十有八矣鄉里前代風流儒雅葢某外知者少矣恐更數年知者加少七詩雖辭㫖凡近不能為水竹發其精彩而使後生晚輩與聞故家文獻之盛之萬一者亦不可無若末篇私願天將必不靳於吾輩也家住龍河碧玉灣清風遶屋萬琅玕舊聞嵇阮諸才子常聚南園與北園王園西畔接文溪種竹臨溪箇箇齊剰有山陰三月趣彩毫麗句吐紅霓國初耆俊滿西昌文采風流重二王我憶為童隨杖舄篔簹谷裏聴琳琅最憶瓊臺太守賢早従林館究微言尋源曾泝羲文上細論先天與後天臨澴千嵗散枝繁又到虹溪㡬葉孫溪上森森皆玉立只應詩句詠淇園少日林泉共隠淪披衣掃石蔭晴雲前年重過嬉遊地親見詩人詠五君叨禄京華總白顛天恩有典賜歸田煑茶亭上伴燒笋更折長竿共釣鮮題龍士郁竹甘溪溪上緑猗猗映日含風千萬枝最有一枝清似玉春明開向鳳凰池題竹贈陳侍講復職南京二首尋常去住難為别況是平生心所親木落天寒嵗華暮白頭人送白頭人嗟君獨去路漫漫聊贈淇園玉一竿莫厭兩京頻間闊清風將比故人看題竹寄本清良友二首往嵗金陵城裏住竹陰相對話同鄉薊門此日看圖書却望金陵别思長莫道尋常脩竹枝貞姿白石共幽期南京公館多閒暇時詠武公淇澳詩奉和澹菴少保題梅花韻五首昔有故廬鷗渚上東風遶屋看梅花北京二十餘年住㡬度披圖倍憶家萬蕋千葩瀲灩春彩毫揮洒得天真洛陽花品多堪畫不似羅浮迥絶塵畫史皆明造化功清江不與會稽同古今吟咏多高致豈必林家香影中嵗嵗陽和獨早回含氷綴雪晃晴暉向来止渴人皆重太息調羮事久稀共愛開花擅早春何分芰帶與朝紳玉堂金閣看尤好不但疎籬野水濱題東禪老僧所藏陳舉善小景并序東禪雲所上人道行俱髙其年踰八望九與絶聽聞公同輩行叢林大老也此畫洪武三年吾泰和丞㑹稽陳能舉善作極蕭散之趣超然絶俗也其人品亦髙題詩六人惟于閌余不及識其第一首名經字中常陳丞之父巋然前輩矩度於作中州樂府尤精張小山髙弟也第二羅楚材先生初名晉用後易為進徳異人授岐黄術孝友端介之行追配古人第三海桒陳先生邑大儒江右學者皆崇山斗之仰羅先生官至徳安府同知鄧先生官至四川鹽運經歴二先生皆皦乎氷玉之操之五六君子者當時所謂千人亦見萬人亦見者非雲所何足以得之而謝世逺者七十年近亦五六十年今見而知之者寡矣雲所之𤣥孫寳藏此巻重裝潢以求余題既為具諸老大畧而係之詩匪曰續貂亦以識慕仰之意云雲所道人飛錫逺白雲猶䕶舊禪房向來聚得昆岡玉長向林中起夜光題梅送王瓊玉致仕二首辭榮我羨王瓊玉贈以江南白玉花此花開滿西昌縣江上蒲帆應到家收斂心情已息機送行更咏白圭詩歸來紗帽籠頭坐莫遣流塵染素姿城南茅屋韋杜城南尺五天東風花柳醉歌前豈如茅屋青松下掃榻焚香撫七絃題常熟郭令梅銕作根株玉作葩含霜映月淨無瑕海虞縣裏清香滿不比河陽潘令花題趙琬司業竹二首琅玕竹蔭瑪瑙石橋門風致自鑾坡司成堂上詠淇澳六舘諸生日切磋賢闗一掃榛荆净滿目清風翠玉枝成隂結實當自此早晩雲霄觀鳯儀題廖監正山水溪上好山青萬仭傍山臨水結茅堂扁舟載得綸竿過不是吳鄉定越鄉題歐陽渤梅莫嘆冷官兼冷地古人憂道不憂貧一經分教繁昌縣日對梅花慕古人題歐陽潘梅二首我家文節宋名臣風節當時表縉紳景仰前脩在賢輩莫因詞賦託騷人萬里秋風蜀道難綠袍西去作儒官行裝祗有梅花巻須共氷霜閲歳寒題梅送劉子輝博士二首向來三縣擁皋比衿佩詵詵喜得師賢闗此去虀鹽味又學元和韓退之文江博士故多才爲喜亨衢特達開九載相逢遽相别臨岐聊贈一枝梅題梅寄蕭雅容布政二首螺川驛下雨絲絲暮燭維舟話别離滿袖春風向江漢南瞻黄鶴不勝思回首分攜四越春江雲海樹夢頻頻過鴻聊寄相思字定對梅花憶故人寄張信都督十年不見張公靣萬里橋邊住錦城玉帳牙旗擁兵衛清風常對雪山清題鄭中書畫像芙蓉秋水粲竒姿曾折雲中仙桂枝縂向盛年觀德業春光正在鳯凰池吳興章郎中母輓詩三首碧桃庭舘四時春珠翟雲冠五福身何用瑤池覔金母水晶宫内有仙人上堂甘㫖皆推孝主饋恭勤更讓賢八十年華隨逝水獨留女範後人傳逺道孤兒望白雲麻衣血淚濕紛紛歸來自有終天慟况復啼烏不忍聞題郭公緒畫一巻苔蘚堅貞操千尺雲霄挺特姿尚有山林蕭散意南行相送寄相思題楊宗朂所藏趙仲穆小畫二首茅屋溪山夐絶塵青松長對老龍鱗高情恐是王摩詰騎馬橋南訪隠淪林外青山山下溪白雲翠浪晃荆扉畫圖自是江南趣身戀君恩獨未歸輓詩二首詩書世積儗菑畬孝友人傳徧里閭清代光華騰五色鳯凰池上鳯凰雛荷衣蘭袂青松下親見升平六十春雲海忽驚翔化鶴吳淞風月屬何人題周主事馬二首五花粲粲雪霜明休訝騏驎地上行定是夜中精彩動上干銀漢射房星紫禁日高仙仗下金羈隨處得從容滿身雲影疑浮動知是天閑八尺龍題唐臨絹本蘭亭後有子昂畫祓禊蘭亭三月初流傳翰墨世璠璵吳興繪事眞兼妙恨不揮毫到舞雩題武昌陳氏榮夀堂三首高卧煙霞似散仙春秋人羨伏生年閒吹紫玉攜黄鶴來徃三湘七澤邊九天鸞誥下林皐五彩宫羅繡豸袍榮夀堂中過百歳日持仙醴薦仙桃坐分天禄荷天恩賜帛年來屢到門但比乾坤祝明聖都將勲業付兒孫侍遊西苑應制九首萬歳山連紫禁西承恩吉日許攀躋雲霞光動龍蛇刻徧㸔蒼厓翠琰題琪樹隂隂翠不分瑤堦歩歩入青雲泥金壁湧沉檀氣先到延和殿裏聞金露玉虹相並立皆亭名方壺蕭散對􅌡洲皆小殿名欲存峻宇千春鑑長奉鸞輿萬歳遊太液波晴屬豫遊鳬鷖鸂䳵近龍舟御前應制慙無補但咏巻阿荅棹謳一片簾泉瀉不休别㸔噴玉出金虬須教流下天津去散作恩波潤九州九曲流泉碧玉清紅蓮邐迤送金觥洛中勝事循周典共侍宸遊宴鎬京頻奉綸音近御床聖情無巳念先皇從臣縂是先朝舊疊賜金壺白玉漿頒來文扇出天恩上有天章訓飭頻侍罷御筵重拜賜尚書前靣獨千緡御廐飛黄勑送歸禁中不敢醉驅馳恩深難忘㳙涘報願誦豳風七月詩送龔鐩憲使致仕二首平生心在恤痌瘝一日辭榮出九闗袖却向來經濟手去循南浦㸔西山非才誤下釣魚磯徒遣緇塵滿素衣八袠年華雙鬢雪同鄉惆悵不同歸題𤣥宗遊驪山圖二首上馬含嬌不任扶君王攬轡待齊驅蓬萊宫裏三千女獨自驪山從乗輿五隊如花出帝城年年扈蹕赴華清劍門西畔聽啼鳥竟有誰從蜀道行題梅贈挺孫南京都察院檢校鐡作枝柯玉作花精神氷雪净無瑕㸔圖常礪操脩志莫忝南州清白家送陳照磨赴湖廣并引四月二十七日宗理照磨赴湖廣憲幕來告别小詩二章爲贈并寄意使副諸君子云青春白晢多才思徃徃明珠辱贈詩江漢南遊五千里錦囊還觧寄相思鳯凰山前憲使堂尋常六月凛飛霜堂中使者清於玉黄鶴白雲離思長題竹贈馬謹守禮御史直道而行馬御史氷霜節操鐡心肝一庭竹色門如洗坐對清風到歳寒送崇式貳尹後餘意未巳更續絶句賢兄擢桂官朝署令弟哦松向海邦文水仁山多盛事周家白璧又連雙鴻臚卿楊善父輓詩二首家臨晋水客燕山晚際明時逝不還鄉里到今談舊徳一生高致樂蕭閒積書教子清風滿置酒延賔白晝長錦誥封官出身後天恩千歳有闕送敬姪三首有序族叔永聞宰長垣卒於官遂塟焉子孫畱居墓側再世矣其長孫敬重水木本源之念凢再至鄉里拜先壟又再謁余於京余嘉之其歸也書此贈之吾家賢宰宰長垣客墓荒凉有子孫六十餘年未歸得至今源本重深恩兩迴南上謁先塋更省同宗上帝京逺道驅馳見誠孝詩書慎勿墜家聲文獻傳家五百齡憐渠北郡乆飄零是行好記殷勤囑清渭無將混濁涇題東山洞賔二首莫訝征西舊司馬平生山水愛幽探白頭匡濟成何事回首東山巳自慙神仙只在人間世來徃千峯萬壑雲至道非闗有傳授他年那得吕岩聞送劉習之有序廬陵劉習之予老友嘉㑹先生之令子也舉懐材抱德授廣東按察照磨因賦近體七言絶句三首以寫别意云曉辭丹陛出神京一席秋風萬里程舟過螺川寧省處鄉閭争羨錦衣榮尊府先朝老縉紳賢郎新榜又登名君今廣憲紅蓮幕月照氷壺分外清東廣迢迢萬里餘西風落日片㠶孤臨行不盡同鄉誼更寫餘情在畫圖題鵷姪畫員峯湧翠雲浮玉盤古洲前頗似之鵷也誅茅好結宇待予解綬共棲遲集句酧劉士簡有序劉士簡集古句爲長詩附其弟鼎見贈鼎來三閲歳矣閟不出近因梁𢎞秀才追至得一見鄙薄固不足以當所言然其綴輯之意勤矣遂集杜爲三絶句書於寫竹之上用酬士簡云無才日衰老常在羇旅中詞人取佳句獨贈白頭翁舊繡移曲折新詩作寄將開緘風濤湧感子故意長文章千古事持荅翠琅玕但令無剪伐日日報平安詩餘賜從遊萬歳山詞有序宣徳三年仲春之日天氣清和風塵不作皇上萬幾之暇駕幸西苑特召尚書學士皆從臣士竒與焉既遊萬歳山命就御舟遊太液池以徧歴苑囿之勝羣臣頫伏言陛下寵恩之厚非愚臣等所宜䝉荷上指御舟諭曰以操以濟羣卿之力君臣之義欣戚是同聖諭再三奬與過分是日菓茗酒饌之賜皆出天厨之珍加之賚予之厚下暨輿皂均沐洪賜遭逢之幸在古鮮儷敬賦清平樂詞十章以識盛事其詞曰御河氷泮禁籞春光滿中使傳宣陪賞翫西過蓬萊仙苑内街許驟花􅍡新醅勑賜黄封共侍翠華遊豫仰承霄漢恩濃右一五雲仙島海上蓬壺曉紅巘丹崖春正好香動玉華瑤草飛龍翠輦初來翔鸞寳扇齊開聖主樂同賢輔愚臣自愧非才右二廣寒宫殿曉駐黄金輦天上彤霞平近眼俯㸔碧雲芳甸乾坤六合皆春榮光瑞彩津津浩蕩雲飛川泳甄陶総出皇仁右三碧池千頃湛湛涵天影清似玻瓈明似鏡洞見柔條新荇金鱗翠羽夷猶紅橈畫槳謌謳何幸盛時多暇共陪太液清遊右四鳯池龍舸畫楫黄金柁亭午虹橋西畔過瓊管瑤筝相和彤亭面面彫欄天光雲影盤桓世外銀潢玉宇春前麗景清歡右五小山千丈粲玉蕖仙掌鶴檜鸞篁森拱向春逗萬年枝上黄金矯矯蟠龍青岩洒洒輕風口噴汪洋天澤須教大地年豐右六石渠清泚宛轉千花裏翠勺金蓮傳玉醴瀟洒落紅流水連茵坐飲悠哉流杯飲過還來聖主恩深如海醉教馬上扶回右七瑞禽靈獸自古希竒有鸞鳯來儀麀鹿伏好似舜庭文囿傳宣特賜竒觀山呼拜舞騰歡清世泰和嘉應聖人道合乾坤右八玉京仙境瑞氣融春永明主承天天錫慶雨順風和嘉應謳謌四海豐年簫韶九奏華筵聖世均調玉燭皇圖帝夀齊天右九施恩宣化一統函夷夏端拱垂衣幾務暇光被普天之下簮纓扈從游巡乾坤萬物皆新蕩蕩太平熈皞吾皇萬歳千春右十奉夀思貽兄二首皓月當庭照彩燈華筵春透酒如澠昔年把酒記吾曾今日楊園賔客聚夀星相應徳星明六千里外獨思兄右浣溪沙春意滿堦除玉色梅花照鬂鬚老子夀年過九九懽娛醉影婆娑不用扶蕭散一塵無綠樹青山處士居兄弟别離三十載何如春鴈來時定寄書右南鄉子寄夀仲亨兄木蘭花慢簮纓四百載記科第有家傳羨雙玉連枝栢臺氷雪栗里風煙逍遙葛巾藜杖傍青山綠竹俯丹泉天賜十分清福人尊八袠高年一塵不到研屏前綵筆映華牋想菊畔題詩梅邊作賦佳趣依然兒孫書香宦業㸔名家慶澤逺綿延望望徳星南極夀觴正聚羣賢夀蹇少卿滿庭芳四紀廷臣三朝國老左班領袖官僚手扶紅日兩度上青霄一片丹誠奉主持恭謹不間纎毫從容處調羮事好補衮更才高君臣魚水契龍章鳯勑前後華褒㸔滿懷春意富貴無驕嘉慶今年七十梅舒玉香藹宫袍更百歳康寧夀福長逺佐唐堯夀建安少傅水龍吟一星南極輝光毎年臘節明朝見黄封賜酒翠盤仙脯畫堂張宴濟濟嘉賔謀謨耆老文章英彦想從初獨禀武夷之秀金榜登高選早侍九華春殿彩毫揮五雲騰絢驅馳扈從東征北討馬蹄行遍身仕三朝手調金鼎芳名馳逺願長年佐輔皇恩帝徳百寮冠冕夀時勉李學士臨江仙霽月光風襟度好文章清比琳璆蓬萊山近殿東頭論忠獻納鵠立侍宸旒六十今朝初度日明朝又屇中秋桂花香泛紫金甌賔筵為夀不住算觥籌夀黄學士水龍吟好花開到紅榴帝城明日端陽届先生夀旦官厨細酒士林嘉㑹内閣當年七人同事四人今在一人千里外還留鼎足懽相對須拚醉不改平生剛介更華髮朱顔無改聲名事業安榮憂患從前無愧紺雪晨飡黄庭晝詠出塵瀟洒碧雲冠徃來天台鴈蕩作人間瑞歸田趣滿江紅四首春牧霜鬂蕭蕭皇恩重賜歸田里郊郭外草亭四面青山緑水好鳥好花春似昔同時同輩人無幾一布袍棕帽任消摇東風裏芳草岸平如砥垂楊徑清如洗散牧處冉冉晴霞飛綺江色比於懷抱净都無一㸃閒塵滓更小兒牛背有書聲清人耳夏耘詔歸田里長散誕天恩深厚尋早歳釣遊之處風烟依舊萬物方當嘉㑹日一年最是清和候暢幽懷緩緩歩東皐觀耘耨竹色净槐隂茂荷鋪翠葵舒繡農忙際兒子大家趋走頻有鶯聲迎杖屨渾無塵影霑襟袖望水南雲似玉光浮籠岩岫秋漁七十歸來西江上堪游堪釣秋水共長天一色也堪吟嘯穏坐木蘭漁艇子大兒能網中兒棹小兒自理㑹爇香爐烹茶竈蘋花渚雪争耀楓葉岸霞相照山無數清比方壺貟嶠放浪不知天地外蕭閒底用元眞號聴數聲長笛白鷗前江南調冬樵白首閒居冬風冷偏欺衰老晨光動瀰漫院落六花飛繞坐煖茅柴煨芋栗老妻孫子圍爐好更兒曹腰斧析枯薪歸來早堦前璐池邊縞都總出天工巧石山峯庭下盡成瓊島况是太平豐稔瑞教兒愛護休輕掃㸔園林一鶴意蕭蕭尋瑤草大雪志喜玉樓春旹甲寅十二月二十日也天公預作豐年瑞栁絮梨花紛舞墜九重城闕晃清輝一統山河含淑氣郊原遍是瓊瑤地梅蕋稍頭春早至未論寅卯太平年且賞嘉祥宣徳歳䜟云寅年及卯年方見太平年初度夕菩薩蠻生朝謝客草草家筵聊向夕綠酒黄柑慶我今年七十三燭花送喜繞簇連枝金粟蕋小小孫兒也學諸兄跪獻詩九日謁陵浪陶沙庭鞠早含霜又到重陽盈盈白髮對清觴囘憶徃時文翰侣大半凋亡縱佩紫萸囊怕上高岡眼昏那見舊家鄉但見三陵雲氣裏愁損柔腸東里續集巻六十二書東里文集續編後廬陵楊文貞公即世三十載其所著東里詩文集傳於世乆矣然纔二十八巻耳士君子恒以不得見全集爲憾焉成化七年秋其子尚寳卿䆃奉使廣西爲予言䆃㓜侍先公凡所著作藁皆先兄收兄没諸子姓珍惜秘不發䆃又忝侍從不能歸兹幸歸而得之圖惟梓傳敢以累執事予敬諾焉䆃既還京師編錄成巻六十有二託吏部侍郎葉公與中校正乃以寓予且屬序一言予遍閲之躍然曰此當代文章鉅公手筆天下之人仰慕想見者也予何敢不力然公詩文舊刻永嘉黄文簡公江陵楊文定公序之詳矣後生小子何敢置喙於其間嗟乎大羮元酒不資薑桂雅有真味泰山華嶽竒峯疊擁不覺其繁玉雲行空流麗自然初若無意而能成雨澤被萬物此公之冠絶一世予不能不樂爲天下道也故敢僣書于後成化九年歳次癸巳夏五月既望吳郡韓雍拜手書東里續集巻六十二
