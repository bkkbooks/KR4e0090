body:
  text: 東里續集巻五十三明楊士竒撰家訓訓昇姪徳安公平生力學清脩不讓古人昇為長孫豈可不力以承繼之能自力則為賢孫不能自力則辱爾祖矣豈可不勉囑付姪昇縁路事宜二十二事一舟中常掩閉忩門婦人女子不得窺覷外面一秫只在官忩深忩二䖏不許於舩舷坐立船行更不可過忩使風之際尤須謹慎一泊船之時婦女㓜穉皆須寜静不可喧笑啼號一炊㸑只令劉林生阮㣲在外整理孫兒夫容皆不許出一舟中斷絶煎炒燒炙𦂳要𦂳要忩中火爐謹慎謹慎一經過遇相識不可停留不可停留一晚泊須覔安穏處切要切要若雖未晚而遇有安穏䖏可泊即泊不可貪程一遇見雲氣風色不便便須早㝷安泊處不可因循致臨事窘急一遇夜不可貪程一灣泊之際須察隣船人情不可忽畧一泊船夜睡不可沉鼾須相輪警省一遇有薪米賣處便須預辦不可直待空乏一遇作神福酒肉須及駕船之人自家寜可不用一沿途討添撥軍夫須十分和氣不可使官府生事惹累至囑至囑一船行之際或與人擠拶須兩相避讓須戒飭駕舩之人不許生事一遇口岸去處不可淹滯若過南京亦只住三日不可久停作急唘行一到南京於歐陽主事處討俸米十七石還百錬有米則討十石回用米少則隨討多少不可執一糶得有物亦討些用但不過十數一途中思未足物件可於南京買然不可乆住一廣哲處有夾漈通志一部可打㸃眀白完備用夾板帶去却寫信報知一縁路凡過一處便㸃檢収拾起船勘合至囑至囑一舟中須嚴切鈐束諸小不可姑息一與百錬説不可過建安站船歇防人情不測訓旅鵷艮稷八事吾家自髙曽以下子孫皆至親須惇睦患難相恤貧窘相助過失相規如有不受規益者衆共責之卑者衆共笞之必盡公道乃可使服今條列數事以示汝兄弟遵守一須訪求有徳有學之人為師以教子姪擇其資質頴悟者教之以治經次者教之讀書講觧習詩文雜學必皆教之正心脩身事親處人之道為本一祀先事親已有定規不許怠慢陷扵不孝一凡公事不許干預茍利以辱家門一閒常時須勤勵子姪使貴義賤利務善循理親近正人勿交俗輩一子姪有善行好學者衆共禮之重之若有分外不律不受訓誡者稷㑹諸兄弟數其罪而笞之不可容恕如又不悛眀告於官請治以不孝之罪一教子姪須要處友待下皆寛厚少飲酒盖貪飲者未有不亂性背理處人之法謙虛忍氣無不得吉一旅鵷艮稷須同一心有狠戾自異者衆共攻之攻之不改者絶之不為兄弟一兄弟本同一氣不可聽婦言以傷至親之情訓姪與子吾今啟行甚急盖君命不敢稽延也吾今之歸但祖墓一事是務然匆匆力不能皆親到龍泉萬安二處已令艮同子佩益智三姪同展謁早禾市等處汝鵷同弟稷往展省在樂氏住居傍近展省後作書報来亦令艮姪三人同寫書報二處先瑩安否来但有未安處湏便整理有侵犯者悉令改恃頑不肻改者須訴於官切不可坐視不理自陷於不孝切囑切囑先兄思貽先生存日於四十三都新塘買田五石以為子孫嵗時展先墓之用此出吾兄誠孝之心為永逺之資五房子孫當永篤敬承不可有隳以自陷於不孝勉之勉之凡嵗時展墓之祭只於髙祖考妣曾祖考妣先祖考妣先考妣四代祭物只薦魚肉米麫常須依期毎展墓時必湏於塋域四傍廵厯周覽恐有小人侵犯切勿怠惰近墳雜茆草各房輪流采斫家用逺墳雜茒草就眀出手帖與㸔墳人采用若子孫不守本分擅伐墳塋樹木者以不孝論罪若枝葉深密慮藏蛇虎者各房同眼剪减而均分之皆永為定例付諸姪及稷同觀訓東城諸姪十三事昨五月二十七日晩得鵷三月十八日所報凶問驚慟哀苦屢絶而蘇雖吾兄髙年盛福子孫滿前無復遺憾但我六十九年兄弟既老不復得一見以足暮年之願而今已矣吾負吾兄哀當奈何臨終時曾囑付後事否聞往年已豫定墓地在何處曽整理壙否葬期何時可一一報来吾哀痛之餘思汝兄弟當行之事因便寄示可遵依行之此亦大概耳餘可推類而行也凡事依道理行勉之勉之一父沒母老兄弟最湏和睦尊卑長幼各安其分長者發言行事或有過當處則少者湏忍少者或有過當處則長者湏忍但忍過一事兩事兩不留意自然和睦切不可輙聽妻子之言以傷同氣之情一切家事兄弟平心易氣商議停當而行不可競分毫之利以傷大義汝兄弟和睦則老母亦可以稍慰暮年矣一𦵏地已定則好若或未定則只於祖墳傍近擇髙爽乾燥不生水蟻之處即是好地不必論富貴吉凶大抵祖孫父子本同一氣死者安即生者安自然之理也富貴吉凶陋俗之論大道理說不通也更勿用僧道齋醮虛費一祖宗所遺一應碑銘行述詩文藁草片紙隻字及家乘譜牒之類並委鵷收掌愛䕶不許損壊但略有損壊即是不孝盖此係吾家傳世之寶子孫所當謹守為是鵷繼伯威兄之後係宗子房下故當掌之一父所遺下田土契字及生借文約若父在時未有發落則只於汝老母處收貯待弼回時兄弟同禀老母處分切不可私異有為以啟爭競取譏鄉里貽辱門戸一家中諸事湏早晚令稷来恊助出力如稷處有事鵷艮亦湏去恊助出力兩處兄弟務要同心不可分彼此内相和則外不相侮所謂籬固犬不入也切戒不與輕薄人交處一父沒凡一應租榖生榖湏放寛取索不可刻覈恐惹怨生事盖今無父人輕汝矣宜慎之慎之一各房子孫宜嚴督之讀書不可荒廢切要切要一湏尋一片好石刻墓銘請叔荘或希稷依様書石而令工人深刻之藏於墓中却打一本寄来更多打數本與各房子姪一毎年汝兄弟及稷都要依時同去各處祖墳掛紙不可一墳不到不可憚逺不行一之宜姪所置書籍甚艱難於今不易得矣可專付奐孫掌管愛䕶其母亦湏用心同管庶免遺落一奕奐無父為叔者須矜念教訓之凡事與之作主張不可坐視也一凡親戚中尊長惟止齋先生一人每事必當求教而行必得穏當一各處古親戚皆湏如父在時照管之不可踈絶與東城諸姪姪孫說與東門諸姪及姪孫務要各守本分習為好人不許違理犯法稷見有様不可不謹兄弟子姪本同一氣務要相親相睦不可因小利失大義俗言家不和則隣里欺謹之謹之各房皆教子孫讀書爲儒者然後可以撑持門户不失祖業此是第一件事勉之勉之凡係宗族務相親睦有患難相恤有過失相規戒凡是先世古親湏相往来不可冷淡大抵凡事重義不可重利說與奕奐羊奴仔元是一名軍可遣回本都不可占留在家後来事發隠藏者同罪悔将不及况此僕近年来結羣為惡其勢横甚若今不遣去将来必為汝叔姪兄弟之累切記老人之言不可不聴訓康甥孟嘉十六事康甥孟嘉從子兩京十有餘年今以薦得官将之廣西予既哀毁壁於九原又念韓伯之萬里分别之際情懐甚惡兼縻公務鮮有閒暇欲賦數語為贈未能謾就燈下冩切於今之從政者數事遺之大抵持己愛人事君之本其至道精義具在簡編進而求之所益大矣孟嘉勉之一第一件常常㸃檢自己身心要在道理上出一言行一事背了道理便不得為君子若出於一時失錯便猛思改過終身痛以為戒方得一大凡修身慎行皆須自己着實下工夫不可毫髮放過放過便非着實今人無自着實工夫只是修飾外面要別人道好而不知盡為有識者所窺遂指為小人此是立身根本一閒暇勤讀書考古人嘉言善行體而行之常親近正人虚心以請益焉然人之邪正未易辨識大抵行止端荘語言合道言不及利便可親近若好䜛人諛人議論不正諂媚取容言不遺利此小人也湏逺之逺之一仕宦當以誠心愛人為本愛人者事君之實程眀道先生縣座右嘗書視民如傷四字古大賢尚如此何况今新進小生豈可不勉大抵人情好惡彼此不異推已行之無或不當若待蠻夷更湏寛恕撫之則父子虐之則仇讐此不獨蠻夷則然但蠻夷則難於拘以文法常湏以恩存恤之遇事諭之以理便有拂逆雖笞罵亦未宜輕易克偉子瀘建寧劉剛可為鑒戒一奏啟本是進逹朝廷湏字字㸃到一字差錯便是事君之心不至若行移諸司及所立案騐亦湏仔細檢㸃非但免罪此亦是學一凡係官錢糧雖一分一合不可侵用收支際闗防姦弊務要出入眀白着實立案庶免後患一若一時公務急迫小民倉猝措辦不得湏借衆力恊助者恊助既畢或有餘賸便湏對衆給散不可一毫入已便是贓罪目前紛紛可鑒一官府一切事務皆憑文案稽考近年姦詐小人往往設計毁滅連累不細大凡收貯文案之處常湏親自照管闗防不可怠忽一雖㣲細皆湏眀白立案免後患一吏卒之弊古今一轍其欲觧事及中傷人常用閒暇之際三言兩語全似冷淡不着意者官長信之不疑遂致臨事顛倒是非變亂曲直自己枉受貪汙之名而實被罪責矣故凡事有疑難猝發落者當廣詢詳察切莫不可輕信吏卒之言而行一有不實為害非小大抵待吏卒湏闗防而亦不可治之過嚴過嚴生怨而能為己之害惟正已以馭之使不得有為足矣一里老所言亦未可輙信皆湏廣察一公暇無事可取舊案閲之可長見識觀律可知法意觀諸司職掌可知政理不宜怠惰凡仕者謹慎勤勵和緩闕一不可一敬事上官如嚴父當存親愛之心不可一毫悖慢積此誠意自然可以感動之彼雖不善亦未必肻加害處同僚當如親兄弟湏相敬相愛我有不是彼能為我言之便湏拜受改之彼有不是我當避之從容與之言彼若不從又一兩次避之從容與之言湏積誠意以動之吾常愛兵部尚書全忠毎部中行一善政必曰此出吾同僚非忠所及或有過舉必曰此忠之愚昧同僚不預知也吾常以自警汝勉之一閒暇熟看律精究古人用心仁厚處一字不可輕易忽觀一刑者古人不得已而用宜切戒用刑蒲鞭蒿杖或三五下六七下不過十下示辱可也戒之戒之一子弟家人勿令擅出擅出必仔細闗防自己公務在外隨從之人亦闗防之不可放縱贈言示姪之芳吾楊氏世守禮義服詩書仕者有亷節處者有善行居西昌數百年皆無敢辱其先者吾去鄉四十年今春始遂一歸宗人老長物故且盡後輩晚出行有違於先者多矣為之短氣索然雖召而訓之飭之其習慣成性安能必其吾從也吾留家四旬即行至今抱愧恨未已族兄叔邍第四子之芳来北京將歸乞言故書吾之所耿耿者勉之使務學為善庶不辱其先汝勉之哉歸見同宗子弟其悉以耄言勵之如能用吾言非獨老人有光吾宗有光茍不用吾言或忝先世非獨不可見先祠吾亦不願見之汝往勉哉訓䆃子黙識到家當脩敬者七事祠堂祀禮次日三牲祭臨来時辭亦湏祭毎日早詣祠致揖帶小姪去使之諳習逺行亦謁歸亦謁展墓半月内隨東門諸兄去毎一處㸔墳者與匹布無布則與鈔宗族親戚家皆湏到父輩行皆拜稱尊長親長同軰者稱曰兄年長者讓其坐朋友隣里相識家皆湏到湏兄弟及諸姪帶引湏執謙恭言語和緩論事湏從容勿急躁縣官學官皆須往拜之湏諸兄引領湏謹子弟之禮欲見官長湏請䕫兄帶引若平常出行與羅昪劉廣同畿翽可常同行更不可帶無状童僕鄉里親識相邀餽贈皆湏録記来㸔不可昧之當力行者八事一首去清林寺之門改作一小門十日内與序兄率人為之勿緩一作急整理田糧過戸𦂳要𦂳要切不可緩一凡係投送田土魚塘皆還原主切不可留此不可論在逺在近一打㸃一應書板整齊安頓學背樓上来時各印三五部帶来一豎立御書閣碑來時打二三本帶來一㸃過家中一應書籍一應文字法帖圖畫皆見數并冩在文籍志有壞者就請工匠粘綴湏預先用花椒作糊一湏親造蕭克潤處拜姑婆蕭季廣拜其内閫皆汝幼時受保育乳哺之恩者皆湏四拜盖有母道焉兩處皆湏要人事毛頭娘家有兒女亦湏少與人事一縁途舟中冩下書信但未要封忽遇便人即填日封寄仍要見在某處發當謹戒者十一事一最不可飲酒若被人苦勸不得已二杯三杯即止世之好酒者壞性敗徳妨事廢學致疾䘮身皆由於此故最當戒一晩間不可飽飯夜間湏着綿布衣睡湏要裹肚一不可頻數赴招飲湏和顔軟語辭不可有拂人辭色一非其人不可頻過其家若遇之顔色須和一對鄉人言大抵謙和不可暴厲傷人一凡請人作事湏與工錢不可招人怨稷以勢凌人致怨者為此切戒切戒一縁途皆不可登岸望人到江西亦不可登岸但回来時請蕭仲敬家一人帶到胡祭酒先生處拜之即過一但途中有先生長者及官員聞汝經過来望汝者此是敬汝父湏親去拜謝即出不宜擾人一到家便用俸米十石與楊和之子如彼處附近稷有榖則支三十石榖與之勿悮一稷至不仁致族人顯逹父子狼狽失所殊甚可恨即便討屋與住如急促未得且令在城背舊屋住下却從容別討便支俸米三石與之勿悮一楊𤣥若艱難亦支俸米三石與之分付䆃子及昱暠諸孫十二事一但係稷與人接受不明田土池塘山園房屋等業盡數推割還其原主雖我家曽與􅀢小價錢亦不問他取只要開除自己戸内稅糧各處皆然勿違勿違一東門諸姪俱要遵依老叔之言從㬰了落此事不可依稀坐觀成敗賔畿老弟亦然今遣和姪回亦專為督併此事湏要早了無惹後患若有後患必累䆃昱及諸弟姪一造墳湏擇楮原龍州如二處皆不遂意則聴於清林寺前再㸔斟酌亦要今冬見眀白一稷與奴仔盤費皆盡作急前来接濟一諸人皆與昱母子說凡事俱要依我發落不許故違惹累子孫顯達湏與屋住一諸事俱在和姪口傳我言語冩不能盡一䆃與和姪度嵗後作急啟行前来勿遲一昱甚輕薄妄誕湏與其母說嚴切戒約之勿致輕妄惹禍一攔街之門務要折毁如舊羅宅諸房田土房業南岡頭人家田土屋業盡還原主各處皆然陳與寛若果無理分外先訴於余侍講先生却赴府縣告之一戒飭諸僕各守本分尤不可縱林仔出外生理及下鄉取索此僕有百五十兩本錢在外闕湏知更不可令昱下鄉生事一和姪再来時湏與二十石榖安家或與十石俸米一家中有馬盡發賣不留子與諸孫皆不許騎馬我在此亦不畜馬只一驢代步耳示長新婦九事我今年七十有九只為稷不孝違背父訓專交小人作惡犯法今得死罪致我受氣成病漸至危殆亦不過年嵗間必死理無疑也汝吾家長婦今家中之事一一付爾掌管一家大小長幼皆付託汝汝湏毎事盡心今遣䆃歸發落數事可皆遵依行之勿違切不可聴信小人之言有所改易切記切記一田土多則税糧科差繁重必至累子孫破家蕩産苦害難勝即盡棄逺鄉田土山塘皆不可要近鄉田土池塘利薄者亦不可要或還原主或賣與人皆湏作急發落不可聴小人邪言依阿不舍至囑至囑一吾儒者之家不可思量要富戸下田不許過百二三十石戸下糧不許過三四十石儘足嵗用切不可過多過多則後来必累子孫為父母不可無逺慮切記切記只是許多田糧在戸後来科差子孫也自難當一家中凡事只請賓畿叔公之貞之䕫之序之所四位伯伯来從長計議而行行事之際務湏體我心行我心只要戸内田少糧少後来不累子孫更着實要籍册過割與人眀白不可存虚糧在戸仍累我家一家中所藏勑書誥命御筆畫及一應書籍文字法帖圖畫皆是我平生性命心力所得家中務要常常愛䕶湏是汝親眼同孫子小心勤勤看過遇梅雨晴霽則湏晒􅂒曬􅂒後還親自整齊收拾親自鎻鑰封閉此是吾傳家之寶絶不可借與人看雖至親之人亦不許借之𦂳要𦂳要更不許信付昱子湏是新婦一一親自整理盖昱子兩年来甚懶惰不學只因前年冬稷来此驕縱他壊了雖極力整救不起近年只與奴僕小人相親全無心向學與父性一般家中凡事不可信付之不可縱慣切湏闗防㸃檢往年只為新婦不能諌夫致有今日之禍若今為母又不能戒子將来更有不好昱在此與他書讀他就偷書與人切湏防之一我今病甚稷又犯罪繫獄可隨時與昱婚配只祭告祠堂拜見家中尊長百事皆隨時切不可違禮作酒席一家中子孫不可斷絶讀書種子湏延好先生教誨湏嚴且勤為母不可慈愛䕶短事師禮湏厚學俸湏要實效不可少欠昱婚後令讀書寫字不可縱他懶一體還先生學俸一吾老且病稷又重犯未有生意二小子諸孫其産業皆湏及我存日早定免致後来争競不眀不相親睦也凡嚴夫人存日所買屋業田園陸土池塘及我寄回銀子所買田業不論逺鄉近郭並請賔畿叔公之貞之䕫之序之所公同分作三分一分與稷諸子二分與䆃秫務要均平各成片段取便利但係稷近年新置屋業田土山塘並屬昱晟暠晅晏管業學後舊居只與䆃秫居住城外舊居仍作三分一和姪在此多効勤勞可於學中支俸米十擔與其子如米去不便與其家相近處有榖送三十擔與其子勿違一稷之不仁致顯達全家狼狽即整居與住仍支俸米四石與之遺訓正統二年病中冩八件一用平日私居所服深衣歛棺中悉屏金銀等物用絞衾書銘旌遵吾所命作魂帛設靈座到家則靈座前從俗設影像盖小孫未識我也棺内外用漆湏周宻舟中湏帶漆備用一切䘮事依文公家禮斟酌而行啟行及入舟過南京入江西境到泰和河畔皆奠告湏舉棺到家於正㕔安置亦奠告奉魂帛入謁祠堂於祖考前稷用縗服代拜此待到家擇日行用酒果告祖宗毎一堂行五拜三叩頭禮一急作書報稷令在家設靈席變服治塟事不可来逺接待船到吉安則来永和以上接待棺出舟新婦與孫子来接一擇𦵏地但取平穏髙燥不生水蟻無坳風後来不為人居宅不為窑塲不為道路之類一作墓湏作兩穴相並我居左宂空右宂以待郭夫人不可違命一作墳湏自家出費我有銀酒缾及盂約二十餘兩足備甎石等物之用不可以作墓累鄉里盖吾素無惠利及鄉里也不可違命一欲為墳墓經久堅固之計則用王時彦學士𦵏母及太僕寺丞豐城丁維南𦵏妻之法皆好如資不敷則以吾平日所用銀酒盃大小六箇益之惟留小撒盞十箇為郭夫人他日復土之用不可移動丁法見吾所作其妻墓文時彦之法有親筆書一墳前不作享堂勿築墻垣亦勿如鄉里用甎石作盤合様以貽後患只是以土崇厚築之但遇雨水傾塌隨即加築築湏十分堅實墳前勿建神道碑勿立石人石獸只立一望石遵遺命所題近墳置少田土以備祭掃此皆不可違命一吾去世之後始終不許從世俗延僧道作善事追薦盖吾平生所存惟尊君愛民之心所行無傷人害物之事但不免嫉惡亦當正理故雖未能為善未嘗為惡果有地獄吾必不入子孫切不許聴俗人之言為此事以汚辱我如違我命即是不孝我死有靈必不祐汝正統九年三月治命七件吾在世已久踰越分願無所遺憾但官品崇重國恩未報此雖死不能瞑目耳身後數事預示子孫此吾之治命其遵行之不可違也一只用幅巾深衣歛湏用絞衾庶幾柩歸經過牐埧可得穏當一吾生平不曽用僧道死後亦勿用只依家禮祭祀祭物隨時所有不必豐但設我平日所用冠帶袍服於中行禮祭告之文亦用家禮不必新作一凡今䘮家遇親朋来弔者皆散孝此是北方風俗南方素無此禮古禮亦無盖弔是常禮孝是凶物豈可自進㐫物請他人為己持孝大非禮非禮吾死後切不可行或有搢紳大夫来弔待賔者眀謝以非禮不敢䙝凟實非慢也一吾久病數數累公卿大人垂問感愧甚矣今不能報煩院中一僚友干凂少保先生宗伯先生冢宰先生三大人遍叩列位公卿大人一切遣祭遣賻並止不行至叩至叩同院僚友鄉里親交及歸途有相知者欲行祭賻皆謝卻之此吾之中懇非矯情也力辭力辭一作急冩書托徐尚書大人倘有馳驛上廣東者寄去報䆃令急急作墳楮原龍州隨擇一處乾燥平穏無凶禍者便選日興工切不可求子孫利達如此然後易成蓋要利達湏力學脩徳不在風水也磚石石灰務要堅固於外只作一大土饅頭必湏自費不可吝慳庶得蚤完若延緩稍遲必累煩鄉里重吾過矣一柩到家可且安止於學後正㕔却擇日𦵏亦不可久停盖死者覆土則安矣一啟行回去凡書籍文字湏逐一收拾包裹愛護舟中尤湏謹備雨水漏濕片楮隻字不可損壊遺落法帖圗畫皆然東里續集巻五十三
