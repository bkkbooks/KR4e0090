body:
  text: 東里續集巻四十八明楊士竒撰録先世遺事録士竒少侍先生長者數聞說先待制事雖一言一行在碑誌傳述所不必録而後世子孫所宜知者皆謹記之得數條名先世遺事録而從祖父兄之行未有為之傳述者敬撮所知之槩附于下方先待制公八九嵗學於山東王氏王氏之長者愛之遇之輙有所問一日於門外沼上散步公自門内見而避之長者執其手問曰人從門内閃公應聲對云公向水邊㳂時其家有客聞公所對嘆賞不已客方作暮春詩遂屬公和和其寒字一聨云數聲啼鳥千山曉一片飛花滿地寒名譽遂起公初赴鄉試時與郡四十八人偕行南昌有術者視人所書字論休咎多竒中四十九人各書其名求决捷否四十八人者皆無取獨視公所書曰必捷衆問所以然曰日下有京師之行矣已而果中餘皆被黜公未仕時館授贑東山謝氏延祐初詔行科舉公将起應詔館人止之曰此科宋老師宿儒多在且聞江西十郡以名上者㡬二千人而額數僅取二十二盍姑遲之公笑而不應館人母戒之曰吾觀先生言動皆貴人相不可尼遂厚贐以行館人親送至郡城登舟道經江東石固王廟請於公曰此神靈感吾為先生求决前程得籖不答所問其末句云白馬渡江秋日暮虎頭城裏看嵯峨是秋公中鄉試眀年春登第授㑹昌州判過家遣人豫報館人八月之官至贛城晚出建春門館人乘白馬來候過浮橋邂逅焉遂同還城中宿嵯峨寺始悟江東王籖所云而信事出於前定也海桑陳先生少從公㳺嘗問曰外人率議公為政太執著公曰爲政自須執著但當於道理人情見得明白方可公以四品朝官服金紫退休于家然極貧諸孫率出教授以助嵗計而猶不足里中有致政家居者其官位在公下而貲産充溢買田跨數縣頗爲識者所議有村民常往還二家者問曰公官髙而貧某官卑而富何也公曰天道公平貴者减富富者减貴忠厚不矜如此公致仕家居時爵位在州里爲第一其故人門生位通顯南北往還過太和禮公之廬者日繼踵州郡尤隆敬禮然公謙虚未嘗以此加於宗族鄉黨接族姻必謹其分不踰洽比鄰曲時節往還㑹勞無間貴賤貧富俯盡其意必周少時所嘗狎嬉者雖賤遇之如故或時相共記憶往事談噱以爲樂後生俊秀有志於學極力奨進之終日誨之不倦洪武中劉槎翁先生以尚書致政歸一如此嘗語士竒曰吾少及見汝家吟忩先生致仕居鄉里故吾今所行不敢以異也伯祖安吾府君少孤嶷然有立志旦出治生事暮歸力於學問愈久愈勵遂以儒術發身而家益饒裕伯祖觀山府君苦志博學以春秋教授鄉里清脩篤行人敬憚之従伯彦初孝友忠信而天資絶出好學不倦詞藻贍麗其前軰皆推重焉從叔子實倜儻負氣義有治材洪武初袁州守辟從事贊畫多所裨益郡人愛之季父子超為人表裏一致安貧守義不妄取予喜爲詩文工大字名其所居齋曰蠧書云從兄伯威待制公曽孫公卒踰月始生實嫡長天資温厚孝友根於其性從兄仲殷質直骯髒寡交㳺家貧自力於衣食於兄弟宗姻愉愉然能相䘏也慈訓録余生嵗餘父喪頼先母夫人教育用克知其先世而務於學然少時甚貧養恒不給迨仕有禄先夫人棄背矣傷痛深鉅如何可言凡童幼所受慈教未嘗忘也今余七十有四待盡朝夕恐死即先訓泯沒故述其槩為慈訓録以示子孫使知吾起孤貧以克不墜其先者有所自也先母夫人陳氏諱元貞字開年十六歸先公二十九先公沒洪武戊寅六月十三日先夫人沒春秋六十永樂中贈宜人洪熈進夫人常言吾幼從父兄學又日聞兄弟相講論故吾於書粗知大義云余五嵗先夫人教之讀書日必令識五六字有程先夫人於孝經大學語孟皆能誦說古今事多記覽其好惡公正余七八嵗頗有知恒告以先世事曰汝無父當謹識勿忘余嘗得先祖先考片文隻字歸先夫人識之曰此手筆也必為整齊珍襲曰汝不識祖父見此即見祖父矣宜寶重之余從心吾先生讀書僧寺間與僧童之同學者至家先夫人怒曰寡婦之子乃與僧同侣乎取杖將笞之跽謝不敢復乃免又嘗偕同學市兒至家先夫人怒形於色曰汝習墮下流使人指㸃曰此兒無父又無好母汝獨不思乎余或晩出必戒之速歸盖先夫人於家毎日將夕前後門戸皆親視扄鑰畢然後入室以息常誨余曰吾為女子時親見祖母倪夫人治家如此况吾今寡居乎余嘗夜讀先夫人從旁訓之曰吾初歸汝家見汝父晝夜不輟者四書諸經餘力則玩子史汝今宜專事經傳未可汎閱枉費日力又曰讀書必究義理義理不通雖熟何用又屢飭之曰汝幼孤幸有母汝若不學即我不能母汝不能子矣又嘗勵余曰汝父孝行上通神眀惜年不永如天不絶善人汝必将有立若早不務學何以承藉余毎自外歸必問今日親近誰歟聞侍正人君子則喜或庸常人即曰此何益於汝曷若閉門讀書自有益也又訓余曰近正人君子如行晴天暖日之下自然心目光眀四體融暢近庸人俗夫譬如行風埃昏霧中非但無所見且有霑汙矣余少時井汲杵臼之事皆親執事竟輙讀書先夫人目之喜且教之曰人居世未必長貧賤亦未必長富貴但貧賤入富貴非讀書未昜得也先夫人毎教余力學熟記精究余嘗著論辨議古人先夫人覽之曰諺恒言未學行不可學走汝違此戒豈不聞讀書未到康成地不敢言譚議漢儒汝今見得古人㡬分敢肆妄誕立取其槁火之曰且去積學嘗問曽祖事曰吾及見歐陽圭齋作墓碑兵亂此文失之吾獨記其銘詩遂口授余令筆之凡二百五十字後得元文校之不一字誤又口授先祖考詩數十首令筆之曰吾嘗見汝父手録故能識之自是因之以傳余嘗問髙祖既追封郡伯曽祖墓碑何以不書先夫人曰吾初歸楊氏見墓碑即以此質於胡夫人夫人曰待制公沒踰年郡伯之命始下碑葢作於命下之先故也余嘗問祖母事曰孺子所當知汝父本嚴夫人生為胡夫人子兩夫人相親愛雖同産姊妹或不及嚴夫人孀居資薄凡汝父授徒所得胡夫人必多送嚴夫人所曰姒寡居也有一味之甘兩夫人必共之胡夫人治家禮法秩秩諸姪及婦敬之如嚴師戴之如慈母又曰汝父同居兄弟六人極相愛敬吾妯娌六人相親睦亦然時親族中皆不及汝兄弟後來能繼承亦見不忝嘗口授三代考妣忌日使筆之曰汝父及是日必祭故吾能悉之今楊氏先世忌日兵後有録實先夫人所授也凡先世事諸叔及兄不能悉者皆質諸先夫人云嵗遇先忌日貧不能具祭必命焚香祗拜獻蔬食曰禮不能備誠可格不可闕也余少雖貧未嘗敢於人校利或推以遜人先夫人聞之喜諭之曰汝初生術者語汝父曰兒後當食禄即其言驗尤應推利及人又嘗飭余曰自我歸汝家耳聞目見楊氏仕者皆以儒術進皆秉㢘潔從來無以贓敗者雖家貧而譽好汝曹勿墜也余嘗問伯叔諸姑中孰其貌肖吾父先夫人曰莫甚肖於陳氏姑汝父長姑二年容色語笑悉類孝敬仁厚亦類汝拜姑即拜父矣余或久不見姑輙命詣焉曰汝不識父其又可疏一日陳仲述見過先夫人顧余曰我猶及侍陳氏老姑即渠祖母待制公五男一女老姑最長公沒後楊氏一門内外敬事老姑如母惟其教之聽莫敢違其備盛徳族姻無與並者今其子孫獨盛信知有徳者必有後於外家獨與孔碩舅羅孺人最厚嘗語余曰陳氏此一軰女徳無能企之盖孝敬徳備其福亦當獨厚汝但識吾言後羅孺人享禄養至八十終親戚有為掾曹傭書致裕者素重余而憫余貧一日遣其妻請於先夫人欲偕余就傭月可得白金三兩先夫人謝之曰貧儒家常事豈可使穉子役志於此以忝祖宗其妻慚而退先夫人勵余曰人以此待汝何可不自卓立舅氏之子爲吏先夫人戒余曰汝其絶之行見其敗無㡬果然毎諭余曰為吏者壊心術故當逺也惟先夫人平居隨事示教皆有至理今余耄惛不能悉記此特録其十三四以前所聞之槩嗚呼痛哉賜居録永樂七年以疾在告儲君遣内侍賜醫藥内侍還唘其所居庳陋湫隘髙廣不踰㝷他日諭某曰曷不擇髙眀者更之對曰臣居是八年既安之且臣家口稱是無庸更也曰必爲爾更之踰月賜宅於東華門之外樓居十楹皆新繕洽闓爽㵾深既拜賜矣竊問諸隣比故誰所居曰起衛卒五家以成此宅然則今五家者何向指其旁五家曰併於此矣歎曰豈當以一人故而令十家無所容白其事於儲君請辭宅不聽曰臣為宫臣所願殿下得四海心豈當以臣失十家之心且臣受此宅將必有臣倖求易宅者是臣作俑矣固辭乃聽復舊衆既服其約而後之求易宅者皆得罪乃始慚悔北京紀行録永樂十二年八月三十日晚百戸鹿榮齎勅至九月初一日尚書蹇公右坊黄學士宗豫司經金正字公素及余皆觧職初二日鹿百戸宗豫北行初三日令㫖差百戸商寛送蹇公公素及余三人初四日晴凌晨出江東門登舟濟川衛楊經歴蹇姻家留小酌致贐午過江東驛晩過龍江夜宿青山觜未至儀真三十里初五日晴早至儀真過􅄵晩過揚州夜半過邵伯初六日早晴天眀至髙郵午過界首便風雷雨遽霽夜過寶應縣初七日晴早至淮安午過清江牐度淮夜宿清河縣初八日晴午後至桃源縣蹇公病請醫託驛丞附口信回南京晚得宗豫報在對岸有管送者不得相即相望悵然夜宿桃源初九日晴便風早過古城驛午過宿遷縣蹇公請醫夜過宿遷三十里宿初十日早隂便風早過直河始買鮮魚午㣲雨晩至邳州蹇公請醫夜宿邳州雨不止沂河至此合流十一日早㣲雨午過新安驛未十里大風雨不可行遂止夜晴十二日晴食後至吕梁即房村驛過洪夜至徐州月眀遂過洪十三日晴午後過夾溝晚遇馬指揮寄家書十四日晴早至沛縣劉教諭仲鐔来㑹并饋牲醴因托附書回南京午後過沙河驛聞宗豫是日早先過十五日晴過魯橋驛十六日晴早至濟寜蹇公請醫午過牐夜宿土溝十七日晴午過開河驛蹇公始勿藥邀余及公素登岸步行顧望山川清麗原田曠衍廬舍逺近林木遮映欝然可愛便共邐迤行十餘里乃還舟公欣然命具酒饌盖自過維揚輙病廢飲惟日戒觴豆饌余兩人而卧督勸之或時强起則與余對奕數枰已復就枕至是商百户亦來四人相與痛飲極量而罷夜至安山驛行在差散騎舎人劉福齎勑命尚書蹇義回南京先至驛中蹇公赴驛受命是夜族祖東平郡守季琛入舟見問十八日晴早族祖以其僚及學正王某等皆來㑹且致贐午余與公素附載廬陵水東人舟北行蹇公品分酒米諸物送余兩人族祖置酒舟中飲罷遂别諸公離安山三十里夜宿十九日晴便風早至章秋其南五里濟寜水與黄河支流合食後過荆門驛午至東昌夜宿青陽驛廿日晴早至臨清食後過牐入衛河便風午過渡口驛晚過武城縣夜宿甲馬營廿一日晴午過固城晚宿徳州廿二日晴凌晨過枽園驛便風午過連窩驛午後過東光縣晚過新橋驛十里宿廿三日隂早過磚河驛十里許阻風午發至長蘆夜宿㣲雨廿四日早㣲雨雞鳴過興濟早過莘縣食後晴過流河驛晚過静海縣夜宿楊栁青驛廿五日晴早至直沽買鮮魚商百戸饋大蟹八十枚食後㑹宗豫煑魚蟹共酌遂與宗豫公素步至引兒灣會劉泰員外柯景林主事邀余三人登舟煑茶食蟹余與宗豫雙陸公素賦詩夜至楊村驛余舟不至三人皆宿劉柯舟中廿六日晴早與宗豫劉柯别㑹鄉人李子俊邀余及公素商百户草酌食後余舟至遂發楊村夜過蔡村二十里宿廿七日晴午至河西務余與商百戸先五里步行訪務耕㑹宗慶遂同酌遣人候公素不至舟縁北岸徑去適遇邑人周資善託附口信報家兄酌罷務耕宗慶送余十里登舟夜過河西三十里宿廿八日晴早過王家店五里舟人以事阻晚始發夜宿扳罾口廿九日晴早至蕭家林數日來河路屈曲舟中困卧悶悶食後便自蕭家林徒步向和合驛中道阻水褰裳涉葦荻中泥潦沒膝踰里所始得平地皂𨽻髙謙從旁竊歎動不若静余甚愧之亭午至和合驛飲商百户舟中午後余舟至遂發三十日晴亭午至張家灣買車閠十月初一日晴㑹前工部員外郎厲肅主事王宗學始得車午發至花園店夜宿初二日晴食後至文明門入城赴鴻臚寺報名初三日晴早入見余奉恩㫖釋免公素送錦衣衛是日午上御棕殿召臣士奇至榻前天顔穆霽聖訓諄懇臣士奇恭謝稽首時禮部尚書吕震翰林學士胡廣侍講楊榮金幼孜皆在晩遂同退余赴鴻臚寺報名翰林諸公來㑹初四日晴早入謝恩六部都察院大理寺通政司及十二道監察御史交章劾奏余罪宜正國典不可以獨宥被收十月廿五日錦衣衛都指揮紀綱傳奉恩㫖釋免復職還南京赴鴻臚寺報名廿六日晴早謝恩是日翰林中書監學及同鄉諸公皆來㑹午赴鴻臚寺報名廿七日晴早陛辭退翰林中書監學及同鄉諸公來别食後勉仁用之行儉振舒送至文明門外學䕫追送十里遂與王邦彦司直張伯原劉允恭兩司諌同行晚宿花園店廿八日晴早至張家灣買舟食後暴風不止河氷合遂舍舟遣從者復入城買脚力十一月初一日晴暴風稍止初二日晴是日冬至余四人望闕行告天祝夀禮退飲主人所抵暮從者以脚力至初三日晴食後唘行夜宿花園店初四日早過彰義門午過盧溝橋夜宿長陽鋪未至良郷縣十里初五日晴雞鳴過良鄉早食琉璃河食後同王司直張司諌飲于前長清縣丞張忠家王舊同官遂㑹湖廣僉憲王霖飲罷與王僉憲同行晚至涿州城北道傍讀歐陽圭齋所製歴代名賢碑遂同王司直張司諌飲王僉憲所夜宿涿州初六日晴午後至新城縣遇前御史馬楫邀余四人飲其家夜宿新城初七日晴晚至雄縣趙令來訪王同鄉饋酒肴芻豆初八日晴早發雄縣出城南道闕阻水舟行廿里始得陸午過莫州夜宿任丘縣初九日晴過任丘廿里遇河間守王宗海遣從者送余四人赴河間就邸舎時聞戒故也晚至河間王之子饋牲酒芻豆李驛丞亦饋酒饌遂留同飲初十日晴晚至獻縣十一日晴雞鳴過單家橋晚至阜城縣十二日晴午至景州遇春坊故吏劉政及前大理評事周禮買酒酌余四人繼㑹前給事中李琦進士吕文質李買酒邀余四人及吕酌其家酌罷送吕還景福屯因指示余周亞夫塜及董莊仲舒居䖏是夜劉政留伴余宿十三日晴劉政送余行五里始别午至徳州遇隆平侯沐都指揮馳驛還南京託附家書夜宿徳州十四日晴早王司直先由陸路赴濟寜午與張劉二司諌附載桐廬人舟同載者光䘵寺録事陳遜新興知縣廖康祐桐廬縣丞黎是夜風雪宿舟中十五日隂南風午發徳州行三十里宿十六日晴早過固城驛廿里遇舉人㓂厚連智畧聞家中消息十七日晴早過甲馬營驛晚過武城縣廿里宿十八日晴食後過渡口驛晚至臨清縣十九日晴早過牐㝷行敏不遇食後發臨清夜宿清陽驛自徳州至此皆南風廿日晴食後過東昌陳耘御史来㑹便風遂發未至荆門廿里宿廿一日晴食後過荆門驛遇故人鄧傑初徒步送余十里别晚過章秋三十里宿廿二日晴凌晨過安山驛夜宿開河驛廿三日晴晚至濟寜過牐遂宿自荆門驛至此皆南風廿四日晴晚北風候王司直不至留書學中遂發濟寜未至魯橋驛十里宿廿五日晴南風早過魯橋夜宿沙河驛廿六日晴早過沛縣未至夾溝三十里夜宿廿七日晴早食過夾溝夜宿徐州廿八日晴早髙驛丞來訪饋牲醴薪炭食後過洪夜宿吕梁廿九日晴午過洪南風行二十餘里夜宿三十日晴早食過新安驛南風行二十餘里夜宿十二月初一日晴早食過邳州沂河流澌盛下晚聞曽本清舟北行追之不及夜宿宿遷縣自魯橋至此皆南風初二日四更北風盛寒早河凍斮氷行至古城九重灘膠淺遂宿是日晴初三日晴河凍益堅晚稍解行五里至崔鎮夜宿黎縣丞先陸行至桃源初四日晴氷堅午遂舍舟買脚力陸行十里夜宿初五日晴早食至桃源縣前給事中謝朝錫孝感知縣袁仲海廬陵羅用素皆来㑹遣從者赴縣告阻凍文書晚飲謝所縣丞簿來訪廬陵李學秀才在對江亦來㑹具說小兒動静初六日晴早飲袁仲海所㑹浙江憲僉劉濬食後發桃源晚至清河縣是夜與廖知縣陳録事别初七日晴早附淮安人舟遂發清河晚至淮安初八日晴早附載宿遷人舟遣從者入城招劉彦達教授及之紀姪來㑹午發淮安未至寶應二十里夜宿是夜微雨初九日晴便風早過寶應縣晩過界首驛夜過髙郵遂過邵伯夜半至揚州初十日晴便風早㑹御史張翼給事中李熲始知王司直於宿遷陸路先行遂發揚州亭午至儀真過􅄵附載鎮江人舟夜過龍江夜半至江東驛十一日晴早入城赴鴻臚寺報名西廵扈從紀行録宣德庚戌十月初九日上親率六師廵邊扈從之臣命公侯伯都督皆行文臣少師蹇義少傅楊士竒楊榮太子少保金幼孜禮部尚書胡濙工部尚書吳中吏部侍郎鄭誠戸部侍郎吳璽兵部侍郎柴車刑部侍郎施禮都察院副都御史賈諒太常寺卿楊溥姚友直大理寺卿徐初通政司叅議劉芾光禄寺卿郝郁鴻臚寺卿楊善各率其屬行以士竒老疾特命肩輿從行是日早扈從官皆先出德勝門赴玉河營候駕午後駕至駐蹕玉河初十日楊少𫝊金少保楊太常及余四更先發赴龍虎臺候駕晚駐蹕龍虎臺上召義士竒榮㓜孜溥顧問旣退復召士竒諭曰前路陿隘車騎膠葛難行今遣長隨内使䕶卿行士竒叩首謝退抵暮長隨内使黄汜奉㫖以校尉二人来一路皆三人者䕶行往還頼以無虞十一日昧爽度居庸闗闗之内凡四十里未刻已度晚駐蹕岔道賜百官酒饌十二日駐蹕岔道賜義士竒榮幼孜溥酒饌復勑光禄賜五人羊酒十三日駐蹕岔道觀獵晩賜英國公張輔成國公朱勇忠勇王金忠清平侯吳成新建伯李玉奉化伯滕定尚書蹇義楊士竒楊榮金幼孜胡濙吳中太常卿楊溥酒饌十四日車駕發岔道楊少傅金少保楊太常及余先行五鼓過榆林辰刻過懐來城西五里駐營十五日早過上墓過沙城晚駐營雷家站凡車駕所經闗内闗外皆豐稔是晚上顧羣臣言之甚喜遂賜酒饌既而召士竒榮加恩命十六日過鷄鳴山辰刻過鷂兒嶺與金少保楊太常入廵檢司在桑乾河上又㝷廵檢所居土屋三間髙不踰㝷廣如之四旁穢惡司前灘聲虓吼灘側鋪舍名響水而榛荆䝉宻因思坦行兄平生文學過人直氣浩然不可屈下徒以病乞身謫死於此為之低徊黯然流涕二公皆坦行故人亦惻愴興嘆而出是日駐營義河未至宣府十里所宣府總兵都督譚廣迎謁上褒賚甚厚晚鼐員外送棃甚佳柴侍郎送三力助肩輿十七日賜将士綿衣袴鞋車駕西出洗馬嶺命榮濙中璽車溥善及欽天監太醫院官扈從餘皆留宣府余與金少保姚太常寓彌陀寺蹇鄭諸公寓衛官之家彌陀者元丞相安童創建已毁近嵗總兵譚都督復作之住持薊州人待客甚恭是晚飲姚公所夜余邀二公飲十八日早譚都督来訪盖城中諸官皆送駕至前營始回萬全都司馬都指揮以三衛官皆来見午同金姚二公回訪譚公留飲晚陸英来見鄭侍郎招飲十九日譚公招諸公飲禮甚厚二十日早譚公以寺住持求重脩彌陀寺記許之而卻其禮幣是日作重脩彌陀寺記懐来張都指揮来見晚譚都督來報車駕明日還至宣府東二十里駐營遂促装二十一日早余同金少保姚太常出宣府城至營楊少傅楊太常先至辰刻駕至晚召榮士竒顧問遂賜二人天鵞二十二日駐蹕雷家站是日天明度雞鳴山與金公同觀山下永寜寺碑寺已毁故址亦不復見碑文歐陽圭齋奉勑譔巙巙學士書字畫皆全文云唐太宗嘗駐蹕於此山下聞雞鳴因以名山云二十三日過懐來東五里駐蹕晚雪盖自車駕啓行至歸皆和緩無風如中土八九月宣府菊花粲然可觀其城中人云十月天氣如此前所未有至是始覺稍寒夜有㫖從官前留宣府者明日皆先度闗惟楊士竒及扈従赴洗馬嶺者隨駕二十四日早楊少傅金少保楊太常及余天明至岔道是日駐蹕岔道晚有㫖從官皆先度闗余遂同金少保先行昏暝度闗既度咫尺不辨物色遂迷道二鼓始達新店從者皆困憊寄宿民家五鼓同金公起行三十里至玉河天明與金公相失辰刻車駕至余趨避道傍衆中上遙見遣范太監馳馬賜勞問且命從容歸余望駕叩頭畢遂行未刻入安定門遇康中正訓導見報妻子已至張家灣及報家兄安好甚慰意晚至家東里續集巻四十八
