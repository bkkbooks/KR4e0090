body:
  text: 東文續集巻十一明楊士奇撰序送王彦鼒序吾邑王鉉彦鼒其行安於分其言當於理自登第與余徃還既為御史有職務而朝退或公暇輙過余相與清論為樂盖未甞累日不相覿者去年冬余侍從来北京獨彦鼒馳一騎追至江上送余登舟舟度且半猶隠隠見其徘徊江畔其情可知也今以考績来北京得握手叙契濶過余留信宿輙告别而歸吾兩人之情固皆所不能已矣夫人生離合率出偶然不能以恒也惟其不可無恒者心之所存身之所行焉耳今天子下明詔宏養民之政申揚激之令在位之臣孰不飭躬修行以欽承徳意况風憲者揚激之所自出哉吾故三復羔羊之詩以為彦鼒南歸之贈彦鼒勉哉送蔡運使詩序鄉先生山東鹽運副使蕭鵬舉表然清潔之操於人不易許可去年来京師獨數稱其同官蔡繼先之賢其言曰繼先維揚人温厚平易常為河南㕘政亷直持法吏民敬愛之既為運使山東所以發已蒞下者一如㕘政時運使無㕘政之尊而貲筭會計之繁細又㕘政之所無也非澄心寡欲達於理者不能以稱繼先為之一務寛厚恤下不計身之利害其下之人亦競相勸趨事曰蔡侯仁我我曷可不力以累仁侯以是嵗課之入無或不足亦無有後期者使者過山東觀吏之賢否皆稱繼先為賢曰他運使不及也余聞蕭先生言心異之今繼先考績来京師天官第其績最等於是朝之公論與士君子之所言合也然則繼先可為長者可為今之循吏今将復還山東士有為詩送之者繼先以蕭先生之故過予求為序予安得不為喜譚而樂道之也贈醫師鄒孟義序自余仕京師十餘年有從鄉郡来者率喜問士人近况凡余所識者多已物故而今之能卓然立身致名譽余雖有識與否中心愛之稱道之不厭也鄒孟義家廬陵距吾所居一舎許業於醫其先授祕方於嶺南隠者有名於時至于今孟義術益大售所治疾無不瘉廬陵西昌之境有竒疾更衆醫不能瘉者孟義多瘉之如孟義曰此不可治即更衆醫竟亦無治者然其心急於濟人有求之者不以其貴富賤貧及道路逺近雖甚寒暑昏夜輙趨赴既効徑去報不報不計也所存心如此余恨未之前識也今年賛善梁君抵書京師告余曰孟義所治醫術博矣尤䆳小兒科且年甚富志甚銳意甚恭将益進其術廣其功未已也冝一言使傳焉嗟乎余言何足以傳孟義世率謂醫之施於嬰兒尤難徴諸音聲容色之間而非可以言語求也非精其理専其業不能成功如孟義既䆳乎此又方進其術未已将所造詣益深如過邯鄲為帶下醫過洛陽為耳目痺醫過咸陽為小兒醫無不可者将必有能言如司馬子長者為傳之使不泯奚假於余哉然余鄉人也既愛重之故書此以復梁君以為贈醫師鄒孟義序送鄧宗經永新訓導序學校為政之首務也長民者知重乎此典教者知重乎此可以為賢矣吾吉安九邑廬陵附郡城其學常得賢教官然縣令丞親於民者求其能以時一至於學或出一言致勸勉之意何其少也夫不得賢令丞幸有賢教官又上有賢部使賢郡守亷視督勸其學不廢也近年會稽吕公僉憲江西慨然獨念治化所先行部至郡邑必下車趨學宫謁先師退考視諸生所習深致敦勉之意盖賢部使也而相繼守吉者金華朱公山東藺公皆盡心於學勸率奨勵或日一至或再至無三日不至焉者皆賢守也時廬陵職教者浦城陳君士希佐之者吉水周君公明士希持身謹行公明明經敦徳二君協力合志毅然以究職事成後進為己任後又得鄧君宗經佐教焉鄧君學行有稱且益與二君協力合志三君皆賢教官也於是廬陵之學雖不得賢令丞而學者勃然擢髙科登膴仕莫之能禦也固諸賢之力哉鄧君又負理才郡長貳政有所未通者皆就而問之鄧君甞㳺太學向之同㳺者今皆躋華陟要鄧君之才冝華且要也乃獨恬然安其命樂其所有日與其徒講求聖賢脩已治人之道以此為得此其中之所存者可量哉居無幾丁家艱去服闋得佐教永新縣學永新亦吉之屬邑其令丞吾雖不知而吕朱藺三公之徳政甞行於彼矣鄧君移其効於廬陵者施於彼永新之學将来有不大興者乎有求余文贈其行者於是乎書贈陳教授歸臨江詩序臨江陳孟浩永樂十六年李騏榜賜同進士出身凡進士發身者其初授官内為六卿之屬為御史為行人外佐方岳佐郡宰百里之邑中人以上者為之朞月間率能見設施起聲譽下者輙得濟其私欲孟浩所存心一不在是初當授職言於吏部願得教官遂奏授長沙府學教授己而改蘇州府學夫教授非有政務之繁簿書期會之叢脞日所親比者俊秀逢掖之徒所談說者周公孔子之道脩齊治平之方盖職於化俗而育才也非學之眀志之有守固不樂就此於是孟浩之學與志可知已孟浩所至盡心教事其學者率有成效而耿介之操斷斷然非公事未甞一涉跡郡守之庭郡自守以下至于耄耋之民皆譽之曰賢吏部考其九載之績最将奏陞官孟浩再三言老且病願得致事歸不願得陞也吏部察其誠遂奏遣歸孟浩時年六十有五志力彊固精神未衰也昔伏生九十猶彊授經掌故孟浩固不可彊乎其殆審大易進退之幾而安老氏止足之分乎於是士友有作圖贈其歸者給事中康中正以求予言余於孟浩故相好也遂作詩贈之學士君子於孟浩故者亦繼作焉贈嚴士正之桐城知縣嚴氏吾邑文獻故家科第仕宦相承三四百年士正承其世業敬身力行選貢士擢佐教江隂縣學其學者皆心服之自邑長貳暨其耆耄皆心敬之滿九載天官考其績最當陞翰林侍講學士曽君鶴齡言士正才行可任理民遂以為桐城知縣桐城畿内邑民淳俗厚有朱司農之遺愛在焉士正清操雅度有古循吏之心夫士不得善地其政未易行民不得賢令長其生未易遂於是衆不獨為士正賀實以為桐城賀士竒忝近侍有年聖天子孳孳體天心以育下民選賢良寄之牧守然今山澤畎畝林居野處幽僻之民豈皆泰焉得所而無嗟歎愁恨之聲於下也哉吏之比民者莫切於令若上有愛民之心而得以行所志亦莫速於令令果能致誠以求其情以施惠利民將無不泰焉於下而豈有嗟歎愁恨之聲也哉傳曰民之所好好之民之所惡惡之盖必若是而後不負聖天子簡用之盛心與平素之所學而桐鄉之祠将不有繼漢人者乎朂哉士正吾兩家非一世之好也請書以為之官之贈送楊脩撰詩序仁宗皇帝臨御之初下詔求賢山東按察使首舉仲舉明年徵至吏部尚書屢試文章奏授翰林檢討預修永樂洪熈實録陞編脩又修宣徳實録陞脩撰士竒交仲舉五十年仲舉淳厚而坦夷貞静而直諒非聖賢之書不讀非合禮之文不窺言行雍容未嘗有過粹然如玉也余嘗升其堂拜太安人髙年懿行言有師法退而交其兄伯升惇實恭謙簡靖坦易一家之間慈孝友悌温然如春也余交友多矣求其人如仲舉固鮮求其家之母子兄弟如楊氏加鮮故余初别仲舉也恒思之不置及出而仕同在翰林又各牽職務不能如徃年之散逸而適也仲舉今謁告歸展先墓武昌少師少保兩楊公禮部侍郎兩王公以同史館故賦詩送之余最故當序簡首盖予因之有感焉水木本源之心人人同也今之仕者大率三四年五六年逺者十餘年皆得省桑梓拜丘墓以伸追逺之情士竒之寡昧叨禄三十有八年訖無寸補徒以寵恩之厚而不能一日少伸其私於别仲舉云何為情又念少壯㳺武昌徃還幾十年於時同輩六七人皆志合道契相好相益篤交誼於金石抗志尚於浮雲殆不知有人間富貴憂患事若将終身焉者既不能如志相繼多出或仕或處今亦多謝世獨仲舉士竒兩人存故余於兹别亦難為情嗟夫山川不改古人之遺跡故在仲舉展省之餘鼓蘭枻絶長江登禹書之大别俯屈騷之江夏南望曹孟徳周公瑾之赤壁東睇蘇子瞻之樊山雪堂因舊㳺興懐舊交而有存沒之異仲舉亦豈能忘情也哉動於情形於言嗟歎詠歌必有不容已者明年北上必将倒囊以慰我若夫勵之為臣之義而戒滯于私者君子之心何俟於余言送周秉昻甫詩序文江周秉昻甫故吉州總管耐軒先生之六世孫周氏其先詩書閥閱赫奕於宋元而耐軒先生有隂徳於吉之人厚秉昻甫負卓犖之材英邁之氣自少壯至老不屈乃獨斂而在下有山水以娛有田園以給有詩書以淑其子孫長子忱擢髙科仕於朝二十年有賢譽聞中外衆子若孫森森玉立居則盡心於愛敬之養退則悉力於公私之務秉昻甫無所累乎中無所慕乎外日與故人親戚尊爼歌詠逍遥雲林泉石之間有以足乎其私也今年縣推長徭役里中而賦率大半輸北京秉昻甫矍然念曰此出諸細民而将仰給公家者也沿江涉淮道河濟踰七千里之逺且險是豈細故哉且是役也吾於事君上所當然雖老矣其可辭行乎時秉昻甫春秋六十矣即日治装具督饟舟率先而發四閱月達北京悉登于公廪而縣之賦皆莫之先也然因秉昻甫亦莫之敢後焉常情足於私者或不知敬於公秉昻甫其可謂忠厚之至也夫鄉有一人焉邑有一人焉能敬於公凡事率先而不敢後斯一鄉一邑之人起而勸矣而安得人人皆如秉昻甫者哉忱時為秋官員外郎候迎就第鄉人士之仕於朝而與忱㳺者皆走賀焉方忱為酒夀其親秉昻甫既喜其子之賢於官又喜其客之皆賢也輓留相與酬酢傾寫懽洽觴未既秉昻甫輙以眀發告忱拜乞留客亦咸謂何遽也曰老者其孰不榮禄養哉顧先人之丘墓係於我奈何違棄之而貪榮逺外乎客知其志不可以強留也取古樂府分題詠以送之士竒與秉昻甫之生同嵗則為引諸巻首送周以穰序周和以穰於余為中表兄弟其為人闓爽温實無外騖之意其家食時有孝友忠信之行聞於人治詩經嘗試經義於翰林中選得醴陵縣儒學訓導歴數載丁家艱去服闋改新樂縣學訓導通兩學三考其學者多臻于成而選鄉貢者科未嘗乏也以穰今考績在天官用例當陞翰林閱其所試經義有一言之誤乃復得訓導新會縣學知之者率枉之而以穰不謂枉也方欣欣治行李就道曰吾戚焉望故鄉七千里不獲一展桑梓今而得便道以稱吾之願欲國家之賜厚矣嗟乎士固有以尺枉而掩其尋直者然良工不以寸朽棄合抱亦取其大而略其細也余嘗觀以穰所治經其析理通而不窒見諸詞直而不浮而援引發明無或弗當盖其兄台州教授以巽得前進士蕭執先生之傳而以穰私淑焉者也今之選科第官學校其皆有所自如以穰者乎以穰獨無不足之意亦其學問之力所至歟鄒孟子所云不怨不尤以穰庶其近之哉其别余将之官特次第所以来之故贈之而因以見余意亦将以示未知以穰者云送陳參議赴湖廣序中書舎人廬陵陳彛訓陞湖廣布政司左參議命下薦紳大夫皆為之喜中書掌天子外制近侍之職也凡近侍久於其職者徃徃陞遷出任藩憲及大郡惟兩制久未有陞外者盖難於文翰之選而重其去也於今㕘議之命遂以為中書喜彞訓家文獻之邦襲詩書之業闓爽通練喜於為義在中書十有八年矣故其陞也亦以為彞訓喜湖廣江南大藩也接黔蜀介兩廣據汴吳江淮之濵而包漢湘洞庭之廣雜以夷獠之居地大而民衆如彞訓徃焉賛旬宣於此盡為臣之節端已率下致民隠以畢達導聖澤於旁流使其人謳歌鼓舞於皇眀治平之世吾又将為湖廣之人之喜也君子居其位則思盡其職吾於彞訓非交㳺一朝之好故書以贈其行凡與之相好而重離别之情者又為圖與詩繼于下方送鍾子勤之官肇慶知府詩序吾同邑今仕於京者惟余與子勤最久余官翰林子勤除中書舎人居第相近旦暮相聚憂患相恤情好之厚於今二十有五年矣子勤積六考之最今陞肇慶知府士大夫素相徃還者相與慶喜賦詩贈其行而於余處久且厚能無言乎中書近侍之職所典書辭命皆天子訓諭四方其任至重也而居是職者徃徃久任不遷二十餘年陞遷於外者始再見於子勤其亦難遇也矣今聖明在御方詔百司舉守令嚴連坐之法以責實効而彫弊之民譬諸枯枝悴蘖豈一旦雨露之潤所能復也故得一郡一邑而長之以求其民之病者愈危者安自遂於田里而吾無忝於任使者不亦難為矣乎夫非持之以亷存之以仁施之以公如父母之愛子其克有濟哉古之號良守令者亦皆盡力乎此勉㫋子勤而今之守令又有難於古者聲漸氣習之相逺也會府尊官之臨乎上部使過客之交乎前吾之禮有未至而榮辱係之内而子弟臧獲之出入外而胥吏徒𨽻之覘伺吾防範一有或怠而毁譽至矣非致明與慎其克免此哉勉㫋子勤他日有来自庾嶺之南者吾将洗耳以聆端溪之政子勤勉哉遂書此於羣賢珠玉之首送許鳴鶴南歸序吉水泰和接壤如東西家其人居而婚媾相倚出而兄弟相好且其志敦詩書尚行義相契也前二十年余侍講禁林與胡光大鄒仲熙同官又聫第紫垣之南稍暇輙相聚討論相益過失相規時許鳴鶴用推舉從事翰林客光大所皆吉水之良也日共相得又共竊歎何幸衰老復得此於田里之間也後十餘年光大沒又數年仲熈沒獨余與鳴鶴在而皆不能忘田里之思今鳴鶴奉賜勑歸展丘墓鄉閭耆壯聚觀歆豔而顧視昔時儕輩或存或亡其存者亦尚有如胡如鄒之相與為益者乎朋友失其義久矣鳴鶴不然不以存沒有所加損雖其友之後世有不如其意未嘗已於言言而不從猶惓惓懇惻未嘗終絶之也鳴鶴其厚矣哉世固有為人臣朝䝉恩而夕懐不足者於眎鳴鶴其厚薄何如鳴鶴為近侍十餘年貧如家食時而執守甚固未嘗枉已阿附坐是屢忤於人不悔可為直道而行者矣嗚呼士安得皆直道者而與之同事君也哉於其行不能已於余情故書以識别送尹哲序泰和尹哲克智為雲夢縣學教諭九年考績陞府學教授時教授未有闕當需次于京師而哲久病不任旅次言於天官願得復為教諭去天官以聞從之除教諭京山縣學夫學者重得賢師而仕者所重得善地哲經眀文達重義薄利雖貧介然有守而不混於流俗庶幾其賢師乎可以為京山學者賀雲夢京山皆𨽻湖廣相接境其壤地肥沃種植用力寡而獲利倍而川澤之産四方莫加焉其民俗敦樸無澆詭之習其學者茍得師振作之可與有成非仕者之善地乎而兩為教官於此可以為哲賀吾泰和尹氏自絳有科第於宋今數百年矣其後世復振於詩書之業吾目所接者務厚先生以上海教諭致事哲從祖也復道佐教南雄府學自道同知澂江府哲從父也鐸佐教桃源縣學哲弟也皆發身經術又可為尹氏賀然吾於是有感焉髫齓時與哲父傳道先生讀書邑庠有同門之好亦皆有志也而傳道溘先朝露十六年不及悉見其家詩書之盛吾見哲如見傳道也而與哲間濶久矣今在京師數月僅相過一見又竟去人之情其能遂已乎吾甥康榮速文贈哲故既述其所可賀而遂以及吾所感云送解教諭赴廬陵序吉安屬邑九廬陵附郡治之下其山川之清麗人物之秀厚端雅習俗之貴詩書重徳義聞於四方久矣故四方士之逰學者徃徃輕千里而至曰此其今之鄒魯也為政者樂得其地曰其民審於趨向可不勞而治而典教者尤樂得之誠以其化易行其功易成也徃年廬陵之學聘廖敬先先生佐教事已而有他命不果赴繼不鄙聘余而亦有他命不果後與廖先生同在禁林毎共憶廬陵俊彦所會欲復一至相與求斯湏麗澤之益如臨弱水而望蓬瀛焉朝夫家吉水去廬陵一舎有半其為人温厚端潔本於天性文學得於世家之傳既舉進士歴事憲臺都御史上其能時與朝夫名同上者皆任風紀陟清要朝夫獨懇懇乞教學近地以養其母朝廷重孝子之意以為廬陵教諭於是吾徒素願欲而不得者一旦歸於朝夫安得不為之喜哉然今學校所難得者不在於良弟子而在於良師譬諸材木土地所生無處不有焉而匠石不恒有也有良材而不遭匠石徒木而已耳烏能見諸用哉學者所以貴得師也而今之為師如朝夫亦罕遇矣朝夫且行士友為歌詩送之余既喜朝夫得廬陵又喜廬陵學者得師也於是叙諸其簡首送金幼孚序翰林侍講金君幼孜之弟幼孚将還其鄉其友饒伯韶求余贈以言世之得一位一爵者貴重其身意氣揚揚驕蹇倨慢人不可近其子弟憑藉氣勢馳騁縱放旁如無人金君朝夕侍天子左右掌内外制承顧問遭䝉恩遇之厚可謂盛矣而其所自處謙恭遜下退然如虚泊然如無所據無一毫貴重揚揚之意侍講其賢乎哉亦其學問之至道明而徳立有以臻此乎乃今觀幼孚恂恂温温質而不誇敬而有禮敦孝弟之行而幾㣲憑恃馳騁之意無有也於是乎二恵競爽矣然古之人有終其身為之勉勉不已者學也學以造道而立徳也不務乎此人之道有不能備幼孚尚去此而益務學哉譬之水焉流而不已可以達海譬之木焉升而不已可以干雲誠於中力於外學未有不至焉者也且幼孚之先人博學惇徳師于鄉聞于時久矣固幼孚所宜圖善繼而不忘也余與侍講同官侍講之弟猶予弟也故以為告送蒋子䕫詩序子䕫居吾邑西兩舎許家故富貲至子䕫始脫去一切俗好力學為儒者其為人端厚秀敏重行義其學好古務實得為文有理致分教贑縣學九年今復遷漢州徳陽縣學夫學校興舉在得賢教官譬之埴焉非得善陶者不能中乎模範而為教官者皆樂得善地冀易行其教有如子䕫為師躬先率之又得嚴君平姜詩張魏公父子之鄉習俗之良徳陽之學吾知其有成也且紀綱學校者必得賢守令今之令徳陽者吾雖不識而漢州守劉公濳吾友也其學端而徳修盖賢守也則為令於其屬容有不賢者乎守令賢而紀綱有出又得賢教官徳陽之學安得無所成乎子䕫行能賦者作詩送之余為之序送翰林侍講陳徳遵詩序余與徳遵家居里巷相比幼而學也孤苦相類仕而官也職業相聫於論議趨向亦靡不相契余去鄉二十有五年徳遵亦十有餘年水木本源之念皆未嘗斯湏忽忘也幸遇眀天子推恩官其先世又俾得以展省歸顧余之菲薄辱在公卿後不敢先其私而徳遵親捧命書還登先人之丘壠拜頫薦告以昭寵貺而申其孝思退則會其族姻鄉閭以寫夫久别契濶之懐何其榮且樂也於是士大夫相與賦詩贈之而委首簡於余余因之有感夫族姻鄉閭之素厚於吾徒者矣始来而餞之也愛之祝之冀速其達聞其霑一命進一職則居者交慶于家行者樂告于途曰吾邦之華也又聞克慎厥行修厥職則老者興歎少者興慕曰吾邦之華也而聞有弗率于道則閔焉以戚而猶幾其改之以不忝吾邦也嗚呼其忠且厚於吾徒如此吾何以報之哉古之禮君子雖貴且富不可以加於其宗其鄉而吾鄉前輩尤致謹於斯百年之間耳目所及舉其大者一二人元盛時先少傅吟忩先生以翰林待制朝列大夫歸恂恂謙温不改其布衣時而嵗時宴聚閭巷間無貴賤貧富一以序齒而傾寫無間洪武中劉槎翁先生以吏部尚書歸尤謹謹下鄉里於親戚鄰曲雖至貧賤恒相與歡洽雖童丱接之不見有惰容雖蓄一騎未嘗以行城郭中君子於族姻鄉閭其道無不然也前輩逺矣後生寡昧無聞挟其富貴忘其桑梓之恭敬忽父兄之交㳺矜傲淟涊其為薄如此夫安知富貴之不可終恃也哉幸吾鄉之未見斯人也而吾道路所見盖不少矣毎與徳遵道論及此未嘗不共駭異愧汗而何幸徳遵之歸以繼前輩君子之行以答鄉人老長愛厚之意盖君子之行必信于鄉人而後可以信于天下徳遵尚以吾言歸諗諸来者其毋俾胥淪於薄也送桂修撰致事詩序翰林修撰四明桂君宗儒年六十有四以病詔致其事歸夫士之學也固望行於當時被於天下况當朝廷清明賢類彚進之際乃獨退藏焉豈士之素心哉而士之賢也上之人亦豈不欲久任之以冀其效惟其既老聰眀之不逮氣力之益衰則不得已有致事之命固憫老之仁優賢之義也宗儒以文學發身嘗佐治郡其亷簡之政安静之化已孚於民既入詞林為天子侍從之臣温厚端恪恂恂縉紳之間與人交久而益敬雖貧泰然雖病猶勉強事事可謂善人君子矣乃今䝉賜歸之命敦同僚之好者既榮之又惜夫良友之去也相與形諸詠歌夫君子之有益於世也進則澤夫民退則善其鄉宗儒歸而導其里閭鄉䣊使為父兄者皆以徳率其子弟為子弟者皆以徳事其父兄藹然孝弟忠信之風肅然禮義亷耻之節以庶幾孔子是亦為政之云者未必無益於世也而優㳺暇日與故人夀俊小車徃還尊爼譚詠超然自得於物表将不有占徳星之聚於東南海濵之區者哉遂為之序送耕樂翁養䝉羅先生歸廬陵序予嘗聞吉水羅養䝉先生樂善篤行居家以徳義淑其子若孫及其鄉人之俊秀縣令丞之敬禮髙年厚徳者必首於先生然余家距其所居二百里未嘗一獲見也其仲子汝敬登第為翰林庶吉士與予朝夕相接汝敬英敏傑特聽其言恒依於道觀其下筆為文詞義􅂱然卓出同輩於是益知先生之所以教矣汝敬既得禄迎先生就養京師余始得承顔而接辭焉時先生年且九十鬚髪雪白而兩頬豐腴温乎如玉言論雍容敦厚稱古之所謂有徳者洪範所云夀富康寜攸好徳者先生盖兼之矣夫數者之福自其本言之在乎好徳先生所膺若此固其有所本哉世之人其福之不足要其本之不立耳本立而福至此天理自然之應而不足焉者鮮矣近周公明教諭被召来京師周於先生居處最近交好最久又相知最深也間為予言其先世曰皆有厚徳為鄉閭所歸宋之時有至百四嵗者其後至八九十者盖比比矣至今其所居之處人稱為老人里然則羅氏之務本豈一世之積哉不然前後所膺何累累其厚如此乎所謂有徳者必有夀豈天獨私於羅氏一門而已也今先生将歸鄉里教諭命余一言以為贈故序著先生以膺福者盖有其本且俾鄉之人觀之亦庶幾知所自勉焉東里續集巻十一
