body:
  text: 東里别集巻三明楊士竒撰奏對録論初即位事宜伏見自古人君即位之初中外軍民其心未一但在朝廷處置得當則有備無患臣謹將見今合行事宜開具謹題請㫖一今皇上即位之初必須整肅軍政以壯國威宜勅五府及兵部整理軍馬委官提督操練以備非常并勅各處總兵鎮守官撫恤軍民操練軍馬嚴謹守備遇草冦生發相機𠞰滅一南京雖内有太監王貴通等外有襄城伯李隆在彼備禦然係國家根本之地今當特賜勅諭使之謹愼闗防操練軍馬以鎮伏小人之心更須老成忠直之人與之一同計議事務臣切見南京户部尚書黄福老成忠直欲請勅令黄福就彼叅賛軍務仍勅王貴通李隆等凡一應事務俱與黄福計議停當然後施行庶幾根本堅固事無踈失并勅南京内外衙門今後非奉勅㫖不許擅自差人出外擾害軍民一淮安是南北要衝之地見有都指揮王瑜呉亮在彼提督漕運并鎮守合無特頒勅諭令其撫恤軍民操練軍馬嚴加守備一江西湖廣河南山東去年旱災人民缺食慮恐無籍之徒嘯聚為非不可不防合無分委文武大臣各一員前去鎮守或一年或二年諸事平妥即取回京一南京直𨽻縁江上下及北京直𨽻徑抵南京縁河等處屢有强盜出没殺傷人命刼掠財物此等兇徒積久則勢盛不可不早除南京等地方合無勅襄城伯李隆等差委的當廉幹頭目并公正御史緝捕北京等地方合無勅差錦衣衛指揮劉源馬順及公正御史分領的當官校緝捕務要盜賊屏息道路無虞一北京城内外見有强盜搶刼合無勑錦衣衛及五城兵馬司嚴督官校弓兵分廵地方嚴加緝捕但各地方今後人民有被搶刼者責有所歸一陜西甘肅寜夏及大同宣府開平縁邉去處多缺馬操備今衛拉特强盛恐此冦侵邉欲請勅諭邊將及守邊頭目凡缺馬之處許於本處行太僕寺及苑馬寺闗用仍開數奏聞其西畨等處進貢馬匹除上等好馬令進來京其中下等等馬悉留邊上給軍騎操亦具數付進貢之人奏聞以憑給與馬價一衛喇特之寇既减阿嚕台其勢方盛至三四月草青之時或恐犯邊不可不備其陜西見調在京操備官軍合無令兵部同英國公成國公等一同計議發回各衛所操練遇有賊冦以便調用如馬軍無馬者就北京太僕寺領去騎操一雲南極邊之地蠻夷雜處最難馴服比聞總兵官黔國公沐晟年老多疾其弟都督同知沐昻見掌雲南都司事去冬進馬到京至今未去合無量加恩賞賜以勅諭令馳驛回還賛輔黔國公撫綏逺夷鎮靖邊境一陜西臨洮都督僉事趙安係極邊歴練老成頭目本官去年朝貢到京至今未回合無量加恩賞賜以勅諭令馳驛回還綏撫夷人謹守邊方一在京行事校尉多有在外假公營私挾制官府欺騙平人瞞昧朝廷如比先唐賽兒及漢庶人謀反行事官校明知其事不報及官員軍民實有罪犯者皆得以財買免却將有讐平人妄揑其罪報官法司畏懼行事之勢恐禍及已但係行事校尉報來者更不與之分辨只拷打招認以致平人負寃者多今錦衣衛提督行事者非一員行事校尉亦數百人合無止令一員公正指揮提督行事亦量減校尉庶使平人少寃一官員冗濫虚糜俸禄者多其京官及在外方面官合無從吏部都察院考察其府州縣及鹽運司行太僕寺苑馬寺倉庫税課等雜職官合無令按察司廵按御史考察但有廉勤愛民者留老病闒茸貪酷者起送吏部一各王府官多有缺員合無令吏部選有才學文行者除授前去盡心輔導庶俾各王遵守禮法一近䝉恩詔寛恤軍民其在京内外衙門正當上體朝廷欽恤之意凡事務從簡省合無頒勅令内外各衙門將應合裁省事宜具奏取自上裁一教坊司在外取來樂工甚多虛費錢糧無益於事合無量留供應外其餘放還原籍與民一體當差請開經筵伏惟皇上肇登寶位上以繼承列聖下以統御萬邦必明堯舜禹湯文武之道以興唐虞三代之則宗社永安皇圖永固天下䝉福永逺太平然其根本在致力於聖學自古賢聖之君未有不學而能致治者也去年十月内宣宗皇帝御左順門召臣士竒諭之曰明年春暖東宫出文華殿讀書凡内外侍從俱用慎擇賢良廉謹之臣臣士竒叩頭對曰此國家第一事正維其時伏望皇上留心不幸宣宗皇帝上賔中外皆同哀戚之心臣未敢遽言然此事至重不敢久黙伏望山陵畢日早開經筵以進聖學臣等深切惓惓之至謹具合行事宜陳奏伏惟采納謹具奏聞一自古人君成徳必先於學未有不學而能成徳者尚書曰王人求多聞時維建事學于古訓乃有獲經筵侍講之官實為學之資今皇上進學養徳當預擇講官必得問學貫通言行端正老成重厚識達大體者數人以共其職庶以上副先帝之意乞預命吏部禮部翰林院公同推舉具名陳奏取自上裁如或其人學術不正立心行已素無善譽者不得濫預葢師友之臣即他日輔導之臣不可不謹擇一天子就學其事體與皇太子親王不同乞先命禮部翰林院詳定講筵禮儀陳奏一皇上聖徳正在今日輔養本源書曰僕臣正厥后克正僕臣諛厥后自聖后徳惟臣不徳惟臣葢言僕臣賢否係君徳重輕如此自古聖賢之君左右使令必用正人今皇上富於春秋凡起居出入一應隨侍及使用之人皆宜選擇行止端莊立心行已正當者使在左右庶不正之言不正之習悉皆屏逺不得以上惑聰明此事闗係最重伏望太皇太后陛下皇太后殿下皆留聖心為皇上慎選左右隨侍及使用之人如或其人舉動輕佻語言䙝慢立心行已不正者皆宜早去之若不早去隨侍既久情意相洽不覺其非言聽計從後來欲去其勢難矣古語云與善人處如入芝蘭之室與不善人處如入鮑魚之肆葢言愼所漸染也此在常人尚湏謹擇何況天子之左右伏望太皇太后陛下皇太后殿下萬萬留意臣深受國恩無能補報惓惓愚忠不敢不盡伏乞采納宗社生民萬年太平之福論激勸伏聞旌一人之賢以勵衆人之功者古帝王治天下之要道也切見南京户部尚書兼詹事黄福事太祖皇帝至今五十餘年在朝老成惟此人最久清廉公直秉心端正上為國家下為生民中外之人皆知其賢近日已䝉聖㫖令賛襄城伯機務南京係國家根本之地此人必能効誠又見浙江都指揮使許亨清廉公正老成忠厚一心為國恤軍愛民浙江軍民深所愛服伏望聖恩特賜陞賞二人以勵衆人謹題請㫖辨方政被誣䝉欽發下鎮守大同太監郭敬題本二本奏總兵官都督方政專權等事臣㸔得所奏事件未知虚實葢方政自永樂宣徳年間奉命率兵在外皆有功績此人實是廉勤公正上能敬事朝廷下能撫恤軍民衆所共知衆所共推豈有纔到大同未及三月便有許多過失且聞郭敬在彼與曹儉通同為非專務貪利不理邊備以致累次失機宣宗皇帝屢遣勅切責之仍不悛改且郭敬初聞朝廷命方政往大同總兵心已不喜曾親來文淵閣對臣等極毁方政之短極誇曹儉之能臣等已料其到彼必然不合或致設計傾陷方政今已果然臣伏思於今邊務緊急之時將臣可任用者朝廷當保全之欲請勅諭郭敬命其改過自新自今與方政協和辦事又慮方政知郭敬奏其違法等件虚實未明必然心中趦趄若不冩勅去釋方政之疑令其如舊安心辦事則官軍窺覷必不聽其號令有誤邊備為此今擬冩勅稿二道封進謹題請㫖論北京軍官俸糧為北京軍官俸糧事切見各官家下人口皆在北京居住其俸米俱於南京闗支近聞多係各衛差人前去代闗其代闗之人又係浮蕩無籍小人到於南京低價賤賣所賣之物就彼醉酒流蕩狼籍費用及回北京散還各官十分之中僅得一二分亦有軍官自因艱難將合得之俸低價轉賣與人前去闗支以救一時之急計其實俸十不得一以此朝廷官糧多為無籍小人浪費而軍官之家不得實俸艱難甚多伏望特㫖命户部㑹六部都察院等衙門堂上官公同計議從長設法處置庶幾官糧不致虛費而軍官皆得實俸公私兩便謹題請㫖論勾補南北邊軍為兵備事切見今差監察御史清軍有以陜西山西山東河南北直𨽻之人起解南方極邊補伍者有以兩廣四川貴州雲南江西福建湖廣浙江南直𨽻之人起解北方極邊補役者彼此不服水土南方之人死於寒凍北方之人死於瘴癘且其衛所去本鄉或萬里或七八千里路逺艱難盤纒不得接濟在途逃死者多到衛者少長解之人往往被累非但獲罪亦有艱難死於溝壑而不知者深為可憫況今西北二邊急於防守而西北壯勇之人乃發南方甚是未當查得永樂十年二月初五日太宗皇帝聖㫖北京人民有在各處充軍今後事故來勾丁補役不要發去只就河間立一衛或一所都着就那裏當軍原衛軍伍别着人補若在北京衛分當軍的不動宣徳二年三月初一日宣宗皇帝准兵部奏令雲南四川兩廣福建湖廣該勾軍丁除逃軍正身及已解軍丁外其餘留所在附近衛所帶管食糧操備本年十二月十五日又准兵部奏今後一體存留収操縁海地方的也就留在那裏衛所操備宣徳三年四月二十一日又准兵部奏今江西貴州等布政司軍丁該解遼東甘肅等處并山西等布政司軍丁該解雲南兩廣等處動經萬里及七八千里者皆照例留附近衛所帶管收操當軍又奉聖㫖腹裏地方該勾的軍離原衛二千里以裏的還發去二千里以外的都留在附近衛所収操此皆祖宗成憲葢洪武中有犯罪死者恩宥免死不分南北發極邊充軍所以懲治有罪此太祖皇帝之仁也其後有罪者已死補役者皆非犯罪之人朝廷憫其逺道艱難留於附近衛所操備此太宗皇帝宣宗皇帝之仁也陛下即位以來以陜西該解腹裏山東河南大寜都司等處衛所軍丁俱收發陜西靖虜衛又以廣西缺軍命發南方貴州雲南廣東廣西四處該勾遼東等處軍丁悉發廣西都司屬衛收操亦是仰體祖宗之仁近來該部執稱原舊隊伍難以改發此只是畏避文案繁勞而不思兵備之無實不念下人之艱苦近日兵部雖因清軍御史之言奏請清出軍丁暫發附近衛所帶管収操縁南北俱有邊境今俱少軍若只於本處附近収用近邊衛分緩急亦不得濟臣等愚見今所急缺邊軍者欲乞除逃軍外以山東山西河南陜西北直𨽻今後清出軍丁各就所近發甘肅寜夏延安大同宣府永平遼東等處補伍雲南兩廣貴州四川湖廣江西福建浙江南京直𨽻今後清出軍丁各就所近發四川雲南貴州兩廣及邊海衛所補伍皆就定其衛所發去待補足其缺之後再有清出者却於腹裏衛所補伍如此則兵備有實下人不困臣謹陳愚見伏乞特命公侯伯之老成者及都督尚書侍郎都御史㑹議可否謹具奏聞伏候恩㫖論旌褒景東知府陶瓉等為激勸事該兵部傳奉聖㫖陞授景東府知府陶瓉散官太中大夫資治少尹及褒封陶瓉祖母阿曩為太淑人令臣冩勅施行此誠皇上旌忠報功之盛徳臣竊聞自古帝王得馭夷狄之道者曰守在四夷曰以夷狄攻夷狄二者而已葢先以恩徳結近邊之夷則逺外之夷為其所制勢不能為患於邊大抵蠻情頑獷勁悍必其同類制之則易為力今景東之勝葢出於此然其中有忠義之心願奮力報國者正當厚恩待之以堅其良心其陶瓉及祖母阿曩率領頭目已量功陞賞實授以職惟陶瓉以土官知府難陞職事并其祖母止授散官及封號臣等愚見欲乞聖恩皆給賜誥命及賜以對品之帶各一使得永逺寶藏庶感戴尤切而圖報之誠益堅矣其木邦宣慰使罕葢法與祖母美罕板忠義報國之誠亦與陶瓉阿曩同兵部已請勑褒封賞齎奉聖㫖令臣冩勅臣愚見欲乞恩㫖同陶瓉阿曩一體頒給庶於邊夷有所激勸葢所費者約而所勵者益多謹具題奏伏惟聖裁論荒政為預備事伏聞堯湯之世不免水旱之患而不聞堯湯之民至於甚艱難者葢預有備也凡古聖賢之君皆有預備之政我太祖高皇帝惓惓以生民為心凡於預備皆有定制洪武年間每縣於四境設立四倉用官鈔糴榖儲貯其中又有近倉之處僉㸃大户㸔守以備荒年賑貸官籍其數斂散皆有定規又於縣之各鄉相地所宜開濬陂塘及脩築濵江近河損壊隄岸以備水旱耕農甚便皆萬世之利自洪武以後有司雜務日繁前項便民之事率無暇及該部雖有行移亦皆視為文具是以一遇水旱饑荒民無所賴官無所措公私交窘只如去冬今春畿内郡縣艱難可見况聞今南方官倉儲榖十處九空甚者榖既全無倉亦不存皆鄉之土豪大户侵盜私用却妄揑作死絶及逃亡人户借用虚立簿籍欺謾官府其原開陂塘亦多被土豪大户侵占有以為私已池塘養魚者有陻塞為私田耕種者葢今此弊南方為甚雖聞間有完處亦是十中之一其實廢弛者多其濵江近河汙田隄岸嵗久坍塌一遇水漲渰没田禾及閘壩蓄泄水利去處或有損壊皆為農患大抵親民之官得人則百廢舉不得其人則百弊興此固守令之責若養民之務風憲之臣皆所當問年來因循亦不及之此事雖然若緩其實闗係甚切伏望聖仁特命該部行移各布政司按察司及直𨽻府州除近有災傷去處暫且停止俟後來豐熟舉行其見今豐熟去處悉令有司遵依洪武間舊制凡倉榖陂塘隄岸並要如舊整理倉有損壊者即於農閒時月用人脩理榖有虧欠者除赦前外赦後有侵盜者根究明白悉令陪償陪償完足亦免其罪不許妄指無干之人搪塞若其侵盗證佐明白而不服陪償者准土豪及盜用官糧論罪有司仍將舊有及陪償實數開奏其陂塘隄岸亦令郡縣凡有損壊悉於農閒用人脩理有强占陂塘私用者犯在赦前亦免其罪即令退還不還者亦准土豪及盜官物論罪其退還陂塘及圩岸閘壩應脩去處亦令有司開奏應脩築者以次用功完日具實奏聞仍乞令户部行各布政使司府州縣除近被災傷去處外凡今秋成豐稔之處府州縣官於見有官鈔官物照依時價兩平支糴糓粟儲以備荒免致臨急倉惶失措年終將所糴實數奏聞郡縣官考滿給由令開報境内四倉儲榖及任内脩築陂塘隄岸實數吏部仍行該部查理計其治績以定殿最各按察司分廵官及直𨽻廵按御史所歴州縣並要取勘四倉實儲榖數及陂塘隄岸有無損壊脩理實績嵗終奏聞以憑查考如有仍前欺弊怠事者亦具奏罪之若所廵歴之處仍前不問不理或所奏扶同不實從本衙門堂上正官糾劾奏聞庶幾官有實積荒嵗人民不至狼狽耕農無旱潦之虞祖宗恤民良法不為小人所壊臣等愚見如此未敢擅便乞命六部都察院大臣㑹議可否施行謹題請㫖論計議除授方面等官昨日太監金英傳奉聖㫖今後除授方面官及府州正官若專用舉保即是恩出於下還依洪武永樂年間例行欽此本官後又令臣計議臣伏思宣徳七年以前其前項官員多不得人百姓受害欽奉宣宗皇帝勅㫖布政司按察司官及知府知州得其人則民安非其人則民受害該部往往循資陞授不免賢否混淆自今布政司按察司官及知府知州有缺吏部行移在京三品以上官舉保及布政司按察司堂上官連名舉保必取廉公端厚識達大體能為國為民者吏部審其所保果當具名奏聞量授以職後犯贓罪併罰舉者欽此以後凡所保者多得其人皇上臨御以來悉遵先皇帝勅㫖而行令各處方面官與府州正官十有八九得人停當所以百姓得安其間或十有一二舉不得人却是保舉之人審察不明亦或實是徇私為是該部不行糾舉以致四品等官舉保知縣者十有三四舉保不當然所保得當者還多自今舉官之人亦已多知謹畏不敢輕易濫舉恐累及自身臣愚見伏望聖明仍遵宣宗皇帝勅㫖而行大抵宣宗皇帝仁民之心皆是上體太祖皇帝太宗皇帝仁宗皇帝三聖仁民之心而行非是有所更改但因時損益耳昔者堯舜禹湯文武數聖人相承之政皆因時損益所謂因時損益者或太過則當損不足則當益以合於時宜也昔我太宗皇帝於洪武之政仁宗皇帝於永樂之政皆有因時損益之宜亦皆是上體祖宗保民之心而行故當其時無人曾有異議宣宗皇帝臨御之時體祖宗之心以行保民之政者尚多此保官一令是第一事葢用人者帝王之首務也伏望皇上奮獨斷之明今後舉保方面及府州正官宜悉遵宣宗皇帝勅㫖而行昔唐太宗行仁義之政命在京三品以上官舉郡守縣令後來致天下斗米三錢外户不閉之效明鑒在前無可疑也聖㫖所喻保官則恩出於下切縁衆臣舉保之後吏部審擇具名奏請必得聖㫖賜允然後授官如不賜允即不得除授故凡授官者莫不感戴聖恩恩實非出於下也此令行於宣宗皇帝在位之時數年不聞人有異議近年始有一等京官不才輕薄無人保舉者造為謗語傳播中外其意專欲隳壊先帝之良法不行則此等無狀小人皆得升用此等小人升用則百姓受害天下何由治平自古朝中用一正人行一良法則小人皆不便之毁之壊之如孔子初攝魯相國之小人作歌謗之及久而定也國人愛之作歌頌之又惟恐其死也在古聖賢尚然可以觀小人之心矣伏望聖明只依先皇帝勅㫖而行但所舉之人後有犯贓湏明正濫舉之罪并罷其官便是臣濫舉亦請究治不宥庶幾其餘有所警省臣受四朝大恩常切慚愧無能補報惟念用人賢否闗係生民休戚國家治忽今若知而不言是臣不忠之罪大矣是以謹竭愚誠冐凟天聽伏惟聖裁論遣將征𠞰麓川昨日欽䝉上命冩召李隆勑書臣已謹遵冩藁進呈伏竊思之南京根本之地李隆受先朝簡拔守備十六七年本官謹愼小心克稱委託軍民獲安朝廷無南顧之憂今以麓川之事召之然麓川遐荒小夷屢拒朝命固當問罪今以蔣貴之才勇復擇一二人善戰者為之佐輔又以文臣王驥歴練老成賛理之足任其事況李隆之才長於守備未聞其有攻戰之能若論攻戰李隆必不及李安又蔣貴新封為伯李隆嗣承伯爵三十餘年朝班次序蔣貴當在李隆之下若使蔣貴總兵而李隆為副似有未當雖出自上命李隆固不敢違然彼此心不相孚亦難行事臣愚見欲俟蔣貴至日與之計議佐輔必欲得人亦未為遲如此庶幾事得穏當而成功可冀臣又有愚忠冐凟天聽昔太宗皇帝征討有罪必先遣人再三撫諭及其不從然後加兵今麓川拒命臣亦深切惡之非欲釋其罪但思古人有言兵者凶器戰者危事自古聖帝明王皆不輕用者恐害及無辜有傷天地之和氣也又慮用兵逺方雖有將有兵而糧食不足猝難為力亦所當計臣又思自麓川拒命比先朝廷所遣撫諭勅書恐有阻隔未曾到彼又雲南總兵官將彼所差之人悉置於死是以此賊心懐疑懼不敢再遣人來近其所遣忙怕力線觀來已蒙皇上恩賞特㫖許令改過赦宥其罪就命齎勅回還臣竊計此勅到彼賊必遣人再來視其情偽為之處置近者又有勅令沐昻等留之不遣則使此賊終不知皇上天地大恩無由改過將來必勞天兵伏望皇上體天之心今且日務選將操兵積糧以備征用姑先放忙怕力線觀賫勅回彼使知皇上大恩以圖改悔縱使彼執迷不改亦且緩其備敵之心待雲南糧儲有積將士操習精鋭即一鼓進兵𠞰滅以昭天討亦未為遲況留此二三人實不足為輕重但恐留之日久使賊之逆志益堅而為備愈固或啟其竄伏之計況彼烟瘴之地大軍難以久駐而賊得窺伺官軍進退以為出没急難成功臣惓惓愚忠非敢為緩兵之計但願大兵之行必出萬全以為國家久安長治之道冐凟天聽伏惟聖裁論因旱恤刑近數月間畿内雨澤頗少且聞逺外缺雨之處亦廣即今多在祈禱臣等輒有愚見上凟天聽謹陳於後伏惟聖裁一南京根本之地自去嵗二月至今年三月兩次大風為災亦是異事伏乞特㫖命親臣或大臣一員必其人素行廉謹可以感格者往祭孝陵以慰安祖宗神靈及祭鍾山大江之神於祝文中備陳省咎祈福之意庶幾以弭災異仍乞勅豐城侯李賢太監劉寜等謹嚴防備一自皇上臨御以來凡百科徴等項一切停罷並無干擾於民之事凡民間負欠官物亦多宥免然今猶有水旱蝗蝻之災者臣等伏思其故古人遇水旱必清理刑獄恐有寃枉今聖心惓惓惟在施仁但慮中外法司奉行未至葢死罪者每於審問之際多有聲寃及行移照勘本貫官司只依原狀保結回申雖至再三照勘其保結回申仍前無異若所犯罪實理應如此然近日頗聞亦有非實犯者誠恐此類保結不實者尚多伏乞聖㫖令三法司各於屬官中精選有清廉仁厚公正者數員賜勅令分往各布政司親詣有重囚府縣召集里老親隣審問實情具奏處置免致其寃及輕罪有疑者速即發落不許淹禁以傷人命兩京法司亦乞賜勅一體欽遵疏理如此庶幾可以上回天意一去嵗有勅分遣京官往各處整理備荒糧儲今聞北京直𨽻及北方各布政司百姓皆知朝廷恩為恤下相趍赴事儲積有餘其南方隔逺尚未完備伏乞聖㫖或遣勅或命行在户部移文原差整理預備糧儲官員令事完者即便回京未完者令遵依勅㫖俟今年秋收成熟從容為之不許急廹虐民論褒諡為激勸事近據禮部手本該本部奏南京叅賛機務少保户部尚書黄福喪禮傳奉聖㫖行移本院撰述祭文欽此臣等伏惟皇上臨御以來禮待臣下悉出於厚今福蒙祭營葬光榮甚盛存没感戴矣臣等竊思黄福洪武年間自衛幕官因言事太祖皇帝深見嘉奬超陞工部侍郎太宗皇帝初登大位即陞工部尚書後建北京新設行部命為行部尚書及平定交阯初設布政司按察司又命黄福仍尚書之職前往交阯撫綏其民布政按察二司印信並付福掌管一切公務皆總於福福在交阯十有餘年處事甚得人心仁宗皇帝監國備知其賢即位之初特遣人齎勅召還命兼詹事輔導儲君宣宗皇帝在位念南京重地以福老臣命於南京户部管事皇上嗣位之初陞福少保令叅賛機務中外之人皆忻悦朝廷用人之當福感戴聖恩與襄城伯李隆同心協力以副委任葢福為人廉潔正直剛果無私且明識大體身雖老病念念在公官雖貴顯不營私蓄四十年來大臣之中正色居官少見其比今蒙聖恩固已深厚但臣等欲望天恩賜諡二字及贈一官用褒賢良用垂勸勵葢自古治平之朝及祖宗之世皆用此典臣等所目見者太宗皇帝於太子少師姚廣孝大學士胡廣皆賜諡贈官仁宗皇帝登極贈諡尤多尚書侍郎下至少卿少詹事賛善院判之賢且良者皆得蒙恩今黄福比前之得贈諡者歴官尤久効勞尤多操節之正始終一致伏望天恩特命該部依先朝例賜諡贈官庶使在位臣僚觀感興起臣等非敢私於黄福但欲國家典禮施之公當謹陳愚見伏惟聖裁陳情致事為年老患病事臣本材學疎淺識見愚陋自洪武三十五年七月太宗皇帝臨御之初擢任翰林院職事永樂二年三月除兼春坊職事歴事仁宗皇帝宣宗皇帝今上皇帝四朝三十八年皆在近侍蒙恩深厚難以名言常切自愧不能効報分毫故從前並不敢請假乞閒臣今年七十有五舊患風濕病證未除近年以來視聽愈衰氣力愈弱疾病愈增神志昏惰思慮遺忘强勉不進食禄無補有負天恩中心思惟不勝慚悚伏望皇上天地大徳憐臣老疾賜臣致事放回鄉里庶幾少延微喘以終餘年臣不勝惓惓祈恩之至為此謹具奏聞伏候勅㫖陳情推封欽䝉聖恩賜臣誥命下情深切感戴之至伏思洪熈元年欽䝉仁宗皇帝聖恩賜誥命追贈臣三代已贈臣祖公榮為少傅祖母胡氏為夫人切縁臣故父子將原是伯祖公辰伯祖母嚴氏親生次子因叔公榮無子遂立為子公辰初有長子及孫近年絶嗣是臣兼承其祀臣伏見前代人臣多得乞封旁親國朝惟有封贈親生祖父母之制無及旁親之令縁公辰雖於臣稱為伯祖嚴氏稱為伯祖母實是臣父親生父母臣之親祖親祖母非其餘旁親之比臣之私情恒切於中今幸䝉皇上覃布大恩謹冐昧俯陳私懇伏望聖仁不為常例停臣本身及臣妻即今所得誥命不給特恩移與臣伯祖公辰伯祖母嚴氏俾得霑恩封贈光顯無窮臣不勝惓惓祈恩之至謹具奏聞伏候勅㫖欽奉聖㫖楊士竒本身并妻室的誥命還與他他伯祖伯祖母另給與後不為例該部知道欽此為鄉人訴告事為鄉人訴告事臣聞今有同縣人李衮奏臣男楊稷不法等事葢臣男稷資性㝠頑狠愎不才不學委實有之縁初因臣家無得力之人稷是長男自小留在原籍㸔守祖墳因此隔逺失於教訓近年屢聞在鄉聽信奸邪小人設計唆誘非理妄為臣常常寄書訓責又曾移文兵部及都察院皆塡冩内府勘合行下府縣出榜禁約近聞仍聽小人唆誘非為以致李衮遣人抱本申訴上凟天聽愚臣無徳致有不肖之子干犯國法臣罪萬萬其李衮所奏已奉聖㫖都察院知道臣又聞衮所奏内有係事不干已而指告他人事者愚臣切恐累及平人輒忘愧耻冐達下情伏乞特㫖令法司出批錦衣衛差官先提取臣男楊稷及罪犯深重家人高四羅奴仔并積年野牢子朱貴祖陳鼎羊觀遜劉保郭𤣥闗及奏内所告罪犯深重小人胡彦方樂象明曾用利梁翰劉士積劉孟賛劉同倫胡彦琛陳叔憲曾希廣彭裕蕭辛同劉翕胡景蕭鼎康哲蕭邦彭彦素姚俊等前來法司對理明正臣男楊稷等罪其所奏係指告他人之事者中間慮有不實今法司有奏准事例不行亦乞令行移廵按御史及本府掌印公正官員公同通行體勘所奏事情的實回報法司果有罪者從公提問庶幾事得明白亦免累及無罪平人愚臣冐昧干凟天聽伏望聖慈特賜俯從謹題請㫖論國子監碑書題事欽䝉皇上聖恩大徳崇儒重道新建孔子廟及太學制度𢎞壯高出前古伏讀御製碑文義理明正文辭簡重誠足以光華日月昭示萬年惟聞碑額四字云重建太學臣之愚意有所未安葢凡言重建者謂已作之後又作之今廟學前元所建非國朝事此不可論我皇上臨御既悉撤而新作之只當云新建云重建者非是今請改為新建且廟與學二者廟為重故廟成之後然後作學若只書建太學而不云廟於禮未安今請通改作新建廟學四字為宜臣愚見如此謹具題知伏惟聖裁謝賜璽書問病欽蒙皇上大恩憐臣久病特遣内臣賜臣璽書奬譽慰勞深厚周至愚臣拜賜感激慚愧莫措其躬又加賜臣寳鈔酒肉米蔬益重感愧顧臣螻蟻微生才疎學淺素於國家並無寸補恭荷皇上天地父母大徳恩賜之加稠疊駢繁不可勝紀愚臣合家深切感戴之至謹具本謝恩啓陳問安臣未奉召命不敢違例一人獨進而有所愚見亦不敢黙而不言近日未審朝謁及問安之禮如何臣之愚誠伏望殿下加隆此禮愈勤愈敬曾䝉令㫖面諭臣云前日欽奉聖㫖免朝臣退而思之固是天恩寛大之至然儲君於事君父未有久而不朝之禮伏望殿下自已主張而必行之如奉聖㫖免朝既退之後明日又往後日又往誠孝之心積久不已必然感格至於奉侍之際尤望和顔婉詞以仰承天意臣伏惟至尊仁聖如天雖臣下有過常䝉寛貸愛之如初何況父子至親恩愛尤重豈宜於奉事之禮少有未盡也昔文王所以稱聖人者葢自為世子之時日勤於視膳問安之禮為之根本故禮經載之以為萬世之法在禮又曰父母不悦起敬起孝此悦親之要道也伏望殿下萬萬加意臣愚無任䖍懇之至謹啟東里别集巻三
