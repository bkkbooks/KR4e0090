body:
  text: 東里續集巻三十一明楊士竒撰墓表贈武畧將軍直𨽻大河衞千户劉君墓表劉氏其先家潤州宋咸淳中諱與耕者知吉州後以兵從文丞相空坑之戰死焉其子信叔嘗隨父軍中父殁不復出仕家吉水之環洲隠居行義終其身生均和以孝友惇厚稱於族里生用文泊素自持於是劉氏不仕三世矣公用文子也諱忠字存信為人端重有信義而器度豁逹至正癸巳薄游淮泗間又明年知天命在我太祖皇帝遂奮身以從屬大將軍戰番昜征姑蘇平山東入元都皆在行而殺一非罪行一非義未嘗有焉洪武癸丑以功授忠武校尉直𨽻大河衛所鎮撫天下既大定無所事征伐而公未嘗以安佚自便遇勞役事輒請行雖老敬慎不倦年八十卒洪武辛未三月十一日也葬山陽鉢池山之陽無子以弟克寛之子敏襲其職後十年陞大河衛千户贈公武畧將軍大河衛千户公之配周氏封太宜人後八年周亦卒永樂廿二年敏老疾以其子靖襲職而致事歸推念勲爵所自實肇於公具事行謁余表墓余考公之高祖盡忠所事無忝於為臣而曾祖祖父皆脩德養晦以待其後人而始發於公觀公始終於處物之仁行已之義可謂兼盡而不遺矣故併推其所從來者書之使傳焉贈翰林侍講承德郎陳彦和墓表余觀古史記敘述施德行惠長者之事未嘗不嘅焉想見其人而又竊歎夫遇之之難也蓋慷慨激烈急人之急如饑渴於飲食視棄千金如擲寸莛去之而不顧者固不可易得而求夫逹於義利之重輕隨其力所至從容行之而不以為名者蓋亦寡見也其非以為名則或有所激或力於初不能無變於其終者亦惡足取哉如吾里陳彦和甫其君子之有取者歟舉其一二吾所知者里有售居地者意屬彦和甫而欲得地者十數人爭致其直售者固願予彦和甫曰是長者不吾欺也而十數人者交為危言懼售者彦和甫曰奈何以我故而令人相讐虐哉乃計地之直出貲各予爭者而倍其直予售者而受地焉嘗以榖千四百石貸人久不能償彦和甫改書其劵為九百石曰五百石以為贈而九百石徐徐豐歳酬我也及彦和甫病革語諸子曰人非志於負我顧其力不逮耳我死爾併以九百石予之卒皆不取此其心豈以為名與有所激乎至其歿執其志不變非誠於中歟彦和甫自少事父母孝謹雖兵戈艱窘之際無間蚤喪父彦和甫卒時其母尚在哭之慟曰奈何以八十之年而失孝子哭不已歳餘亦卒彦和甫居鄉恂恂和易無迕於物豈非善人者歟其諱某其卒以洪武己巳九月二十三日享年四十陳氏之先居温州平陽元初有仕於吉者留家廬陵再世徙泰和至彦和甫四世矣祖元壽父觀定母劉其配曾氏有孝睦慈惠之行繼胡氏子男三德遜德逵循德逵早卒女二蕭𤣥安高仰其壻也孫男四瓛璩玓玦女五彦和甫之葬于邑城之北也與曾氏合墓方循父䘮時生十歳永樂十三年廷試進士第一授翰林修譔後陞侍講洪熈元年朝廷推恩其父母贈彦和翰林侍講承德郎曾氏胡氏皆安人世稱為善有後觀於彦和甫之應可以信矣余故表諸其墓為勸贈承德郎左春坊左中允張君墓表刑部主事張宗璉改左春坊左中允之明年賜誥命贈父彦忱承德郎左春坊左中允是歳宗璉陞大理寺右寺丞請於朝歸展先墓將行詣余言曰不肖孤之獲以士進叨祿于朝皆先父母之積之遺今幸䝉榮恩及父母先母嘗辱銘葬惠光幽壤矣惟先父之墓辭執事重辱惠之諸孤之願也余竊私念吾鄉先輩君子蓋有不銘一家兩人者矣然吾史官也古之良史有為一家父子兄弟繼繼而書者矣顧其行應書而書之用表善垂勸吾又奚辭按狀張氏系出貝之清河唐末諱融者為吉州刺史家于官其孫渥徙吉水居文昌鄉之西團里詩書科第代有繼者至心禹慷慨負氣節元末所在盜賊充斥心禹奮起舉義兵從討賊戰死其子允昌君之大父父也母吳氏君諱德棐字彦忱自幼不凡七歳讀書强記九歳下筆屬辭屈其同輩間聞先生長者道論古豪傑竒偉事喜色勃勃動眉目家故饒貲羣盜謀刼之時年十二言於父曰盜利吾財吾散財以振貧且潜奪盜謀一舉兩得也父喜曰真吾子也從之事父母孝祖姑老且貧迎歸終養之如母教育孤甥如子處宗姻戚疏無間言族人有闔門病疫素厚者皆引避君躬具湯粥日三四往視雖夜不懈衆尼之曰顧在我當行行之何惑鬼神哉且道傍之木能庇而人不能耶治家訓子嚴而有法與鄉人處怡然至論事是是非非不少借嘗有薦其才者以親老不果出而自號希樵子然負志卓犖居恒自念跼蹐鄉里未嘗得行四方縱觀大川喬岳而接交當時之賢俊又竊痛其大父以布衣死節義而憤當時之高位厚祿背國賣降以茍全者聞道其姓名㦸手詬罵不已每酒酣輒歌諸葛孔明出師表反覆詠嘆已而悵然若自失者喜春秋左氏傳而諸史所記上下二千年理亂興敗之故皆博覽黙識廣筵衆賓談笑賦咏援筆立就嘗曰吾不能俛首效諸公作秋蟲悲也蓋年三十有六而卒將卒顧其妻曰善養吾母又指其子謂曰善訓之吾平生行可無愧造物者有報其或在是言訖而卒洪武乙丑八月二十也娶蕭氏贈安人子男三長宗璉永樂甲申進士翰林庶吉士三遷至大理丞次宗珩宗瓚女二長適錢次適朱孫男六穎頻顒頌頊領曾孫男一睦觀君志行與才使用之宜有不茍然者惜乎年未及仕而棲遲以殁歿時宗璉生九年耳後廿年而駸駸顯揚光大造物者於善人不爽其應如此哉故撮其所可書者以表諸墓趙孝子墓表宛平縣丞毗陵宋懋為余言其鄉趙孝子之行求表其墓懋之言曰孝子諱鉉字文鼎宋宗室簽判良發之七世孫家暨陽數世矣祖彦珪父思誠元季冦盜四起有朱定二者以衆剽掠邑中時郡總帥察彦珪父子才志足有為者檄之捕盜彦珪亦以自任既剉盜鋒而羣盜合勢襲彦珪併其子皆遇害盜意猶未厭將盡殺其家人時文鼎甫六歳母吳負之走姑蘇依姑氏夏節婦盜蹤跡追至蘇又走武林匿姻家方氏居無幾武林胥為盜區文鼎遂與母相失而困苦孑孑無依有識而憐之者内之而走書報夏氏夏氏挈之歸教育十年我國家芟刈羣兇𢎞靖宇内文鼎亦稍長遂還鄉里即先廬故趾辛勤除荒剪翳作居室以庇然念不見母恒晝夜悲苦寢食弗遑寧又明年告其祖禰辭訣其家人往求不得母不生還擔簦裹糧徧厯吳越之境三年不得益苦不自勝一日邂逅商人於㑹稽逆旅言狀徑走鄞縣得焉母子相見如更生遂迎以歸恭致孝養厯十有二年母殁哀毁動人郡人翰林侍讀學士王逹為之贊辭宣德初元郡通判李學上其事監察御史賴巽奉命覈之信詔旌其門復其家文鼎卒於某年月日享年若干娶某氏子男幾某孫幾嗚呼民之於善欲茍有誠焉無弗得者宋朱康叔生數歳違其母母子不相聞者五十年康叔行四方求之弗置飲食罕御酒肉言及輒流涕遂與家人辭訣曰不見母吾不反竟得之同州其事與文鼎相類蓋皆積誠以得之也夫孝百行之首也其致誠如此他行可類見矣康叔事王介甫蘇子容子瞻諸公文與詩道譽之非一則於今表文鼎之墓庸可少哉庸可少哉鄧伯修墓表國家置風憲所以糾慝䋲違肅清政紀而弼成治功任得其人則公道明而為善者舒不善者斂任非其人則私意騁為善者鬱而不善者肆風憲所係豈細故哉皇上嗣大寶之初璽書數下戒飭憲臣而振起之時中執憲者久於其位怠心既萌欲心不復自制由是其屬靡然從風於下矣雖其間挺持卓卓不變者未嘗無人然既不合於其長則亦不能以信其志焉聖明洞鑒乾剛奮斷廢斥不肖簡陞賢良於是太康顧公奉命為都御史周眎所屬蠲其濁揚其清不旬月而耳目紀綱之地煥然一新凡所遣御史出按郡縣皆能振風裁舉職事以不忝任使而蘇湖諸郡所理尤繁劇前之巡按者多尚威治至是御史鄧棨獨用寛平而敬慎㢘公吏畏民懐聲譽日振凡巡按歳滿則代棨將代其吏民豫奏乞留詔從之無幾棨以父䘮歸蓋蘇湖諸郡之人皆有不忍其去之意棨可謂賢矣亦必有所自於其家乎棨介翰林檢討陳嗣初求文表父之墓余前未嘗識棨而嘗聞其賢於顧公矣故不復辭按吏部主事黃振宗所述其父事狀其父諱同字伯脩鄧氏世建昌人以儒醫名家伯脩大父濟違父信可母徐氏伯脩早孤能持身務學事母及兄以孝友稱居鄉有君子長者之行平居儉約澹然無慕乎外獨以教子為要事子既仕歳時書問尤惓惓於善訓嗟夫此棨之所由成也歟伯脩生吳元年丁未二月十二日卒於宣德辛亥十一月廿九日享年六十有五配鄭氏子男三長即棨由進士擢廣東道監察御史次德為伯兄某後次文為仲兄某後女一歸江士熈孫男四瑺珂珮環伯脩克成其子以充國用固足表勵於世而朝廷用人之明且决故棨輩得以彚升蓋幽違之人未必盡知而余又欲勵棨之敬事君父而永終不渝也故因表而具見焉王素行墓表士竒有同門友曰王素行氏清素簡約言必依禮行必循義交必擇善葛巾布衣蔬食水飲以教授自適榮祿不作於心塵雜之迹是非譽毁之聲一不相及合於易之履道坦坦詩之温温恭人而殁也久矣自予仕於朝每公退思鄉里往還蕭散之樂未嘗不及素行又未嘗不悼惜素行之不可復得也王氏在趙宋時繇金陵徙泰和世業儒至彦仁及其子君聘相繼以科第升君聘子叔明留夢炎榜進士仕至通州判素行七世祖也曾祖浩吾邑大儒一時博雅秀俊之士多出其講下祖子敬贑州路教官考仲隆素行諱天祿二歳䘮母陳氏既長事祖母事父及繼母皆盡孝而篤愛異母弟始終一心宗婣鄉黨無間言處朋友惇信義平居手不釋巻喜種鞠軒前常十數本不嗜飲酒每秋芳爛然瀹佳茗清坐相對賦詩寫意悠然物表也蓋年四十有六而卒卒以永樂二年十月十九日葬某鄉某原配胡氏子男五洊克紹父志濓粲洵沆女三孫男九嗟乎余因素行有感焉素行母海桒先生之子先母夫人弟也素行長士竒七年余兩人少皆受學先生時陳氏甥十數人先生及諸舅氏特異視余兩人以為將來庶不忝外家余被召上京師與素行别猶共追念前人期望之意蓋别三年而素行卒今三十年矣余雖獨存豈有絲毫裨益外氏哉洊今走六七千里來北京求文表其父墓余於素行不能已於言而於外氏重愧且戚也袁處士墓表洪武庚戌余初讀書邑學時詔下初建學邑禮致楊自立羅子理鄧崇志三先生為師嚴教法又舉弟子貟二十餘人皆十五以上其人品不齊也踰年三先生相繼出仕學教弛二十人者次第引去下者淪汙逐末接跡以僨其淳良篤厚謹勅者殆半或出或處而袁君克睿獨杜門絶俗養親以自適後七八年克睿之祖延海桒陳先生教其家塾余從受學焉與克睿之弟若子連席余時年十二三矣克睿數從旁相與追論往事而歎二十人者之死徙多也又二十年余被召來京師時獨存克睿一二人又二十年則聞獨克睿巋然無恙也而以德善為邑里所尊搢紳所重每念何時歸故鄉相與重握手論舊慰契闊之懐而無幾其訃至矣為之感悼不已今年其孫和具狀請文表墓余及見袁氏六世且幼學先後與克睿父子同師不得辭袁出唐尚書右丞滋滋少子邯刺吉州因樹後泰和世有詩書纓紱而科目尤盛於宋其六世祖建寧通判士表及兄士安從子清伯岄相繼登第通判五世至以寧克睿祖也父務敏皆謹靜和厚恂恂于鄉未嘗一毫非僻之干其念慮母李氏克睿諱睿事父母至孝元季兵亂奔竄巖谷採拾為養未嘗匱乏仲父務學卒無子奉祖命為之後克睿事繼母及所後母敬愛同於所生執親䘮過戚處兄弟友恭隆至性澹泊重義輕利屢推有餘以濟不足族姻閭巷有競爭質之折服以義晚作貽厥堂延名師以訓子孫閒居讀書誦詩雖老不厭永樂甲辰四月十七日卒享年七十有一葬縣北五里之梘原配孺人康氏邑名家履謙之子諱柔定父故饒貲孺人簡儉質素自歸袁氏承多故之後悉倒奩具佐夫以殖家婦道母道靡不曲盡後克睿卒之明年五月二十日亦卒享年七十有三葬千秋鄉珠林之原子男五仲暹仲魯仲彬仲亷仲倫魯倫皆先卒女二長嫁劉子穎次許嫁蕭湘孫男六和正綂元年進士穆穟穉稔稹女七曾孫男八女五嗚呼世之所稱處士者豈獨尚其㢘退亦重其行之可以範俗也若克睿之脩諸躬施於家於鄉者皆從容乎天理民彞之當然而非流俗之所能及也是宜為表而因及余交友之情云徐孟聲甫墓表翰林編修徐珵將歸葬其父孟聲甫縗絰奉史官張益所述事狀求表于墓徐氏世家蘇之長洲其曽大父孝基大父文禎父子明母朱氏孟聲甫本伯父子復伯母薛氏中子諱震子明無子伯父命為之子洪武中徵富民實京師子明與焉遂以家行父坐累將詣獄孟聲請代詣父止之孟聲跪曰父有急子不能代焉用之竟代詣獄久而遇赦免父殁不食飲者累日而飦粥終䘮歳時享祀盡誠致孝所生父母均一厚族姻婚䘮必助斂葬無後者十餘䘮治其家尊卑内外秩然為人外檏内明言動持重未嘗茍合而和厚恭謙於物無迕人有善喜若已出不善温辭導之使改於交友重信義儉於自奉而豐於賔客其學通大義既居京師日躬治徭賦不遂卒業稍暇於朱子小學書未嘗釋手每語諸子曰此豈獨教幼學汝曹當終身佩服又語之曰吾之先嘗有聞人近世雖不仕然積累善行久矣吾後人殆有興者汝曹宜力學以迓承之孟聲甫少嘗學於鄉先生酈尚德時同學者率俊爽矜奮起名譽孟聲甫獨執澹靜酈曰諸生雖才華然不若徐生惇實有終後十餘年同學者出仕率以不檢敗而孟聲甫以晦自全皆如酈先生言孟聲甫晚號善菴其臨財務義恒急人之急在京師蘇有洪某者被逮至以白金十鎰及他貨幣寄之曰以此託公惟公用給我朝夕幸得生出拜公德也孟聲甫謹庋之給以已貲洪事釋倍其數償之孟聲甫曰患難相䘏分内事卒却不受其友吳叔振卒於蘇而家甚窶遣子瑾以鈔三千緡馳往賻之鄉人尹仲申嘗貸錢數萬緡悉費於婚䘮不能償請緩償期孟聲甫曰人孰無緩急且子非妄費錢者請遂以贈即取劵焚之鄰有人一業屠一業樵皆有老母貧無以養孟聲甫憐之皆予錢使更業以備養歳歉里少年從乞米既予之及夜踰垣為盜家人覺而執之孟聲甫曰此困於饑餓不得已復予錢而遣之戒家人秘勿言他日從外暮歸邂逅羣盗將劫之一人力救之曰此吾里中長者遂獨送至家蓋向之乞米少年也里計户出公賦孟聲甫常先衆出有貧者為貸出其厚德槩類此春秋六十有六而卒其卒以正綂元年十一月二十八日其配丁氏有婦道先八年卒今將合葬焉子男四琪先卒次璘次珵宣德癸丑進士為翰林庶吉士授編脩次瑾女一嫁許琳孫男三嗟夫孟聲甫之脩諸躬施諸人者厚矣雖其平素弗志榮逹而有子克遵奉訓教遂升賢科官近侍而孟聲甫享祿養者數年蓋為善自然之應也善有不可為乎哉故表之以示勸故南野翁陳君墓表蘇之常熟陳符今年四月二十有五日䘮其父從道未葬以其父客北京時於余有故專人奉御醫盛起東所述事狀加書幣走數千里介禮部主事衛靖求余表墓按陳之先居崑山以詩禮聞至子正而家裕生九齡始家常熟娶錢氏從道之大父父母也從道諱繼善南野翁其晩歳别號也自幼岐嶷長而務學孝事父母宗戚鄉黨皆稱之脩德循義日勤弗懈治家謹禮法冠昏䘮祭之儀悉酌古行之家日益裕而樂簡澹為人剛直曠逹明智識篤踐履經史百家皆通究雖老手一巻不蹔釋嚴子孫之教督之於學每誨之治心曰心不正不能以為仁不仁不可以為人子孫有過必正色飭之不為姑息常指家之帑廪語子孫曰世之人務積金榖遺後吾不能效之吾所願汝曹以寛裕積善存心勿徒齪齪效流俗也名其出内之所曰平軒又為文刻石以識令後人世守之厚宗族貧者或買田以贍之或作室以居之於閭里鄰比周窮恤匱咸悉心焉尚賢重士交久而敬不衰儒者吳文度學行俱高聘教家塾禮之甚厚七年如一日文度卒䘮葬之具悉出陳氏春秋必命子若孫展其墓終翁之世二十餘年不廢又刻其所著文章以傳誠於交處率類此邃於醫宣德中被徵至京師留三歳以老得辭縉紳大夫相知者為詩文贈之既歸諸子恭勤孝養營園池雜植花卉竒樹作二亭其中以奉之翁取陶淵明歸去來辭東皋西疇為之名日與賔客宴樂超然物外者數年一日顧其子曰吾將歸矣當與親知别遂命舟徧詣故舊既歸十餘日沐浴衣冠而逝正綂四年也享年七十有三元配范先卒繼沈子男二長即符次續女二張容周鼐其壻也嫁張者亦先卒孫男二復䝉女四其子若孫皆恂恂謙謹趣學不墮翁之教將以明年某月日奉葬于塗菘岡橫瀝之西原嗟乎南野實踐之士孝敬行於家忠厚傳於子恵施於族里義著於朋友積而樂散富而敦禮人有一能之名稱煒煒嗟乎南野羣行斯備既壽且康式蕃厥祉表于厥蔵示法來裔教授郭君墓表刑部貟外郎泰和歐陽湯求余表其外舅郭君彦鉉之墓彦鉉余少壯時莫逆交故不辭郭氏之先見余所敘其家續譜彦鉉諱鼎其祖巨卿父慶宜洪武中湖州府經厯母車氏湖州公五子第二彦鉉也幼從父命為伯父慶宏後自幼警敏喜學有立志兄弟皆不及最為湖州公及伯父登州教授敬守所愛侍湖州公宦途服勞奉養克勤夙夜父卒偕弟西治䘮斂奉柩歸葬咸盡禮友於兄弟季弟龍為鍾仲敏贅壻鍾有怨家縶仲敏及龍誣飾其罪詣京師訴彦鉉不忍弟之陷於非辜馳往視之怨家并縶彦鉉行仲敏龍道中為怨家搒擊不勝楚毒既至臬司語不能出口彦鉉代說本末事竟白誣訴者誅死龍歸道病卒彦鉉不勝慟蓋孝友本諸其性云治書經洪武末縣令丞舉充學訓導彦鉉疏通有智識雍容詳雅善說辭上官皆賢之所言悉見聽用九載訓導績最陞安吉縣學教諭安吉士習下泰和逺甚一力作興九載績又最陞教授順德府學其士習土俗尤下又一力作興之厯五六年日見成效矣㑹有詔仕而老疾者聴致仕彦鉉年已六十有九遂决意去洪熈元年也歸得疾又十年卒宣德甲寅六月六日也享年七十有九彦鉉所至士君子敬服之嘗考廣東鄉試藩憲重其老成人皆曰斯文之表也葬縣北郭坪下之原彦鉉卒時惟三女在侍長者嫁湯次嫁蕭孟節又次嫁劉三省初其出妻李負乳兒歸依外家又數年彦鉉娶尹氏上海教諭子厚先生之女有賢德聞其出妻有子也告於先生求之歸先生躬詣求數數不得自是彦鉉亦宦於逺外李死乳兒長育外氏者名斗𤣥年益長矣彦鉉後有三子名合懽同庚皆已入小學而卒及歸老方重無後之戚其友彭彦晦求得斗𤣥以歸之彦鉉尹孺人皆幸喜郭之一家内外老長嘗見李去時事又見斗𤣥長成而狀貎甚肖父也皆為之感嘆忻恱鄉閭朋友喜彦鉉子歸皆載酒入賀曰郭氏福未艾也彦鉉素有薄田園其子姪私懐覬覦已久一旦聞其出妻之子歸皆錯愕失意即共詬詈合力排出之時彦鉉已病雖其心明而言不能出聲莫或禦之尹孺人兄子鐸幼承彦鉉教育念有報之即言諸其弟姪曰我有田畀斗𤣥其父園田聴若等取無所預也其弟姪不肯容斗𤣥乃復依外家彦鉉中懐抑鬱竟不起弟虎以其子企為之後數年湯夫婦復求得斗𤣥歸捐已田廬畀之而處于其鄉嗚呼彦鉉田園蓋不及百畝然利之移人不必其豐而遽致同氣為冦讐可為世道之深嘅矣若尹先生及鐸及湯之忠厚世豈能得什一於千百也吾故并表章之以示勸戒徵士朱君墓表朱氏吉水儒家其先在宋曰肇先六子皆有文學其季曰斯馨元祐中累舉進士官至刑部侍郎屬四方多事始居吉之白水子惟幾徙暮膳里其後又徙住岐里族姓益蕃至徴士十世矣曾大父雲卿大父景春父存芳皆隠處不仕母李徵士諱淵字子深坤源其别字也生五六歳能成誦古人詩琅琅不輟口侍賔客立凝然終日不懈稍長益喜學從鄉名儒歐陽師尹先生駸駸有造詣聲譽以起洪武中詔郡邑舉賢一時朱氏膺舉者三人從叔憲章以賢良君以明經弟子良以懐才俱至㑹府憲章及君皆以親老懇辭子良自華亭令後陞刑部貟外郎君退日以養親為務授徒里中而親之甘㫖恒充及祭祀賔客之外一無所營友兄弟睦族姻善鄉曲有犯不校有急能周永樂初被徵至以老辭自是優㳺丘壑以教子為務諭其子曰吾不足效世用汝曹勉之嗜好澹素襟度灑落閒暇朋輩相聚商確古今聯詩酌酒超然物表也永樂十六年六月二十日卒享年七十有二葬里堵水陂之原元配周有淑德繼配皆先卒繼龎子男四伯載璇仲載明亦皆先卒叔載經季載衡女四周彞綱陳元康陳祉陳竒齡其壻也孫男八女六載經舉鄉貢授教官今陞貴池縣學教諭詣余泣拜請曰先君子將易簀時顧諸孤曰我死必得西昌楊公表墓無所遺憾不肖孤銘諸心不敢忽忘然久而未遂伸其私不孝之罪深矣願先生哀而畀之以成先君子之志嗟乎徵士君子屬我矣且閲進士江奎所狀君之行應表遂為之表邵仲仁墓表仲仁諱仁姓邵氏世為姑蘇士族曾祖宏祖明之父珤皆隠居有行母顧氏仲仁生有令質器宇凝重稍長卓卓自立嗜文學事親奉養葬祭克致其孝於兄弟相敬愛於朋友重信義教子有道睦親姻厚鄉里有恩鄉之人率重之號長者仲仁未嘗自足而益勵不懈嘗名其居曰樂善鄉人遂以樂善稱之未壯坐累徙滇南雖艱難旅瑣中凡所以行義不减在鄉時故滇南之人皆重之如其鄉人焉鄒孟氏所云有恒心者仲仁其人歟年三十有九卒永樂戊子三月十九日也葬昆明金馬山之南其仲子璇夙志清净從長春真人劉淵然學老子法淵然為易名以正天子書問淵然弟子孰賢舉以正對遂召至京入見命為道錄司右至靈陞右演法住持靈濟宫以正夙夜思惟父母之德善恐遂泯沒無聞介秀才王益夫以吾友翰林編修楊君所述事狀求表其父之墓予受而閲之曰嗟乎其可表也仲仁之為行皆人道之當然亦皆人所可至而世之人能知能行如仲仁鮮矣世之為老釋之徒者率自謂得出世法而回顧其所生漠若塗人者有矣有能惓惓圖永其所生於不泯如以正之孝加鮮矣故特為之表朱氏先塋之表蘇之崇明朱氏諱新字通甫讀書好禮有孝弟之行不别治生業惟勤稼穡蚤作暮息躬督其家人歳穫共公賦外必有餘而施義於其鄉貧乏患難咸賴以濟其施益厚而心恒若不及蓋鄉之善者皆譽其行不善者亦化而改焉治道路惠行者作津梁惠渉者亦皆盡心鄉閭有長者之號某年卒春秋七十有六配葛氏繼唐氏二子長旭字孟熈次暠字某孟熈孝友之行如其父為人恭讓亷靜里俗為變急人之急平居鮮出里門嘗歳饑邑廪不足賑即躬率耆老踰海詣巡撫侍郎周公郡守况侯言狀得米二千餘石歸賑民藉以活弟暠蚤卒遺孤禮樂尚幼撫育如子擇良師友以成其學孟熈某年卒春秋七十有三配張氏一子思政先卒三孫敏安奉皆幼暠居家之行如父兄兄以賦出驛役馬視供具不備逮兄搒笞之暠泣涕如雨即解衣請代笞觀者義之為人喜隠惡揚善年三十有一卒配陸氏二子禮樂禮自太學生以能書簡入翰林職繕冩擢户科給事中改中書舎人今為尚寳司丞洪熈中制贈其父徵士郎中書舎人母孺人朱氏自通甫及配葬崇明之新城南原其二子及婦皆以次祔禮今以省丘墓歸求予表其先塋禮從余在翰林數年質直和易臨事不茍屢改官皆在近侍執守如一蓋余雅重之蓋嘗觀之世之都爵位者及其身既沒其子孫或流而猥瑣汙下甚者庸衆人莫之與齒山林幽逸之士子若孫有起而光顯聞逹為世所重者何哉豈其都爵位者素無以及人又或不能自善其身固不足以裕後幽逸之士能處善循理又隨力所至而人利賴之此其所為有後蓋非偶然之故也若崇明朱氏之先以是已故為之表東里續集巻三十一
