body:
  text: 東里詩集巻三明楊士竒撰五言絶句古意答伯陽河洲雙鴛鴦流蕩還相逐皎皎白楊花風吹不相續呉敎授席上同伯陽汲井詠皎潔如明鏡銅缾下愈深粧成不照影應恐墜金簮夜發清江口日落煙水寒解纜清江渚中夜北風來相送潭州去長沙三詠定王臺臺髙登望迥臺平馳射寛平髙各有志民力空獨難賈誼井􅣖􅣖俯碧甃濛濛翳紫苔猶傳賈太傅知歴漢朝來馬王宫今為佛寺君王全盛日宫殿此沈沈歌舞無人見唯餘鍾梵音送龍參歸南昌淥水明堪染桃花吐未齊君歸渡南浦春草正萋萋畫蘭湘靈結芳馨含思望遥浦夫君殊未來蘭珮徒容與姚山給事求山居六詠山齋春至還徃稀日照山窗静時有石泉鳴泠泠入孤聽玩古軒常好古人言玩索此軒中誰言千載上不與此心同竹磵修竹䕃南磵翛翛浄於洗獨徃坐清隂彈琴對流水清隂谷陽和二三月緑栁垂滿地春風吹蹔開望見南山際白石坡松間白石坡復帶莓苔碧常有素心人獨行看鳥跡埜亭秋日埜亭上四望盡青山飛鳥去無極白雲相對閒邳州城下夜雨薄暮風色寒移舟宿前渚欹枕不成眠孤篷夜來雨過谷亭明月轉檣竿露下孤篷濕欲繫谷亭舟沙頭風正急早發長溝秋水被隄岸牽舟不可涉𣺌渺見平湖北風吹荷葉夾溝遇邑人問家信聞道故鄉來辭家今逺近恐有南京書停舟試相問畫魚水清菱葉稀洞見溪流下出入多慎重恐有垂綸者臨川謝氏雙節堂二首獨抱孤兒在空帷泣夜深誰家姑與婦相繼柏舟吟謝氏懸雙璧團團似月圓光輝百年後長為照臨川題五清小畫五首昔年林下住掃石坐成羣已愧顔光䘵幽情詠五君山林含古翠蕭爽水亭虚豈乏幽棲者臨清此玩魚何人不擾擾一棹獨蕭閒天霽疎林外乘流坐看山不學袁安卧悠然敞素軒山林明一色清意滿乾坤南枝與北枝葳㽔動寥廓自有嵗寒心不隨横吹落題蘭澧浦月浮津曽逢解佩人至今香露夕思殺楚鄉春騎馬向長安冠塵每日彈不知幽谷裏誰坐􅒆芳蘭度石門嶺石徑浮雲上攀緣險莫當一心祗扈蹕不敢戒垂堂蕭氏石岡十景詩為省身賦石岡橋君家石岡側門對石橋幽橋下澄源水還歸蕭峽流石壁危石翠如削影浸澄湖波六月不知暑香風生芰荷青泥灘近接金魚埧來徃弄輕橈水清下見底白石如瓊瑤梁家潭江流滙為潭其下深無極時有雲霧興疑是蛟龍宅長泒洲逶迤長泒洲近帶珠林浦八月秋風清瀰漫熟禾黍篛湖砦嶕嶢紫霞表周迴石如櫛曽逢百嵗人閒説兵戈日拜雨亭寸雲起東谷行空散為霖殷勤望拜者寧識雲無心王仙祠騎鶴去已逺庭餘昔年樹擾擾祈靈人鼓鐘動朝暮吉祥菴石岡清絶處蘭若傍巖開年逺僧稀少經廊生緑苔題四皓子期子猷太白四圖萬疊青山外林居頫澗濱翛然四老者知是茹芝人瀟灑林下居清泠膝上琴髙山與流水千載一知音凍合千山雪荒村愁未眠誰知乘興者夜棹剡溪船靈岳乾坤秀飛泉河漢垂超然山水興身在白雲涯畫牛四首萬物各有適逍遥大化中當知畫史意重有育民功策馬二十年常懷顛蹶憂蚩蚩弄雛者真乘百斛舟散誕春耕餘牧兒亦有樂常以蓑笠隨為防風雨作牧人歸不早溪頭風雨急還顧母子情相追未相及居庸闗彈琴峽峽石記彈琴泠泠流水音不知行路者誰有聽琴心沙城臨水一荒城風沙常眯目城裏半流人荆扉掩茅屋攬轡款段獨行遲攬轡亦自適天清無片雲遙遙見山色曉晴周廬夜半雨蕭蕭不成響曉起看晴明雪滿青山上贈笻竹愛爾生正直仗爾扶衰老道路有險夷出入常相保代笻答正直余何有道義卿所持但自保堅固無論險與夷龍虎臺髙臺久已傾蒿蓬紛簇簇猶存龍虎名常散牛羊牧通州二首城倚紅雲下門臨緑水濱寳鞍馳駿馬多是帝京人清淺潞河流常維萬里舟越羅將蜀錦充滿潞濱樓題畫二首仙桃千嵗紅青爵相因依知是瑤池使東來幾日歸花開簷蔔林雙禽弄香雪動植乘化機當此艷陽月畫鶉二首秋至禾黍熟霜含枸杞紅鶉衣自有適瀟洒立西風疎菊吐幽華清鶉澹無與獨立亦翛然襳襹艷文羽六言絶句題鄂渚贈别圖送人歸廬陵二首鸚鵡江中紅樹鳳凰城裏青山借問來游幾日秋水蘭舟獨還客遊黄鶴磯畔家住金魚浦前心似波間明月隨君先過螺川題畫鳥啼花落春暮雲白山青雨餘溪南有客訪隠林下何人著書晚發安山驛和答金公素二首津頭賣瓜未過村中釀黍纔沽薄暮安山道上蕭蕭白葦黄榆荒渚菰蒲帶雨隔河籬落飛煙淮南𣺌𣺌何處悵望秋鴻去邊題山水小畫贈康甥歸西昌鳬渚斜通鶴逕水亭静對林扉羣峯雲際相待一棹江南未歸蕁蔴林早發四更零露衣濕十里飄風帽斜足底河流石澁馬頭月色雲遮七言絶句三十六灣湘隂縣南江水斜春來兩岸無人家深林日午鳥啼歇開遍滿山紅白花江上早行漢陽樓上鼓初稀煙栁曨曨一鵲飛乘月不知行處逺滿江風露濕人衣次韻王山人二月十六日對雪初和栁絮飄侵檻復共梨花舞傍人一種妍華看不定只憑髙調和陽春次韻題向誠所藏蘇明逺寫菊金門五朝一下直静樂軒中坐日長為看秋花有真意只題詩句不焚香次韻蔣立恭清明上塚去年載酒東郊路水畔花前醉詠詩今日壠頭空灑飯傷心思憶去年時枯木竹石為王山人題蒼柟翠柏含煙霧總以掄才入廟廊自在空山名散木珊瑚石畔老冰霜獨持貞撡立雲根春雨秋風閱歴頻不覺流年成老大眼中渾見鳳毛新寄蕭德通兄弟金殿瑤階紫禁闈戴星趨拜戴星歸一官侍從渾無補慚愧當年舊布衣桃花源上昔投閒長憶君家玉樹間酒散涼亭紅日晚石臺臨水看青山題李伯髙畫芙蓉峯下滄洲畔碧水迴環漾白沙聞説草堂鄰杏塢年年花發照春霞題金侍講雲山障子浮雲滿山如玉潔山光下暎幽人居柴門落葉可俯拾林下日長應著書玉峽山人玉峽山人雪滿顛初承徵詔逺朝天賜歸還向峽中去春雨漚波好放船寄思貽兄四首思貽先生守道園池邊竹下敞幽軒焚香坐隠烏皮几隔水蒼山正對門溪上流虹暎壁經溪頭春樹拂簷青小車閒日何人到㑹有光華動德星未報君恩未乞身每看南雁重傷神清溪亦是朝宗水遙想臨流憶逺人螺湖盤古白雲堆憶著常因夢裏回得似籃輿引諸弟年年霜露及時來寄蔣用文院判二首冬風淅瀝隔窗紗丹室紅光藹曙霞想見病餘清似鶴閒研玉雪詠梅花旦氣清明體力輕未堪鳴珮拜彤庭緝熙齋裏熏金鴨應著醫經幾巻成簡胡學士索木芙蓉栽牡丹芍藥皆姱麗總怯風霜不耐秋只好芙蓉伴修竹清華晚暎北窗幽聞種拒霜遮水檻春前分乞數枝栽總知宋玉才情絶㑹約花時作賦來輓顔子明三首五彩春霞繡綺袍文章無復看揮毫相思惟有南山色彷彿當年意氣髙貴里侯家甲第開經過長是勒車回守𤣥宅裏尋常到此去何因更一來南浦江山一旦空行吟誰復繼髙蹤薇垣柏府多知己猶為傳經惜馬融九日懷黄學士二首年年賜宴捧萸觴同沐皇恩近御床今日江南望江北不知何處醉重陽去時相約看黄花花滿園林未到家惆悵别來無一字西風極目雁行斜送梁本之納溪敎諭二首西過瀘洲是納溪錦江還在納溪西此去家鄉五十里青山朝暮對猿啼煙柟霧柏富竒材梁柱還須匠石裁刀布不勞齎計吏聖朝今選學官來早至儀真白沙岸頭秋氣清儀真郭裏早潮生五雲北望金臺路初是朝天第一程早至淮安百丈牽船夜未休滿衣涼露不勝秋前林欲近聞雞唱城郭曨曨見楚州發淮安岸蓼疎紅水荇青茨菰花白小如萍雙鬟短袖慚人見背立船頭自采菱夜過徐州怒濤翻河亂石横牽船上洪初月明夜中不辨黃樓處惟聽層城鐘皷聲望濟寧疎翠輕紅水岸迂漁家逺近暎菰蒲髙城前望晴雲下却記行程是半途花園望北京黄金宮闕望都門預喜明朝謁聖君萬嵗山髙騰王氣五雲天上煥龍文奉天門早見後午被召至右順門晚退口號紫禁西連萬嵗山宣呼重入覲龍顔拜承聖語丁寧訓滿袖天香出九闗早過良鄉馬上風沙拂面飛凝霜如雪墮征衣平明行盡良鄉郭茅屋人家未啟扉莫州同王邦彦張伯原飲道傍民家雄縣城南水没路莫州市裏酒如油客行相聚且一醉不見越人空古丘近城有扁鵲墓阻風雪德州有懷王邦彦司直蕭條風雪夜深寒短棹臨津欲發難却憶故人單騎去誰家茅店解征鞍重過安山驛懷金公素共買蘭舟北去時尚書相送此分違傷心未抵今朝重萬里承恩只獨歸送張令赴麻陽亂山蠻樹向人低遙綰銅章赴五溪為想春風與嘉政新年俱到夜郎西題陸伴讀伯陽草書後前廿年陸為余草書謝宣城詩陸不作已十年偶發篋睹其故蹟愴然興懷蘭繞春庭露氣清徃年同詠謝宣城龍蛇滿紙看遺墨忽亂山陽笛裏情友蘭陸齋名題梅送胡方大歸廬陵葭菼蕭條半著霜故人迢遞泝歸航東風無限江南意因爾牽情萬里長胡學士在北京聞予病寄詩慰問次韻奉酬玉堂新署緑隂涼日想承宣近御床班馬雄詞真特達唐虞化日正舒長平明閶闔九天開玉佩趨朝百辟來聖主正需調鼎用諸公應薦和羮梅盛世才華翰苑多龍光星彩貫天河自憐同在承恩地不奈頻年逺别何頭白目昏過五十不禁四體病交攻君恩未有涓埃報却怪書來感歎同繡錦傳來五色絲翔鸞翥鳳粲離離知公頭白丹心在况是文章老不衰朝囘清坐廣文氊病起閒逃蘇晉禪了徹六塵成夢覺邇來三月已無眠盡戀長生養性靈力求大藥扣𤣥扄莊生自有逍遙論不道千齡勝百齡紅心驛馬頭近見紅心驛茅屋參差半酒家瀟洒赤欄橋外栁西風吹折數枝斜夜宿臨淮營夢种子二首膓斷經年隔死生因何隨夢到行營營前淮水深千丈得及人間父子情繞膝踉蹌捧一編分明夢裏見娟娟臨淮營内中宵月應照來生未了緣早過宿州月轉西林曉霧收霜華如雪擁貂裘馬前清景山無數帶得餘酣過宿州陪謁徐王廟閔子鄉中詢父老徐王廟下駐旂旄廟前山勢如鸞鳳萬古塗山相對髙范増墓元有望氣者盜發其墓取劒千年寳劒無光氣衰草寒煙野水鄰同是遺骸葬徐土當時陵母識天人題趙仲穆畫馬二首紫霧團身白玉蹄權竒倜儻渥洼姿王孫慣見升平事貌得當年入貢時十二天閑總駿才追風躡景是龍媒曽隨六御臨關塞親過流沙萬里來子啟學士見過僕適他出不遇奉簡二首西城過雨浄無泥楊栁風輕散馬蹄虚有琴徽待髙㑹却慚書札負前題東鄰西舎總風流何處垂楊繫紫騮想見斜陽擁歸斾不同雪夜剡溪舟子啟見和再用韻奉簡時曽新市馬雨晴沙浄不沾泥新試嬌驄白玉蹄款款金城坊裏去過門鳳字不敎題城上西山翠欲流愛山不驟紫驊騮還如揚子江頭看萬疊芙蓉近綵舟習禮見和用韻奉酬并簡宗璉四首玉署詞華照紫泥逢人不慱鑄金蹄緑楊庭館閒風月朝退從容每自題緑隂池沼擅風流長繫青騾當紫騮自愛官曹清似水不妨書舎小於舟不解髙陽醉似泥一壺時共薦豚蹄半酣藻思如泉湧錦軸華牋取次題雅操俱當第一流逸材千里見驊騮閒來同坐北窗下如在清風李郭舟胡祭酒食葵而病戱用奉簡兼謝惠蔬二首雨後畦蔬嘉可觀忽聞憔悴卧幽軒非是安心無妙法誰敎放手刈葵根胡近作詩自謂有安心法萬慮澄清不入懷飯蔬飲水小茅齋却慚口腹猶貽累頻致園官菜把來簡胡祭酒三首重陽醉後又三日想見黄花綻始多門巷深沈無俗客髙齋清坐養天和滿城冠珮趨朝謁得似頤菴獨自閒心與天光共明浄朝朝爽氣對西山朝來邂逅西江客報道今年盛有秋但得萬方同嵗稔吾生貧病不須愁唐人醉歸圖為金學士題翩翩六駿出騰驤醉裏衣冠見盛唐彷彿開元無事日不知誰是賀知章正月廿九日戱簡仲熙庶子三絶句時鄒徙舎城東蕭散雙吹碧玉簫與君同郡復同袍金城坊裏清如水却愛東飛學伯勞新嵗新齋好著書文明門裏㑹文儒隔鄰春酒蒲萄熟誰綰青絲送玉壺正月已終將二月城中咫尺見還難金門朝籍皆先送獨遣同寮待長官題小畫寄史志静二首春含竹樹翠淋漓玉立蒼蒼太古姿乆别儀曹文翰侣江南薊北贈相思為有髙情共嵗寒别來相憶訪平安憑將一片南州意寄與清曹粉署看金幼孚輓詩三首獨攜書史傍林泉榮利由來意澹然時遶金川看玉笥未曽輕到縣門前雪崖風節凜飛霜蕙帶蘭褘道味長剩貯詩書遺諸子鄉人共詫白眉郎昔嵗京華住接鄰論文來徃日頻頻十年不見成終古洒淚東風為故人題畫寄思貽兄多情不忍看離羣况復雙清共拂雲薊北江南六千里白頭兄弟兩鄉分非所秋夕寄示康甥二首一㸃寒燈照黯然哀蛩四壁夜無眠傍人解識詞垣老為歎重來未十年五十無聞將六十不才孤負寵恩深惟應一片清秋月解照平生報主心非所寄習禮二首舎外周遭無隙地積芻曽畏短簷間紫茄緑瓠霜前摘擬借西園五尺閒采采黄花定滿枝東鄰西舎共襟期銀瓶注酒清於玉醉裏題詩看少誰題畫竹樹紛紛翠欲迷山雲半歛水禽啼何人自有清幽趣不放扁舟過剡溪南昌羅氏仰髙樓紅塵市裏浩漫漫車馬東西引避難獨起髙樓出塵外青山天際巻簾看隔浦飛來萬仭青仰髙樓外玉為屏南昌千古西山並别有東湖孺子亭宣德丙午謁二陵二首去年侍從謁長陵此日重來慟倍増春栁春花渾似昔獻陵陵樹復層層君恩追憶不勝哀老淚乾枯病骨摧陵下一來膓一斷餘生知復幾迴來題溧陽兩王先生歸榮圖三首壯嵗青雲鴈序分白頭歸里更情親一門夀俊聨雙璧海内于今見幾人晝錦相輝入故園連枝競爽並髙年從前心事清如水晩得幽閒不愧天康樂才名我素交惠連文苑舊同袍眼看逸翮聨翩去不盡中情悵望勞過將臺二首風雲長䕶崇臺下昔日文皇此誓師至竟蒼天輔真主英雄捲地從龍旂指揮虎旅誓皇天舊將猶能説徃年龍去鼎湖雲𣺌𣺌遺臣過此重潸然有懷子啟行儉時彦時勉諸君子霜滿貂裘月滿天四更騎馬白河邊玉堂學士無公務正擁青綾足晏眠扈從巡邊至宣府徃還雜詩十首北斗初髙月未斜五更清露浄塵沙道邊叢繞爐香立多是耆人候翠華居庸闗中四十里迴岡複嶺度縈紆道傍石刻無人識盡是前朝䝉去聲古書闗栁行行葉乍稀西風猶未振霜威聖情預憫隨營士勑下尚書盡賜衣聖恩不已恤殘軀老拙深慚報効無屢酌金壺賜甘醴還令中使䕶輕輿邊屯今嵗盛豐登倉庾家家積粟盈何幸王師此遊豫大車藁秸進行營紅葉離離浄可書緑渠流水見游魚老臣虚拜貂裘賜一路陽和䕶屬車邊閫當時任老臣邊頭千里浄無塵御營上謁多恩賚天語還聞奬諭頻山望雞鳴勢入雲下循仄徑棘紛紛不辭涉險觀遺碣重是歐陽太史文圭齋闗外初冬似早春僧房猶見菊花新時平扈從巡邊塞宣府囘鑾只二旬宣府秦上谷郡懷來城外夜微雪風送輕寒初著身明旦馬前紅一色囘軍共試賜衣新侍從海子飛放應制五首碧山翠海帝王州鳳蓋霓旌䕶冕旒何幸升平無事日衣冠祗從六龍遊帝德含𢎞在至仁乾坤萬物總皆春天池浩浩嬉魚鳥御苑蹌蹌集鳳麟靈沼融融冬不冰如雲鳬鴈與鵾鵬吾皇盛德惟蕃育不重鷹鵰搏擊能罝網臨郊一面張凌雲排霧任飛翔古今田獵三驅樂惟有殷湯與聖皇玉座金輿俯綠漪水光林影漾龍旂豈如漢武横汾樂正似周文在沼時題金文鼎清風樓巻五首白日紅塵深復深九衢車馬驟駸駸小樓獨坐清風裏如在湘川渭水潯世上浮榮了不知閒調綠綺理朱絲樓頭只許徽之造樓外從人歌竹枝清風颯颯清雲深六月樓中暑不侵朝陽光輝下鳳彩暮雨髣髴聞龍吟百年誰繼趙松雪近數毗陵王紱髙忽復乘雲去無跡登樓懷憶使心勞先生已别金陵去歸住呉淞近海濱淇澳瀟湘隨處有清風明月共何人題墨菊寄宗璉二首曽伴金城坊裏住鄰園日日看花來髙秋九月毗陵郡瀟洒何人共酒杯思誠齋裏清如水坐對幽花晩自香共有故園螺渚上幾時歸去賞秋芳以絹問張子俊求畫夢憶衡廬紫翠重結巢須倚玉芙蓉天恩未便敎投紱一幅鵞溪更惱公索子俊中書畫松千嵗徂徠古翠蟠拂雲含霧瀉風湍畢宏韋偃君今是煩寫髙堂五月寒入薊州界雲浄天清紫翠浮好山消盡越鄉愁行人如有江南興馬上題詩入薊州薊州道中見菊花有懷子啟時彦行儉時勉諸君子二首秋光漸近重陽節緩轡垂鞭踏軟沙却憶玉堂閒白畫誰家庭館看黄花想見聨鑣西出城酒壺詩巻共髙情看山騎馬漁陽郭也似平坡寺裏行灤河道中同楊太常宣夏二員外小酌栁下觀魚二首四人坐酌垂楊下共愛清隂覆綠渠未盡一壺還上馬却將閒散羨游魚雲白山青䕶四圍水邊楊栁翠如幃人間無處無幽境何補明時獨未歸題梅贈以穰攜手河梁欲别難故鄉南去路漫漫一枝林下清如玉但保風霜到嵗寒遇山居老有感二首細栁鮮桃㶑灧春白雲流水浄無塵看渠鶴髮林居者只傍青山老此身著處溪山可置身古人求志不求聞從前未有匡時術只合攜家傍白雲夢亡妻二首孟光憔悴病來容昨夜蒼茫夢裏逢還似徃年臨别日匆匆勞苦為紉縫經時未遂葬山丘賢行終身慟不休勤儉成家長兒女一生辛苦為黔婁送彛訓兼問訊子勤三首鑾坡鳳沼接清班憶昔同朝侍聖顔此日相逢又相送傷心囘首見橋山之官𣺌𣺌江南去便道還家著錦衣萬里誰無桑梓意同鄉惆悵未同歸故人為郡端溪上前月書來歎索居同是貞元舊供奉因君更問近何如題菊送别送行漸及黄花節江北江南白露寒為有清香宜晩嵗獨憐彭澤未休官唐馬為士啟題二首玉花驄馬大宛來俶儻權竒見異材不道開元四十萬駑駘安得望龍媒雄姿逸氣真龍種赤霧團身白玉蹄自是西來第一匹東風蕭散不聞嘶鬼谷圮橋東山雲房四圖為金學士題靡靡王風嘆黍離周公已逺仲尼衰乘車擁蓋諸侯客只説陽城鬼谷師神遇圮橋豈偶然君臣契合亦千年不逢龍準真明主三傑何人解識賢莫道征西舊司馬平生山水愜幽尋白頭匡濟成何事囘首東山感慨深雲白山青琪樹綠神仙咫尺隔塵凡九還真訣逢師授自此流傳到吕巖楊學士以海棠雙鵲圖贈其弟歸求題楊家庭館風光好花蕚連枝錦不如况是和鳴雙翠羽相親相樂似雍渠萬里京華臨别日海棠花發欲春深遙知晴鵲先將喜啼滿龍津碧樹林張緝熙監丞輓詩四首二十年前同史館北京邂逅更情親傷心此日賢闗外相向西風哭故人八品儒官坐辟雍白頭心事古人同至今鼓篋橋門者灑淚相思説至公兩京學省聚賢英試問何人不負丞官舎一氊清似水後來相繼屬誰能死去悲吟滿縉紳共嗟直道不憂貧不知駟馬髙車客身後如公有幾人王孟安筆花軒三首絲綸閣下染龍香幸得䝉恩侍玉皇元自筆花軒裏進常時親灑出天章清世髙才與博聞軒中來訪日紛紛文章誰合傳千載三秀靈芝五色雲當代中書海内傳尚論勲業不論錢贈公憑寫天人策肯逐揚雄浪草𤣥王御史竹索題千尺雲霄翥翠鸞畫圖猶似倚窗看臺中别有凌霜柏與爾青青共嵗寒題馬二首滿身雲影濕津津何用能空冀北羣踣鐵猶矜千里足連錢時動五花文曽隨六御歴沙塲初解鈎膺白玉瓖只合清時謝羈束春風散誕華山陽錢舜舉松溪待渡圖為姜司諫題二首翠黛連山綠漲隄扁舟長倚岸東西人家知是呉興徃還傍苕溪傍霅溪槿籬茅舎水村幽林彩山光積翠浮空使行人愁望渴隔溪閒却木蘭舟五月八日史館困睡夢侍獻陵顧問邊事覺而感賦隂山瀚海已澄清猶似當年軫聖情萬事傷心同夢過白頭清淚不勝零文淵閣前芍藥盛開對酒偶成東風又放玉堂春麗色清香滿意新有酒相懽莫虚負今年頓減去年人金少保曽學士宣郎中不數月皆没愴然有感清明有感西江南望𣺌天涯嵗嵗清明不在家蕩日飄風無定著亂人情思是楊花黄母王夫人輓詩二首珠翟雲冠五福身綵衣看舞瑞麒麟乘鸞一去知何處女範長留敎後人口訓詩書手辟纑月涵滄海出明珠夜中環珮歸來些啼殺堂前返哺烏楊河竹枝二首屯堡人家住不多屯邊屈曲是楊河褰裳濡足不計數河上行人愁奈何客子離家半月程風沙引起憶家情河中鯉魚不得覓尺素何由寄北京輓彭叙古二首年過二十工書法徃徃揮毫逼古人身被君恩無一嵗可憐埋玉楚江濱死别纔知見面難旅墳荒草暮雲寒幾迴東角樓前過拾得遺書不忍看甲寅初度感懷二首翰苑春坊清切地從來未有效涓埃天朝三十三年禄虚負君恩養不才先塋夜夜夢家山身繫君恩未遣還祭厚不如生養薄奠杯秪益涕汍瀾囘鑾是日微雪萬乘囘鑾指玉京行營笳鼓雜歌聲山靈亦有懽愉意數㸃瑤華送羽旌題倪元鎮畫琴牀書几一塵無散髪雲林不受呼清閟閣中賓客盡時因遺墨見倪迂居庸道中竹枝二首牽車馳馬夜無停不辨容顔只辨聲非是長歌即長歎一般行路兩般情千車萬騎度闗山獨坐肩輿帖帖安傳與家人莫相憶不曽辛苦不曽寒次韻𢎞濟過居庸佛院懷幼孜二首又隨翠輦度居庸不復當年語笑同下馬還尋舊遊處傷心寒樹起秋風並登仙閣愧才庸三十年間進秩同何日南帆泝瀟峽冢前持酒酹西風時思堂二首樹有深根水有源音容夢寐記生存堂中日日蘋蘩薦不稱從來罔極恩春雨秋霜繫所思傷心舞綵竟無期後來六簋陳祠祭得似承懽菽水時集句送尤安禮集詩君子之馬送友也友人歸呉而麗澤之益將日疏焉故集詩句以道其情君子之馬六轡如絲言念君子如璋如圭其德不爽敬慎威儀君子之馬六轡沃若言念君子如金如錫其德不囘威儀抑抑豈無他人不如友生邂逅相遇德音不忘惠而好我示我周行言笑晏晏維予與女女轉棄予誰與獨處中心養養徃送于野與子成説方何為期既曰歸止曷云能來子寧不來悠悠我思卧病答黎信十首集杜隔户楊栁弱嫋嫋孰知茅齋絶低小人生留滯生理難強移栖息一枝安朋知來問靦我顔安得廣厦千萬間青春欲盡急還鄉身欲奮飛病在牀荆揚春冬異風土終日慽慽思羈旅形神寂寞甘辛苦世人那得知其故自斷此生休問天濁醪麄飯任吾年將詩不必萬人傳小兒學問止論語恰有三百青銅錢天時人事只相催懷抱何時獨好開氣酣日落西風來口雖吟詠心中哀亦知窮愁安在哉生前相遇且銜杯江上人家桃樹枝千朶萬朶壓枝低風妬紅花却倒吹人生幾何春已夏應須㫖酒送生涯今日苦短昨日休萬壑東逝無停留江花未盡㑹江樓長歌短詠還相酬請公一來消我愁此鄉之人氣量窄我獨覺子神充實十日不一見顔色時復看雲淚沾臆感時撫事増惋傷人生㑹合不可常草閤柴扉星散居不道故人無素書素書一月凡一束紙長要自三過讀故人相見未從容令我心中苦不足寒雨颯颯枯樹濕欲徃城南忘南北感君意氣無所惜昔者相過今不得此心烱烱君應識鄉里衣冠不乏賢煎膠續絃竒自見前者途中一相見去馬來牛不復辨令渠述作與同遊宿昔一逢無此流感遇答夏四秀才三首集李搖曳雙彩鳳欲集無珍木昨下閬風岑飄揚竟何託梧桐巢燕雀反栖惡木根人生難稱意雄豪安足論緑幘誰家子灼灼芙蓉姿銀鞍照白馬玉壺繫青絲行行未能已冶遊方及時我志在删述但為此輩嗤去去復去去天地一逆旅石火無留光良辰竟何許取酒㑹四鄰行樂須及春黄金髙北斗浮榮何足珍東里詩集巻三
