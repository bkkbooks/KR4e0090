body:
  text: 東里集總目别集類五明文集二十五巻詩集三巻續集六十二巻别集三巻臣等謹案東里集九十三巻明楊士竒撰士竒名寓以字行泰和人建文初以薦入翰林充編纂官成祖即位授編修尋簡入内閣典機務厯官少師華盖殿大學士卒贈太師諡文貞事蹟具明史本傳明初三楊並稱而士竒文筆特優制誥碑版多出其手仁宗雅好歐陽修之文士竒文亦平正紆餘得其彷彿可稱舂容典雅之音當時館閣著作遂沿為流派李夢陽詩所云宣徳文體多渾淪偉哉東里廊廟珍者盖亦推本於士竒而言其後效尤既久或病其漸入於膚庸然亦不善學者索貌遺神之過若就其所作論之實能不失古格者其轉移一代之風氣非偶然也集分正續二編正集所載較少續集幾至倍之其别集四種曰代言録乃制勅之類曰聖諭録曰奏對録曰附録則士竒之傳誌諸文咸在焉李東陽懐麓堂詩話曰楊文貞東里集手自選擇刻之廣東為人竄入數首後其子孫又刻為續集非公意也然則續集乃士竒所自芟棄非盡得意之作以其搜羅較富故仍其舊併録之焉乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東里文集原序天生間世之才必予之以清明粹温之資際夫重熙累洽之運發為事業参贊經綸輔成國家之盛著為文章宣金石垂汗簡以彰文明之治夫豈偶然哉觀於今少師東里楊公士竒可見矣公江右西昌宦族蚤失怙奮志卓立讀書數行俱下既冠涉迹湖湘漢沔所交鴻儒碩士所談道徳仁義而所受清明粹温者養之直而資之深芳潤内融彪炳煜乎外見濡豪引紙力追古作於是聲名洋溢受薦而起際遇太宗文皇帝正位宸極建内閣以嚴禁宻公與淮等七人首膺拔擢之命典中秘兼知外制厯事四聖熙洽之朝凡大論議大制作出公居多肆其餘力旁及應世之文率皆關乎世教吐辭賦詠沖澹和平渢渢乎大雅之音其可謂雄傑俊偉者矣公之立心制行本之以忠貞亮直持之以和厚謙慎以故清議咸歸重之洪惟我朝自太祖高皇帝肇開文運儒雅彬彬軰出以公述作徵諸前烈頡頏下上能幾人焉方之當時齊驅並駕復幾人焉謂之間世之才其信然哉淮也孱弱無似旦夕相聚處聆笑語接矩範禆益良多屬以抱疾怠事上疏乞骸蒙㤙賜歸調息旋軫之後雲泥逈隔離羣索居荒落殆甚公不遐棄貽書以文集序見屬輒以平昔之所知公論之共推者序述如右昔昌黎之文李漢序之歐陽之文蘇軾序之交輝迭映於千百世之逺淮豈知言者哉公命也其奚敢辭正統五年嵗次庚申秋八月既朢榮禄大夫少保户部尚書兼武英殿大學士永嘉黄淮序
