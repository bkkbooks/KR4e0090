body:
  text: 東里續集巻四十七明楊士竒撰書啟手簡與朱與言書某來承政務之暇鈞候起處多福良慰懷思且具道足下所以愛厚之意尤非尋常面交茍為從臾者所可跂及銘感尤深但所怪自北而南者籍籍譽道某人有輔翼之功某人有薦引之徳某善政出某人某善令出某人而都無片語及僕若欲勉進於僕者甚善甚善當敬佩服僕素闇劣學術智識一無可取其不能分毫有益於時者僕誠自知不待人言彼言者之不見及亦僕實事不足怪不足怪但人之流言智者察焉今皇上仁聖大徳日新兩宫聖人體天之心行天之道以覆育天下過於漢明徳宋宣仁逺矣故凡今一切仁施義舉皆出於上雖政事之臣一不過奉行朝命而已况僕之闇劣又非處政事之地其能有所效乎而亦匪獨僕為然矣如必曰某事某人之功某事某人之徳孔子云吾誰欺欺天乎欺天而竊天之功不有陽責必有陰誅吾為之懔懍懼矣若彼媚竈小人傳虗張妄獲罪於天誅責又當甚焉其不我及誠我之幸然彼妄愚譬之矇瞽倀倀㝠行亦可憫惻古謂爾有嘉謀嘉猷則入告于君爾乃順之於外曰我君之徳此臣職之當然也王文正韓忠獻薦人未嘗自言人莫之知王沂公為相范文正曰明揚士類在公獨少沂公曰恩若已出怨将誰歸歐陽文忠以為名言書之簡册此皆大臣君子實有其事尚推而弗居况實無之而敢竊冐哉此妄愚之人所可憫惻者也僕之實無天日臨鑒不敢自欺顧殘疾之軀今年七十有二無禆於世而尚玷班行不圗引退夙夜自思深用愧赧但以躬受三朝厚恩今皇上新嗣大寳念其舊人撫存加厚故未敢即言退者大義之所係也然久病且衰亦終不能少效分寸豈敢久孤寵祿且區區此心已非一日宣徳九年僕時六十有九嘗豫陳致仕之情先帝笑曰未可遽言致仕朕來春還南京亦命卿鄉里一行時竊幸喜謂賜歸有漸退即豫作歸田詞四首今錄奉觀之亦可知其素志也感足下厚意不覺煩聒惟心照小兒旦夕遣歸先墓事尤乞指教不具與仲亨兄書奐來辱恵書兼審髙年納福之勝慰恱無限某雖幸茍安但老景侵廹日甚一日而欲退未能耳兹因奐歸顓有奉凟陳年存日與稷契厚其第二女子許配長孫昱未定盟而年即世惟陳楊世婚姻家而某受外氏恩甚厚今不敢以沒存異心欲昭告海桑先生孔碩先生而定盟言尊兄陳氏宗老又楊氏親戚之長煩與年之子一言而主張之祝文及薄資以具祭告之儀者皆附奐納上千萬留意侍教未期惟善保以迓壽福與蕭孟亷書僕初歸承過訪昨經仙里又辱力疾出迓於道愛厚之私感刻感刻顓此奉謝且有凟事寒家先墓一所在四十六都梅塘之上其地舊名楊家山至今土人稱其處為楊家地下蓋宋咸淳七年所塟也有石刻表識具存僕四十年前屢陪寒宗老長展省周歴此山先塋前後悉無附塟者昨日重造墓下則見廹近墓之兩旁不逺尺許皆有新墓其左則不肖子孫曰表曰褒者塟其父之望已責褒遷厝矣其右則詢諸墓隣知為令先君鵬舉先生之藏即敬下拜既而竊嘆先生之存也恒愛我以君子之道今其沒也我不能以君子之道報之俛黙愧汗弗能已矣蓋又竊聞初非其家之欲然也大扺惑於俗巫邪説而為富貴利逹之謀夫鵬舉先生之家其富貴利逹所自有者蓋其積善累仁相承徳義非一世矣天道固應厚報之也何待地理哉如必曰地理能富貴利逹人則楊曽余廖之子孫皆為侯為王皆富過晉楚矣此其最足徴也又聞墳近老者云數有相地人過此盤旋審視而與人言惟古墓一穴合塟法兩旁新附者皆乖戾其中也不勝弊矣僕昨目睹褒所發其父之藏為水蟻叢蝕其棺且盡其遺骸又有不忍言者然則鵬舉先生之藏其吉與否亦可推見孝子慈孫獨能不動於心乎僕於使府承累世交契之厚且比年加有重姻叠婭之好或者有謂僕於斯事可以不問夫先祖之藏數百年至此一旦阨於侵廹而不寜為其後者目擊不問天地鬼神臨之在上不孝之罪孰大焉况鵬舉先生平素清介之操明於玉雪一毫非義不取也一毫非理不處也沒而有靈其不能安於此必也此固孝子慈孫之心所宜仰體也蓋區區之誠内為先祖謀外亦為鵬舉先生慮臨楮不勝惓惓切希鑒在垂示答焉不具與蕭季廣書僕於名門託交令伯運副公及令尊府皆以君子之道相厚中心存之迨今不忘昨日見賢昆仲猶見令尊府伯仲也豈勝感懷但梅塘先墓之側運副公之藏於先祖有甚不安者亦知運副公豈能安乎豈獨楊氏之子孫之不能槩於中蓋墳隣之老親見其事者亦相與竊議於傍而嘆楊氏子孫之不能正也季廣於孟廉至親兄弟豈當坐視不仗義一言使運副公與吾祖皆得安於地下兩家子孫皆得䝉福季廣之陰徳厚矣片楮草草惟季廣念之不具再與蕭孟廉書前書之凟誠出中情所不獲已惟是祖宗一念之重非有他也幸甚不罪惟此墳之祖西昌一縣楊氏同宗者非獨僕一􅉽之祖也千萬垂念且昨聞之墳隣之老者言屢有相地者過之盤旋審視而與人言惟中舊墳合古塟法其左右兩墳新附者皆乖盭無益有損所言人人皆同昨日僕目睹之望之藏脗合斯人之言矣令先公之藏又安知其不合斯人之言乎則僕之言固内為先祖亦外為令先公慮也因侯車行再此致凟與李昌祺書奉别極久懷仰彌積緬惟致政以來燕處髙閒靈臺明凈神相多吉大江之西一人瑞也視僕僕焉衰朽之軀馳驅塵俗而不得息者霄壤懸絶豈非清閒之福天固不輕以畀人哉小兒來承不鄙棄賜之髙丈重以善誨感刻感刻兹因太守陳君行専此奉謝兼有瑣凟兒曹近日收集鄙文數篇區區妄意欲干閣下一序冠於巻首以示後之子孫計四十年斯文交契之深必所不靳誠得數語增重於端尤深感厚胥晤未期千萬若時加愛不具示梁壻叔濟書自鄉邑來者具悉賢夫婦父子清安甚慰老懷但兩歲失館則非所望於叔濟也古稱教學有三益不館則廢三益矣四民皆有一業士不館則無業矣諺有恒言家有千緡不若一日進一文計叔濟之資産未必充歲給也雖日進可也如曰比來無好事東家徒館無益吾嘗聞前軰言先待制壮年時館於後荘羅宅歲得穀五十石而已館其家七八年始往贑州館謝氏塾又數年乃入仕蓋先賢皆如此近來為士者不務自進其學而意氣自滿與人相處不能謙和忍耐一語不合抱忿徑去不顧以此往往不終一歲之淹大扺有學有徳者必不為此而為此者率皆無實學負虗氣之人也叔濟戒之戒之近得兖州書浩然不平之氣吾始不能不疑然内詢於家人外詢於親戚鄉里之在此者皆云叔濟無此事叔濟素非如此等人吾意已釋然此書不可不一示叔濟有則改之無則更加恭謹以全賢叔姪親愛之意也池州黄令之舉實自我尼之時以叔濟之學未堪此職恐致人輕侮無益有損故也又以池州荒寂之鄉雖有學不可居不若布衣教鄉館有益且樂也此實老人忠愛之心期足下逺大非有他也是時兖州來此崇髙已被收未嘗相見亦未嘗一識黄令叔濟如不能釋於心只可以罪老夫不可歸怨賢叔也繼自今老夫亦不敢妄有尼矣致意組娘老夫愛子之心一也别無他意但望兒女皆為好人貧富不必計較也賢夫婦居家和輯兄弟娣姒教子讀書敬老慈㓜好待臧獲切不可偏聽一人之言以傷至親之情也與蒋吾望書託好慶門數年親親之誼屬以道逺未遑面叙用切耿耿辰下秋清緬維養髙林泉有相之道尊候動履多福某叨庇如常但國恩深厚不能有分寸裨益而老病日加寝食懷愧他皆無足為道承索令先處士君墓文草率塞責専用奉納甚愧皋緩也今遣小女隨令嗣歸某雖竊祿於時然貧素之家無改故常以是資装百罔一備世德之門必不為誚但小女託在名家全仗親家母夫人訓教使之成立不忝盛宗某與有榮焉敬此以逹下情伏希照亮胥晤未期惟若時善調茂膺壽福不具與南浦禪師書日昨恵訪兼辱清供屬以在公弗及延接感愧感愧發覩新刻蒲庵集尤感用心此老於前軰詩僧中才華豐腴天機精熟有冠冕珮玉之風序所謂出於千百人之上蓋格論也斯文士夫多所喜玩南浦師能使之有傳比於建一禪刹造一津梁功徳不减矣恨老疾目昏不能詳閲聊為正誤數字奉去改刻之後便可印行曾約題數語於後三二日藁成即送納也為蕭子冲賀尹彦璟啟兹審久峩冠豸新翥舄鳬金榜焜煌四海仰文章之貴玉堂清切九重知述作之才入臺府而百辟霜寒擁軺車則八閩山動又輟紀綱之任逺膺師帥之行固然驥足非百里可淹或者鵬摶假六月而息升堂拜家慶豔繡衣綵服之光下車入里門行白髪蒼顔之後某叨聨姻好與有光榮蓋龍洲二百歲復見此人亦螢牕三十年以至今日大官大邑諒何小於鄭僑為下為民矧習聞於伊尹菲儀為賀茹納是祈簡金諭徳卻冠賓禮幣恭以維其吉矣肇稱冠子之儀非曰能之猥受戒賓之命慶三加之具舉辱雙幣之寵頒成章燦爛於雲霞兼味駢蕃於籩豆存羊愛禮固知明逹之心反璧受飡已拜寵厚之意斯惟中懇尚冀俯從簡問廣徳州官訪王靜學塟所翰林院修撰王叔英先生洪武三十五年六月二十七日晚卒於廣徳州就塟於彼未知在寺中在觀中住但聞臨卒時囑所下處姓潘師兄為塟之近祠山上下今煩詢問其墓與楊仲舉手簡闕詩将獻存誠然營中諸子無有知其家者今姑送仲舉兄處鄧兄送來過便連下本逹之不則僕朔日自來送也别後次日觀蒋家新墳得暑疾雖服藥少减至今纒腹痛無半時寜息也苦欝可量而猶與人作三詩亦勉强自排耳蔡兄聞已遷館數日又風雨不止計彼此皆岑寂矣如何城中况味亦不外此承教歐蘇書簡啟沃甚多惜不得心緒一熟讀為欠耳謹用歸璧敝東問生麝求分少許作藥用賈直就納去如欲自用則不敢固必也更告索和詩來消遣客慮不吝不吝今日蔡兄相過知無暇不曾同來却甚懸渴前日托惟憲去説拈炷之事如何垂教為幸昨㑹羅舎亦同此意計必徹聽矣今送書法二册來并官歴一本倘見長老便乞分付存誠索書破題蓋不事此者将十年徤忘之餘又比來連無雅懷强記數道塞白耳老兄有暇不嫌亦錄一本如何二兄托在知己更欲記憶數道書奉緬思復有不可者其説具於簡首雖然鄙俚腐陋之言終不敢為知已隱也老兄固不待贅但乞屬鄧兄閟之不令貽笑於人至叩至叩别後計二兄皆有新作有便無惜附教承寄杜詩愚得及先世遺翰皆拜賜矣佳作尤明白雅正惜乎無好懷抱詳悉讀也姑留此俟有閒日時也後有便却用歸璧明日晴雨不可必但晴則欲去蒋宅就轉謝君瑀蓋近日又承枉訪也而舊路不復得記憶老兄有暇能垂引否有暇即早食後在蒋宅専候如雨姑止待别日也即欲執手相共行尋尺許而阻絶艱得若此况其他哉臨楮益增耿耿易上經詩傳童䝉須知俱納上再求假下經易對㸃舊時四書破題數道舛謬為甚亦望發來改正更望發白鹿紙三張來暇日欲出求表帖如何出時還得景中兄一接引為幸别後吉語洊至遂弭杞人之憂且又放意作江湖數時詩客也風雅翼望發來便装補註煩轉逹存誠乞賦清隱詩一二日送巻子來兩日受傭為人墾闢荒地計老兄亦同此困力也便欲一見相勞苦而司闉戒嚴如限蓬弱夫時景俱若此異鄉孤處情當柰何今専人取卧鋪及衣靴及要白紙四幅去二蒋處并假詩傳二册來對㸃均望付下旦晚易義四書義有作不惜垂教何時晚暇能見過當作一訴𠂻曲至望至望夜來望火勢如不大相逺者左右曾無渉驚否火發端在甚處度罹禍者必多存誠諸兄家皆安好如何昨日荷枉顧被酒不遂聽教惶恐惶恐託景中兄鈔書聞多事無暇也望轉造擲回常筆就乞賜兩枝幸不怪其無厭也鈔再望付五伯與來人為買紙之用暇日在冀成兄處相待訪君瑀當能來否連日汨汨苦他務昨晚方得手鈔王大尹文字方見説理性甚精為文又甚有法度反覆數四如啜好茗愈久味愈出也覉孤悶悶不覺豁然何時晤對相與共樂誦之幸在此處遭遇一哲匠如此而匆匆又将東西散去竟不獲一聞䂓矩繩墨之萬一豈造化者果於棄吾軰於蚩蚩昏塞之地而不復使之開明耶念此又重惘然比來見公啟昆玉否去期如何黎子誠動定必相聞兩日甚念之千萬批示袁湖官送魚就以轉奉客中誠無所用也出城且未有期東里續集巻四十七
