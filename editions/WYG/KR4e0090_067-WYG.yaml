body:
  text: 東里續集巻三十九明楊士竒撰闕四十一行急能赴之於人一言不合輒去然無宿怒意休休園林泉石之間不以外物累其心可為善人也矣宣徳十年六月十九日以疾卒春秋六十有四娶羅氏余同母妺先八年卒繼鄭氏子男三長榮廣西按察司知事能不改其貧次榘次榦女二陳珪蕭岸其婿也余官翰林十數年遣子稷歸守家尚髫齓頼康氏妹維持教誨而彦英顧盼助恤良厚彦英嘗一至南京視余夜共飲酒余片語過直不懌鷄鳴告辭去予起謝之彊留數日竟去然所以顧恤稷者不替昔也吾妹沒吾哭之哀數附書稷令所以事康姑夫禮加厚豈意彦英又沒哉故為志其塟而因以及予情云銘曰璞兮不鎪而坦於幽歸全斯邱止齋陳先生墓誌銘余仕兩京三十有八年鄉閭故舊淪謝殆盡五七年来親戚交游老成軰行中有書畀徃還相問者惟止齋陳先生一人今年其子餘書来求墓銘則知先生又謝世矣為之悲悼久不已乃叙而銘之先生諱泰先字仲亨止齋者其講授之居所名也陳自五季繇金陵徙泰和厯宋元至今貴顯相望而以科第進者不可勝數元贈萬安縣尹吴文正公為銘其塟號菊存者先生髙祖也瑞金縣尹以贑州路推官致仕號梅村者其曾祖也祖以道潮州教授父有慶博學擅文章母蕭氏先生㓜孤遭兵亂貧寠與兄仲述盡力養母而勤於學兄弟治家少間輙挟冊徃從鄉先生劉尚書崧歸則兄弟自相講論㑹有詔興學校縣大夫舉仲述充博士弟子先生獨留供養綜理其家凡家之内外長㓜寒暑旦暮之需未嘗乏也仲述舉進士為御史先生居鄉恂恂謙恭足跡未嘗及縣門縣令丞如不知有陳御史家劉尚書卒獨有遺腹孫先生曰吾可以忘劉先生乎以子妻之先生雖老猶朝夕坐函丈授徒不倦或以為言者則應之曰吾豈為利哉顧先人之所業且吾少壮時所資柰何老而遂棄之也平居事母孝母沒卜日将葬霖雨旬浃弗止葬之日遽霽既𦵏雨如故人以為誠孝之應嘗省仲述京師適仲述坐累下獄先生上疏白仲述寃竟得釋仲述卒於官撫育其子先生以德望重鄉里里有競爭必趨先生求直故家大族凡宴會必得先生正尊席為榮縣舉鄉飲禮賔及有所咨政必於先生先生貌古而氣清色温而詞正儀度雍容恒俯接下無間貴賤老穉皆喜親之嘗有甘露降其庭竹上識者以為養老之祥凡受朝廷賜帛牛酒者再年八十餘康健不衰飲食步履如常一日得末疾遂不起正統戊午八月二十九日也春秋八十有五元配王氏繼胡氏子男四皆王出餘台州府學教授直福建按察司照磨復邵女三人劉仲兼曾敏仲蕭仰初其婿也孫男十弁弇奐奨龔㢣丌禄岳章女九曾孫男十先生之葬以某年月日𦵏在某原惟陳楊二氏婣好累世如朱陳先生與余又皆少孤貧賤故契誼特厚余嘗念得謝事歸旦夕相過尊俎談笑以終餘年者惟先生一人而先生不待矣余能不悲乎能不悲乎銘曰陳来西昌越四百禩崇科清秩累累聞世猗歟止齋隐居求志道行鄉邦奚必有位猗歟止齋文範是似我銘其藏有道不愧梁先生墓誌銘永樂八年七月二十又六日西昌梁先生卒邑之賢士君子皆走哭弔市㕓郊野之氓多咨嗟傷悼亦有趨赴哭慟者中外縉紳大夫知先生者聞赴亦多嘆息有作為詩文以悼之者先生諱蘭字庭秀别字不移梁之先唐長壽中由長沙徙西昌八世祖蕃字均崇仕宋為權知鳯翔府與其弟同知黄州充史舘編脩官均傑皆有名於時曾祖昭伯祖才可父彦卿號心易母楊氏元新喻州判升雲之子生三子先生其仲也自㓜警敏未七嵗入小學讀書究文義心易公竒之稍授之經自勵不懈未幾元季兵亂父兄相繼沒世獨與弱弟奉老母處貧困然能適其母之意如未嘗困也而奮力於學不廢皇明混一天下授徒里中以資奉養教其子明經飭行恒語之曰今幸遭明時沐治平之澤不可茍焉自逸忘所施報長皆命之仕戒之曰士貴有益世用非徒資禄利茍榮其身而已長子潜歴宰四㑹陽江陽春三邑入為翰林脩撰兼右春坊右贊善次子混歴訓導瑞州府學教諭溧陽縣學先生東西徃還就養日有輕煖甘脆之奉賔客之娱可以自樂二子亦兾以此樂其親先生歎曰盍求樂吾志可也顧謂之曰惟克有終以不辱國命貽我羞吾獲歸守先人邱墓以詠歌太平盡吾之天年為樂不既多乎其子強留之不可既歸日與故人朋友尋山水之樂命酒賦詩任意所適於邑西柳溪之上闢畦蒔蔬雜植花竹引泉灌注而築室其中㳺焉息焉觀道玩㣲逍遥自得作畦樂詩數篇時歌以自適然猶數賦詩寄其子勉以盡忠不置也既得疾即謝醫藥曰至此命矣疾革命侍使具盥盤起沐浴又命取深衣幅巾家人請所欲言曰𦵏祭以禮不一語及他事卒年六十有八性儉素博學明識教人以五經四書為本若左氏以下暨荀揚劉向之徒所著書必為辨析是非孰之當取孰之當去諸生聴先生講說㫖義條逹精到皆忻忻如得甘食為文簡而婉詩馳騁魏晉而冲澹自然有陶靖節之趣嘗曰士當立心髙明尚友千載庶幾不墮庳陋居家未嘗疾言遽色而家政肅然與鄉人處得其敬愛有窮乏者亟振之或貸不能酬折其劵為人觧紛排難未嘗求知有知而謝之輙辭初心易公出後鍾氏故先生嘗從鍾姓既而梁氏之後絶潛始以先生命請於朝復梁姓云娶陳氏有令徳二子即潜混孫男五女六曾孫男二先生沒時潜以扈從北京混官溧陽皆不在側是年冬始克奔䘮歸將卜明年某月某日葬於邑南某鄉某原先事以状屬士竒為銘士竒於先生有世好且少嘗從受詩法義不敢辭不銘銘曰五色鮮好被厥躬緼仁持義履適中力探姬孔辨況雄指示當路開瞽矇金舂石應歌時雍有嗣樂志諧奮庸蕭揺相羊臻考終澄江之南馬鬛封琢詞幽堂永弗礱顧仲華墓誌銘正統二年九月十有二日太醫院士顧仲華卒於北京子暘以翰林編脩楊仲舉所述事状求予著葬銘按顧氏世居蘇之崑山太父諱福元平江路團場提領父諱明母陸氏仲華諱文榮有孝德洪武中以閭右徙實京師父已早卒奉母就養愛敬兼至母患痰疾徧叩醫弗效竟卒仲華慟弗勝且自憾不習醫不能起母疾也終䘮即從良醫師學日益有造詣久而治疾多愈太醫院奏舉醫士家貯善藥務施濟葢窮乏者得之加衆尤能捐利以濟急鄉人傅巾逋公租八十石将鬻其子於市以償邂逅仲華訴焉且訴即鬻子不足盡償也仲華惻然動心語之曰毋患苦吾為若盡償也邀至家予白金六十兩遂盡償租又周乙者将徃戍廣西而行囊無一錢走乞於仲華出白金三十兩贐之又周丙者負官鈔九千錠自計鬻家産僅償五之一欲自經仲華聞之予鈔三千錠教為市取息以益不踰年悉償官番陽潘晦初客京師遘疾仲華延於家躬視藥食潘革泣謂仲華曰以死累君柰何且骨将安歸仲華曰論交豈以存沒為盛衰哉棺歛有一毫不周備者文榮不名為人然必寓書君之子歸𦵏卒踐其言凡遇老疾無依死無歛𦵏者皆振恤之襟宇和坦喜與賢士君子言論未嘗役志生計通邵子數學推将来事多有徵驗國子祭酒胡若思翰林檢討陳嗣初皆為著傳一日豫戒家人治歛具既而疾作即却醫藥進其子若孫諭之曰吾家素尚儉有贏必推以濟人若等惟忠孝寛厚相承即吾瞑目無憾矣語訖而卒享年七十有四元配張先二十六年卒繼范氏子男一即暘温粹孝友明於醫今嗣為太醫士女二長歸朱讓次歸吏部考功郎中夏衡孫男一瓊女二仲華之葬以卒之明年二月十七日𦵏在江寜縣安徳鄉石湖村長山之原銘曰其存之仁其施之厚其報之隆有在厥後封承事郎監察御史嚴君墓誌銘監察御史嚴恭之廵按廣東江西也姦豪懾其清彫瘁樂其仁葢風采不嚴而肅聲譽勃起予初未識也而耳熟之一日求之稠人中得焉雖心重之然不得數相即葢其屢以使命出也比還縗絰一再過余求銘其父之葬予素重恭故不復辭按状其父諱玘字子成家錢塘之平安里子成之曾祖諱徳興祖諱世安父諱斌皆不仕母某氏子成自少能頟頟卓立辛勤治居室蕃種植孝養父母而愛其弟某甚厚洪武中朝廷封建親藩簡民秀壮充侍衛子成與焉其弟曰父母老非兄孰任共養力請代行父母不能止然不忍少子之獨徃也命子成送之中都子成且行顧其妻曰汝必盡力奉養吾親母分毫怠忽既至中都扶持其弟數年乃歸弟後侍衛赴成都子成心恒耿耿不忍西望寓金帛衣服遺之者無虛嵗毎自念少窶幹蠱立家不及學遂以教子為要務極力禮賢師購書籍以資之於子孫善訓誘待人以誠長里中徭賦恒捐已以益匱乏者性不飲酒尚樸素衣止布帛未嘗一服羅綺年四十妻䘮不復娶雖老不近侍婢喜究釋典意澹如也宣徳中以恭貴封承事郎陜西道監察御史贈其故妻陸氏孺人子成正統二年六月十四日卒享年七十有四陸孺人家同里甫笄来歸孝事舅姑得其懽心舅姑卒相夫治葬事極周偹尤篤教子晝夜訓勵其學委曲切至逮屬纊猶懇懇為言不及他事永樂壬辰正月十七日卒享年四十有六子男二長毅次即恭舉進士擢行在陕西道監察御史克承父母之訓者也女三長適孫勝宗先卒次適王昌其季未行孫男五祀禋社祚裕女一初陸孺人葬邑之佛樂塢至是毅恭奉御史君葬其右地道所尚也銘曰行在諸已奚其仕嗣興有煒沒且貴屬銘于史庶不死贈刑部右侍郎吴公墓誌銘正統元年十一月二十六日刑部右侍郎吴公某卒訃聞上遣進士張瑾賜祭且命有司治葬其子禮部左侍郎廷用詣闕謝既退過余請余著葬銘按國子祭酒陳君元世所具事狀吴氏世為建寧政和之豈弟坊人公諱某字某晩號菊莊曾祖諱越祖諱義考諱某贈刑部右侍郎元季兵亂能保障其鄉邑邑人徳之母魏氏贈淑人公天資淳質而端謹忠厚讀書明理言行必主於善事親孝與兄弟同居相友愛每旦一堂相聚言論怡怡然諸子姪或不率未嘗作辭色但善諭使改諸弟沒弟之子固求分異不能止資産悉聽擇便利恣其所欲而已取餘焉處鄉䣊敬長慈㓜一盡其誠周急䘏患弔慰贈賻加厚死不能葬者與之地有貸公金過期不能償將鬻子以償者公聞而召至毁其券不復責償既老建南莊别業日有琴書花竹之娱超然物表也公年既髙廷用奏歸省時公年九十有三康寧和豫廷用亦六十有七父子並貴朱衣象笏斑白映照於一堂之中鄉人榮之公竟以是嵗捐舘子男一即廷用元配張贈淑人繼邵封淑人男張出也永樂甲申進士戸科給事中陞行在刑部右侍郎轉禮部左侍郎淳厚敬慎有父風厯官四十餘年仁廟嘗稱為君子尤所簡知有以見公之教成於家女一歸李景程孫男三人焴旒通廷用將葬公於邑東瞿里其地宜石槨徧索不獲將代以木啓土得石槨於傍近甚堅厚脩廣咸稱殆若有神相者人謂公積善之應嗚呼踰九望百之年上夀也世或萬一見之如又生被褒封享禄飬光榮令終加鮮矣吾仕於朝垂四十年所知者兩人永嘉黄少保思恭及公皆九十有三雖品秩不齊然其所膺褒封禄養榮終等也又皆於吾銘葬而公所得石槨事之異豈非積善有誠之所致歟銘曰壽為福首上者嵗百維皇建極維已殖徳噫嘻吴公厥徳孔殖允孝允悌以恭以飭惟善之循惟仁之廸際時泰和淳化圛圛如春被物充悅潤澤栖遲丘園蕭散澹適有嗣在廷光奮乃績帝庸嘉褒寵秩有赫壽祺奕奕人倫天錫肆用表之刻兹貞石封工部營繕主事任君墓誌銘工部郎中豐城任禮縗絰奉翰林侍講孫曰恭所狀乃父主事君家世事行泣拜請葬銘禮永樂十九年舉進士余考禮部會試時所選奏者且以鄉邦故數徃還不得辭按狀任豐城故家宋景定三年登方山京榜進士曰陸吕者主事君六世伯祖也曾祖雲卿祖觀徳考原傑皆隐居不仕主事君諱能字載逺為人質實明道理雖處㕓市所務園田外不别治生業蚤䘮父母與兄丈逺居友恭相篤治其家肅然念其先科第乆未有續旦暮以勵其子禮登第授官又勵其亷慎之節厯舉邑之人語之曰某也以亷慎致逺大某也以不亷慎至覆敗其可不勉又曰必勉之庶幾可不忝朝命不辱所生禮亦克奉教卓立不滓於羣汚中天官考禮績最奏推恩封父承徳郎工部營繕清吏司主事主事君既拜受命顧禮曰誠由汝克立致兹榮命然當勉圖為老人保終此榮庶幾孝子禮拜稽首曰不敢違教人皆為主事君賀主事君於敬徳持謙和益加於昔素急人之急所居瀕江江漲有清江人乘舟及門而溺已失舟主事君適見之倉卒投一板援之獲濟樂安民五人逺役還病且憊暮及門外岸隄下止焉是夜風雨大作聞啼號聲主事君駭曰是必失所之人遽起眎之取苫席蓋覆且戒家人煑鬻食之既而两人死為藁葬岸側而旦暮飲食其三人後五日五人者之家聞其道病皆走人迎候至則具禮以謝主事一無所受其他如饑嵗分廪以振匱乏不畜私量以茍利厚徳非一嵗邑令舉鄉飲必賔致焉卒於正統三年二月一日享年七十有三配鄭氏封安人子男三長即禮曾鶴齡榜進士擢工部營繕主事今陞郎中次立次吉孫男六長善宣徳乙卯中順天府鄉試次士淵士沾乞真同壽元保曾孫男一主事君之葬以某年月日墓在某原銘曰有耀于前克念嗣之有嗣于後克勤勵之命服在躬厥徳之應子孫繩繩尚鴻厥慶外祖靜得陳先生合葬墓誌銘嗚呼我先考少傅公先妣陳夫人當元至正甲辰鄉邦冦亂舉家徙避於袁又三年先公棄代不肖孤時甫晬先夫人抱孤孩留袁㡬一嵗時外祖靜得先生外祖母曾孺人皆避亂平川初陳氏三壻獨先公清徳最為外家老長所禮重至是咸傷先公之䘮也曾孺人尤悲念寡孤在逺方不能歸也旦暮號泣不已於是靜得先生躬履榛棘涉艱險来歸先公之䘮與先夫人及其孤孩幸抵西昌時洪武元年也外家既留於平川曾孺人嵗時數數遣人撫存寡孤惟恐其失所也不肖孤生十年曾孺人沒於平川先夫人晝夜哭以不肖孤之始有知也閒暇輙舉外家事喻之且數告之来歸之故曰小子其永勿忘静得先生後歸沒於西昌先夫人亦繼謝世惟曾孺人尚旅殯平川不肖未嘗一日忘也屬縻禄近侍不遑遂私宣徳八年始克經營啓殯歸西昌其孫孟髙曾孫忠憲得吉卜於千秋鄉龍門之原且將啓靜得先生殯而合葬焉於是憲走北京屬誌銘嗚呼不肖躬受外家罔極之恩生七十有四年矣矧今熟外家世徳莫或深於不肖者尚敢稽乎陳故西昌儒官家由宋以来科第甲一邑舉嘉定丙子貢士曰師皋生淳祐丙午貢士子安安生書友書友生主一皆以經學教授邑中主一之配倪孺人二子伯諱謨字以徳學者稱心吾先生仲諱庸字以靜稱靜得先生靜得先生器宇閎達趣韻蕭散不屑意生産事少承父兄之教博學工文辭而論議明正心吾先生毎服之孝弟睦婣之行本於天性愛兄子如子子婦之兄患難狼狽走平川依之舎之館下衣食之旦暮親授之書教之為詩三年而後去後竟倍不校僑平川二十餘年從學者甚衆先生善講說條鬯明潔聴者言下領悟於教小學尤有法贑郡學平川邑學皆聘訓導不就嘗被徵詣京師力引疾辭既老始挈家歸西昌時革運已久鄉變更一新先廬僅餘瓦礫田園悉墮巧敓則僦數椽以蔽風雨教里塾以資寒暑朝夕澹泊蕭然而正固自守是時儕輩已盡里巷後生流俗莫或知之其意未嘗不自適也雖老不厭學遇異書竒文皆手録之工篆籕於醫藥卜筮皆有造詣有詩文數帙藏於家洪武丁丑二月一十四日沒享年七十有八曾孺人諱福曾同里世科家曾祖梅伯宋進士累官紹興府同知祖懐可元袁州路儒學教授學者稱鷗江先生父思立嘗舉鄉貢已而退伏不出母李氏曾孺人天資端重慈惠明肅既歸陳氏孝敬雍睦倪孺人悉付之家事雖躬任勞而每事必謀諸其姒羅孺人乃行未嘗或專凡所為必當大義主一先生嘗病静得先生出治藥時倪孺人及心吾先生在側主一先生言人恒情老念少子吾即不起負郭田其子庸三之二心吾先生跽曰負郭田不及百畝即大人不言謨將悉予弟奚啻於二主一先生不懌而黙已而靜得先生還曾孺人語之故且曰獨不知事兄之義乎靜得先生趨入跽曰父母而次兄實長若之何我多得負郭田應多授兄主一先生顧倪孺人曰渠曷遽知之曰曾新婦所導也主一先生拊席喜曰佳兒佳婦佳兒佳婦數日病瘳後舅姑皆沒羅孺人又悉付之家事雖細事不自專必白而行而羅孺人一惟其言之從也蓋終身與羅孺人相親愛如同産兄弟有疾更相扶持皆如痛之切己身也一日羅孺人因宴會止宿子婦家中夜讙驚傳安成冦至州人倉卒扶老挈㓜出走渡江婦家扶羅孺人俱渡時兩家各東西散不知所向兩孺人皆以相失悲傷不食飲後遣人求得之羅孺人竟違其子若婦獨與曾孺人偕避㓂入南山中邐迤趨平川心吾先生時客韶陽曾孺人率子婦事羅孺人盡愛敬羅孺人甚安之蓋忘其在旅寓也居數年羅孺人沒曾孺人哭之慟累月不已葬祭一如禮曾孺人於治家秩然子姪及婦皆祗肅聴訓教無敢踰越食飲衣服之給必均一自婦以下至女奴有疾悉親視其藥食故不間貴賤上下雖嚴憚之而心歸之以洪武乙夘三月十二日沒享年五十有八子男二長能字孔武後數年卒於贑次輿字孔載㓜為族人仲斌後兵亂遭俘女一即先妣累贈夫人孫男二皆孔武子長孟京永樂丙戌進士翰林庶吉士次孟髙曾孫男三忠憲懋銘曰猗歟先生徳醇行莊于守有常于教有方猗歟孺人允貞允肅維仁之存維義之篤嗟古賢哲恒難其配懿此令人合璧駢瑞龍門之原巋焉有墳春秋霜露来拜如雲姪孫敏達墓誌銘嗚呼吾宗之居西昌者其先雖出處不齊豐薄不一然皆服詩書修仁善文學有聞行義有稱雖厯世變處憂患而執守不移故世為邑之望然先澤既逺三四十年来老成凋落且盡後生晩出不能究知上世其漸習益下葢余出仕四十年徃徃聞其所行有可為太息可為流涕者矣嗚呼是豈祖宗所願於後之人哉吾葢懔乎懼吾宗之衰也比二三年有如吾志者得兩人皆仕於南京從子太學録弼族孫都察院檢校挺皆克明於義利之辨而謹諸躬然為挺尤難挺早孤而艱有立志孝其母敬事二伯及愛二弟無失自少勤學恒裹糧從師治詩經夙夜淬礪持行端恪宣城令以賢良方正舉於朝召至試文章遂授檢校挺事上官如父待寮之長如兄一盡誠意與人交謙和悃欵而治其職務縝宻謹慎不以風雨寒暑稍怠取予以義不一毫茍且而能急人之急合院崇卑皆賢之無間言右副都御史五雲朱公遣子從之學而賔師禮之聲譽日起衆咸謂吾楊氏有人亦謂其禄位必且逺至矣一日得疾左副都御史海虞吴公偕朱公徃視之二公皆有憂色吴公為致數醫醫皆曰此於法不治二公曰雖然無不用藥之理挺時甚貧凡百藥物之資皆出二公藥之數日竟卒二公及其屬弔臨皆慟二公又共為具棺歛吴公歎曰何天道之不永善人也其屬相率出資歸其櫬及其妻孥諸司亦多有悲挺而賻之者余時在北京聞挺死甚戚葢不徒戚挺戚吾宗之若挺者鮮也嗚呼惜哉挺字敏達其曾祖師魯祖子尚考彦威母郭氏其娶尹氏子男二儉倜女一皆㓜挺卒於正統三年某月日享年若干葬以卒之明年某月日銘曰夫孰無子克肖豈多亦孰無孫克紹幾何遵矩率規顓顓不忘爰方啓行輪仆軫亡嗚呼挺也寧知吾傷約其平生以志於墓以勵厥後俾承厥度河南道監察御史康孟嘉墓誌銘正統七年河南道監察御史康榮孟嘉奉使廣東明年秋使事畢將歸得熱疾布政使南昌彭公按察使蕪湖郭公合三司寮屬遍求醫療竟不起九月三日也發其裝蕭然遂相與治棺歛且歸其䘮孟嘉吉之泰和人其先見余所作康氏譜孟嘉自少勤學雖貧志操卓然宣徳中舉賢良為廣西按察知事持其言行不肯茍且而勤於職務按察使謝瑾及其寮佐皆一時之賢者亦皆賢孟嘉瑾嘗語人吾輩以友道待孟嘉未嘗以屬而孟嘉事其上官皆謹凡所施於下吏者亦咸見敬愛三載考最刑部尚書匡南魏公前未嘗識孟嘉採諸輿論薦為監察御史益明法意究大體用刑能恕而致勤夙夜操行益嚴不肯枉道狥物嘗廵按浙江嵗餘君子稱其嚴而不察公而有禮得憲體之正孟嘉在察院處其同寮相好無間言獨都御史陳智怙勢騁私昵邪讐正凡其屬之正直者及為正直大臣所舉者智皆惡其不阿狥已而不禮遇之或導孟嘉盍少枉以取容乎孟嘉曰彼所為若是將不自容何能容人無幾智及其所素昵者皆以罪罷黜如孟嘉言孟嘉為人和厚坦易亷潔公正與物無競其卒也士君子皆為之嗟悼其享年四十有八孟嘉余女弟之子十二三從余在兩京二十餘年自束髪聞一善言輙服膺之不混儕流俗今卓立如此余方資賢甥以終老豈謂溘先吾而逝也嗚呼惜哉其配羅氏子男一詡女四長者有歸餘未行孟嘉之葬以卒之明年某月某日銘曰公其所存端其所履不亟不徐以綱以紀嗚呼孟嘉蓋棺事已舅氏之銘庶其不死東里老人自志東里在邑東清溪之上吾髙曾以来居之楊氏宋盛際自吉水徙泰和號儒宦家葢四百年矣稱東里者重所自云髙祖考復圭元贈富州尹騎都尉𢎞農郡伯妣黄氏贈𢎞農郡君曾祖考景行延祐初科進士累官翰林待制朝列大夫妣嚴氏𢎞農郡君繼髙氏祖考公榮妣胡氏考子將妣陳氏國朝累贈三代考皆至光禄大夫柱國少師兵部尚書兼華葢殿大學士妣皆夫人吾名寓字士竒後以字徵一嵗而孤陳夫人鞠之教之既壯起家文學除吴王府審理副改翰林編修陞侍講又四轉至左春坊左諭徳翰林學士又五轉至少傅兵部尚書兼華葢殿大學士遂進少師繇承事郎累轉至光禄大夫柱國厯事四聖皆居清宻越自授官所覬行道心存體國志在濟人惟理無窮盡而學殖未充事有甚難而智慮弗逮故秩愈進而憂愈重寵愈厚而畏愈切進慕陳善退勤省躬而施以公而守以約始終一意夙夜不忘若蒙負乘之譏昧止足之義皓首徒弊毫末無稱反思惕然内愧何已風燭奄及幸保歸全輙循杜牧之故事聊述平生用藏幽室亦以示於子孫闕生世八十年叨禄於朝四十有四年去世以正統九年三月十四日元娶嚴繼郭皆封夫人子三男四女孫男七白雲原吾所治也窆以是年十二月二十日虛其右以俟郭銘曰昔也其浮今也其休曠八極兮逍遥聊委蛻兮兹丘故太常寺賛禮郎嚴紹陵墓誌銘永樂丙申春三月壬子太常寺賛禮郎嚴紹陵卒其從孫鄉貢進士素以其䘮歸葬撫之金谿先事奉紹陵所自述世次行事来請銘春坊吴中允仲平翰林周編修孟簡助為之請按嚴氏出漢處士光之後其始居金谿西林者至紹陵十一世曾祖諱仲建祖諱禮用黄州通判考諱􅴨中母陳氏紹陵諱師尹自㓜簡重寡欲好學問未冠䘮其父母獨外兄陳繼善異視之語之曰子非塵俗人言契紹陵意遂以入黍珠觀為道士師事王冲道鄧伯舟授以𤣥奥日駸駸有造詣洪武己未郡縣以部符選充樂舞生送京師居神樂觀十餘年其自治益嚴而𤣥學益進數奉命代祀古帝王及名山大川擢太常寺賛禮郎階將仕郎陞登仕郎嵗有事於天地宗廟百神紹陵既熟於禮典而嚴恭對越進退周旋執事有恪見重於時累署太常典簿以勤慎稱尤為真人張宇初所知嘗作釣雪圖况之因號釣雪翁在官幾三十年雖孜孜軄闕而其中心泊然不累於物固游乎方之外也篤於宗族先世有祭田歸他姓竭貲贖歸授族人之賢者俾供嵗祀察素有秀質曰此可以承吾宗取教育之又遣從學明經師數嵗素舉鄉貢進士故今主其䘮皆素也紹陵卒年六十有五葬以卒之嵗某月某日銘曰澹乎其外冲乎其内湛乎立於神明之庭超乎樂於希夷之際六十五年電邁猋馳又百千年復来歸哉東里續集巻三十九
