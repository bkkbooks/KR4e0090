body:
  text: 東里續集巻三十明楊士竒撰墓表蔣志祥墓表泰和邑之西四十里曰嚴莊其故家曰蔣蔣氏之兄弟之賢者曰吾貫吾望卜改厝其考處士君乃寓書及翰林編修蕭鎡所具處士君事狀求余表墓余少嘗聞蔣氏之德善於其塾賔蕭尚魯先生而今於蔣氏為婚姻家不可以辭按蔣氏之先居長沙唐季曰紹録者舉進士官至侍中後避馬氏之亂徙泰和初家梅溪里數傳至正卿徙嚴莊至必濟號竹莊竹莊生宗周元袁州學提舉提舉生以信處士君父也世以仁厚致家於饒裕處士君兄弟三人處士其季諱𤣥字志祥㓜失怙而蚤有立志遜父所遺資業於二兄二兄不聽則裁取給用而已不求有餘也二兄强從其志於凡徭賦百需悉不及季鄉里髙其行義然處士躬勤力本儉約率下家亦用裕然汲汲圖紹世徳拓故址作堂名曰正心歲時聚宗族及冠婚賔客燕享悉於斯堂族人不間疏戚貧富咸相親睦有無共之延名師教子姪而躬程督於内子姪亦皆循謹秩秩遵奉處士君之教處士君於鄉鄰賙窮恤匱亦無間焉為人質而溫直而不肆於物無迕然未嘗茍狥人無少長愚良皆愛敬處士君號為長者故自少壯至老所履坦坦無憂患之干蓋年五十有五而卒卒以永樂二年八月十八日其配彭氏繼劉氏皆有淑行子男三長吾敬後處士君數年亦卒次吾貫吾望咸善繼述女一歸劉民瞻孫男十恢亮恢廣恢彦恢貢恢敏恢俊恢周恢重恢仰恢碩恢重予子婿也曾孫男十有三人嗟夫世之不古久矣同氣之親有競毫末之利相與䦧墻甚至相目為秦越者比比也其有能讓同父之業為友恭之行者盖千百之什一若富而能仁其宗族鄉里非古之人乎處士君其應表也敬為之表以示法其子孫鄉人於無窮云贈中議大夫賛治尹大理寺右少卿陳君墓表士有效用於國深被簡知而不為爵禄所縻從容自得不枉其道必其智識明正審内外之辨察事幾之微確乎中而不可奪此不謂之豪傑可乎我國家龍興之初有若金陵陳中行先生者殆其人歟先生諱遇中行其字天資純粹自少篤學博究經史元至正中授江東明道書院山長温州路學教授逺近從者紛集講下元綱不振兵亂四作遂棄官歸隠閒居一室安澹守約名其室曰静誠鄉里遂以静誠號之先生憫世亂益甚每夙興焚香叩天願早生仁聖以活創殘我太祖髙皇帝定鼎金陵時南臺侍御史秦元之素知先生入言於上曰陳遇有輔翼才宜寘左右使效禆益即日召見與語大悅禮待加厚稱先生而不名日侍帷幄賛幾務車駕幸其第者三命之官輙辭臣民既推戴上登大寳所承諮問悉保國安民大計先生竭心攄誠多所獻替命為學士翰林者再皆固辭嘗奉宻命偕中官趙信往視浙江還奏稱㫖賜白金又命為禮部侍郎又固辭間遘疾賜藥命中官挾太醫院官視療時微寒特賜錦被及上供米既瘥入謝上嘉奬連稱君子者三又除禮部尚書又固辭自是不復强之以職每召見錫賚必厚或坐久必賜宴間命廐馬送歸先生秉義懷忠非正道不陳群臣以過被譴者率為解釋上亮其誠未嘗為忤數諭之曰卿老不欲仕有子令帶刀侍衛叩首以子幼辭盖静澹恬退始終一志前後所得賜問宸翰頗多眷待之厚亞於勲戚盖春秋七十有二而卒卒於洪武甲子九月十九日訃聞遣中官賜祭加東園祕器及賻命𦵏鍾山長林之原右春坊大學士董倫為誌其塟陳之先家於曹宋龍圖閣待制義甫從髙宗南渡累官金紫光禄大夫没諡文忠始家建康至理宗朝武功大夫淮南諸路兵馬都統制執中先生曽祖也祖文徳元舉進士授溧陽州判考辛之淮南鹽課提舉妣某氏娶金華王氏繼維揚周氏皆世族子男四孟傑孟學孟徳恭三女傑徳俱早卒女皆有歸孫男六綱紀純綬紹綜女四恭舉鄉貢累官今為通政司左通政有才名於時朝廷以恭貴累贈先生中議大夫賛治尹大理寺右少卿周氏贈恭人於是恭奉事狀拜求表墓余聞先生志尚清逺興韻蕭散味道之餘游心繪事嘗寫髙皇帝御容妙絶當時然未嘗自名世亦無能得之者先生有弟中復洪武中嘗隨入侍永樂初授翰林待詔余數得晤語其為人端重清雅不茍言笑間出論議娓娓近道亦妙繪事為文皇帝所重時中復子孟顒以善書從余翰林簡静修潔絶口不道繪事余間與中復語及之曰此兒頗有志操不屑意鄙事走也少年在先兄側戱弄筆墨先兄叱曰吾豈他無一長汝乃習其下者今雖老每思前言未嘗不内愧然無及矣嗟夫先生履素操潔識明義正革運之際躬荷知遇卒完所守以殁雖一藝所耽昔人不免春苑池之屈先生浩然之存不為時屈非一時之豪哉逮其後來如中復父子猶嗣承無忝又可以觀先生之刑於家也惜其遭際對越之間必有禆國及民之實既不自言其當時耆舊知先生者又物故已盡遂泯無傳故特書其大槩俾恭刻石墓道族弟仲穆墓表吾西昌楊氏自始祖至吾兄弟凡十七世自始祖以下初皆單傳至八世昉析二𣲖皆居邑中伯之𣲖七子居西城仲之𣲖二子居東城居西城者富甲一邑莫或與等而詩書行義卓卓出鄉黨居東城者田園裁足給其詩書行義與西城相髙而忠信之行文學之華逺近欽服而以進士得官累累有聞焉自元季兵禍轇轕數十年城邑荒隳髙門大第莽蒼榛荆瓦礫中人民幸存者百殆一二而流蕩散徙無寧居焉逮際皇明混一之運有能復其故業盖千百之十一於時楊氏之後其僅存者皆退處山谿林谷間雖不廢詩書而自食其力恬澹怡愉無外慕之心族父與良其一也既攜其家之澄江之南一舎許擇雲亭鄉之中村依先塋以居娶龍氏王氏生五丈夫子皆惇厚謹飭其四曰伏生字仲穆事父母甚孝養生𦵏祭一致其誠謹持其身不敢有所踰越教其子必曰毋忝先世撫孤姪有恩意處鄉人恭而能下有言人皆信服平素力於善行所不樂為者浮圖老子之法將卒猶以戒其子蓋年四十有九而卒其卒以永樂十四年八月十九日其大父以上見吾所著譜牒其配邑西陳氏元贑州路推官梅村先生曾孫盖陳楊世婚姻家如古豐朱陳云其子男五徳崇徳純徳修徳淵徳敷女一孫男十四女五曾孫男二徳敷正統二年進士授大理評事楊氏城西之𣲖以進士得官實肇於徳敷人皆以為有父之賢也徳敷嘗求表墓故特為之書袁進士墓表正統四年八月十九日泰和進士袁和卒於家相知者皆悼惜之盖惜其負才諝而未見諸用也袁故邑中文獻家科第仕宦累累有聞於宋入國朝以科第進昉見於和又遽已矣知者焉得而不惜哉其髙祖以寧曾祖務敏皆恂恂温雅為鄉善士吾童丱時皆親炙之其祖克睿父仲暹亦克世其徳余少皆與之同學和字淑景自少頴悟過人好學問從鄉校師同門皆推讓之御史及藩憲之臣行部入學宫察試諸生文藝皆奬重和既去之他學必舉和以勵衆由是江右十三郡六十九邑之學皆知慕和既選中鄉試及㑹試中副榜當授教官有㫖令進學北京國子監以俟下科遂登正統元年進士第循例觀政禮部奉使命廣東竣事還過家省父母父以疾没既殯矣號慟乃起北趨復命遂請銘歸𦵏父居喪謹禮服闋將詣京師得疾遽卒享年四十有六其為人疏通警敏善經畫明知人揣事勢後當何若率中謹持其身居家孝友處宗戚朋友鄉黨有急能赴為文操觚立就而皆傅理有志事功以用無往弗宜而遽不起豈非其可惜哉母陳氏前進士興寧縣主簿士瞻之女初娶白氏繼室卓氏子男七勝舉肇敞監繼吉肇余孫婿也敞先卒女二長嫁梁英次尚㓜孫男一昉余仕於朝四十年己未之春始獲䝉恩歸展桑梓時平昔親交凋謝已盡獨淑景以姻家子弟旦暮相往還出入相扶助談論浹洽余甚期望之也别未數月遽聞其訃悼歎不已故為辭哀之使其子刻諸墓辭曰才之生兮豈多命不延兮奈何我懐之人兮徒永嗟封徵仕郎虎賁右衛經歴仰君墓表蘇之長洲有孝友謹勑之士曰仰仁澤鄉邑宗婣重其行無間言嘗以其子之貴封徵仕郎虎賁右衛經歴春秋六十有七而卒吾友翰林檢討陳君繼銘其塟其子瞻告余曰銘掩諸幽矣惟先人之篤行宜白於外也幸先生書其墓上之石雖没不朽按陳君所述仰氏家長洲仁澤諱澤父均達母龔氏父坐累謫戍五開去蘇數千里仁澤時甫弱冠留養母撫弟妹然中心悲念父困苦逺道日夜無已一日跪白母兒請往省父母歎曰汝尚少素未嘗越戸限百步外奈何冒險阻逺渉對曰兒年及丁矣人行萬里豈皆其素熟哉遂辭母擔簦獨行數月達父戍所父子相見歡甚事其父曲盡愛敬凡父日用所需措置悉備又數月父諭之曰吾豈不欲父子之同於此也吾行時以汝母及弟妹付汝自汝來吾日夜念汝母及㓜男女之無所倚也汝寧不體吾心乎且吾在此足自給汝母及弟妹之給不逮吾也汝其歸哉諭之再三强辭歸歸而孝事母撫育弟妹皆盡心弟没又撫其遺寡孤甚厚弟之婦其外家有强之改適者婦歎曰母子奚不足而他適乎守節不聽女兄及其夫相繼殁撫其遺孤如已子赴族姻朋友閭巷之急恒若不及治家循禮度而教子以忠信儉勤安義命為要噫此其所為見重於鄉邑宗姻者歟卒於宣徳八年十二月廿一日配鄒氏封孺人先卒合塟里中章墓涇之原子男二長瞻次恭女一適李㢲孫男女皆五瞻舉鄉貢初擢虎賁右衛經歴陞大理右寺副遂陞大理丞端直之存平恕之施清勁之操卓然於時固其本之於父也此仰君之墓宜有表也蕭徳資墓表屠維單閼之嵗余歸自湖湘邑東南桃源蕭氏聘塾賔蕭氏邑鉅族於是時老而夀俊壯而英彦風流文雅彬彬焉余講授之暇相與周旋論議尊俎詠歌或登山而攬白雲或臨清而玩游魚無日不樂盖自其先世饒於貲隆敬塾賔而前之賔其塾者多名人他之號鉅族者不及也余留塾僅嵗餘蕭氏晜弟中徳資相與綢繆特厚及余被召入翰林在兩京徳資屢以運賦至公事畢必過余從容留累日相勞苦道舊故臨别必有依依不舎之色遂約為婚姻又數年其子承恕書來求文表墓知徳資謝世為之傷悼不已徳資孝友惇義於財利落落不屑意賒貸有無償不計讀書通其大㫖喜賔客尤喜承接儒師君子而淳質自用恥渉權譎事名家居之堂曰懷徳奉親訓子之外循行畎畝視僮奴耕耨以此自足如不知世有理亂榮辱者非古所稱善人者歟徳資諱資徳資其字蕭氏之先出梁國子祭酒子雲之裔在宋曰伯原自峽江來知泰和縣遂留家焉孫漢卿有科名於時至士鳴生文翁文翁生斯賢端重魁傑元季之亂一鄉頼之為砥柱生安常志行肖其父洪武初父子相繼長萬石區鄉人徳之娶某氏繼某氏六子其五徳資也生洪武乙卯四月六日卒於宣徳壬子二月七日享年五十有八塟沙坑之原徳資娶康氏子男四承紀先卒承翼承恕承節承恕余子婿女二朱鴻劉紼其婿也孫男二禎馥嗟乎習俗日媮知好利鮮知有義茍惟知利馳騁其私智詭術靡或不至然卒及於僨覆彼其初視徳資之能率謂不已若也而徳資優游恬愉卒保其譽名以終善豈不可為乎吾故表之以示法其後之人羅孟昭墓表泰和縣之西郭有處士曰羅孟昭甫年八十卒其子刑部主事崇本縗絰踵門泣拜請文表墓道余既弔之而竊自歎前三十年嘗表其母之墓矣其冡子之卒而塟也又銘之予乃志其三世之藏耶然素於其父子往還且心有重於孟昭甫者不得辭羅氏之先家縣之仁善鄉梅山里後徙坳頭里貲産豐碩稱坳頭羅氏孟昭甫之髙祖仲實罹横逆以死而家遂落祖均瑞失怙五嵗隨母張適劉茂林因冒劉姓既長能自奮而家復振均瑞生三男子孟仁夀仲文夀季良夀兄弟益奮以振仁夀孟昭甫之父也母劉孟昭甫諱道生幼頴敏父母愛之遣從學鄉先生蕭尚仁無幾郡學選弟子員時吉水顔仲偉先生為教授又舉入郡學從顔先生既為二先生所愛方日嚮進而以病罷弟子員歸養親後遭父喪遂不出孝事其母恭愛其兄弟嵗有司驗産甲乙出徭賦孟昭甫率先盡力未嘗為茍避計嘗輸税之京師次池州適暴風盛作望中流有覆舟舟中人浮沉水上不能自救孟昭甫號於衆曰有能以舟拯活一人者吾予米若干數人者如其言馳赴之凡活五人即如數子米五人者徳孟昭甫更生已也拜且泣曰我等皆黄湓湖畔人也今無以報公願得公姓字歸書於家之先祠吾及吾之子孫朝夕致敬以祝公夀福後有過湖畔見五家書孟昭甫姓字皆如其言孟昭甫有二子漸長慨然自念吾蚤丁家多故不及學今幸有子又不俾之學吾則不父遂作北齋禮致明師教之若尚仁先生及其子靖江府長史用道龍泉縣學訓導龍仲雨廣西按察僉事陳公延皆其人云恒重水木源本之念曰冒他姓而不反是棄吾祖矣遂及其兄弟恊議白有司復劉氏閒居喜觀史鑑以考古人之言行無益之物未嘗留意以勤裕家以儉自用而待賔客必豐腆一日得疾衆醫環視之而藥㒺效孫鏞請禱曰命也何有八十之年尚事禱乎汝曹其務學毋自棄且語汝叔忠謹奉職毋忝君親言已遂卒宣徳九年二月廿八日也元配韋氏繼胡氏子男二長􅋒舉鄉貢為國子生前二十年卒次宗本宣徳二年進士刑部陜西清吏司主事女四袁仲彬胡秋輝樂象明嚴思濟其婿也孫男三鏞翰翀女三曾孫男一浚余之有重於孟昭甫者盖雖大賢君子不能無過昔子路人告之有過則喜先儒以謂亦百世之師今之為士亦皆有子路之心乎雖千百未嘗無什一然好諛而惡直者多也間一聞責善之言不為巧辭以飾則毅色厲氣以捍遏甚者詬為謗已而仇讐目之其有能自反而自咎者乎是以其徳日隳而譽日卑焉余家居於孟昭甫雖往還不數數也後在京師孟昭甫偕其所厚湯如川過余廹暮止宿出酒相勞道及間濶時事如川伉直人也屢引事為讓孟昭甫受之怡然曰非公愛我不及此敬受賜矣而飲酒甚歡余猶意此一時彊服也久而察之無纎毫拂逆意余他日亦一二事讓之孟昭甫駭愕曰是吾過矣亦怡然受之不為迕而自是於余往還加宻嗟乎虛已而聽聞義而服孟昭甫何可多得哉此余所為重之者也使世之學者皆用是心以求益何患於無成吾故表之為勸嚴處士墓表永樂十四年十二月初九日泰和之處士嚴俊徳甫卒其塟也前翰林侍讀梁潛銘之矣處士之子頎等具行實并書來京師求表墓士竒先大母朴山先山𤣥孫與處士之父兄弟也士竒又娶朴山六世孫故處士見厚有素義不可辭嚴之先家馮翊唐末徙居廣陵五季又徙金陵金陵亂遂徙泰和泰和五世至震宋舉進士為常州推官其子執衡臨安通守臨安六世至肅祕閣校勘朴山先生也見掲文安公傒斯所為碑文子用甫元髙安縣尹見吳文正公澄所撰墓誌又三世至從禮洪武中國子學正娶鄭氏宋端明殿大學士瑴之後生三男子其長處士也諱定真俊徳其字處士幼質愿克謹不與羣兒狎學正先生授之業程度日嚴必勉至焉既冠以其學出教里塾里中從學而貧者皆不取其束脩曰吾豈以是為利哉先生在太學數年留處士治家事嵗必一再往省京師致供養之需先生殁塟祭不違禮恬進取布衣於閭里之間非賢人君子不相親厚有餘以貸人不茍計息貧不能償者併所貸不取教子必務學曰此先人世業也又曰人之行求内無怍於心上無怍於天此吾所以盡心焉者爾曹勉之恒自負其家世不肯茍且屈下士或猥𤨏諂佞賤視之如草芥以此寡合而邑大夫禮士之賢者及嵗舉鄉飲謀賔合東西郭不五六人處士其一也嗚呼賢矣處士之卒也年六十有二其配龍氏邑西甘溪里名家四子頎頊頤預頤江隂學訓導孫十曍晰曦昭明晅昉時冔曖古之君子稱道人善必本其所自士竒童丱時及親炙學正先生先生方嚴清介士竒以姻家子孫每見必承訓飭盖至今追憶使人敬憚不敢有侈心處士其冢嗣非得於家庭者厚乎嗚呼西昌前數十年前軰方正君子如先生者多在故士有善行鄉有善俗而今不無可感者矣則吾於處士安得不推本言之哉紀善康君墓表梁府紀善康君孔髙年六十卒其子頮以翰林修撰曽鶴齡所為行狀請表其墓余於孔髙少年里巷交游也不可辭按狀康故匡氏唐有匡胄為吉州判官始家西昌祁洲其後曰稠者仕江南李氏為蘄州刺史歸宋避諱改氏康稠之後曰克俊徙居邑中晝錦坊再世徙平易坊又三世至仁安蚤卒洪武中詔旌表其妻陳氏貞節仁安子徳昭娶尹氏生二子長孔猷次孔髙也諱岳少從鄉先生蕭子上治書經中洪武丙子江西鄉試明年禮部㑹試中副榜授祁陽縣學教諭改雲南縣學又改零陵縣學丁家艱服闋又改景陵縣學歴四學九載陞南陽府學教授所至正師道訓諸生皆有成績廟學壊者葺之士習陋者革之廣西四川鄉試皆聘考官嘗一赴四川士服其公永樂初歸自雲南聞繼母蕭病枉道趨省留侍九閱月刑部奏當杖仍教諭邊縣上曰母子相違萬里一見有難遽舎况於母病特宥之而除零陵仁廟封建諸子命吏部慎簡王府官尚書蹇公得孔髙所試文亟稱其學孔髙時引疾屢辭不聽奏授梁府紀善孔髙致恭厥職王待之厚嵗餘謁告歸省先塋至則疾加遂奏乞解職從之歸至臨清不起宣徳己酉六月廿二日也塟以某年月日孔髙有孝友之行惇義薄利初出贅劉氏劉僅寡孤在孔髙為維持門戸長其孤穉有立然後歸不私其利一毫朋友死遺孤無依者取為已子教育之嘗積穀外廪饑嵗有擅發貸人而不償者終不問在祁陽有商人病久其侣棄之去者孔髙邂逅取歸予藥食及瘉又予道里費遣之在南陽淦楊氏子行賈而盡喪其貲貧困依孔髙孔髙衣食之授之經後舉鄉貢去其急義㮣類此然未嘗有徳色為人抗直不事矯飾有文集若干巻藏於家元配劉繼羅四男五女皆劉出男頤頮頊顒頮舉進士今為大理評事顒舉鄉貢郭公綸辰州府學訓導陳禧劉臯曽顥羅某其女之婿也孫男七士之學也在明夫義利之辨世之褒衣博帶譚周孔而名道徳者或於利毛髪許不相遜下於視所親愛陷溺略不一動心引手或更下石焉者此烏在明義利也哉嗚呼孔髙其不忝矣夫其不忝矣夫故承徳郎北京行部主事劉子政墓表嗚呼吾與子政甫别二十有五年每思鄉之善人端士未嘗不在子政甫而今已矣余聞之悼歎不置於是子政甫之子孟鐸求余文表墓余雖病不復辭子政甫劉氏諱正其先居吉之安福後徙廬陵雙溪之金竹里曽大父景山大父宗敬父原凱母戴氏子政甫晬而喪父又數嵗喪母稍長克知自立務學通古今而躬行實踐先是宗敬弟宗仁仕元為貴州路總管邀宗敬偕行㑹兵亂道阻不得歸國家平定海宇子政甫年十七徒歩走貴州迎大父歸養大父時已九十顧語子政甫汝誠孝然吾耄且病不堪逺渉吾既久於此矣且諸孫侍養不乏人即死塟此吾安焉不願歸也汝歸其修復吾田廬不以隳先世汝之孝也既歸書思復二字於堂以自勵几先業為勢侵豪敓者次第悉復乃復走貴州省大父則既没而塟矣又以諸從昆弟執治命不聽歸塟大慟而歸而恒慟不逮養父母嵗時薦祀必誠必戚事二姊盡愛敬教子與孫必在勤問學務謹勑初孟鐸在翰林聞父母皆病言於朝乞歸省其詞懇至特命歸侍數嵗父母病皆瘉子政甫顧孟鐸言汝弟皆長有立汝勿以父母故而後於君汝往哉孟鐸遂詣朝授吏部驗封主事改北京行部吏曹主事宣徳元年賜勑命封其父母子政甫為承徳郎北京行部主事母戴氏為安人人皆為子政甫榮子政甫執謙退而益以修臣職報君賜飭其子子政甫為人忠厚恂恂非其人不交非其當得不取於朋友有信於鄉黨能恤貧周急平居課子孫詩書外偕其同志二三軰放意雲林泉石之間翛然塵表也喜藝菊嘗自號菊圃盖春秋八十而卒其卒以宣徳五年五月一日其塟某原塟以某年月日子男三孟鐸舉進士為翰林庻吉士再為吏部主事存心行已有儒者之度次仲鑑次季鑰女四李昌復戴仲實彭志昂戴若瓘其婿也孫男六女七曽孫男四子政甫嘗一至南京與余比屋而處連月故余知而敬之恒以謂使世之人皆子政甫何患乎風俗之不厚治效之不古若故於今表而著之非獨其子之志亦余心有所不容已也靖江府紀善羅君墓表廬陵羅宜範郡舉材行詣京師從事兵部三年擢肇慶府照磨以其父紀善君墓表為請按狀羅氏始自豫章西山徙廬陵初居邑之馬凍里再世徙太安族益盛而以謹禮名家十六世曰士敏惇儒行其子啓南耿介務義元季盜起將攻郡城啓南傾貲募勇從郡守禦諸吉水大抗既敗之而郡守欲分衆圍盜啓南固争衆不可分不聽盜見官兵分勢薄遂奮决圍出啓南力戰死之其冢子齊正繼亦死於盜啓南紀善父也母楊氏紀善諱澄字齊淵未冠而孤痛父兄之没於王事也語及輙流涕嗚咽而事其母至孝事寡嫂如母撫孤姪尤盡心而苦志學問從鄉先生羅伯剛受詩經雖時兵革未息勤夙夜寒暑不少休名所居齋曰惜隂遂博通群書而躬行為務國朝既平暴亂靖宇内修教養之政邑大夫禮為社學師洪武十五年以薦徵詣京師授四川蓬州儒學正旦夕坐講堂為諸生辨析理趣必達乃已諸生所奉一錢以上悉不取曰吾職教受禄矣其學者多成效滿九載天官考其績最奏陞靖江王府紀善嵗餘卒於官廿六年二月六日也享年五十有六為人外和内明臨事能果遵用家法不事老佛及祭非類里有病疫衆引避莫或過問者獨往扶持供餽之卒亦無恙善知人凡其所許與後率有立配李氏元柳城縣尹尚文之子渉知書孝敬清儉後十年卒子男三著楷蓬著萬載縣儒學訓導楷即宜範女二王誠思周如神其婿也孫男八宜範在京師主余家塾三年聆其言察其行皆君子也今考知紀善平生如此蓋知其有所本於家矣為表之以示法其後固仁者之事也東里續集巻三十
