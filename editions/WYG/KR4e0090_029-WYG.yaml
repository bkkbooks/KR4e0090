body:
  text: 東里續集巻一明楊士竒撰記恩榮堂記臨江屬邑三而淦為鉅淦初𨽻吾吉與吉宻比如東西家至今其人秀厚其俗好義而尚文與吉同吾四十年之前嘗􅋈舟西岸升金川驛而四望截乎玉笥諸峯之雄秀浩乎章江之大且深其間車馬之轇轕南檣北棹之絡繹則莫非馳騁乎榮利之為也顧近驛廬舍櫛比壤地肥沃其人勤於稼穡耕者耘者收者饁者皆俛治所務不茍舉目左右睨眎余間即而與之言亦皆充然有自得之意為之歎曰世所稱務本之民非斯人歟今年兵部員外郎毛俊以其所厚鄭宗魯來見曰朝廷用有司之言嘉宗魯出糓二千石助賑饑賜璽書旌為義民遣進士齎勞之今詣闕謝既竣事不可不進謁鄉先生君子以快所慕余詢其邑里曰淦金川驛之近也曰其土習人心吾得之矣與之為禮明日宗魯介翰林侍讀習嘉言求記其家之恩榮堂問堂所自曰璽書之初下也炳然如日華星采照耀乎堂中族姻鄉䣊群聚瞻望於堂之外莫不舉首加額忻懌感動以為鄭氏非常之遇既建閣以庋璽書族姻鄉䣊相與載酒崇殽於堂以為宗魯慶且共名斯堂曰恩榮此宗魯之願記之也余曰於乎盛乎聖天子淵𠂻夙夜在民有能出力以效助恤必垂褒嘉盖奬一所以勸百廣大之仁也宜記世之大官厚禄揚揚髙車駟馬而有不能出片言寸力以及民或反為民厲者宗魯豈嘗霑一命與升合之禄哉畎畝之間自食其力乃能仰體皇仁推已之餘以濟人之不足宜記族姻鄉䣊之為宗魯慶也盖秉彜好德之心所同有唱焉必有和焉此邦之義有不繩繩而繼起者乎固自斯堂啟之也亦宜記以俟習君又為余言鄭故邑中九湖尚德之家宗魯於周急振乏之施非一朝夕矣五子諸孫耕讀外無他慕則本諸先徵諸後者皆可知矣因併及之茨溪劉氏祠堂記吉故多文獻家文獻多劉氏而不同所自出安福茨溪之劉出漢長沙定王之子安成思侯蒼安成在今安福縣西四十里故侯之湯沐邑侯子孫因家焉其邑嘗改為市又為村以侯故皆名湯其地有溪名茨皆漢之舊也逮五季劉氏有曰五處士者鄉號長者其子孫始盛而皆襲儒業宋校書郎粹樂清令廷珪新喻令廷直刑部郎中夢才漕魁應登建昌簽判應鳳元沔陽守聞皆發身科目别以學行發身及隠處不出者尤多而皆有賢稱國朝繇學行發身及隠處者亦多而賢稱不乏繇科目發身者今翰林侍講球及其子庶吉士鉞也余與侍講同在舘閣數年間求余作茨溪劉氏祠堂記其言曰自先大考新齋府君始繇湯村徙邑忠孝里之葛洲先考文園府君即葛洲創作祠堂而成於球之叔及球兄弟祠祀四代其制度禮儀悉遵朱子所定而祠仍茨溪名者表所自也宗子琮主之求祠記琮之志也余惟古者國君下至命士皆有廟孔子教孝曰為之宗廟以鬼享之凡古君子營室必先宗廟自秦壞先王典禮而廟廢漢世公卿或作祠於墓晉以後稍復廟制至唐公卿皆作家廟不作者有譏及五季廟復廢宋慶歴初詔文武之臣立家廟時作者甚鮮盖士大夫溺於習俗安於簡陋朱子以廟非賜不得立遂定祠堂之制於是重水木源本之念者皆得伸其追逺報本之誠矣然世遵用之者猶鮮盖非惇仁尚禮之君子不能也茨溪劉氏服詩書秉禮義數百年而代有聞人此祠堂所以作歟孝者六行之首也達之於事君於澤民皆自兹始將劉氏之賢有聞其可量乎吾於祠堂之作卜之矣凡世老釋之宫有作率得名公鉅人為之記述誇詡祠堂者知禮復古之為其係於人心世道非細故也其可無記故敬為之記祠經始於宣徳二年十二月成於明年七月記作於正綂三年十月云勑書閣記勑書閣者吉水曾希恭尊庋勑書之閣也希恭嘗出糓二千石於官助賑饑歳縣聞於朝遣行人齎勑勞之旌為義民且復其家此閣之所繇建也洪惟聖天子體天之心法天之道以覆育天下夙夜孳孳慮或有一物之失所者或遭嵗饑撫循賑䘏之使旁午道路於是四方之民咸知聖志所嚮爭趨奉承發廪傾帑以助濟給如已當然盖前此所未見者豈非上之仁有以感之乎夫仁義禮智之心不間乎貴賤上下皆均有之惟在上者躬行以率之耳傳所謂未有上好仁而下不好義者也於是有司奏出榖濟民者悉賜勑奬勞旌其義而復之而勸賞著于令甲然民之斯舉也昉見於吉水胡有初再見於希恭而然後見諸四方益多何也吉水吉安屬邑吉安故文獻忠節之邦仁人君子詩書禮義流風餘澤未已也矧曾之先徳行文藝著之史冊郡志班班可稽其薫炙漸陶固有本矣不然何以其感發興起之獨先於衆乎嗚呼一仁道之行而上下交盡其心太平盛致也猗歟休哉勑下於正綂二年九月廿四日閣成於是年十月某日既成希恭介給事中劉益請記嵗月并繫之詩云帝御下民敷仁如天察餒與寒𢎞圖利安仰體帝仁時維良民嵗歉弗給以助以粒助豈曰多厥心孔嘉吉有曾氏克允蹈之帝聞噫嘻曰予表之汝忱義民予嘉賚汝龍光昭回自天來下百千億年偉曾之華推利樹義福其有涯凡世厚藏曷不惟義義為福阯請視曾氏交翠軒記江隂之東鄙介常熟無錫之間周氏世居焉周之居負江流而面群山顧山屹乎前虞山立乎左恵山峙乎右寔三吴勝處環居之近雜植松栢檜竹甚盛蒼翠鬱然凌雲日而並秀傲氷雪而不移爽籟時發埃氛不侵四時一致也周氏之良者伯曰孟徳仲曰孟敬有雅致喜與賢士大夫遊中書舍人金文鼎過之為數日留大書所坐軒曰交翠盖賞其趣之可樂也孟徳兄弟屬縣文學嚴士正求余記之士正之言曰江隂之俗樸厚簡静有㢘耻之尚無乖爭之風故素稱道院周氏邑舊族世務善仁力稼穡不營仕進而好義樂施恒恐後予聞士正言而歎曰鄒孟氏有云賢者而後樂此周氏斯軒之樂何徃不可致如其人牽於外誘屈志役慮惟日之不足雖有斯軒克有斯樂乎孟徳兄弟所存所務度越常流其樂也固宜抑吾聞周氏豐於産甲乙其鄉也如公私之需叢脞于前亦豈能漠焉忘情而自怡於中哉今幸逢聖明在御惇用先王義民之政自常賦外無纎芥徴歛之下及又簡求㢘厚者以寄撫字之任凡暴胥悍卒之迹皆收歛閉藏而閭右能推有餘以振不足者徃徃被璽書褒諭且復其家孟徳兄弟日遂閒逸用欽體聖朝仁民之心益充其施義之志其樂也未艾若夫務詩書明禮義以孝友慈睦之行施諸尊卑長少之間惇於家化於鄉而一塵不滓其靈臺丹府俯仰無怍天趣悠然其又樂之至也吾願周氏賢昆季之皆進乎是也請書為記其不視為迂言否乎士正曰交翠其亦有取夫朱子賛濓溪先生之㫖然則太極圖通書之藴凡吾所謂至樂者豈必他求哉蕭氏林泉居記吾邑之南五里所澄江之隂有蕭氏其曰自愚者自少學老子法居黄茅岡之白鶴觀善畵龍吾童子時屢造其存誠之堂或戯弄其楮筆瞋目謂余不及早學為霖雨事乃欲翻道士墨瀋驚起雷電耶而掀髯以笑自愚時年已七十為人磊落䟽暢超然塵表也繼識其姪以徳恂恂謹愿善畵天神古佛菩薩然亦老矣後識以徳之子士信以寫真遊兩京又識士信子于喬益精其父之藝嘗至南京大夫士求之者衆尚書蹇公尤重之後十餘年于喬弟于京來北京其藝加精於寫貌酷似一時京師之寫真者皆稱其難自尚書學士以下率喜而求之日酬應不暇而於吾家臨摹唐李杜宋歐陽司馬周程邵張及胡澹庵諸君子皆精妙于京為人温靖恭遜不恃其能而益務進吾尤重之間出所得林泉居詩文求余為記盖得尚書胡公及翰林諸名公之作可為富矣非其藝有以動諸公而能得乎林泉蕭氏之居也環所居彌望皆平曠膏腴壤宜耕稼竹樹茂宻石泉溜溜其南則天柱之峯特起而聳秀又南則三顧之山駢立如筆格又南則東綿閬川諸山如屏如帷連延衍迤其東則匡山雄偉𢎞愽勢鉅而尊其北則贑江茫洋奔放帆檣泝洄絡繹無已而白龍之洲金魚之浦及官府城邑樓榭室屋如蜂房如鱗次皆阻江而望也又阻江而西望則武山嶻然峻厚而尤竒皆可眺可恱宜幽棲者之適而近居之西數百歩則陳覇先之故壘其遺跡宛然想像當時英風偉烈不可復見徒見纍纍荒丘於榛荆莽蒼中可為嘅歎然事逺不足究姑即耳目所及者吾四五十年前嘗經其地於是其旁近貴者有焉富者有焉而一轉目之頃貴者固不可常恃富者亦多消落匱竭甚者其子孫澌盡其居第不為瓦礫之墟則或數數易主可勝嘅哉乃若蕭氏者吾及見其五世愈傳而愈衆又皆克紹髙曽之業而愈精方取重於當世聞人未已也則知凡世之矜其富貴馳騁快意而不務徳者未必可恃而静貞有常不變者可以持乆也蕭氏後之子孫尚益勉之乎是為記正心堂記右軍都督府左都督李英士傑以正心名其退食之堂求余一言以自勵余曰賢哉士傑之志也人之所以為君子所以承福慶皆本於此何也心者一身之主所主既正斯無徃而不正亦無徃而不吉矣心者四端七情之㑹也其體用之大存養之方古昔聖賢言之備矣亦士傑聞之於儒者熟矣無俟余言雖然士傑之志其固有在歟君子之仕其道之大者上焉事君下焉愛民君猶天也事君如事天而可以弗盡心乎哉一言必敬一事必敬表裏始終一於敬然後可以為事君而必端乎所存者能之民者吾君之赤子而命我恵養安利之也愛民所以事君而可以弗盡心乎哉必使窮困者咸遂其生長幼各循其分有以自適而一毫侵漁淩暴之不及然後可以為愛民亦必端乎所存者能之士傑之志非在於此乎士傑事太宗皇帝累官至指揮同知事仁宗皇帝陞都指揮同知事上超陞今官遭逢三聖極人臣之貴又躬受西鄙一隅之寄是宜圖所以事君愛民不能蹔忘於食息之頃也歟抑事君愛民皆始於事親之孝而繼其親志又孝之大也吾聞李氏世家西夏勝國時其曾大父以下皆有禄位其父南哥洪武三年以西寧州内附歴四十餘年積官至都指揮同知忠事朝廷益乆不懈其母王故貴臣之子智行卓然其夫嘗朝京師所部及其親戚有叛者欲脇之偕去毅然罵曰吾豈從爾為逆哉衆懾而止此皆焯焯在人耳目者士傑豈可一日而忘繼也哉士傑果毅敏達嘗屢擒叛冦又發斥大姦乃心恒在國家可以觀其臣節矣然終者君子之所謹易曰有終吉書曰惟其終士傑之惓惓端乎所存亦必在於謹終者乎余與士傑同朝其有志乎善道也余何愛於一言故以是書于堂中資之朝夕覽省云耳西園雅集圖記中書舍人陳登思孝得閩人朱孟淵所作西園雅集圗贈余西園者宋駙馬都尉王詵晉卿延東坡諸名士燕遊之所也當時李伯時寫為圖後之臨寫者或著色或用水墨不一法此圖用水墨清韻灑灑可愛燕集嵗月無所考西園亦莫究何在即圖而觀雲林泉石翛然勝處也有磵源逺且厚紆折奔放而下磵左右巨石連延峭㧞有壁立其勢數十丈如削有方整如屏立横磵石梁平廣若砥瀕磵地夷曠有古松五株檜一株崇者勢淩雲際斜者若倚盖皆蒼翠蓊鬱類含霧者而檜根迸露斜出類猛獸狀林竹森然扶踈蕭爽可數蕉一本生意暢茂儒衣冠十有四人僧道士各一人坐松下憑按伸紙握筆而書者東坡居士對竚而觀者晉卿側立居士之右張文潜傍坐而俛觀者蔡天啟别據按展巻畵陶淵明歸去來圖者李伯時傍坐憑按而觀者子由持蕉箑立子由之右黄魯直立魯直之右陳無已立伯時之後而按膝頫視者李端叔坐伯時之右就按而觀者􅄯無咎面石壁而立濡筆欲書者米芾立米之後觀書石者王仲至趺坐石屏下論無生之㫖者僧圓通袖手並坐而聴者劉巨濟坐檜根摘阮道士陳碧虗持羽扇對坐俛聴者秦少游也又有侍女二人雲英春鶯晉卿家妓也童子四人一袖手立一捧硯一持靈壽杖各隨于後一對竈㵸茗其家僮也而古琴罍鼎尊勺茶具咸備嘗見熊天慵題伯時西園圖詩及黄文獻公述古堂記皆與此合文獻據鄭天民之記鄭記作於政和甲午其可徵無疑而余近見廣平侯家有劉松年臨伯時圖位置頗不同無文潜端叔無已無咎四人器物亦小異然聞後來臨伯時者如僧梵隆趙伯駒軰非一人洊更臨寫則必不能無異而於以見晉卿之好賢重文及諸君子之髙風逸韻蕭散不覊光華相映如衆星之聨聚如群玉之陳列與夫從容太平之盛致盖有曠數十世而不一見者其可為盛也已因參考而志諸圖之顛寧國府廟學重作記孟子論行王政之要養與教焉耳為國家簡賢能任斯寄者莫重於郡邑郡邑得人則民足衣食而循禮義不然則否故安民必在於得人稽古自漢而下郡邑得人以任斯寄紀諸史册代不數人可為難矣我國家以教養責守令視其績之殿最而黜陟之為勸甚盛典也然猶有祗焉有忽焉盖賢否之不能齊也寧國古宛陵今畿内名郡山川清淑鍾於人為徳行文學之英才猷政事之良閨門之節操風俗之敦厚具於志聞於時斑斑可考見矣近數十年驕奢頑傲譁訐之風徃徃有作雖不過千百之十一亦豈其性之素然哉非長民者之失其職而施教之昩其方歟臨川袁君旭發身進士始為江津縣一志安民凡所設施郡悉舉為諸縣之法正統初元陞守寧國知其民之本善而歎其俗之下趨也於是脩政令清弊蠧勸稼穡明教化郡以大治遂撤故一新廟學作大成殿六楹奉先聖以及四配十哲東西序各有十二楹以居從祀之賢前作㦸門又前櫺星門皆六楹鑿泮池於櫺星之南為三梁繚以周垣殿之後作明倫堂暨左右明誠育才興賢進徳四齋各六楹堂後建重屋六楹以庋制勑榜曰御書之樓作文昌閣六楹在櫺星門之東若師生㑹饌之堂藏脩之室暨凡庫廪庖厨秩秩咸具乃復學故地三十畝於豪據在泮池外之東南營射圃作觀徳之亭於中環植松竹千餘本經營之周宻規模之𢎞偉可為盛矣材良工堅費不損公役不疲下盖上以義倡下以義從誠意孚合斯以其成之之易而為郡得人之效也昔者聖人作易順性命之理立人之道曰仁與義仁義天之所賦於人者惟聖人者得其全聖人之心即天之心一以生物為徳也自伏羲至於文武周公皆得位以行故當是時世道隆而民生遂非後世所及孔子不得位然聖人之心未嘗忘斯世也盖曰不得行於今可行於後於是推明先聖之道立教垂範刪詩定書賛周易作春秋啟發性道建植綱常以開人心以興化理後有明主必取法焉然後君臣以正父子以親尊卑以序風化以興二氣以和萬彚以以成孔子之功在萬世所謂生民以來未之有者也冕服南面春秋之祀尊同社稷與天地相為悠乆所以崇報也游於斯者進謁於廟則思先聖之道原於天不可忽退講于學則思先聖之道當力諸已不可怠致力於已則仁義其要此諸生所宜惓惓也袁君字廷輔㢘正而明果愛民而體道卓然賢守為南畿之最是役也經始於正統元年十月成於二年十一月記作於八年四月求記者學訓導豫章萬脩齡云旌義堂記正統三年六月十日上遣行人盧懋齎璽書旌江西吉安府泰和縣民蕭襄為義民盖自上臨御以來四方之人仰體皇仁出榖縣官預備賑荒事日有聞於上悉賜璽書旌褒時士竒兼掌内制每私恠斯舉權輿吾郡而未聞吾邑有一人繼者盖歴三歳始見於襄吾與襄同邑有連且嘗作賓蕭氏塾固知襄必能為義然猶恠其獨緩也今年過鄉里里耆老為余言襄之圖效義乆矣屬時令丞闕簿攝令事襄具材作義廪言於縣請以𨽻官又言願出糓納廪以備賑饑縣吏需重賂乃行襄私竊歎曰以賂吏曷如及饑時襄以賑民乎不肯賂吏亦竟不行明年吉安府通判佘君來掌縣事襄復言之佘君大喜即日遣其佐眎襄所作廪而内其糓凡千二百石遂聞於朝斯其所由緩也嗟乎水旱在古聖人之世不能無惟古聖人有備焉故其民不病今民比比能仰體皇仁為先事之備食禄者乃有不能或又夤緣以為己利彼獨何心如佘君之明治體豫民患卓然其今之循良有司何可多得哉若蕭氏之務義厥有自來非昉於襄也昔襄之大父思和甫父安正甫當元季冦亂所在靡寧思和甫父子挺然發帑倡義保障其一鄉終亂不見兵禍至于今號其里曰桃源我國家靖宇内定法制簡富民長萬石區俾董徭賦思和甫與焉惟義之行上下賴之後安正甫繼焉一循其父之義及襄偕弟應又繼焉皆循大父父之義尤恪慎介然不一毫茍取其區之民有横恣不律者率畧之弗校有艱窶不給者恒加䘏之盖蕭氏施義其鄉昉於襄之大父父而至於襄益篤也玉音下逮龍光煇煌真無忝也矣豈若世之驟興於一人偶見於一善而濫冐寵錫者之可同日語哉余既名襄所居堂曰旌義襄來北京屬書之余惟其宜書者有三泰和之民以效義荷璽書旌表自襄始一也佘公之㢘公明決二也遂併蕭氏世徳書之襄字徳賛惇孝友而端厚謹静有仁人長者之風云浮梁李氏祠堂記浮梁之田西里李氏故文獻家永樂中奉化縣丞善謀作祠堂於正寢之左未就而沒至其子安遂成父之志堂及歳時之祭李之先出唐衛公靖五世孫祐為饒州刺史自三原徙歙又五世至宋秘書少監璣其子亨正紹定壬辰進士授文林郎浮梁縣丞有善政卒葬浮梁子昱因家田西昱咸淳乙丑進士縉雲縣尉其子乆益咸淳甲戌進士篤孝行嘗以母老聞於朝得浮梁主簿便養宋亡棄官不復仕縉紳表其墓曰節孝先生節孝之孫仲元處州儒學録與趙文敏公虞文靖公游皆有文字之託奉化之祖也奉化嘗自序其譜言髙祖至其考皆散粟以賑饑捐地以給葬盖李之先徳敦於躬及於人者非一日之積也今祠堂所祀自文林下至奉化學行之相承衣冠之相續前輝而後映愈逺而不替可為盛也矣禮營宫室先宗廟家造先祭器急所先也而後世士大夫率因陋就簡朱子始定祠祀之禮然世之遵用者不數數見盖有識者所為喟然太息者也李氏文獻數百年至奉化能顓顓於此非仁人孝子之心乎安又能遂其父之心於既沒之後非卓然善繼者乎詩曰孝子不匱永錫爾類李氏有焉於是安請記堂之成安永樂甲辰予讀廷試巻時所奏進士今為監察御史堂成於安登第之嵗記作於宣徳五年十二月甲午云郊遊記永樂癸卯二月之初時彦習禮光世約予公暇郊遊十一日昩爽朝退各以暇告獨時彦未有暇予三人并邀學䕫恂如與俱既食草具以隨五騎出平則門望天王寺白雲觀在城西南五六里將馳赴之是日天氣清朗風埃不作西北諸峯竒秀畢露恂如曰何為舍此也於是習禮一騎獨先而西四人從之金山玉泉五華諸峯駢立天際而霞彩映射如屏風疊峙金碧輝煥又濯濯如翠芙蕖使人心目俱馳而應接之不暇按轡行七八里乃折而南渉小磵稍東而彌望皆麥隴萌始數寸道傍居民咸蒔蔬為業溝塍畦畛甚整比十數畦則置井及桔橰蔬不一品或秀或蘖生意皆津津駐馬觀之恂如馬上論種蒔法娓娓學䕫習禮相與辯析習禮又善言南北土地所宜余與光世唯唯而已稍前度石橋入土城望白雲觀可一里土城者遼金故城也其遺址獨西北一隅間存亦間有可登眺者然不及登徑趨觀中道衆皆已出唯兩童子迎客入坐西軒汲井泉㵸茗觀右舊有長春宫盖元以居丘處機真人而觀則真人退休之居也當時塑像尚存其神爽清徹凝静簡逺翛然神仙人也像之下其遺骨塟焉行視長春故址甚閎壯而殿堂門廡兵後悉毁尋范徳機所詠門前流水亦無復有但隠隠見一渠已湮為行路而旁近之民競畚壊甓曵斷礎治耕其中亦莫之禦矣因以感夫興壊盛衰之理恒相因而世之務祈佛老以冀免於壊與衰者不可鑒於此乎還坐東軒静幽明爽俗迹所不至出所携具以飲兩童子侍客益恭爵數行一童歌以佐酒歌詞皆古道人遺世離俗之意客亦欣然以樂也習禮曰樂必有詩遂取陳伯玉白玉仙臺古丹丘别望遥之句為韻各賦二詩酒罷出南行一里至天王寺寺宇亦弊有兩僧出迎有臺頗髙在殿後遂攜僧升臺汎覽都畿山川之勝其北崇山大嶺緜亘重疊東環大海西挾大行其南百里則軒轅之舊都而俯視江淮如在階戺之下者壯哉乎京師天之所啟也又念東南數千里皆平曠沃壤使民悉得耕桑其間而無天時人事之虞上可以裨國計下可以紓逺郡供餽之勞也衆四顧喜不已降而觀於浮屠之址問僧此寺所剏始不能言也僧指其南廢丘隆然而峙者曰此遼之蕭太后粧臺也問唐太宗憫忠閣故址指其南三里所而今漫滅為平蕪之墟矣則相與歎曰遼主不能以禮率家而恣婦人之欲如此無足恠太宗以盖世英武而勤逺畧盖至此而悔心之萌惻隠之不能己也豈非仁明之主哉顧其遺跡已泯沒後之人欲一見而不得豈不可為太息也哉僧聞客言其意亦若有感焉者再出嘉茗飲客送出門上馬歸夫北京據天下之最勝也自余至三閱嵗矣未嘗得斯須之暇以縱覽國門之外間嵗一再隨衆出北門皆以公事廹促又隆冬盛寒風沙眯目數十歩外無所見則與未嘗至者何異也故仕守職而有得於一日之暇幸也暇而得馳意於遊觀又幸也遊而得偕其同志於所可玩可感可樂無不有焉幸之尤也余三歳而始一得其尤幸者不可不記故歸而悉記之白雲觀之詩十首咸附于後賜老堂記皇上既嗣天位改元洪熈覃霈恩澤以福宇内徳音屢下徵賢舉能振㧞淹滯優老録舊在廷文武之臣逮事先朝均有叙進而吏科給事中吴興凌晏如陞都給事中先是晏如之父彦能甫以應天府通判坐累謫均州十餘年矣一日晏如奏事畢上從容顧問其父晏如頫伏叩首言臣不孝罪萬萬無所容臣父去鄉四千里今年七十矣惟聖㤙矜憐之上曰而父官京師朕故知之遂勑吏部驛召還既至入見賜冠帯又賜勑而命以其子之官致仕還鄉於是凌氏父子拜賜殿陛之下公卿大夫之在列者親見其遭逢之盛既退相與嗟咨歆羡而求彦能甫之為人曰是何以得此哉士竒與晏如好又嘗聞彦能甫之事於縉紳間則告之曰彦能甫儒者歴任餘三十年兩為教諭吾江西其學者皆敬服之陞武岡知州調鄭州皆得其民心朝廷用薦者言召進用之州父老群奏乞還之後用秩滿入佐京尹民戴之如兩州此上在春宫時所知也盖其持身愛民皆儒者也公卿大夫聞余言亦曰觀於其子可以知其父今之榮遇夫豈偶然哉明日晏如謁余言家君將歸而名其燕處之堂曰賜老願為書其所自以示來者夫堂之名以昭恩也觀上之所以施凌氏之所以受皆足以勸天下之為臣子者而豈徒然者哉士竒史官也於國家施恩于下宜書及彦能甫之能於官晏如之能於子皆可書也遂為之書吾隠堂記吾邑之西武姥山之下西堂之上有田可稼有園池可蔬可漁有竹樹可䕃有山水可遊又多詩書家有朋游徃來可樂也余少時聞有鍾先生者隠於其處先生樂乎内無事乎外足於身無求於人蹤跡恒終歳不一至城邑予雖得其為人而未嘗承顔接辭也而不作乆矣去年先生之子啟晦由南雄訓導陞趙府伴讀留京師間與語及先生啟晦泫然流涕起曰不肖願竊有請也惟先人之徳之行子嘗知之不肖懼夫乆而遂泯没也用夙夜弗寧既請諸脩譔梁君狀其行學士解君銘其墓侍讀學士王君傳其平生之槩矣惟前尚書劉公所名先人吾隠之堂未有記也又曰堂故卑隘又更乆就敝不肖圖新之且加大矣刻尚書公所書吾隠二字於楣竊嘗記先人之言曰世所貴學為士者謂其能察於理察於理可以施利於民也然欲備乎我者致力可成施利於民者非有位不行焉茍不得乎命不得其位樂其所備於我者足矣此先人之志也今不肖陟降斯堂則思先人之居處覩尚書公所書則思先人之訓言未嘗忘之願子之為記之也夫士君子不志於民不可謂仁不安乎命不可謂義仁義脩而君子之道立鍾先生志之於前矣啟晦又能圖不泯於後可謂善繼其志也夫登斯堂究惟斯訓勉圖充其徳而成先人之志者凡啟晦之子若孫皆當永識弗忘先生名與字吾與唐中書令紹京二十三世孫徳行之懿三君子所論著備矣兹不復記惟記其志之所存者以示其後人思貽堂記思貽堂者家兄仲基先生所居之堂取記禮者之言而名之也以為身本乎親能尊其親必能敬其身而人之有不能焉者盖無思耳一出言一跬歩能必有思思而必在其身之所本則必果於為善而不果於不善以是名堂而自勵焉先生之志厚矣先生生十數嵗遭時兵亂諸父老長亡没幾盡先生雖㷀㷀而能勉自樹立以圖不墜於墳墓則曰吾先人之所藏也奈何其迷忘乎披荒履險遍求而得焉嵗時躬率子弟自總角以上悉詣謁拜曰庶幾來者無復迷也詩書則曰吾先人所以植身而遺後者也奈何可去此而他務乎孜孜焉以脩其身而誨飭其諸子諸子克勉承其志即欣欣然喜動乎中不然輙形於色憂曰其隳吾之先矣遇手澤文字必寳藏之曰吾先人之所愛也蕪廢田園必除治之曰吾先人之所有也㑹族人少者必懇懇為言先世徳義文物之盛曰若等不念所以圖繼之可乎盖平居無一時一事其心不在致隆於祖考也吾楊氏以儒業雄鄉邑數百年至先待制公以來聲名愈益焯焯而自元季變故子孫零落散徙故廬瓦礫之墟過者興歎微先生復起而振之鄉閭晩出安知有楊氏楊氏之子孫亦安知其有髙明祖父者哉於是先生有功於楊氏多矣然飲淡茹潔適乎中無慕乎外凡閭比族姻或有勢力而行之弗臧者未嘗一顧也有窮乏不振而能自守率與之相厚家食未嘗一日忘國家涵育之賜恒與人言必依於忠孝其耿介篤實之行知者盖以為有先人之風焉夫見諸實履真踐如此豈假於名以自勵哉豈非欲其子若孫皆睹斯名而知勵乎是不可以不書謹書之以示來者􅄯氏百泉圖記百泉衛詩註在古衛州共城東南注于淇水盖今河南懐慶府太行之􅅢實山水勝處鄆城􅄯景範先生其先數世卒於仕皆塟百泉之上先生自元季兵亂不得詣展省國朝初平海内即詔天下興學縣令丞強起先生典教事又不得去然其心常惓惓乎百泉也既被召入教國子擢春坊司直輔導東宫任益重又不得去而其心之惓惓乎百泉猶前日也及春秋已八十上憫其老特命致仕歸而其子適除孟縣教官迎先生就禄養孟懐慶屬邑望百泉可晨駕而夕至也先生於是忻然就道書不云乎民之所欲天必從之夫所欲而善又出乎至誠天固從之如先生是已想其展敬丘壠顧瞻松栢指示其子若孫告之先徳使圖繼於永逺盖非徒不忘乎體魄之藏而已􅄯之先自宋元文公至於今其間擅文學而振徳義榮圭紐而光譜牒者代未嘗乏也先生安得不以紹前而啟後者為重乎又想夫先生臨百泉而四望因遺跡以思古人如衛武公年九十以禮自防邵堯夫超然自得於天人之際許魯齋明正之學非皆先生所願乎然予觀先生温厚坦亮安乎義命之正泊然不累於外物其學以聖賢為歸事君必在所學於人恒奬善而掩惡其可謂篤實純明之君子而無愧乎古之人者歟余與先生同寮十年其學者今大理寺丞孫時求善繪者為作百泉圖屬余記因併及先生平昔以示其後之人焉永樂二十二年進士題名記皇上嗣臨大寳以來凡所以制治保邦一惟祖宗舊章是循是蹈若前之所未暇及者皆體祖宗之心而悉舉之盖庶政畢脩百度咸章天下之人涵泳鼓舞皇上大功大徳同虞舜之重華恊帝武王之繼志述事猗歟盛哉於是禮部尚書胡濙言國家策試進士必樹碑太學永樂甲辰一科尚闕請如故事樹碑翰林儒臣為記以垂永乆制曰可濙奉宣聖㫖臣士竒拜稽祇受伏惟是嵗三月朔太宗文皇帝臨軒策士其又明日傳臚賜邢寛等百五十人進士及第出身同出身未幾車駕北征又未幾文皇帝上賓國家洊有大事故樹碑緩今仰承聖明脩葺闕典士之獲託名永乆非幸遇哉盖士於學問窮日夜弊寒暑其志固望遭遇展其負挾施當時而聞後世也上之所以奬進期望於士者盖亦在此士既彚升則駸駸乎行道之地而甲辰至今十年預名於斯者皆受職享禄布列中外矣固有志存所學秉道徳用仁義勉勉而不懈者乎譬之木焉愈升斯愈髙矣亦有安於小得玩時月甘卑𤨏頽堕而不進者乎譬諸水焉愈流斯愈下矣其相去豈不逺哉夫學同志也升同日也及其自樹立乃髙下相逺髙者固賢下者不思所以自振乎或百有一焉反道倍徳舍所學以務所欲不思羞同升而玷科目哉儒先君子有言立志以明道希文自期待之兩賢者皆出科目盖必若是而後可以副上之奬進期望而光華永乆也是科臣忝預讀巻既欽承為記又因以致儆勵云東里續集巻一
