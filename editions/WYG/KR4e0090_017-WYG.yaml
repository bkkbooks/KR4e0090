body:
  text: 東里文集巻十七明楊士竒撰墓碣銘山東鹽運司副使蕭公墓碣銘永樂庚寅某月某日山東鹽運司副使西昌蕭公鵬舉卒扵官既歸塟其鄉其孤金以溧陽文學梁本之所爲行狀來求銘公吾邑遺老凡發諸内形諸外者必不可少愧古人銘之盖不愧郭有道者故不敢以辭公諱翀鵬舉其字蕭氏五代時有諱覺者由長沙徙西昌之禾溪後又徙今南溪曽祖某祖某父某母某氏公蚤孤季父自成長育之公時雖㓜已不凡事自成如父自成禮致鄉先生劉尚書崧爲之師夙夜自勵不厭言行益謹飭劉先生曰此令器也後有詔廣京師城下郡縣賦民陶甎送京師役大且久奸民滋爲弊遣御史亷治之奸者更蔓引素異已者是時縣簡自成長千夫公往代役既為奸者所引被收自成走詣御史言縣寔命我長千夫非姪也我當坐公曰躬任役者我也叔不與我當坐御史驗籍名竟坐自成謫屯滁州公號泣送自成即趣歸盡傾其貲財徃助之自成後得還四明烏斯道作駢義傳著其事自成没公與弟鵬起從弟鵬南鵬翔鵬漢同居相親愛怡怡諸弟亦皆敬事公惟公言是聽肅然不敢出一語渉不義劉先生著五荆傳以表之洪武辛酉以賢良徴至謁見應制賦指佞草稱㫖授蘇州府同知到官蚤暮盡力治公務而自守甚嚴無敢干以私者居七閱月坐秦府買民物不舉謫河南驛夫居河南十八年貧甚不自給從者發近舍地得黄金匿不告而求去益力有以其故白公請詰之者公曰彼所自得吾何預聽去卒不詰復起爲山東鹽運副使或言公仁厚豈弟宜長民財賦非所以辱公公聞之曰孔子不爲乗田委吏乎惟克盡職爲不辱也到官勤勵自守如蘇州儉素不變至沒禦寒一緼袍猶河南時所製誠扵恤下下亦心誠戴之歳課皆先期而集曰不可以累我公稍暇閉戸讀書賦詩而已自三司而下皆敬禮之詹事府丞陸中善嘗使山東還與余言蕭運副潔清正直爲山東第一惜既老矣蓋未幾遂卒公坦夷直諒言動循扵仁義治家尊卑内外秩然祀祖考盡孝敬時節躬率子弟謁先墓買田墓下歲命子孫一人司其入以供謁祭著爲式世守之與人交悃欵未甞啟口及人過失事為文章長扵詩有集若干巻藏于家卒年七十有二娶郭氏劉氏先卒繼郭氏有賢徳子男二金鎡皆端厚好學克世其家女三人皆適士族孫男四人銘曰公世以貲公徳孔嘉于何觀之于躬于家逹諸官政厥彰孔多奄其亡矣君子之嗟閟于斯丘既固既安髙車後来過者軾焉郭彦常墓碣銘永樂元年十月詔吏部下百司舉才徳之士在末位及隠䖏于下者時翰林脩譔梁潜與士竒謀曰郭彦常闓䟽果毅練習當世之務且公方負氣節有大體此人可以稱塞明詔議協將卜日以聞㑹有言彦常病久乃止又三年彦常竟以是病不起余兩人哭之既而相與嗟嘆悼惜謂世之從政者其皆如彦常矣乎彦常沒豈獨爲吾徒私惜之哉既塟龍門山今年其子公緒以狀來請銘嗚呼雖不忍銘不可不銘者昔家居時與彦常同里未嘗一日不見見未嘗不相傾倒傾倒未嘗不在於道也而今已矣不銘可乎郭之先岳州臨湘人六世祖匯宋季舉進士爲袁州司户始徙泰和祖巨川考慶宗母蕭氏二子彦常其仲也自㓜頴異七歲喪父哀毁動人季父登州教授敬守喪其子獻以彦常爲子洪武初教授公爲都稅司副時朝廷初建國子學簡京官子弟之秀者充學生彦常與焉受經扵學録蕭執先生先生亟賀教授公曰是兒異時有用之器也未幾以養親丐去初元季兵亂彦常同産兄被俘不還至是教授公曰柰何以我故而令吾兄不祀命彦常歸主其父祀曰爾生子當令後獻其後教授公歴官𤓰州武岡漢陽登州彦常悉侍行調護供養曲盡孝敬教授公在登州得疾聞之即日治行往省比至已沒奉柩還喪塟如禮平居以教子爲切要嘗戒之曰舍學不知人之道舍經不知學之本皆遣從明師㳺與鄉人䖏和而信扵時賢士君子皆與之交彦常儀觀魁偉雍容脩整而其論議識鑒卓然非軰行所及不以䟽戚廢其是非之公閭巷有忿爭不平徐出片言折𠂻之皆帖帖以止閭居未嘗忘人之憂嗚呼使其得一郡一邑而爲之足以安利其民不辱任使然卒未及少試以沒此豈獨彦常之不幸哉沒扵永樂四年十二月十四日享年五十子男三公緒永樂十年進士公承萬安縣學訓導即從教授公命以後其子獻者公綸女一嫁蕭樞孫男四琪璟珦瑗銘曰木堅良兮為舟為車玉縝栗兮為珩為琚嗟君子兮世所需命之弗逮兮其何傷扵余乎故凌雲居士蕭安正墓碣銘永樂十七年十二月初五日泰和仙槎鄉桃源里蕭安正甫卒是月二十日塟其里東山之原明年其孤襄應雍奉書及塾賔梁㮚所述事狀授應子稳來京師請銘其墓蕭出梁國子祭酒子雲世居臨江之玉笥山子雲十六世至伯原權知太和縣遂家焉伯原四世至漢卿五世至一龍七世至士鳴譜載皆有科名扵宋士鳴生文翁文翁生斯和安正甫之曾祖祖父也母羅氏安正甫儀貌魁偉襟宇闓豁灑落家世擁厚貲元季兵亂加歲饑斯和散財募義保障其鄉又日發廪以賑安正甫時弱冠協心單力佐其父已有稱扵時而喜從儒師君子㳺鄉先生如康山長宗武陳心吾王竹亭及劉尚書子髙皆徳望老儒安正甫既嘗從學康先生諸先生亦皆忘年與之㳺同軰行如楊員外子淵羅同知子理鄧經歴彦髙凛然氷雪之操非其人不可近而皆與安正甫契好深宻徃還上下相樂酣嬉淋漓無厭也安正甫博渉載籍扵道近代故實及勝國諸老文章之雋永娓娓不窮衆賔廣會言論讙譁不相下從傍數語析之無不帖服間出一二語為嘲謔衆絶倒而凝然自若也扵持身䖏物不肯越理分之外祗憲度數以户稅長徭賦必率先趨事而恒倍出泉布以紓貧弱雖富且耄無長少貴賤接之不見有惰容薦紳大夫渉其鄉必過安正甫傾倒累日而後去嘗坐累謫戍遼東既老代歸歸則宗族儕軰多已物故而鄉之故家老成風流儒雅如安正甫亦無幾矣而安正甫秉徳執義以表其子孫族人者益篤不懈蓋春秋八十而卒安正甫諱亷所與交㳺者嘗謂其有凌雲氣韻因以題其所居遂號凌雲居士初娶劉氏生一男齊一女適鄒繼王氏生五男京襄亢應雍一女適曾庻生一男亶齊京亢皆先卒孫男若干女若干余少辱安正甫愛重其歸自遼東也嘗教授其家塾相與甚懽而今不復見矣故不辭而爲之銘且以寓予之懐思云銘曰道行邁兮阻修不矯爲亢兮不屈為柔心休休兮樂于于履坦坦兮幽人之逑岡盤兮川回喬木兮崇丘懐蘭芳兮徂春倐草露兮零秋倚東山兮凝竚耿予懐兮夷猶梁用之墓碣銘永樂十五年車駕廵狩北京仁宗皇帝在春宫監國南京凡南方庶務惟文武除拜四夷朝獻邉警調發上請行在若祭祀賞罰一切之務有司具成式啟聞施行事竟則所司具本末奏逹而已上既有疾兩京距隔數千里支庶萌異志者内結嬖倖飾詐爲間一二䜛人助扵外扵是禁近之臣侍監國者惴惴茍活朝暮間賴上明聖終保全無事小人之計不能行然其意不已也㑹南京有陳千户者擅取民財事覺令㫖謫交阯數日念其軍功貸之召還有言扵上曰上所謫罪人皇太子曲宥之矣遂殺陳千户事連賛善梁潜司諌周冕既逮至上親問之潜等具實對上顧翰林學士楊榮等曰事固無預潜他日又諭禮部尚書吕震曰事亦豈得由潜然猶未悉陳千户非出上命謫之也兩人者皆未釋有毁冕者數言其佻薄放恣不可用遂併潜皆死非命十六年九月十七日也士君子聞潜死皆嗟惋悼惜又相與出資收殯之文明門外其妻時隨在北京慟夫非命哀毁不食數日亦死明年其家始啟殯歸而合塟扵泰和縣某郷某原梁氏其先家長沙唐有進士曰震徙荆南又七世曰勝用仕南唐爲徴事郎徙今泰和又十世贈知吉州曰逢吉二子皆仕宋伯君崇累官起居舍人兵部員外郎直史舘知鳳翔府仲君傑累官同知黄州府入爲翰林院編脩官君崇五世孫蕃景定三年進士太常博士知宣州改撫州生才可才可生彦卿彦卿生不移娶陳氏元潮州儒學教授以道之孫生男子二人長即潜次混潜字用之自㓜好學警敏嶷然有鉅人志嘗受經扵鄉先生王子啟及舅氏陳仲述入則浸漬不移先生之教父子兄弟討論切䃺無虚曰故所得率出其同軰用之甫弱冠其文章論議已馳騁頡頏諸先軰洪武丙子選鄉試明年授四川蒼溪縣學訓導蒼溪僻逺過使客終嵗無幾人而山水可適其學者前此未嘗遇明師用之樂得其地旦暮坐講席開諭辨析必盡其說諸生皆忻忻有嚮進意稍暇獨行清流茂樹間吟咏自得又明年用薦除廣東四㑹知縣授承事郎推誠愛民剗宿弊崇寛政臨之以平易導之以禮讓致勤撫字稍暇輙就學舍親授業諸生嵗餘民咸恱服而争訟息學校興流徙來歸以累千計縣有瀧橋河世傳吏有亷平之政即河水清自用之至訖其去河水澄潔可鑑又明年改陽江又改陽春治之一如所以治四㑹者而陽春猺獠環處稍不得所欲即獸怒跳蹶不可制用之待之如子而不拘扵法亦皆盡誠事縣令如父敬恭命令唯恐不及所歴之䖏將去人皆遮道留之不得至有流涕者永樂元年召脩太祖皇帝實録書成陞翰林修撰授承務郎賜白金五十兩織金衣一襲文幣四表裏五年命以本官兼右春坊右賛善進儒林郎時脩永樂大典召至四方儒學老成充纂脩及繕冩之士幾三千人人衆事殷特命太子少師姚廣孝禮部尚書鄭賜総之已而賜卒命禮部翰林院就本院推舉才學服衆者代賜遂舉用之用之方公明决蒞事有程而惰慢放肆者有不樂之相與誣其過扵上召問具對云云上曰梁潜言是遂抵造誣者罪扵時以文事裨益皇太子尤為所重上幸北京驛召赴行在八年南還十一年復扈從北京十三年考禮部㑹試十四年南還明年復北狩將發親擇侍從監國之臣時翰林獨留學士楊士竒特詔尚書夏原吉吕震方賔舉一人副之遂以命用之其在皇太子前累累進善言皆見嘉納而寵以賜賚是年考應天府鄉試蓋明年及於禍矣嗚呼用之闓爽𢎞毅耿介自執其智足以燭幾其徳足以及物其才足以興理其自任之重不肯下古人凡士君子哀而惜之夫豈以私用之也哉用之之學通諸經尤長于詩易自十五六已用意周程朱張之書壯而益探其㣲爲文章馳騁司馬子長韓退之蘇子瞻亦間出莊騷爲竒務去陳言出新意古詩髙䖏逼晋宋所著有史論若干篇碑傳記序銘頌賛述若干篇五七言古近體詩若干篇皆可傳後與人交藹然有相輔之義人有過面誚之不爲依阿取容及其能改懽好如初焉用之死時年五十有三娶楊氏子男四果楘楫榆皆知務學果楘皆舉鄉貢未升二女長嫁袁俊次嫁進士劉凖孫男幾某某皆秀朗可望造物者殆以是報之歟梁楊世婚姻家余長用之一歲少學同業壯而仕扵朝同官知用之孰有深扵余哉故其𦵏也宜余銘而余銘之亦豈出乎其私哉銘曰楩楠之蒼蒼可車可梁靈芝之煌煌瑞世之章曷其舉之又中毁之夫毁于琢曷全于璞理有瞢瞢為善罔祐顔短跖長從古則有從古則有善者徒傷尚有傳者其永不亡曾勝甫合葬碣銘吾友曾源自青州府知事再擢工部都水司主事坐累謫盧龍十有七年今年用薦起為湖廣新化縣丞間過余已皓然白顛相握手勞苦外即拜且泣曰先父母皆沒世且合塟矣而未有銘知先父母今莫踰子者幸畀之銘余聞其言嘆息自念源父勝甫自吾總角已心知敬之盖是時縣大夫推擇為史先生君子皆曰此古所稱悃愊無華者既而非其志也百餘日竟棄去後之為郡縣史率深文巧詆爲賢求什一扵千百如勝甫何可得哉余少與源同學數嬉戲其家其母劉孺人愛余孤貧而有志學也每見輙垂奬勵後偕源仕京師孺人嘗就禄養又愛余輔源以義也時孺人年㡬七十兩家所居甚邇余家迎孺人輙來來輙懽然留數日孺人慈惠善教盖余一家人敬事之如母也今其可辭銘遂受其所述事狀序而銘之曾出唐光州團練副使延慶其後徙泰和者世居邑治之東義井里宋季有號南窓者生建可建可生均道勝甫之曾祖祖父也勝甫諱勝淳厚恭遜其居家䖏閭里有寔行無聲利之好平居寡言言必傅於理鄉䣊稱爲善人春秋五十有九而卒劉孺人鄉先生吏部尚書子髙之從子豐城縣學教諭子彦之子諱辰年若干歸曾氏貞静婉淑婦徳母儀宗姻所重春秋八十有三而卒勝甫卒扵洪武庚午某月日孺人卒扵永樂壬寅某月日墓在縣北五里視岡之原子男三䥫源仁孫男九曾孫男八銘曰澄江之陽有峙且平負幽嚮明鍾龢萃靈徳人斯藏其後有興常州府同知張重器墓碣銘國家軍政久而弊軍之姦黠者徃徃匿其籍或誣援良民實伍所司利姦人之賄輙從之扵是奸人得計良民受誣弊遠邇一轍皇上嗣大寳之明年詔飭軍政遣廷臣四出清理且賜璽書諭之毋枉民縱奸時大理寺丞張宗璉當徃福建嵗餘竣事盖福建之民皆譽張寺丞之公且亷也既還改常州府同知専督農事朝廷又遣監察御史出理軍政之未盡者御史當徃蘇常諸郡者言扵兵部曰常州必得張同知共事乃有濟部遂檄宗璉時御史銳意得軍不復存念民枉宗璉曰璽書在是敢違哉宗璉雖不得盡行已志然常之民賴免誣枉者猶十七八而御史滋怒宗璉異已詬詈無禮雖宗璉終不爲變而積忿恨不平發背疽以卒卒之日常四邑之民老者壯者奔走詣庭下哭皆哀具儀奠祭累日不絶暨歸喪素衣冠送者數千人蓋是時蘇之佐郡希合御史意民受誣枉一不聽自白白而死峻刑者不可勝計扵是蘇人皆嘆羨常州得賢郡佐而不直其郡之佐誶語嚾然宗璉名益有聞宗璉字重器吉水人初兩舉鄉貢皆中遂登永樂二年進士第爲翰林庶吉士預脩永樂大典書奏授刑部主事旦暮考究古人作律之意而體歐陽崇公扵死獄求生道之心不肯一毫怠忽甞奉命録囚廣東廣東人皆稱其長厚其在刑部久自尚書下至𨽻皂稱譽之無間言仁宗皇帝臨御簡朝臣賢者爲東宫官擢左春坊左中允上嗣大位陞大理丞又明年有常州之命在常州之明年卒宣德丁未某月某日也享年五十有四其考彦忱贈承直郎左中允母蕭贈安人世系見余所作其考墓志其妻劉封安人子男若干女若干其為人簡重清儉明經篤行事君愛民一以誠非其義一介不取非其人不交閒暇閉門讀書焚香澹如也名其齋居曰思誠盖素所存心以此余與之交久深知之而卒又得其詳深哀之故其塟扵鄉也最其平生大槩寓其孤使刻諸墓而係以銘曰嗚呼重器存心孔仁雖施未𢎞有恵在民民心則何有思無已彼獨何人而存則異嗚呼重器扵士有光嗚呼重器沒也不亡贈承德郎吏部文選清吏司主事劉君墓碣銘宣徳三年五月制贈吏部主事劉濬之考原亨爲承徳郎吏部文選清吏司主事妣黄爲安人又賜濬鈔千緡歸舉焚黄之禮濬瀕行詣余拜而請曰上之徳所以寵覆劉氏者天地之廣厚也雖濬無能圖報萬分之一然中心其敢斯湏忽忘今將樹碣于墓幸徼恵執事以爲後来不朽之託余與濬㳺既諾之遂咨得其考妣事行乃序而爲銘其考諱元字原亨劉氏故撫州崇仁儒家元廣西北流縣儒學教諭諱敬生湖廣溆浦縣典史諱誠誠生䖏士諱紋徳原亨之曾祖祖考也妣管氏原亨生而淳厚既長知務學謹其言行羣居執禮度不怠肆爲先生君子所器重時元季冦亂充斥奉其親奔竄山谷間甘㫖之養日不闕稍暇輙從鄉先生馬雅志講學勵進脩之功馬先生尤期望之國家混一四海洪武中或勉之仕者笑曰爲太平幸民足矣顧今天下文武智能乗雲龍風虎之㑹顒顒濟濟布列中外寧獨少元耶或曰士懐負才器不一試自見扵世乃徒乾沒泯泯耶去而不荅郡守縣令知其賢數薦起之卒皆辭而間施一二扵鄉以裨縣大夫之治皆恱服有餘蓄恒濟匱乏原亨儀觀偉然雍容整肅不矜不衒其徳刑于家措于鄉䣊者蓋人無間言其豫計事成敗率竒中卒扵洪武乙丑十一月廿九日夀四十有一嵗塟邑長安鄉何家塘之原翰林學士王公景表其墓配安人里望族黄徳和之子諱妙貞渉知書父母無他男子其女子獨安人慎擇所歸遂歸原亨而納贅壻焉安人孝扵舅姑恒迎就養外家而祗事之同扵父母舅姑沒凡所以送終者一盡誠意年三十有一原亨沒即誓守節而植家訓子毅然爲已任甞勵諸子曰若等不務學立身即吾死何顔視汝父哉其鄉人國子司業吳君溥名其堂曰慈訓其卒也園田居室咸贏扵夫之存也卒以永樂丁亥四月十有七日夀五十有四歲塟長安鄉之冕府里四川按察僉事時季照銘其墓子男四辟丘濬懸辟習儒業好古道濬永樂第一科進士臨汾知縣浙江按察僉事吏部文選清吏司主事操行有稱於時女一孫男三嗚呼國家褒恩雖本濬而施然究論其考妣存心行已亦天道所以報之歟雖未甞同穴而藏然皆濬之所自且同被命書故黄安人之事宜附見焉銘曰猗歟上之厚其臣也寵光其躬爰及其親清秩峻褒煌煌龍文林林冠纓有得其幾非天之道惟善是畀臣濬考妣爲善有誠隆隆之榮不忝于承劉子與孫其來千億永念爾祖永載帝徳前朝列大夫交阯布政司右叅議解公墓碣銘嗚呼此解公大紳之墓塟二十有二年矣其友楊士竒始克序而銘之序曰解氏姬姓其先居鴈門唐同州刺史琬之孫隠爲蘄州司戸叅軍始家廬陵之同水鄊叅軍六世孫盛遷吉水邑中世有科第至諱夣斗宋太學上舍生諱應辰元髙安縣學教諭生諱子元舉進士授安福州判官兵亂守節死生開先號筠澗娶髙氏進士若鳳之子公之父母也公諱縉字大紳自㓜頴悟絶人五嵗父教之書應口成誦七嵗賦詩有老成語十嵗口誦數千言終身不忘十三盡讀四書諸經貫穿其義理老長不能難也而文思溢發十八舉江西鄉試中第一洪武廿一年㑹試禮部中第七廷試讀巻者以所對䇿論過髙抑寘第三甲時兄綸及女弟之夫黄金華同登第太祖髙皇帝喜其一家三人出仕授綸禮部祠祭主事公與金華皆中書庶吉士日侍左右甚見愛重閒暇數召兩人論議考其所學一日諭公曰爾試舉今施政所宜直述以聞退即具奏大槩言陛下得國之正非唐宋所及取天下扵羣盜救生民扵塗炭徐定燕都市不易肆而女寵外戚寺人藩鎮之患消融底定皆處之有法矣不邇聲色不殖貨利不爲逰畋皆逺過漢唐宋之君而無愧三代聖王矣惟願喜怒一聽扵天理而推誠任使不以察爲明又言陛下拳拳扵畏天畏鬼神治民治强暴然畏民者畏天之本治心者治民之本又言令不必數改數改則民疑刑不宜太繁太繁則民翫法司近有朋姦罔上倚法為姦二條下人殆難措手足矣又言御覽之書冝集唐虞夏商周孔及濓洛闗閩之言隨事類别以備勸戒又言六經殘缺莫甚禮樂宜正禮經及訪求審樂之儒作樂書又言祀天宜復掃地之䂓尊祖宜備七廟之制太常非可以肄俗樂又言僧道之壯者宜黜之使復人倫經呪之妄者悉火之以杜誑惑斷瑜珈之教禁符式之科絶鬼巫破滛祀以底善治又言進人當擇賢否授職當量重輕今大誥有不爲君用之罪則仕者不復擇矣又言古者鄉鄰善惡必記今雖設申明旌善二亭而無黨庠鄉學之敎互知之法雖嚴訓告之方未備宜取古人治家睦隣之法若古藍田吕氏鄉約及今義門鄭氏家範布之天下世臣大族率先以勸旌之復之爲民表率而致治不難矣又言易曰王公設險以守其國重門擊柝以待暴客而近世狃扵宴安墮城池銷鋒鏑諱言兵事以爲天下已治一旦或有不測之虞何以爲備冝勑有司以時整葺寛之嵗月守以里胥額設弓手課之射教民以農隙兼習兵且乞設武舉以收英才又言宜廣鄉校前代多有書院有學田有貢士莊宜脩復以教養賢士又言極刑之禁慮有遺才給配婦人恐傷節義既奏上嘉其識正公素與兵部尚書沈溍不合溍奏公入部堂索皂𨽻語嬉慢非禮上慮公優閒怠逸即除江西道監察御史盖以繁劇玉成之也時都御史袁泰怙勢家人横恣諸道御史欲糾之無敢執筆為章者公揮筆立就歴舉其過章上雖曲宥泰而一時多其直上又慮公少涵養將爲衆所傾召其父至諭曰才之生甚難而大器者晚成其以而子歸益進其學又諭公曰朕扵爾義則君臣恩同父子其歸益盡心扵古人後十年來朝朕大用爾遂侍父歸公天分髙又感上大恩歸益自勵而造詣深矣數嵗髙皇帝上賔公趍赴臨權臣忌公者謂赴臨非詔㫖遂謫河州歲餘權臣黜召還以爲翰林待詔太宗皇帝入嗣大位首索公既見寘諸左右深信任之時朝廷詔勅與凡大制作咸出公手毎預宻議寵賚加厚陞侍讀數月陞侍讀學士奉訓大夫上初與武臣丘福等二三人議建儲文臣惟金忠預皆北平時股肱也武臣咸請立皇第二子髙煦謂其有扈從功上不聽福等叩首請不已終不聽遂召公預議事定然未發明年冊仁宗皇帝為皇太子封髙煦爲漢王進公翰林學士兼右春坊大學士奉議大夫又明年福等所初議頗泄扵外髙煦素不樂公言扵上曰藩府之舊無泄者其縉泄之遂出公爲廣西布政司右叅議授朝列大夫又以李至剛言公怨望改交阯八年入奏事時車駕已出征北邊至京師見仁宗而歸車駕還髙煦言觧縉瞰上逺出覲儲君徑歸無人臣禮遂徴下獄後三年以病死獄中素所交逰出資歛之外兄髙建春歸其柩塟之髙氏公死後家徙邉仁宗皇帝臨御特赦還而官其從子禎期爲中書舍人公仕前後不十年為庶吉士再歲御史未滿歳為學士四歳兩賛外藩皆席未煖初脩髙皇帝實録及永樂大典皆爲總裁考㑹試者一讀廷試巻者二聲名在天下籍甚敦孝友重義輕利遇人憂患疾苦輙隐于心茍可用力盡意爲之篤于故舊及名賢世家之後喜引㧞士類或誚其汎愛者終不爲變襟宇闊畧不屑意細故而表裏洞逹絶崖㟁雖野夫穉子皆樂親之求文與書者曰輻湊率與之無厭倦意或言有不當與者笑曰雨露豈擇地而施哉且人孰不可與進者不畏强禦承運庫官張興恃寵而横嘗笞擊人扵左順門下公過之叱興曰御座在此敢爾違犯禮法乎興雖忿公然不敢應一語俛首歛退同官治職事或有失悞公在上前率引為已過明知人太宗嘗與論羣臣御筆書蹇義等十人名命各䟽于下十人者皆上所信任政事之臣亦多扵公善而具以實對扵義曰其資厚重而中無定見扵夏原吉曰有徳有量而不逺小人扵劉雋曰雖有才幹不知顧義扵鄭賜曰可爲君子頗短扵才扵李至剛曰誕而附勢雖才不端扵黄福曰秉心易直確有執守扵陳瑛曰刻於用法好惡頗端扵宋禮曰戅直而苛人怨不恤扵陳洽曰䟽通警敏亦不失正扵方賔曰簿書之才駔儈之心既奏上以授仁宗曰李至剛朕洞燭之矣餘徐驗之仁宗因問公建文所用諸人對曰此皆洪武中人才徃事不足論已遂問尹昌隆王汝玉對曰昌隆君子而量不宏汝玉文翰不易得所惜者市心耳後十餘年仁宗出其所奏十人者示士竒且諭之曰人率謂縉狂士縉非狂士向所論皆定見也公之文雄勁竒古新意疊出叙事髙處逼司馬子長韓退之詩豪宕豐贍似李杜其敎學者恒曰寧為有瑕玉勿作無瑕石書小楷精絶行草皆佳其卒以永樂十三年正月十三日春秋四十有七配徐有賢徳子男二禎應卒于徙所次禎亮孫男女各二太宗皇帝初召翰林七人入内閣其三出廬陵公與胡公光大及士竒也三人相與厚而相知深今獨士竒在胡公墓上之石士竒書之公墓石未有書其可不書銘曰千里之足越國過都或一蹷之不虞楩楠百尋其寸之螙寧見捐扵匠輸郁乎紛紛五采承日競瞻望以忻快何泯沒之遄疾干將地下其神不死尚有光華天漢之涘東里文集巻十七
