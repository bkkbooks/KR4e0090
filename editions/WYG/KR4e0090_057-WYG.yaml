body:
  text: 東里續集巻二十九明楊士竒撰墓表奉議大夫尚寳司卿張君墓表正統七年二月三日尚寳司卿張信彦實卒於官張氏世居山東掖縣之進士鄉其祖若父皆以行稱於鄉祖曰二父曰五母于氏見余所作墓銘父母三子彦實其季也孝友出於天性自㓜雖饑渴食飲不先父母父䘮哀毁母病數更醫不效益困聞人肉可療久疾即自刲煮液進之遂瘉永樂初鄉里上其行有司以達於朝下御史驗之信詔旌其門命為尚寳司丞授承直郎進承徳郎居家事二兄如父壯老賤貴一致居官治職務勤慎處同寮有善能讓有過舉率自引咎其度有容同寮或造誣毁之或挾勢陵之一不校如罔聞然遇行不當理必據義執辭不以出位為嫌前尚寳卿朱琇軰行尊且有寵於上亦嚴憚彦實然心恒徳其忠於已九載陞尚寳少卿階奉訓大夫進奉直大夫侍仁廟監國凡上表奏則翰林書辭用寳函封畢授尚寳以髤版夾䕶然後行一日所上髤版内夾弊故紙既達行在内侍以聞命臬司詰所自仁廟召翰林尚寳詢之故彦實對云在函封内臣不敢預知函封外則臣之罪遂遣彦實自陳其同官在扈從者教之援翰林以覬倖免彦實曰不敢自欺况敢欺君臬司論彦實不敬有㫖薄罰復職以是廷論重之仁廟嗣位首進尚寳司卿授奉議大夫賜誥命以所授散官追贈其父封其母太宜人又九載加四品禄彦實樂聞善言初官侍近日接内閤諸公自念我為庶民望斯人如在雲漢何由得聆一辭今幸旦暮相親其可自棄袖魯論一編遇静間處輙揖請教二三公皆樂為之盡既終篇常涵泳不厭而日臨寫智永千文一過不廢其為人闓敏易直謙和無競交處有誠享年六十有六而卒娶楊氏封宜人子男二昱昻昻為伯兄後襲旗手衛正千戸從征麓川夷積功至本衛指揮同知彦實疾甚適昻奏㨗歸將復行昻憂恐不忍去側將白其情於朝彦實聞之曰受君命可顧私耶趣昻行後三日彦實卒臨終清明如此女一嫁都指揮胡寛孫男二源浩彦實之將易簀也顧家人無他囑但言少師公知我我死必求公書墓石即死含笑地下無憾矣既卒朝之卿大夫咸往弔祭於是昱昻將奉柩歸應天府祔𦵏城南鳳樓鄉于宜人之墓之次遂奉尚寳卿朱禮所述事狀來致治命狀固不若余知之悉也嗟乎彦實孝親敬兄為子為弟之道得矣事君不欺亦得為臣之道此士行之大者若其他行亦多可書故為之書俾刻焉贈奉直大夫右春坊右諭徳黎君墓表正統元年六月臨江之清江故處士黎君以子恬貴承誥命贈奉直大夫右春坊右諭德配鄒氏贈宜人恬請告歸舉焚黃之典求余表其考妣之墓士竒於恬素有斯文之契今又同在史舘不得辭按翰林修譔習嘉言狀黎氏之先析自新淦三洲居清江之板城里族益蕃衍世篤詩禮曽大父子信大父允誠皆隠不仕父惟琇元季兵亂率衆保其鄉歸國朝授昭信校尉通州衛百戸自昭信而上皆有厚徳奉直諱應本字宗瑞有孝友忠信之行勤詩書敦用禮義治家嚴肅於嫁娶喪祭咸遵古式厚於宗姻訓飭子孫及族人子弟悉就規矩奉直為人端恪和豫雖沍寒盛暑私居不見惰容公正明决里中有競爭不能平咸徃求直推所有以濟匱乏雖數不厭鄉號長者疏達有才具弱冠朝廷新作京師城令民陶甎以代賦邑推舉奉直董造運又推長千夫治海舶又推長萬石區賦者十餘年皆不亟不徐而事豫集葢愛人有誠制事有道而未嘗私其一毫之入是時同事有迂視奉直而急私慢公以僨及身家者未嘗不自悔其不為奉直也奉直於隆師尚友尊賢敬徳恒恐不及事石門梁先生尤篤又遣子從之學至於張編修美和劉山隂仲修皆所厚善而凡一時名人碩士率相交處所居城南多沃壤閒暇課僮奴耕藝自適名其堂曰耕樂又作松菴以貯書籍圖畫旦莫吟咏其中素嗜作詩而老益工其自少壮至老未嘗一日無公私之務而其中蕭散閒適恒自餘裕春秋五十有五卒以永樂四年三月三日鄒氏同里人淑徳令儀允配君子後奉直七年卒永樂十一年六月六日也春秋六十有六今合𦵏新喻官塘里金盆山之原子男三孟珵先卒仲慎以明經徴援疾辭後若干年亦卒季恬永樂壬辰進士授陜西道監察御史南靈州知州右春坊右諭徳皆以文行名於時女三孟先卒陳孟韶黃次聲其仲季之婿也孫男六經有文學早卒綱統縉頌生顥生孫女五曽孫男六昌晟生暠生昇生冕生昪生曽孫女七於戲奉直君才足以治政徳足以長民然生未嘗霑一命葢其志安於處也而身後之命之必至者教成於家之效其亦為善自然之應也歟敬為之表以示後人云奉議大夫禮部主客郎中王君墓表松江之華亭有君子曰王叔髙甫澹素而好徳貞靜而樂志脫畧乎窮達死生之累其子官朝署考最績承疏恩封父母五品秩叔髙甫為奉議大夫禮部主客郎中叔髙甫拜稽受命而持恭謹謙抑顓顓焉無一毫矜滿自足作於意見於色而愈益飭勵其子欽厥職以無沗榮命年七十有三嘅然曰即百嵗亦猶是耳昔杜牧之自誌墓豫身後事吾雖無善以嗣古人而得今人之名能文者槩存其平生且及目見之也即死足矣於是其子以求翰林侍講學士臨川王君又某年叔髙甫捐館宣徳某年月日也春秋幾十有幾𦵏邑城南秋涇之原其孤濬求余文刻墓上之石按王氏之先居金陵元至正中諱徳彰為崇徳州都目民徳之為建惠政碑既老退居華亭叔髙甫之考也叔髙甫諱鎬蚤通經史敬言行事父母孝兄錫為臨川知縣卒於官躬徃歸其䘮及其孤澂而教育澂底于成立後為浮梁知縣有稱此其行之著於家也恒舉所有振匱乏恤災患助婚姻䘮𦵏之不能者此其行之著於鄉也教其子孫及鄉人之子弟必在於孝弟忠信學古務善晚取古人存方寸之㫖自號留耕道人此其所存之厚也叔髙甫於醫藥卜筮之書咸通而尤好法書圖畵琴瑟又可想見其清韻配邵氏處士憇之子内助允淑封宜人子男三孟淌仲渲季濬濬永樂中自太學生擢禮部主事陞郎中歴事四朝有能名女一歸孫節孫四永育畿甸嗚呼世之人霑一命者或有快焉自得馳騁其意氣揚揚不復圖進於善道又或汲汲營所欲疲精神勞筋骨至耄耋而猶不止者於視叔髙甫之事豈不霄壤懸絶哉叔髙甫之墓其宜有表也前台州府通判陳君墓表前台州府通判陳君没十有四年其子嶷以翰林侍讀苗君所述事狀求表其墓苗君嘗為余言至于今鄉之人皆能道君之忠厚有為而台之君子仕於京者又為余言君學問之博操守之嚴世不多見且知吾故人陳煥嘗奏舉君君信賢乎哉則表之以示後來何辭按陳之先家譙唐兵部尚書舜舉之後諱仙者始徙今鳳陽之䝉城君曽祖徳仕元為金鄉縣尉祖華甫為河南江北等處行中書省理問追封䝉城縣男父岱官至山東行中書省參知政事母何氏君初名友亮既被薦入見太祖皇帝悦之賜名巖其字維石自㓜有孝行稍長一志於學所習日有程度不少懈而資識明敏器度宏偉鄉閭老長咸器重之初薦至未授官適湖廣峒冦不馴上命吏部選才識通辨者徃宣㫖撫諭而君在行及境冦猝數百人持兵虓至同行者皆色怖君勵聲曰吾軰奉天子命來何怖遂獨前從容諭冦曰若等皆良民聖天子念邊臣乖於撫綏致若等弗寜故命使者來諭徳意遂具宣上㫖冦感恱悉棄兵羅拜卒以帖服既還戸部奉遣督逋租於湖廣之常徳至則察其土瘠人貧白於朝請令輸鈔帛代租從之一府賴焉始授祁陽縣江湘市巡檢察姦捜匿境内以清常徳知府鈕衍薦其才陞浙江慈溪縣丞縣民困於田租之増額者為奏罷之嘗久旱躬走百里外禱鄞山之天井潭翼日歸雨隨注四鄙霑足嵗大熟在邑六年有詔求賢上元知縣陳煥舉君應詔陞順徳府通判授承直郎有惠政丁内艱去服闋改台州府通判陞承徳郎專督農事周歴屬邑致勤弗倦隨原隰以課樹藝固陂堰以備水旱教導有法期約有程而以惠恤為主民利頼之號之為佛云時詣學宫勸勵諸生親與講析將九載召還居無幾奉使命出過䝉城以疾卒于家疾革顧其諸子曰吾得首丘焉足矣獨恨食上之禄未有報也汝曹力農以供賦務學以效用庶幾副吾心耳永樂廿二年正月初十日也君持身端介未嘗茍取一毫言動循禮慎交際居官一務厚民葢年六十而卒以卒之月廿五日𦵏邑東南之原配李氏有婦道子男四人岐嶷崢􅲞女二人長歸臨海縣儒學訓導李青次歸蔡敬孫男十有二人嗟乎古所謂愷悌君子民之父母非陳君其人歟使陳君得一郡而專之以施諸其人豈下古循吏然一時之為郡者何必其優陳君哉矧陳君之才匪直一郡哉今幸遭聖明孳孳簡求牧守之是亟而陳君不逮非陳君之命歟非陳君之命歟薩孝子墓表孝子諱琅字用謙其先居今之順天府宛平縣其父諱仲禮仕元為福建行省撿校因家閩縣其母沙氏孝子生七年撿校君没其家素窶母誓守節不更嫁用長育遺孤男女孝子時雖㓜已能究知母心卓卓有立志旦莫躬採拾為養間得一味而甘必以歸養母恒弊弊焉惟母之寒餒是憂而已之寒餒勞瘁未嘗計也舅氏金孟相學行淳篤稍暇輙徃從之惟其訓之聽力學弗懈母心樂之母疾孝子晝夜侍左右躬煑藥進及疾劇衆醫罔所措孝子夜露禱北辰冀以身代母母時不食飲已七日忽蘇言曰適見人告我爾有孝子加爾夀三十四母疾少間而成風痺卧起皆孝子與其妻躬扶䕶雖中裠㢏器皆躬澣滌愈久而愈勤母卒距復蘇時實三十四月云孝子居䘮哀毁終身語及親悲不自勝郡縣欲薦舉孝行及奏求旌表者孝子聞之皆力辭鄉人林棠為著傳有司亦列其行於郡志上之鄉閭老長勵其子弟事親必舉孝子為説有素不能事親者聞孝子之風亦愧恥改行孝子有女弟撫愛甚厚於利未嘗茍取一毫嘗購馬氏地作室平治得白金一器舉以歸馬馬請内其半拒不受於廢圃得一囊皆金珠求其女歸之治家嚴肅警其子問學必以古人為師凡與學者言言躬行實踐與仕者言言事君愛民處鄉黨朋友必誠必信樂靜安貞未嘗一渉跡貴勢之門春秋六十有六而卒正統元年十一月某日也娶林氏其子二男長琦舉進士今為翰林院編修次璘早卒三女皆有歸孫男一文昌琦從余在舘閣數年余嘗熟孝子之行今琦奔訃將歸余弔之琦奉史官陳叔剛所述孝子事狀泣拜請曰惟先人墓石未有表也幸哀而畀之叔剛孝子同里人又言邑中嘗旱民耆老禱久而弗應或曰豈非誠意弗至乎曷如致薩孝子偕禱衆應曰諾孝子聞之即齋戒赴禱遂雨他日里中火災勢張甚衆無可柰何共輓孝子孝子及其衆叩頭籲天祈哀矜火遽熄嗟乎此豈聲音笑貌之所能為也哉孝子之墓宜有表不其然哉不其然哉夏伯亮墓表吳中有蕭散閒適之士曰夏伯亮氏喜浮游江湖而舟楫之行因以遷易有無濟民之用亦有什一之資於已也其言曰吾之為是也非若端木之少窶亦非若膠鬲之丁衰世惟其心之適於游矣葢嘗踰大江渉淮徐道齊魯以達乎燕薊歴覽其山川而訪問古人之遺事以豁其胷臆然猶自號商潛凡所得貨息有無葢未嘗計也伯亮諱亮世為蘇之某邑人其大父君實父文通母某氏伯亮蚤䘮父能挺特自立事母孝母數舉其孝以訓勵諸孫伯亮於親之𦵏祭皆謹而教其子必務忠信孝弟恒取古人言行以導誘之居鄉黨率交其賢者與人處不自擇利便臨利度義周人之乏赴人之急不慕榮不慕名既老子孫日衆乃買田淞南築室婁上逍遥雲林泉石之間又號婁東散人喜賦詩寫山水林木有佳趣好古善鑒别於凡器物欵識及圖畫定為某代某人而第其品格悉精當洪熙中用子貴封徴事郎中書舎人命下而卒是嵗三月十六日也春秋七十有三配石氏有慈儉之行式勤内助子男四昺㫤暠晟昺自永寜縣丞陞中書舎人㫤舉進士翰林庶吉士中書舎人吏部考功主事女二長適歸安主簿陳益次適龔珩孫男四欽鉞鈌鐸昺㫤皆嘗從余在翰林而㫤冣久自為狀求表父之墓故叙次而為之表曰其秉之恒其履之平處澹適清忘榮與名既夀考終有子在廷惟天明明祐善有徴河南知府李君墓表先皇帝臨御宵旰勞勤圖惟安民之道簡求賢俊任之牧守廼宣徳五年命監察御史李驥為河南知府賜之璽書命革民所惡而與其所欲河南地大務殷其民數困於旱澇又壓以親藩之重其嬖近及將校怙勢厲民民不勝弊李君至辛勤信詘起仆濡槁實虛而正綱紀明憲度民始有蘇息意而向之為厲者不得縱肆咸不愜志相率假親藩勢以摧君朝廷聞之悉捕假勢者置諸法君政治益行中貴人過洛陽有逼取縣帑白金去者君聞之遣吏馳追索之中貴人知君遣追俛首探懷中出以歸之黙不敢一語在郡興學禮賢均賦役弭冦盜咸盡心焉致勤職事率昧爽坐公堂或日中昃不暇食郡嘗大疫捐俸市藥以濟民嘗大旱躬禱嵩嶽雨隨降霑足所治一州十三邑吏憚其清民徳其惠鄰郡民有爭訟不平率走庭下求直為河南六年卒卒之日其僚屬及民耆老哀之如䘮親戚古所稱良二千石君其人哉君諱驥字尚德生六嵗而孤自少知務學謹言行見重於師友治詩經中山東鄉試為太學生洪武丙子車駕臨太學親㧞生徒十八人為給事中君與焉授戸科奏罷關市檢察商稅苛細之弊居無幾坐累免官後用薦起知新鄉縣為之有方雖時供億繁而民無擾招徠流亡數千戸咸俾得所丁内艱去民猶數詣上官乞奏留君不報服闋改知東安縣招撫流亡如新鄉勸課農桑凡民所未便者悉奏除之縣多狼嘗噬寡婦子寡婦訴於君君反躬自責而白寡婦寃於城隍神翼旦噬所有死狼云廷臣交奏君治行召為刑部浙江司郎中議獄平恕嘗上疏言崇教化重農桑育賢才選守令惜民力恤軍士汰冗官養㢘能抑倖進簡馬政通鈔法等十四事多見采納在刑部三年又坐累謫戍邉仁廟嗣位下詔求賢近臣奏舉君召為貴州道監察御史愈益自奮振舉風紀慷慨持論未嘗以訐為直嘗陳時務十事皆嘉納之巡歴所至斥姦貪奬賢能人用悦服馭下以簡居官稍暇手不釋書冊堂室至廪庾率揭銘以自警所用物雖几杖之微必取正直不可以茍在河南於治之後堂植梅竹松恒退食其中名堂曰四友其一君自謂也一日宴賔客堂中譚笑之頃奄卒正統元年六月二十七日也春秋七十其先世居青州業儒後徙兖之郯城曽大父紹宗大父輝祖父夀康母朱氏以君貴贈父監察御史母孺人封妻劉氏孺人子男五長隣長垣縣儒學教諭次傑次英次輔次恭輔先卒孫男二興道興邦士竒與君同朝素熟君徳善於江陵楊公𢎞濟江陵公嘗為君著傳至是又道隣求為墓文嗟乎李君外嚴重而内明恕處也孝於親惇於鄉仕也所歴勞績焯焯而冰檗之操夷險不貳嘗自號復一貞士考其平生隐顯窮達履之正執之固所云貞者不其然哉不其然哉故特為之表贈文林郎河南道監察御史劉君墓表君諱循字率性姓劉氏系出漢長沙定王發初繇長沙徙安成後由安成徙㤗和珠林累累有科第為㤗和之望又由珠林徙吉水夏朗又累累有科第為吉水之望宋咸淳元年進士官至文林郎桂陽州教授曰天聲其子益厚始不事進取而益厚子惟徳孫永寜皆以博學惇行見重於鄉黨君永寜之子也早知務學師從父湘隂州同知鶴皋任縣丞長輔及鄉貢進士王光薦咸器重之治書經博通子史百氏有志舉進士業成而科輟暨科復父母俱没慨然歎曰不及於養矣禄奚為哉遂不出志於訓子弟猶勉其從科舉曰學者固將行之且吾世業不可無繼也平居事親孝奉養𦵏祭皆以禮撫弟妹恩意曲盡以耕學立家而行之以勤儉為人公方不肯茍且阿狥言出而人服襟宇洒落喜種竹環所居數千竿題曰竹齋時時掀髯歌咏其中不與塵俗接也葢年五十有五而卒配王氏繼張氏子男四長鼎貫永樂乙未進士為監察御史次亮次敞次衍女三人長適王若旦次適張宗璉永樂甲申進士自刑部主事再陞為大理寺丞次適曽傳昌孫男四洪熙元年用鼎貫貴贈君文林郎河南道監察御史余未及識君而與宗璉鼎貫游皆篤實自重葢有以知君矣而君弟纉述君之行稱其材猷智識度越常情學士曽公嘗誌君墓歎其使得施所蓄所至未可量則君之處也豈不足乎用世之具哉非各有志乎鼎貫又求余言故為之墓表故廣西布政使司右㕘議林君墓表廣西布政使司㕘議林公永樂九年九月七日卒春秋五十有一林之先居光州固始唐末諱靖者從王審知于閩以功封忠烈侯終于閩子孫遂家福清之古隆至元諱廷玉隐居不仕生考亭書院山長時中山長生福建行省貟外郎子華公之父也貟外元季鎮潮州又家於潮公諱興祖字伯禎幼頴敏嗜學七嵗而孤母陳守節不嫁教育之稍長出從明師十四能屬文十五從師授春秋經日習舉子業家貧教授以養母而能盡孝母嘗坐舅氏累及至縣庭將笞之公叩頭哭哀請代笞縣併釋其母子翌日縣以禮幣舉孝㢘上京師授山東蓬萊縣主簿持恭慎凛然冰檗之操三年坐稽公務降龍江驛丞丁母憂去服闋改儀真逓運大使陞邵武府倉大使郡中嵗饑尚書夏公時巡撫福建得便宜行事郡集其屬謂曰民莩可憫孰能詣巡撫求賑者方隆暑惔赫衆莫應公曰興祖當行即懷郡牒晝夜倍程以進夏公覽牒從容未有言公懇懇言民命危急仰公如慈母義形於色夏公遽檄郡發廪所活數萬口郡守丁原振薦公于朝陞當塗知縣有寛惠愷悌之政興學以育才表善以勵俗而㢘操如蓬萊吏民戴之滿一載陞代府長史賜勑諭及襲衣文綺當塗耆老數十人伏闕下乞留不得皆涕泣去公為長史夙夜思所以匡輔之道疏陳十餘事又隨事直諫不見聴朝廷知之召還改工部都水郎中居無幾陞廣西右㕘議時安南逆命朝廷方出師討叛授之事命馳驛焉既至即躬詣邊境周視嶮易繪圖以進且獻所規畫又請兵之所加止罪叛逆預禁將士俘獲生口用慰來蘇之望踰年安南平郡縣其地調交阯綏輯降附振起凋殘夙夜盡心焉一日餘冦復叛公分守盤灘城所招降三十餘人皆在城中冦圍城急主帥慮三十人為變將盡殺之公曰吾既許以不死殺之不信將何以得後來者且三十人何能為卒不殺而冦解圍去公在交阯再嵗朝京師至滕縣卒其為人端重有雅度終日端坐人未嘗見其疾言遽色事寡姊如母訓育孤甥如子卒致有立其友張禮聞為學正死賔州子政孤弱不能歸公至廣西召與其子同學業成厚贐遣歸後政亦致顯宦公居官有實惠及人性澹泊不殖貨利家無餘貲惟積書數千巻嘗指示其子曰吾以是遺爾足矣汝勉之好為古文所賦詩有棠隂清趣集藏于家其配黎氏故名族有孝徳後公十年卒子男一厚永樂辛丑進士今為鄭州知州女二長歸叚某次歸百戸周鎮孫男五舉皋翬凖翀女二公卒之明年厚奉𦵏于郡韓山之東先塋之次今二十年矣具事狀介吾友彭子斐求墓表余其㑹試禮部時考官義不容辭故叙次而為之表曰孝篤於親行備於身仕有及民嗚呼伯禎君子哉若人太常博士楊希淳墓表吾泰和楊顥希淳永樂辛丑進士授太常寺博士能謹其職事有稱於縉紳君子三年天官考其績冣援例奏授勅命贈其考彦通文林郎太常博士妣韋及故妻劉孺人而封其繼母周為太孺人顥遂奏請歸舉焚黃之典命下而病作更數醫不治宣徳七年十二月初三日卒於北京享年四十有五搢紳君子聞其卒皆嗟歎惜之希淳為人篤實清慎事親能孝事長能恭處人能信臨財顧義其貧未嘗戚貴未嘗恃直而不肆質而不朴澹而可親吾識其大父舜卿及其父皆鄉善人希淳㑹試禮部時余其座主也其為博士也公務甚簡余邀置隣居而闢館延之授徒凡再嵗旦夕相接察其言行表裏始終一致焉嗚呼鄉人俊秀以言語政事馳聲譽自視髙出希淳上者比比而是而夷考其行平實如希淳者葢無幾人吾恒私計希淳足以長保禄位無顛蹶之患而一疾遽已非命也夫非命也夫然君子於希淳之論定矣其弟希武以其櫬歸𦵏泰和吾故書其行之槩授之使表諸墓其詳見諸墓銘者不復出也何子玉合𦵏墓表太醫士何彦徴在京師以醫見重公卿大夫而於余徃還十餘年相與尤厚其為人孝友平居致其父母之樂既徴詣京父母病且沒皆不獲在侍下語及輙泣涕澘然一日具其父母之徳善詣余拜且言曰不肖孤不孝親在不得盡終養之私親没既不能卓然有立以顯揚萬一又不能圖不朽於薦紳先生文字間是重其不孝也凡世之不泯其親者率有表著於墓今竊願徼惠下執事余固樂道人善矧惓惓孝子之心哉按何之先汴人宋有諱某號進齋者為國子學錄從髙宗南遷始家鎮江之丹徒世業儒至諱暹字明徳辛苦力學遂名所居齋曰明德用自儆學成不仕以醫可以及人遂精究岐黄之書有名於世其子煜字景宣亦深於醫而切於惠濟所及人尤廣娶石井里儒家茅氏生子男三人子瓛子玉某子瓛務學善楷法洪武中召書誥西掖既當授官引疾辭子玉彦徴之考也諱璧為人和厚謙慎於事親敬長咸當其分宗戚有孤貧無依者教育之底於成鰥獨者供養之終身賢士君子多樂與之交其禮度雍雍如也卒於永樂戊子九月十日春秋五十有七配郭氏元市舶副提舉原徳之孫處士源之子諱妙寜生有令質年二十有五歸何氏於事舅姑有婦道相其夫有妻道成其子有母道可為女徳之備者歟永樂庚子十月十日卒春秋六十有七合𦵏其邑之長樂鄉鳳凰山之左子男二彦徴彦宗女一歸吳祥先卒孫男四儁儀倫佑女四吳信楊悼其婿也其二尚幼曽孫男四女二考何氏之先以儒醫聞若子玉之太父父所及人多矣至子玉其施於躬儀于家亦皆善人長者也雖未嘗顯融於時古稱仁者有後將其子若孫之振耀光大庸可量哉庸可量哉周宗苑甫墓表顧山之西麓周氏暨陽名族也世有善徳暨陽多巨室而至今言務善之家必首推周氏葢自其郡邑之賢守令與士君子而下至閭閻畎畆無間辭云周氏至伯源當元季冦亂東西竄避備嘗艱苦我國家平定海宇始復故業辛勤薙莽除荒治田廬以務本植善功未半其鄉譁訐之風起伯源不幸陷詿誤謫戍山東後徙雲南宗苑甫父也宗苑甫諱閬方其父去時始成童念其父志之未成也奮起卓力致勤蚤莫家日以裕而飭躬務學孝友睦婣之行見稱鄉黨公家徭賦惟恐或後又不幸陷譁訐者之詿誤謫戍廣右後以疾代歸方將優游田里以奉親教子自適居無幾疾加竟不起永樂五年十二月十六日也春秋四十明年𦵏顧山之隂祔其祖之塋宗苑甫儀觀豐偉端重闊達有智識忠信樂義雖處艱難細行必謹平素急人之急賙窮䘏䘮視為當然惜其不及下夀且憂患之日多也配夏氏子男二伯曰璂仲曰珪皆謹行如父女二李樞郭琛其婿孫男三振拱某女九至是璂珪痛其父之生不獲伸也將圖伸於沒之後奉事狀及書求表墓嗚呼暨陽素稱道院葢謂風俗醇厚清净無事也數十年來薫染鄰邦澆漓嚚訟之風徃徃有作雖不過千百之什一然騁其險於傷人害物善良何以遂安也宗苑甫父子是已宗苑甫雖憂患艱危之際而立志持行顓顓不改平時豈非君子者歟故為之表東里續集巻二十九
