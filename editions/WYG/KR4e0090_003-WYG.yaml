body:
  text: 東里文集巻三明楊士竒撰序贈醫士陳名道序江漢間其俗尚巫有疾不事醫唯走巫求禱焉徼幸以治載醪牲實篚造謝巫之庭唯恐後即不治不咎巫必自反曰我之弗䖍不敢懐纎毫怨憝且慮復有求也間有知巫之妄而從事於醫又罕遭乎良焉素不明隂陽表裏脉治之説而稱醫之師醫之師其治或投數十劑不效而又増劇者故雖什伯中復有一二精其術人弗信之矣江夏宋惟憲其弟病且殆凡與惟憲闗忻戚者皆强之禱巫惟憲不應方博求為醫之良者有進陳名道既至診而藥之旬浹遂瘳惟憲謁之謝焉夫醫聖人之教也聖人憂民傷於寒暑饑飽勞慾有至乎夭死故為醫之教使得保終乎天年者也巫者古以事神非有盜神之號以欺人也今盜神之號以欺人人亦安其欺雖百死不悔於乎先王之治天下有假於鬼神時日卜筮以疑衆者一拘殺於司冦巫所為疑不既甚矣乎故巫不誅醫不行民得保終乎天年者幸也然使今之信醫者皆惟憲為醫者皆名道巫不足誅也而一惟憲一名道巫其可勝矣乎吾喜名道有成又重嘆乎聖人之教也於是乎言洪武廿二年冬十有二月既望廬陵楊士竒序贈蔣醫士序凡至劇之患欲薙而去之必積漸而功立何者其劇也非一日之致故去之亦非一日之力流水之盈繇尺寸以進乎尋仭決而涸之一舉手之力哉必若閑之於始萌防之於始達斯力省而效速吾見今之人嬰乎疾疢也觸寒暑風雨肆嗜慾食飲勞膂力筋骨慮思其始漠然若無所與乎已及嵗積月累既痼且亟方委諸醫療而藥一進弗效即詬為庸淺屏去雖十數易醫皆然底死無悟者江夏陳希逺病三閲嵗謁數醫皆無近效最後謁蔣添祥氏曰非六十日弗瘳砭以伐其堅焫以決其㑹藥以窒其虚及期而瘳今之醫去古逺矣始則試中則審終以致其力者蓋通術也求之者誠不計久近而一委之成功宜鮮不有效惟夫名是而實非者不可久任而不速易也若添祥者其可以久任而不可以速易哉希逺徳之求余文為報并著久徴之説云送梅清隱遊武當序江夏梅清隱温厚明敏而廢於盲不得効用當世既壮棄其家去郡城之東長春山之下從學道人簡中陽居以習長生久視之訣固門崇垣閟足跡不出人亦罕至其處或時提青嚢賣藥行西市中人見其膚肉肥腴雙頰渥渥有色雖目不及視輕袂飄颻不可追逐皆疑其有所得者而清隠弗是也居無何中陽以為學非遊不充聞武當之山與人境遼絶其中多異人鍊士而拂衣徃遊矣又無何清隠慕其師之為将由大别泝洞庭道荆門望方城峴首而去吾聞昔列禦㓂好遊壷丘子曰外逰者求備於物内觀者取足於身又曰取足於身遊之至也列子信之而不疑清隠能信其説如列子之不疑乎不然斯行也将不遇壷丘其人者為子傾倒哉遇壷丘其人而為子傾倒則反而舍也吾知有與子争席者矣士有為詩以道行者求余首序云贈曽士榮序古者論士先徳行而後文藝後世重文藝故士有敦行寡文者或屏棄不錄士榮游邑庠其孝友行於家忠信重於鄉問學信於師友今年部使者行郡縣勵新學校考諸生經義不治者罷黜為吏以懲而士榮與在遣中知士榮者莫不枉其去曰此非世所稱敦行士耶非以尺枉遂舍其尋直耶抑固其有命耶士榮且行來告别吾與士榮皆陳之出也属卧病山中不得徃餞嗟乎子往哉吏何足以辱子三代之時詩書法律同一理也其後始由詩書曰儒由法律曰吏夫吏不根儒或盭於道儒不達吏或滯於用子根儒以治吏理覈而務通功立而譽顯将不由吏以探重祿躋髙爵乎徃哉士榮方今聖明更化率古論士以子之行将必有能知必有能言者矣吏果不足以辱子也遂書以壮其行送鍾用之還蒼溪序吾友鍾潛用之以鄉貢進士授保寜府蒼溪縣學訓導明年謁告歸省踰月復行吾一邑之士皆咨嗟嘆息曰當國家熙洽時儒術柄用士通一藝名一善者無不登榮躋要遂展其所藴用之以閎通之學邁徃之識忠貞仁厚之節竒偉博贍之文而不階顯庸乃弊弊然以一校官走八千里荒落之區而不得施其所抱負用之固當如是耶用之方覓覓然治行李就道無幾微窮慼之意見於色余曰君子之於道不擇事而行不卜地而處用一鄉則道徴於一鄉用一國則道徴於一國用天下則道徴於天下曷徃不得哉昔夫子欲居九夷猶宜於委吏乘田之職今蒼溪雖逺王邑也校官雖卑儒官也吾居王邑守儒官談周公仲尼之道以淑其人正其俗吾之道行矣吾何窮慼哉或曰用之篤孝人也二親俱七十垂白乃去此即彼不獲朝夕在侍其誰不戚戚於中耶余曰夫賢父母之志固有樂其子之行道者用之以是樂其志可以為孝朝夕云乎哉於是衆皆知用之能躬夫孝之大者其不窮於下位也必矣相率為詩送其行而余為序云贈謝敬常劉彦達彭永新赴京序萬安於泰和宻邇同鄉也余與謝敬常劉彦達彭永新皆逢掖誦法周孔同道也繇吉至舒一千里兩艫並載聯行比止時時互過從取醪茗解覊寂相講論吟詠為娯同好也敬常彦達選進士當赴春官永新以業成上游太學連茹而升而余方疲於奔走将弛擔南還於是乎出處之不同也萬安雖小邑士生其間多敦厚明秀沐教育之澤歌鹿鳴而起者内而詞林頌䑓之任外而郡守縣令之寄於時多有譽名今三子者積學執德志篤而識逺才優而務通相繼以出又際國家求賢若不及之時将不皆有譽名於時者乎若是者吾雖處猶将與被光榮於蓬藋之下豈以有所不同者為歉哉故書以贈别送劉仲珩詩序吾友劉仲珩盛年雅操博學篤志徃年授重慶郡學訓導嵗中丁内艱去今服闋調巴縣巴重慶附城之邑視其装蕭然而怡怡然買舟載其妻孥書册道萬里之險以就斗石之祿而無所不懌之意吾聞蜀中山川瑰偉竒壮甲於天下班孟堅稱其土地肥媺有江水沃野山林竹木蔬食果實之饒且其扶輿清淑之氣鍾於人文章有司馬相如揚雄陳子昻蘇明允父子操行有嚴君平輔相事業有范蜀公張魏公虞彬甫明於聖賢道學有南軒先生而四方聞人鉅卿游宦於此樹政績揚聲譽者加多也士得一命而道乎此能用志於内即山川之勝覽昔賢之迹必将油然有得於中矣是行吾為仲珩賀然願有所寓焉始蜀人未知學文翁誘進之而艱得師乃選小吏十餘親飭厲之遣詣京師受業博士減省少府用度買刀布蜀物齎計吏以遺博士可謂勞矣數嵗蜀生成就歸用次察舉官有至郡守刺史者時以為榮今幸遭聖朝文明之運蜀子弟為學不出其鄉師資廪養皆出於朝廷無所勞費學成而官之自郡守至於藩翰於六卿蜀之士往徃與齊魯並其為榮如此國家之厚賜也夫受厚賜而不知勉焉樹立圖報稱非君子之心願因仲珩以寓告巴之學者士友有為詩贈仲珩者余因叙其首簡焉送楊仲宜詩序皇上以文教治天下特寵厚儒者簡徳義文學之士置之翰林任以稽古纂述之事而隆其禮遇凡翰林職務任之五人者禮遇尤隆既榮極於其身暨其家之父子兄弟與被其榮者亦至矣五人者左春坊左庶子兼翰林院侍讀永嘉黄淮右春坊右庶子兼翰林院侍讀吾郡胡廣右春坊右諭德兼翰林院侍講建安楊榮翰林院侍講清江金㓜孜士奇之不肖亦辱與數焉五人者恒相與感激陛下聖徳千萬嵗一遇豈可茍焉以昧報稱蓋以為勤於務者必慎於身愼於身者必端於心端於心而後發於思惟言動常在乎善不在乎不善五人者皆能胥視一體交相警發無所拂逆又非獨相警發於已而已於其家之兄弟子姓無不皆然其相益之意忠且周如此庻幾古人益友之義今年楊君之弟仲宜來省兄京師得胥晤焉其為人恂恂謙愼無幾将歸請於余曰幸有以見教因舉余五人所以相益者告之告之固望其不沗與被寵榮以光輔於吾楊君也於是黄君胡君金君繼余作詩贈之與楊君交好而名能詩者又繼作焉壽尹先生七十詩序余讀詩至南山有䑓未嘗不嘆昔人之善於祝願也願其致福也則勉之以徳願其膺福也則望之以壽斯二者既反覆詠嘆言之而又祝願於其後之人以致無窮之意不獨望其一身而已古詩人忠孝之意可謂周矣西昌尹務厚先生今年春以上海教諭九載考績留京師三月壬子實惟初度之日凡其鄉之門人學子與其交游之子弟相謂先生今年越歴四百二十甲子矣相率持酒醪列拜為壽又各為詩以致祝願庶幾古詩人之意矣先生飲酒誦詩樂甚取詩命余序余惟先生惇厚直方居家有孝弟慈儉之節居鄉有仁義忠信之行學問用於時資於人而平生儕軰今皆漫滅獨表然如松柏茂悦於氷霜嵗寒之後居官二十餘年坦坦如一日有二子皆恂恂能明經屬文諸孫亦森森蘭茁可以樂志洪範所列皇極之福先生兼有之矣是詩之作可謂紀實豈徒如古詩人祝願於方來者哉敬書其簡首送王澄淵序澄淵始舉進士上京師留太學余時被徴至閒暇輙相徃來澄淵確乎其志也充乎其氣也温乎其容也霈乎其文也無㡬擢梓潼知縣梓潼距京師八千里道峻山奔川踰不測之險以入乎幽深閒寂之地民質務簡無所勞慮益得用其志於所尚更數嵗復來究其所藴蓋進而深矣既陞祿勸知州祿勸去京師萬里其所道逺且險與其地其俗之陋皆倍於梓潼更數嵗復來究其所進又深矣士壹志乎内無所累乎外則道曰進徳曰脩無徃不自得也澄淵為祿勸三年民悦而安之天官考其績最此非今之循吏者乎古之循吏有去而陟清要為輔臣道行於當時譽流於後世而皆自州縣始有如澄淵吾知祿勸不足以久淹之也雖然詩不云乎靡不有初蓋古之君子皆致謹於其終也請書以為復任之贈送鮑教授詩序武昌鮑崇禮夫為瑞州教授瑞人士與守貳以下及過使客之賢者皆稱禮夫能教能興學今遷吉安吉去瑞數百里凡仕兩郡者其賢不肖與才之稱否輙相聞知不能掩也故禮夫得吉吉人士在京師者皆喜相語曰鄉郡之學将來所成益盛哉相率為詩送之進士陳賞嘗學經於禮夫屬余為序瑞固民秀而俗淳自禮夫為教授夙夜盡心奨率訓誘而後瑞之學者知自勵賔興科未嘗乏人自禮夫去瑞數年繼禮夫者不能究於其職其學者亦玩愒茍且鮮有成效然則學之廢興謂不繫於人可乎吉之民俗優於瑞其學者嵗大比賔興徃徃擅江以西第一然十數年來職教者求能如禮夫盡心奨率訓誘蓋少也吉人得禮夫云胡不喜哉然學校之教以成徳育才為治平之資化俗之本非獨以為言語文字之習而已為師者誠能端諸已而見諸行事有以感發人心使之興起益進乎道處焉可以善於身表於鄉仕焉可以輔君而澤民如此其效顧不重且大哉以禮夫之賢必不遺於此乎雖吾於禮夫前未嘗相識而相聞有素故於斯行也有望焉魯林懐思圖詩後序太常寺丞孔克準宣聖五十五代孫其先自宋衍聖公端友隨髙宗南渡家於衢於今将十世克準北望尼山水木本源之念未嘗忘也間以其魯林懐思圖及所得翰林諸公詩文屬余一言叙之嗚呼孝哉克準之用心也今天下林林之衆孰非古聖神之裔獨孔子之裔累代至今朝廷加寵之著在令典下而公卿大夫以及韋布之士遇孔子之後亦莫不厚敬爱以相接不敢衆人視之何也非以孔子明帝王之道垂範後來開太平於無窮既受其賜則尊之親之不敢忘因以及其後人者乎則於夫子生之所居沒之所藏子孫族姓之所聚處孰不欲造焉以愜其平生慕仰之心况身為之後者乎此克準之所為惓惓者也吾聞元有天下詔求曲阜之後将命為衍聖公主孔林之祀議久未決有言衢孔故世嫡也徴至力辭曰先人葬衢數世矣不可以去請授曲阜之長者元君嘆曰寜違榮而不違道真聖人之後也從其志而命為國子祭酒蓋君子有不得已而去先人之鄉者歴世既逺勢不能復則脩其先人之道誦其言考其行服膺而奉行之以圖無沗誠若是也即去之千里之逺百世之久可以為孝不然徒誦其言而不知其行知其行不知率而由之則雖旦暮不去其先人之側可以為孝乎故曰孝者善繼人之志善述人之事者也推克準之心誠由先聖之道可謂孔氏賢子孫矣衢孔之仕於朝而與余好者三人國子學正某先生父子及克準皆賢者也而今獨克準在余安得不因是以重致愛敬之意哉武昌十景圖詩序武昌郡在禹貢荆州之域春秋為楚夏汭漢為鄂縣孫呉徙治之始更名武昌呉以後沿為郡起武昌城西臨江有山屹然而髙者為黄鶴山郡志稱黄鵠山山之陽有黄鶴樓因山以名或云仙人費文禕嘗乘黄鶴於此黄鶴樓之東有庾元規南樓樓之西有石鏡亭其北二里所有鳳凰山皆以形似名之又南去庾樓二里有祠祀孟孝子宗祠前有竹數十挺相傳當時哭筍之處皆在郡城中由黄鶴山之西越江為漢陽郡大别山在郡之北與黄鶴山夾江而峙江漢二水合流其下起黄鶴山東去十里所為洪山山半有釋迦氏浮圖而飛樓疊閣聨絡乎其下城南有鸚鵡洲在江之中洲之上有禰正平墓又有呉将黄蓋所屯黄金之浦與鸚鵡洲相接又有屈原所稱南浦在洲之東皆紀於載籍以為是邦之勝四方聞之者咸願身造而目覽過之者必不以事而廢遊也然其地連雍汴接廣蜀衿喉江淮統㑹湘漢又宻邇夷獠㝠頑不馴之境故累代皆宿重兵鎮之而士之仕於是者職務之煩寝食不暇凡前所謂是邦之勝常曠嵗不能一造豈其志弗尚乎此哉大同蕭秉文官武昌左衛幕六年衛之政無大小輕重一由於幕故其勞勩視衛之他官為甚而是邦之勝六年之間或一二至焉或過之不逺十數歩不能一至焉或徒得於逺望焉間求善畵者圖為十景又求善賦者分詠之又求余序之将於退食之暇時自覽適余聞張弛者文武之道也張而不弛文武不能則剸繁理劇之餘其有所適於性情也誠宜而士君子於一視一聼必有所監省又非獨以自適也秉文從容公退展圖興思如睹大别則思大禹之勤勞乎民睹南浦則思屈原之忠藎乎君睹黄蓋故壘則思立功者當博採衆長睹禰氏之丘墓則思用人之才貴乎有容用巳之才貴自重也以至睹靈竹則思惇乎孝誠睹庾樓傾址則思清談不掩於塵汙如睹形似之假托則思冒虛名者非有所益睹仙佛之説則思聖人之教於民生實用為何如也凡游目之頃有動於中無非為己則所存所施事上馭下之道豈不尚有裨益哉豈特性情之適而已郭氏續譜序西昌城北郭氏其先河南人出宋僉書樞宻院事逵逵之子忠孝忠孝子雍徙峽州雍曽孫原吉又徙臨湘原吉季子匯為袁州司户避宋末之亂來西昌遂為西昌人四世至敬守始著譜又二世至公緒著續譜以求余序宋史忠孝受易中庸於程伊川號兼山先生靖康初金兵犯闕力陳追擊之策又陳戰守利害等十餘事後為永興軍路提㸃刑獄與敵戰死城下贈太中大夫雍傳其父學放浪峽之長陽山谷間號白雲先生張孝祥薦於朝召不起賜號沖晦處士孝宗知其賢命州郡嵗時致禮存問更封頤正先生而雍於易發明精到郭氏之先可為盛矣其徙西昌也更三世皆隠處不仕國朝始有仕者敬守慶宜兩先生皆治尚書洪武中敬守先生累官登州府學教授毅然師道自重慶宜先生由廣東按察使僉事改湖州府經歴亷厚之節吏民敬愛之亦一盛也其後彦鉉累官順徳府學教授致事彦遷終瓊州府推官公緒舉進士歴陜西浙江廣西貴州按察僉事郭氏之盛蓋未已也源厚而流逺可以觀其世徳矣余家與郭同里敬守慶宜兩先生少皆從游先祖兄弟而於先考為莫逆交余之蚤孤也兩先生望其無忝先世奨勵誘掖恒若不及如覺其有分毫之進津津喜見顔色嗚呼今安得復有忠厚不遺故舊之家如兩郭先生也哉彦思彦鉉彦常彦遷亦皆於余厚有善相輔有過失相規今惟彦鉉與余在而皆白首徒各抱暌違之念於數千里外公緒以才能當顯任卓卓有亢宗之志余故因此譜推考其先之盛者告之而俯仰今昔有不能已於嘅焉桂巖集序襄府紀善三衢江秉心錄其先世科名并所受賜詩及行實遺文而附以當時名勝之文有闗於江氏者為一鉅册名桂巖集桂巖江氏家世所居也以屬余序余受而閲之曰嗚呼其盛矣哉昔者江氏世有聞人瑕丘之經學次翁之巨孝應元文通之文章皆焯焯著稱而近數百年來江氏文獻特見衢睦間民表以正言直道動當世子逺以文學徳望位宰相死國難皆盡忠所事焜燿簡册而族人自宋以來擢正科七十有七人他岐進者不與仕而紆金紫銀青七十有八人下此者不與何其盛也蓋吾有感於其先矣錢氏奄有呉越江之先曰漢臣實事之呉越習俗侈靡費用無藝不足又益取於民其田賦市租山林川澤之税加數倍宋既平諸國賦税一仍其故籍錢之歸朝也以漢臣上圖籍漢臣慮故籍之厲民無已也沈諸河而自劾太宗怒欲誅之已而舍之凡隨錢氏來歸者皆得官獨漢臣以廢斥死後命右補闕王永均呉越田税錢氏舊税畆五斗永更定為一斗還奏太宗不悦永曰畆税一斗天下之中正使新附之民被朝廷仁恩顧不可耶遂從永所定永曽孫珪官至金紫光祿大夫尚書左僕射封岐國公世以為永隂徳之應事見史傳永之減税本於漢臣之沈籍其徳同斯其後世光榮盛大亦無以異矣嗚呼為國重得民心故春秋有税畆之譏國風存碩䑕之刺而馮讙為孟嘗折劵書尹鐸為晉陽損户數仁者輔人家國一務捐利以得民也以徳益乎上以惠益乎下天道福善雖逺不爽然則江氏之盛吾安得不推本其先哉秉心上距漢臣十五世距子逺五世初以文學擢司經正字與余同事仁宗皇帝於春宫秉心特荷知遇後擢為紀善江氏之福澤其未艾也哉其未艾也哉送陳叔振序余居京師二十餘年四方賢大夫士之在朝者皆得識之其尤賢者得相徃還而樂也臨安故宋之都㑹其山水秀麗鍾於人多俊爽明達適當世之用然溺於其俗率務外忽内遂物狥時者或流而不返飾行與文者或矯以自髙而求夫和厚端介志乎内不役乎外蓋不多見焉陳鏞叔振舉進士為庶吉士在南京翰林與余處六年殆所謂和厚端介不矜不屈者非臨安之特出乎既與余先後來北京余調春坊叔振亦擢禮部主事而閒暇輙復過余蓋有志乎其内也今叔振調南京禮部相去益逺相與之樂益疏矣夫君子之於學也不以窮達壮老而茍有怠意今南京諸司職務視徃年千百之什一而載籍所萃四方莫加焉誠以其餘閒探索義理之正以究聖賢之用心卓然而行之将所至豈特出於一鄉哉鄒孟氏曰尚論古之人古之人以叔振之資與志無不可至勉哉叔振豐城有史志静余嘗相與者而違闊久矣今於叔振為同官其亦為致區區之意送余侍講序宣徳五年春翰林進兩朝實錄賜宴賚既勅吏部進纂脩以下官士大夫之與於斯者皆忻忻仰戴徳意侍講余學䕫不竢吏部覆奏不謀於相知即入䟽自陳臣年将六十雖未老而纒於疾病不堪事事幸天地大徳賜矜憫俾歸依園田以終老則臣未死之年皆陛下賜之也上察其誠命致事既而吏部奏纂脩以下官皆進一階時同事者多自忖念其効勞不加學䕫而沗冒寵榮以為愧旁之觀者亦嗟嘆學䕫纂脩之勞多宜進於榮乃決然辭去此其志又有加於人者學䕫曰吾得歸榮莫大矣即詣謝辭遂行士竒交學䕫踰三十年同在京二十五六年志同道契方資旦暮相慰藉於視其去能無情乎哉學䕫明經博古負直氣侃侃遇事徑發不肯茍有阿狥貴而能貧利不當其義不取而於赴患難如饑渴於食飲有嵗寒之操焉今西昌前軰道徳風流逺矣後生晩出日陷溺汙下不知自㧞何幸有學䕫歸作之儀表一振起頽弊以復往昔又士竒之所望也於其行道以贈别泰和王氏族譜序吾泰和故家唐宋來文獻有傳譜牒有錄者不翅數十姓其自金陵來者七姓七姓源本之盛莫有過王氏者蓋司徒導功徳譽望為晉之重也泰和三百年前以詩書致通顯起聲光亦莫有過王氏者蓋户部侍郎天章閣待制知諌院贄受知宋仁宗也侍郎之後在宋累累有科名元盛時以道為鄉鉅儒嘗出游汴時仁宗在汴李平章孟邂逅竒之固邀入見辭曰奉父母命游汴而已遂歸國朝混一海宇鄉之儒師故老存者無幾人而以道之子子與子啟兩先生巋乎鄉邦之重子與凝厚明粹子啟嚴肅方正學者蓋擬諸河南二程子與嘗以説書徴至上書論事授福建鹽運副使以老辭子啟舉學官歴監察御史廣西按察僉事崇慶知州子啟無嗣子與之子伯貞先生用徴聘為廣東按察僉事工部主事瓊州肇慶兩府知府肇慶二子行敏行儉行儉舉進士為翰林脩譔進侍讀又進右春坊庶子兼翰林侍讀學士又進詹事府少詹事仍兼學士行儉子䆅為泰和縣學訓導父子同曰受命京師之人皆榮之古所稱碩大之宗者謂學行閥閲世有繼續雖久逺不能無盛衰隆替之異要其徳善為之本者常在也吾於王氏徴之矣王氏故譜更世變不存行儉今訪求復作之存其信闕其疑一本於仁人君子之心蓋積嵗而後成愼之至也今以授䆅歸而屬余序楊氏居泰和四百年兩家門户相埒代有交游婚姻之好吾少及承教子與先生兄弟及肇慶公今雖老恒識不忘而與行儉皆少貧以學今聨官於朝廿有七年亦皆兢兢不敢一曰怠肆以辱其先人然則余於斯譜其可以無言乎敬為之書䆅兄弟以及其子若孫世朂之哉東里文集巻三
