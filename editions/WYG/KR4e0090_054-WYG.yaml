body:
  text: 東里續集巻二十六明楊士竒撰神道碑戸部尚書古公神道碑銘宣徳三年二月十八日戸部尚書古公卒訃聞上遣進士康琰賜祭命有司給舟歸其喪且營塟事既塟其子本奉禮部尚書蔚公所述事狀走北京介少保夏公求書神道之碑余與古公同朝三十年知其有亷清之操諾而不辭公諱朴字文質號素軒古氏世家河南陳州諱義甫娶王生諱安道娶程公之大父母父母也以公貴公之大父父皆贈資善大夫戸部尚書大母母皆贈夫人公洪武中舉鄉貢為太學生奉命清理郡縣田賦圖籍丁父喪歸服闋𨽻五軍斷事理刑遂奏家貧願仕得禄養母太祖皇帝嘉之除工部營繕主事授承事郎迎母就養京師居無幾母没官給舟歸塟服闋改兵部車駕司主事陞武選司員外郎授奉訓大夫再陞郎中授奉議大夫遂陞兵部右侍郎授嘉議大夫太宗皇帝正大綂轉左侍郎授通議大夫賜文綺襲衣上巡守北京侍仁宗皇帝監國嘗奉命權禮部兵部及詹事府洪熙中改通政使是嵗陞戸部尚書授資善大夫賜誥命追贈二代遂謁告歸省墓賜鈔襲衣公事親孝非其義一毫不苟取居官臨事蚤作夜思勞勤弗懈一志於公無敢干以私者謹守祖宗成憲不肯踰越或言事久於時小過不及者亦當損益就中終不為動永樂中建北京宫殿董伐木之役於江西有愛民之心竣事特被賜賚戸部主事劉良素行不檢滿三載公考其績下良叩上之左右人求公最考公曰貪侈之人幸未覺露不改行終當敗最考不可得也良遂誣奏公他事既就逮繫太宗皇帝燭其誣竟釋公他日吏部奏授良誥命封贈其父母仁宗皇帝曰愷悌君子福禄攸降是嘗誣奏大臣罪者其得為君子乎不與良卒以贓敗衆服公之明公所治職務退未嘗語其家人氷蘗之操確乎不移平素不事生産華靡雕琢之玩纎毫不畜公退清坐一室書册自娛嘗病士竒往問之入其齋室几案間獨有自警編一帙可以觀其所存矣洪熙誥辭有端厚簡靜操行清潔之褒蓋見知於上者深矣卒之日無銖纍之積以遺子孫男三瑄璟皆先卒季本也女四賈瑩孔彰陳諫李怡其婿也孫男若干銘曰古有恒言曰公生明何道而公其惟㢘清㢘之為行士分内事曷世由之什靡一二士行弗貞理曷由興嗟文質甫為㢘有誠厥㢘伊何氷壺玉映迨其屬纊室類縣磬紛彼貴仕夏屋渠渠嗟文質甫歸兮焉居紛彼榮爵田亘阡陌嗟文質甫歸兮焉食其履湜湜其心休休汚者之嫉清者之逑相彼貪人潢潦之溢崇朝而盈涸不待夕嗟文質甫皦乎不緇永揚休聞其在斯碑故光禄大夫柱國少師工部尚書追封茌平伯諡榮襄吳公神道碑銘公諱中字司正姓吳氏世家山東之武城業儒曽祖淵祖興仕元為任丘令考成皆以公貴累贈榮禄大夫正治上卿少保工部尚書曾祖妣某祖妣某妣某皆贈夫人公洪武戊寅自國子生授營州後屯衛經歴陞大寧都司經歴太宗皇帝義旗初舉師至大寧公以衆出迎公潔白豐偉應對明暢上一見㧞於群衆中賜襲衣命守㑹州教士卒力田南兵攻城率衆卻之移守薊州捍禦撫綏具有方畧賜衣服器物以嘉奬之遂命署北平布政司理問陞本司經歴給饟運賛城守並效勞績陞大理寺丞是嵗旱蝗公言此由刑濫所致皆臣等之過乞戒飭法司務寛平無幾陞少卿以發奸慝陞都察院右都御史將營北京宫殿改工部尚書奉命取材於蜀還又命董饟運北京賜帛六百匹車駕北征公扈從兼督饟運既還丁外艱歸起復仍命董宫殿營繕公言營繕吉事臣喪服未除非所當預改刑部尚書後以言事忤㫖逮繫仁宗皇帝嗣位復刑部尚書改工部尚書命兼詹事進兼太子少保宣宗皇帝嗣位尤見信任陞少保仍兼尚書賜寳帶金織衣已而坐累解少保公事三聖皆見信任凡車駕行幸不以遐邇皆在扈從三陵之建皆公董役竣事皆有銀幣之賜皇上嗣位以公舊老復少保重建奉天華葢謹身三殿乾清坤寧二宫命公董之蚤莫勞勤致疾功成公雖在告嘉念厥勞陞少師賜白金文綺加繡麟衣無幾疾竟不起正綂壬戌六月丙辰云訃聞輟視朝一日遣禮部尚書胡濙賜祭追封茌平伯賜諡榮襄命有司治塟官其子賢世襲錦衣衛百戸公為人和易闓爽勤於奉公其掌刑憲寛厚平恕恒躬視獄中命除穢惡疏桎梏時食飲戒飭吏卒以時撫恤迨遷冬官職務填委規措經畫條理井井心之黙識雖久不遺襟度有容雖忤不校或屈已伸謝愛護僚屬恒掩其玼其佐在南京者嘗賦造海艘材於江西浙江江西加數十倍時論讙譁公聞駭愕遽奏罷賦悉給於公屬官有器能者率奬進之先事蓄材以應時需隨用皆足未嘗缺乏自正綂來京師多大營建悉出公家有司不知百姓不聞此本皇上之仁亦公預賛畫焉明於燭姦嘗四鼔入朝道遇負鈔數十萬緡者公曰非冦而何命從者悉縶以奏詰之乃造鈔匠盜寳鈔提舉司鈔遂置於法邂逅有見必上聞不以出位為嫌歴事四聖皆承厚遇所得賜賚時鮮與儗宣徳中嘗賜銀章其文曰和敏詳達葢以貺公之行云所得書詩圖畫尤多自念久病奏乞停禄不允家居事親孝常迎就養京師備極崇奉親没致御祭之榮永樂中命大臣之子入侍皇太孫公推於其弟雖貴待姻戚鄉黨相與欵洽如布素時賙窮恤匱不問識與不識與人處謙和怡愉大官中貴皆樂親之屬纊之日哀悼之衆無間疏戚享年七十有一塟良鄉縣某鄉之原配劉氏封夫人子男七皆側室某氏出也女三長嫁錦衣衛指揮李洪餘在室孫男若干余與公同朝交四十年至是賢奉少保江陵楊公所誌墓文求書墓道之碑遂益以余所知者序之而為之銘銘曰奕奕吳公興自成均發軔伊始感㑹風雲共武之服從師于邁攄勤效謨夙夜靡懈乃進棘寺乃陟柏臺隆隆寵光亨衢𢎞開正法以施秉公持平遇災引咎帝嘉乃誠遂掌邦禁詰姦刑暴惟欽惟恤恭帝之詔再入冬官如古司空居民時利飭材考工鞠躬致誠歴事四聖陟降左右式恒厥敬廷多其績時偉其望巖巖師保六官之上曷不憗遺而遽長歸七十髙齡於古已稀夀富考終亦既寧只史氏有銘詒厥來嗣顯忠輔運推誠宣力武臣特進榮禄大夫右柱國太傅黔國公追封定逺王諡忠敬沐公神道碑銘正統四年三月十八日黔國公沐公薨於雲南之楚雄訃聞上悼念輟視朝加隆卹典遣官賜祭者再追封定逺王諡忠敬親王亦再遣祭其子護喪歸南京公卿文武群臣及所過方嶽大臣皆祭以薨之嵗十一月廿六日塟江寧縣長寧北鄉觀音山先塋之次沐氏鳳陽定逺人其先所自具前翰林學士王景所著黔寧昭靖王神道之碑王之髙祖考曽祖考祖考以昭靖貴皆追封黔寧王髙祖妣曽祖妣祖妣妣耿皆追封黔寧王夫人昭靖四子伯諱春襲封西平侯殁諡惠襄仲即王叔昂右軍都督同知季昕駙馬都尉王諱晟字景茂自少氣宇閎厚端慤凝重聰悟過人而博學逺識恭慎寡言喜愠不形於色髙皇帝重之既冠授後軍都督府僉事夙夜祗勤陞授特進榮禄大夫左都督時惠襄繼昭靖鎮雲南薨王嗣封西平侯仍奉命鎮雲南王承父兄之後秉誠殫慮益𢎞逺圖威服徳懷恪勵夙夜先是麓川不靖諸蠻逐宣慰使而分據其地王適至奏發兵平之復奏以其地置孟養木邦孟定三府鎮沅威逺二州干崖潞江灣甸大候者樂五長官司而嵗徴其貢賦又於潞江之西置騰衝千戸所以控制之夷遂帖息太宗皇帝臨御之三年八百蠻酋侵邊王遣將先率兵討之躬率兵繼其後䝉自縣蠻聞王來遂遁進擒其酋誅之事聞賜璽書白金勞王四年安南叛命征夷將軍率京師及湖廣等都司兵討罪命王佩征夷副將軍印充左副將軍率雲南等都司兵分道進討王率兵由䝉自經野蒲斬木通道以入先遣偏禆攻奪猛烈棚華關隘賊徒悉遁遂築堡駐兵造舟分遣諸將出宣光江口奪澳沕寺沙舁舟夜出洮水陣師遂遣將引兵泝流攻賊之富良江自旦鏖戰抵暮賊引却翼旦諸將咸欲奮擊王曰受命弔伐所欲得兇渠數人耳縱殺非皇上好生之心乃止遂造浮梁渡師時征夷將軍大兵亦至廼合攻冦之多邦城柵繼搗其東西二都及盤灘困枚嚕江仙侣等冦悉破之冦首黎季犁父子狼狽棄其衆獨挈家屬及左右心腹逺遁於海王合征夷將軍兵追至日南州竒羅海口擒俘無遺械送京師凡得郡四十八縣百八十六戸三百十二萬五千九百獲象馬牛畜軍資器仗安南平六年春班師入朝賜號顯忠輔運推誠宣力武臣特進榮禄大夫右柱國封黔國公食禄二千石賜誥劵玉帶金幣命子孫世襲既大宴上親製詩褒嘉又日賜宴於便殿還鎮雲南是冬安南餘冦携貳命王佩征夷將軍印總兵討之王師壓境冦遁入乂安海島追至占城之境擒冦首陳季擴阮帥鄧容等送京師誅之師還仍鎮雲南十七年富州蠻酋積逋賦不入朝廷命王發雲南貴州兵討之蠻據嶮以抗王遣兵斷其後諸將請急攻王曰威服不若徳服遂使人諭以禍福蠻即遣子詣京師謝罪悉償所逋仁宗皇帝嗣位重王勳徳老成詔兼太傅召至恩禮加厚遂命佩征南將軍印還鎮宣宗皇帝初嗣位遣使齎璽書及金幣勞之皇上嗣位恩禮視宣徳之初明年改元正統賜金幣加厚是年冬四川㑹川棃溪蠻合底泊等蠻為亂奏遣弟都督昂討平之二年冬馬龍他郎甸蠻不靖復奏遣昂平之三年麓川思任發擾邊侵掠騰衝南甸遣人諭之不下奏躬率兵討之兵至潞江王勉諸將曰出兵尚謀不專恃勇且逼瘴月非用武之時今官軍已集如賊能畏威悔過攄誠謝罪請命赦之斯亦可也遂復遣人諭之不下乃命弟昂及都督方政等率兵前進王尤戒其慎重時王整兵在後政等乘夜渡江破賊柵賊衆奔北官軍乗勢追至景空等寨斬首三千餘級獲象三十餘政奮勇獨進賊伏兵四發政力戰死之時春已半王慮瘴發非官軍利遂旋師將駐金齒㑹有㫖命王還鎮王至楚雄疾遂薨方疾革時顧弟昂曰吾父子兄弟受國家天地罔極之恩吾不能報矣吾弟勉之吾一家子子孫孫世堅忠誠保臣節無忝君親又顧昂曰斯役也雖偏將失利固吾總帥之過此賊必不可貸汝勉之勉之言訖而逝歸櫬所過道路城郭無貴賤大小迓拜哀慟蓋王在鎮久惠愛之被於下者深也王忠孝之誠本乎天性無或弗盡與子弟言亦惓惓斯道友二弟甚厚教子孫動以禮法家政秩然位極人臣而禮賢重士虛已聽納寛裕有容未嘗面及人過凡文武屬吏有過者惟恐王知務自掩蓋其因自悔徙行者亦多王明於韜畧然以仁為主蠻夷有罪未嘗輙加兵誅必諭導使改數諭弗悛乃奏發兵逮兵入境若夷能知懼悔罪亦曲貸之與之更新雖臨戰陣必戒麾下毋縱殺戮賞罰明信威愛並行至於完城池飭武備訓將士理屯田通水利實倉庾恒謹成法若輕徭賦問疲瘵尤勤致意學舎弊陋具材僦工葺之不以煩下治公有暇手不釋巻稽古明道動師昔賢蓋從容具文武之才仁義之帥也配程氏先公謝世追封定逺王夫人子男一儼襲封黔國公温雅謹重恪循家法女二長册為趙簡王妃次適武定侯郭玹孫男一玘女一在室至是王之子以事狀求余書神道之碑謹按狀叙而銘之銘曰天啟皇明於淮之右配天與地篤生帝后二聖至仁作民父母心存萬方包含徧覆矧孤在里靡攸怙恃二聖矜惻曰其予子鞠之誨之勞劬備周以長以成有偉才猷帝有恩言爾復爾氏􅅷乃樹立華乃先祀嗚呼昭靖盛徳豐功皎日之誠持孝與忠嗚呼忠敬纉乃烈考惟孝之軌惟忠之蹈發軔都府簡在宸心夙夜弗遑秉其慎欽往綏滇人幾五十年率考之行敷帝之恩俾食俾衣免其寒飢重學崇師導之尊卑平其政令時其作止人戴惠慈淪骨浹髓有或弗惠以諭以誨洊誨弗悛式劉以戒交人悖兇披猖為狂違天毒氓軼我邊疆奉詔出師往行天討桓桓疾馳雷驅電掃富良飛渡如履坦途兩師窮追縛冦海隅解縱脅從宣布教條爰整師旅凱歌歸朝飲至䇿勳上公錫爵嘉寵元臣龍章煇灼滇人之思瞻望斾旌帝不忘逺申命南行祗事五朝鞠躬小心奉國忘家志如堅金寸棘未剪躬不寧處過自偏裨於躬引咎終於王事徳善孔多顯顯華褒千嵗弗磨沐世子孫奕奕象賢篤忠與考永光其傳奉天翊運推誠宣力武臣特進榮禄大夫柱國鎮逺侯追封夏國公諡武毅顧公神道碑銘永樂十二年五月廿五日鎮逺侯顧公薨於貴州訃聞上震悼遣官賜祭追封夏國公賜諡武毅賻贈如制命有司治喪𦵏遂命其嫡孫興祖襲爵興祖奉柩歸𦵏於揚州之某原顧氏其先居湘潭公之曾大考百四妣某氏大考千二妣朱氏始家江都考萬一妣周氏公諱成字景韶天性仁厚自少能矜恤瘝孤負直氣遇以横逆加人者必摧辱使畏服乃已其大考嘗詫於衆曰是孫必興吾門公姿貌魁偉渉知書通大義而膂力絶人善武事尤精騎搠射命中元末嘗遊燕都有强冦十數刼其舟同載者皆驚愕公獨奮出闘冦皆披靡走既歸張士誠起泰州僣王號公知其無能為乙未嵗我太祖髙皇帝渡大江明年公來歸附至鎮江偕驍勇士十一人轉闘入城莫敢嬰其鋒者既敵益衆而援絶悉為城中人所縶十人者皆被殺公奮躍起縶絶蹴持刃者仆之脫走歸語衆曰鎮江城中皆庸夫可取也遂導衆攻其城克之授百戸從攻常州宣州皆克之簡充旅正還從克江隂從寧河王克通州陞千戸攻雙刀趙於樅陽攻安慶江州池州興國諸山寨皆下之庚子敗陳友諒兵於龍江公得其戰艦及馬特賜白金友諒退仍據安慶江州公隨大將軍悉復之并得其八陣營諸寨從克南昌援安豐敗元兵進攻廬州從克武昌荆州衡州從開平王下襄陽還取泰州留守興化從中山王破舊舘克湖州蘇州洪武元年陞堅城衛指揮僉事二年領軍克信陽唐光四年從臨江侯取西蜀道遇敵公手殺敵百餘人生擒二十餘人進攻羅江生擒其偽元帥及其下二十餘人悉送軍門斬以狥入漢州偽官戴丞相向知院者盛兵迎戰公揮衆奮進戴向皆狼狽還走追北至成都圍其城竟降之蜀平調成都後衛總帥以公守之六年率兵赴重慶擒妖賊王元保及偽萬戸李邦祖等八年調貴州衛明年甕傍等山寨蠻冦叛公率兵討之斬首百餘級俘獲人馬尤衆夷懾服叩首請嵗納租賦公從之其僻逺山峒有負固未下者次第平之已而群夷叛服不常公連嵗出兵平之前後俘戮不可勝計十四年從潁川侯征雲南公率歩騎兵為前鋒首克普定留公守之且為後繼公部分將士樹柵以守明年公出兵克西堡於是諸蠻合數萬攻圍普定諸將皆欲出戰公持不可曰賊衆我寡一出即為賊所窺必俟其攀栅乃出賊及柵公披甲上馬出北門率戰士奮進手殺賊騎之迎戰者十數人賊衆引却諸將遂乘勝出東西門戰敗賊衆時南門之圍未解公取所生擒者十八人斬之而縱其一人歸曰吾以夜二鼓盡殺爾矣及期賊聞官軍舉銅角銃鉋皆惶懼奔走圍悉解獲賊兵甲無筭時有中使在普定見公勇畧絶群還奏特遣賜龍衣金帶陞世襲指揮使凡普定所𨽻諸蠻公悉平之十七年平阿黒螺螄等十餘寨及降尾洒蠻酋馬乃之衆西堡蠻携貳復平之廿一年總戎檄公討平乖西扒古里谷勞金綱等寨遂擒闗索嶺首賊葛蓬及叛賊阿束皆誅之土官阿宗叛焚刼驛舎乘虛將攻公勢張甚時官軍精銳悉駐東川公率餘衆及土兵深入賊地據闗口屢敗之賊既遁衆以暑瘴非士卒便欲退師公不聽未幾賊黨殺阿宗降遂奏革普定府而黜其守之懐二心者建兵衛以屬其民析其地為州三長官司六而公統理焉自是公悉意撫綏大布恩信諸夷嚮服廿五年夏入朝賜文幣二十有副鈔三千貫白金四百兩日錫宴㑹同舘陞鎮國將軍貴州都指揮使司同知公至貴州首征康佐叛蠻破阿老諸寨峒廿七年平都勻豐寧西梁瓦材等冦斬首萬四千餘級俘生口三千八百有竒而撫其良善二十九年陞驃騎將軍右軍都督府僉事官其長子統普定衛指揮使是嵗命公佩征南將軍印總兵征水西叛冦生擒其首敬徳斬之餘冦悉降三十年五開蠻反公率兵搗臻剖六峒悉破之進𠞰天柱天堂春花金井蒲頭大小坪等生苗及螃蠏米毫灣溪舟溪萬潮等㓂皆破之三十一年普定西堡及貴州光金谷勞龍里金石畨羡唐諸夷復叛公次第親行誅其叛首而撫其餘衆既歸明年髙廟上賔又明年太宗文皇帝北平之師起藩國公受命往禦至真定北平之帥縶公以獻文皇識公先朝舊人解其縶與之語曰豈非皇考之靈以汝授我乎因語以不得己興師之故言已泣下公亦泣遂遣人護送北京令輔仁宗皇帝居守時姚廣孝奉命輔居守有腹心之寄姚素不習兵事與公議多不合㑹南兵圍城仁皇於軍旅調度恒從公言城中文武之臣競進曰顧成南將其中叵測不可專任然公所言計皆合機用皆有效數命公出將兵固辭曰使臣侍左右日陪論議得效分寸足矣賜公甲胄刀劔弓矢皆不受南兵數圍城卒以敗去者多用公謀也洪武三十三年九月論公功賜號奉天翊運推誠宣力武臣特進榮禄大夫柱國後軍都督府右都督封鎮逺侯食禄千五百石子孫世襲賜鈔三千貫白金三百兩綵幣三十加副遂賜誥券是冬命公鎮守貴州蓋以公威信素行於彼云永樂元年春至貴蠻夷聞公至歡趨出拜叛者皆歸境内靖寧公上書論大計謂國家宜早建儲以正名分北邊官軍有功者爵賞既定宜制以禮法降勑褒答賜鈔五千貫綵幣八加副申賜鈔萬貫白金二百兩綵幣如前三年賜誥追封三代考皆鎮逺侯妣皆侯夫人永寧土官宣撫為其弟謀殺致其下亂公執其弟送京師罪之而從土俗奏以宣撫妻襲職其衆遂靖六年車駕將巡狩北京豫召公副儲君監國既至上慰勞再四且諭所以召公之意公言皇太子孝友仁厚恭勤明達足任付託且左右文武之臣其知識深長皆非愚臣所及蠻夷雖今帖服小有競爭即持兵為亂愚臣非敢决意去留惟陛下命之上忖知公意嗟嘆累日賜鈔四萬貫白金二百兩綵幣三十六有副命還貴州陛辭退辭文華殿曰殿下於事君父恤兵民素行有誠惟於小人當寘度外萬事有天理不足計蓋是時懐奪嫡志者不樂公在京師公燭知故先幾引去也時土官奏欲為公建生祠從之公之赴召也播州貴州蠻作亂公歸遣子勇率兵𠞰之悉平時思州臺羅等蠻亦亂公遣人諭其酋普亮即服於是公病事聞遣醫馳視又遣公之孫齎勅勞問賜鈔三千貫公疾稍間親率兵討清水江叛冦平之臺羅蠻復叛公親𠞰之俘戮幾盡既旋師公疾復作其下以聞復遣醫馳視竟不起春秋八十有五公自少壯履行陣挺身戰鬪奮勇無前雖身被十數創不稍引却必致俘馘見功效深於籌畧料敵制變百不爽一於謀國事明大體不𤨏屑細故竭誠奉公至老死不倦諸葛公所云鞠躬盡瘁死而後已者公蓋有焉朝廷既追封公并追封公三代考皆夏國公妣皆夏國夫人元配彭氏再追封夏國夫人繼室穆氏李氏子男七長統先公卒洪熙中以其子貴追封鎮逺侯次銑次銓次銳次勇累官貴州都指揮僉事次亮次源銑亮亦先卒女六陜西都指揮同知黄庸普定衛指揮同知李傑永寧衛指揮僉事徐震普定衛指揮僉事李庸貴州前衛指揮僉事李宣貴州前衛指揮僉事王綸其壻也孫男九興祖襲封鎮逺侯效用三朝克繩祖武凱再興徳旺興能貴州衛指揮同知先卒琮琦玹曽孫男六𤣥孫男一至是興祖具事狀屬士竒書公神道之石士竒永樂洪熙中官翰林日侍二聖實聞公事故不辭敬次第書之而係以銘曰大明奉天肇跡淮土公奮從龍來歸皇祖金戈鐡馬桓桓四征鏟暴鋤彊疇之敢嬰函夏既寧報功錫命崇爵豐禄往綏南境逖彼南境毒虺妖狐憑阻弗馴跳蹶嘯呼公奉天威霆驅電掃夷藪窒穴屢征乃妥乃登督府乃衛禁垣居無幾何遄北其轅天其祐公俾作聖輔惟聖知公曰時舊老明明二聖任公心腹蓄疑盈庭公任愈確公不人尤公處有道秉誠執恭謀猷屢告卒底厥功為報益隆金貂玉鞶亞於上公帝謂爾成予懐南徼汝往申撫公拜奉詔夷獠迓公父母歸止焦者以濡仆者以起孰其悖兇敢干刑誅小者擒俘大者戮屠公身在外心存廷陛匭函有陳皆國大計當宁聖明嘉公忠言寵賚華褒誕降自天國有老成謂宜百嵗曷不憖遺營星奄墜雄蓋萬夫智名勇功公福簡簡哀榮始終慶澤之貽綿綿來嗣篤念先祖祗於世世李氏先塋之碑永樂元年太宗皇帝既褒封奉天靖難功臣遂及城守之功文武之臣以次叙進前北平布政司右㕘議李友直陞北京刑部左侍郎歴十有八年改工部左侍郎仁宗皇帝臨御之明年賜勲資治尹授誥命贈其祖彦名考人義皆嘉議大夫資治尹工部左侍郎祖妣臧妣杜皆淑人既而追惟舊勞特陞友直北京刑部尚書申錫誥命加贈其祖及考皆資善大夫北京刑部尚書祖妣妣皆夫人友直䖍奉命書薦告畢出而言諸士竒曰友直徳薄能少何足以膺承寵榮隆盛之如今也哉惟二聖大徳如天有以施及之也亦惟先祖考妣務善施仁歴久而積厚甘處晦黙以遺諸其後也友直其敢忽忘所自哉將樹石先考妣墓道載上之所以寵我暨先人之所以敷遺我者以永示李氏子孫願為我書之按李氏保定清苑人累葉載徳至彦名益裕於貲而樂施濟汲汲恐不及蓋春秋七十有二而卒配臧七十有五卒三子人徳人義人厚人義承家世富饒然自用儉薄而好施肖其父其所及人益厚平居睦族樂賔篤子姓於善而已洪武辛已某月某日卒年六十有二𦵏其鄉柳林社配杜於相夫教子理家咸適於宜某年某月某日卒年七十有五合𦵏於夫之墓二子友直友亨孫男四昉暉暘映女三銘曰維木有本既深且固達於榦枝厥崇孰禦徳善所施積累既多必有達馬紛敷其華清苑之邑豐穰之鄉奕奕李宗篤行垂慶文皇奉天義旅肇興李有明智先幾攄誠更嶮渉􅇖鞠躬惟一論報之隆豐禄崇秩歴事二聖冠纓在廷弗競弗柔渢渢聲稱惟聖念之亦既勞止有肇必先仁其祖禰雲章龍文煌煌自天命服之褒寵光九原松柏桓桓丘墳峩峩燎黄薦告聚望歆嗟承君惟忠承親惟孝視勸後來琢詞墓道東里續集巻二十六
