body:
  text: 東里續集巻四十二明楊士竒撰墓碣銘族弟孟頥墓碣銘吾楊氏當汴宋盛際自吉水徙西昌十三世至用霖府君以經學為鄉碩師配蕭兵亂偕冢婦劉死節見雲章子髙兩劉先生之文仲子起予府君洪武辛亥舉進士授黄陂知縣有惠政民至於今思之配劉早寡守節建文中旌表其門一子暢即孟頥也自㓜端重秀穎數嵗父口授之小學書一二過輒能成誦七嵗習聲律儷語先生長者皆矜其不凡而父沒於官外祖劉天和先生教育之稍長進學於從外祖本泉子彦兩先生之門四書經傳熟復精思日有造詣前輩莫能難也為文章根據義理未嘗茍作於進學惟日不足惇行孝弟蹈履清素端慎恭儉而温然純粹表裏一致人率以逺大望之時邑之後進晩學清質英發如孟頥者非獨楊氏未見其比環邑百里之外葢未有也使假之年何古人不可至哉蓋年二十有三而卒其卒以洪武辛未六月二十二日嗚呼惜哉先儒有言氣之清者不長非孟頥歟其亦吾宗之不幸乎吾於孟頥族兄弟少相好也其卒也吾思念悼惜之未嘗忘又念今而後罔有知孟頥者矣遂大畧為銘其墓將使其子孫刻之其子三人長輝舉鄉貢宣城縣學訓導次律次衡孫九人鏞鈞鏐鑑銘曰騖於學未極其至令於徳未效諸試生之無意乎何其才之莫與等生之有意乎何其年之弗永雲五采而倐過芝三秀而易朽顔何為短跖何為夀孰其司之嗟乎孟頥我曷銘之匪宗之悲故奉訓大夫户部員外郎張君墓碣銘右春坊右庶子華亭沈君粲致其邑人張紹之意求銘乃父員外君墓上之碣且致員外君治命盖永樂中員外仕京師嘗於余徃還故不獲辭乃按前福建布政司叅政任君勉所述事狀叙而銘之叙曰張氏出宋宰相商英之後徙杭至隠庵居士又徙松江生南山處士南山生碧雲處士碧雲生叔芳號雲岩處士皆不仕雲岩娶吴氏生員外君諱昕字賔暘嘗名其軒居曰林岫鄉里以林岫號之其仕也以字行員外君生有令質頴悟異常兒六嵗入小學聞旁誦周興嗣千文禍因惡積二語即知善之當務惡之當去進退恭遜如成人孫大雅王叔明一見異之曰此兒將來令器也其從先生授書遇觧析要義必黙識之退復味玩意㑹乃已侍長者言論敬聴不敢忽十二三幹父之蠱咸如父志時家以税長萬石區凡奉公治私悉委之靡有遺闕十四姑之夫林鶴湖及人搆訟誣辭連父代父白其情遂直鄉譽勃起洪武乙丑職吏得罪者率無寓贓富家有司徵富家贓且罰輸作父在誣中既内贓當詣京輸作即代父行而訴於朝遂免輸作戊辰應稅户人才舉授殿廷儀禮司序班敬慎職務無㡬陳親老乞歸養從之歸作眉夀堂以奉親又作歸耕之軒自適而家仍長區税為畫以授其弟姪井井有條理公家百需悉出已帑不煩庶氓徵内必時不先期以病下不後期以召責嘗夏潦里稅無出悉代之出又度髙平地多作廬舎處里貧者其中予資為本教之貿遷雖水灾而人免餒死公私頼焉永樂初戸部尚書夏公奉命治水松江舉員外君自輔松舊江乆塞衆議疏之員外君言此用力多而見效難不若疏范家浦用力寡而得效易夏公從之至於今郡蒙其利丁酉有以名聞者朝廷遣中使召至入見武英殿奏對稱㫖命光禄賜食用為戸部主事授承直郎躬勤不懈西域大寶法王來朝承命迎於道還奏上嘉其奉使知禮蘇松嘉湖杭常六郡旱潦洊臻先遣通政趙君任董治農務民苦煩苛仁宗皇帝監國奉命徃副之至已七月中猶晝夜役民車水不已員外君言農事不及已徒勞無益即日散遣民皆感悦及冬當行視田之髙下預為蓄洩之備嵗餘召還陞本部員外郎授奉訓大夫在戸部一以養民為心深為尚書夏公所重恒自念先人所遺幸有餘自為主事即辭禄雖奉使在外不給公廪饋遺一無所取厯事太祖皇帝太宗皇帝仁宗皇帝始終一心員外郎九載當陞以疾言於天官遂奏俾致事既歸益以賑貧恤匱為務鄉之寒餒者率資其衣食不能䘮者皆資之有餘貸為商賈者皆予之而不取息乆貸不能償歸其劵不取以緡計者動數萬間嵗旱輒齋戒詣寺觀請禱得雨或民無種榖給之恐後其居官居家盖未嘗一日忘濟人也旦暮以善道飭勵其家人待臧獲如子長輒為之婚嫁閨門秩然作義塾延師教其家及鄉人之子弟樂聞善言日與賢士大夫游座上衣冠常滿襟度蕭散兼究空𤣥之㫖釋老之徒亦徃来無間善奕嘗在上前與待詔者奕待詔下之退而自嘆非當以是事君也宣徳八年十二月廿六日卒於家春秋六十有幾娶王氏無子初以外兄弟之子為後者曰繼曰嗣晩命從弟之子為後即紹也葬邑之某鄉某原墓員外君所豫築云銘曰遡張之先厥有顯聞轉杭暨松養恬丘園履善蹈仁後昌以蕃迨賔暘甫孝徳夙著中以召來洊班朝署曰慎曰恭靡懈晨莫惟國之經篤在養民惟臣之良養民時循惟賔暘甫克脩于臣惟賔暘甫仕不受禄惟大司徒曰時賢屬贊治有禆奉使無辱蹈髙謝榮不俟年至濟利攸存顯隠弗貳表銘其藏用式有位族弟復環墓碣銘復環名復楊氏十六世祖允素宋盛際自吉水徙西昌傳七世至尚真二子長徳明七子其七梅卿淳熈貢士又三世至號益齋舉漕貢授登仕郎二子仲號菊泉菊泉二子伯尚友尚友三子仲景雲為族父文可後娶程氏里儒者明徳之子生二子長復環也温純靖荘事父母孝謹與弟延相篤愛敬有姊内贅婿同居爨十餘年敬事之如兄復環始從學外家長而自力晝誦夜唯不少懈治周易有聘為學官者以親老辭教授里中從之者衆能盡心訓誘後有以科第升者為人辨於義利安澹素與人交悃欵謙和盖吾宗之良也永樂己丑八月念二日卒享年三十有九葬邑南三里所娶陳氏生男子二渙浩孫男二恩愈女一復環卒時家甚貧渙纔數嵗浩父卒後三月始生陳誓守節育孤今將三十年二子皆克樹立而渙知好學今来北京求銘父墓復環吾族弟也吾嘗重同宗弟之良者孟頥復環仲岡三人吾被召時孟頥仲岡皆已卒獨復環在吾官京師不十年復環亦卒毎為吾宗悼惜之今吾七十餘矣雖衰病忍不銘賢弟哉銘曰厥禀之純厥履之惇弗永以騫庶將以遺於來昆乎故奉議大夫廣西按察司僉事陳君墓碣銘嗚呼吾邑陳公延世何可多得也自其童冠時吾已期之逺且大永樂初京師下第而歸也余為文勵之且舉公延以勵楊陳及鄉人之子及公延取科第擢賛藩憲於是人皆期之逺且大也盖於其立身之艱勵志之確有以觀之矣公延吾外兄陳仲述之子仲述在憲臺十年廉介之操平恕之政焯著一時其卒也無一縷之畜以庇其後仲述子男惟公延一人父䘮裁數嵗母子依其叔嵗餘母卒公延栖栖跼蹐困頓有人所不堪者然日益究知其父之行即有志紹續從其外兄梁用之兄弟學蚤莫不懈始克葬其父登永樂九年進士第厯事都察院明年擢廣西按察司僉事授奉議大夫到任一蹈其父之行而毎事持大體戒苛細務寛厚於所按臨咨民瘼飭學教禮賢徳識者多其有前軰君子之風時憲司闕正貳張僉事者署司事張洪武中為御史實仲述同寮公延以父執敬事之張亦為之盡心憲司循故事分官廵視屯田稽刷巻籍當公延及僉事劉長吾行張私語公延廵屯可行公延請其故曰刷巻毎郡非一月淹不了瘴鄉何可乆淹也廵屯少頃即過矣公延謝曰丈人見賜甚厚不敢忘然賞與長吾同郡交又同受命来不應異心賞初未有知即不敢違丈人既知賞敢自取便利死生有命賞請任刷巻遂行張雖慚悔出言然中心實重公延公延至梧州半月得疾求醫藥不獲數日卒永樂十一年某月某日也明日長吾廵屯至梧為治䘮歛歸其櫬張僉事迎櫬哭之慟已而私嘆曰公延終得長吾力殆天以報之乎他日張至京師道其事且揚言於衆曰甚哉陳公延古心古道之肖其父也公延名賞卒時年三十有六在官僅三月其曾大父元潮州路儒學敎授以道吾家曾大父子壻大父有慶博學擅文章父仲述洪武乙丑進士福建道監察御史母曽氏鷗江先生懐可孫公延娶蔡氏永州府學教授孟愷之子子男一异女一嫁楊靜安孫男二儼傑公延每思念父母輒悲咽事其叔父母如父母處其從兄弟盡敬愛慎交處於姻戚朋友緩急必赴於利未嘗茍取然能捐已以周人其卒也貧如其父初其父與叔同有先廬遺址頗裕父死叔之子益衆公延不能得公延之赴廣西也過家拜叔或導之曰盍自言於叔可少得也公延曰我無父又敢傷叔父意不言而去公延卒後數年部使者至泰和聞其妻孥顛沛失所召詢其叔始得尋仭地茍棲息焉可以觀其遺後者矣公延治詩春秋為文簡當於辨議是非邪正必自出意見不肯依隨善施教其學者徃徃舉進士去盖考其居家居官無一行不當於古人非用世之良者乎仕非不逹矣而不久於位不究其施非可惜與彼有䝉垢履汚無益有損於時而自少壯揚揚至白首者又何理歟抑皆出偶然歟則有秉徳抱才將欲效於世者何所恃乎吾皆不得而詰也吾仕兩京四十年今年始一至鄉里過公延家追憶其為人又徧求楊陳兩家與凡鄉人之子弟有能少艱卓立如公延者皆不見也益用增慨因述公延平生大畧為銘其墓銘曰嗚呼廣右僉憲陳君之塋其源之澂其履之貞其歸之寧跖長顔短噫余其銘鮑處士墓碣銘工科給事中鮑輝之父處士君既䘮介中書舎人黄采以翰林脩撰周旋所具處士君事狀求書墓上之石采旋皆處士同郡能詳其行采又示其父少保公所嘗著處士小傳表其清韻少保公余同官言有徵也按鮑之先居景城宋曰純者元豐中仕為右諫議其後南徙臨安人五世曰𤣥徙温之平陽至諱裕生諱景景生諱徳善處士之曾祖祖考云母薛處士諱起字士髙孝友出於天性蚤䘮父恒念不逮養語及輒悲篤於事母母年㡬九十有疾晝夜侍不去側躬扶掖治湯藥衾衣浣滌皆自任不委侍婢母卒哀毁屢絶兄及嫂相繼卒撫姪如子姪尚在襁褓極力鞠育長則教訓之用底成立於教子尤篤不間其處與仕其為人耿介有守慎交際然喜奨進人善不善者諄諄化諭之人或慢之率闊畧不校雅好義舉賙窮恤患無靳貸不能酬者予之嘗長區里徭賦數出貲以代細民之不勝事者里有葉氏者死獨存一息族人利其資産而逐之處士力扶持之得全有避禍來依者館糓庇䕶之甚厚禍息辭去具白金為謝固却之其人後逺出潛寓厚資於處士嵗餘或傳其客死者其家憂懼失措處士召其子語曰若父行時寓資於我無知者果若不幸即歸汝居無何其人還益徳之處士平居寡出一日以事經鄉之飛雲渡中流颶風作同載者恐甚處士叩首禱風遽止里嘗失火迫其居焚香頫伏籲反風火滅蓋其平素好善有誠云性澹泊雖富恒躬儉以率其家人晩厭城居喧雜去即方山之麓作别墅有鉅松七八株結廬其中日取古人書讀誦自適遂别號友松蓋少保公所為髙其韻者翰苑諸賢亦有為之文及詩焉正統庚申十月十五日以疾卒享年七十有一配林氏子男三長輝宣徳癸丑進士擢給事中能持身勤職次澄次森女二長適詹次適馮皆士族孫男七魁彰鳯顯麟麒耀女四處士之葬以卒之明年某月某日墓在某鄉某原銘曰矯矯貞松挺特勁直傲兀氷雪寒不改色長山深谷積嵗厯年工師不知隠者盤旋嗟鮑處士亷静澹約惟義之行視松之確其操不貳其藏有墳春秋霜露振振雲仍故鄒兼善甫墓碣銘撫之安樂有君子曰鄒兼善沒四十有七年矣墓未有刻辭其子衡州知府良奉翰林檢討姜洪所述世出事行以求於余余固辭老且病良求益堅而繼以泣則又念良於今卓然循良吏不愧前史所稱其必有所本歟遂按狀而書之鄒氏樂安故家其先號筠窓生溥泉溥泉生思敬皆有隠徳兼善之曾大考大考考也妣熊兼善諱達㓜端重不喜狎數嵗待賔客老長執弟子禮甚謹如素習老長皆竒之孝友出於天性盡心奉養嗜學強記博通而詩歌駸駸有老成語屬時元季兵難未靖雖奔竄山谷手不釋巻同里清介士黄本立生子惟女一擇所歸遂内兼善贅壻自是郡邑名士多與之游而聲譽日起兼善於敬賢尚徳尤惓惓毎輟所有以助其不給至於鄉里賑窮恤匱皆以為當然盖憫物之仁亦出於性云長徭賦里中坐造賦籍誤被逮衆曰斯傭書者不謹曷白於公可免兼善曰彼窶故傭誤豈所願哉竟自承㑹以病卒於京洪武乙亥三月二十日也享年四十有八歸葬其邑八都青原坳配黄閑家訓有淑徳克勤内助其子男三孟復仲斗季良永樂乙未進士厯知松谿邵武两縣賢聲隱隱動八閩用大臣薦陞知府衡州所至民戴之如父母兼善可為有子矣女二長歸姜某某用子貴贈孺人次歸李伯旭孫男十三偶遇完聚福㑹貴榮壯序松樵湘女十一曾孫男十六恭號寛信天某敏華驎泰律衡安吕顯衍𤣥孫男二重端述狀者姜氏女之子也銘曰猗嗟鄒君有孝有仁應弗於身篤於後人惠愛被民有烜厥聞衍於孫曾蟄蟄振振為善為徵來者其循錢惟慶墓碣銘正統六年十月六日吴淞處士錢君卒錢出吴越武肅王之後初家於浙處士髙祖宋將仕郎諱宥入元不仕徙松之南梁隠焉曾祖諱端甫祖諱徳玉考諱華仲皆不仕母許氏二子伯存善仲處士也諱惟慶字汝明七嵗䘮其考哀毁如成人母守節教飬之處士事母及兄甚謹部符賦民銅急遣使捕後期者存善與焉處士詣使者言老母頼兄終養皋緩實我罪我當行存善曰我主家事皋緩罪自我且弟老母愛子我當行兄弟爭行至皆泣使者對之無不感泣驗籍竟以存善行處士送之至姑蘇會宥免兄弟偕還鄉人兩髙其義母䘮毁瘠不勝名其事親之堂曰永思盖哀慕終身云事兄老而愈厚兄卒哭泣如䘮父兄無子以其子為之後篤子之訓積書資之且擇明師俾從之急人之急赴之不擇利害故居址為里横人所敓訴有司不能復後横者蹈危禍狠狽或導處士曰勢可復矣歎曰向以理訴不得今困之於厄又所不忍處士於處物一以誠未嘗或有機心顓顓謹禮度而明於智識决是非枉直豫計事成敗率當襟宇灑落作迎薫書樓日焚香鼓琴吟咏其中家有無不計也春秋七十而卒元配湯繼趙子男四永逺溥博逺即後其兄者溥正統四年進士授翰林檢討博六年京畿觧試第一人㑹父䘮不行女一嫁趙祥孫男四岡岷岐嶧女一溥聞赴縗絰奉翰林侍讀陳詢所述處士事狀求銘墓溥在翰林卓然有志盖觀子可知其父矧侍讀君子於述其父執徳善之詳且明宜有銘也銘曰噫嘻兮錢君秉忱恂兮大倫孝於親兮友於晜靡雕琢兮璞之惇恬憺在下兮申申佩蘭茝兮芳芬致瑞羽兮五采文椉朝陽兮雲漢之鶱羌遽返兮九原後轔轔兮來華軒式之兮斯墳贈都水主事洪君墓碣銘贈承徳郎工部都水清吏司主事淳安洪君卒之十有七年其子吏部侍郎璵泣拜請於余曰惟先考君之墓至今未有刻文敢冒昧布其私懇璵嘗與余同翰林史館中心重之故雖老且病不忍以辭遂按璵所述狀叙曰洪東南世族晋金紫光禄大夫尚書門下侍郎曰紹自丹陽徙新安子纂為始新令再徙淳安遂為淳安人二十二世至嘉瑞宋紹興中劉璋榜進士官至朝請大夫子雋慶元中曽從龍榜進士又四世至九齡咸淳中迪功郎江隂僉判都水君五世祖也曽祖諱雷飛祖諱文鋭考諱徳元母江氏都水諱源字子泉號泉齋自㓜頴異知務學稍長郡庠選補弟子員即晝夜淬礪博涉羣書治易經工文章見重於鄉老長以貢上太學日親明師友文學益進踰年有㫖選太學生優等者補郡縣學官都水得饒州安仁縣教諭陛辭賜衣二襲及鈔盖特恩云其教學者必務實踐於觧析經義必鬯乃已旦暮坐講堂躬勤以率諸生學者日益見成效陞教滁州邵武福州三郡一如教安仁平居事母至孝母卒哀毁得禄不逮養父毎祭必慟䘮祭如禮不用浮屠老子法志意澹然無一毫榮利心家居教子外無他務初在安仁嘗過旁邑貴溪樂其山水之勝遂為歸老計命其子營别業焉後屢改官輒留家居之既老致事歸貴溪以卒宣徳丁未三月己丑也享年六十有八葬貴溪仙源鄉東岡之原盖治命也以璵貴贈主事配許封太安人子男五璵永樂辛丑進士北京刑曹主事改工部都水司擢翰林侍講兼史官陞吏部右侍郎亷潔明公人莫得干以私輿論翕歸亦本其有家訓云次珦次頊次珷次琦皆先卒孫男四鳯翔某某女二曾孫男一銘曰混混乎有振於其前也式祗嗣之奕奕乎有奮於其後也式篤啓之嗟子泉甫全歸寧矣我銘其藏過者欽只寧波府同知蕭伯齡墓碣銘寧波府同知蕭伯齡既卒後十年其弟仲齡來京師以國子助教歐陽賢所狀事行來求銘墓余與伯齡兄弟皆從學海桑陳先生為同門義不可辭伯齡諱康泰自童丱已英敏知學誦習不倦嶄然諸生中稍長益知自勵從陳先生明六義之學下筆為文辭混混如源泉愈出而愈不窮也邑大夫舉為邑學弟子員明年洪武丁卯大比中鄉舉病不果上益務進其所未至時陳先生已沒更從蕭尚仁先生延致家塾旦夕請益志愈鋭而力愈勤蕭先生亦傾竭底裏授之三年㑹試禮部下第為太學生奉命簡閲軍士於遼東還奏稱㫖明年選授金華府儒學教授賜冠帯衣被楮幣鞾韈前之為學官恩錫之厚未有踰於此者既至金華金華故文獻郡而學政久圯諸生不知檢束自勵伯齡蚤莫孜孜盡力開導誘掖不徐不亟振起而作新之其學者皆靡然悦從數年出掇髙科登膴仕者比比而是又繕治先聖廟及學舎因其舊而新之洪武已卯用薦者授寧波府同知未行以病卒於京師七月某日也享年三十有四妻王氏以其䘮歸葬邑城西五里所南溪之原蕭氏世居泰和邑中父惟善母某氏子男二某某女二伯齡未卒先一嵗謁告歸省與余過清平山中遇邑之鄙人許雲從許察人容貌氣色以預論其吉凶休咎或時中伯齡曰察我何如許曰先生官不止此或者壽弗稱乎既而私與余曰行當見矣余雅未之信孰謂甫一嵗而果然哉嗚呼君才明决長於剸劇使之蒞民必能剔抉奸蠧以逹於政而民不病也然竟不及見諸設施以卒惜哉銘曰孰不為政有弗逮者才子不難於才庶幾宜施整髙車以行邁遽輪仆而轂摧嗟嗟乎其命之為耶楊府君墓碣銘楊氏自吉水徙西昌世篤文獻後析而居清溪者自先待制以經術發身至國朝或擢科第或舉明經無以他岐進者其職有大小而皆持端潔之行或仕而退家居皆安貧樂道有以重鄉閭表後進漢史所紀楊氏累葉載徳其可謂不忝於前聞人者矣府君諱晦初字逸民一字彦季為贈富州尹騎都尉𢎞農郡伯復齋府君之曾孫㑹可府君之孫星子縣學教諭安吾府君之子士竒之三從伯父也治詩經元進士吴中鄒奕䆳於詩洪武初守贑邂逅府君而深推其學曰先生得聖人立教之意宜用於時請更字蒞民舉送於朝授京倉副使滿嵗援例罷歸府君簡静凝重意度閒逺以道自處凛然氷霜之操隐顯如一日篤隣里宗族姻戚無間言焉導子姪必志於學恒戒之曰毋齪齪茍混世俗為也儀矩脩正望之儼然即之而雍容學者多樂從之經其教者率底於成少嘗從學陳海桑先生終身嚴事先生如父未嘗一比匪人喜尋佳山水意之所惬超然獨樂而忘返焉家故富産業悉棄不顧為文章古雅善筆札晚得痺疾年六十有㡬卒其卒以洪武某年月日葬縣北山東馬尾山之原子岐先府君四年卒一孫𤣥嗚呼士習日下知徳者鮮矣士竒竊懼先世所為可傳於後者將冺沒無聞謹述所知大槩勒銘墓道以勵我後人銘曰赫赫楊宗自我𢎞農沿漢涉唐愈逺而隆中遷江南爰徙廬陵爰止吉陽復止西昌秉徳績文奕世克承爵位以振自我髙曾官有崇卑進必於儒於進於退篤操不渝允矣府君厥履經義皦乎清白仕止一致淠沸泉源湜湜其潔沿流於潨合汙而一咨我後人宜考於源宜慎於流毋俾滑昬封徵仕郎中書舎人鄒君墓碣銘君諱徳明字觀逺姓鄒氏世居吉萬安之灌源里乆而族益繁析處文溪厯數世至子貴生興可君之大父父也皆以耕學自娱不志仕進興可尤好脩潔巍冠褒衣䄡䄡然恒以善道訓誘為鄉黨所重稱長者君生未冠遭元季兵亂與其兄奉父母奔竄山谷間無幾父母皆沒哀毁不勝亂定始歸與兄謀以禮改葬其父母哭泣悲慟如初䘮嵗時薦祭盡誠敬其教人亦必以孝為先務平居躬穡事稍暇披覽載籍究義理廣知識謹禮守約泊然自得教其子務學下至僮僕亦礪之於善行用子貴封徵仕郎中書舎人春秋八十有七而卒其卒以永樂庚子十一月十六日其葬在易塘山先塋之次其配胡氏西昌冶陂名族封孺人先卒其子男三長世寧次進洪武戊寅進士為中書舎人再陞澧州知州次世㬅女三所歸皆郭氏其孫男七女二曾孫男二女三余之初入翰林也進在中書相好甚篤後自澧州丁父憂服闋來京師遂以狀求余銘墓為之銘曰明善力本以續厥世秉禮率義以啓厥嗣式巻以休弗炫康施夀耄以寧命復從貴歸全斯邱代百其祀故蒲州稅務大使陳先生墓碣銘洪武辛酉七月十五日蒲州稅務大使西昌陳先生沒於官既歸葬某鄉某原又二十六年為永樂四年其子彦强自麻陽丞改崑山將行持其族兄孟潔所狀先生行視余曰惟先人墓樹鬱然拱矣而銘文不具則是先徳終冺弗聞彦强曷名為子子出於陳也請一言以光昭潛幽余㓜不能識先生稍長盖聞鄉之長老言先生外氏巨擘也諱威字子重其先五代時有諱暉自金陵徙泰和始為泰和人暉次子承逸舉進士邑人髙其行義請於朝以攝邑政承逸七世至褒徙邑之南岡詩書之業愈久愈盛褒四世至燦先生曾祖也祖居錫父雲從明經篤行學者稱𤣥間先生娶劉氏二子先生其季也自㓜警敏有志操初入小學讀書已了大義十嵗能賦詩驚其座人未冠屬元季盗起充斥先生父子兄弟扶老擕㓜奔竄山谷間雖甚窮促稍憇息即賦詩更倡和為樂先生數告其兄曰即不幸遇賊不可脱兄當竭力保父母任其所難我以死嬰之任其易也而亦卒未嘗遇賊皇明奄有天下詔一切用經術士洪武癸丑先生以薦者授寧海州稅務大使或謂其才徳宜使長民使民有所利不宜使任征商先生曰征商不可利民哉顧所存何如耳先是任征商寧海者務察察先生到官一切剗去而行之以寛數月商旅爭欲出其市嵗商税所入視先之察察増數倍未幾省檄攝寧海州事州多積獄未决先生聴斷明敏數日而盡無不恱服已而新知州至先生還理稅務州民有爭訟不平者猶走跪庭下求直曰得一言即罷矣七年調山西蒲州税務大使居數月得疾忽語彦強曰吾明日其死矣然平生行已庶㡬可無愧人所貴在行已無愧耳彼自外來者吾何與焉汝勉之翌日卒州守孫毅與其僚屬吏民咸來哭弔治棺歛䘮祭先生平生所行一求中禮處人以誠無大小貴賤皆敬愛之居官八年臨沒無銖寸之蓄嗚呼古有清白吏如先生者庻㡬其人歟娶曾氏有淑徳子男一人即彦強官麻陽六年吏民信愛之可謂能繼述者矣銘曰繄陳之先自媯氏周恪肇封啓來裔沿齊涉漢厯唐世華聲茂實代有繼金陵南遷繇五季西昌慶源若川至繩繩相承耀徳義崇科重禄久弗替司征後興際隆治任庳道行昭惠施㓜壯暨沒罔攸愧永終藏斯名弗閟式榖承之繫厥嗣王均賢墓碣銘均賢諱永武姓王氏王世居清江之淞湖宋末廸功郎國子助教諱某均賢大父也父諱某均賢天資頴敏自㓜讀書過目輙能成誦然涉大義而已不屑屑為章句學孝於親信於友為人闊畧有逺志嘗曰男子當行四方立功業柰何跼蹐鄉里與草木同腐哉於是道廣入閩涉吴越泝江漢由蜀之秦之晋以達於京師而游公卿之門有薦其材於執政以為中書省宣使奉詔使海外暹羅諸國暹羅王見使者禮不恭從容諭以大義遂頫伏受命使還至閩屬四方兵亂道梗不克復命遂留閩閩有平章汪三保者尤器重之已而聞其家在清江者悉殱於兵以女妻焉閩既歸附遂還鄉里踰年卒洪武庚戌三月某日也春秋六十有一平生能傾貲為義遇貧鬻子者予之直而歸其子行道得遺金求其主歸之行義大率類此初娶熊氏生一男一女皆先卒繼汪氏生一男惟衡累官今為兩淮鹽運司同知孫男三懋達誨女二長適何次適張曾孫男七女六其葬於鄉何家埠之原久矣至是惟衡以翰林編脩尹鳯岐所狀事行來拜請銘為之銘曰其志其才不與時偕六十天年卒歸其全發潛有文來世弗冺贈文林郎雲南道監察御史任君墓碣銘宣徳十年制贈雲南道監察御史任敬敏之考為文林郎監察御史妣為孺人於是敬敏具事狀請銘其考之墓其考於家兄思貽先生有彌路之好余少時嘗徃還不得辭任之先居吉水世䆳於醫至和叔從文丞相勤王為兵馬司醫録空坑之敗自興國入太和始家洞源又再徙邑中家於城北自是子孫襲醫而兼儒和叔生華甫元太和州醫學録華甫生漢吉漢吉生光顯光顯生保冲敬敏之考也諱昭保冲其字㓜有立志十餘嵗遭兵亂侍父母竄匿山谷父卒雖顛沛倉猝中治歛葬必為經久計天下既定奉母歸而故廬悉燬矣蚤暮勞瘁畚礫薙蕪以建居室躬勤儉約以殖生業謹先祀凡先塋因兵難葬逺外者悉遷厝近鄉於事諸父及兄克盡愛敬於族姻鄉閭之子弟一勵之於善與人交謙遜而誠能濟匱乏平居喜誦老釋書恒勉其子學曰必明經以發身吾少多故不及為汝曹不可廢見其子能成其志則毎自足曰他不足計也其生元至正己丑六月十八日卒於永樂丙戌十二月十一日享年五十有八卒時其母尚無恙遺命其子善事祖母餘無他言其娶康氏里長者天得之女柔淑謹飭式勤内助先廿一年卒繼室蕭氏康二男三女男敬立為從兄保宜後泰和醫學訓科龍泉縣儒學訓導先卒敬敏永樂十六年進士授交阯古藤知縣又為監察御史彭學禮蕭允敬興國州同知鄧時舉其女之壻也蕭三女劉邦泰何尚古曾某其壻也孫男二能紹能矩女若干曾孫男某某敬敏既奉合葬康孺人之墓山卯乙向辛酉銘曰生有善行沒有榮命後嗣之興奕世其承金孺人墓碣銘行在吏部司務鄒亮䘮其母孺人十有九年矣未有𦵏銘間以其父某君之命奉事狀屬筆於余按狀孺人姓金氏世居蘇之長洲父諱益母孫氏父母惟四女其季孺人也諱守貞字静正蚤䘮父三姊皆已歸獨與母居家素窶又無旁近親戚依庇母子剪製結縷自給孺人天資明淑婉嬺致孝其母間聞母語及父行輒感涕或至廢食而女徳日益有聞同郡鄒某為其子某求令配遂聘焉既歸事舅姑盡婦道衣服飲食必躬造以進相夫以徳治家蚤作夜息不以寒暑少懈自執儉約安䟽糲惟寡母恒在念然未嘗敢一毫私遺舅姑察之歎曰新婦事我如父母其母所乏我家柰何不有無相共遂恒致助用安孺人之心孺人凡奉祭宴賔皆親致精潔篤於教子視其子有立志輒心恱而益加勸勵夫詿誤被逮時孺人已遘疾臨别遂增劇以卒卒之日舅姑慟曰柰何䘮孝婦母慟曰柰何䘮孝女夫慟曰柰何䘮賢内助嗟乎若孺人者其賢矣哉其卒以永樂十八年十月十三日享年三十有二子男二長亮舉文學才行授司務次順中應天府鄉試入為國子生女一歸庶吉士顧􅀈孫男一人豳孺人以卒之嵗某月某日葬某鄉某原銘曰孝恭儉慈徳多有命之弗長曷歸咎其將昌之在厥後劉母太孺人張氏墓碣銘前四川按察副使劉鼎貫之母太孺人既卒而葬矣墓未有刻文以狀屬余劉氏故吉水文獻家其先析自吾泰和故吾嘗表鼎貫父之墓今又欲銘其母而孝子之志不容以老病辭按太孺人姓張氏張之先繇清河徙吉永豐明徳鄉之冷田里又繇冷田徙吉水永昌鄉之漕泙曾祖祥甫祖元先父賢初母劉氏太孺人諱月字靜貞張氏世有徳善太孺人自㓜淑惠靜荘長益敬慎勤女事既笄劉君率性髙其徳聘為繼室鼎貫父也逮事姑姑治家嚴肅太孺人恭巽以聴而奉事盡誠姑甚宜之訖終而孝不衰教育率性前室女子如已出長而擇佳壻歸之處娣姒謙而和待下寛厚閨門之内雍雍秩秩蚤夜躬勤率下治織絍以助給公私之費率性以教子為切要太孺人力相於内率性沒篤承厥志而加嚴焉子男女亦皆敬奉父母之訓無敢怠遲太孺人孀居三十餘年謹禮度始終一致洪熈元年以鼎貫貴封太孺人宣徳九年春秋八十康寧無恙大夫士作為詩若文壽之是嵗五月二十八日卒正統元年十有二月某日葬其里髙州之原子男四伯鼎貫舉進士為河南道監察御史陞四川按察司副使惇厚謹恪仲鼎實叔鼎峙季鼎重皆先卒女三長適王若旦次適常州府同知張宗璉又次適曽傳昌孫男六孫女二曽孫男女各一銘曰壽為福之首徳為福之基懿太孺人惟徳之祗以壽全歸銘哉允宜故太宜人楊氏墓碣銘正統六年二月朔行在刑部右侍郎豐城丁鉉之母沒於家五月鉉始克聞訃將歸縗絰詣余泣拜請志墓上之石鉉為太常博士居南京於余鄰比常徃來蓋嘗聞其父母之善初朝廷用鉉貴封其父為太常博士母為孺人及進鉉官父已沒贈虞衡員外郎而封其母太宜人父諱某其沒時鉉嘗求余銘墓余病不及為今其母沒誼不得辭太宜人諱觀楊氏楊豐城名族世有善徳至諱某太宜人父也太宜人自㓜有淑行精女事及笄歸丁闕吴母胡氏墓碣銘陜西布政司叅議南昌吴存之母闕許師善甫妻陳孺人墓碣銘國子博士廬陵許子謨泣告其闕士竒曰朋友之母猶母也何辭矧子之父之志乎其事何如遂具狀泣拜而授之按孺人姓陳氏陳故廬陵安寧里名家父仲甄孺人諱妙秀生有令質自少已卓卓負志操安淡素父母愛之慎擇所歸時同里許氏以世徳重於鄉遂歸為師善甫之配善甫務學守義孺人佐之善事舅姑靡或違元之將亡也舉家出走避兵亂於所朝夕偹養及沒而備葬祭靡或不盡舅姑沒已久而孝思不衰兵後家具田廬蕩然無存者孺人躬儉勤以率於内乆而滋殖或復於舊凡家之公私百需皆孺人綜理師善甫不勞焉諸子男女朝夕訓切以為人之道男初嚮學則曰人所以克善其身昌大其世者皆由於此奉師必隆於禮曰吾之子所由以善也子謨登第得官歸省鄉黨矜豔為榮孺人顧其子曰士能守法不辱可以為榮也他日又以使命過家家人探其装蕭然以為孺人賀又顧其子曰此事所當然者然宦成君子尤致謹也他所為成其子之善類此於處長少戚疏皆得其宜永樂甲申十月六日以疾卒距其生至順戊寅凡六十有七年子男五子謨楬顴樂梁子謨洪武丁丑進士行人司行人國子博士有淳篤之行楬樂早卒梁繼室羅氏出也女一嫁趙思賢孫男九女一墓在某鄉列陂之原考孺人歸許氏其行始終如此宜乎所為圖不朽也撮以為銘銘曰士之良相之以賢婦子之材本之於賢母孝徳之行百行之紀子孫孫子綿綿垂祉給事中鄭君妻孺人王氏墓碣銘封吏科給事中舒城鄭君以文命其子泰賫翰林侍講邢寛所狀其配王孺人事行求著葬銘泰余考禮部㑹試時選奏應廷對貢士官近侍有年端直而温厚上嘉之陞吏科都給事中朝之士大夫皆賢之非其本之於家者歟故不辭銘按狀王與鄭同邑勝國時皆有仕者廬州路儒學提舉榮卿孺人曾祖也祖某父應隆豁達博通儒學下至醫卜種藝之說皆究知隐居教授鄉里重其徳行孺人諱某㓜習聞父訓其二兒勤學旦夕相講論孺人又日薫漸其說故於孝經論語皆能成誦而涉知其大義鄭故儒家曰伯仁兼熟孫吴兵法仕元長千軍與應隆交厚知應隆之有令女也求為其子之配即以文也孺人歸鄭氏事舅姑誠於婦道躬治飲食必精衣服必潔而後進相夫内􅁱家政條理井井訓飭諸子力學務善日篤不倦孺人天資淑惠樂澹素服用屏去華靡雖布帛而鮮潔有常下人化之皆不敢以垢弊侍左右族姻儀之宣徳二年二月二十四日以疾卒生於洪武元年正月十九日春秋六十男女各三長男即泰登永樂十九年進士第擢給事中再陞至今官次觀次升女之壻王准余斆徐禎孫男三時明昕女七泰官近侍蒙恩封父吏科給事中母孺人固本於家訓之厚亦其父母為善積慶之徵也孺人之葬在邑東五里所之溝原從先兆也銘曰凢物有本本厚發榮凢民之榮原厥所生鄭有賢父亦有令母厥嗣挺英恭侍帝所帝錫龍章昭示褒嘉嗟嗟令母奄逝則那其藏有墳既深既固子孫振振式繁厥祚第二女瘞銘資禀豐潔又秀慧父楊母嚴篤鍾愛生年丙戌迄丁亥孟冬仲夏踰半嵗忽然夭死孰所致世家廬陵澄江涘旅生於是復於是厥父士竒為之志永樂五年五月初九日東里續集巻四十二
