body:
  text: 東里詩集巻二明楊士竒撰五言律次韻陸伯陽林塘晩詠兼簡雷道夫二首金門趨講罷西園日暮時繁隂交雜樹輕浪散清池玩芳因坐久延月却歸遲還與同袍侣攜手詠新詩髙居傍城闕隙地富園林天風下修竹鏘鏘韻玉琴浮觴清沼曲憇石碧梧陰别有聞佳詠因之仰素心貧樂堂草色䕃松門青山緑樹村種蔬成小圃飲水必澂源每究賢人樂時同靜者論窮通自有分非為薄華軒觀海生詩為臨海令作作縣臨東海當年眺覽中水雲連浩渺心境合昭融己愜觀瀾趣還思作楫功有才終利涉非比望洋同髙巨川輓詩保障臨江曲荒城己半隳重尋耆舊傳愁説亂離時鄉里思遺德河山識令儀孤墳三尺在落日有餘悲善樂堂家惟經籍富數世坐丘園善樂承先訓心清味道言穿林無曲徑引水得澂源旦暮悠然處南山正對門題貝敎諭容與軒金川帶玉笥此地託幽軒旦暮無塵事絃歌近縣門傍花晴散帙延月夜開樽容與存吾道長令學者尊送舒有常知縣赴永春幸際文明世誰甘畎畝民再來趨北闕九月赴南閩紅樹吳門郭青帘海上津有才當撫字卓魯亦何人贈魏將軍銕馬載琱弓身輕百戰中聖朝初偃武髙爵竟論功帶鏤銀花白衣裁繡錦紅西清五雲下長衞大明宫賦得滄浪送陳景祺之襄陽知府漢水帶襄城滄浪舊有名分符來五馬如練照雙旌濟涉思為楫聽歌想濯纓須令郡人說堪比使君清送給事中姚山赴河南僉憲觀風在激揚今喜擢蘇章袖有銀臺筆衣含玉殿香河流明憲節嵩嶽對公堂想見澂清日歌聲滿洛陽髙郵四顧無山色蒼茫極逺天水雲涵郡郭秔稻被湖田草舎津頭市菱歌栁外船覊愁念前路非為别離牽過武城縣河上皆民舎波光暎葦扉青裠沽酒過白髪載鮮歸倉廩豐年積絃歌古俗稀征颿未可住還逐暮雲飛任丘道中霜栁未全稀風沙不住飛居人過驛盡獵火隔河微客路衝寒景天恩戀禁闈金臺行漸逺回首思依依晩次景州遇李頎給事吕文質進士下馬郭西村蕭條盡掩門荒城明落景獨樹出平原野水條侯墓寒蕪董氏園閒因訪遺事邂逅故人論重過濟寧閭井皆臨牐郊原四望平横峯連岱嶽分水向彭城笳鼓屯千騎舟車㑹兩京沿洄未能住俱是重王程輓盧侍郎二首三十趨京國同時復有誰貴為祈父佐長在縉雲司物化嗟何速神遊不可知凄凉山浦側千古葬靈輀無復相逢處相思每獨哀真成鵰鶚奮忽殞棟梁材草露晞還落河流去或迴空餘一片月夜夜照中臺送張鳴玉贑州知府北闕捧恩榮西江戒驛程悠悠驅五馬冉冉度雙旌政得䖍人愛心如贑水清崆峒千丈碧應勒使君名送胡元節廣西憲使騘馬赤茸鞦臨岐嘶未休朝廷用儒雅風紀得才猷天逺三湘外霜含八桂秋貪漁嗟薄俗表率在名流早度清流闗地險雄江北崩雲亂石髙古人成敗逺行客徃來勞霧壑疑藏豹風林訝嘯猱五年重過此霜㸃舊青袍蕭知州清省居二首白髪灤州守邦畿久著稱心清何所似皎潔玉壺冰數米功難致烹鮮道可憑從知清淨理未愧古人能廨宇清如水時平案牘稀堦前幽鳥下簾外白雲飛易簡民從化亷平吏息機鳴琴過日夕玩月澹忘歸非所寄示康甥榮旦暮圜扉下清羸念爾身閉門堪避俗省事足怡神藥裏時常檢書燈夜少親亦知相念切來問勿頻頻題劉士皆雲林小畫春霧曉初收春山翠欲流林霏疑雨潤嵐彩近天浮故里三華麓當年一葉舟看圖渾彷彿虚負水亭幽月池彭母輓詩二首士揚之母七十人間世􅄔居四十餘冰霜明婦節燈火課兒書堂掩春暉暗烏啼夜月虚白頭遊子淚和血灑衣裾誰不為孀婦風霜苦自持人情易衰薄親戚厭􅄔舊篋藏遺簡寒機理斷絲百年池上月曽照育孤時題楊學士畫二首羣山開奕奕清磵繞沄沄靉靆疑浮玉巑岏訝染纁巖芝香可茹林翠暖如熏想見幽棲者塵喧了不聞素琴兼白鶴瀟灑散髙蹤境類金精迥山如玉笥重泉香流石乳霞彩拂虬松溪上桃花滿神仙倘解逢夜兩壞壁簡鄰居諸君子雨深頽屋壁夜起攬衣趨入室風翻幔緣階水倒渠未沈㸑下釜急護案頭書得似東西舍髙眠總晏如送劉編修朝宗赴九江敎授二首昔過潯陽郡憑髙暢客情廬山當近郭江水帶孤城茅屋家家淨漁舟箇箇輕廣文懷散逸此去課諸生去上還鄉路天恩便養親拜辭金殿直謝别玉堂人山水濓溪近風煙栗里鄰懷賢知有志應不負青春行天夀山連騎去駸駸緣岡復度林杏花明似繡楊栁淡含金萬物亨嘉日先朝種植心白頭供俸在俯仰一霑襟曉起曉起侵風露黄埃湧素袍如林行隊伍緣澗燿旗旄細馬馳能捷蒼鷹奮欲高從臣稀奏賦心切聖躬勞行營夜雨雨來從薄暮霑灑夜將䦨稍喜塵埃息何由衾席乾天心存發育人事有憂歡森立戈殳士通宵念爾難早行聨騎載旌㫋移營亂壠田人行風露下月轉斗牛邊涉澗泥沾袂穿林草没韀數家茅屋小彷彿見炊煙衝雨晨起衝寒雨艱難念僕夫山田行沮洳石徑度﨑嶇矯矯虞張弋桓桓士執殳肩輿扶老病扈蹕愧殘軀次韻黄少保過田家有感水旱農艱食兹鄉實可嗟掃田紛拾稗為飯雜蒸沙嵗賦徵仍急秋成望苦賖吾徒何補益肉食老京華晩度宻雲北山絶頂常奉垂堂戒其如扈蹕何高疑登玉壘近恐逼銀河宛轉捫蘿上低回避石過前途看漸晚力盡敢蹉跎送周布政之官三山御苑栁初春龍河冰始泮祗命辭彤闈驅車候清旦超遥起雲翼光華升玉瓚逺别期譽名無為乖闕歎題梅花圖昔者江南住棲遲萬玉林只今圖畫見遺恨别離深凜凜嵗寒意娟娟冰雪心北人知愛少閒伴小窗吟送袁文理二首昔我艱虞日於君邂逅歡相看羨玉樹遂擬託金蘭嵗月分攜久江湖聚晤難喜聞嘉政滿薦剡出臺端入覲初相見陞除遽不留還尋江左路問買浙西舟桑梓歸應蚤蓴鱸到及秋佇聞寛恤治為解别離愁寄尤文度二首苦憶尤㕘議投簮養病勞卑棲人總厭閒散自能高厨却胡奴米門深仲蔚蒿平生冰雪意猶足重吾曹三年别帝京歸臥闔閭城貧病疎朋友艱難倚弟兄香焚瓦鼎細寒擁紙屏清自有床頭易時時暢道情寄黄宗豫少保佩玉娛親日衣抛五色文身閒疎藥裹庭靜對爐熏醉寫泉頭竹吟看海上雲從知蕭散地一飯不忘君鄒謙所孝思堂墓築蕪湖縣因之託數椽却思嚴譴日感泣更生年十口今誰在孤身秪自憐朝朝松栢地拜跽薦寒泉早發行營侵曙發風露不勝清海色微茫動林霏杳靄生六軍嚴虎衞萬騎翼霓旌七九流年外含毫扈逺征觀獵揚旌表四岑環㦸擁如林己失千尋險寧遺三穴深春蒐元有典時育亦闗心解網商王德光輝尚至今早入薊州古漁陽郡極目平無際青山畫不如彩雲迎霽旭翠栁帶澄渠地重城逾壯年豐廩有餘未應兩岐詠獨係漢人書自題小像寄鄉邑親故兩京三十載夢寐在鄉閭叨䘵承明主匡時愧腐儒淹留􅀈帶緩愁思鬢毛疎惟有秋霜意今吾是故吾送黄養正二首歴事三朝聖曽䝉當宁知手持五色筆常在鳳凰池雪霽城南路春融栁外澌還家自足喜報國豈應遲文明門外栁頻折送人歸竊䘵吾何補懷鄉志屢違越潮天際白吳樹雨中微羨爾乘仙舫東南去似飛送陳公餘赴台州敎授詩有序二首表姪陳公餘不相見十年比以棗陽敎諭考滿來北京留四閱月旦夕聚䖏得慰藉每用感念前十六七年公餘及其弟公延在南京以世婣故於予相聚甚樂而與公延聚尤久今公延墓木拱矣余未甞不思之而悲聞其孤异孱弱不立又未甞不自愧無能以振起之也間與公餘及此皆用欿然公餘今陞敎授將赴台州蓋予又有感者始予至京師台之文學老成在詞林學省者皆與予厚有相益之樂而淪謝盡矣每一追念悵然無己然聞其鄉風流文雅故在也公餘得典敎於此足以行志將人才日益有出而餘力亦必可以及异故因作詩贈公餘并記所感云陳氏聨雙璧京華舊合并蚤終悲令弟久别見難兄受命辭丹闕之官向赤城相逢己多嘅相送更勝情海上天台郡雲邊島嶼青交游如昨日夢寐想平生鄉里風仍厚詩書化易行公堂無外事絃誦有餘清鄭村􅄵内廏牧地十里都城外天清見逺山斷渠冰奠玉連樹葉飛丹牧苑千羣出耕畬萬頃閒賜田思徃事雙淚不勝彈洪熙元年四月賜士竒田二頃於此當時辭之踰月宫車晏駕矣早發李家橋霜氣欺貂帽風埃壓毳袍天連東海近斗轉北辰高戈㦸紛成隊衣冠總屬櫜衰年仍竊䘵扈蹕敢辭勞應制兩詠五色鸚鵡異質超同類光輝五色并非闗憐巧語所重表文明香粒金為勺甘泉玉作罌君恩無限好能忘隴山情白鳩本與鳳同類名官自昔時蕭蕭閒雅意皎皎潔清姿金屋看尤好瓊林息正宜和鳴致甘雨豐嵗足公私扈從度居庸闗登八達嶺盤迴躋峻嶮嵐翠濕紛紛巘路平銀漢闗樓俯白雲朝廷須講武扈從總能文獨立舒長嘯風清上界聞岔道觀獵己度重闗險初臨廣野平嵐兼逺水白山擁半空青扈蹕同三事蒐原合五兵農閒陪閱武亦得暢予情聞角風靜周廬夕營門角起愁不須三弄徹對月淚先流楊栁飄還合梅花落未休鄉心已無限何必在邊州輓黄行中檢討霜霰零瓊樹天寒一夕摧竟如東逝水無復却西回世數金閨彦人思玉署才舊時來徃路重過不勝哀黄處士輓詩簮組名家後詩書奕世承艱危持行義蕭散在林坰韶光驚石火精爽閟泉扃徒使相知者含悲誦塚銘樊通政雪霽草堂輕風解寒沍初日麗丘林簷際㵼懸溜窗中見遥岑清和蕩淑氣浩暢發冲襟餘色皎如玉吾將比素心勉仁少傅行營置酒就席奉簡同寅萬乘行春日千官得共陪石林穿窅窱澗道歴邅迴酒載黄封賜人聨玉署才解鞍廬帳下隨意㵼金罍送襄陽王時中知縣銅章仍出宰金闕己知名歸治中牟縣重經故郢城輕霞江樹曉疎雨漢􅆏晴還憶滄浪曲清泠好濯纓獨遊山寺奉簡宗豫少保勉仁少傅𢎞濟太常扈蹕愧無能同官喜得朋芳林時獨徃清境遂閒登碑古封文蘚泉幽羃翠藤欲題巖畔石歴覽記吾曽夜發岔道赴懷來明月下西嶺天髙北斗斜驚風起中夜捲地簸飛沙磊磊道間石喧喧橋外車過城曙色動連騎發簫笳早發老鴉莊皷角動行營翩翩從羽旌月明人影亂沙軟馬蹄輕本乏籌邊略恒存事主誠叨榮何補益慚愧負平生早發安家堡上馬逐西風風寒夜正中衆星斜轉北一水背馳東不恨馮唐老虚懷杜甫忠祗勤扈龍馭何暇恤㣲躬望昌平百里近皇都蕭條邑井孤夏霖頻汎濫秋穀竟虚無官府猶徵役朝廷已罷租緬懷劉諫議千載愧吾徒五言排律送向誠隨侍赴九宫山神境三光表王車十月行霜隨龍斾肅風送馬蹄輕雲舘迎千乘仙臺望五城巖前金竈古樹杪玉泉鳴聽講淮南道聞吹子晉笙遥知隨侍好頻有詠歌聲題山水畫際海飛初旭凌空疊逺岑嵐端浮石笋霞畔擁金林島嶼紅濤上藤蘿翠壁隂連帆乘浩𣺌髙閣倚嶔崟江路緣頻轉雲居望轉深依㣲廬阜下彷彿越溪潯展玩銷紛慮經營見苦心定應何處所思與謝公尋送王瀘淵改訓導上杭寥落新安邑横經已十年朝盤飡有粟夜榻坐無氊濟濟來衿佩洋洋聽誦絃學規兼體用祀禮備精䖍東魯文衡撤南閩敎鐸遷肯辭行道逺自喜過家便天霽雲横嶽潮平雨溢川别離將萬里書問若為傳餘姚陳氏嘉㑹樓邑里稽山麓樓居浙水湄雕欄出翠樹藻井暎華芝逺眺通吳㑹髙攀近尾箕雲乘鸚鵡落瀑帶鳳凰垂聖化昇平日天恩長養時四郊無夜警萬物譪春熈畊有如坻積歌聞擊壤辭都將欣愜意持用表蘭楣分題送史郎中代時彦學䕫德遵三首驛樓靡靡遵歸路岧岧見驛樓朱簾迎日捲畫栱礙雲浮眺覽通恒岱躋攀切斗牛乘軺來使節馳驛駐行騶送爾今重過憑髙試一留詩成清似玉灑翰記曽遊河梁河水深無極河梁構石崇暎波疑墜月倚岸訝