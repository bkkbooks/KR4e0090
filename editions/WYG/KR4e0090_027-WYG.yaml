青春放棹回送劉敦信致仕七十懸車世所稀先生六十遂南歸兩行霜鬢辭天去一片秋帆帶雨飛松逕晚晴蒼鹿近石田雲緩玉芝肥休官自此無塵事惟有門人日款扉送周給事使西南夷仙郎意氣清如玉每接班行共早朝久立銀臺簮彩筆又銜丹詔下青霄蠻方草木含天澤驛路風雲擁使軺想見馳驅遍南徼日聞重譯頌唐堯送徐崇威陜西理問初歸西掖掌絲綸共喜中朝接縉紳練達久明欽恤意遷除又拜寵恩新舟移漢水還經楚路入函闗逺向秦華嶽秋清五千仞行應挂笏看嶙峋靈谷寺建追薦征南將士水陸大齋車駕臨祭先夕百官出候寺中晩出東華赴上方滿衣月色動微涼鐘聲漸識齋壇近松影遥連輦路長澗底玉泉鳴石磬雲邊紅燭亂星光歡迎天上來龍馭一夜祗園散好香文華門侍朝觀録囚多所寛宥喜而有作日麗文華霽色新爐煙不斷上麒麟大臣論讞持王制睿㫖全生體帝仁眞儗下車興歎泣旋看解網動歡欣朝廷寛大恩波厚慶衍皇圖億萬春卧病院中寄黄學士三旬抱疾卧齋閤忽報春風謝絳桃草色新含時雨緑楊花紛逐曉雲髙屢承恩賜身難報閒聽朝車思轉勞想見詞垣多召命日趨東殿獨揮毫冬至早朝遇雪和胡學士韻履長慶罷天顔悦和氣冲融散雪來為瑞正當鳷鵲觀飛花還過鳳凰臺彤墀颺彩龍旂動玉几凝輝寳扇開共上君王千萬夀九成歌舞進瓊杯諸公從狩龍山因登牛首山訪佛窟寺胡學士有詩是日僕以病不及行想像佳遊輙用次韻三首吉日鳴鑾出九闗龍山扈從喜躋攀雲迎翠輦晨先合鳥避黄麾夕未還獵火依㣲煙岫裏鳴笳縹緲石林間羣臣咸睹三驅樂賤子空慚一日閒寳刹藏雲近翠㣲世人聞説到應稀千年飲馬泉仍在半夜巢松鶴自歸碑存古刻題朝代僧有閒情熟道機應話無生因坐久不辭香霧惹朝衣寺外幽巖石逕斜巖中開士似丹霞心涵水月空諸法坐對寒崖落一花清夜潮音翻貝葉常時雲氣護袈裟匆匆遥望知難覓歸騎聯翩擁翠華寺外有石巖一僧棲禪其中久矣諸公頗以未遊為欠同金諭德踏雪出長安街金墜馬在告不及徃問明旦奉簡雲暎都城一色妍暮街騎馬共翩翩初當分手迴絲鞚驚看翻身墜錦韀鳴珮紛趨天闕下聞鐘獨卧曉窗前平戎萬里隨龍馭意氣能無歎徃年題吳中書所蓄徐御史寫梅清江先生如玉雪舊種寒梅今滿庭閒時撫樹得籕法殘嵗開花暎壁經鳳沼香雲隔塵滓霜臺白筆寫神形朝回何遜誰相問定在金陵竹葉青别用之後其夕聞尚留江上賦此奉柬日出髙城啼曙烏城邊風色栁疎疎闗河嵗晏侵冰雪客子天寒歎道途明旦乘潮應鼓枻誰家燒燭且傾壺平生未解傷離别却掩衡門坐鬱紆贈梁本之二首𣺌茫何處望瀘州已拜除書去不留七十慈闈雙别淚五千蜀道一孤舟皆傳逺邑民情好親見諸生禮數優到日平安寄魚素殷勤先慰倚門愁蜀山消盡雪皚皚江水初平灔澦堆問路遥穿三峽過之官惟帶一經來林間女負巴鹽出煙際人乘僰騎回莫歎遐方異風俗此州元有穆清臺九日過宿遷縣掛席迢遥晚未休行程邐迤望邳州數家農舎通籬落幾處漁舟聚洑流回首鄉園天𣺌𣺌驚心時序水悠悠紫萸黄菊非無意沙鳥汀雲漫自愁䝉恩南還陛辭後出文明門留别詞林知己雙闕凌雲晃曙輝君恩初拜下彤闈西山雪霽千峯出逺道天寒一騎歸翰苑故人多契濶離筵芳酒又分違相思後夜瞻銀漢奎璧光華暎紫微十月十六日侍從赴北京出江東門十月朝天趨薊北城中争送向江皋朋儔載酒飛觥數兒子褰裳徒步勞滿路和風喧鼓吹中天晴日燿旗旄紛紛喜氣隨行騎回首鍾山紫翠髙滁州陪獵次林光䘵韻日華朝暎彩雲西紅樹青山望不迷罝網合圍笳鼓振戈矛分隊羽旄齊歡呼春動三軍色騰踏風輕萬馬蹄侍從如雲陪樂事郊原霜浄不霑泥尋醉翁亭故址空山泉石四無鄰亭構當年已化塵前輩文章闗氣運後來瞻仰愧鄉人寒林縹緲荒煙外霜逕逶迤古澗濱景物已殊風俗在壺漿來徃見滁民鳳陽過宿族兄𢎞璧夜話十五離鄉今七十版圖已作帝鄉民田園晚嵗治生足兒女全家習俗淳猶有詩書傳世業不勝悲喜見宗親百年楊氏衰兼盛一夜燈前語向晨趙彦如輓詩二首瀟洒清風滿素襟况兼文采暎儒林聖朝賢達皆推轂晚嵗京華始盍簮書閤淹留春酒熟齋房談詠夜燈深年來漸覺朋游減坐看晨星愴寸心鄰並紫垣南畔住尋常來徃共襟期可憐病起分攜後無復朝回坐對時學行尚存輿論好交遊未澈士林悲鳳山原下千年石不愧當年有道碑幽居二首簡時彦學䕫習禮時自翰林改春坊職務甚簡白日紅塵渾不到金城坊裏託幽居家貧頗類賢人巷地静何煩長者車近郭好山青暎户小橋流水緑通渠衣冠鄰曲皆鄒魯來徃清言數起予二十年來列從官玉堂髙處切金鑾哀遲有幸遷清秩匡輔無才愧素餐朝退書帷閒獨坐吟餘塵事不相干自憐此樂從前少身荷君恩欲報難愛竹堂為楊主事賦堂前修竹先人種看竹升堂思不禁正直終存君子節清虚猶見昔賢心靈旂疑下雲垂屋仙珮如聞風滿林自是著存長不忘豈同三月愛山隂送吳員外赴南京禮部春坊中允同袍舊十五年來間濶深此日帝城重握手西風祖道又分襟蒼茫薊樹凌寒景縹緲淮雲接暮隂知到南京公事簡紫金山色對青吟輓金鳳儀昔為御史南京住朝罷相過不厭頻每愛容儀誇白璧還看文采暎青春飛騰雲漢非闗早淪落泥塗獨未伸空使時人嗟定命銘文三復為傷神次韻答仲熙庶子見寄時鄒有室家之喜習懶忘機已嵗餘還應力疾効馳驅衰遲豈有㳙埃助談詠都將故舊疎倚檻桃花開畫障夾渠楊栁暎齋居閒情想見城東曲欲和陽春愧不如金華方處士輓詩鄉里過從駕小車平時蕭散有誰如幽人日聚清芬閤處士星明寳􅄔墟乘化已翔雲外鶴傳家猶貯壁間書石梁嵗嵗行人度共説何公德有餘送劉訓術歸西昌冠帶逍遙桑梓間浮雲長共此心閒家傳大父青烏祕門對仙人白鶴山五年江外三回見八月燕南一棹還萬里歸來誰得似獨無塵土涴清顔松居為餘杭詹道士作紫霄𤣥居静不扃長松如蓋對亭亭深涵雨露千年潤髙拂煙霞萬仭青仙子時來下白鶴道人晝坐詠黄庭㑹當天柱峯前去共汲丹泉煮茯苓送胡士璉貴州按察使二首澹雲心事堅冰操白首如公見幾人撫字久煩熊軾重澄清今睹豸冠新亂山啼鳥蠻煙裏深樹蟠蛇獠水濱何幸明時建官府㑹持輕典播皇仁聖主恤民頻有詔逺臣宣化豈無聞激揚自古闗王政表率于今仗使君淮水揚颿侵曉月楚皋飛斾拂秋雲獨嗟二十年相好復此匆匆惜袂分送彭士揚歸西昌二首鄉山南望飛雲外萬里還家綵服成心事已同秋水浄宦情渾似晚煙輕亦知衰薄慙閭里且復歡娛慰父兄後夜光輝動牛斗書船應泝豫章城故家獨抱遺經在蚤有清名動縉紳致禮特煩東道主承歡常戀北堂親龍洲晚色明紅樹魚浦秋波漾白蘋自是思歸歸未得可堪長日送歸人送羅知州還廣德薊門二月栁初青未有長條折贈行逺道共懷覊旅意同鄉不盡别離情花臨河上家家發山過淮南處處清民吏桐川迎望久經遊且莫滯雙旌陳頎僉事輓詩早嵗賢科擢俊英明時憲府佐澄清常持風裁民皆畏獨以寛平政自成萬里趨朝淹客舎幾人含泣送銘旌孤兒扶柩南閩路落月啼烏最愴情周公明敎諭半竹軒先生瀟洒溪園秀與竹從來金石交作室不敎全代瓦隔塵還已勝編茅清宜帳下諸生詠儉任門前俗客嘲更傍石欄移數挺閒常風月聽笙匏賦得花園送梁主事地近南城尺五天萬家繁盛似雲連花熏歌妓樓中勺栁暎行人陌上韀來徃紛紛皆駐轂别離欵欵更張筵知君過此頻回首心戀彤墀玉陛前寄思貽兄兄弟分攜總白頭楚雲煙樹思悠悠每聞夜雨懷連榻屢看秋鴻獨倚樓京國衣裳淹日月鄉園夢寐繞松楸金盤原上青山下投老歸田共飯牛南山停雲張澈郎中求賦門對南山紫翠深白雲長日抱山岑清連飛澗垂朝彩幽傍懸蘿駐夕隂五色㑹看光捧日九霄終待出為霖松楸只在㣲茫下早晚從知係寸心送蕭雅容郎中歸南京吏部都門新酒鬱金香窈窕筝彈陌上桑煙栁千絲牽别恨春花萬㸃暎行裝碧山近帶金陵郭白雪清含粉署郎官府日長無一事寄詩頻到五雲坊曽復鉉雪舫齋傍溪齋舎小於舟含素凝華曙影浮已喜虚明宜宴坐何妨安穏寄寒流簷前風絮疑翻浪窗外瑶林欲隠洲自有詩書可娛興不消更向剡中遊送尤文度赴貴州㕘議兼寄武昌故舊三十年前江漢上清風瀟洒共襟期折蘭閒詠離騷賦看竹頻過孝感祠已幸兩京重論舊何堪萬里又分岐故人相遇應相問為道非才負聖時送淮安劉千户致仕歸吉水二十承官累筞勲腰間寳劒動星文老辭淮水歸文水閒謝青雲向白雲鄰里應懷前學士晃菴其故交兒童爭識舊將軍芙蓉峯下滄洲曲時採林芳與客分劉氏松筠軒西昌城西松竹深開軒幽絶坐繁隂常疑白晝起雷雨還樂清夜聞璆琳一從薊北淹覊旅十載天涯思故林亦有茅堂傍東郭白頭南望最闗心送劉生客舎餘春雨正繁憐渠萬里到柴門相看已是諸孫行漸長能知大父恩共愛名駒輕道路又逢新雁憶鄉園松筠軒裏遺書在歸約良朋更討論輓孫子充金璧承家好弟兄至今鄉里憶持平早逢兵亂眞能養晚避徵書不愛名流水青山遺舊隠白雲芳草閟新塋相思豈必曽相識一讀銘文已愴情李縣丞之官臨皋小年閭巷共嬉遊邂逅京華總白頭奉使曽持巴郡檄之官又買潞河舟嶺南翠霧含津樹海上紅霞暎縣樓懷抱公餘清似水題詩還憶寄中州尹道冲八十受封蕭散春秋八袠髙少年曽署華州曹恩封初出麒麟殿宫錦新裁獬豸袍玉屑丹砂和石髓青山碧樹暎林皋仙人自在煙霞外五色凌雲有鳳毛送錢侍讀日上榑桑麗九天蓬萊髙閣五雲連才華久在論思地明聖方需侍從賢歸斾曉飛河濟外文星夜暎斗牛邊全家帝澤霑幽顯錦誥翔鸞百代傳送彭毓敬甞為政和令坐累被謫復起為學官臨清小邑俯河濵學館蕭條迥絶塵談道勝為百里宰開筵常接兩京人風霜跋涉愁堪老鄉里交游意獨親但有聲華光帝命相逢不恨别離頻送龍公常之建寧驛丞咸淳進士衡州佐異代風流見逺孫謁選三年依北闕承恩二月發南轅官程僻逺稀迎客廨宇清幽不閉門碧水丹山足閒暇頻收書册玩微言早入夭夀山候陪祭長陵二首塵起山中失路蹊肩輿扶過石橋西夜深風露寒仍淺月轉星河影漸低傍澗幾人同駐馬隔林何處屢聞雞東方立待曈曨曙紫殿前頭望不迷萬里蒼梧去不還宫車千古閟橋山日華閒暎芙蓉殿雲氣深連虎豹闗扶病此時瞻玉几傷心何處望龍顔遺臣泣盡餘年淚天上烏號不可攀送袁止安太常受誥後還餘干三首清廟沈沈接泰壇十年齋潔領祠官奏章屢上紅雲殿賜服曽無白玉冠常有道心如鏡浄由來公署帶冰寒新承天上絲綸寵歸及畨昜父老看一鶴南飛自玉京江東人識步虚聲色分玉井芙蓉秀氣挹金莖沆瀣清道術不須丹液法仙家元住白雲城還攜龍虎山中侣共向蓬萊頂上行蕭散浮雲流水蹤少年湖海與君同豈知黄鶴樓前别又向蒼龍闕下逢圭組有時還暇逸琴書隨意共從容無應俱傍西江住獨自蒲帆趂北風送李永懷歸東平霜花初下雁南飛葭菼蒼蒼栁欲稀落日故人千里别寒風汶水一帆歸盛年典郡民皆愛清代成名志不違幾度都門聚還散何時同返故園扉謁長陵憶昔六龍升御日最先承詔上鑾坡論思虚薄年華逺霄漢飛騰寵命多空有赤心常捧日不禁清淚欲成河文孫繼統今明聖供奉無能奈老何謁獻陵海宇洪熙戴至尊愚臣殿陛最䝉恩常依黼扆承清問每荷綸音奬直言萬古兹山藏玉劔九霄何路從金根餘生莫罄㳙埃報血淚横膺不忍論晚同宗豫先歸詣清河途中寄勉仁𢎞濟載書先發赴前營雨浥飛埃晚更晴人喜望家三舎近馬知歸路四蹄輕風飄㸃㸃溪花送日射行行野樹明却憶今宵氊帳底翠壺紅燭伴雙清送陳正倫御史赴南陽知府盛時冠豸兼衣繡柏府霜臺嵗已深宦達共嗟門似水家貧新賜帶横金褰帷緑野觀春稼拄笏黄堂對曉岑正已齋中有餘暇青編還究古人心酬張子俊中書惠畫不盡平生山水興勞君徤筆寫清幽流雲欲送千峯雨飛瀑深涵五月秋玉筍匡廬渾在目天台秦望亦忘憂白頭經濟曽何補只好投簮約共遊太常丁博士陞工部員外赴南京頌臺迢遞切紅雲博士官閒浄俗氛禮典曽陪青瑣議仙韶常到紫壇聞薊門栁暗欣簮盍潞渚荷香惜袂分此去陞遷展才用共誰時論考工文送江御史兼寄林懋𢎞十年冠豸侍明廷詞苑編摩况有聲不效䧹鸇馳世譽直將冰蘗重臺評吳城霜下迎驄馬浙水秋髙駐斾旌應共三山林憲使玉壺寒露烱雙清從游西苑廣寒宫殿屬天家曉從宸游駐翠華瓊液緫頒仙掌露金支皆挿御筵花棹穿萍藻波間雪旗颭芙蓉水上霞身世眞超人境外玉盤親捧棗如瓜送陳時顯歸南京兼簡廣哲二首聯官玉署多年别考績金臺兩度逢徃昔知心成落落即今分手復匆匆薊門雨挾風聲急潞渚波連海氣濃無限離情阻相送青山杳杳樹濛濛素襟不受一塵緇文苑英游共所知舊羨丰姿清似玉今看衰鬢亦成絲柏堂晝掩無公務竹檻春吟有妙辭想共東鄰歐主事清談常過夕鐘時寄胡若思賓客樂静忘憂養性靈豫章城外一茅亭窗涵南浦千尋碧門對西山萬疊青每羨林泉歸倦翼獨憐江海尚浮萍已知安邑渾無累猶有人求伏氏經己酉元夕偕行儉學䕫公緒百鍊并攜􅀈秫市中觀燈遂過退菴小酌即席賦詩得誰字貂帽藜筇信所之良朋稚子暮追隨物情已覺春光好燭影還於月色宜一世緇塵空老大幾人白首共襟期今宵且對燈前醉來嵗燈前知對誰送劉參議赴廣東二十餘年聯近侍揮毫常在鳳凰池每憐分署疎歡聚况及逢春又别離滿地緑隂榕樹合繞簷紅顆荔枝垂時平畫省多公暇預想清吟續隠之早朝應制天香初引玉爐熏日照龍墀綵仗分閶闔九重通御氣蓬萊五色䕶祥雲班聨文武齊鵷鷺慶合華夷致鳳麟是日南夷貢麟聖主臨軒萬年夀敬陳明德贊堯勲從狩宻雲早發次韻幼孜雞鳴滄海浴朝暾起換征裘倒别尊上馬好音喧鼓吹逼人清氣滿乾坤旌旗雲擁中軍幄劒㦸霜明列校屯載筆從容侍田獵暮年有幸共承恩駐蹕峪口少師蹇公少保金公尚書胡公及予奉㫖先歸道中風寒小憩洪勝寺聖主深恩恤老臣賜歸先渡白河濱御營晝日承三接驛路飈風共四人滿地寒蕪行雉誰家荒塚伏麒麟山僧頗解空王法延客焚香話六塵送潘景昭致仕歸永嘉素節清名玉不如忽承優詔賜閒居青坊舊振郎官筆金匱新藏史氏書歸槖人嗟一羽重懸車誰及二毛初黄花翠竹温州郭晏嵗髙情樂有餘送吳敏德南京僉都御史九重圖治任才賢白簡凝霜載畫船共喜芝蘭出蕭艾已知鸞鳳異鷹鸇淮山𣺌𣺌飛雲外薊樹亭亭落照前相好相違重相憶好音時聽路人傳丹徒何彦澄皆春堂百畝藥畦春浩蕩濟人渾是太和心泉香橘畔蘇眈井花滿雲邊董奉林靈劑不須酬白璧丹砂自可致黄金南徐城下滄江水㑹比何家隂德深送張嘉㑹赴封川繡衣前日下臺端百里清霜緑幕寒不恨逢人雙眼白共憐為國寸心丹蒼茫晏嵗遷除逺繾綣同鄉執别難自有平生冰操在嶺梅還似舊時看過鷂兒嶺巡檢司悼蕭長史二首王門輔相真公選老病思歸竟不歸盡職總知行直道愛身翻見蹈危機山籠曉霧深迷戍灘響寒濤近繞扉白首來經遷謫地感懷惟有淚沾衣萬里邊隅千疊山桑乾河上閟榛菅向來物論嗟投玉至竟天恩未賜環早以傳經重閭里曽看奏疏動朝班平生一片貞松色猶在交遊夢寐間送陳廷器通政公材士行總推賢憲府儒宫近屢遷共識丹心明白日也應華髪歎流年芙蓉浦溆秋風後鴻雁汀洲夕照前此地相逢又相送交情長為别離牽賜文淵閣五色菊一本應制一簇秋香䕶錦屛聨芳競彩自天成何須芝瑞矜三秀已似奎躔聚五星開處正當彤陛好賜來還稱玉堂清世傳此植能頤夀萬嵗千秋祝聖明紹興王氏居竹軒萬玉森森翠作林王家清致自山隂開軒六月暑氣薄閉門一逕秋雲深晴當霄漢看鸞舞夜或風雨聞龍吟嵗寒栗冽不改色共矢平生金石心慶行儉初度并贈禮闈校文之行三首三朝冠紱殿東頭人物當今第一流銀漢奎文光午夜玉壺寒露炯清秋終知鼎鼐歸台輔共待經綸闡大猷二月帝城春似海夀筵先醉紫金甌髙門奕奕縣東西文獻楊王自昔齊當代飛騰聨玉署半生華寵共金閨風霜樗散慙空老霄漢鵬搏望不迷未許明時慕丘壑須將旱嵗作雲霓三載興賢選俊英九重宣詔付銓衡從來節操推公道况是文章擅老成春院下簾心獨苦夜燈開巻眼偏明掄才為國真無忝預詠薹萊頌太平送孫修撰五色衣裁繡錦明三年歸謁稱深情芙蓉浪颭娟娟浄楊栁風生澹澹清颿影曉經揚子渡劒光秋望富州城詞垣官俸堪多釀遥想髙堂聚德星賜遊西苑同諸學士作東風御苑物華新吉日遊觀命近臣金甕特頒千日醖玉盤兼賜八珍淳翠含楊栁橋邊霧香汎芙蓉水上雲魚躍鳶飛皆化育須看海宇頌皇仁廣寒髙出倚晴霄清暑開臨螮蝀橋鳳闕九重通窈窕龍章五彩䕶岧嶤霞明翠浪成漂錦風振瓊林協奏韶山水足供仁智樂千春萬嵗奉唐堯日照千門萬户開參差樓觀出飛臺地靈長看紅雲繞天近時迎翠輦來絶好西山如華嶽何須東海覓蓬萊㣲臣幾度陪遊豫欲繼巻阿愧乏才𤣥洲閬苑五雲迷紫殿彤樓衆岫低日射飛甍金署榜虹連閣道玉為梯灑筵好雨霏㣲過傍席清禽睍睆啼欲報深恩何以祝皇圖帝夀與天齊送孫從吉主事河上蒹葭初著霜臨河撾鼓發官航面承天語朝辭闕身著宫袍晝近鄉錦樹拂雲明使斾碧山如畫對仙郎由來襟抱清于玉寫得梅花好寄將送解禎期兼憶大紳萬里賜環遼海外鳳池依舊寵恩濃共欣遭際承千載又沐優閒謝九重草草離觴對寒菊迢迢歸棹逐秋鴻臨岐重有傷心處不見名家阮嗣宗贈族姪之勉盛時楊氏三登仕文獻西昌第一家諸老儀刑隨逝水百年譜牒看分瓜逺來論舊歡娛淺臨别題詩感慨賖獨近五雲洲畔住好敦忠信作生涯齋宿次韻曽學士退朝齋閤息精神接席香帷總縉紳茶送䝉山兼顧渚琴彈子夜又陽春坐聞玉漏傳西掖起看龍光繞北辰吉日郊禋集繁祉慶成預擬拜楓宸送蕭生下第南歸少年懷寳謁京畿又向明時下第歸薊北鶯啼春後滿淮南樹色雨中㣲手披經史常忘食家傍園林静掩扉終待秋風六翮徤九霄雲浄看髙飛懷來應制霜紅碧樹被巖阿流水青山喜再過田事總知今嵗好人煙况比昔年多彩雲飛蓋隨雕輦白玉行尊載紫駝聖主時平此巡省㑹聞游豫出謳歌留别羅學古員外并解佩劔贈之紫塞西風九月秋千官祗從六龍游故人邂逅能青眼老我驅馳已白頭馬上擁貂晨共發尊前燒蠟暮相留闗城又是分襟處解贈呉鈎慰别愁上清袁止安寄詩余以寫竹奉酬并歩來韻京華一别嵗頻更長憶同年老弟兄軒冕無心暫同俗山林有道竟違榮石田過雨瓊芝潤金籙開函玉女清貌得崐丘青鳳羽因風遥答故交情題竹送周侍郎鴈下蒹葭澤國寒扁舟獨去路漫漫年來已恨舊交少老至偏傷逺别難親見謀猷禆國計極知勞瘁濟民艱一竿淇上清於玉持贈南州嵗晩看送劉巡檢赴廣東奏最晨看拜紫宸陞官遄赴海南濱身趨玉陛祗辭主家過金川喜覲親紅蓼桂花明水驛青松栁葉暗蠻津休言弓馬非吾事㑹有恩威服逺人蕭時中挽詩當日興賢對大廷天門金榜冠羣英一經勤苦承家世千載遭逢荷聖明溟海鵾鵬真自致蘭苕翡翠不勝清可憐萬里歸埋玉欲賦招魂慘不成送張宗海修撰致仕京國交情三十載别離憂緒百千端故人有道相違逺多病無能自効難已看文章留玉署也知江海憶金鑾扶揺九萬公先奮㑹待雲霄接羽翰送梁紹輝三衢敎授兩朝國史奏書成濟濟官曹進秩榮郡守方需漢博士泮宫行對魯諸生鶯啼燕語連城緑水色山光繞郭清應似髙齋趙閱道捲簾吟詠暢幽情送崇述謁告還鄉并問訊若思白髪朝冠在石渠故園松竹夢幽居蹔封國史收金匱榮拜天恩下玉除曉岸緑蕪飛燕子春江新水上鰣魚經過定見頤菴老為謝衰遲久曠書自題東皋小像玉華之東鷗渚潯柴門蕭蕭松竹隂平生自乏經濟略抱甕已忘榮䘵心一日天書照雲谷十年蓬鬢戴朝簮文章無補治世用矯首南山煙樹深送馮欽訓郎中持節使安陸事畢却過武昌訪宗族金册頒恩玉璽封秋清四牡出南宫九華飛翠迎江上白雪操絃候郢中使者通經才不忝親王祗命禮兼隆故家文獻存遺譜歸過沙溪覓姓馮送柴侍郎大將行邉浄楚氛多才司馬更能文岑參隴外多傳賦韓愈淮西力贊勲刁斗三更鳴塞月旌旗千隊拂闗雲陣前敵愾功誰最早致封章玉陛聞東里詩集巻二
