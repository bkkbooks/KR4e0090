body:
  text: 東里續集巻二十一明楊士竒撰跋絳帖題與昇姪此絳帖總五本山西叅政楊鼎所惠鼎嘗從事翰林在山西有賢稱但此帖裝表者失倫次非一也歐陽法帖寄姪孫奕奐汝兄弟自幼喪父頼祖訓育今祖父喪矣當夙夜勤學立身以圖不忝祖父不可自暴棄也知汝皆已婚度未有字今字奕曰崇規字奐曰崇矩盖奕奐皆有大義然非循蹈規矩不能大也先儒所謂大噐猶規矩凖繩先自治而後治人是也汝兄弟勉之勉之併寄歐陽率更法帖與汝習書習書與為人同道書一㸃一畫皆循法度久之而熟則下筆可觀矣人一言一動皆遵禮法久之而熟則德行可稱矣勉之勉之沂州普照禪寺興造記右沂州普照禪寺興造記建於金熈宗皇統四年僧汝尚文集唐栁誠懸書庶㡬得栁之彷彿者北京諸帖右黄庭經樂毅論皆趙文敏公所臨蘭亭序無氏名顔魯公座位帖逸其半或云皆公所臨未知是否金丹四百字亦公所書石刻皆在北京永樂七年車駕巡幸扈從之臣多得之而紙墨之佳如此甚少余得之太常少卿朱焯者也七觀帖三帖三首右七觀帖元袁文清公所作以贈程文憲公致仕南歸而趙文敏公之所書也余家有公小楷帖如黄庭樂毅皆臨古人書獨此帖出公自然之趣惜紙墨未甚佳耳此刻今在四明余得之陳孟顒秀才余多得七觀帖獨此本紙墨差勝彭百鍊浙東還所惠者程文憲之歸袁文清之文趙文敏之書皆所謂得意者也而具於斯盛哉所惜當時刻手不及耳余所得者獨此本差明白盖鄞士呉友麟所惠者楊仲𢎞墓志右楊仲𢎞墓志黄晉卿撰庫庫書仲𢎞晉卿皆先待制同年進士余嘗録此文附置題名碑隂又得此於王汝玉賛善汝玉以為佳物贈余惜其紙墨頗劣也賀捷表臨本鍾繇賀捷表歐陽文忠公集古録論之悉矣石刻今不存吾嘗見數本字大小皆不同獨友人陸伯暘所藏者為得中筆意兼勝陸沒後文籍散失不知此帖流落何在惜哉此紙陸少時所臨以遺余者每一展翫興念亡友為之愴然聖教序右唐太宗作聖教序及髙宗作三藏聖記又各有與僧𤣥奘手書附其後後又有𤣥奘所譯心經皆僧懷仁集羲之之書而于志寧來濟許敬宗李義府之徒為之潤色咸亨二年勒石今在西安府學今世學行書者蘭亭序之下則資於此余得此本於江夏宋惟憲紙墨頗佳北庭草書右北庭草書宋治平丁未宋孝孫刻之資中余忘所自得無書人氏名孝孫定為懷素書觀其筆勢飛動超越真非素不能惜乎此本紙墨未佳也陜西座位帖二帖二首右顔魯公座位帖藁石刻在西安府學此本骨氣清勁飛動視後來臨本盖懸絶矣余得之周恂如貟外吾郡胡忠簡公書法實出魯公其大節亦相似故以所上髙宗封事親筆藁附此帖之後右長安所刻顔魯公座位帖藁觀顔書者必觀於行乃盡其妙處題顔魯公書此巻顔楷書中興頌第一東方賛次之題名帖又次之而題名最明白北京座位帖北京顔魯公座位帖本四幅永樂七年扈從之臣多得之止二幅盖失其半久矣十一年民有治圃得之者楊學士亟以二紙見遺余併取舊所得於沈民望脩譔者通表之遂為完物譬如延平之劒神物終當復合也詹孟舉書國朝大書詹舍人第一其小字亦精但世不多有余獨於祕府屢見之詹初得書法於巙巙子山盖兼虞歐顔栁之體而有冠冕佩玉之風者也孔子廟學記右魏孔子學記曹植撰梁鵠書書法特妙此碑在孔林余得之衍聖公彦縉者也漢脩孔子廟噐碑右漢韓勅脩孔子廟噐碑盖靈帝永壽二年也此碑即六一公所譏霜月皇極之語者吾特愛其書耳漢魯相晨孔子廟碑右漢魯相晨孔子廟碑晨無姓趙明誠金石録云史晨也碑在曲阜建寧三年所立詳見歐陽文忠公集古録余得此於陳思孝思孝平生廣求厚積有重複者徃徃以惠朋友不但惠余也孔子廟堂碑右唐孔子廟堂碑虞世南撰并書石刻在西安府學亦得之胡給事嘗在内府見舊刻本與此逈異盖歲久碑刻剥蝕失其真也歐陽文忠公童子時得此碑刻畫完好後廿年復得之則已殘缺况今又後三四百年哉夫子廟堂記右夫子廟堂記唐駕部郎中程浩撰宋宣義太師夢英書世多喜誦此文而夢英書法一本栁誠懸然骨氣意度皆弱不能及也米南宫二帖右米南宫二帖舊得之吾友陸伯暘陸論書法於唐主褚河南於宋主米余聞米最善臨晉觀後一帖則其用意於晉者可見已筆陣圖右羲之筆陣圖非羲之自書盖近代人所書而羲之筆法因之以傳耳石刻在西安府學此閔僉事所惠者子昻千文右松雪翁行書千文盖有智永遺意學書者易於見效此刻藏松江海濵僧舍時人鮮有知者監生王寧奉命巡鹽場過而得之以見惠由是稍聞於士大夫矣淳化帖三帖三首此本吾故人朱吉季寧家物朱洪武末為湖廣僉憲坐累被逮盡賣文籍為行費此帖落江夏沈氏今歲仲舉展省還江夏時沈氏落甚其子亦盡賣文籍仲舉因購此見惠簽題猶朱手筆覽之増感此帖盖摹刻皆下獨二王有數帖庶㡬然甚不多也右淳化帖四本泉州刻也余友陸伯暘家故物洪武甲戌冬余自武昌歸陸以贈别簽題皆陸手筆圖書具存獨念故人不作久矣而此刻今歸内府亦不可得也右淳化帖五本泉州所刻者永樂乙未春余得之兵部尚書四明金世忠余家舊得於陸氏者與此頗各有缺畧及錯簡遂得互相叅考而宋米芾嘗辨其間偽書及黄伯思法帖刋誤所論皆見余之别録右軍書此出曹氏星鳳樓帖中不完所存者皆右軍書行書十餘帖草書四帖州民奉橘臨墓田丙舍官奴虞治書裹鮓皆在楷書有樂毅海字本又有全本有東方畫賛無蘭亭序而有宋人題跋數首永樂庚子冬余過臨淮訪族兄𢎞璧而得之者也黄帝祠宇右黄帝祠宇四字唐李陽氷篆刻在縉雲字衡一尺有半縮倍之吾家陽氷篆書此最大者聞縉雲仙都山有鼎湖世傳黄帝上昇處陽氷嘗篆鼎湖二字今尚在余未之得也忘歸臺銘右忘歸臺銘李陽氷書刻在處州陽氷嘗為處之縉雲令故其書在處州獨多聞有孔子廟碑吏隠山留題詩文皆佳余未得也長安繹山碑右繹山碑盖宋淳化四年鄭文質以徐鉉所授故繹山摹本刋置長安學中者文質鉉之徒也今泰山有秦刻李斯真蹟尚在但磨滅多矣間於鄒侍講家見摹本止廿九字其去此甚逺也青社繹山碑右繹山碑青社本斷裂多矣余得之習禮檢討嘗見陳思孝論繹山翻本次第云長安第一紹興第二浦江鄭氏第三應天府學第四青社第五蜀中第六鄒縣第七然余於蜀中本未之見也東明精舍繹山碑陳思孝自北京寄惠此帖盖浦江鄭氏東明精舍所刻本也宋景濂謂此用長安本翻刻然以余觀之亦出紹興本未知果如何當求識者辨之鄒縣繹山碑右繹山碑字畫視諸本特小得之行儉云出於山東而未詳其處聞鄒縣有繹山翻刻本此豈是耶當求識者質之篆書偏旁字源右篆書偏旁字源宋宣義大師夢英書此碑咸平二年立於長安學中後有英自題又附載郭忠恕所答書彼岸寺碑右彼岸寺碑在汝寧上蔡縣余得於監察御史尹崇髙盖宋真宗時建此碑今剥落多矣不知撰書人姓名中書舍人陳登思孝以篆書擅名於今數稱此碑之善余則未能通也姑存之五箴後右唐韓文公五箴宋仁宗時狄道宋寂作篆體書之後其子摹刻于石宣和六年也党懷英書右党懷英篆書竹溪四絶句金章宗明昌六年刻石濟州普照寺今在州學中大學經右大學經一章作鍾鼎篆書而忘所自得亦不記石刻何在聞西安府學有漢𨽻尚書魯詩儀禮春秋公羊傳論語魏三體書左傳遺字余皆未得也題王氏父子書右殘帖皆王氏父子書首右軍蘭亭荷華長者鶻等斷石蘭亭起大字至向字凡五十三字薛稷臨蘭亭六帖次徽之二帖次撡之二帖次涣之一帖次獻之洛神一帖皆出曹氏刻其刻石已不存余故重而表之時有惠懷仁集右軍書者并附其隂漢圉令趙君碑右漢圉令趙君碑初平元年立盖獻帝嗣位初年也碑在今鄧州南陽縣學中文字磨滅不可見者將半矣余得於陳舍人思孝漢北海相景君碑右漢益州太守北海相景君碑景君卒於漢安二年碑今在濟寧州雖完而字畫漫滅不可讀者多也漢碑隂右漢碑隂題名余得之思孝不知其為何人碑隂其所載皆門下書佐及故吏之類而字畫頗佳魏受禪尊號二碑右魏受禪表尊號二碑世或以為梁鵠書或以為鍾繇不可必而雄麗古雅後之攻𨽻者必取法焉二碑皆在許州得於劉士皆尊號碑其下近趺處皆磨滅不明盖古碑厯世久逺多如此也紀信碑右紀信碑唐武后時盧藏用撰并𨽻書其書甚佳昔人評藏用𨽻在能品余得此於士皆唐任城縣橋亭記右任城縣橋亭記唐開元廿六年任城尉㳺芳撰王子言𨽻書書雖出唐人而古意蒼然後之人能若此者甚少吾家唐𨽻獨有紀信及此二碑耳黄庭經二帖二首内一帖附曹娥碑出師頌右黄庭經稍肥大曹娥碑紙墨雖劣然態韻悉佳二帖昔得之漢陽教授胡士安出師頌近得之王孟揚檢討稡為一本便藏也右思古齋黄庭前有唐臨絹本四字為表背裁去石刻故在潁上縣學廖子謨為縣寄惠數本所恨打碑者甚謬也顔書東方朔畫像賛碑二帖二首右顔魯公大書東方朔畫像賛碑在古樂陵郡山石上今山東泰安州境内盖天寳十三載公為平原太守時所刻後有碑隂記余嘗屢得之此本得於余正安脩撰特完好彭百鍊御史惠余此帖夏文顔書偉然千古之二絶然考唐史天寳十四載安禄山反范陽此碑建於十三載之冬治城整兵之際有餘力及此又可以觀闕之度矣誌公像賛誌公像賛今靈谷寺有石刻吴道子畫李白賛顔真卿書世稱三絶舊刻已壞此重刻者而不復見書法之妙矣碑隂有趙松雪篆書甚佳然余未之得也羅池廟碑右唐韓文公羅池廟碑中書舍人沈傅師書桂管觀察使陳曾篆書與篆皆佳長慶元年所立也余得之長吾晝錦堂記右宋歐陽文忠作晝錦堂記蔡君謨書君謨書甚重於當時刻石四方多矣今余家獨有此碑得之錢習禮檢討云子昻十七帖右趙文敏公臨羲之十七帖公平生用功此帖最多臨本石刻亦有數處余凡見四本皆不若此本之佳也汝帖二帖二首此石刻在河南汝州永樂丙申冬中書舍人陳彛訓扈從還南京探其裝有汝帖二本皆表完遂以此分我右汝帖十巻凡十三幅各有汝州之印外因録二幅得之河南僉憲劉咸士皆視余前所得者頗優此刻闕長睿辨之甚悉應天府學繹山碑右應天府學繹山碑元至元癸巳所刻者思孝嘗云去長安本甚逺信哉漢大風歌右漢髙祖大風歌大篆體刻石在沛縣沛有新舊二碑舊碑已壞此盖近代重刻者余得之於大理馬寺丞洛神賦二帖二首右獻之書洛神賦十三行陳正倫所贈石刻今在常州而刻手不及洛神舊石刻之佳者今皆不存獨有此在毘陵而刻手甚劣僅存其意耳余得之陳正倫御史樂毅論右樂毅論止存首尾二百四十餘字而缺其中四百餘字曹士冕所稱張氏斫魚石者此是也然余忘所自得不知此石今安在也五清巻後巻中諸君子皆三十餘年翰苑交㳺也孟端沒於永樂中近年幼孜子啓民則崇述相繼皆沒覽其詞翰益重故人之感茅山崇禧萬壽宫碑右三茅山崇禧萬壽宫記元鎮江路録事王去疾文翰林承㫖趙孟頫行書并篆額行書特佳余得之安成進士彭琉通波阡表右通波阡表余得之張氏之孫戸部主事賔陽其文楊廉夫撰其書真篆二體皆出陳文東而用太樸伯温名者太史公所謂附青雲之士施於後世者也文東極力晉唐其書姿媚醖藉自成一家所未足者骨力耳七姬厝志七姬皆死於義而張之文宋盧之書皆精玅其傳逺無疑余得此於嗣初云智永千文右智永千文真蹟故藏鮮于伯㡬家大德中摹刻在松江郡學此本余近得之閩人王源永書如精金粹玉此刻於規模結構近之論丰采神韻相去甚逺其效龍伯髙而未至者歟先待制撫州推官㕔記後此碑作於先公既代之後嘗聞老長言受代之故謂郡有豪僧雲住暴横為民害内而中書外而行中書㢘訪司皆交其貴要莫敢誰何者先公治其發塚墓事得實獄已具而行中書㢘訪司皆遣子弟求觧於郡先公執不聽則公移以駮郡於是行省白中書郡徑自南臺以逹御史臺御史臺卒是郡議奏誅雲住未誅而中書符下調先公歸安縣尹然雲住竟不免死元史先公傳亦載雲住事是時當路黨邪徃徃類此記中所謂不得盡行其志者也撫州知府王昇近寄遺此碑謹識而藏于家以傳示子孫云唐中興頌此頌前三十年見有得者字畫多明白而十數年來有得者其糢糊率類此豈其石近又剥蝕歟抑打碑者之不善或有善者而余未之見歟此碑豐城史志静所惠盖余素嗜而得者遂為吾家之玩寳蘭亭十四帖十五首此帖石刻今在潁上縣其首題曰唐臨絹本而臨者刻者皆弱余得之廖子謨右禊帖臨手刻手皆劣甚不記何人惠姑存之後二帖其一前完後闕一前闕後完肥瘠亦相近皆勝此逺矣永樂中揚州發地得之近時勉祭酒所惠此二帖雖不完然㸃畫波磔玅處皆在神采有餘足資效法何必多也右蘭亭前本雖弱後二本甚佳虞恭公亦佳宜珍襲也此福州本余所得多矣獨此有陳膚仲題膚仲三山人晦庵門人張商英兄亦名唐英卒於神宗之世此所稱唐英當别是一人近年揚州僧舍發地得二石皆蘭亭舊刻一缺其前一缺其後塩運使何士英裁齊合之為一前所存者十八行止猶不二字後存者十行起能不二字兩本肥瘠相近清韻可愛論骨氣當在福州鄭本之次世傳宋思陵駐蹕於揚金人奄至車駕倉猝出避御用物皆不及將所愛蘭亭石刻瘞之而去此豈是耶柴叔輿侍郎凡得兩本分一見惠因識其大畧近日胡若思以此本予𨗳評為定式殆是老眼昏眵矣故辨之前帖是鄭清之家舊刻其石今在福州後帖松雪所臨今石刻在北京太學此刻今藏中書舍人胡宜衡家視鄭本微不及視松雪差優右帖得之王時彦詹事王忘所自得亦不究石刻存否當是唐人所臨豈禇河南之蹟乎此本又在鄭之下胡之上内府所藏刻本有三十餘家今石刻存者甚少余所見者汝州本紹興本臨江戯魚堂本福州有鄭清之家舊刻本潁上唐臨絹本北京太學及蜀中有趙子昻臨本嘗多得之此五本近一時所得其髙下不齊王時彦云蘭亭下者入目還自有趣殆不虚語前翰林檢討王偁得蘭亭墨本以進文華殿盖唐人鈎摹者睿㫖命刻石間賜大臣及近臣此巻左諭德臣士竒所被賜者謹拜手識而藏之吴敏德為御史巡厯所至皆汲汲名教事此其一耳誠可尚也偶得此刻遂志于後此紹興本視此尚完整今剥落如此盖流俗人不知愛䕶甚可嘆也世率謂字肥而不刓者為定式然山谷所賞者肥不剰肉瘦不露骨此本其殆是歟予所見多矣未有精神爽爽如此者珍重珍重叅議李君示此謾為之題蘭亭序題與昱孫右石刻在今紹興郡學吾得此於章尚文此刻本在吾廬陵不知何時移紹興也其古意蒼然視汴中新摹刻者大相逺矣吾家凡得數本獨此本差完玉枕蘭亭二帖二首右玉枕蘭亭石刻今在南京火藥劉家余得之陳鏞叔振陳清脩雅重余敬愛之自翰林庶吉士擢禮部主事從兵部尚書李慶入交阯沒於兵間甚可惜也此刻故在紹興府今亡裁十餘年而墨本存者已少余得此於給事中任守禮紙墨雖劣而字畫意度悉完固在所愛重也宋楊忠毅公神道碑宋楊和王與張韓劉岳諸公同事髙宗排大難却大寇其功名載史册耀後世者偉矣觀敷文學士劉一止此碑又知公忠精義烈乗一障以百數困病之卒膺數十萬狂横之敵屢赴屢摧之然後秉大節死城下盖公又肇楊氏之先也公之死類古稱有重於泰山者非歟公死距今二百四十餘年子孫不廢詩書之懿公之所以肇楊氏者其猶未艾乎其猶未艾乎漢魏唐元𨽻古右漢魏唐元𨽻古唐𨽻擅名非一人獨盧藏用尚有漢魏意元之𨽻書如虞伯生楊友直尤有名虞出廟學記楊出華山廟盖分𨽻必以漢魏為至也漢視魏又古矣此巻所輯前一面起魏而繼以白石神君後一面起唐厯元而繼以華山廟亦泝流求源之意也陸伯暘草書後此廿年前友人陸伯暘為余書者陸亡已十七年而此紙余嘗以贈楊仲舉仲舉又以贈吾賔畿弟覽之悵然謾志於後饒介之詩後饒介字介之號醉樵嘗仕張士誠能詩攻書法擅名當時宋仲温宋昌裔皆出其門此冊介之手筆余得諸廬陵劉彦信萃叔耕遺墨巻後右吴興萃叔耕先生遺墨一巻詩二首畫三幅手簡一幅詩見其志畫見其韻手簡見其學其清尚雅正之士哉先生之子原朗寳手澤如拱璧間來北京出見示披玩起敬不已原朗風致不忝其父亦可敬也徐憲使傳後右山西憲使江隂徐公傳先師海桑陳先生為其子遜撰并書先生江右大儒為文章不茍許以此文悉本於遜之所述遜字伯敏時為泰和令好賢下士明於大體循良之政民愛戴之卓然賢大夫也觀其子知其父此先生所為大書者也憲使於是不泯矣伯敏沒今五十年其子什襲此文如新又足以見賢者有後其子近属先生之孫江隂縣學教諭孟旦以求余題嗚呼先師為此文之明年遂捐館矣拜觀不勝悲感盖又有感者伯敏為泰和三年考最以升繼為泰和者十餘人民耆老至于今獨思慕道譽伯敏不置口古稱才難不其然哉不其然哉敬拜手題於其後松雪書杜秋興五詩後前輩云松雪作書初規摹鍾元常後欲展大字乃入李北海而終主於右軍余及見公作白駒圖書白駒之詩四章在後筆意皆出鍾此書杜秋興詩其又在習鍾之前歟而視公後來所書夐異曾子固論右軍書亦出學力非天成也盖非學無以成名觀公此書尢信歐陽士則所藏其表兄詩翰後老友歐陽先生之子士則來京師出所稡其外兄侍郎王君所寄其父子之詩為一巻属余識一言嗟乎余何言侍郎先母夫人先生女兄也豈獨渭陽之心哉先生尊府臨淄公早沒先生之學盖出王氏侍郎尊府瓊州公久宦遊在外侍郎之學寔出於先生先生於侍郎用意忠愛盖有非他人之為舅甥者比也余與侍郎同在翰林三十有五年每向余道舅氏之德未嘗不惓惓於心今先生春秋八十餘侍郎君每念不得歸侍於左右所頼者有士則朝夕之養也今士則迫於薦舉將出於是侍郎君若有不怡於中者毛生為親捧檄孝也包孝肅登第親老十年不仕亦孝也侍郎君忠愛豈有異舅氏昔者之忠愛乎吾家與王氏歐陽氏相好非一世士則愛日之誠如不迂視耄言亦孝之至也彭貫主事家藏先世書簡後民瞻先生髙明之學剛介之節吾郡之望也以作詩送胡忠簡忤逆檜貶辰州此十帖與彭氏壻家皆辰州所作綽綽有自得之意而忘其身之在放逐盖君子直諸内無徃不自得也先生赴辰年已七十及八十始許自便迨再升朝九十餘矣此豈人之所能為哉二沈三年雖一時謾語然天道必不爽世之極力以讐正人者可不監乎彭氏後同叔能寳藏此帖又有艮齋誠齋父子圭齋諸賢題皆至寳也衛中書所集名書巻後中書舍人衛靖以嘉集張即之趙文敏楊㢘夫倪元鎮宋克温昌裔盧公武陳文東之書為一巻其人品位望髙下不齊亦各一時之名勝即之宋季人其書虞道園素不取然余在祕府見所臨蘭亭展為大書良有晉意文敏元鉅公卓然當代之冠冕楊倪皆元季楊之文章倪之清韻咸重於時而不以書名二宋盧陳皆見用洪武中克温善用筆真行草書皆精而章草當第一昌裔擅行草體兼晉唐筆勢翩翩而謫辰州後乃大有造詣盧書獨嘗見其作篆數字甚髙古陳真草初兼二王虞歐自成一家後慕二宋遂稍放逸則不若魯男子之善學也然聞其𨽻書髙余不及見因以嘉出此求題謾志愚見於後松雪墨跡後右子昻書張宇初真人以進文華殿者士竒時為春坊諭德遂被寵賜云題麥舟圖巻後士君子用心凡宇宙間皆吾分内事范文正志伊尹之志盖自任以天下之重忠宣志同於父而世喜談其麥舟事至繪以傳論者又謂其重義輕利及賢於簞食豆羮見乎色者雖意存乎警俗而論忠宣則淺矣烏獲舉一鈞可以論其力乎朱文公纂録宋五朝名臣言行自忠宣始學至其終身言行之大者悉備而麥舟不與大賢之觀人有道矣范君啓東寳此圖最後求予題予何足以知忠宣然重啓東之能敬其同姓之賢也故推文正之意以書於諸公題識之後東里續集巻二十一
