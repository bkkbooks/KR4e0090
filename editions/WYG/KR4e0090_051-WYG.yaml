body:
  text: 東里續集巻二十三明楊士竒撰跋重識楊氏族譜後近觀宋史於上世譜㣲不合故此本序文重補竄廿九字始祖增注四十一字總七十字而悉用圖書葢之重題雪夜清興倡和後士竒既集倡和之詩而識之又辱館閣諸公素於吾兩人交好者題及和章聮珠疊璧光彩輝映胡公所云後日佳話者不在兹乎不在兹乎楊氏族譜始祖府君位下增注此據舊譜所錄然唐官制無虞部侍郎一曰為貟外郎且覃已仕宋不應其孫尚仕南唐姑仍舊錄以俟考羅氏族譜文後右西昌旌孝坊羅氏族譜之文凡十篇皆邑中先輩名公之作多出親書惟藩先生序出先伯益民府君之筆先叔祖平洲府君跋語出先伯通判府君之筆廣平劉先生序出其徒興寧主簿陳士瞻筆譜蓋德安貳守羅公所集前四篇為德安公作後六篇為德安公之叔寛則作今譜已亡獨存此文耳德安公持行如玉雪為政一本於仁厚官滿坐誣謫戍甘肅節行至老死不毫髮變既老官取其長子憲代役數年憲死又取其季子京代士竒幼嘗荷德安公教育至是白其情於仁宗皇帝遂命免京并免憲遺孤獨歸鄉今羅氏之族無㡬人獨德安公有子孫知慕詩書仁宗皇帝天地大恩臣士竒與羅氏萬代子孫銘刻肝心何以報何以能忘而亦德安公之德有以迓承之歟憲之子昇近來北京省余余衰老暫留扶持而京寄此文令昇裝潢屬余題盖羅氏上世已具前諸公之文余特著德安公大槩以示公之後人云劉士傳雅寓齋巻後雅之為言正也常也寓之為言旅也寄也夫居一室之中與天地之内一朝一夕與數千百年皆旅而寄也不可以常也正而常也其惟道乎其體極乎精一先天地不見其始後天地不見其終常久不忘者也然無處而不有焉察而由之吉昧而違之㓙惟君子者於大而君臣父子之際小而動静語黙造次顛沛之頃不敢以去道雖知其所不可常而不敢忽其所常久不忘者不務是以無所處而不當無所徃而不自得也士傳謙謹好善官侍近有年今奉藩宣之命而西其必不以所處之不常而或變其道之常者乎將行出此巻求題故為書此士傳勉哉源泉處士墓表後余始至京師數徃還太學識吾郡之士劉長謙於諸生中和易忠信其學篤實不浮其言弗倍於道心愛重之與之交其後長謙被擢為中書舍人予亦遷翰林居相接出入相偕與長謙益宻也長謙内外一致益久而益信此雖其生質之良亦必本於教乎今觀學士解公所為其祖源泉處士墓表稱處士在元時親炙呉文正虞文靖及鄉先生劉申齋解竹梧諸君子故其趣向知解髙明正大有異於人而退守數十年竟不辱其門又稱處士晚年拳拳教其孫以務學成家不可為傲惰驕易嘗指長謙曰成吾志者必在是以此觀之長謙信本於學乎孔子曰魯無君子斯焉取斯然究處士之所本又後矣噫世之人有能成其德而謂非本乎父師之賢殆未必然哉袁氏譜後族譜之作所以明源本繫孝敬亦有昭先德之義焉今世士大夫家能存其譜牒者什裁三二或遭時多故喪失不存或雖存之而無賢子孫為之緝理卒使後世無所於考斯二者皆可謂不幸也已中書舍人四明袁忠徹示余以其家君前太常寺丞庭玉所作袁氏族譜觀之蓋有可嘅者矣袁氏有譜譜厯時變故獨完中為族人詭利者所匿㡬廢矣頼太常之父菊村先生力追修之至太常又衍為此圖以永其傳夫使袁氏世世子孫觀於此圖以克究知其源本而敦於孝敬不至為行道之人者豈非不幸之後有至幸者乎菊村父子非袁氏賢子孫哉袁氏積忠累厚代有顯者菊村之曾祖又嘗為吾邑大夫即舊德之難忘睹名賢之有後嘅嘆之餘益增起敬蕭以軏哀辭後前永新令四明烏繼善先生所為泰和蕭以軏哀辭以軏之子德鄰介其從兄德蕡求余識一言余少識以軏知其有厚德因三復斯文嘆曰此於以軏非有所溢譽而烏先生亦非可以溢譽人者言雖約而意已切至事雖畧而他可類見其可寳也已夫孝弟百行之源也心存乎孝弟積誠不已可以通天地格鬼神致福祥以軏孝弟之行著矣而烏先生惜其年不永若有疑於天道夫天道報施固有不在其身在其後之人如三槐王氏之類者以軏雖不幸蚤卒卒之時惟有德鄰纔數歲而今既壯矣温然端厚日勉於善以植其身興其家數子森然蚤莫力督其學皆有可望天道之於以軏豈不信乎烏先生特未之蚤見耳見之烏有所疑哉惟夫誶箕䦧墻者而終獲福祥則是天之道不可信然此亦必無之事矣孔子曰積善之家必有餘慶積不善之家必有餘殃夫善莫先於孝弟棄孝弟不善莫大焉故因烏先生所言而推明之蕭氏之子孫宜世世寳此以知所務也出師圖頌後此出師圖今太子太保成國公朱公所藏厥考東平武烈王永樂四年出師之圖也間出示余屬識歲月士竒伏自思惟師出之歲叨職詞林實與扈從親覩文皇帝之誓師東平王之祗命及軍容之甚盛天日之融霽歡切於中嘗作出師頌以紀當時之盛事兹敬書於圖上以復于公於戯惟東平王忠精義氣大功偉烈褎然中興諸將之首其規模之宏逺經畧之深長簡在上心是以特受股肱心膂之寄雖天不憖遺大星墜營於今三十有八年太保公敬承爵位恭事四聖純誠茂績焯著于庭江漢之詩曰召公是似其太保公之謂乎光啓於前光紹於後大雅云不顯亦世猗歟盛哉族孫俊本宗譜系後此吾族兄仲素先生謫居淮安時手録其本宗一𣲖譜系以遺其子之紀使不忘所本也仲素之考經厯公在故元時貲業之富號楊半州而身沒之後子孫淪落散徙㡬不能自存蓋盛極而衰亦理之常而仲素先生雖顛沛囏難之中守身如鐵石持行如玉雪則先世流風遺澤故在也先生沒三十年之紀死亦二十年之紀之子俊持此巻來謁余感嘅之餘書以歸之尹務厚寄子詩後右吾邑尹務厚先生寄子之詩蓋以代家書也澂江距廬陵萬里而自道居官數年所得家書惟此無㡬先生謝世遂為絶筆夫士君子大節立身事親事君三者而已觀此足以知先生所存而自道用之雖終身不厭可也後先生沒之四年里契家生楊士竒得拜觀焉敬識于後書康仲矩墓表後民獻從季望運賦至京師遂求余此文民獻拜季望亦拜文成授之又皆拜皆欣欣然喜動顔色蓋季望之愛兄不減民獻之愛父也辭去十餘日渡江暴風覆舟叔姪皆溺死行李無一存者余聞之悲悼泣下夫以康氏一家雍睦之行積之有素而季望民獻淳篤務善猶難得一旦至此造物者之意果何如哉遂重書此文寄民阜民則并悼季望民獻之不幸又以少慰老姑之悲云爾彭氏族譜後世之所謂故家者必其先世有勲業有德義有文學表著乎當時或傳諸國史或見諸鉅公碩儒文章之所記載後世觀其所錄知其人因思識其子孫則其有存而不至乎絶續者蓋百中得十而已而十之中求其皆良善不愧其先者又僅得三二焉豈其先世所積者不足以貽謀垂裕哉抑或後之人有不克善承者乎其亦必有係得不得於天者然矣吾邑以勳業德義文學稱故家者亡慮累數十姓而邑中為盛屢更時變邑中故家其子孫不凋喪滅絶則遷徙離散如風濤烟絮播蕩無極故雖有良善不愧其先者人亦鮮知其為某氏之遺也是以求其連十數世合族而居尊卑耄穉朝夕必聚出入必偕人皆知其為某氏之遺者僅見月池彭氏一姓而已彭氏之先以德義文學躋榮仕板者相望也見諸周文忠公楊文節公及公之子東山先生以下諸鉅公與彭氏諸祖徃還文若詩粲然可徵而其子孫業詩書持操節以承其先者雖數更時變而益逺益盛無離散之患其蓋有以得於天之保佑者矣夫所以得於天者未必不由乎人也昔張公藝其家當五代兵戈紛擾之時而獨能保族完家聚處敦睦如一日夫當時之人其智力加雄張氏者何限而稱能保宜其家族如張氏者何其鮮也非世服仁義積忠信有以得夫天之保佑者其能之乎然則天之所以保佑於彭氏者其亦必有所自矣今與智先生方仕為香山丞將見於勳業與和先生又以德義文學表率鄉後進仰止二君而興起乎下者益多士升亦其一矣則天之於彭氏其意詎可量哉士升為二先生從孫為原泰君長子質美而善學今年來受業女兄之夫蕭直史用道於京師將歸示余此譜以余家於彭氏世好也又欲余題其後輙為歆羨書此士升其歸而益思脩其所以得乎天者可也書時思儀畧前四川布政司左叅政天台夏公庭簡作時思儀畧一巻授其家之子若孫使遵之以歲時祀其祖考者也儀文噐物具有成式蓋本之朱子所定而叅以國朝之制至明且備俾將事之際不待考論古今循而行之無一不合於度者厚哉公之用心也凡祭祀之理有其誠即有其神然莫切於祖考者氣脉之相通實理之相關也是以孝子慈孫事死如生事亡如存顓顓乎其誠而儀文器物之詳皆所以將其誠焉况供祭有田經畫有素而無臨事倉卒之虞使得以專一志意於對越交感之間非用心之厚其能周備如此哉士大夫之家其禮之大者曰冠婚喪祭而嚴祖考交神明又其大者也觀公是舉非致隆其大者歟抑將不止於此乎君子之行道也自親以及民由内而逹外夏公今佐方伯旬宣之任治數千里之地誠推廣是心使所被及者咸歸於公之厚其亦必始於此歟因公示此編輙為題諸巻端書贈地理師羅仁則巻後右詩文一巻凡若干首武昌艾仲宣求諸大夫士以贈其友宜陽地理師羅仁則者也悉稱仁則端乎術慎乎德不志乎利矣最後求余言自天地定位而川岳形焉川岳古今不易人事恒昕是而夕非地理若無與也惟人之體祖父所遺一氣之感其理亦有不得廢者然今之抱斯術者徃徃張為吉凶禍福之説為人子孫習聞其說謂吉與福可立致而凶禍可終身不及也於是竭力殫財今年葬某原明年改某向四寸之棺播遷者無寧歲矣夫仁人孝子豈如是其用心哉何者使吾親體魄復于土不壞於卑濕狐䑕不以旦莫速朽其可矣彼吉凶禍福出於天之所命德之所召者其可以茍為哉號其為親而為已之吉凶禍福是計吉凶禍福不可計而吾親之體魄其弊已有不忍言者此非操術之不端事親之不誠而皆汲汲利已者之過乎仁則端乎術慎乎德不志乎利仲宣惓惓於張人之善徒以友誼之厚亦非有所圖利於已者是宜大夫士言之而不厭歟劉尚書譔拙存蕭先生墓碣銘後槎翁先生文章行義為當世名臣於人不易許可然聞一善行輙喜稱道之不置口或見諸文字以傳矧於鄉邑輩行之尊撡履之篤又有世戚之好如拙存先生者宜其惓惓不能已於言也拙存先生茹清涵淳而引恬養髙足乎中無慕乎外超然自得此非世所謂有道者乎至今鄉人老長猶有能言當時事者斯文真不愧郭有道者矣司馬子長云閭巷之人欲砥行立名者非附青雲之士惡能施於後世拙存先生為不亡矣後作銘之四十五年拙存曾孫仲德以示余題三復起敬輙書于後上模曾氏族譜後西昌曾氏故儒家始居邑西郭宋盛際有孝子肅其諸子皆舉進士有祿位其族散處不一而居澄江之南上模里者子孫蕃衍貲産豐碩且世篤於善儒不乏繼盖數百年矣非本於其先世積累之厚乎喬柟鉅檜根柢深固斯其枝條敷暢茂宻干雲蔽日理之常也今驟起之家朝榮夕謝猝立遽仆者盖無本故也本者何德善是已曾氏可徵矣使繼今為其後者愈益積累無已焉其有徵又可量乎刑部主事翬為此譜求一言故推本致朂勵之意書楊氏訓子詩後右太子少傅工部尚書兼謹身殿大學士建安楊公訓其長子恭之詩五十韻前自有序於疇昔離合之故與夫激勵期勉之意何其周且悉哉雖庸衆人承父訓若此當知自奮矧恭乎哉恭字允寛余與公同官二十有六年及見允寛丱角入小學淳實粹然執禮不妄語時既失恃公扈從在北京允寛獨留南京未嘗少縱也無㡬歸閩不相見十六七年余雅愛允寛遇從閩來者每詢其所進皆以為桂林之翹秀藍田之温潤也嘗念初同官七人七人之子其克謹静謙讓而有立蓋允寛為首非獨心重之入以勵余之子出以揚於朋友未嘗不舉允寛也其年今三十有三於不忝楊氏可必矣而公猶不已於訓者蓋父之於子如天之於物豈以既成而遂輟夫雨露之養哉然君子有身訓者焉公為今名臣凡發諸心施諸事上為聖天子所寵任下為士大夫所譽道鄉慕者允寛亦必黙觀而思承之哉允寛省覲北京不數月奉命南歸出此巻求志故為書此魯王書正固先生巻後右魯王殿下大書正固先生四字賜紀善王貞矩度端嚴神采飛越雖即其名之義亦重其行之有以副乎此也貞博學慎行不矯激以為異不阿狥以取容言動雍容率由於禮蓋文學德義於今偉然藩國老成人而非賢王樂道重儒知之明遇之厚貞雖賢亦未嘗以得此也可為盛矣士竒於貞交久前二十七八年嘗同事翰林昔之同事者廿餘人今存三四人惟貞春秋髙而無忝職任則又余之有愧貞也故拜觀此書惟起敬楊氏族譜圖後楊氏舊有祠在延真觀存古堂祠有二碑其一為族譜圖今存古堂主海雲彭公少時猶親見之觀燬於兵祠與碑俱廢後之人不復得見也余重修此圖海雲覽之為道少時事厯厯余深有感焉已而海雲懇求此紙蓋其祖母孺人實吾容齋府君之子敦本重義之心有不能自已此豈尋常方外之士謹識以歸之則吾楊氏子孫覽斯圖者其敦本重義之心有能自已乎許岳𦙍墓誌銘後許岳𦙍吾友中書舍人鳴鶴之冢子十餘歲從其父來京師是時鄉郡朋友子弟居京者多也而求如岳𦙍端重嚮學不務外蓋鮮矣永樂已丑鳴鶴扈從赴北京岳𦙍治家之隙數執所業就余請益駸駸見端緒矣而持身尤謹余愛重之每對之意欣然相親也徃徃稱道之於縉紳間以為許氏有子而無㡬岳𦙍卒蓋余深悼惜之又以為許氏之不幸今忽忽六七年每遇後生晚學有不當人意者輙復思岳𦙍矣一日其父出學士胡公所為墓誌之文讀之余能已於情哉嗚呼於余如此於其父之情宜何如哉蕭氏與春堂巻後余少與子震子巽同學海桑先生之門嘗登與春堂拜天與翁蒼顔白髮風流儒雅而蘭桂森森光采照映何其樂也時先生方為文記與春而縉紳君子相繼詠歌之渢渢乎又何盛也翁既沒子巽亦物故於今二十餘年每展誦斯文未嘗不嘅焉以思肅焉以敬而不能忘夫二十餘年之間光華富貴倐忽消滅如烟雲飛鳥之過目而不留於心者多矣獨與春堂猶使人思之敬之不忘文章固不可少哉堂中今獨子震在而白髮紛如子孫繞膝其樂殆不減若翁而學士大夫續為之文若詩亦富矣其將使人不忘之於後者益無已耶蓋事因文而著文稱德而傳蕭氏忠厚樂善著聞鄉閭久矣斯文可傳無疑後之觀於蕭氏有所興起欲託文以光逺者其亦懋修於己乎韓復陽墓碣後國初文章渾厚髙古者金華胡仲申先生傑出羣輩宋學士景濂嘗謂見世之士多矣心之所仰而服者惟先生先生之文豈獨今之所難遇哉又謂先生於人鮮所推讓所許者衆必以為賢信斯言哉余少得其文集見所銘墓六人韓復陽其一也稱復陽孝於親力學好古處亂世而不汙其以醫名蓋寓耳當時論呉中之士必以復陽為首稱余嘗心識之今與復陽仲子公逹同朝公逹恂恂小心方自御醫陞太醫院判寵遇日隆天道之報施韓氏有在哉因暇與論及斯文遂出示所摹刻本蓋與集中不同百餘字審之當是刻本為正刻本詹公孟舉所書予平生見公小楷此為第一蓋公法書亦國朝之傑出者夫發潜德之幽光稡詞翰於二傑韓氏子孫尚世世寳此以圖繼弗隳哉呉氏族譜後右新喻吟峯呉氏族譜著自始徙吟峯之祖棲筠至於今刑部郎中方大凡十七世其間詩書科第仕宦累累有紀文獻足徵矣周禮小史掌邦國之制奠繫世辨昭穆世者諸侯世本今世譜始此蓋古之人以仁其族者也然世譜非有賢子孫則不知作之呉氏其代有賢者故紀載詳明繼繼不絶歟譜前有包孝肅後有梁石門之序孝肅於棲筠之孫為同年石門於呉氏之居為同里此其言豈茍然者哉余每讀蘇文定公浩然堂記思識呉氏之後世今大司寇南康魏公於人不茍許可數為余道其屬官之㢘公闓敏者方大必在甲乙數呉氏之慶澤其未艾哉其未艾哉都城覽勝詩後正統四年重作北京城之九門成崇臺傑宇巋巍𢎞壯環城之池既浚既築隄堅水深澄潔如鏡煥然一新耆耄聚觀忻悅嗟嘆以為前所未有蓋京都之偉觀萬年之盛致也於是少師建安楊公少保南郡楊公偕學士諸公以暇日登正陽門之樓而縱覽焉髙山長川之環固平原廣甸之衍迤泰壇清廟之崇嚴宫闕樓觀之壯麗官府居民之鱗次廛市衢道之棋布朝覲㑹同之麇至車騎徃來之坌集粲然明雲霞滃然含烟霧四顧畢得之而胸次軒豁趣與景㑹樂哉乎遊也南郡公有詩諸公皆倚和之綴輯成巻是時僕以賜告南歸不及與遊既獲覩群什而歆豔焉皆所謂登髙能賦之大夫者也諷詠之餘因嘅嘆凡事之成各有其時太宗皇帝肇建北京既作郊廟宫殿將及城池㑹有事未暇及也已而國家屢有事久未暇及皇上嗣大位之五年仁恩覃霈海宇乂寧始及於斯而不日成之豈非得其時者乎夫得其時而不得其人猶未也蓋嘗聞之命之初下工部侍郎蔡信颺言於衆曰役大非徵十八萬民不可材木諸費稱是上遂命大監阮安董其役取京師聚操之卒萬餘停操而用之厚其既廪均其勞逸材木諸費一出公府之所有有司不預百姓不知而歲中告成蓋一出安之忠於奉公勤於恤下且善為畫也謂事之成非由於人乎嗟夫一事之成猶必得人則於為國家天下之重且大不可推見乎白雲山房記後右白雲山房記二篇前吏部尚書吾邑劉子髙安成劉雲章兩先生為前山東塩運副使吾邑蕭鵬舉先生作也前七八十年吾郡斯文巨擘如尚書冠冕佩玉之文安成道德性命之學學者皆重山斗之仰若運副仁義之行氷蘗之操上追古人近代寡見也士竒今獲拜觀此巻於運副之子翰林編脩鎡所蓋三絶具焉謹識敬仰之意如左蕭氏子孫尚永寳之黄教諭資深齋巻後浦城黄友文教諭清江時與余舅氏陳孔立先生相善余嘗一訪之清江邑庠弗遭也今年相見於京師友文端雅重厚言動不違探其裝得所蓄資深齋詩文一巻讀之葢知其所用心焉友文求余識一言於是坐客有談農家力穡之事者曰方春和時有事播種迨其既逹驛驛厭厭勤耕耔之務謹旱澇之備一以時候不違其宜小大畢勞不揠不息力勤而功厚至於秋之時薿薿乎其盛矣由是厚穫而博歛休休焉油油焉凡旦暮寒暑公私百務之所需不假外求一取給於家無不充然如其意欲者斯皆為之得其理不遺其力是以其穫之厚而用之不可盡也余聞其言以為有合乎聖賢論學之㫖故采之以綴於諸君歌詠之次桃源蕭氏族譜後余少時先生長者㳺學則聞邑中故家若桃源蕭氏者系出梁祭酒子雲有所從來其時思賢及其弟思和皆春秋髙思賢端重負氣義思和爽朗特逹兩翁既沒世思賢之子安常安韶思和之子安正亦傑然拔出前六七年安韶冢子德蕡請余教授塾中時德蕡諸父惟安正甫一人獨在歲時高堂廣㑹安正甫東位坐余賔位諸弟子姪孫從次序列兩行下無慮百數十人衣冠禮秩雍容敬愛藹如也余閒暇無事輙與德蕡兄弟出所居縁石臺渉溪登槎峯之顛引目四望山水環抱原田衍沃迤邐數百頃皆不出蕭氏余嘗徘徊愛之因究其先自宋貢士諱漢卿者始居於此其家所藏漢卿鑄鍾猶在葢至今若干世矣其子孫庶富益盛而譚詩書治儒者之業未嘗乏焉嘗竊自嘆以為凡物之盛必因其本蕭氏之盛必本於祖考積仁累厚之所致乎如使其子孫繼今所存所施皆惟厥祖考仁厚是繼則又將以敷遺於後者豈有涯乎德蕡有才諝慷慨尚義洪武中嘗從事秋官今退處家食汲汲以繼先裕後為事今來京師出此譜求題譜蓋德蕡所重脩者觀此可以知其仁厚之意夫惟仁厚可以繼先而裕後也德蕡歸見其族之人尚以余言告之東萊黄公訓子書後父於子至親莫加焉故致愛亦莫加焉然人之愛不同君子者以義細人者茍利之而已工部尚書兼詹事府詹事東萊黄公再命徃交阯也手書數事留訓其子琮皆持身治家處人之要道所謂君子之愛其子也琮能敬父之教裝潢為巻用旦夕覽省以余父之執求志一言昔趙伯魯受簡於父無㡬而忘之彼亦人子也琮可謂難矣然善承教者必因其言而明諸心力諸行不徒文具以炫觀也朂哉琮也且君子有身教者焉公秉心正大介然義利之辨以直道事君以寛惠逮民在交阯二十年其人無老穉皆戴之如父母天下士大夫無論識不識皆知其為君子也士茍有志立身行道猶將視公為法而况公之子哉朂哉琮也庸衆人之子猶有卓然力進於善者况産於崐岡而非備温潤縝栗特逹之善其亦奚所取貴乎琮朂之哉琮秀敏好學吾故喜為之言題家譜與仲郢弟仲郢弟來京師求家譜實清溪之派也併以先世事實授之詩曰無念爾祖聿修厥德吾弟其務飭躬修行以及諸子皆圖繼承使人稱曰是無忝清溪者也則庶㡬矣此簡亦什襲勿示人蓋薄俗不可不戒題家譜辨冐妄復亨絶近年四十三都源塘楊世充之子孟辨言其先是復亨之後又聞孟辨已請行儉為文載其先世出復亨吾家居時識世充嘗問其宗派世充言余幼喪父自祖以上諱字行號皆不能知親戚老長咸無存者無從質問但存一先祖神主牌題云理定縣尉應真先母王氏云此累世所奉祀者吾考吉州科舉錄應真宋進士而吾家先譜不載非吾同宗明矣近與行儉同在館閣間譚及孟辨請文事儉翁云一時止據孟辨之言書之實未有他據也故具識之以示吾後人槎翁先生書郭氏家錄後西昌冠朝里郭佺及其子同登宋景祐元年第佺官至祠部員外郎河南府運判其子官至屯田員外郎通判定國軍自宋以來西昌之士父子以科名顯者多矣而至于今雖閭閻畎畝能嘖嘖譽道之者獨冠朝郭氏蓋重其父子同榜也雖西昌世科之家不可闕而其世次先德泯沒不傳亦多矣獨郭氏傳其當時勅賜之詩及誥詞及慶源本末等文厯厯具在余又重其子孫之能不泯其先也劉槎翁先生既悉為親書之又為文題其後將其傳豈有窮哉自余少時所見鄉邑諸老於脩輯其先世譜牒事行獨劉先生克殫其心為無遺憾而又惓惓於鄉里故家文獻惟恐其不傳夫惟其所厚於家者以及於鄉先生真盛德君子哉通判之後今鄉貢進士某出此巻求題三復不勝景慕謹書其後而歸之張德翁墓誌銘後元良醫張德翁墓誌銘一通先伯祖清江府君之所作也德翁之孫日昭來京師以示余求識一言于後且曰惟待制公亦嘗辱文叙先祖父瑞芝事世稱實錄無溢美先祖父舊假寵君楊氏實侈君幸不忘先好待制公又余之曾祖府君也余豈敢續先人之末哉然念上世文章行義皆挺挺拔出而皆於人重許可德翁其必有以得之矣余家所居與張氏同里今去德翁之世亦纔五十年時時聞鄉人老長說德翁事甚備與銘文所載如出一口又說德翁嘗遇神人授異方故其術益精而濟於人益衆而銘畧之夫神人遇不遇不足論昔太史公叙長桑君教扁鵲事君子尚以為言渉神怪不足徵也余聞德翁之先世業儒迨其祖才甫始兼治醫自是世為儒醫儒者於察道為至矣則德翁之為醫雖無所遇神人其術蓋未有不精者然而閭閻巷陌數十年之間髙門大第忽然衰薄變故者何可勝算而德翁傳之其子若孫至于今蕃衍益盛而皆恂恂讀書好禮脩其祖之業不墜益勤謂非德翁有所濟於人烏足以致此乎銘稱德翁有隂德夫有隂德者其後宜大於今豈不良然哉此銘所謂真實錄無溢美者也張氏之子孫尚世世寳之書沙湖蕭氏族譜後自宗法既廢而族譜盛行固人心世道之一助也古者宗法之明有百世不遷之大宗有五世則遷之小宗繼禰繼祖繼曾祖繼髙祖者小宗也小宗雖不一然皆管攝於大宗冠娶必告死亡必赴祭祀不敢尸故自源徂流條理分明而脉絡有序也然此法不舉久矣於是士大夫之家莫不有譜焉譜上至始祖則宗法立大宗之意也下至髙祖則宗法立小宗之意也合大小宗而存其槩於彷彿合千百年之統緒歸諸數葉之楮慘淡之墨嗚呼亦士大夫能之流俗人則不屑矣吾鄉沙湖蕭氏其𣲖出漢相國何流及齊梁江左蔚為名宗至唐蕭瑀八葉宰相盛莫與京五代時諱昶者為巡察判官避馬氏亂始自湖南徙家泰和之禾溪則沙湖之始祖也其後景定二年諱德升者貢於禮部則沙湖之族祖也載諸譜者班班可考且如左丞相王黼參政董公德元及諸名賢志跋序文兹不贅述予所願望者湖邊之族之盛代有俊秀而天與二嗣子震子巽皆秀而文綿厯世逺則方來之祉未有涯也不其盛歟吾故為書譜後以相期於無窮云題袁進士鏞傳後余讀林公輔傳宋進士袁鏞死節事何其偉哉鏞嘗舉進士與將作少監謝昌元華文閣直學士趙孟頫友善時宋運益蹇三人者相結盡忠報國德祐丙子元兵入宋都鏞竟死國事其家十七人聞鏞死亦皆赴水死豈非烈乎謝趙後皆去為元臣掲文安公嘗論宋以弱亡與周同且嘆周死節之臣不能如宋豈非謂有如鏞者之衆乎然鏞不見錄於史何耶吾嘗觀宋季野史當時自薦紳大夫下至工藝及方外之徒奮身死王事者不可勝數而考之國史所載十無二三則史之所遺者獨鏞哉至鏞曾孫太常丞庭玉太常之子尚寳司丞忠徹皆登顯用於時鏞之事遂暴白於後世而謝趙今不聞有後天道之佑善信矣詩曰無念爾祖聿修厥德夫有肇之於前又有紹之於後庶乎人之賢子孫袁氏子孫尚世世懋敬之哉因忠徹出此求題遂書以歸之題全室集全室集者釋泐季潭所作詩也泐龍翔忻笑隱髙徒工詩洪武中與復見心齊名復坐法死其詩無傳獨泐有此集亦其徒之力也題蒲菴詩集蒲菴詩釋見心復公所作余初得之陸伯陽皆七言古近體其五言古近體及文嘗見之而未得也余藏之久矣近㑹僧錄覺義南浦言及之南浦忻然請刻以傳復公江右豐城人雖從釋凡其所交遊徃還論議率儒者少壯㳺燕都親炙虞文靖公歐陽楚文公諸君子而與張潞公交尤厚蚤有詩名元政不綱遂航海至鄞止焉洪武初公與季潭泐公皆用髙僧召至京二公詩於時表表叢林中泐公清淡古雅復公豐腴條鬯中朝大夫士多所推讓而求者日接踵戸限吾聞鄉先生劉子髙言見心學博而才敏於詩援筆立成未嘗苦思日雖十數篇如源泉混混無難者丁鶴年云見心澹泊寡欲至於加禮逢掖士有呉全節風致噫此其詩之所由昌歟南浦既刻屬予一言於後復公詩宋學士言之備矣余特著其平生之槩與南浦之好義云黄文節公槐安閣詩後山谷先生元豐四年春來官太和東禪槐安閣詩考年譜是初到官時作集中又有與東禪長老夢偈一首長老意即槐安詩序所稱述文者蓋夢說必因槐安而發也先生元豐六年冬官滿去在太和三歲於慈恩普覺觀山及諸山寺題詠頗多今惟東禪有槐安一詩此石本亦非舊刻必洪武中重刻者蓋洪武三年始改太和為泰和而此石今亦不存惟存此紙寺主僧鑑輝重裝潢以求余識歲月并錄夢偈授之如能求片石合二書皆刻以傳亦山門不朽之盛事也趙文敏公書後趙文敏公書入妙品有得之者如寳拱璧其外孫王蒙叔明承公家傳髙致雅韻名重呉越皆於空王心存敬禮余得此巻什襲有年雲海上人重作廣福寺功德無量持用布施永鎮山門張真人畫後右西璧真人寫北真靈巖靖通峴泉四圖以贈今神樂提㸃徐善淵者也四境皆在上清北真者道家築觀以祠北斗之神靈巖者相傳張氏祖天師鍊丹處也靖通者虚靖真人之所居峴泉則無為真人遺蛻之所藏也善淵徃年奉命使上清既畢事真人陪使者宴游於此其别也善淵不能忘情於神明之境此圖之所以贈也觀其山水木石與夫烟雲開闔變化四時之趣皆極天機流動之意吾聞道家之極致多異能不可測此豈其一耶即其發諸外如此將所存諸中者亦未可測耶古稱至道之士盛德容貌若愚抑不可以其外觀其中耶提㸃於真人相契以道必有得乎其中者則余不能知也海禪師螺川送别圖後吾邑海禪師久遊名山諸老宿間此巻皆其交㳺所贈也夫不知其人視所與師豈常流者哉今霜清木落之餘師巋然獨存徃徃觀此者不能不係存沒之感亦人之情也然吾聞師之所宗以外情為道師果於此何如耶心經金剛經右心經金剛二經洪武中僧宗泐奉詔註釋者也前有我太祖皇帝御製序所論空相之㫖迷望之故簡明精切聖知超出蓋自古帝王名通佛法者未能有及學佛者必考諸此而後可以有得錄金丹𤣥奥後右金丹𤣥奥一冊神仙家養精氣神之說用之云嘗見漢中道士有此書以為精粹不雜不傳之祕也於視服丹藥以求長生者蓋不侔矣然其間傳寫之誤徃徃有之余不曉不能正也列仙傳右劉向列仙傳一冊今刻板在朝天宫余得之同邑道士蕭鳳梧漢人所紀者如此而已或云非向作以其文不類西漢也而漢史向傳亦不云著此書真仙體道通鑑右真仙體道通鑑三十六巻浮雲山道士趙道一所編蓋㑹稡劉葛諸家之書為之者也有須溪先生序然亦有後人續增者矣道一與須溪同時安得復紀趙元陽此板今在朝天宫其殆淵然之不泯其師者乎余家十冊得之道錄掌書蕭鳳梧壇經右壇經余在武昌時有于生者從余學以見贈生家甚富其父拳拳於施經飯僧以此為善功不數年費用且盡為讐家所銜致之死妻子皆徙邊此豈施經飯僧者之所願乎其所感非所應如于叟者常接踵矣而世之為之愈不厭何耶度人經右道家度人經得於太常寺丞葛清隱余弱冠為鄉社師社中禬禳祈報之事未嘗絶也而多用道家科法其文必屬於社師余是時於道家經頗能言之蓋有所資之也既去鄉社遂不復著心今閱此茫然如未常識者追惟徃者不覺興嘅四十二章經佛最初入中國獨有四十二章經觀其以生中國為難彼固歆慕乎此矣而此之人樂其説者徃徃願生西方何也楞嚴經二部右楞嚴經戒環註註楞嚴非一家獨環為優此本得諸四明僧能義僧蓋專志是經者也楞嚴經十巻得於定巖佛經余家頗畜數本伊川先生未嘗觀佛老書惟明道先生觀之其言曰不觀無由知其理朱子亦云不盡見其書而欲折其是非猶不盡人之辭而欲斷其訟之曲直何其能果於自决而使之心服也吾取以為法焉吾家此經總十冊圓覺經集要金剛經句義附圓覺金剛二經皆佛氏所謂精義妙道者也佛老吾儒所黜繇其道之異耳學者必實見其所以異處而後為有得焉東里續集巻二十三
