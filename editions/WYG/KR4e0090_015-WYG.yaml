body:
  text: 東里文集巻十五明楊士竒撰墓表香山縣丞彭公墓表鳴呼古人所與共治天下者必擇士而任之凡内外大小百執事之職非士不與是以職修而治興後世雜刀筆吏與士並用至有謂士迂闊無益扵世者夫爲士而不知道知道而不適用誠無益扵世然取士亦察扵其内何如焉耳可以什一遂廢千百哉若今香山縣丞彭公出乎士也其所以修扵身施于人者皆有以發明斯道士果無益扵世哉公諱豫字與志一字叔介吉之泰和人其先徙自長沙宋寧宗時曰惟孝詣闕獻賦周丞相必大楊學士萬里謝諫議諤交薦其才得官不受而去公之七世祖也祖某父某公自㓜已岐嶷異常兒稍長讀書知以明道爲務初吳文正公以性命之學授虞文靖公文靖公以授鄉貢進士安成劉雲章先生公徃從學雲章先生久而益有所得雲章先生殁益嚴奉先生之教動息語黙必由扵矩度澄心玩㣲手不釋巻茹素飲潔懙懙自足非其人不接也一時流俗亦皆目公倔强乖刺公既孤特寡偶而持之愈堅南雄守嘗辟公教官金州守奏公才行可用徴詣京師皆以疾辭後數年始就聘萬安訓導以上書言事擢香山丞香山在嶺南海島之間地逺而俗嚚前之爲縣者率尚猛治公至一務寛施訓以善道久而民益化服縁海諸衞屯兵暴横爲民害徃徃擇民膏腴田誣以荒廢據占自利郡縣不能制公獨毅然曰此細民所資以共公賦給私家者且奪民欺上著在國典有不還所侵田必執不貸兵知公不可犯聞所言悉還之縣有大猾恒持長吏短長揺撼以騁前此縣長吏皆縮手不敢詰公悉捕寘諸法奸宄歛跡海冦常刼掠民婦女貲貨出沒儵忽不可蹤跡民苦之公爲方畧教民掩捕訖公去冦無入境者瀕海歳旱衆禱不應公自外來曰豈有爲文具而能格天者乎即自齋沐致禱越二日大雨霑足明年復旱公復禱雨亦如之縣民舍火且延及官廨公叩頭嚮之反風火滅民習不樂學雖已久立學官生徒廪食十數年有不能通知語孟章句者公稍暇即詣學督視諸生為之啟諭誘掖不數年有與賔興而登仕者民始知學之貴在官六年年已七十以老疾乞致仕既得請未行某月某日卒于京師永樂六年也明年某月某日葬某里某原娶某氏繼室某氏皆先卒子男一某孫男若干某某公居家事親孝執䘮三年不御酒肉人未嘗見其啟齒待族人有恩嘗嫁孤女振貧乏皆曰此在我當然性簡淡無他嗜好惟寶愛其宗譜與先世手澤文字踰扵拱璧嘗語其子若孫曰知愛此則能愛身矣聞有存其先世及劉雲章先生片文隻字雖百里外不以寒暑奔走求録遇鄉人子弟必教之禮義忠信甞以歲更長繇賦里中教里民復其所生之姓者數家民貧不能輸賦竭已力代之輸不責償焉蓋公之所爲厚扵民者初不待香山而後見已如使公之見用不止扵香山又使士之用世治民皆如公之香山士之效豈不暴著扵天下彼不爲公者不足言而公僅止扵香山而已嗚呼惜哉余故論次公平生大槩表諸墓道以告其後之人而亦豈獨其後之人之當知哉工部屯田主事郭君墓表君姓郭氏諱原琳字貢仲郭氏萬安下驛里名家其先居泰和城西後徙龍泉之金田至繼之徙下驛又至如村晴川昭明貢仲之曾大父大父父也昭明敦厚有行洪武中禮部侍郎張衡薦其材於朝徴至援例得歸娶泰和陳氏生二子貢仲其仲也體貌魁偉而淳厚坦亮外和内莊喜愠不見辭色未嘗舉口及人過失盖望而知爲厚重君子也孝友行于家忠信徴於鄉從永豐唐斐先生受詩經爲太學生居無幾告歸養親後十餘年終親喪復還太學遂擢工部屯田清吏司主事居官不嚴而肅莅事以勤待下以恕凡所董治事必先集冬官卿及其貳咸禮重之下之人皆樂爲之用不肯欺之三載考最奉命徴薪炭山東時山東嵗屢歉貢仲一意綏撫未嘗督責之民更感激趍事是時奉命徴物山東不下百餘人而以清謹寛厚稱裁三四人貢仲其一也永樂壬寅六月廿三日以疾卒扵長山縣官爲歛殯之而發視其裝無所有唯所齎公牘及遺訓其子之書而已享年五十有六娶張氏子男三楫矩淵女一嫁羅仲鈞孫男女各四楫淵以其卒之明年走長山啟殯歸葬於鄉而楫來北京以翰林脩譔曽鶴齡所述事狀求余文表墓嗚呼貢仲吾姑夫陳白石先生女兄之子總角讀書依舅氏徃還與余好也既長暌隔不相見殆三十年始再㑹扵南京貢仲爲人簡澹未甞一渉跡達官之門雖同鄉郡識之者無幾人而閒暇輙過余或留止宿譚論以樂不厭也來北京僅一見而有山東之别夫孰計其遂永訣耶貢仲之賢且材無所施不宜又孰計其竟止扵此耶抑造物者之意與民之所欲惡異耶不然何奪吾貢仲之遽也吾因之又有感焉萬安之賢而材如張衡之清峻彭與明之亷慎郭士道之剛介其達也皆有以及人雖衡仕至少宗伯與明至大理丞士道至京尹皆達矣而皆不久而遂卒吾與貢仲語盖未嘗不共嗟咨悼惜之而致疑扵造物者夫孰計貢仲又奄然遽已耶則余於貢仲之沒不能忘情此三人者亦貢仲之意也歐陽允賢墓表允賢諱賢歐陽氏也仕至南京國子助教永樂壬寅十一月初三日卒扵官其世家吉安泰和邑西蜀江里其先與文忠公同出吉州刺史琮其曾大父孚先大父以定父觀瀾允賢洪武庚午以書經中江西鄉試明年㑹試中教官選授嚴州府學教授居無幾丁内囏服闋改興化府學教授永樂元年陞國子助教其爲敎授嚴條約以勵諸生一時學校之爲師弟子者率棄本無實而記録舊文以資進取徼幸得之而既懵扵學術徃徃不見重扵世允賢恒旦暮衣冠坐講堂中取四書經傳為諸生解析反覆使逹扵本原然後以其所得發爲文辭而爲定其可否在太學亦然允賢兼通詩春秋論說之際諸生非其講下者皆樂就而聼焉有疑未通者皆徃質問允賢亦樂爲之傾寫盖自祭酒司業以下咸禮重之而祭酒胡公遣子從之學太學生之始至者素已聞歐陽先生亦多願從之助教九年考最考最復職者皆援例自陳得陞衆謂允賢盍自陳曰吾嘗戒學者宜安命乃今自蹈耶卒不自陳扵家有孝弟之行爲人坦夷直諒遇事是是非非亦喜為人解紛排難文章取逹意而止嘗曰刻深藻繪非吾所長亦非吾所願也邂逅朋儕知已相適竟日忘返而講論道徳之餘其志未嘗不在生民憂深思逺之意每溢出言表盖聞者鮮不迂闊視之嗚呼豈其然哉允賢徳足以惠民量足以客物明足以燭幾公足以爲政盖無施而不可惜乎其一教官而止也雖承允賢之教者扵爲邑為郡為藩不少矣考夫足以發其道而惬其志者固少也嗚呼允賢可以易得哉允賢卒時其父春秋九十有二康健無恙也而允賢僅五十有五而止其命也夫其配贑州府學訓導劉一清先生之女子男六􅜐哲莆澗洧淳莆先卒女二長嫁蕭九徳次嫁康頮哲頮皆永樂十九年進士孫男三允賢之葬也翰林侍讀王君直銘之矣其弟監察御史和在京師求余表其墓余交允賢尤久知之尤深其沒也尤悲之故最其行與志之大者使歸刻焉故國子博士王君墓表北京國子監博士王復原字子復洪熙元年九月某日卒扵官既歸塟其鄉吉泰和灉江里其子韶勤復走北京詣余拜且泣曰先子之藏也侍讀學士王先生爲銘掩諸幽矣不肖孤竊念世盖有生不霑一命行不加庸衆人率得名望貴人表揚扵不朽者先生不肯尋常苟有論述而先子亦嘗以經術用扵時列於朝矣表墓之文非先生其奚屬敢布其哀懇余曰嗟乎子復吾友也其沒也吾哭之慟宜其子之扵我乎屬也王氏家泰和之西鄙世業書詩爲儒師自其祖父以上皆不仕父志徳積善蚤喪子復雖少不以孤窘而怠扵學晨夕寒暑自䇿勵稍長聞同郡謝子方先生深扵易裹糧從之謝講下生率常百數十軰而馳騖文辭進取之習得其支葉者爲多若用志沈潜必探求本根者僅十數軰子復其一也子復是時已日有負挾出圭角謝先生亦竒視之洪武丙子選江西鄉試第七後四年㑹試禮部選教官第一授廣東化州學正時嶺以南郡縣學比比乏師子復盡心其職化州之學者始有所興起而浸漬及其旁近縣學亦多九載用績最超陞北京國子監博士更鏟削鋒銳爲和易又九載以最陞七品禄仍博士職預脩五經性理大全諸書書成受厚賜及脩太宗文皇帝實録詔簡有才識通史學者舘閣儗子復未奏而子復得風疾遽不起子復爲人儉約真率無崖㟁嗜爲文章在監學十餘年求文者日接踵戸外未嘗有厭倦意所著文集若干巻藏于家享年若干二子即韶勤皆有志于學嗚呼王氏扵余還徃之厚者子復及其弟敬先敬先爲人率直闓爽惇義薄利前三年敬先沒于蜀余毎與子復追憶之而悲豈謂扵今又悲子復也則余之爲此文也友道之感何獨子復哉何獨子復哉贈徴仕郎户科給事中夏君墓表錢唐有處士曰夏仲寔沒十年矣宣德三年以子時貴贈徴仕郎户科給事中時奉前詹事府少詹事鄒濟所爲仲寔葬銘因中書舍人許鳴鶴求表其墓仲寔諱忠本王氏子所生父士祖母夏氏生三男子其仲仲實也外祖某舅某皆無後父母命仲實爲舅後承外家之祀遂氏夏云有孝友之行少時所生父母病聞人言刲股食之可愈每刲股煑液進之父母沒皆哀毁治喪祭盡誠斥去一切浮靡無益之費處兄弟恭愛待族人有恩或導之復王氏者嘅然歎曰豈非篤我乎禮哉顧先考妣治命敢背棄乎王氏宗子在而先妣之父母與兄莫爲主祀者矣我夏出也彼其有靈庻幾尚扵我乎感通而忍委去之乎乃已仲寔淳厚簡静樂儉素治家能肅恒勤事以率下交朋友信處鄉䣊謙遜怡然犯而不校力施濟以守善自名晚喜老聃氏書終日玩誦不厭盖年五十有五而卒其卒以永樂十七年十一月三十日娶陳氏封太孺人子男四長即時舉進士爲户科給事中温厚端慎爲縉紳所重次敏次遜次觀女三孫男三女四嗚呼世之騁智巧角聲利奔走馳騖惟日不足欲爲無窮不朽之圖卒之一旦與草木同泯滅不能有毫髪可以飭躬而裕後者多矣若仲實非有踔絶之志能邁倫之材勇謹謹焉蹈善務義以終其身生有令稱沒有餘慶其相去遼逺不待明者可知然所趨率在彼而不在此何耶如所趨率仲實亦奚必明法律張吏治而後可以興理耶故爲表之以勸樵雪居士墓表江隂縣學教諭陳孟旦來北京以其姻家子王熊所狀乃祖樵雪居士世出事行求表其墓余覽之而歎曰嗚呼此吾故人也其平生風流文采雋爽闊逹楚楚出軰行今可復得哉王氏家泰和邑東一舍外梅岡之麓其先長沙人南唐時有爲法曹扵吉州者留居廬陵甲村數世徙梅岡至諱某號約齋者兄弟皆有科名扵宋約齋與文丞相家有萬丈樓蓋庋丞相之書云又四世至道濟博學工詩賦不慕聞逹日與賢士大夫㳺翛然出塵之韻也娶曾氏生四男子其季樵雪也諱環字伯彰㓜勤問學既壮有志用世已而歎曰柰何違吾親之養而騖乎外哉其事親孝處兄弟敬愛從兄子朋清尚絶俗至老恭愛尤䔍一味之甘必共扵宗族育孤塟貧靡不盡心扵鄉䣊周急濟乏雖數不厭嘗歲旱里人羣禱久弗應慨然曰文具能感通耶更三日不雨禾盡死民則何望即自齋潔致誠露禱翊日大雨霑足晚益恬扵隱而嫉流俗之汙也自號樵雪居士縉紳儒生有過邑東鄙而不之樵雪者率自意欿然而樵雪所交㳺皆時聞人樵雪卒扵永樂癸卯二月廿四日享年六十有九娶羅氏清湖名族有賢行子男二長三綱先卒次三紀孫男七熊其長也曽孫男女各二樵雪之塟以卒之歲某月日樵雪雖老書冊不釋手尤喜為詩歌自娛嘗一至南京莫夜過余時梁用之陳孟潔聞之皆來㑹四人者相見不復作寒温間闊語輙論詩相傾寫酒酣放爲嘲謔夜漏盡二十刻未已終不片語及世事天未明樵雪不辭啟戸徑去嗚呼孰謂遂此為永别耶樵雪不可復得而孟潔用之皆已去世顧獨余在雖未死亦何有裨當世耶孟潔用之墓皆余銘之樵雪之墓余能已扵言耶陳廷傑墓表莆田陳廷傑儒君子也唐㑹稽王揆其所自出也宋吏部尚書仁璧其五世祖也龍門居士諱某蓮塘居士諱某其曾祖祖也元以書經舉鄉貢號梅岩諱某其考也林氏有淑行其妣也賢其諱廷傑其字安順翁其晚年别字也色莊而氣和内仁而外方居心不欺致鄉有古道之號者其爲人也年十三聞其父艱危徒歩裹糧走數百里從之僃歴險阻卒奉父以歸父母殁時家甚貧能排衆人茍且之議而極力致喪葬之具扵堅久至老死孝思不少衰者其誠于子職也爲學官率五鼓興衣冠坐師席講授竟日不倦夕乃息廟學圮壞必倡率繕完兩考鄉試必致其公召修永樂大典考閲讐校必究心暨老且病必致恭朝謁不廢者其誠扵臣職也慟兄觀持亷謹爲陜西叅政卒而官責其家償帑錢數萬緡遂罄其室奩具代償以免兄之妻子扵窮阨恤宗姻孤者為之育訓貧者為之嫁娶爲之喪塟者其徳之施扵内也守令有所咨政必輔諸厚鄉有顧掾者客于京師雅相慕而未始相識顧一旦疾急屬左右必請見至則顧己不能言惟數目床間囊意若有屬者為探囊得白金五十兩語顧曰爲悉致若子顧即暝目後召其子歸之子拜奉三之一爲謝不受南康邂逅嶺外人自京師還以病爲同舟者所棄舁歸舍予飲食醫藥戒家人謹視之且移文其家不報竟死又爲治歛塟者其徳之施扵外也早從鄉先生治春秋明聖人筆削之㫖歴究聖賢之書而力拒老佛者其學也扵論著尚古賦詠尚選而家有困學箴抱拙稾聨芳集者其文也諭學者必務孝弟忠信真知實踐而講析必暢理者其所施教也結廬西山岩瀑之間以耕以學而時乗黄犢讀書消揺岡原之上者其初所栖隱也由莆田邑學訓導爲清河湖口南康三邑敎諭者其後所歴官也洪熈乙巳季春之朔北京文明門之旅次其卒之歳月日及處也七十有三其享年也方氏其配淮其子也淮所營某鄉某原其藏也士行修諸身施諸人無怍扵先民可質扵鬼神者其藏宜有表也循淮之請而述行以求表者其門生前章貢守張珂也東阿縣儒學訓導黄先生墓表東阿縣儒學訓導黄先生諱珏字某别字憺翁其先自江夏徙南康之都昌宋隆興進士諱灝從朱文公受道學國史有傳者其七世祖也元盛時與虞文靖范文白㳺諱石者其曾祖也祖諱慥錢唐縣學教諭父諱某南安道源書院山長母葉氏白鹿書院山長青叟之孫先生生扵元季兵亂之際稍長而端重喜學時舉家竄匿巖谷中山長公愛之取瓦石書孝經論語授之手捧瓦石誦不輟口十餘歲益有志而家貧然松明以繼晝盛寒衣薄則擁衾危坐率過夜分乃寐金華朱恱道通濓洛性命之學而徳行淳篤爲星子知縣先生從之㳺甚見許與傾底裏以授之朱官滿而遷裹糧徃從卒業洪武乙丑縣令承聘爲學訓導躬勤以率諸生而優柔化𨗳諸生翕然起而從之後多成名以去益廣學舍加于舊䂓丁内囏服闋改上海縣學訓𨗳尋丁外囏服闋陞南陵縣學教諭無幾調安東縣學徴脩永樂大典被㫖試文章先生第一蓋將用之而以老疾辭大典成受賜賚復還安東其纂修居京師六年而安東之學者科舉不及數考滿循例降訓𨗳吏部侍郎師公審察一時教官學行無踰先生者遂奏授東阿東阿師公鄉邑也明年陜西布政司聘考鄉試又二年卒扵東阿永樂壬寅八月二十五日也春秋六十有六娶髙氏子男二森磊女一淛江布政司叅政熊本誠其壻也孫男二女一先生天資淳篤既傳其家學又得良師躬勤而弗懈扵經史百氏皆究極㫖歸尤用志理學而務實踐其事親孝親喪三年不飲酒食肉服除而哀不衰友愛諸弟與人交久而敬犯而不校其儀貌儼雅而温厚坦然端静有容望而知爲有徳者也恒語其學者曰昔文公先生謂我先人此心要日與義理相親吾未嘗斯湏敢忘也泊扵嗜欲布衣蔬食終身不渝惟好學之志自㓜壯至老死如一日所著有鍾陵槀廬南集江海遺編在公志素行日紀其歸塟也祭酒胡公爲之銘曰不愧郭有道者吾友余正安尤知先生間以所述事狀及其子森來拜請表于墓而刑部侍郎張公亦告士竒曰吾東阿黄訓導文行扵今誠不多見宜必得子之文士竒與先生徃還十餘年其始識之翰林是時天下老師碩儒皆以纂修召至而先生表然衆人之中前年從南京入朝行道所經數千里所得府州縣學其師道之可稱者先生一人焉耳恒竊自嘆師道立則善人多安得天下之爲師者人人皆黄先生也則扵表之誠宜而不復以辭贈奉直大夫禮部祠祭員外郎易君墓表易之先宜春人至宋禮部尚書祓徙潭州尚書孫遜卿爲筠州録事又徙上髙録事孫興國司户仁則又徙萬載君之髙祖也曾祖理祖俊父谷珍母彭氏三子長泰亨次震亨君其季也諱復亨字子謙自㓜明爽頴悟未齓已知趍學日記誦過人長而益勤博渉羣書喜爲詩駸駸有造詣矣遭元季兵亂闔門竄匿深僻兄弟時出負米歸養倉猝道遇冦冦共目子謙儀貌而聆其論議知非常人衆强擁之去拜之曰吾儕迫扵世難不得已圖自全而爲此也願屈公爲主謀䇿吾將惟公言是聽公毋爲辱焉子謙力謝不能不聽既不可脫則曉之曰丈夫舉事當力用仁義救民水火庶㡬可以得人心如不務此而一志厲民禍敗隨之矣非自善之道也衆皆唯唯遂爲所脅由茶陵至安福子謙睹其所爲無非剽敓雖有言百不一聽一夕脫身獨走從間道去國朝平定宇内其父已歿乃與二兄奉母歸鄉里而家業盡廢毁兄弟辛勤拮据治田廬漸復于舊伯兄舉茂才仲兄辟江西行省掾後皆坐累謫死子謙獨留奉母而教育兄之遺孤男女七人皆成立爲畢婚嫁家日益裕築别業邑東塢溪之上有園林之勝名其奉親之堂曰夀蘐而躬勤孝養作書舍其側市書數千巻其中爲教子之資而自號塢溪樵者蓋將終身焉洪武中有司舉子謙孝亷以親老固辭母春秋九十餘尚康健無恙忽得疾子謙晝夜侍湯藥不去側夜屢焚香籲天祈母安母卒哀毁而居喪秉禮子謙爲人恭愼重厚能輟有餘賑不給凡扵濟民利物事亦皆盡心邑歲舉鄉飲必賔禮之歿扵永樂乙酉五月十三日享年六十有四塟徐山之原娶小圃龍氏益清之子性行慈淑族姻儀之後十有二年四月初十日卒享年如其夫祔塟夫墓之右子男三鑑鐔節女二長嫁辛軾次嫁陰陽訓術龍和孫男四女六節永樂乙未進士授行人陞禮部祠祭員外郎宣德七年䝉恩贈其父奉直大夫禮部祠祭清吏司員外郎其母宜人扵是節奉事狀求文表墓節自登第扵余徃還其爲人温温淳實交久而敬不衰盖觀節可知其父况其父之存諸心見諸言行彰著若此者乎是宜表也蕭坦行甫墓表靖江府右長史蕭用道坦行甫既得痺疾奏乞歸鄉里便醫藥忤㫖降宣府鷂兒嶺巡檢至宣府疾日益明年七月十四日卒扵官永樂壬辰歲也先在靖江時自度疾不可起預爲墓志迨易簀之前二日取酒觴同官訣别又預作祭文自道其平生而寓夫全歸無遺憾之意其可爲逹也矣既歸塟于鄉後廿有三年其子晅來求表墓蕭楊世婚姻家士竒與坦行甫兄弟在鄉里相交好在京師同館舍今之知坦行甫者獨士竒深比五六年士竒兩扈從巡邉至宣府經鷂兒嶺下馬入巡檢司顧眎其山川景物黯然蕭條莾蒼而追思坦行甫平昔志意未甞不低佪感惻而繼之以涕淚也則表墓士竒何辭蕭氏出南齊西昌侯叔誄之裔世家西昌邑西栁溪之上其七世祖森宋衡山縣丞髙祖古山曾祖静安祖方平皆通儒隐居終身父尚仁學者稱正固先生尊爲經師嘗徴至京太祖髙皇帝與語重之特授潭府長史固辭除平涼府學訓導徙居邑北之栗園里元配楊氏士竒從姑也繼羅氏生坦行甫初諱遵字用道後以字行遂别字坦行云自少英特不凡負竒氣讀書日數千言治尚書而諸經子史皆博通下筆爲文滔滔咸有根據一時同軰莫或過之正固先生沒其學者皆就坦行甫卒業後多舉進士去建文初詔郡縣舉懐才抱徳者吉安知府朱仲智舉坦行送詣京師試文章翰林擢靖江府直史授承直郎時靖江悼僖王好學得坦行雅敬重之所言多見聽用召入翰林脩類要太宗文皇帝靖内難之師已渡淮在廷公卿倉惶失措坦行甫與衡府紀善周是脩上書論大計指斥用事者誤國書下廷臣及兩人議用事者怒盛氣以詬兩人兩人屹不爲動左副都御史練安言國事至此尚不容言者乎顧所論吾過有即改無則加勉詬者愧而止文皇帝既嗣天位命翰林及王府儒臣考閱洪武實録坦行甫與焉事竟賜鈔時詔百司復舊制罷直史司爲諮議所改坦行諮議無幾陞諮議所爲長史司遂陞右長史授奉議大夫永樂元年從王之國桂林初至凡國中祭祀所需下有司備其後凡祭祀之需府寮屬皆勸王下有司備坦行曰初至倉猝不能自備可一行之不可以再且祀神在致吾誠使人代偹物非誠况未請扵朝而擅使民非制乃止後坦行進表詣京師王府竟下有司偹祭物事聞長史以下皆得罪王始悔不用坦行言坦行數言扵王宜務善納言以厚徳奉法愛人以保福又啟陳八事曰愼起居寡嗜慾勤學問養徳性簡鞭朴之刑無侵下人之利常接府僚以通羣情簡擇謹厚之人以備差遣又作端禮體仁遵義廣智四門箴以進王問四門之名遺信何也對曰五常之信猶五行之土實有仁義禮智之徳即信在其中王又問古今人多好名何也其意以譏坦行之屢有言對曰君子必不好名名與寔譬諸影與形有形斯有影有實斯名隨之矣河間東平皆有實德故其令名在世與日月同一悠久惟殿下勉夫在已之實耳凡扵進講之際必反覆敷暢其㫖坦行負直氣侃侃能面折人過失未甞稍屈已求合一語不合掉臂去不顧而嫉脂韋軟媚人耻與同列事親孝以禄不逮養在公遇盛宴饌未甞醉飽扵族姻有恩扵朋友有信義性澹素一繡衣入朝則服公退布袍蔬食不改處士時爲政逹扵大體所著詩文數十巻藏扵家春秋五十有五娶康氏繼彭氏子男六望朏旰晅晦昊晅宣徳二年進士吏部文選主事女四其壻嚴頎龍粲楊鵷羅溶粲禮部祠祭主事孫男若干世之仕者巽愞不振乆矣盖士以氣爲主而以理充之則無徃不直考坦行甫躬之所蹈位之所施其正直剛毅之氣可爲仁且勇哉可爲仁且勇哉東里文集巻十五
