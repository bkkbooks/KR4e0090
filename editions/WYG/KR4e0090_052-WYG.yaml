body:
  text: 東里續集巻二十四明楊士竒撰神道碑贈資善大夫太子太傅兼謹身殿大學士楊公神道碑銘洪熈元年正月朝廷推恩羣臣封贈其祖父母父母如制而始自貴近是時太子少傅工部尚書兼謹身殿大學士楊榮蒙恩贈其祖逹卿父伯成皆為資善大夫太子少傅謹身殿大學士祖母謝氏阮氏母劉氏皆為夫人尚書將樹碑其祖之墓而命其子恭來謁文刻石士竒與尚書公同宗且同官二十餘年知契甚厚嘗銘其祖之藏矣今公圖昭寵命於無窮也故不得以複出辭乃序而為銘楊氏系出關西唐末有仕閩者留家浦城自是子孫居止必依先墓後析居建陽崇安之後益盛遂以氏名所居鄉至諱萬大遇黄冠師指示塟親處曰塟此後必貴顯如所言塟之而號其地曰楊墩又徙建安之龍津里數世至文德文德生伯遜咸務善施義伯遜四子長即逹卿諱福興逹卿其字生而秀頴異常兒稍長渉書史明古今通大義一志為善家故饒貲樂施濟宗族貧不能自給皆給之病為共醫藥喪為備歛塟塟而薦祭之皆以禮有遺孤男女取而教育之長則為之婚嫁推而行諸閭里鄉黨亦厚里人有盜發其先墓者訴於有司吏納盜賕事尼不行公力言於當道卒治盜罪自是環其鄉無盜發墓者有貧不得已為盜者公雖知未嘗言恒賙之而教之治生夜有盜踰垣入公室家人覺之盜驚走而急不得踰垣公啓戸鑰出之有李必延者貸閭右錢貧久不償索貸者急計無出將鬻妻以償有以告公即如所貸代償之李夫婦得完然益窘自給遂依公時元季四方兵亂充斥一旦李辭去後二歲有冦攻圍建寧城且四出刼掠有稱總管者詣公門謁拜且謝舊恩則必延也邀公挈家人與俱去曰不去兵且至生死不可測公曰今不幸共罹世難惟能生人可以動神明致福澤利後嗣子誠有志生人所處地顧不易施耶且生吾一家孰若生吾一郡以及吾宗族鄉黨之為博哉况兵勝負未可逆計今城中守備固敢勇士非少有如奮挺一出以决寧獨若等之利耶必延叩首曰公福德人必延不敢違教請言之吾帥遂辭出明日寇解城下圍及召四出刼掠者悉去時行省左丞阮德柔分治建寧聞公名禮致于家問公素所行對曰治稼穡共庶民之職而已德柔曰卿大夫與庶人道均宜有助益我者對曰不敢夫庶人者保其身卿大夫保其民惟君侯念之德柔嘆曰言簡而理至益加敬禮命諸子旦夕侍公公從容導以持謙約去驕溢保貴富之道其子化焉他日言於德柔曰今賦役煩苛連城困弊而逢掖之士鰥寡之民尤可矜惻德柔遽下令減罷時行省承制得除官德柔强公仕力辭乃止自是歸歛迹不出家雖家居於濟物益勤置二機舂於鄉廪儲所得直歲歉發以賑貧嘗大饑出粟募民樹木於山計所樹多寡給粟民喜得粟争趨事數歲木盛茂中材民之貧無居室沒無塟具津渉闕舟梁及為學宫為釋老之宫者咸給之又指山木戒子孫世率行之母以給私用鄉有津渡舟人必得錢乃濟無錢至有厲渉溺死者公歲計傭直予舟人戒勿取行道一錢往來頼焉里俗重巫故業醫者鮮公命少子伯安從學良醫師傳其精要而家廣蓄善藥㑹大疫里病者相連属公命伯安户與藥病悉起巫無所施技焉鄉耕牛病於疫公遣人賫貲走傍縣多市牛以給貧者適秋大稔貧者悉獲耕利其及人如此平居一物之微不忍傷之近居有澗産魚鰕甚富水深多石漁者不可罟取則投毒草殺而取之公閔焉渡澗所産凖直與漁者而戒勿殺童子有探雀卵為嬉戱者必與錢贖之而復其故處耕民春至焚山林糞田疇公念長育之月傷生意每預為酒食㑹鄉䣊戒止之即不率有罰至于今鄉人遵承不違其於及物又如此自奉澹素無所外慕燕私不忘自檢嘗掲范益謙座右銘於所居朝夕覽省作㑹宗堂歲時祀先禮畢聚族宴飲其中長少以序恩義咸備處鄉黨恂恂無智愚老稚咸得其心其或有競争不平公一言折𠂻之皆帖帖禮致師儒教子孫而躬勵於内國朝初定天下知治運將復曰吾子孫必有仕者日以忠孝訓飭之曰非是不足致逺大又曰茍得志毋忽宗族屢舉范文正公義田事曰此賢人君子所為重祖宗者也其平生一言一行率皆仁人長者其容儀魁梧偉然年踰七十頳顔白髮康徤和豫幅巾雲林泉石之間蕭散自得鄉之人不名字之號曰壽翁沒於洪武戊午十一月二十三日春秋七十有四其塟在邑東光禄坊白鸐山之麓初配謝繼阮皆有賢德子男五伯正伯祥伯起伯成伯安女三長適李次適范次適劉孫男廿有四曾孫男若干其子孫之仕者伯祥留守衛知事榮起家進士以文學才行受知三聖自翰林編脩十轉陞太子少傅工部尚書謹身殿大學士賛宥宻者今二十有六年任託之專寵待之隆愈久愈盛為天下之所歆豔仰望盖曠世希有也禮吏部稽勲清吏司主事純掲陽縣丞其未仕者好學務善尚多嗚呼公之所以遺後天之所以報公可為厚矣銘曰㴑楊攸初肇于華隂厯漢沿唐聿徙來南閩之昉來自阡億仕有家浦城式繁孫子既繁以析崇安建陽居環于墓氏專其鄉懿萬大甫貞居澹㳺武夷之陽與仙者逑謂萬大甫汝存孔良畀汝吉塋來世莫京欝欝楊墩龍津再徙翹翹華英禆續振起累葉載德逮于壽翁壽翁志仁恵被鰥痌萬物同體施愛由邇始篤于家爰及州里相彼鞠窮而我康居我獨何心而罔惻慈肖形兩間孰非吾與有其戕之寧不予憷興言赴之勤夕與朝圖寧予心遑知瘁勞持恒弗已德善累積譬諸菑畬播種必穫際代清明乃壽考終敷遺後昆作其龎鴻傳子暨孫再世逾大振振詞華熈帝之載事皇祖考祗于始終謀猷有資禄位式崇迨今聖明曰汝予輔汝予股肱汝予心膂君臣之孚魚水之契聲光四海遭逢千歲即流考源有開必先寵褒崇秩天章煥焉惟仁有後惟善有慶德人斯藏來者是敬永寧衛指揮僉事追封隆平侯張公神道碑銘太宗皇帝既起兵於北平諸王大臣共推戴上正大統主宰天下遂大封功臣賜之鐵劵傳爵子孫推恩祖考於時臨淮張公信自北平都指揮僉事先㡬效誠特見信用車駕所嚮出督諸將入議帷幄咸侍左右遂以功封隆平侯暨上巡狩北京命公輔仁宗皇帝監國仁廟嗣統加公少師公春秋八十有餘念朝廷之寵恩考妣之德善皆當永示後之人俾勿忘於是属士竒書之神道麗牲之石士竒與公同朝三十有餘年又嘗同輔監國誼不得辭遂摭公所狀世出事行敘而銘之敘曰張氏世家鳳陽之臨淮宋季有仕為都統領諱宗逺者公髙祖也曾祖諱禮正祖諱彬善考永寧衛指揮僉事諱興三代皆以公貴封隆平侯曾祖妣夏祖妣朱皆追封隆平侯夫人母詹封隆平侯太夫人永寧公字彦文性剛毅力超乘蚤喪怙恃已頟頟卓立鄉人有貧乏者率推其餘濟之而負大志不為小㢘曲謹以要時譽丁元季之亂嘗曰丈夫當康屯濟人以建功名寧能𤨏𤨏乾沒畎畝間哉㑹太祖皇帝龍興徒歩歸附遂從渡江授廣陵翼元帥從攻徽婺等州生擒偽萬戸張十一偽鎮撫李勝等盡得其衆時更定官制改錢唐衛管軍正千戸階武德將軍自是征伐咸與從行其所受制詞有云弱冠從軍氣剛力壯爰佐上將撫定徽郡克取星源耀兵武林長驅於越及苗獠背德叛臣貳邊又能固守諸暨力援東陽比大舉平江浙臨安欵附姑蘇削平繼有温台閩海之師皆與有功盖具録其勣後從大將軍北征至開平克應昌馬邑既而獨遇元將布哈平章軍其衆且盛所率僅千五百人與之鏖戰薄暮未决明旦復戰遂敗布哈軍斬首百餘級獲其駝馬輜重主將上其功特賜金繒陞濠梁衛指揮僉事階明威將軍居無㡬調永寧衛以威信服强獷以寛惠撫士卒以紀律肅部伍持躬㢘正蒞事勤慎威懷並著焉洪武壬戌十一月六日沒於官享年五十初塟臨淮其配太夫人詹氏諱慎因元贈禮部尚書上輕車都尉追封河間郡侯諱某之孫贈叅知政事䕶軍追封河間郡公諱旺之子静專誠一克相克訓以儀閨閫永樂甲午五月十三日沒於南京享年七十有八得吉卜於江寧縣英山之原少師公遂啓其考之藏合太夫人塟焉子男三長即少師公自普定衛指揮僉事積功至奉天靖難推誠宣力武臣特進榮禄大夫柱國少師隆平侯次毅都指揮僉事守定州次闕江隂衛指揮僉事毅忠俱先卒女二長適程寳次適祝惟學孫男十四鏞大興左衛指揮僉事鏜江隂衛指揮僉事鉦銘鋋鍴􅀈鉉鑑鑌鋼鏻鏞鈺鉦鋋俱先卒女九長適平越衛千戸劉勝次適都指揮僉事呉浩次適都指揮僉事馮楷次適前軍都督僉事李得次適指揮僉事柴昶次適錦衣衛指揮僉事徐景璜次適王普次適指揮僉事繆義次適指揮僉事朱榮曾孫男六淳大興左衛指揮僉事湧泰虎長生仙童女八長適通州守衛千戸陳瑄次適指揮僉事楊勇次適指揮僉事李山次適指揮僉事王忠次適劉某其三尚幼𤣥孫男二福祐女三銘曰天啓皇明龍興于淮魁勇傑智如雲偕來桓桓張公孔材且武徒歩來歸始屬麾下攄厥謀猷遂見簡知以弔以伐靡行弗隨鐵馬金戈蹂呉蹸粤南土率靖長驅北伐以寡遘多益奮而彊斬馘生縶厥功用彰寵章煌煌進秩崇祿何惠弗懷何威弗服肅肅紀律巗巗操持相古名帥奚以加兹厥行實繁未稱者報報弗逮躬有赫在後殫勞竭誠起輔中興玉帶金貂顒昻在廷功載天府澤被來裔泝嘉本源寵光三世伉儷合藏麗牲有碑發潜幽光太史有辭贈驃騎將軍左軍都督府都督僉事王公神道碑銘宣德十年加贈左軍都督府都督僉事王瑜之祖彦逹考銘皆驃騎將軍左軍都督僉事祖妣黄妣成皆夫人封其繼母茹太夫人於是瑜求余文勒碑其考之墓用昭上恩於永逺按王氏初出太原宋諱源者為滄州學官因家焉其子曰福綿自滄徙泗州娶房氏一子即逹又徙山陽三子銘其仲也字銘甫洪武初從征伐以功長五十夫暨老而瑜代之瑜謂余曰先考天性質實尚德務仁蹈履率正而篤於教子恒言忠孝人道之大端人而昧此不可以立於天地之間瑜不敢違惰瑜非承藉先公之德不有今日幸執事之惠畀之也余與瑜同朝久盖素知之始瑜既代父選𨽻趙簡王䕶衛時留京師一日其䕶衛指揮孟賢等十數輩潜結造邪謀簒奪布置巳定簡王實不聞也瑜親戚有與謀者瑜竊聞之力諫止不聽遂奏發之詔捕賢等悉獲之得其偽詔書及邪謀本末賢等皆伏誅陞瑜遼海衛正千戸遂進錦衣衛指揮同知推恩二代贈其祖若考皆懷逺將軍指揮同知祖妣妣皆淑人封其繼母太淑人後陞瑜都指揮僉事署左軍都督僉事佩漕運印充左副總兵董江南饟運其遇事勤敏持操㢘潔秋毫無取於下夙夜顓顓志在奉國遂實授都督僉事瑜之能子要之本於銘甫之能父也自瑜效忠十餘年致位二品膺受重寄榮及祖考天之所以報施厚矣凡人之善患無諸已誠有之天道未嘗爽其報也銘甫之顯庸雖不在其躬而必在其子榮命雖不見諸生前而必徵於身後天之道豈不信哉銘甫四子長琳次琮次瑜次瑄八孫堂堅璽賢真頔顯賔銘甫生元至正辛丑五月十日沒於永樂壬寅十二月八日春秋六十有二塟海州城北沙村之原銘曰南山之植根本深厚挺發為材凌切雲表宜柱宜梁廟堂之需宜艦宜舟濟海與湖王氏之宗善仁代有有沿襲焉厯祖暨考篤鍾于嗣秉志桓桓維忠維誠以事大君發擿兇憝爰清氛曀帝錫寵嘉曰旌汝義崇秩豐禄式賁厥躬泝厥祖考申顯褒封厥考維良允蹈于德教成于家致時赫奕巋焉佳城其藏在此春秋來拜振振孫子封榮禄大夫少保戸部尚書兼武英殿大學士黄公神道碑銘黄嬴姓顓頊之後以國為氏勳業文行代有聞者永嘉之黄自宋御史檢法衮以科第起家令緒有傳世篤儒業檢法孫􅁱職郎諱適道生元明正書院山長諱南一山長生松陽縣學教諭諱應發教諭生諱通娶屠氏生公諱性字思恭自幼頴悟不凡蚤喪父祖母劉躬自撫育遣從學明師時已卓然有立志讀書必尋究大義十五鄉老長試所業命賦新竹大見賞異而操行清潔元季兵亂方國珍竊據温台署官属蟻附之徒率勢燄赫赫動閭里或勸公仕正色叱之遂裹足不出属歲大侵家益落躬儉約以率下而養親必豐國家既定宇内家始復振推其餘以濟親戚鄉黨者率視為分内事内弟王時中孤窶依公公資遣之學後升太學生公皆輟已資之時中既授官坐事當沒其家有司以同籍併沒公家公叩有司求得先祠神主及先世傳文以付其親戚曰保藏之如黄氏先德未泯吾當還則此不可失也而求檢法所受告身或言燬矣大慟㡬絶既至京白其情於朝得釋歸而告身實未燬亦復則又大喜曰復此萬金不足重也公於學自幼至老不倦閒居潜心載籍喜為詩不事雕琢務以理勝遇名人制作有㑹意者手自抄錄晚亦喜譚道學嘗書邵子安樂窩吟置齋壁時諷詠以自適永樂十年以子淮貴封奉政大夫右春坊大學士時淮侍仁宗皇帝監國屢問公安否嘗賜瓊玉膏一噐洪熈初進封榮禄大夫少保戸部尚書兼武英殿大學士淮奏請分少保祿給於鄉以供養從之天下聞而榮豔焉於是公年以九十須髮半白而齒落復生雖重聽而目益明歩履强徤前二十年嘗預作壽藏是旦甘露降其前之松柏識者以為公之壽徵至是而驗公雖貴益惇謙謹雖五尺童子接之以禮温裕有容犯未嘗校隣惡少嘗侵公蔬地公弗校而侵不止有譏公愞者公若罔聞惡少後侵官地有司將治之而詢諸其隣之老公為䟽其實而薄其罪人皆服公之量公已進封一品其友之子有官于朝而秩卑者過家焚黄數於㑹而位公上里人交誚之而公怡然不一毫在意閩陳興祖清尚士也與公厚善客死永嘉公歛塟之盡禮而繪像時展對焉其交篤誼類此性簡澹無他嗜好所畜惟經籍法書名畫及古噐物有就鬻者倒囊不靳不嗜酒而喜賔客有過者必傾寫盡懽淮謝病歸日侍甘㫖公益樂時擕賔客載小舟嬉遊山水之間翛然物表也所作詩文有静菴集八巻藏于家一日得疾手書數事付淮大要以報君上為重遺命喪塟循朱氏禮而屏斥浮屠老子法語訖而逝宣德六年十一月五日也享年九十有三訃聞上遣官賜祭命有司治塟廷臣自師傅六卿以下皆致祭配王氏里儒家貞淑秉禮既歸黄氏蚤夜躬勤女事佐裕其家凡所制財用之宜井井有條理尤謹先祀睦族姻而愛其庶出之子孫踰於已出永樂壬寅十一月十三日卒享年八十有六初封宜人後贈夫人其卒也朝廷遣官賜祭命有司營塟子二男一女長男濟庶出次即淮及女皆王夫人出淮洪武中舉進士由中書舍人累陞右春坊大學士通政使少保戸部尚書武英殿大學士立朝有侃侃之節厯事列聖皆為上所信任今以疾歸第女適王士昌士昌蚤卒無子誓守節不更嫁孫男五樂先卒棻棐采槃女三葉璣王宜嘉其婿也一未行曾孫男四旭暉珣瑜公與夫人合塟邑大羅山之原於是淮具書以前翰林檢討潘畿所述事狀使來京師求書墓道之石士竒與淮同官三十年辱公知有素不敢辭敬次第書之而系以詩曰滄海之堧清浙之東奕奕永嘉為文獻邦出者奮庸處者求志仕止之義代有聞世邦之黄氏其來逾逺當宋紹興臺幕有衮秉德執義不附權姦卒用裕後而今桓桓公其世嫡曷潜在下抱貞含和允續乃祖紛其饕詖公獨引恬紛其矜髙公獨履謙五采翽翽翺翺雲漢帝嘉所生龍光輝煥崇秩重禄玉帶朱衣雍容丘園逍遥期頥邦有壽俊平世之瑞亦有賢淑德人之配青山欝磐雙璧合藏毓祥垂祉百福其昌贈資善大夫都察院右都御史熊公神道碑銘西澗先生熊公其所學究聖賢之藴通性命之要所存必欲及諸人人所行必欲聞諸後世盖正直明慤君子人也年五十有九未嘗一試以卒非其命歟先生諱直字敬方西澗者其所居之地學者因以稱之熊氏世家豐城先生幼孤隨母適古田尹吉水胡時中遂家吉水嘗冐胡氏而後復焉自幼端重好學不懈晝誦夜思日從老師碩儒講說盖於書無不讀而四書五經周程張朱之說力探深究不暢不已既壯充然有得邑人争聘之為塾師旁邑之大夫交致書幣請為學訓導先生不忍去其親乃辭而求入吉水學充弟子貟冀得朝夕侍養其學之師不以弟子視先生反數從質所疑同門生率執所業求益而逺近之從學者益衆矣先生以為正綱常明世教者莫嚴於春秋故來學者皆受之春秋歲大比縣輙以先生薦就試輙不中後充貢入太學於是其名聞京師久矣祭酒司業以下皆重之六館諸生從之者如向之在吉水學也永樂十二年舉應天府鄉試遂為春秋之冠是時先生之子及其學者多擢髙科列要職而先生年已五十有七明年㑹試復不中每榜出士争問先生名列第㡬及知其不預而所受教者多預莫不益貴其學而嘆其命十三年歸省學者越數百里從之者益衆無㡬以疾卒于家十四年九月二十七也先生内莊外和孝友忠義出乎天性與人交盡誠閒居潜心玩㣲時出意見評古人是非為衆所服文章温雅豐贍所著有春秋提綱西澗槀鍾陵槀金陵槀又有詩賦雜錄若干篇盖自壯至老未嘗一日忘用世之心亦未嘗一動心於外之得失嗚呼士不志於古久矣古者學之必在於行然命有得焉否焉安其命而不違者君子之道也如先生者其㡬之矣卒之十有五年為宣德五年朝廷推恩廷臣賜誥命贈先生父某及先生皆資善大夫都察院右都御史母楊夫人而封先生之配郭太夫人子男四槩永樂辛卯進士監察御史陞廣西按察使改廣東入為大理寺卿進都察院右都御史有盛名於時棐槃棨皆志於學女一嫁徐彦襄孫男若干於是槩使棐來言於士竒曰先公之沒也胡文穆公銘其墓矣今承制命之榮於法得立神道之碑非先生知先公之深莫宜為文嗚呼西澗先生吾友也其何以辭乃敘而銘之銘曰士之於學以明道焉道之行歟厥有命存􅁱已俟命時曰君子曰行曰止曾何與已嗟熊先生實有諸躬志將行之屢閼不通不戚不愠其中休休賦命則然吾何有尤澤物之仁志篤弗替施不在躬式遺厥嗣嗣興桓桓遭逢聖明豸冠犀鞶白簡在廷薅莠薙稂以育嘉稷先生之志是蹈是力帝嘉所生龍光自天崇秩厚褒垂輝九原述其初終繫銘貞石雲仍繩繩敬恭無斁東里續集巻二十四
