body:
  text: 東里續集巻三十七明楊士竒撰墓誌銘刑部俞主事墓誌銘刑部主事俞得濟公廣卒其孤希俊將奉柩歸葬處州之遂昌以刑部主事周得琳所具事狀請銘公廣甞從余翰林十餘年銘不得辭俞之先居睦州宋季有仕遂昌者因家焉而自曽大父以下皆不仕父則榮母毛氏得濟其諱公廣字也幼孤長克勵於學渉獵既博矣從先生長者習詩律永樂六年詔翰林集四方儒學之士纂脩永樂大典及能書士職繕寫公廣以能書薦書成被賜賚詔就翰林益進其藝十八年擢兵科給事中勤慎詳敏克舉其職坐累出為邯鄲縣丞當要道過使客百費取給於縣者日輻輳公廣爲之有方民不困而事集尤以寛厚得民心洪熙改元召還為刑部照磨尚書給事中皆言其才陞刑部廣西清吏司主事盡心獄中無寃滯者宣徳五年有司援例奏贈其父承徳郎刑部廣西清吏司主事封其母太安人妻李安人制可命未下而公廣以疾卒是年七月十五日也享年五十有一子男二長希俊次希傑女三長者歸吳宗智餘在室孫男女各二公廣居官不為崖岸不失持守遇事不平直發之不為茍黙雖數以是召怨咎不悔其才可用且未老而遽卒惜也銘曰才與時際兮宜厥施兮奄長逝兮孰所致兮國子助教邵先生墓誌銘北京國子監助教邵先生卒其子壇均介吾友翰林檢討許子謨先生求為墓銘余數過監學重邵先生淳厚端雅盖良師範也許先生又言壇均惇於孝行有足尚者遂受事狀為叙而銘之叙曰邵世家福州之懐安先生之曽大父野雲大父復真父彦英皆隠居不仕母劉宋侍御史文濟之孫先生諱煇字時晦幼喪父母賢必欲成其學問先生亦蚤克自勵遂入邑庠受業明經師退而就其同門之賢者相講論切磋令下調閭右實京師先生家在行居京師踰年援例免歸而家益貧復入邑庠卒業永樂丙戌登進士第為翰林庶吉士預脩永樂大典勤於職務同輩服其能時寓應天府學坐家人弗戒火延燬廟學謪戍邊者十五年處患難泰然不以戚其中用薦召還除國子助教其學講貫有素其誨人盡誠學者皆樂歸之平素履行清謹重信義其友兵部郎中黄安卒於北京無强有力親戚在側先生為治歛含畢而遣子壇走數千里歸其柩及其家於閩其行槩類此在太學將九年甞賜勑命授脩職佐郎而卒於宣徳七年八月六日享年七十有二其配錢塘郭氏安道闕子生男女各二男即壇均女蚤喪其長者次嫁進士廖伯牛葬以卒之明年某月日墓在其邑某鄉某原銘曰國有成均賢士所闗必有師氏乃成衆賢正學篤行由躬率先維師其難匪今則然維時晦甫茂敦蹈履授業解惑式振厥士既夀考終而藏在此銘以昭之亦慰孝子嚴迪徳夀藏墓誌銘吾邑嚴君迪徳馳書北京謂余有生者必有死吾今年七十有五即旦夕獲全歸幸矣雖吾生甚貧然顓顓持其身不敢踰越誠懼辱吾之先人亦欲吾之子若孫皆不敢辱也已豫營一丘矣竊歎近世死者其子孫徃徃鉅資豐幣請於縉紳大夫求誌其葬縉紳大夫或未知察也甚者文跖為孔飾市儈為道徳貽世譏誚雖吾之子弱且窶不足以動時貴人亦非吾所願也子於人善率紀實如吾意然子之年加於吾矣盍及今無恙豫為誌一言亦及吾之見也余家與嚴世㛰姻迪徳於余為從表叔余仕於兩京四十年前年始一歸鄉里親交物故殆盡迪徳巋然雖老而徤能時時過我今别又三年恒徃来予懐有託其何以辭嚴故西昌文獻名家宋舘閣校勘肅稱朴山先生其五世祖也父從禮洪武中國子學正剛毅端方三子迪徳其季也名福真涉獵學問存心端厚而志行堅確内惇孝友愛兄之子如子而嚴其訓有弗率者畧而不校接人意度和裕言必當理安貧守義非其所當得一芥不取親戚交游有急赴之恐後間有挾勢来侵者迪徳絶口未甞言亦未甞一語干人以私自縣令丞及邑之賢士君子皆禮遇之布衣蔬食居常休休自得也論今西昌善士非迪徳其誰歟嗚呼前輩流風餘韻逺矣後生薄俗馳騁世利為雄長彼固不知重迪徳然率遽起遽仆忽焉如浮雲飛鳥之過目若迪徳蒼顔皓首既夀而康履貞居安自少壯至老坦坦如一日謂非人之所自致乎迪徳娶宋氏先卒子男一顯女四其一嫁國子學録梁㮚餘皆歸士族迪徳之夀及子若孫皆未可涯余既述其行之槩又銘其藏俟屬纊既刻之銘曰盈則有虧榮則有悴芒芒天壤其孰非寄陶有自輓杜有自誌超哉達人千載一致葉侍郎墓誌銘宣徳元年朝廷以蘇松常鎮嘉湖諸郡姦吏土豪肆為貪虐以毒細民久而愈甚特降璽書命大理卿胡槩㕘政葉春巡歴訪察務去惡以寧善後又益以錦衣衛指揮任啟監察御史賴瑛槩等奉命所至秉公推明行之以果無所屈撓於是暴者以仆困者以起横者以折弱者以立上之澤下流下之隠上達數郡之内氛翳廓清畎畝閭閻咸有生氣時事之裁制一董於胡然在葉之鄉邦知之素明而行之無私葉盖有助焉竣事還奏上嘉之數人者皆進官春進刑部右侍郎嵗中得風疾上命太醫視療久未瘳奏乞歸從之後竟不起八年六月十八日也春字景暘世家嘉興之海鹽其先本林氏考諱祥幼喪父母鞠於表兄葉某遂冒葉氏景暘幼警敏知學有才識洪武中舉自邑吏歴事吏部者六年永樂初禮部尚書李志剛知其通練能謹薦於朝擢主客清吏司主事階承事郎以勤敏周宻為上官所重三年陞本部郎中階奉議大夫進奉政大夫丁内艱去服闋仍舊職三考以績最陞兩淮都轉鹽運使嵗餘丁外艱服闋改福建布政司右㕘政仁廟嗣位来朝遂與廣西右布政使周幹同被璽書巡視應天鎮江蘇常湖松杭州嘉興八郡訪民利害而建革之嵗餘歸今上嗣位景暘復詣蘇常諸郡者再中改四川布政司右㕘政未行又二年而拜侍郎之命又二年而卒春秋六十有四娶吳子男三長懋次林次森女一適闕孫男七觀鼎昇璿璣玉衡其葬在邑之大易鄉平闕懋奉事狀介翰林庶吉士趙智来拜乞闕辭而不獲乃叙而銘之銘曰仕歴中外才際時和厚靖恵敦執持恭勤劼毖勵職司行於鄉邦公弗私登貳六官荷眷知六十考終樂全歸来世有考視刻辭宣郎中墓誌銘宣彦初諱嗣宗蘇之嘉定人永樂三年詔郡縣舉楷書士蘇舉彦初既至奉命從中書舎人書誥勑無幾簡從事翰林諸學士皆重之嵗餘坐累謫交阯時尚書東莱黄公總交阯布政司按察司一見彦初知其才良寘諸左右任之事深得其助益禮遇日厚交阯九年始歸復被召入翰林遂授中書舎人又簡文淵閣專書内制二十二年扈從北征既還丁祖母憂洪熙元年驛召至復其職賜勑命贈其考子朝中書舎人妣唐孺人贈其故妻譚封繼室范皆孺人宣徳元年扈從東征還進吏部驗封員外郎食其禄仍從事文淵閣三十五年皆扈從巡邊兩朝實録成以繕寫勞賜襲衣文綺表裏白金進本司郎中禄秩仍從事文淵閣賜誥命進其考郎中妣宜人乃進其故妻繼室皆宜人六年夏彦初得疾醫藥久不効是年十月十三日卒享年五十有二彦初甫三嵗祖均徳及父母俱喪鞠於祖母葛稍長日悲念父母不絶而事祖母甚孝祖母躬勤織紝資其學彦初亦克自勵駸駸有進益且卓然有立志鄉老長皆竒之謂宣氏有後言於邑大夫舉為區長非其志也固辭會楷書命下郡守曰莫踰宣彦初矣遂送詣京師彦初在翰林最久恭慎小心克勤旦暮未甞以私廢公處同列温而有讓衆或臨事憚勞費至出語相侵彦初獨怡然不作於詞氣而請自任士論以是多之為人疏達誠實行已端重不肯茍且雖家無餘貲遇人窘急倉猝能致義助故其病也卿大夫之賢者屢造視之及不起咸徃哭弔可以知其人矣子男三謙益泰皆幼女四黄暄陳述侯寛其壻也一尚幼其卒之眀年某月陳述奉喪歸葬於鄉其友黄養正具事狀求為墓銘彦初余所心愛重者為之銘曰和而莊坦而慤處事平執事恪履險夷一恬漠嗟彦初不復作故嘉議大夫刑部右侍郎段君墓誌銘宣徳九年二月二十九日刑部右侍郎段君卒於南京家素貧僉都御史吳君敏徳既經紀喪事禮部尚書胡公源潔以聞上為悼歎賜祭命有司營葬於是吳君使人北京需葬銘而胡公以屬士竒嗚呼段君者世所謂仁人君子也又士竒素所交游士竒宜銘按國子司業陳君光世狀段之先居南康之建昌世業儒其曽祖闕營田郎中篤修徙吳中父志清又徙常州之武進母葉氏君諱民字時舉自幼温重頴敏喜學且其父母惟一子篤意教之故徳器蚤成登永樂甲申進士第為翰林庶吉士時太宗皇帝命禮部翰林院准天經之數選曽棨等二十八人就文淵閣盡出中秘書使進其業旦暮給大官饌又月給膏火之資盖期之於大用而君與焉君祗體上意益勵弗懈而文學大進與脩永樂大典丁内艱去服闋除刑部山東清吏司主事授承直郎蒞官廉慎而明敏克勤恒存哀矜惻怛之心處疑獄必歸於厚麗辟者咸以得君為幸踰年扈從赴北京召脩四書五經及性理大全書書成被重賜復還刑部陞郎中益精獄議尤為尚書所重凡大獄必咨君剖奏章必歴君閱乃上在刑部八年山東妖婦唐賽兒作亂三司官以縱寇誅詔廷臣簡代者共推舉君數人授君山東布政司㕘政同舉中有畏難者君曰竭誠以共吾職耳何足計利害哉下車敷宣徳意整飭紀綱綏撫殘氓剗革宿弊政理一新吏民恱戴居三年召同考禮部會試士論服其衡鑑又三年召赴闕命以本官署户部右侍郎之南京是時車駕在北京久南京諸司習於玩愒任錢榖刑名者其務叢脞尤號不治君至躬勤率之莫敢或違始若扞格已而服從咸脩其職明年實授本部右侍郎又明年改刑部其振起作新一如户部罪人聞君至皆相慶於獄伸抑疏滯旬浹之間聲譽用彰三年以績最賜誥授嘉議大夫贈其祖若考皆嘉議大夫刑部右侍郎祖妣李淑人封其母太淑人妻盛淑人初為㕘政考滿當得誥言於朝願推以封母從之至是母年將九十得封者再人皆榮之君忽得寒疾數日小瘥矣將出視事左右謂未可以風曰數百人困坐獄中翹跂待我奈何可自佚㦲强出三日疾復作遂亟有問之者答曰不能報上恩矣如老母何言已遂卒君性至孝初為庶吉士得禄即迎父母就養京師父没後所歴官未甞不奉母以行而曲盡愛敬襟宇清明坦夷表裏一致喜怒不形聲色當官任事惟義所在不茍遜避與人交久而信卒之日其官屬臨哭皆哀南京卿大夫之賢者皆走弔哭北京自師傅六卿以下咸寓奠祭君春秋五十有九其子男四寔宏安寧孫男二璇璣女三其葬以卒之嵗某月某日附武進先塋之次銘曰仁以及民義以行身其履坦坦其存温温我懐若人於古多有嗚呼時舉於今曷少亦既乘時曷不永年闕斯而獨其親凡今之人闕君子闕賢友故奉議大夫禮部儀制郎中龎君墓誌銘禮部儀制郎中龎叙卒於官其子珙將奉柩歸葬吉水以中書舎人宋懷所述事狀乞著墓誌銘余今年七十有五益倦文事然念龎氏父子皆從余翰林久不忍以辭龎之先家袁之分宜十一世祖稱雲軒者始徙吉水仁夀鄉傳其後資産日裕六世至季安傾家從文丞相舉義勤王又三世至希凱為南雄路沙鎮巡檢叙曽祖也祖弱翁龍泉縣尹父文芳好學務義母劉有賢徳叙字明叙蚤喪父賴母長育少從明師學永樂初詔郡縣舉善書士𨽻兩制書制勑簡其尤者十數人從學士於内閣而出禁中古法書名蹟俾進其能明叙與焉時朝廷四方之務方殷命令多以璽書十數人者雖鮮暇稍暇輒自進弗懈咸駸駸有造詣矣先是明叙父甞傅兵籍既卒無他丁男有司言明叙應充伍時仁廟監國南京索明叙所習書覽之嘉奨命削兵籍十年除中書舎人授從仕郎自是車駕巡狩皆與扈從三考奏㝡復職洪熙初賜誥命進徴仕郎贈其父中書舎人封母太孺人賜誥及鈔歸省兩朝實録成以繕冩勞賜銀鈔襲衣丁内艱服闋仍闕考奏最陞儀制清吏司郎中授奉議大夫食其禄仍從事内閣宣廟實録成以繕寫勞賜銀幣加四品禄始専職儀制司八閱月而卒自入舘閣以来三十餘年敬慎如一日純厚謙和不見崖岸口未甞及人過失其度能容有誣其過及加之厲辭色者怡然受之不校以是先生長者及其同官皆重之無間言云家居事親孝親沒哀慕不衰睦族婣患難率扶持之朋友有急必赴恤僮奴如子公退時共賔客觴咏為樂所為詩有淇園藁其生洪武丁巳三月二日其卒正統戊午十二月二十八日享年六十有二娶黄氏封孺人子男四長瑒次珙亦以善書授試中書舎人父子同朝縉紳榮之次瓛次瑛女二長適黄次適周孫男若干明叙之葬以卒之明年某月日墓在某原銘曰弗騁以角弗巧以琢而任其樸噫嘻其樂衛孟敬墓誌銘衛世家河東系出漢御史大夫綰歴晉唐及宋仕籍不乏金人入寇徙河南歸徳之榖孰至元有曰慶甫好施予生伯升瑰瑋有材畧以軍功積官至萬户孟敬之大父父也孟敬諱整為人敦愿内而事親敬長外而處戚姻鄉䣊舉無違禮以行義訓子孫以勤儉致饒裕而好施予有乃祖之風焉永樂壬寅五月得疾闕日召諸子申論惇睦之道又遺訓長子之在官者以必盡臣節言訖而終是月五日也享年五十有八娶畢氏子男六鎮欽祥清鏞鐸鎮中鄉試為大名縣學訓導今陞左春坊司諫女六祖榮郭亮武盛劉正髙林其壻也其一在室孫男四俊乂聰敏女二諸子以卒之嵗某月某日奉葬于其鄉南原先壠之次先事鎮以翰林編脩徐永達所狀事行請銘余於鎮有同寮之誼不得辭為叙而銘之銘曰端其存厚其施以全其歸以昌其世陳處士墓誌銘處士姓陳氏諱霖字士恱陳氏其先居金陵五代之際大理評事諱暉者始居泰和世業儒至宋而仕宦科第甚盛彬及從子􅀢皆理宗朝進士彬官至提㸃刑獄􅀢國子監簿監簿文丞相進士時座主後公過泰和為新其居第至今鄉里誇道為榮處士五世祖也祖存道元安逺縣學教諭父煥章母曽氏繼蕭氏處士兄弟四人其仲處士也為人端厚和易自少喜學問安成劉雲章先生甞教授其鄉處士與其兄士瞻從之學兄弟皆為先生所重駸駸有造詣矣無㡬士瞻舉進士去後為興寧縣主簿父已老二弟皆幼而處士始弱冠凡公府徭賦及家之祭祀賔客寒暑朝夕所出皆治于處士而皆當其父之意平居孝事父母及其繼母友於兄弟愛弟與子一督之學士瞻甞坐謫逺外嫂鄧早沒遺三女及劉氏妹夫婦皆沒遺二女皆鞠於處士既長為擇壻備禮而嫁之行闕擇義鄉人服其公有爭訟率徃求直而樂於恬靜甞闕省兄至興寧留旬日而去縣人莫有知者及弟士啟子禮先後登第士啟自禮部郎中陞山東㕘政禮為思南知府人皆為陳氏榮而處士意澹然入則與士瞻相怡愉出則陶其趣於山水之間盖其自視舉無以易此樂也晚喜寫墨竹日為之不厭人因其所自號稱恱巖居士云永樂丙申十一月二十四日卒享年六十有三娶戴氏故儒家有婦徳先卒繼曽氏子男五長禮今為臨安知府次禧舉鄉貢為辰州府學訓導次祚為士啟後次祊女三長嫁羅以智次嫁蕭徳莊次許嫁郭暉孫男一肇女四處士之葬也以卒之又明年二月二十四日葬在山槎鄉鵓鳩岡先塋之側而未有銘先宜人處士族姑余其外弟也於是禮以翰林脩撰曽鶴齡所述事狀屬余銘銘曰焜焜其先駢榮累芬濟濟其承繩武續聞嗟士恱甫潛彼遐陬孝士于行匪于顯幽喬喬珠林爰託我居擷芳挹清優游怡愉白髪歸全其藏有墳春秋雨露来来子孫左處士墓誌銘監察御史南城左瑺永樂癸卯三月二十六日喪其父處士公奉中書舎人同邑章文昭所述處士行狀介刑部員外郎吾郡周恂如求銘其墓按狀左氏世家旴南城元季徙麻源三谷至處士又徙郡城之西曽祖諱欣祖諱明叔元闕公府從事父諱彬卿平樂州學正母寗氏處士諱謙字彦彰從父進士友信無子以父命為之後天資明敏自少喜學問不煩程督於經史諸書過目輒能記誦不忘長益博通百家貫穿古今逺有造詣而事其父母及所後父母一於孝所後母鄭氏久病氣絶已三日獨胸次微温衆環視不見生意欲舉歛處士不可力求醫療竟甦母恒言微孝子吾死久矣父母沒皆哀毁而葬祭以禮友於兄弟慎擇交友而敬久不衰急於義舉未甞與人較曲直而鄉人有持曲直不能平必就而質之守令數薦起之皆以親老辭然教其子必在於事親瑺登第歸省諭之曰由祖宗積累致汝有今日如或一毫於國事不能盡忠忝爾祖矣其終勉之平居一由儒者之道釋老巫覡之流未甞及門恒不忘三谷山水之勝自號三谷居士春秋八十有六而卒娶劉氏繼周氏俱有賢行先卒子男四英瓛傑瑺瑺永樂十六年進士任浙江道監察御史孫男七紹宗益宗顯宗超宗興宗述宗輝宗女二曽孫男一愈處士之葬以卒之嵗某月日其墓在邑某鄉某原銘曰左氏所出自齊公族丘明素臣郢㳺聖門名漢者雄晉曰太冲在唐曰震代有耀宗厥来徙旴益蕃以昌累善積仁顯聞鄉邦學士繩繩逮彦彰甫欽厥攸行靜言幽處巻而弗施以遺厥後惟彦彰甫沒且弗朽胡處士墓誌銘永樂十八年十月二十日豐城處士胡宗仁卒享年六十有三將以明年某月日葬其邑某鄉某原胡之先出成都有諱諒者唐貞元中與韓愈歐陽詹同登第其長子讓僉判撫州因家崇仁讓次子寂又徙豐城之厚郭遂為豐城人至諱叔恭諱孟寅處士大父父也孟寅六子其二處士也諱某天資質實頴敏好學問居家有孝友之行於處族婣朋友能盡其道以仁恕為行已之本詩禮為傳家之器其善人者歟娶鄒氏子男四軫輗軏軾軾先卒女三徐仲殷李大猷周某其壻也孫男四鍾鑑鐸釗女三軫永樂乙未進士授兵部車駕清吏司主事氷檗之操有聞縉紳間知者以為處士之教也於是軫奔訃將歸齎國子助教徐疇所狀處士世出行實介司諫曹曼齡請銘其墓余雖前未識處士觀其子可以知之矧有如助教君所述者乎銘曰緼仁好善而蹈義兮栖遲丘園樂洩洩兮式光大之德厥嗣兮楊宗榮墓誌銘處州之松陽楊宗榮年七十卒既葬矣後三十有三年其孫巨容以某官某所述世出行義介前國子典簿葉允元請銘其墓按楊氏系出漢太尉其後子孫益衆散徙江淮閩浙間至宋有諱某者為金華主簿其子信為衢州教授始来居松陽歴若干世至安道宗榮父也母葉氏宗榮自幼喜讀書為詩家居敦孝友處宗戚鄉䣊恒輟有餘賑匱乏及葬其死之無歸者攻醫有疾率濟之善藥尤以諒直為鄉人所服縣甞舉耆老資以集事晚好黄老清静之道幅巾逍遙泉石之間有以自得卒以洪武己巳五月十三日娶葉氏子男二景和人傑孫男四巨容巨信久章久祥巨容今為長葛知縣孫女二銘曰力善而施弗達以試澹乎以愉尚厥志後有考之此其識洪珷夫墓誌銘青田洪珷夫既卒而葬矣其孫廷信奉禮部郎中葉仕寧所述世系事行介前國子監典簿葉允源来求墓銘洪之先居番昜系出宋贈太師魏國忠宣公皓皓之孫曰純為曹屬于括始自番徙括居青田之鴈衢珷夫八世祖也髙祖秉哲元閩海翼上千户曽祖疇脩徳樂善所交多名賢石塘胡先生甞賦其所居延桂楼趙文敏公甞記其所創太清宫白雲菴而皆文敏所書云祖鉉考宗江俱畜徳不仕妣張氏珷夫諱某字尹武珷夫其别字也儀觀偉然事親能孝生養死祭一致其誠於睦族人處鄉人皆得其意捐貲以賑貧乏無告者不間於識不識珷夫讀書通古今有材畧元季尚少郡辟司倉不屑就天兵下處州總帥聞其名召主給饟井井不紊帥數稱其才已而免歸皇明既混一海宇則命其弟出仕珷夫留家居治田園新居室名其藏息之軒曰清逸儒生君子與之㳺者多為之賦客至焚香鳴琴觴詠為樂既老葛巾藜杖攜朋徒及其諸孫日徜徉山林泉石之間雖曠焉無所係于其心而謹循憲度不少縱以田賦屢長萬石區率先集事而尤以公平而民恱服雖不仕而所以刑於家施於鄉者人未甞不以仕望之也其卒以洪武己夘十月二十五日其夀七十有七其葬在訪川吳岡之原其配葉氏其子某某某其孫三庭信庭質庭翰其曽孫男二克鎮克鏸女一銘曰有韞其中器之良恬澹愉佚履幽貞鬱乎斯丘歸永寧東里續集巻三十七
