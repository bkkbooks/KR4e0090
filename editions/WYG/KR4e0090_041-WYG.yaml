body:
  text: 東里續集巻十三明楊士奇撰序泰和楊氏族譜序楊氏出姬姓晉武公子伯僑四世孫叔向食采於楊生食我以邑為氏食我之後􅄆居華隂在戰國時曰章生秦卿欵欵生石從沛公征伐為太史生赤泉嚴侯喜喜七世至太尉震震第五子城門校尉中書侍郎奉奉八世孫結仕慕容氏為中山相結三世至恩恩七世至寜寜生虞卿虞卿生堪堪生承休唐天祐初以刑部員外郎使吳越楊行宻亂不得歸遂家錢唐承休生巖巖生郁郁生蟫歸宋太宗更其名覃宋史有傳覃生文友文友生輅来居廬陵郡中則廬陵楊氏始祖也廬陵府君二子銳徙吉水楊家莊鋋徙吉水湴塘銳之孫延安又徙上徑延安孫允素始徙泰和則泰和楊氏始祖也泰和楊氏族故有譜刻石置縣西延真觀元季觀燬於兵石壊刻本亡逸士竒求之廿餘年不得近得族父與芳翁寄示所修譜圖一帙其間傳系失於接續者亦多矣竊懼其益久而益廢也乃本譜圖所載準歐陽氏五世以下别自為世之法而統録之其傳系失於接續者皆仍舊位置而詳注于下方庶幾延真刻本有出可以㕘補名曰泰和楊氏族譜於戱即譜而觀繇廬陵府君迄今凡廿有三世繇允素府君始遷太和以来十有八世矣積徳累仁彌久彌厚所以後嗣之盛他族鮮儷而逾逺逾疎加有富貴賤貧之殊於是胥目為塗人有可慨者矣蘇文公有言其初本一人之身也而至於塗人可慨此譜之所以作也楊氏子孫觀於斯者尚世世致敬一本之意勿忘潘氏世譜序仙居潘叔政以其所作潘氏世譜求余叙譜有其鄉先生王原采叙之矣推其世家之實及作譜者用心之誠備矣又歎後来流俗之弊而援古以示訓者至矣余何言叔政發身儒術歴佐數郡能持身愛民為國家議建水利有成績亦嘗倅吾郡所歴民皆恱之譽之余安得不為一言吾嘗謂世譜者所以仁其家也士君子少而學也其志固望上以事君下以及民然能仁於家而後能仁於國仁於天下能孝其親而後能敬君能惇於族而後能恵民盖道修於身舉而措之必自内以達外也叔政之仁其外者既有聞於搢紳間斯其仁於家者可見作譜乃其一端也吾觀後世作譜無援引矜誕之弊者鮮矣潘氏其族故甚蕃其先嘗連姻宋宗室盖仙居碩宗也今所録惟傳其可信者簡而眀質而有據叔政其可敬也夫吾聞叔政嘗學於原采先生先生官至翰林修撰學醇行正子道臣道師道終其身無一毫之茍魯無君子斯焉取斯叔政非有所自歟余素交先生相知為深審理之除實其所薦今不作四十年而無主祀者矣讀所叙潘氏譜懐舊悽愴盖不能已於情也因併及之吳氏世譜序余嘗閱宋史見龍圖直學士仙居吳公芾凡所立身事君治民一由君子之道而以剛直不容於時心嚮慕之又閱朱文公所為公神道之碑視史加詳於是慕之加切焉盖君子之仕也皆欲推其所學施諸致君澤民然而得遂所志者何其少也後之人得其行事而嚮慕之不已焉則亦好賢尚徳之心無古今之間至若慕之又思見其子孫則君子之感於人者深矣吾邂逅仙居士人未嘗不及吳氏之後世獨嘗見王静學先生言龍圖之子孫宗族詩書世澤故未衰也可為仁者有後矣比年識龍圖之子孫太學生同志温温然持其言行甚謹盖已重其崑岡之産也既擢陕西都指揮司斷事尤聞其敬慎職務盖加重之三載考績京師復見焉始得見其宗譜盖其先居處之遂昌唐中宗朝諱進公者舉進士官至刺史刺史十世孫諱全智仕梁至銀青光禄大夫撿校國子祭酒兼侍御史光化中避地仙居遂家焉其子孫愈逺而愈盛祭酒之九世孫登進士第者三人曰詠曰謙其一龍圖也詠之子驤謙之子浚龍圖之子津又相繼舉進士自是文獻益有續而吳氏為望於仙居豈一朝夕之故也族故有譜至岐又續之凡名諱字行生卒葬娶詳其所知闕其所不知粲然有條而不紊名曰世譜所得歴代封贈誥勑及碑誌行述之文别輯為巻名曰世録附譜之後凡此非有賢子孫莫之能為也嗟乎吳氏之肇於前有其人矣将無紹之於後者乎紹之之道亦曰殖學樹徳焉耳傳不云乎必復其始盖吾於吳氏之賢子孫望遂書以復同志為世譜序李氏族譜序樂安之下墟里李氏其先自真州徙盖唐僖宗廣明中撫人袁劒宗為亂真州李慧奉命討平之以功授宣武節度使下墟人懐其徳作祠祀之宣武二子皆顯官伯曰仁為司空仲曰恕為團練使恕家下墟其子孫歴逺益盛服逢掖業詩書者盖彬彬矣在宋有舉鄉貢中江西第一者元有明經仕至集賢院都事者其族故有譜昉於徳源所録既壊扵兵亂之際徳明因其舊而重録之其後罕章繼録之今汝文及其從子泉又繼録之徳明所録鄉先生何伯善嘗為之序罕章所録祝永貞序之今之所録者泉以求余序觀其譜自宣武至泉十有八世其本源支派至於名字行官生卒𦵏娶所當尊當親當敬念不忘者一覽可以畢得世守而用之可以篤於仁厚之行也盖宗法廢而族譜行庶幾猶有古人仁厚之意夫仁厚用於家則可以善其家用於鄉則可以善其鄉推而用之可以兼善譜固世道之所重也而非有良子孫不能為之李氏之子若孫累累繼為之不已固皆良也泉永樂乙未進士擢官行人敦實謙恭其又良者歟故為之序豐城李氏族譜序天下之治本於親親故先王之世特重宗法後世宗法廢士君子篤意於譜牒盖亦先王之遺法而敦本之道也譜牒明然後源本不昧疏戚不紊而孝友慈睦出於仁愛之良心者自不容於已矣仁愛施於家推而及於民又推而廣之天下之治所由以興譜牒非有闗於人心世道者歟兵科給事中豐城李實作李氏族譜其鄉先生國子祭酒胡公既為序之又以求余序余受而閱之曰嗟乎何其盛也其先出唐宋王成器成器子梁王鈞南徙信州又二世徙徽之黄墩又三世至金紫光禄大夫都督淮南荆湖四川節度使匡禄又徙饒之玉溪又十四世至欽始徙豐城之提陂今傳于實五世矣泝其先聲光震耀赫赫如此豈非盛哉夫天下林林之族其先孰無聲光震耀赫赫于世者或其後子孫碌碌不能有立以遂泯其前人之盛者亦有之矣故為子孫而能卓然立其身以白其前人之盛於不泯庶幾為賢實以明經舉進士擢官近侍恂恂謙謹盖克自立也宜此譜之有作而李氏之先之盛不泯於後乎亦本其仁愛之心有諸中乎仁愛施於家如推廣之以為及人之功其亦孰之能禦也實方嚮用於時故為書此而并致期待之意云余氏族譜序翰林庶吉士余學䕫持其父斯延先生所作余氏族譜示余求序之予家與余氏相好非一世先曽祖待制公與友梅先生交甞為序所著經史時務䝉求伯父吏部公又交斯延先生其季子學奭吏部公壻也則學䕫之求予敢忘世好而不勉乎况族譜之作以明源本教孝弟予不有以相成之不可也按譜余氏自宋襄公靖知吉州其仲子西融州通判仲忠娶泰和陳氏来居邑之萬嵗巷西融生南昌令仁南昌篤於行義甞為家訓曰讀書起家之本循理保家之本勤儉治家之本和順齊家之本至今鄉人取以為法南昌生孝感主簿可大可大通五經起家進士在孝感有善政民作祠祀之孝感生袁州學正天祥甞試于郡第一生五子人英始徙千秋鄉之株木里益大其家人英生五子珪領鄉舉為九江儒學提舉九江之孫贑州路學教授希武即友梅先生亦通五經友梅三子存道尤博學下至天文地理厯數醫卜之書無不精究存道生昌齡即斯延先生時安成劉雲章先生從虞文靖公得性命之學先生徃從劉先生而受焉修徳厲行嘗一徴詣京師以疾辭退以所學教其鄉之人與其二子二子亦卓然有成學䕫以書經登永樂二年進士第與翰林修撰曽棨二十八人者同受上命進學于禁中為天下之所歆羨屬望於戱余氏自襄公以宋名臣至今凡若干世其詩書福澤何其不替益隆如此也豈非有念其祖之徳思嗣之者代不乏人而克臻是乎如使繼今益有其祖徳思嗣之不懈則余氏之福澤豈有涯哉余氏子孫尚世念之豐城槎溪王氏譜序豐城槎溪王氏譜者王氏之賢曰逸勤者近所續也逸勤之子鄉貢士安奉父命介其婣家翰林侍讀孫曰恭求予序余受而閱之王氏系出宋翰林學士元之曽孫御史中丞闗始居豐城之槎溪自是世有令人自闗至逸勤凡十五世傳續之盛益庶且富詩禮不乏亦其先源本有自封培益厚之所致歟盍觀諸木根柢既植生意既達而其後雨露之養以時斧斤之戕不至則其本益固其茂益奮豈有窮哉夫仁義忠信所以培之養之也驕奢兇悖所以戕之也凡古聖賢君子其後之不振或遂至僨絶者要之後之人無以培之養之或自肆其戕伐也王氏自中丞以来歴數百年不絶益盛豈非培養世有其道歟其先之譜有宋狀元薛坡姚公信國文公元學士承㫖程文憲公國朝文淵閣大學士朱公助教聶公序之所以稱述之而期願之於孝友親睦者悉矣余尚奚言雖然詩不云乎昭兹来許繩其祖武槎溪本諸中丞中丞事無所於考然中丞本諸學士史稱其醇文奥學為世宗仰其骨鯁謇諤之節蔚為名臣夫奮烈於前者盛矣後世必有能力學篤志挺然特起以續前人之休光顧不偉哉庸書其譜端以俟石岡蕭氏族譜序吾邑之石岡里蕭自誠先生寓書及蕭氏族譜来北京求予序譜舊有鄉先生劉子髙序之矣自誠先生續有増益故又屬序於余余與其子省身有斯文之契不可辭蕭氏系出齊宗室子雲其後居臨江玉峡至宋有諱遜者始自玉峡徙泰和之石岡今譜以玉峡之世冠於前而斷自遜以下為石岡之譜石岡蕭氏故泰和之望也自遜以下襲儒業居厚貲至登仕郎思亷之子保孫為諸王府掌計從文丞相舉義圖興復事敗覆其家嗚呼國家平時養士以為重宋之亡忠義之士多矣盖文丞相第一人當是時寵禄隆盛於丞相豈可以數計而危急之際徃徃委去不顧甚者畔國以謀已若區區一掌計非有髙爵重禄也而不忍坐視其國之亡毅然殫心盡力以從事焉雖家覆幾死而不悔此其忠義氣㮣卓卓豈可以成敗論之哉雖蕭氏自此而益衰而文學材行傑然自豪者代未嘗無人余讀劉先生之文則必為之反覆低徊歎息以悲其累世之不遇而想見其人焉而至于今其子孫勉於士行次者治耕稼不失為敦樸之氓非其先世之流風餘韻久而未泯歟自誠先生淳篤樂義雖老教授不倦省身眀經擢第自翰林庶吉士再陞刑部郎中今為河南右布政使温雅亷重有賢名于時劉先生所望達其混混者盖在於此天固久而後定乎夫天之於福善雖久且逺不爽也則世之蚩蚩務以仇善類者卒能違天也哉余又有感夫劉先生里舎兒之言故於序斯譜也而為之畢其說瑞安楊氏譜序福建布政司左㕘政瑞安楊公景衡年七十致事将歸以余同宗也出其世譜求序之譜斷自宋司馬始居閩長溪之㶑村自司馬而下世以文學致禄位淳熈中宗旦知瑞安縣其弟士芳從學陳君舉先生遂家瑞安士芳子斯泰為太學生再上書論賈似道誤國不報㕘政髙祖也盖司馬以降其禄位莫盛於㕘政云楊氏自晉太傅叔向之曽孫秦上卿欵生漢赤泉侯喜赤泉曽孫丞相敞丞相曽孫太尉震至是極盛矣太尉至唐靖恭坊盖又一盛而自秦卿始著譜至太尉以下特詳宋無為子序楊氏譜云太尉之後别有東垣宜陽房榮陽房蜀中院靖恭之後别有淮南院蜀院閩院丹陽房而唐書所列太尉之後派别尤衆於此見太尉盛徳流慶之厚且逺而皆因譜有以見之歐陽文忠公所謂楊氏漢唐常出顯人故繫譜次序自太尉至今不絶者也太尉以上别出之譜無傳近世掲文安公作吾家忠節祠碑謂天下之楊皆祖太尉此盖據有譜者言之不然赤泉至太尉八世其間支庶豈皆無子孫傳續於後無為子亦謂赤泉之孫别有新昌院是固嘗有支𣲖矣但既無譜則不復知譜所以不可闕也士竒嘗續本宗譜遍求各派譜㕘之獨見蜀譜盖與吾宗皆出靖恭其所著本源悉同别𣲖譜雖未見計有存者亦當不異也㕘政此譜初祖書宋司馬當是唐司馬譜中所引靈峰寺碑載咸通九年楊仲和施田事仲和司馬之子也又載司馬四世孫諄景徳元年施田事碑所載當得實咸通唐懿宗景徳宋真宗所紀年也則司馬誤為宋無疑譜不著閩之所自徙豈其先失於紀録或有録而世逺遺逸耶抑所重者近而親其逺而疎者遂略耶作譜之道明其本詳其親存其信闕其疑歐蘇所為可法者盖如此今少傅建安楊公序此譜謂其初同自闗西徙閩然少傅舊譜已逸士竒嘗見其所列上世皆書行與㕘政譜所書正相類合其先推之意其無為子所謂閩院者歟盖未可知閩僻在一隅世鮮兵旤故家文獻尚有可考㕘政雖老未衰又日就優閒而甌閩相距如東西家誠有志斯事尚可以成之他日幸復邂逅並出所藏得以考其異而合其同亦遲暮之一快也㕘政勉之鄒氏譜序譜牒君子以仁其族之器也本乎孝弟之心焉盖君子無徃不用其仁而行之必自家始此譜牒所繇作也兵部武庫郎中新淦鄒孟爵之譜鄒氏也其能仁夫族也歟鄒氏先居撫州之豔坪在宋有官至銀青光禄大夫者其後有贅新淦潤陂遂為新淦人贅潤陂者生二子其仲曰少四府君又徙淦之晉溪自是其後益盛而少四之五世孫曰義叔三子仲子立文又徙韓溪孟爵之父也孟爵所著譜及圖凡三自少四至孟爵之孫為新淦譜盖重其所出且以眀源流也自髙祖至其孫以下為五服圖又自其父以下為韓溪譜則厚其所親且以辨等殺也何其用意之周歟古之為譜非一法而各有攸當鄒氏斯譜創自孟爵要之事當人心不必盡出古法孟爵亦孝弟之心有不能已者歟可謂能仁其族哉君子仁於家必推之上以忠君下以澤民孟爵仕於朝有年其位所進盖未可量也間求序此譜因推廣而告之孟爵朂哉嚴氏家譜序泰和有故家曰嚴氏其先出馮翊唐末諱實者為江淮轉運判官居廣陵子可求事楊行宻可求子續事江南李氏又徙金陵續之孫令鈞始徙泰和令鈞曽孫震宋慶歴二年進士常州推官震一名宣三子孟執矩不仕仲執中新建縣丞季執衡臨安府同知自是子孫始衆文獻益盛矣三執之後其歴世文學節行皆有聞人鉅公為之紀述執矩之後有季模有山臞有吾廬見湏溪先生劉辰翁及劉尚書崧之文執中之後有迪功郎皥有鄉貢進士萬全萬全胡忠簡之壻見忠簡文集執衡之後有致堯有可久有秘書校勘肅有髙安縣尹用父見周文忠楊文節吳文正掲文安之文此其文獻之盛也嚴氏在宋元時宗族之盛貲産之阜豐居第臺榭之宏壯奕奕焉赫赫焉而服詩禮敦忠厚率有君子長者之風今未百年向之奕奕赫赫者不復見而詩書忠厚之習猶有存者盖世所恃以亢其宗者在此不在彼也嚴氏故譜更世變而亡執矩之後昭逺教諭圭執衡之後子瓊嘗同録所出二派為譜而執中之後元晏執衡之後士臧又各為家譜述其本派親其所親人人同情然必有合三執之後而為全譜庶幾克廣同源一本之仁圭子瓊譜成以求正於余元晏譜余嘗為之序士臧譜又以求余序士臧祕書六世孫洪武中國子學正從禮之孫也今嚴氏惟學正之後謹操履不去儒業而嚴楊世婚姻予安得不推夫仁之廣者以望其後之人哉是為序豐城史氏譜序史氏所自出非一族皆古太史之後如史佚史興史蘇皆以官為氏近世史氏之有聞者虞文靖公言二百年間眉山四明真定三族而已予仕於朝三十餘年眉山之後無所遇四明之仕於京師者間一二遇之最後識安安字志静敦行誼好學不懈相與最厚其先出真定也求其宗族譜牒之詳盖不能無盛衰之感焉元中書左丞相太師鎮陽王天澤八子長湖廣行省平章政事格平章之後有仕鄧州者子孫遂留家焉一再傳至河南行省都事憲中生户部郎中文質我國家奄有天下悉徴元之故臣簡其才者授之職文質得富州吏目富州今豐城也文質後卒於官貧不能歸遂葬焉子伯允因家豐城伯允惓惓於光續先世而卒齎志以沒臨沒顧其二子純安曰必成吾志又嚙安臂申諭之曰汝必毋忘安時尚少貧苦力學後舉進士為禮部儀制主事陞郎中孳孳訪求真定及鄧之族與譜十數年不得盖居鄧者不久冝難得也而真定之子孫亦寥寥無聞雖間存一二而代更運革耆老皆盡既懵於學問而儕伍農圃以耕鑿為業惡能知其所自哉嗚呼當元之興史氏一門父子兄弟功徳之建在國家在生民封爵之崇峙冠纓之連續何其盛也及天命去元凡其佐運輔理之家亦隨之俱落如史氏然者又何其衰也安毎與余道及其宗之盛衰及其先君子臨終之言未嘗不泣下霑襟余嘗解之曰盛衰之理恒相因漢名臣之後不有復興於唐者乎唐名臣之後不有復興於宋者乎惟在殖學與徳以迓承之今之才且賢如子有不復興史氏者乎子必勉之安嘗作史氏譜上自鎮陽之曽祖而下至於安之子闕居鄧者或一世或二世盖無所於考而屬余為序余諾之未及為而安奉命從賛交阯之師沒於忠余毎思安而悲安沒已十年而余之年今七十有二念譜序之有前諾也遂力疾成之以寓其子使冠諸譜云楊氏譜序楊氏譜者吾友翰林脩撰楊君仲舉譜其宗者也其先居代州之崞縣累世業儒用眀經擢第迨其子孫以武功顯以忠義奮在宋官至武功大夫貴州刺史永興軍路馬步軍副都總管曰宗閔歴仕五朝名聞西北二邊建炎中金人犯長安守節死累贈太師魏國公諡忠介子震有文武才累官知麟州建寜砦敵衆圍建寜勢張甚城中守卒不滿百人敵誘之降不屈益奮厲竟與其子居中執中並力戰死累贈太師秦國公諡恭毅並載宋史忠義傳秦公四子存者沂中彦中沂後賜名存中與張韓劉岳同事髙宗朝官至太師追封和王功烈具著國史楊氏之宗於是為盛彦中官至武義督機自和王䕶蹕南渡挈家居臨安而葬秦公於湖州之武康創别業於蘇之長洲皆留子孫居之此譜所録惟和王督機二派上斷自秦國之曽祖承奉公下至仲舉之子凡十有三世仲舉出督機派距督機八世矣今居於蘇楊氏入國朝顯者昉自仲舉余交仲舉五十年其持身謹行如玉雪官近侍十餘年矣藍田之産必薦於廟堂鄧林之材必收於匠輸忠義之宗有君子焉宜其效用於聖眀之朝也惟其後之人尚力學敬徳用世承勿替可也仲舉間示譜求序敬為書此凰岡蕭氏族譜序吾邑之南一舎外曰凰岡壤地肥沃宜耕稼去城邑既逺又限大江岡巒澗谷盤廻而幽邃叔季之世兵戈冦盜之禍常不及故其人愿慤勤生自足無慕外之意而為望於鄉者蕭氏也蕭自宋南渡始居於此至今十有一世率業詩書履忠厚雖世未嘗有顯者而素與徃還及相為婚媾皆時之顯人吾先世與之有連吾猶及聞諸父兄言元末兵亂之際舉室出避依蕭氏其家尊卑内外其行慈孝恭儉其所務詩書禮法其敬愛賔客如子弟之於父兄而賔客之寓於蕭氏者安之如家焉夫世之所謂顯者率視其外焉耳徳行本諸内者也茍無諸内而徒烜赫乎其外君子不貴也蕭氏其可謂有諸内者歟吾生晚不及識其老長而與信立徃還為人儉質和易不事表襮繇邑庠生陞太學出族譜求序之考其譜自詮始鄉先生尹子厚稱詮宋之時舉兵勤王為軍先鋒後以討䖍割牛洞叛冦死之人義之立廟祀焉詮有弟四人諲證諫詵而譜惟録詮之所出其支分派别愈散愈繁非本其先世克脩於内而世承不懈何以致此哉脩乎内者久未有不徴乎外繼自今蕭氏之徴乎外者不在信立乎亦惟勉乎内以俟焉可也吾既以復信立又書示其族之人西昌袁氏家譜序按袁虞舜之後系出陳郡見唐韓文公袁氏先廟碑自司徒滋少子邯為吉州刺史留家西昌遂為西昌人邯十世至宋宣徳郎倜六子其仲子士表累官至建寜府通判五世至以寜三子其仲子務敏四子十有八孫今其曽元益増而衆袁氏之後盛矣哉西昌以科第名家者十數姓袁氏在宋登第凡七人嘉泰二年曰士安嘉定元年士表十六年槱紹定二年樵及文焴淳祐元年清伯咸淳七年岄又有中鄉試曰士憲曰灝曰濚曰櫮皆在於宋是時科舉取士以經義詩賦袁氏皆以賦著名其文物又何其盛也而此譜不具載者譜以寜孫曽所録特著其本派耳吾猶及識以寜時年已八十餘惇徳樂善有仁人長者之風其卒也海桑陳先生銘其墓務敏篤肖其父其卒也蕭子尚先生銘之即袁氏之上世而觀於今盖以寜父子有承先裕後之功焉務敏之孫仲愚今自縣學升太學生曽孫和以選鄉貢袁氏文物殆将有繼也然而髙曽之善容有弗繼者歟袁與楊同里而余於務敏諸子小學時又嘗同門故因仲愚求序此譜也并寓願望之意袁氏之後世懋之哉況氏族譜序禮部儀制主事南昌黄鍾伯律其先本況氏其父以實幼孤遭元季之亂里黄氏鞠之遂因其姓伯律慮其後之人昩於所從出也取其先世之譜重脩以傳求余為序按譜自虞國君之子烈初居水北其後子孫益衆散徙不一盖烈之十二世曰昌伯徙豐城曲江十九世曰鼎徙西山今其地曰況坊者其族所居也二十七世曰政徙瑞州藥湖曰敏徙奉新虬峰曰敬徙韶州鼎之十八世曰昇又徙靖安曰景徙鳳岡今獨韶逺不可知若水北若曲江若西山若藥湖虬峰若靖安鳳岡其子孫皆盛又皆累累有顯人其古所謂碩大之宗者歟非其初積善累仁有以基之又有繼而培之者歟鍾靖安之出也於烈四十有三世於昇六世矣此譜著自烈者尊其所本也而自徙靖安以来凡行官生卒葬娶特詳者親其所近也於各派惟著所徙之始者盖以備參稽作譜之體也盖譜以眀源委啟孝愛而厚俗化也本於天理而兆於聖人之禮典而非有賢子孫則不知為之伯律其賢者哉然姓氏先王所以别生分類也後世或不得已而去之而能終復之者子孫之尤賢也伯律此譜盖復姓之幾矣伯律達於理慎於行而勇於為善吾故以尤賢者望之是為況氏重脩族譜序劉氏族譜序吾友劉仲良作劉氏族譜命其子河南按察僉事咸以来北京属余序欲以貽示後世按譜其先居金陵五代有諱況者為栁州判官以道梗留止泰和遂家焉況以下世逺不可知可知者始於仲良五世祖實夫故祖斷自實夫以下夫録其所知而闕其不可知者作譜之體也眉山蘇氏出眉州刺史味道而味道以下不可紀故其譜始髙祖至于昆弟之子凡六世而於其髙曽祖考仕娶及卒之月日特詳君子以為譜之善者也劉氏譜所録五世以下而於本派諱號仕娶加詳非得於蘇氏之意歟仲良雖未必準蘇而作理之在人心固有同然者乎夫譜以眀源本辨戚疏然教孝友勸惇睦導禮義之意盖並行也故蘇氏記族譜亭惓惓六行之為戒而仲良所欲貽于後世亦未必不在於此也矧吾鄉名詩書衣冠之世而蹈夫所謂六行皆仲良所目擊而不能㮣於心者因其鄉以勵其家固仁人君子之心所不能已也吾與劉氏居同里仲良之父愚村翁及其從父以彰皆恂恂謹言行以彰善言河圖洛書數得先儒之㣲吾少嘗徃質焉而仲良兄弟昔皆同門而學今咸及其弟渙皆舉進士咸僉憲外服渙為兵科給事中又相與同朝盖余周旋其祖孫父子之間親見其家尊卑疏戚孝友惇睦不愆於禮義於今不可多得則表之以示法其後者於余為宜亦於仲良之所欲有助也鄭氏族譜序貴州布政司㕘政鄭景曜以其所脩鄭氏族譜介貴州按察僉事郭公緒求序之譜有吾友胡仲器序又有元干夀道所為鄭子謙家作司徒廟記夀道子謙皆元延祐乙夘進士與先曽祖有同年之好於余為序譜固冝抑余在舘閣嘗見郡邑所上志書而饒州志載鄭司徒事與譜合又載宋賢彭汝礪之詩所以咏歎司徒當時功徳爵位之盛有景仰不忘之意則為之序譜固有徴也鄭氏望出滎陽唐永泰中諱選者自滎陽徙徽之祁門黄巢之亂選之孫傳偕其弟魯玫奮布衣舉義旅保障其鄉既而鄰邑土冦連結為亂傳盡平之遂併保徽饒二州傳積官至撿校司徒上柱國其沒也人廟祀之於浮梁司徒十三子其有官者十一而六居浮梁浮梁又十一世有諱舜臣者徙池州之建徳舜臣至景曜四世矣此譜紀自選始至舜臣以下則惟記建徳之族盖特詳其本派云凡今天下宗族之盛者率其上世有大功徳於民始巢冦之盛其鋒所嚮莫或與之抗大州大邑重爵厚禄者徃徃望風棄城而去司徒初非有一命一職乃能毅然以斯民為已憂其功烈之盛雖不詳於史傳而能使其民廟而祀之志而顯之後之賢者又歌詠之不忘此豈偶然者哉至于今其後嗣益衆詩書仕宦徃徃有聞非由上世功徳及人之深者之所遺歟吾於斯譜盖敬歎其源本之厚也傳曰公侯子孫必復其始鄭氏必有賢子孫力學畜徳復振于後歟景曜發身進士自監察御史陞今官有賢名於時固鄭氏之賢子孫乎是為之序清溪楊氏先徳録序清溪在泰和東陽門之北楊氏家其上盖邑之艮隅也楊自允素府君居泰和至余十有六世然其析居清溪者莫究所始余童丱聞之老長云此故書厨楊家相傳叔球府君博記精通一時老儒皆遜之學者有所窒礙遺忘咸徃質焉而咸得所欲故鄉邑號之遂併號其家實郡伯府君之父待制府君大父也則知居清溪者約今二百餘年矣楊世有文獻為鄉邑之望更元季數十年兵戈冦敓之旤糜壊之極凡名家鉅宗傾圯消滅皆不能存什一於千百於是時楊氏故老已盡而家之斷簡殘帙悉無一存雖鄉之遺老時能道其先徳於人然文字之所紀者無傳焉余幼孤幸内承先夫人之訓外承二三世父及外家耆耄之教稍長歴咨徧求初得陳心吾先生所著墓銘次得先公著家傳又次得劉尚書墓表墓銘二文最後得歐陽楚公墓碑手筆於贑農家瀕毁之際真若有神物䕶之者又後得史傳遂稡為巻而益以先父兄事狀墓志碑傳併先夫人慈訓録皆在焉名曰清溪楊氏先徳録首冠以譜譜必自始祖者重所本也今清溪之出多已他徙而悉録之者詳所親也清溪楊氏二百年来仕者㮣具於此其處者或勤詩書之業或躬稼穡之事雖不盡録盖皆循理秉義不忮不求恬澹自足要之其所傳續者有自矣禮先祖有善而弗知不眀知而弗傳不仁是以敬輯此編用遺後之人使祗承於永逺宏岡袁氏家譜後序洪武二十六年秋吾邑袁君本謙受命為漢陽河泊官與余邂逅武昌以先君子嘗教授其家也特厚余示余所作宏岡袁氏家譜曰先世本唐吉州刺史邯家西昌今城西袁家巷是故居之處迨宋一徙居萬安襪唐一徙邑東中埠一来居宏岡宏岡始祖曰諤諤至誠伯則本謙髙祖也本謙生嵗餘而孤又嵗餘而䘮其母獨頼祖母教育底于成立然使盡知上世所從来與其一姓尊卑親疎則頼族之譜牒存焉譜誠不可以闕也故余今又取自髙祖以下至余之子凡六世别為家譜以貽後之人俾咸知夫尊尊親親之義焉余曰君孝弟人矣孝弟盖百行之首萬福之基也而君重之矣君且益前光大豈止一官河泊而已行庶幾見之也又十年余在禁林本謙亦盈三考上京師書最授雲南臨安府廵檢賜九品服從陟典也且行告别曰惟子不忘先好用是輙布其腹心惟家譜昔嘗與子言之於武昌今余且六十矣行即萬里去胥晤何期子可無一言叙吾作譜之故以慰吾逺去之意以示勸袁氏後之人哉則又復之曰自古人宗法廢天下之人其子孫日繁盛則不辨於尊卑親疎不辨於尊卑親疎則日流於不孝弟而不自知也於是乎譜牒興矣然世道益降人率假譜牒以為門閥之光甚者巧偽百滋其意豈皆在尊尊而親親也本謙孝弟人也君之心誠切乎尊尊而親親又必推以教其後之人其用心如此且将益前光大尚豈止一官廵檢而已君雖老行庶幾見之也即此譜可以知君矣而君之子克俊克讓皆恂恂惇禮好學蘇老泉有言觀吾之譜則孝弟之心可以油然而生斯又在袁氏之後人也孝弟盖信乎百行之首而萬福之基也袁氏之子孫尚益引之毋替余又以告袁氏之来者甄氏家譜序古者宗法行人皆尊其祖敬其宗而俗化以厚後世宗法廢人猶有不忘其尊祖敬宗之心不淪於薄俗者則頼譜牒之行也故譜牒可以係人心惇化本而仁人君子必致謹於斯焉然更世多故遷徙不常傳歴既逺統系之不眀代序之不知亦理勢之所有惟仁人君子則著所可知而缺其所不可知又謹之至也數百年来士大夫著譜可範世者廬陵之歐陽氏眉山之蘇氏歐陽譜凡二十世祖而缺其中七世蘇氏自髙祖以上失其傳譜録始於髙祖以下此皆著其所可知而缺其所不可知其心固以為一家之中其事孰有重於尊祖而敬宗者其可以不謹乎故曰仁人君子之心也豈如薄俗誇大喜髙而冒昧無實者之所為乎太僕少卿甄徳輝作甄氏家譜斷自其祖至其孫凡五世曽祖而上盖不可知所可知者其祖考而下而凡祖考生卒葬娶皆詳焉其所致謹非有合於仁人君子之心歟盖甄始居真定之獲鹿徳輝之祖五處士因元季之亂徙河間之慶雲既没而葬焉一子成遂家慶雲成有篤實之行益大其家三子徳剛徳輝徳源徳輝以春秋中洪武庚午鄉舉初授汝寜府同知又改襄陽湖州二府遂陞南京太僕少卿其為政果毅公敏有聞縉紳間夫其能致謹於其家之所重宜其推而施諸外無徃不達也因刑部主事徐孔章求序此譜輙為書巻端豐城荷塘袁氏族譜序豐城多前輩君子吾少而學也盖景仰焉仕於朝四十年豐城之仕京師者又多才且良不忝其鄉之前聞人吾皆得與之游最後得監察御史袁海秉常其為人亷正和厚其處物寛裕眀信起家科目自學官為御史恭慎平恕務持大體魯多君子盖吾於豐城亦云秉常既陞太原知府将行以其兄秉彞所作袁氏譜屬吾甥康榮求序按袁出媯姓舜之後陳胡公之裔伯爰孫轅濤塗以王父字為氏後或作爰作轅實一本也又後去車作袁漢以来代有顯者豐城之袁始居豫章西山之蓼洲至處士徳由蓼洲徙豐城之蒐湖其後又徙荷塘此譜專録荷塘之族質而眀簡而備固作者之賢也夫譜以考源流明本支辨疏戚以啟孝敬親睦之行盖家之重器也必有賢者而後能作之不賢者之為譜假託謬援前之崇重華顯者為其所自出而不知亂其宗陷於不孝卒為世所譏誚也袁氏斯譜吾故曰作者之賢也所録自袁二府君以下至今十有二世子孫益衍而益繁又有如秉常之光榮特達於聖明之世非其先務善施仁積累之厚有以致之乎繼自今袁氏子若孫覽斯譜者尚究之吾之所從出與吾之所同出以勉盡夫孝敬親睦之道且力學務徳以圖益光其先如秉常今日而又加盛者庶幾不負作譜仁其族之盛心是為序東里續集巻十三
