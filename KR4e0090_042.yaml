body:
  text: 東里續集巻十四明楊士奇撰序讀杜愚得序李杜正宗大家也太白天才絶出而少陵卓然上繼三百十一篇之後盖其所存者唐虞三代大臣君子之心而愛君憂國傷時閔物之意徃徃出於變風變雅者所遭之時然也其學博而識髙才大而思逺雄深閎偉渾涵精詣天機妙用而一由於性情之正所謂詩人以来少陵一人而已世之註杜多矣淺者或陋深者或鑿不足以究杜之心㣲辭奥義盖有汨而不白者焉虞文靖公集取其近體百餘篇為之註盖得杜之心而長篇短章闗乎世道之大者未徧及也剡單復陽元用志於杜而不足於前註遂以所自得亦為之註考事究㫖必歸於當其疑不可通者闕之凡十八巻名讀杜愚得簡直眀白要其得杜之心為多陽元洪武中為漢陽湖泊官謀刻以傳未有所遇而卒武昌丁鶴年重其書從其家求得遺稿欲成陽元之志又未有遇前三十餘年余過武昌鶴年以屬余及張從善余時未暇録而心恒不忘比與訓導嚴頥語及之頥曰江隂之善慶兄弟清尚務義喜為詩嘗刻當時名人所作以傳此其無難者遂求從善所録本証之不數月頥書来言刻完求序何其成之速也事固各有遇然今之遇如善慶求十一於千百不易得也論者謂杜集詩之大成以其兼備衆體也文靖亦言學杜則無徃而不在善慶斯舉非徒不泯陽元之用心其於學杜者有助益焉遂書為序杜律虞註序律詩非古也而盛於後世古詩三百篇皆出乎情而和平㣲婉可歌可詠以感發人心何有所謂法律哉自屈宋下至漢魏及郭景純陶淵明尚有古詩人之意顔謝以後稍尚新竒古意雖衰而詩未變也至沈宋而律詩出號近體於是詩法變矣律詩始盛於開元天寳之際當時如王孟岑韋諸作者猶皆雍容蕭散有餘味可諷詠也若雄深渾厚有行雲流水之勢冠冕佩玉之風流出胸次從容自然而皆由夫性情之正不局於法律亦不越乎法律之外所謂從心所欲不踰矩為詩之聖者其杜少陵乎厥後作者代出雕鎪鍛鍊力愈勤而格愈卑志愈篤而氣愈弱盖局於法律之累也不然則叫呼叱咤以為豪皆無復性情之正矣夫觀水者必于海登髙者必于嶽少陵其詩家之海嶽歟百年之前趙子昻虞伯生范徳機諸公皆擅近體亦皆宗於杜伯生嘗自比漢庭老吏謂深於法律也又嘗取杜七言律為之註釋伯生學廣而才髙味杜之言究杜之心盖得之深矣觀其題桃樹一篇自前輩以謂不可解而伯生發眀其㫖瞭然仁民愛物以及夫感歎之意非深得於杜乎或疑此編非出於虞盖謂歐陽原功所撰墓碑不見録也伯生以道學文章重當世碑之所録取其大而畧其小故録此未足以見伯生然必伯生能為此也此篇舊未有刻本江隂朱善繼嘗刻單陽元讀杜愚得其子熊得此編又請於父而刻之吾聞熊有孝行固其克承父志歟廬陵李伯葵先生詩集序余童丱侍陳心吾先生入郡城時郡中儒師耆老多在日過從相樂李伯葵先生年最少諸老出伯葵恒獨留毎出所作詩介陳先生評余時未有知也而見陳先生愛玩稱賞之不厭伯葵出余私請焉陳先生曰衆意凡陋伯葵獨志髙古衆窘跼蹐伯葵獨舒徐有餘且其進未可量也余心識之陳先生沒余益壯而不至郡城者二十年獨時時聞徃来傳誦伯葵之詩心益慕之又二十年再見於南京相握手月餘先生雖蒼顔白顛而矩度雍容言論雅則乃其意恒慨歎前輩之逺而不能忘焉於是得觀其平生所賦益多嗈乎金石之和也瑲乎佩玉之清也邈乎興寄之逺也渾乎古意之猶存也盖先生學富而志篤意廣而才髙一芥塵俗不得入其靈臺丹府間是以其詩之昌也先生懐仁秉義蹈履以正所居郡城之北安澹適而避榮名雖其子貴顯而角巾布袍于于然入則集其子弟及鄉之俊秀談道終日或天清景和則出偕幽人貞士遨嬉溪山泉石超然自得於埃氛之表也而吉之為守貳以下欲有所問政者皆之焉以及四方之縉紳名人過吉欲有所致禮者皆之焉嗚呼吉自諸老淪謝惟伯葵先生巋然獨存今又捐舘五六年吉之士其能忘先生者哉先生蚤嵗之詩陳先生嘗序之今其子河南左布政使昌祺併集中嵗以後之詩将刻之又屬予序予蚤知敬先生而與昌祺同朝相知三十年昌祺自登髙科歴朝署出長大藩寛厚亷潔卓然名臣固先生之教也序其可辭乎通鑑綱目集覽正誤序朱文公因司馬文正資治通鑑作綱目五十九巻大書為綱分註為目其書則孔子作春秋之義以正人心植世教有助於治道者也分註既詳而其言與事或出於深僻有非淺尠所能遽通昔王行卿嘗著集覽以便學者其意善矣然其間不無文選蹲鴟之陋亡友右春坊賛善陳濟伯載為正其謬誤四百餘事名曰集覽正誤伯載學博識端於此書致力勤而歴年多考據精切殆無餘憾有助於綱目者也其書故藏予家近陪太師英國公在史舘間論及綱目書公益深歎集覽之誤因出伯載所著公閱而是之曰冝廣其傳遂取梓行之嗟乎綱目有闗治道之書也伯載此編誠不可無者太師公勲徳大臣好賢重儒之有素而圖其不泯所存厚矣士君子有志尊主庇民之道而欲稽古以擴充焉者是編豈小補之哉予深嘉之故為序諸簡首蠖闇集序為學不求諸經為教不本諸經皆茍焉而已經者聖人之精也不明諸經則不達聖人之道然世未嘗無學者惟善教者難遇也元之世江右經師為四方所推服五經皆有専門精深明徹講授外各有著書以恵来學當時齊魯秦蜀之士道川陸奔走數千里以来受業者前後相望迨國朝龍興江右老師宿儒徃徃多在學者有所依歸如南昌包魯伯傅拱辰臨江梁孟敬胡行簡廬陵陳心吾劉雲章歐陽師尹蕭自省劉允恭劉伯琛陳村民臨川吳大任何伯善皆巋巍浩博而凡有志經學者所必之焉何先生名淑以詩經名家登至正辛卯進士第授湖廣武岡縣丞會湖湘冦亂不果上時吳伯髙為江西亷訪使辟先生署從事不就雖冦禍延及鄉里而執經相從者常不絶洪武中以賢良徴繼以太子賔客召皆引疾辭他日特召天下名士九人先生預焉既至入見固以疾辭歸而從學者益衆朝廷後復遣使即其家起之時蜀獻王亦遣使奉書幣来聘盖先生以前月捐舘矣使者相顧歎息而去先生得於經脩於躬光明俊偉豈徒以空言示學者哉先生之文鏗然金聲瑩然玉潔發明至理一以啟迪人心扶植世教盖譬諸布帛菽粟之有資乎民生之實用也余家距先生之鄉數百里童子時伏讀先生程文心切慕之而不能趨拜請教稍長則先生厭世矣毎以自憾嗚呼前輩老成凋謝盡矣而使寡陋小子濫備斯文之任循省愧汗恒用感歎今年先生之孫寜國府學訓導士彦在京師出其家所刻蠖闇集屬余序之蠖闇先生所自號其退處之居也集中古近體詩二巻賦序記說題䟦行狀墓表誌銘䇿問六巻嘗見先生所著詩經衍義等書皆已傳世因念國初諸老皆有著作今獨梁何二家所著有傳盖由其門人及子孫之賢也則余於序斯文安得不益増感歎而重先生之有後哉王忠文公文集序古之為士者文行皆備而必行為之本故三代以上文最髙古而無以文名者其所本不係於文也秦漢以来士始有専以文名如或違道畔義君子不道也揚子雲劇秦美新是已若斷斷焉發於忠君愛親之誠讀之使人感激奮發希慕之不置雖去之千載猶目前然者諸葛武侯之出師李令伯之陳情是已近數百年来士多喜讀韓文公歐陽文忠公蘇文忠公之文要皆本其立朝大節炳炳焉有以振發人心者也我國家龍興之初金華宋公景濓王公子充相繼入翰林持文柄時詔修元史二公皆任總裁巋然一代之望也已而王公以翰林待制奉命招諭雲南之未下者至則以天命人心從違吉凶之道反覆開諭其人初已嚮服會有倔強拒命者公奮義死之後十年天兵下雲南王公死事始暴白於中朝然旌褒之澤未及也皇上嗣大統之五年義烏丞劉傑白其忠于朝下諏於衆而信詔贈翰林學士中奉大夫賜諡忠文於是距公之死七十年矣命下之日輿論欣快盖忠孝人人性分所固有者為天下者必表章之以正人心善俗化治道所係也其或晦於前而必彰於後者天道顯忠佑善雖乆逺不爽也傑又輯王公平素之文将刻以傳屬余序公之文蚤有聲於勝國時既入國朝首見用於朝廷於郊廟宋學士諸公序之詳矣余特録其死節事以著其文之本也嗚呼王公之死以使命盖與唐顔魯公同魯公之書傳於後雖片楮尺素人得之千金不易矧文者至理要道之所寓乎其傳無疑也公名禕義烏人死年五十有二傑所建白十事采用其九論公死事在焉其亦可為達於政事者矣性理羣書補註序天之生人賦予之均也而人之稟受有不齊上焉者得夫氣之粹而理之全此聖人也聖人之徳純乎天次焉者知其均得於賦予而有不能備夫粹且全者於是明之修之不敢違天而必宗於聖人此賢人也自孟子沒聖教不流聖道日晦歴干餘嵗其間知宗聖人者雖未嘗乏然其足以眀之修之盖尠迨濓洛諸君子出然後聖人之所以為教者晦而復眀學者始瞭然知正道之所在而有所依據向㣲濓洛諸子相與眀之修之用示法焉将世之學者日趨於異端無所底止而安知上宗聖人以歸於正哉故欲學聖人者必自濓洛始昔我文公先生嘗輯周程以下諸君子嘉言懿行作伊洛淵源録後来熊端操又著性理羣書盖因文公所輯而益以司馬文正及文公先生之言行熊剛大從而為之句釋無非以導學者於正也比年吾友吳君敏徳又為性理羣書補註而於端操所輯間有損益於剛大所釋頗見更定各有攸當焉而於義理之原講學之方大要具矣夫聖賢之言一理也古今之人一心也學者於是編成因前古以求諸吾心稽徃行以務諸吾身篤信而允蹈積累深而涵養熟雖由此而泝濓洛望洙泗未有不可馴致者敏徳之所望於學者逺且大哉敏徳學端而識眀志篤而行莊所著非止是編要皆端本澄源之意也其集解文公小學上初御經筵即録上進敏徳歴官臺憲至左副都御史肅清之暇又輯前代名臣諫疏以勵其屬昉年七十即引疾退吾嘗論敏徳古道古心盖非今世所常有者故因此編而并及之醫經小學序醫學肇於三皇至周六官有醫師掌醫之政令所以衛民之生也歴代眀於醫者皆有著書去古愈逺後生晚出徃徃不究宗㫖甚者於脉證隂陽表裏經絡運氣之說一切懵然惟執前人一定之方以待病者用覬幸於萬一而使斯民不幸不獲保終其天年者盖莫甚於今比者憲臣有言請於邑里建學設教庶幾免人於夭閼雖一時格於廷議然其發於惻隠之誠實切民用也徃年副都御史陳公有戒刻劉純所輯醫家玉機㣲義以為施治之資矣又欲為施教之資也并刻純所輯醫經小學以傳其書首本草次脉訣次經絡次病機次治法次運氣凡六巻一本於素問靈樞難經及張仲景王叔和至近代劉守真張潔古李眀之朱仲脩諸家之書撮其切要綴為韻語類稡以便初學本末條理眀切簡備醫學之指南而端本之書也凡善學者皆務本况醫人之司命其可昧本而茍乎哉學醫者誠能熟究是編融會於心将所行皆正途所用皆正法觸類長之於嵗論十全何有哉此書非劉氏莫之為非陳公亦莫之傳學醫之幸生民之幸也純字宗厚吳陵人其父叔淵仲脩之髙弟授受有自云新編葩經正鵠序國家取士以經術為上士之尚志者務以經術進經者聖人心法之所寓而出治之本也士不通經不適於用故三代而下用世之士於事君治民功業偉然可紀者必出於經術而明經不易矣即詩之為經其言優柔㣲婉其理精深藴奥眀之必得其要也而非得其方豈得其要哉梁君本之佐教筠庠時慮學者於精深藴奥不易入也偕其内弟陳賞取朱備萬所為解頥何伯善曹居貞所為主意林泉生所為矜式篇别而章附之合為一名曰葩經正鵠使學詩者讀之大要瞭然無復他岐之惑誠亦三百篇之指南也梁君嘉恵學者之心可謂深矣筠久不薦經術士本之来職教而後筠之學者選鄉貢選進士科不乏焉是書之利於人也亦既有效雖然商周以来所以正心修身齊家治國平天下之事與夫上下之間其行事之是非皆見諸三百篇之中而自漢以下言其㫖者至多也至宋朱文公始折𠂻歸一焉此書又眀文公之㫖而會其要者也士誠能因其書以求其要能求其要以察其心能察其心以眀其道之是非而由之戒之則於貴賤内外進退隠顯無所處而不利豈獨利於文字進退之間而已哉此又讀葩經正鵠者所當知也本之将教論溧陽探其囊得之讀之躍然以喜本之求余序之故為書其簡首恒軒韓先生詩集序恒軒集者越山隂本常韓先生之所著也其先相之安陽人宋司徒兼侍中贈尚書令魏國忠獻王之一十二世孫建炎間韓氏以勲舊之門扈從南渡因家于越迨今為越之山隂人先生少有大志行誼素聞於鄉先生之尊人叔英先生嘗遣從鄉之諸老㳺時則有若趙公本初劉公昭父王公思敬錢公子予吕公中立先生皆逰學焉洪武初遇科舉法行先生謂功名可引手取乃刻苦為舉子業雖初寒暑雨手巻不釋廢寝忘飡致成痞疾後有司屢以經眀行修為薦俱以病痞辭遂家居教授以淑鄉之晚進築室一所扁曰恒軒陶情養性其間日以吟詠為樂尤篤意教其子陽以纉先業先生生平吟詠甚富五七言律長短歌行字字句句悉中矩矱縁情序事温厚清邃所謂發乎性情止乎禮義之作也歟奈舊稿回禄之餘所存止此可勝惜哉先生雖物故子陽以永樂丁酉鄉貢進士職訓蘇松二郡學及教諭潤之丹陽所至能以師道自立用太常卿吾友姚君友直薦擢拜監察御史亷重剛正克振風紀中外皆知之今觀先生所著詩温厚清邃而忠君孝親之心累形於篇什之中由此亦可知陽居官行事之善未有不本於先生義方家學而致然也兹以詩集請序遂書此弁諸首云西廵扈從詩序宣徳甲寅秋居庸之外懐来保安宣府萬全皆大熟上慮邉人安於足給而忽警備也乃九月甲申車駕親廵飭之詞林從者士竒勉仁宏濟徳遵士竒年七十特給輿卒二十人而道中氣候清和動息舒徐號令嚴肅行者不勞居者無擾間駐蹕平曠命将士飛放馳射用閱武也是月丁酉至洗馬林盖去宣府西百八十里洗馬林者舊名蕁蔴林語襲訛也時北邊阿嚕台之衆為衛拉特摧敗狼狽假息塞下左右從臾希合之臣多請掩捕之者上曰朕知飭備耳困人於厄非王者事不聽從臣中士竒為最不習兵事間以文事承顧問而寵遇恒均一夕召問士竒卿數日馬上亦賦詩否士竒惶恐叩首上慰勞再三既班師十月甲辰至北京扈從徃復裁二十日其間情之所至亦時見諸賦詠凡得小詩若干首記憶前五年從廵邊至宣府徃復二十日在道未嘗不寓興於詩而以今視昔年益邁氣力益衰詞意益鄙陋無足采特以其發於一時之扈從而将来亦可考見嵗月故遂録之而不棄云玉機㣲義序都察院副都御史姑蘇陳公有戒奉命鎮撫陕西仰體皇仁躬勤蚤莫蘇息彫弊民用嚮安遂飭邉疆亦既完固時有餘暇其恤人之念未始或忘茍可利之為之恐緩間遇醫家玉機㣲義一編謂可以濟人捐俸僦工刻以廣布於是布政郝公珩王公敏合其同官志在施濟者率效協助焉既成郝公以求余序此編集於會稽徐彦純吳陵劉宗厚續有増益皆眀于醫者凡五十巻門分類集於論病因證治條理粲然既詳備矣夫醫家神農軒岐伊尹及秦越人張仲景之書萬世所宗不可易也歴晉唐宋代有名者近代張元素起北方盖得神授深造閫奥再傳李眀之三傳王好古南方朱彦脩得私淑焉遂為醫家之正派彦純宗厚又私淑彦脩者也論者謂元素醫家之王道盖王道以養民為本元素之法厚脾土為要此知本之務也是編主素難金匱及元素一派之㫖若諸家治法不倍此者亦旁采而附益之雖中醫執此施治可以成功如病者有能知之亦必不為庸醫所誤其所濟利豈小補哉醫者聖人仁民之術也有戒諸公於此編協志以廣其傳盖其不忍人之心所不能已也将其不忍人之政詎可涯歟滄海遺珠序詩本性情關世道三百篇無以尚矣自漢以下歴代皆有作者然代不數人人不數篇故詩不易作也而尤不易識非深達六義之㫖而眀於作者之心不足以知而言之蕭統之選古髙適姚合輩之選唐下逮宋元亦各有選其采之不詳選之不當皆不免於後来之譏盖選之不當者識之不眀也近代選古惟劉履選唐惟楊士宏幾無遺憾則其識有過人者矣我國家文運隆興詩道之昌追古作者選録者不啻十數家然惟劉仔肩王偁所録為庶幾焉仔肩過畧偁録雖精且詳而猶未免於有遺也都督沐公以其所得名人之作擇其粹者通古近體二百餘篇皆前選所不及者名滄海遺珠将刻以傳屬余序余閱其詩大抵清楚雅則和平婉麗極其趣韻瑩然夜光眀月之珍可愛可玩而可傳也有以知都督公之識之眀矣公字景顒黔寜王仲子方以忠謨宏畧佐兄黔國公為朝廷鎮撫西南一方而綏靖餘暇適情吟詠以及斯事非兼文武之智而能之哉然今好文之朝天下之廣制作之富有遺而可録者未必止此此殆其權輿者乎法書志序余素簡澹無他嗜好獨好文籍及古法書然法書佳者於今極難遇間一遇之非特其力不足以致亦不欲以已之好移人之好也而先生朋友有知其意分其餘以遺之者輙喜受之不辭故余所得者皆世之所有而世所嘉者率不在余也間以所得自周以来篆𨽻行草之書百二十本各志之而稡為一巻名法書志云文籍志序夫所貴士者能盡道焉耳眀道必自讀書始經聖人之精也史備行事之得失諸子百氏有醇焉有駮焉審其是非邪正以求至當之歸其書皆不可以闕也吾先世藏書數萬巻元季悉燬于兵吾蚤有志乎學而孤貧不能得書稍長事鈔録無以為楮筆之費則徃徃從人借讀不能數得年十四五出教童䝉頗有所入以供養不暇市書也弱冠稍逺出授徒所入頗厚始畜書不能多也及仕于朝有常禄又時有賜賚節縮百費日月積之一為収書之資歴十餘年經史子集雖不能備頗有所蓄視吾先世所藏千百之十一視吾少之時可謂富矣夫人於其所好勞心苦力以求得之必将謹護珍襲不至於廢壊逮傳其後之人未嘗知得之之難盖有視之漠然不以留意棄之如棄瓦礫者矣吾懼後之人不知守也凡書具志吾所以得而勉其所以守盖昔人愛一草一木猶戒子孫以勿壊矧書籍聖賢至訓之所寓乎敬之哉且積書豈徒以侈座隅充箧笥而已必将講讀究眀務得之於心而行之於身也司馬君實謂積書不若隂徳以子孫未必能讀彼非有激而云然乎不然其待乎後之人者薄也吾不以薄待後之人也勉之哉牧齋詩序陳子韶名其藏修之所曰牧齋盖取孔子賛易卑以自牧之義自勉也其妻之弟翰林庶吉士蕭省身在京師求諸縉紳賢士為賦之以余知子韶屬為之序余徃年讀書桃源山中與子詔還徃子韶愿謹恂恂務自韜匿未嘗采榮釣名也或徒觀其外以為巽耎縮朒如不任者而其中強執確然不可奪家貧教授以為業雖所入不腆裁給寒暑朝夕然懙懙安舒自得視千駟萬鍾不足與易者然吾於子韶有可慨焉者陳氏自五季来遷泰和四百餘年之間詩書簮紱輝映先後屹然為邑鉅族其後之人有如子韶可謂不辱矣且泝子韶髙曽以上至于始遷之祖其流派彰彰著眀鄉人長老皆能言之而今譜陳氏之族無録子韶焉者陳氏之後世賢者固多也若其不賢於子韶亦未必不少是譜得子韶不尚有重乎為子韶重輕固不繫譜之録否第為譜如此果可謂無憾乎哉而子韶未嘗以是尤人曰我之行殆有忝於先乎益敬修不懈於乎子韶所以自取乎卑牧者豈徒載之空言而已世之託仁附義以為名號卒之所由判然如薫蕕晝夜之相反者其視子韶為何如此冝縉紳賢士之為之賦也賦或頌或規不一其㫖要皆有以發子韶之意故為摭其行實之槩以為之序使讀詩者得以考信云爾志訓堂後序吳興章自眀甫其子善洪武中授茌平縣典史自眀甫寓書訓之娓娓千餘言於持身蒞政事神恤民敬長親賢之道備舉而曲盡盖不徒可以賛治一邑而已也愛之深故言之詳知之眀故言之當即所言以考所存自眀甫其賢父乎善拜受父訓掲于堂中旦夕省覽以圖無忝及自眀甫沒善歴茌平令數進其官今為刑部郎中為人闓敏恭慎而拳拳斯訓所至掲諸堂恒若其父之臨乎上而始受命也善其賢子乎盖親之徳與天之徳同一仁也儒者有言事親猶事天受天之命以生猶子禀父之命以行君子畏天命而不敢違猶孝子敬父命而不敢悖故敬父即敬天也則自少壯至老至終其身可有一息之或間乎古之言孝者必曰曽子其戒慎惕厲之意必至啟手啟足而後免善必務於此哉善以志訓名其堂縉紳君子為之序為之記矣又以屬余序余既嘉之又願望之未已也為書于後善安堂詩序吾邑劉文復和易惇信而重氣義鄉人士多樂與之交今年来京師京師士大夫亦多愛其為人知其家有善安堂為之詠歌文復以屬予序予念童丱時識文復其家在縣城中其時城中有騁私智欺愚弱致厚貲者髙堂重屋歌舞絲竹歡樂之聲以夜繼晝孰不自意可以終其身及其子孫於無窮哉而文復與其兄存禮謹謹自守不敢茍求所欲於理分之外日以奉親為樂作龍洲書舘延師教其子所資非饒裕而仰事俯育之餘以濟貧乏不靳也迨予弱冠求向之盛富而極樂者忽然若烟消若澌盡無復遺餘而文復一家之内父子祖孫兄弟孝敬慈愛天倫之樂視昔弗替而益加也豈非所由之道安危之異哉夫人置其身其家亦若置器焉置於安亦安於危亦危為善者置安之術也書曰作善降之百祥易曰積善之家必有餘慶善固天之所祐也其後文復之父至八十有八母八十有七其兄弟皆垂白無恙其子長而知學斯其得於所祐者然歟故書予所見者於諸賢詠歌之首使讀者知為善之必有徴且欲安者當知所擇術也崇孝堂序江隂朱熊惟吉性至孝母嘗疾劇叩醫巫皆不效熊痛迫罔措或言古醫書有人肉治棄疾之說即露禱北辰自刲股煑液進母者再母食之疾愈宗族鄉黨稱之無間言翰林檢討陳嗣初先生聞而嘉之名其事親之堂曰崇孝崇者盖将進之於道也既為之記又為書道熊来見亦欲予一言進之夫刲股在吾儒有不足焉者盖謂聖人之教所未有且慮至於殘毁而傷生也夫殘毁而傷生冝見黜於名教然論人者亦究其心之誠何如耳父母吾身之本也父母危殆将絶是吾之本将絶而暇計吾之身哉盖於是時父母為重身為輕矧事迫計窮無可奈何之際雖捐生有不顧其心固曰吾之身受諸父母幸父母之安也捐生所甘心焉矧人肉治疾著在醫家書吾於父母而可以已乎矧刲體未必皆傷生乎故刲股為世所嘉者亦諒其出於愛親之誠而儒者眀道以正言則立範垂世之用心也而用恕者庶幾可以無訾焉熊之誠孝可嘉然而君子之孝非止乎是也孔子語曽子曰立身行道揚名於後曽子動求諸己自日三省至於啟手啟足不敢忘孝曽子之學者亦曰一舉足一出言不敢忘父母慮辱其身羞其親皆君子之孝也君子之道務其逺者大者熊朂乎哉奉養之暇力探前言徃行而躬蹈之以稱陳先生名堂之義哉且吾聞子詩禮故家也今子之世父父皆惇行尚義亦冝子之嗣承不隳也熊朂乎哉遂書以為崇孝堂序沙村江樓詩序沙村江樓者鄉先輩劉伯川之所作也沙村在吾邑之南山水深邃幽僻之處四方徃還之迹所不及而劉氏世居之伯川劉之秀而文者樓據沙村之勝傑然而特出鄉名卿鉅老皆有賦詠紀述歴世變故伯川沒無子簡牘散逸無存而樓亦久仆其從弟伯塤今即故址復作之伯塤能記憶劉尚書子髙故所題樓中長句及所寄伯川近體之詩間於翰林諸公誦之諸公聞尚書江樓詩皆喜而繼作者曽學士而下若干人伯塤併稡之以求予序樓始作於伯川余雖不及見然觀伯川可以知之伯川先公同門友嘗聞邑老言其家甚富於崇儒禮士汲汲恐有所未盡元季兵亂攻剽充斥民奔竄深山窮谷不能保一時率視沙村為王官谷而邑之士大夫挈妻子走依伯川伯川傾倒迓迎舘榖之不使有幾㣲羇旅之意益久不厭凡依伯川者皆如家焉尚書所寄近體盖謂此也伯川平生輕財如糞土年四十尚有田數千畆一日悉散予其親戚閭里又散遣臧獲獨與其妻處弊廬數楹僅蔽風雨而旦暮饘粥休休自得也平居不與俗人接然善觀人且喜奨掖後進士竒年十四五與陳孟潔徃拜之皆以故人子見愛是日雪霽酒酣以予兩人循溪行詠命各賦小詩言志孟潔對曰十年勤苦事雞窓有志青雲白玉堂會待香風楊栁陌紅樓争看緑衣郎予即一時景趣塞責曰飛雪初停酒未消溪山深處踏瓊瑶不嫌寒氣清人骨貪看梅花過野橋伯川顧孟潔笑曰十年勤苦只博紅樓一看耶又曰不失一風流進士顧予笑曰雖寒士當耐又曰人有不為而後可以有為其勉之後伯川卒二十餘年孟潔登第為翰林庶吉士而卒今又二十年余幸存餘喘皆如伯川言然予未能有副其所望恒用内愧伯塤自刑部主事再陞郎中相與同朝毎共論徃事追念前輩髙風逺韻不可復得今喜伯塤能繼其作樓之意也故因叙諸公之詩併及伯川為人大畧云禄養堂詩文序永新戴禮本敬永樂乙未舉進士登第登進士第者例觀政於諸司然後授官本敬獨念其母春秋髙愛日之誠不可緩也以其情言於朝冀得教職近地以禄養其親遂得衡州府學教授衡去永新不五百里即過家奉親以行到官顔其奉親之堂曰禄養志喜也縉紳大夫聞者皆為之喜或為文記之或為詩章謌詠之且盈巻矣永樂辛丑余與本敬同奉命考會試因以出示屬序焉夫士之仕也皆欲行其道上焉以事君下焉以為民而事君為民之道皆本乎事親故曰孝者百行之源行道之所先也人之愛其親固本於天性然有幸不幸焉親在而養不備及得禄而親不逮終身懐仲由之戚者世不少矣本敬雖早䘮其父而母孺人垂白康豫本敬出而與諸生談周公仲尼之道入而升堂上夀甘㫖有資承顔婉愉天倫之至樂人生之至幸得之而喜冝也士大夫皆喜為之文若詩亦天理民彞具於心者之所同也則夫升斯堂誦其文詠其詩者有不欣喜而歆羨者乎虚菴詩序河南按察司僉事吾邑劉咸士皆名其所居曰虚菴盖取易咸象之義而求益者也縉紳君子與之㳺者為文記之矣又有為之賦詠者稡以屬余序焉人之心其體本虚也聖人者全其本然之體虚靈澄澈廓然大公而物来順應下聖人者不免拘於氣禀累於物欲不能全其本然之體是以所存所由不能不倍於道故聖人之教必以虚為求道之要虚者無我之謂也君子達乎斯㫖則其心一於道而不蔽於私欲主於公而不介於物我是以天下之善皆歸之而日進乎髙眀之域小人昧焉私智自髙偏見自是以此窒乎内拒乎外天下之善無自而入日淪於汙下而不自知矣此賢不肖所由分也士皆有見乎此以之名所居而朝夕視警焉将進於道未可量也此冝縉紳君子為之賦詠歟士皆以眀經擢第今僉憲外藩朝廷之耳目政治之綱紀生民之休戚讞議之得失皆係之誠由此道而不倦焉必将有立於當時有傳於後世勉哉士皆余於士皆為執友故因叙此詩而特有所期望云東郭草亭宴集詩序聖天子嗣大寳之眀年改元正統仁義之施洽被邇遐稿者以蘇仆者以植萬彚咸暢而凡中外小大之臣咸洗濯脩飭祗奉法度天子恒昧爽朝百官親萬機既即位御經筵文學從臣執經左右講說堯舜禹湯文武周公孔子之道日恭日勵不敢怠逸乃三月之望有賜假於是講臣九人豫約郊逰以娛一日之暇是日早朝退聫騎出文眀門禮部尚書胡公適邂逅焉遂偕東行二里所鴻臚卿楊君思敬望而欣然出迓指顧道左而言曰此中可以少憇也皆下馬徑而入折稍北曠地可百數十畆環以葦樊樊之内皆蔬畦麥壠溝塍秩秩如畫中置井作轆轤引泉灌注凡種藝具有條理盖思敬别業也衆從容周覽還坐井傍栁下共歆艶思敬之樂思敬飲客嘉茗遂治具延入坐小亭亭覆以茅儉質而清雅幽邃而闓爽亭之外雜植名卉異果周垣以䕶之垣之外樹桃李杏時花盛開翛然有塵外之趣思敬舉酒樂客一叟絃歌佐之爵行無算客亦歡然傾寫皆賦詩留亭中已而夕陽冉冉薄西山思敬送客出曰願嵗以是日候從者於斯又謂士竒曰願序詩俾後之人知衆君子之嘗樂于斯也夫君子之樂豈茍焉者哉何也生民之失寜弗樂也處非其地弗樂也與非其人弗樂也今聖眀在上百職舉而群生遂海内無事可樂旦暮劬于職務而得適意于曠閒蕭散之濵以坐玩夫時物之發育可樂斯集又皆卿大夫之賢藴道徳而服詩書志合而言契靡不可樂矧思敬好客有鄭當時陳孟公之風若之何不樂哉樂而形諸詩歌樂之至也後之讀詩者尚考其樂之所自詩凡十首皆近體是月十有七日序翠玉樓詩序永陽胡孔時徃年来京師胥晤于吾友周是脩所是脩為余具道孔時之行又示以所為其家翠玉樓記槩述景物之趣而寓喻勉之意也余既重孔時為人又重是脩之愛人有道未幾是脩沒與孔時不相聞十又四年今年再見京師其恂恂慎重尚賢好徳之意加篤胡氏居永陽詩書行義為鄉郡所重者累世吾少猶及識國賔先生表然脩整端確和厚使人敬而愛也渚樵先生雖不獲識然聞其篤學務義汲汲以成就後進為己任盖孔時大父也夫産于崑山生于丹穴必為世所貴矣今之来告余曰比年士君子為翠玉樓詩多矣詩必有叙敢請時其簡留於家一見既不可得固辭不能叙不獲也翠玉者是脩取蘇文忠公詩語名之是豈専以言山水之勝登覽之樂哉其亦欲使因其言想見其人而勉之於已乎孟子曰尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也文忠公學問之閎博文章之雄邁氣志之剛正獨立而不顧百折而不變當時如黄文節其於公猶曰晚進之士不願親炙先烈以増益所不能者非人之情又曰心之所期可與知者道難與俗人言景慕如此則後之為士者欲有所立於世而求之文忠未必無所助益也是脩愛人有道其意不在此乎然引而未發也諸君子之作於詩必有及此者乎孔子曰詩可以興可以觀興觀詩之道也請以是復孔時為翠玉樓序東里續集巻十四
