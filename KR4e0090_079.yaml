body:
  text: 東里續集巻五十一明楊士竒撰家書奉思貽兄書夏中鄉人来聞尊體納福勝常良慰逺懐見相姪説家信報有䖍守之薦聞之喜極吾兄居閑惓惓不忘國家數十年長育全成之恩今雖髙年而康健不衰正宜奮勵一出見諸設施以上不負聖天子下不負平昔藴蓄之實剛直之氣也豈不増光祖考而榮被後人哉不勝翹俟翹俟邑中水後人事如何新徙居只過橋數十步而近諸兒想荷顧盼然不敢言謝者以為義之所在不可喋喋為世俗語言以取凟耳近聞親到萬安取逃民復業此誠仁厚之心夫能歸之又能安之庶㡬終惠也片楮草草乞尊照鵷以兄䘮及其妻子想皆到家老兄老嫂暮年罹此苦痛何以堪䖏在於叔姪中情尚爾何况父母要亦命矣伏惟勉自節抑毋徒過損以副吾宗砥柱之望不知卜塟何處及何時因便乞示及鵷行時便欲為作埋銘付之屬情慟不能執筆早晚發人取家小就令帶囬也此兒平生節用守慳止為買書之計死之日更無長物惟存此數巻而已幸戒諸小為之愛䕶非但致之之難其志誠亦可傷也小弟前年妄意作族譜圖刻板鵷必欲将歸已付之矣萬乞嚴切戒止不可印出族人聞之必有私求於諸小者諸小茍圖適其私情必竊印與之而不令尊兄知之千萬戒飭更煩尊兄斟酌如不必存則就毁之為便也曽囑付鵷眀春家小来時或栗或鵷一人同来冬間遣回非徒欲教之比年衰病特甚想見骨肉切於饑渴惟未審尊意何如耳伏乞鑒念久别毎一思念不能為情春和想同尊嫂納福勝常小弟頼庇在客茍安他無足道者聞長姪權厝屋後塟地尚未定鄙意只合袝祖塋但髙燥向止得利足矣其他不必深計早了得亦是一事欲為之作一埋銘每執筆輙傷心而止然今頗閑暇不久當成就寄来今發人搬取家小望㝷一穏當船附撘来留小僕夫婦守屋煩早暮提督照管屋内一應物件及愛䕶林塹盖此非一二十年長養不得成不可聽人擅取一枝一葉去也諸姪中欲令一人來此早晩得暇教之不審尊意如何幸自裁度然計其在鄉里亦未必有益也族譜圖乞戒飭諸兒不可私印與人至叩至叩羅麻城匆廹不曽另奉書千萬致意敝居托在左右乞垂照為荷廖親家考滿来例當往北京聽選須辦彼中行李也㑹間乞拜意奕孫目疾如何須早求人療治不可因循也士竒再拜除夕先一日始収尊兄九月内書喻相塟期在十一月且促墓誌小弟得書甚懊恨即連夜作此文切恐已塟則不及納壙中也今附稾去萬一未塟煩孟旦作楷書刻之已塟則存之示後人耳此文盖屢舉筆輙心悲而罷故因循迄今雖一時草率成之然其平生前之可嘉後之可憫國家之恩老兄之志大畧皆具矣常念吾兄弟身後此事則有此姪乃今此姪以累吾輩老人不能使人不悲也又思此姪存時相聚一處則未嘗三日不見見未嘗不樂或相隔千里外亦未嘗數月不寄書相勞問今雖有姪在千里外或嵗餘或累嵗未嘗寄一書相何可得哉何可得哉寄書夲有何益但於道理人情所不當無者小弟去冬来凡五六寄書不審皆達否去秋有一家書及鈔買綿子寄天符廟前車姓人歸其後書與物皆為所匿不得薄俗如此可歎豈諸姪皆嘗寄書而亦為人所匿耶老兄當知之矣諸孫今有㡬人奕今嵗可教讀書否奐良佳亢宗當是此二兒幸甚愛䕶之聞陳考聰眀淳實專讀書不飲酒将来必長進惜吾姪不見之也常怪諸侄學問不及其父兄近聞其酒量皆過於父兄乃知人各有所長也新正人事匆冗又屬治行無暇不及别寫書惟尊照幸幸新嵗伏審尊體納福深慰思慕小弟此月十八日欽䝉上恩陞除翰林學士兼左春坊左諭徳儒者之榮至於極品顧其愚陋何以得此誠由祖考之垂慶老兄之教誨以克膺此遭遇然上恩深厚無能補報惟時賜教督以勵其不逮耳栗姪必館授如舊稷子讀書煩令用意教之今嵗甲首之役乞與安長老言之一切買辦照衆例納鈔幸免管都勾追之事盖家僮無状慮其取怨於鄉人故也行儉可以安意教授矣時能見過一督視豚犬子否幸拜意煩令諸姪録司倉伯詩文来立俟此事不過一日工夫可了而累附書求之不得此吾家子姓之賢否可以槩見矣奈何數辱書知尊兄尊嫂皆納福又辱逺致徳禽慰喜交集此間自閏月来舉家皆病甚至無執炊者三月十四日嚴氏婦産一男子而母子皆病至今服藥不效盖自到京来其屯蹇未有甚此兩年者亦惟聽之於命也家事極感尊兄綱維主張近聞小僕買車事小人之無状幸甚不必與較也小弟居官食禄今二十年君恩之重鮮與比倫常夙夜自愧材學淺陋不能補報萬分之一惟有一心清慎奉法循理庶㡬少免忝辱之譏耳宗戚鄉䣊有見過者亦未嘗不懇勸告為善毋為不善以膺享太平之福澤此小弟平生之心平生之言也近聞憲司及官府到縣數數有以吾家名干求觧事者未審尊兄曽聞之否度亦未必盡聞或云頑惰之僕亦為人所誘曽到林公前矣此事未必尊兄不聞也有便千及示下為望大抵人家有徳義者可恃有顯要者不可恃目前如元塘之錢學堂之蕭皆恃家有顯官傲然為非而不顧致不測之禍豈非殷鑒幸尊兄以此廣教戒之也小弟自去秋来病日益加目日益昏一子又懶惰不學心常鬱悒不舒每受一事轉盼不復記憶盖老病憂悶如此也臨楮不覺乞尊照不具久不奉書七月末有种子之殤自此慟悶不已舊疾頓加公退後不復拈弄紙墨也此兒因在隔壁曽本清家讀書為其家不肖惡子以毒力戱弄之致疾時其母病不及與之治療兩月後積為氣塊及請醫治又皆誤認為蟲積用藥近八十日不效而愈甚又别請醫然後知其為傷損所致非是蟲積而已用藥不得遂灼艾已遂灼死生死雖有命然此不能不歸咎人事也此兒甚淳篤雖幼屹然有巨人志不肯處汙下聽受教訓服膺不忘孜孜貪讀書務上以此甚期望之且小弟素常痛惟先諭徳公生父生母一脉中絶故聞此兒初生即昭告祖考以承其祀庶續本房一脉今毎念此事豈能使人不痛恨也此固小弟不徳所致夫復何言一長者愚惰畢汚不肯嚮學對之但増人懊惱耳日来况味如此但覺自己氣脉轉索然何時一見話此中曲吾家後来門戸吾滿意望奕奐冝及今早留意也家乘已達否因便乞示下更乞戒栗鵷寶蔵之遇親戚及斯文友朋眀信忠厚者可以一觀不可泛泛示人也尤戒之不可借人盖薄俗可畏也雲亭已到家未渠行時有病今如何乞示下此甥雖質魯讀書不前然為人淳實本分所為皆當理鄙意甚念之也片楮草草不多布康甥来承賜教帖所以敦勉之意謹服膺不敢忘彭昻歸曽奉寄畫像必已徹達家乘已久完但欲自作一序未有工夫及作一匣盛之漆未了故不得奉去城外舍下無人切煩垂照栗鵷今嵗教學否艮被累在江西不知何時得觧脫渠平生不肯務學今作生員又如此虚過嵗月可惜可惜鵷寄信来索小四書今附一本歸諸孫讀書如何稷子資質頑鈍加之懶惰無比小弟病體又有公務常無暇其在此一年記書寫字皆不如在家時逺甚亦付之無可奈何之域矣奕奐可以此為戒也奕聞議山東王宅婚不知是誰房下還是老姑婆之後否然聞王宅今為人皆本分可相處大抵今後諸孫議婚只須求老實本分人家不可論貧富凡窮秀才窮庒家但有徳行便是好人可與為親惟衙司中人則不可他日漸染来壊小兒子心術也且吾家先世祖父皆未嘗有與衙司中人為婚姻者盖亦是此意也片楮草草乞尊照不悉不悉冬寒往来者具道履况納福深慰下懐小弟處各頼庇茍安但家人多病幼兒數口隔逺旦暮在念無好懐抱耳亡妻未有塟地甚感老兄及建平弟彦實用心之至何以報徳也楮園之地極蒙德剛兄弟厚意然此欲以奉厝先父却待小弟歸整理亡妻必用别圖此在老兄一主張於祖墳傍近附塟為足更不煩瀆也今欲令稷来謝恩就攜一男二女皆来而附載百錬徳遵之舟亦煩老兄主張也諸兒来後新婦數口在家無得力人煩老兄老嫂時時一見過垂照也久不奉書惶恐惶恐栗来承教帖知老兄老嫂皆納福兼承嘉貺感慰交并小弟雖旦暮勉强支吾而體力益衰視聽益損舊病日加重惟以君恩深厚不敢圖便其私也濠下祖業稍稍復舊皆頼老兄之庇然祠堂家之所重迨今未復寝食不寧已有書與稷及有附物令急復之亦有書與復環之子具道所由茲事須得老兄主張不可以緩然亦須令渙得所而後遷庶㡬以盡敦睦宗族之義叔粲叔車回小弟已有成説託之矣惟老兄裁之初欲留栗就北監冀得早晩切磋之渠必欲南行盖茍且頺墮積習成性甚可歎也渠既如此諸孫之學又不審如何老兄固髙年然此事不宜置度外也稷秫尤望教督之不踈外之如祠堂已復望遣稷送其母来片楮草草乞尊照不具久不奉書盖公務所縻而晚退又目昏不能作字故爾因循然慕戀之私未嘗忘康進士来具審尊兄尊嫂皆納福慰莞無涯諸姪生意津津可喜但未審學問如何稷在家煩教訓之使不入小人之伍千萬千萬秋冬史事畢必請告侍教不逺惟冀若時善調以副所仰不具公緒行曽奉書計必達比聞尊兄尊嫂皆納福殊慰逺懐初聞奐生子大為之喜昨又聞奐婦喪又為之惱懐見家人説此婦恭遜和柔甚能事長仁者不夀傷哉傷哉今法度清眀吾家子弟宜依本分治生理公門不可干求小民不可凌虐惟老兄幸教督之耳小孫處乞發落諸姪照管進士皆撥觀政凖在禮部孟勤崇本兵部晅湯刑部序在工部皆安好小弟所欲言者前書備矣兹不贅凟伏望留意稷姑留在此未便遣歸併報知之欲公緒到家後即行望以鄙意道之也三月二十四日晚燈下草草書奉久闕奉書不勝懐仰比悉尊候起䖏納福甚慰甚慰小弟近扈從廵邊厯漁洋出塞數百里往復一月頼庇平善但天恩深重補報無能夙夜為愧耳諸姪學問長進如何奕奐如何聞旅一子極篤實五月失之甚為悼惜吾宗近来好學者絶不聞有人大是可念而豚犬子不肖比為羣不逞所誘又是可憂也煩老兄力為主張杜絶其往来惟尊照不具與賓畿弟書十一首前日善樂回曽附數字想已到前時見説欲往廣决不可行此時瘴癘方作也當愛身照家為上不可輕易近在書舘中㑹一葉先生是淛東人亦欽保来編書此公原充武功衛軍後調甘肅䕶衛與老父交最久誼最深甚能説詳悉盖是二十八年十一月棄世塟在甘肅城南塟時此公親為治喪又説羅憲初到彼百無一能後来逐漸觧事頗有収拾此公則二十九年得代歸遂不相聞矣又言老父在彼極貧薄然剛介毫髪尚不肯茍但患痔漏者十餘年苦楚不可勝道其後亦竟以此疾方不起聞此慟恨可量兹因日孜行故用報知吾弟也劣兄在此大畧粗安無他所急乏者人力耳有便望發羊生仔来應朝夕用𦂳望𦂳望不多布彦晦来得一敬兄及吾弟書始知已達廣州前時章洞然歸曽附數字力止吾弟行以為人事如此不宜逺出計未必曽見即見之恐迂闊之言亦未必能見信也然得一敬兄同行亦庶㡬不足為憂矣客中凡百和厚敬慎保身為上㣲利不足屑屑計也眀春便圖早歸區區将有所望焉今編纂成已奉㫖送吏部定奪三二日恐有除授未知何向挈家之託惟吾弟是頼幸不久淹瘴鄉耳一敬兄命索竹林詩文未即離京師當為成之匆廹不及另書奉復千萬致意前有書託賀舍附鄉人回想必可達陳情之事都府移文陕西都司開伍工部移文江西布政司止留皆已發行想七月間方轉行至泰和也卑兄才識甚淺陋在近侍今九年無寸補於朝廷仰荷國恩深厚廣大天地父母無以過此吾兄弟及子子孫孫當何以上報也賢弟既免逺行便應祗守墳塋不可逺出不然非但無以慰先靈於地下實上負於國恩天地鬼神豈可欺哉更須削跡公門交處良友既可養徳又足遠害切宜慎之吾弟雖未嘗有此失然猶不能忘言者兄弟之情也都府文書六月末必到永昌却不審憲弟動静如何近見晚成説在福建被事若有消息可急附報来也聞此弟有妻子在彼衣食儘不乏未審其於鄉里之意何如耳今幸吾弟在家梁村田租萬望視為己事借數日之勞徃彼整理盖所費如此經五六年未嘗得顆粒之用其孰能堪之今秋必須筭結眀白早晚求的確人或發小僕将租簿来也子瓊盖不可以其貌信之㑹間可就示以此書孟潔病氣瘰至今不减而亦不甚介意盖愛身不及於愛酒銜盃常多於飲藥之時也此非他人之言所能入必待老舅母至然後可以嚴約束也學詩先生前煩拜意别来取踈外甚負罪承委作傳稍暇即納稿不敢以鄙陋辭也草草不盡言羊生仔回有書備悉下意想已到但曼子回至今無一字示報頗為懸心鄉里来者甚多又不久然問之皆不知豈吾弟常在外故不及寄書不然是意中恠其不當遣回耶此子到家宜早整救勿縱其爛熳也今冬或来春欲遣家人回使涉知立家之事升合租糓皆望吾弟整理遣回之僕絶不可信付近日臨行發出大弊在叔蒙面言之可為戒目下欲求一居得幽雅好隣為上不必廣大亦在吾弟為之相度前時與晚成説者此處盖好但不知他人意下如何也憲處近曽附書去人回尋問不得恐其尚在福建也若知的消息可見報開伍文書已久到衛矣吾弟在家無他囑但望不造公門不管閒事此為保身延福之本切不可将自身作人情也憲弟妻子此月到京得信立及萬中家小歸就附與同行到家宜加意撫䘏勿令失所寡婦孤兒行八千里陸路至此又行二千水路到家可謂甚難吾弟宜念憲二十餘年軍中艱難又客死逺方今見嫂與姪如見兄也啜粥飲水甘苦同之一子勉令讀書将来扵賢弟必有助益二女擇鄉間本分好善及過活從容者與之然須得子弟長進者方可善自主張憲婦亦自能事必非久累賢弟者同居之際必自體䘏若一付之他人必有不及凡人兄弟無有不盡情者多縁妻子以生釁隙鄉里比年此事紛紛雖吾弟友愛深至臨事眀决必然無此而我惓惓不忘斯言者亦區區之情也千萬照之齎回文引到家便須繳回聞静端妹病篤為之懸心今安否如何有便見報也此間事憲婦能詳楮筆不贅不相見十年豈勝馳情不審吳淞歸後動止何似曼有消息否今遣稷歸凡百以卑兄之故教訓教督之不使辱吾父母即吾弟之賜也吾弟自今亦宜少出以理家務為上老兄之所欲言者詳在康甥面達亡妻之沒承鄉里親朋厚意不敢忘不敢忘公冗不得一一奉書致謝煩吾弟悉為致意自得南京十月初四日一書後遂杳然不審何時到家聞曼有消息不審的否因便皆望報知前書托問吾家事懸俟詳報所喻四兩三錢者就以相奉更不必言還稷秫望以同氣之親教誨之為好人更不可似前時冷眼傍觀也獨孤所録文字今附去昇在此從師讀書只是懶惰可怒耳匆匆不悉老兄冬来舊病頓加服藥多不效四肢百體皆痛然不敢斯須偷安情况可知矣所囑吾弟吾兒勉力為善人守本分不可於分外惹事也切告切告近兩得書多感見念且知吾弟履况之安良慰老懐前聞将有山東之行吾弟今年六十兒子已長居止已定正宜安静以適暮年豈當碌碌一身朝齊暮越動渉萬里而不知止血氣既衰戒之在得切宜反躬思道不宜弊弊以利役志也教子一事最是𦂳要聞昪天資甚好徳安公忠厚之報或者在此教之有成未必無利勉之勉之寒家二孫煩照顧諸僕不律更乞料理不宜放縱也只為豚犬子在鄉好利忽義獲罪鄉里不敢遣歸家中須頼吾弟照管也昇亦無大過吾察其心旦夕惓惓念叔不已兄子猶子毋以我故而遂外之容有未是處亦恕之可也度嵗来逺想吾弟安適爲慰遐思兹因郭僉憲行奉尺楮以代面訊稷未便遣歸家事煩吾弟照管康甥尚未試去取未卜亦聽其命聞昪喜學為人亦識道理徳安公忠厚之報或者在此須加意勉其讀書也讀書須求眀師鄉邑無以過二梁者吾弟愛子須破慳始有效也昇在此亦不廢讀書但資質鈍却類其父也如見劉壻煩勉勵向學無墮流俗也陳年所遺孤寡幸以舅氏故頻顧盼之康姑丈㑹間多致意奐與稷来皆承惠書多感多感吾兄弟念今皆老而士竒七十有一尤爲衰頺此理之宜然無足恠也但寒家尤頼賢弟垂照度在至親必不見拒也昇兩年来惓惓欲歸省叔盖自渠誠孝之心念叔之髙年也但以此中左右無得力人故未遣之今得稷来渠之歸省之心益切俟凍觧春和令與蒋壻皆挈家歸也因便先此奉報見稷説賢弟欲析一分産業與昇視同昪昻此又出於賢弟孝友之篤豈獨士竒之喜徳安公與賓㢘弟雖在地下必見鍳佑而吾弟百嵗後銘文行述可紀之盛徳也又有一事奉托往年稷與陳年曽約為婚姻而未有定論今其孤女是兒婦撫養吾不敢忘先妣之好賢弟幸主張成之為叩亦煩達之止齋族長也屢得書及遇鄉里来者具悉吾弟安好甚慰逺念毎念吾弟今年七十有一吾今七十有八皆人生所稀見者然人衰老宜更自愛重其身治痰氣之藥須常服劣兄無一日不服也向者昇所附回藥方甚好宜求精於製藥者常服之善自調養之外教誨諸子向學交處正人善人不可墮落流俗也時過吾家教稷亦以此語吾弟切勿外之也過東門見諸姪亦兾以此告之康宜清評事歸曽寄書必到昇姪八月二十四日至此早晚甚得其力老人遂大省懊惱自度暮年須得此姪在左右吾弟能惇兄弟之愛則當輟以見授也煩與荆婦言之用意照管昇婦眀年須㩦稷婦昇婦皆同来盖稷夫婦住三五年後遣歸昇則留扶持老人也甚恨與賢弟别時忘言一事蕭所芳所占井至久不還祖宗之物吾終不敢與人已有書訴之思貽兄長詳悉備矣煩吾弟面與所芳一言誰家無祖業望早分付為感盖某平生不敢分外占㨿他人一毫况所芳亦是親戚吾豈敢輙為非理之求哉越理妄求吾所不敢但所芳亦須存此心不可失親戚之歡耳今不遣書令稷整理者盖慮其年少不曉事激惱親鄰耳吾弟是所芳兄弟素交思貽兄是其外親幸相與周旋眀白得復吾祖宗之舊感徳不淺也片楮草草望留意不悉示旅弼鵷艮書二首吾在京師十數年朝暮得汝兄在左右相慰藉汝兄數年来徳行文學皆大長進而一旦止此命也然吾未嘗一日不思之傷心思汝兄不可得則又思汝等兾汝等長進皆如汝兄也汝有父母不能来然吾之心未嘗一日忘汝也聞汝等為一善事即喜極忘寐為一事不善即痛切扵心誠以光紹吾之先業以傳之後人者在汝兄弟也汝兄弟何可不勉近日聞汝等析爨傷心傷心父母在上汝等忍而為此何事不可忍為矣此非但我為爾傷心不知汝兄在地下當何如憤惋也汝嬸来説此父母之命非汝等所欲然以吾觀之必汝等各自為心不肯恊心老父老母無可奈何故為此不得已之舉凡異爨者必異心老父老母見汝兄弟異心雖日有甘㫖之奉其心豈能一時安也汝等皆號儒家子又出為人師豈可便為此事且聞造屋尚未完結今兄弟三四人不齊心協力了落豈猶欲以此累老父乎更相閣數年不能了落上則孤負父母為子孫之盛心下則貽笑於鄉里矣勉力勉力切不可因循過日也凡人一家之親有先後輕重有父母而後有兄弟有兄弟而後有妻子不可溺扵妻子之愛而失父母兄弟之心尤須用心力學擇交友謹言語為保身之計凡人財物得失聚𣪚亦係乎命旅近遭刼盗此在旅何足深惜乃至於失意無措在諸弟亦豈可不憐旅哉不審汝兄弟於我之心如何但我切切不忘以此言告汝者重是祖宗一氣至親亦望汝兄弟他日以此言告吾之子也汝兄弟早晚家居無事時移步去督視羊生令勤謹生業不得放懶更發落他和睦隣里不得無状生事叔之家事即汝之家事不得落落也有便常寄書来勿羞不文也吾二月来一病㡬不得與兄弟子姪相見仰荷朝廷厚恩賜良醫藥今平安矣然中心無限欲言思汝兄弟一見何時可得徒切此心耳人来聞老兄老嫂皆納福深慰逺懐又聞旅專意治耕業真生計最善者也為之喜而不寐弼復教學尤為可喜但有暇不廢自己工夫則善矣若於今少壮不勉力過此不能有為此吾所躬蹈者今雖悔無及可為至戒也又聞鵷專任今年里役平生為人本分必不生事以貽父母之憂矣然須勤慎以公務為重但早了得公務則自己亦安樂有暇亦須自進學人若只是本分而不讀書曉道理塊然如土木偶則亦何用勉之勉之聞艮入縣學有志務尚誠可喜若不務學問徒藉此為名惟日追逐俗流為茍利之計則又不若作一白身閑人也勉自進脩交好人為君子以光祖宗千萬千萬盖吾先世皆貧然從来清白相傳不肯茍利故出仕者皆有氷蘗聲姑舉百年内近事言之待制公著在史傳不必言如雲衢伯祖為貴谿縣丞一清如水而善政及扵旁縣為新喻州判豪猾歛迹後以直道不容於當路即謝病不屈而去退庵伯平生潔身如玉雪不妄交一人獨與羅鄧二先生厚善世號楊羅鄧吾五六嵗時與孟潔發蒙讀書扵學中時三先生皆為訓導常記一日晚煑毛豆一器酒一壺三先生同酌成懽退庵伯曰吾三人皆将仕矣如有一人不自重貪取民一錢者後不復可相見其後三先生皆仕為達官其卒也皆無一錢以遺其家司倉伯雖雜職平生凛然節操以古君子自䖏漁灌伯兩賛劇司為人坦坦平易然終身未嘗茍毫髪之利族叔起予二十四為黄陂令持身廉介篤于愛民民至今有奉祀之者吾家百年之内仕者惟此數公耳而其所行皆若此後之人豈可不思繼承之哉凡人在立志能養其志於貧賤之時而素定焉則他日出而仕也舉而措之必能不變所守矣諸姪勉之勉之無事閉戸力學謹擇良友相資益非自己有公務不可入公門不可預聞他事隨世俗波蕩以壊家法况目前成敗紛紛可為鑒戒矣叔侄至情臨楮不覺多言盖未為此事而預言之則戒之為易若既為此事而後言之則欲戒不能切不可以為老人饒舌無風説浪也聞容安及詡弟之子欲入學讀書大是好事汝兄弟須力作成之拜意朱先生陳先生初病起兼多事不及奉書後有便却專書奉叩也聞稷子從栗讀書吾甚放心幸用意教之切要戒其不得與輕薄子弟為友也奕計今嵗必發䝉且収他放心不得嚴急日讀書不必多只要讀字眀白也渠歸時病目去嵗聞尚未瘉不知今如何却用早療治也艮作急為録司倉伯詩文来更分付容安作急為録退庵伯詩文及中鄉試㑹試等文字来專望專望此事何難前後凡㡬書回只如風吹馬耳過也書示姪旅鵷艮吾離鄉今三十一年未嘗一日不念祖宗墳墓而不得一展省誠以受國恩深重無所補報不敢言其私盖不孝之罪萬萬難文又念吾貧賤孤苦時兄弟中至親至愛者惟汝父與我上頼祖宗垂佑今吾兩人皆在汝父今年八十有三吾六十有七而曠隔六七千里今二十餘年不相見每一念之為之心痛楊氏門戸日夜望汝兄弟卓立上光祖宗上光父母自今更宜加勉加勉不可混同流俗入公門惹是非凢人安静守分自是名譽好身家安勉之勉之孝事父母兄愛弟敬各盡其誠撫諸姪如子如此即一家和氣充洽自然有福矣各䖏祖墳時常帶引諸小拜掃此是重事更父母前多為拜意稷留在此未便遣歸家中煩二老照顧千萬千萬汝兄弟亦常用去照管也見桃源蕭壻可教誨之令本分依道理行事不可汲汲於利以招怨惡只守父業自足更不可别用心求贏餘也見沙村劉壻教之從師進學不可懶惰若用何書令寫信来計如肯来此進學時在後伯塤来令隨来二小女在鄉父母在外拜意老嫂乞教誨照管之為感示弼姪書想嵗底必到家侍奉老母安樂兄弟和翕但未知父塟何時墓卜何䖏吾日夜在念然鵷艮未嘗寄數字言及此也自今有便却作急附信来慰吾意也吾所望之䕫之序者勉力輔稷於善道必使之杜絶小人之交而後可以漸進於善道千萬千萬此外所望者諸姪與稷嵗時勤勤展謁祖墳此子孫第一事也勉之勉之老叔自之䕫别後未久聞兄訃音大慟數廻精神氣力頓衰八月後又聞家中事不如意者十八九心氣鬱結頓發痔疾苦楚日夜至今未愈也退閑未能又况味如此因遣小僕回附報知之示弼鵷二姪書自四月得之序書其後别無一字想是喪事無暇也塟定以何時墓在何處兄弟須同心恊力務要安稳老嫂必安好兒子媳婦孫子孫婦須齊心孝敬也之䕫何時到家呉江兩次所附書物一一皆到矣汝兄弟須相友愛和睦凡事遵本分存大體莫落人後為人笑詈也教子姪務讀書以承世業是切要事凡舊親戚須敦情好不可踈絶取田租生穀不可太嚴體騐人情當緩即緩當免即免非但可以省事亦濟人長福之一端也力輔稷為善不可以其不受善言而遂絶之近聞其數事大使人懊惱不已盖不肯親君子逺小人以致結怨鄉里非一而足切須戒之切須戒之羊奴仔專跟隨之為爪牙為惡不小尤須戒之尤須戒之不然吾别有處置也去年曽存中回曽有附為其臨清淹留一年慮其飄蕩已取歸待後有確便却附来也示鵷姪書四首嵗前兩得汝信知吾家消息又聞汝兄弟頻頻過家中照顧嬸病足見親愛之厚甚感甚感只是稷子不才不肯交好人惟務外飾不學䧟為不肖子汝與弼都無一語教戒之此却不見親厚之意今後切望嚴督之為囑聞汝父七月以来多病今已向安甚慰吾之懐想汝兄弟善奉養不可頻作非理之事以激惱老懐吾秋間必歸展省今録誥命先付汝觀之吾仕京師三十年未嘗敢萌一毫分外之心為一毫分外之事人所共知汝兄弟豈有不知者近年鄉里有一様害民小人為御史布政司按察司府縣之官所治又有一等貪利之人假我之名為他解釋稱是我親戚是我學生之類多者得數十兩少者得十數兩此様人今有死者亦有罷官亦有尚在而不悛者天地神眀鍳臨在上如此攫財豈能長逺受用今朝廷遣内官遣大臣来江西專為掃除姦弊以安良民聖㫖甚嚴吾家當謹守法度不可學俗人粗心大膽仍前謁見上官為人求觧以茍㣲利切戒切戒料爾兄弟平日所為未必盡善今幸得免無事足矣切不可聽人鼓誘又去管事雖至親有事亦不可管汝若不從吾言必累身家必累父母為禍不輕切戒切戒我已有説矣但有人假我名觧事者必奏知汝兄弟切勿墮此䧟穽也吾為保宗族之故特書此示汝切不可示人也經夏逺計老兄老嫂皆安諸以下無事吾此中亦如常但所以未遣稷歸者為渠習汙下欲稍化之然下愚之資恐終不能着力亦惟盡吾誠而已諸姪宜猛省向善目前紛紛可鍳矣二孫望照管有便勤勤寄書為囑劉蒋二壻勉之向學親近君子毋習輕浮也汝兄弟亦須勤力教子習儒業不可失墜祖宗門地切要切要更戒飭兩家諸僕不可分外得罪鄉里常須㸃檢之也自稷来後連得吾姪二書知家中事喜悦不可言近年来汝不舘授不知别有何生理但舘授原是吾儒家生理不可棄也汝勉之勉之更傳語旅艮皆須教子讀書繼儒業切要切要汝兄弟孝養老親之餘善撫奕奐督切之成好人兄弟之子猶子也閑暇皆須到官濠下照管不宜相外嵗時兄弟子姪同拜祖墳不可落寞也餘不多囑東里續集巻五十一
