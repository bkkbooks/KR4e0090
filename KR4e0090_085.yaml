body:
  text: 東里續集卷五十七明楊士竒撰詩七言古瑞應玄兔詩有序宣德已酉春二月寧夏守臣進玄兔夏四月復進臣謹考載籍所紀瑞物如赤兔白兔昔常有之而玄色蓋鮮我太宗文皇帝臨御嘗一進闕下紀於瑞牒皇帝陛下嗣臨大寶數月之間凡兩見之又同出於一所此豈偶然哉兔在十二支屬卯於時為春長育之方也寧夏在國之西於時為秋物成之位也而玄實天之正色君德之應也欽惟陛下宵衣旰食孜孜保民數下詔書飭勵百司崇寬厚施賑貸已逋責省刑罰舉賢才黜贓吏無非以仁民也今兹瑞兔蓋天以昭陛下養育斯民之志而所出方位又以豫兆將來有秋之祥實陛下天德仁民之應也猗與盛哉臣叨列朝班躬睹盛美謹賦玄兔詩一首上進詩曰昊天大德仁兆民簡畀明聖為民君陛下神聖兼武文允膺景命體至仁統視海宇如一身剗剔匪類皇威振整飭綱紀百度新霈德覃化流沄沄靡有逺邇視平均至和融凝天貺頻厥來煜煜鳳與麟嘉禾秀麥咸薦芬異瑞比出西郊濆不牙不角趺而踆倣佛逸出中山羣間雅敻異東郭㕙匪緅匪緇色尚玄為雲為霧黭莫分含章韜彩柔且馴嘗有異質素與纁懿此玄瑞世絶聞吐養萬物東方神正秋之位收穫辰矧乾正色應至尊稽德揆義良有因豐稔之祥兹豫陳西人得之愕且欣居以雕籠承錦茵踰岐涉汴趨楓宸食之瓊芝飲醴泉上林御苑遊甡甡聖仁之應自天申詠歌洋溢歡縉紳陛下大知察邇言祗天保民永弗諼四表一統熙和春陛下洪福齊乾坤瑞鴇詩有序西域古多名馬賽瑪爾堪又極西之地正統四年六月初三日其酋長進良馬色玄額蹄皆白體質瑰竒賜名瑞鴇洪惟聖人在位德化之敷逺被數十萬里外故嘉應來臻臣民歡欣前所未睹有詔畫史圖之謹賦詩歌詠之西過流沙沙浩浩逺來良馬標瑞鴇鳳膺虬首耳竹披目如夾鏡揚光輝天生瑞鴇毛質異一片玄雲被全體髙題中點雪光明四蹄皆白如瑶瓊有時長鳴欲奮迅捲地蕭蕭朔風振軒昂卓犖真龍駒電邁雲馳見竒駿聖人御天海宇清泰階六符明且平房星儲精産靈物為祥為異來神京蔥河崑崙夜飛度左右王良皆造父羈金絡玉立彤墀恩榮屢得重瞳顧自昔名馬稱驌驦亦有紫燕兼飛黃當時萬馬皆莫及敢與瑞鴇爭騰驤玉陛朝回仙仗下五色雲車未驂駕瀛洲草緑風日和顧影長嘶意瀟灑國手含毫擬曹霸瑞鴇龍姿今見畫聖皇圖治急才賢審象亦聞求在野大明當天萬物覩會有夔龍帝時舉簫韶九奏神人和瑞鴇鳳麟同率舞蔡舍人挽詩時丁母憂卒於家公昔騎驥登周行握瑜懷瑾鏘鳴璫凝神月朗髯戟張溫如緑野熙春陽徑如檜柏凌秋霜後來藩府前經商在卑不屈髙不亢德厚祿微胡可量朔風一旦悽髙堂脫纓垂衰趨故鄉幡然升雲逰帝傍迢遙東海徒相望望公憶公何時忘奉送李丈人之宣城就養若溪丈人過七十兩臉渥丹頭雪白平原不改昔衣冠鄂渚殊憐舊鄉陌鄂渚西邊花樹隂更來闢館對青襟四時有錢解沽酒幾度逢書盡賣金大兒清韻亦如此去年髙舉青雲裏錦袍白晳耀芳春畫幕紅蓮開緑水奉檄由來志養親只今得祿待嚴君行霑鸚鵡洲前雨去指敬亭山畔雲戎閫清時疏案牘從此承顔歡不足東風低拂綺羅筵春光回映斑斕服丈人宴樂誰與同宣城山水嘉莫窮間歷舊遊懷李白還賦新詩似謝公題虎溪蕭氏卷子連山飛來如虎蹲溪水百折緣山根縈回狹曠忽異狀武陵未數桃花源大宅誰家住深窈粉壁紗忩動晴曉門前稻麥連紛紛千畦萬畛翻青雲雲深截斷樵牧路車馬城中那得聞四時髙堂會宗族旨酒肥羔間山蔌座中詩禮羅俊賢楚楚威儀光佩服此地移家今幾傳但聞朝代忘嵗年南階喬木昔人植如今已上干青天從知遺安及孫子豈獨地靈能致此後來繼者更不忘更百千年胡可量送鄧存誠之襄陽庾公南樓燕新乳行子辭家春欲暮西岸楊花白似銀蕩日搖風滿江路江邊漢水轉逶迤南堂鶴髮正垂絲願尋甘旨何愁逺欲去臨分又復悲子有清才出同輩見者紛紛誰不愛擅題繡句錦筵端能畫青山白雲外我來投分已三春握手攄情共討論即今相送緣鸚渚明日相思間鹿門鹿門芳草芊綿碧尚有龎公昔時宅池上山翁去不還江皋神女無遺迹經過弔古易徘徊且莫遲留定蚤來紅芳照映萊衣舞好及榴花五月開馬孝子詩孤墳四尺荒郊裏野草蒼煙帶寒水子孫有在在他州生者無知知者死昔時未死語丁寧定將還葬附先塋來尋墓隧失南北夢見言之真有靈上冢無人將百嵗啓壙猶存舊題記出離客土返鄉山父已申情子終事由來至孝動皇天解髮繫鞍皆昔傳文章輝煌久不滅知爾垂名俱萬年送楊翥孝廉歸吳中城中七月猶炎暑城下歸人趂行侣十年為客憶東吳一日辭親發南楚楚江吳江路幾多揚帆處處盡經過琵琶亭邊有明月長干門前聞踏歌千里蘇臺在行目忽度楓橋到鄉曲顧瞻桑梓雜悲歡紛引親朋問寒燠吳中歸日嘉可遊知君未得久淹留晚嵗還為越鄉嘆他州重有倚門愁别劉宗誠湖南十月新鴈飛白葦漸髙黃橘稀蘭舟去逺復回首唯見星沙連杳微前年作官臨海嶠海畔家家説司徼一日􅋦哀返故丘三春忽盡不遲留遙趨北闕朝明主暫下南樓謝舊遊此地賢郎獨為客把卷看雲幾朝夕江邊迎喜拜親闈館下含情别師席臨岐牽手重依依可憐恩義兩難違春來有使題芳札想為殷勤報鶴磯題蕭德皓扇石臺盤盤浸溪曲五月溪光帖寒玉千桃萬竹夾成雲奕奕髙門蔭深緑主人涼袂纎絺裁越羅小扇揮炎埃南薰院中聽寶瑟臨清樓上引金罍朱澤民雲山障子為蕭德皓題有澤民自題昔聞朱侯寫山水一幅爭投百金價至順今來七十年却在桃源看圖畫生綃八尺垂中堂羣山疊出開青蒼前峯如屏錦霞爛後嶺岧嶤插天半春風啼鳥渾欲聞石磴盤盤屢回轉雙松如龍千尺強幾年偃蹇山之陽松根古道向何處䇿馬擔簦去無數别看丹翠出層樓雲影濃遮入無路雲遮霧滃深復深信有隱者藏中林髙懷逺致不可即空望微茫勞我心當時此景知何地鴈蕩蘭亭豈相似自是天機妙入神位置從容見精意朱侯朱侯追鄭老筆勢詞華共妍好此圖三絶交輝煌千載人間視為寶送李昌祺盛年讀書擢科第共睹詞華艷雲綺翰林髙步逐英賢東閣濳心效文史身違定省五六年夢繞庭闈二千里昨夜攄情達丹扆特許歸寧承玉旨謝恩初辭鳳闕前買船遽向龍江涘江天未明早潮上況復連朝北風駛二月初旬應到家冠帶升堂親為喜囊中盡倒官俸錢郡市西頭致滫瀡敘言契濶洽朋知趨走牽携歡稚子愛親敬君事所重況乃皇恩厚無比還應回首顧王程螺渚行艫須早理送彭仲宜歸荆州時禁釀四月都城風日好逺客違家思芳草秦淮河畔問南船重譯樓前出長道道傍送者皆縉紳玉堂編修情獨親此來相看輕千里此會相歡能幾晨晨發無由執杯酒折贈空持白門柳臨分繾綣復申言已去蒼茫尚回首蘆筍紛紛接浦橋鰣魚隊隊逐蘭橈吹笛晚邀池口月揚帆晴帶海門潮歸到繡林應夏五鷓鴣啼歇榴花吐家慶趨承白髮歡雲光回粲斑衣舞還擕雙鯉放江湄江水朝宗日夜馳都將鄉邑平安報稍解京華契濶思題小畫贈曾貫還西昌兼致勉勵之意夫容緑水光鮮妍芳春秀質何娟娟六年虎觀馳彩筆十月鷗江回畫船醉寫銀瓶送將别秋菊垂花紛可擷請看石上青琅玕早晚凌雲挺髙節題楊學士藏陳所翁四龍圖近代畫龍誰第一舉世所重閩陳容祕府人家屢曽見葉公雖古難獨工此圖四龍妙無敵變化竒態才數尺乾坤黯黲閟雲霧風雷奔驅裂崖石騰身並出青冥上盤拏夭矯皆相向神光睒矆如劒鋩倒捲江潮起銀浪陳翁畫意與誰同愛龍所重澤物功炎颷六月撼原野矯首滂沱如畫中題蘭石寄王善學清源先生鄉達尊昔以通家拜函丈别來四十有三年至今儀形勞夢想當時令子朴且真與我相歡亦長往有孫今傳祖父業授徒假館雙江上不隨塵俗混驅馳但以詩書待咨訪潛心篆籕積嵗年往往揮毫作題榜我雖聞之未識面已為名家動歆賞玉堂侍讀重同宗萬里暌違心怏怏此圖寄贈有微意我為題詩敘疇曩清貞比德蘭與石珍重幽人在林莽題開封黃璿太守感螺卷敘州黃氏有孝孫冬月大母病熱煩渴心苦思螺療疾田枯溪澀那可得孝孫求螺急倉皇手足凍皴膚肉僵是時孝孫年一紀至誠感神神祐只探穴得螺四十多煮液一進蠲沉痾薑詩王祥古孝子孫之孝感見黃氏黃氏子孫賢且貴作詩為告觀風使題畫贈陳本深太守考績復任吉州太守明州彥三十朝紳贊邦憲詩書法律重老成冰雪操持萬人見先帝孜孜念幽側廷中親選二千石天語丁寧寄撫綏五采龍章光烜赫螺岡鷺州開郡府九邑􅑱嫠需召父陳侯下車興隱惻育稿濡枯作甘雨豺狼遁迹犬息吠胥史無姦獄無滯桑麻藹藹連郊坰絃誦洋洋起闤闠大江之西十三郡陳侯特達騰聲聞驊騮寧久雙轂淹雕鶚須當九霄奮我昔京華接鄰屋幸甚鄉邦得賢牧入奏重聞功績最勞問還嗟别離速冰霜嚴凝嵗華暮五馬雙旌復南去蒼筤樹石貞淡意特贈邦侯表清素題湯都司東皋草堂君侯襟度清於玉草堂長憶東皋曲堂中髙韻列詩書堂下幽香繞蘭菊雄藩此日任干城玉帳牙旗常夙興我家亦有東皋屋春雨蒲田歸未能題宋知州瞻彼南山圖詩北方之山恆山尊上出河漢凌星辰常時出雲作霖雨滋育萬物乘陽春東風浩蕩清川瀉川上人家住瀟灑內黃舊是故殷城臨水觀山足公暇此邦名與山齊髙古來為政多賢勞髙山景仰攀逸駕母負青年志氣豪蕭啓御史赴山東僉憲以何澄所畫雲山求題宜陽太守多公暇肆筆雲山出瀟灑層峯疊翠凌蒼空英英玉氣浮鴻濛縹眇瀰漫渾無迹妙逼房山髙克恭山乎雲乎定何處誰結茅屋倚深樹豈無獨抱千載心玩水看山適朝暮柏臺御史撫此圖憶得龍泉江上住岫幌巖扉意不忘十載京華未歸去秪今驄馬復東行馬上看山向齊魯君不見泰岱之雲起膚寸常向人間作霖雨題衛以嘉藏盛子昭畫盛生家住吳山下前代風流多見畫此圖三尺更清竒野水疏林淡瀟灑風平雲淨霽景鮮玻璃倒映水中天鑑湖洞庭不可辨隔浦山光落釣船蕩舟者誰定曽識渺渺相望似相覔尋常一曲滄浪歌醉倚汀沙白鷗側鴟夷羊裘世久無浮世虛名安足沽放懷縱意任所適何處煙波無釣徒題崔氏重慶堂昌黎縣中山水清自昔挺特生賢英上究羲農至周孔攘闢老佛大道明我敬其人想其處身縻祿仕無由去崔生近日起昌黎邂逅相逢談所慕生昔泮水來遊歌明經三十登賢科鐵冠霜簡入烏府嵗久政譽傳流多天官奏績天顔悅五采祥雲騰鳳敕堂上雙親共拜恩更有重闈嵗將百重慶堂中春晝長夀酒日進青瑶觴四親三百又餘嵗白髮蒼顔皆樂康家慶融融由世德蘭玉森森蔭松柏剩取詩書遺後來豈無繼續昌黎伯送欒瑄太守復任大同東萊欒卿粹如玉皎皎操持恭且肅秋官郎署居十年盛有聲名京國傳九重聖人御明堂簡擢賢俊安邊方欒卿出拜二千石郡中如得龔與黃下車正屬民凋療起仆濡焦不知怠帥閫崇嚴兵戍殷徴需瑣瑣無昏晨鞠躬勤事靡缺失上下不間稱其人三年報政朝天闕奏最重臨促明發丈夫有志遇明時寶劒精光肯沉沒霜風十月紅樹凋五花征馬鳴蕭蕭自古公卿出賢守黃鵠終當凌九霄題康幹竹石康甥孟貞純且質家住珠林小江側兄也霜臺峩豸冠貞也躬田食其力好山好水當衡門違逺城市無囂喧身間力學嗣爾祖不見他家賢子孫有心如石不可轉蒼筤有日干霄漢邂逅為爾題畫圖七十老翁言匪迂題竹與余存忠驛丞家住芝山番水上官作楊村驛亭長金門使者五色書擊鼓亭前開畫舫朅來敬我同江鄉我亦報之雙篔簹成隂結實須有日會下崑丘青鳳凰新橋驛阻大風南風吹河吼怒濤河上飛沙千仞髙臨流十步不得濟北瞻閶闔心煩勞自春不雨田無麥穀田焦枯亦龜坼密雲四合掃復開誰叩天閽訟風伯農家束手徒嗟吟愛民自是天之心願收巽二敕屏翳普千萬里均甘霖黃氏夀諼堂詩有序石城黃友玉清雅君子也其弟新會簿友菊嘗從余授經兄弟皆於余厚别五十有五年今友玉之子中來見蓋父叔皆久謝世余為怊悵久之中獨幸其母之夀康也今授訓導赴延平求作其家夀諼堂詩蓋余於黃氏不能無故舊之感云琴江黃氏好兄弟五十年前屢過之今來都門遇令子卓志能承書與詩二老風流已長往獨侍慈顔在堂上鶴髮蕭蕭夀且康甘旨晨昏足豐養堂下忘憂多樹諼晴日暄風花正繁斑衣婉愈獻春酒慈竹娟娟森子孫除官分教延平去便道升堂榮拜母人生得祿貴及親板輿還奉官中住將行索我諼堂詩為子喜色生兩眉子家二老吾所重詩罷能忘故舊思送周敬常詩有序白鶴觀吾鄉清真境也吾不到者四十年去年歸嘗過之昔之道德老成皆已化去所知識惟用拙錬師在然亦老矣相歡未竟遽别今年其徒周敬常來北京一再見之將歸乞詩遂為賦此且致意其師云去年奉敕還江南東風千里迎歸驂西昌城西訪真境正值碧桃三月三襜襜威儀森鶴氅却憶仙翁隔蓬閬霜鬢酡顔戴錬師白玉觴行紫霞釀矞雲垂彩拂簷端芝草琅玕繞畫欄歡言未竟登車去天涯長憶三珠樹戴師弟子來日邊清顔皎皎夫容鮮問師經年安健好閉户日詠黃庭篇我有髙懷在江海為報而師掃氛靄黃茅岡畔會重尋白鶴峯頭定相待送金少卿祭掃南歸去年奉敕我還鄉今年奉敕卿還鄉我違鄉國四十載卿違鄉國三十霜仕者還鄉總闕卿逢故舊當盡情明年春風朝北京題金亮伯梅花雪崖先生好孫子森森庭前玉樹枝柏臺御史冰霜筆寫贈梅花真似之朔風十月江南道萬里鄉園到應早手持書卷傍花隂更厲平生嵗寒操題范啓東所藏俞漢逺雲山圖會稽俞生富天趣筆法傳得髙房山白雲滉漾生空谷危峯飛出青冥間灌木青蔥俯溪曲溪面沉沉湛寒玉超然肥遁者誰子深結茅齋擅幽獨人間嘉景何處無何必逺求衡與廬白頭塵纍苦羈絆我念林栖增鬱紆吁嗟俞生此遺迹俞范昔年交莫逆知是看圖重故人不但溪光與山色題嚴御史恭梅邊讀易圖嚴新升貴州參政戴文進寫其舊學之所為梅邊讀易圖贈之嚴君以求余題為賦長句于顛云錢塘湖畔山無數湖上古梅千萬樹之人結屋傍湖山坐起常在梅花間微風吹林動香雪水色山光總清絶手持一卷太古編周孔所示皆微言推辭通意必造玄二儀分判自太極尋源更泝庖犧前濳心虛懷知幾年時來不得安考槃繡衣白簡峩豸冠風采六月冰霜寒辰陽西上開省署又捧除書向西去天香滿袖出金鑾帶作邊方九春雨邊塵不動邊人安展圖還憶錢塘看從知玩易有真趣燕寢凝香清晝間贈伯時外弟海榴作花梅雨息令弟五月來京國玉堂晚歸初見之豁然令我舒胸臆傳杯剪燭兩遲遲還因親愛動歡悲清姿秀質今在眼嚴父慈親空永思又促明朝理歸舫家在西城柳溪上髙樓深館絶塵紛努力詩書振餘響贈紀指揮畫卷曲欄梧桐花正吐萬玉蕭蕭寫青雨珊瑚紅樹拂天風六月人間不知暑琵琶收絃寂無語夢裏隨雲度銀渚侍者如花握金縷倚繡娉婷對容與意逺神清皆俁俁人間間樂等神仙更詫蓬山在何許題費同知松樹障子當代畫松誰最精王紱卓迪俱馳聲兩生以來鮮繼者鳳池周璿新得名此圖筆有千鈞力全幅剡藤開潑墨雙株奮起如雙虬直氣森森勢千尺樛枝屈鐵蟠穹蒼徑節磊砢鱗甲張長風颯颯動滿座六月清晝髙堂涼吉安别駕好竒古對此宛然巖壑趣伏苓琥珀焉足期堅操終懷共遲暮别駕别駕臨安彥浙東山東宦遊遍四明徂徠千嵗植所歷山林屢嘗見大材之成由化工自古匠輸希得逢明堂清廟選梁柱何限空老深山中小山書屋有序鳳岐侍讀得賜歸求作小山書屋詩為賦七言古體一首且寓别意云文江之東小山麓舊有髙人讀書屋繞屋森森松作林松隂行吟松下讀平生讀徹書五車鹿鳴宴餞來京華御前奏對三千字五彩椽筆登鑾坡蘭臺石渠富纂述獻賦陳詩誦功德日給珍羞飽大官宫錦無時出褒錫黑髮去鄉今二毛近侍光華更四朝人生倦勤思暫逸小山南望心搖搖鵬搏九萬六月息丹桂花香别京國舊屋還歸小山下鄴侯多書仍滿架門前冠蓋來紛紛少日同學何人存青松拂雲盡成蓋慈竹青青蕃子孫鄰叟時過話耕稼亦有詵詵執經者紅箋錦軸金繡段更覺文章動髙價老夫垂白念鄉關早晚天恩應賜間長風萬里泝玉峽艤棹文江訪小山題蔣主善梅蔣氏傳家秉清白住在金陵大江側三徑風流松菊存别有梅花春意繁開軒正對花林下襟抱沖和興瀟灑香浮丹鼎雪融初影轉琴牀月明夜自承徴詔戴朝冠朝朝拜謁趨金鑾故鄉迢遙隔煙水十年夢繞梅花寒間暇從容詠清句節操從知凛貞素嗟余同是愛梅人何時歸賞江南春長短句題丘氏平原十景圖昔年過東昌遊平原望玉山萬松夾徑鳴珊珊翠屏疊出青冥間石豅瀑布飛秋雨倣佛龍吟井江暮東陂流泉清我心盡日徘徊不能去仙人夜半西極來闕雲燦爛紅蓮開邀我闕萬夀之宫裏酌以沆瀣青瑶杯隆山鳴鍾促天曙歡言未竟東西去扁舟來往不復尋江中遙望空雲岑湖塘月色今何似嵗晏黃原飛雪深之子幽居有清賞展卷那堪動遐想到家還過仰山祠刻我題詩青石上題康氏臨清樓有序家兄贅康氏時余甫十數嵗屢往來其家及其子姪遊嬉蓋今四十餘年矣而足迹不一至文溪者又二十年頗聞髙門大第加舊觀多矣思裕來京持臨清樓卷求詩故走筆賦此且致期望之意云文溪似秋浦窈窕湛寒玉天淨波平一鑑開倒影金華千仞緑人家多住溪東西飛棟輝煌接華屋疏槐楊柳蔭當門翠荇紅蕖悅心目康氏樓居更蕭爽雕欄百尺凌雲上仙姥峯髙望欲齊狀元洲近平如掌詞翁酒客屢招尋吹竹彈絲共歡賞風物清華入吟嘯闤闠喧囂斷輪鞅憶昔總角初常遊溪之涯拆竿坐石堪垂釣臨水提筐逢浣紗朅來忽復四十載漂泊不歸雙鬢華天涯往往聞逸興邂逅題詩徒自嗟豈不聞宋朝曾孝子三子科名相繼起連篇文采動公卿文溪之名自兹始今人何必非古人珍重貽謀在經史他年若綰銀黃來仰視髙樓耀閭里題楊學士藏子昻畫刺虎圖婦牽車夫推轂車中兒貌如玉全家逺戍不辭苦日暮途荒車下宿山凄凄林謖謖颯然隂飈度夫身罹虎毒婦奮遂虎曵虎足呼兒抽刀斫虎腹倒虎肝腸夫來復終然婦憤不可平夫命無由百身贖有司匭函上行義華表輝煌旌白屋千年異事太史録人生富貴鳥過目誰有姓名光汗竹吳興妙絶詩與畫況復巴西詳委曲昔賢汲汲翼名教競為表彰勵民俗建安學士古人心珍襲此圖常韞櫝偶然出示慨古道援筆題詩愧貂續題畫送歐陽廣哲往昔送子時春冰洞地明兩京遂間闊相望搖心旌今年子重來幾日復南征念子道路難激我離别情是時碧梧亭亭泛露彩翠竹瑟瑟含秋聲躊蹰何以贈逺行子負挺特姿瀟灑梧竹清豈不聞嶧陽之産中琴瑟嶰谷之材諧律吕人生有志當大用況遇明時事堯禹常保堅貞德不隨流俗遷不見溪頭磐石重如山時解出雲騰九天陳氏貞夀堂北堂融融春晝長錦樹錯落含春香堂中老母今八十鶴髮如絲身樂康母昔初嫁時玉環自矜惜殷勤奉君子顧盼憐貞白一從守空閨皎皎冰雪色下有闕男兒力學慕古人季兒生來不識父今年六十霜鬢新明經射䇿選上第金馬玉堂髙致身大箱俸錢奉慈母願母十年百年壽清朝南極老人星正照華筵酌春酒五福重好德德厚福亦同偉哉貞夀堂鄉里髙其風人之貞節乃大義炯如白日光洞地方今聖朝務表勵作歌欲告觀風使題璚林積雪圖送張宇初真人歸龍虎山北風十日雪大地氣嚴凝江湖千里斷行迹溫泉火井皆為冰盤盤龍虎山岧嶤出塵表勢並匡廬近斗牛疊巘重崖隔深窕向來積雪紛不消千樹萬樹凝瓊瑶素鸞縞鶴下飛舞空中縹眇天香飄上清真人敻清絶吐氣如虹貌如雪袖有三華寶篆文腰佩千年蒼水玦常招赤松為雨師曽遊東海邀安期手執玄樞斡元化一掃氛翳回春熙玉皇端拱通明殿紫鳳雲章頻召見天京十二樓五城親接羣仙奉華宴五彩春霞導金節還向山中咽飛雪明年北上翔雙鳬更采靈芝謁丹闕贈族孫褒褒應教官舉以後期免歸來辭出此贈之且示詩以廣其意云萬里江南來還歸江南去丈夫得名何必早大器之成在遲暮豈不見深山長谷松柏林閲歷風霜年嵗深明堂清廟選梁柱匠石奔走來相尋我家住西昌於今四百載詩書門庭冰玉操炯炯光華著先代人生出處自有時立心但與前人期還家力學謝塵俗六翮排雲應未遲題竹石送陳有戒重使關西驄馬碧玉蹄飾之黃金勒振鬛嘶青雲汗溝流赤色烏臺使君豸作冠繡衣虬髯冰雪顔大庭親授五色詔西出綏撫踰秦關長安城中旌節駐富有歡謡動衢路豺狼遁迹犬生氂不斷和風送甘澍安內攘外職當為秋髙九月行邊陲綏延寧夏瀕絶漠城髙兵堅馬盡肥歸朝奏章纍十紙仰契天心天為喜為臣體國寧顧家璽書重下歌皇華縉紳祖送都門道雪後飛埃淨於掃丈夫事業在盛年莫遣麒麟畫衰老不見渭川竹可以栽汗青不見華峯石可以鐫姓名功名到手不可讓相期千載傳芳聲題竹送歐陽哲僉憲之汴豈不見奉大祭薦用璧與琮豈不見作廣厦選裁梁與柱國家致理仗才賢教養成之在黌序聖皇宵衣急文治大廷敕舉觀風使玉璽盤龍五色書親遣巡行嚴教事六一宗家有逺孫清才素行如璵璠手提文印之官去馬頭南望河南路河洛天地中嵩髙峻極天降生周家申與甫近代亦有文富賢兩程夫子明鄒魯道統上承千載傳山川佳氣朝朝有靈秀鍾人物何曽間前後子行所歷善教施本末兼舉真良師後來功業有奮起看子譽名同逺垂臨岐何以贈别離清風瀟灑丹鳳枝天寒嵗晏凜冰操持用慰我遙相思題張氏秋月軒其人能相開軒對秋月皎若白玉盤光輝上下徹無際洞然八極天地寬山河微茫影可識拂雲桂樹常團團太虛無塵萬籟淨玉繩璀璨金波寒是時秋氣澄俯仰皆竒觀靈臺湛湛俗不染坐與月色相盤桓念昔少小家西陲愛此明月同襟期黔南薊北行欲老惟有明月長相隨月輪萬古行乾坤年年常閲秋與春平生雙眼炯如月閲人富貴兼賤貧誰其胸中如月明煩卿一閲世上人惜别行送朱存禮致仕歸鄱陽御柳含春緑初遍紫燕黃鸝滿芳甸曉日承恩拜九重銀鞍白馬驕嘶風我出送之城之東惜别且駐無匆匆憶昔携書漢江涘邂逅論心託交義折梅載酒春共遊燒燭聮詩夜無寐卿才卓犖不可羈雄詞健筆皆如飛積金堆玉豈暇顧登山臨水常忘歸南飛雲鵠北飛鴈渺渺天涯兩分散即今三十餘六年前日紅顔皆白顛五嶺炎方桂林好忠輔賢王已身老功成名遂天所全七十歸來世看寶嗟余樗散質闕清未有涓塵效禆益虛叨寵祿孤聖明望卿去兮慚感并傾離尊餞逺道重是平生故何由盡懷抱官河三月波溶溶片片飛落桃花紅九華匡廬翠未了芝山秀出鄱湖東武山南在芝山上解紱他年定相訪贈眼醫張生張侍郎求贈人身具兩目精氣咸注之偶然神光困邪沴雖有四體將焉為丹砂空青療盲晦異效往往聞良醫今之臯陶少司寇治刑求生劬以疲況復嬰憂目為眚邂逅拙工乖所施雙目等河注愁坐俯兩眉圜扉紛紛叩蒼昊愈我公者龍樹誰河南張生亦超越胸藏竒能口不伐小施寸七捷於神盡掃浮雲見明月題竹送羅文衡湖廣憲使驄馬青玉蹄銀鞍碧絲韁振鬛忽長鳴矯矯飛騰驤朝發都畿暮荆襄千里歘忽流電光繡衣騎馬天上郎顔如玉潔髯雲張十年北面侍明主鐵冠白簡橫秋霜九重惠南土輟此殿陛良命之特斧振憲綱澄清洞庭及湘漢盡洗隂翳開春陽青霄白日上雕鶚及時功業須奮揚我有絶俗意贈之翠篔簹貞姿不柔亦不剛中虛外直操有常隆冬冰雪凜嚴厲長與庭柏同蒼蒼交映黃鵠山下之髙堂清風永晝含琅玕坐使民物咸阜康蒼龍歌有序蒼龍者天廄良馬也産于西域皇上臨御之五年賽瑪爾堪之所貢也風鬃霧鬛蒼然若雲體質潔素駿爽特異按傳記所載馬八尺曰龍此蓋龍云昔成周時越裳氏重譯獻白雉以為中國有聖人也今逺人貢馬豈非同此心乎不然何以其一旦涉十數萬里而來獻也畫史既圖之臣謹作歌以紀其事云天馬生西域神駿挺卓特雙目如鏡懸方瞳紫焰紅光炯相射長身昻長八尺龍腰裊飛黃竒骨同青絲瀟梢尾窣地滃滃霧鬛連風鬃四足髙蹄削踣鐵滿身猶被天山雪逸氣超遙時一鳴但覺颯爽長風生從知天駟宵降精晶熒下徹寒泓澄靈物翕合嘉祥興戎夷得之紛駭目顧嘆荒遐安得畜中華聖人今帝堯錦韉玉勒東來朝芒芒沙磧渺渺西極籋雲奔電千里一息登瑶京上赤墀下邦小臣陳奏詞年來泰和洽邊陲乾坤靈瑞世罕見端自皇仁所致之公卿拜舞效嵩祝陛下萬夀日月齊周文德盛􅀈騜至漢武役志勞二師朝廷服逺在有道聖化真與周同規畫史揮毫紀盛事敬作歌頌垂耀無窮期晏太守重慶堂詩家居重慶郡堂奉重慶歡堂中二親大母母白髮如銀身健康大母行年九十三母也今年七十五姑慈婦孝天錫夀旨酒在樽殽在俎蹁躚五綵服繞膝戲孫曾森森暖翠慈竹茂爛爛雲錦諼草榮象簡緋袍日趨拜門擁彤幡燕皂蓋邦侯為政擬龔黃能致髙年總心快故家元住大江西元獻聲華北斗齊公侯子孫必復始封誥行看照閭里送彭朂御史南還驄馬鐵連錢錦鞍珊瑚鞭東風都門道旦發何翩翩霜臺御史賢且文治平中丞之逺孫賢孫白日上雕鶚東廣南閩持教鐸九重召還賜豸冠敕付條章振文學南畿一百二十二郡縣俊秀如林玉雕琢世重賢才比麟鳳杞梓楩楠作梁棟聖人垂拱坐明堂昕夕需賢升顯用臣子受命當驅馳必有勳績裨清時山川何地無竒産要知成器須良師蘇湖安定不易得蕭艾芳蘭豈無擇與君同鄉郡分手重離情丈夫得志貴行道當令海內揚鴻名樂府龍馬樂歌有序宣德九年八月西北守臣遣使獻龍馬其耳額及頷及􅐢尾皆肖龍而全體潔白如雪鬈毛層疊狀若波文蓋騰驤卓犖有籋雲追電之意氣聞諸獻者云其牧之地有池下有龍焉常有雲雨晦冥風雷交作於上蓋龍馬云敕賜羣臣觀之羣臣明日請上表賀聖德謙抑卻而弗受臣聞上古聖神在位龍馬出焉至漢元狩間馬生渥窪水中當時作為天馬之歌協諸律吕用諸郊廟載在簡册傳于無窮今獻自西北西北乾位也固天馬所自出而龍乾象也故又為龍馬瑞牒云龍馬仁馬也應德而至又云龍馬太平之應也誠由皇上仁恩義澤敷洽天下是以天降靈瑞以彰皇上大德以兆太平之慶宜有詠歌協諸樂府以言揚鴻烈於悠久臣士竒不材蕪陋謹衍撰龍馬樂歌九章繕寫上進其辭曰龍馬出自西極應天駟躍方澤具龍儀曒玉色嶷山立備純德右一龍馬出神駿發鏡夾瞳玉噴沫追迅風凝皓雪靈瑞臻耀天闕右二龍馬出掩驥羣捷流電籋矞雲入玉闕登金門靈自天瑞聖君右三龍馬出象應乾旦歷秦晡憩燕秣珠票飲瓊泉偕祥麟徴太平右四聖人作萬物覩神之駿出西夏日千里汗流赭宜乘御揚神武右五身矯矯首昻昻虬之躍龍之驤邁茲白越飛黃協乾符表文明右六乾之方星之精萃厥靈挺異生維聖仁來嘉禎維聖仁壽萬齡右七龍馬出應皇德皇聖仁覆萬國天祐聖貞符錫聖子孫千萬億右八龍馬出昭聖世光八表和四裔奉宗社格天地隆家邦永文治右九七夕吟寄夏四秀才迢迢天漢流粲粲織女明牽牛出其東何不長合并伊昔承嘉遇歡言盡平生宴樂未及終回駕趣修程斯須忽不見安得伸中情别長會日促暌違嵗復盈終日秉機杼七襄不能成思欲展嬿婉誰樂各煢煢同心而離居嘆息涕淚零題古木竹石珊瑚出水天漠漠翡翠橫波月將落隔林罷歌湘浦詞片雲還向君山歸商婦詞販茶近在青山側販珠逺求滄海潯全家衣食需多少渺渺鯨波愁妾心征婦詞他家蕩子滯吳門妾家夫壻戍皋蘭共是閨中别離泪妾愁辛苦又愁寒短歌行青天髙髙行白日忽西傾兮又東出人生百年能幾時身計未成早已衰子孫成行各長大手種蒼松盡成蓋來日苦短去日長何不飲酒居華堂流光催人急復急八十龍鍾悔無及銅雀妓髙臺凝望處西陵落照邊晝日自歌舞秋風咽管絃恩隨漳水逺恨與鄴雲連惟有昏鴉集時時近墓田隔谷歌嚴風凋角弓鉦鼓鳴不止弟兄但隔谷咫尺異生死丈夫報國甘苦辛此時顧恩寧顧身詎知兄弟左右手臨難方為行路人升髙聊一望力盡心未已仰天呼兄兄不來壯髮衝冠直如指生為同氣親死作異鄉塵自矜雄豪重仁義誰保艱難不相棄豈不見南山桂樹同根生百年雨露同枯榮又不見桓山之鳥同巢哺欲去回翔不能征人生有情乃若此天地慘寂終難平嗚呼賔客滿堂歌伐木且請停杯歌隔谷東里續集卷五十七
