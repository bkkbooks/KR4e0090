body:
  text: 東里文集卷六明楊士竒撰序送蔡用嚴序皇上統御天下夙夜孜孜圖惟理民之道數敕吏部簡拔賢俊又勑百司舉材德之士授以撫字之任比者詔蠲逋負又切責有司坐視民所苦不言者欲加之罰無非激勵誘掖使之究民隱達下情也牧守而有愛民之心理民之才至是可以伸其志見于用也而今逺邇窮櫩蔀屋之民有飢寒之憂歎息困苦之聲豈少也夫膺職任有祿位又遇可以伸其志施其材之時而依阿玩愒不肯動心出力一少試焉甚或騁私為厲如此者豈國家所以簡拔任用之意蓋今之牧守之不為此者亦少矣吾友四明蔡胄用嚴清修苦節有惻怛之心果毅之氣由鄉貢士入胄監擢知宜春縣吾交用嚴十五六年知其為人果不負國家愛民選賢之意宜春之民庶幾將有瘳乎于是搢紳大夫有賦詩送用嚴者余為序諸卷首贈髙以能序余友劉叔毖為沅陵縣數年其為政有惠利隱然名動湖湘間而余不見之十年矣今年寄書貺余并𨗳其所與遊髙以能來見且曰自余來沅陵沅陵瀕蠻溪獠洞氣候弗時若用數致疾以能挾世業之醫濟余善藥屢矣今辰之守舉以能可以任醫學之職遣送請于朝萬一拜天子之命而來也幸辱一言以華之以能既受職將歸謁余且申其所請夫醫以濟利為道也而非若為政者之能博濟也然為政者其身疾疢必資於人故劉君得以安其身而施利于沅陵之人者宜有資乎以能余可靳一言哉蓋嘗論為醫與為政同道保一身與保一邑一郡保天下之民無不同也何者勞逸欲其時也嗜樂欲其度也寒欲煦之熱欲濯之正欲扶而植之邪欲遏而弭之也欲窒虛疏滯虧盈而益不足也察之者欲深求于微而不可以忽治之者欲責成于久而不以數易也夫然後可以保身保民而為良醫良吏之效著矣以能終身由于斯道而無違則所以濟利于人者將有不博乎子必勉之子歸見劉君其道余嚮往之意亦若是也贈王敬先序西昌王敬先為宜章縣學訓導滿九載升嶽池縣學教諭且行欣欣如飢得甘食困得安寢然者世謂教官冷職士之樂處者十殆一二而已嶽池去京師八千里為蜀僻縣今有得一官于蜀率其心懾于險逺戚戚顧辭其家人酸辛悲楚出語相付囑如訣别狀其有欣欣如得甘食安寢然者殆百之一二耳夫士之有道也無往而不適彼其有所不適者無諸內故也茍無諸內雖其身終嵗不出户庭不去其父母兄弟妻子而其心膠膠擾擾不能自適况數千里之外者哉敬先樂善敦義有古道前在宜章宜章俗不務學敬先化導誘掖之不數嵗宜章之諸生比比中進士去敬先來京師嘗主吾家吾親見宜章諸生在京者事敬先皆如子之事父非其施諸人積誠不已何以致此敬先少時與余同學海桑陳先生之門今其所自立如此可謂不辱苐念當時同學多已物故今存而仕者惟吾兩人然三十年來東西暌隔其間不過一再握手敘契闊未嘗極意傾寫也今兹復别豈能無情于是惠風始暢倉庚和鳴晨裝在門舉酒屬客余歌白駒之首章客酢焉歌伐木首章載歌白駒四章之末余酬客歌雄雉之二章三爵既行序以識情送李伯髙訓導詩序廬陵李伯髙清修博文明春秋之學今受命為吉安府學訓導且行文淵閣大學士胡公率搢紳大夫詩以送之而屬首簡于余吉之學建於宋慶歷中載歐陽文忠公之記吉之士自歐陽公而下有楊忠襄胡忠簡周文忠楊文節諸君子纍纍而出伸大義於天下宋亡又有文丞相挺孤忠死國盛哉吉之為學也皇明統一海宇惓惓焉興學育材三嵗大比選其賢能用之而吉之士恆多于諸郡至屢占第一之選固出上之教化亦其積習之善興起之速者然歟今伯髙往焉偕其秀民從事於詩書爼豆揖讓之間涵泳嵗月之久將見吉之賢材益盛風俗益厚足為伯髙之榮且樂而使學士公與吾徒之仕于外者他日得歸謁學門從鄉人長老以頌天子太平之功如歐陽公所云者不亦與有榮且樂乎故書以先之劉氏慶源編序刑部尚書雄縣劉公觀作劉氏慶源編以譜其族屬余序之自宗法廢賴譜牒之行以維持人心紀綱俗化為世道之助蓋周禮小史之職掌邦國之制奠繫世辨昭穆世者諸侯世本蓋今世譜也其來尚矣然世臣巨族傳歷既逺更代多故譜或存或逸非有賢子孫不能舉而修之也劉氏系出陶唐而盛于漢其後子孫益衆譜牒歷世有作如隋劉善經唐劉知幾劉子玄及宋河南劉氏所著最為焯焯而知幾考據尤精博固劉氏世多賢子孫乎雄縣之劉其先諱溫者自河南徙今尚書公所著自髙曽以下至其子若孫凡七世蓋髙祖以上譜逸不可考而七世之後至于曽元至于數十百世有繼修者可以本諸此矣如劉氏之族自今至于數十百世因譜諜之存崇孝友之道廣惇睦之風者亦本於尚書公之賢乎然考其髙曽以來韜華養素樂善施仁深矣際國家景運之興尚書公以明經擢第今三十年出典名郡入總憲綱歷掌邦禮邦禁為國大臣弟泰從上征伐有功纍官至世襲指揮同知伯仲偉然效文武之用于時顯榮光大非其本諸先者深乎然則斯譜之傳他日太史傳名臣述世系者將有考焉豈特施之於族也送徐提點詩序皇上稽古制治肇建北京首立郊廟社稷之位以祗事天地祖宗百神先事詔太常以羣執事之半詣北京而神樂觀提點徐善淵恭承詔命率樂生三百人就道有日士大夫與善淵往還者聞而造焉是日積雨初霽秋氣澄朗善淵欣榮命之自天樂搢紳之咸會列筵陳爼觴酌屢行同會者春坊左庶子鄒濟右中允吳均宗人經歷虞進翰林修撰陳循庶吉士曽泉太常典簿周驥及余凡七人酒未既庶子曰善淵斯行盍一言贈之衆皆曰然于是中允取座右戴石屏詩語各探一字為韻賦詩詩成屬余序昔周成王既成洛邑率諸侯以祭于廟其詩曰於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟夫至于助祭及執事之人皆有其德尤足以見夫國家之盛今善淵熟于禮而達于事其往而無忝矣士幸遭天下無事聖明制作一新之時恭承一官近日月之清光足為至榮而况效職于壇陛爼豆之間相事于灌薦對越之頃不又榮乎斯以贈言之旨咸略仳儷之懷而作其欣往之志新嵗伊邇萬方會同余亦將與善淵邂逅于泰壇清廟之前遂為之序聽琴詩序樂之音皆可適也而足以暢幽鬱去驕吝頥性情于中和者惟琴焉古之君子于羣居及其獨處而適蓋未嘗不在于琴也民之生蚤作而莫息其間擾擾焉與事物酬酢而又有不當于其意者其能泰然無滑乎中固已鮮矣矧結纓垂組操簡持翰夙興而夜寐有職事之煩者乎則其間暇相聚資于琴以適焉者人情之所宜而君子之為也永樂二十一年正月十有三日天子大祀于南郊前期四日百官齋沐宿于公與余同宿者十有一人是夕月色在户清香滿庭宴坐雍容懷抱和暢功敘援琴而鼓之連續數引宫徴間作疾徐髙下雍雍古淡淳雅之音蓋使人襟宇澄淨氣志皆融豁然如濯埃氛而逰于泰和無事之域者何其適哉于是余賦五言古詩一首而衆和之恂如并和其韻皆以道夫適于琴之趣也夫雅與俗不相諧也荒蕩靡靡之音世所同好則為此詩者固無與於世而獨吾徒之所寄意也則雖一時之適不可以棄故録而序之送王編修南歸序吾友王格非篤實果毅學博而行莊起家九江學官太宗皇帝初建儲召為司經學正字仁宗皇帝初嗣位自交址驛召還進翰林檢討修兩朝實録格非預纂述書成賜賚有差蓋纂述先繕寫繕寫先雜執事敘勞也既而有司不復論勞奏均升一階於是格非升編修而雜執事往往位列其右格非戴上之恩安已之分恭就其班位怡然朝之士經格非選拔者今內佐六卿之治外受方嶽之寄與凡躋華升要崇秩厚祿出有騶從之盛入有肥甘輕暖之奉者比比而是格非官七品布衣徒步祿入僅給儉約混儕羣衆中流俗固不知有格非也而士之重格非與格非所自重者皆不係此格非吉水帶原文獻家世有聞人百餘年間吾耳目所知者吾素與耕兩先生及欽止皆仕有祿而皆不久于位不及下夀格非今年六十有七歷仕三十餘年雖中更險阻坦坦如履康莊殆若有神相者蓋格非所不能得者人耳非士所戚也今以病得請歸優遊餘年遂其素志士又以為格非榮獨余不能無情者蓋在館閣家同郡生同年而好者與格非兩人格非今決然去余不能有裨于時且多病早衰而猶縻寵祿詩曰之子于歸逺送于南瞻望弗及實勞我心三復嗟嘆酌之酒而與之别送禮部尚書兼大學士金公歸省詩序洪熙初元嵗事肇新春陽布和萬彚咸鬯天子御明堂敷仁澤覃被天下載念臣工久勤職務未遑于私有詔親在者歸省否亦歸展桑梓咸有錫賚視其秩而等差焉于是太子少保禮部尚書兼武英殿大學士臨江金公幼孜其太夫人春秋八十首奉命以行詞林諸君子相率賦詩歌詠聖天子之大德及太夫人之盛福以為公贈而謂士竒為之序夫人之倫莫大于君親而行亦莫重于忠與孝忠孝一致也昔者明君之使臣也必體其愛親之心而命之四牡之詩曰王事靡盬不遑將父又曰不遑將母將母來諗何其念之深而言之數也君子謂臣之事君先公後私君之使臣先恩後義今天子推恩其臣比隆成周盛時明君之大德矣先皇帝初臨御簡用文學之臣七人任之于宥密幼孜與士竒皆與焉于是召七人者之命婦入覲中宫惟幼孜以母行宴賚隆厚加有冠服之賜蓋二十有餘年先帝先后升遐在天其七人者亦有存沒之異而太夫人安享祿養至于今榮進二品之封益夀而益康何其福之盛哉宜乎歌詠之有作也公歸朱衣象笏升堂拜慶使其子若孫歌之以佐夀觴鄉閭族姻其必有歆豔而竊歎曰金川玉笥之間前所未有也又必有觀感而興起曰使為父母者率以忠孝導其子後將無繼今者乎則是詩之作豈徒以侈當時其有係于後來者不亦重乎送吳子恭先生致仕詩序安成吳子恭先生今年八十以黃岡縣學教諭致事歸其鄉詞林學士大夫素善先生者皆賦詩贈之余辱交先生三十年獨能已於言乎吳故永新名家自宋以詩書科第為邑之望具載鄉衮文信公所述元之初興寧極先生博學惇德與劉須溪趙青山皆以先朝遺老為鄉人後學所尊寧極先生始徙安成子恭先生之曽大父也其先如此子恭先生明經守道以成就後進為務為學官歷寧鄉福寧黃岡三縣焯著功效嵗賔興校文廣西者再浙江者一鑒别之明升黜之公學者心服被召纂修永樂大典于中禁一時四方老師宿儒多在而通博明正率推子恭先生其人又如此此余所為敬之而願交者也然自赴黃岡不相見將十年時有咨求老成及禮文述作之事余未嘗不意在子恭先生然其年益髙病益侵愛莫致之懷耿耿久矣乃今一晤語未竟遽别此余之情所為不能已者也然古賢人君子之老而致其事歸也其道德文學猶有以儀鄉邦淑後進不徒斂焉自足也岐陽有瑞物焉群飛競起而隨附之如吳先生歸而鄉人秀俊有志于學者咸得所附託余之情亦可以自慰也請書諸羣公篇什之首以為先生贈送羅學古還清化詩序學古之大父仲淵翁洪武中以閭右徴居京師翁負材具濶略喜論議而愛民矜惻之意常溢出言表郡縣禮為耆老而咨政焉余在翰林時與學士胡公數以公事出江東門以鄉郡故數過翁翁春秋已八十欣欣屣履迎客相與披豁傾寫雖尊爼笑談而其意常在于民也時學古丱角方執經從國子師而涵濡其大父之訓于朝夕之深余兩人固已期其成也永樂壬辰余奉命考會試得學古所試文字讀之條達明鬯嶄然羣輩中于是喜學古之遂升也既擢監察御史為法從于兩京能勤其職有所知未嘗不言聲譽灼灼以起又喜學古之敏于用也為御史七年升清化州知州清化在交址西南海上去京師萬餘里朝廷豈薄近臣之良而輟之荒落遼逺之域哉顧其地淪墜夷獠數百年聖天子在位然後去其所為害者而郡縣治之將被之文明之化然其漸習之汚且固有非可以一朝夕振舉之也則必資夫學通材達久于左右明識上意者而任之此武王不忘逺之盛心也然牧守與臺憲異職撫字與彈擊異施皇上大德如天無逺邇內外一惟覆燾生育之而已學古以其所素講習與得諸家訓者推而行之吾知奔壑之泉走阪之丸不足以喻其易也學古初赴清化重朝命不及告行于常所還往今之來覲也留兩月而歸于是中書舍人龎敘屬諸縉紳大夫為詩送之又屬余序之康氏族譜序女弟之子康榮從余在京師數年及冠有志問學而以父命將歸請敘其族譜康氏居西昌邑東南五里所澄江之隂曰蒲田里自泰然甫至于今十世修忠厚服善仁纍纍有繼也蓋吾所識者復性質直而好義磊落而濶達當元季冦盜充斥能倡勇保障其鄉復圭茹清飲潔以詩書教授里中躬率其族之人蹈履善行愈老而而愈不倦復性之子仲璧有雅度不屑意生事然獨守儒業為鄉孰師此榮之大父而皆康氏之有聞者也其上世雖未有以祿位顯者而其所與為婚媾交逰蓋多顯矣金玉之為物雖未登諸器用世未嘗不至寶畜之而古之君子其所以重當時昭後世者豈皆為其有髙爵重祿哉此譜作於復圭而相之者仲璧之子彥英固本其尊祖敬宗之心之所發乎其亦欲使後之人究知其先世以圖善繼者乎夫善繼必自學始究知禮義之博致乎躬踐之實使德備於身施于家而為孝友惇睦之行達之於用而為致君澤民之功以益大其宗者康氏之子孫其可不務乎夫畜之久者其發𢎞榮歸以及其族之人勉之哉送羅照磨致仕序廬陵羅儀範為肇慶府照磨廉潔而端靜愷悌而寬厚藩憲之賢知儀範之難得也皆禮待之畎畝之氓知儀範之難遇也皆心歸之獨郡守二以下率迂視之且數形于譏切曰居底僚乃欲樹名耶儀範自執益固守二滋不恱肇慶所治一州八邑其二三邑瘴癘險惡最甚者有官守于斯而獲生還百或一二焉奉使命于斯而獲生還什殆一二焉比嵗徴斂之事繁而郡恆委儀範往督二三邑之未集者蓋排之危地也儀範懷牒即行略不見難色其所至不私取民一芥民知儀範長者皆趍其令如父之令其所集事恆先諸邑而自是事之難集者郡率檄儀範自儀範至官三年計其跋涉山溪衝冒瘴毒之日恆什八九而坐廨宇治職事之日殆十一二然儀範容色腴澤步履輕健未嘗一曰疾疢之加乎身也蓋君子直乎內者無往不自得茍直乎內固宜有相之道吉凶利害豈人之所能為哉儀範比以公事至京時上初嗣大位𢎞施寬恤之政中外仕者皆喜幸可以久安其位也儀範獨曰吾豈當踰六望七之年尚不知止哉遂以老疾辭天官卿言于上詔從之士大夫皆髙儀範之達也老氏云知足不辱知止不殆於是有愧儀範者多矣吾素厚儀範故于别也書其所以決去之故贈之非徒以警媢嫉者亦使鄉人士知君子仕止之有道也熊氏族譜序今天下姓氏皆古天子諸侯之後其先功德之被人者廣則其流澤後世久逺而蕃碩自然之理也春秋戰國之際惟楚地廣民衆則其上之所以被于人者宜亦廣且衆矣楚鬻熊之後以名為氏當是時諸侯稱國者未嘗稱氏惟楚國之君世稱熊氏熊望出南昌江陵數百年來南昌之熊最盛支分派别跨數邑詩書纓組連續赫奕非他姓可擬豈非其先之被於人者廣且衆故其流澤至于今未艾歟新吳之族宋治平四年有諱洽者自番陽來官是邑遂家焉三子原善原穩原吉原穩徙豐城原吉莫知所徙惟出於原善者世居新吳傳歷既逺子孫益衆亦有不得而詳者矣原善之後月窗甫斷自曽祖至其子凡五世録之為譜而一堂之間祖孫父子孝敬慈愛藹然也其子本誠舉進士歷兵部郎中為福建左參政廉潔公平八郡之人恱其政無間言此其所以被於人者又廣歟將澤流於後焉有窮乎本誠今調浙江以此譜求序故為泝往推來而書之送國子學正黃信道致仕詩序國朝之制太學自祭酒司業丞而下居師𨗳之任者五博士十五助教十學正七學録凡三十有七南北兩監合七十有四必歷郡縣學官有最績乃授斯任大約今天下郡縣學官不下三千餘人於其間拔七十四人以為兩監師其選之固精歟比嵗南監祭酒司業數闕而南京卿大夫及監之諸生來者比比稱學正黃信道先生曰此良太學師也卿大夫歸其德諸生服其教人人言如出一口蓋先生純粹簡靜言必在道義行必循矩矱其所示教非獨言語文字而已然則論今太學師之賢先生其巨擘歟先生朱文公門人黃文肅公六世孫千里之足産乎渥窪之濵超類而絶倫非其所自之異耶聖天子篤意學校近命大臣就兩監簡諸生之久無成者罷黜之而賜璽書飭勵師生又戒祭酒司業禮其為師之賢者所以厚化本興賢才聖德隆盛千載之遇也顧祭酒司業所當禮者豈有過於黃先生哉而先生先月詣闕請老上以其年七十勑聽致事優老禮賢之盛心也然知先生者猶為太學師道惜其去或曰君子之道足於已無往而不可以及人先生之歸也幸精神未衰將見化成於鄉必有蜚英騰實顒顒而起者則在彼猶在此奚內外之擇哉于是六卿及二皆有贈行之詩户部尚書陳公以求余序余故采大夫士言之同者書諸卷端云易簡方序醫者聖人仁民之術也古之君子有愛民之志而無行道之地則往往用意醫藥以幾有所濟利仁者之心也禮部尚書毗陵胡公源潔蚤有志及民舉進士官侍近奉命四方其耳目所遇有可以利民者多奏而行之然未足以充其志也間暇兼用意於醫得一藥一方之良手自録之蓋以試皆驗以施濟亦博矣所集録既富永樂中嘗具表以進特被奬賚其書析若干門凡若干方總名曰易簡刻梓以傳公幸際亨嘉之運今佐天子和邦國有行道之地方將導迎德澤以覃利天下而猶汲汲于此蓋仁人君子愛民一念無所不用其至也然善為醫者如良將用師精熟古法而不執一道臨敵之際隨機制勝故所向成功夫得是編者誠能究隂陽表裏虛實與夫經絡脈證之故審度而用之將其施也養由之射庖丁之解牛惡足以喻其速哉其功不尤博矣乎此蓋胡公利人之意而未發也因求余序故為書諸卷首送髙伯琴歸省詩序吉水髙超伯琴出文獻故家以明經飭行為新城縣學教諭九年課績居最升萊州府學教授九年課績又最當升未奏而伯琴亟言於上臣自忝祿仕不省先父母丘墓久矣旦暮迫于心不能已幸今蒙寬大之典敢布其私懇詔從之翰林侍讀錢習禮於伯琴有同門之好合諸學士大夫分韻為詩送之而屬余序永樂丙戌三月太宗皇帝臨軒策士傳臚之明日進會試所選副榜士於廷親試之上御右順門晝漏下十刻命翰林侍講楊士竒金幼孜諭旨令就試者從容盡所藴毋茍且取具命光祿給食中官夕給燭遂親拔三人入禁林餘第為二等付吏部授學官上者教諭次訓𨗳聖明惓惓惟恐失士而成就之如此伯琴時得教諭嗚呼今草有二年宫車逺矣伯琴所至其成績顯著可以不辱今歸桑梓薦獻其先人退而周旋族姻鄉黨之間可以為榮然吾因伯琴之歸有不能槩於心者仁宗皇帝達孝推恩以仕者有一二十年未遑歸省特詔中外有官並許給告以伸孝子之情而限約序次具有定著士大夫得遂所欲皆感激祗德意亦有積月連嵗溺私忘反上不率君命下不念同僚之望者孔子曰君使臣以禮臣事君以忠曽子曰君子有潔矩之道伯琴行遇之而一言焉亦仁義之及於人也送孫先生致事歸豐城序國家循三代聖王之制仕者七十聽致其事蓋體羣臣全始終之仁也而古之人有樂乎內無所纍乎外者雖年未及七十茍有可去之道輒引而去之此雖未必當乎大中然不失君子之節焉視夫年已邁氣已衰視聽動作智慮無一之可施而其心膠固榮利而不知返焉者其賢不肖相去霄壤哉豐城孫宗正先生其有古君子之節者歟先生自郡教授升助教太學復升博士祭酒司業之所加禮六館諸生之所恱服者二十有餘年幸際聖天子篤意興學之時先生年六十有三聰明強裕足以有為乃援子貴受封之令解太學之職得翰林編修徑歸其鄉非其有樂乎內而無纍乎外克自果如此哉豫六二介于石不終日貞吉先生有焉然吾素慕孫先生之善教也先生五子吾識其三皆出身科目曰良初為御史能持身修職所至聲譽勃勃曰恭今為編修在史館謹厚有文曰讓為縣教諭不忝師道其二處者雖未識可類推見之此先生所為可樂歟豐城君子之鄉也三四百年間文學節行有聞者焜焜相望其流風餘韻所漸被至今不衰今仕京師余所識者十率六七有君子之行則夫處者其不戾于君子固多歟孫先生之歸何往而非可樂哉六卿及翰林諸學士有為詩送先生歸者編修周敘禮部主事張習以求余序余年與先生上下而多病早衰不能自引退其有愧於先生多矣幸旦夕賜罷歸道先生之鄉訪先生之廬凡所樂者當悉以告我東里文集卷六
