body:
  text: 東里文集卷二十四明楊士竒撰辭正固先生哀辭有序於戲自正固先生沒而吾邑之學者無所定於趣向無所質於疑惑無所資於故實無所得於效法貿貿焉倀倀焉如瞽行中夜無所問道也故皆傷悼不能自已焉先生諱岐字尚仁姓蕭氏學者因其所自號稱正固先生吾邑在大明受命之初有陳海桑先生王竹亭先生與其弟僉憲公有尚書劉公與其弟東原先生有臨淄令歐陽公有廖愚寄先生有正固先生又有德安二守羅公臨安倅楊公國子録蕭公臨晉令郭公皆邑里之通儒來學之宗範諸先生相繼沒世而學者未至貿貿焉倀倀焉如瞽行中夜焉者為有正固先生在也今正固先生不可復作則吾邑之學者所為哀悼其能自已乎哀之不能自已於是見於辭焉辭曰惟民從道兮克善攸行智有弗及兮道不可明仰彼先覺兮揭蒙發瞢嗟若先生兮昭哉博閎服仁與義兮秉忠貞稽諸天常兮考明經言為訓式兮行儀刑濯湘流之清潔兮佩澧蘭之芳馨曄威鳳其五章兮何不遊乎虞之廷止高岡之梧桐兮獨雍雍而時鳴雲鴻遵遊下田兮斥鷃翔於青冥小大胥適匪宜兮羌獨偃蹇乎林坰嗟若先生兮其誰與擬考德而問業兮日詵詵其來止惟匠石之良兮飭梁棟以杞梓材雖小而畢達兮于闑扂而猶無棄白玉不遇夫磨琢兮雖良質而焉試夫既自我成之兮固處賤而道貴嗟若先生兮何不可以少留何為一旦兮溘風飄而雲遊吁嗟失筮與龜兮吉凶乎吾何所諏紛盲瞽其邂逅兮又孰明夫道所由終焉倀倀兮如夜遊於乎先生兮委山丘空望龍門兮中耿耿而增憂周尚志哀辭有序仁山文水之間世家巨族之盛周氏其一也周氏世居泥田里後徙丁田余家去其地百餘里聞有尚志甫德義不愧古之人然既卒矣未嘗得一見也及官京師其子彥竒為刑科給事中因出其族兄前進士矩所為尚志行狀載其所存所施者甚備於乎若周尚志甫豈易得哉使世之人皆為尚志庶幾可以復古之世而今亡矣因掇狀之所具為辭哀之其辭曰惟先殖基篤其敷遺世有詩書些逮于先生始其弱齡惇信而貞些冠而敏學從我先覺匪階祿爵些吾親之思吾所得為鞠躬敢辭些族人昆弟豫同一氣又敢廢義些民之飢寒輟衣與餐中心式安些民豫同類野死弗蓋時豫之痗些凡民有爭一言持衡靡或不平些受遺秉義永矢無二危禍不避些賤貧自持理亂弗知朝恬夕嬉些六十八年埃風溘兮倏逝不旋些彼人無良耄期樂康孰可較量些生遏上壽沒顯有後亦竟何疚些景仰幾時卒弗覯斯曷豫弗悲些賦白象賦應制二儀含精至和育靈誕生神物為時之禎偉形體之𢎞博屹髣佛兮其若陵運修鼻以妙用吐氷桂之剛貞膽彌烈而下處乘四時以流行耿瑶光其上直稟金德之純粹明皓質之自然浮素華於纎毳宜玉山與瓊林步逍遙而泄泄雖遐夷之窮谷暫混儕於狒狒諒聖人其在上豈終潛而竟晦於是乾符昭兮泰階平坤珍顯兮黃河清鳯凰集乎德輝麒麟感乎聖明騶虞應乎仁化神龜通乎孝誠獨何為兮淹留不踴躍而作興爾乃山靈啓途海若靜波風伯導從雲師護遮振髙足以于邁出南溟之天涯顧夷獠而長辭遵大路於中華不疾而速千里歘忽言戾都畿瞻望宫闕闢天門之九重來王會於萬國隨驛使而進趨仰天顔其咫尺拜跪俯伏舞蹈悅懌何幸厖野之資膺此遭逢之極也於是天子勑命圉臣厚粟豐芻華纓絡首文衣被軀恩榮汪濊感激何如雖無能以報稱敢不勉其鈍駑願備駕於皇輅從六龍以任載嚴九關之巍巍參虎豹而列衛又引重與致遠明枉直而祛害誓永殫乎尺寸奉聖皇於萬嵗河清賦嵗在旃蒙月維攝提其日癸卯晨光初晞祥飈融暢慶雲爛垂天子御丹扆闢彤闈班龍節建鸞旗肅九重之容衛紛百辟其來趨促武乎金門屏息乎彤墀乃有陪臣晉國之使俯伏殿陛陳詞獻匭上言河清河津之涘發書訊占聖皇之瑞臣實睹之敢告天子天子曰嘻天道應人必以類至作德者降祥弗德者垂戒豫未究乎愼修其何以與於是也使者既出時則徹侯上公羣卿列秩仰聆玉音愈愈忔忔固已識其靈祥未備究乎事實退就使者而悉焉使者曰昉河流之將清蓋先時而異狀其始也沉碧凝黛流丹曵虹忽易復殊黊色彌望炯素華之皓潔汛玄晶而漭沆妙神化而屢殊協五行之遞旺方其漻漻瀏瀏滉滉漾漾湛如清渭之奔浩乎蒙泉之放涵荆玉而演迤拖齊縠而浮漾影萬象於昭晣而淨纎塵之泱灢也於是傳告雜遝聽聞駭惑奔走道路聚玩崖側睛目炫奪心懷暢悅鑑妍者賞明濯汙者避褻此其大略也其詳未易以遽説焉於是聞者俯而思顧而言曰河之發源出乎崑崙淤澱湠漫混混渾渾濁涇方之而尚冽潢潦擬之而同昏然而其清為聖君之瑞見於子年拾遺之記兆天下之平出乎京房傳易之論洪惟我皇繼序太祖道合羲軒功隆舜禹政教施乎萬邦德澤流於九土斯河清之協應豈偶然之故也蓋水之為用滋潤長育六府所敘功同土穀造化於是而發祥非在惠養斯民而致其豐足者乎革去濁汙瑩然湛明非在蕩除貪穢而用夫亷清者乎斯盛治之所本豈尋常之為異雖聖德之弗居諒天意其有在固將表治化之熙明而徴太平於聖世也躬逢盛事振古所希拜手陳賦繼以歌詩詩曰水先五行兮天一攸生維河之祥兮革汙為澄千嵗一見兮協我聖明澤流潔清兮隆化斯徴於千萬年兮邦家之慶甘露賦有序臣聞武備國家不可一日忽忘者也自黃帝至于文武數聖人皆以之安天下易曰除戎器戒不虞書曰克詰爾戎兵詩曰以作六師若春秋禮所載講武之法尤備故武者所以保民禦侮安內攘外之大器也洪惟皇帝陛下臨御以來薄海內外咸歸德化尊卑大小安分循義耕食鑿飲朝恬夕嬉陛下聖仁之心宵旰惓惓謂天下雖安不可忘危時雖無事不可忘武陛下此心即隆古帝王憂勤惕厲之心所以為國家生民造太平無窮之福者也夫有至仁之德者必有至和之應乃永樂十年十月丁丑車駕狩于武岡之陽講武事也先夕甘露降兹山戊辰狩陽山甘露復降臣謹稽載籍有曰君治政甘露降又曰帝王恩及於物順於人而甘露降又曰聖王之德上及太清下及太寧中及萬靈則膏露呈瑞凡此皆天地至和之應陛下至仁之所致也臣士竒幸叨侍從目睹盛事心切欣懌謹撰瑞應甘露賦一首上進賦曰聖人膺乾符御九五溥帝澤肅皇度𢎞德化于萬方明威令於率土盛矣哉治平之世超漢唐而躋邃古也惟皇聖德同符舜禹功愈大而愈恭恆存戒於滿假肆服外以安內兼修文而講武蓋將奠斯民於袵席之安而壽宗社於磐石之固也於時寒霜既肅孟冬維敘百穀登場三農畢務順上天之時令考聖王之典故將簡閲於師徒而狩田之爰舉也吉日丁丑式啓鸞輅風伯警途雲師先御左翼青龍右衛白虎前導後從丹鳯玄武千乘萬騎猋馳電騖至夫天璽之東武岡之陽翠華於是而駐焉粵兹山之先夕煥幄殿其夙具風清泠兮淑穆月皎潔兮不霧直氐北之一星耿煌煌乎天乳旦而視之岡巒之表松柏之樹已厭浥乎甘露矣輕若霜凝濃若雪積散若玉屑圓若珠綴霏柯糤條比比而是蓋芳飴不足以擬其甘醍醐不足以喻其味於是六軍驚異歡賀拜跽山呼谷譍天子萬嵗天子於是更龍衮乘飛黃從造父御王良升髙眺遠周覽四方紛營隊其整列森部伍之分張震笳鼓兮遏雲凛戈戟兮飛霜布儲胥兮四合渺罝網兮彌望乃有上公徹侯材官騎士分馳方攘環驅迤靡追奔截翔曶霍迅駛於是金貍玉兔赤豹青兕麋鹿麖麂白鴈文雉倉惶怖懾氣奪魄裭或跳踉而未巳或蒙茸其猶起矢不虛發一發五殪槊不虛擲應擲遄斃巧捷妙中闢翕變態殺獲生縶蓋不可為數計矣天子既嘉雄武之士尤重三驅之義乃下詔止焉于是時也物不窮殺農不妨耕將悅騁志士樂獲盈羣情快適笑歡沸騰天子於是命衆徹營旋駕都城升金根之車鏘鸞和之聲揭日月之旗揚析羽之旌鳴鐃疊鼓條暢鏗鍧不亟不徐雍容安行歷東華登大廷御黼扆朝公卿文武濟濟介胄辨纓以及海外遐裔蕃王陪臣莫不舞蹈上壽同聲一情皆以謂天子致勤武事篤在保民感至和之瑞而兆國家生民萬億年太平之慶也猗歟盛哉昔之子虛上林羽獵長楊馳騁浮詞以誇詡弋獵之樂殺獲之富遊觀之竒而其實無所取徴者彼安知聖皇至仁盛德上契乎天心天人協和靈瑞駢應者乎臣職詞苑躬覩嘉祥稽首陳賦繼以詩章詩曰天子仁聖保康兆民民之允懷皇天維親至和萃靈嘉祥駢臻介福穰穰天子聖仁又曰明明天子受福于天德威所被下竟八埏內固外順宗社奠安聖子神孫於千萬年師古堂賦為朱仲智太守作若有人兮鍾金華之清淑帝相德而錫命兮蒞侯邦於南服廣仁智以為堂兮崇忠信以為基敷亷潔以為垣兮申禮防以為階荃秉志之忠貞兮竊獨惡夫頗僻逝僶俯不憚夫勞兮願追武於前轍道往古之多岐兮世倀倀其孰智指墨氏以為仁兮謂楊朱以為義周公肇錫余凖繩兮仲尼又遺余以規矩視有莘以為正兮又顔淵以為度嗟紛紛其蕭艾兮獨是焉備乎衆芳同重華之純粹兮並三王之顯明昭白日之蕩蕩兮相惟是其獨貴也決勇往吾無狐疑兮又非遠而難企也微顯吾永蹈兮動與靜而無違彼後世之捷徑兮固遠引而去之先民又告余兮曰降𠂻無不全哲與愚既咸稟兮古與今亦同然雖明聖之迭興兮焉能於此乎增益信由已而匪人兮豫何遑遑而求索感申申其好言兮示攸行之先路終吾身以服膺兮願不改乎此度重曰射惟羿之宗兮奕惟秋之因唐虞世其遼遠兮道有在而弗泯泝從循之兮徴厥心以為則信充已而格民兮庶將遍為余之德離譛賦有序余讀揭文安公所為幽憂賦為其友辨謗纍數百言既恐不能白於前又恐不能信於後揭文安公真盛德哉今之被謗類是者未聞有一人如文安公者為之辨古今相去豈遠耶非其知之者寡歟為賦以解之離譛毁之橫發兮志沈鬱而弗宣指厥行為淫僻兮余憤惋以代言惟弱操其好修兮穆員冠而履方被赬霞以為衣兮攬素霓以為裳援古人之髙駕兮將馳騁乎雲之路豈發軔猶未遙兮遽捐矩而改錯襲仁智以自重兮乃承謗而逢尤肆腥膻其酷烈兮又何有乎杜蘅與江蘺相梧桐之挺特兮鳯凰翽而來止既鄙薄又不潔兮謂伯夷之所以紛讒口之嫉妬兮羌惟聽而不味也固衆人所一情兮謂夫人亦不異也彼自好猶弗珍兮實譛人乎奚疑曰忠貞不可忱兮何貪婪而又不惑言倡一而和百兮明智孰諒其允臧告曾參且殺人兮母猶忡惕而惶惶傷白黑之混一兮竟莫察乎其故旦恍恍以亘暮兮夕營營以連曙重曰世夢夢既不顯兮又曷寃結而煩情上白日何皎皎兮庶幾猶鑒乎中誠槩發辭其不𠂻兮揆於余又何有愆言申申以騁媚兮終不究而寤旃昔人有明訓兮止謗曰無校曠來日其悠遠兮庶秒忽兮猶覺銘清白堂銘有序翰林學士兼右春坊右庶子建安楊公勉仁以清白名其燕處之堂謹先訓也蓋今天下之楊皆祖漢太尉太尉明聖賢之道以清白持其身卒為名臣千載而下之為臣者皆所取法矧出於其裔者乎公侍天子為詞臣之首文學行義炳然有稱於時而拳拳於先訓如此蓋君子不恃其所已能者而忘自進也余與公同宗同官請申為之銘且以自勵云浩浩楊宗肇于𢎞農纍華載德繇太尉公太尉克明聖賢之道反諸其躬允踐實蹈其蹈維何絶利循義維清維白弗涅弗滓篤時之行以貽厥家肆其臣節日星皎如後有君子是撫是師矧曰支裔敢背而馳猗嗟君子力學清履爰陟顯融為天子使任重道遠兢兢夕惕景範先德揭是清白川流匪防泛濫孰禦維義維敬為德之據猗嗟君子永篤念哉匪直銘堂亦於我規主善齋銘有序吳中徐俌發身科目為安吉縣學訓導用志聖賢之學以主善名其麗澤之居蓋非獨以示學者又以自警云其寮之長郭彥鉉先生吾友也間來求文遂為之銘曰生民之初受命于天仁義禮智罔不善焉氣稟或下內昏外誘聖教爰興俾初之究厥初伊何性善焉耳明之復之究極其至道匪一軌德靡常師吾奚適從惟善之歸博以求之約以操之惟善之宗無惑他岐精察允蹈復我明德悠久純熟駸駸聖域猗徐俌氏欽仰聖謨煌煌主善以揭齋居臯比在中詵詵來覺精義所存兼資斆學惟誠克至惟敬弗渝朂哉無斁庶永終譽芳洲春意堂銘為醫士許景芳作生意敷逹為時之春斯乾之元而性之仁惟春之職以生以滋生生之機曷間四時粵古聖神體仁之大憫時下民沴氣其害審道辨物垂範設教用蠲夭札用全壽考猗景芳甫視民猶已聞疾而呻遄趨弗止考法于聖毫分靡忒惟民之寧豈曰豫德本其仁心融而為春保合太和孰已孰人熙熙其春洽我芳洲林林其民芳洲同遊猗景芳甫惟仁之施惟誠弗渝式篤念之詩禮庭銘為衍聖公孔彥縉作人之大端曰言與行有物有則匪學弗能其學伊何經訓是服言以詩善行由禮淑人心物理六義備焉溫柔敦厚詩教則然從事於斯慱達多識志端氣和有言有德三千之儀秩秩其正維禮之教恭儉莊敬從事於斯天敘品節克明克執卓爾莫奪士焉為已學必自兹學焉弗懈聖賢可希肆昔聖師揭時閎軌示訓于徒亦篤于子展也賢子默識力行矧我來嗣敢忘率承明明聖祖陟降庭止惟誠惟敬弗忝聖裔環秀書屋銘有序永豐馮氏世武昌名族詩書簮紱代不乏承自伯純甫始來永豐愛其山水之勝遂家焉有五丈夫子皆明秀知學其第四子敏舉進士纍官禮部儀制郎中升紹興知府將行以其家環秀書屋求余銘余在兩京以鄉郡故馮氏父子素往還為銘之以永示其後人銘曰吉有恩江六一故邦山明水清靈秀攸鍾允篤馮公始來自鄂相土建宅秩秩斯作其植林林其屋渠渠有兄有弟有琴有書維兄與弟既翕且好琴以悅心書以進道矗乎九峯時出雲雨黝乎龍潭亦出魴鯉環屋有田嵗則恆秋處者樂志恬憺優優仕者行志曰豫民福民將豫德式光斯屋馮孫繩繩祗念爾初以承其居以嗣其書針學針有序文淵閣大學士兼翰林學士建安楊先生仲子讓將歸先生作訓子詩百五十言授之其根理也實其體事也切可為備矣讓過余辭别出以見示以余父之執也又求一言嗟乎余復何言哉然讓聰敏恭謙於求益之志不可已也為掇拾先生所棄餘為學針一首贈之其詞曰玉之成器磨琢以治木之中材斫于工師君子之德匪學弗至為學有方主敬集義心為源本存養乎中靜專純一貫於始終五常百行有物有則究其當然以臻于極理欲之幾善惡攸判省察克治隱微不間前言往行我求孶孶自古哲人誰非我師以朝以夕以思以蹈賦受匪殊克勤斯造蒙泉出山其流如帶行而不息造海之大勉旃自強履用吾誠以達於成以承所生東里文集卷二十四
