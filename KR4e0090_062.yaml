body:
  text: 東里續集卷三十四明楊士竒撰墓志銘錢秉淵墓志銘洪武二十一年八月初三日吉水錢秉淵卒既葬廬陵淳化鄉南路之坪之原後三十有三年其子某以從兄翰林檢討習禮所述事狀介習禮求文銘碣錢家吉水文昌鄉世以詩禮為鄉之望其祖以和父立明母張氏秉淵諱某性孝友未冠遭元季之亂喪其父已卓卓有立奉母及弟妹避兵走傍縣屬歲飢口衆母旦夕為憂即跪進曰兒在大人何憂也旦夕竭力營措一家衣食無不足而恆有愈色和氣以樂其母事母終其身盡敬愛念不獲事其父語及輒悲切愛其弟延師教之一切公私事悉自任不以及弟妹而長育婚嫁之皆盡恩意惇宗族為人莊重寡言雖盛暑見弟姪必冠衣樂振施喜賔客過使行旅皆館榖如歸春秋四十有七娶張氏有婦道子男三昭曍暄女一嫁王三益孫男十女一銘曰有碩其宗儒其世維克承之孝與弟懷而未施待來裔楊處士墓志銘永樂壬寅七月四日延津楊處士卒其子盛以兵科給事中李本所狀處士家世事行請銘前吾在翰林盛為庶吉士有遊從之雅故為按狀敘而銘之楊之先出𢎞農世有閥閲元至元中諱某者知保安州卒於官遂家焉傳某生得譽皆隱居不仕得譽生忠又徙易之淶水處士父也洪武中為河南延津湖廣邵陽兩縣主簿皆以惠政得民心既卒處士奉喪歸道過延津延津人慨然念曰是吾仁父母也生而撫我沒而遂去我乎相與挽留葬延津處士不能止葬已因留家焉處士諱野琳字某為人質素事親盡敬愛親歿哀毁而喪祭不違禮先墓在淶水歲未嘗曠祭掃居常孳孳以紹先業為心其教子亦必舉先世之盛曰勉圖無忝也躬儉以起家泊然布衣無慕外之意與人交惇信義遇窮乏必賙之假貸不能償者折劵不復問雖其自奉薄邂逅嘉賔客必傾倒歡洽乃已盛官京師數往視之父子相聚甚樂盛或以客外所養不備私自歉處士察知之語之曰崔玄暐母達於道吾乃不達耶但汝能盡忠事君上即汝之孝何必口體之奉哉將歸又語之曰吾之數來蓋自念老矣恐一旦死不復見汝今歸死固無恨汝但盡心國事母徒以老身故惓惓也蓋歸幾兩月而卒享年六十有二既卒自其邑長二及鄉閭耆耋咸悲傷悼惜往致吊祭之禮焉初娶鄭氏生女二人繼馬氏生三男二女男長即盛永樂戊戌進士翰林庶吉士今為中書舍人次敏次惠女長嫁髙嵩次嫁王某其二人尚幼孫男二易詩女一葬以永樂某年月日墓在其山先塋之次銘曰存之良履之臧銘其藏永其揚揚故翰林庶吉士王欽正墓志銘正統元年三月上臨軒䇿士士竒與今少保江陵楊公皆讀卷官上親擢周旋等三名第一甲第四名王鑑第二甲之首既退楊公為余言鑑所對䇿其篇末之獻磊落精切識髙而義正才廣而詞暢將來有為之士也余深然之旋三人既受官有旨命大臣選進士如永樂甲申故事進學于翰林得十有四人而鑑居首悉以為庶吉士鑑等仰體德意咸克自奮時重風憲之選命廷臣舉監察御史楊公與余皆意在鑑屬有令不得舉初仕者然吾兩人所期望鑑逺且大非止御史也一旦余聞其病亟屬所厚者為求醫藥不數日竟卒為之傷悼不已又屬所厚者為董治喪斂且許銘其葬於是其友給事中劉益述家世事行來趣銘王氏吉水金塘里故家世修仁厚曾祖所安祖子完父嘉靖襲尚詩禮不慕仕進母某氏鑑字欽正自少端正秀穎篤孝友之行而嗜問學不煩督勵朝夕自進其功宣德壬子以書經選江西鄉貢第一明年會試禮部中副榜當授教官宣廟意有遺才在副榜命廷臣即文淵閣覆試之得二十有四人賜冠帶給校官祿令進學國子監而鑑預焉後三年鑑中會試廷試賜進士出身入翰林為庶吉士為人簡靜端潔溫恭坦夷論事悉中理所蹈必由於義其中泊然居京師數年未嘗一濡足勢要之門公退閉户閲書以求古人之心間為詩文自適所與往還皆詩書行義之士其將易簀也獨以親老不獲終養自慟蓋考其志與行宜祿宜壽宜顯用豈謂遽止於斯乎故其卒也衆皆悼惜之既卒家具蕭然斂以故時布衣亦足觀其平素矣卒於正統三年六月十三日享年三十有六娶周氏左庶子崇述之兄子子男三琮珙珣女二皆幼嗚呼後進之士如欽正其可多得乎銘曰材也見收於垂般驥也遽仆於天間嗚呼欽正匪命之然歟奉天翊衛宣力武臣特進榮祿大夫柱國彭城伯張公墓志銘彭城伯張公薨于位公卿大夫咸往吊之其弟都督公求余為葬銘余諾之遂命彭城公之子某以事狀來拜按狀張故歸德永城名家其先積善纍仁世有紹續逮其髙曾充而益𢎞髙祖諱文銘妣宋氏曾祖諱景惠妣劉氏祖諱從義妣朱氏考諱麒洪武中仕至昭勇將軍指揮使永樂辛卯追封奉國翊運保義武臣特進榮祿大夫柱國彭城伯諡恭靖甲辰仍追封三代考妣皆進彭城侯及侯夫人恭靖為人敦厚闓爽務義施德秉忠事上始終一心母同氏纍封彭城侯夫人恭儉慈仁言勤率禮內德之懿化成於家今太皇太后母也恭靖子男女皆三公為冢子諱昶儀狀豐偉篤實和易表裏不二既冠時仁廟為世子公奉命宿衛文廟北平之師出公仗劍以從東取大寧還戰鄭村埧連大捷以功超授義勇中衛指揮同知遂援薊州敗遼東軍之攻薊州者追奔至榆口而還自是侍衛守北京南軍圍城公旦暮效力其間永樂二年以功升本衛指揮使三年調金吾右衛五年調錦衣衛十四年調府軍右衛二十二年升中軍都督府左都督是歲冬命為奉天翊衛宣力武臣特進榮祿大夫柱國彭城伯食祿一千五百石子孫世襲明年侍衛宣廟謁孝陵歸奉命總督操練左哨軍馬正統元年患痺疾上遣太醫院官督醫視療竟以不起三年六月二日也春秋六十有五公平居孝於父母友愛諸弟祗事四聖小心恭恪以勳以戚爵位纍加禮遇之隆錫賚之厚執謙秉和居靜守約循禮奉法深戒滿盈家庭中外以清以肅故其薨也訃聞特遣中官監視喪事命禮部賜祭工部賜賻營葬葬以薨之歲某月日墓在某縣某鄉某原其配宋氏纍封伯夫人子男八人長輔次輅府軍右衛指揮使先卒輗越府羣牧千户軏越府典寶軾襄府羣牧千户轍􅀈轅女二人孫男女各三人自古外戚有賢有否賢者克保貴富延被子孫否則不旋踵而僨覆隨之固在上者失馭之之道也我國家自洪武永樂以來於厚戚里親之以恩約之以禮如張公者既藉纍世之德善又身修恭儉之行斯其家之興所以愈久而愈盛者歟銘曰皇明建極賢戚多有堂堂張氏任姒所自本其先代纍仁育祉如石韞玉光華韡韡逮于恭靖彭城啓封源厚流閎用傳暨公維公嗣興秉孝與忠翼翼孜孜罔懈于躬始以戚來繼以武侍義旗所嚮身先將士曰戰與守厥績咸勵嘉誠酬勞峙乃爵位祗事四聖茂恩龎洪惟滿之戒惟謙之崇秉乃虔恭一于初終用永保家匪直令躬昔在東京次伯敬平暨宋肇興杜有審瓊吁嗟張公允侔令稱凡厥子孫視兹刻銘國子司業吳先生墓志銘太學為國家成賢育材為興治之本所係非細故其師範尤在得人而非道明德立心古人之心知本末之務多士所心敬誠服者不足以稱任數十年來稱斯任者臨川吳先生其卓乎表表者歟先生以明正之學惇實之文端厚之行峻潔之操挺然而不詘皓然而不滓其於施教必先正本而後循序以達也蓋先生自讀書鄉校已立志不凡近雖寠夙夜勤苦淬礪不奪於外物洪武中選鄉貢病不果上後入充太學生祭酒司業禮之不與諸生等奉命宣諭武臣雲南又閲軍士福建時奉旨出使者所至皆有金幣之贈重朝命也先生一毫無所受及歸其裝不益絲毫惟經過山川所作吊古賞勝之詩百數十篇耳會試禮部擢第一廷試第四賜進士出身授翰林院編修升修撰考禮部會試纂修高皇帝實録書奏賜白金文綺及金織衣修永樂大典為副總裁吏部言國子監闕司業太宗皇帝曰此非可輕授其令祭酒胡儼慎舉有學行可為師表者以聞胡公舉先生即日授國子司業居無何祭酒有他命自是皆先生總監事時士習日下學者急於進取率不究心經傳惟誦習前輩程文以覬僥幸先生革之終日危坐堂上召與講析義理且設疑詰之使退求諸心庶有自得之益於為文必先義理而後辭采學者始趨實功不事茍得以禮法率其屬屬官中有不檢者數輩不便之相與求先生之短以沮之卒無所得又飾詐以謗之然先生素行孚於外者久謗卒不行有以告者先生但自引咎而已以是名益高而謗者益不容於清議雖𢎞度待物然未嘗屈已求合雖時權貴卒不樂之而自信益篤仁宗皇帝知之有素一日顧士竒曰朕即位以來兩京之臣多以序進惟南京吳司業未進蓋朕久不見之故忘之耳後三日宫車上賔矣先生為司業十有八年太學生數千人及天下賢士君子皆稱吳先生古道吳先生賢師而職銓衡者獨若不聞此雖先生之命而益以見其所守且士大夫之重輕於世者亦豈係乎其官之進否也哉先生篤孝行親喪哀毁骨立後在太學遇諸生告歸省者輒感慟不勝處交友必輔之正道雖忤不避中允李貫故同舍生素相厚貫坐纍繫獄十年家甚貧先生極力賙之且戒其家人有無相共貫竟死獄中而賙其家益勤平素施義類此一日會宴太學得風疾遽革舁歸顧其子曰吾死勿用浮屠老子法治喪不一語及他事而卒卒之日家無一緡之儲禮部尚書蔚公集衆賻治斂歸葬先生諱溥字德潤號古崖吳氏世業儒其先居臨川之種湖曾大父景南大父某父思清贅崇仁章氏遂家崇仁後以先生貴贈其父承德郎國子司業母章氏安人及封其妻鄭氏安人子男四與弼與疇與年與性皆克繼承女二長嫁應天府學教授孫曰讓次嫁徐士英孫男三先生卒於宣德丙午九月三日春秋六十有四以卒之明年某月日葬崇仁左橋之原先生長士竒二年同官翰林者七年又以同鄉相交莫逆後來北京嘗主余家間共夜坐談其貧賤時事蓋使人聳然起敬畏而後知其操執峭厲蓋天性云無幾聞其訃余為儒林慟之嘗私為作傳矣欲書一通寄其子未暇也今與性新除休寧縣學訓導在北京求余作父墓銘遂損益傳文為之志而係以銘曰嗚呼先生君子之儒古道之趨古人之徒其存者貞其執者確必有本源用淑來學豈世無人誰歟古心嗚呼先生足強儒林嗚呼先生逝矣不作寒崖古柏髙風凜若周貟外墓志銘兵部職方貟外郎吉水周君致仕之四年卒於家其子翰林侍讀敘以侍講劉球所述事狀求葬銘余素交遊其父子間雖老且病不得辭按周氏吉水泥田名家業儒代有顯者宋之季諱應龍號盤洲為時碩儒其子諱京孫直寶謨閣上疏力詆賈似道姦邪不去之必誤國不報棄官歸君髙祖也曾祖諱厚教授里中不仕祖諱聞孫元至正中鄉貢進士為鰲溪貞文書院山長召修遼金宋三史上書請以正統歸宋時不能用遂去之考諱觀妣李氏宣德中以君貴贈其考奉直大夫兵部職方貟外郎妣宜人君諱鳴字岐鳯天資穎敏自少喜學問長而明經博究子史家故豐於産更兵亂産墮有司仍稽故籍徵徭賦君時成童卓然躬任之事靡不集而産日復家日裕既冠桐城縣辟儒學訓導正師道嚴教法諸生多有成丁父喪去服闋上書論事擢山東即墨縣主簿以明敏詳慎為上官所重布政司檄君隨御史按察司官詣登州省録重獄七十三人辭不服者四十五人御史按察司官皆不聽君委曲言之且援古之以伸雪寃獄知名者導之卒從君言共核之四十五人皆得直時方用兵賦即墨兵器鐵十七萬君以海濵非所産奏罷之又奏便民十數事皆從之在邑得其民心永樂甲申改國子學正車駕視太學預賜宴及襲衣吏部言漢府闕紀善命選國子監官任之祭酒胡公若思舉君遂用之既至王府事有不當者悉直言髙煦雖貌禮之中實忌之然君遇其有過必諫不憚忤也時府中匿不傳籍軍三千人又縱護衛軍據各衛牧地及邀奪商民財物人苦之莫敢訴告君具言於髙煦且曰不早戢之事必上聞而國危矣不聽髙煦作寶賢堂君獻針致規諷之意冀有啓寤髙煦益厭之會車駕北巡仁廟監國時髙煦亦留南京恃寵驕恣所為益多不法君愳禍及入極言之遂大見忤誣其罪於仁廟下君錦衣衛獄君從獄中陳訴且録所嘗進諫書上之仁廟寤即釋君出為長洲縣學教諭振起學政日見成效賔興之歲諸藩聘考試官考福建者二考浙江者一率稱得人長洲九載升南京國子博士初至入見仁廟於文華殿猶以紀善時事俯垂勞問在監再歲丁繼母憂去服闋用薦升南京兵部職方清吏司貟外郎授奉訓大夫時清理軍伍職務叢脞君從容綜理而無滯事三載考最賜誥進奉直大夫推恩考妣宣德十年以老疾陳乞致仕從之正統三年四月五日卒春秋七十有五君致孝父母撫二幼弟極友愛冠婚率盡禮合三從兄弟子姪百口同居爨一家之間咸無私蓄著家範十數條令子孫世守於子弟天資髙者必教之學經好學者必極意奬進族人有沒於仕貧不能歸喪者必經營歸之能憫窮濟厄清江艾時春之官寧海道遇寇劫傷創甚行槖且盡君邂逅為求醫藥愈之而分資豫之而别於急義類此君有材具善持論議為詩文詞采煥發波瀾層出而舉筆立就所著有尚書通春秋纂要及退齋稿若干卷退齋者其所居之號也元配彭氏贈宜人繼王氏封宜人子男三長勉次序永樂戊子進士自翰林庶吉士纍升侍讀次廣女二前兵科給事中金昭伯廬州儒學訓導彭塤其壻也孫男七女三曾孫男女皆二其葬以卒之明年某月日銘曰吉陽之周文獻宗代有特起推巨公鑽研六籍觀會通或揚于庭挺臣忠或潛在下善厥躬亦有著作開瞶矇繄君嗣興承時雍贊理小邑寧瘝痌陟輔親藩竭乃𠂻弼違糾慝聲渢渢枘鑿齟齬詎有功暫詘遄信道靡窮褒衣橫經坐黌宫中臺郎秩遷益崇名遂身退何從容消遙林泉壽考終山盤川回馬鬛封子孫蟄蟄來章逢春秋霜露展敬恭光祿寺卿郝君墓志銘光祿寺卿郝君諱郁字文盛世家永平之撫寧大父諱某大母白氏父諱某母程氏文盛自幼父知其必貴稍長俾學甫冠有司擇主案牘永樂元年內難肅清之後論守城功授文盛陜西咸寧縣丞未行改北京光祿寺典簿授從仕郎持躬勤慎釐務周悉秉謙用和厥譽以起升本寺丞授承務郎益克祗勵時井泉為光祿卿恣無忌畏罔上侮下至於儲君亦肆讒間文盛盡力彌縫靡有遺闕泉既以罪黜遂超升光祿卿授亞中大夫賜誥嘉奬贈其大父父皆亞中大夫光祿寺卿大母母皆淑人封其妻聶氏淑人郝君感恩愈篤弗懈凡祭祀供御宴會之事必親必誠間有疾靡敢遑暇強起趨公不俟勿藥蓋恭事四朝始終一心待遇之厚有加無損正統二年二月初五日以疾卒訃聞賜祭命有司營葬朝自傅保尚書以下咸吊祭文盛為人質直坦易無城府居家事親孝撫其從弟勝貴壽盡友愛居官處僚屬和馭下寬平其卒也衆咸悼惜之向使文盛當井泉無狀時稍分毫混迹或不周於謹豈復有後來隆遇文盛享年六十有一而官光祿者三十有四年可謂榮矣亦其發諸已者有以致之歟其子男二人長忠次信孫女一葬以卒之歲三月草一日墓在北京宛平縣之玉河鄉於是忠信介珍羞署丞王彥材來求銘余與文盛同朝久目睹其行事為敘而銘之銘曰克恭於上克寬於下惟天於人恆與善者仕埀三紀位躋九卿外峙顯榮中和且平壽而考終亦既多祉勒銘厥藏庶幾不死欽承祖業推誠奉義武臣特進榮祿大夫右柱國定國公徐墓志銘上天命聖人為天下主必生文武之賢為之輔佐用成大勳建大業若身都將相享富貴榮名令終傳被子孫久而弗替又必本於盛德焉元之既衰冦盜充斥生民塗炭極矣我太祖髙皇帝以至仁大聖躬膺天命仗一劍起淮右舉湯武吊伐之事有識之衆雲附景從義旗所之東征西怨不數年四方肅清天下歸戴遂造萬世太平之業於時股肱心膂之臣皆英武傑特超邁之才若純誠厚德顓顓焉尊主庇民之心者中山武寧王徐公其首也天監厥德報福彌厚延慶後人逾逺逾盛非一時同輩所可擬也蓋王四子長輝祖襲爵魏國公次增壽當太宗皇帝師旅之際有翼戴功而竟死非命初追封武陽侯進定國公諡忠愍公其嫡嗣也時年十五召見賜名景昌遂命襲爵定國公授欽承祖業推誠奉義武臣特進榮祿大夫右柱國食祿二千五百石子孫世襲命吏部慎簡儒師道之學問公天資穎敏已嶷嶷負智識從師講授日謹程度其師豐城丁秀恆重厚雅則公惟其教之率未嘗或違而寒暑朝夕所以事師禮咸備踰年始趨朝參上察其進退恭謹喜遂欲任以事永樂四年命掌左軍都督府雖細務必親而智日廣明年汴河溢命公代祀河患以寧十三年車駕幸北京以公事入見顧問再三進對稱旨賜御廄馬三匹鈔六萬緡十七年修鳯陽皇陵宫殿命公董之益竭祗勤撫綏奬勵人競勸功十八年侍仁宗皇帝入朝洪熙元年命掌行在後軍都督府是年丁母太夫人沐氏憂宣德初起復髙煦搆逆宣宗皇帝下詔親征命公等守北京師還賜賚良厚後車駕三出巡邊公皆扈從祀嶽瀆及册封宗室皆秉虔將命先是仁宗皇帝篤念外家孜孜勉公兄弟子姪於學公祗體德意克力進修朝退閉門手不釋卷遂多識古人言行之善與凡治亂興壞之由間暇吟咏自適家居事親孝為人簡靜寡所交處惟名儒賢士過之必起趨迓相與傾寫極歡未嘗茍附權貴正統二年六月十二日以疾卒於正寢其生洪武戊辰六月十八日享年五十訃聞上命某官賜祭賜賻勑有司治葬將以卒之歲九月九日葬宛平縣京西鄉黃家臺之原公上世及三代已具先塋之碑其配張氏封定國夫人其子男二長顯忠次顯義女一歸金吾衛指揮同知盧能於是顯忠奉國子助教謝濟所撰事狀介太醫院判蔣主善求余銘墓嗟夫公生佐命元勳之家遭逢列聖爵位崇而寵祿盛而心之所存躬之所蹈凡以嗣先烈垂後裔者其可無憾矣遂為銘曰菽菽中山尚文敦武翼聖承運𢎞靖天下功存社稷德施生民配祀清廟衍祚後人維賢仲子忠愍克肖中遭非命帝用允悼崇爵華褒寵光隆隆大國豐祿命公嗣封煌煌貂蟬加公丱角拜俯受命嶷特恭恪篤念天寵亦篤孝思圖惟弗沗肆勵書詩前言往行心在躬蹈曰豫操志敢昧忠孝承官惟祗蒞事惟勤雍容在廷有儀循循躬事四聖歲厯三紀鞠躬一節毖終猶始既艾全歸壽豈必多夷考平素行罔缺瑕宛平西鄉卜藏斯吉焯示悠逺太史有述周處士墓志銘吉水泥田里周氏有君子曰時立以正統二年六月十四日卒其子源奉翰林修撰敘所述事狀求余著葬銘修撰時立族弟也其述詳實然時立年十七八從其父公明先生於廬陵邑庠余數過見之愛其溫粹端厚而勤於學嘗戲公明曰此當跨竈公明亦戲謂余此竈殆未易跨已而私語余君非敢譽子然是子純而有志承家可望也時公明之叔仲方先生教郡庠亦數向余矜時立不凡無幾余被召仕京師往往逢人問時立知其學與德皆進心以為公明喜蓋與時立别三十年再相見北京則蒼然老成人也相勞苦未竟遽别别數歲聞其卒為之悵然則余銘之也固宜周氏文獻巨族其曾祖學顔祖孟泰皆博學不仕父文明厯廬陵黃岡長洲三縣學官母曹氏時立諱道時立其字生有令質自幼嗜學十餘歲能屬文日強識數千言仲方先生授之書經逺有造詣里名家競延為孰賔教其子弟出則授徒歸則治其家秩秩有條理稍暇自致力於學不輟率間歲一走數千里省父母於官事繼母藍得其歡心友愛諸弟甚厚弟迪為翰林修撰在北京進為訓導在襄陽子源為教諭在湖州皆嘗一造觀其所設施而勵其所未至平居誘掖啓迪族姻子弟於善道不間戚疏從叔公智公顯坐纍謫逺戍遺幼男女於家時立訓育之長而為之嫁娶於助建先祠割田供祭祀修宗譜皆盡誠意素所交戴用礎闔家病疫里俗懼傳染無一迹及門時立獨旦暮躬視不懈戴妻卒教督臧獲為殮殯如禮素志淡泊不干仕進居恆自撿其身而以義畏服其鄉人家有古桂復榮作重屋其側藏書甚富以教其子孫間日會賔友焚香鼓琴觴詠為適里有山溪之勝晚自號山溪其學博通經史諸子為文贍而正所著有山溪稿數十卷配毛氏繼楊氏子男四源由德清縣學教諭升天台縣知縣泝潛澤皆治經術女二長適羅宗淵次未行孫男三女四葬以卒之嵗某月日銘曰奕奕周氏世儒厥服崇科清秩有嗣有續有特時立含章韜華大義之明厥履孔嘉秉誠孝友劬劬自孤石泉雲林優遊恬愈豈乏世儒髙視宏議孰為時立俯仰弗愧嗟嗟時立時豈多有作銘昭之永式爾後越府右長史宋君合葬墓志銘宋之先自廣平徙江西之新淦又自新淦徙吉水至榮甫又徙廬陵積財能施及其子彬之孫成章皆隱處不仕成章生若璟翹楚倫輩中與大學士解公遊公屢稱之其卒也為之銘墓娶孫氏金壁里名家幾子其弟幾子子環字文瑩自幼淳厚秀穎喜學問從明經師日勤不懈舉中永樂三年第二甲進士為翰林庶吉士與修永樂大典書成被賜賚擢吏部驗封主事授承直郎居職勤慎歲餘從隆平侯董修太嶽太和山宫觀能周悉人情而矜恤其力竣事升吏部考功郎中授奉議大夫屬建北京乂從侍郎師逵采宫殿材於湖廣以寬厚贊逵衆咸悅之仁宗臨御封建諸子簡用輔道擢梁府右長史授奉政大夫賜誥命又以其散官職事贈其父而封其母太宜人妻宜人為長史踰年小心恭恪王敬禮之丁內艱去賻贈之甚厚居喪杜門不出服闋改越府右長史凡持已處事如在梁府一府賢之宣德八年六月八日以疾卒享年五十有二其孝悌之行一出天性處朋友鄉黨惇信義為人和厚夷坦犯未嘗校自守有素再以使命過鄉里無少長疏戚接之歡然見郡縣長吏敘寒暄而已未嘗片語及私故尤為鄉先輩所重居兩京不茍涉迹權貴人之門間暇恆與文士知已觴酒賦詩其襟宇灑落於利泊然所著詩文有詞林稿南行稿梁園稿妻宜人同里劉氏父貴髙母闕氏生一歲而父喪其母教育之精女紅涉知書年十六歸宋氏孝事舅姑舅姑沒不衰謹於婦道躬儉勤以治家尤篤意教子學問父沒母老無子迎養終其身先是其母卒於北京之官舍未歸殯踰年宜人亦卒其卒先夫卒之十日實五月草八日云享年如其夫子男三欣懷恂皆志於學懷宣德八年第三甲進士女三孟歸劉體元仲歸龎彥珙季尚幼孫男二光祖奎應女三文瑩之卒也家具蕭然無以為歸計於是懷言其情於朝特給舟併歸其三喪同鄉學士大夫官京師者集賻助之諸子將歸合葬其父母給事中康振於宋氏姻家述其事行為狀余故識若璟而相與文瑩三十年為刪而約之為銘授其子俾刻而納諸墓銘曰嗚呼文瑩明經發身金馬石渠聲光蚤振簡屬天官克毖克勤再相興作亦克用仁察行與能進藩輔臣樂易之容靜貞之存不競不絿有執有循嗚呼文瑩其君子人曷不百齡遽返九原厥有德嫓合藏于墳銘以昭之示其仍雲東里續集卷三十四
