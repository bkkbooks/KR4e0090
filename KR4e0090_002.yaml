body:
  text: 東里文集卷二明楊士竒撰記石田茅屋記石田茅屋者刑部尚書大梁趙公以名其宴休之居也士之有道也不以貴富賤貧而易其所守蓋道內也貴富賤貧外也主乎內者既定則凡其外者舉不足以奪之故窮不加損焉達不加益焉顔子有王佐之才使得時而行之其心固不改簞瓢陋巷之時而孟子亦稱栁下惠不以三公易其介蓋惟中之所守確乎不可拔而以之遇則可以建功不遇亦可以自樂非志於道者不足語此公少嘗樂于耕讀而有志用世既發身科目事太祖皇帝為夏官屬超遷浙江參政太宗皇帝臨御徵為少秋官改冬官又改春官遂進大宗伯改大司馬仁宗皇帝嗣位惓惓於慎刑罰又改大司冦遭逢列聖揚厯中外三十餘年預大議輔大政位髙而䘵厚自恆情觀之則向之韋布所樂豈復有一毫尚留念慮哉然此非可以論公也公學博而識逺志髙而才大推其心蓋惟天下寧謐朝廷尊安生民樂業邊境無事公之樂也矧今聖明在位方圗任老成公宜益攄嘉猷以輔建太平安得慕彼而違此哉而平昔畎畝之不忘于以見其心非酣溺於富貴其風可以亷貪而敦薄者蓋於士俗有警焉士竒與公同朝二十餘年相知為舊間嘗屬余記其石田茅屋余重其可有警也遂為之記常州府廟學重修記學校王政之大端民有養而無教則不可與圗治故建國君民教學為先教道行民知務德斯風俗可厚人材可興而治效可得自昔為天下蓋未有去學校而能為治者我國家自祖宗之世崇重學政皇上纘承大統益敦飭勵而郡縣奉承有祗有怠故學之振舉有能有否常有學數百年中厯兵革屢燬屢復洪武初廟學一新加于舊觀嵗久而敝永樂初撤而再新益加其舊既二十年廟學復敝時郡守二咸闕推官楊誼自監察御史來獨署郡事進謁先師退就學館顧瞻嗟咨曰是可後乎即謀修葺而計費甚巨方事營度郡之好義咸願有助出資市材諏日鳩工仆者植之傾者正之撤壞去腐易之以新工善材良既堅既好廟自大成殿東西序戟門靈星門學自明倫堂志道據德依仁遊藝四齋及賔客之位會饌之舍至於庖廪靡不具完彩繪煥然不浮于度是役也費不出公顧為之有道民爭勸義經始於某年月成於某年月蓋始終皆誼之勤而後知府于文自山西按察僉事來同知張宗璉自大理寺丞來同志協贊用克訖事時大理寺卿胡公槩奉命巡撫蘇常諸郡亦勤助相蓋政之張弛存乎人郡縣吏有不知究大體祗德意而旦暮弊弊案牘期會以為能趍走迎餞以為賢者固不能知養民為何事其能知學校教化之為重哉之數君子皆起家進士知所先務宜其克協於斯舉也常自太伯延陵相繼讓大利其人至于今知捐利為義也自子遊親承孔子之教而率人於學道其遺化猶在鄉也矧今為畿內郡涵濡聖化之密且久宜其興起於善之易也則遊學於斯必有仰惟聖朝之德意及諸君子之用心鄉人長老之勞勤而作其自勵之志將見教化益行賢才不乏鄉閭禮遜駸駸乎治平之盛者皆自兹始於是府學教授余學奭等謀記其成而屬江隂縣學教諭陳孟旦來求文而能道修學之詳者今禮部尚書郡人胡公郡人之助義者衆周孟敬朱善慶其巨擘歟稼軒記夫務適乎巳而無天下生民之思者凡民耳士以及人為道道明於已而或退食其力於幽間無用之地以自適焉者蓋安命守義不得已者之為而非士之素志也古之君子往往皆然泰和王行敏通春秋大義志髙才博喜談當世事稠人廣會行敏出論説娓娓於視今富貴有位人當其意者無幾評泊是非髙下持禮義曲直人不少貸然人以義正過行敏率能屈服甚或加之橫逆亦不校也此非其能明於內而豈茍為自髙也哉其父伯貞先生嘗僉藩憲典大郡有惠利於民弟行儉今為學士於翰林掌制命天子左右譽望蔚然行敏獨家食淡泊自適曰士各有命安吾義與命耳買田百餘畝於邑西半舍許作廬舍田間躬率僮奴治耕堰水為塘備旱乾其用力勤嵗穫常厚雞豚之畜曰蕃而塘兼魚鱉菱芰之利曰用所需悉具飽食無事讀書茅簷之下聲聞林外天氣晴煦不之舍南之舍北與老農相娛嬉或數月一入城就其素所知已晤語少頃掉臂遽去其宴息之居數楹質朴闓爽題曰稼軒軒之前天柱三顧諸峰蒼然秀拔而大江橫其下啓北户而望則武姥之山巉峭竒特而吏胥一迹不及門嘉客時至野服出迓相與坐軒中必具酒酒酣擊瓦缶歌古人田園之詩樂客客或問平居所侣指塘下白鷗及窗外修竹數千挺曰何莫非吾侣也蓋終嵗悠然忘世榮辱行儉在京師聞之躍躍有欣豔之意巳而其同寮君子聞之皆有欣豔意相與賦稼軒之詩余竊嘆曰士知命而樂非賢者不能然命豈一於窮與達哉賢者亦豈自棄夫天之所豫巳者而終不用哉觀行敏所用於巳責於人又豈幽人處士可以終其身也哉蓋昔人有稼名其軒者矣彼未必有行敏一日之樂而其惓惓當世之心未嘗巳也亦其不忍自棄夫天之豫巳者也古今人豈相下行敏有不反而思作而跂乎行儉既稡稼軒之詩寄行敏余於行敏非交遊一世之好故請以余言書諸軒中使勉焉滁州重建醉翁亭記三代而下以仁厚為治者莫踰於宋宋三百年其民安於仁厚之治者莫踰昭陵之世當時君臣一德若韓范富歐號稱人傑皆以國家生民為心以太平為巳任蓋至于今天下士大夫想其時論其功景仰歆慕之無巳也而當時同朝有君子焉小人焉君子不容於小人不能久安於中或暫黜而遽還或屢擯而復用而終能顯其功名者由其君之明也歐陽文忠公以古文奧學直言正行卓卓當時其凛然忠義之氣知有君而已知有道而巳身不暇恤其暇恤小人哉而小人皆不便之故一斥夷陵再斥於滁既復起厯踐清華從容廟堂與諸君子坐致國家於磐石之安者非由君之明乎考公在夷陵嵗餘在滁閲三嵗皆無幾微遷謫之意方曰務保民而與民旦莫相親相娛樂若父子然者君子之道固無往不自得也我仁宗皇帝在東宫覽公奏議愛重不已有生不同時之嘆嘗舉公所以事君者勉羣臣又曰三代以下之文惟歐陽文忠有雍容醇厚氣象既盡取公文集命儒臣校定刻之永樂庚子冬被召赴北京過滁登琅琊山問醉翁亭伹見寒蕪荒址惟醉翁亭二賢堂六字隱隱巖石間顧時滁之守臣無足語者顧其從臣曰邦先賢之迹棄不治如此其政可知矣太息去之後六年太僕寺卿趙君至趙君素慕公之賢又知滁之人思公不忘也出俸倡其寮及滁人復作醉翁亭而刻公所為記置亭中亭後作堂以祀二賢二賢者王元之及公也元之至道二年自翰林學士出知滁州其文章及立朝大節與公相望合而祀之因滁之舊也醉翁亭之前舊有六一泉疏導加石甃焉百費所需不出於公而加於舊規於是滁人嵗時謁拜二賢退而歌詠公之文章又徘徊泉上如親見公之樂乎此也而有以慰其不忘君子之心焉昔召公布政南國後人思之至不忍傷其所息之木而况公嘗樂於此者乎君子之感人心固自有不能已者而非有賢者倡率於上則亦莫能遂所欲為此滁人所以有待於趙君也趙君名次進字孝禮天台人發身科第纍任顯官自廣東布政司參政遷太僕卿於滁豈弟敦厚明達大體所至為所當為以賢能稱相斯舉者太僕少卿蘇實龎塤丞楊文達孫皓宋載劉璧主簿舒伯治及滁人褚士良等十人經始於洪熙元年四月成於宣德元年正月於是士良等請文記嵗月其成之又明年二月甲子記夀徵庵記永嘉黃思恭先生始春秋七十有二將營夀藏於郡城之東大羅山先塋之次卜曰之良先生與其族姻故舊咸往視工先事之夕甘露降兹山凝積松柏之上有巨松直所營之竁其積特厚彌布柯葉皎如雪霜掇而食之甘若飴蜜其姻王止中曰此國家養老之祥殆先生之夀徵歟或曰瑞圖不云耆老得敬則松柏受甘露意者國家將致禮先生者歟止中賦七言長律一章歌以為先生夀夀藏成之三年先生之子淮時為右春坊大學士兼翰林侍讀蒙太宗皇帝恩封先生為奉政大夫右春坊大學士後十有三年淮積官至榮祿大夫少保户部尚書兼武英殿大學士又蒙仁宗皇帝恩以其所受散官及三職封先生又從淮奏以少保祿歸養於是先生春秋九十有三康健和豫聰明不衰所謂養與敬者備之矣然後其鄉之人欣悅嗟嘆謂止中與或者之言之明且信也夫可欲之物凡出乎人者可以力致惟出乎天者非人力所能天蓋可以誠動焉人夀富康寧諸福皆出於天而備於一人之身鮮矣人夀臻於耄期百有一二焉耄期而兼富康寧蓋千之一二加有兩朝之榮命龍章褒拂秩榮一品朱衣玉帶坐享厚祿之養為天下所歆豔者求一於萬不易得而黃先生備之何其盛福也哉易曰視履考祥于以見先生好義之誠恆久不巳歟詩曰永錫爾極時萬時億又以見福之於善人且未嘗不豫定之歟黃氏之祥可徵巳其夀藏之側作新室若干楹先生所時嬉遊者也嘗取止中之言名其中室曰夀徵之庵淮屬士竒記其嵗月士竒與淮聫官視先生父執也竊喜聞夀徴事故敬為之記甘露降於永樂庚寅十月已未庵建於明年辛卯七月甲戌記作於宣德丁未七月甲午云竹林清隱後記士能安乎其內而不為外物動即其身所處不間於貴富賤貧夷險靡不得焉若是者非其察之審養之素定不能也西昌陳一敬君其幾於是哉君疏達爽朗耿耿負氣義髫齓時喪其父巳有志務尚曰挾册從先生學士講説且學為文章傳道理弱冠出為里孰師以資養母所居在邑東有竹數萬竿中作小軒為藏修宴遊之處然少所往來獨深與邑中陳孟省好孟省為人狷介刻厲學問其疾流俗人不直魑魅鬼魊獨與君交披肝膽相向莫逆也兩人者或一曰不見即其意不釋時孟省大父海桑先生以道德為江以西學者所尊亦甚愛重君時來其家留坐小軒中為啓析性道或瀹茗或取酒相酌為樂因名所居曰竹林清隱先生既為文記之居十餘年平川大夫聞君之賢辟為學博士使者奉書幣就其家起之西昌之大夫聞平川使者來曰吾邑之賢者吾不能舉顧令見舉於他邑之大夫吾何名為邑即躬詣其家請見狀其行義舉送之於朝遂以為荔波丞又改賀縣丞兩縣皆在廣右其民雜夷獠不盡馴服君撫之皆得其意至今民意或有所不適即喟然以思曰安得復見陳侯撫我也君既仕有民人社稷之寄食有祿出入有輿馬臺𨽻而其所自處泊然蓋不異昔之在竹林時也既厯佐兩縣輒罷罷輒復窮歸視其家蕭然操畚鍤治園田布衣蔬食暇則取古人書詩涵泳其中休休自足視鄉之宦達所得意非有加乎是也夫能不侈於達者亦不戚於窮世之人一得一失忽而為虎忽而為鼠不能不動乎中者要皆無所見有所見或無所養養之而久久而定定而安則凡觸於外者舉不足撓乎中也如陳一敬君可謂不撓者歟君嘗與余交其女兄之子翰林庶吉士余學夔告余曰舅氏所存如此不為之書可乎故書所知者以附陳先生記竹林清隱之後樵雪齋記樵雪齋者吾邑王伯彰藏修之所也藏修之所而名樵雪者著其志也其言曰人之生皆有所業農業於耕將厚穫豐斂裕於身而足於家士業於學將德修才達聲譽流而爵位顯推於其他業無不各極其所得也然耕稼或有水旱之虞富貴或有憂患之干夫為民之業隨其力所至無大得亦無不得蚤而作夕而休無虞乎水旱憂患超然而獨樂者其惟樵乎故樵吾之所樂為也吾又耻夫世之人汨處淟涊溷濁辱其身而不知侈然以為得故竊有慕乎貞素清節之士而常寡遇焉吾所居在澄江之東一舍許梅花岡之麓每嵗晏間暇空山大雪上下皎然一色獨處齋中靜而玩之以為極天下之潔清無以踰此蓋有以契乎余心此樵雪所以名吾齋也於是可以見其志矣夫天下之事茍處之能不戾乎道不役乎物無不可以安其身而適其心然士之蹈髙懷潔者往往卷其所畜處衆人之所棄泰然自足視衆人之所趣不啻一秋毫之輕此雖未必當乎大中然其所自貴重視夫恌焉竊冒無禆益於時與辱巳而枉道皆卒之為天下後世僇笑者其相去豈直倍蓰什伯哉孟氏有言人有不為也而後可以有為則世欲簡求賢才以為用者必在此而不在彼伯彰磊磊負氣義博涉書史有才具尤工於詩歌其果久於在下者耶伯彰名某王氏居梅岡若干世蓋邑著姓云石岡書院記吾邑蕭自誠先生來京師屬余記其石岡書院余與先生之子翰林庶吉士省身交嘗聞書院興壞始末石岡在邑東南半舍許仙槎江之西梁蕭子雲十七世孫諱遜者始自峽江徙居之遜七世孫諱儀鳳宋舉漕貢始即其居之近作書院聚宗族鄉人子弟而教之儀鳳之子子安為王府掌計從文丞相舉義事敗覆其家書院亦廢掌計之從子福可明經擅為古文詩賦復作書院又廢於元季之兵國朝混一海宇福可之孫則善復繼作之而隱居教授其中蓋先生之父云吾嘗竊謂吾郡之俗所為可重非他郡所及者其民務義修禮尚氣節雖至貧不肯棄詩書不習至賤者能誦孝經論語曉知其大義凡城郭閭巷山溪林谷之中無不有學富貴者遇逢掖士必敬禮之不敢慢易而尤重世族茍其世賤後雖貴盛人固不願與齒而彼亦不敢以其貴盛加人吾鄉之俗如此吾何以知其可重也吾嘗下彭蠡泝大江浮洞庭遊乎楚郢之間又涉淮道舒而東上下數千餘里或行數日不聞絃誦聲觀其人之所務朴者事漁稼智者趍賈販以逐什一之利率資大勢厚者為雄長不務乎詩書禮義不重乎逢掖之士也不辨乎世族也吾未嘗遍厯於天下而齊魯古稱詩書禮義之國今聞其俗猶不戾於古昔然則論風俗之善惡必由乎教學之廢興故先王治天下皆拳拳興學於家孰黨庠術序亦各有制焉石岡書院固古人家孰黨庠之制考其創建以來雖屢廢之亦隨有賢者起而復之不至乎終廢吾郡之不廢其學類此故其風俗所以可重者有由也嗚呼一郡一邑之中不廢其學而俗有可重况於為天下之拳拳於學也哉是不可以不記齊夀堂記齊夀堂者翰林庶吉士歐陽俊奉其祖三峯先生祖母韋孺人之堂也先生生元皇慶初元今九十有八年孺人生元延祐六年今八十有九矣皆耳目聰明康健和豫孫曽繞膝屢受國家養老之澤光榮甚盛此堂之所以名也後登第授官與修永樂大典書成請於朝乞歸省焉且行求余為記其從兄國子助教賢乂為余言三峰先生及孺人之善曰宜為之記歐陽氏居泰和之西蜀江之里其先與宋少保文忠公同出吉州刺史琮其居蜀江十數世積善纍仁其族姓之衍資産之畜詩書禮義之習愈逺而愈盛至先生濶達亷重言動率依於禮法而忠厚以為主恆戒其子孫及其族人曰必飭行為儒者以無忝我歐陽氏處鄉人必本於忠信蓋歐陽氏之族有三峯先生而後益敦於德義文學鄉人有三峰先生而後益勸於善邑大夫嵗舉鄉飲謀賔必曰三峰先生孺人歸歐陽氏七十有六年以孝敬事舅姑以勤儉佐君子以雍睦處族姻以仁善導子孫此其所由夀康也歟洪範五福夀為之首禮八十九十曰耄百年曰期皆夀之至也夫耄期環百里之地有一人焉以為至異鮮能以兩見也或有之不皆出於一鄉一里也而况出於一家之間又共牢而合卺者哉蓋考其初生皆當天下無事之時其本所鍾己清寧純固既壯而未老又遭我國家太平熙洽之運淳厚靈長之氣被於人物固宜光潤綿永而先生夫婦又承之以和平貞靜寬裕樂善斯以獨得其厚彌夀彌康聮芳榮於晚嵗沐天澤於無窮此雖先生伉儷同德合慶蓋亦國家之澤矣先生字以忠三峰其别號云顔樂堂記廬陵胡則顔名其所居堂曰顔樂其志固望希於大賢君子之地乎間求記於余嗟乎其可以易言哉夫顔之樂極其學之所至心與道一而於出處動靜從容安適無往而不得斯其所為樂也其可以易言乎然顔之樂雖樂其在巳者其心蓋未嘗一日而忘利民也孟子稱禹稷顔子同道道在是即心在是得其心而後可以言其樂也則顔詩書故家其為人敦厚詳慎外和而內夷志在利人善醫聞人有急雖風雨寒暑昏莫趨赴恐不及比以名醫徵詣京師京師士大夫家聞則顔善醫奔走迎致無虛日則顔為醫不局於一科其所治無不良效其或一見曰此不可治即不治而去雖更他良醫治終不治翰林沈修撰一弟甚愛之忽病目求諸專科之醫一醫曰疾本深矣不可責近效藥之半嵗其或庶幾也一醫曰當施大藥非百緡直不可言巳皆竟去不顧沈修撰懼遍求醫之良得則顔則顔視之曰此風毒所侵耳即治不過五曰愈藥之五曰愈胡學士女兄之夫病傷寒時在舟中求他醫往治醫問所病證曰此殆死也不肯行胡公百方強之且約厚資謝始行明日還報曰其果死也更求則顔則顔往脈之曰此病欲解矣施兩劑而愈繼復病數劑愈司經芮洗馬病目其劇如沈氏往求則顔則顔曰此可三日愈藥之三日愈翰林周編修得痿疾劇初朝廷命蔣御醫治未幾蔣有使命出外他醫弗能繼也則顔繼之竟愈既而周之家人皆疾他醫皆難之迎則顔則顔皆愈之庶吉士劉孟鐸暴病亟甚恆所往還親愛者環視之悚然則顔素厚孟鐸脈之搖手曰易易耳無怪也施數劑愈進士曽用常兩足腫則顔曰當急扶元氣腫不足治也他醫曰當急治腫曽信他醫則顔爭不得數日卒翰林庶吉士陳孟京始得疾則顔視之愴然曰不及矣衆未信之走致數醫治卒不治余在京師目見其治效彰彰如此每愈一疾輒自喜而人德之與否不計也即知其不可治輒憂形於面此其心之所存可知矣夫其心之所存與志之所慕者茍不相倍因是勉勉自修積誠而不已則大賢君子之地未有不可幾及焉者孟子曰顔何人哉則顔歸而求之可也則顔與余同郡故為記其所能與其所存者如此使勉焉江隂縣先聖廟學重建記太祖髙皇帝正大統之三年詔嶽鎮海瀆封號如古制以山水稱忠臣烈士稱當時初封出於厯代所加者一切罷去孔子明先王之要道為天下師以濟後世非有功一方一時者比封爵宜如厯代所尊崇著於令典垂之千萬年而定鼎之初首建學立廟京師親臨釋奠又詔通祀於郡縣又詔罷從祀之戾於孔氏者所以揆前聖之大中而垂永代之洪範也夫孔子之道天之道也國家生民不可一曰以無者伏羲神農黃帝堯舜禹湯文武行斯道於上孔子明斯道於下皆聖人也而使後之繼伏羲神農黃帝堯舜禹湯文武之位得以行斯道者孔子之功也論其功而隆其禮明聖之心也列聖相承益欽益至繇是自京師至於海隅郡縣皆有廟學其人皆知孔子之道尊且大而况邦畿之內且延陵采邑先賢禮讓之化未泯其人心嚮慕興起為何如哉江隂縣學嵗久而弊侍郎周君巡撫過之慨然興歎曰廟不飭何以妥明靈致誠敬學不飭何以興教化成賢才忱奉朝命來事寧有重於此乎謀撤而新之為縣者聞之悚然曰此吾職也敢不祗承民耆老聞之躍然曰此以善吾民也吾其可坐視於是相與合謀賃工市材易故以新作大成殿十有六楹前作東西兩廡各若干楹殿之後為明倫堂若干楹左右為兩齋各若干楹庖廪門垣咸備以固髙敞𢎞麗加於舊規由是縣長二學官諸生嵗春秋行禮廟廷對越有嚴秉虔將事用稱朝廷崇祀先師之意而諸生退即於學敬修所業以求無怍於古聖賢將上以光國家之用下以厚邦邑之俗所係豈細故哉訓導嚴頥書來請記廟學之成夫受命在政教之任而能知本源之意有倡有隨協志畢力不費於公不勞於衆以底成功可為無忝而為民父兄於義事奮起趍赴皆如當然又以見人性之善而王化之被皆可書也肇斯舉者周君名忱永樂甲申進士纍官工部右侍郎其巡撫江南諸郡適嵗荒歉勞心賑恤民賴以濟而所至勤於學事相斯舉者知縣朱應祖主簿胡忠而忠始終效勤耆民周孟敬朱善慶等皆助資曹宏黃惇等分董役事經始於宣德六年二月成於明年六月記作於十年十有一月嗚呼後之有政教之任於斯為民父兄於斯者可以鑒矣文丞相祠重修記孟子曰我知言我善養吾浩然之氣知言者盡心知性而有以究極天下之理浩然之氣即天地之正氣具於吾身至大而不可屈撓者知之至養之充而後足以任天下之大事天下之事莫大於君父文丞相甫冠奉廷對即極口論國家大計未幾元兵渡江又上書乞斬嬖近之主遷幸議者以一人心安社稷固巳氣蓋天下矣自是而斷斷焉殫力竭謀扶顛持危以興復為己任雖險阻艱難百挫千折有進而無退不幸國亡身執而大義愈明蓋公志正而才廣識逺而器閎浩然之氣以為之主而卒之其志弗遂者蓋以天命去宋也雖天命去宋而天理在公必不可已故宋亡其臣之殺身成仁者不少論者必以公為稱首公事具宋史而公鄉人劉嶽申撫公所著目録吟嘯集指南録集杜二百首及宋禮部郎官鄧光薦所述督府忠義傳以作公傳視史加詳實焉北京之有公祠洪武九年前北平按察副使劉嵩始建於教忠坊今順天府學之右而作塑像焉永樂六年太常博士劉履節奉命正祀典始有春秋之祭於有司嵗以順天府尹行事宣德四年府尹李庸始至謁公祠下顧瞻祠宇弊陋弗稱遵用詔旨葺而新之而凡祀神之器靡不備具又求劉傳刻石將使人人皆知世之為臣者光明震動焜焜烈烈有公也於乎忠孝人道之大節治化所先而崇禮先賢表勵後人尤守令之急務庸其達為政之本歟庸字執中保定唐縣人寬厚明敏自太學生授工科給事中上親擢為順天府尹愛人之心剸繁之才上下皆稱之而盡心學校敬賢尚德如飭昌平之狄梁公劉諫議祠而嚴其祀事之類皆其知本之務皆可書也因并書之以示來者楊氏祠堂復建記士竒一嵗而孤上賴祖考之佑母夫人之保育教訓用克成立然素窶既壯而仕積其䘵入始稍理田廬蓋先廬悉燬於元季之兵而故址在邑之學宫之北者諸父兄以窶而售之人矣仁宗皇帝臨御進士竒官秩䘵賜加厚始克以五十餘年寢食不忘之心五倍元售之直而復故址乃命稷治居焉居之右故有祠堂亦燬於兵遺弊室數楹則族父之窶者假息其中厯三世矣族父之先有故址在邑西為橫民所據巳久力不能復至是代厚資內據者為復之而使其孫歸治居焉遂命稷循故復作祠堂古知禮君子營宫室必先祠堂士竒之不能蓋復之於人者有先後也吾髙祖以前居邑東清溪之上暨曽祖始徙學宫之北居與祠並作焉作四十年而燬於兵又二十年而淪於異姓又五十有餘年而余始克復之既失而得既燬而完雖辛勤積纍而非祖宗仁厚之澤何以能致哉祠成祀四代嵗時行事悉遵朱氏禮楊氏繇吉水徙泰和清德正學代有紹續逮吾曽祖發而益𢎞有惠及民有傳在史祖考以來或仕或處履道執行清白之節靡有間焉覆被及余夙夜凛乎荒墜之懼而今春秋七十矣顧吾之子若孫其可一曰忽忘先德而不圖惟敬承之哉承先之道仁與義其要也學以明之誠以行之而持不息之功若是者豈惟無沗祭將受福焉蓋明德者格神之道也父子祖孫本同一氣幽明相通不相違也惠之則神歆而福降悖之則否而皆隂鑒潛察於平居曰用之際矣匪直奠薦灌獻之頃也凡後之有事於斯堂者不俯思而篤行可乎故書所以復建祠堂之故而又書所以感格神明之道以示吾後人堂不易舊規經始於宣德八年正月成於是年八月明年正月壬午謹記東里文集卷二
