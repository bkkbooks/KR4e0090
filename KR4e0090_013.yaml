body:
  text: 東里文集卷十三明楊士竒撰神道碑奉天靖難推誠宣力武臣特進榮祿大夫柱國前軍都督府左都督永康侯追封蔡國公諡忠烈徐公神道碑公諱忠字仲達姓徐氏世家廬州之合淝父諱用元季守宣城我太祖皇帝兵至宣率衆歸附命仍其職遂從征討以功實授管軍百户從守南昌進武略將軍河南衛副千户洪武壬戍自陳老疾命公代之丁卯從征北邊至喀爾喀之地還城大寧無幾調大寧備禦戊辰從征金山之冦之為邉患者屢戰敗之獲其馬牛輜重賜白金鈔幣庚午運兵餉數十萬斛赴溫口遂從征鼐爾布哈大敗敵衆俘獲其人口萬餘總兵遣公護送入關公悉心撫恤俘者如歸升濟陽衛世襲指揮僉事乙亥城懷安萬全丙子率兵從征北邊至驢駒河而還丁丑往填開平己卯太宗皇帝舉北平之師公首從義旗克密雲克雄縣真定取永平克大寧還戰鄭村埧取廣昌薊州戰白溝河皆竒功進攻濟南克滄州大戰東昌及夾河攻彰德破西水寨克東阿東平汶上大戰靈璧遂從渡淮及江至亰師公臨戰奮勇百夫莫當出入敵陳率在衆先白溝之戰敵揮刃斫公兩指未殊公自斷指擲地裂衣帛裹創仍奮進戰其馭士卒撫恤誠至人人歸心而號令嚴明所過無擾上行師恆飭諸將毋妄殺曰吾奉天弔民厲民違天何望有濟公承命顓顓惟執兵迎拒者不容而誘諭招徠綏撫降附多效力焉其以功進官自指揮同知歷都指揮僉事授奉天靖難推誠宣力武臣特進榮祿大夫柱國前軍都督府左都督永康侯食祿千一百石子孫世襲賜誥劵追封曾祖六二祖七九及考皆永康侯曾祖妣陶祖妣王妣張皆永康侯夫人永樂己丑暨癸巳車駕巡狩北京仁宗皇帝監國上以公敦厚老成留之南京兵政一以任公公小心寅畏清靜簡易上下咸宜之一日夙興盥櫛衣冠坐都督府得風疾遽卒癸巳八月二十四日也上在北京聞訃震悼輟視朝一日遣官賜祭給賻命有司治喪葬追封蔡國公諡忠烈并加封其三代考皆蔡國公妣皆蔡國夫人配亦蔡國夫人仁宗皇帝在東宫遣祭賚賜甚厚公沉毅質恪有孝行旦暮出入必先詣家廟事繼母敬愛兼至小有訓責必跪受雖貴不變所得上賜必謹視之約已守法未嘗有過接人恭謙和氣滿容語簡而誠洞見底裏春秋五十有二而卒卒之嵗十一月二十七日葬江寧縣安德鄉長岡之原子男二安山夀安襲侯爵女二長適指揮使孫竑次適沐儼安奉國子祭酒具公泰所述事狀求文刻神道之碑士竒與公同朝十有餘年後同侍監國相厚知公之行加詳故為序而銘之銘曰桓桓徐公為時虎臣襲家之勳奮武以振天啓聖明義旗爰舉挺誠來從股肱之輔皇麾所指公迅前驅誰抗誰禦拉朽折枯神武不殺公行聖志來迓來歸撫綏勤至仁施如春義行如秋公實左右威懷並流臲卼既安氛翳咸廓宗社再隆褒功命爵悃愊無華厚重靡遷貂蟬充廷孰愈公賢鑾輿北狩聖儲監國峙武以衛孰優公德肅肅小心溫恭靖嘉巋焉老成為國之華維孝維忠在公允蹈宜貴宜富昌不耆耄都門之南聿崇起墳過者下車視兹刻文贈資善大夫都察院右都御史兼詹事府詹事向公神道碑銘洪武二十四年十月十一日南昌之進賢處士向公允恭卒其葬也前江西儒學副提舉熊釗先生銘之後三十有四年為洪熙元年天子推恩大臣時處士之子寶為資善大夫都察院右都御史兼詹事府詹事遂贈其祖若考散官官皆如寶祖妣妣皆夫人寶奉命書薦告已退具其考之事狀以告士竒曰惟上之大賜與先考所以身致今之光榮者皆不敢以泯幸為之文將刻石墓道以永示我後人按狀向宋左僕射同平章事諡文簡諱敏中之後文簡曽孫子蔚以欽聖憲肅皇后家從髙宗南渡其子性事孝宗官至大中大夫封魏國公贈少師少師生朝奉大夫士煜朝奉生臨川縣丞公道娶進賢許氏因葬其父進賢遂家焉臨川四世至居敬娶胡氏生熙載熙載娶羅氏生雲翔雲翔娶章氏公之父母也自公以上三世皆有厚德不志榮利而家秉禮度肅然他之名世族者不及也公諱祖紹允恭其字幼聰慧七嵗讀書涉通大義且強敏善記其事父母孝愛其弟厚資業恣所取弟死無子選族子為之嗣其於人賙窮乏矜憫無告恆汲汲嘗嵗歉鄉莩死甚衆時田麥且熟有盜刈之者公得盜及麥不忍發或教公執盜送官當併得其田廬公曰凶年民果得已為盜耶且困人于厄而奪其所有吾所不能人以是服其長者國初安仁土豪楊漢既以饒信建昌內附而其下所過猶縱剽敓厲民公鄰人陳氏無子唯一女始笄為所剽父母痛憤然莫敢誰何公毅然以其人訴行省卒還之所為義舉多類此里宴會有暴發少年倚資巨不讓直入據上座公怒戟手數其過切責之少年慚懼趍降請謝公亦改容歡遇之蓋公襟宇洞達遇義所不可剛正直奮不畏強禦而彼能改過即霽顔開納無所凝滯焉人有忿爭不相下率走公求直平生好德樂義邪僻之念不作於心非法之言不出諸口間居儀貌儼肅子弟侍側者皆謹自飭如侍嚴師不敢稍縱寶始就學勵之曰立身必以儒及仕又曰守官必以道寶嘗坐纍逮繫公不色憂有以為問者曰吾兒所存心行已當逺大此不足為纍至今鄉人號明知子者必推公蓋春秋七十而卒會葬千有餘人斯亦可以觀其行矣夫人熊氏邑儒家子有孝敬儉勤之德所以為婦為母者族姻蓋視以為法先十八年卒子男一即寶女二長適王次適熊皆先卒孫男五劉孫早卒可觀可規可覯可寬女四曾孫男一寶洪武乙丑進士兵部主事員外郎應天府尹以至于今官歷事列聖四十有餘年恭愼之行氷蘗之守寬厚之施夷險一致魯無君子斯焉取斯要其本諸家者深矣銘曰顯顯宋臣曰向文簡扈蹕來南向以戚畹逮臨川丞啓家進賢繩繩振振式繁子孫有閌髙門有嚴禮度居處執恭出入秉序世德之承誦法鄒魯進賢七葉曰允恭甫維允恭甫外方內仁志之所存惠逮于民其潛在下隨所分力民之懷之孰匪厥德其嗣奮楊熙帝之載推考之志而施逾大帝曰俞哉覃澤所自龍章褒揚日星輝麗豸冠犀鞶靈飇翼驂嵗時薦祀來蒞來歆行有報施兹維德召墓道琢辭來世是告奉天翊衛推誠宣力武臣特進榮祿大夫柱國追封平江侯諡恭襄陳公神道碑銘太宗皇帝初自北藩舉兵內向至江上都督陳公瑄具舟迎濟事平上正大統録功賜公奉天翊衛推誠宣力武臣特進榮祿大夫柱國封平江伯賜誥劵陳氏家合淝其先世具余所著其先公墓碑公字彥純自少穎敏不凡好善惡惡內篤孝行洪武中侍父官成都習兵略精騎射以武臣子選侍大將嘗從出郊遙望孤鴈雜鵝羣命衆從者射不中最後命公彂一矢斃之有鴟翔于上命公射應弦而墜自是屢試皆竒中衆大服而公不自為能朝廷命總兵者作蜀府宫城遣將伐材於山所行失律且材不中度又所經瘴地士多死總戎察公可用遂命之公善撫綏明號令别取善道七百里以入先期而還士不病所得材皆適用總戎者嘉之又命董繕作具有條理遂從征南畨岩州中亭及散毛鎮南咸建勞績代父職為成都右衛指揮同知父坐舊纍謫戍遼陽公伏闕奏請代行特詔父子並免復職衛卒數輩叨詖狙詐狹制上下為衆患公次苐悉去之善類以安從征越嶲討建昌酋長伊埒特穆爾踰梁山平天星寨破寧畨諸蠻駐西河口諭降夷人數千從總帥復征鹽井平三山寨及小伯夷進攻卜木瓦寨據要害立堡以斷賊路官軍分三隊進公居中已而左右兩隊弗支奔還公所統僅百餘人冒險先登賊數千圍公公下馬率衆且射且斫賊疲稍却公亦傷足裹創進戰自己至酉賊敗走公全所統而還復從征餘冦賈哈喇時冦衆數萬據嶮以拒官軍分三道公軍後進由畨西涉打中河得間道乃出竒兵作浮梁渡河既渡撤梁以固士志遂壓冦境冦憑嶮迎敵一日十三戰奪其嶮明日復力戰凡七合冦大敗遂入其壘簡鋭卒出哨令望見前軍旌旗即舉炮俾知己敗冦仍遣五百軍斷冦走路冦窮出降械送賈哈喇京師撫輯其餘衆公及麾下皆被升賚從蜀獻王巡邉招撫邉夷兼理茶馬之政邉人恱戴灌口都江堰壞民苦水患公修其隄防躬督工作為堅久計矜恤無告出資置義田二百畝于成都積所入租凡貧不能衣食不能婚嫁及死不能斂葬者皆給之會雲南兵征百夷以功升四川行都司都指揮同知遂進右軍都督府都督僉事太宗皇帝知公才可任時北京軍儲不充命公歲董運百萬石道海給之公措置井井創建百萬倉于直沽尹兒灣城天津衛籍兵萬人戍守公善任使均勞逸秋豪無取于下凡漕徙姦弊掃除一清漕舟所經海島夷人畏憚官軍悉閉匿公下令俾出為市而遣官監臨平其直軍無敢譁人兩便之舟還值倭冦劫沙門島公率衆追至朝鮮境上焚冦舟殆盡冦以殺溺死者甚衆奉命率舟師於閩海備倭冦者三海溢坍沒隄岸起揚之海門歷通泰北至鹽城凡八百里奉命以四十萬卒修之航海至者茫洋莫知所停泊往往膠淺公于太倉相可泊處以二十萬卒築髙丘二十丈延亘十里為表識衆便之稱寶山事聞上親製文樹碑焉既建北京罷海漕浚濟寧臨清河通南北往來仍屬公董餉運公建議造淺艖二千艘初嵗運二百萬石為之有方後增至五百萬石國用以足若疏清江浦引水由管家湖入鴨陳口逹淮以免淮河風濤之患就管家湖築隄亘十里以便引舟浚儀真瓜洲二埧潮港之堙鑿吕梁徐州二洪巨石以平水勢築沛縣刁陽湖濟寧南望湖長隄開泰州白塔河通大江築髙郵湖隄隄內鑿渠亘四十里以通舟南北造梁以便陸行自淮至臨清相水勢髙下建閘四十有七以時啓閉皆舟楫通行永逺之利于淮濵作常盈倉五十區以貯江南輸稅于徐州臨清通州皆建倉以便轉輸慮漕舟昧河深淺自淮底通州濵河置舍五百六十八所舍置卒俾導舟可行處緣河隄鑿井樹木以便夏月行者凡于事慮之周而為之果仁宗皇帝初臨御下詔求言公首言七事大槩謂南京國之根本宜為久逺鞏固之計選將益兵以嚴守備長民長兵皆宜擇賢能然後政舉而下不失所賢能在推舉推舉在核實乞選朝臣之公正者分巡天下考察百司政事得失進廉能黜貪鄙則官得人而治可興今府州縣學教官多不得人乞令風憲考察罷黜别選今中外軍伍多缺蓋由所管頭目私役擾害不勝致其逃逸乞勑都府兵部都司嚴切禁約就行清理老疾者令户丁代逃逸者責限追捕户絶者驗實除豁伍籍又邉防之要在兵食足近歲如開平等處城不足兵兵不足食所守何由完固乞選武臣之有方略者授以精兵足其衣食給之堅利器械俾曰教習如有沃壤令兼務耕守今漕運惟江西湖廣浙江及蘇松諸郡去北京甚逺漕河又有洪閘淺凍之阻往復踰年雜費數倍正糧上逋公租下妨農務乞自今令運于近便淮安徐州等處收貯别令官軍運至北京則民力可蘇農務不妨各處官軍每嵗漕運畢財力殫乏到家又修理壞船運來歲糧勞勤可憫其所管頭目又加别役以重困之乞行禁約今後漕運軍士不得再有别役馬船快船惟二三百料者可行于漕河所載不過五六十石每船已有額設水夫今又于緣河拘集軍民聽候其至接遞聽候日久衣食艱難有至行丐者乞自今罷之上覽奏嘉嘆命有司咸即施行賜勑奬諭有老成忠愛之誠之褒加之重賚賜誥追封其曾祖省三祖重一考聞皆平江伯曾祖母孫祖母朱嫡母王生母王故妻湯皆夫人命子孫世襲宣宗皇帝臨御命公鎮守淮安兼督漕運公至察宿弊之為民厲者悉革之豪猾姦宄皆斂避境內以寧時已嬰疾而躬勤旦莫靡有滯事疾間入朝深被嘉勞賜宴賚還至淮安無幾疾復作上聞特勑勞問時子儀在侍衛令挾醫馳驛往侍竟薨宣德癸丑十月十一日也春秋六十有九訃聞上悼嘆輟視朝一日追封平江侯諡恭襄賜祭命工部營葬公為人闓爽英毅𢎞度偉略稠人廣會談論亹亹倫輩推服公餘披閲載籍考知往古成敗治亂之故喜近逢掖士時相講議善交際能推利為義所至以濟人為心多所建置人用德之不忘家有樂善堂恆舉鄒孟氏仁義忠信樂善不倦之語以勉子孫配某氏封夫人子男五佐襲平江伯後公數歲卒次儼次儀今為勳衛好文事精武略次倫次侃女三李芳江隂衛指揮同知張英其壻也一未行孫男三裕今襲平江伯祐祼女七公葬以薨之明年三月墓在江寧縣大山之原余與公同朝三十餘年相知且好于是儀以狀求著神道之碑故按狀敘而銘之銘曰繄公挺出何桓桓武兼勇智追前聞材藝夙試卓寡倫峩冠三品承考勳蠻溪獠洞獫猲羣負嶮弗擾獰且䞭公奮掃刮迅拔塵湔滌腥穢寧邉民有嶻譽望齊峨岷歘徴來東衛宸垣遭承興運效駿奔録勞疏封昭鴻恩貂蟬鞶玉衣繡麟報賜志企古藎臣單心畢慮靡夕昕滄溟茫洋渺涯垠嵗漕萬艘奄然臻有梗于海威赫震斬鯨戮鱷焚甲鱗崇表海岸亘長雲雲章龍彩天垂文南賦北貢艱以辛踰淮歷濟底天津疏堙鑿堅劬且勤坦行如砥戚者欣猗嗟公篤孝與仁厥施諸時績弗泯愛國亦有嘉謨陳功載册府被後昆大江之陽巋有墳太史銘之昭不刋故驃騎將軍左軍都督府都督僉事王公神道碑銘正統四年八月十七日左軍都督府都督僉事王公瑜以疾終于通州之驛館訃聞上悼惜遣禮部尚書賜祭加賻勑有司治喪葬京師親王遣祭公侯六卿皆詣弔祭既葬其子縗絰奉其弟瑄所述事狀踵門泣拜求書墓道之石余為之歎曰忠義為臣之大節如王公之挺特獨奮忘其身以為宗社計豈非卓然大丈夫哉公字廷器始代父長五十夫選𨽻趙簡王護衛永樂癸卯五月太宗皇帝微不懌數日未出見羣臣仁宗皇帝在東宫軍國政務悉啓聞施行邪僻傾險之徒不得騁其私咸所不便簡王時留北京敬修孝弟其護衛指揮孟賢等十數輩潛結歷官王射成等及內侍養子共搆邪謀欲俟宫車晏駕矯詔從中出立簡王而已得志焉實祕不令簡王知蓋慮不從即事敗齏粉而尸其謀者公姻家髙以正布置已定髙密以語公公駭曰此天壤間極惡大罪鬼神所不貸者奈何甘為覆家滅祀計髙不聽又涕泣戒之髙怒而慮其泄也謀害之遂詣闕入疏上覽之初疑其詐諼曰豈應有是反覆詰難衆為公危公辭色不少挫既捕賢等至上親問狀得其邪謀本末及所造偽詔立誅以正射成及內侍養子升公遼海衛千户後賢等皆伏誅召還又升懷逺將軍錦衣衛指揮同知有旨戒其同官事必關白瑜勿謾公正直坦明每事求當大體所𨽻官校心歸之無間言見知于上宣德中升都指揮僉事命署左軍都督府都督僉事充左副總兵佩漕運印總督江南民賦之輸北京者兼守淮安正統初實授驃騎將軍左軍都督府都督僉事在淮安承平江伯之後謹守其遺法不變展誠布公虛已從善處同官能讓淮安兵民雜處橫兵素怙勢厲民公至首下令禁戢為政重倫理有富民親在而與弟競産訴於公者公曰爾冨而委親之養于弟而又訟弟孝友二行皆缺矣杖而斥之人服其明臨政務寬有二卒盜敗舟一板臬司坐盜官物抵死以質公公曰兩卒之命抵一敗舟板耶改坐不應平恕多類此好以義感人有婦翁以白金畀贅壻為市取息者壻不善市不能償索之急欲自經翁執以告又有自顯官歸資槖豐厚其弟有宿逋貧不能償索逋者急弟乞償于兄纎芥不得公聞之皆為代償荒嵗彂廪多所賑活嘗覽農桑撮要嘆古人用心民事遂益其所未備者十數事刻梓以傳滇南有浮圖人鼓其師之説所至惑民淮安典兵者與之昵為建剎居之而廣敓地為民厲公笞浮圖人逐之悉復民地淮人死不葬焚尸而委于水公相城外多空地畀民以葬遂革焚尸之俗築室所居之側延師以訓武臣子弟間暇躬往督勵如己子弟然亦時蒞郡縣學敦勉博士弟子喜近儒生時與講論前言往行至忠義事慨然有嚮慕意若涉悖亂即義形于色家居敦孝悌之行仁其族姻周且厚所至以愛人為心雖貴嚴于自守于利不一毫非分取服用清約門無私謁致勤于公雖病不廢至是以計事詣北京力疾入見又明日出視漕舟竟不起享年五十有七公山陽人其先見余所著其考墓文曾祖文貴祖彥逹父銘母成氏繼茹氏朝廷推恩以其官品贈二代并封其元配許繼吳皆夫人子男五塤均垍孰堪女一未行其墓在宛平縣狼山村之原銘曰人道所重綱與常忠義實關世範防偉公志徑百錬鋼上衛宗社尊天王挑摘姦宄發潛萌狐虺斬馘妖魅􅜙嘉忠褒貞騰寵章簡亷任能升周行攄勤效智挺厥誠惠流績建譽孔揚大星俄隕吁可傷榮哀始終炳煌煌峩峩崇丘斯永藏龍泉下閟含精光升貫牛斗逝不亡東里文集卷十三
