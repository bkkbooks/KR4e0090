body:
  text: 東里續集卷四十一明楊士竒撰墓碣銘蕭時用墓碣銘洪武己未十二月某日吉水蕭時用卒明年某月某日葬其里黃家塘之原又二十九年為永樂丁亥其子公騰奉其姻家夏侯時雨所狀事行走京師介余友禮部主事尹昌隆求文銘墓余辭之而求益固於是三復其狀作而嘆曰嗚呼士處邱園幽寂無事之際恆自詫其才藝可以試於時朝試而夕效及其沾一命領一職巽耎蓄縮無分寸之施或至於自僨其身為世僇笑若時用者未嘗有所自道亦未嘗沾時一命而平居綜理公私百務井井有條理可觀而年三十有九以卒甚可惜也夫時用諱士益系出南唐御史大夫儼曾祖季章祖德祥父師文時用瑰瑋尚志居家孝於親元季兵亂悉喪其所資皇明混一海宇走江湖治奉養之需家用饒裕縣令丞推擇長萬石是時公府百役之費皆出萬石長他萬石長往往以私賄致破滅時用攄勤致公道民以義而規措有法民皆自勸率出布供公上以為當然由是郡縣皆以為材而民親見他萬石長縱私害民而已無害無不愛願之者其所能大率類此舉一可知己所居有園田之樂作孰館禮致文行之士為子弟師不間踈戚逺近即有急赴之惟恐不及娶戴氏子男二公騰公蜚皆克樹立女一適張東興孫男三賢良裕銘曰驥駿良兮弗駕而羈彼駑弗任或大路以馳嗟嗟時用孰不用時遽止於斯藏於斯兮許忠信墓碣銘許氏故襄城巨族代有顯仕至元曰居敬者始不仕而隱於耕徙家汝水之濵相土建宅引泉為池環植栁數百株而教授其中鄉人髙之號栁隂先生五子皆以誠字之曰此人道之本也五子亦克謹父訓第五子守誠生忠信諱某儀貌魁偉資稟淳厚而剛方自持世其祖父業非其人弗與友非其義一毫不以茍取郡縣推舉耆老自守令以下率從咨政焉治家教子皆有方或學或耕各稱其才而授之嵗壬午某月某日卒春秋七十有四葬某鄉先塋之次娶王氏柔惠端淑相夫之政於內克恭以勤訓飭其子若婦嚴於禮度以義處事以恕待其少者賤者享祿養十餘年永樂十七年某月日卒於北京春秋七十有五其歸葬也從於夫之墓四子長曰綱次曰英好學而文洪武中舉孝亷授延安府葭州稅課使卒於官次曰廓由鄉貢纍官工部侍郎次曰良蚤卒孫男若干至是廓涕泣謂士竒曰惟先考妣棄不肖孤今墓木鬱然為林矣而墓石未有刻文將先德何以光昭而不肖孤何名為人子也遂出所述事行曰願徼惠於執事士竒不得辭為序而銘之銘曰許氏之宗肇出於薑太嶽之裔繇周啓封介汴及潁許昌是居入於春秋不一其書涉漢沿唐益蕃以敷簮纓之華代有譽望元之中葉始斂弗揚秉德執行表範邑里既其子孫咸襲厥趾嗟忠信甫既肅且溫有嫓於中允矣令人亦既有子善慶斯徵際時顯庸式光所生墓門有石紀行琢詞雲仍來來世篤弗隳周處士墓碣銘泰和邑之南雲亭之鄉大原之里有處士曰周叔京先生學足以究經行足以表俗而沒草有八年未有發諸潛德者仲子和始以狀屬諸士竒按周氏里巨族故富於資至所敬甫尊賢禮士不自恃其資傑然以行義為豪先生之考也母蕭氏兄弟四人其三先生也諱西叔京其字幼而秀頴端重長而喜學問從明經師蕭尚仁受毛氏詩駸駸見端緒矣而喪其父哀毁葬祭一中於禮已而兵亂作二兄相繼歿盡力教養其孤底於成雖亂離奔竄與季弟養母盡愛敬其孝友蓋天性云執守確然不以纎芥利欲之念置其中間居飲清茹淡讀書教子或攜朋從相羊山水之間悠然自足嗜為詩雖紛冗不廢吟咏尚書劉公嘗序其集洪武丁丑子鼎為興平縣學教諭迎就養先生亦樂一逰關中以弔觀古人之遺迹既至數日得疾遂不起九月十四日也疾且革顧鼎無他言惟曰詩書可以承家忠孝可以立身而已春秋六十有三娶陳氏元潮州路儒學教授以道之子先卒子男二長鼎選鄉貢兩任教諭升台州府儒學教授以卒次和以父命為叔季中後舉明經厯醴陵新樂二縣儒學訓導女二劉士鴻劉士堅其壻也繼室蕭氏子男二賀贊孫若干初鼎奉先生之喪歸葬未叶吉卜今和將改葬於隆八仙之原而奉陳孺人祔孺人先待制外孫於先諭德兄弟也士竒少時屢親炙先生又聞諸父道先生平生尤詳故撮其槩述之而為墓之銘曰清泉兮白石蒼蒼兮松柏思君子兮夙昔雲乘風兮西飛忽復兮東來悲君子兮不歸白日上暉兮黃壤下翳千嵗之後兮庶將化而靈瑞柴處士墓碣銘洪武乙亥九月草七日錢塘柴處士卒明年葬餘杭厚郎山之原後草有九年為永樂甲辰某月某日其配嚴氏卒其孤魯車奉以合葬於處士之墓車遂以狀求余銘墓余嘗聞處士之義於士大夫間而車嘗佐藩政吾江西也江西之人至於今稱之余故受狀而不辭柴氏世家錢塘靈芝鄉之義溪里祖某父某皆富而樂善處士諱望字宗禮幼而岐嶷比長用志於學時廬陵李中伯參議浙省喜造就後進處士往從之李公深見器重屢欲薦用之固以親老辭自是唯養親為事名其退休之居曰芝塢草堂讀書教子其中恆誨其子曰植家本於農植身本於學無用他求也泊聲利里俗重浮屠老子法絶口未嘗及性和厚公方人有忿爭不平者導諭以禮強梗弗率者裁制以義一鄉賴焉急人之急如飢渴初王師下閩清流縣賴氏母被虜其子求之四方十數年遇諸杭而貧不贖則日悲號於路處士聞之為言於上官卒迎以歸處州進士金觀僑於杭與處士交觀貧有母處士給田以資其養觀母卒觀以哀毁亦卒觀妻又繼卒而子幼不能葬處士悉為備棺斂而經營以三喪歸葬金氏先塋之次又教育其子底於成立史官蘇伯衡徐一夔皆特書其事以傳所為義舉槩類此喜交際縉紳君子過其門者無虛日天氣融霽則招朋徒相羊名山勝水之間興有所適或旬浹忘返翛然塵氛之表也嗚呼以處士所存所能使用之於世何往不宜而獨布衣以終非自求其志者歟春秋六十嚴氏同里人柔婉慈惠族姻皆稱其賢春秋八十有五子男三長愚處士卒之嵗亦卒次魯次車起家鄉貢進士兵部職方郎中江西布政司參議嶽州府知府復入為職方郎中材行為時所重女一歸許氏孫男六振援拯拱抃拭女三銘曰夜光之珍潛於淵兮合抱之堅藏於山兮世莫之求式全其天兮含章返真德人之全兮黃處士墓碣銘處士諱生字宗道姓黃氏世家建寧髙祖諱某仕元為建寧路總管金牌千户有厚德曾祖諱仲賢祖諱志可父諱原振皆懷德弗仕母魏氏元鎮國上將軍福建宣慰使天祐之女處士幼有令質四嵗能誦詩父竒之嘗曰興吾家者此兒也七嵗出就外傅日記數百言長而博通諸書尤明於易至於隂陽卜筮醫藥雜説亦皆涉獵而孝事父母生養死葬靡不竭盡於其弟宗錫友愛甚厚宗錫蚤卒教育其遺孤長為之婚一如己子族人之貧而凍餒或生不克婚嫁死無以斂葬者皆賙之推而賙其鄉里亦然臨利能讓喜愠不色見闢一軒多藏古書名畫軒前植竹數百挺日焚香清坐其中吟咏自娛或勸之仕曰自顧其何所取材且幸有少園田足為仰事俯畜之資敢萌非分之意哉有舉其材於天官者符下引疾辭平生所著有竹軒吟藁藏於家嵗辛巳五月十九日卒年嘗慨師道不振學者日趨於簡陋至是毅然自任嚴約束諸生而身率先之於道德性命之旨正心誠意之方為之開諭反覆詳明而常戒以敦本務實學正學為正人無徒茍事文藝為利祿計至評論古今人才賢否亦必以此諸生翕然嚮服退而相率遵承先生之教不可以違有過更相責善惟恐先生之聞之也先生孝友恭儉出乎天性一言一行皆以誠為主動循禮法布素泊然家無餘畜非賔客不兼味非其義一介不取而輟已以賙族姻振匱乏者常如不及介然特立同郡名德宿儒惟梁孟敬劉仲修胡行簡張美和聶器之相與為莫逆交洪武己巳五月留郡庠顧次子行曰明日之夕吾其死乎得微疾諸生進醫藥先生止之曰命矣時長子幼孜從學二百里外獨行侍側先生手書四十字詩一章示幼孜書遺命數事示行又書四十字詩一章謝素所往來翊日自題其神主付諸生使授幼孜晚沐浴更衣端坐至夜二鼓卒春秋五十有七所著詩文有湄湘稿若干卷藏於家幼孜舉進士纍官至翰林學士兼右春坊右諭德永樂十年先生用子貴詔贈奉直大夫右春坊右諭德云贊曰余與幼孜同官嘗讀先生之遺文淳厚古雅藹然有德者之言又讀張美和敘列先生行事一本道德仁義之意余未嘗不徘徊向慕有高山仰止之心焉至其門人學者余往往遇之能道其師之教而考其持身蒞政皆足以發所謂師道立則善人多惜乎先生之教僅施於一郡而已也乃若其屬纊之際明於幾先從容綽然非篤學所至哉士茍用志於內以致夫誠明靜一之功則自然必至之理矣其待以他求乎南耕先生傳南耕先生者姓許氏諱洪字彥章吉水人世業儒伯父中孚通伏氏書南耕傳其家學有孝行兵亂父母逃避山谷中採拾以備養未嘗乏也母病躬侍湯藥不解帶者二旬病劇籲北辰請以身代親沒居喪盡禮事其兄彥良極友愛平居飲食衣服必先兄兄老出入起居必躬扶持之洪武三年舉明經授橫海衛知事調英武衛兩衛皆在京師號繁劇凡簿書調發出納勾撿會計之務皆知事所治南耕從容未嘗動聲色而集事嘗為諸衛先安慶侯仇成時為橫海指揮特敬禮之升浙江行省檢校省務益繁而官不備滯牒山積南耕兼署六司居數日裁決悉盡朝廷遣使督事省中省中寮屬悉趨謁南耕以事後至使者怒臨以威南耕不為動徐為片言復之使者愧服降階執手謝曰吾過矣吾過矣紹興倉姦弊久劉之先有仕南唐者由金陵徙吉水擇勝而家巽湖之上所從來久矣至明翁為郡學教授子潨甫之曽大父也大父信卿以行義與鄉名儒歐陽師尹先生相厚父天性號東山靜隱東閣大學士吳公沉為之記其卒也翰林學士解公縉為之銘墓子潨甫諱會幼端重不事嬉戲初入小學即知謹於事長十餘嵗從學鄉先生胡時中而與西澗熊公為同門相與講學日夜淬礪不懈惇孝友父及兄子謙相繼數日卒哀毁幾絶終身慕不衰從弟子淇奉命使山東病久不愈聞報馳往視之扶持醫療竟不起遂以其喪歸而撫育孤姪必底於成立女兄之夫郭子澄逰蜀不歸走萬里挾之歸嵗時嚴祀事先墓祠在南山者增修之益以田園林沼雜植果茶環祠下西澗為作祠記祠傍搆屋數楹以儲經史榜曰耕讀解公為之記若文穆胡公庶子鄒公皆於子潨甫有文字之好子潨甫雍容儼雅喜為詩情之所適率形賦詠賔客至者必傾寫盡歡晚嵗課子孫詩書外餘事一不挂念慮人以悠然號之雖耆老之年鬚髮如漆無一莖白者蓋年六十有九而卒其卒以宣德丁未十一月草一日娶同邑胡氏慈愛勤儉式配君子子男四鐔永樂乙酉中江西鄉試明年禮部會試中副榜厯沛上海連江三縣學官鏞銓鑽咸克幹蠱如父母之心女一歸韶州府通判夏敏求孫男六士凖士謨士式璋孫璉孫琦孫女六曾孫男二鐔嘗修永樂大典在翰林於豫有同郡之好非一朝夕子潨甫之葬也其素所相知如解胡熊鄒皆先卒莫為之銘於是鐔以屬士竒為之銘曰遭時清明弗騫以升處淡安貞在郊與坰優哉遊哉全歸以寧劉性宇墓碣銘吉水劉昭為通城縣學訓導升清河教諭能以師道振起學者既去則所嘗授業者皆思慕之不已以是見重士大夫而於余往還昭喪其父服闋謁選京師遂求余銘墓時余有公務且病求文者率辭之而不忍辭昭按臨江府學教授胡淨狀劉氏始自安成徙吉水之繞源里於今草餘世族益盛其曰煥文號竹逸者富而樂施七子其六曰廷剛有介直之行五子其長昭之父也諱全字性宇甫齓兵亂作隨父母走匿山谷亂定歸則家蕩然無以自資然且汲汲佐父理先塋修祀事為重弱冠父沒奉養母曽撫四弟二妹盡孝友力農作久而家益裕則推其餘以賑宗族鄉黨之匱乏其厚倫誼公是非好賢重士皆出於天性教子孫必務學曰吾少壯多故不遑及今老矣汝曹幸生長太平勿自棄也躬走閩中市書籍以資之子孫有以明經中鄉舉者輒喜色溢眉宇曰庶幾成吾志也嘗乘扁舟遨逰江湖騁眺覽自適而非以利焉卒於宣德己酉二月十四日享年八十有四娶蔡氏邑名家相其夫事親睦族訓子植家咸有可稱其卒先夫之二年九月十五日享年八十有一合葬西塘之原子男六良恭倫輿昭莭昭永樂甲午中鄉試明年會試中副榜遂除通城令調福清教諭輿節皆先卒女一適杜克勤孫男十四言哲睿依定顯學智式堅武祖回祖復祖寧祖哲中草一年鄉試女八曽孫男六銘曰處之幽行之修淡其休休有淑者逑合璧乎斯丘李處士墓碣銘前監察御史李敘之大父處士君既沒而葬草有九年未有銘介吏部郎中黃養正以給事中吳澤所具事狀來請李氏其先汴人五季時徙睦至宋諱舍者又徙婺之東陽遂世為文獻家舍處士十一世祖也其後有正節侯誠之太常博士大有工部尚書寶謨閣直學士大同工部處士之七世祖也曾祖景魯封椿庫大使祖宣父仁母蔣氏皆有善行處士諱道珫字均與天資和厚孝事父母讀書通大義治家有條理睦宗姻處鄉里咸盡其分家故饒資恆自念吾幸藉先人垂慶溫飽有餘顧今所乏者在力善以承先志日勇於義事嘗於紹興道中得白金百餘兩封緘固密曰此行道者所遺也伺人無至者暮持歸寓舍明旦復持至所得處而遺者亦至驗其實還之遺者拜請處士姓名不告而去有載米詣處士糶者已償直去處士復計直多米百餘石追糶者而償之鄉人號處士長者無間言沒於永樂三年七月初四日春秋六十有五葬其邑甘泉鄉靈應山之原配蔣氏繼曾氏子男二嚞熹女一適蔡孫男五敘巒嶽密嶨女一銘曰奕奕吾先匪德曷嗣綿綿吾後匪德曷遺其存之仁其施之厚士竒銘之式視悠久故餘干知縣蔡君墓碣銘前四十年余客遊武昌時四方俊彥同客者大同張從善四明蔡用嚴吳中尤文度楊仲舉天台曹兾成皆闊略有雅度及豫皆少壯以文學相契相切磨相親厚如兄弟一無所外慕用嚴有樓居園池在敘功坊邀豫同止宿者三閲月日共蔬食水飲相講論吟詠夜抵足共卧或夜中人靜用嚴輒起坐就床帷焚香取琴著膝鼓一再引豫欹枕賦詩雞三鳴乃已而熟寐至日東出丈餘始興當是時意氣放浪散逸而安知有貴富賤貧憂虞事哉後數年各東西散去亦皆為時所迫奔足效用不復能遂間曠之適今謝世者過半矣獨仲舉與士竒在兩人每相聚道及往事未嘗不同感愴也用嚴沒二十年其妻王氏以用嚴世出事狀屬其甥何孟浩致書周汝清曰妾之夫其平生守道行義今惟廬陵楊先生知之然其墓未有刻文舍今不圖將終沈沒矣汝清以告豫嘆曰噫士竒之責也其可已乎蔡氏其先閩人後徙吳又徙鄞之豐樂鄉宋淳熙中雷州海康知縣曰楷又徙邑之四港君七世祖也曾祖諱茂孫祖諱祥甫父諱逢時世其儒業纍官楚府引禮舍人方正剛介持行如玉雪最為昭王所重余嘗拜之清姿偉度翛然塵表於接引後進藹如也母范氏二子長冕次胄即用嚴别字存存晚號松莊天性孝友蚤從學鄉先生烏斯道立志堅確勤苦自勵侍父宦逰十餘年其學益進永樂乙酉以明經舉中浙江鄉試入太學禮科給事中吳福薦其才行召試以為江西宜春知縣愛其民如子有干憲度者必誨之使改曰人性皆善若等何為甘自棄也未嘗笞詈其民雖貴簡儉如布素時室中琴一張書數帙而已民戴之如慈父雖饋蔬蔔不納一息之暇心恆在民惟恐民之失所也上官有私需於邑未嘗茍從凶人誣邑之怨家為姦惡親上官因傳致用嚴蔽匿之罪事既釋丁內艱服闋改餘干知縣所以治其民一如宜春而亦不能得郡之意今吏部尚書郭公奉命巡撫江西考察郡縣吏之亷貪賢否郡言餘干知縣懦於徴科既考用嚴績下當去民耆老數百人走百里外追及公跽訴言數十年餘干令未有亷公愛民如蔡令者公奉命來奈何枉我仁令言益懇切公嘆曰吾行縣多矣未有一民頌其令之亷愛者有令如此郡之挾私為詐也復行百里還餘干更考用嚴績最遂以貪奏黜其郡二二䘖用嚴於臬司誣詞連之用嚴至事白二抵罪用嚴復任以疾沒於北京之旅次永樂二十年十月二十日也用嚴務實踐慎交處不事干謁時兵部尚書兼詹事金忠貴重用事其同邑人也聞用嚴之賢數邀相見卒不赴其介凛凛有父風平居及仕人未嘗聞其叱吒聲其學治經外工詩真書小篆皆有造詣蓋春秋五十有八葬同黃之原其配雅州知州王清之女有賢德無子取側室鄆城儒學訓導徐升之女皆居喪守節禮度不愆又可以觀用嚴之刑于家也子男一繼童以兄之子為嗣女三陳諸謬還童陳錫其壻也孫男女各一銘曰顓顓乎持其身也懇懇乎不忍其民也嗟君子兮古之人哉古之人哉故中都留守司副斷事致仕康志髙墓碣銘永樂元年中都留守司副斷事廬陵康志髙以疾聞命致其事歸七年春復召至命以致仕官治夷陵州九年仍命致仕歸十七年十一月初七日卒於家康氏郡故家其先居金陵唐大理評事如絢之孫國輔娶司馬氏一乳生三男子文子忠子信俱仕南唐官至將軍而封國輔京兆伯賜司馬氏姓李封伯夫人子文宋初遷太和之銅莊世稱三將軍家子文四世至叔逹受春秋於蕭清節先生為荆南掌書記遂歸不仕徙居廬陵生節為太學録又三世至雲從志髙曾祖也祖逢吉父立道志髙生十一年而喪其父時遭元季之亂奉老母挈弱弟東西竄伏而共養不乏洪武初有司選補郡學生無幾喪母哀毁辛未以才舉至京初授知縣職奉使山西以亷謹稱歸改中都留守司副斷事授承事郎時勳戚多在中都往往怙恩縱恣志髙劾奏其甚者一人衆稍戢而決獄明敏庭無滯訟於讞議必持寬平反死獄數人改作公署加其舊規下至獄囚飲食涼燠之宜尤盡心焉持身益嚴名其齋居曰持敬翰林學士劉三吾為之記有張經厯者始不恱其所為伺隙將中傷之會張於出內有虧懼志髙發之志髙外為不知而聽其償補張始愧服而內交焉衛卒有為盜者召而教之治生之方曰必務此無徒壞名取僇辱也嘗獲一首盜曰爾能改行乎對曰能解其縳使捕餘盜盜為衰止有豪猾常先致賄其官長而後把持之者志髙得一人置諸法餘皆引避去長淮衛軍糧越三十里就給留守司倉志髙奏請就衛置倉以便之既以疾聞賜璽書俾致仕時年四十有九後為夷陵益勤於治作興學校奬掖士子禁革貪暴嵗餘吏民化服一日有盜猝入掠州市志髙聞之曰夷陵豈有盜必安陸劫獄賊也遽檄巡檢司追捕既得果安陸賊先是貧民負租稅久不能償有司迫於期限督責甚急志髙曰期不可緩貧民須緩也出公用鈔代糴以輸而罷遣其民使營以償公同列爭不可志髙曰有罪在我必不以纍公等遂自劾而竟亦無事夷陵於凡徵需率倍出他州民困之志髙至具民户與稅之數言於府自是凡徵需悉減舊之半祀典壇壝祭器皆新之夷陵士民愛戴志髙皆以為近所鮮有志髙諱鵬志髙其字以字行為人倜儻有犯之不屑與校人有善稱之不厭輕利喜濟施少壯時嘗偕友人至儀真邂逅友人姻家往戍遼東而貧無資輒倒囊授之既而其人病死又親為治殮而葬之有賈人內粟於邊中鹽數千引而失所給官文書志髙得之求賈人歸之賈奉白金為謝不受其致仕家居郡邑長二數從問政焉必盡心告之蓋春秋六十有七而卒娶王氏克勤內助先三年卒初未有子以從子藴為嗣既而側室傅氏生子振力學舉鄉貢遂中會試副榜為望江縣學訓導克世其家女四長適夏原輝次適張有常餘在室孫男二皓望女三其葬在儒行鄉清湖之原於是振迹其世出行義請豫為銘銘曰發之恕施之厚其存之良徵於後兮族孫溫縣學教諭克述墓碣銘吾西昌楊氏世業儒纍纍起詩書致仕宦不乏而行義皆不愆洪武永樂中升者尤多宣德元年族孫繼舉進士於鄉而退居家進其學未上豫為之喜繼聰敏博記覽辭采煥發衆屬望之八年會試中副榜得河南溫縣學教諭時得教職者多不懌繼獨念可自進其學而心安之又喜焉其行也作詩加勵之後有自河南來咸舉繼能持已能訓飭學者而身先督之或告余溫寂寞冷職非其所堪余以書諏之復書云溫土厚俗淳足自適且寄贈一綈以示未嘗寂寞之意於是余非獨為繼喜且喜吾宗後來者之有人也而未幾聞繼死為之慟悼久不已繼為人質實不務外自少嗜學克修其內行重義未嘗役其心到官期年上官皆重之皆心服之一日其妻死既殮其友為鄰邑教官者病殆走人召繼屬後事繼馳赴之既還悲愴無聊亦得疾數日卒九年十二月二十九也年草有九遺二女子在溫皆始數嵗知縣魏思聰典史柴瞻訓導袁志率諸生為治喪事而魏撫育其孤女如子於時巡撫河南侍郎于公謙布政使李公昌祺按察使包公德懷聞繼死皆嗟嘆惜之遣人致奠賻繼字克述吾族兄從晉先生之孫祖母大溪郭氏其父子珮言行淳實見重宗族鄉黨其母銅莊康氏達書理其娶桃源彭氏其子男一憲女二子珮既歸及婦之襯而葬矣於是而述繼之所為可重可悼者為銘使刻諸墓銘曰學之篤行之榖而遽不祿噫東里續集卷四十一
