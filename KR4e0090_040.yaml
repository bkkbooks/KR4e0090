body:
  text: 東里續集巻十二明楊士奇撰序安成李氏族譜序翰林學士安成李君時勉以其所脩李氏譜屬余序以貽其後人余與李君同在翰林三十有五年嘗聞其先世所自盖李氏系出南唐烈祖第五子景逷之後馬令唐書言景逷累封江王嘗為處州節度使簡易節儉而非毁佛書尊崇儒學納諫禮士盖賢王云安成之李出景逷之子瀚宋平江南瀚匿跡處吉間不與世接吉守李鬯聞其賢求見之不出鬯不敢強乃辟其子光為閻嶺鐵務官俾以禄養光三子十一孫孫兩為府尹一為縣尉盖自是子孫益衍益蕃擢科名升仕籍代有承續不衰而愈盛蔚乎文獻之宗也元之将亡行簡以名進士死國事節義炳炳迨于國朝發而益閎洪武中思煥起知紹興府有賢譽今時勉擢髙科累陞學士掌制命侍經帷直道勁操時望偉然本其先徳之厚豈一世所積哉宗族盛者必有譜所以明源本别疏戚盖有禆於人心世道者也使知尊其所尊親其所親斯孝友睦婣之道行焉然譜非仁人不能作仁道之行本於身始於家故譜者仁人之首務也李氏故有譜今學士君重脩之凡先世出處行義之槩皆具使其後世眀夫源本之同而作其愛敬之心觀夫積累之厚而奮其繼述之志豈非李氏賢子孫而足以仰副作譜者之仁乎毋徒視之為虚器也敬之哉薌城顔氏宗譜序吾友薌城顔君仲平命其子慶雲教官肅以宗譜求序仲平篤學有行誼吾甫冠時交㳺也今皆七十有餘不相見五十年其忍以衰疾拒老友夫譜牒者家之史也必孝子仁人而後知作之吾之所從出者吾所當尊吾之所同出者吾所當親尊之親之則其本末疏戚或仕或隠與凡善之可法於後者皆所當知於是而録之以示後人勿忘故曰非孝子仁人不能知而作之也顔出魯附庸小邾子之後以字為氏歴數世有兖國戰國有率有斶漢有駟晉有含隋有之推唐之最顯者魯公也公嘗謫吉州司馬至今吉有祠祀公公四世孫翊五季為吉之永新令遂家焉永新之叔子興祖徙廬陵薌城今十六七世矣其間有徙沙田者徙瀘源者而凡徳行文學科第皆世有人此譜盖特紀薌城之派耳然自邾武子以来歴歴若指諸掌而近代字號世行出處生卒葬娶靡不槩見亦皆無忝魯公而因譜以有傳謂非孝子仁人之所作可乎小說家多載魯公後有遇其為仙者夫生為名人沒而有靈必㳺清浄髙明之域理無足怪然此不足以論魯公公之後散在四方忠良仁賢之士徃徃而見吾識薌城之良者伯瑋仕為沛縣令太宗文皇帝靖難之師壓境伯瑋父子同日死之其後憲臣劾奏不順命者十數人請治其家伯瑋與焉文皇帝曰食其禄者死其事一無所問聖徳廣大仁明度越前古若伯瑋之卓然數百年後無忝魯公此可以論公之盛矣故因為仲平序譜而併及之華林胡氏族譜序胡氏春秋時有二其一子爵國於潁州汝隂之胡城後為楚所滅子孫以國為氏其一周封虞舜之後胡公滿於陳子孫以諡為氏亦曰以國為氏或曰命之氏胡要之云命之者非華林之胡盖出於滿華林今南昌奉新之境其譜云先世家邳之宿遷至劉宋太子左衛将軍藩有功于朝賜土於南昌樂華林山水而居之遂終焉史傳以為南昌人當以譜為正譜叙所録秦漢以下胡氏之顯者歴歴有稽而斷自藩以下著為譜又二十四世至唐侍御史而下則加詳焉五子璫瑜瓊􅀈球璫官至膳部員外郎其後仍居華林宋尚書直孺所自出也四支之後皆他徙瑜之後徙陳留寳文閣學士諡文定安國所自出也瓊之後徙毘陵太子少師諡文恭宿所自出也􅀈之後徙九江髙郵朐山球之後徙郡之武寜今獨華林毘陵二派子孫相徃還親厚如未嘗析者今大宗伯源潔毗陵出也及華林之賢曰應麟各著其本派譜宗伯将合之為一而仍名華林者統於所自也二派之後其子孫之蕃衍詩書宦達之輝映譜牒紀載之詳明凡故家碩宗鮮與擬者可為盛哉固本於其先之積亦必其後之人徳行文學之克敬承者歟之下析五派而其三無聞盖未必無人豈非其昧所從出而汨沒於庸俗且衰落不立故不相及歟作譜者非不欲統而合之顧勢不可得則亦莫如之何已夫祖者吾之所從出族者吾之所同出必資譜而後明有譜斯水木本源之心存孝友睦婣之道行故譜者為仁其家而作也非有賢子孫不能宗伯公方宏其仁於天下而况於家斯譜之所以必合也宗伯上距文恭若干世清脩厚徳卓然於時名卿有光文恭者也譜所録華林若干世毘陵若干世既成華林毘陵各録一本宗伯屬余為之序胡氏之後尚益敬承於来世楊氏清溪家譜序楊氏清溪家譜譜楊氏之家於清溪者也清溪在泰和城東金魚洲之西北楊氏家其上不知所始所知者吾髙曽以来百四五十年於今矣吾嘗作泰和楊氏族譜又作譜圖譜泰和之族而吾髙曽以下生卒嵗月葬某地娶某氏女適某人皆吾所當志而例不得獨詳此家譜所以作也家譜之作以詳吾髙曽以下而必始於允素府君者府君繇吉水徙泰和為泰和初祖清溪之源也髙曽以下諸父兄弟今多散徙他處而悉書之者清溪之派也上之兄弟亦有書者以著同源而異派且便㕘稽也凡髙曽以下生卒葬娶吾所當志而猶或闕焉者盖不能知也至於娶某氏而詳其所生女適某人而并志其子若孫又以明慶澤之源且不忘世好也噫吾之後世觀於此而有感發焉其庶乎不流於薄也太原徐氏宗譜序宗譜何為而作也所以明源本辨戚疏而作也譬則木焉柯敷條析益散而益蕃其實原於一本一家之親自同氣至于一從再從至于無服至于途人益離而益逺其實出於一人之身自一人之身而至於途人譜何可無作也而今之人之為譜者徃徃藉是以著其先世華顯聞達以耀於人人即其先世未嘗華顯聞達則旁求逺掇謂他人父謂他人昆若拜郭汾陽之墓之類以務張其聲光若是譜無作可也吾邑澄江之南二里所曰太原里世居其里曰徐氏徐氏之翹楚曰應琳應琳上距初祖十三郎七世矣十三郎始繇萬安之皂口遷太原生二子曰大翁小翁大翁歴再世至夀逺小翁再世至夀甫始分居南北屋南屋則夀逺及其弟重三捌居之北屋則夀甫居焉又去夀甫四世至應琳於是南北屋相視服盡矣兩屋子孫愈益蕃衍敵均應琳懼其将逺至於途人而無别也作為徐氏宗譜圖合南北屋書之俾後来者得有所考徴命子以鼐来求余序一言以貽其後之人按譜自太原初祖以迄應琳之子若孫盖八九世族属雖踈逺而皆得考徵世次以知孰之為尊孰之為卑而同出於一人則油然孝弟之感必不至相目為途人者矣即字若名不可知則闕之其肯䝉冒他人之華顯聞達以徒炫燿乎哉吾聞有厚徳者子孫必大今合南北屋觀之為應琳兄弟若干人為應琳子若孫兄弟又若干人豈其所由来者固有厚徳乎余嘗過北屋識應琳伯父原徳翁年踰七十矣孳孳以延師教子孫不墜其世為事應琳嘗以豐産長萬石之區鄉民服之其弟應琦間一被貢于朝懇懇以養親乞辭以鼐亦好尚文雅此皆北屋之紹有厚徳者乎将南屋之厚于徳者亦不下此乎若是其子孫益大庸可涯哉則斯宗斯譜豈不復有繼應琳而書者乎徐氏之子孫其世世勉之平原丘氏族譜序吉水之平原丘振儀余徃年在武昌始識之於鄉先生吳孟勤所振儀於先生尊之若師親之若父惟所命盡力不辭先生樂道人善亟稱振儀好善不可多得數視余所為贈振儀之文恐余之失之也先生来史舘又求諸能賦者作詩贈之張之也先生真厚徳哉自是余亦與振儀徃来振儀嘗求余賦其鄉所謂平原十景者於是不見之六年今年胥晤京師坐語未温席又出所蓄圖畫求為之題贊又求序其世譜勤勤不倦世之人奔走營營江湖之間惟利為務有遇其故舊而非所同志者片語不暇接而暇與儒者偶語又數有文字之求哉如振儀信吳先生所稱不可多得者乎豈其家世有所積乎按譜丘氏世家河南隋博陵太守和生二子長行恭善騎射佐唐太宗定天下以功封天水郡公次行簡為吉州司户㕘軍行簡之孫琦始居贈山琦四世至江州刺史昌昌生三子震選彦又徙平原遂析為三震號後丘選號中丘彦號前丘此譜叙後丘之派也盖震生嫩八嫩八若干世至嶽元季為大都路管領御河上下長官司正官嶽生明逺眀逺生振儀自和至振儀若干世時代數易矣而其嗣續愈逺愈衆又數有顯者出于其間此非世有所積不能夫有所積於前而其後不知圖繼不名為賢子孫振儀之所務其知所圖繼矣乎而又拳拳譜其先之所出以傳其亦欲後之人皆知圖繼者乎為丘氏之後者所當勉也故為之序書院羅氏族譜序凡今得姓受氏皆出於古聖賢之裔而歴世寖逺其傳系有可攷不可攷者盖其先有功徳於時有爵位於朝史氏詳其人因著其所從出或其家代有賢子孫紀載不遺故傳歴雖逺而派系有可考者矣其先既無顯者不見録於史氏私家又無紀載之者於是傳歴逾逺加之散徙不常夫安得復有可考者乎近世士大夫家著譜牒其有所考據者自源徂流百數十世若指諸掌其無所於考則斷自所可知者而著之而不敢妄有援焉其於義皆當也而流俗之人挟其私見徃徃互為詆訾其世系有所從来則曰謬冒耳無所来者曰賤出也豈至當之論哉世固有謬冒者矣豈可以一二廢千百且謬冐者必援夫聖人以重其所出夫舜禹大聖人至重矣謂瞽鯀非其所出乎其亦不思之甚矣故君子之心惟曰此吾之所從出也吾有所考徴也吾從而譜之其為人吾不敢議焉曰此非吾所從出也吾無所考徴也雖大聖人吾不敢譜也盖為子孫孰不欲泝流求源探其本始而譜之以繫其後世無窮之思惟不幸而無所於考迺斷自所可知者而著之如眉山蘇譜之作而豈其所得已哉吾邑書院羅氏族譜肇自有熊至伯嘉始得姓於春秋之世居於冝城又若干世至漢成都守褒又若干世至新豐侯晉晉之孫魏皇城使夀昌夀昌曽孫臒仕晉以伐蜀功為襄陽太守又九世至唐中書門下平章事臨清郡王宏信又三世至隠隠生鄴鄴生曽孫崇勲徙居江州子玩又徙吉州之岐下玩三子仲子延梁之時始徙吾邑之中團里延之孫洞晦徙書院此書院之所始也洞晦六世孫宏既歴序其先所由来胡忠簡公又為之銘粲然甚備而至于今書院之族愈逺愈蕃盖洞晦以来若干世自伯嘉至今若干世矣源委本末班班可稽非代有賢子孫紀載不遺其能然乎噫可謂盛矣今書院之族其服詩書持忠厚者繼繼不乏余嘗識與謙於吾兄仲基甫有連其為人惇厚雅則儒者也来京師又識爾輔焉恂恂温厚慎而有禮皆羅氏之秀也此其先徳敷遺之所致乎夫為子孫者能究其所自出則必脩其在已以求無忝焉可也爾輔介鄉貢進士嚴圭求序此譜故為之書上邳劉氏族譜序京師凡志於榮達者之所必之也城闕之壯麗河山之閎偉公卿賢俊之會聲眀文物之盛可以發人之志趣豁人之胷臆增益人之道徳然而涉江湖縁山嶽以来至者其所務率在彼而不在此也吾郡劉敦信先生之子孝彰温厚質直常負志逺逰而非以為榮達也與今庶子胡公相好胡公在京師以書邀之既至而館焉縉紳大夫聞其来皆遣子從之逰孝彰旦起授徒夜則與胡公講說性道以及古今之務既再嵗其耳目之所濡交㳺徃還之所得愈益進矣視一時榮達紛乎目前者孝彰曰是各有命孝彰可謂異乎衆人者矣孝彰将歸持劉氏族譜求叙之劉氏初出晉安成太守􅜯三世至禋家于安成禋之後有曰景宏又徙永新景宏二子長曰昫又徙吉水下潢昫之子庚南唐金紫光禄大夫始徙上邳庚之後有諱某者篤行孝義致家富累萬石鄉稱長者其沒也周文忠公為志其墓其後曰某宋宣義郎宣義生次山次山生元方敬方元方子敦復事太祖皇帝官至潯州知府廣東㕘政敬方則敦信之父也敦信博學篤行為郡學師為山東考試官劉氏由晉迄今若干世或貴或富未嘗乏也要其世徳之積累者厚矣故為之序而因及孝彰之所存焉泰和楊氏重脩族譜圖序士竒既作楊氏族譜而欲便於觀覽也又作此圖且欲刻之分畀族之人盖楊氏族譜自延真刻本亡逸諸房各惟存其本派之譜而已頼與芳父當踰八望九之年汲汲以尊祖睦族為務始統萃為圖是以士竒所脩得有所依據與芳父所以仁吾族之人者厚矣盖宗族之盛必有譜牒以昭源本啟敬愛維持於無窮譜牒之不作傳歴未久或離析轉徙暌隔迷忘尊卑有不辨慶弔有不相及者此非其心之獨薄亦其勢必至矣故譜不可以無作譜作必家藏人蓄然後有以廣惇睦而行久逺焉此圖上自府君輅始遷廬陵以再遷泰和於今廿有三世其間或書字或書名或書行或書號者凡四百九人失其字名行號但書某以識之者十有五人總四百二十四人夫譜泰和之族必自廬陵府君始者尊吾所從出且舊圖之録也其上失系屬者如十五世瑞榮之祖某十六世百三太學百六太學百某太學十七世君實十八世華甫實甫善甫雲谷定甫達觀十九世恵可文可元可皆仍舊圖位置庶幾傳疑之意而今廿二世以下子孫尚多此但載舊圖所録及士竒所知者盖族人散處且士竒仕於外不得訪録姑明其統系之緒而已統系明将後有繼修者得縁此而録也盖世譜凡子孫皆所當務顧其智力或未及此夫其智力足以及此又能勉勉成之以貽後来庶幾為賢子孫士竒所為此固有望後世之賢子孫也然圖以掲世系而譜兼載事略覽者尚不以此而廢彼哉廖氏族譜序廖氏族譜者吾邑愚寄先生廖子謙所作也先生沒三十年其孫海康教諭潛仲考績来京師以示余屬為叙且曰此先祖手筆也余於是有所慨矣國家初建學校邑大夫聘先生主教事又聘楊子淵羅子理鄧彦髙三先生佐之四君子問學徳義海涵而山蓄氷清而玉潔皆人之望也三先生後皆出仕廖先生則既老矣於是時海桑陳先生竹亭王先生尚皆無恙而吏部尚書劉公崇慶守王公亦退而家居四五耆艾日小車徃還雍容燕嬉蔚然徳星之光映也之前後數公其老成典刑繫斯文之重士林之表盖學者争趨歸之下至閭閻賈販之賤皆肅然而憚竦然而仰也既次第淪謝盡矣日月愈逺後生晚出無所視法為士者薄清素而甘濁汙外詩書而内貨賄薫蒸漸漬愈趨愈卑甚者不見容於閭閻賈販之賤而更侈然自得夫士習如此安得復有廖先生諸君子者一起而振拔之哉於是覽先生之手筆能無慨焉者乎廖氏出周文王子伯廖其後自金陵徙西昌至先生若干世矣而皆業儒繩繩不乏也譜肇作於先生之曽祖梅澗府君先生繼而述之其法準樓氏惟書本派之親而官號生卒葬娶幾子女適某人皆詳而有條也而其先與吾家夹巷而宅于清溪之上中更變故其子孫散徙落落其頺垣廢址草莽之墟故在而鄉人父老徃徃歎其先世善行歴歴如昨日事而世益逺矣此不又可慨乎然於今有可喜焉者自吾睹於廖氏四世矣有愚寄先生有先生從弟翰林國史院編修官伯先及編修之子松溪教諭季習又有潛仲及潛仲之子翰林庶吉士謨皆發身詩書或官侍近或任教職而皆在文學之任豈非盛哉今西昌章逢故家其後如廖氏者盖尠矣此固君子之澤亦豈非其力諸已有以致之乎夫所可慨者吾末如之何所為可喜而力諸已得致焉者凡為子若孫皆當勉也廖氏将又有繼今而起者乎請書諸簡首以俟徐氏族譜序翰林侍講羅汝敬以其槀城知縣徐聆聰来求序徐氏族譜聆聰永樂二年進士為庶吉士在翰林相識而聞其治槀城也得士民心仕而由進士清流也治而得民心良吏也以清流為良吏且素識也於有求不可以辭盖譜之作所以尊祖厚族而實寓昭先啟後之意按徐出伯益益次子若木封徐子孫因氏焉歴二十五世至周穆王時曰偃王始居太末又歴至漢曰瑄為金紫光禄大夫曰尚為征南大将軍曰丘為征北大将軍又歴至晉曰曄為尚書左丞又歴唐曰堅為集賢學士封開國後曰元髙以破黄巢功補承務郎始徙上饒之南山至宋而文獻寖盛矣最知名者世稱西窓先生嘗從朱文公講學及紹定五年進士第一人及第皆其族也而居今之山門者實自天聖九年禮部尚書直方徙山門之後而顯者在元曰容以易經登第仕至餘姚州同知在國朝曰觀道為吏禮二部郎中其子克俊為工部主事聆聰盖郎中從子也徐氏非古所稱世臣之家者歟而考其所由顯或以功徳或以文學皆其自致者也如後復有賢者出究觀此譜而圖繼焉其亦思所以自致可乎自致則必由敬身始故為詳其徃者以告其来者使勉焉陳氏族譜序中書舎人長樂陳登思孝以其陳氏世譜屬余序之自周之小史掌邦國之志奠繫世辨昭穆有事詔王之忌諱見諸禮典而後世宗法既廢世臣鉅家重尊祖惇族之心者皆本諸此以作譜牒以約其族之人俾皆由於孝悌此固古人忠厚之意而非有賢者則不能為之也陳出虞舜之後自周歴漢晉至唐代有顯人唐末居光州者從節度使王審知入閩居玉融又徙長樂長樂於今十有八世子孫愈逺而愈盛而詩書圭組亦代有顯者焉其譜則十七世孫伯康之所纂輯本其所從出而凡支派尊卑疏戚之辨名諱官爵生卒葬娶之詳粲然畢具而不紊而别為例目推引古義兼示訓戒藹然仁人君子之心也古之人其譜之善者今獨傳歐陽氏蘇氏陳氏譜其法雖不同而所以教孝弟本忠厚之意則一也非伯康之賢其能之哉吾聞伯康事親孝治家以禮處鄉䣊以義歴官至江山知縣以亷能得民心朝廷嘗榜其善以示勸盖卓乎陳氏之賢也而陳氏之與余徃還而相知者其從弟仲完今為左春坊左賛善淳厚端慤為侍近二十年敬慎如一日其從子全進士及第今為翰林侍講温恭慎宻退然自持其子登歴丞三邑今為中書舎人好古博雅而樂善疾惡不肯茍有阿狥其篆法獨步於今陳氏固多賢哉而亦皆伯康之所成也如繼今其族之人因其所著譜以究夫世徳之源因其所示訓以勉於自立之道将陳氏之賢彬彬而出者奚啻於是歟此作譜者之所望遂為書其簡首以俟荷山劉氏族譜後序夫世家大族其聲明文物之盛歴時變故而子孫孫子卒能繼繼愈引弗替雖本於忠厚之澤亦繇譜牒之著有以唘之矣彼其見先世積徳累仁蜚華騰茂赫赫炳耀乎前而顧已有未能焉者必将惕然思起而繼之以不辱於後此為人子孫茍有志乎善者所同情焉然則譜牒之作豈小補云哉吾邑東南十里曰荷山劉氏為望於兹若干世矣自利賔幼孤隨其母適曽遂冒曽姓自是荷山之人亦以曽為望利賔六世至仁可及見先世譜牒究知其源本乃復其祖之姓夫子孫之於祖父凡有一言一行之懿猶謹謹率循不敢倍焉矧於劉氏之大者乎劉氏之子孫可以謂賢矣仁可生以智以智生伯昻實先伯祖清江主簿之壻士竒之從姑夫也嘗問知其家自仁可以下皆有厚徳能庇其鄉人伯昻又英爽傑特博達前古負有為之才當元季冦盗充斥民生墊溺屹然保障其一鄉獨如平時然卒不獲一見試於時坎坷終其身鬱鬱以歿而至今鄉人生長子孫猶相戒曰無忘劉君其得於人如此然則劉氏子孫之賢豈獨知復其姓而已此譜重修於以智父子先主簿公及鄉先生前吏部尚書劉公崧廣平劉公雲章序之詳矣今伯昻之子子敞寳之不異拱璧又重繕冩成帙盖将以昭先徳啟後裔於無窮也間使其子公確来京師屬予識一言子敞予表兄也不敢以辭故為探本而書之使劉氏之後世觀於此者亦思繼繼不辱於無窮云西昌尹氏族譜序西昌尹氏故儒家自宋真宗朝有諱絳者登景徳二年李迪榜進士官至衡州通判世有詩書盖衡州生河南節判儀節判曽孫國子學録茂之學録四子伯叔季皆儒學官仲為慶元路同知又二世至徳可盖尹氏之族至是而衰獨徳可有三子務本務尚務厚皆教授于鄉務厚自泰和縣學訓導陞上海縣學教諭致仕務本生傳道傳道四子務尚初無子務厚二子復道自道而自道為務尚後今復道及傳道之子哲鐸皆以會試副榜為學官自道以國子生為澂江府同知尹氏詩書之傳可謂世克承之矣吾與尹氏居同邑雖不及識務本然其與臨淄知縣歐陽日新徳安府同知羅子理兩先生厚善如古所稱金蘭契者此其人豈茍然㢤務尚温靖忠實務厚重倫理磊落軒豁其為義卓卓㮣見余所著蔗境翁傳而傳道復道自道及哲皆篤實謹行稱其家皆予所識而知之者也世之號為士者以詩書焉耳而徃徃求其行不稱於士如尹氏可謂稱矣尹氏故有譜斷自衡州以下至傳道之曽孫十有三世盖考其世徳将其子孫及詩書之傳繼今冝益盛矣而其行亦将與之稱庶幾乎可也因復道兄弟求序此譜故以其所自而望於其後者書諸簡首南徑胡氏族譜序譜牒之作所以親宗族也世道泰民俗厚則譜牒盛行比年士大夫家率有譜足以為世道人心喜而孝子慈孫不失其良心者傳信傳疑不肯毫末損益如崛起驟出者欲與故家世族為頡頏徃徃攀賢援貴以自矜大而舛謬錯亂不自知者君子不能不為之興慨也盖觀於吾邑南徑胡氏之譜有以知其出於孝子慈孫之良心而君子必在所取也其譜質而有倫詳而不泛信而不援其先家廬陵之永陽宋乾道乙酉始分居南徑於今二百七十年凡十世其名字行號生卒葬娶多有録而不遺非歴世相承皆有敬愛之心其能然歟譜胡氏之良如騏所輯如騏以才舉今為任丘知縣考績来京師出譜求序嗟乎譜牒者仁人之用心也士行仁始於家而後及鄉邦及天下者皆自家而推也如騏此譜固行仁之所先歟胡氏自居南徑以来雖間有仕者而始顯於如騏其仁所及未可量也吾聞如騏家食時嘗作義塾以教其族及鄉人之子弟又作廣愛亭於衢路之側以息行旅能仁其鄉如此今有仁民社稷之寄誠能推是心而不已焉所及何可量哉何可量哉又因序譜而致勉焉蕭氏族譜序同邑蕭建平自少志于學方冠詿誤謫戍萬里東海外十有四年始得以弱疾罷歸歸則乃父吾幼翁捐舘已七年及其母皆尚殯淺土建平㷀㷀一身所資貧薄而不忍其親如不可一朝居者辛勤為塋兆不數月二䘮皆葬鄉人稱之為難建平又惟髙曽之上忘其世次宗人老長又皆凋謝不可考問而同姓所僅存者皆逺而疏疏而離可慨也乃據所知斷自髙祖以下作譜圖以繫其宗族求為叙之蕭氏其先居西昌邑南半舎許髙富里世畜厚貲相傳襲為善人逮志可始来贅邑劉氏長子孫遂家邑城西則建平之祖也今譜起善卿又志可之祖余聞志可之父眀叔捐貲鑿渠導水於其鄉溉田若干頃名黄連陂至于今渠上之田無夏乾之憂者人猶稱蕭氏蕭氏云若吾幼翁言如不出口身如不勝衣不矯不抗恂恂焉持其言行則余所見而知之也孔子所稱積善之家若蕭氏數世庶幾近之哉而即是圖觀之其子若孫今散處落落然如晨星霜木夫世有善行者其後冝振天於蕭氏未必若是而已也况又有存心之厚如建平者吾庶幾猶及見之哉遂為之序玉山李氏重修族譜序族譜之作所以眀世次别疏戚著其所自出而表先烈啟後昆之意亦具乎其中故凡世臣巨室之家皆有譜而譜非有良子孫則莫能舉而修之也廬陵玉山李原珪系出唐西平忠武王晟晟子憲為江西觀察家于袁若干世由徙玉山又若干世族姓之繁愈逺而愈盛原珪恐其世次疏戚将混而弗辨且昧其所自出之光大而不知圖繼也間因舊譜重修之将以貽其後之人介安府紀善劉貫唯求序之余聞有勲徳於世者其後必大夫心存乎國家功施於社稷宏拯斯民載安天下此勲徳之盛也西平載造唐家史稱雖三王之佐無進其能可謂仁義之将又以謂是冝有後者史氏固本諸勲徳然不過見晟之數子克似其勞非有見其歴數百年後嗣之繁又有若原珪輩者能圖不泯其前人聲光如今也此豈獨西平之基哉亦其後之人世有培之者歟不然奚若是之逺且盛也夫有髙眀祖考鏗鍧燀赫乎其前而為之子若孫不能敬身以圖繼承於後則不足為賢矣盖賢子孫者其祖考雖無鏗鍧燀赫猶俛俛圖修於身以求大之况有之又光大若西平者其冝繼繩以圖不辱為何如哉此原珪作譜之意之所望也故為之序南雄楊氏族譜序南雄楊氏譜者楊氏之孫有文念其先世徙處不常懼逺而失其源本而作也其先出唐之長安靖恭坊自祭酒膳從僖宗幸蜀遂家眉州而代有顯仕九世至宋昭慶節度使逵二子伯知章知吉州後追封鄂國公鄂國子端仲追封申國公申國三子孟棟事理宗官至太保參知政事退居台州季履之官至淮西安撫安撫子公畿寳祐丙辰進士仕元為南安路總管遂家廬陵總管二子仲壯行累官至衡州路判官致仕判官二子伯昌文仲彬文昌文撫州路崇仁縣尉二子仲杰肇慶路知事卒葬南雄之保昌三子孟仲禮洪武初舉授南雄常平倉大使遂家南雄二子仲廣有文之父也楊自靖恭徙眉又十二世徙台十三世徙廬陵十三世以来仕者多在南安廬陵臨川數郡而居處葬娶實多在廬陵有文此譜始於眉詳於廬陵盖木本水源之意并州故鄉之思靡不具之以士竒之先同出靖恭屬為之序余嘗見虞文靖公所作衡州判官墓志述其家世事行特詳而形諸感慨特深盖楊文靖外家知之深故言之詳也今斯譜與文靖所述合而譜中所名多祉有學有文又知其本之於銘也嗚呼靖恭啟自漢太尉史稱太尉累葉載徳是以其後子孫散之四方者徃徃皆至通顯固源於太尉清白之遺亦必仁義之施代有繼承用克致之矣今南雄之顯自有文始有文以才舉授揚州府通判闓敏果達敬於奉公厚於恵下吏憚而民愛盖所至未可量也惟善繼尚在其後之人是為序傅氏族譜序江陵之石首傅氏其初出臨江新喻元季有諱三俊者其仲子鼎孫為石首縣儒學教諭迎就養阻兵亂不能歸遂留家焉至鼎孫之仲子諱汝霖惇水木本源之念恒欲一造新喻以究知其先世而訪其族之人而卒牽於事不克行既寝疾顧其家人言術者謂我今年當死即死無他遺恨獨恨不遂一造渝上以快吾平生其能死瞑目已乎幸記憶吾父嘗語我曽祖以来萬分之一今且死如又不言将無知之者矣悉以語其諸子而命其冢子啟良曰汝謹志之汝兄弟異時庶幾成吾志也啟良謹志之而其弟啟讓遂録以為傅氏譜譜始於宋侍郎堂而著其詳則自宣義郎光後光後之子節入元舉鄉貢官至宣州路録事三俊之考也三俊三子鼎孫其仲也自三俊居石首至啟良兄弟四世矣而非汝霖惓惓重祖敬宗之心臨沒而猶未已其後之人雖賢有不能眀其所自出矣嗚呼為人子若孫孰不欲長守先人桑梓不去其鄉里而與宗族相聚相保以篤其親親之恩而世世不絶也不幸而離析轉徙兵戈相仍南北間阻仁人孝子其於情何如哉重不幸而暌隔迷忘其身既沒其子孫欲考求所自有不可得而抱無窮之悲矣是以仁人孝子必致謹於斯也汝霖傅氏之仁人孝子歟新喻於廬陵接壤盖吾聞傅氏之族有存焉者為啟良兄弟能造而訪焉展敬丘壟退而合其族之人明其昭穆惇叙親好以終先人之志且使渝上之宗知在江陵者於吾同一本而未逺也不又仁且孝乎啟讓由進士今為河南按察僉事風紀肅然傅氏之賢子孫也間来京師出此譜求序余聞譜之所由作矣為次第書之簡端東里續集巻十二
