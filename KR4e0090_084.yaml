body:
  text: 東里續集巻五十六明楊士竒撰詩五言古題竹送徐侍郎之南京户部并簡黄少保徐卿起毗陵卓卓才行良遭時長郎署特達清譽彰聖朝重守邊簡賢贊軍政爰陟少司馬肅肅將帝命甘州國西鄙宻比戎狄疆宛宛籌畫運煜煜威武揚掃蕩邊塵浄旋歸覲丹闈天顔為悦霽褒賚隆光輝當宁所孜孜養民為首事龍虎壯南都遂進司徒貳維時五月中暑雨亘昏晨草草戒行李匆匆發河津河水方茫洋舟行疾於羽泝濟亂淮流超然越江浦念昔西行日醉折楊栁枝如何復斯别託意淇上猗兹植殊凡植貞操挺桓桓恥效艷麗姿傲兀冰霜寒元老東萊公勳庸五朝舊我别才四旬曠若三春乆卿行煩致聲善保金玉躬上以翼聖明下以寧瘝痌送御史方懋徳還新安詩有序今嵗六月上以恤民汰冗食於公者勅諸司官悉准洪武職掌定額存其㢘能者其餘遣歸以俟召用新安方勉懋徳温然雅飭有賢譽於京師陞監察御史遵勅定去留既留懋徳其同道當去者兩人相持不肯行懋徳不忍其所為也自言勉實後至請去於是三人者皆行懋徳之斯行也余念相與已乆而嘆重晤未期故作詩送之荆璞遇卞和騏驥遇伯樂物遇固有時識者亦不數方生稟令資夙志勵問學遭逢聖明世賢科早超擢從事詞林舘簡陟頌臺幕言必循禮度動不踰矩矱雍容儕輩間儼然雞羣鶴一朝峩廌冠莅事加秉恪持憲恕且公守身澹以約中懐瑩澄澈外不事表襮雖然知己希俛仰靡愧怍頃出浙水西渢渢譽聲作旋歸居無何冠纓反丘壑風髙秋氣清農田紛始穫林桂吐丹葩吹香散寥廓執手送子行感歎懐抱惡子當强仕年余髪乆已皬後晤未有期努力追先覺題李紹檢討梅花嚴冬朔風勁草木俱凋瘁氣機運無停奄屬貞元際寒梅動根荄勃勃出生意鮮葩皎玉雪芳馨播天地清素自厥賦寧效夭桃媚君子禀至性兹植夙所契幽齋坐相對中懐浄氛滓相忘主與賔謳吟舒洩洩朅來玉堂舘念之心弗寘誰寫當座隅悠然見髙致送蕭仲南歸吳江蚤登西掖垣累陟儀曹署祗命事四朝年華未衰暮任賢屬方隆引疾遄南去自惟止足分非憚淹留故於時八月末翩翩戒行路丹林亂曙霞黄華浥秋露踰淮絶大江前望東吳樹慰情接親交致恭展丘墓具區涵洲溆修梁亘津渡散䇿恣逍遥揚舲從逸豫却思京華日豈復簡書慮相好三十載履行悉平素云胡當乖分欲挽不可住矯首雲飛鴻聊寫予所慕送鍾宏彰修撰歸省兼致意彛訓紹隆荆山有竒璞恒為廟堂珍英才履忠信安得山澤淪鍾子力學殖行義修諸身遭逢昭明代懐瑜謁紫宸遂登白玉堂出入陪輔臣晨趨啟沃筵暮歸思經綸鞠躬以效職光華映青春忠孝並所惇念我鶴髪親八年曠定省夢寐心䞭䞭臣切烏鳥私伏陛一再陳歸寧丹詔許拜荷聖主仁維時春氷泮長河浩潾潾初發清潞漘遄泝沽水津暄風芍藥開照耀斑衣新上堂獻夀巵慈顔和以忻次第省耆舊亦復展戚婣歐鄉有君子昔者聮朝紳超然謝塵鞅還山侣逸民南北遥相望有懐賦停雲子歸定相見為予致慇懃送林行簡修撰歸省都城七月初餘暑尚鬱蒸南閩八千里念子當逺行豈不憚馳驅庭闈激中情自違定省來荏苒十周星幸霑近侍禄況荷褒封榮家慶未躬拜夙夜心怦怦仰承聖主仁玉音賜歸寧相送出詞舘嚴装戒晨征升堂及秋中丹桂揚芳馨椿萱靄晴晝蘭蕙羅堦庭被服金繡袍煥然五色明雕盤進甘脆春酒獻夀觥歆豔傾里閭歡娛洽親朋壺山為增秀莆水為益清人生慕樂事此樂難具稱大哉君親徳蕩蕩不可名忠孝必兩盡北歸罔稽程春風杏花鮮遲爾清潞亭送楊寧郎中楊生青雲器文彩輝白璧腰間龍泉劔别來將逺適吾聞禹徂征舞干致苗格所以宣尼訓服逺修文徳好謀而有成明明垂警飭如何材智士宏議愽古昔含忿忽逺圖急功幸茍得寧論萬里行糗糧豫峙積漢廷所遣帥孰是趙充國子行職賛襄黽勉攄良畫雖有斗酒餞不能寫胸臆臨岐念素交聊贈繞朝䇿杏園雅集鞠躬奉臣職肅肅恒自旦朝下趨經幃臨夕出東觀釐務日有常黽勉在文翰衰齡皆沈疴寧不懐泮奐仰惟寵禄隆而敢厭羈絆兹晨屬休沐聮鑣越閭閈適我同志良蕭爽坐林館維時天宇澄青陽候過半好鳥鳴交交芳卉羅絢爛朱絃一再彈圖帙亦娛玩肥甘列中筵㫖酒崇玉瓉主賔相和敬濟濟圭璋粲清言發至義連續如珠貫雅韻含宫商髙懐薄雲漢合歡情所洽輔仁道攸賛各期勵乃修庶用表楨榦送羅汝敬侍郎致仕南歸有序汝敬侍郎歸自秦中奉命致仕瀕行出秦人所為寫像屬余一言像未必似也余於汝敬徃還三十有五年知之盖深方作五言四十韻詩送之以榮其得退遂用書於像之端俾世之欲知汝敬者觀吾詩足矣不必泥像也詩曰丈夫有壯志力學希濟時時來奮挺出磊落見設施羅君吉陽彦束髪抱負竒明經起科第玉署攻文詞既持纂述筆亦奏雅韻詩敷陳及時政厥志將有為賜豸入霜臺肅肅綱紀司遂陟冬卿貳將命南交馳緋袍明象笏萬里揚旌麾蠻方瞻使節如旱甘雨垂手中五色詔山海承華輝頓令隂曀區豁然睹赫曦歸來奏丹扆龍顔霽融怡夙興佐司空立侍白玉墀朝回坐粉署職務勤所思東南吳越邦貢賦國所資奉㫖督漕運綜理適攸宜于時嚴武衛所重在西師四牡行騑騑改途越邠岐兵彊自餉厚篤意理畬菑豪横輟侵敓游惰歸耘耔河渠靡不溉田蕪靡不治雨暘屬時若倉庾崇如坻張掖暨靈武周廵以諏咨所可利下人計不遺毫絲矢心弗自顧屢冒艱與危嵗乆罄勞瘁上軫天惻慈明恩錫休致超超赴南歸老驥思舊櫪倦翼投故枝而況達士懐物理鑒成虧親交並祖餞酣歌舞僛僛詰旦發潞河薄暮經淮沂流鶯沸驛路飛花滿彎碕泝江越彭蠡挂席捷於飛船頭見玉峽霞彩煜英㽔振袂儒林坊迓者陳杯匜展席老人亭㑹者皆及耆一返安樂窩永謝塵務羈顧余樗散質衰疾加倍之乞身朝夕間盍簮不逺期奉送叅政方相公南歸並託致意兩司相公誠有私瀆伏惟髙明不以區區私家而廢公法是見愛甚厚不敢忘大徳也廬江山水清從昔挺英傑周陶暨包馬先後奮功烈方君服詩書夙志希徃哲發軔自成均簮纓儼朝列叢脞冬官務旦暮勞𤨏屑鞠躬殫臣職肯用愆毫髪羣儕混汙流獨秉清素節上荷當宁知簡陞遂超越豫章佐方岳雅度湖江濶咨諏得民隠封章屢陳説荏苒三周星報政謁金闕於余同朝舊邂逅兩相悦祖送崇文門盛夏赫炎熱道路念驅馳況復當逺别朝望東岱雲夕對秦淮月到官秋及中丹桂香堪折置酒勞還歸芳筵集藩臬因聲謝諸公有瀆恕老拙細人困窮櫩所仗明仁活薰蕕本異物善惡在旌别大田植黍稷必去螟螣􅖈所以古仁人除惡當果决致公而平施豈為有勢奪賤子固甚愚公理敢私滅明達髙賢心幸不誚干聒輓俞漢逺詩有序㑹稽俞漢逺清雅士也嘗因微累謫戍邊比嵗詔下求賢藩臣屢舉漢逺輒為有司所格於是負累重於漢逺者多遂見用盖漢逺命也漢逺善作山林畫障寫春草尤佳士大夫賢者與之游多得之非其人漢逺未嘗輕畀也故不樂之者亦多今漢逺已矣故作詩輓之窮通各有命匪人所克為俞生越鄉彦落落荆璞資一朝汙蒼蠅棄置在塗泥良工屢回顧昧者掩抑之俞生安義分浩浩曠達懐庭堦絶塵雜春草含碧滋對之襟宇融㸃染出天機興來寫川岳奮筆疾若飛以斯自陶適貴富邈罔知自偶清者遊寧慚俗流疵如何逐化物奄忽在今兹豈徒同儕憾上有慈母悲幽室杳㝠㝠懐舊書此詞題謝廷循作山水二幅結纓四十年雞鳴候朝謁晨趨白玉堂暮下青𤨏闥豈不勤寸心曾何効毫髪對此圖中人空慚頭上雪秋日明錦樹秋水漾輕艫得魚足充庖亦足供酒壺青山常為隣白鷗常為徒不識簮纓貴焉知憂與虞進善姪南歸書此與之為别到家賔畿老弟亦可觀也秋髙薊北寒念爾逺離别老人七十餘臨别增悽切九年在北京扶持多資爾爾有仲父望惓惓心未已黄花浥白露買舟發潞河江湖六千里慎哉所經過到家冬已半升堂拜仲父仲父喜姪來深憐逺行苦取酒慰骨肉懽極情還悲子姪能幾人衰年頻逺離停杯有咨詢從知先老拙繾綣兄弟懐殷勤爾能説十載隔南北瞀聵兼沈痾無由歸聚首悵望其如何丘原展先壠里閈省親故除嵗又新年相期戒行路正月春冰解桃杏鮮花繁老人注兩目望爾東南門送萬太守歸嚴陵聖人御宸極宵衣念元元簡賢付綏撫申以奨勵恩萬子豫章彦文科起髙鶱十年峩豸冠北面奉至尊繡衣豔丰采白筆敷直言遂膺郡符寄髙盖擁彤幡嚴陵古睦州山水清鬱盤民淳風俗良政務故不繁所尚簡為治敎養心彌敦詩書振黌宫耒耜勤田園東風藹林埛里胥無及門逺邇誦賢守聲聞重璵璠念子吾故交乆别情鬱煩兹來未幾日匆匆復南轅嘗聞范與趙為睦令績存朂哉紹前修以副平生言題蔣壻重梅北風振長林黄葉蕭蕭下大地一清肅梅花獨瀟灑紛㸔雪滿枝已覺春在野不有貞白心誰知嵗寒者題湯節都指揮蘭雪齋湯侯心跡清瀟灑蘭與雪惟蘭嫓芳馨惟雪儗素潔讀書負髙志武爵承世勲緩帯杜元凱雅歌祭將軍分閫帥淮南大藩佐江右蘭雪凜清風從初未嘗有功並西山立名與章江流金貂圖麟閣努力追前修題歐陽廣湯梅花西昌歐陽生明經起科目當宁敬刑罰擢官秋卿屬生抱忠厚資況奉先訓篤夜燭治官書求生於死獄所聽兩造詞不厭四五覆明鑑靡遁情被辜皆誠服門庭浄若洗襟懐皎於玉勉勉持㢘虛孜孜存洞屬司宼上賢績爰進秩與禄特達騰聲譽恬澹寡嗜欲堦砌絶氛埃不雜桃李俗雪色素梅花先春爛盈矚公餘坐相對人物兩清馥題竹寄子謨同知有序子謨之左遷相知者皆為稱屈子謨安於其命不一毫置意而所為屈子謨者人亦信天道之不爽故余因寄此竹并書此修筠生平陸荆棘叢翳之荆棘承雪霜摧折遽無遺修筠當嵗寒秀色終不移小人抱齷齪志與君子違枘鑿豈相入萋斐騰誣辭溷夷而㢘跖豈云天可欺天道匪茫昧讒夫寧幾時達士固貞節安命誠奚疑臧氏不見尤大賢有明規因成修筠詠遥贈心所期題梅花贈别朱與言乆别欣㑹合将離懐繾綣何況夙心親家居接鄉縣念子五雲秀束髪異羣彦明經掇賢科立志挺髙狷温潤玉無瑕精勁金百鍊荆益奠大藩白簡佐司憲雍雍春陽度肅肅秋霜面幽隠亟咨諏貪濁嚴懲勸蜚英達宸聰登崇自廷薦南京根本地都臺紀綱建秉誠敷獻替致明决議讞孤特昔張昇正貞今趙抃昨者考績來謁帝大明殿引疾却奏函歸展膺天眷夏初氣清和楊花競飛燕豈無一斗酒衰老違郊餞贈此玉梅花聊慰情所戀期共保清素嵗暮長相見送李員外致仕有序天台李君茂𢎞㢘介方正君子也初舉進士未授官清譽已勃勃既擢吏部主事陞員外郎士大夫皆知其賢秩滿未及引年懇引疾去一時輿議共惜之故賦詩送之荆玉韞在石光潤被林丘明珠潜九淵清耀亦上浮君子未顯達芳譽難可庾挺特松栢心恥與桃李侔一朝被采擇共睹升琳璆豈不貴且重廊廟未及收鄧林有竒才匠石當知求丈夫髙世節焉能衒自售冉冉年嵗馳决意無淹留九河潦水浄行雲淡油油零露浥丹桂天香滿道周飄然拂衣去清風含九秋中秋夕過澹齋戱柬秋霄愛月華徐歩過東家主人喜客至汲井㵸春茶青帘在隣館無錢不可賖何似陶彭澤重陽把菊花題竹送何士彦宣城訓導并寄聲袁太守何君璞玉良産自荆山中中懐縝而栗外儀温且恭家學邃六義允紹武岡公頃膺宣城聘分敎侯頖宫随牘謁金門考藝趨九重詰朝奉除書戒行遽匆匆經年忝交誼祖送城之東何以贈仳别聊託修竹叢此植挺特姿千仞凌髙空生際太平世盛年須奮庸啟迪貴知本表率自飭躬況兹山水郡昔賢多顯融作興諒匪難行當律成功寄聲袁太守勉續黄與龔學敎同振起達材佐時雍貝錦貽魏洪二侍郎修竹本孤直樷蒿掩翳之樷蒿豈不蕃竹色青不移經星麗崇霄隂霧蔽其輝終焉安得蔽隂霧寧幾時小人抱齷齪君子素肯違青蠅與貝錦盈庭騰誹辭平陸起波濤豈云天可欺天道固包含堲讒有徃䂓題梅花有贈相見桃源下相送長淮側清談夜向中月照蓬忩白愛君好心事況復真顔色聊贈玉梅花交情矢無斁采石夜泊與仰善之䕫二姪話别暮發金陵浦前瞻采石磯𣺌𣺌江潮上娟娟江月輝昔離忻乍合明發念將違嘉卉豈乏觀三春艷芳菲不如栢與松凌雲起百圍君子堅貞操敬哉慎其微魯港經旬坐舟中跼蹐心鬱鬱度江見青山蒼翠連延出好風從北來持杯興浩發宛轉聽棹謳開蓬對明月九華山昔年李太白吟咏秋浦清一覽九峯秀被之九華名夫容發菡蓞宛然天削成蒼翠五千仞日照雲錦明上與泬寥通下絶世俗情豈無𡨕栖者錬藥希長生吾將徃從之何由謝塵纓題竹寄盧邦臣結交已三紀玉署昔聮官重以同江鄉詞垣日聚懽升遷歴中外屢見嵗華殫昨來謁京師仍嗟㑹晤難共榮師席尊猶憶客氊寒我行過匡南悵望隔林巒乆要意不盡聊寄青琅玕題梅與從孫翽吾本清白宗西昌四伯禩孝友惇家庭詩書累科第炳然冰雪持靡間處與仕先徳既日逺後裔流或異我出四十年歸來重嗟喟諸孫森森中静厚頗見翽言動弗佻輕鄉閭免譏議以兹恒近之出入左右侍老人行有日王程敢稽遲臨别贈瑶華老人有深意爾翽尚勉旃力學無廢墜旦暮事簡册躬行在仁義慎勿效流俗齷齪茍汙利明明待制公清名傳良吏子孫當敬念庶不忝先世題梅贈李學士有序時勉學士不逺二百里辱賁臨而匆匆未盡懐遽别書此奉贈致意云春皋麥欲黄春城柳紛緑君子枉青顧東来過茆屋鄰甕分濁醪書忩剪明燭平生金蘭交一笑懽未足僕夫晨在門跽言農事促執手送将歸飛花爛盈目何以贈兹植孤芳挺貞㳤髙齋坐相對嵗晏人如玉峽江留别汝敬侍郎始夏積雨霽浩浩滄江平故人念乆别又復憐逺行慰我金洲館送我玉峽驛繆綢解晤言繾綣重離析我出四十年蹔歸席未暖何如君子懐坦蕩恣蕭散逺絶㕓市聒嘯咏山水清庭無干瀆人坐有吾伊聲贈子以瑶華愛子心相類何日遂投簮歸來同晏嵗徳州城下題竹寄劉仲兼謬忝玉堂署荏苒四十年始來當壯齡不覺今皓顛水木有本源誰能忘桑梓耿耿旦暮心迢遥七千里仰承聖主仁優詔賜蹔歸歸來入閭巷十室已九非素交皆下泉存者才百一容顔變故常聆音但彷彿豈乏後來者貌同多異心鴟梟産鳳窠枳棘生桂林感我衰病懐憂來向誰道前後左右人雷同譏我耄賢哉吏部孫夙昔吾所知居貞而履素身老心不移念我乆仳離時來相慰藉言必合典則義不茍取舍譬如羣飛中見此五色鸞又如叢薈中見此青琅玕我行有程期過别情繾綣别來未幾日憶子常在眼因風寄平安託此修竹枝嵗晏當來歸永結林下期題竹寄艮姪嗣宗與兄子俱是竹林人逺道念阿咸平生心所親去鄉越三紀還鄉甫四旬契濶未及展繾綣未獲伸南風吹大江官船發江濵爾從五雲來追餞螺川津相違甫旬浹相思𣺌煙雲上堂侍慈親致養供晨昏下堂飭諸子力學追前聞先塋布坰野能不懐深恩春秋雨露零灑掃無憚勤愛爾剛直資殷勤贈霜筠常固清貞節用以謝塵氛送王原之詩有序四明王原之自監察御史陞山西叅政㢘清明大體顓顓以國家生民為心而讒人忌之造言嗾當道擠諸重法賴上明聖照察詔復其官而改廣東其造言者遄以貪淫黜廢諒哉天道之不爽也余知原之有素其南行也周汝清出此圖求詩贈之勉賦三章其末章盖揆天道人心猶不能已於言焉暮春時雨霽嘉卉蔚紛敷交交黄鳥鳴送子城東隅念兹萬里别執轡仍躊躇丈夫四海志誰能倦馳驅所重在兼濟奉國效良圖鞠躬罄丹誠千春垂令譽雄藩庾嶺外邈在南海堧山川曠阻隔氣候何其偏九齡與安道自昔有名賢如何巖谷幽獷俗比難鐫仁化可革頑文敎可柔堅君子奉皇命敬哉贊旬宣青松起中林棘蔓纒其枝棘蔓一朝萎隕堕淪汙泥松枝稟貞性干雲色不移志士履清潔而遭讒慝訾天道詎可欺讒者旋自墮臨别舉離觴猶嗟貝錦詩贈吳淳大器必晩成早達多幸致園栁迎春發不待秋霜悴青青南山栢百嵗升雲際明堂選棟梁匠石來擬議凡古賢哲人孰不懐用世不惜發軔遲惟患道未至流俗競茍得終焉速顛躓卓哉漆雕生明達見大意吴生海虞秀詩禮家有自夙承大父訓稽古研經義昨奉賢能書霜蹄偶一蹶隆然敬執友於我頻見詣温温崑玉資顒顒負志氣乆别留臺君對此喜忘寐于時夏六月積雨旦初霽宛宛黄鳥鳴葵榴豔榮麗辭我将南旋何以效贈遺厚積而遲發周行騁良驥不聞任公釣豈為目前計徃哉加進修雲霄匪難跂醉後調時彦乆坐倦煩燠澄景回素商青㝠下湛露丹桂揚天香濟濟金閨彦髙㑹白玉堂和洽諧琴瑟況復惜時光西齋有㫖酒何由共華觴送少師楊公歸建安有序少師工部尚書兼謹身殿大學士建安楊公勉仁起髙科歴事四朝勞勤四十年而不至其鄉者三十年今年七十桑梓之念迫切遂以情聞聖明深照其衷特命之歸賜勅褒嘉且勉之速至而加以厚賚皇上禮遇大臣恩至隆矣公為人敏於才周於慮惓惓敬君愛民之心焉昔成周盛時君之待臣必體其心而厚其禮臣之事君必先其公而後其私上下交盡其道此其治效之所由盛也於公斯行有以見古昔盛治復興於今日非千載之遇乎士竒與公處三十有九年同宗同志同歴官同治職務去嵗之春上憫士竒違鄉四十年先賜歸省所以命之者亦同於公之今日士奇春復而夏來不敢稽也固公之道里逺於余惟公之心必有同於余者故於别也次第其事為韻語贈焉其詞曰富貴還故鄉古今所欣快安知明達人志出富貴外立身天地間所重孝與忠君親與天等敬事道實同楊公南閩英天稟挺卓特胷中書五車筆下雲五色三十登金門射策奮髙鶱天興聖明主躬被汪濊恩清宻侍丹扆煇煌裁紫詔玉署兼青坊髙歩儒林表龍輿戒廵省峩冠扈屬車平戎萬里道櫜鞬行秘書黽勉三紀餘服事四朝聖孤卿百僚上髙年偹鴻慶思以上益君思以下益民小心効臣職亹亹攄恭勤恭勤副深注聲譽聞遐裔蒼松老益堅皓首心愈厲國事靡遑暇親恩詎能遺卅年别丘壟寝食勞懐思不見白鶴峯飛雲恒在望手植壟頭栢應過十圍壮豈惟羮牆覿夜夜夢旋歸水木有源本誰能不歔欷仰荷明主仁洞鑑中迫切璽書賜展省龍光昭日月陽和二月中御柳初含金凝冰泮九河好鳥繁春音驪駒發都門官僚皆祖餞渡濟遂踰淮載馳駛於箭暄風芍藥時候者集龍津矯首睇桑梓含情兼戚忻追逺致禋祀懐舊訪親愛嵗乆多凋亡相知幾人在言歸席未暖豈不耽家居恭承玉㫖重尚敢淹躊躇廟謨待公陳衮闕待公補丈夫君臣義無為倦衰暮炎光變素顥凉露下青蕪預買中山醪迓公東城隅贈澹菴楊公展墓詩有序五首少保澹菴楊公與僕交四十餘年昔同事三聖於玉署青宫今同事上於經筵祕閣公一志於道以國家天下為心端方直諒謀猷獻納要當追配古人今館閣四朝之舊獨公與僕兩人在僕年七十有七衰病日加而乞身終未能得然終不能分寸禆益公復奉命歸展桑梓則僕於别也其能無情故賦詩五章贈公且以寓余之拳拳云東風吹大河河水日夜流嚴装逝将歸祖送河上頭故鄉六千里迢遥望荆州違别嵗年逺耿耿桑梓憂恭承當宁命去去無淹留焉知同袍者臨分意綢繆綢繆倐已分望望猶佇跂豈無相交人外同中乃異夫子夙所慕爰結金蘭契睠言資諒直矧重仁與義荏苒四十年氣合恒一致皎皎松栢心永矢在終嵗終嵗之所懐豈縁耄疾躬上有明主仁徳比三聖隆人生非草木寧昧造化功出身儋禄爵道存敬與忠夙秉髙潔心況聞賢達風焉能甘淟涊委軀儕凡庸凡庸諒猥鄙貪惏復蟊􆆟良農治田穡稂莠在芟除倬彼仁賢士懐負經世具臯陶陳知人周公躬吐哺如何後來者當道昩所務所以君子心惻惻存永慮永慮積中抱臨食每與嘅丈夫所立志豈在富與貴不聞諸葛云鞠躬以盡瘁上将益明徳下将綏四海夷險不可渝頫仰庶無愧勿為乆契濶引領遥相待喜稷将至復慮炎暑衰年乆别離豈不懐歡聚書緘初未收傳聞遽乃屢炎熱三伏辰江湖六千路注目暮及朝闗情喜兼懼櫝蓍時自把燈花亦頻顧露坐思徘徊今夕知何處而況老者心猶憶諸孫慕送尚書魏公致仕還鄉詩有序僕以直道於世寡合獨秋官尚書南康魏公侍郎建昌何公近皆以同江右故有相得之樂相資之益前年何公引疾去僕不能無情作詩送之今年魏公又引疾去僕之中懐其能已乎臨岐執别情見於詞云江右國南服賢才之林藪匡廬彭蠡間清淑萃加厚英英魏文淵人物星之斗明經在致用一第咄嗟取峩廌入烏臺白簡嵗年乆擊邪奮無前直枉寧肯後超躋副浙憲聲華聳岡阜簡陟少秋官式貳大司㓂致鞫懸鑑明析疑迎刃剖大梁困嵗饑方伯拜廷授悉心事旬宣勠力蘇稿朽歸來掌邦禁雍容帝左右既詰姦慝平亦著武績茂亷清一志堅聞望六官首方兹切倚毗云何慕畎畆惟皇憫疾疢且重違耆耉錫之五色書龍光煥户牖乆行遂歸止福祉自天祐川開萬里風南颿駛於走雲净九疊屏烟消彭澤栁迎門集童穉携觴聚隣叟懽慶溢鄉閭勞問洽親舊超超天地外此樂寧多有蹇予樸鈍質頽齡七旬九謬叨詞林館固陋寡所偶責重力不任兢兢慮災咎所藉同鄉邦同心二三友有言相啟發有病相砭炙何君既離郡魏公復分手念此增悲嘅中懐雜紛糅嵗晚應乞身歸程能待否市酒望湖亭玉壺為君扣寄友同館闊相别相思春復秋十年見桑梓適意正綢繆歡聚故隣曲閒尋舊釣逰寧知鵷鳳侶延望在瀛洲武昌遊道院分韻二首仙館俯崇岡振衣一來遊逍遥越城肆窈窕經林丘谷口巖溜鳴簷端雲氣浮適違闤闠喧彌覺山水幽啼鳥遷髙枝悲猿振長楸物類爰有託矧伊學道儔抱生貴知足全形尚無求療饑采紫芝濯纓臨素流愚生昩所處静趣乃相侔援琴弄清絃遂令佳賞酧王師事遐征苦辛殊未休豈不懐寧處違世安可謀我非學仙侶悵然難乆留右幽字通衢擁車騎四術羅第宅仙宫鬱雲興邈與紅塵隔交疏被朱綉飛薨絢金碧竹樹紛掩映烟霞互輝赫爰有一羽人於焉托其跡皓皓白玉姿翩翩異人格我來扣松闗相與論𤣥黙階前孤鶴舞林下啼猿寂于兹究典墳信足探幽頥無田寄閒身翹思羨鄉國天台與赤城聊可資逰息丹丘有遺構瓊臺多舊識胡為曠歸期乆作周南客右客字送蕭雅容主事考績之行中臺切雲漢特達羅俊賢有美吾鄉彦白璧何娟娟温恭君子容素尚金石堅髙科出奮躍石渠踰嵗年爰擢司馬屬聲華日蜚鶱殷殷職務崇戔戔簡牘繁志存行靡渝道明施罔愆考績及兹晨嚴装起翩翩維時届初夏芳榮被郊原登艫指清濟揚舲循廣川緬懐趨謁餘周遊鳳闕前倘遇玉堂侶因寄停雲篇羅進文妻周娟抱子安同赴水死東方有綵鳳雄雌鳴相和誕生五色雛巢在髙樹柯雄飛觸虞繳哀雌憂欲死哀雌憂欲死衘子忽墮水雄來脱虞繳空巢委髙枝不見舊匹侶孤悲無已時艱難兩訣絶苦哉誰為陳君㸔羅氏婦萬古同酸辛送熊御史歸南京秋雨灑梧桐西風動楊柳之子憶南京開帆潞河口平生所相好不在餞杯酒持贈嵗寒枝清操期堅乆送樂象乾赴湖廣按察經歴河凍不可舟日乆寒威厲之子奉明恩翩翩發征騎殷勤逺别言繾綣同鄉意誓将冰雪心用稱風霜吏東里續集巻五十六
