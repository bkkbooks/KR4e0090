body:
  text: 東里文集巻十一明楊士竒撰題䟦䟦赤壁圖蘇文忠公以誠意直道事君而為李定舒亶之徒所毁責黄州賢人君子之心正大明白何徃不自得矧公文章譬諸景星慶雲随所著見輝煥萬物向使公不罹擯斥區區齊安山川風物有此光氣流於宇宙間耶題黄母劉傳後昔屠岸賈之殺趙朔也将併殺其遺孤朔客公孫杵臼程嬰謀曰立孤與死孰難嬰曰死易立孤難耳杵臼遜其難者於嬰而自殺夫立孤古烈丈夫之所難也觀蘇平仲傳永嘉黄母劉氏保孤事豈不尤難乎哉盖趙見禍於國之亂臣而黄見禍於家賊夫倉猝莫夜變𧺫房帷之内雖勇智士或不足禦况弱女婦乎劉之志所謂可與日月争光非耶劉沒今六十年曾孫淮榮膺寵命追贈劉一品之貴殆天所以報劉與司馬子長著趙客事炳炳無窮於天地間平仲今代子長也将劉之事暴白後世豈有窮哉豈有窮哉恭題仁廟璽書録本洪熈改元四月之望仁宗皇帝御奉天門召少師吏部尚書臣蹇義少傅兵部尚書兼華盖殿大學士臣楊士竒至榻前追論監國時事奨與再四出圖書二以賜臣義得忠貞臣士竒得貞一加賜璽書極其眷待之厚夫臣之事君克効其分寸者皆職分所當然而明聖之心如造化於物一生意之不息何其盛徳也義和厚質實歴事列聖練逹而寛裕巋然國家老成人宜無忝於斯顧臣何人亦預濫被是以承命之日感激之私迫切心腑而慚悚之至莫措其躬曾不踰月仁廟上賓毎捧綸章血涕交隕今臣義祗事皇上倚注眷待之隆比於先朝駸駸有加上甞閱其忠貞圖書推廣先志特命範白金重刻以賜中外傳布歌詠盛美盖孔子甞論孟荘子之孝曰其他可能其不改父之臣與父之政為難能彼特列國大夫耳今明天子實躬行之又何其盛徳也非臣義千載之遭遇乎君子承其遇必思信其道先儒謂盡已為忠正固為貞夫為臣之忠莫大於陳善而非依随之謂矣貞莫大於格君而非茍且之謂矣君子於道必有終身之志焉臣義别録璽書為副間属臣識之臣嘗陪義同為宫臣所以長益臣者多矣故不敢不以君子之道為復臣雖孱弱尚願自勵以從其後焉題安福戴氏所藏先世告身後孟子論王政曰老吾老以及人之老謂推其愛親之心以愛人之親也四牡之詩曰不遑将父曰不遑将母曰将母来諗先王推已及臣如此所以得人心之深者歟三代而下至宋嵗致禮祖考必覃恩羣臣而并及其祖考庻幾猶有先王忠厚之澤也安成戴氏藏其先世所受宋封贈父母告身三通其一宣和二年六月所授其一建炎三年九月所授其一紹興二年十一月所授至今覽之足以歆動人心然建紹之主有不能自致愛親之心者由柄用小人之過大易所以戒小人勿用也戴氏先世在宋受告勅尚多數更兵燹獨存此三通後二通亦不完然其子孫數百年什􅊞如拱璧戴氏子孫於愛重其親無忝矣書復立宗忠簡公墓碑巻後為政在使民知為善而已而非有以勸之民或不知為之也故尊徳禮賢表孝友褒忠莭皆勸民之務也宋宗忠簡公其孤忠大節所謂皦然可與日月争光者而竟以譖憂憤死盖天下後世所共仰慕而悼惜之者也然葬於潤無三百年已莾然荒烟衰草之墟樵牧徃来行道不弔此豈潤之人其心獨有異哉公嘗仕於此居於此至感慕徳義吾意潤之人必有深於天下後世之人者何為獨漠然若是也非由為政者不逹勸民之道雖有公之賢不知敬禮而致民之然歟今六七年前金華劉侯伯静以監察御史出守是邦一新政教脩舉百廢乃復葺公之祠及治其墳塋又經紀其祠田命佛氏之徒董祀事而躬率博士弟子展禮墓下又刻石墓道使過者皆知為宋忠臣宗公之墓於是潤之人始知有忠簡公又知為善者之久而不冺而在已不可不勉於善也劉侯為政可謂知所務矣去年與侯同在史館為余道其事今侯去潤而佐江右大藩自昔江右孤忠大節如忠簡公尤多而江右之人固不為潤之人之漠然也将侯所以加勸之者尚能拳拳如治潤之時乎書宋謝少連贈官誥後建寕府照磨臨江謝良翰出示所藏先世宋嘉祐二年贈官告勑一通盖良翰十三世祖堪時以尚書貟外郎通判衡州用郊祀恩贈其父少連殿中丞者也堪天聖八年進士與歐陽文忠石守道皆同年友終殿中侍御史其歴官頗多而所受誥勑盖屡歴世變獨存此耳其書員外郎知制誥絳者謝希深也學士中書舎人偉者楊子竒大年弟也崇文院檢討公著者吕正獻也獨吴奎書姓當時臣僚於銜下但書名名有同者則書姓以别之盖自丁度盛度始此誥至今三百七十有四年完好如新亦可以見謝氏後世之賢敬識而歸之書石鼓文後右石鼓文十元國子司業潘迪考訂音訓刋附于後在今北京國子監士大夫北京来者多得之以見贈此本得於胡學士光大紙墨獨佳此刻鄭夹漈定為秦篆歐陽公集古録疑此文自宣王共和至宋嘉祐千九百年且文細刻淺理不應得存又疑其自漢以来博古好竒之士皆畧而不道余謂石鼓文决非秦漢以下之人所能所謂文細刻淺者安知當時不深刻歴世久逺則磨滅如此而今文字之存者計裁三之一耳其中不可辨識者又三之一則亦久逺之驗也荒郊野草之中古物委棄何限如其金玉之類雖殘毁不完茍遇之即庸人小子皆知而取之矣為石雖有文字苟不遇好古博雅之士則不為世所知而不見稱道固其理也且三代鍾鼎卣彜之属前未甞見稱於世而後来田夫牧子徃徃出之荒野埋沒之中者代有之矣何獨致疑於石鼓哉書魯相置孔子廟卒史碑右漢魯相置孔子廟掌禮器卒史碑順帝時所立在曲阜余得之陳思孝掌禮器卒史必選四十以上經通一藝雜試能奉𢎞先聖之禮為宗所歸者見古人慎重如此也書華山廟碑後右華山廟碑得之子啓學士漢碑之佳者盖郭香書漢魏以前碑多不載書刻人氏名此獨詳焉遂因之有聞於今自古賢徳君子冺沒無聞於後者何限而有聞無聞亦何足計哉若李徳裕位至宰相猶區區附名其顛欲托不朽歐陽公所以譏其近愚也書夏承碑後右漢淳于長夏承碑無書人氏名中書舍人陳登思孝定為蔡伯喈書字畫特竒古盖用篆筆也歐陽公集古録無之趙明誠金石録云元祐中洺州因治河得此碑於土壌中刻畫完好如新是冝歐公之未得也而近嵗廣平府民又因治河得此碑廣平古洺地盖不知元祐之後又何時而埋沒也今視漢他碑尚完好物以晦而全固理之常也此帖余得於鄒侍講書孔子廟學記後右孔子廟學記古𨽻書碑盛行于今者尊號受禪及孔子廟學記三碑皆魏人書而尊號受禪世謂出鍾繇梁鵠竟未有適説唯廟學宋人以為鵠書亦非碑所載盖漢魏以前士人多能書不為異也故鮮有著其氏名者後世能書者鮮故必著氏名以自表然凡一代之書必相彷彿論古書之體者考其時代可矣何必拘拘出某人哉吴段石岡紀功徳碣右吴孫皓天璽元年段石岡紀功徳碣八分書相傳出皇象極髙古而其文缺壊不可見者已三之一盖宋元祐中此碣已㫁為三在天禧寺門外時轉運副使胡宗師徙置漕臺今在應天府學又不知何時所徙也考吴志天冊元年吴郡言掘地得銀上有年月字遂改明年爲天璽元年是年鄱陽言歴陽山石文理成二十字云楚九州渚吴九州都揚州士作天子四世治太平始又吴興陽羨山有石室之瑞又改明年元為天紀以恊石文此碑不見於志考其文有天發神懴等語則亦當時瑞應之事然天紀四年王濬遂入吴矣告泰華府君文右唐補闕韓賞告㤗華府君文韓擇木書賞所以盟於神者嚴矣士夫君子立志操莭䔍於内而已豈必盟神然後固哉必俟盟於神者盖由其内知不足也書千文後右智永千文刻石在西安府學吾平生所得頗多皆為親友持去獨此本紙墨尤勝遂為家寳得之江夏宋鑒惟憲盖宋大觀三年所刻永嘗書八百本歐陽文忠公集古金石刻文所得永千文疑其筆法不類者二百六十餘字意是後人所補遂去之此刻出于公沒後數十年使其見之當不置疑也千文所始盖梁武帝令殷鐵石於羲之書中搨一千字不重者命周興嗣次為韻語以教諸王前志所載如此歐陽公因見法帖有漢章帝書海鹹河淡百餘字遂以前世所有不始于羲之劉後村之説亦然余謂此百餘字亦出梁以来好事者所集不然自漢至梁其間能書多矣何以都不聞有一人見之於書而獨章帝哉又近見東觀餘論載米芾黄伯思所論然後益自信余説之非謬書化度寺碑後世謂善書者各得古人之一體虞永興得之東方畫贊歐陽率更得之樂毅論余謂此其初基之異耳至造極其妙随意變態曷甞局於一體如逸少黄庭樂毅畫賛未嘗同也故歐陽醴泉皇甫化度其結體各異或荘或逸獨化度最為得中然亦惜其石刻於今最為缺壊也石刻西安府學又歐陽率更化度帖最宜學書者師法惜今漫滅不可識者幾半矣鄒汝舟庻子見恵此本盖後来杭州明慶寺所翻刻者紙墨頗佳余去其所不可識而采其可識者表之以為學書者之便書皇甫君碑後隋光䘵大夫皇甫君碑唐子志寧文歐陽詢書骨氣勁峭法度嚴整論者謂虞得晋之飄逸歐得晋之䂓矩觀此其振發動盪獨非逸哉非所謂不踰矩者乎初學者師此以立本而後入虞入永入鍾王有所持循而成功不難也吾家此本亦得之胡源潔給事云又右皇甫君碑余得之陕西憲僉門泰泰蜀人故禮部尚書門克新從子與相姪同為太學生交厚故數徃還余家此帖比常所得者亦優書孔子廟堂碑後論者率愛世南書飄逸醖藉然其從容䂓矩凖䋲之中學者湏心得也此帖余得之宋鑒惟憲書昭仁寺碑後唐昭仁寺碑余得之行人常熟劉紹碑朱子奢撰文而無書人氏名觀其結搆䂓模近虞世南而筆法不逮逺甚豈當時學虞而未至者乎張重威以為虞少時所書然歐陽公集古録甚愛此碑亦不定其為何人書也題黄主簿告身後右宋石城縣主簿黄公士隆初登第授官告身一通其六世孫乳源縣學教諭理用之所藏也先髙祖妣𢎞農郡君主簿公之子故理用出此告屬士竒識之按公登淳祐七年張淵微榜進士時穆陵數下詔取士崇惇實戒浮靡前年五月又詔監學及諸路郡學以秋闈在邇宜精考較以得實才七年三月命吴潜知貢舉御筆付潜俾崇雅黜浮六月賜淵微等五百廿七人及第出身時自春夏以来不雨淵微等上言乞免瓊林宴詔從之時論稱焉是年四月鄭清之再入政府為太傅右丞相兼樞宻使進越國公趙葵為樞宻使兼叅知政事督視江淮京西湖北軍馬王伯大為端明殿學士僉書樞宻院事兼權叅知政事七月以别之傑為叅知政事趙汝騰自起居郎侍講遷吏部侍郎蓋在五月以後謝方叔先繇權刑部侍郎兼權給事中趙與繇兼吏部尚書遂為真兼戸部尚書是年十二月又遷端明殿學士提領戸部財用與甞為京尹逐太學㳺士以媚時宰又急於財利躬為聚歛之臣小人不足言别之傑亦無所可取謝方叔始有聲臺諫至執政不能有為晚更困於權臣至喪其所守若伯大直諒之節汝騰方正不撓葵忠君愛國之誠愈老愈壮謂非光明俊偉君子人歟清之端平中為相慨然以天下為已任引用正人真徳秀魏了翁十數軰時號小元祐庻幾君子矣然至是再相衰老不任政歸私門為世所少焉此皆告内所列政事之臣其除拜及為人大槩有可考者因併志之後百五十有九年為皇明永樂二年四月八日志題戴氏所藏先賢遺墨後誠齋先生父子宋名賢而余族祖也圭齋先生元名賢余曾祖同年友也今拜觀此巻於安福戴誠問所不勝先代之敬及誦東山先生難進甚偉薦牘弗用之語以觀誠問今日决去之意盖故家流風尚未冺也又為戴氏起敬焉誠問将逺别故識而歸之䟦宋吏部侍郎龔公墓志銘後右宋禮部郎官吾郡中齋先生鄧公所譔吏部侍郎南昌竹鄉先生龔公墓志銘一通進士曽先之以下九人作為輓詩廿七首附録在後皆當時手筆竹鄉七世孫今兵科給事中鐩之所藏也間以求題夫人有譽于當世非難有譽身後為難盖是非邪正沒世而後定也竹鄉累官大理卿至吏部侍郎兼侍講宋亡以疾終於家此銘序述歴官行事忠概義莭與先之諸君子輓詩所稱如出一口此豈聲音笑貌之所能為哉自漢唐以来唯宋待士為厚其亡也亦唯宋之士能盡莭以無負國家為多文丞相李潭州表然者也竹鄉當此時獲知於二公或相推薦或相結納國亡即不屈以無愧二公世言惟豪傑知豪傑豈不然乎中齋時以朝散郎權禮部郎官兼學士院權直宋末艱難百出亦全忠以沒夫竹鄉一世交㳺何限而身後之筆其子孫不以十餘年之久必有待於中齋豈非謂舍是則不足昭逺信後哉此巻至今百一十有餘年數歴兵燹完好如新又非竹鄉後世之賢不能鐩起家科第官侍近端重温雅謹謹自持若恐墜其世徳者傳曰子孫保之吾又於竹鄉後世見之矣書歐陽臨淄傳後歐陽日新先生西昌前軰巨擘也士竒生晚不及識獨記丱角時聞於族姻老長道先生事為教其至今不忘者曰先生十餘嵗從學陳海桑於清節書院凝然羣居中讀書作字心不外馳諸生以弄事百方挑之未甞一顧暮歸挟書冊獨行道間步履徐徐貌如有所思者道傍觀者嘖嘖指以語其子弟曰若曷為不然哉稍長曰以所業就吾家質望之平洲諸老先生天分絶出諸老皆樂為之傾寫毎至未甞以事廢講論率抵暮或夜盡二燭始送出康山長宗武汲汲以成後學為事延先生家塾命諸子從之學而親與先生相講論䃺切於是先生所造詣沛然矣一時儕軰有志於學者率就先生質所業至正丙申江西行省以鄉舉選士吾州舉劉子髙及先生楊氏諸老及康山長餞之快閣之上時劉先生聲名已勃勃出江右望之曰二賢皆得薦而日新當前列既别山長竊歎曰惜哉日新所禀甚清然不若子髙異時逺到也後所云皆中天兵初下江西吴去疾為吾州稱先生為第一流人首薦諸朝吾州之士仕天朝自先生始士竒十二三習為舉子程文先伯吏部公愛而教之數曰使汝得歐陽日新為師一第俯首取無難者自是曰訪求先生之文而讀之盖數歴兵亂不可得僅得其所試中詩經義及序記書辭數篇其論議根據精彩發越反覆誦詠使人有手舞足蹈之意此士竒所為恨生晚不得從問道執業之末然是時抱生晚之恨者豈獨士竒也此傳載歴官行事頗詳輙附余所聞一二事于後庻幾小補之云恭題賜都御史虞謙蘭亭墨本後右唐禇遂良所臨王羲之蘭亭禊帖永樂八年上在春宫得墨本命工刻之石時大臣及近臣侍監國者各賜摹本得者裁六七人非恭慎端厚有文學者不預盖貴重之也此本都察院右副都御史虞謙所被賜者間出屬臣士竒識於後臣侍上最久盖甞竊聞賜帖之㫖非獨矜重法書要在奨勵其人焉謙初為大理少卿上嘉其儒雅且明正寛厚志存澤物有大臣體特奏太宗皇帝以為右副都御史無幾又命署刑部尚書而諭之曰余知卿無忝也既嗣大統廷臣雖有進官者然悉兼舊職獨以大理平天下刑獄非謙不可遂改大理卿謙感知遇之厚孜孜盡心若宋歐陽觀所為求生道於死獄者謙盖有焉凡人之麗於辟者徃徃心誠服之而無憾今九重惓惓夙夜圖維好生之徳洽於民也謙亦圖惟厥終用永彰皇上知人之明而不忝明良千載之遇則家藏此帖固子孫萬世之寳嗚呼尚敬之哉恭題崇恩堂巻後右魯王殿下為衍聖公孔彦縉大書崇恩堂三字又備書仁宗皇帝臨御時所以竉待彦縉者於後彦縉今以示臣士竒於是鼎湖之龍御逺矣拜跽荘誦不勝血涕之横流也臣士竒祗事仁宗皇帝於春宫二十年既嗣大位又擢置於左右徃年侍監國南京彦縉嵗一来朝所以宴勞錫予之必厚将歸必命廷臣徃餞之盖所從来如此非始於臨御之時也而凡孔氏之後以名上者率親擢清華之職且厚遇之亦非獨於彦縉然也間嘗諭臣士竒曰國家於庻士有能佩服孔子之道者猶重其䘵位厚其禮遇矧於孔子之後乎又曰在漢唐宋孔子之後徃徃有聞於史冊今而後必将有繼昔而起者乎嗚呼聖明惓惓崇儒術重先師之意如此可為千嵗一遇者矣於是以臣之所親得於見聞者謹附志巻末庻彦縉暨一凡孔氏之後尚圖不忘而益勵哉題漢桂陽太守周府君功勲碑右漢桂陽太守周府君功勲碑漢熹平二年建唐太和三年重刻字雖剝蝕其可辨識處渾然漢意固在也此碑今在韶州府治先師海桑陳先生志其本末甚詳余在南京求此碑久未得永樂己亥子唘學士扈從在北京見寄此本乃知物常出於所聚初不係其地之逺近也䟦清節書院記元季書院燬於兵此碑幸存士郁之子樸慮不能免瘞之所居之後且秘不言歴五十餘嵗樸已死遂無知者永樂癸巳樸之子家人皆病疫覡者云居後有寳物不當久閟指示其地令出之則此碑也已而病者悉瘥亦靈異哉碑缺一角則當時發地者所損時余在京今翰林脩譔陳徳遵讀書邑庠亟以書求之得二本以一分黄學士宗豫一表而藏之於家此吾西昌先代盛徳事而歐陽楚公斯文實因先叔祖平洲先生得之王至剛所題碑隂又先師海桑先生所書冝在所寳也永樂戊戍六月三日題范危墨跡後虞范揭楊皆於先曽祖有交好余猶及見先世所藏諸公徃還書牘危公與先祖兄弟同㳺吴文正公之門徃年在南京周恂如扈從北来得危公所作輓先曽祖七言唐律一章見貽雖片紙而出親筆已潢餙置家椉中恂如言此出公全集其集已散落張叔豫得之最多時叔豫已卒書籍悉歸永新不及得見也余来北京喜求故元時遺墨㫁簡徃徃有得最初得危公詩文五十七首於太醫院判蒋用文所盖與所得先公輓詩同出一集後得范公雜文十七首於民問皆出二公親筆遂装為一巻范前軰故列於首嘗聞范所著有燕然稿東方稿海康稿江夏稿候官稿百丈稿此必出燕然或東方稿危所著有雲林集說學齋集余及見雲林集此或出説學齋未可知也前軰作文章率自貴重既成皆親録遺後余見揭公詩文數集及危公雲林集皆親書刋刻不獨余之所得已余所寳此非獨重其文章字畫盖尤重先世之交若二公行事具見吴文正公宋學士所作墓志非後生小子所得置喙也䟦松雪書鄧文原文文肅當時自有能書名文敏此書尤為得意有翩翩鵾鵬雲海之勢但學書者當沂其上求之可也䟦唐誥右唐𢎞文生鄧自勉授行徳州平原縣尉告身一通開元廿四年所給唐選法試而銓銓而注注而唱集衆告之然後類為甲上於僕射乃上門下省給事中讀之侍郎省之侍中審之不當者駮下既審乃上聞主者受㫖奉行各給以符謂之告身此不云僕射者開元中改僕射為丞相也𢎞文館𨽻門下省生凡三十人時試人以禮記春秋左傳為大經詩周禮儀禮為中經易書春秋公糓二傳為小經其試𢎞文生一大經一小經或二中經或史記前後漢書三國志各一或時務策五而經史皆試策也此名嵩者蕭瑀從曽孫暠者淮安王神通元孫豫者席豫寛者裴漼從弟景融陸象先弟及韋恒裴耀卿苖晉卿唐書皆有傳有可稱唯陳希烈在姦臣傳其擬官廿二人無所考世所傳盛唐詩人有常建亦未知是否此告書者及署名筆意皆佳今七百年完整如新余得之前泰和令吴埜遂考而識之書胡氏先世二記後翰林編脩蕭鎡以其妻之弟胡重宣過余且出胡之先世所得楊文莭公作福榮堂記滕學士作後榮堂記余受而閲之為之歎曰故家世族文獻足徴若此者鮮矣吾於此有可頌者焉有可敬者焉宋光宗因慶其親而覃恩於天下之為親者鄒孟氏所謂老吾老以及人之老此可頌也胡氏自金陵徙吉而析為三伯居廬陵之值夏忠簡公銓其後也仲居泰和之南岡慶歴進士朝奉大夫衍其後也季居泰和之黄漕南城縣丞箋其後也凡族之蕃者必分分之盛衰愚良必不能齊胡氏三族其詩書相映衣冠不乏此可敬也文莭之記為南城作於今二百四十有六年滕公之記為南城之後南叔作於今百十有六年南城之後有徙社溪者矣而子孫至今寳斯文不失又可敬也然有可慨者焉徙社溪四世至文可號可山南叔之父也文丞相禮為上賔從勤王至海上及元盡得宋天下可山季弟號静山者誓不負宋竟以不屈被殺余童子時鄉人長老率能道其事歴歴然在先時諱言之故家譜不書郡志不紀史亦無録卒不白於世嗟夫豈非尤可敬而重可慨乎謹附見其事於二記之後韓退之云無亦使其無傳焉東里文集巻十一
