body:
  text: 東里續集卷三十三明楊士竒撰墓表彭原復墓表此彭某原復之墓彭氏泰和西郭月池里名家其世系見余所著香山縣丞墓表原復大父志永父與材母郭氏原復兄弟二人原復其仲也世父與吾無子以父命為之後自幼孝友而謹厚喜親筆硯不與羣兒嬉狎十歲為亂兵所俘行數日舍之去邂逅其父所交遊故人遂依之然更二年乃得歸歸而父母皆歿先廬已燬無強有力親戚可恃即自務樹立從學姻家先生王子與明為人之道而貴重其行不肯以非義取諸人於生事亦落落不以屑意而處親戚鄉黨怡然執恭讓人無長少貴賤皆樂近之嗜飲酒然未嘗愆禮度嘗長里徭賦一時長徭賦者率怙勢刻削其民原復獨淡然寧損已以厚民以是尤見稱長者洪武庚午閠四月十四日以疾卒距其生四十年矣配劉氏有賢德子男二詡翮女三皆適人孫男二銘欽女四曾孫男一今子男獨詡在初吉安郡學聘為訓導試經義于翰林有聲譽會英國公請于朝求士教家孰時特敕吏部簡文學優等者遂奏遣詡衆皆以為不辱命也初原復卒同産之屬有欺其遺寡孤欲敓其業者日虐使詡蓋行道之所不忍當是時孰計詡之克立如今也哉雖詡有母之賢要必原復有以善其後者不可誣也鳥獸於其同産知相愛不相賊也何獨於人哉雖憑其詐力馳騁一時矣夫固久而必定也彼有為之而不厭者觀於原復之後可以少戢矣表而著之其亦警俗之意也故廣西按察僉事劉長吾墓表永樂壬寅十二月十八日廣西按察僉事劉長吾卒於北京長吾吉安永豐人發身永樂壬辰進士永樂以來進士厯七科唯辛卯壬辰兩科取士最少就試皆三千人而所選皆不過百人然兩科之士其初擢官顯要者最多至其後有政譽者亦多長吾其一也長吾諱某以字行系出晉安成太守劉遐世業儒祖思恭父子碩母李氏長吾幼穎異好學治書經年二十九舉進士厯事都察院踰年擢廣西按察僉事長吾居官有亷潔之行逹於大體為政簡而明臨斷是是非非於用法得寬猛之宜未嘗茍為私謀嘗盛夏當巡按向武或言瘴鄉盍俟涉秋而行乎長吾曰職在視察民瘼茍取便已如民何凡行部所至必以廉察民隱為務唯民所欲惡而從之少嘗受經劉子欽子欽後謫戍南丹長吾過之執弟子禮恭甚子欽亦自重不少損於是蠻方之人稍識師弟子之分同官陳賞巡按梧州卒適長吾過梧州特留治其喪遂以歸其鄉而并歸其妻子其行義大率類此融縣有戍卒凶悖為民患民耆老百餘人訴諸長吾廉得其實械送京師道卒會朝廷遣使巡撫過融卒之子以父死蓄怨誣告長吾他事巡撫以聞都察院逮治長吾其誣竟直然未幾長吾卒年三十有九嗚呼惜哉長吾娶周氏生子一人尚幼卒時獨一養子在側今將歸其喪葬永豐夫士之務學修行恆患無所遇不得效諸用有所遇又患局於位不得展其材如長吾庶乎得展其材又不永其年非可惜也夫長吾之修於身施於父兄宗族者其鄉之人固知之而其施於政及於廣西之民者蓋縉紳君子多知之而鄉之人未必盡知也翰林侍讀學士曾公既為著葬銘余又撮其概表之授其家俾刻諸墓王思賢墓表處士姓王氏諱某字思賢王氏之先居廬陵之何山後徙安成連嶺至諱扆者始徙泰和邑西之南富里幾世至興祖處士曾祖也廷圭其祖也功迪其考也皆業儒不仕處士自幼嗜學善事父母而持其身治其家一以嚴雖富而其意泊然嘗盡失其資産而泰然如未嘗失者於內備共養外給公賦皆親任之為人廉方謹恪而施之以和裕人有過未嘗輕言有所不逮導之使必至焉於家之子弟率防範以禮與人交義而誠其公直為一鄉所服性不飲酒然喜以酒樂客客皆沉酣淋漓而處士獨醒其間相與傲嬉傾寫無間嘗自號獨醒老人前翰林學士解公為之傳蓋年七十有七而卒卒時遺訓其子孫惟詩禮以立身儉勤以立家而已娶羅氏繼蕭氏子男五人守一守訓守約守敬守恆其四人已卒今獨守訓在女一嫁賴九皋孫男八人維某某某某某某處士之葬也翰林侍讀王君直既銘之守訓復命經來京師求余文表墓余家距南富一舍而近嘗聞其先世當宋之亡也奮義出力從文丞相勤王之師丞相數過留其家愛其一門昆弟子姪皆俊爽特逹為大書續槐精舍以督勵其學其先之所為見重於世也如此處士雖逸居雲林泉石之間未嘗一出以效用而考其修諸躬施諸人者蓋於其先無忝矣而至於今如經如維皆力學將以致用且其來者又益勤而未已也而皆處士之所啓矣然則處士其宜有表哉其宜有表哉李氏黃塘阡表無錫縣儒學教諭廬陵李湛孟昭滿三考升府學教授需次于京師圖其先世所葬黃塘阡六墓并述其槩屬余表之余諾之未有復也湛以疾卒於京師將卒命其子璉必請表鑱諸墓道璉遂泣拜致遺命嗚呼余於湛老友敢忘平生之言哉按六墓其中湛始祖四承事所合葬其右始祖之子或孫蓋失其世序字名不可考又右湛之曾伯祖榮卿其左則湛之曾祖晦卿而其祖伯復又袝曾祖之左又左而後數十步湛母江孺人云李氏故廬陵士族其先居衡州與宋忠臣湖南安撫使芾同宗至景嗣為承信郎吉州孔目迎其父母就養父即四承事也愛吉州士習之盛遂卜居郡城之西孔目在吉適安撫公為守以親賢特相厚善蓋其為人博學篤行所著有委順子呻吟集二子榮卿晦卿也晦卿號朴菴明性命之學守正力行排斥異端所著有勵志集識過録又取朱子首歲表年因年著統之義著百世一表傳伯復號復齋當元之盛際樂道不仕而剛正自持所著有見心録承家録又輯古今老釋之事著辨惑録李氏文獻之傳可為盛哉吾少獲拜湛之父克貞先生矩度雍容官至稿城丞文行政治蔚然有重於時後接湛於儒林藝苑之間溫然靜貞而有守其仲氏孟謙學行亦不忝其父兄夫有肇之於前又有紹之於後如李氏不謂之盛可乎褒衣博帶論説古今孰非士也而必明夫學之正必見諸行之實不為枉道徇俗而至於纍葉不替益加如李氏焉者蓋亦鮮矣李氏非廬陵之望乎鄉人士有過黃塘之阡者式之哉故黟縣知縣贈承德郎刑部主事嚴君墓表洪熙元年某月刑部清吏司主事嚴珊蒙上恩賜敕贈其父䘵以珊之官階承德郎而贈其母程氏為安人於是珊踵余門拜且泣曰先父之葬也鄉先生前左春坊司直金君志其幽矣惟上之寵命及先德之施於時宜表示來世者未有託焉幸矜而畀之珊嘗從余在翰林六年勤學勵行其去為秋官屬能聲日益焯焯蓋於子可知其父矧又有如金君所志者哉考志嚴氏其先居睦五季有為令於衝之江山者因家其邑之瀆口里至宋宣和中名賜者徙開化之龍山既徙而族益盛鄉人號其地曰嚴村賜八世至浩然浩然生得華得華娶徐氏祿之大父父母也其上三世皆不仕祿字伯宜始用薦者為太僕羣牧官三歲罷羣牧改國子監掌饌又用薦升閩縣知縣復改黟縣其為掌饌也自大司成至六館之士皆譽之其為閩縣也壓以會府貴臣之尊且衆而朝命之使及海南諸蕃國貢獻往來宿頓供億之繁應接趨走無寧斯須伯宜從容事集而民不擾也賦舊十倍他邑民不克堪伯宜力言於府平其賦民至于今賴焉為黟縣也愛民如閩尤篤意於興學民甚嚮服蓋無幾而卒於官伯宜自少好學師事從兄好禮好禮官思恩臨汾建平不憚險逺率往從之事親孝事其兄伯謀凡田宅臧獲器物惟伯謀所欲而已取餘焉養孤姪始終同已子處族姻閭里咸得其心尤汲汲義舉其施諸家與鄉如此宜其政之行於人也卒以永樂辛卯五月二十四日享年五十有七初娶程氏宋祕書少監洞之後繼戴氏子男四瑄珊珣環珊永樂十三年進士自翰林庶吉士升今官女一歸戴鎧孫男三女一方今明詔數下令中外舉堪任守令者付之撫綏之寄又嚴戒貪墨重舉主連坐之令期必得人中外之臣皆惴惴不敢茍且有言恐負德意嗚呼如伯宜之才之德豈非其人哉惜乎其不可復作也士懷有用之具際得用之時而屈於命不克以究其施徒使後之人思之而不忘豈非可惜也夫抑亦可慨也夫王處士墓表余與少保淡菴楊公同在翰林四十餘年今間暇相與私論屬官之賢之衆共私喜前此所未及也蓋今之賢者具四方若荆湖之賢檢討王振其首也少保公又言振之得於家者有自因及其父處士君之德善處士蓋篤行人也余心識之一日振奉少保公所作處士墓銘介其僚編修蕭鎡求余為表余不可以辭按王氏其先自蒙城徙荆州之某邑六世祖邦直仕宋至侍郎祖諱琦仕元為迤南河泊官考諱文才處士諱某字貴華貌清儀肅知學問明大義居心以不欺為本有孝友睦姻之行性和易而耿介毅然非其義一芥不茍取自用淡泊而能捐利以仁其宗族鄉黨恆積榖間遇儉歲盡出貸賑嚴於教子常勵之孝弟忠信子若孫有過輒怒不見必改乃已每諭之曰為人但常省已過不當言人過又曰士持行當如闕虧為終身之纍振選鄉貢上京師縣令丞贐闕數百緡處士力辭已而顧振言此斂諸貧民者闕仕而可受不義振服膺惟謹里有競爭必於闕平未嘗以私掩公守令以下所共敬禮方嶽大臣過者咸見存問春秋八十有四視聽不衰容色腴澤如頳玉卒之日弔者哭皆哀遐鄉僻陬其耆耋咸往會葬非其素積誠不已何以致此哉娶孫有婦道子男三孟思聰仲思忠季即振宣德庚戌進士授今官女一嫁劉俊孫孫男若干處士之卒以宣德丙午九月辛丑蘇文忠公有言稱人之善必本其父兄若振見重於縉紳君子非本諸處士乎吾故表之以告夫世之為人父者中順大夫興化府知府李公墓表李氏之先出唐宗室燉煌房五代時避地于越後之台之寧海家焉見黃文獻公集中霽峰先生墓志霽峰先生當宋末元興之際以髙文邃學重於時文獻蓋其考試浙省時門生云霽峰於興化為髙祖曾祖諱栗祖諱炳考諱孰明書詩春秋洪武初分教華亭縣學因家焉後為鄜州同知卒於官歸葬華亭娶華亭沈氏興化其子也諱銅字至剛號敬齋以字行少頴敏不羣嘗從學楊廉夫為詩文有清思洪武戊辰舉明經奉命侍懿文太子初授祠部試郎中既實授坐纍謫戍邊無幾召還為虞部郎中尋升河南布政司右參議會河決汴隄居民危懼公建議假王府積木作筏濟之人賴全活甚衆調湖廣布政司左參議太宗文皇帝入正大統公來朝大臣有言其才且洪武舊人遂以為通政司右通政方修洪武實録公與焉旦莫在上左右道説洪武中事甚親密是冬升禮部尚書時禮部之務叢脞公長於剸繁條理井然益見寵遇實録成有白金文幣金織衣之賜永樂二年春册立皇太子命公以尚書兼左春坊大學士東宫開經筵公與右坊大學士解縉最先進講及修永樂大典四方文儒皆集仍以公董之無幾為侍郎宋禮所間見疏歲餘降儀制郎中然遇劇務必以屬公解縉素厚公既遭讒出又以公言其怨望後召下獄而并下公仁廟嗣位念公舊宫臣復以為通政數月又念其老不任朝參改知興化府時朝廷方霈仁澤於天下公仰祗德意勞心撫綏郡民德之甫再歲殁于官宣德丁未七月四日也享年七十娶孫克配君子子男二長瀛次源永樂甲辰進士疏通明敏自驗封主事升員外郎方嚮用於時嘗得推恩追賜父誥命及贈母恭人女四長嫁盛衍次嫁太常少卿鄭雍言次嫁王瑄次嫁考功主事宋琰雍言琰皆進士發身孫男八女三曾孫男一嗚呼公厯事四聖凡四十年入典邦禮輔儲君出佐藩翰守名郡顯榮光大矣雖間厯夷嶮然回視同儕輩覆敗消亡何可勝計雖或存什一於千百而求如公之巋然享高壽都重爵從容考終何其少哉况又有後嗣之卓然奮起而繼承之謂非所存之良所施之厚有以致之乎余與公同朝久源既請少保楊公銘公之墓又請余表於是乎言李貴祥合葬墓表龍泉泰和其壤地相接如東西家其人邂逅於逺外相親如素厚善茍有行義可稱相愛願不啻如已出吾始見李九疇於為進士愛其言質而禮恭謂將不辱於鄉郡後又見之為御史愛其奉命而敬事謂將不辱於朝廷以是數往還而益聞其世其家知其有所自也今九疇喪母將歸合葬於其父之墓而縗絰拜余請曰不肖不孝無以報父母大德於萬一願圖不朽於執事余哀之為表其墓曰是為李貴祥甫及其配合葬之墓李氏世家龍泉貴祥甫諱英其孝友行於家忠厚施於鄉公方平直嘗禆於邑大夫之政永樂三年某月日卒春秋六十有九其配蕭氏於事舅姑相夫教子靡有不盡永樂十九年某月日卒春秋八十李氏之先曰榮其祖曰真淑其考也曰九成九萬九疇其子也曰某其孫也銘曰凡世伉儷比德者希懿此室家合璧相輝生同其居歿同其穴後有承之式閎其閥王堂墓表元良吏淮東道宣慰副使王公有賢孫曰維政自少負邁往之氣逺大之志操執剛正論議髙明素欲有所見於世不幸不遂大施以卒今四十餘年矣有老耆知君深而尚存者往往與少者道君之才之行而未及展施以為悼惜噫非實有諸躬其何能使歿世而人不忘之若此哉維政諱堂洪熙元年以子鈺貴贈翰林修撰承務郎封其配史氏為太宜人修撰君曾祖諱理元纍贈朝列大夫祕書少監騎都尉追封太原郡伯事行見虞文靖公所撰墓志祖諱艮即宣尉公事具國史及黃文獻公所撰墓碑考諱仲廬元紹興路總管府經厯妣徐氏封宜人修撰君自幼穎悟七歲能賦詩老長皆竒之進從學鄉先生唐處敬讀書日千言終身不忘方肆力於古人雖值元季兵亂未嘗輟也國家平定之初君之父以元故官謫濠梁君侍行躬勤孝養後奉父還鄉辛苦闢草萊治田廬有詔發兵民築緣海城邑大夫推舉君率民就役撫馭規畫悉有條理民不困而事先集他之率兵民者多效法焉有司以賢良舉送君京師奉命使蜀還奏稱旨得疾歸既愈時太康王師魯為浙江布政使表然一時方嶽之望其所用簿書史必慎簡賢良知名之士遂采輿論舉君為掾凡所言與行皆愜王公之意被檄督賦嘉興有推官不職不為君所禮銜之推官後坐賄徵下京獄造誣詞連君逮至誣竟直未出京以病卒洪武草四年十二月草九日享年若干太宜人史氏系出宋宰相浩父諱本贈中大夫資治少尹河南布政司右參政妣吳氏贈淑人太宜人天性純明涉書史通其大義蚤喪母凡事二繼母皆得其歡心繼母髙病瘵家人畏傳染皆走避獨躬侍湯藥不去左右者幾再歲暨終無幾微怠意而竟無恙既歸王氏家徒四壁躬勤紡績晝夜寒暑不懈用佐修撰君殖其家卒以饒裕修撰君初舉賢良意未欲就或導之詭辭以規免者太宜人於屛後竊聞之謂修撰君曰事豈當僥幸斯言必不可從修撰君曰吾豈惑於彼哉修撰君歿嚴於教子冠昏喪祭皆有品式治家馭下睦族及鄰咸當其宜有智識凡審幾料事率豫中平素不信禨祥不惑祠禱而頗好內典年將八十康寧和豫勑封命下子孫合內外幾五十人奉觴上壽鄉里以為善德之應宣德八年九月草二日卒享年八十有五鈺奉合葬于修撰君之墓子男二長鍾先卒次即鈺女一嫁樓璉孫男六女二曾孫男六女四鈺永樂十年馬鐸榜第一甲進士及第初授翰林編修升修撰正統初朝廷作新學校慎簡文學行義堪為師表者授風憲之職俾董一方教事擢鈺為按察僉事賜璽書命往江西瀕行以事狀求表其考妣之墓鈺與余交草有五年蓋余畏友也孔子曰魯無君子斯焉取斯然則其考妣余可以無言乎敬為之表封宣義郎都察院都事熊君墓表宣德中朝廷簡用太康顧公佐為都察院都御史賜之璽書俾罷黜貪汙湔滌弊蠧一清憲紀於是顧公舉南昌熊尚初為院都事都事幕佐凡都御史之敷奏施令一切簡牘必經於幕所係之重不與他官等尚初練逹詳謹無滯事無過舉顧公良重之後尤見重於繼顧公者尚初才名遂有聞於京師朝廷賜勑命嘉勵之以其官封其父景方尚初既升經厯為幕長於都憲數年而景方卒知之者皆嘆曰非此父不有此子惜乎哉於是尚初縗絰拜求墓表之文按國子助教李洪狀景方篤於教子尚初始授七品秩需次于家恆戒之曰寵命雖可為吾榮然必他日能守官不貽吾憂乃足榮也及授官又勵之以慎勤和恕為持已舉職處人馭下之道且以不欺為本孜孜勵之而不倦其子亦能祗率弗違斯其所繇克承官而致譽者歟古君子稱人之善必本於父兄其不虛矣然考景方他善尚多家居有孝友睦姻之行故裕於資儉歲恆出以賑匱乏有就之假貸而不能償者即已不復問就之傭耕必豐其報有司嘗推擇掌里中海艘之役里人共貸白金六百兩市材後不能償景方獨損私償之不以及衆非能仁其鄉者歟景方自少務學問為人坦直剛毅薄於自奉而厚於賔客即所居作三堂曰一敬曰維清曰嘉會二樓曰復古曰凝碧皆以怡老而樂賔大夫士多為之賦詠非瀟灑絶俗者歟其諱紀字景方别字松節其卒以正統七年十一月五日享年八十有六其世居南昌之盧觀五世祖雲卿宋右補闕祖敬升考中立皆隱弗仕母劉娶徐子男二長即尚初次尚爵女二長適程子良次適陶朝洪孫男六女四嗚呼景方察諸其行觀諸其膺驗諸作善之應展乎有徵表諸其藏來嗣其承贈奉政大夫吏部考功郎中畢君合葬墓表吏部考功郎中畢昌踵門再拜奉其所述考妣之行實求余文表墓昌官京師二十年溫恭廉慎如一日余素重之而余忝內制時目睹其考顯祖妣駱氏兩膺朝命受封及贈蓋又念非其考妣躬修德善曷以致斯遂托所述而書之畢氏世家杭之仁和自其先務勤儉蹈忠厚在元曰仲義及子進皆隱居不仕顯祖之大父父也洪熙元年封顯祖承德郎吏部考功主事其配駱安人宣德八年贈顯祖奉政大夫吏部考功郎中駱宜人顯祖諱如其字天資淳質志尚淡素自幼勤苦以承先業孝養父母睦於宗姻鄉黨與人交久而益親平居簡默而言必度理行必顧言人有善稱譽之不置不善必為掩蔽於愛子姪循循化導恆延明師教孰中而躬考其成績於內每戒其子曰吾少遭兵亂弗克問學汝曹幸生太平又不勉力是自棄矣誠能自勉匪直可以榮身蓋榮親亦由此矣其襟度夷曠善飲酒而終不亂晚歲暇豫日與故人朋侶放情適意湖山之間超然如遊物之外者既享祿養承恩封泊然不一芥動於中而持已愈謙下蓋春秋八十有三而卒其生元至正戊子四月七日卒於宣德庚戌七月草六日其配婦德母道式相君子春秋七十有八生至正癸巳二月草三日卒於宣德庚戌二月草五日合葬錢唐縣包家山之原子男四長富琮次富禮次昌永樂乙未進士吏部考功主事升郎中次盛女一適徐文義孫男六昔考槃詩人詠隱者盤桓寬廣有自得之意若畢君非其幾之歟畢君所存幽貞淡泊而臻于耄年非孔子所論靜壽者歟雖其不生被榮命而既歿之後命必及焉又以見為善之應雖逺而必徵也後之過其墓者式哉故封從仕郎中書舍人周君墓表嗚呼士習之不古若也或心不存夫仁身不率夫義也或不務乎孝友睦姻也或學不講而道不聞也或惟利之甘而欲之騁也往往得身後之譽於時貴人顯卿也嗚呼其可以觀世也吳中周璿之喪其父從仕君也求表墓於余蓋余以耄疾謝不能也璿示所述從仕君之德善質而不浮也曰事親食飲必躬調勞勤必躬執親歿居喪不違歲時薦祭必潔也與其兄處怡怡兄分教吳庠坐纍死家徙他郡極力恤其遺幼孤從兄歿孤女不能嫁嫁之如已女也婦翁以閭右徙實京師歲久家落資給之無虛月翁死歸其喪葬于鄉翁之子逮繫獄數年又力資之及其逺謫迎養其母且教撫其子也其友寓官布千匹其家將以充賦京師者一夕傍舍火倉猝起護所寓出而已室燬不及救其友德之請助作室費一毫不取也其少嘗充博士弟子涉知春秋大義也晚教里孰從之者恆百餘人訓其子及學者必約之務本惇實也郡邑舉鄉飲必見禮致也用子貴賜敕命封從仕郎中書舍人享祿養十餘年雖老而敬慎自執無厭倦也余閲之歎曰其宜表也其諱恕其字仲立别號存翁也宋有為撫衛司兵馬鈐轄南渡時自鄢陵移守泰定州遂為蘇人而厯世崇儒醫其先也諱子華諱繼善元平江路醫藥提舉其曾大考大考也諱極隱居教授娶顧其考妣也陸氏封孺人其配也璿璣瑾瓊其四男子也璿今為中書舍人璣寧波府學教授皆其所成也曹煜沈圭其二女子壻也孫十有四人五男九女也春秋八十有四其壽也正統己未十有二月庚辰其卒之歲月日也長洲縣彭華鄉金盆塢之原偕其配所合葬也并為志之俾來者有考也彭叔敏甫墓表監察御史彭朂奉敕提督南京郡邑學校有成績天官卿奏其最凡再以余同鄉郡過余言曰朂不孝不幸生際有道之世仕於朝得祿不逮養父終身慟也重不幸者令仕於朝一考而最得推恩封贈父母及朂當如令而格於新例未即得朂惟是朝夕不遑寧也又念先君之墓木拱矣而墓上之石未有刻辭幸先生哀而畀之遂出少傅建安楊公所作墓志視余按御史之考諱某字叔敏杏隱居士所自號也彭氏唐天祐中有諱玕者為吉州刺史至諱思永宋治平中為御史中丞皆居廬陵之山口里其後至少英及其子子淳皆從文丞相舉義徙居永豐新陂又徙龍潭之西杏隱之髙曾也祖貴德號雪崖明經教授考諱景忠兼業醫杏隱承其業而造詣益深凡所愈疾不責報有贈之衣服飲食輒持歸獻父母父歿母張病瘵十餘年旦暮侍左右飲食湯藥衣服盥漱坐臥扶掖皆躬任之母歿里俗瘵死懼染率火化杏隱力拒羣言棺斂如禮父母歿皆哀毁忌日祭必悲歲時先祠薦奠必誠必謹厚撫諸弟及兄弟之子訓育婚嫁咸盡心禮聘名儒於孰為子弟師為人溫雅謹飭言動不茍不妄交際而處宗姻鄉黨怡怡雖有拂逆不見詞色人皆多其長厚二子皆有官享祿養者十九年宣德八年十月日卒春秋七十有五葬里之小金岡配黃氏子男二長朂永樂乙未進士南雄建寧兩府儒學教授遂擢御史有賢聲於時次昻會試中教官選今為唐府伴讀女一歸劉伯端孫男十一女六曾孫男二洪湖凡世有大功德者則見之銘與表如杏隱君其持身處物固皆善德矧其誠孝尤德之大者是宜表也陸守道墓表姑蘇蕭仲南從余在翰林草有餘年其為人質實靜重不茍干請間以其甥陸某來拜求表其父守道之墓余念於守道未嘗一覿顔一接辭也謝之再三仲南曰果非其行有重於鄉可傳於後其奚敢瀆備道其平素且出其事狀及吾友張君宗海所為銘墓之文覽之而信為之書曰陸出吳荆州牧抗之後世家長洲其髙祖盛始居陳湖之上積善以植家曾祖榮甫人有就之鬻田者必增直豫之或譏其近名曰貧極則鬻田吾恤其貧耳祖仲祥父文伯家益富恆自念富不蹈義怨將萃焉而所行未嘗違義母張氏守道諱禮惇厚明敏自幼有孝弟之行而親睦宗黨喜學長從明師講授即謹於義利之辨遂博涉書史永樂甲午朝廷用舊制選用才賢於富民中守道與焉召至屢奉使於外不辱命未授官援例暫歸再召以疾不果行其初被召也付家事二子以友恭書其堂諭之曰汝兄弟了此即百事當矣及歸種橘軒外又諭其子曰種樹與種德同封之厚溉之時而常視其螙去之斯根本固生意逹而葩實蕃碩矣其訓於家概類此嘗以白金百兩貸其友之子未幾其友坐事當逺謫子倉猝償貸守道曰若父吾友也願以贐卒不受償有華某者同被使命出華中道病疫其從者畏而逸去守道獨扶持之躬煮藥與粥飲食之華卒具棺斂殯之馳書其家歸其喪歲飢屢發廪賑貧者凡久貸不能償者輒焚劵鄉人貧者病豫之藥死豫之棺耕乏種豫之榖皆不可數計其施於人率類此平居謹言行處人以誠襟宇坦夷不事表襮雖富意淡如也喜賔客敬久不衰間暇讀書賦詩以自適宣德九年七月草四日卒享年五十有九配吳氏子男二珩瑄女一歸張樞孫男三女三嗚呼自井田廢而兼并起強凌衆暴久而益甚數十年來富家豪族豺虎其鄉人者大江之南莫甚吳越前數年朝廷遣使巡視扶植其善柔薅除其強暴蓋已肅清而比聞故習稍稍復作何其沉溺之固而不知省也然亦曷嘗無善仁者哉孔子曰十室之邑必有忠信吾於守道徵之矣故為之表陸氏之後尚世承之勿替韓母太安人王氏墓表太醫院判韓叔暘之母太安人卒於鄉叔暘奏乞奔訃歸上尉諭留之賜鈔三千貫明日復奏乞歸上復留之命工部遣官營葬叔暘既拜命退奉國子祭酒具宗魯所狀太安人事行介其同官蔣主善求文表墓余於叔暘有同朝之素誼不容辭按太安人姓王氏諱妙安世家蘇之嘉定族衆而産殷父某母某氏父洪武中以資長萬石區坐纍謫滇池以其家行太安人始笄性行端淑父母甚愛之雖旅瑣中必謹擇所歸時金華韓伯器亦寓滇中行義為衆所重且邃於醫方求配遂歸韓氏敬事君子躬勤與儉相之植家而家用豐後朝廷以名醫徵伯器遂挈家北歸至京師太安人念韓氏之先塋久曠展省也請於伯器與其子歸武義既復至踰年伯器卒居喪如禮遂及其子奉襯歸葬於鄉而益篤教子恆曰汝曹所當嗣者世業而尤當嗣者世德嗣世德必在於學勉之毋怠後叔暘仕於朝蒙恩贈父以已之官封母為太安人太安人拜命既族寓書勵叔暘以敬慎毋孤國恩忝父母其待諸子及婦均一恆訓以義方於族姻惇恩意馭下以恕平居務善而避不善閨門秩如也享祿養者十年雖春秋髙而康寧和豫忽得疾藥屢進竟不起宣德九年正月十六日也生元至正二十二年八月一日享年七十有三將以卒之年某月某日葬某鄉青草山隂塔石之原袝夫之墓子男十今存者仲暘叔暘季暘孫男四傑儀健俁孫女五叔暘倜儻卓卓精其父之業永樂間以名醫徵詣太醫院簡事今上於春宫勤慎小心久而益恭上嗣大位超授太醫院判恩遇隆厚凡所被賜賚必先以奉太安人而後及已人皆為太安人榮而太安人恆執謙不自伐也嗚呼人之賢必本於父母太安人訓飭其子惓惓於世德而躬自蹈者其德老而不懈若此信賢母哉信賢母哉遂為之表張母太孺人董氏墓表宣德甲寅有旨封貴州道監察御史張君慶母董氏為太孺人命未下而太孺人卒以卒之明年葬今禮部侍郎王公為之銘墓又四年慶求余為墓表慶篤實清謹力學有文舉進士為御史以重厚稱蓋慶蚤喪父一本於母之訓也母之墓有表固宜按狀董氏邑故家宋參知政事德元之後也父天成母曾氏太孺人自幼善女事熟女誡諸書而貞淑間雅鍾愛於父母長歸同里故家張孟芳太孺人於事舅姑至孝無幾舅卒時徭賦方殷孟芳年雖少日竭力赴公太孺人亦力於內助事率蚤集已而佐夫殖家居宅資産咸加於前孟芳卒太孺人悉心教其子七男三女嚴於夫之存也孫曾後益衆申禮教以防範之太孺人平素於薦祭致嚴於賔客有禮於臧獲有恩於家之長幼貴賤衣服飲食之給咸有定序嘗歲甲申大歉里富室率閉廪不發太孺人計其家所儲榖萬餘石量足歲給外命其子悉平價以糶鄰曲之貧者咸計口給之不責償鄉里德之宣德甲寅九月二十日卒享年七十有八男長即慶也次旻先卒次俊次賢次良次雍次熙蕭德髙曾克溫曾一新其女之壻也孫男三十有二人顯􅀈頥籲顒皓頲髏􅀈頔頡頑碩頌頠顔顛􅀈頎􅀈熲䫪顗𩕳䫆顓頵顉頊項顁頮女十有二人曾孫男十五人皓昴晏暈晃升昱忭冕旦暹昺朝景曼女十一人易曰積善之家必有餘慶古詩人之於頌禱也祝之福又必祝之以子孫之賢且衆若孺人其修於家施於鄉為善有誠宜其有賢子而孫與曾之益繁也天道福善之云不其然哉不其然哉是為表王母曾孺人墓表泰和之西鄙南富里王氏有賢母曾孺人卒而葬今二十餘年鄉閭族姻稱道其德善嘖嘖不已蓋於余從伯母為同産兄弟從兄思貽先生嘗寓書京師致其子之意求表其墓屬余侍從之北京未暇也厯七年其姻家貴州按察僉事郭公緒申致其子之意余諾之是時其孫紱在京師遂以前韶州府學訓導歐陽源所具事狀來余讀之嘆曰孺人素行如此宜乎鄉閭族姻稱之不厭而為之子者必欲昭于逺歟曾故萬安龍丘里名家世積善某娶郭氏孺人之父母也孺人諱莊天資柔靜自幼涉知書祗姆訓勤女事好惡不失其正家雖富清素簡約自持其歸王氏為思齊甫之配王曾門資相埒而思齊甫傑特不凡孺人相於內事舅姑盡孝道治家條理秩秩元季兵亂以其闔門竄避山谷不改常度亂定歸盡喪其資産無幾又喪思齊甫孺人時年三十有三謹禮度而煢煢育其子一男一女茹苦服疏躬勤蚤莫用再植厥家一如思齊甫之存也教成其子男有室女有家庭户之內尊卑貴賤肅如穆如蓋鄉閭族姻所共稱其尤難者也其卒以永樂乙酉某月某日享年六十有九其子男守貞女之夫即歐陽源孫男三長統次紱永樂辛丑進士萊蕪知縣次纁女二曾孫男四嗚呼人之善行蓋難得於憂虞艱窶之際矧為女婦當嫠居窮處乃能秉禮從容以卒有立如曾孺人者非賢而能之乎非賢而能之乎是用兼采衆言書諸墓石以稱其孝子之意中軍都督僉事李公夫人王氏墓表婦德以孝敬慈惠為要孝以奉上敬以奉夫而正家慈惠以及下或一闕焉則婦德不備備未有其家之不興也世去古逺女教不明德之備者蓋亦鮮矣觀於吾友沈民望所述李夫人王氏之行其庶幾乎此歟夫人之子芳以其父都督李公之命介太醫士孫公器來求文表墓王氏世家江西之番昜其曾大父諱才洪武中以軍功積官至遼東都指揮僉事大父諱文昌襲金川衛指揮父諱文義早世季父諱文邦代襲其職調錦衣衛夫人諱妙慶生長勳臣之家而間姆教涉知書精女紅事父母篤敬愛為族姻所重既笄歸都督公公名福李氏世居河南鄢陵亦以武功起家都督公襲其父職從征伐積勞勳勇智出倫進官督府夫人自為婦事舅姑生養死祭致其誠敬如事父母睦於宗戚嚴於訓子待媵侍有恩惠天資慈恕未嘗作於言色閨闈之內肅雍有常躬執儉素雖貴富不渝其下化之於婦道妻道母道庶乎備歟春秋五十有九子男一即芳婦王氏後軍都督同知王公或之子女一在室都督李公數年奉命率師備禦海道得以專其智慮致力於公使邊方千里肅清無虞而忘內顧之憂蓋以夫人之善於家政也古者公卿大夫之妻其德行可稱或詠於詩或書之史皆有聞於後今之世如李夫人者其宜表哉是為表故羅母劉氏墓表洪武三十三年九月五日西昌羅母劉氏卒既葬縣西北十里楮原靖江府長史蕭用道銘之矣其子孟敬等又介蕭建平來求表其墓余謝不知狀建平曰母世居泰和城西考與權妣鄭氏生有淑德時仁壽居同里弱冠考均瑞妣劉為擇配良而母歸焉既入門以事父母事舅姑姑病湯粥藥餌必親煮以進不使餘人夙夜侍側無怠色姑曰新婦盡孝敬事我願新婦子孫亦長盡孝敬事新婦又以和處其族姻以恩使在下者以勤儉佐其夫殖其家教其諸子敦忠厚崇詩書時鄉先生蕭尚仁教其孰館戒諸子若孫必敬奉教誨母違慢以辱先生命晨夕膳饈必躬調潔清然後進先生沒其子今長史公用道繼焉奉之亦如先生間其子若孫從他先生長者自外來皆厚禮待之故其子孫遊從薰炙多雅飭循循年五十仁壽沒貞謹自持歲時諸子孫曾若婦孫之婦合六十有餘人列左右序次升堂上壽滫瀡錯陳慈顔悅和可謂福也矣而亦豈偶然者歟卒時年七十有六子男七人某某孟遜先卒某某某某孫男十有九人女十四人曾孫男八人女十人余得諸建平如此建平端重而信且余與羅氏同里閈故為表之使世之歆羡於福者知其有本東里續集卷三十三
