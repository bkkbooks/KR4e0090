body:
  text: 東里續集卷六明楊士竒撰序送貴州按察使胡士璉先生致事詩序士誠志于道凡存諸心見諸行皆天理之公而不纍於外物惟其皆天理之公故為子得乎親為臣得乎君處朋友而朋友信治民而民服表物而物化惟其不纍於外物故富貴貧賤憂患之來一無足以動其中無所往而弗得焉古之君子達乎道皆能於此後之欲學古人亦必造乎此而後可以為君子觀於清江胡士璉先生其今之君子者歟先生家於儒平居素守不求一毫於義命之外入仕至今四十六七年歷州郡長外憲驅馳萬里邉徼跋涉嵗月夷險一心泊焉休焉所至其士服之其民戴之未知由於善者化之聖賢論感人之道誠而已先生其有誠者歟聖明在上樂得老成重厚端潔之士天官卿雅知先生將奏而進用之先生春秋時七十餘以老病固辭遂命致仕歸先生悠然川泳雲飛之意易曰介于石不終日先生之謂哉於是朝之學士大夫相率分題賦詩送之而太子少保金公屬余言辨簡端嗟乎余愧先生多矣尚奚言嘗聞玉之所藏其山川草木咸被光潤清江碧嶂之間將必有占光氣之復還者乎吾又以為其鄉之人之賀也詩凡若干篇贈周用珍詩序余初至北京解翰林之職為春坊公務甚簡所居城西僻逺隘巷中達官貴人車輪馬迹之所不及每朝退閉户靜處不與俗接其意氣放曠翛然如林野人而清尚之士無所慕乎外者時過余談論久之余亦欣然不厭也吳中周用珍時以善書授官選在中祕所居城東距余十里而稍暇輒見過用珍闓疏恭慎有務尚之志其言依於禮其才蓋適於用尤善説醫理娓娓有造詣余與用珍言灑然相得也仁宗皇帝既嗣位余復入翰林至于今職務日殷旦暮在公雖於用珍居舍益邇而晤聚益踈矣用珍父母俱在喜其子之效用於時也然用珍念其親南北相隔數千里定省曠逺不能以朝夕寧也一日請於朝歸省焉太子少傅建安楊先生少保臨江金先生及縉紳君子之素重用珍者皆為詩送之非用珍之有諸躬其何以得此於當世賢卿大夫哉孔子曰出則事公卿入則事父兄又以謂何有於我公卿賢而在位者也聖人豈徒為自謙以立訓哉誠以事雖至近而欲盡其職而無怍斯亦難矣用珍內而得於其親外而得於賢卿大夫其可為有誠也殆孔子之所豫哉其歸也余亦不能無言故書其所為可重者以冠諸篇什之首送陳孟旦赴江隂教諭詩序陳氏余外家孟旦海桑先生之孫太華先生之子於余為弟余少從學海桑先生側其諸孫多同筆硯孟旦最幼少余十有六嵗初入小學也嘗從余里孰警敏清重特異諸兄諸兄今皆謝世獨孟旦在而有子與孫駸駸非復少壯時然則余曷為不衰且老哉其諸兄雖今皆有子及孫然詩書之習無聞獨孟旦父子克紹其先而弗墜殆黃文節公所云中和之氣萃於此一枝耶孟旦明六義之學西昌邑大夫聘佐教事所造就學者成績焯焯觀今之佐教如孟旦者寡矣今考最升江隂教諭江隂三吳文物之邦太伯延陵髙風之所被者逺矣往焉盡為師之道將其學者有成豈下西昌也孟旦勉之又念陳氏之先詩書科目之榮達自宋逮今纍纍不乏也而吾外祖一派自其髙曾以來緼仁施義雄文奧學表表名鄉郡而宦達未盛有聞往年孟潔孟京皆以乙科進士擢官翰林余揆造物者之報施其將在此而不及展其分寸相繼皆沒蓋余竊悲其命也尚惟孟旦在夫天於為善之應必不爽也修於身應於天如執陽燧求火無弗得者顧在天者有久速之異耳惟致力德義以俟焉可也孟旦勉之詞林學士君子有賦詩贈之行者書余之所望者為之序送郭鼎貞詩序臨江郭鼎貞為南京刑部主事九年考最升郎中復之南京刑部鼎貞為人溫厚簡靜不為氣勢崖岸而有執守出言率由夫理蓋篤實士也今外百司之務皆上計北京而南京所治惟應天一郡其政務視昔裁千百之什一公庭清虛吏牘簡靜鼎貞之官可謂稱其資也吾識鼎貞於太學於秋官將二十年其履坦如一日此其福固安靜和平之行有以承藉之歟彼有霑一命承一官傲然自得而竊威福之柄磨淬鋒利欲以畏懾一世曾不幾日而遂僨覆者使其少知以德義自裁以庶幾鼎貞之為豈不可以免哉吾聞鼎貞淦故家世積厚德固其來也逺乎士君子相率賦詩贈鼎貞行而給事中蕭迪哲以屬余序余固重鼎貞亦因有所警焉贈蕭生序里生蕭仲敬有司以材舉於朝歷事夏官嵗餘擢令歸善縣里人之在京師者皆為之喜蓋令者古子男之爵而百里之宰也古之君子有博學惇德懷負利器而終其身局蹐丞尉蓋望令之位而不能至焉者矣仲敬一出而遂得之固各有命歟令亦難為也矣凡百里之內民之休戚善惡皆於我乎致也有一人焉或淪於凍餒而失其所或困於橫逆而不獲安或喪其良心而陷於刑辟亦皆發諸我者於道有所未盡也况又有大府尊官之臨乎其上命使過客之出入其境出內聽斷簿書期會之紛然雜出於前事之皆欲盡其禮為之皆欲盡其誠也一有所未盡毁與敗且及之矣令豈易能者乎古之為丞尉猶必務盡其職而况令之所係者重乎歸善蘇文忠公過化之地也其嘉言懿行邑人耆老有能言者矣禮其賢者而訪之宜有益焉毋徒自足乎已也余既喜仲敬得官又欲其宜於官也書此以贈其行云送郭先生詩序吾友郭彥鉉先生歷官將三十年今年七十且病朝廷命致其事歸四十強仕七十致事古之制也蓋用之於道明德立之後而佚之於精力衰疲之餘先王待賢仁義之兼盡也聖天子於敬德優老尤隆恩意臨御以來士大夫耄疾者率得請而去既適所願欲歡喜舞抃以為衰老之幸先生年踰四十始出分教鄉校歷三考用最升教諭安吉又三考用最升教授順德在順德四年其習俗朴陋人不知重士士不知惇學道德禮樂之意漠如也先生既戚其教之不易入又其家之來順德者數有疾疢死喪之嬰于心居恆鬱鬱乃今遂釋而去歸于鄉其為喜幸何啻什百常情哉凡於先生有遊從之雅者亦皆為之喜翰林侍讀學士王君直相率為詩送之謂余當序之余竊念童冠時與先生者十數人為莫逆友里巷旦暮相聚講學道論古今為文章娛嬉陶然自足無務外之意睨視流俗人不直草芥蓋共相謂以此終其身無憾也後十餘年各東西散去不能得如意或出或處動纍歲不一聞問今忽忽四十年向之十數人者淪謝殆盡獨吾兩人在又皆有官守而南望鄉國於六七千里外蓋其心未嘗不惓惓也今幸遭聖明而士竒以恩遇隆厚義不得顧其私先生獨返初服以遂放其志意於山水雲林之間盛哉乎其遲莫之適也然山有玉焉則草木巖石皆將增其光潤孔子稱子賤必本於魯之君子先生之歸吾又以為鄉人後進喜矣送禮部侍郎儀公致事序禮部侍郎有恆先生髙密儀公今年八十上憫其老賜璽俾致事歸蓋特恩也禮曰大夫七十而致事疏曰七十有德君不許我國家法古制治優老敬賢著于令甲然有未及七十而衰病不任者亦聽解職蓋憫下之仁也有踰七十而不聽去者好德之義也仁義兼盡聖人之政也先生起自學官嘗為寶慶知府升通政兼春坊中允又升湖廣布政入為禮部侍郎奉詔授皇太孫經先生雖不得以七十之年謝事而璽書之褒極其優老重德之意先生何自而得此哉有恆者其齋居之名先儒曰貞而不已之謂恆此非先生之德歟先生天稟淳篤表裏洞達而直諒之節剛方之氣端實之行自少壯至老如一日豈非貞而不已者乎故所至以為教則學者皆曰得賢師資以為政則民皆曰得賢父母在朝廷則衆皆曰此賢輔弼也是宜其得乎上而必踰八十之年然後得去也今歸榮鄉邦撫其曽孫消搖山水之間而茂膺康寧和平之福古人所謂超然者也然古之君子其身雖退而心未嘗一日忘君故富文忠趙清獻之致仕也孜孜忠君愛國之誠未嘗已於言焉推先生貞而不已之心將必有同於此哉先生嘗屬余記有恆齋而未有以復也故述其躬行所得及所以名齋之旨以為榮歸之祝送劉鼎序為學能自知不足而反求諸己不纍乎外此賢人君子之事也世固不多見焉今年春天下貢士會試京師者幾三千人余奉命主文衡凡得士二百人而閩人陳中第一吾邑曽鶴齡第二又選可以為校官者三百人既而二百人入對大廷上親擢鶴齡第一於是公卿大夫皆欣喜慶告曰天下之大公也而吾邑就試之士惟羅敬劉鼎郭紹寧王鉞不與五百人之數四人者皆以父執見余恭然其儀怡然其容無幾微不得之意余主文方愧失士而合辭謝曰生之業未至不能逃夫明有司之公幸獲退而學焉受賜侈矣已而數過余求益無倦色其視世之有小失輒慘沮忿怨畜於中形於外者霄壤矣夫人一得一失皆有命惟知道者安乎命焉耳今吾邑之士得於命者可謂特出矣其未得於命而能反求乎中不纍乎外如鼎之四人者其所存謂非特出可乎敬援例入太學而鼎三人者皆歸吾少識鼎之大父愚村翁忠厚恂恂於鄉黨之間諸孫多讀書業儒咸渙皆明經擢第今咸為河南按察僉事渙為兵科給事中將繼今而起者非鼎乎固本其大父之積歟其大母今年八十餘康寧和豫而鼎二親具慶兄弟怡怡歸而樂天倫之樂益求諸已進進而不已所造詣可量哉鼎父仲髙吾童辨與之同學相别二十餘年矣故於鼎既喜其能特出於流俗又喜故人之有子也特贈以言且期望於他日云送葛主事還鄉詩序廬陵葛氏世儒家嘗有科名於宋清隱自少寄迹老子法中洪武中以樂舞生舉送京師十餘年擢為山川祠祭署奉祀又十年皇上龍飛之初升太常寺丞又十六年調禮部儀制主事今滿一考蓋年七十有二矣奉命致仕歸清隱為人溫厚篤實不茍其行居常閉戶焚香坐詠道德經南華篇不與俗人接翛然自得也而名儒碩士方聞博雅之流相好而過之者或留寓至纍月而不厭非清尚不群者歟其治職事也明於典常之故達乎節文數度之詳歲國家有事天地宗社百神清隱秉虔相事嚴恭對越雖籩豆罍洗之末必躬蒞潔之詩云濟濟多士秉文之德對越在天駿奔走在廟清隱可謂無忝者矣今歸榮於鄉瞻桑梓而致敬樂山川之仍舊忘機鷗鳥之群遊趣煙霞之表遺榮名於外物頥天和之自然豈非盛福歟非自其修諸躬者得之乎於是大夫士有賦詩榮其歸者余為敘諸簡首贈太學賀生序元太學生山西賀永中積三仕而至正平縣尹既內附以故官舉又積三仕而至泰和淘金驛丞官滿遂留家泰和余猶及識永中於士君子間其意度間雅其詞氣簡重其儀矩整肅蓋未嘗以一毫之微而妄取敏其冡孫也秀頴務學自縣學生升國學踰年矣時初建北京學舍未備郡縣學生貢至者日益衆禮部奏請以南籍者分處南京國學詔可於是諸生之急於仕者多不樂逺去敏獨曰吾求進於學耳怡然以行余聞而韙之告之曰世所謂學者文辭而已求其力學躬行無幾也工文辭可以資進取致顯榮惇德行者顧獨不可耶古之人修天爵而人爵至故學貴先本而後末敏往朂哉為學必有師今司業吳先生吾嘗同為史官其篤行徑操毅然如嵗寒松柏之不變助教歐陽先生與吾同邑而少相講學其為人溫然方正而坦亮兩人者其言皆本道義而樂於教人而今皆子之師也往焉親炙於朝夕之間涵濡於歲月之久子惡得乎無進也敏聞余言喜躍然則又告之曰未也京師者勢利之所聚四方之人雜處其巧偽百出可以頃刻致重資中人以下之心豈能確然不奪乎外故有遇端人正士則改顔從事及退而群居浸漬乎便佞邪辟之説而陷於小人之行卒不能以自拔者故於取友尤不可不慎朂哉敏也敏惕然起拜曰敢不刻厲以敬承先生之教請遂書於簡以時自省因併述其祖德使圖無忝云贈蕭汝堅序今嵗禮部會試天下貢士三千人申選者二百人又選其次三百人為副榜例授府州縣教官吾泰和中副榜九人而蕭鈺三人者自言於吏部學未至未可以為人師願卒業於太學吏部以聞詔從之居兩月禮部言太學生益衆學舍不能容請令嘗中鄉選者暫歸自進以俟再試詔從之鈺行求余贈言余少於鈺父所耕居同里巷又嘗小學同師今其子志於學如此何愛一言嗟乎汝堅勉之哉世之得一名者往往安於小成不復有自進意甚者昧其固陋放言訾古人議前輩遇賢而長者不知禮下之有能如汝堅之不自滿而求自進蓋鮮矣汝堅庶幾漆雕子之志乎書有之滿招損謙受益茍自足之心窒乎其中蔽乎其前見善而不能知知而不能入雖有欲以善及之者亦且斂而去矣由是冥焉肆行偭焉背趍久而併其所得者喪之矣損孰大焉如持不足之心恆以不若人為耻以無諸內為歉汲汲焉惟憂善之不在已惟恐人之不已告也則有欲以善及人者皆將輕千里而來告之故日進月長其所得沛乎莫之能禦矣益孰大焉勉哉汝堅又當慎擇所從也子居太學有德義儒者為之師今之歸也文溪武山之間德義之儒有如吾行儉者乎子誠以求之虗以承之後三年遇汝堅必浩乎乘長風凌青雲而髙舉哉汝堅勉之送蕭郎中序臨江蕭伯辰事太祖髙皇帝為衛經歷事上為泰州知州又改深州凡衛之政無巨細必由經歷而泰深二州皆畿內民衆務殷不與他州等伯辰為之蓋上下皆歸其材且良既去則皆思之不忘伯辰儒者明乎理道有忠厚惻怛之誠和平闓敏之資而又行之以勤慎斯其所為達於政而得於人者歟今深州滿三考書最升南京禮部祠祭郎中國家建兩京其官府之制同今外之庶務皆上計北京繁於此必簡於彼故南京之官守優逸多矣而宗伯典禮其優逸加多焉宗伯領四屬惟祠祭典常祀歲時有事伯辰為其長推其所負蓄且練習之久宜綽乎有餘矣今年六十餘而進進於榮且逸如此亦晚節之福哉余聞伯辰有素今嵗始邂逅北京其姻家大學士金公屬為文贈其行故為書此送廖子謨序翰林庶吉士廖子謨既授潁上知縣告别將之官廖氏之先與余同里巷余少猶及趍走其曾大父愚寄先生德輝之下長而與其父潛仲相好也而子謨從余於翰林六年志同而道契矣余素寡合於流俗而今益就衰邁方資二三賢俊朝夕聚處以適而子謨遽有數千里之别能無情乎子謨行念無以助益之則告之曰君子之長民也求其安而已惟令於民最近其道易行而功易成也子謨懷安民之心有素矣有是心或上而郡府下而佐二其心異焉勢猶有所沮此必致誠以格之也誠可以通天地孚豚魚有不能格人者乎而非謙虗以承之優柔以將之雖誠未易以格也勉哉子謨子之所修能行於家有不能行於官乎潁上俗淳而務簡撫字之暇日求前言往行以自益焉豈徒足於百里之治哉贈胡敬同序亷者士君子當然之行非峻絶卓異之事也廉非一義其於行則不貪之謂唯君子則必廉不廉則非君子孔子曰君子喻於義小人喻於利義利君子小人之判也君子居則修其義於身出則施其義於人蓋視人猶己憂人之憂樂人之樂無一毫自私之心小人者反是知有己不知有人損人以自益瘠人以自肥惟已之肆無所不至焉故為天下國家者必擇君子付之以養民之寄君子知義必廉廉必公公必明而民安政理矣然君子有其德徑情直道持重不諂而衆率忌之小人有其才捷給柔媚屈已趣合而衆率樂之於是有君子而屈小人而伸者蓋係乎所與者之衆寡也其亦係於命乎豐城胡軫敬同家貧有志節初擢第雖得祿以供養外服用類寒士而怡然自適授兵部主事勤於職務確於自守不茍取一毫而自用如初第時升夔州知府孜孜以愛民為政其守益確其祿僅給奉養自用益儉而民戴之如父母後為同官所纍司法者不為之辨左遷兩浙鹽運司同知賢士君子皆枉之而咎司法者敬同既不自白後數年凡自浙來道浙之仕者有守有為十數人而譽道敬同者極口不置且恨其不為郡為藩以施惠於民也敬同見枉於司法又未見知於司銓固其命矣古之君子不以挫於外者而變易其中嵗寒之操敬同有焉敬同於余往還二十年知之有素今考績來京師一見遂别不能無慨於君子也故書此為贈送楊修撰致事詩序翰林修撰建安楊君壽夫致事戒行有日其學者連智時亦為修撰在翰林求同官諸公賦詩贈之又求余序智之言曰少之日學于鄉校也實從楊先生先生教誨飲食之如父母智微先生不有今日願一言以華其歸余聞而歎曰壽夫之樂成學者與智之不忘其師皆今所罕見也前二十年余在南京耳熟壽夫名心慕之永樂辛丑考禮部會試與壽夫同事一見如平生親時車駕􅛍郊外鎖院數旬既竣事多暇所與六七人旦夕聚嬉甚樂壽夫邃春秋兼書淵源有自明於鑒别平居言論溫恭謙下至辨析是非枉直斷斷焉雖賁育不能奪也宣德中詔廷臣舉賢才余與今少師建安楊公同舉三人壽夫預焉既至授翰林編修在館閣七年褎然老成人也預修宣廟實録升修撰於是其年七十得請而歸夫士君子出處進退從容合義固自其志蓋必有聖明在上使臣以禮而然後志可遂也壽夫亦榮遇矣其去也吾蓋為同官惜然念崑岡有璞玉焉山林卉木咸被光潤今使丹山碧水之間學者得所師善人得所恃守令之政有所咨過使客之尚賢也有所致禮光潤所被豈直山林卉木也哉吾又為建安賀遂以書於群玉之首送龔憲使致事詩序宣宗皇帝臨御深惟安民之道詔吏部凡布政司按察司正二及府州正闕令京官三品以上奏舉必取廉公端厚識達大體能為國為民者如所舉後受賕并罰舉者皇上嗣統申飭舊章而加嚴焉繇是被命之臣咸顓顓不敢以忽凡所奏舉十率七八稱得人於時按察使尤難其選吾友豫章龔鐩子諌起科目初擢給事中升雲南僉憲改廣西又改廣東用少保東萊黃公奏升四川按察使命初下中外欣欣喜朝廷官人之當於其職且重黃公之明知人也嵗餘子諌聲譽益起蓋士大夫公議今憲使之賢子諫表表在甲乙數子諫宋吏部侍郎竹鄉先生之後篤志而清修耿介而直諒有學術明大體嘗言事過直雖忤不悔所至不尚威嚴而政紀清肅除害興利具有成績如在雲南為法教屯兵引水灌田嵗免夏旱之虞廣西叛猺猖獗都司不能制子諫親督官兵進討擒戮猺冦二千餘生縶凶渠送京師斬於都市悉還所掠良民男女數百人四川時釋平人死罪於十年之久未決者五十餘人皆著人耳目其所建議便民尤多蓋其心夙夜在民所歷官或萬里或七八千里跋涉險逺而氷檗之操久益確仕四十餘年貧如家食時園田無寸尺之益而視舊加損此其人豈貴富之能纍其心哉今年七十有一言於朝乞致事歸天官卿言鐩雖老尚堪事事未應退蓋重賢者之去也上念其涉歷之久且艱竟從之優老之仁也子諌既拜命過余曰故人能無一言識别乎嗟乎久勞懷逸人人同情何獨子諌哉故賦近體詩二章寄久要之情云耳送尹道充南還序前三十年嘗與道充甫一見於吾邑清節書院書院者邑蕭氏作之以祀其族祖宋子荆先生道充甫蕭氏子壻也余見之時財四十瑩然其姿恭然其儀溫然其詞也今復邂逅京師則昔之恭然溫然者固在獨其瑩然者變為蒼然蓋久而後能識也道充甫洪武中嘗舉賢良為虞官於沔陽典郡幕於檇李行端操潔有政譽於時今間居且老執守如一日間以其子監察御史循迎養為此來循起科第任風紀能持身奉職無忝崑岡之産也然余竊聞其父旦夕勵之於道者猶惓惓不置嗚呼世之人幸有子弟在當路率憑籍聲勢偃蹇宗族鄉黨之間甚者貪猥淟涊無所不至有如道充甫吾見蓋鮮矣道充甫念其先人桑梓之逺違也又將别余南歸歸而日與二三耆俊小車往還逍遙觴詠以樂聖朝太平之澤且使鄉人後進瞻仰老成以興於仁義忠厚之習者豈非盛致哉而將有望德星占賢人者亦不在是歟尚見楊嗣慶先生道余嚮往之意東里續集卷六
