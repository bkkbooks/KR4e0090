body:
  text: 東里文集巻十九明楊士竒撰墓誌銘故資善大夫兵部尚書張公墓志銘公諱本字致中姓張氏山東東阿人曽祖欽祖誠考從善其先世見余所作其考墓志公洪武中自國子生擢揚州府江都知縣陞揚州知府遂陞江西布政司左叅政召為工部左侍郎坐累謫交阯還為刑部右侍郎陞南京兵部尚書兼都察院事召爲行在兵部尚書兼太子賔客兼户部事公少勤學治毛氏詩爲人直諒通敏有器識初在江都治其縣有法豪猾歛肅雖上官素名悍暴者不得下擾江都之民安之太宗皇帝義兵及境衛府皆已歸附公猶率民治守具母夫人曰此天命也可違天以禍人乎遂率民耆老詣軍門朝内難平陞知府進叅政賜白金文綺是時江西唐琮在都司劉辰在布政司周觀政爲按察使三人皆負勁氣不相下琮觀政尤縱私無忌憚事連軍民者即各持說務已勝不復揆理有積滯數月不决者公至斷斷持正且温辭和氣以導之久而三人者皆惟公言之聽吏弊素甚公每事躬理吏無容奸聲譽頓起逺郡邑民事當貳佐躬臨視者衆或憚行輙自請行所過民多徳之爲工部軄務叢脞旦暮在公悉心殫慮寖有條理在刑部奉命督北京河運至濟寧而病朝廷聞之遣中官挾醫馳視并賜藥及貂裘竣事還益持敬慎議獄必究情疑者䖏之率厚數發奸擿伏竒中而紀綱秩秩仁宗皇帝初嗣大位重南京根本之地曰張本特立不阿首進公南京兵部尚書兼都察院事明年被召入見言國家大計遂留行在兵部毅然以革弊舉廢爲務皇上嗣位知公忠直可任所言多見聼納髙煦反車駕親征罪人既得命公撫輯其衆而録其餘黨兵政久弊姦人以貨脫伍籍而援平民實伍者逺邇一轍公言扵上擇廷臣四出清理悉用釐正扵釐正他弊尤多賜勑奬諭命兼太子賔客賜白金文綺鞍馬遂命兼戸部事户部政紀尤弛公夙夜不懈講求其故蠲其積弊舉其墜典凡上利國家下利民生者靡不盡心事日益就緒宣德六年正月六日得疾又明年訃聞上深悼惜遣禮部尚書胡濙賜祭遣中官賜賻鈔三萬緡勑工部營喪塟户部復其家比葬復遣官賜祭鄉大夫士之賢者皆走哭弔致奠祭又相與歎曰一世都髙位享厚禄而能任國事如家事如張公者幾人天胡奪張公之速哉公亷介有守其心未甞斯湏不在國事剛果嫉惡扵治姦宄鮮所寛假而禮賢敬儒尤厚春秋六十有五而卒卒之日家無餘貲亦可以觀其平素矣以公貴祖若考皆贈資善大夫兵部尚書祖妣李妣丘皆贈夫人配王封夫人子男二璘環女二長嫁盧春次嫁祁慶孫男三承祖繼宗如意保公塟以卒之嵗某月某日墓在東阿先塋之次璘等以右通政徐琦所状事行來請銘余與公兩京交好殆三十年又悉其江西之政蓋琦知公不若余知之深也銘曰崇秩重禄偉公與卿巍冠褒衣蟬聮在廷孰知張公經國如家夙夜弗遑勞思孔多何以益上何以益下曰予時職其敢遑暇焯焯成績在公多有倚注方隆公止下夀亷貞之操公正之施賢人之䘮善人之思陳思孝墓志銘永樂甲申詔吏部簡士之能書者儲翰林給廪禄使進其能將用之清宻之地長樂陳登思孝以篆籀冣先至時吳中滕用亨待詔翰林工篆籀自視天下無愈已者且恃春秋髙輕後進徃徃折屈之稠人廣坐中思孝初至謹黙謙下用亨連三日折之文淵閣六卿大臣皆在旁眎不可耐思孝怡然從容進曰登幸辱在此親教益愚陋願有所質就用亨語之戾許叔重者十數事相辨難思孝道許氏說娓娓皆用亨素所忽者用亨乃始黙黙歛鋒鍔不復自矜大思孝聲譽遂起時四明王尹實篆書擅名海内至考據精博亦推讓思孝云思孝扵六書本原精考詳究志篤而力勤周秦以来二千年間其石刻有在而委棄山顛水厓荒蕪瓦礫之墟者皆深求而必得之雖殘缺剥落嵗月氏名無可考然審度其出某代某人十率中七八其收畜之富蓋歐陽文忠趙明誠之後所僅見也思孝初舉才學為湖廣羅田縣丞數月改浙江蘭溪丞月餘又改江西浮梁丞所至視民如子務寛恤之而明决以革奸弊在浮梁時房安為江西按察使以嚴憚屬吏獨禮遇思孝嵗餘丁内艱去服闋遂選入翰林仍給縣丞禄歴十年擢中書舍人朝廷大題扁率出其手而四方求者無虗日未甞有厭倦意又十年給告歸歸而疾作又四年還京還兩月疾復作遂卒宣徳戊申七月十五日也享年六十有七其為人博學謹禮耿介負直氣是是非非率依義不肯隂阿假借雖屢以是召怨不悔雖貧薄而勇扵爲義曰人道當然也其先居光之固始唐季從王審知入閩家福唐之玉融數世徙長樂宋福清令世榮思孝髙祖也曾祖宗振祖嗣朋父仲進洪武中歴宜陽韓城兩縣丞陞江山知縣皆有惠政江山民尤徳之母某氏其配髙氏先卒其子男二中旉同甫女一嫁丘汝中孫男一維禎女四思孝所用心六書今得其傳者吏部郎中旴江程南雲於是中旉奉史官陳叔剛所具状介南雲求余為銘將歸而納諸墓余雅厚思孝義不可辭銘曰六書之教周典傳史籀所作時同文逮扵秦斯古尚存邈趨簡便降𨽻分東都沿晉騖草真傳葩逐葉失本根唐氷復古稽前聞後有作者承餘熏思孝之作泝探源竒迹宻義窮寒温涵積而放波瀾翻落手揮霍風雨奔交金屈鐡雕璵璠雄渾傑特時絶倫大書深刻盤繡雲嗚呼思孝今九原有偉其著垂不刋故少師吏部尚書贈特進光禄大夫太師諡忠定蹇公墓志銘宣徳十年正月十有五日少師吏部尚書蹇公薨於位先四日以疾聞上遣太監范𢎞以醫來視賜鈔萬緡明日范太監以衆醫偕来又明日疾革范復来問所欲言對曰陛下初嗣大寶義獨寡祐不能効分寸裨益然區區犬馬之誠所望扵聖明者惟敬守洪武成憲始終不渝耳言已而絶訃聞上深悼歎屬時國有大事悉停諸祀特賜鈔萬緡勑工部治喪塟贈公特進光禄大夫太師諡忠定遣某官某賜祭而官其長子英英等奉櫬歸塟有日求余爲銘余與公同朝三十有五年而事仁宗皇帝自登儲至大位始終皆陪公公國家老成人所以啟益士竒蓋多不敢辭蹇氏世家重慶之巴縣宋以來多顯仕自公髙曾而下始隠居不出曾祖繼祖妣至氏祖均夀妣雍氏考源斌妣胡氏繼羅氏以公貴贈曾祖祖考皆榮禄大夫少師吏部尚書曾祖妣祖妣妣皆夫人公諱義字宜之生而岐嶷長端重不好弄而嗜學弗懈始從里社師中書左丞殷哲時為郡守一見異之引充郡學弟子員語其師曰是兒將來逺到非吾所及當成就之而公不煩程督日益有進洪武甲子中四川鄉試明年中禮部會試廷試賜同進士出身擢中書舍人授徴仕郎見重太祖髙皇帝每前奏事率稱㫖而數見奬賚初名瑢一日奏事畢問汝蹇叔之後乎親灑宸翰書義字賜之以易舊名時丁羅夫人憂賜道里費且命馳驛歸葢特恩云服闋仍舊職滿三載吏部奏當調特命終九載朝夕左右凡機宻文字必以付公而小心敬慎久而愈篤建文中陞吏部右侍郎授嘉議大夫太宗文皇帝入正大綂轉左侍郎數月陞吏部尚書授資善大夫時政令制度有非洪武之舊者詔悉復之公從容爲上言損益貴適時宜間舉數事陳說本末文皇帝以公忠實悉從其言小人有譛公不忘建文者賴上聖明不聽有除官不得善地訴公不公者上皆斥之永樂二年冊仁宗皇帝為皇太子命公爲詹事時師傅皆以勲臣兼之而輔導貴任文臣詹事盖元僚也上欲有諭皇太子率諭詹事徃導意公亦委曲周悉皇太子尤愛重公所言靡不信用滿三載陞資政大夫七年車駕巡守北京命皇太子監國中外庻務惟諸王及逺夷有奏請詣行在餘悉啟聞䖏分公熟于典故逹於政體孜孜無倦不動聲色而事賴以濟賜誥以其官秩封贈二代滿九載賜勅有秉心正直及淳良篤實禆益國家之褒數奉命兼禮部事雖職務填委處之裕如十七年丁父喪歸上及皇太子皆遣官賜祭皇太子贈賻尤厚有詔起復公詣北京謝上慰勞再三賜鈔千緡遣中官護送歸南京明年從皇太子朝北京遂命公巡撫直𨽻應天等府州問兵民休戚及文武吏之賢否而升黜之公謂國家多事之際悉以法繩吏人將不勝特出其太甚者數人餘多見寛假而兵民利弊當建革者具奏行之仁宗皇帝初嗣位一切政議預者三四人而公居首進少保兼吏部尚書二俸俱支賜冠服象笏及玉帶二遂進少傅又進少師賜師傅之臣銀章各一其文曰繩愆糾繆公首被賜上諭之曰朕有過舉卿即具疏用此封識進來盖望公等匡直也繼賜誥授榮禄大夫封贈三代及妻於公數人誥詞上特增曰勿謂崇髙而難入勿以有所從違而或怠所以望公等者甚切也又念公侍從監國舊勞特製蹇忠貞印賜之而賜勑有以善翊君勞心焦思二十餘年夷險一節之褒時修太宗皇帝實録命公監脩宣宗皇帝嗣位一切政議屬公數人如仁考之初繼奉命監修仁宗皇帝實録書成賜白金文綺鞍馬扈從征庻人髙煦還寵賚尤厚復從巡邊既還以公年老不欲煩以有司之務賜勑曰卿事祖宗積効勤誠朕嗣綂以來尤資賛輔夙夜在念圖善始終盖以卿春秋髙尚典劇司優老待賢禮非攸當况師保之重寅亮為職不煩庻政乃副倚毗可輟吏部之務朝夕在朕左右相與討論至理共寧邦家其専精神審思慮益致嘉猷用稱眷倚老成之意繼賜銀章一其文曰忠厚寛𢎞盖以褒徳云賜新第扵文明門内寵錫洊加吏部言公歴少師九載降勑褒諭仍賜宴禮部是嵗生旦賜鈔萬緡廐馬一疋今上嗣大位之日賜白金文綺是夕齋宿于公得疾越五日竟不起享年七十有三公爲人沈深質實和厚簡静内有孝友之行事君有誠處人有量無所拂逆未嘗輕涉一語傷物至扵議法亦不苟爲包含必歸中正歴事五朝凡五十年所履坦坦無一日顛躓之憂退朝之暇手不釋巻貴而能謙富而能約上前所言未甞退以語人盖天下有隂被其利者矣士竒嘗竊論之魯簡肅之忠實不欺李文正之不爲傷人害物張忠定之不飾玩好傅獻簡之遇人以誠范忠文之不設城府公蓋兼有之矣元配劉氏繼張氏皆封夫人子男四長英次芳次芸次荃英荃皆尚寶司丞荃先卒女二長適馬駿次適李成孫男四霖震霑露女一公之塟以薨之歲某月日墓在巴縣某郷某原先塋之次銘曰節乎蜀山浩乎蜀川孕精毓靈挺生偉人温中穆外履夷蹈素皇明麗天奮躍自下在帝左右秉恭與誠掌帝之制播告四方進貳天官遂職冢宰簡用俊良徃興至理帝命洊隆俾輔聖儲陳厥謀謨聖罔弗俞四紀在廷三翼升御肅肅師臣秉王之度一念惟仁永矢不渝寅畏小心保終猶初隂利逮人人則罔覺惟帝昭明褒詔有數嗚呼忠定維國老成曷不慭遺翼我聖明生榮死哀死且不朽昭徳刋辭永告爾後故資政大夫户部尚書郭公墓志銘宣徳六年四月十一日資政大夫行在戸部尚書棠邑郭公卒訃聞上悼歎賜祭命有司給舟歸喪且營塟事公諱敦字仲厚姓郭氏其先自太原交城徙東昌棠邑祖諱忠妣石氏考諱政寛妣侯氏繼馬氏郭世有善徳公自㓜凝重端謹稍長㳺鄉校日勤講習已卓卓出倫軰洪武癸酉以詩經中山東鄉試㑹試下第後擢戸部廣西清吏司主事歲餘有賢聲陞衢州知府下車咨民隱蠲弊興利脩學政務教化崇儒術禮賢行以表勸其民賑恤無告郡俗貧死不能塟者焚屍沉之公相城東得廢地百餘畝榜曰義阡令民貧死者悉葬是又為約教民有急相資助民利賴之嘗歲旱公齋沐致禱雨立降霑足蝗入境爲災公自爲文檄城隍神是夕大雨雷電蝗盡死凡所禱輙應城西有淫祠嵗四月軍民男女聚謁祭祠下讙譁若狂公禁止之已而得風眩疾吏民爭勸罷禁弗聽疾亦瘳同寮有私取民財者公雖不面斥而義形於色其人頓首謝改過待之如初屬邑吏爭濯磨自效公退所謀諸心發諸言未嘗不在民事所秉正直襟宇坦明言出而民信令出而民從不俟程督庻務畢舉舍内蠶箔嘗有叢絲類織成鞶帯修廣適度郡人謂公仁政之應在衢七年政化大行坐累徴詣京師耆老數百人伏闕奏乞留理官執不可耆老皆流涕而退後廷臣有言公亷正不阿者召爲監察御史陞河南布政司左叅政無幾調陜西以公務留京師今禮部尚書胡公言其行扵太宗皇帝曰郭敦有大臣體宜在左右即日召見以病弗克入遂遣御醫視疾疾愈入謝奬勞再三賜鈔襲衣明日陞禮部右侍郎兼太僕寺卿仁宗皇帝臨御進戸部左侍郎兼詹事府少詹事賜誥以其官贈祖若考而贈其祖妣妣皆㳤人贈故室李封繼室林亦㳤人宣徳二年陞户部尚書命頊陜西嵗餘召還在户部無敢一毫干以私者未幾得疾上聞之命太醫徃視數日竟不起春秋六十有二爲人純寔温雅事親愛敬兼至隆寒盛暑不懈閨門之内儀度清肅聲色未嘗留耳目公暇手不釋巻私居無惰容居官剛正人莫能奪所至整飭綱紀盡誠撫卹不徐不亟吏畏民懐氷蘗之操無遜古人雖官列六卿泊然布素身沒之日家無餘貲豈非篤行君子者乎子男五祺禎禧禋祐女一適肥鄉知縣楊翺孫男女皆六扵是諸孤奉衛府長史金實所状事行介禮部尚書胡公求塟銘噫爲行如公銘其何愧銘曰君子之徳惟正故直惟公故碩惟澹故適于道之迪于民之惻嗟乎郭公允偹衆好嗟乎斯銘無愧有道東阿知縣貝君墓志銘宣徳元年十一月廿一日東阿知縣上虞貝秉彛卒自寮屬下暨史胥邑之耆老皆㑹哭至慟自邑至於逺鄉民男女老壮素服奔走哭拜縣門之外者日數百人扵是其家無一緡之蓄其僚以下相與出貲治棺歛畢東阿之民皆欲挽留塟之而其子不可曰幸奉治命必還祔塟于鄉先塋其敢違哉扵是東阿之民相率致詞扵兵部尚書張公曰自貝大夫治吾邑吾邑之人旦作暮息各趍其所務無淪扵遊惰壯者以時給徭賦老而弱者佚扵家爭奪之風息長少之分明無悍吏猾胥之迹及門嵗未嘗有水旱疫癘之憂皆貝大夫惠化所被也安得復有若人者而爲吾邑哉今將歸塟矣公出吾東阿而貴顯于時必能致顕人為貝大夫不朽之圖亦庶幾釋吾儕之惓惓也公以告士竒士竒雖與秉彛平生一再邂逅然嘗過東阿目睹其民所以愛戴之者矣夫生而愛戴之沒而惓惓欲圖其不朽即古循吏何過焉遂諾之明日公以秉彛之子益來請文刻幽堂之石按翰林侍讀李時勉状貝氏其先河南祥符人宋秘書少監守亮從髙宗南渡始家上虞四世至建康軍僉判欽世生廣徳軍教授襲慶又四世至元醫學教諭文忠秉彛曽祖也祖元凱父肅秉彛諱恒以字行自㓜有志卓立好學不倦稍長䘮其父能謹扵禮而奉養祖及母及撫諸小弱弟咸盡其心以詩經舉永樂甲申賜第二甲進士出身初授湖廣邵陽知縣縣僻而俗險前之名能治者率以嚴秉彛寛馭之而𨗳以禮義其民感化相戒毋貽羞賢令扵利一分不茍取歳餘以祖喪去官寮佐以下致賻贈悉卻之而吏民不忍其去有流涕者祖䘮未終繼䘮母謹塟祭之禮一如䘮父服闋改東阿知縣東阿當南北要衝素苦過使徃還供給之費秉彜規措有方物具而不擾簿有挾私怨縁飾人死罪者秉彛曰盍以直報之簿愧而止隣邑盜刼人匿其賍古冢中冢傍耕民得之而邂逅被刼者識其故物執民訴官民不勝考掠竟引伏秉彛聞而疑之然非其所當理不得有爲會有商人過東阿被盗來訴秉彛併隣邑盜事以檄城隍神而嚴督譏察兵大索數日獲三十餘盜隣邑刼盜皆在耕民得免寃死民有兄弟争競相告者曉以大義使退而思之兄弟皆悔謝乞歸改過獄有殺人賊未决而兩目俱盲秉彛就審之視其容色若甚戚焉者問豈有寃乎賊曰罪誠當死無所寃但憂身死即宗祀無繼遂命其妻入侍疾後賊死而妻有子嘗嵗旱躬禱之雨立至間蝗引咎自責蝗遽散嵗屢豐建議扵朝請平糴爲預偹計從之仍下其議旁近州縣通行之祀典壇廟及學舍久毁于兵前之爲縣者率苟且行事秉彛率丞簿出俸以倡邑人咸作新之有暇詣學進諸生與之講說是正所業而月日程之令鄉社皆立學時循行田間觀民藝穫以驗勤惰邑西南有濼春夏潦水無所洩泛溢漫衍近濼之民恒廢耕秉彛相地將開渠納諸大清河而召民役之與其佐議簿持不可曰法不得擅役民秉彛曰以利之也有罪請獨加我不相及渠成得沃壤數千畞耕之卒亦無事旁邑流徙來歸者甚衆綏撫如子車駕征北邊命河南山東西民丁隨軍供饋餉郡邑各遣官率之憚行者徃徃爲規避計秉彛毅然曰天子親征臣下可避勞耶即治装就道民聞令行皆忻躍以從動息飲食與民同甘苦訖師旋東阿無一人失所者在官雖小物必思以及民營繕有餘棄廢鐡敗皮朽索故紙之類悉存之工匠閒暇令煮皮為膠鑄鐡為杵搗紙索為穰貯之庫㑹車駕廵幸北京勑使督建所次席殿所貯悉濟急用而民不費有薦其亷公明大體堪任風憲者徴命已下縣耆老百餘人詣闕乞留從之九載考績上京師時仁廟監國知其在東阿得民心特陞秩正六品俾復任民聞秉彛復來踴躍迎拜數十里嘗坐累罰役京師時有令官役滿即復任民競趍代其役凡三罰役民三代之不厭而愈力其得人如此秉彛和厚樂易於物無忤而執守甚堅善飲酒既仕遂疏之勤扵公務日中而食夜二鼓而寐盛寒暑不自逸率為常所著有文集若干巻其卒年五十有七娶張氏繼陸氏子男四益錫舉循女三皆㓜孫男四嗚呼古之賢長民其民思慕之不已者多見於祠祀祠祀盖有不及百年而廢者矣如東阿之民於秉彛必欲託諸不朽此其用意豈朝夕之謂哉為之銘曰桐郷之祀亷愛以施蜀郡之祠興學以治貝君為阿二者兼有民用不忘視古有厚史氏之銘從民志也後之長民庶其有跂也故翰林檢討周君墓志銘君子之仕也食其禄則思任其事雖位庳不敢忽宋韓魏公登髙科而滯筦庫未嘗茍且職事徙開封推官理事不倦暑月汗流浃背當時已知其公輔器蓋賢者事君無不皆然今士之不樂檢束者徃往目勤職爲流俗甚至詞垣翰苑以文事爲軄亦有放曠散逸以自髙者士竒入翰林三十年同官之能勤其職余素所知者周維翰其一焉維翰初爲典籍天下古今載籍皆儲文淵閣嵗久巻帙殽亂簡編壊折維翰積其勞勤寒暑不懈理殽脩壊盖再嵗完整秩然同官時惟陳夀克助維翰他典籍不及也近嵗翰林奉詔脩兩朝實録維翰以檢討為纂修簡牘浩繁考閲纂述維翰所分治特叢脞其事加倍同列而單心窮力無幾㣲厭怠意書垂成維翰病病且困猶日在念慮既劇猶問史成何如言不及他事而卒維翰之卒也家貧同官相率出賻歸其䘮扵是其孤以禮部祠祭郎中鄭復言所具事狀乞塟銘周鄞世儒家曾祖諱允升元青田縣學諭祖諱道寧奉化州學正考諱原宗贈翰林檢討妣朱贈孺人維翰諱翰自少聰敏嗜學長益該博能文章永樂三年中浙江鄉試明年㑹試禮部中副榜當授教官不就會車駕臨太學獻賦稱㫖尋詔禮部所選副榜士就廷覆試擢翰居首遂奉命進學翰林預脩永樂大典七年除翰林典籍授迪功佐郎歴三考陞檢討授從仕郎維翰性和易惇孝友服用儉質能推所有以濟窮乏善交際不吝改過通數學論人吉凶夀夭數竒中其平生所作詩文累帙其卒以宣徳四年八月十一日享年六十有四其塟以卒之嵗某月某日其配史氏宋忠定王六世孫封孺人子男二益奫女二長已卒次嫁王冬孫男三勤慎某銘曰為臣之義敬事為大凡古之人夙夜匪懈嗟嗟維翰克勤克勵我銘其藏亦勵有位故太醫士何彦澄墓志銘醫者聖人以濟民于夭死所謂仁術也近世業醫而能察扵隂陽表裏虚寔脉證之故者鮮矣或千百有什一其庻幾焉則又眎報之多寡重輕而厚薄其施扵是民不幸而死扵昩醫者什七八死于貪醫者什二三其有遇夫精斯術又能心聖人濟民之心以施之者盖亦幸矣余中嵗多疾始患背疽因故太醫院使蔣用文得何彦澄藥之而愈後數有他疾皆彦澄藥之愈不特余也家之長㓜内外有疾亦皆彦澄藥之愈又不特余之家也凡余之親友有疾走彦澄無弗愈者即彦澄曰不治雖屢更他醫卒不治彦澄于醫不専名一科自傷寒諸證至于小兒帶下諸瘍皆有造詣而其心一以恵濟為務名其治藥之室曰皆春有求者皆趍赴之不以寒暑風雨蚤莫稍緩皆未嘗責報遇窶者輙曰此世所共矜恤者我其可後儒者輙曰此世所重道徳人也我當敬事焉雖或其致報未甞取一毫故卒之日家無餘貲而公卿大夫爭致賻奠徳之之者皆往哭弔而閭閻行道悲慟相屬盖平素受其施者皆以遇之為幸及其卒也雖爲彦澄戚其亦爲已而戚之也彦澄諱淵以字行鎭江丹徒人先世見余所爲其父墓志彦澄襟宇和易灑落慎行如䖏女永樂中以名醫徵𨽻太醫院院使以下咸重之尤見重扵仁廟屢欲官之輙以事不果彦澄恬不為意其長官欲舉爲藩府良醫者力辭獨寳重所得仁廟賜書數十紙如拱璧一日顧其家人言日者謂我今歳所直五行不利無幾得㣲疾數日卒扵北京宣徳七年三月六日也享年六十有一娶吕子男三㒞儀倫孫男若干㒞倫自鄉奔父䘮歸葬於是學士大夫或為文或為哀輓之詩余於彦澄尤厚為著葬銘銘曰世有何彦澄固知遇之之難世無何彦澄宜惝惘而悲嘆䆳乎其業之精慤乎其存之厚嗟若之人兮曷不臻于遐夀東里文集巻十九
