body:
  text: 東里文集卷二十明楊士竒撰墓志銘孝子曽先生改葬志銘泰和有孝子曰曽元友先生沒而葬五十有八年矣其子愚將改葬寓書北京曰先人初葬不肖孤方髫齓不能請銘於先輩君子甫冠而坐纍謫西川數十年幸老罷歸又幸得吉壤將改葬先人如又不請銘不孝莫大矣然先輩君子淪謝已盡今姻戚中知先人者惟子遂視所述事狀曰必無辭嗚呼士竒外祖母曾孺人先生女兄也士竒幼孤先生以外祖母憐愛之故時過撫問又時遣人抱至其家親著膝上啖以糗餌教誦古人詩成誦輒喜動顔色士竒恆著於心不敢忘銘其敢辭按曾氏自團練使某由金陵徙泰和始居邑西之文溪以儒傳家代有仕者至梅伯宋舉進士紹興府同知析居嶽家巷子懷可元袁州路儒學教授學者稱鷗江先生子思立篤學不仕學者稱竹間先生子三男一女男龍友益友季即元友先生女歸陳靜得先生先夫人父母也元友先生諱鼎元友其字晚更字有實孝友之行出於天性自幼服勞奉養恆先諸兄元季紅巾冦猝掠泰和先生獨負老母出走冦追及欲劫之去跪陳母老無共養者冦怒揮刀將殺其母先生以身翼蔽母冦益怒連數刀斫先生頂肩及足血流于地而抱母不舍冦帥踵後至憫之命從者以其母子入營給米肉且敷善藥數日創愈豫資遣人護送出時兵禍日甚奉母竄伏山谷甘旨恆充未幾江西行省參政全普庵薩爾辟為濓溪書院學正遂迎母就養全死奉母歸先廬既廢於兵縣尉楊某為搆室數楹居之榜曰曽孝子廬母沒哀毁而盡力喪葬江西內附吳去疾知州事辟典稅課州人譽其亷平洪武三年改州為縣侍御史劉昭先知縣事以明經舉引疾辭八年知縣郝思讓建社學於城內外教民俊秀朔望躬視督勸禮致明師十人以先生為首館下生後多成名以升先生眉宇秀朗靣潔白如玉儀度偉然博學強記而專禮經工詩擅八分書範金為小印章渾然古意占筮精康節數嘗竒中蓋春秋五十有八生元延祐辛酉八月草二日沒於洪武戊午五月草九日元配鄧氏繼胡氏子男二愚頑皆胡出頑蚤卒孫男三沆濬深深蚤卒曽孫男四鎡鑑錫鋭元孫一斆改葬以某年某月某日墓在某鄉某山之原銘曰凡人百行孝其權輿為孝有誠天將弗違矧曰人乎猗歟曽孝子厥有錫類錫類無替曽百世祀故翰林修撰馬君墓志銘永樂十年進士第一人長樂馬鐸授翰林修撰明年車駕幸北京十五年再幸皆留侍監國其於公事所當為者雖勞且艱不避雖數獨任不辭皇太子屢顧翰林學士楊士竒曰馬鐸可謂質實無偽者矣自是翰林學士國子祭酒司業有公務出皆命攝其事蓋署翰林者再署國子者一衆咸謂皇太子明於用人而鐸無沗厥命者也鐸字彥聲其先家饒州樂平宋宰相廷鸞之弟廷龍始居長樂廷龍之後有兄弟三人曰隆曰傑曰鈞皆舉進士至源夫伯載谷進其曽祖祖父也母卓氏彥聲自幼已嶷然異常兒稍長即有志問學初授禮於鄉先生鄭孟宣遂旁通易詩書於子史百家多所博涉為文援筆輒就自太學生中應天府永樂九年鄉試明年中會試廷對賜及第為修撰授承務郎一考升儒林郎三考皆最仍命復職先是上自北京遣使以御製書賜南京國子學學師生將詣謝會長官以他事去職踰月彥聲來署學事即具裝偕行衆謂彥聲後至可不行彥聲不可則相率助道里費彥聲曰鐸乃用是煩勞諸君耶一謝卻之處事公恕監官有挾前輩數與為異同者彥聲靣折之以大義卒帖服春秋釋奠先師制用翰林國子官四員分獻翰林獻位故在左後有易之及彥聲行事卒辨而復之於內有孝友之行一弟篤愛之弟死哀慟既葬其鄉縣山之原顧其子昕曰他日葬我必於此吾兄弟生死不違也為人耿介伉直無崖岸表裏一致臨義執言侃侃無所顧避不為外飾自奉儉薄雖貴不變與人交必誠必盡遇危急必濟之在京師直所居道側汙池中嘗冬夜有凍溺者聞而遽出之幾斃矣易其衣豫飲食及藥久乃蘇所為類此皆未嘗自言間暇讀書鼓琴以自適所居據山林之勝嘗名其書室曰梅巖後遂以為號永樂二十一年六月初六日以疾卒於官享年五十有八娶鄭氏子男二昕旺女二長嫁林浩次嫁陳禱孫男三繩繹純其卒之明年昕始克聞訃自長樂走北京奉喪歸葬縣山合于弟之竁遂奉翰林修撰李騏所具事狀并介李君求余銘嗚呼彥聲余考會試所取士也又同處翰林十年相好厚而相知深宜其以求於余也銘曰馬氏之鄉有湖洋洋湖有浮石馬氏之祥昔也其兆兄弟聯登今也其兆彥聲之徴嗟嗟彥聲允直而剛曷其奮興弗施之閎嗟嗟彥聲奄歸以藏其垂弗泯史氏有銘思貽先生楊君墓志銘先生諱肇字仲基一字伯開思貽者所居堂名鄉里因以號先生焉楊氏之先出關西唐末由長安徙杭宋又徙吉又自吉水之楊莊徙西昌自徙西昌至先生十有五世曾祖諱景行元延祐乙卯進士官至翰林待制洪熙中贈少傅兼華蓋殿大學士元史有傳妣𢎞農郡君嚴繼高皆贈夫人祖諱介清江縣主簿妣項考諱章妣蕭先生其仲子也其幼時主簿公特異視之曰此兒壽福過吾輩遠矣稍長為從父彥中後而孤貧能額額卓立負直氣非其道不肯茍屈下弱冠從學季父益民於贑時詔守令舉賢才贑守鄒奕併舉先生叔姪送詣江西行省先生以學未至辭參政端公曰仕優可學也固辭乃聽既歸屬兵亂初定親戚之僅存者皆散徙遠邑先廬悉毁園田為豪奴姦僕所侵敓無遺先生孑孑勤力僅復什一二而纍世墳墓久未有展省榛蕪莾蒼中或迷不可辨識先生遍咨遺老除荒剃薈悉求得焉而率子弟及時謁拜惟謹買田墓下以供祀事即故址作室復先人之舊日以教子讀書為切務曰此吾祖宗所用植身遺後者豈當至我遂廢也蓋先生所存心靡事不以承先為重監察御史過西昌舉先生訓導又固辭永樂中其弟及子皆官翰林先生喜嘗三至京師皆留數月父子兄弟極歡而後歸歸必留規益曰勉自效以稱國恩且光我先人我老死丘園瞑目焉先生幼罹兵亂備極艱苦既冠而亂定拮據勞瘁用造室家自是脫危履安遂其生意而至於老死未嘗一日忘國家太平之澤性剛果遇事是是非非不肯脂韋媕婀以避怨尤以是鄉後進率嚴憚之邑大夫嵗舉鄉飲必賔禮先生先生生元至正己丑正月十六日卒於宣德癸丑三月十三日春秋八十有五娶康子男五長相永樂甲申進士翰林庶吉士刑部浙江清吏司主事先卒次旅為從弟仲殷後次弼為族弟仲岡後新授吳江縣學訓導次鵷為兄伯威後次艮女一嫁蕭誦孫男十四奕奐某某女若干曾孫男若干士竒先生再從弟也自幼至老相篤恭愛蓋六七十年如一日世之同産者或莫逮也先生老且病無他念獨念不得復一見士竒與人言輒流涕士竒蓋同此心也顧受國厚恩未敢急其私今竟負吾兄矣嗚呼慟哉聞訃之後五日忍慟述其平生大槩為銘將使其子鑱石而納諸墓銘曰楊氏之宗故望于邦世否而隳一線之微艱而振之自我思貽嗚呼思貽崇孝之道躬踐以適介壽於耄吉壤在原有子有孫述行有文世續勿諼梁紀善墓志銘宣德甲寅七月丙子朔魯府紀善梁本之卒於官本之初病王日遣醫賜藥既卒賜棺及賻為文遣官祭之於是其子栗將奉襯歸葬泰和某鄉某原具狀求余為銘梁楊世婚姻家本之之考畦樂先生妣陳安人及兄用之皆余銘其葬矣今於本之又義不可固辭梁氏先世已見其父兄銘文本之諱混以字行晚號坦菴自幼嗜學始從其父兄稍長出就鄉先生質疑請益弱冠即窮日夜研鑽傳注力求諸古人不暢不止遂貫通四書及詩書二經鄉之號前輩者或不及也瑞州府學聘訓導瑞學久闕師士習庳陋本之力作新之飭其學者曰人皆可為堯舜夫學則聖賢可至不學則陷沒為庸下人若之何甘自棄也旦暮躬率勵之為之講説敷析鬯達學者始有悟入日進其功不能自已旁邑之學者來從加多自是大比瑞之士彬彬出矣九年升溧陽縣學教諭溧陽學亦久弛本之篤於教不減在瑞數年其學者勃興如瑞未滿九年父喪服闋改納溪縣學納溪士習尤陋亦盡力作新學者稍知嚮方旁邑學者亦有來從蜀獻王聞其賢奏舉為紀善獻王崇儒重士作寶賢堂日引官屬之賢而有文者討論古義或命題試文章以適而盡出府中書籍資之由是其官屬學識皆進而本之尤傑出本之臨事論議侃侃盡公道甚見奬重雖小人有不便不為動蜀僖王嗣立重其盡誠輔導嘗致白金文綺為其母安人壽母喪服闋改魯府紀善僖王復因使存問賜白金等物在魯府五年卒春秋六十有五本之事父母孝父母安之敬事其兄撫其兄子厚惇睦族姻伯舅之子賞少孤貧陳安人甚憐之命二子教之本之赴瑞州遂以賞及其從孤弟泂偕行旦莫督勵其學後賞泂皆舉進士去賞卒其孤甚貧以子妻之凡此皆孝之推也為人剛方公直是是非非不肯茍徇平居未嘗一枉已干謁有司凡賑鰥寡恤死喪無厭倦意為文章典則古雅雖老不廢學問教學者必盡心後多成名所至舉墜興廢在溧陽出已資倡義一新廟學增其舊規嘗考湖廣鄉試鑒别公明士論愜服襟宇坦亮闊略學宮講授之暇與達人韻士觴詠酣暢翛然物外之趣有詩文若干卷藏于家配劉氏孝行如夫先三年卒子男二長栗泰和縣學訓導孝行如父母次樞女四長嫁王􅀈次楊持次陳升季楊稷嫁王氏者蚤寡居孫男四恩憲懋忠女二銘曰於乎本之允篤孝德於乎本之允淑訓迪洊屬宗藩亦允弼直銘以揚之來者其式張從善合葬墓志銘洪武二十八年八月十八日東阿張公從善卒張之先出琅琊今居東阿五世矣祖欽父誠母李氏公諱仁幼喪母鞠于嫂氏自少負氣節年十九遭元季之亂為義兵千户數與渠冦號關先生破頭潘者力戰有名無幾元亡遂解甲還鄉里力耕養親以自適其儀狀偉然而剛正自持論議明決鄉黨有爭訟求直者多不之有司而之公有少年酗酒虐人莫敢誰何者或紿云公且至少年即縮首斂避家居教子為務子學成將仕勵之曰仕必務持身事君愛民舍是雖有他善無取焉與人交輕利而重義春秋六十有四而卒其配丘夫人世家宿州元義兵萬户某之女年二十有三歸張氏從其夫兵間備歷囏險而事姑孝自始至終喪不少衰後改葬姑啓壙而土窒其元七竅懼布拭致傷悉舐而淨尤嚴母道仲子本初為江都知縣迎夫人就養時祿入不繼朝夕極淡薄終不以一毫茍取於下而處之裕如上官聞知縣有賢母咸助甘旨至有以母敬事之者上舉兵靖內難既渡淮遣使諭諸郡至揚州城下夫人諭本曰此天命也違天不祥汝宜為城中百萬人求生道本遂躬率江都父老詣軍門迎見江都人皆免於兵難戴知縣德而亦皆知其出於夫人之教也上既正大統擢本揚州知府升江西右參政遣迎夫人城中老稚及婦女送者數千人又有不忍其去而流涕者凡本在官暮歸必問所治事當則喜如不當可改即命改之或已不可改即色憂不言其重者輒不食以示警本間於政有疑必咨稟而後行後以刑部侍郎奉命督務山東遇疾便道過家夫人見本畢語之曰其出止公館國家非重務不命大臣雖病可以卧治即萬一不起不失為以王事沒今事未就緒其可便安私舍哉其達於大體類此年已踰耄耳目聰明神宇湛然卒於永樂二十年十月二十四日春秋九十有五子男三長立次本自太學生纍官拜工部侍郎改刑部侍郎有守有為卓然名卿次宜女一適潘孫男十有一人瑛㻚琫璘碔瓘環瓉瑄瑾瓛女八人長適盧次適秦次適郝次適李次適祁餘在室曾孫男十人女二人立本宜卜日啓父之墓而奉母柩合葬張公之葬故未有銘至是本具述行事屬士竒銘士竒與侍郎同朝久且相知前年過東阿又嘗升堂拜其母夫人誼不敢辭故敘而銘之銘曰偉矣張公閎毅而通弗顯于庸不係其逢有賢厥配允篤于孝亦明以肅篤子之教繇郡歷藩秉憲在廷直方潔清無沗所生鬱鬱崇丘乃奉合藏雙璧下潛永揚輝光故工部營繕司主事劉君墓志銘永樂二十二年工部營繕清吏司主事劉季箎卒於官其孤紳寅奉事狀介吏部郎中陳叔剛請為幽堂之銘將歸葬焉君為刑部侍郎時嘗監修永樂大典于文淵閣與余常相聚有知契故不得辭按狀劉氏其先汴人宋建炎初某官某扈從南渡遂官餘姚其子孫業儒亦代有仕者至諱某為丹陽書院山長嘗考浙江鄉試其祖也諱某為慈溪縣儒學教諭門人私諡中肅先生其父也母張氏君諱韶字季箎以字行自幼端靜喜學問為父母所愛既承其家訓長而進學鄉先生宋玄僖王孟暘之門刻苦自勵二先生咸器重之登洪武甲戌進士第授行人司行人時重行人之選非進士不授凡方嶽大臣率出此君為之一以所學不肯茍嘗持節使雲南四川朝鮮所至宣上德達民隱餽贐一毫無所受事聞賜鈔襲衣丁丑升陜西布政司左參政先是陜有逋賦民積嵗不能輸有司峻刑督之君至慨然曰民困故不能輸為之父母又忍峻刑督之耶與其寮謀分行郡縣解其縶緩其期勞來綏輯而從容勸誘焉民皆感激思奮曰是赤子矜念我我可不戮力以纍仁人奔走假貸以輸無幾畢完陜不産􅗠砂而嵗有課額民窘不能償至或僨其家者君為奏罷之洪渠水溢為民患躬行視之為設法治堰民賴以安蓋凡可以利民者率盡心焉華有郭子儀祠已壞過之歎曰此崇德教民之務何可忽督令丞修葺之凡所過祠宇有關風化而壞者必風郡縣葺理之其達政體槩類此在陜四年可書之績尚多被召為刑部左侍郎尤懇懇重民命平反具獄數事陜平民王某為強盜所引逮至而所引者已伏法不能自白君察其寃召所引者之妻子使識之而聽其詞竟得實王免於誣有典守錢穀而虧兑者既被逮則援引千餘人同罪君亷知其誣卒辨所誣引者釋之河陽逆旅夜有朱趙二人異室而宿朱怨家後追至殺之而誤中趙朱實不知天未明行十數里逆旅主人疑朱殺之追執送官鞫訊考掠朱不勝遂誣服不敢求辨君獨曰是偶邂逅相聚非素有負且計其裝非有圖也特緩其獄遣人密察之無幾有司竟得殺趙者而朱以緩獄不死揚州民胡氏夜有賊入其室殺人而遺刀尸傍旦視之柄有鄰家蘇氏私識官捕鞫蘇蘇曰家失此刀久矣不服既備極諸刑竟誣服君潛使人懷刀往察其鄰一童子識之曰我家物也遂得賊而釋蘇蓋其理刑一以求生為務永樂乙酉朝廷廣召文儒纂修大典命太丁少師姚廣孝禮部尚書鄭賜監修而擇六卿之二有文學者一人為之副遂以命君討論裁處人多服之書成受厚賜庚寅坐失出罪人左遷兩淮鹽運副使未行復留丁酉改工部營繕主事躬勤治職未嘗以崇庳為意壬寅得痺疾明年正月某日卒享年六十有一君為人清素雖歷顯要而泊然自持居家敦孝友之行接人有謙讓之節雍容雅度有犯不校間暇手不釋卷治經長於春秋喜吟詠沖淡優柔有陶靖節韋刺史之趣所著文集若干卷藏于家娶潘氏子男四紳寅辰復辰中永樂庚子順天府鄉試先君一年卒女二長適安遠縣學訓導趙佐次尚幼君之葬以洪熙元年正月八日其墓在其邑某鄉先隴玉燭之原銘曰學有以用於世才有以達其志得失無所怍乎內勒銘其藏垂休永代太子少保禮部尚書兼武英殿大學士贈榮祿大夫少保諡文靖金公墓志銘太子少保禮部尚書兼武英殿大學士金公以宣德六年十二月十六日卒訃聞上嗟悼甚至贈榮祿大夫少保諡文靖命禮部尚書胡濙賜祭又命自喪至祥禫皆遣官祭勑有司治喪葬百需所以褒寵之厚且備矣公諱善字幼孜以字行其先世見余所作其考雪崖先生神道之碑公自幼嗜學問內承家訓之篤長從前進士聶鉉先生受春秋經得其微旨中進士乙科授户科給事中太宗皇帝初臨御注意文學士改翰林檢討居無幾簡翰林之臣七人處之內閣付以密務而兩制悉歸焉七人者廬陵解大紳胡光大永嘉黃宗豫南昌胡若思建安楊勉仁公與士竒也數月皆升官公為侍講授承德郎仁宗皇帝在東宫時翰林春坊司經局之臣日講經史公專説春秋敷析簡明睿旨稱善遂命纂十二公事作春秋要旨三卷以進永樂五年升右春坊右諭德仍兼侍講授奉訓大夫七年車駕巡狩北京公與光大勉仁同扈從八年扈從北征冬還南京升奉直大夫十年賜誥命贈其考守正為右春坊右諭德母陳為宜人封母羅為太宜人贈妻孔為宜人十一年扈從巡北京從征北邊十二年復從北征升翰林學士仍兼諭德修五經四書性理大全為總裁官授奉議大夫十四年還南京明年扈從巡北京預修太祖皇帝實録十八年升文淵閣大學士仍兼翰林學士二十年扈從北征二十二年復從征北既旋師中道宫車晏駕初喪至斂皆勉仁與公據禮行之既而勉仁先馳歸報道中之儀皆咨公而行仁廟嗣位進户部右侍郎仍兼文淵閣大學士翰林學士踰月升太子少保兼武英殿大學士專典內制賜大臣五人銀圖書其文曰繩愆紏繆蓋以匡直勉之公其一也奉命持節册封趙王妃及封梁王洪熙改元命兼禮部尚書三俸並支大臣兼三俸者惟勉仁與公兩人賜誥命授資善大夫贈其祖仲卿及父皆太子少保武英殿大學士祖母周母陳皆夫人進封母羅太夫人贈故妻劉封繼室屠皆夫人以法司論死罪多寃抑命自今臨次必會大學士三人同審而公預焉詔百官有親違離三年以上者聽給告歸省公首奏歸省母蓋前此百司職務填委無敢言私至是公首奉詔賜賚甚厚是嵗丁太夫人憂上嗣位詔修兩朝實録起公為總裁官明年奉命持節之寧夏册封安化真寧二王妃歷河南關東西之境弔覽周秦漢唐以來遺墟故址悉見賦詠所過兵民休戚既還具言於上實録成賜金織襲衣文綺白金鞍馬是嵗扈從巡邉至宣府而還嵗餘得疾上遣太醫院官視療數月竟不起春秋六十有四公為人簡易沈默溫裕有容居家敦孝友之行既仕事上以誠持論必正扈從北征時道中士卒有憊者太宗皇帝知之以問羣臣羣臣未有對公直對宜遂班師凡於公務致勤不倦處同寮能讓於人泛愛無忤其學該博文章和平寬厚類其德性四方求者無虛日靡不酬應得其一篇一詠者皆寶重之書兼工真行嘗考會試者一讀廷試卷者四不伐善不騖名初升學士寵賚日加即以盛滿為戒名其燕處之居曰退菴疾革士竒與勉仁問之有何言公言受國重恩上無所益朝廷下無所益生民何言傍或啓之請身後之澤者公正色曰君子所耻訖終清明未嘗片語涉亂既卒自公侯六卿暨諸司之長皆哭弔奠祭士無賢愚皆有喪善人之嘆嗚呼儒者際遇始終光榮如公一世其幾何人公之所存蓋無忝矣子男五長昭伯宣德二年進士次武伯堅伯文伯壽伯女五皆有歸孫男六女三公葬以卒之明年某月日墓在某縣某鄉某原銘曰玉笥崔巍金川湛澄公生其間萃和挺英賔興賢能濟濟偕至青萍出匣淬礪初試六御乘時登庸玉署清邃崇嚴參典密務恪勤夙夕小心寅恭于狩于征龍旗率從上承簡知履坦平平鵾遊滄溟鵬翺九天歷事三聖敬終猶始不競不絿有譽無毁方簡大册天府所藏崇碑厚碣敷在四方謙退之存易簀不二嗚呼文靖可式有位故汝寧府通判詹君墓志銘洪武九年汝寧府通判姑孰詹君以疾聞得賜歸道經新蔡卒遂葬新蔡龍潭之側至永樂十年子恩為開封府學訓導以公事過新蔡將啓其墓歸葬求墓不可得詢諸傍近蓋河決其地已久徒見波濤渺漫也蓋距葬時三十有七年恩慟先人體魄之罹於不幸也將取古人葬衣冠之義為墓庶以係其後人之思又以為葬必有銘庶不泯其先德焉於是以湖廣布政司參政李衡所述行狀介翰林孔目杜謙來請按狀君諱俊字用章詹世家姑孰祖諱正考諱貞皆隱於耕讀居青山之下君少好學受易於前翰林學士陶安洪武四年被徴授河南磁州同知賜冠服銀帶到官書公勤亷謹撫教安懷八字揭座隅以自勵時兵革初定民復舊業君勞來安輯之勸督耕桑興學選師明飭教令舉賢薦能抉剔弊蠧蓋力居多焉民有訴發地得金為衆所奪者君立衆于庭諭以義利衆悉還所奪民德君懷金謝之拒之曰我以義利導民乃躬為之耶民愧而去嘗董民餽餉潼關天寒道中車牛多斃餉虧即解所服銀帶易粟代民輸民歸製帶償君君曰吾得紓民憂何愛一帶且未嘗名貸也何為償不受為政一於公平林縣官闕府檄君權理無幾有令民以賦出戰衣磁州耆老羣訴于府乞還君以均賦嵗蝗自為文禱神蝗及境不下而過嘗旱作憫旱詩自責已而大雨霑足三年升汝寧府通判凡所以盡心民事亦如磁州而守身益嚴嘗治廨舍役夫得窖錢以內君君曰此汝所得者何與吾事悉畀之郡闕守二君獨治之民無失業吏無滯牘及去磁汝之民老壯皆有不忍别之意蓋年四十有四而卒君喜吟詠平生所作多散逸有公餘小稿一卷藏於家尤喜作大書娶宋氏子男一恩女一嫁韓奕孫男三萬里中永樂十八年鄉試千里百里曽孫男一銘曰嗚呼詹君生能仁其民沒不能庇其身孰之為之匪繇乎人青山在原巋然表墳春秋霜露來拜如雲靈旋歸哉以福後昆東里文集卷二十
