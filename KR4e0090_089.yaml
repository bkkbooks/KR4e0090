body:
  text: 東里續集卷六十一明楊士竒撰詩七言絶句題楊學士畫四首翠岫青林二月春風光瀲灔絳桃新何人獨解無塵事茅舍山中訪隱淪無人六月不愁暑二子水亭蕭爽同林影溪光坐終日何須醉引碧荷筒雨後參差錦樹明碧雲樓閣麗秋晴扁舟間戀溪亭淨已勝山隂雪夜行十日河流凍不潮連山一帶玉岧嶤不嫌寒氣侵人骨獨解騎驢學灞橋玉峽山人二首之一歸住江南煙水村詩書稼穡付兒孫老夫間日渾無事但祝南山答主恩溧陽史侯祠廟圖有序二首溧陽史侯蓋在東漢建武之際今千四百年而祠廟巋然不廢祠傍史氏甚盛皆侯之後原亨列官于朝每懷先祠及其族處之樂而未遂往也中書舍人陳宗淵寫此圖貽之原亨升建寧知府將行求題為賦水色山光明棟宇溧陽獨有故侯祠猶聞邑里懷遺愛况是雲仍切孝思千歲祠堂修薦謁四時宗族會杯盤建寧太守家園樂寫向丹山碧水看送王文英典籍致仕歸金華四首金馬玉堂供奉久石渠天祿校讐多從來報主丹心切無那衰遲白髮何天恩初下許辭官拜别金鑾曉出關應到牧羊山下望青雲何似白雲間都門垂柳緑毿毿風捲飛花送别驂歸去光榮照閭里姓名猶載舊官䘖翰苑同官二十春况兼同舍更情親分攜莫學浮雲散時有音書慰故人題梅與江隂周生二首一樹葳蕤藹素雲水邉林畔不勝春周家舊愛蓮花好添著梅花清十分瀟灑清姿玉雪寒莫教橫笛近闌干金樽檀板難相稱正好江隂道院看題山水贈賔畿弟南歸二首昔年武姥山前住翠巘丹崖映蓽扉回首雲山渺天末獨題幽思送將歸盤古青山似畫圖新栽松柏近何如幾時同向雲林住相伴春秋灑飯盂題梅送吳野知縣二首折贈羅浮枝上雪鮮葩芳蕊淨無瑕清於彭澤門前柳不比河陽縣裏花西昌縣令辭官後歸住延陵季子州好覔孤山林處士看花攜取鶴同遊寄兩王詹事周庶子李錢兩學士黎諭德兼致謝意二首老託藜笻與竹輿關山千里從龍車五年重過頭成雪料得山靈也笑渠扈從巡邊愧不才玉堂臨别屢浮杯行裝更比人人重為得明珠六斛來過白河二首奉天靖難封功日親見文皇語白河欲渡未能氷遽合萬人歡忭比滹沱六御後來重駐輦裴徊追憫陳亡魂至今河上千年石文字輝煌紀聖恩元夕觀燈詩有序宣德四年正月朔旦有勑以歲事維新上元節屆賜文武羣臣假二十日軍民如故事張燈皆飲酒為樂五城兵馬弛夜禁元夕既屆召羣臣悉赴御苑觀燈是夕天氣朗清輕飈不作燈之精麗倍盛常歲聖情悅豫宴賚有加羣臣咸謂今邊埸清寧民物康阜海宇無事躋於太平皇上嘉樂令辰俯同臣庶恩德廣厚千載希逢欣感之深形諸頌祝臣叨職侍從恭賦近體詩十章用著皇上與人同樂之盛謹繕寫上進伏惟聖覽春到人間夜不寒銀燈金燭映華闌太平處處清光好第一蓬萊頂上看九衢勑放金吾禁夾道連延寶炬紅仰聽仙韶天上奏君王正在廣寒宫鸞應瓊笙鳯應歌光涵太液貫銀河吾皇歲歲升平樂今歲升平樂更多氷泮龍池春似海玉鳬金鴈繞紅蓮人生何幸雍熙世共樂光明不夜天彩霞搖漾寶書濃八極飛仙總會同鼇載蓬壺來海上天移星斗下雲中佛國摩尼三萬斛隨春先到鳯凰城紅樓紫殿光輝滿還照山河大地明花擁鼇峯錦簇棚蟾光須讓九華燈君王宴坐芙蓉殿萬歲歡聲湧頌聲百萬紅蕖一夜開輝煌元圃徹蓬萊豈如聖主光明德洞達乾坤照九垓千歲仙桃進御筵華缸春藹御樓前聖皇一念同民樂九域歡謠徹九天大明一統御乾坤雨露生成總帝恩宣德年年調玉燭華夷長戴聖皇尊題枯木竹石寄贈司訓陳仲仁二首文範逺孫同里閈都門分手又經年九峯三泖多才俊想見洋洋藹誦絃南望三吳有所思羡渠淞上擁臯比故鄉一片山林趣寫寄高齋慰别離五月八日史館困睡夢侍獻陵顧問虜事覺而感賦二首至德仁心在萬方一思往事一情傷自從龍駕歸仙後雲淨天高望渺茫題竹送邢侍講歸無為二首永樂年中擢殿元臚傳第一拜金鑾五雲東畔蓬萊閣浩蕩身霑四聖恩一枝蒼玉贈卿行不盡同官繾綣情知有鄉人候歸斾夜來南斗避文星題梅贈劉伯塤南行二首都閫邊南控百蠻只今椎髻學衣冠春風緑幕文書簡雪蕊氷花正好看城瞰昆明池水濵碧雞山色日相親也知不忘鄉關意時對梅花想故人題江西副使梅二首江西憲副河南後白簡飛霜秉至公一段梅花貞潔操肯隨桃李媚東風花比瓊瑤根比石廣平更是鐵心肝西山南浦無塵地最好柏臺相對看送何布政致仕東歸二首三載西江惠澤深勤民深體九重心遽看請老投簮去畫省空餘棠樹隂心事從來不愧天操持金石信同堅山光水色青雲外歸傍東吳作散仙題孫僉事雲山圖二首九疊匡廬霄漢表白雲深護翠巑岏繡衣使者經行處寫向霜臺柏署看山光雲彩淨無塵往往衡茅著隱淪萬一隆中有王佐時停四牡一咨詢題梅送校官赴嶺南二首一命微官萬里程講筵清對魯諸生春風到日人應到贏得梅花滿路迎南度梅關第一州之官偏稱少時遊過家喜拜雙親健莫遣王程久滯留寄余正安有序二首久不奉書往還中具悉間居履况之勝深慰懷思僕今年七十聰明精力回視别時十不逮一又將扈從巡邊驅馳未已也遐想正安之樂如隔弱水而望蓬閬聊因魏侍郎行書小詩二首代問訊云不歸無補乞歸難白髮蕭疏不耐寒又辦肩輿扶老病將隨翠輦渡桑乾銀河飛瀉石梁清日照屏風九疊明誰似匡南余侍講仰高臺上看雲生黎諭德以梅花索題贈乃姪歸二首柏臺御史當塗守清貯胸中萬斛春昨日揮毫寫林雪玉堂留贈歲寒人竹林二阮共襟期晏歲京華愴别離歸到南州倚瓊樹定因驛使寄相思題梅寄襄城李公第一梅花擅早春氷為肌骨雪為神江南何處看尤好錦帳牙旗伴玉人題劍送别屢勤王事效驅馳歷遍遼東與蜀西兹行解贈龍泉劍會看功名華嶽齊題竹送胡軫敬同二十年中屢别離氷霜不改歲寒姿于今浙水東西畔瀟灑清風見一枝題畫寄王行敏二首王氏南園嘉菊盛年來分植過蘭塘塘上蕭間六十叟坐對秋風晚節香蘭塘秋清黃菊開蘭塘隱者日銜杯酒酣若憶京華客定寄蘭塘香秫來樂善老友辭官南歸題梅奉贈二首解印南歸江上家文明門外發輕車到時漸及新年節間玩園林雪後花離鄉三十四回春遙憶梅花歲歲新君到鄉園若相憶折花還寄北京人過三河縣二首滿縣柴扉半不開紛紛車馬動浮埃連延粉壁題官戶盡屬風雲感會來城中皆奉天靖難官城中廬舍半編茅郭外園畦盡種匏白髮當門坐沽酒紅裙作陳出提筲九日度喜峯口次楊太常韻二首道中甚險蓋平生涉歷未嘗有此馬首連朝東復東穿雲躡石與君同須知第一人間險未數魚鳬蜀道中飛澗懸崖百折東躋攀無處不相同他年九日萸觴畔能忘今晨此路中太平聖德詩有序宣德八年正月上元之夕勑張燈於御苑製作精麗鋪張宏大輝煥繁盛殆非言語所能形容太平之盛致也上先侍聖母皇太后往觀中宫皇太子咸侍奉觴上夀極天倫之樂越一日勑羣臣往觀賜宴苑中又一日命文武大臣以四夷朝貢之使往觀仍賜宴苑中自是悉賜京城內外及郊野之民咸往觀焉臣民觀者靡不目眩心駭應接不遑欣喜之至皆以為千萬世盛事何幸遭遇而親睹也歡騰嵩呼聲振連夕臣某伏自思惟太平者本於皇上之聖德幸睹盛樂敢忘所本敬賦太平聖德詩十章各有序引以著事實謹繕寫上進伏惟電覽云正月十三日大祀天地先日車駕夙興徑詣南郊躬歷神厨遍閲祭品申飭太常務精誠意是夕有司請如故事放煙火上曰朕方嚴對越豈暇嬉事勑免之已而隂雲微布瑞雪紛集行事之際天氣融和月星皎潔雲飈淨斂肅如神臨此上天昭畣聖敬也為敬天之詩第一泰壇吉日奉明煙肅肅宸衷秉至純天遣瑤華昭景貺旋開雲翳粲星文皇上奉聖母皇太后極天下之養愛敬之至深得歡心此聖人治道之本也為聖孝之詩第二九重孝德超前古日日承歡在寶慈聖母聖皇天所祐太平至樂萬年期比歲屢命廷臣舉賢薦能選任方面守令以安黎庶又命法司矜恤刑獄務從寬典此生民所由安也為安民之詩第三元愷登庸比舜功恤民愛物禹湯同九州四海涵恩澤都在陽和化育中連歲勑令有司蠲除逋負振恤荒歉此帝王之仁政也為敷仁之詩第四蠲逋賑乏自皇仁紫鳯銜書歲歲新雨露洋洋被遐邇乾坤萬物總皆春今歲元正天下方嶽及郡縣之臣皆述職來朝廷臣劾奏其中有怠職隳事者請論如法德音誕敷悉見釋免歡呼萬歲聲振門庭為肆宥之詩第五萬國來朝會縉紳除愆宥過賜更新歡聲好似春雷震一片嵩呼徹紫宸先歲之冬瑞雪屢降履端以始訖于上旬天宇澄明霽景融麗此大有之祥聖德所召也為兆豐年之詩第六三雪為祥表臘前融融嘉氣集新年太平有兆人人説聖德中和格上天皇上以年榖屢豐四境寧謐每於歲首勑羣臣百姓自正旦至元夕皆飲酒為樂市中如故事張燈五城弛夜禁仍賜戒勑各循禮度此與衆同樂之大恩也為推恩之詩第七元旦年年頒寶勑樂同文武及黔黎金吾五夜皆無禁飲酒為歡慎禮儀太平之世生民安業皆皇仁所致是以元夕之樂萬姓悉感天恩而祝願萬夀也為萬夀之詩第八連城燈火粲繁星簫鼓聲兼祝頌聲上祝君王萬年夀年年寰宇樂升平御苑今歲燈盛前古之所未有光照上下通逹四表雲霞為之增彩月星為之斂輝然論聖君之明德無逺弗照無幽弗燭又至盛極大無以加也為明德之詩第九翠華高駐廣寒宫萬戶千門寶炬紅瞻仰君王大明德還如麗日正天中皇上仁聖之心惟在與民同樂故載於璽書先後一致今歲燈夕預沐恩榮者自公侯卿大夫下至京城內外介胄之士市廛之夫近而郊坰畎畝之氓逺而氷天炎徼之使皆得仰瞻光華心存銘戴為與衆同樂之詩第十西苑華釭千萬斛與民同樂載綸言羣臣百姓兼遐裔瞻仰歡呼戴聖恩宣德庚戌十月草五日扈從宣府回作扈從歸程聞好語山妻攜得小孫來到家已是風霜老猶有黃花待我回廖子謨縣尹像贊秋水襟懷雲錦思少年先見宰官身壽星正照長沙縣好作陽春為福民夜雨四畔喧呼寢不寧蕭蕭風雨夜三更體寒衣溫皆同趣氣嘆聲嗟共一情道中戲效竹枝勑下行營嚴號令官軍不敢犯秋毫民間尚未知恩旨關閉柴門箇箇牢出關追憶晃庵有序二首光大初出居庸以詩寄余云短衣跨馬度關山馬首如林劍槊攢却憶玉堂楊諭德肩輿朝退出長安行營少憩記憶此詩感而有作公度關山寄我詩當時羡我免驅馳後來兩度關山外屬我驅馳公不知道義交情金石堅公歸先作月臺仙平生知我如公少一誦遺詩一惘然公嘗謂余曰吾輩死後皆作月臺仙早過土木四更催起上肩輿還就民家倒一壺半醉半醒天欲曙行人霜染白髭鬚雞鳴山二首崩裂于今未百年下臨流水尚回環行人又動思鄉意為似江西減飯山山壓禪宫泯無迹空餘遺碣在荒榛梵王不自能防患何用微言𨗳世人泥河書逆旅主人壁扈從龍輿兩度來天清宣府淨浮埃鳯陽李福能迎客下馬重過泛酒杯思金少保前四年余與金少保同飲於泥河李氏今復飲李氏思金愴然玉署青坊雨露邊同鄉同道更推賢今來獨過同行處淚灑清觴憶往年早發宣府跨馬乘輿朝復朝也拚酣醉也拚勞攜來緑酒看看減行過青山步步高附家書示秫日日承恩侍翠華老人何事未忘家一緘寄與巢兒説勤習詩書莫惱爺至蕁麻林二首近訛為洗馬林浩蕩山川氣象開氛清多倚將臣才平生不解談孫武也到蕁麻塞上來渺渺良疇歲歲豐清山清水淡兼濃世人只説邊州苦不識邊州樂趣同還至岔道二首去家不似來家速半月行邊五日還一夜營中喜無寐鑾輿明旦入關山重九將行酌酒杯庭中嘉菊半才開于今未及風霜徑定有黃花待客回送姪子弼赴吳江訓𨗳春雨瓊林秀一枝南行相贈寄相思歲寒但勵氷霜節白日青天看羽儀自題楊園清趣示三子霜雪雲霄空老大春風玉立翠三竿分枝散葉清如許誰合他年引鳯鸞題竹送尤溪蕭知縣二首篔簹新長碧毿毿四月都門雨正酣寫贈尤溪蕭茂宰清風一路向江南一枝如玉翠亭亭聊寓同鄉贈别情莫向春風愛桃李氷霜要見歲寒盟題貞夀堂二首亡弟復環妻陳守節而名渙之母也吾弟身亡三十載弊廬荒草晝深沉傳家賴有詩書澤寡婦孤兒氷雪心老母康寧兒壯大一堂慈孝有誰如吾家前代八登仕喜有雲仍知讀書題竹與渙姪北來南去路漫漫持贈淇園玉一竿相看莫比間花草要閲氷霜到歲寒題徐義副使景齊卷二首繡豸為衣鐡作冠森沉柏府凛霜寒騑騑四牡遵周道會得聲華久逺看松檜姿容氷雪懷肯教當路聚狼豺古人須似趙清獻莫遣高齋過景齋題張子素梅二首繞園盡種廬山杏傍舍新移淇澳枝須著西湖湖上樹氷花看發歲寒姿方傳家世千金祕功熟神仙九轉丹一室太和春意滿梅花香裏不知寒題龍泉陳知縣竹二首遂溪縣裏春瀟灑密葉繁枝滿緑隂白日天風動清韻如聞單父奏絃琴篔簹百尺翠亭亭鳯翥鸞騫拂漢清應共龍泉陳令尹氷霜同結歲寒盟題張子素竹冠帶朝回夏日長石泉仙井橘浮香井傍雙玉凌空翠結實須教引鳯凰題張子素竹石圖練就長生萬夀丹金函拜捧獻金鑾歸來庭掩姢姢玉靜倚珊瑚石畔看題蔣生墨竹兼寄聲吾望隱居二首故家三徑盛風流六月林隂夏似秋但有清香合金石何須佳客引羊求濃比密雲清比玉連枝接葉翠重重嚴莊莊上堪深隱最憶君家阮嗣宗送康宜清左遷石阡推官二首三月都門惜别離春風相送夜郎西古來賢達多南謫往往題詩在五溪從來清操如氷雪一旦南遷衆共嗟謝却壺觴飽餐飯平安常遣報京華題竹贈孫公器醫士二首世在闔閭城下住縣壺都市歲年深傳宗况是孫思邈家有神方直萬金舊詫邯鄲帶下醫渠今竒術重京師董家紅杏蘇家橘未比孫家緑玉枝題竹送康叔圭郎中之南京刑部二首文溪風物擅清幽憶過君家溪上頭當日相歡盡童稚共循修竹濯清流十年簮紱住京師朝退看書不下帷今日南行何以贈一枝如玉歲寒期題李生梅花劍沙此去坐橫經雪色梅花繞檻清講罷更應明正學宗家時訪李延平題蕭士高梅花贑榆地僻瀕東海九載行淹博士居坐對梅花無俗慮從知讀盡五車書魯穆都御史挽詩二首繡衣白簡鐵為冠所至氷霜六月寒猶憶往年閩憲府枳林清絶一琅玕憲臺歸佐侍宸旒徑操稜稜厲九秋一旦驚心隕瓊玉空餘寒柏晚颼颼題竹寄瑞安鍾尹都門判袂已經春海邑紛傳惠化新一幅平安鄉里意舊來卓魯亦何人題竹贈姪孫縉南歸老成近歲凋零盡狐豕紛紛撼里閭萬里南歸勉為善莫教瓦礫混瓊琚送楊士憲之雲南僉事萬里滇南候繡衣炎州十月凛霜飛豐城古劍神光動一道澄清屬有威題竹贈徐紹祥之雲南僉事貌得湘皋修竹枝贈君萬里赴滇池霜臺白簡澄清暇時對琅玕念别離題竹贈陳汝衡之雲南僉事柏臺御史承天寵楚水黔山萬里行無限離情何以贈一枝瀟灑鳯毛清送李德固縣丞引疾還鄉就用問訊巽溪宗長二首十月既望三年佐邑有清名來往人傳不負丞寄語鄉閭莫輕看官卑終不忝西平宗老年髙八十餘溪山清趣樂間居别來思憶心當切為謝衰殘久曠書題竹贈蹇布政復任歸湖廣二首旬宣六載居南紀喜有清名達紫宸聖主宵衣念民瘼益惇忠厚佐皇仁挺特平生氷蘗操自從憲府陟藩翰臨岐更贈琅玕玉相對清風到歲寒題少師建安楊先生行樂圖五首聖明圖治任忠良正倚純誠柱廟堂畫史但知塵外意青山為寫午橋莊馬蹄踏遍龍沙路載筆頻年從屬車且緩馳情向蕭散禁中頗牧有誰如手扶金鼎事調元玉署賢勞四十年待致雍熙却歸去丹山真作地行仙水色山光絶世塵長松千尺繞龍鱗何妨添我青藜杖俱是蓬萊頂上人玉堂金馬同三紀晏歲梅花雪共妍廬阜武夷歸去日東西來往挾飛仙題彭甥士淳梅花三首北風獵獵捲飛沙之子南轅道路賖正直氷霜歲華暮闔閭城下看梅花南溪先生秉高潔曾乘别駕闔閭城想像梅花丈人行須知玉潤映氷清講堂春永坐橫經繞席梅花相對清想見長洲蕭博士往來吟詠共高情題梅送鍾沔有序吾邑鍾沔尚清為瑞安縣其謹行如玉愛民如子好其所好而惡其所惡民愛敬之如父母今年述職京師其歸也瑞安之君子仕於朝者孫從吉黃養正相與贈之梅花圖梅從吉所作也而求余題夫梅植物之至清者也而得春最早植物莫之先也春於德為仁豈非清以况其操仁以喻其政匪直以為玩具耳輒題三絶句其端云武山秀拔五千仭下有喬木蟠深根故家文采重清白鐡幹璚葩今尚繁墨綬銅章向永嘉人如素璧淨無暇琴堂畫永玩香雪絶勝河陽縣裡花名縣幽偏説瑞安縣公嘉政海同寬牡丹芍藥無清趣只看梅花到歲寒題凌士昌所藏張子厚山水二首蒼崖萬仭懸飛練玉笥匡廬筆底開孤負平生謝公屐紅塵白首未歸來雲山深處草亭幽磐石垂蘿古木稠世外不知堯舜理超然放意似莊周送凌士昌歸省二首錦樹成行白鴈飛暫辭天闕赴慈闈金陵到日年光晚别有梅花豔舞衣溫似陽和清似玉蓬來東閣久相親北堂歸省真堪樂憶得重來是暮春賴編修讀書莊詩有引四首翰林編修賴世隆舊有讀書莊在清流縣南今以例暫歸求余詩世隆直義而有清雅之趣為賦四時各一首清流城外讀書莊舊隱詩書歲月長玉署歸來春正永松門溪水落花香瀟灑幽莊縣郭南屏山近屋翠於藍間開書卷消長夏好似龍眠白石庵圃有嘉蔬沼有魚庭闈甘旨奉安居桂花露重香浮屋秋爽滿林聞讀書天上蓬山暫賜歸書莊重理舊茅茨錦衣光映梅花雪具慶筵中奉夀巵送蔣廷暉致事歸臨安五首御前承勑立揮毫近侍蒙恩已四朝常有丹心懷報主不堪霜鬢久蕭蕭甲申詔命舉能書第一能書衆未如霜木晨星幾人在又承恩旨遂間居兩京三十餘年住家在錢塘舊業殘想見西湖千樹雪歲寒還似昔時看鍾繇筆法傳羲獻此是臨池最上源玉堂無事曾同論别後何人更共言洪熙詔下體羣臣七十歸休舊典伸眼底同年人去盡自憐猶是未歸人送楊允寬賢良省覲後南還十首家住龍津好山水楊墩流澤百餘年田園不待論生計孫子森森秀更賢白鶴山前松柏地春秋拜跪奠清杯何堪父子衷情切萬里天涯幾度來嚴親一片丹心苦上為邦家下庶民白髮滿頭躬匪懈逺來深慰暮年情春趨門下侍親闈秋别親闈出帝幾已别欲行仍繾綣為承親命敢遲違河上秋風九月高臨河酹酒發歸舠縣知一路思親意回首京華夢寐勞曾看髫歲勤書卷黑髮于今已抱孫莫訝衰翁七十二且同論舊倒離尊同宗同道同官署金石交情三紀周建安有子真龍種慚愧吾家犬彘流娟娟玉樹照人明儀表雍容意度新珍重茂年勤德業承芳終合到公卿良玉由來不自沽但修天爵待時須君家忠厚多餘慶請視流傳萬木圖故鄉南去路迢遙紅樹凌霜葉半凋桑梓人人望歸客沿流休駐木蘭橈示訓升姪學人有道戒驕盈謙益由來著聖經看取千流并萬𣲖盡沿東下作滄溟題竹送民則弟南歸五首用舍行藏皆有命山林朝市豈關心故鄉歸去謝塵纍吟坐武公淇澳林叨祿詞垣四十年白頭無補日憂悁羡渠拂袂還山去瀟灑雲林一散仙沃壤自耕三畝秫水邊林下淡無榮高車駟馬多顛覆得似幽人隱趣清深溪文獻三百載水竹園田清繞居歸及宗家敦六行還勤簡册樂三餘匡山先生鄉達尊臨川道學有淵源修齊堂上遺書在莫負青春細討論題梅送民則弟南歸萬里南歸莫嘆嗟東風持贈玉梅花百年喬木詩書澤珍重桂林同守家題竹送張振文新捧除書上二車鬱林迢遞望蒼梧到時知及春三月聞徹竹枝聞鷓鴣題梅送輝姪赴宣城訓導有序族叔黃陂府君敏學清操既冠取科第受民社之寄滿三載而去至今黃陂之人頌遺政不已亡弟孟頥端重秀穎文學勇進吾宗千里駒也而皆年不及三十蓋君子所共悼惜之者夫有祖若父如此為其後者可不務善繼哉輝今分教宣城偶得畫梅書二十八字其端贈之臘前定到宣城邑齋舍梅花吐正妍看取歲寒氷玉色莫忘清白有家傳送士𢎞郎中歸省二首金鑾殿下拜天恩二月辭天出禁垣歸到比當春正暖東風慈竹子孫繁夏官郎署二十載玉立亭亭故可人萬里江南看歸省清風不改舊時貧題四皓初下商巖入漢廷修眉疏鬢雪霜明從容一語安邦國信是君王任老成邑蕭生為余寫小像因求朱中書添竹數竿以示不忘東皋之意春雨東皋竹萬竿主人白髮未休官常將一片氷霜意期爾青青共歲寒題和姪竹清溪溪上似淇園散葉分枝緑正蕃又看移根度江去石塘春雨長兒孫題和姪梅故家晝錦坊中住連屋詩書絶點埃好傍溪山結精舍不看桃杏只看梅題弼姪鶴午夜月涼清露下舞餘嘹唳九皋音蕭間不是軒墀物海闊天高萬里心題弼姪竹二首清溪溪上竹如簀舊隱林中趣味長堪笑幽間大小阮也勞塵事逐山王單父堂前玉兩竿政間每日報平安可人千尺氷霜操要看亭亭到歲寒題弼姪山水平生端紱侍金閨萬里雲山憶故栖正是江南三月暮楓林茅舍子規啼題弼姪梅輕薄紛紛桃李過梅花獨擅歲寒清為語子孫堅雅操莫隳清白舊家聲題畫送韓御史暘歸省二首秦望山清近若耶紛紛雲樹映溪沙數椽茅屋無塵雜知是安陽御史家十載懷歸歸未得越中山水望中迷封章早晚天恩下晝錦乘驄入會稽題邢參議竹六年嵩洛佐藩翰徑節清風九夏寒閲歷氷霜長不改青霄終到五雲端題竹寄一夔侍講僕與一夔侍講别又四年歲寒松柏之操無日不奉思也今延年歸不及修書輒題絶句四首於朱編修寫竹之上以代問訊云翰苑鑾坡日月邊五更聨轡共朝天獨封青簡收金匱去傍雲林作散仙江南三瑞同升日邂逅京華意最親閲歷風霜三十載一枝留擅故林春風流文采玉堂人氷雪襟懷敻絶塵好在江南煙雨外翠壺時醉洞庭春嬌花媚草謾紛紛直節清風見此君我憶詞林余太史題詩聊復繼停雲送孫徽州詩有序宣宗章皇帝臨御深惟理民之道在簡牧守遂詔廷臣三品以上推舉賢才舉謬有罰由是方嶽郡守得人為多皇上嗣位一循成憲而簡擇加嚴賢者能者咸見升用民安田里時號治平正統已未之冬吏部奏藩憲府州官闕請如制報可於是刑部侍郎何文淵舉兵部主事孫隆以聞授徽州知府輿論偉之蓋以何君之明知人孫君之不忝斯命也孫君字從吉始余未之識已聞其賢於縉紳大夫及其班朝著相與往還久益熟皎乎其清粹乎其淳確乎其執持溫乎其慈惠長厚之度在夏官六七年其長二咸信任焉京師之賢者皆與之遊蓋仁人君子也前史所紀循良之吏從吉無忝焉况新安朱夫子之鄉大賢遺化宜未泯也雖其弗率者不能無十一於千百夫仁人君子推誠以感之蓋無不可格者兩岐五袴之謠殆將有聞乎故於别也詩以贈之仙郎朝捧天書出五馬雙旌别路寒遙想陽和與嘉政新年一併到新安題何司歷梅二首誰將煙艇過西湖寫得梅花入畫圖八卦推餘白晝靜焚香何假博山爐大庾關頭第一枝會稽筆法幾人知疏影清香坐相對君平初是下簾時題江鄉歸趣圖有序十首少保淡庵楊先生同僕在館閣四十年今皆老而未能退間出江鄉歸趣圖見示蓋其所資以自適也江漢間僕少年所嘗遊者嗟夫人之心豈異哉君子之出處則有義焉因賦小詩十首前四首勉公於義第五第六蓋寄思今懷古之意第七則憶僕少時所遊其末三首又僕之終不能忘情於江漢者皆實心也敬書於圖之左方云手握天機絲五色大庭補衮不辭勤如何一夕秋風興憶著滄波舊釣綸緑水青山寫作圖無邊逸趣在樵漁不聞昔老渭川叟八十初來載後車早年八九吞雲夢老見乾坤四海心為語江雲緩飛去從龍還用作甘霖七十年高鬢未皤新來歸興似江波玉堂更住三千日去和堯民擊壤歌一帶江鄉五千里春風浩蕩畫圖新莘野磻溪有相似明時耕釣豈無人金陵南上到江陵看畫依稀感慨生赤壁尚餘沉戟在黃州誰和洞簫聲巴陵西畔楚江分曾泛湖波望嶽雲借得君山小龍笛月明吹向洞庭君少年初賦逺遊篇曾看三湘七澤連共是玉皇香案吏他時隨去挾飛仙鸚鵡洲前楊柳樹飛花偏著釣蓬多何時半醉蓬忩底卧聽滄浪孺子歌半生近侍共清班行見天恩並賜間重過南樓跨黃鶴尋君須到繡林山題竹鶴雙清圖寄賔畿弟有序二首賔畿老弟寄古畫一幅求題詩曰將見詩即見兄也然畫歷久色黭不可題有貺余雙清圖者諸學士皆已題詩余遂續題于後以寄賔畿其附來古畫則留之將求善工重表以間暇披閲則亦如對賔畿云初下雲霄息羽翰清風間傍翠琅玕無邊玄圃滄洲趣寄與家林老弟看憶别賔畿九歷春天涯霜鬢各如銀懸知林下多情事還對皋禽念逺人題給事中梅花螭頭簮筆退朝遲小閣銀瓶玩竹枝想見襟懷清似玉氷霜還結歲寒期題富溪山水圖二首曾從蕭峽泝桐江隔岸青山擁客艭何處水亭沽酒幔誰家雲樹讀書忩富溪􅥞在江南曲水色山光畫不如知有幽人茅舍住盡拋塵事事樵漁老妻郭夫人命服像贊從嫁黔婁執勤儉奩中猶貯舊荆叉內朝屢作東班首拜慶金宫玉殿來題魏仲房梅瀟灑東風萬玉林清香終日伴清吟都無一點流塵到雅稱平生氷雪心寄孫徽州鄒縣幕談孫徽州之政有仁人長者之風豫為喜躍故書此寄意云新安太守布寬仁想見新安物物春公暇高情倚盤石間聽幽鳥看粼粼題梅送廖子謨二首河間佐郡屢經秋幾度懷人增别愁報政重來又分手白雲紅樹思悠悠送行折贈一枝梅想見家林次第開解紱何時共歸去歲寒花底共銜杯自贊小像老子今年七十三不勝歸思在江南天恩若許辭簮紱猶辦綸竿釣石潭題李學士竹梧有序二首前十年余官春坊從沈君求此畫不得近時勉學士權掌翰林院印沈遽贈之蓋春坊學士不掌印也世俗謂人不可一日無權二君之贈受果何如余他日過李見之因道往事李曰公欲得即請奕僕不勝當讓僕遂偶勝時行儉詹事習禮學士皆在相視大笑余顧童子卷畫去然自是每見李輒有不舍之意余固不欲奪其所好也遂歸之且題詩以博李君一笑沈君覽之亦未必不自笑也碧梧翠竹兩清姿豈但高齋坐對宜裁管斫琴堪大用不然須見鳯來儀永别錫山王道士空餘翰墨亂人心黃金若綰封侯印曹霸王維聚若林題墨竹寄劉子偉二首江上好山千萬重看山長踏翠芙蓉他年解綬還鄉邑竹杖芒鞋與爾同袖拂青煙躡紫霞尋龍尋水看金沙道人久有歸休意指箇溪山著我家題竹寄顔肅訓導久别慶雲顔博士書來為喜報平安同鄉無限相思意特寄清風客裏看題徐良玉梅花二首兩度安南奉使來玉葩曾看嶺頭梅由來使者清於玉不帶飛塵半點回天闕南頭治夏官公餘庭館對芝蘭庭前别有梅花樹氷雪相看到歲寒早發通州望朝陽門滄海熹微曙色紅露華清溢萬年松君王正御蓬萊殿鐘鼓聲高出九重寄長兒韻語有序三十首吾仕京師四十年歸僅四十日內外親朋逺邇紛集旦暮之間應接不暇父子家話不及一言啓行先夕酒邊數語未盡吾意别來舟中念之耿耿故逐事綴為韻語凡三十首寫寄長兒稷七十五歲老人愛子之心悉具此楮稷勉承吾意庶幾不隳孝道云萬里回家四旬住內外親朋擁不開父子未能留一語别來思憶使心摧禹拜善言登聖域仲由有過喜聞之七字嘉言常佩服道吾惡者即吾師聞説諛言得爾歡忠言誰肯竭心肝從今勉受賢人愛莫把忠言反意看責善輔仁為益友諂言讒説是凶儔益友深交擬金石凶儔逺避似戈矛種禾必用薅稂莠豈有薰蕕可共藏吾兒盡絶讒諛侣即起芳名致福祥已足當休即便休百年何用萬年謀人人自帶生來福枉為兒孫作馬牛明達之人無厚業但求足給免寒飢田多稅重後來纍絆子纒孫今未知天地生人皆有命不須苦為子孫謀諸楊田土連阡陌身後何人保一邱膝下諸孫玉不如父慈只合訓詩書飽讀詩書能變化自然騰踏上天衢森森孫子比明珠總是先公積慶餘佳婦佳兒勤善行免教貽纍及諸雛達士仁人宏度量犯而不校務包荒是非曲直人人識狗彘何須與較量釋道邪言總是誣能明斯理即真儒愚人苦被愚人弄費盡千金寸福無東掊西取亡民怨散施僧家與道家如此善因求有福有災無福只堪嗟人生隂德由來好周急憐貧濟寡孤不在緇黃誇布施不教鄉䣊怨侵漁臨財能讓真君子恃力誇豪總惡徒忍氣平心戒爭競一生安穩絶憂虞父子強梁暴鄉里鄉人怨忿切心肝須臾沉沒無遺頌看取水南張狀元年來狐豕縱橫甚假託聲名指我家我家若解持亷靜狐豕雖頑未敢譁立志應須學古人讀書方見古人真暖衣飽食亡塵慮忩下燈前莫厭勤明忩淨几間臨帖東閣西齋靜閲書諸子娛親時繞膝清時清樂有誰如六行由來數睦姻士須重義勿輕貧老夫家譜分明在莫以新親薄古親東城汝兄我親姪汝宜親密無間疏盡誠盡禮相匡翼大家改轍由正途城東諸孫與我孫兄弟同延老成教記誦講説課學程日就月將見成效每言臧獲皆人子曾寫陶潛訓子書叮嚀佳兒與佳婦莫聽讒譛虐無辜人家內外禮截然僧道豈容陳夀帕斯事傳聞未必真有之儒風掃地也虔州李旭吾故交汝醉逢之肆凌辱方面兩司向我言使我低頭內慙恧吾宗謹靜務詩書待制以來人共知豈可甘令後人説承家不淑自吾兒吾兒今年三十二已近人生半七十不早轉頭修善行後來追悔何由及老人熱藥猶常戒况汝即今方壯年京華兩見談星者厄運須防四九前七十春秋雪滿顛都緣子姪苦憂煎老人在世無多日願乞安心了暮年人生至親惟父子備述恩情在於此千言萬語無他事惟願修仁循義禮送沈少卿南歸三首玉旨朝來下赤墀遽傳騎馬發京師崇文門外官亭柳卧病無由贈一枝黃菊初花未有霜錦袍歸帶御爐香自緣白首懷桑梓不為蓴鱸憶故鄉江上青山錦樹明歸舟如在畫圖行十年兩奉天恩去綵筆題詩一路清題竹寄李廣二首平安寺畔相迎處武姥峯前載酒時思憶高情又三載東風遙寄鳯凰枝徑節虛心碧玉竿凌霜傲雪拂雲端纎塵不到清隂下最稱溪南隱者看送外甥周丹元有序三首外甥周丹元隨父母戍臨洮四十餘年矣其母余女弟也今惟母在間遣丹元來北京省余其歸也書此贈之垂髫憐爾侍西行此日相逢白髮生萬里京華訪遺老他鄉還重舅甥情西望臨洮地苦寒明時逺戍莫辭難好敦孝敬奉慈母更盡勤誠悅上官渺渺江南道路長故鄉回首勿情傷梅花自是江南物但看梅花即故鄉題梅與之序姪盤中松竹如雲霧尚少梅花玉雪姿置在草堂成四友歲寒相對靜相宜題畿孫孔雀牡丹洛陽高品移來滿南海雕籠入貢頻惟有武英邊闕詔從遊常看上林春題畿孫松梅鶴緑雲細剪蔥蘢葉白玉香開錯落花何處飛來雙鶴馭畫中疑是洞仙家題竹寄蕭元立四年不見蕭元立遙憶新來滿鬢霜深結茅齋對岩竹還依泉石種昌陽題蕭壻承恕竹鳯凰池上寫琅玕便有清風五月寒石臺溪畔桃源裏最好蕭齋靜處看題蕭壻承恕東山圖早於塵外寄高間中歲安邦指顧間畫史豈知經濟事惟將適趣寫東山送曾永齡赴恭城知縣有序一首先母舅陳孔碩先生之子壻曾永齡新除恭城令恭城雖逺且僻然皆王命也亷以端已仁以厚下庶幾可稱令職永齡勉之其行也賦二小詩為贈云玉河橋東酌玉壺崇文門外歌驪駒銅章新綰廣西去一路春風聽鷓鴣新除令尹恭城縣萬里驅馳過桂林聖主恤民無逺近好勤綏撫體皇心題竹寄雷道夫孝感坊南看竹枝高齋同詠武公詩交情四十餘年在黃鶴白雲勞逺思題德貫牡丹松鶴虬松千丈拂青雲初下雲間散誕身畫史安知海天意粉圖空寫洛陽春送姪壻劉鉉南歸二首憶過沙溪訪隱君靜安堂上倒芳樽轉頭流水六十載今日燕山遇乃孫沙溪溪上幽且深桑麻粳稻易黃金更莫逺行江漢上從來漢水蕩人心題竹寄彥實姪清江一曲繞柴門樂志軒中隱趣繁滿種琅玕隔塵雜更裁簡册課兒孫題木石小畫與鏞孫奕奕西昌貞節門黃陂丰采見曾孫須以詩書振勳業莫隨木石老邱樊東里續集卷六十一
