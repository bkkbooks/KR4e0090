body:
  text: 東里續集巻四十六明楊士竒撰哀辭祭文祝文彭百鍊哀辭有序宣徳五年上憫江西之民困於奸吏豪民漁敓無厭也用璽書遣使廵視除兇去弊以安善良使者以朝廷所建設縣之老人周悉民隱所至事必咨之而惟其言之聽不疑然是時老人非皆出於推擇善不善相半不善者把持譁訐為能事其善者亦且斂手避之而縣長吏鮮不受制於是奸豪吏民聞使者來惴惴懼旦夕且死暮夜走跽老人投重賄哀叩求活既内賄曰吾庇汝汝謹毋忘我而凡所對使者言某是某非非盡出於公矣蓋所在皆然使者至泰和留旬浹治事竟将行矣時監察御史彭百鍊侍親家居親喪有事於外適暮風雨大作馳騎過快閣下使者時坐閣上倉卒不及下避徑馳去使者遥望見之遣問知百鍊也明旦使者去之萬安龍泉還止廬陵㑹有按察司官來聞使者言百鍊馳馬不下遂趨泰和召縣之衆老人索百鍊居鄉所作愆過咸對無之索再三衆老人對如初惟一老於百鍊素有憾貌欲有言乃悉出衆老之無言者而留欲言者導之言遂掇拾其嘗買妾及田四事而其㝡妄者謂挾制縣官放免百夫長温彦琮得白金三十兩遂令書狀乃復進衆老之無言者出状而掩其前之半以後半空紙俾聯書姓名為據蓋衆老實未知状所言何事也按察司官遂令衆老以夜伺百鍊而執之然猶未有固必意密戒云如其他出即止勿執亦勿泄言適百鍊治䘮事出外一二老人欲得按察司官意躬率百餘人夜走數十里外蹤跡掩執之百鍊平素負氣義侃侃憫窮嫉邪遇事直發靡所顧避雖退處鄉䣊不變以是滋召怨其居鄉時朝廷造海舟令民夫採桅木泰和當出三百夫以富民三人充百夫長率行傳著已定縣時惟丞治事孱弱不能制下奸人及吏胥謀茍利盗出縣帖復追鄉二百八十人皆為百夫長期一人得白金十數兩免之於是六鄉讙然大擾温彦琮者百鍊姻家素窶甚預焉計無措走告百鍊百鍊入縣庭索其牘閲之其所追二百八十人不具按檢乃言於丞丞實未嘗知也遂悉罷二百八十人不追擾者以定皆德百鍊而奸人邪計不行愈益側目之矣百鍊既被執至庭下得覩老人所具事状曰果如老人言宜有告者今既無告者請及老人面對就死不恨不聽遂械繫送詣使者轉送京師凡使者所送詣京師非死罪皆發戍逺邊獨百錬適遇寛恤之令得内米贖罪罷其御史而命吏部改授官未及以疾卒百鍊由進士為御史其文學皆有所自得非尋常之為進士者可及其仕必欲行所學不肯媕婀玩愒其所歴兩淮江浙廣東皆有政績見於其人稱道思慕未已也而間居無事乃遭罹若此豈其命歟然而獨霑寛恤之令将改授官矣無㡬竟卒信其命乎自百鍊被執泰和之人無貴賤賢愚來京師道其事者凡數十人如出一口故卒之日京師縉紳君子皆傷悼枉之古之人有言蓋棺論定百鍊庶㡬可以無愧楊氏於百鍊累世姻婭雖百鍊為人素於余不相合然不合者一人之私也所謂傷悼枉之者衆人之公也君子不以私廢公故為述其得罪之由為哀辭使其家刻諸墓蓋曰屈於前尚可信於後也其行之見於墓銘者此不復出哀辭曰百里之民有耆有耄用其惇厚率民于道亦資正言禆輔邑里逝者何臧來者而否邑有視聽蔽其明聰衡從肆厲為下斧斨狸以牧鶵狼以牧豚誰實使之於乎匪仁誰實聽之漫不加省惡者脱罟善者墜穽直者群忿邪者衆説柔者以全剛者以折嗟世之人莫非命焉憎愛廢舉彼胡能然惟命之然成是邂逅譽毁得䘮奚彼之詬嗟嗟百鍊命也柰何宵人之怡君子之嗟朱文真哀辭有序贈中書舎人朱君文真初家蕭山之西陵㓜孤暨長遭兵亂奉母携弟妹走杭之海寜遂家焉以孝友見重於閭里海寜之故家湯思賢之妻以女而納贅壻焉文真性資淳實務義恥言利不治生産而篤於教子嘗諭之曰惟詩書可以殖家他不足恃也吾不幸少遭亂離失學若生際治平而不勉可乎年六十有四卒配湯氏有淑徳其妻道母道皆可稱後文真之卄二年亦卒年七十有四後五年子祚以文學起家為中書舎人又四年用祚貴制贈文真徴仕郎中書舎人湯氏孺人祚今陞翰林脩撰慟父母之不逮祿養也求余為辭以泄其哀余憫其情為之辭曰璞韞于山兮卉木承其輝潤士隱于下兮徳善昭其譽聞猗嗟文真兮存隱而沒揚其隱㡬時兮其揚則長懷養兮而無已爰作斯辭兮慰其哀子禮部尚書張公哀辭有序吾友邢臺張公諱瑛字子玉由學官擢給事中是時宣宗皇帝初出閣太宗皇帝命吏部選近臣行止端慎語音明正者以侍講讀尚書蹇公舉公上召見喜遂命入侍講説詳明辰入申退恭勤不懈有常度宣宗皇帝正儲位陞春坊左中允禮遇益加上既嗣大位進左諭徳尋改司經局洗馬遂陞禮部侍郎兼華蓋殿大學士叅預密務寵賚特厚歲餘陞禮部尚書仍兼大學士脩兩朝實錄與充總裁車駕巡邊特命重臣守北京公預焉無㡬改南京禮部尚書屢有建白多見聽納嘗入朝以侍從舊臣顧問再三深荷褒錫未㡬宫車晏駕遂還南京又明年公以疾不起春秋六十有二公為人寛厚夷坦雖位髙祿豐不見崕㟁與人交樂易上或有所顧問能别是非以正對於公務不避勞勩於乎惜哉其子祥來求墓道之碑適余病不能乃屬祥改求已而余病稍間念不可於公終黙蓋公為給事時於南京居相隣時相往還宣徳中在館閣實同職任忍以衰病而忘老友遂為辭以哀之辭曰於乎張公内夷外豐發軔逢掖爰奮顯庸初正皋比遂進螭陛帝命是紀敬恭劼毖龍潛未躍養徳聚學簡儒命賢入侍講讀權輿屬公公秉厥誠厥後烝烝隨龍以升桂芳詞垣以翔以騫遂參宥密遂兼代言遂陟宗伯厚祿崇秩朂厲報施敢遑暇逸黼扆所咨弗迕弗隨正直之持罔有疾疵公於為臣克勤克慎公於處友不易厥信於乎張公於我孔厚昔也隣比今也寮友暌離㡬何而遽長終述辭寫哀於乎張公施脩撰哀辭正統四年三月上臨軒䇿士其第一人賜進士及第授翰林脩撰蘇之吳縣施槃也余時歸江西得廷試錄閲之良喜蓋非獨為施氏吾友侍郎周君恂如之廵撫三吳也作意興學初吳縣學舎隘陋且弊周君擇勝從而新之小人不懌者造誣謗之周君如罔聞且益選民俊秀充子弟員其中而槃與焉至是亦為吳學與周君喜也無㡬余北還道淮安槃父遵道棹小舟迓余雖初識之而重其有子也執其手賀之遵道曰非走之能父也十數年前㩦槃客山陽依羅氏以居羅之老長曰文振特愛槃如子育之教之又求儒師授之經凡朝夕寒暑事師禮皆出羅氏既冠以歸吳侍郎君於羅故嘗知槃之為所愛也亦愛之遂得入學所以致槃有今日實文振之徳言既文振來迓亦於吾故也余為舉遵道之言文振曰槃令質夙成固施氏有先徳鐸何預力余竊歎遵道之弗昧人徳文振之不居其功非皆君子人乎余既至北京日與槃處槃字宗銘濯濯乎其資也秩秩乎其儀也坦坦乎其存也孜孜乎其學也顓顓乎其於職務也旦暮率在公其志端且鋭而於余久益親余固逺大望之一日得寒疾同官悉徃視之則醫已投補劑不勝困矣衆更為求他醫兩醫欲下之一醫持不可宗銘拒不聽竟從下者既下之又明日竟卒五月廿六日也年二十有四無子同官相率出賻歸其喪而始終經紀䘮事者編脩徐瑾行人吳恵嗟乎宗銘之不幸非命也夫不然何以其臨絶所遇之屢左也余故為之辭哀之辭曰其稟之良兮其履之荘兮既奮以升兮噫桂林之英兮含輝而楊馨兮何霜霰之奄零兮噫氣清其弗長兮抑謀夫之匪臧兮固定命非人之所能兮噫孫曰儉哀辭豐城孫曰儉翰林編脩竹軒先生之第四子也先生有五丈夫子皆脩於文行長者守桑梓而四子皆出仕仕者余皆識之而冣後識曰儉温温乎崐岡之片玉也濯濯乎桂林之一枝也時舉縣學訓導命未下遽聞卒於其兄曰恭之官舎余甚悼惜之及見曰恭所為志墓之文及哭弟之詩辭纒綿悲愴不忍讀也故亦作辭哀之辭曰抱清淑兮秉義仁服亷潔兮被綉文䂓與矩兮是循車始駕兮遽仆輪嗟乎哀哉兮理其可詢陳智仲哀辭余讀亡友胡文穆公所為天台陳智仲甫墓志蓋作而嘆曰士不幸有所抱負而遭時孔棘不得以效諸用或雖用而不盡其長卒至鬱鬱乾沒者固自其命其亦可以為世道惜也歟如陳智仲甫其才與其所志豈常流者哉然纔及展其分寸而遽退伏以至於老死則吾所為惜之者要不獨以為智仲甫也智仲甫諱好智其曾大父大父皆已仕智仲甫資貌魁梧有膽畧讀書通大義而剛毅亷明不撓於勢利元季冦盗充斥江淛帥府聞其才辟為紹興長樂廵檢察捕有方畧盗無敢入其境者而境内之羣不逞皆奔走斂避不復見踪跡積功至防禦義兵萬户府副萬户其志固将有所見于世也而元政日益紊遂去歸養其親不復有仕宦意智仲甫居家篤孝行於族姻鄉里周恩義窮乏者振恤之寒餒者衣食之貧不能嫁娶死不能斂塟者皆資給之嘗有五虎為患里中衆莫敢嬰者智仲甫親出盡殺之里大旱衆禱不應智仲甫躬禱之輙應雖其潔身以去而惓惓不忘及民如此是豈果於獨善自足者歟於乎使士皆果於獨善自足世亦何所望乎士哉智仲甫年七十卒其子宗淵今為中書舎人又欲見之吾文吾固已悼夫智仲甫之命矣於是為辭以哀之辭曰洋洋川流其沃千里兮淳滀為淵爰潤及涘兮君子之德凡惟厥施兮施有弗閎匪余攸志兮嗟智仲甫徳施無已兮命之弗猶匪余攸悔兮祭文祭王學士文維永樂五年歲次丁亥六月癸未朔越十又九日辛丑具官某謹以清酌庶羞致祭於翰林侍讀學士耐軒先生王公之靈而言曰夫死生之恒理世曷嘗以深悲何先生之云殁紛愴怳而惻悽振教鐸於賢闗掌帝制於彤闈盛眷賚之光輝藹聲譽而四馳竟逍遥以全歸其奚憾之有遺惟衆人之顒望情有繫而難排曰安貞而有常執耿介而不移居素澹以自適養冲和以怡怡畜記覽於前聞亦浩博而無涯矧衝牙與珩琚鏘雅詠之協諧兹遽往而不旋斯衆懷之依依某託寮好之孔厚復居室之相比悵遺言之在耳杳容色其莫窺睇錫山之崔崔戒明發乎靈輀薄陳殽而薦酒哀永訣於今兹尚饗祭之宜姪文於乎吾姪遽止於斯邪誠已所自致邪抑命之所為耶於乎汝生當太平之世長際文明之運振聲華於髙科遂游從於詞苑日食大官究覽石渠使爾益進所未至将方駕乎古人者皇上隆恩盛德将玉成於汝豈有涯哉吾與汝父皆自㓜失怙孤困貧苦以遂立身汝父壮而生爾爾甫數歲淳厚端慧粹然不凡吾兄弟深用喜幸以謂嗣世業立門户者其将在爾爾之父母晝夜勞瘁勵爾學問所以教愛願望於汝者豈有窮哉汝今止此上負聖君下負父母於乎哀哉命也柰何吾諸姪惟爾㝡長篤學務義惟爾㝡良吾客京師越踰一紀朝夕賴汝左右慰藉汝視我如父吾亦視汝如子相親之日共期永久何意數夕遽隔幽明於乎哀哉果曷至此吾常自考身後之事有賴者汝乃今汝以身後遺我於乎命也吾復奚望在吾於汝情慟無已汝父汝母暮年衰病逺隔二千里外朝夕思汝欲見不獲聞汝之卒慟當柰何於乎哀哉汝弟鵷以汝喪及汝妻子歸故鄉明日啟行吾奠一觴與汝長别再見之期其惟夢寐於乎哀哉尚饗祭兵部金尚書文於乎公生際國家景運之興晚遇聖明之主列六卿之位躋二品之秩總夏官之政務兼春官之輔弼委任之重恩寵之隆可謂極矣而春秋六十有三溘焉令終士生如公蓋超然特出者也然公既没世而人思之不能忘者豈非其躬行之善著在人心非一朝一夕乎公之事上至誠悃愊職所當為鞠躬盡力惓惓丹𠂻未報恩德至於臨沒感荷益切公之存心惇厚平直襟懷坦然洞逹明白公之於人寛恕隱惻恒務利濟不宿怨隙所存所施如此故不間貴賤聞公之逝皆錯諤愴怳不能自釋而况同朝有年相知之深相好之密其不痛心衋焉者乎於乎哀哉永絶來覿過公之故居酹公之靈席公乎有知鑒我中戚尚饗祭梁用行典籍文惟靈有才有行士林老成遭遇聖明晚登侍近抱剛毅之氣持博雅之論鏘璆琳之詞振鍾王之筆展乎翰苑之華也比當三考言詣北京曾日月之㡬時溘飄風而長逝某等叨同寮寀交好有年瞻對靈筵奠此盃醑於乎疇昔之日尊爼談詠風流醖藉恍兮如夢傷心可言靈其有知鑒此哀愫尚饗祭金尚書文維永樂十四年歲次丙申正月甲午朔越二十有九日壬戌具官某等謹以柔毛剛鬛清酌之儀致祭於故兵部尚書兼詹事府詹事金公之靈於乎公為國之重臣縉紳之領率方踰耆指使之年曷奄然遽沒也公於事上恭勤小心終始一致懇懇慎密也公輔儲君孜孜盡誠知無不言言無不見恱也公之存心寛厚惻隱惓惓濟物也公之臨事度義而行柔不茹而剛不屈也公之胸襟坦夷平直無有町畦表裏洞逹也所存諸心施諸事如此故無間貴賤皆聞訃而驚怛也况某等素同事而相契詎不心傷而慟切也瞻對靈筵幽明永訣跽薦一觴中焉惙惙也尚饗祭畦樂先生文維永樂九年歲次辛卯九月己未朔越三日辛酉姻家生奉直大夫左春坊左諭德兼翰林侍講楊士竒謹遣姪弼以清酌蔬菓之儀致祭於故畦樂先生梁公尊丈之靈於乎族姻老成凋䘮殆空猗惟先生歲寒松栢鄉邦文獻逝者如許猗惟先生靈光在魯丱角從㳺童子請益融蒸披拂和風麗日六義有作鳴玉鏘金童子何知謂得我心凡厥有作傾倒恵告謂我小子庶㡬可斆提携引掖期我深至駑蹇弗良慚負公意我仕於京寒暑十遷及公冢嗣玉署同官公來就養蒼顔白首歡言從嬉謂昔未有無㡬暌違恵問屢下孰知一旦忽墮凶訃我聞初驚懷疑恍惚孰知竟然哀哉永訣於乎先生忠厚端㓗博學篤行民之蓍龜士之凖繩家食于于豈曰在下有子奮庸道施丕著於乎先生玉藴山輝珠潛川媚鄉有令徳光昭當世指南不作㝠行安之賢哲云謝後生何師我於先生匪直斯哀世好之故俾承方來孰知先生遽此終古緘辭致哀以奠盃醑尚饗祭陳孟京文於乎自我外祖暨我舅氏晦跡韜光脩徳累行以至於今日則夫掇髙科都重祿享壽考者固於理之宜然匪自命而可必何在於己者可以勉而至而出於天者不可以强而得既登榮於進士曽未㡬而遽沒豈理固有所難忱而命亦何可以詰耶於乎祿弗療貧年始踰壮𣺌鄉園於千里載靈輀以南上泣妻子於脩途慟老母兮在望行道者所慘目而酸鼻相知者孰不嗚咽而悲愴也惟我先母實爾之姑母氏之故親好孔孚比來京師益篤弗渝靡愆弗繩靡箴弗俞所期逺至豈直斯須我縻於公暌離㡬許孰知此别遽隔終古病不徃視行不出祖兄弟孔懷摧裂心腑緘辭致奠淚下如雨於乎哀哉尚饗祭羅􅋒文維永樂十二年歲次甲午五月癸酉朔越四日丙子鄉貢進士羅仲弁以疾卒於京師其執友楊某屬病不能弔哭而仲弁之柩将歸塟故鄉以廿一日癸巳啟行先日特遣外甥康榮以清酌庶羞之儀祭之而哀以文曰於乎仲弁其學将以掇科而致身其智将以審機而周物其才将以濟當世之務其年曷未壮而遽閼於乎仲弁子之命耶其非命耶子翹然而秀出也孰不望其凌青雲而翺翔庶有立乎明時兹發軔其伊邇奄長往而不來又孰不嗟惜而傷悲哉於乎仲弁父母六十而哭長子子生五年而哭慈父老者嗚嗚㓜者呱呱蓋行道所不忍矧鄉䣊而親交者乎子來京師謂余執友往還契好逾久逾厚云何一疾遽爾不救余病聞訃痛心疾首子喪今歸弗遑送柩緘詞致誠奠此盃酒於乎哀哉尚饗祭楊長史齊菴文維宣德元年歲次丙午二月乙丑朔十有八日壬午少傅兵部尚書兼華蓋殿大學士宗人士竒以清酌庶羞致祭於長史民服宗長之靈曰於乎民服違濶㡬日一疾弗治遽焉永訣死生恒理逹者忘情而獨於子悲憤填膺子學與文子志與材丹穴五采桂林一枝素履貞操氷清玉㓗雖試弗閎中道摧折貪婪濁穢彼何人斯或富而貴而臻耄期於乎顔跖從古則有命之使然理胡可究於乎賢才治世之資凡人慟子夫豈為私矧我與子宗族之故聲氣實同相好有素於乎已矣來覿無期杳乎㝠㝠曷知我悲尚饗祭馬脩撰文於乎彦聲不見㡬日遽爾永逝耶余病家居而聞子病曾不信宿子之訃至矣人生而成也何其難及其亡也又何易耶於乎彦聲君子觀人舉其大而棄其細論其内而畧其外子之所存惇信重義秉執惟固莫之或敓子之所言心無背異凡是與非表裏一致子於當行奮罔疑畏不虞害傷豈憚勞勩直道而行惟已之志若遺外弗飭力儉以制雖或者不足於其細而知者謂不累其大矧賢科之選嘗冠於群倫詞苑之華多歴於年歲於乎彦聲孰不有死子雖死其何嘅余昔與子寮寀相契毎樂詠古人之言真顔色而好心事如何死别奄及于是泣奠此觴悲惜無既尚饗祭宗姪孫振文維宣德四年歲次己酉十月廿八日辛丑東里居士之族姪孫振為其家不能忍事而與鄉人競訟累振客死於京居士聞而深悲之蓋悲非振所自致也遣家人徃助棺斂畢十一月初七日己酉以庶羞牲醴祭之而言曰於乎振乎汝誠可愍汝本安靜心無嶮巇汝弟不臧累汝至此亦汝之命夫復何言其安汝魂往歸故土奠汝此酒於乎哀哉尚饗代英國公張輔祭彭士揚文維宣德六年歲次辛亥正月丙寅朔某日某甲子具官某聞彭士揚先生卒於鄉遂為位於先生之故居祭以清酌庶羞泣而言曰於乎士揚有徳有材有文有學其在儒林崐山良璞昔奉朝命來為塾賔相見如故相與彌真萬里南交屢偕于邁書記所託篤勤弗懈士揚有言必罄乃誠相益相好二十周星士揚䝉恩擢官太學曾不㡬時疾疢為虐賜告南還送行顇止别未及期訃音墮矣追惟契誼歴歴平昔長往不旋寜不傷衋故宇不易靈兮歸哉其鑒予誠歆此一巵尚饗祭表兄持志文維宣德六年歲次辛亥七月癸亥朔越六日己巳具官某遣長男某具清酌庶羞致祭表兄持志先生之靈言曰於乎昔我先公同産四人不幸先公蚤見棄背我生朞月何怙何知惟伯與姑愛我恤我伯父繼逝仲姑亦沒伯姑㝡壽皓首康寜善誨諄諄飭勵于肖惟兄與我實共承之曽不㡬年伯姑又沒姑子惟兄舅子惟我暮年萬里跡逺心親如何一朝兄訃忽墮至親之故曷勝其哀兄處山林安真樂善恬澹蕭散榮辱兩忘弟愚不肖竊時寵祿毫分靡補憂惕日深恒懷乞身侍兄終老兄不少待而遽棄子於乎哀哉抱憾何及緘詞致奠用寫中情尚饗祭兵部許尚書文於乎許公發身儒科歴事三聖爰自螭陛陞佐鴻臚遂貳司空積有年歳孜孜奉職恭勤小心逺而南交近而鄉國秉軺宣徳勞績孔多簡在上心進大司馬命書之下輿論翕歸夏官得賢邦政攸係如何踰歲奄告長終於乎許公坦易之資和厚之度闓疏練逹有讓有容愛公重公在人無間矧於余軰相與尤親交好之情僚屬之義遽成永訣豈勝傷悲瞻對靈筵奠此盃醑追惟平昔於乎哀哉靈其有知鑒此中懇尚饗祭封少保黄思恭文維公德性端和操履誠篤韞蓄弗施如玉在櫝有偉令子遭時奮庸歴事累朝褒封及公孤卿之秩殿學之職公實兼之寵榮隆極一品之祿望百之年玉帶錦衣白石清泉令子歸侍輝光桑梓天下顒瞻榮公父子一咲全歸焜煌天恩俯仰千載如公㡬人某等昔於令子嘗同寮寀公朝南京屢親手裁自時暌違十年於今引領東甌恒勞我心訃音遽來哀哉終古緘辭致奠隕涕如雨尚饗祭王行敏文於乎鄉邦近俗益靡少不事長而悖慢弗恭富不恤貧而貪噬無已凡耆艾之尊道德之師坐視恬漠嘿無一辭仁歟義歟胡寜忍兹於乎稼軒仁者之勇今而云亡寜不一慟稼軒之言理自心出惟正是好惟邪是嫉不以私比不為勢屈仗義持公徑情直發鄉有稼軒尚畏公義自今則無薄俗則肆稼軒之行有孝有弟稼軒之才足與為治而寜韜巻弗奮以仕蘭塘之幽有田有廬詩書與居耕耨為徒不渉榮辱豈識憂虞春秋六十翛然全歸在世無怍没奚憾為某等契好素深暌離則久聞訃驚愴永絶來覯寓辭致哀奠此杯酒尚饗祭王原采文維正統六年歲在辛酉九月甲午朔越十有六日己酉廬陵楊士竒敬遣清酌庶羞致祭於故翰林脩撰靜學先生王公原采之墓於乎先生之學聖賢是師先生之行綱常允持先生之心金石其貞先生之志霜雪其明浩然歸全乘雲翩翩我懷先生崇山長川桐川之藏既固且深遥致觴奠神乎其歆祭兄嫂康孺人文維年月日某甲子具官某謹遣長子稷以柔毛剛鬛清酌之儀致祭於從兄嫂康氏孺人之靈而言曰嗚呼孺人之賢有德有儀自歸吾兄雍睦以祇事長字㓜外内咸宜惟兄與嫂植家艱劬爰始來居理荒薙蕪有田有廬化瘠為腴子孫暨曾一堂歡聚吾兄春秋八十有五孺人今同諸福皆具嗚呼我母謝世兄與嫂尊兄之篤我貧賤弟昆兄亡仰嫂如兄之存自我别家歴四十春比歲始歸歸僅四旬拜違三嵗訃音遽聞嗚呼兄嫂俱逝家無老長往事疇訓後生何仰寄奠此觴庶其來饗代老妻祭梁學錄妻嚴氏文維年月日夫人郭氏特遣姪羅昇男楊導以清酌庶羞致祭於孺人嚴氏顒娘之靈曰嗚呼孺人館閣校勘之裔國子學正之孫親藩紀善之冢婦學錄叔荘之令嬪資稟之淑蹈履之循隆孝敬於下堂敦雍睦於族姻謂宜永齡福祉尚殷何其就祿橋門甫及一旬溘焉嬰疾遂殞厥身梁嚴暨楊累葉故親方幸兹之來集曷幽明之遽分聞訃驚愕感悼酸辛陳詞致奠聞乎不聞嗚呼尚饗祝文告先師心吾先生文維年月日門人外從孫具官楊士竒謹遣外姪孫陳清昭告於先師外伯祖心吾先生母舅孔碩先生及弟孟潔庶吉士曰士竒不天㓜罹孤苦仰賴先生恩訓庶用有成中心藏之沒齒不昧姪年嘗許以女某妻長孫昱深契所願而年蚤世未及定盟陳楊婚姻連續累代矧在師門又重母黨百年之好敢忘敬承爰循年志盟定今日伏惟明靈俯鑒祐之謹告告先祠文維永樂十年歳次壬辰四月乙卯朔越六日庚申孝孫具官某敢昭告於先祖考妣之靈曰惟我伯祖公辰府君實我先考諭德府君之所從出主伯祖之祀者自我伯父知事府君至我兄仲殷先生雖有承繼匪得其人某泝惟源本夙夜憂勤兹者仰賴祖考積德今年二月十四日生第二子名之曰种敬以為兄仲殷後上承我伯祖府君之祀傳系無窮謹用祭告伏惟尊靈永佑相之北京賜第遷神主祝文維宣德六年歳次辛亥二月丙申朔二十有二日丁巳孝男少傅兵部尚書兼華蓋殿大學士士竒敢昭告於先考少傅兼華蓋殿大學士府君尊靈先妣夫人尊靈曰士竒不孝奉祀之室弗底於嚴神用靡寜惕焉為懼兹循禮典外寝之東祗潔几筵是日之良恭遷神主伏惟尊靈永妥於斯以享以佑庇我後人仍以亡妻夫人嚴氏祔先妣夫人之下謹告初歸祭告家廟祝文維正統四年歲次己未三月己酉朔越十三日辛酉孝𤣥孫具官士竒敢昭告於髙曽祖考妣尊靈曰小子不淑仰荷祖考積德累仁慶澤遐被叨禄於朝三十九年無補於時受恩慚悚今年七十有五陳乞致事皇上大德俯念舊人不忍捐棄特勅還鄉展墓仍前共職兹者恭謁先祠追逺之誠不勝感愴敢以㓗牲粢盛醴齊祗脩明薦以諸伯叔祖伯叔祖母伯叔伯叔母暨兄祔食尚饗辭廟祝文維年月日孝𤣥孫具官士竒敢昭告於髙曾祖考妣尊靈曰欽奉上命歸展先墓恭已畢事弗敢滯淹兹當北旋明日啟行心念逺違不勝悲愴伏惟尊靈永篤庇佑俾全忠孝庶㡬無忝敬伸祭告伏惟鑒之謹告焚黄告廟祝文維正統七年歲次壬戌十月闕朔十一日闕孝曾孫光祿大夫柱國少師兵部尚書兼華蓋殿大學士士竒謹昭告於三代考妣尊靈曰士竒才鮮德薄仰荷列聖洪恩擢置近侍踰四十年位崇祿厚皆本於先祖考妣積德垂慶之所被及今者復䝉皇上大恩親賜誥命仍賜誥加贈曾祖祖考皆光祿大夫柱國少師兵部尚書大學士皆如故特恩追贈伯祖辰齋府君光祿大夫柱國少師兵部尚書兼華蓋殿大學士伯祖妣嚴氏夫人曾祖妣祖妣先妣及亡妻今繼室郭氏皆復賜夫人誥命光榮之重倍萬恒品恭惟尊靈歆兹天寵永賁無極重念士竒今年七十有八義未得退而益就眊惛伏惟尊慈昭垂庇佑俾予小子無蹈愆過庶㡬克終為臣之分以不忝先世謹告廖氏婦旌節門代奕孫告廟文維正統七年嵗次壬戌月日孝𤣥孫奕敢昭告於髙曾考妣先祖先考尊靈曰奕不孝不天生甫再期弟奐甫期慈父棄背零丁孤苦仰賴祖父祖母暨母廖氏撫育教訓踰三十年惟母廖氏志操堅貞同於金石有司上聞欽䝉皇恩特賜旌表今日之吉樹表於門感恩懽愉倍萬恒品皆由祖考積慶敷遺用克臻兹謹用祭告伏惟鑒佑謹告東里續集巻四十六
