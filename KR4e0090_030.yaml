body:
  text: 東里續集卷二明楊士竒撰記承恩堂記少師吏部尚書重慶蹇公居北京十有二年寵恩日隆而未有賜第所居吏部之東偏隘陋弗稱上聞之命有司度地長安門之東文明門之北為改作焉中官視材與工而堂室孰廡門墉之位皆先具圖以進其制髙明𢎞壯疏豁靚深潭潭焉奕奕焉既落而徙居之是日勑光祿賜宴六卿長二都御史咸在衆共瞻睹欣喜嘖嘖以為稱公之官稱上之待元老大臣也遂為公賀公曰上之恩義何足以當之義不佞惟上之大德同於堯舜惟天下億兆之人同於唐虞之民此義之心也惟七政昭明四序和均逺夷賓服海宇乂寧此義之心也所夙夜弗遑在是而暇萌其念於自康自適者哉矧聞之晏平仲列國之卿猶辭榮焉今上之大賜固不敢不祇承而寧無怍於心者哉又聞之范希文之為人臣也於日之行事必思有以稱其食今戴上之大賜其奚以圖報稱哉衆皆曰此大臣君子之心也君子之心行道於已者恆恐不及所得於外者恆恐過之斯以德日盛而功日崇也宜以為天下誦衆又曰公之德固謙讓弗有然立朝五十年未嘗一日不心在國家生民其密贊治化以被於當世者公不自言人雖不知天固知之矣公今七十雖老而未衰國家生民所望於公者未已也聆公之言知公之心於國家生民蓋亦未已是宜為天下賀且為公祝公曰義其曷敢不自勵於是皆知公有以當上之大賜也公既名賜居之堂曰承恩士竒請書客與公賀答之辭為記揭諸堂中公字宜之洪武乙丑進士為中書舍人升吏部侍郎進尚書兼詹事又歷進少保少傅少師仍兼吏部尚書厚德𢎞度巋然國之老成人賜第於宣德七年十月是月既望記勑書樓記皇上嗣大統之初一新仁民之政明勸懲之典於是戶部臣言宣德五年江西飢掌吉水縣事知州柯暹勸富民出穀以賑民胡有初首出穀千石而未有繼者復出五百石衆始胥效出穀縣人賴焉巡撫侍郎趙新上其事上嘉之賜璽書賜褒有初義民遣行人齎勞之仍命有司復其家有初既拜稽受賜作重屋若干楹祇庋璽書題曰勑書之樓謁余為記是嵗江西十三郡六十九縣皆飢而吉水旁近永豐樂安兩縣加甚其貧民跽富民之門求貸斗升活旦夕之命固閉不發則虓於外富民不能平以劫訴縣縣不究情遽移郡請兵捕劫者禍連數千人老壯相枕藉死妻孥纍纍陷囚縶哀動道路民不幸而遇水旱飢饉如幸而郡縣有善政鄉有仁厚長者猶不至甚病也向使兩縣其令得人如吉水其富民存心如有初豈被毒至此哉吾聞有初中人以下之産顧其用心矜惻無物我之間施厚於鄉者非一日其度越等夷逺矣惟天子體天心以仁民惟臣體君心以致其仁於民有初未嘗霑一命無人民之寄斯舉雖有縣之令要之其能仰體君心使天下富家巨室皆能仰體君心將窮櫚蔀屋豈有失所之人哉此有初所由昭受旌褒也戶部既敷告其事於四方將史册亦有紀載若璽書所藏光氣上騰輝煥五采仁山文水之區草木泉石咸被照耀於無窮惟德音忠厚大訓在有初及其子若孫尚永欽承於無斁敬書以為記宣府建廟學記先王之世大臣君子皆身兼文武之用至霸國簡帥猶取恱禮樂而敦詩書者蓋古者習射受成獻馘皆於學文武一途也自周以降王化衰而教法弛服詩書者耻言兵執干戈者不聞道而岐為二焉然具文武之才者世未嘗乏人漢唐宋儒臣往往出任邊寄而武辨所至能興學崇教者史屢有書我國家治教天下一用先王之法自京師至海隅郡縣皆遵明詔建學校學皆有廟以祀先師若邊徼軍旅防戍之所非直其力有不暇亦其知有不逮也宣府古上谷郡在居庸西北三百里雖密邇畿內而城垣外纍纍接連皆烽堠編氓之所不處敵人之所不時出沒窺竊蓋重塞也朝廷常宿兵戍守而建帥焉其帥既不可斯須以忽警備而肆習邏伺捍禦糗粻之務晝勞夕勩自給不足矧有餘力他及哉自左都督談公佩鎮朔將軍印總師於此畢力殫慮圖惟厥政整飭作新期月之間贍養有出兵堅士強既完且固聲威𢎞振冦迹逺遁疆場千里纎塵不作遂作社稷山川等壇春秋行事數歲軍中庶富壯少勤事耄倪恬逸公曰不可以無教也即白於朝出私帑為倡建學而好義者咸協贊之遂簡將士子弟俊秀者聚習其中奏請學官建先聖廟于學之左像位咸飭作祭器置學田凡百所需靡有遺闕既成之明年士竒扈從巡邊經宣府祇謁廟堂退即學館徘徊顧瞻規制之𢎞壯儀物之完具蓋自大江以北名邦會府鮮有及之方歆艷嗟歎談公之功於今絶無而僅有而公使教授劉凖求書其成夫王政之本在養與教有遂其生必正其性談公起武功而重文教非其逹政本祇德意而能然哉公之賢超越等倫逺矣將見是邦教學之成其人皆明於詩書之旨皆勉於道德仁義之行事親為孝子事君為忠臣廉耻之節厚功業之志奮而髙城深池不足為其固甲胄干櫓不足為其威人心之堅踰於金石矣又將無感慕德教而革心歸化於隂山瀚海之外如有苗之至者乎此固本於上之大德而必公之賢績有以弼成之也公名廣鎮江人忠厚仁勤明於大體自洪武中建軍功歷事四朝纍官至中軍都督府左都督在宣府十有餘年威惠咸著隱然國之長城云廟學經始於六年三月成於八年九月記作於九年十月其殿廡堂齋器物之數及創建協贊者氏名具刻諸隂使來者有考董井記金華何士英為兩淮鹽運使運司廳漢江都王相董仲舒故宅其遺井尚存士英考郡志及詢諸耆舊而信遂修葺井而作亭其上又於廳事之後作堂設仲舒位朔望必率僚屬致敬四方士大夫過江都知慕之賢者必升堂而拜造井而觀又退而竊歎士英之能尚賢也自孟子沒異端之説競起逮秦焚滅經籍盡廢先王之法而聖學遂湮漢興知崇尚孔子諸儒往往有出而卓然醇正者惟仲舒如論道之大原出於天強勉問學則知益明強勉行道則德日起與夫正誼明道之言皆有功於學者論正心以正朝廷百官萬民四方及有國者不可不知春秋皆有功於世道君子謂使仲舒得遊聖門無慚遊夏仲舒孔子之徒也自漢以來孔子之道晦而復章自仲舒始仲舒廣川人孝景時為博士武帝即位舉賢良對策天子恱之以為江都王相後相膠西王史稱其進退容止非禮不行兩相驕王數上諫諍而正身以率下此豈徒見諸空言也哉洪武中升仲舒從祀孔子廟庭表先儒以儀來學也則其生之所居遺迹之所在士誠尚賢者其能自己乎詩曰髙山仰止景行行止知尚董子其必心其心而道其道哉廣川今德州余嘗過之訪仲舒故迹無復存者顧時吏兹土者無可與語而德州之人亦不復知有仲舒獨江都尚致敬有所者由士英也士英宋文定公六世孫清厚恭謹明達大體為運使十餘年設施有方江郡吏民及過使客交譽之如出一口相斯舉者運使白琛同知張翔盧亮後之繼士英諸君之位者尚思繼其績哉日省齋記日省之言始曾子蓋君子以自進其德也人之品不齊非生知之資者必由乎學學必切於已而後其德進孔門明睿莫如顔子誠篤莫如曽子皆實用其力故四勿之功不已有以造亞聖之域三省之誠無斁有以傳聖人之道聖人譬諸天地之大造化之妙不可窺測故學之必自顔曾始顔子天資絶出曾子惇厚質實蓋學曽又易於效法云自教道衰士習騖外忽內窮居布素之士無富貴之念不肯自棄於古人而力行以圖跂及者一世無幾人若都髙位享重祿貴富光顯而能從事為已之學以古人為師者加鮮矣今貴富而能然者蓋見於駙馬都尉趙公公為國周親而所存心守身顓顓焉如逢掖士朝請外齋居讀書玩古不肯輒一涉迹聲利之區而恬淡謙約之道率履恆恐不及題其齋曰日省以自勵省者求己之道所未至者而必至之日省斯無間斷作輟之患公之愛其身厚矣哉水之行不已也必逹于海如公篤是道不已而不徒名焉由是續武古君子其孰之能禦哉或曰公所務者保寵榮全始終若子所言拘拘儒生之事矣曰公所務非儒道乎儒道大而君臣父子之倫小而作止語默之義皆是已非外民生日用以為道也使公外儒道其能保寵榮全始終乎公聞之曰乃所願學儒道也請書以揭諸齋中用警朝夕公字孟陽廣陵人其祖考在國初皆以武辨積功云克一齋記太醫院判蔣君名其藏修之居曰克一屬士竒為之記士竒曰古之人為主一之説者衆矣管仲荀卿莊周韓非之徒皆有是説也子之取義也何適蔣君曰非也之數子者或商國政焉或議物理焉余敢有取於是哉惟先君子所以命我者曰人非學則道不明故學貴博既博貴知要夫德有吉有凶必主於善乃恆吉也既以主善名我矣我惟服膺先訓博而求之也又圖惟約而會之故采書咸有一德篇之語而揭之以朝夕自勵焉士竒聞而歎曰賢哉乎父之愛其子也賢哉乎子之愛其身也孔子定書自精一執中之外惟此數言最為精密惟一斯純而無雜久而無息惟一斯無不善而克一固當在我也蔣君揭諸所居而朝夕對焉其顓顓乎自勵可知矣奚假於余言且克之一旨儒先君子言之明且備矣歸而求之有餘師亦奚假於後之人之言哉時有誚於列者曰書之是篇古大臣君子以告其上者也而子以自勵乎士竒曰子之言非所謂自棄者歟穆清生人畀之明德豈有崇卑貴賤之間吾惟天所畀我者弗之能修而荒逸是懼吾尚何恤且聞之朱子吾於書惟見堯舜禹湯文武之事皆切於巳也此大賢所以教學者也若子之言不甚戾矣乎蔣君曰嘗聞之父訓者亦然請遂書以為記蔣君天資純篤表裏無間與人交悃欵始終本於生質之良其亦有得夫一之旨哉其父靜學先生以儒醫起家仕於朝幾三十年沒贈太醫院使賜諡恭靖古稱是父是子吾於蔣氏見之聚奎堂記宣德二年春太子少傅工部尚書兼謹身殿大學士建安楊公得故廨宇於長安門之南而修葺之周垣數百步凡屋四楹制度簡朴梁柱不斫編葦覆茅塗塈潔素間而三之其中為堂髙明靚深南楹北戶疏暢洞達東西二室左備偃休西􅍥圖史庖湢具於兩序卉木之秀環列前後四顧虗曠埃壒之影車馬之音邈不及宛然郊郭之外髙人逸士之所栖託也置僮奴數人酒壺茶竈與奉賓客之物恆具公之意蓋將朝退之暇及其寮寀遊息於此以適夫蕭散之趣也既成會上臨軒䇿士其第一甲三人皆授職翰林馬愈修撰杜寧謝璉皆編修於是館閣諸賢相與置酒堂中為三人賀主獻賓酬觴行甚樂有言於列者曰斯會斯堂誠稱古之人名其居蓋有因事而志喜者請名堂曰聚奎何如衆皆曰然少傅公屬余為記衆皆為詩夫奎西方之宿十六星與璧相比談天者類曰奎璧主文章而圖書祕府也今則吾徒之職守在焉國家選賢非一途而進士科為重自洪武辛亥至今五十有七年臨軒策士十有六所得士之賢者濟濟中外有光政治之任而擢承明著作之庭者又皆當時之極選也今聖明在上丕闡文化斯民生遂四境晏然太平盛致也吾徒得以間暇宴適於此千載幸遇上之賜固士君子所不能忘而升斯堂也於少傅公之所以自致亦未可忽哉公自登髙科歷事列聖幾三十年未嘗一日不在天子左右其文學才猷所以禆益聖治者愈久而愈勤故天寵愈進而愈厚詩曰夙夜匪懈以事一人少傅公有焉然則公祿爵之進尚未已也而凡在此者有心公之心將繼起而光大亦未巳也三年一大比賢才之出當益盛則相與如今日之宴聚斯堂亦未已也吾雖老尚屢見之哉素軒記右軍都督沐公奉命佐黔國公鎮撫雲南公字某黔寧王之子國公之弟雲南自歸職方黔寧奉命鎮撫國公繼焉今公又膺贊輔之命父子兄弟宏謨逺略德懷威服邉人戴之如慈父母五六十年西南諸夷靡然歸化纎塵不作朝廷倚之為重者沐氏之功也都督公恭和端厚好學師古雖共武服而重文事雖出勳戚之門而禮賢下士祭潁陽之雅歌投壺羊叔子之輕裘緩帶風度兼之其燕居之所題曰素軒間使其客屬余為記客之言曰室之制儉朴明敞無雕琢之施無藻繪之飾無綺麗之欲凡古聖賢經傳及歷代之紀載百氏之述作購積無遺而楮穎琴瑟之類所以適性情娛賓客者亦靡不具此軒之所儲也軒之中未嘗有浮人佻士一迹之至而布衣懷道秉德方聞博雅之流相與討論義理商確古今或焚香彈絲或尊爼吟詠則未嘗一日無也若公政務之餘顓顓焉用其志意上以副國家之隆委下以答黎庶之顒望而求悉當夫道靜慮而沉思又未嘗不在兹軒也余聞客言曰嗟乎即其所儲知其所資即其所與知其所輔而靜之所思惟即動之所設施可知蓋莫非君子之事也都督公之賢夫孰之能禦哉昔周文武之興召康公為國楨幹逮宣王之世穆公嗣焉見諸詩人江溪之咏今黔寧之勳上儷康公黔國之績亦配穆公又有都督公之賢方益懋於君子之事將其功業鑑訇炳耀豈獨父兄之榮蓋邦國之光且昔之人之所未聞也不其盛哉客聞余言喜曰此足以復都督公遂書以為素軒記勑書樓記禮部儀制郎中劉孟鐸中書舍人宋懷以其婚家廬陵陳謙來見曰願有請也謙宣德乙卯之歲出穀千二百石助有司賑飢事聞於上特遣行人齎勑賜勞旌為義民謙拜賜遂作樓奉􅍥勑書伏竊思念樓必有記庶幾昭上恩於永逺幸執事之畀之也士竒叨在近侍親睹皇上嗣位以來富家巨室以出穀助賑承旌褒者畿內及江西浙東關中河南山東西纍纍繼起日增月益不可勝記兹惟皇上奉天子民以不忍人之心行不忍人之政仁被天下而天下之人仰體上心競起效助皆如川之赴海然者聖化感人之速若此其盛也旌褒之命肇自皇上臨御之初下之霑被始於吾郡而覃於四方蓋善者旌之好善人人同情歆豔興起夫孰之能禦哉陳氏斯樓之作固宜有記陳距余家不百里世有德善余嘗書其寧國府君之碑府君蚤有大志兼文武才元末草昧僣奪之際能卓然保其鄉族以歸我太祖皇帝一見遽承奬任功著於時及於人一時吾郡之效用者莫或先之蓋其心於國於民未嘗一日遑暇雖其年不永而所以教於家者固在也其子致廣遵父教持身謹行用仁其鄉今春秋踰七望八矣恆見禮於守令謙之父也謙斯舉固由於聖化其亦必有得於家者禮以繼志述事為孝謙可為無忝矣夫記者所以紀前績而啓後人陳氏子若孫升斯樓也仰瞻龍章輝煌思天寵之廣大而圖報稱讀余之文思祖父之仁義而務繼續將陳氏之賢而有聞其可量乎是為記進修齋記中書舍人天台陳宗淵取大易文言之旨名其齋居曰進修宗淵從余於翰林二十年始求為記余戲之曰子春秋六十矣髮種種而視茫茫且其身旦暮有職事尚奚暇於學乎宗淵蹙然曰惟先人所以遺教其孤俾終身從事焉者惟學又嘗舉先聖賢喻誠之旨訓其孤曰學之道必由於此濬惟是孳孳夙夜不敢怠忽先人之貽訓以圖奉其遺體庶免於不孝亦冀以是承大君之命官而永終不辱也濬一息未絶不敢以惰棄而况於雖老未衰衰而不勉可乎余為之敬歎曰賢乎宗淵夫學所以明道而見諸行也學可以為君子不學流於小人之歸善惡所由分也誠者實理出乎天者也人體之為實德天之有是理也萬物所由生人之有是德也百行所由成故學者必立誠以為之本而人之大端言與行而已學之道亦必謹是二者而本諸其內者真實無妄則發諸言語動作之間亦皆真實無妄而表裏始終無虗偽作輟之弊矣乾九三蓋君子之未離乎下者也有學之道焉故孔子明之以進德修業而又繼之忠信所以進德修辭立其誠所以居業德即夫心而言業即夫事而言非內積忠信無以致其德之日新不巳也非擇言篤志無以致其業之一定不易也所謂學必兼內外之功而誠則其本也學而誠其有不至焉者乎孔子喻學於易之首篇明著切實如此固後之君子所宜盡心也嗟乎聖人之訓其孰不誦習而能言也古之人有云行之惟艱夫茍出乎誠亦奚艱之有宗淵名其齋以自勵其必致力於誠乎吾於是重宗淵有四善焉老不忘父之訓一也老不忘學二也貴不忘學三也學不戾於聖人之旨而其實本於父之善也皆可記也遂為記將以考其終云其父字智仲有行義宗淵其嫡長云益庵記為學之居而名之以自警其進者其志固將充而大之也蓋士於道欲充吾之智而無所不知欲達吾之材而無所不能酬酢萬事措之天下而無不宜不若是不愜也而非學何以能至哉學之而進進不巳其亦庶幾也巳吾邑蕭薦之名其自修之居曰益庵其志固將充而大之乎薦之於學敏而勤於所至必欲至之而不徒輟於所與必擇加於巳而非不若乎已者恆持虗薄不足之意以求益焉大抵學足於巳得則日新之功畫久而併其所得者失之故善學者愈損而愈益宜薦之之不自己也吾識薦之之大父惟善甫謹厚樂義二子伯齡仲齡皆英敏不群伯齡升自科目典郡學至寧波府同知顯譽於時仲齡以養親為志奉侍之暇怡情雲林泉石之間淡然不以榮名纍其心兄弟皆余少所同學仲齡薦之父也固其源流有自而薰炙有資乎今薦之以益庵求余記余言何足以益薦之夫學在我而所以善其學者必資於人海之於川澤莫或加其大者為其下而承之以虗有以來夫衆委之輸也士而有謙虗卑遜之德則天下之善沛乎歸於我不然局於偏見蔽於私意雖有善而不能入孰於我乎益也易書論語益之義明且備矣必有以盡乎已而後有以愜乎已勉哉薦之余言不足以益子也然薦之求余記益庵為之記曰益庵在泰和邑城之西秀溪之北其面巽震其作以某嵗月作而居以學者蕭氏名進永樂十六年賜同進士出身今為藤縣令云巽溪記吉水楊季琛先生家巽溪之上以巽溪自名鄉人後學之尚德者從而尊之曰巽溪先生有疑之者曰先生居文江之陽文江聞天下不取於彼而取於此何居余曰文江所同也巽溪所獨也且巽之義有君子之德焉取諸近者且以植德宜先生不於彼而於此也曰先生之行有合乎巽之義者可得聞歟曰巽東南卦也有長養之德焉孔子繫辭曰剛巽乎中正而志行先生存仁愛之心具剛明之才履中蹈貞自其少壯己有志致君利民之務其本固已不倍而平居蒞事理明義熟小心謙順未嘗形聲色而裁制一協于中此不幾於稱隱行權者哉其仕也事上篤忠敬臨民致惠愛所至人戴之既去思之久而不忘所謂無入而不自得非利有攸往之徴乎君子名必稱其情夫豈茍然者乎曰若子之言先生之賢楊氏其將有重於巽溪也曰楊氏自宋盛際居文江其世以文學德善髙科膴仕大忠大節煒然世道之光蓋不徒重文江大江之西之重也巽溪云乎哉且先生所為自厚於己亦何暇計其於溪輕重何如也疑者既釋曰吾因子以知先生又知夫巽之義至矣哉先生長子黻聞之請遂記斯語將藏之余不能止也先生洪武中舉文學贊邑於浙永樂初用薦者升南海知縣改濟陽縣又升東平知州改莒州洪熙初言於朝乞致其事歸不聽升衛府長史俾導其子輔親藩黻舉進士為監察御史簡升長史文行卓然蓋觀黻亦可以知其父作巽溪記慈訓堂記慈訓堂者吾邑彭詡士揚奉其母劉孺人之堂也奉母而名慈訓者詡非母訓無以起儒術紹先業名之蓋著所本示不忘余於彭氏世有連而相知於是詡來求為之書彭故西昌名家宋寧宗朝獻賦不受官而與周文忠楊文節謝艮齋為文字交曰孝求者其九世祖也孝求之子孫世襲儒業至今不衰而原復居貞履素不屑意生事詡之父也劉氏系出漢長沙定王發後有諱尚者為泰和丞因家萬安之東溪其子孫益盛至本直惇質素有古道孺人父也孺人歸原復十年而原復卒詡尚幼就學外傅蚤夜躬程督於內數指笥書語詡曰而父以是遺汝俾承家不辱者奈何可怠詡間自外歸輒問所從誰何及其所得當則喜不然蹙額以戚曰此非吾所願聞也詡稍長有導之為賈販者聞而止之曰士固窮利其可趨乎益戒以親明師益友詡弱冠鄉人請為孰賓勉之曰學譬於井焉非源厚何以應人之求其母淺近自足也蓋詡自幼至壯自始學至於立身皆本於孺人之訓也孺人涉書知大義自少至老謹禮不懈幼喪母育於嫂氏恆事嫂如母夫死時年二十六即誓守節不嫁其父九十餘而喪子無為供養者孺人歸寧遂留養父詡亦假館授徒外氏以如孺人之志終父沒然後歸其孝類此原復嘗長徭賦里中以民稅輸贑贑江險惡壞舟悉沒所輸稅巳而原復卒有司責輸稅益急他里之輸稅既沒則復徴於民孺人獨傾其家資償輸里民免於復徴之害其於義利又類此此蓋孺人之以身為訓者也夫至愛莫切於母之於其子也為訓如此子有不賢乎哉古大賢君子成於母之訓者往往書簡册名後世今詡日進於道周旋儒林藝苑之間聲聞日起蓋所至未可量也則於斯堂也推本宜書孺人今年六十有六詡四十有七堂在泰和西郭三里月池之上彭氏世居其處云正巳齋記廬陵陳正倫余畏友也為監察御史時名其燕處之齋曰正已求著一言未暇也及九載之績考最升南陽知府又求之未有復也蓋念正倫修諸躬措諸事鮮不當於理奚俟豫言正倫且行工部郎中李新與之有同朝之雅且南陽人又求豫文贈之則為之畢夫正已之説曰士君子一身其所係甚重上而祇事乎君親下而應接乎萬事皆當為法於天下可傳於後世此非正已而能之哉身者家國天下之本身不修不可以齊家况能推而逺之哉昔者聖人為治莫盛於堯其道始於克明俊德聖人為教莫盛於孔子其語九經必先修身聖人之行與言皆本於身則吾之身其可以忽哉吾一言之出皆合乎天理之正而無妄一行之出皆合乎天理之正而無邪積之久習之熟斯發於身者無不正然理欲之微非精察明辨或所蹈未必皆正故君子於為學未嘗已也得其正矣而悠久之功為難非一內外貫始終則或有厭倦作輟之患故君子於主敬未嘗息也要之德本於身身本於心心者吾身之主與天地參而為三者也學以明之敬以持之斯其身正矣以之處事而事當以之處物而物化蓋古之大賢君子無不用志斯道正倫吾同郡人永樂十年豫校文禮部時所選進士求諸吾郡及進士中有持身謹行如正倫不多見也而有志自進如此吾安得不致夫逺大之望哉伴菊軒記永樂十九年郴州知州天台陳伯傑年七十以考績在京師嵗春二月夜夢賦詩有種淵明菊伴幽獨之句既覺而喜以告其友趙府長史趙季通曰吾其遂退乎夏四月詔吏部凡中外官年七十不任事者聽致仕伯傑既拜命將歸又顧季通曰吾以伴菊名吾佚老之居矣季通以豫嘗聞伯傑之為人屬為記之夫夢者精神之所感而有其應焉周禮大卜三夢有致夢占夢所掌六夢有思夢皆出於思也而有其應則非偶然之故矣夫人強壯則出事事及其老也衰倦不任則思退焉以休此人之同情然有不能皆得者矣伯傑清修苦志泊然其中不為外物動而局蹐下位者十六七年薦其賢者歷十餘人始得郴州居郴二十有三年愷悌仁厚之德淪浹其民雖古循吏何過也則今之榮命亦天之所以厚於善人君子歟而優遊兹軒天氣澄爽之際玩嘉菊之秋芳對南山而清詠景與意會悠然塵氛之表伯傑之有慕於陶者庶乎得矣若仕而有民之愛焉退而有君之澤焉當世之士有慕乎伯傑而未得者其情何如也孝友堂記廬陵蕭仲清氏蚤喪父偕其二弟叔寧季靈敬養其母而兄弟相與怡怡又有以適其母之心寖有聞於人安成周子冶先生名其堂曰孝友以表之且勵之於無巳也仲清間請侍讀學士曽公求為之記余前未嘗識仲清兄弟學士公之言曰蕭氏之先由金陵徙長沙又由長沙徙廬陵而家於郭溪之上代有顯者蓋南宋以來有文紹者為長沙太守其子曰子才為蒼梧太守後有為斷事官為學官纍纍不乏文紹九世至克昌仲清之父也所從來如此固詩書德義傳襲浸漬非一朝夕矣夫孝友者行道之所始也人之至親曰父子其次兄弟孝友所以善父母兄弟之道也必能盡是道然後上而事君下而處友近而宗族鄉黨逺而邦國天下皆由此而推矣然此理人心所同有非自外至者唯氣稟不齊加之聖人之教不明於後世於是有失其良心甚者至貽借鋤鬩墻之譏故有卓然惇行斯道則見重於國家見愛於君子蓋褒德勵俗而以為斯道計也周先生於蕭氏斯堂之表非君子之用心乎然吾廬陵江右之鄒魯也詩書禮義之俗忠節孝友之行載史册聞四方其來逺矣於父慈而子孝兄友而弟敬皆以為當然且今聖明在上屢垂大訓於天下吾廬陵之人敬承佩服宜獨先於衆而豈有作輟之意尚勞君子者之勵之哉而君子為人謀必慮其終而要其成者蓋忠厚之意仲清兄弟亦必有以副周先生之意也以是復學士公為蕭氏堂記東里續集卷二
