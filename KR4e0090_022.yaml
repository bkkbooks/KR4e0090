body:
  text: 東里文集卷二十二明楊士竒撰傳胡延平傳胡延平名壽昌字子祺以字行歷官至延平知府有善政人敬之不名字之故稱延平云延平吉安吉水人宋資政殿學士忠簡公銓十世孫父某生延平時其夕有大星墜舍延平自幼已屹然負巨志初受學同郡龍原同吳莘樂兩先生皆愛重之吳先生以女妻之皇朝兵初已下吉安而新淦冦猝至民陷于脅從者千餘人冦去總戎者恚將盡殺千餘人延平曰吾不可坐視即謁總戎言從冦非民所欲不可盡殺將軍奉命來為弔民耳今不察輒盡殺千餘人失民心矣總戎者悟盡釋千餘人不殺洪武三年詔郡縣舉文學士縣令丞舉延平應詔既集京師尚書考察最上者得十八人以進延平與焉是日太史奏文明之祥上喜曰唐太宗一世文學士十有八人豈若朕得於一日哉皆以為御史即臺賜宴延平數言事持大體不肯瑣瑣茍有陳説嘗上書言今國家宜徙都關中據古今説事情纍數千言未幾朝廷得廣西簡近臣往治之上曰前上書胡御史其人達於大體可遣也授廣西按察僉事延平至廣西問察民瘼遇罹于法者必有哀矜不忍之意時尋適為按察使持法嚴急屢出語諷切同僚延平獨曰法貴平嚴失平矣不為動行部慮囚必平氣悉心訊之使盡其情即服辜猶三四覆訊不厭曰是欲其死無憾也故所至獄議殊死以下不當者咸得直融州石刻有元祐黨人碑立命碎之三年改知彭州益務修惠政利民灌縣故有都江堰秦李氷所鑿渠引江水溉成都諸郡田兵興堰壞諸郡田悉蕪廢前之繼修堰者必伐石錮鐵費動以萬億計至是堰壞衆難之無敢復言修堰延平至曰土木可以固豈必鐵石哉即為畫白于府轉白省省難之延平再三言言益剴切省乃聞于朝從之命下省以委延平而責成焉延平曰得二千人足矣悉疏決淤塞度所用伐竹為籠實以沙土又伐木貫籠並緣窒堰岸江水乃復溉成都諸郡田民大利之延平書其法于牘以貽後人又修彭州堋口諸堰盡溉彭之田初堰廢井泉隨之竭民率苦出負汲十數里堰復民乃復便井飲始教民知學民益知延平之愛己也皆聽服其教居三嵗獄無囚先之流亡者聞州有賢侯相率來復故業終延平去州民户及賦入之數視初至增益數倍時彭兵禍解未久野暴白骨彌望悉命收瘞之是夕夢人羅列拜堂下者不可勝算庭故有枯槐數十株延平至皆復榮又有羣鵲來巢時下馴近人及延平將去羣鵲噪于庭數日去乃已三年升延平知府其惠愛一如彭州時察郡政有病民者悉去之廳事側有淫祠數為妖前知府徙舍避焉延平命毁祠更作室其上居之妖頓熄益修飭學教躬勵士子築祠祀李先生侗務以禮化民期年百廢悉舉民皆敬信焉忽得疾數日猶視事不輟左右曰公宜少休延平曰一息未絶曷可以怠君事一夕其家在吉水者復有大星墜舍是日延平沒于官洪武丁巳十二月也年四十有五郡之人為罷市奔走泣弔如喪所親延平二子長曰直次曰廣今為右春坊右庶子兼翰林侍讀贊曰余家距延平所居僅百里又姻家王子啓先生與延平同上京師為御史同為廣西按察僉事又同入蜀為州守余以是多知延平事延平為人長身魁梧偉然而莊重不可犯其初至廣西廣西人望而畏之及承所設施則皆愛之以為父母後遷延平延平人已聞其寬大長者而初下車其豪猾之民巨姦之吏亦皆竦然斂迹矣夫嚴不病下寬不宿蠧延平專任德意何嘗不威懷並著也余故具列其行事以傳於世知事府君小傳知事府君諱清字子肅姓楊氏號溪園漁灌洪武庚戌詔改泰和州為縣御史劉昭先知縣事首以明經舉送京師授松江府知事松江繁劇聞天下初到官知府以下咸迂視之府君敬愼恆旦出治事暮乃息而處同官馭下吏一以誠意人不忍欺之皆為之盡心雖公牘日纍百計未嘗滯積蒞事務寬恤知府以下或發之過急必從容進曰為民父母不能少緩之乎聞者愧服自是有欲為苛察者恐府君聞即止亦多有德之私竊相謂楊君賢者其助益我以君子也嘗行縣督賦民相勸告此長者吾屬可不勉力而貽譏纍乎稍暇輒詣學官為諸生解析經義滿三嵗遷福建鹽運司知事運司無大繁劇而府君勤愼一如松江時其長官尤賢之嵗餘坐纍謫廣西道卒小孤山下府君少孤貧養母夫人至孝與先諭德公友愛尤篤先公沒晝夜哭久不已撫其遺孤甚厚襟懷坦夷寬裕於人無怨惡不以僻隱而墮其所守嘗行道失足損人一雞時旁無知者顧從者取百錢置雞側而後去安泊素居官服食一如布衣時雖亷潔不務為名沒之日家無一錢所著詩文有溪園餘間録宦遊藁藏于家退菴府君小傳府君諱卓字自立一字子淵楊氏父觀山先生篤行為西昌碩儒以書詩春秋教授學者府君既傳其家學聞永豐劉于先生邃於春秋又從之卒業遂以春秋名家自少至壯雖盛寒暑及兵戈冦亂之際書册未嘗去手夜誦率達旦博記精思蓋於書無所不通洪武庚戌中江西鄉試第七人明年會試第三人廷對第二甲第一人授吏部主事踰年升廣東行省員外郎嵗中坐纍謫鳳陽屯種復起為禮部主事數月改杭州府通判援例去官府君儀度魁偉整肅儼然人望而敬之家貧清修苦志確乎不可援而於為政行恕有豈弟君子之風焉在廣東時有周參政者苛刻不可近兵卒二十人入山伐木兩卒山下邂逅婦人獨行曵入道傍林中欲亂之婦人怒罵不得亂即共殺之婦家蹤迹得尸盡疑二十人者所殺訴諸行省悉捕至周親鞫之竟夕拷掠不勝皆引服吏抱成案屬府君署府君閲案曰殺一婦人安用二十卒往白周周艴然曰員外欲縱殺人賊乎悉付府君鞫府君列之庭下視其色而聽其詞指兩卒語曰殺人者汝也即吐實伏罪徴其所用殺刀斧驗之皆是十八人皆無罪周問員外何料事之審耶府君曰二十人其存心宜善惡異也如皆在即不能亂况殺之乎餘杭民兄弟爭田各有私親持説主之纍嵗有司不能決府君至悉屏其私親獨召兄弟兩人導之同氣友愛之義曉譬深切皆感悟弟曰實兄之田我妄意爭之我不義也請不敢復爭兄亦曰弟貧寠我不恤之致為此我之不義請以田與弟竟與弟其明決類此所歷官皆繁劇躬勤蒞之未嘗有滯事寅出酉歸歸輒閉户秉燭讀書率夜盡二鼓始寐罷官家居號其室曰退菴杜門却掃維經籍研覃自娛足迹動旬浹不出户限嚴交處不茍許可雖儒先生當其意者不數人獨與從兄益民羅性子理鄧尚崇志契合甚篤世稱楊羅鄧初偕羅鄧應進士舉相與約曰有如吾徒繼今一行非其所學將何顔復見哉後羅先生為德安府同知鄧先生為四川鹽運司經歷氷蘗之操皆無敢犯者海桑陳先生嘗稱府君有氷清玉潔之行洪武庚申卒年四十九為文章必欲繼古作者書法鍾王有集若干卷存於家疾退子傳疾退子者吉之西昌人鄧氏鄧故西昌儒家宋神童復之其五世祖也兄子方及弟子靜博學雄文為鄉碩師號二鄧其伯父父也國朝四川鹽運司經歷崇志以文學德操與楊子淵羅子理齊名稱楊羅鄧者其兄也疾退子名學詩字崇雅有孝行元季之亂安成冦猝入西昌恣殺掠母劉氏老病不能行負之走避隘巷空舍中踰日冦窮索獲之解所懷金得免繼復有獲之求金已盡矣斫之幾斃繼又有冦至見老母哭其傍甚哀憫之豫善藥傅創又解衣覆之久乃蘇起負母走避他處道遇渠冦詢知其儒者憫之豫酒肉又為詩嘉之遣其下導出城渡河使遠去疾退子少好學負才具有用世之志謂功名可以俯首取其父母亦矜詫其不凡曰是必復振吾宗者皇明既定天下御史劉昭先知縣事以材舉江西行省留為宣使則慨然歎曰士當局促效奔走人階庭下哉即謝病歸無幾縣復舉送於朝授固陵稅課使欣然曰乘田委吏可以行道到官持亷施寬商賈爭欲出其市所入貨羡舊額數倍秩滿徙平陽持已愛民如固陵甫再嵗兩目發內障喪明郡以聞命致仕歸則戚然傷其命之窮也自號疾退子疾退子耿介修潔氣岸軒豁不屑意生事為文章長於詩蚤喪妻無子既罷官歸輒貧無侍養者是時里中故人親友及好義長者往往多在知疾退子生平抱負爭延致之疾退子挾僮奴日東西往來飲酒談笑相歡時為歌詩以自適縣令丞皆知而禮之疾退子亦數出直言以禆其政之闕故疾退子雖廢于盲而其所適於中者猶不廢也歷三十餘年向之故人親友及好義長者或死或遠出在外里後生晚出雖以士名有不能究知疾退子平生矧今丞乎於是疾退子已八十餘氣力益衰貧益甚冠帶垢敝十數年不得易衣薄歉歉嚴冬不能出門户然其所操執益堅不屈人片語不合拂袖去不顧不肯一毫脂韋淟涊徇人以求所欲孔子云嵗寒然後知松柏後凋疾退子非其人歟建寧陳士希為縣文學獨愛重疾退子官滿將去念疾退子將無以為終也倡率素所還往者為備斂葬之具乃去自士希去知重疾退子者加鮮矣今有人焉猝起旦暮之間其勢巨資厚足以蓋一鄉不必其有德即一鄉之人奔走阿附之恐後至於疾退子則漠然如秦人視越人之肥瘠何趨向之異乎古哉蓋又有以盛衰存沒為戚疏而施諸其同氣者非獨於疾退子然也然疾退子之為人世其可少乎黃伯器傳黃伯器名鼎一字孟鉉其先旴人宋淳熙中八世祖笏知吉之吉水縣遂家焉世業儒大父天衢篤行勤學自經傳子史百氏及天文地志醫卜諸書靡不通究父彥粲直諒和厚四子皆秀頴伯器季嶽尤傑出伯器天資絶人八嵗倍誦五經四書涉知大義成童為文章馳騁司馬子長班孟堅論議閎博不可窮既冠明於世務自許賈誼時翰林吳沈得其兄弟之文讀之嘆曰今之軾轍也季嶽頴悟超越清修篤學兄弟自相切磋亦必推服其兄用薦授鎮江府知事鎮江𨽻京師密邇庶事叢脞簡牒山積伯器至裁決數日而盡素習者不能及吏民畏服之嵗中坐詿誤罷官退處山林取舊所為文悉焚之一志於性命道德之旨自聖人之經至於濓洛關閩之説研精核微涵泳渟滀久益沛然而從學者日衆伯器善開諭奬勵誘掖感之以誠學者無賢愚少長皆樂從之隨才質高下各有所成其教人以實踐為務必使窮其理而體驗於身嘆學者專務科舉之業曰士固由科舉進然志於道者必不以是自足明道晦庵吾師也篤於孝友恬淡守約窮達一致為文章脫略凡近根據至理粹然大雅所著有四書五經精義若干卷學古齋詩文若干卷宋史論未成卒年三十八君子曰師道立則善人多國家初興吉之宗師碩儒林林比立也一二十年物故盡矣學者方倀倀如失所歸伯器後出汲汲焉以成就來學為己任所從學者衆矣其顯者故大學士胡廣左庶子鄒緝余不及識伯器而二子者皆與余久處為余言伯器才髙意廣襟度灑落玉潔而春和庶幾程伯子之風余未嘗不仰而興慕俯而私憾未得親炙也然觀二子者其文學行誼亦皆今之士所未易及孔子曰魯無君子斯焉取斯吾故刪廣緝之所述者為之傳云羅先生傳羅先生名性字子理以字行羅故泰和儒家宋有為盧溝主簿曰伯壽嘗刲股和藥起親疾縣表其所居坊曰旌孝者先生曾伯祖也曾祖伯霖祖見可父穀禎先生少孤貧自奮於學初授易於鄉先生韋乾乾繼登康山長宗武之門苦志畢力博記精思夙夜不懈既冠遭元季兵亂走避巖谷﨑嶇困窮未嘗廢書卷性耿介一言一行必端不與俗人接雖至戚或涉邪行輒絶之然口未嘗言海桑先生陳心吾嘗稱先生及楊子淵有氷玉之操洪武初詔郡縣立學御史劉昭先知縣采譽望聘先生及子淵鄧彥高三人為之師時號楊羅鄧四年中鄉貢進士明年赴春官勑免會試授德安府同知先是有冦號糟李萬户者以衆入府治劫殺郡守以下掠庫藏官捕其衆悉就戮獨糟李逸去久不獲詔捕益急蹤迹所過宿逮繫數百人諸邑騷然先生初下車民有負一囊詣府言糟李實死矣此其遺骸也問死幾何時矣曰一嵗曰始死時曷為不言又驗其鬚髮皆在而浩然白也曰糟李年未四十此安得是耶笞而逐之悉出所繫數百人諭之曰朝廷但欲得糟李耳糟李旦出即汝等暮皆寧家何為不自愛體膚乃甘受楚毒而庇一賊耶能從吾言今與汝等期十日獲賊即汝皆良民衆叩頭曰府公欲生我敢不盡死力乃悉縱之七日生縳糟李至庭下民皆以獲賊勞而遣之命下賦民鐵造軍器時兵亂初定商旅未通郡民猝無所辦先生居第後治蔬圃得窖鐵萬餘斤民爭趨求售同官亦勸以售民先生曰固天以濟民豈為我也悉以代民充賦有餘皆入官庫銖兩不私焉其氷蘗之操愈厲而恤民之心寢食不忘為政以寬恕為本惟贓吏無所假應城縣吏劉仁盜官麥事覺府逮治之仁懼逃匿會按察僉事朱逢吉過德安仁出誣告先生他事將就鞫湖廣參政陶凱吳雲按察副使劉某聞之馳召逢吉還謂曰君不知德安有羅同知耶草七府之賢守裁三人其可以枉忠賢哉嶽州馬知府沔陽彭知府及先生三人逢吉卒白其誣而正仁盜麥之罪在郡四年闕知府皆先生總之秩滿詣京師坐擅用棗木染軍衣為陳寧所劾謫戍西安行槖無數百錢怡然就役不以得失置意既至西安之達官貴人皆敬禮之而安於處賤未嘗一毫干人郡諸生從之受經後多舉進士去是時四方老師碩儒在西安者數十人吳中鄒奕獨曰合吾輩所讀書庶幾羅先生之半蓋先生學甚博為文章切深詩古體宗漢魏近體宗盛唐書法鍾元常年及七十卒士竒少孤五嵗先生取而教育之有父道焉明年官德安又挈以行又三年先生有陜西之役屢遣書督其學又草年而捐館當是時所以誨不肖者雖不能盡記而為道之大要不敢忘也恆竊私念先生所以修諸躬施諸人者皆當追配古人而今之人知之者寡矣謹述其槩為傳手録一通以寄其子賔畿蓋又欲其子若孫皆圖不辱云劉子輔傳劉子輔吉安廬陵人自太學生擢監察御史持身謹行儉約如布衣時而用法公平嘗按臨浙江者三年不見聲色而浙江之人善者愛之橫者畏之時憲使周新持風裁不茍許與獨數數稱子輔為賢御史九載考最升廣東憲使到官數日丁家艱去服闋坐微纍左遷交址諒江知府不鄙夷其民撫綏如子民咸愛戴之叛冦黎利攻圍諒江城時冦勢猖獗他郡縣城多已陷子輔與守將倡兵民效死守數月冦增衆攻城城中食且盡而人心益固又踰月冦攻益力遂破城城中兵民盡力鬪以死無一人降者子輔知事不支曰吾奉命守郡郡亡與亡義不可汙賊手即自經死一子一妾皆先子輔死事聞贈子輔布政司參政遣官賜祭復其家太史氏曰子輔平素恂恂少言如無所長者且不慕交際人蓋鮮知之而其終所樹立卓卓若此士可以其外斷之乎當時總帥如王通輩擁徑兵十數萬不能禦賊而棄城去甚者蔡福之徒甘心從賊反兵來攻圖茍活旦暮間卒之不逃誅於國典夫死一也彼身戮家僨貽誚無窮視子輔蓋氷炭薰蕕之不相同矣時戍守之將如都指揮李任等毅然奮節而死者蓋多死民社者子輔及諒山知府易先政平知府何忠輩亦非一人忠罵賊不絶口從容賦詩乃與其子皆死世曷嘗乏正人君子哉顧係於用之者之何如也周是修傳周是修諱德以字行周吉之泰和爵譽里名家其先諱矩者嘗顯於南唐至宋纍纍有科第其支裔徙灉江里是修之所自出也是修少孤貧自奮於學從遊鄉先生胡渚樵渚樵以孫妻之又從國子學録蕭執先生明詩經初舉霍丘縣學訓導入見太祖高皇帝擢為周府奉祠正高皇帝上賓之明年有告言王過失事王府官屬皆下吏是修以嘗諫得免改衡府紀善預修纂翰林數陳論國家大計及指斥用事者誤國用事者怒衆共挫折之是修屹不為動太宗文皇帝靖難之師既渡江駐金川門宮中悉自焚明日是修留書其家别其友江仲隆解大紳胡光大蕭用道楊士竒且付後事暮入應天府學自經六月十五日也又明日臣民推戴文皇帝繼大統數月御史言是修不順天命請加追戮上曰彼食其祿自盡其心一無所問是修內貞外和有孝友忠信之行非其義不茍取襟懷坦明灑落而沖淡悠然其學自經史百氏下至隂陽醫卜之説靡所不通為文章未嘗締思援筆立就而雍容雅贍詞理條達稍暇著述吟咏不虛寸晷所著有詩小序詩集義詩譜論語類編廣衍太極圖觀感録綱常懿範邇言家訓芻蕘集進思集是修汲汲導誘人善人有過失恆為之隱以是無少長賤貴皆樂親之明知人所薦士如梁用之劉叔毖皆知名當世是修之學雖間未純然於明綱常為世道計必身履之而不徒託之空言豈非卓然特立者歟是修卒年四十有九時解胡蕭梁皆見諸文字然屬倉卒不及詳今二十有八年矣知是修者獨余在每追念君子清白之節文皇帝日月之明既照其心豈當遂致泯沒故述為小傳以授其子轅使傳焉王先生傳王先生名佑字子啓晚號啓翁王出琅琊後繇金陵徙泰和世系具家譜先生十數嵗知自重以古人為歸不混流俗初從鄉貢進士曹隨治毛氏詩長遭元季之亂與兄子與先生避匿平川山中力學不輟兄弟自為師友稍出遊南昌與辛敬萬石曠達楊士𢎞練髙劉永之輩為詩友行省平章遂禮致先生為孰賔聲譽日聞四方江西既內附先生首舉教官吏部試中經義偕十八人者入見是日太史奏星象文明之祥太祖皇帝喜皆除監察御史賜襲衣又賜宴御史臺先生劾姦貪振憲紀風裁勃勃動人廣西平初置官府簡御史往任風憲以尋適為按察使先生及胡子祺為僉事子祺曰古新國用輕典先生曰蠻夷之人素昧君臣父子之分瀆倫傷化不及此時明禮法以示勸懲後將難制適從先生議先生所分按郡縣吏民悚然三年偕子祺入覲時王師初平蜀重郡守之寄遂徙先生知崇慶州子祺知彭州崇慶承兵革凋弊之後植仆煦稿隨事盡心民稍復蘇坐纍罷歸而從學者日衆先生嚴師道其施教有方務見實效後生晚學望之皆內自斂肅不敢侈肆江隂徐遜知泰和縣勵精為治聘先生訓導縣學日躬詣問政先生曰示民以好惡之正而去其蠧耳遜虛已惟先生之言聽而行之不疑於是五六十年知泰和者其設施當大體得民心民至今誦道之無厭者莫有過遜蓋自先生導之矣先生孝友忠信嚴毅端方海桑陳先生嘗言王子啓壁立千仭不負所學劉尚書子高言子啓真風紀臣包孝肅不足多也郭敬守曰子啓平居一言一話皆可書簡册垂法戒蕭子所曰王公秋霜烈日執固當憚之先生擅文章養氣為要中嵗以前所著毁于兵晚獨存長江萬里稿先生年六十有六卒二男子皆殤卒時惟二女子在其行事舊無紀述梁潛嘗從受經欲作傳未及而卒余丱角以姻家子恆得侍教猶及見所藏僉事知州時政事文書充積牖下時不敢有請今所藏無復存者每念士君子挺特魁傑如先生者一代無幾人其可使泯而無聞謹記憶耳目所得大槩為此傳雖言不能詳觀者可推類以得之矣陳孟省傳陳泰和碩宗五季時自金陵徙來歷宋元以科第入仕者六十人國朝心吾先生為江右大儒洪武初朝廷遣使徴議禮以老辭三子孔立孔奐孔碩孔碩見余所作墓表孔立孔奐皆明經擅文章孔立負才識卓犖不局於小節嘗仕為白水縣丞孔奐溫粹如玉隱居不出孟省孔立之仲子為孔奐後名鑒心吾先生七孫特愛孟省十四即侍先生上京師及考鄉試廣東江西旦莫不去左右者十數年為人質確苦學攻詩經及大學語孟中庸晝夜熟讀精思諸經史子皆通究治科舉業其文一本實理而深斥浮靡之習弱冠甚見重先生長者同輩者皆往質疑請益而愈益自進不少懈為人峭直寡合邑中士所與交者無幾人行道邂逅流俗人俯首過不一顧嚴義利之辨不輒受一毫於分之外年十五六即名其讀書之齋曰克治以自勵精楷書平生所繕録文字甚富一點一畫必如法蓋類其為人邑大夫舉充學弟子員嵗甲子江西鄉試衆皆必孟省在高選是嵗江西聘心吾先生考試有令考官不得以子孫預試遂格不入丁卯再試將入會聞大父喪遂止同門生素為孟省薄者訟孟省謂無祖喪不就試之令有司刻深不明竟坐孟省不應而罷其弟子員己巳凡罷黜弟子員皆徴詣京師分布諸司治吏事踰年孟省抑鬱不得志竟卒蓋年三十有五一子西安少孤失學易業賈而卒無嗣先夫人孟省姑也余生後孟省十嵗丱角嘗從學焉既長最相厚孟省志甚卓學甚篤行甚堅卒不遇以困死非其命耶夫挾藝求試以干祿也大父喪不恤而汲汲於祿禮歟執法吏不推人情明禮義可以為良歟吾著孟省之事以悼賢者亦於法吏有警云録抱灌子録抱灌子閩人所居丹山碧水之間與老圃鄰習圃之業治五畝之地為十數畦雜蒔蔬菘芥薑韭葵莧蔓菁瓜瓠之屬悉具日行畦間視害苖者輒去之以旦去蟲日中去草暮則抱甕以灌率為常故雖饉嵗抱灌子所蒔恆熟蓋為之不厭于勞也然非專以自給有欲取者聽不拒唯不得傷其本耳人恆遇其抱甕灌也號之曰抱灌子雖業圃手一編未嘗釋稍暇坐塍傍箕踞誦聲琅琅時起而曵杖行歌陶元亮田園之詩或自為詞以歌曰灌畦東西兮灌畦北南吾任吾力兮聊佚其心我思古人兮丈人漢隂又曰戴星以灌兮戴日以鋤聊任吾力兮焉知其劬我思古人兮仲尼飯疏綽綽有自得之意會賔興詔下縣令丞亷知抱灌子賢薦之朝嘗與稽古述作之事矣已而擢夏官郎又擢天官郎東皋耘夫嘗出而邂逅焉熟視其狀貌曰此殆非趨榮急利者也旁有知者曰此抱灌子也道其平生歷歷耘夫就而與之語抱灌子若罔聞之他日又邂逅焉間及魯隱公以來二百餘年王霸之得失抱灌子張目吐辭娓娓皆不失聖人之旨耘夫笑啞然謂曰抱灌子曷為不終默默耶抱灌子曰吾亦謂子之喋喋奚所禆益也時抱灌子益有志於退耘夫聞而竊嘆曰抱灌子其志尚可以激薄俗而用世者必重得志尚之士鄒孟氏曰人有不為而後可以有為然吾欲挽留之不得又竊自嘆欲從之而義不可也蓋怊悵不已而念抱灌子之事不可以泯故輒録記之抱灌子陳氏福名耘夫廬陵楊某云東里文集卷二十二
