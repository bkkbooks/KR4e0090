緑於苔吾家東里真相似會擬歸時候子來彥強將歸麻陽雨中見過話舊出小畫求題就以識别并問訊叔毖二首麻陽二令重來日共話家林耕讀時碧水蒼山未歸得京華春雨不勝思兩度相逢皆草草臨岐無奈别情何沅陵更有劉明府頗恨歸時不肯過贈金諭德從子驥驥英年好學今將歸省來乞言為賦三絶句識願望之意并問訊幼孚云斑衣歸去奉庭闈更祝重闈千嵗期此樂人生須闕日還將餘力務詩書紅杏丹桃相映開一朝風雨化塵埃須知廊廟為梁棟只選南山松柏材爾家仲父才情好别後三年未得書玉笥金川有真樂青燈黃卷近何如答胡學士胡學士在北京聞余病寄詩慰問依韻奉答十首之三首卧病幽居况獨居愁來何物可消除一緘逺寄千金重賴有文淵學士書久病文園寢不安床頭頻展寄詩看深情宛轉勞相慰香墨淋漓故未乾常秉清忠報大廷年華流水忽心驚知公未戀滄洲曲相對金螺看晚晴同文度冀成秋夜有懷從善仲舉二首靜夜聊為江上吟江雲漠漠水沉沉惟應黃鶴樓前月照見離人萬里心江邉寂寞顔回宅城裏迢遙張仲居想見近年塵事絶人來不寄一行書題梅二首子勤得徐仲久寫梅花以遺子壻蕭季昶昶求余題是夜余齋宿翰林夢家園梅花甚盛覺而有懷因賦此且致期勉之意云白鷗江畔金魚浦草閣柴扉是我家昨夜玉堂清夢到還臨流水看梅花春坊中允寫瓊枝正是園林雪罷時莫訝相逢易闕贈娟娟氷玉嵗寒期吉水王氏槐陰堂二首文江江上多喬木愛爾堂前槐樹蕃枝枝葉葉先人德長有清陰庇子孫百嵗蟠根雨露深秋雲散作滿庭陰詩書教子擢科第清時莫負花如金題梅寄康仲頴二首憶昔茭湖處士家玉梅親拜丈人花氷霜晚嵗全高潔間映孤村碧水涯分手花前又幾時舊家相好最相思才華共愛清如玉有使題詩寄一枝自題竹林小像時年六十八落落江南舊布衣水邉林下靜相宜白頭更有浮榮繫自詠武公淇澳詩送蕭德通南還為憶雲林别帝畿淮潮相送去如飛扁舟想到仙源口流水桃花春未稀别季雅二首豫去彭氏館十餘年季雅相見京師夜談之頃愴然念舊之懷其歸也索詩為别因賦絶句二首一樂堂中坐絳帷青髫白髮勸銀巵今宵剪燭京華邸感慨重逢話昔時明日張帆白下門秋風一月到鄉園何時解紱將書帙重問城南水竹軒題竹贈武昌友人二首種竹西街幾嵗餘枝枝葉葉散扶踈日長講罷歸來早應有新詩節下書愛竹曾過孝感坊小齋清日聼琳琅鳯凰臺上今朝别不盡幽情憶武昌題髙教授寫竹二首錢塘好易悟精微講説圖書衆所推塵掩韋編今寂寞惟因寫竹見丰儀雲根煙篠出毫端遍灑文箋與素紈今日風光公獨逺空餘遺墨後人看題徐氏孝友堂二首堂上嬰啼五色衣堂前荆樹爛相輝流塵不到文江曲家慶須知自古稀家聫節孝先生譜堂有文安學士書具慶百年兼具翕人間一樂有誰知負愆同蹇尚書金正字赴北京早發江東門十年叨祿侍詞垣材薄深慙負寵恩帝德從來天廣大忍懷愁思出都門靜海縣九月無霜草木枯葫蘆花白映青蘇計程共説金臺近明日舟行到直沽候司直不至晚發濟寧雲邉無處望歸驂一片離情逐暮帆猶待聨翩載黃鵠同吹簫管過淮南題竹與謝進士潞河撾鼓發官航使者衣含雨露香持贈兩竿淇上緑清風一路過江鄉送盧知府歸杭州二首時欲告老淡蕩春風處處宜氷霜炯炯見操持九年文選行公道猶有輿人説往時聖朝宣化需賢守土屋茅櫩望更深白髮未多身未老莫教泉石引鄉心題竹贈常州知府二首陽羡郡中公事簡高臺五月帶霜寒翛翛數尺鸞鳯尾比似湘皋月下看寫得淇園玉一枝清風元自鳯凰池毗陵大守多公暇坐對時吟衛武詩題翠微丹房送劉道士還荆山昨日朝天出翠微春霞五色繡為衣金丹還憶荆山裏一片間雲相逐歸胡原節升大理鄉復巡視浙江索詩賦四絶句先皇昔御文華殿供奉曾霑寵命多白日鼎湖龍去杳重來空有淚成河嶺海歸來萬里程觀潮更上浙江亭昔時道路瞻驄馬此日車旗迓九卿攬轡南乘使者軺秋風古道不辭遙豺狼掃迹瘡痍復須遣遺民感聖朝行李蕭蕭去住輕霜臺柏府舊馳聲須教一道吳江月照見中流徹底清送蕭雅容受誥後歸省四首新著香羅綵繡衣文江江上省庭闈龍章五色金為笥親捧皇恩萬里歸夏官初滿擢天官文武銓除職任難誰似江西蕭佛子時人稱之清如氷雪萬人看京國相逢意共親心如秋水氣如春同朝同郡兼同調二十年來見幾人玉露漙漙下翠梧薊門携手惜離居娛親想及重陽節酒泛黃花膾白魚過滁州馬上口號寄陳廷器長憶禮闈同事日錦筵官燭夜論文過城不見匆匆去回首滁山隔片雲夜宿池河夢頥菴久别豫章胡祭酒夜來夢見鬢星星頗聞藥裹今拋擲應是文章屬老成授散官二首舊制除官後即授散官僕為學士五年始授奉議大夫蓋因吏部郎中陳宗問言凡外職皆不給散官時車駕幸北京而吏部遂以南京亦為外職不給授至是隨侍來北京始得蒙恩而當時外職雖布政使亦未有授散官者愧無補報用志二絶五載金門為學士朝來初降散官恩幸因近侍霑榮命猶勝超遷典大藩二十年中六改官論思匡輔古來難不才未有涓埃報徒切區區抱寸丹送崇厚歸鄉二首君家兄弟聨雙璧館閣懷歸次第歸想見吉陽秋雨霽江天鴻鴈一行飛眼看科第擢英髦又見南飛逸翮高多病無能留滯者秋風相送使心勞題竹贈人歸南京紫垣東畔詞臣署曽種琅玕萬箇清一上金臺二十載看圖長是憶南京題樂山樂水二圖二首岱嶽巍巍萬古青奠安東國拱神京出雲為雨潤天下坐契仁人四海情為澗為河萬折東周流無滯更無窮道人胸次涵流動樂與宣尼川上同書解大紳作其兄墓銘哀詩後三首少年兄弟同金榜一日聲名四海聞更賜同歸侍親老全家稽首戴天恩紅芳庭館紫垣陰對酒論文夜向深三十餘年如昨日埋銘一誦一傷心新詩字字皆愁痛不待勞心苦思成揚子江波深不極未知難弟憶兄情寄示東城諸姪二首不才無計謝朝簮流水年光七十三盤古螺湖松柏地夢魂夜夜到江南叨祿京華四十年老來一念在歸全故鄉無限佳山水何處松楸著墓田寄昌平吳典史二首為問昌平吳典史到官民事近如何清時雨露涵濡厚想見豐年黍稌多已聞贊縣清如水廨宇蕭條日掩關簡牘勞勤蓮幕下未應拄笏對青山送蕭大慶之官始興二首始興庾嶺南邉邑慱士之官喜過家廣海年來多驛使緘書頻遣慰京華縣邑西連丹鳯山行藏有道聽皇天瘴煙毒霧皆休惑忠簡新州十八年題蕭德贊竹昔年曾作蕭齋客繞檻毿毿翠玉枝猶記凌雲軒上坐清風逺道倍相思題蕭德贊山水二首昔年曾借蕭齋住流水桃華盡日間讀罷黃庭更何事石臺散髮看青山一去京華三十春鄉山萬里夢歸頻山中尚有平生侣應見題詩憶逺人題蕭本器竹二首愛爾清淳比玉琳青春黃卷好留心林間石畔無塵事一寸光陰直萬金爾家瀟灑自天台山繞溪樓石作臺老我會扶蒼玉杖尋幽重度葛陂來題山水與彥實姪翠嶺岧嶤帶白雲林間溪畔絶纎氛須知樂志堂中坐長日書聲到夕曛題劉梓人竹滿林淇玉翠紛紛白日蒼苔敻絶塵好近五雲洲畔住翛然間作太平民酬友人寄酒洞庭春色出黃柑逺致何由共一歡感荷多情王刺史獨慚彭澤未休官過習禮檢討家觀菊不遇留三絶句習禮檢討家植菊過節始花而聞連日有逺客之擾今旦客去余造焉則主人皆往治職務惟兩童子導引至花所黃紫二色爛然可觀獨坐久之作三絶句留奉習禮宗璉時同居云花開只在屋西頭常待看花散旅愁人事已間天意好無邉晴景屬清秋短短垣墻不作籬傍簷背日故開遲好花正不論先後無事頻來坐少時昔者柴桑早去官悠然把菊對南山若緣五斗能留住也到花時未得間鄒侍講以詩問錢檢討索菊而僕以詩并騎邀之二首一室間居俗慮清題詩問菊見高情何如解帶花間坐莫負秋晴送馬迎鄰菊初花粲可觀花前棋局足盤桓尋常無事宜來數即過城東來却難時鄒將遷居東城習禮惠菊以詩謝之并邀同賞二首蕭散高情絶世稀秋清分送菊花枝清香正色明忩下自與幽人晚嵗宜一旦秋芳粲滿家黃金耀日十三葩何妨拂袂來同看門外青簾酒可賖子啓學士見過僕適他出不遇奉簡三首之一首病來愁坐愁無那強為尋醫暫起行寄謝玉堂曽學士髙軒相過不相迎子啓見和再用韻奉簡三首之一首東里何如西墅清廣庭深巷足間行近栽楊栁髙於屋况復新來少送迎習禮見和用韻奉酬并簡宗璉六首之二首愛君濯濯儒林秀每日趨朝得共行鄰舍不嫌來往數暫時相送復相迎試問秋曹張主事公庭幾日未曽行尋常飽飯焚香坐客至何因簡送迎題竹送族孫繼赴溫縣教諭二首吾家前代三登仕今喜孫枝有鳯毛但保嵗寒氷雪操會看青步綵雲髙一官典教河南去持贈東風碧玉枝正好盛年崇德業日吟衛武切嗟詩題菜有序天下蒼生不可一日有此色士大夫不可一日無此味此宋人語也覽物忖心聊題短句濫食大官三十載濟人饉嵗一毫無園畦過雨青青茂但愛時和似畫圖題竹寄劉郁武不見劉伶三十載白沙翠竹有餘清幾時鵝鼻峰頭去共酌流霞看晚晴東里續集卷六十
