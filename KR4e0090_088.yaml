body:
  text: 東里續集卷六十明楊士竒撰詩五言絶句嶽陽樓城上嶽陽樓髙臨洞庭水君山望不迷日日風波裏尋蔡胄不見空復出城來問君還城去寂寂掩雙扉憶君情不敘殘寺殘寺連農舍空忩露佛燈四圍無古木那解隱高僧示鵷兄弟有序五首不得鵷姪書數年近寄絶句五章亦言其志因便次其韻示之首二章余自述三章有懷思貽止齋二兄晚嵗過從之樂四章勉鵷末章并勉鵷兄弟於學吾今六十有五七千里致此數語亦不薄幸諸姪各自嚮進如侍兩翁就奉呈一笑身戴君親德何能一粟酬蹉跎今白首行邁尚悠悠飯牛先壟下夙志未消磨恩重身難去非關戀玉珂二老東西郭風期晚益親將車數來往遙憶似荀陳待制傳宗嫡元孫見可人承家在好德切莫厭清貧愛身如白玉為學趂青春須識潛魚躍還思屈􅀈伸題畫海天秋似洗渺渺淨煙濤忽露珊瑚樹還看翡翠毛題竹與妻弟郭志善溪上娟娟竹年深百尺餘何時過溪上折竿釣溪魚清夜清夜坐庭階薰風拂楊桞仰首望天河微雲翳南斗題畫二首老樹不為材新林鬱蒼翠矯首瞻西山朝來有爽氣溪上帶清峰溪邉滿芳樹誰傍白雲居猶軫青雲慕題竹寄友三首昔在詞林日同看翠玉枝好風清不斷曾結嵗寒期霜節亭亭直凌雲發采章春風和煦日親見鳯鳴陽平安常有報徑造豈無期萬里相思意為欹淇澳詩題畫士有不遇時放浪遺世情彼哉七君子亦未泊其情題劉英竹二首高崖入煙霧下有清泠淵青鸞雲中來照影故蹁躚湘靈動雲根散作霏霏雨濕重翡翠毛涼浸珊瑚樹題竹贈鍾子勤太守葳蕤鳯凰羽白日動毿毿臨别遙相贈清風五嶺南題槎翁畫龍二首天下文明日雲從隘九霄歸田霑霈澤同幸際皇朝往嵗尚書履排雲到九關歸來石臺下猶記寫龍顔題金侍講所藏趙仲穆畫馬三首粲爛五花驄軒昻八尺龍惟應天廄裏得似畫圖中曉日立彤墀光輝玉仗齊朝回長散誕流水緑楊堤養育天間久常懷萬里心太平無用武自愧主恩深到桃源黃學士舟已先在南岸不得相即相望悵然隔水不得語中腸千萬回知公望我至如我望公來清河縣調公素暮出清江閘夜投清河口明日到桃源誰家問沽酒夾溝晴日烘綿花暄風吹豆莢九月似春天河邉見飛蝶離磚河驛十里阻風白浪高如屋停舟日已中長蘆望不到愁殺石尤風行營鑿井得泉鑿井得泉水清泠碧照人銅瓶罷逺汲稍解僕夫勤沙城昔嵗城中過曾遇江南叟身老意蕭間寧知今在否始乘馬嵗餘不乘馬今朝還據鞍眼昏身力弱心怯道途難望雞鳴山雞鳴山下路危險曾經涉今日望雞鳴未度心先怯度雞鳴山馬上口號與同行者蜀道天下險王尊叱其御何况雞鳴道今隨六龍度雨晴東方明月上雨止風亦罷仰荷蒼天仁俯惻行路者渡河騎馬渡河水馬渴未即渡飲足不須鞭騰踏長嘶去問唐孟髙需枸杞與卿俱七十卿有好顔容此後詩相寄須兼枸杞封自新河迤南道傍官宇鋪舍皆一新知是府尹李庸所作賦二首道途廣且平亭館皆輝煥追憶舊行時驚喜還嗟嘆府尹才能好經營次第新相知已心熟猶問路傍人題四時花鳥四首曾聞瑶水上千嵗一開花常有雙青鳥何非阿母家右桃花雙青往來傍蓮塘飛鳴不相離比似兄弟心相親不相棄右荷花鶺鴒天香浮玉露金色艷髙秋誰似雙栖者相依共白頭右桂花白頭的的玉梅舒啁啁翠禽哢參橫月落時惆悵羅浮夢右梅竹翠鳥題弼姪飛鳴宿食四鴈圖萬里塞垣來孤飛不成陳無那閨中情憶得邉頭信肅肅葭菼暮聲切為離羣情重連枝者單居不忍聞霜落洞庭渚江南九月秋稍違關塞逺適足稻梁謀聖化行萬方江湖無射宿淡月映蘆花平沙睡應熟題弼姪山水有序四首姪子之夔赴任吳江客有寫雲山四幅贈之者為各題一詩皆實意寓焉講授之暇時一展閲亦足以慰離别之思齋居無俗事清眺擅吳江水郭團農舍柴門繫釣艭天涵洞庭水雲帶洞庭山永日談經罷憑軒一解顔故國嘉山水文溪帶武峯披圖思不盡親舍白雲重家住清溪上山光滿竹林共憐簮組纍徒繫故園心題扇寄余正安倭麻來海外裁扇劇清真還憑玉堂筆寫寄玉堂人悼昔時昔在南京時共玩朱櫻樹今日對朱櫻故人渺何處題平川方子宣松石圖松懷氷雪操石有堅重姿書齋日相對可以勵操持便面小景青青溪畔山湛湛溪中渌窈窕亭上人聽歌采蓮曲千葉芙蓉露冷蓮房老迎霜燦爛開誰是看不足剪落片霞來單葉芙蓉霜落荆州冷青煙度渚宫西人吹忽散孤影見愁紅題蕭貫竹蕭生讀書處有此雙琅玕永日吾伊靜晴空看翠鸞題子昻竹吳興八法精作書如刻玉蘭亭揮灑餘見此瀟湘緑題卓迪山水二幅二首溪水清於玉山光淨瀟灑亭下有扁舟時看往來者青山草廬下蕭散絶纎塵曵杖彼誰子知皆塵俗人雙禽圖二首莾蒼踈林下雙禽相因依終然自得性何必上林飛雙棲平野間弋者無所慕何限放浪才自得蕭間趣題蘭芳馨在岩谷自與衆卉異必有君子人共結金蘭契題梅不但魁衆芳高潔無比擬商鼎論調羮何曾及桃李題竹送彭沖還西昌二首京華春雨後竹館話分襟鄉邑何時至因君想故林送别長干道晴風翠羽繁平安千里意贈爾報鄉園題宋撿校古木竹石剪落珊瑚枝秋光淨於洗醉眠瑪瑙坡看舞青鸞尾題畫魚寄表弟陳孟高外氏老賢弟迢迢憶孟髙江湖魚尾赤念爾更勤勞題松山中多嵗月白日起蒼虬但適棟梁用那無匠石求題竹鳯池八法筆寫此翠琅玕六月不知暑庭中生夏寒題梅萬卉凋零後梅花開滿枝由來氷雪操橫笛不妨吹題畫魚贈陳憲南歸士之未得志勤力務所學亦有變化時禹門奮一躍題邵武經歷梁叔蒙蘭三首昔過桞溪上每尋蘭墅春芳馨揚素彩夢想故交人邵武諸侯幕光風動石闌時清吏牘少吟咏對芳蘭蘭芷生幽谷花時自在春軒墀移植好防有折花人題竹贈士鼎南歸月池池上路誰種碧琅玕自有虛心在青青到嵗寒題蔣壻重竹二首種得篔簹玉庭含五月秋清詩吟衛武絶勝伴羊求兩京四十載迢遞夢家林蕭散五君詠山王空愧心題郭之信梅二首家住冠朝里官為真定師梅花當講席相對認南枝詵詵來學者晨夕侍皋比花共人如玉清香滿絳幃題梅送曾訓導有引訓導師範職也其道自正已始所謂正已而物正者也吾里曾生得揚州府學訓導將之官以寫梅求題是以致丁寧愛望之意邑學周生間暇往還可同一觀至性存真操娟娟氷玉清齋居坐相對永矢嵗寒盟題曾儀鯉魚曾承薑氏孝亦載琴高仙今朝與子别早晚待書傳題蕭壻承恕竹家住桃華源庭無俗塵至春永風日清高空玩寒翠夾溝二首孤篷雨蕭蕭滯風仍滯淺時復問同舟彭城今近逺河流淺且狹十里九折灣徐山望不見幾日見淮山題驛舟中小畫雙踏枝上雪查查鳴未休非關浪報喜來嵗足來牟題竹贈閩士且却其繡段二首組繡出閩中由來習俗工何如此君節葉葉是清風種竹隔流塵清隂滿户庭自公有間暇常對嵗寒青恤旱有序五首亢旱數月加之蝗災畿內蓋甚詔選廷臣清理兩京及四方刑獄疏其滯而辨其枉不及半月北京之獄疏辨過半傳頌載道甘霈凡再耕者大悅於是臺憲言致旱之由概劾朝臣而潔穢淆焉皇上仁明詔悉寬貸惟嚴貪者之戒僕雖茍免臺論然祿厚無補敢忘循省輒賦小詩五章略紀其事且識鄙意云夏熱不可觸飛蝗遍原野縣官有程期愁殺捕蝗者亢陽三月餘詔下寬刑獄囹圄半空虛甘霖稍霑足臺章論致旱槩斥政事臣涇渭無分别包容荷帝仁聖主勤恤民貪夫昧罪已天聽豈不近駸駸未知止官廪之所儲農力苦不易燮理無寸能素餐重憂愧寄時勉三首時勉升太學之三日僕懷别不已夢中作遙字韻詩既覺續賦一首案上適有寫竹一幅就題奉寄東閣歡娛地朝來遽寂寥賢關一步近悵望玉人遙每日文淵閣間思李翰林不知遷太學誰共坐論心欲贈嵗寒意託之淇上竿亭亭君子節長似玉堂看寄李祭酒二首端坐司成館髙懷今若何向來石渠署無日不相過卧病無塵事其如離思何春風勝舊識時復一來過題和姪枯木竹蘭圖自在疏林下幽香滿露叢相依君子竹葉葉是清風題楊紹林竹本是淇園種森森枝葉開清風常自愛莫闕題畿姪孫梅陽春第一花箇箇氷玉質置此讀書忩清香滿芳帙題徐孚竹瀟湘萬頃秋淇園千畝緑幽玩何須多一枝清已足題蘭四首愛此竹林下秋蘭花正開采芳思共賞有待故人來懸崖秋氣爽蘭葉露漙漙誰把霜毫寫清芳耐久看磊磊澗邉石猗猗蘭作花光風一枝拂香滿杏林家熙熙春日暉九畹正芳菲劍佩歸來晚幽香襲人衣六言絶句題蔣院判墨竹石面苔文緑遍林間竹色青垂二月東風吹雨陽和發育當時挽李處士二首鄉里共高淳朴朝廷洊錫褒封康寧九十餘二巋然雪嶺青松白髮身全諸福班衣歡繞十孫最是鳯毛五采明時翽翽髙騫題竹贈士振南歸清風林下歸客明月池頭故家杏樹百年喬木藝編纍世生涯絶句二首客程行及半月春色看分淺深楊桞乍舒河北桃花開遍淮陰淮上天連芳草江南雲湧清峯瓜步春潮落日廣陵煙樹殘鐘七言絶句九日陳士良宅玩菊次韻王潔齋菊有醉楊妃紫霞杯二種三首五日金門下直歸小園來看菊花枝千葩萬卉須臾盡獨此相娛嵗晚時膩白輕紅數十枝半酣秋色倚東籬誰知彭澤歸來處更似昭陽宴罷時紅白叢叢相映開一叢别捧紫霞杯滿含玉露香勝酒九日無煩太守來吳孟勤為文贈黃都科南歸并為求詩二首楊氏昔來光德里黃端今去武昌城桞州邂逅禾川遇並有文章託姓名暫去還來不記年清朝又發庾樓前莫教折盡臨江桞留得重來好繫船題仲舉梅花扇面才子清姿如玉雪新裁小扇寫寒梅日長宴坐微風發為引幽香相逐來訪蔣立恭不遇留書齋壁門巷晴泥擁不開尋君北轉又東回竹間寂寞香庭掩便似回船雪夜來雨夜蔣立恭贈詩走筆次韻二首鈄風飄雨還無定獨坐耽書過二更不似前宵鄰閣裏聫詩使酒到雞鳴三徑篔簹二畝居鳴風鳴雨稱清虛秋宵一曲琳琅韻為喜朝來向客書過城陵磯磯頭水落石層層石上魚檣半搭罾忽望高樓出城郭舟人指點説巴陵夜雨次韻寄蔡用嚴楊仲舉二首秋夜夜長長寂寂打忩飄雨似嚴更詩情未斷羈情起不耐牀前絡緯鳴江邉園裏擅幽居清酒香茶夜不虛定是不聞風雨發半酣高詠漆園書答蔣立恭立恭約豫同謁乃父隱翁之墓豫病不果行明日示詩次韻奉答憐君拜墓不勝哀淚灑東風奠一杯芳草青煙寒食節幾家墳上子孫來題祝教諭梅絃誦初停子佩間梅花香拂絳帷間玩微獨對羲圖坐不假重熏金慱山題蕭建平扇五月樓船海上歸種魚池畔足間時白羅團扇揮炎暑重理殘書莫下幃題蕭德贊四時小景四首二月山花如錦開亭中坐對正徘徊蹇驢又有過從者童子相迎戶外來雲林六月不知暑溪上好山如越中咫尺茅亭異華屋逢迎俱見古人風兩行鳴鴈分飛處一箇輕船逆上時藉是江天好吟景不令風物動秋思十日北風吹大雪閉門無處不漫漫江頭艇子船頭騎有底忙時不畏寒題高克恭墨竹有跋房山髙韻五十仭松雪清風二百年山齋寶氣不可掩夜夜雨虹光燭天高嘗云息齋竹真而不妙雪松竹妙而不真吾乃於二者之間著筆然髙甚少作竹或問之曰不欲以掩息齋雅度如此因併志之齋宿和胡光大庶子二首金門晚退坐清齋燭影茶香對好懷况復連篇寫珠玉右坊傳送左坊來雨氣霏霏壓篆煙坐消銀燭未成眠明朝預想南郊上日馭光華麗滿天題子昻畫嘉禾宋代王孫元閣老文章萬丈貫天河胸中不有調元事那解揮毫寫太和寄賔畿老弟三首安州二守時名重清潔持身玉不如