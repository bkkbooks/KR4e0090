body:
  text: 東里文集卷二十五明楊士竒撰方外送彭海雲詩序國家崇奬道德之教於天下郡邑皆置道官郡有紀邑有會皆取老氏之徒任之吾泰和自置道會以來凡再更代而至海雲而皆和易清約端重雅素直而不肆愼而不矯此豈吾邑為老氏之徒則皆賢哉蓋所資以治非其實有於已則無以服衆而舉其職是以推擇而取之也自吾少時見海雲處於鄉恂恂溫溫退然如一無所有而先生長者皆愛重之至為道會自邑長二以下皆稱之曰良而邑之為老氏之徒皆心敬誠服趨其令不敢慢焉此非其本諸內者厚有以得之乎世之治其徒而不足以得其心敬誠服者要皆無諸內而徒飾其外焉耳况併其外不飾而望人之敬服於已哉於是海雲有過人者矣海雲之先君子吾楊氏出也今年被召來京師見余刻楊氏譜戚然指容齋府君語余曰是生我先大母者也忍靳一紙而不遺我哉其惇本重義懇懇不忘如此益非時人所及故因諸賢作詩以送其歸也為序諸卷首送釋源濟序詹事府丞慈溪陸中善前為刑科左給事中余知其為人慈厚溫雅明於治體嘗以謂中善其用世之才而陸氏之秀乎間從中善聞其弟源濟之為人於是知陸氏之秀非止中善而已中善之言曰吾弟聰敏過人有才具而性淡泊雅好佛氏之學聞邑中有哲師者通其道即屏去一切世俗之務而往師之既久又聞有祖芳禪師者其道益大又往師焉去年秋復走京師求見髙明閎博者以增益所未至吾弟之志於其學可謂篤矣今將還故鄉願得一言贈之夫天下之事要其成在立志而已探驪珠於不測之淵能篤其志無弗得者而况於學乎况於佛氏之學者乎源濟篤志於其學愈積而深造安得無所成也然既遊乎方之外矣夫人聰明秀敏古今無異也古之為學專於一其成也皆有以及人故古之天下其治日常多也後之為學析為三至於可以及人則惟儒者之道焉耳而後之人聰明秀敏者其所為學不在於儒者常十倍為儒者之學又非皆能篤其志以要於成此天下之治所以常不逮於古也如使今之為學者皆思有以及人又皆能篤其志如源濟何古人之治不可及哉源濟雖遊乎方之外而其所篤志今之儒者或不能及蓋不獨賢於佛氏之徒而已余因中善之言而有取於其志也故為之言若其戒行之純學業之至人多知之無待余言而余亦無足以知而言之也送釋岱宗序吾邑浮圖岱宗受朝命為邑僧會今年來京師又用推薦兼住持普覺禪寺前僧會彰公其師也求余一言贈其歸岱宗邑中故家子宋有郭佺與其子同登景祐元年進士第者其族祖也岱宗自少警敏好學嘗從今靖江府長史蕭用道余往還見之愛其事師之禮甚恭也别去十年而能見重於鄉人老宿推舉為百里之地釋氏之徒之表率斯其智行所進必有可稱矣乎普覺在邑東城崇居復宇宏麗深邃違遠喧雜邈焉如出人境外吾少時嘗與今翰林修撰梁用之庶吉士陳孟潔讀書其中今吾三人或聚處論往事輒重慨嘆欲復一造不知在何日岱宗今有朝命之榮而不去其鄉又當盛年強力得幽間靜勝之地而居之誠有志進乎其道將來所造詣可量哉蓋境靜則心寧心寧則志一志一則其所務者駸駸乎得矣吾聞釋氏之道以清淨為宗而不纍於其外世之為其徒者雖有能通其道通而能由之者蓋鮮豈非在表率者有以振之乎勉旃岱宗誠能不違於上而後可以責不違於下此鄉人之情之所屬望亦彰公為師者之所願於子也故書以贈圓庵集序為釋氏之學其才智有餘研極宗旨之外往往從事於儒而與文人遊亦時作為文章泄其抱負寫其性情蓋自惠休有文名世而唐之靈一靈徹宋之惟儼惟演元之大欣輩纍纍有繼逮于國朝宗泐來復諸老亦彬彬乎盛矣玄極頂公於諸老差後出其文實伯仲間蓋重於世久矣玄極天台儒家子自其童丱已悟解頴敏脫略凡近始出家從浮圖師居無幾師謝之曰吾不足子師乃求禪林之邃於道者而師之篤志苦力久而悉其道焉又以為儒之道當究也又求邃於儒者而師之又篤志苦力久而併其文悉焉夫為文與為佛之道其理無以異也必有師宗必究旨歸一其心篤其志先乎本而後乎末探乎粹精而黜乎糟粕無弗造者若所造之難易淺深則係其天稟之髙下焉玄極非其資稟之髙師承之正積勤之久之所臻歟於是勃勃起聲譽而與宗泐諸老先後有聞於四方矣蜀獻王首遣幣聘之且寓詩有僧中班馬之褒太祖髙皇帝聞其名召至奏對稱旨命為僧録左講經升左闡教兼住持靈谷寺奬任之日重焉玄極平生詩文甚富多不存稿既謝世其徒崇遠收稡散逸僅得其詩賦雜文二百首釐為十卷名圓菴集圓菴玄極别號也將刻梓以傳而求余序玄極之文根於學充於才論性道明言德行正簡而不促豐而不泛尤謹於繩尺要其造詣非叢林之名能文者所易及也然非獨其文吾聞玄極於事其師如事父師沒哀毁服心喪三年終其身語及師泣下泫然其篤於倫誼類此尤非尋常方外離倫遺情以為髙者所可同日語也崇遠惇實清雅惓惓圖永其師之傳是亦其師之心矣皆可尚也故為之序敕賜廣福寺碑宣德六年十月僧録司覺義集慶重作廬陵淨業寺成因召對以聞上嘉之賜寺名廣福又賜璽書護持集慶既拜受命求余文刻石用榮上賜於永遠嗟乎廣福之義大矣哉仰惟皇上聖德如天地化育凡物之肖形兩間者皆欲使之生遂鬯達而况於人哉蓋無間華夷遠邇之人皆欲使之得其養不失其性優遊於春風和氣之中此堯舜之心覆載之仁也佛之教在於絶嗜欲務清淨而求諸內其始以為已焉耳及其成也固推以化人如從其化由其道專用其心於恬淡寂寞可為淳古無事之俗而吏治可簡刑罰可省矣明君仁主之重其道意亦有在於此歟廣福在廬陵城西一舍許之髙峯山與行思禪師青原之寺江東西相望故名剎也數廢而興既燬于元季之兵久未有復者集慶郡名家陶氏子生十年父命從釋禮寺僧方升為師十五師卒即有志卓立圖興復寺宇術者言後當有大遇寺乃可復遂出遊京師進其業於南洲洽公講下後轉涉吳楚泝巴峽登岷峨而至滇南其所見聞益廣造詣益深矣征南將軍黔國公厚禮之太宗皇帝聞其名驛召至京集慶兼精郭景純地理術仁宗皇帝試其能並蒙奬重獻陵之建集慶嘗預效勞用受知於上奬賚益厚嘗自陳臣受父命從釋臣惟一兄今傅兵籍遠戍而父母乏祀惟陛下矜憐之上憫其孝特命削戍籍復民業集慶又自念高峯吾所自發身也奈何而忘棄源本悉倒槖資暨善信所施付其徒圓昭以興復三年而成殿堂門廡高明𢎞壯加于舊規像設崇嚴采繪鮮麗凡幡幢法具鐘鼓之樓禪誦之庭及庖湢廪庾靡不完具至是遂承天寵之厚蓋衆以徴夫大遇之言而歎其非偶然也余謂集慶篤於其親可以為仁汲汲致力所發身之地可以為義仁義修而福應至此自然之理亦奚必術者之能言哉集慶别字雲海其學辨博兼通儒旨闓爽豁達叢林之傑也余既為文諸石又係之以詩云大江之西吉維侯邦崇峙宏流靈淑有鍾明德碩才前騫後翥逸而方外翹翹繩武言言梵剎千百其區宅勝擅幽輝煥雲霞高峯之宮越歷千祀東岡左環西溪右迆屢圮而興有維有持于今興之自雲海師高明爽塏恢踰往度雲海之勤亦有善助帝聞嘉之廣福錫名為福伊何惠於羣生覺之悟之蠲滌迷妄導其清淨亦迓靈貺奎章龍文有來自天爾飭爾徒以慤以虔晨鐘夕鼓粲其寶所爾進爾修孰其爾侮皇仁如天曠代所希嗟爾雲海何以致之愛親者仁重本者義上副皇心寵示表勵嶽靈拱衛佛日昭宣皇明一統帝壽萬年虎丘雲巖寺重修記蘇長洲縣之西北不十里有山曰虎丘吳闔閭所葬處世傳既葬有白虎之異故名岡阜盤鬱泉石竒詭蓋晉王珣及弟珉之别墅咸和二年捐為寺始東西二寺唐會昌中合為一而名雲巖者昉於宋大中祥符間載盧熊郡志如此始清順尊者主此寺至隆禪師而復振歷世變故寺屢壞輒屢有興之洪武甲戌寺復燬永樂初性海主寺始作佛殿某作浮圖七級繼性海者楚芳作文殊殿十七年良價繼楚芳是年作庖庫作東廡明年作西廡作僧舍又明年作妙莊嚴閣又三年閣成蓋寺至良價始復完價所作閣之功最巨凡三重崇百二十尺有竒廣八十尺有竒深六十尺上奉三世佛及萬佛像中奉觀音大士及諸天像其材之費為鈔三十餘萬貫金石彩繪之費六十餘萬貫又經營作天王殿以次成良價杭之海昌人石庵其字今僧録闡教止庵其師也余聞諸刑部主事陳亢宗云良價嘗從亢宗遊遂因以求余記其成余聞虎丘據蘇之勝嵗時蘇人耆老壯少間暇而出遊者必之此士大夫宴餞賔客亦必至此四方貴人名流之過蘇者必不以事而廢遊於此也然亦有興念夫王氏之嘗樂於此者乎當是時王氏父子兄弟寵祿隆盛光榮赫奕舉一世孰加也而能遺棄所樂輕若脫屣焉者豈獨以為福利之資乎其亦審夫富貴之不可久處與子孫之未必世有者乎雖其智識趨向髙明正大不足以庶幾范希文之為而無所係纍乎外物視李文饒溺情役志下至於草木之微者豈不超然過之也而自建寺以來今千餘年雖屢壞而屢興其飛甍傑搆淩切雲漢與其山川相輝煥稱名勝於東南愈久而不衰者固佛之道足以鼓動天下亦必其徒多得夫瑰瑋踔絶刻厲勤篤材智之人能張大其師之道以致夫多助之力也瑰瑋踔絶刻厲勤篤之人其用意也𢎞其立志也確有不為為之而孰禦其成哉嗟乎若人也使就於世用有不立事建功而可以裨當時聞後世哉吾又以慨夫屢見之於彼而鮮遇於此也宣府彌陀禪寺重修記宣府古上谷地今為國家西北重鎮所以控制朔漠屏衛畿甸故恆宿重兵而簡勳臣之有才望者蒞之自左都督談公佩鎮朔大將軍印總兵於此城墉益壯兵甲益修士馬益強而邉境肅然晏安乃以餘力從衆志修城之彌陀寺為國祝釐為衆祈祐既成上親巡邉駐蹕宣府余時忝扈從偕禮部尚書金公幼孜太常卿姚公友直寓寺中周覽崇臺廣宇巋焉奐焉亢爽靚深髙明𢎞麗像設莊嚴咸臻精妙余顧二公嘆曰佛宫布在四方不啻千數觀諸內地會府巨州求一盛剎若此未易多得而邉陬遐壤乃能有之豈非難哉其寺之主僧從旁言曰是皆都督公之力都督公之心上在國家下在生民而為此也明日其主僧求書寺之成將勒石垂後問寺之所始無所於考寺有勝國時斷碣僅存其半所可考者曰都功德主金紫光祿大夫中書右丞相安圖建寺既燬於元季之兵僅存彌陀殿已敝都督公至乃修其敝廓其規而一新之世謂佛之道以濟利為用而利國利民蓋其用之大者故自其法入中國千有餘年信用不疑上下一軌而大臣秉仁愛之心者惟國家生民是利是圖茍衆以謂可為則從之以盡吾之心安圖元賢相也其意非出於此乎都督公今賢將也其意非同於昔之人乎然則都督公之用心可書僧而克知大臣之所以用心而圖不泯亦可書寺之成宜書寺中為三世佛殿殿之東為觀音殿次為寶光堂西為地藏殿次為普庵堂二世殿之北為彌陀殿殿之四隅為四壇場東西序為僧寮西序之西為禪堂彌陀殿之北為毗盧殿藏經附庋毗盧殿中殿前左右為東西方丈殿後為法堂三世殿之南為天王殿殿之前東為清源堂次為鍾閣西為崇寧堂次為大悲閣又前為三門庖廪賔客之位咸備寺成於洪熙元年都督公名廣鎮江人初事太祖皇帝為百户調燕山左衛後從太宗皇帝起北平積功至都督同知仁宗皇帝初臨御嘉念舊勞首進左都督委以邉寄繼事今上皇帝益見奬重蓋公忠勤寬厚謀猷閎遠嶷然於今老成人寺主僧名秀峯介休人舉任都綱於此而寺之成始終效勞者僧慧銘助資者都督章安費義都指揮王禮助地者郎中王良云僧録司右闡教一菴如法師塔銘粵自佛法盛行於中國其徒之赫然有以動人者多本其才能智辨馳騁卓越而學士大夫遇之往往駭異欣喜樂與之遊甚者重其可與用世而惜夫在彼而不在此也吾行四方所遇其人器識論議偉然出乎衆人而汲汲以修廢舉墜光大師門為任者亦不少矣則豈獨昔之時為然哉而求夫淵然其存泊然其行望之如無能即之而有味者蓋在昔已不多得亦何獨於今也太宗皇帝臨御四方之名髙僧者皆嘗入覲而聖心所重者四明之能義會稽之一如蓋曰此其務乎內而不徒誇矜乎外也蓋兩人者皆恂恂溫恭言若不出口而能義深於楞嚴一如深於法華既皆為僧録司官掌天下釋教無幾能義沒又數年一如亦沒一如字一菴既老别號退翁本上虞孫氏子與初建至大寺雪庭立公同族年十三辭父母願歸釋氏祝髮於五夫長慶寺為大徹昱公之法孫而欲上繼雪庭也又𨽻籍於至大後從具菴玘公於吳山寶奎寺礪志所業祈寒盛暑不少懈一義之未徹一疑之未釋必究竟乃已攻苦礊淡逾久逾篤遂深造閫奧洪武十八年出世住松江崇慶寺進住蘇之北禪寺緇素歸化者日衆二十七年南洲洽公掌僧録司兼主今大報恩寺延師為都講時清理釋教庶務叢脞洽公酬應上下而講演不廢蓋資於師為多二十八年住杭之天竺靈山寺三十一年住上竺益以振宗啓後為已任而從學者益衆永樂初退處大報恩寺以法華如來奧旨所寓非學者所易入輯衆説為之注太子少師姚公為序之且稱兩浙一人上嘗覽之奬諭再三加以厚賚十二年被召纂修大藏經而師總其事初授僧録司右覺義二十一年升右闡教洪熙元年三月初二日示寂于京師海印寺春秋七十有四僧臘六十有一闍維舌本不壞得舍利若干所度弟子志肖得環等若干人嗣其法者天竺道振等若干人某等將奉舍利遺骨歸建塔于某處齎天竺住持碧潭所為事狀介尚寶司少卿姚宗善請銘余在侍近嘗親睹師所以被知遇於先朝者矣為之銘曰維佛立教其道之大俾究乎內遺斥其外維一如師精修篤行朗乎蟾輝淡乎淵澄維帝聖明天監在上曰時豫契真實不妄紛紛誇徒談辨波起彼競于膚此味于髓錫之褒嘉維帝聖明泊如無榮維師之誠嗟其已矣言則不忘遺蛻所存尚謹于藏僧録司右善世南洲法師塔銘洪熙元年八月十八日上御便殿召僧録司右善世溥洽入見慰勞甚至遂奏乞還南京大報恩寺以終老從之賜佛像經鈔若干緡給驛舟命中官護送既至明年為宣德元年七月草有八日微疾呼寺之住持惟實付後事留偈訣别其徒云清淨自在中還得如是住一切大安樂清淨自在住遂化春秋八十有一僧臘六十有九停龕旬餘顔色如生其徒舉龕于長干西南之鳯嶺奉全身建塔焉貴戚名卿士庶方外耆耄送者萬餘人訃聞上遣行人王麟蒞祭於是其徒圓淨慈霔等奉惟實所狀事行介禮部尚書胡公求塔銘而少師吏部尚書蹇公助為之言按狀師諱溥洽字南洲晚號迂叟又稱一雨翁者人即其所居軒號之也姓陸氏宋寶章閣待制遊之後世居會稽之山隂祖某仕元為饒州餘干縣尹父仁甫母餘干周氏師生於至正丙戌自幼闓爽頴異父教之詩書悟解日益進未齓已志慕出世法有老長戲之曰仙人本是山人作師應聲對曰鳯鳥終非凡鳥為衆驚異之每入招提瞻佛像輒敬禮膜拜父母知不可遏命於郡之普濟寺禮雪庭祥公為師既受具戒上天竺謁東明日公一見器重之命典賔客其儀矩從容秩然叢林老宿多推服以為難能而博究教典雖寒暑夙夜不懈已而從具菴玘公于普福講求要旨凡諸經範精粗小大之義靡不貫串而旁通儒書間以餘力為詩文多有造詣玘公命首懴事行三昧法而自是進於止觀明淨之道及玘公還演福廣陶鑄來學師偕同志二三輩奮進其中沛然有所自得洪武辛亥出世主孤山瑪瑙講寺戊午全室泐公等奉詔注楞伽金剛心經師時侍圯公在焉訓釋考訂多所助益癸亥住蘇州北禪寺學徒雲集師為開演五時八教如來一代施化之儀郡之樂善者咸心悅誠服率其子弟日詣講下請受法華經旨師敷析要義無智愚髙下人人滿所欲而退一時宗門耆碩如九臯聲公啓宗佑公咸共嗟賞謂吳中法席繇宋迄今可為盛矣又六年主杭之天竺蘇之學徒從往者甚衆乃循慈雲故事建金光明護國期懴七晝夜為衆講貫無虛日嵗餘太祖皇帝聞其賢召為僧録司右講經玉音褒諭有通東魯之書博西來之意之語蓋知之為深居長干西文室三年時夢觀主天禧其徒由髙者夜夢詣師室及門有二神人兜鍪金甲護衛甚嚴叱止髙曰寺主在是既覺詣師告所夢且曰公其代吾師乎踰月夢觀卒有旨命師兼主天禧而四方學者歸嚮益盛法益振教益流譽望益隆勳尊貴戚趨走敬禮者接踵户外又三年升右闡教遂升左善世太宗皇帝舉義師道衍公有輔翼居守功上即位召衍至自北京命主教事師以左善世遜衍而已居右上嘉從之永樂四年詔修天禧寺浮圖落成之日車駕臨幸命師慶贊祥光煜煜萬衆聚觀天顔愈懌時有任覺義者忌師之寵搆詞間之左遷右覺義疏斥師不辨自處裕如既而上察其心復右善世仁宗皇帝臨御以老宿數被召問禮遇特厚命居慶壽寺松隂精舍以自佚而賜賚屢加蓋師歷事列聖一以至誠而言動必祗禮度處物以和馭衆以寬接引來學隨材具深淺而開悟之咸有成而去解后逢掖士喜商論文事三四十年間巨緇老衲有文聲者師與衍公為首衍公既進位太子少師賜名廣孝其晚嵗於師尤厚有疾將化之前一日太宗皇帝親臨視之問所欲言獨舉師為對不及他事蓋兩人知契最深云嘗有問師壽幾何曰九九不過焉有日供畦蔬者一日師勞之曰勤爾久矣更用盡七月耳至是皆驗師所著有金剛經注解附録二卷應制及與名人倡和詩若干卷國家建法會一切科儀文字皆師所定以貽範於後其所度弟子圓悟大霑僧録右覺義慈霔志了若干人得法弟子僧録左善世聞晟右善世圓淨鴻義玄妙廣惠禪師右善世行杲左覺義守行右覺義惠朗德潤集慶雲山僧綱都副智達善啓上天竺住持碧潭等若干人銘曰天台之源啓于鷲嶺教觀顯示煥乎炳炳如獅子吼如海潮音浩乎洋洋閎博雄深以大總持妙盡佛意作憲垂範沿遠有嗣千嵗之下傳暨洽公公所自出偉儒其宗明爽夙成與佛有契一瞻金像如悟宿世捐棄愛念皈命慈父秉心之堅金石非固道之難致海濶天髙力探精思靡夕靡朝昉其思之沉潛反覆逮其發之芬華穠郁如山之載如川之輸擷之無盡挹之有餘奕奕講筵鳴鼓其鏜四衆拱聽如暗得明名山巨剎屢主法席來學來依奔走填溢譽聞四馳升聞黼扆褒之揚之有來玉旨爾正爾徒無間遠邦為國迎釐為民迓祥祗事列聖寵命有赫孰為中蠧天鑒靡忒世齡八十聰明強固笑揮玉麈從容囑付靈蛻所藏雲覆蔭之中天秋月朗朗清輝東里文集卷二十五
