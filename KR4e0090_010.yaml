body:
  text: 東里文集卷十明楊士竒撰題跋跋瀧岡阡表瀧岡阡表余得之子啓學士碑不載何人書意是歐公自書結體甚佳當時此文初出宋景文即取求其生而不得則死者與我皆無恨數語書之以自省然則世之治獄者其可以忽哉跋李靖西嶽書右唐李衛公布衣時上西嶽書真迹蓋厭隋亂己極負濟世之志奮欲有為而咨之神明之辭也士重乎立志飬氣衛公此書志已先定而氣蓋宇內矣是以卒能輔明主而建功業焉其書亦佳石刻在廣西余得之劉長吾僉事云跋胡忠簡公封事藁右吾郡宋胡忠簡公封事藁有周文忠公楊文節公題跋在後忠簡孫搢刻于融州真仙巖劉長吾得之以惠余者忠簡筆法出顔魯公蓋忠義之性有相契矣揭文安公謂此書本左司郎中豐城范濬舜文所為將奏之以示忠簡忠簡曰書奏即不免南遷子有老母不可以纍母吾以奏之遂有新州之命余近於內府檢志書見豐水志載范濬事云為戶部檢詳時欲與胡銓相繼論奏和議胡首抗章范實從臾之胡之逐又贐其行未嘗云此書范所為也豐水志作於宋南渡後當得實不知文安何自而云然也然文安云廬陵胡氏楊氏皆國家之元氣故以所作楊氏忠莭祠記附此帖之後跋右軍十七帖黃長睿云右軍草書十七帖最為可師此書中龍也張彥逺法書要録云唐太宗購二王書右軍草書有三千紙取其迹以類相從率一丈二尺為卷此帖文二尺凡百七行九百二十三字今世不復見古帖獨泉州有石刻然己歸內府民間亦不復可得也此本吾近得之楊耀宗長史跋七姬厝志七姫厝志張來儀文宋克溫書余得之姑蘇王汝玉七姫皆潘氏妾不負其主俱死於一日之間可謂烈矣而其文其書亦皆竒也跋王荆公詩王荆公與其弟􅊭甫此君堂詠竹詩二首相傳皆公所書石刻在今應天府學公書氣韻飄逸勢若率然而未嘗無從容整暇之意亦自成一家昔人論公書類忙時所作此説非也但學書者不可為法耳題楊文川詩楊文川名中字伯允吉水人宋忠襄公之裔蚤從范文白公德機有詩名揭文安公所謂得范之骨者也其詩兵後不傳間從其孫黻求之僅見此數篇然景星威鳯一出人知為瑞物豈必其多見哉跋文山集杜句右信國文公集杜句二百首皆在燕獄所作每首有公自序其後鄧中齋撰督府忠義傳劉中齋撰公傳皆有資於此初公得死後吉水士人張𢎞毅即序中所稱千載心者自燕以公爪髮及遺文歸而此詩亦在其中鄉郡舊嘗刻公遺文兵後板廢今士大夫家間存其本永樂丙申余於京師遇此詩及督府忠義傳遂録藏之題劉山陰集山隂集者清江劉永之仲修著仲修治春秋學詩文清麗古雅為當時所重工書法篆楷行草皆有師承嘗聞之長者始仲修既冠未知學因過婦翁同郡練伯升翁長子壻也蚤有文譽翁家特異視之而庸衆人視仲修既歸發憤就學日夜不懈親良師友講論切磋數年學業大進時譽更出伯升右是以士貴乎立志也又聞仲修家富於資賖貸施數郡仲修獨泊然布素曰靜處一室書籍翰墨自娛客至不為盛饌酒數行論文賦詩焚香鳴琴而巳家事未嘗一留意非逄掖士亦未嘗一接言笑可為幽貞絶俗者矣題石徂徠集宋石守道徂徠集二册守道與歐陽文忠公同年其平生見歐公所撰墓志公又有讀徂徠集二詩極其愛重忿歎之意皆載此集之後余得於翰林庶吉士吾紳古之君子正直自持是是非非無所顧忌類如此讀斯文者懦夫可以有立志矣題歐陽文忠公事迹按于役志九月壬辰安道貶筠州甲午師魯貶郢州丁酉余貶夷陵與髙若訥書云昨日安道貶官師魯待罪則余尹被貶在公之先明甚公諸子述事迹及韓魏公作墓志皆以為公之貶在余尹之先魏公偶出一時之悮或但據其子所述書之而為子職者不密於考據如此雖非大關涉可以率略乎題通鑑續編後右通鑑續編二十四卷六册四明陳桱子經著刻板今在蘇州府學起盤古至髙辛為第一卷契丹事在唐及五代者為第二卷後二十二卷則宋三百二十年事也孔子曰吾猶及史之闕文學者於前事據其所可知其所不可知闕之可也羲農以前遐哉邈矣非有文字之紀也其事間見於百氏所記者要多以意言之耳而必掇拾以補前史之闕亦異乎孔子之意哉昔劉恕作通鑑外紀避經而專采百氏之説金履祥謂其野而難質故作通鑑前編不復避經桱嘗為之舉要固主履祥之説矣而復著此卷何耶宋史於今少見全書學者於此編可以考見一代之得失嘗聞吾郡劉倩玉亦著此書未板行往年會其孫公潛云留在永豐今不知其何如也題通鑑前編舉要新書通鑑前編舉要新書婺金履祥編四明陳桱舉要起唐堯以下接乎綱目其體則編年其事則易書詩春秋其文則兼孔子春秋朱子綱目之法也刻在蘇州郡學余家一册録於中書舍人朱季寧蓋讀之竊有惑焉孔子傷周東遷之後堯舜禹湯文武之道不行上失其所以為君下失其所以為臣彜倫斁而天下亂故作春秋以正君臣父子尊卑內外之分以明堯舜禹湯文武之道向使二百四十二年之間堯舜禹湯文武之道行焉春秋之書無作矣春秋之後降為戰國為秦漢以至於隋唐五代其為斁且亂益甚朱子效春秋作綱目亦孔子之意也向使戰國至于五代堯舜禹湯文武之道行焉綱目之書無作矣故春秋綱目之作皆以傷堯舜禹湯文武之道不行於世也新書用春秋綱目之法乃比堯舜禹湯文武之事而書之果可乎哉綱目者繼春秋而作以新書接綱目之前是無春秋矣其又可乎或曰此書簡要便於學者夫簡便者常情之所趍趍彼者必舍此使人皆求之新書之簡且便將舍易書春秋不講卒不知聖人之所以為訓可乎不可也此皆余之所惑而不能通者願有質焉題三禮考注後右録三禮考注六册此書本吳文正公澄用朱子之意考定為儀禮十七篇儀禮逸經八篇儀禮傳十篇周官六篇考工記别為一卷見公文集中三禮敘録及虞文靖公行狀如此嘗聞長老言吾邑康震宗武受學於公元季兵亂其書藏康氏亂後郡中晏璧彥文從康之孫求得之遂掩為巳作余近嵗於鄒侍講仲熙家見璧所録初本注內有稱澄曰者皆改作先君曰稱澄案者改作愚謂用粉塗其舊而書之其迹隱隱可見至後曲禮八篇皆無所塗改與向所聞頗同遂與鄒各録一本凡其塗改者皆從舊書之而參之敘録其篇數增損不同敘録補逸經八篇投壷奔喪公冠諸侯遷廟諸侯釁廟之外中霤禘于太廟王居明堂三篇云其經亡矣篇題僅見於鄭注片言隻字之未泯者必收拾而不敢遺今此書逸禮止六篇而中霤禘於太廟其篇題皆不著敘録禮義傳十篇此書增入服義喪大記喪義祭法祭義五篇敘録正經逸經及傳之外云餘悉歸諸戴記此書傳後復增曲禮八篇凡增十二篇其中固有載入禮記纂言者矣不當復出也篇目不同如此其中又不及深考也余又聞老長言文正晚年於此書欲復加考訂不及臨沒授其意於孫當當罷官間居嘗為之而未就也豈誠然耶然文正分禮為經義為傳今此書增入者禮義率混淆無别又其卷首亦載敘録而與卷中自有不合者決非當所為無疑豈璧所增耶璧素與余往來獨未嘗見示此書其編乾坤清氣集以巳意改古人之作者數處余嘗與之辨皆以余言為然故知其為人任意率略而於此書不能無疑於其所自增也然余既録此書不及再見不得質問姑志之以俟知者題壇山石後右吉曰癸已四篆字得之永豐進士劉智安石刻今在贊皇題云周穆王時所刻世逺不可知然字畫妙絶決非後人所及也題正祀典名號詔書右洪武三年正祀典名號詔書此制非自臣下建白一出我太祖皇帝聖智有以灼見唐虞三代聖人之意其封號或因或革皆允當乎天理人心之大公而盡革後來瀆亂禮經之弊以為萬世有天下國家者之法所謂大哉王言者也詔下之十五年臣詹希原書石刻之太學又三十有五年臣士竒得此本謹識而寶藏之題詹孟舉千文右中書舍人詹希原大字千文刻板在蜀中余得之禮部胡侍郎國朝大字希原為第一蓋兼歐虞顔栁之法而有冠冕佩玉之風者也跋滕王閣序右趙孟俯書滕王閣記刻板不知何在此本永樂十三年七月草五日臣士竒侍文華殿所被賜者也筆意精妙絶倫後得孟俯書此記墨迹參較之乃不及此逺甚其亦得善刻者之助乎簽題當時睿翰所書謹識而珍襲之跋干䘵字書右顔魯公干䘵字書辨别字之正俗及通用亦間有析其義者云干䘵者蓋唐以書取士也而公真書小字之傳于後者亦獨見此耳跋戴九齡和陶詩九靈姓戴名良字叔能號九靈山人金華人少與宋景廉胡仲申同學文亦齊名九靈洪武初屢徴不出變姓名隱四明山中二十餘年後坐纍卒于京此集余得之丁鶴年九靈别有文集四册余嘗於趙彥如家見之醇粹博雅有六一風致亦一時巨擘也題王臨川文後歐蘇曽王四家全集今書坊皆無刻板獨北京有荆公臨川集板在國子監舊崇文閣而所闕什一用之永樂八年扈從在北京印二本以一本寄余凡十册既巳録補遂取吳草廬先生所為序冠諸卷首又取二程朱陸四先生及司馬文正諸賢所論公􅊭生者附於序後蓋凡天下後世之狺狺於公者皆吠聲而巳豈其真有所見哉夫的然有所見者余之所録是己題諸儒奧論後諸儒奧論二册得於中書舍人建昌黃卓前輩讀史必因其人而考其時因其事而揆諸理故各極其所見近年鄉先生王子啓教學者讀史每終一傳必作一論猶存古人讀史之法因附著之以示來學書唐才子傳後唐才子傳西域辛文房著十卷總三百九十七人皆有詩名當時其見於唐書者共百人蓋行事不關大體不足為勸戒者不録作史之體也而讀其詩欲知其人於辛所録宜有取然唐以詩取士三百年間以詩名者當不止於辛之所録如郭元振張九齡李雍之徒顯於時矣而猶遺之况在下者乎而辛所録者又間雜以臆説觀者當擇之書十史詳節後十史詳節總二百七十三卷史記三國志晉書南北史隋書五代史題曰東萊校正兩漢及唐書題曰諸儒校正吾家十五册此書務簡略至事之切要者亦或不載甚至節省助語詞讀之無味者然考東萊年譜不見校正此書世謂此東萊早年所成後悔之劉元城云古人著述多在暮年正為此耳書元首科程文後元延祐乙卯廷試録一册蓋先待制登第之嵗於今百有二嵗余始得之前山東按察使郭儼彥莊元科舉取士昉於此而纍科得士亦莫盛於此左右榜總五十六人是録所刋對策凡四卷五十有三人先待制之文在焉而五十六人家狀及其初授官悉具也書養蒙大訓後右飬蒙大訓豫章熊大年集陳氏經學啓蒙初學經訓小學禮詩王氏伊洛精義饒氏性理字訓訓蒙理詩程氏育蒙明訓胡氏序古千文朱子訓蒙絶句孝經刋誤十書而為之者也自三言四言至於七言而終孝經於教童子甚宜端本澄源之書也然字訓本程達原因程正思之舊而增廣之者此云饒氏所輯不考之過也書説文字原後右説文字原一册元周伯琦著伯琦字伯溫聞之前輩言元至正間初改奎章閣為宣文朝臣咸謂必命庫庫書榜是時伯溫雖在館閣精篆書而未為上知庫庫曰令篆書宣文閣榜十數紙周不識其意一曰有旨命庫庫書閣榜庫庫言臣所能真書非古古莫如篆朝廷宣文閣用篆書為得體周伯溫篆書今世無過之者上如其言召伯琦書下筆稱旨由是益見進用前輩臨事明於大體而不自取其功與引拔人材委曲成就之如此皆不可及因得伯琦所著書輒附志舊聞于卷之末書六書正訛後右六書正訛一册元鄱陽周伯琦著伯琦翰林待制南翁之子官至江浙行省左丞元之士大夫以篆書名者皆推伯琦所著又有説文字原其自序云字原以敘制作之全正訛以刋傳寫之謬非獨攻篆之家所不可無於使學者得明古人作字之本意而不眩於俗者不為無助書新唐書後新唐書二百草五卷歐陽文忠公撰紀表志宋景文公撰列傳當時以景文所撰過文且一書出兩手命文忠看詳改歸一體文忠曰人所見不同且宋公前輩遂己故事修書唯官髙者一人書職名時景文守鄭州在文忠下文忠曰宋公用力久且深何可掩哉遂於所撰各書之古之君子存心至公無欲上人如此吾家唐書五十四册刻板在福州府學得之今翰林學士揚公勉仁云書五代史後五代史七十四卷總十册吾郡歐陽文忠公著板在太學前史文章卓然髙出為世師法者司馬遷史記班固前漢書及公此書而巳而義例之精史漢不及題丁鶴年詩鶴年其先西域人西域人多名丁既入中國因以為姓故鶴年亦丁姓其祖父皆仕元二兄皆舉進士為顯官鶴年獨泊然布素寒士元亡歸四明與戴叔能相善尚莭操有孝行叔能嘗為作傳後隱武昌山中余在武昌遇之甚相得時巳老矣别後數嵗卒此集蓋其卒後得之武昌鄧存誠跋安雅堂文安雅堂文集閩陳旅衆仲著刻板在福州府學余家二册得於翰林庶吉士洪遵道元之時閩人以古文名者衆仲其巨擘也余嘗愛閩之善文者二人唐歐陽詹及衆仲同出於莆田常衮在閩最始識詹詹至京師名聞特甚而韓吏部尤厚之官至國子四門助教馬伯庸至閩最始識衆仲衆仲至京師諸公皆內交而虞學士尤厚之官至國子監丞其事亦相類然詹之文切深衆仲之文優柔敦厚此其所異也題黃少保省愆集後讀吾友少保黃公永樂中所作省愆詩集至于一再蓋幾於痛定思痛不能不太息流涕於往事焉初太宗皇帝將巡北京召吏部尚書兼詹事蹇義兵部尚書兼詹事金忠右春坊大學士兼翰林侍讀黃淮左春坊左諭德兼翰林侍講楊士竒諭之曰居守事重今文臣中簡留汝四人輔導監國昔唐太宗簡輔監國必付房元齡汝等宜識朕此意敬共無怠四臣皆拜稽受命其後凡下璽書諭幾務必四臣與聞時仁宗皇帝在東宫所以禮遇四臣甚厚而支庶有留京邸潛志奪嫡者日夜窺伺間隙從而張虛駕妄以為監國之過又結嬖近助於內賴上聖明終不為惑然為宫臣者胥凛凛卼臲數見頌繫雖四臣不免或浹旬或纍月唯淮一滯十年蓋鄒孟氏所謂莫之致而致者也夫莫之致而致君子何容心哉亦反求諸巳耳此省愆之所以著志也嗟乎四臣者今蹇黃二公及士竒幸尚存去險即夷皆二聖之賜而古人安不忘危之戒君子反躬修省之誠在吾徒不可一日而忽之也故謹書於集後以歸黃公亦以自警云耳題劉仲修書虞揭詩後右元揭文安公憶昔詩四首虞文靖公寄文安絶句一首清江劉仲修先生所書今翰林侍講金君幼孜之所藏也幼孜以示余世傳文安有憾於三朝新婦之評嘗中夜過文靖一言不合揮袂遽去文靖寄此詩亦以寓憾又摘世所傳刻本此詩寄語傍人休大笑之語謂本於文安所為范先生詩序而發援引左驗真若有據然余意當時文安不留遽去或牽於人事不得己未可知若所云三朝新婦亦評之云耳豈必貶之云乎貶不貶不暇論夫賢人君子之相與其言語文字之間或相推讓相辨論相評品皆出乎至公豈如今之無識訑訑自髙者之所為乎嘗觀二公之文其相與辨論數數矣皆未聞有一憾焉者何獨怏怏乎是也此非與論杜少陵莫倚善題鸚鵡者類耶今觀劉先生所書而益知世俗所傳不可信先生嘗親炙二公使果如世俗所云何故書此詩都無一語及之如以為不欲著揚前輩之過則二公他詩文可傳甚多又何必書此哉先生書文靖此詩第三句説與傍人堪大笑與刻本不同二字味此尤足以見二公相得之情溢乎辭氣之表而刻本之誤政有以啓俗人欺世之論不可不辨故書于後且以質諸金君云書延祐二年進士題名後右元延祐二年進士題名記蓋先待制登第之嵗也此碑趙文敏公所書刻石在北京國子監此本故大學士胡文穆公所惠者虞文靖公云此科得士最盛蓋昔人嘗有記其先友者所以著一時交遊之盛亦使後人之重世好也余既得此碑又得當時諸公應試家狀并初授官及所選刻廷對之文附録于後而此科監試讀卷等官及進士有傳在國史者又附録焉庶以考見其平生行義政治而續有得其墓志墓碑行狀則皆録附于隂其或已見於史而墓志等文亦不嫌於重録者蓋以史之所書常略也永樂己亥正月壬子曾孫士竒謹識書張文昌詩唐張籍字文昌史稱和州烏江人宋湯季庸定為吳郡人考韓文張中丞傳與湯説同文昌貞元十五年進士仕至國子司業其詩與元白諸人號元和體文昌尤長於樂府文獻通考云其集三卷又云張洎所編者十二卷又有季庸所編八卷余家所有五七言律絶及樂府凡五卷不知何人編録楚辭跋右楚辭一册德安二守羅先生手筆先生學於元季兵亂之際不得書雖﨑嶇奔竄常晝夜鈔録以讀今之學者幸遇太平無事之日得書甚易而往往不務力學此何怪乎後之人不及前輩也劉職方詩跋右槎翁先生詩得之鵬舉之子鎡嘗聞長老言先生八嵗能詩既長遭兵亂雖奔竄岩谷﨑嶇無聊之際日必賦一詩不廢至遇朋徒相聚或興有所發輒纍纍賦之不倦也蓋其好學之篤如此然先生於明經於古文尤所篤好詩特其餘事耳先生德義在人治行在史余因此集特記其好學一事以示後人云劉文房詩跋唐隨州刺史劉長卿字文房與髙適同時揚伯謙選唐音列諸中唐其詩清婉有思致然數遭廢黜故多憂窮沉欎之意余所録者傳於江夏蔣立恭家嘗見閣本詩後有序記碑銘等文此特録詩而五言古體尤少伯謙選唐五言古體自陳子昂薛嗣通王孟儲李韋栁之外一無所取此録豈與伯謙同意哉而篇目次第亦與閣本異書三蘇文選後三蘇文選一册十二卷東萊所選建安蔡文子為之注皆取其論治體而便於科舉之用雖不能皆純而讀之可以啓益胸次動蕩筆端未必無助也題曾氏冠辭後士大夫家四禮冠為首古禮既廢後世欲復之冠為易而猶寡見焉前百餘年南北混一儒先君子布列中朝時吾郡曾公巽申應奉翰林獨用古禮冠其子遂為諸公稱賞如此可以觀世矣今二三十年來朝之學士大夫家率用冠禮冠不用禮則胥視為茍簡世道其漸復古歟此卷首載應奉訓辭而冠辭出吳文正公虞文靖公揭文安公州判許公皆親筆自元季之亂也流落他姓應奉曾孫少詹事棨求之數十年不得近有携至北京者詹事已沒世詹事子積適至即出厚資購得之可為珠還合浦積可能為孝然積之先公及吳虞揭許諸公之言皆至理所寓積能明諸心修諸躬尤孝之大者積尚勉之書元史後此書於元百餘年之事備矣而亡國之際忠邪之迹或略或於故老所傳者相戾蓋當時急於成書不暇遍訪而詳核也跋文丞相督府忠義傳右文丞相督府忠義傳宋禮部侍郎兼學士院權直吾郡鄧光薦撰光薦字中甫學者稱中齋先生與丞相同朝此傳多本於丞相所自述故特詳實而後來作宋史又多本於此云書孔子家語後孔子家語一册在江夏時得之南昌龍參參博學工詩有清思喜規模盛唐吾友夏仲達特愛重之參敦契誼然不能擇交湘中有道士善詩參南遊與之厚後道士以符呪敗官并捕其家其父走匿參舟參弟諫不可納參歎曰豈有朋友之父有急而不容乎弟走告仲達仲達竊謂參曰不忍朋友之父亦念吾有父乎參雖悟終不肯明言遣之道士父心知其意去匿他處數日官跟捕得之他處匿之者同罪家屬皆徙邉參雖幸免罪亦因是盡喪其資易曰比之匪人參之謂矣若仲達非納約自牖者乎余目擊其事故因此書思其人而以志戒跋張旭草書旭書雄徑飛動神妙叵測而規矩固在凡今之慕旭者不免效杜季良之弊矣跋懷素帖張旭書縱意豪宕變化捷出如健鵬掠野怒驥脫羈懷素得張之法乃清徑精麗應規合矩蓋魯男子學栁下惠者故足重也東里文集卷十
