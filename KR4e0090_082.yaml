body:
  text: 東里續集巻五十四明楊士竒撰詩四言騶虞詩并序永樂二年八月騶虞見鈞州鈞州周王封内之地王徃觀焉載以歸乃九月丁未躬詣闕下上表進獻羣臣聚觀懽懌舞蹈以為從古罕見夫嘉祥之出必有至徳在於尊位若馬呈於河龜見于洛皆有所由考之傳記騶虞仁瑞之獸今兹之見豈偶然哉洪惟皇帝陛下臨御以来脩舊章明教化覃布徳澤除弊建利爰自親親以至仁民愛物天覆而春育四海之内翕然咸和殊邦逺國數萬里之外不待告詔莫不稱臣效貢稽首来庭此皆陛下至仁之徳旁孚逺被之所致也嘉祥之出厥有由哉臣士竒竊見自去嵗以来四方上奏祥瑞不可勝數陛下聖心惟民為重皆以謂非切實用抑而不貴然今騶虞之見實上天所降至仁之應非如其他草木之珍鳥獸之異豈可隱而弗宣哉輒效詩人歌詠之意謹拜手稽首而獻詩曰維天至仁涵育萬類維我皇明一徳作配穆穆太祖奄有八埏仁覆其人大哉如天皇帝仁聖同符太祖天命人歸緝熈九五皇帝曰祗予臨兆民上天皇考予承維仁乃詔多方乃循舊章乃求遺逸乃登俊良徳教宣明霈澤覃敷靡彊不馴靡弱不扶濡槁滌汚起廢疏堙天叙秩秩人文彬彬闕小大熈熈夏葛冬裘不知渇饑聲教漸被孰有内外邇悦逺来極地所載雕題漆齒椎結辮髪梯航重譯俯伏北闕至和孚洽恊于天人無逺弗庭百祥萃臻嘉禾瑞麥甘露芝草白雉黄犀皇不為寳維鈞有山在彼周疆乃産異獸皓質緇章酋耳脩尾身虎而馴食不生物性麟之仁維周親王徃鈞于田迫之弗驚擾之以還曰斯騶虞皇仁之符不逺千里獻于皇都王拜稽首皇帝仁聖維仁動天靈祥恊應帝曰匪予予弟仁孝發祥周邦維王之召王曰匪臣萬邦帝治帝徳致祥臣敢冐之羣臣百工觀視嗟嘆自昔有聞於今實見懽欣拜舞帝仁所来帝曰予仁曾曷下施予懐忠賢為國之禎菽粟布帛民資以生時無不獲予治斯徳嘉祥異物豈予攸亟羣臣拜手皇帝聖徳大禹不伐商宗恭默皇心一揆皇壽萬嵗維天降祥如川方至臣職載記獲睹休異敬陳歌詩永告來世聖孝瑞應詩有序洪惟皇帝陛下以孝治天下所以教化紀綱之道一遵太祖聖神文武欽明啟運俊徳成功統天大孝髙皇帝成憲天下萬國之人承風鄉化熈熈然入於泰和之域矣陛下聖心重惟皇考皇妣陟降在天瞻侍無所乃於永樂四年十一月庚申徴天下道士咸至京師即朝天宫神樂觀洞神宫脩舉金録齋法表孝思也車駕幸齋壇聖神䖍至對越在上肅然有臨辛酉有青鸞白鶴翔舞於神樂觀壬戌車駕復幸朝天宫有寳盖五色光輝奕煜自正陽門冉冉入于皇城癸亥有神人見神樂觀甲子卿雲見朝天宫乙丑甘露降於宫樹丙寅車駕復幸朝天宫卿雲覆映壇上鸞鶴數百翔舞旋繞既訖事二日醴泉出神樂觀甘露復降孝陵臣切惟禎祥之出皆不徒然謹按鶡冠子曰聖人之徳上及太清下及太寧中及萬靈則甘露降醴泉出孝經援神契曰天子孝則慶雲見若鸞鶴之應道家為重惟神人嘗一見於漢武登封之際而畢見於今日既當聖誠感孚之時又皆出於神明戾止之地實由陛下大孝深仁至誠之應辛未羣臣上表賀以為陛下聖徳純至用克膺兹嘉祥陛下謙抑弗居一歸本於皇考妣聖靈以下及羣臣恊賛之力又申飭羣臣古先哲王皆因祥思懼今不宜有所怠忽此益以見陛下與二帝三王同一盛心臣叨塵侍從躬覩盛事不可無歌詠以鋪張鴻休謹拜手稽首而獻詩曰惟皇御極八紘率俾曰孝曰仁爰教爰理惟皇考妣著存無間豈曰羮牆斯須有見洋洋聖靈陟降在天遑遑孝思皇心有䖍乃循𤣥範乃脩金録爰伸終慕暨惠普率惟皇淵𠂻齋莊純一對越有嚴有恪有翼上帝有言忱孝予子百神有言篤恭于主至誠感孚禎應駢臻縞鶴傞傞青鸞䎙䎙下上壇壝周旋廡序徘徊翺翔如掖神馭煜煜寳盖絳節黄麾流越端門如神徃来復有神人有言有告出入倐忽邈不可究復有卿雲五章爛垂輪囷葳蕤琪葉金支粲粲天乳湑湑甘露既零道苑亦降陵樹厭浥瓊脂淋漓玉津以薦以飡統和天人訖事秉䖍如盥未薦繩繩休徴疊出層見有深規甃有泉潗潗苾芬充達沾者酡頰穹祇發祥式昭孝誠羣臣拜手皇徳之徵皇曰匪予天地考妣降鑒畀祐錫時蕃祉自昔明聖膺祥務敬汝予恊恭庶臻永慶羣臣拜手惟皇聖明皇不自聖臣敢怠寧有臣士竒紀載是職敬陳歌詩永播無極瑞星詩有序臣聞之書曰惟徳動天又聞之先儒曰天心仁愛人君有以灼見天與人君之相與也夫天不言而恒示人君以象有動乎此必應於彼或昭徳或示儆莫非所以仁愛之也徃古可徵矣恭惟皇上以仁聖之徳奉天命嗣大統臨御以来孜孜夙夜體天地之心以愛人守祖宗之法以為治敷布徳澤脩明政化四海萬邦咸樂太平祥瑞之臻史不勝書廼宣徳五年冬十二月二十有一日夜含譽星見于九斿大如彈丸色黄白光耀有彗欽天監言占法含譽瑞星為君上施孝徳興禮樂人民和悦夷狄奉化来朝之應於是羣臣忻悦抃舞皆以為皇上聖徳所感國家隆盛永逺之慶奉表上賀聖心謙抑推而弗居且賜璽書戒勵彌至盖與夏禹之不矜不伐商宗之嚴恭寅畏同一大徳也臣忝執筆預侍從敬賦四言詩一篇紀述盛美謹録上進伏惟電覽焉詩曰惟天之髙蕩蕩難名仁覆萬類大徳曰生惟君憲天行天之道仁育羣生下民是保天監君徳有允肖之来享来歆為祥為祺皇欽天命嗣臨大寳嚴孝宗廟祗奉聖母夙夜恭勤惟徳之霈始于家邦𢎞及四海飢者食之寒者衣之槁者濡之仆者植之如藝黍稷薅莠與稂驅去螟螣罔俾害傷矜惻鰥孤撫字無告有昧弗率勉勉教詔除其凜冽敷之融和化戚以愉易嘯以歌立綱布紀惟賢之庸推亡固存履道大公乃脩徳化制禮作樂天叙有常人文煥若芒芒四裔雨露所墜慕義歸誠靡或弗至上帝曰俞允光予命何以報錫式鴻厥慶嘉禾異麥駢出于下駢出于上慶雲膏露宣徳庚戌月維已丑其日丁亥夕瑞在酉大星如丸九斿之傍有彗若射金玉其煌素蟾東生皎乎相輝河漢為䝉參井為㣲厥名含譽太史敷奏百辟嵩呼賀祥獻夀皇徳仁聖謙譲是崇歸功穹祇歸功祖宗歸功聖母亦及臣子申命飭勵敬哉無怠稽古大聖軒轅唐虞咸有瑞星昭徳之符皇徳格天前聖一致肆用作詩永告来世仁安堂詩為任敬立賦八章奕奕髙堂麗于城隅有植其􅞉有列其書髙堂奕奕既閑且殖展矣君子秉心之徳其心伊何相人予均其徳伊何侯利安于民民之顚沛維予之殆民之憯憯維予之瘁民之瘁矣予胡寧居言遄赴之弗歩而趨民乃定矣予心則夷維予心之夷曷報曷施帝懐康靖弗懈夙夜孰遏其升不顯在下南有松栢以柱以楹聿觀爾升誕惠厥寧蔣氏三逕詩有序九章鄂城蔣立恭慕其先世詡作三逕粤人呉徳英圖之楚府呉勤教授前進士廬陵蕭尚記之序之其友楊士竒為詠歌之其辭曰瞻彼三逕于湖之側鶴嶺在南鳳岡在北瞻彼三逕于湖之干有植桓桓有蔽欒欒維此幽人辟之治之維此幽人宅之宜之不亢而迕不傴而嫵中心儢儢爰來爰處爰率我先祖維我先祖予恒游息既寛既碩予是儀是式厥有㫖酒亦有肥牲時洽我隣及我良朋式優以游式燕以休曷競曷柔曷畀曷求相此幽人胡樂陶陶相彼貪人亦孔之勞有圖有文既昭且宣暨予作詩申告弗諼東川迎養圖詩有序十章東川遂養也君子仕為東川守有禄迎養其父母而樂因以示化其民也東川之漘欒欒栢松君子于行其樂融融欒欒栢松東川之漘君子于行其從彬彬首之皤皤儀之䄡䄡君子有父聿來自南峩峩翟冠蘭充其禕君子有母自南偕來君子拜稽言笑嘻嘻父母聖仁不我遐遺維父與母眉夀而康維兄與弟左右扶將行其野矣有桑有麻入其邑矣有絃有歌奕奕髙堂式燕以嬉匪直孝恭其施孔宜凡厥庶民各有所生孰時觀之弗感而興懿是孝徳有肇有循肆庸作歌以告厥民聽烏軒詩為劉宗韶作民物之生厥賦惟均氣稟既殊靈秀維人其生之初父子之慈民物斯同靡或有虧林棲者烏性純且仁反哺維勤其參其鶱維父維母生我鞠我父母孔勞我心曷舍雨露既濡履之則悲哀我父母我寧以時烏鳴且和養適其私静言聽之我心何如天之髙矣日之逺矣哀哀父母我心曷巳立身揚名維孝之大朂爾君子敬勵于志後山詩為江西林憲副作八章崔崔後山清漳之漘下蟠厚坤上摩穹旻山有嘉植維松維栢亦有令人維英維特維子潤甫愷悌君子奕奕髙堂在山之趾道積于躬靜與山處及時奮庸懐山曷己山則升雲興雨祁祁有道于施君子之宜大江之西維國南服政紀之明不嚴以肅肅如秋霜示民之威熈如春陽維民之懐維山之崇不遷厥常維君子譽式永其彰題輝姪蘭幽澹其芳介于貞石何彼鸞鳳而棲枳棘言念君子可以觀徳題升龍陽徳中正與時偕行乾元九五天下文明題降龍雲行雨施萬物咸春收斂神用淵潜自珍承訓堂詩有序姑蘇顧仲華甫一子暘朝夕訓之暘敬承唯謹遂請於父名其侍養之堂曰承訓間求余詩余嘗過顧氏愛仲華甫瀟灑散逸尤愛暘篤實温靖善事其父與其繼母盖内外無間言暘字東啟深於醫製藥尤精余老疾資之多矣故賦古詩一篇用致嘉勉之意云奕奕髙堂有父有母父母孔慈錫我教誘其教伊何曰義與仁于愛之真于言之諄敬恭聽之允率履之父母孔仁而敢怠違父母猶天敬事朝夕我行或怠貽我父戚孝哉暘也永欽爾終爾徳式嗣福禄來崇具慶堂詩有序八章駙馬都尉邢臺井公永清作堂以奉其父母名曰具慶求余作詩其父九疇甫初擢給事中在南京與余居同閭巷朝接班行時相徃還九疇甫惇實和厚慎靜不譁其友張子玉又為余道其家居之行及世徳之厚余固意井氏之榮非止近侍也居南京時都尉公雖志學之年已翹然楚楚之異衆炯然白璧之映人盖知井氏慶澤所鍾其在兹也公今躬膺榮命貴聨戚畹得厚禄以奉二親於康寧和豫之時固仰荷國家之大恩亦必本其祖若父積善累徳有以迓承之也斯堂之作其知尊本矣故為之詩曰鬱鬱喬林發厚于本源厚且深其流斯逺維邢井宗世服善仁迨大父父厥脩益勤父也在廷祗帝任使帝錫寵加簡升其子子尚貴主聮婣天潢玉鞶麟衣貂蟬煌煌廼作髙堂奉父與母致隆愛敬日獻春酒春酒在尊鼎薦芬芳父母眉夀允樂且康允樂且康孝心孔寧立身事君維孝之經士竒作詩用諗都尉具慶百齡令聞長世永思堂詩有序十章吉安府推永春顔君文盛端靜㢘厚君子也在吉三嵗每江右藩憲二司及過使之良至京師道官於吉者之賢必舉太守四明陳君與顔君為首稱僕前嵗奉命歸展桑梓聆九邑士民道二君之賢而戴其徳如出一口盖二君皆仁其民如父之於子明於獄如鑑之照物無淹繫無滯牘此吉之人所賴以安者也顔君痛二親之不逮禄養也名其退食之堂曰永思間求為詩余素重顔君故探其情而為之賦亦願有告焉郡之細民寧忍困苦而不敢言者胥史為欺之蠧也亦九邑之人如出一口者君白於陳君相與致明决以蘇被困之民則亦永思之推也南山之木厥有本根浩浩川流則亦有原凡世之氓孰無父母生我育我憂勤是保我疾在躬父母怦怦我躬既平父母載寧我事父母千載未足云胡一朝去我不復林棲者烏則有反哺哀哉小子欲飬無所豈無厚禄豈無華纓我無父母于誰為榮靡旦靡夕孔懐弗忘父兮母兮如睹羮牆居則以思行則以思音容慌焉夢寐對之父天母地覆載同徳哀哀我心何窮何極先哲有訓立身忠君我惇用之敢怠于勤無敢怠勤恒恭敬止終焉永懐悠悠曷已題張子俊山水髙山崔崔青川瀏瀏息有幽居濟有輕舟已逺人境同志來求優哉游哉足以忘憂題陳憲虎虨虨其文眈眈其眎豈不虓怒父子仁在題陳憲龍雲行雨施陽徳之亨豐穰以成天下以平榮夀堂詩有序江西左布政使毗陵呉公潤二親在堂春秋皆將八十而康健和豫嘗䝉恩賜誥封父用深為中憲大夫廣信知府母金氏為太恭人邦人士慶公之親之髙年而承天寵也名其奉養之堂曰榮夀太子賔客胡先生為之記又求余詩公起家秋官屬歴守數郡陞雲南憲使又簡陞今官闓敏㢘惠所至有善政為之詩曰奕奕髙堂奉父與母父母善仁天錫多祜厥祜伊何耆耄皆臻和樂且康皓首頳顔雲章自天式顯賁之命服煌煌封秩貤之孰無父母偕老幾何云誰之居被時寵嘉福禄鼎來其奚自致嗣有君子熈帝之載桓桓君子奠此南服民恃方伯朝倚岳牧維敬維仁以共帝命維孝維忠以樂具慶題白雲山房圖四章髙山在上清流在下懿彼幽人託此適處英英者雲菀菀者林懿彼幽人其潜之深有舟有梁莫或以之嗟此幽人優哉游哉翩翩飛翼夕倦斯還逝予從之以終嵗年題泉坡學士龍時而淵潜時而雲升乾元九五天下文明題水仙漢廣之濵清洛之汭留此娟好邂逅誰遺題菊秋霜既肅黄花始妍爰掇爰飡聊可永年題諼草對此諼草粲乎有章我自陶陶何憂何忘題玉簮姑射之姝翠旍如幃惟顯簮玉不覩容輝題蘭懿此芳蘭在彼巖阿為佩為帶懐哉九歌題鶺鴒圖有序姪子和重兄弟急難之義逺来其歸也賦詩送之人之親愛至性所有維兄與弟如足如手兄弟急難我心則疚興言赴之匍匐敢後沿江歴湖自南而北遥遥萬里敢遑暇息亦既晤覯季也其羸淪墜泥塗伯也傷悲矢辭籲天天聽髙髙伯也怦怦中心孔勞昔我始來青陽肇序日月云邁嵗聿斯暮念桑與梓我行將歸顧視予季予寜不懐顧謂予季予豈汝違予行復來春以為期鶺鴒之詩在昔有作兄弟急難視古何怍辭蔣隱溪輓辭三首顧瞻兮堂前巻帷幕兮藉蘭荃陳清醑兮載肥鮮韻悲管兮切哀絃凄風激兮櫺軒雲黯黲兮靈來旋恍如睹於形色兮儼若聆夫笑與言言可聆兮意不傳悵思公兮臨几筵北風凛凜兮天雨霜木葉脫落兮百草黄翩銘旌兮辭髙堂豈靈車兮秀冲岡蒿里歌兮哀以傷𤣥室一閟兮夜甚長魂渺渺兮何方螺山崔崔兮螺川湯湯青原與白鷺兮鬱相望悵思公兮遊故鄉玉珮兮瓊琚霓衣兮霞裾秉元化兮握靈樞列缺從兮豐隆趨倐隂而陽兮忽巻而舒睨視濁世兮如汙渠飄然乗風兮凌太虛參王喬與韓終兮列仙為徒遊紫微兮帝之都悵思公兮邈天衢題歳寒三友圖松蒼蒼兮虬枝竹翛翛兮鳳羽梅皎皎兮瓊芳凜寒節兮偕處芬芳菲兮春暉倐零落兮秋露惟所稟之貞潔閲嵗年於遲暮含匏笙兮雲中和清角兮月下諒同志兮金石渺予懐兮延佇盤谷草堂有序三章盤谷在西昌邑東北十里許楊氏先世墳墓在焉比年子姪多就墓傍作别業為耕讀之所之序之居題曰盤谷草堂善繪者圖之余為作盤谷辭三章書之辭曰盤之中兮崇丘交青䓗兮松栢懐先祖兮永逝託吉壤兮𤣥宅跽酌兮寒泉薦蘭秀兮芳菊春雨零兮秋露耿孝思兮無斁盤之中兮幽居聊逍遥兮棲遲朝采兮林芳夕攬兮巖芝仁與義兮是明懐孔顔兮吾師安吾分兮蹇劣何富貴兮可期盤之中兮良疇下宜稻禾兮髙宜来牟春出耕兮夏耨旦勤斯兮夕休或雨暘兮匪時何倉庾兮有秋懐古人兮食力吾弗力兮誰尤送别辭留石瑱兮洞庭遺蘭佩兮澧浦羌不懐兮别離獨徘徊兮延佇詩五言古題林靜小景幽居無俗韻山人有餘清鳴湍瀉晴壑髙秋囀早鶯相擕一散躅亦得暢其情題朱四智夢草軒骨肉皆鍾愛兄弟重連枝生為同一氣歿為永别離誰言永别離夜夜夢見之夢見何所為和樂如故時忽覺各分散泣下横交頥中堂理單箎聲悲不能諧緜緜而弗忘中自長相思謝子篤天倫夢感著聲詩因之名我軒恒用著所懐聽艾仲宣彈琴公子散煩襟留客撫清琴一彈黄鵠操再鼓陽春吟洋洋發冲響泠泠諧素心非今同勝㑹誰聞奏雅音贈沈教諭奔喪歸閩禄養欣有遂何言奄棄兹哀哉風樹懐百折不自持列帷輟絃誦豈但蓼莪詩晨起餞旋歸烟波滿川泜徘徊一顧望憂人益增悲諒感天地恩寧為悲别離須㬰為千里緬焉安可期唯應問業者惻惻此江湄題鄧秀才寒翠軒清軒大江畔前有竹松林蕭條霜雪時愛此碧森森忩中㸔掩映席上對隂沉非將玩適重嵗暮可論心題太乙真人蓮葉舟圖至人椉汗漫遺世若虛遊不假桂為楫飄颻一葉浮仰觀天宇澄俯眎洪波流茫茫蕩無垠泛泛任去留富貴多憂虞仙道我所求弱流倘共濟從之覽十洲夀呉孟勤先生二首大明有碩士乃在國南鄉被服夫容衣皋蘭襲芬芳雄辭由令徳粲粲發奎章名聲布逺邇延頸誰不望昔者螺水湄今來鵠山陽髙筵酌甘醴懽樂誠未央峩峩黄鵠山直上凌五城仙人駕彩虹飄颻臨我庭借問此誰歟陵陽與容成玉杯注丹焰磬折奉長生達人含至道自與元化并遨遊紫庭中逍遥龜鶴齡繆都指揮輓詩龍飛肇淮土維公奮雲從揮戈逐代北躍馬趨山東崢嶸摧勁敵意氣當前鋒百戰有爵位屢遷乃益崇洞庭與彭蠡先後填巨邦百嵗焉足多一朝上埃風靈車發華屋祖送出崇墉蕭蕭衆馬悲凄風激大江去去雖己矣垂譽恒無窮送貝惟學還㑹稽得此字時省母兄來鄂髙堂雙舞衣日奉慈顔喜先壟别經時何堪戀桑梓杳杳浙江濆依依漢川涘懐徃忻巳遂傷離方未弭即路有憂懽去年俱若此奉寄李丈人晨登黄鵠嶺引望陵陽岑陵陽𣺌天末何由見所欽自昔擕手時蕭散大江潯出言諧鼓瑟中孚利斷金一朝分袂來寒暑三四侵翰飛薄逺霄鱗泳循清潭髙深曠不接隔我浮與沉堂中侍愉色膝下儼纓簮禄養崇甘肥懽樂日駸駸乆要焉獨忘一徃無遺音尚希保眉夀以慰飢渴心題三泖歸耕巻贈管時勉歸呉松客從雲間來自言家逺村用世闕材具委身服田園開春起東作良苗日愈蕃下無螟螣苦上有霖雨恩年和易堅好為力誠不煩當秋負穫歸如坻積我門公家且輕税豈復憂飽温賢婦持機杼稚子牧雞豚傍舍數老翁懽㑹無晨昏其人雖朴野皆有忠厚言相與墟曲間焉知市朝喧違此未幾時九扈鳴已繁去去情益敦浮榮終不論題艾仲宣蘭昔年春月夜弭棹湘川湄邂逅鼓瑟人佩纕紛陸離寧知忽不見芳馨貽在斯題艾仲宣菊髙堂二月中粲粲羅芳樹日夕凉颷來紛然已如雨君㸔籬下姿可用怡遲暮題伯牙鼓琴圖平生山水意託此孤桐絲之子無旋期茫茫誰復知閒來幽樹下欲奏已遲遲題彭憲僉白海青圖由來搏擊威雲鴻不敢即佇睇極青㝠羣飛皆戢翼栢府坐㸔時重有秋霜色贈陸伯陽三首粲粲白玉琚本生崑山陽一朝蒙采擇髙列珩與璜佩服合其儀和鳴日鏘鏘碔砆昔同櫝頫仰方自量妖媚園中花豈不當春榮孤髙陵上栢嚴霜厲堅貞匠氏來相求藻繪升棟楹固知君子人特立以成名南岳有威鳳竹梧得其依五章備文采鳴聲合金徽聖皇莅九五四海揚徳輝翽翽初來儀雍雍復旋歸題蕭徳通所藏崔白鵝衆鴻厲髙鶱逍遙薄天漢詎無肅肅羽而獨懐波瀾特立諒不羣振鳴終伴奐名書亦奚為懿此焉足換賦丘原芳林隠達士布髙位幽人在中林貴賤有定命聊用得吾心方宅五畆餘灌木鬱蕭森浮陽映宻葉清雲散庭隂回風激蘭薄餘芳襲我襟雖無絲竹清嚶鳴懐好音殘帙不停披㫖酒恒獨斟獨斟忽復醉時時吐髙吟幸無異患侵自適非陸沉知分理攸宜誰謂倦華簮蕭安正贈白紵賦詩為報時余初免喪朱明變寒節曜靈赫南馳端居念初服感激悲慈幃春暉奄遒盡誰為遊子衣豈不荷重纊後時非所宜君子見存恤縞紵貽贈之素質颺白雪纎理瑩文漪裁縫被弱體濟濟生光儀逝將表明惠永歌無斁詩解筠澗先生輓詩東山千餘仭其下文水馳馳水去不還髙山黯無輝夫子在世時芳名揚四陲夙志騖姬孔肆力究皇羲窅窅萬化原𤣥悟探其㣲秋荷襲裳衣春蘭充佩褘發軔蹈佳軌周旋豈踰規道存希有濟才髙未見施曠視六合中時時寫雄詞奮如蛟龍躍燁然雲章垂濟南講遺經河汾論匡時翹翹問業者詵詵日來歸居常以樂天逍遙介期頥一朝隨埃風飄然逺去兹奄忽歴星霜今來四五期嗟余忝鄉郡夙昔仰蓍龜引睇鑑湖阡徒懐後時思頫仰杳茫茫中傷公詎知送黎信歸故郷商飈起西陸倐忽為素秋客行惜遲暮懐歸逝不留舟楫晨已具送子河之洲千里逺結交三載篤綢繆歡洽諧琴瑟夙昔同衾禂云何當乖分私情悵悠悠山川繞歸路豈不思同遊俯觀江漢水滔滔俱東流惜哉南飛鴻孤鳴違匹儔别離誠難任斯須亦何憂終當返舊林嵗暮共優游夜宿山家待宋惟憲不至主人罷尊酌稚子具衾氊稍稍松火息寥寥獨未眠林髙風響迅窓虛月色懸行侣時相失懐抱自悽然寄題王氏槐隂軒結宇臨長衢開軒面嘉樹靈根沃鮮澤由來深且固柯葉浮青㝠垂雲羃囱户紛華避春節孤芳弄秋素王生屏世營端居多暇豫潜玩聖賢言常懐徃古務䕃止諧夙心還因動遐慕仰惟先人徳封培昔已屢敬承乃汲汲時存荒逸懼窮達知有命非縁髙爵故因歌寄幽軒為子寫中愫送王經歴奔喪還偃師清代服朝命懐此好爵縻安知失所怙抱慟俄在兹輟理遵反路嵗暮風凄凄行行泣且悲血淚不可揮歸當趨故庭益復哀以思竭力諒弗逮致身猶可希庶幾强節慟顯揚以為期黄侍讀家賞瑞菊霜降豐鐘鳴虎嘯谷風生氣類各有召何况善所徴君子際昌期冠紱趨明庭致勤靡夙夜惟恭秉忠貞至誠㑹感孚嘉祥聿來應衆卉悴寒節貞菊粲前楹同葉迸赬㽔駢芳出紫莖動如比翼翔靜若連理榮夕下玉堂中髙賢集良朋玩賞驗至理謳吟播芬馨孰云㣲植兹從知兆方興謹始永弗渝奕世垂休聲送楊叅政景衡考績還福建恭命佐南服緬臨山海區旬宣盡臣職夙夜忘其劬惻惻軫民隠宛宛運良謨明如孤月懸温如春陽舒八州諒閎逺惠化罔不敷行身著表率下者無侵漁千里亘絃歌遐邇皆晏如考績屬兹嵗整駕趨皇都峩峩雙龍闕彤闈煥金鋪劒佩森九陛朱衣肅來趨拜辭遽徂征言歸即脩途相送國南門何以贈離居宦成古所戒善始貴無渝期君永終譽庶貽青簡書賦得快閣送曾日章使安南時以鴻臚卿行朝日麗金閨赬霞煥彤庭拜辭出君門嵗暮萬里行行指古交州南雲杳㝠㝠駿馬向風嘶翩翩逐行旌遥經彭蠡澤還過西昌城傑閣何巍巍弭節一來登章水朝宗去三山如秣陵思憶雙龍闕北望心怦怦懐逺由聖君宣徳命九卿載馳實臣職豈敢稽王程伊昔黄太史遺祠並南楹且復禮前脩感激慕忠貞逝矣慎樹立千春齊鴻名送呉寺丞歸滁州白露下梧桐秋風激砧杵䇿馬出都城揚舲越江浦朋遊皆佇立望望滁陽路昨晤恨已遲晨别嗟何遽念君將門子恬澹如韋布文藻發篇章游情在毫素前者撫􅑱嫠攀轅惜其去歸來官太僕優游九卿副三載畜蕃息考績騰令譽瑯琊山水清周游昔已屢歸心復遄飛斯須不相顧安得徃從之一寫予所慕送鄒尚友赴澧川新春散寒沍旭日明江浦浦樹淨亭亭猶含夜來雨逺客促行邁故人皆出祖初來自西川遄征泝南楚離别即須臾晤言方幾許聖朝憫􅑱嫠簡賢需召杜愷悌終薦達承流寄綏撫澧水出涔陽東連洞庭渚其俗本惇朴其民素貧窶竭力供縣官何嘗厭勤苦兹晨望賢牧蚤暮急延佇行矣敷仁恩殫心副當宁贈王行敏芙蓉麗晨旭粲爛雲錦垂采折欲有贈徘徊增離思嘉晤詎幾日星言復南馳滔滔逝長駛流光奄如之念子崑山秀皎皎瑚璉姿終當膺薦達磨琢貴及時髙齋面山水卉木含華滋棲遲固適意靜脩諒所宜勉哉慎樹立以副平生懐蔣用文院判靜學齋詩齋居臨廣衢靚深絶塵氛嘉卉粲前列芳帙左右陳君子抱異尚稽古夙所敦雞鳴整冠佩肅肅趨楓宸既退此閒逸曠然謝紛紜農軒回夭折周孔明義仁徃軌懸日星力探冀身臻志寜啟妙悟黽勉忘宵昏靜慮而有得嘗聞先哲云㸔君振髙䇿奕世揚清芬題王孟瑞寫竹寄本之北風起郊甸寒聲驟長林引領睇溧陽懐賢思彌深耿介直士節幽貞君子心平生惇契好如彼雙南金昔别夏未屇今來春載臨呉絲將蜀桐和諧㑹相尋豈乏桃李花秋霜易見侵懿此嵗寒操持貺心所欽胡學士山居八景之二首竹塢雲林衡門對芳塢上有脩竹林旦暮碧雲合晻靄成幽森雲起歘乘運從龍沛甘霖終焉君子節永矢嵗寒心夫容寒雪結廬在滄洲前對夫容好寒冬飛雪凝開門翫瓊島皎潔如我心攬之以為寳出處自不渝可與知者道題三顧山劉氏文㑹堂巻岧嶤三顧山飛流下澄澈靈秀之所萃爰昔鍾賢哲正學明綱常直氣遏邪孽至今鄉閭士堂堂仰清節書臺鬱崷崒遺風耿未滅比屋儼縫掖羣居蹈髙潔之子抱貞素曾何汙緇湼奕奕峙堂搆翛翛䕃林樾豈乏穀粟儲羣書富羅列同志五六軰時來共怡悦研覃泝周孔辨析窮毫髪至道日有得中懐炳昭㫼明善固所資誠身理逾切願惇輔仁訓庶不忝先烈題商顔東山二圖二首迢逓商顔下優游晏嵗時玉泉流石乳青松䕃紫芝非為文成君姓名誰見知夙尚在髙潔雅懐非陸沉東山詎云逺蒼生望亦深孰謂髙臥者而無匡濟心盤龍曉翠詩英年擅文翰雅韻超凡庸家臨文水湄門瞰盤龍峰蜿蜒帶城闉崒嵂凌髙穹詰朝敞東軒初旭明瞳矓宿靄靜隂翳秀色開青䓗凝輝射虛牖含潤清簾櫳正襟此晤對澹然浮慮空趣與妙景㑹心將𤣥理融稽古率攸行進退其有窮恒惇旦氣養庶期日新功西疇耕讀幽棲寡世營結廬在西墅充室惟詩書開門繞田圃方春九扈鳴俶載向南畝髙原燥宜黍下隰濕宜稌種植既得時耘耔亦無苦况當長養節霡霂承膏雨朝耕暮還息潜心以稽古上窺姚姒餘下掇姬孔緒黽勉究微言優游啟𤣥悟所得欣日新逍遥自容與年登秋穫竟穰穰溢我庾擊鼔薦犧牛懽娯報田祖傍舍數老人言行皆鄒魯相與知帝力謳謌頌明主陶然墟里間終嵗同樂處龍給事湖心草堂圖巢湖介淝舒子昔所棲遲葺茅結幽宇逺託湖中坻開軒面逺岫繞檻蕩文漪幽坡藉丰茸芳林擥葳蕤逺絶徃還跡閒適惟詩書朅來遊虎闈邐迤登赤墀馳聲倚文翰焯有好爵縻豈不懐初服引睇渺天涯致身義所重在舊仁不遺自公有餘暇披圖寫遐思送周孟簡乃兄龍樓徹五鼔城上烏啼曙客子思故郷晨衣出門去猶顧玉堂舘忽别金陵浦明日大江干相思荆樹寒王孟宣輓詩四時迭遷易化運無停機人命合堅固忽為朝露晞平生所親愛誰不悲永違况乃徳之良特逹衆所希惇行孝與弟蹈履慎其㣲百嵗自恒道胡為中路萎不見凉薄人髙年踰耄耆古謂仁者夀聖言豈云非松栢繞丘墳蕭蕭起寒颸即此杳長夜念之增歔欷送王裕歸臨川朔風暮已厲薊門凛寒霜之子返故邑星言肅遐装長跽拜慈父含悽别髙堂親愛自天性誰不情内傷所懐在重闈晨夕遥見望驅車逐徒侣欲徃仍徬徨為孝行所先養志古所臧翩翩丹鳳雛五色㑹髙翔含輝璞在石戒溢川維防愛子以進脩眷言贈斯章𤣥默齋詩至道本無為達人識其原靜居玩羣化通復皆自然物理諧妙契緬邈適大觀懐中老聃書置之已忘言冲澹頥性靈寂寞臥雲山松栢䕃庭外衆卉羅松邊聊以驗氣序隨時樂吾天余始識其人翩翩復髙騫何當徃從之俱遊象帝先贈曾生景銘景銘其先吾郡人僑居畨禺今生以薦召至有司援近例格之生來辭歸因贈之詩君子重時命有塞必有通古來才智人豈必畎畆終晚成見大器特達㑹奮庸曾生格有司迢遥理歸篷璞玉寜乆閟志士寜乆窮林居有餘暇徃懋切磋功孫給事小畫俱懐堅貞節雲根偶相遇投我雙翠翹報以珊瑚樹永矢冰霜時懽依共遲暮送陳生還吉水子魯之子子魯時起自謫所官吏部且續娶生以祖母之命來省家住文江頭東望秦淮涘戀戀父子情迢迢隔山水粤昔奉父母留侍大母居重闈供甘㫖旦夕承婉愉乆違父膝下仰慕聞詩禮况乃大母心惓惓念行子北地困逺渉風霜多苦顔幸復荷榮寵何時見斕斑昨者促我來令我慰羇旅臘月達京城升堂拜父母我父見子來驚起還悲歎别時汝總角汝今已勝冠我母見子來憐我克孝敬念我渉苦辛問我行乆近各言問大母大母今夀康聽荅未及已零淚沾衣裳我留侍父母藹藹天倫樂誨語日殷勤離懐頓舒豁舒懐未幾許我父呼我言父母喜汝來大母傒汝旋我未報國恩養親誠頼汝事父汝日長遄歸勿辭苦拜跪受父教黽勉惟敬承晨起别髙堂揚舲復南征維時二月初春風動楊柳父執書贈言朋游勸行酒人生尚孝行子歸重操脩矧子英妙年勉學循嘉猷而翁我同朝且復同鄉郡何以贈子行努力崇令問送黄學士還永嘉宗豫之父五章聖皇御宸極垂拱朝萬方時康洽泰和化理侔虞唐公卿侍黼扆文儒列成行濟濟集天衢輝輝被寵章寵章一何盛㴑源嘉所生文錦盤雙龍奎光煥然明豈但隆褒敡重以命秩榮餘齡沐天澤感激深中情深情仰都畿逝將謁天子夕發斗城隅晨趨閶闔裏鶴髪耀冠纓龍顔顧為喜拜稽頌萬年惓惓未能巳惓惓事君忠雖耄志益强載來即華舘嘉慶洽中堂怡愉奉甘㫖拜跽陳夀觴眷言皇天慈奕世弗可忘弗忘在君親桑梓翳丘園别離未幾時履此霜露繁遥遥遵返路靡靡渉川原來歸誠所忻戀闕心彌敦蕭處士輓詩懸象無停運四時迭遷逝人非金石堅百嵗忽如寄有生必有終惟徳世所貴夫子武夷秀家承蘭陵系寡欲出天賦惇行在倫誼飭躬仗忠貞及物崇惠施棲遲恒采芝淹留聊攀桂逍遥以卒嵗頽然謝塵世天道顯而信世澤乆益大令子奮六藝華聲揚斾斾身有好爵縻行惟先人似源深自流逺繩繩殊未替頫仰念潜徳因之徴來裔東里續集巻五十四
