body:
  text: 東里續集巻五十八明楊士竒撰詩五言律伯陽新闢斗室有詩見示用韻奉和二首新來居斗室還自惜分陰盡日唯探易閒時不罷琴簷昏鐘響度牕皎月華侵及此宜無事猶含白雪吟閒居植蘭芷繞屋似沅江香露浮侵席光風動滿牕調琴元少並摛賦更無雙來此皆心醉何須倒玉缸湘陰縣湖上湘陰縣清幽俗不殊江連三里郭市有數㕓車地産為陶器生涯寄網魚家家養黄犢誰肯負王租送劉季友游錢唐風送浙江船東游屬妙年湖山圍錦繡樓閣艷神仙栁暗蘇堤曲湖平伍廟前此邦耆舊在還去問先賢題劉氏交友巻谷鳥囀嚶嚶興餘伐木情當時論友道何處託心盟杯酒身相許千金意自輕還聞江海上今世有劉生鍾長史木訥齋賢王重師教長史足官榮清絶齋居裏新題木訥名近仁由德性好古見儀刑一世誇輕捷君當表後生示弼姪有客傳吾姪攻書過昔時謙和自德性俯仰備容儀觀水求溟渤登車慎路岐從兹萬里去努力在操持寄仲亨兄常記分携處維舟鷗閣磯親交情不淺遲暮苦相違白髮花前徑青編竹下扉東城同輩少料得往還稀永豐陳處士挽詩世出潁川系鄉鄰六一居聲名崇孝友術業富詩書禄養承昭代神游渺太虛兵曹懷永痛血涕滿衣裾樂平屈氏母挽詩其孫為給事中夙有閨闈德兼聞母道賢教孫成令器享禄及髙年諼草凋堂砌松枝藹墓阡文章堪不朽表石見新鐫送鄧宗經有序宗經負有用之才跼蹐縣教三十年今其年未及謝事而引疾以去方是時上注意遺逸出所賦招隱之詩賜在廷重臣遂及諸司之長盖庶幾幽逺之賢有聞之而起者而宗經决去宗經於余有舊辱過别故作詩送之宣德七年六月二十五日也久别時相憶重來又解携帝方求隱逸子竟返幽栖海樹連吳地雲山入剡溪草堂何處在莫遣世人迷送王孟堅脩撰南歸二首東壁圖書府清華映上台朝廷重文治近侍總英才獨罷金門直遙辭玉署回平生王逸少臨别恨難裁從來歡聚意不似别情深愛子清如玉論交已斷金雲霄開逸翮山水稱閒心浩蕩乾坤大相思何處尋送雷誠智延平知府二首五馬引雙旌青春發帝京分符為郡逺衣錦過鄉榮祠廟先賢近絃歌舊俗清秪應勞撫字莫遣愧陽城平日豐城舊新年感慨多時聞史郎中曹脩撰之訃於君來往熟奈此别離何栁色迷官驛鶯聲傍御河旗亭芳酒散不忍對驪歌過滁州馬上口號寄陳廷器一入滁陽郡桑陰翳廣原紛紛納禾稼渺渺散雞豚清夜無鳴柝長途不閉門皆云賢守化深荷聖朝恩江浦縣遇曾于臯淘金故人忽遇髫年舊惟看語笑真清詩仍滿袖華髪已盈巾桑梓二千里萍逢四十春金溪吟嘯地因話共傷神送周存誠州判致仕歸清江二首祕舘連西掖編摩集衆英有才皆薦逹垂老足恩榮曠野心情熟浮雲去就輕明朝對玉笥山水有餘清往歲同趨召兹晨獨送歸夕陽南浦棹春雨北山薇魚鳥欣相得衣冠爛有輝無才纓絆繋徒此惜相違送萬伴讀初日照明光春風合殿香忽㸔辭聖上逺去從賢王畫楫移江浦青山向洛陽經遊多雅詠相寄莫相忘愉老堂此翁衡嶽下白髮烱秋霜八袠過三歲諸孫藹一堂不辭愉老日還注濟生方玉屑能扶壽朝朝進滿觴蕭處士挽詩識逹前人重詩書後學師艱危存大義衰老見明時溪舫秋雲冷泉臺月夜悲惟餘名姓在光映史臣詞朝房待命䝉恩宥後六部都察院大理寺通政司十二道監察御史交章列奏余罪不宜獨宥遂被收於朝房俟命正是臨危處深知負罪頻廷臣皆執法天子尚垂仁紫殿紅雲近金河瑞彩新恩波今浩蕩終憶借枯鱗孔經歴挽詩二首禮樂唐堯日詩書孔氏門登朝榮象笏列署切薇垣卓犖懷千載凄凉遽九原英靈知不化未報聖明恩識爾趨庭際芳年玉樹髙謙和自天性文雅出時髦舊好過從斷深情夢寐勞他鄉新塜在松柏晚蕭騷潘太守挽詩二首昔在臨川郡行春皂蓋榮桑麻千里緑絃誦萬家聲意澹終辭禄才髙豈尚名至今城下水人比使君清郡城華蓋下歲月忽如馳五袴歌猶在雙旌去不歸清名史氏傳遺愛後人思有子從仁政傳家願不違題竹贈廖子謨南歸芳春宰花縣乆别不勝思比似湘川上清風玉一枝五年重晤聚㡬月又分岐臨發無持贈聊歌衛武詩贈建平弟七十年兄弟于今二老存脩途余未息古道爾能惇後軰紛紛出頺風靡靡奔晨星與霜木相對兩忘言金㓜孝挽詩英年兼令質秋水映姢姢才行諸昆重詩書累代傳一朝隨化物萬事逐浮烟聽話臨終意何人不愴然送沈生歸省舊與休文好曾聞小阮賢行衝薊門雨歸問浙江船璞玉須成器韶光劇逝川承懽有餘暇努力事遺編貽程夏二中書扈從廵畿甸官曹喜接聨屢頒丹鳳詔須屬彩毫宣畫障分雲樹琴聲㵼澗泉春行有佳興相伴共悠然陪駕觀獵武士擁周遭前驅導彩旄徑危兼水石野濶盛蓬蒿鷹犬紛飛躍狐狸莫遁逃老臣方寸切上念聖躬勞從度居庸高峰玉輦廵邉徼師還此伐鼗紫雲隨警蹕紅日動旌旄地險關城壯天清眺望高非才叨侍從無補只徒勞陳豫中八十壽詩翛然無俗累恬澹樂丘園名譽三山重春秋八袠尊安居非藥裏榮飬自詞垣五月瞻南極華星正對門送李主事赴常州通判初出郎官署先傳府倅賢天恩謝北闕春水載南船郡已無三害民皆有一㕓年豐公事簡㵸茗試山泉漳州曾氏望雲巻縣城當桂嶺清晝白雲垂重到曾游處偏增罔極悲神游杳靄外目斷蒼茫涯五色衣裳在承懽詎可期寄李德言高州李别駕未老倦纓簮金石論堅操氷霜烱素心閉門吟對竹延月坐鳴琴半幅幽貞趣贈君文水潯挽彭子信昔者雩陽郡黌宫重得師合宗推孝友後進仰威儀丘壟松楸合春秋雨露滋諸郎惇永慕尤廢蓼莪詩送梁叔車有序叔車謹行力學爲文章卓出流軰吾泊菴令子也宣德二年會試不偶今歲復至則後期不及試其歸也酌之酒而贈之詩云離懷不可盡且復共芳筵卞玉終須獻韋經故有傳河山行處好雲樹望中妍歸路詩千首因風寄百篇送王希積泰和訓導有序抑菴學士陞少詹事其子䆅授泰和縣學訓導父子同日受命賦詩贈之云嚴親進官日並命出彤闈拜後多人羨光前似子稀離情常北戀行色又南歸想侍慈顔處簮纓勝舞衣贈梁叔莊泰和訓導相違十載過相聚半年深論舊何曾盡傷離復在今黌宫雙白璧儒行萬黄金莫道匆匆别無窮遲好音答黄宗載見寄又是三年别新來百感增薰蕕安可問枘鑿苦難勝白髮落垂盡青山歸未能故人贈佳句擬報玉壺氷贈仰善主事南歸重逢方適願㡬日又分岐瑚璉真堪寳雲霄自有期從知萬人見肯受一塵緇無限歲寒意題詩贈别離送蘇伴讀德義儒林重詩書學海翻校讐辭祕閤輔導向王門曉鐸行車逺春筵賜醴温須明藩屛意天子萬年尊送劉凝節歸永豐時有興國訓導之聘都城一相見文采動華年家與先賢近經從太史傳三春還舊邑百里望平川應復匆匆去諸生候講筵題敏求齋閒居積文史不厭五車多白玉須成器流光惜逝波堦前春草遍林下午風和還有同門者時來共切磋送王霖知縣赴閬鄉千里河南北憂勤切至尊兵年兼旱潦民命急朝昏身倚詩書貴功將撫字論無忘當宁意一一在覃恩劉指揮勤學齋時平無警柝公暇事遺編觧劔聞春誦燒燈减夜眠竹深幽院裏花暗素房前事業由多學相期及盛年送王性存親迎後歸省朝辭金闕去千里赴庭闈錦繡行春晝何須五色衣岸花明畫障江月淨琴徽一路彈新調鴛鴦不獨飛張生水竹居傍水連高竹門前似渭川雨晴看淨練風爽聽清弦爲酒兼燒筍持竿屢取鮮還資奉甘㫖非但樂林泉戴誠問挽詩闕携如昨日寤寐想平生操比寒松勁心同秋水清詩書安素業身世避浮榮冢樹西風裏凄凉故舊情王好信挽詩來往經蕭峽舟人指冨溪林藏君子宅行慕古人齊錦誥恩封在青山壟樹迷郎曹未終飬愁絶夜烏啼焦主簿挽詩二首郿縣岐山側萍鄉楚水潯扶持有神力惠愛在人心往事歲年逺髙墳松柏深自天鸞誥出奕奕寵光臨憫物由天性能官不假威重爲百里佐遽作九原歸瑟瑟悲風逈荒荒零露稀惟餘鳳毛在五彩翽雙飛寄王宗豫二首相别歲頻改相思心未降故家滄海國髙卧白雲窓適趣琴三疊隨游鶴一雙東來抱錦軸喜見筆如杠内閣承宣地朝朝侍柘袍七人亡過半二老去能高蹇劣仍踰分驅馳豈任勞懷歸歸未得鬂雪不勝搔胡敏御史致事出梅求題余於胡有舊故賦二詩識别祕舘曾同事流年四十餘花封有嘉政柏府重清譽致事新恩命懷鄉舊隱居湖塘三百畝已免貢菱租五月出都畿東風暑雨㣲濟河新漲發淮浦片㠶歸朋舊驚霜鬢鄉閭重繡衣歲寒怡老處梅雪共清輝寄楊仲舉長史誰不戀丘園兼之鬢雪繁㡬人知道義用世必璵璠遂有賢王奏㳟聞聖主恩平生欽慕意喜極欲飛鶱題竹送陳中貟外文雅陳貟外三年一度來春風對玉樹浩蕩好懷開北闕晴雲下南河彩鷁催一枝淇澳贈臨别意徘徊曹侍郎乃母挽詩曹家少司冦至孝奉慈闈衣貯親縫綫堂縣舊斷機喜崇二品飬遽動九原歸天恩下鸞誥千歲有光輝題竹送樂象乾幷寄聲陳述京國三年别驅馳越漢皋氷霜綱紀地旦暮簡書勞入覲還相慰能官見所操臨分贈淇玉更爲謝同袍題王郎中九峯歸趣圖老别郎中署人看晝繡榮家臨三泖近門對九峯清隣叟來分席家僮從閲耕君恩重山岳一飯未忘情贈蕭斯易御史廵按蘇常諸郡繡斧辭京國三吳候畫船丹楓秋水岸白鴈早霜天憫物須蠲蠧觀風在禮賢功名仗才俊努力及英年題陳憲山水何卿妙冩趣陳憲問題詩野水瀰溪澗春雲壓樹枝羣山如對客獨學更求師待我歸來日披圖共酒巵送凌副使歸省先塋先塋賜歸省臘盡出都門鴈影行途逺梅花到日繁春風待旌斾晝錦入鄉園情事從容畢不忘當宁恩題梅月軒清軒夕不扄梅映月娉婷移影上琴薦浮香著硯屛一塵元不染萬籟寂無聽即此坐閒暇澹然心志寧次韻答胡若思賔客二首東璧蓬山頂曾同侍玉皇碧霄龍早逝滄海鶴高翔案有莊生論門臨孺子坊遊心邈千載塵慮已都忘自别頥菴叟星行十二周天恩無寸補世故有多憂老驥力垂盡長途馳未休中懷何處寫聊用寄南州重過鷂兒嶺傷用道長史荒山千萬疊茅舎頫河濵豈意清明世翻爲憔悴人命窮身不返志屈道還伸爲灑重來淚平生心所親送王希德歸西昌三歲在京畿春生五色衣殷勤承父教歸去候慈闈丹桂浮香露黄花粲夕暉人生具慶少養志在無違送用儀之官萊蕪百里銅章貴英年寵命新侵星辭闕下帶雨發河津歲歉須寛恤民勞急拊循前賢有塵甑垂譽已千春送梁叔脩秀才歸西昌灑落王詹事人今第一流相看佳子壻氷柱照琳璆闕留經歲家山到及秋文章千載事珎重滿歸舟御史陳穀乃父挽詩行已嚴三畏傳家守一經選才成大典膺召謁彤庭草露俄乘化松塋已勒銘平生知不泯有子嗣芳聲楊孟潛挽詩芳春奮科目令器比璵璠致孝親闈樂傳經學者尊一朝隨化物羣行載詞垣光華知不冺况有鳳毛鶱送叔綱表姪叔綱來北京聚處月餘告歸詩以勉之失怙憐渠早提携賴母慈門庭已秩秩兄弟亦怡怡觀國欣初見懷鄉又逺離外家多子姪期爾讀書詩送葉錫尹姑蘇買得吳中棹遥辭潞渚濵重爲花縣宰舊是玉堂人霜菊看將晚寒梅到及春從知錦繡地不肯厭清貧題梅贈郭太守還鎮江每憶春坊舊寥寥歎曉星明時用郭伋五馬駐江城庠序絃歌盛桑麻雨露榮梅花一片月長伴使君清暇日承觀上人惠訪上人吾郡忠簡公之後於予先世通家其行甚高故以詩奉答盛意參襌周十刹隨地演三車水月心常静烟霞趣已賖胡楊皆故族孔李更通家一訪空齋裏𤣥譚過日斜題畫贈梁壻叔濟蕭㪚藩翰幕時平淨俗埃河流帶近郭樹色藹高齋簡牘常時閱詩篇暇日裁閒情對圖畫亦勝倒金罍題任生山水溪亭夏無暑不假碧荷筩垂柳軒窓外青山眺望中水漾玻瓈色香生菡蓞風借問坐譚者還知無極翁送王志浩鳳歴紀王正新春别帝京行觀具區藪先過闔閭城聖主方興教諸生喜受經他年看奏最崇秩有光榮挽馮知府凄斷南來訃相違始十旬晤言猶昨日死别惜芳春冰檗聲仍在龔黄志未伸平生鄉郡意回首一沾巾題竹送劉子欽故人劉子政契濶十餘年此日重携手相看各白顛交情方戀戀别袂遽翩翩聊贈歳寒意琅玕雪共妍題福建呉布政竹石圖家住鄞江上作藩閩海涯旬宣有餘暇公退足委蛇竹秉歳寒操石含大古姿高齋坐相對無忘武公詩送陳斌副使之陜西兼柬陳憲使于副使驄馬向咸陽東風驛路長渭川清映月秦樹早迎霜風采人心快貪漁吏弊亡陳于榮並命氷玉共高堂寄吏部尚書黄宗載白首記同年懷君静勝仙氷霜老北地雲樹渺南天近俗傷多薄無言忍獨賢離情何所似春柳遽飛綿忠孝堂江西都指揮僉事滁陽馮公鎮名其堂曰忠孝蓋昭先德以儀後人也昔公之大父父皆奮武功於國家肇創之初致位通顯矣大父母没其父塟祭以禮廬於墓者三年父後官邳州衛指揮使追捕倭冦於海上力戰以沒此公之父忠孝焯著雖没世後之人不能忘而堂之所以名也吾聞僉都公之䘮其親也亦嘗廬墓今以才能益進其位且致誠以事上詩曰孝子不匱永錫爾類吾於馮氏見之矣賔客胡先生爲記忠孝堂公以求余詩爲賦唐律云桓桓忠孝行藉甚説馮君有子傳先德能官續武勲髙堂名教事巨筆史臣文四海皆臣子芳聲獨逺聞題劉綱知縣梅花作令更三邑兹行向海邦民風尚文學士俗亦惇龎須得窮櫩好還令螙吏降梅花玉雪意常若對寒牕題蕭氏林泉居壮遊兩京路邂逅多冩真一隨化物盡屢見流年新承家有令子志墓託名人寂寞水南畔依然舊松筠送陳虬延安知府天子急民瘼廷臣領郡章平生懷玉雪此去播春陽鵰鶚雲霄逈驊騮道路長試看韓與范遺跡在邉方次韻答頥菴二首十年去京國高卧西山陲天趣常自得他人安足知竹舘鳴琴處河塘坐釣時勞心塵事者何日赴幽期與君離别後兩度歴邉陲年老衰容換風寒病骨知有心存濟物何術可匡時矯首西江上歸㠶㑹有期送劉知縣赴莆田逺邑需良宰賢科起茂才九天辭玉闕一騎發金臺濟北初舒柳江南未過梅能官崇冨教莫遣吏民猜題劉氏奉親堂雙親各垂白至樂奉安居養有日官禄教傳星象書椿陰滿庭戸諼草映階除日月趣朝退班衣侍婉愉送貢士任善歸豐城妙齡兼令質歸省自京師爲學功須倍升榮計未遲歳時將暮矣霜露亦凄其珍重關河道髙堂切爾思題鄭氏思親巻不忍杯棬飲愁聞陟屺詩九原那復作寸草恨難遺爲養誠無及行身庻可期靈椿百年壽至樂罄吾私章江劉先生挽詩經術師承正才名天分髙閒情安野逸雅操邁時髦百歳光陰逺諸生嘅慕勞章江庭舘外逝水日滔滔送東平傅知州復任政成初北覲考最復南征相逢遽相别繾綣若爲情露冷黄花老天清錦樹明吏民迎望切愼莫滯雙旌題竹送賀寧知縣之豐川作宰豐川縣芳年際聖朝時清公事簡地僻瘴烟消撫字須勤職驅馳莫憚遥匆匆斗酒别聊復永今朝送錢習傳迢逓滄江路天寒風雪深相知何在早臨别自難任人重崑岡玉鄉榮郄氏林爲山終一簣持贈比南金汪氏慈訓堂早失過庭教深依母氏恩持身在仁義奉訓切朝昏天地何由報行藏矢弗諼慈顔千歲壽春暖北堂萱吳母挽詩西風北堂上白日黯春暉寂寂承懽處塵封五色衣未終三釡養遽動九原歸女範傳應在閨門嗣不違劉母挽詩禄養人皆羨兼榮母德賢空遺板輿在竟負綵衣鮮弔鶴嗟何及乗鸞望不旋恩封兾他日光命賁重泉蕭母挽詩日夕烏啼樹悲風起繐帷彩衣空五色無復上堂時壼範嗟猶在靈遊不可知百年懷飬者長廢蓼莪詩春暉堂早失趨庭訓深依徙舎恩踉蹡五色服樂舞對春諼壽酒華觴進安居綺席温持身務不辱還究古人言送樂舞生還閩中清廟連丹闕天壇接上台君王嚴祀禮樂舞得仙才閩海三秋逈雲霄一鶴回飄然終㪚逸還憶上蓬萊題郭智憲使榮飬堂朝廷崇孝理憲紀用儒臣分得烏臺禄歸榮鶴髮親褒封承帝命光彩煥龍文慈壽知方永諼花百歳春挽吳彦直珠還合浦日令尹擅㢘明興學皆從化鋤姦赫有聲詩書傳奕世夷險任平生婉婉臨終詠聞之共愴情贈尚書吕公挽詩二首清比藍田玉含輝故有餘鄉人尊德義世業重詩書渭水淹吟興蓮峰對隱居百年皆過隙不泯羨芳譽瑞世生賢傑登朝奉聖明身膺二品養官贈六卿榮光寵真千載遭逢自一經龍章照玉璽褒拂極平生示􅀈秫及昱行年七十七况復困沉疴世德流傳逺天恩覆被多冉冉西頺景駸駸東逝波詩書好承續黽勉勿蹉跎時勉學士陞國子祭酒奉贈三首近侍踰三紀文章柬掖垣氷霜存檜栢廊廟薦璵璠帝重經筵舊官陞師道尊翩翩起車騎相送向橋門拜命彤廷日龍墀瑞雪飛縉紳瞻有喜寮宷念相違時雨司成舘天香學士衣斯文千載運吾道有光輝玉署東頭閣紅扉晝不開衰齡餘我在清論更誰來學者希傳道朝廷仗育才賢關有佳興時寄錦箋回挽拙菴徐子信行義時人重才能邑里稱系傳髙士逺家挹太湖清身世驚流電朋游歎曙星從知郭有道不愧蔡邕銘贈僉事魯希文有序天台魯希文自爲御史有廉明出僉閩憲風采揚厲嗟乎安得今之僉藩憲者皆希文哉其考績而歸也賦此贈之自是天台秀聲名起繡衣八閩監海國六月凛霜威考績趨丹禁承恩拜𤨏闈從來氷檗操吾道有光輝示姪孫鏞念爾遽逺别送行無限情一心常體道百行貴存誠海濶鵾鵬運天寒氷雪清盛年當努力莫譲古人能題竹贈陳文編脩廬陵南望逺六十五長亭之子歸寧日重闈拜慶榮文章金榜貴官秩玉堂清一幅湘皋贈殷勤故郡情題竹送李紹檢討安成李克述三歲在詞林言色温如玉操持堅斷金君恩紫誥重親舎白雲深萬里歸榮日聊貽淇澳吟寄顧都御史翩然謝榮禄林下樂天真臺府留清望朝廷憶老臣神情超物表光彩動星辰俗轍何由到長同園綺親雨後炎天乆不雨數雨復還晴竹樹繁陰合階墀幽草生閉門無俗事㪚帙任閒情回首時西睡芙蓉千疊清庭樹手種庭前樹參差總出墻不湏愁夏暑已屢傲寒霜過雨紛交翠因風亦度香如添清澗遶即擬住山莊暑中卧疴冩懷二首坐卧連晨夕中懷鬱不開蠅攅眉上棘蚊隠耳邉雷無那惔焚困生增褦襶來病咽兼患齒兩月廢啣杯白髮垂垂老丹心耿耿存毫絲無小補天地有深恩病馬長聮皁羸牛不駕轅蓬山望咫尺慚負不勝論示表姪陳純西江海桑老冠冕重儒林我自外家學爾求曾祖心詩書冝善繼塵俗莫容侵不見南山樹寸莖今百尋送魏源尚書按視邉務寶劔動華星關城候使旌春隨司冦筆霜重總兵營武備千年固塵氛萬里清歸來奏天子青史載鴻名題梅寄傅知州初入聊城縣遥聞鄆守賢教先重芹泮治不假蒲鞭吏牘清無滯農田盛有年公餘多秀句吟咏玉梅邉過濟寧作乆發潞河棹初經濟水潯逺山明曉黛新柳動春禽戀闕雲霄逈懷鄉歲月深君親總恩重來徃並關心舟中夜待弼姪不至維舟喜相見解䌫復相違江濶春潮滿雲深夕月稀無眠成脉脉延佇但依依寂寞蓬牕下挑燈坐攬衣入西江境萬里移歸舠東風謝絳桃烟迷彭澤柳雪噴海門濤身世江湖老君親夢寐勞匡廬翠九疊蕭㪚白雲髙歸來歸來語向誰白髪故交稀滿目亭䑓好傷心俗化㣲慌迷携鶴徑慚過釣魚磯童子何知我猶嗤舊素衣夢諸孫繞膝戱諸孫相㸔意獨親憐渠森似玉對我浩生春已惜承歡淺何堪入夢頻亢宗吾望汝莫遣愧荀陳寄黄汝申憲使二首藩垣出嶺表憲節赴山東舊有先師化行惟大道公百僚歸表率一志在瘝痌綱紀從容振時來視頖宫預想山東境髙才起頌聲黔黎誇用恕寮宷荷推誠老栢霜逾勁寒梅雪共明應同鍾憲副一力振澄清五月六日早靜海迤北大雨聊可蘇旱仰視月離畢滂沱不待晨人心異昨日物態總回春尚憶郊原遍深思天地仁來牟已無及回首一霑巾直沽城堞繞巍峩城陰下九河水歸東海近人上北京多倉廪皆漕儲閭閻半負戈魚鹽十萬戸何處有絃歌過漷縣望都門西山東旭光芒起西山紫翠分馳心向鳳闕仰首見龍文斾影髙低出鐘聲逺近聞預將纓紱振擬近玉爐薫贈文玉主事清髙玉堂署聚處歲年深心事澹於水交情利斷金衰齡各垂白逺道又分襟重㑹知何日臨岐慘不禁送宋萬中致事南歸白首遂辭榮承恩出鳳城故交推我老逺道念君行酒對黄花酌颿隨白鴈征臨岐記同學惆悵不勝情戴母挽詩道路何屯塞閨門著肅雍行宜君子配恩拜孺人封粧閤間薰鴨床幃慘暗蛩薇垣朝退食舉案屬誰從重寄澹菴東觀承恩地俱看鬂雪侵别來春未暮延佇夏將深憶我辭家日知公戀闕心五倫書未奏還待共披尋慰時勉學士䘮孫有序向知令孫之疾醫藥頗效今日遽聞不救爲之驚悼祖孫之情蓋可想見僕有第五孫敦龎且慧前歲到家侍邉甚樂已三歲矣去冬失之得書悲念累月迨今不忘况在令孫年幾及冠情益何堪惟髙年曠度宜以理遣况今斯文之任屬望於公非淺淺者老病盛暑加之公務不得躬吊輙賦四十字致寛慰之意云承過西昌日提携巳識竒相隨萬里至翻動九原悲豈是多時别無深嵗晏思與君俱此痛排悶强裁詩寒夕獨坐鄉思浩然有懷何文淵二首鄉國雲山外衰年入夢勤經旬斷杯酌獨夜對爐薫竊禄真慚我論心毎憶君許丞渾重聽時事不能聞薄雪俄消瓦驚風復撼忩蹉跎忽晏嵗寂寞伴寒缸病骨支難稳愁心鬱未降何由氷泮日聮棹泝西江送袁本謙致仕歸二首早嵗從王事迢迢促去驂十年留漢口萬里入滇南舟楫行應慣弓刀力不堪昨朝新有㫖頭白許抽簮白下門前路殷勤獨送行楚山浮暮靄淮樹起寒聲菰米香雲飯鱸魚紫玉羮老年今有此何異學長生寄何文淵忽復經年别思鄉趣不稀松筠還舊隠山水溢清輝把釣銀鮮滑携鑱紫蕨肥南歸吾有日訪剡興無違送廖子謨貳守歸河間三載一相見匆匆又别離荒年兼旱潦聖主寄􅑱婺劉毅才無敵陽城道可師勲庸屬賢俊努力及明時挽詩鄉里談遺德傳流終未休甘依泉石老不應棟梁求風樹貽深感雲山徙故丘憲臺忠孝在寵贈被恩稠送周仲規脩撰㤙拜龍頭選六年登禁闈暫辭金殿直遥著錦衣歸雲淨江天濶潮平島樹微舟行足清景詩思未應稀送劉定之編脩六載庭闈隔常懸定省情自天膺寵命即日戒歸程人物金閨彦才華玉署清承懽在有道非但錦衣榮任善得教諭于蜀辭行詩以朂之典教除巴縣之官岀帝畿也知輕道路所樂近庭闈河岸楊花滿㠶檣燕子飛相期傳授暇自省莫令稀送别相送復相别花飛過却春朝廷屢考最黎庶總歸仁但倚丹心在從教白髮新崇文門外柳折贈不辭頻題晉江何氏怡壽堂聖代多耆壽何家有鳳毛諼明承日暖椿老拂雲髙甘旨供天禄歡娯艶賜袍庭闈介百歲錦誥見華褒送曹都御史寵命膺邉寄天書煥紫泥九秋辭闕下萬里度關西著豸金横帶乘驄玉作蹄歸朝奏成績光寵賜鞶犀陳母挽詩曾題南野墓主孟復云亡八袠又三歲諸孫泣滿堂母儀鄉里重婦道族姻傷忍聽門前樹烏啼慘夜霜寄蕭德迪桃源蕭德迪苦志事題詩含詠常忘暮抽思無倦時雲邉寫素瀑巖下發華芝萬里勞相寄聊酬青鳯枝題竹贈彭同知分得篔簹谷翛翛翠一竿曾聞裁作簡不假製為冠勢接丹霄近清宜白日㸔但保風霜操相期歴嵗寒題梅贈醫士蕭𤣥立蘭陵傳譜系兩鬂雪霜侵醫業過三世仙方抵百金橘香蘇氏井杏艶董家林更着梅花好光輝利濟心毛行人奉使江南便道省親題梅花贈之去鄉六千里念别思悠悠共是江南客君乘使者舟折梅将逺意擢桂重名流捧檄升堂日承懽慰白頭哭康甥孟嘉提携二十載羽翮已雲飛眼見乘驄出驚聞旅襯歸素行元不忝夙願竟都違雖不多時别能無涕淚揮林僉憲斗山風木巻青春豔繡衣得禄更興悲無復娛親日徒傷負米時迢迢桑梓戀惻惻蓼莪思天地無窮極難伸寸草私重游東郭草亭園亭風日好邀客綺筵開重合金閨彦兼聨玉署才泉流經近席花氣拂深盃不斷勸酬意更堪絃管催題梅贈蕭雅容員外赴兖州知府有美同鄉彦兹晨又别離光承寵命出正及艶陽時撫字人皆望操存我所知梅花故園意持贈慰相思題竹送雅容老友復任湖廣布政聊寓折柳之意云榮捧天恩出都門雨散絲重臨江漢上深慰吏民思純璞時稀識貞松歲乆知相逢即相别聊贈鳳凰枝送劉習之有序老友劉嘉㑹先生九十而終數年矣念之不忘前歲見進士同今歲見檢校習之喜先生之有後也習之赴湖廣故作詩送之幷致訊雅容云故人不可見喜見子孫賢昨者義烏令今來黄鶴仙芳春都市酒新水北河船却憶蕭方伯分携又五年挽翰林檢討廖敬先二首乆重青雲器皆傳白雪歌較文來棘院承詔上鑾坡家倚詩書冨人沾惠化多荒凉孤舘下無處聽鳴珂左掖門前路朝回不共行竟違金殿直虛夢玉樓成鄉里思陳寔君王失長卿同官悲永訣掩泣送銘旌送方御史徃浙江詩有序懋德初爲翰林庶吉士太常愽士數得相見爲御史職務繁終歲不一再見昨奉命往淛西來告别古語云御史湏用第一等人趙清獻公抃爲殿中侍御史常云君子不幸有小過詿誤當扶持愛惜以成其德小人有過當力排之後乃無患蓋有合於大易扶陽抑陰之義程明道先生爲御史裏行神宗問其所以爲御史者對曰使臣拾遺補闕裨賛朝廷則可若使掇拾羣臣短長以激直名則不能神宗歎賞以爲得御史體此皆古名賢行實也髙山仰止景行行止敬書以爲懋德之贈翩翩驄馬出遥赴浙河濵氷雪衝寒景從知到及春清心持憲節隨事體皇仁履道由中正相期繼古人挽韓本常有序二首越之山陰有隱君子韓本常氏宋魏國忠獻王之十二世孫明經持行累聘不起見重於士林其配劉吾友淮府長史真之女兄也賢而篤孝其没也合塟矣其子陽今爲監察御史廉重剛正克振風紀信其本之於家者厚矣陽痛禄不逮養求作挽詩故爲之賦以觧其風木之悲云勲德崇先代山林樂隱居閉門逃寵禄充棟有詩書流水心同浄浮雲意共舒翛然隨物化千里見名駒賢淑諧家室升堂孝德齊一丘掩雙璧愁絶夜烏啼白日𤣥臺暗青山緑樹迷顯揚終有待光映史臣題挽禾溪樂仲韞稀年德更稀至孝奉慈闈子長皆知學倉虛屢賑饑閒情松菊徑清代芰荷衣人往家規在流傳世有輝送孫教授鼎還淞吳淞孫郡愽如玉浄無瑕學者皆心服儒林譽孔嘉塞垣來白鴈河岸綻黄花又屬匆匆别題詩贈去槎五言長律胡泉州朴齋籍甚清源守髙齋近海濵依然如白屋惟是表朱輪松竹論深契詩書對古人吏民從尚質風俗漸還淳治比劉宗正謌傳召信臣良哉二千石時獨見天真洪處士挽詩累葉詩書後三山組綬門獨看辭寵禄清隱樂丘樊賔席髙年重州閭善行惇雲中桂子出天上鳳毛鶱晚有南宫養時傾北海尊將迎榮命下先睹少㣲昏蕙帳驚秋鶴蘿扉慘暮猿生芻逺莫致哀些託空言孝思堂爲南安守作父已卒母在鄉故里髙堂逺青山宰樹蕃飛騰榮帝命感激重親恩宣化安諸邑行春耀兩幡撫時悲逸轍臨水嘆深源定省晨昏急聲容夢寐存顯揚須力致表率在身敦郡賴爲仁治天將錫類繁聖朝崇孝理終見表清門送萬資中赴南京大理寺副萬生吾郡秀文學重鄉評不媚難諧俗無争亦譲能盛時趨召命累歲在承明書奏天顔恱恩沾寵賜榮聨班謝北闕兩騎赴南京齊魯經游好河山眺望清徘徊嘅往迹傾冩暢吟情議獄須推恕持廉豈爲名孜孜體帝德勉勉騖王程公退如清暇潜心向六經纂脩以下陞官皆得北京惟節與陳中皆得南京故云兩騎題元端本堂所臨宋徽宗蘆鴈圖慘淡窮隂日蕭條積雪時風含烟際菼氷沍水中坻鳴應翻飛疾栖兼飲啄冝臨摹盡物理㸃染妙天機無逸當年畫豳圖七月詩望崇端本地志異古人爲絶藝功何補爲邦事可希不存前轍鑒徒激後人悲竹軒爲徐以道賦幽人樂種竹竹生繁且妍垂雲羃戸外映月揺堦前晴疑抗翠翿風類鳴清絃夏來暑威薄冬至寒節堅時携羊求侣亦詠嵇阮篇即此適蕭散焉知塵俗牽題竹爲族孫挺有䟦語少年祗北覲初命戒南馳虎踞石城壯龍蟠鍾阜竒國崇根本地政肅紀綱司佐幕先修已趨臺自履卑小心勤職務一意謹操持有過須知改凡痾莫已醫赴公恒起早退食每歸遲損友非吾類前賢盡我師謙虛終受益敖惰恐招危寡欲堪常樂多營枉自疲勿貽君子賤何畏小人嗤餘力披書巻平時逺酒巵夭桃朝暮色貞檜雪霜姿永矢平生志毋因薄俗移每虞端有道萬邑潔無私左右親規誨興居視表儀顧余今潦倒念爾逺暌離行矣圖樹立庶當光逺期族孫挺得南京都察院檢校辭别以此竹乞題吾於挺固自有意豈在於竹韻語百八十字雖率爾皆切要如不視爲虛言即於吾宗有光矣挺往勉之送彛訓致事有序吾友湖廣參議陳君彛訓以疾得致其事歸過余别出視少傅建安楊公所贈五言長詩曰同郡之好乃無一言乎余念彛訓初擢近侍在西掖者十八年可爲滯矣及陞賛方伯之湖廣者再之廣東者一往還道江湖關山之險不啻數萬里又何勞也於今行者赴家勞者就息人生至願爲之喜者可無言乎又念彛訓初入西掖吾郡之同者三人後皆陞用於東廣今獨彛訓在而彛訓持已愛民尤戴清議可無言乎然余之生及仕皆先彛訓二歳而疾甚焉乃不能引退以適夫止足之義獨不内愧乎哉故雖言之而厚顔多矣祖帳餞河橋臨分贈柳條鳳池年歲乆薇省道途遥宦逹垂三紀恩深荷四朝丹心常耿耿白髮遽蕭蕭辭禄身無繫懸車興自超人猶羨簮紱我已向漁樵竹色涵書几花香著酒瓢逺歸真足樂髙蹈竟難招覊旅憐同郡分携重乆要白駒如可繫聊復永今朝宣府行營夢侍先師海桑先生純明程伯子灑落邵堯夫世仰文章伯人尊道德儒山川鍾淑氣星斗煥髙衢逸趣龍游海光儀鳳在梧卧雲辭國聘立雪盛門徒義合隆先祖恩沾自早孤摳趨隻影在報施一塵無夢覺追疇昔衾衣涕淚濡壽吳氏母七十文正公家盛德詩書後慈闈節行全氷霜寒自潔松栢晚逾堅孝有宗家説賢因女教傳春秋髙八袠鸞鷟曄雙騫記日維華旦瞻星麗碧天瑶池來阿母珠翟儼羣仙𤓰棗千年熟蟠桃五色鮮長生紫霞曲歌舞樂瓊筵贈佘通府聖代崇仁治臨民簡俊英存心堅鐡石持行烱瑶瓊吏螙春氷浄公堂秋水清干求皆逺跡游惰亦趨耕光復山川色兼涵草木榮還因掃螟螣庶用育孤􅑱下邑今多幸南州舊有聲三年此相見深慰别離情聮句同尤文度曹兾成院中夜飲良朋枉惠顧清霄集詞舘乆别念契濶楊嘉晤諧燕衎維時屬秋霽尤展席面河漢輝輝月轉階曹稍稍風侵幔菲薄陳豆登楊綢繆綴篇翰才思繭絲抽尤詞彩珠璣粲語深香屢續曹興洽爵無算撫今誠可怡楊感昔亦奚嘆露白氣逾肅尤參髙夜將半且共盡茲夕坐待雞鳴旦楊東里續集巻五十八
