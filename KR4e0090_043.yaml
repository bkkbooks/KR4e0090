body:
  text: 東里續集卷十五明楊士奇撰序虞氏家範序夫所重乎故家者謂世有德善其一家之間父子兄弟夫婦長幼戚疏各敦其道雍雍乎和也肅肅乎敬也秩秩乎無相踰也上歷髙曽下暨曽玄暨十數世傳續不已此可為故家而豈徒富貴之謂哉若是者世雖有之然亦鮮矣蓋祖父之賢者固願其子若孫皆惇夫孝友睦姻之行子孫之賢者固思勉於孝友睦姻以光其宗然知之而未能行或行之而未能久者蓋人品不齊且躬行感化之道有未至訓勵防範之具有未備也二百年來世推浦江鄭氏雍睦之行無異辭者蓋其感化之有自防範之有作不然何以其能行之久而不隳歟今觀樂平虞氏家範其有聞鄭氏之風而興者歟虞氏始居會稽與唐永興公同出日南太守國後至饒州太守少微留家餘干子孫繁夥分徙樂平子孫益繁至世傑甫惓惓水木原本之念而願其後之人合族同處而不分然迫於衰老臨沒授其意於子彥佐彥佐敬承唯謹此家範所為作也彥佐之子訥謙續有增益通百五十事於凡尊祖睦族治身齊家處鄉所當然者訓諭詳而防範周一出乎天理人心之正既眀且備矣蓋世傑之貽謀為虞氏之義開先也彥佐之繼述為虞氏承先而啓後也其弟姪一聞善訓既析而遽合又以見性善之同而感化之速也感化興於前防範行於後虞氏合宗之義其必徴於恆久者歟嗟夫合宗仁道也必有至公不私之德乃能久於其道此又係於學焉學則天理眀而心德固外誘不能間之虞氏之後世必皆務乎學哉蓋何幸有髙眀祖父作於前則勉勉祗率於後而勿替有不與浦江之鄭儷芳匹休而號故家於永逺者乎家範成謙以來北京介翰林侍講劉球工部郎中周禮求余序故敬為序之東山燕遊詩序自古天下可樂之日常少而可憂之日常多何者上無善政賦斂不經弗樂也五榖不成凍餒無措弗樂也四夷不格師旅數興弗樂也隂陽失和災厲洊臻弗樂也數者有其一而民病有其二而民危有其三而民不可勝其憂矣數者無一有焉斯之謂平康之世平康之世蓋有曠數百載而不一見者今聖天子在位誕敷恩德以洽于萬方登賢拔材咸列有位貸逋負宥過眚百政修舉乖沴和順萬物條暢島夷洞獠悉馴悉歸斯非所謂平康之世者乎故貴者遂樂於上賤者遂樂於下士農工賈無小大富貧各以類而樂於其所時雲中張君從善寓武昌久矣兹嵗秋九月之日合四方士僑處於是者及是邦之彥凡七人逰于城東十里所之東山所以樂其獲際乎平康之世而無所憂也既用蘇李五言體各賦詩又取杜牧之齊山登髙首句為韻次序而書南陽鄧君存誠又寫為圖繫於詩之下所以昭其樂也眀年春竒從江右來張君出以示之且命為之序夫詩以言志也士君子立身行道俯仰無所怍隨時隨處固無非可樂者然所以重乎士者固謂其能以民之憂樂為己之憂樂雖或其居位有所不逮而其心必曰民者在我所當憂必不嫌於出位而有一息之自寧今觀諸君子所賦凡其所當憂者既未有以為言而其言之有所未慊者不過慮會合之不常與進修之不繼而已豈其志不知憂乎民者哉非也凡今在我所當憂者則固已不待乎我而無用夫我之憂我固可以從而樂之矣夫我之所當憂者既已不待乎我之憂又俾我可以從而樂之則信乎民之無所可憂而在我者有可以樂也此其志雖不言而固已顯然有見乎言之外者然則是詩也其於世之平康與諸君子以民而樂之志皆可推見無隱余安得不序以發之哉紹祖録序上虞張九臯先生嘗名其遊息之軒曰聽鶴縉紳大夫為之文若詩富矣其孫居傑偕弟居彥稡為一卷題曰紹祖録夫鶴羽族之至清者也其鳴也著於易詠於詩聖人之所取也先生樂聞之且以名軒非其志之相契者深乎夫作於其志必形於其行推是好也先生其抱素履潔超然離倫皎然不滓於流俗者歟先生沒久矣讀聽鶴之文與詩先生志與行固不沒也此居傑兄弟之所必稡而不敢忽歟蓋世之為賢子孫者雖其祖若父未嘗有善猶將蓄學勵行以圖立身顯揚其祖父矧有之而可以泯乎禮先祖有善而不知不眀知而不傳不仁居傑兄弟豈惟眀且仁也其題之曰紹祖録固將嗣其清以圖不忝乎書曰率乃祖攸行詩曰無念爾祖聿修厥德孝哉乎居傑兄弟之用心也夫觀其言必考其行其兄弟皆起家科目居傑自給事中再升江西布政司參政公正有為居彥由教官擢福建按察司僉事恭慎和平清白之操皆有聞於時非其得於家者有素乎而豈徒見諸空言者哉其兄弟皆於余往還居傑同朝尤久故屬余序紹祖録而敬為之書藍溪釣隱詩序古之君子其志皆貴有用乎世也雖一時間居山林泉石之間託耕釣以自樂其樂也非在乎間曠靜逸無世慮之擾顧其有所畜於已可樂也有所畜於已將無往而不濟隱顯皆可樂矣昔齊太公諸葛武侯嘗樂乎渭濵隆中及其出也皆功建於當時澤流於後人然則向之所樂豈果於耕釣而已藍溪距泰和西百里山髙而水清車輪馬蹄往來者不至也吾外姊夫劉務耕居之務耕負氣豪邁臨事吐論率常驚駭其坐人其子彥偉乃能折節讀書持謹厚之行為鄉閭所敬重雅好鼓琴賦詩他一切世務無所好也遇暇則持竿坐小舟沿洄溪上下恣意所適或竟日忘返因自名藍溪釣者大夫士聞者皆為作釣隱之詩彥偉特求余序之余謂彥偉英年令質上遭聖眀之時宜力學育德以求有用馳令名揚偉績顧乃足乎一丘一壑慊然若將終身不易其樂夫以間曠靜逸無世慮之擾為樂者果於忘世者之所為君子無貴也君子之所貴在有其具於已有其具則處也可以利其身出也可以利於人隨其所寓無不可樂豈得溺彼而忘此也諸作詩者之意或見於奬譽或形於祝願指歸各殊而彥偉吾甥也故以古君子之事道焉彥偉其將願學乎白鶴山房詩後序建寧之郊有山曰白鶴岡巒竒秀回抱起伏澗水湛然縈帶其下豫樟檜柏之生出雲干霄蔚然彌望今翰林學士楊公勉仁其大父某先生之沒也葬於其中而公家食時作室其側名曰白鶴山房以便展省且日與其昆弟讀書講道于中公既擢髙科有祿位於朝其心未嘗一日忘山房也於是使善繪者為圖公退之暇時復披閲以自慰而詞林諸君子相繼為詩歌以道公之意大學士胡公既序諸簡首夫恆人之情於山水之勝亭榭之幽遊焉息焉有以自適則雖去之久其心恆不忘也而况吾親體魄之所藏吾嘗旦夕致敬於此講學於此其能無情乎冝學士公之惓惓而圖所繇作也然公以文學才行遭逢聖眀居宥密之地為斯文之冠則夙夜攄忠效誠以仰答恩遇務顯揚以為孝此冝今日所汲汲焉者豈必於山房之思而圖之為乎然因是圖有以見君子仁厚之心矣吾又聞某先生葬處本真如寺地寺之僧以楊氏世有厚德於其鄉而贈焉者也夫天下名山水未有不為仙宫釋剎所據民之慕福田利益者有竒勝之地猶以奉仙釋恐不及况望有得於彼者乎繇是觀之楊氏之仁厚其來逺矣故書以為白鶴山房詩後序新正宴集詩序朋友之交久其於會遇樂也會而相契於心相忘於物我又樂也如又有文焉樂之至也永樂壬寅王正之始故事有賜假乃六日甲子天宇澄眀風日融麗鄒君汝舟金君用誠暨余三人却騎而步避囂閧道曠寂過姚君友直時張君伯原舍南鄰聞而來會列坐小齋焚香清談繼以奕嬉姚張二君命酒觴客主獻賔酬爵行無算興至歡洽曠焉寫心於是鄒君顧謂衆曰昔人宴會咸有詠歌兹焉弗繼曷彰雅集遂舉杜少陵遲日江山麗之句各鉤探一字為韻賦詩既皆醉而余尤甚最後乃出眀日諸君謂余序詩惟兹會其樂至矣推厥所自寮寀之交豈一朝夕哉鄒君錢唐人永樂十年自廣東參政再遷為左春坊左庶子前嵗升詹事府少詹事姚君會稽人二年自中書舍人升司經局洗馬金君三衢人七年自翰林典籍升左春坊司直郎張君蘄陽人四年自靖江王府教授升左春坊司諫余出廬陵二年自翰林侍講兼左春坊左中允升兼左諭德前嵗自翰林學士遷左春坊大學士列諸卷端觀者有考焉賜逰西苑詩序宣德八年四月二十有六日上以在廷文武之臣日勤職事不遑暇逸特勑公侯伯師傅六卿文學侍從遊觀西苑以息勞暢倦於是成國公臣勇豐城侯臣賢新建伯臣玉少師臣義少傅臣士奇臣榮尚書臣璡臣濙臣中侍郎臣驥少詹事臣英臣直侍讀學士臣時勉臣習禮拜命以行時少保臣淮來自退休承命偕行凡十有五人又勑中官導自西安門入聽乘輿馬及太液池而步太監臣誠奉宣聖旨令遍歷周覽從容勿亟於是誠導之循太液之東而南行觀新作之圓殿返而觀改作之清暑殿臣誠為臣勇等言二殿皆皇上奉侍皇太后宴遊之所也臣勇等仰瞻殿庭周廡規制髙眀繕作精密凡所以供奉之具潔清鮮好靡不悉備俯而思惟皇上之聖孝皇太后之盛福皆古今鮮有遂拜稽歡呼萬嵗乃降而登萬嵗山至廣寒殿而仁智介福延和三殿及瀛洲方壺玉虹金露之亭咸得遍造是日天宇澄明纎塵不作引而四望山川之壯麗卉木之芳華飛走潛躍之各適其性萬象畢陳胸次豁然心曠神怡百慮皆淨信天造之佳境而人生之甚適也已而中官傳奉上命賜黃封之酒御厨之珍令咸醉而歸又拜受命方爵數行時久未雨忽雲隂東來微雨霑席倉庚如簧和鳴不已衆益以喜相與引滿勸酬盡醉而出臣聞一張一弛文武之道皇上統四海之廣撫兆姓之衆一日二日萬幾則以間暇遊焉息焉且奉天倫之樂於兹誠冝又俯矜左右執事之勤亦俾之預有今日之適恩甚盛也於是羣臣欣幸遭遇賦詩者若干人詩總若干首臣士竒預侍宴間於兹屢矣是以謹序於卷端云歸田趣序士竒竊祿于朝三十有三年祗事三聖皆在翰林春坊論思贊輔之地顧學術迂陋才智卑淺不能效分寸禆益仰荷三聖天地之仁包容保全不加譴斥而屢有升進然內竊自省慚愧兢惕惟日不足蓋位髙祿厚而能薄才鮮一也當精力強固之時不克少自見顧今老病困憊視聽步履不復可自勉強而一借助於人此豈能復有所自效二也且固陋椎鈍愚戅之資不能淟涊取容於衆三也固上之大德寢食不敢忽忘而其如三者何哉朝廷有七十致事之典士竒犬馬之齒來嵗實維其期聖恩必垂憫而曲成之則其鄉之山水原田可稼可漁可樵可牧又幸有三男子長者幾壯次者將十五幼者十一二頗勝使令而小孫亦繞膝可娛樂雖四時景候不同而衰殘之軀既無所用其思慮則几杖逍遙於其間亦庶幾可自適矣因暇豫作滿江紅詞四首俟承恩歸休與漁翁田叟歌之以樂太平以榮上之厚賜以優遊其餘年間出示素所厚者於是朱孔易分繪為圖沈民則作𨽻古題其首曰歸田趣云慶黃先生夀詩序嵗四月五日是為永嘉黃先生初度之辰先生今年八十有七聰明康健時其子淮為少保户部尚書兼武英殿大學士侍上左右雖未得退奉朝夕而樂其父之夀且康也屬朝之巨卿及詞林大夫君子名能賦者為慶夀之詩寓歸俾少者歌以侑觴又屬余為之序先生字思恭永樂十年以淮貴封奉議大夫右春坊太學士十有三年為洪熙元年又以淮貴封榮祿大夫少保户部尚書兼武英殿大學士盛哉先生之夀且榮也凡物之夀以其才亦必得夫所託之地松柏其才最夀亦必産夫長山大谷靜深之域然後有以歷千數百嵗而凌切雲漢先生生於天下無事之日承詩書之世惇靜貞之德所居山水文物之區僻在一隅叔季之世兵戈戰爭所不及其稟也清而完其養也端而厚及老又纍荷天寵以有樂于心而佚于躬冝其益夀而榮也歟而計今中外之臣有父而生受封者多矣若九十之年榮兼數職崇躋一品且其行不忝如先生者豈直浙東西一人哉上夀百嵗中夀八十吾聞至夀恆見於盛治之世蓋道德慈愛被于下也觀於先生蓋可以徴國家至仁之應又豈直黃氏之慶也歟歐陽先生慶夀詩序吉泰和歐陽子白先生生疆圉作噩之嵗孟秋之初今年初度之旦蓋歷四百五十六甲子矣女兄之子少詹事兼翰林侍讀學士王君直屬朝之名卿顯臣賦詩寓歸俾其子孫歌以為夀以余知先生者又屬序之歐陽之先出唐吉州刺史琮與宋文忠公同祖洪武初以文學治行為臨淄令蔚然有賢稱者先生之考也先生蚤孤力學勇自樹立當國家好賢急治之時同儕材俊盛年鋭氣者皆起而列清華崇譽望先生獨引恬樂淡居貞守道于于然褒衣博帶坐里孰講論詩書推明周孔為州閭後進所師法為郡守縣令所敬禮今蒼顔白顛聰明強固巋然如魯靈光之特存非其有所充乎中無所騖乎外心安體舒而合乎仁者靜夀之道歟楩楠豫章産乎長山大谷幽間曠逺之地雨露之澤深牛羊斧斤之不相及其夀也固冝而其材固足以柱明堂棟清廟也雖先生不志於用世而詹事君嘗受學焉今在天子左右掌綸綍職論思恭慎亷介之節表然縉紳君子之望其道之行蓋先生之道行矣此名卿顯臣所為賦詩而交慶之者也賦詩者少傅工部尚書兼謹身殿大學士建安楊公吏部侍郎豐城黃君禮部侍郎會稽章君少詹事兼翰林侍講學士臨川王君翰林侍讀學士安城李君吉水錢君右春坊諭德清江黎君及先生之甥詹事君凡八人序詩者先生之友而少八嵗少師兵部尚書兼華蓋殿大學士同邑楊士竒云陳母伊安人夀序永樂二十一年三月五日翰林侍講慈溪陳敬宗之母安人始生之日也安人至是春秋八十有三矣敬宗雖縻於官守不獲侍溫清朝夕而喜其親之夀且康也厥眀夙興潔醪牲崇豆籩祝告祖考以答敷祐之休退而與其朋友相聚宴樂於是敬宗欣欣然如躬在侍下捧觴趨拜以承歡然者而賔客亦皆樂敬宗有母之樂也相與分題為慶夀之詩洪範五福夀為之首禮八十九十曰耄蓋上夀百嵗中夀八十而君子論夀之本必其道德仁義慈孝恭儉有諸已也古之公卿大夫備德與夀而有聞者多矣而妃夫人妻備德與夀之有聞者鮮也太安人姓伊氏德興令陳公孟藻之配吾聞其為婦篤於孝德興之仕也獨留家居養姑盡愛敬終姑之身其為母篤於慈德興之沒也教其三子務學或養或仕皆卓卓有立蓋婦道母儀聞於族姻鄉黨焯焯如此謂非其夀之所本乎敬宗自登髙科而今在論思親切之地被沐寵光嵗時致其祿養於太安人誠無忝而有榮也又當泰和豐豫之世四方無事太安人日坐堂中子孫繞膝朝恬而夕嬉有以適其志無違其意則夀而康康而樂自然之理也然則太安人之福敬宗之燕喜賔客之詠歌皆豈偶然者哉客之為詩者十序詩者一於是敬宗寓其簡以歸將使其子弟日歌詩侑觴以祝夀嘏又使讀詩者因序以知夫夀之有本也挽陳御史詩序余外兄陳君仲述既沒之十有五年其子賞領鄉薦來京師未幾下第將歸士大夫知君者見賞之有成而思君之不可見也皆慨然有作於歌詩賞持告余求序焉夫人之處世未必無一行一藝之可稱至其沒也亦未必不忽然為飄風之過而能繫於人之思者鮮矣惟賢人君子之沒也不然賢人君子其行其藝有非一之可稱其於人如菽粟布帛不可一日無者人無布帛菽粟則困於凍餒而不得以遂其生無賢人君子則無所取正於為善而無以臻乎平治之樂故世有賢人君子則人資之其沒也則思之思之至於歌詠之不忘則其修於已而感於人者又深且厚矣若君者非世之賢人君子者乎君之為人其學必在於聖賢之道其行必依於仁義其言必本於忠信恆自誦曰人不能以古人自待其身者耻也故其教於鄉也必以德行禮義為説其為御史十年也必孜孜以遏惡揚善匡主庇民為務其居官雖貧薄不殊家食時而其所施及於人者實多也又况其文章之懿有非人之所能及者乎此蓋君之所謂行藝者若此則其沒也夫人皆思之矧大夫士嘗知君者則其情之所至作為歌詩固有不能自己者矣然而讀思君之詩者必在知君之為人則序之作又豈可以已也是以托君之行之槩而書之簡端萍翁先生挽詩序萍翁先生姓陳氏字煥章吉之西昌人既卒大夫士知先生而思之不忘者作為詩若辭以寓其意其子翰林庶吉士上啓稡以屬余序余陳氏之甥尤知先生而思之不能忘者夫士君子其身既沒其所樹立踔絶魁偉可以為人之表是以其繫人之思深也思之至於詠歌悲歎不能自己蓋又深者矣陳萍翁先生所以得此於大夫士豈偶然之故哉先生孝友行於家恩義惇於宗族忠信重於鄉人朋友而操節不間於夷險先生之學無所不究而尤工於醫以為神農軒岐之書可以濟人夭死又研精覃思以造其奧其教子必以眀經篤行不辱其先為務其濟人或以醫藥或以資貨脫人於厄者不可數計然當國家熙眀之時未獲霑一命以發施其所藴既老注誤僕僕戍萬里外卒之汨汨以沒此大夫士所為咏歌悲歎而不忘者歟陳氏自五季遷太和以來文學德義衣冠之盛世不乏絶至吾舅氏之行聲明文物猶彬彬也而十餘年之間物故殆盡幸獨有萍翁先生而又不起於是外氏老成盡矣吾徒小子其安所取正乎此吾所為尤思之而不能忘者也夫尤不能忘而無一言豈情也哉謹書於簡首如此宋若璟挽詩序永樂三年二月廬陵宋若璟卒於是其子子環已登第為庶吉士奉詔進學于翰林將奔訃而歸矣子環年甚少質淳氣和敦厚謹慎與人言恂恂時下筆為文詞義粲然薦紳大夫皆愛重之曰是其必有賢父師者乎既而與之往來皆知若璟為之父也而今因令子之言旋傷賢父之永邁各為挽詩以繫其嗟歎悼惜之情子環同年友周恂如集為一卷持求余序其端余三復之為之序曰夫人生而有稱於世者未必可重也惟既沒而有稱者可重也出於庸衆人所共誇譽矜説猶未必可信惟儒生君子有所稱道之而然後可信也儒生君子其見道眀也其辨物審也其宅心正也其發言公而無私也而恆不肯尋常茍有毁譽如有所譽者必其人德義實有諸身逺之有以淑于人近之有以善于其家也嗚呼若璟之沒而得夫薦紳大夫者如此豈不可以為重且信哉若璟雖沒猶不沒矣豫家距其所居不百里前六年因今翰林學士解公始識之雖一胥晤即别去然聞其平生善行亦多而余不及書者以載於解公所作墓表及庶子胡公所作墓志悉矣故特序夫作詩者之意序蓋為詩作也即序以求行亦可推而見矣王詢謨挽詩序翰林庶吉士王詢謨既卒在朝賢士君子與詢謨交者相與哭弔以為其人不可多得而遽已矣可以為世道惜又相率為詩哀悼之皆至公之言也詢謨所稟粹而厚所存和而夷所學博而正其文雅則其行仁義於事親可以為孝子於事君可以為良臣於交處可以為益友於治民可以為循吏而登一第不及施其所畜遂卒則從而哀悼之者豈非為世道惜乎蓋天下之士膺祿位享夀考者非皆有詢謨之所能有其一或遺其二然率此失而彼得則夫哀悼詢謨之詩豈以為私者哉讀其詩以知詢謨之為人其可惜也夫其可慨也夫故處士吳賢翁挽詩序吾友梓橦教諭吳寧存淵告於豫曰伯父賢翁平生行義才智表然鄉閭不幸少壯之時﨑嶇兵革無所於用逮遇皇眀天下寧謐之時則衰老不任卒之窮居以歿夫士有所負挾生未嘗顯於時歿又無聞於後將泯泯與草木同腐矣此寧所為伯父深悲而永慨焉者今將求諸賢士大夫之名能文者取古蒿里之意作為詩歌稱揚之庶幾不朽然伯父處於山林未嘗自衒一世交遊又皆物故世之知者鮮矣幸與子同邑子冝知我伯父願為敘其平生大概于簡首庶乎作者之有據也賢翁所居澄江之南三顧山之麓與清節先生蕭子荆讀書之臺數十步而距吾家不五十里吾實知賢翁然古之為詩序者皆以著眀作詩之意未有先詩而序者也夫後詩而序讀者以眀先詩而序作者以徴於義亦無所不可焉賢翁諱庭富其為人天資溫裕濶達有氣節喜學問通詩經眀其大義不拘拘於章句鄉先生劉雲章德安府同知羅子理先生皆博學峻行於人慎許可劉先生嘗稱其學有用羅先生亦稱其詩有過人者負才識忖度事情數竒中安慶吳侯去疾守吾州數引致與論理道居家不為疾言遽色樂淡泊雖與物無忤然於交際未嘗茍也處族姻篤恩義寡姊妹貧資給之終其身及其孤甥益久不厭教族人子弟必在於忠信族人子弟有志乎學者加厚之汲汲奬掖之惟恐不及蓋自鄉大夫下至田里之氓皆知賢翁為善士年八十有六以歿吳氏世業詩書宋理宗時有大學生季平從子叔友從文丞相舉義兵者賢翁大父也父均玉亦讀書好禮所以為賢翁固自有本矣而享年亦稱所行又天之報施善類者不爽也夫世之人或一善可采士君子往往稱述之以資不朽焉賢翁非止乎一善則託諸士君子之稱述用光逺而有耀者豈不可乎豈不可乎張光弼詩序廬陵張光弼先生少事虞文靖公集得詩法文靖才髙識廣其詩浩博而不肆變而不窮而一宿於正先生之詩氣宇閎壯節制老成而從容雅則稱其博焉張潞公翥最先知之而一時學者皆傾慕之其平生之作散亡多矣豫近從給事中夏時得其五七言古近體一帙以授其外孫浮梁縣丞時昌俾刻之鄒孟氏有言誦其詩讀其書不知其人可乎先生名昱仕元至浙行省員外郎嘗贊忠謨於戎幕元末政壞遂棄官不仕張士誠據有浙西禮致之不屈而與周伯溫楊亷夫交遊相得號一笑居士我太祖皇帝混一天下訪求前元故臣之賢者嘗被命至京深見溫接已而憫其老曰可間矣厚賜遣歸遂採天語更號可間老人徜徉浙西湖山之間詩酒自適春秋八十有三而終噫觀其詩而考其出處可以知其為人焉題東里詩集序族孫挺來京師録余新舊詩為三卷且求引諸其首噫余何足以言詩也古之善詩者粹然一出於正故用之鄉閭邦國皆有禆於世道夫詩志之所發也三代公卿大夫下至閨門女子皆有作以言其志而其言皆有可傳三百十一篇吾夫子所録是已余蚤不聞道既溺於俗好又往往不得已而應人之求即其志之所存者無幾也觀水者必于溟渤觀山者必于泰華央瀆附婁奚取哉國風雅頌詩之源也下此為楚辭為漢魏晉為盛唐如李杜及髙岑孟韋諸家皆詩正派可以泝流而探源焉亦余有志而未能者也挺勉之哉息菴禪師語録序息菴禪師吾廬陵胡忠簡公銓之後名慧觀息菴其别號也幼祝髮於七祖思禪師青原蘭若師虛白鏡公自童子而學儒釋並進時鄉先生陳宗舜春秋八十時來山中居一再月息菴師事之甚謹旦暮受教於儒籍博究既壯出遊諸大方謁名師巨老以求進於釋之道久而沛然有所悟入力修諸已而深造焉嘗遊湖南及兩浙所至善信歸禮如雲遂泝岷江登峨眉居蜀二十年蜀獻王嘉禮之甚厚曰此實真道人也時府中官僚多老成名士皆折輩行與之交返而入閩以觀於南海自藩憲大夫而下皆相敬之正統初至北京敬禮者加衆遂合力建一剎於城之東北隅居之息菴止其中參謁問道者中貴人及士庶常滿户外息菴端坐不輕出雖城中大剎未嘗涉迹然嵗中嘗三四過余余以鄉里故亦嘗一造之因睹其庭函香施供者相繼踵戲之曰象教所云日中一食樹下一宿與衣壞色者彼非耶答曰學人假是致其誠吾聖人不云自行束修未嘗無誨吾亦惟其誠耳公何用觀其外哉然顧視其所貯蕭然無長物惟忠簡公及楊忠襄楊文節胡剛簡四賢遺像余戲之曰不猶滯於相乎答曰之數公名德相髙皆山川之育靈國家之元氣斯文之命脈也且胡楊世好是四紙吾先人所寶吾敢忽忘哉余歎曰好賢重德如此豈尋常離倫絶義自詭欺世以為髙者之倫哉無幾聞其化去為之怊悵纍日中貴人既相與塔藏其遺蛻而建剎以祀之其徒圓震嘗輯師平素與求道者問答之言為語録獨清居士劉寬源將刻梓以傳且求余序余故書吾素相知者於其卷首使觀者知息菴平生所歷之槩與其實行決非茍焉如世之虛冒談佛者所可同日語也贈韓道紀序今天下內自天子都城外及府州縣皆置僧道官官有吏有印署文書上率而下承使各治其教之人各敬承其師之訓而毋務乎外而又申眀之令無嵗不下所以重其教而仁其徒者恩至隆也洪武二十九年漢陽府玄妙觀道士韓鳴善受命為道紀人皆以為榮鳴善獨淡然如無所得惕然如有所不能勝人且以為惑余解之曰夫所為道之教守其真定其神不營營其私慮而富貴貧賤榮利一無所與乎已故淡道之教也今天子既命之官矣躋之九品之秩矣凡一郡之為道家者流皆俾我率而治之有不循于教不戒於律者皆我之責上之所以寵我命我如此吾一身猶懼弗治為辱矧一郡哉得不惕然有所不能勝矣乎吾聞鳴善常自然髙弟常公能以其教之法禱雨暘已疾癘而尤以敬事寡欲稱則有得乎其師固如是者又聞漢陽一郡二邑唯玄妙一觀居是觀者唯其徒數人耳稱其淡而無其所不能勝其足以敬承其師之訓與聖天子之寵命永終不隳矣客有蔣立恭聞余言喜曰若是者不亦重可榮乎請書以為贈杏園雅集序古之君子其間居未嘗一日而忘天下國家也矧承祿儋爵以事乎君而有自逸者乎詩曰夙夜匪懈以事一人古之賢臣所以事其君也今之居承眀延閣者職在文學論思然率寅而入酉而出恭勤左右猶􅷳欿然慮毫分之或闕矧敢自逸者乎固其分之當然也若勞息張弛之冝則雖古人有所不廢焉乃正統丁巳三月之朔當休暇南郡楊公及余八人相與逰於建安楊公之杏園而永嘉謝君庭循來會園有林木泉石之勝時卉競芳香氣芬茀建安公喜嘉客之集也凡所以資娛樂者悉具客亦欣然如釋羈䇿濯清爽而逰於物之外者賔主交適清談不窮觴豆肆陳歌韻並作於是謝君寫而為圖嗟夫一日之樂也情與境會而于于衣冠之聚皆羔羊之大夫備菁莪之儀洽臺萊之意又皆不忘乎衛武自警之心可謂庶幾古之人者題曰雅集不其然哉故遂序於圖之次而詩又次焉東里續集卷十五
